# YouRA Adaptive Research Pipeline Module Configuration
# This file defines installation questions and module configuration values

code: youra-research
name: "YouRA Adaptive Research Pipeline"
default_selected: false

# Welcome message shown during installation
prompt:
  - "Welcome to YouRA Adaptive Research Pipeline!"
  - "This module automates deep learning research to generate complete research packages in 36-57 minutes."
  - "Works integrated with MCP servers (Archon, Exa, Semantic Scholar)."

# Core config values are automatically inherited:
## user_name
## communication_language
## document_output_language
## output_folder

# ============================================================================
# CONFIGURATION FIELDS
# ============================================================================

# Output path for research documents
research_output_path:
  prompt: "Where should YouRA research outputs be saved?"
  default: "docs/youra_research"
  result: "{project-root}/{value}"

# Archon Project Settings
use_archon_project:
  prompt: "Use Archon project management?"
  default: "yes"
  result: "{value}"
  single-select:
    - value: "yes"
      label: "Yes - Manage context with Archon"
    - value: "no"
      label: "No - Use local files only"

archon_project_prefix:
  prompt: "Enter Archon project name prefix"
  default: "YouRA_Research"
  result: "{value}"

auto_create_subtasks:
  prompt: "Auto-generate subtasks based on complexity?"
  default: "yes"
  result: "{value}"
  single-select:
    - value: "yes"
      label: "Yes - Auto-generate based on complexity"
    - value: "no"
      label: "No - Create basic tasks only"

# MCP Server Settings (Roles are FIXED)
mcp_archon_role:
  result: "knowledgebase_search"

mcp_exa_role:
  result: "github_additional_papers"

mcp_semantic_scholar_role:
  result: "paper_search_detail"

mcp_verify_on_start:
  prompt: "Verify MCP server connections on startup?"
  default: "yes"
  result: "{value}"
  single-select:
    - value: "yes"
      label: "Yes - Check connection status"
    - value: "no"
      label: "No - Skip verification"

mcp_timeout_seconds:
  prompt: "Set MCP query timeout (seconds)"
  default: "30"
  result: "{value}"

# Research Pipeline Settings
hypothesis_count:
  prompt: "Select number of hypotheses to generate"
  default: "5"
  result: "{value}"
  single-select:
    - value: "3"
      label: "3 - Quick execution"
    - value: "5"
      label: "5 - Recommended (balanced)"
    - value: "7"
      label: "7 - More options"

validation_rounds:
  prompt: "Maximum hypothesis validation rounds"
  default: "10"
  result: "{value}"

complexity_threshold:
  prompt: "Subtask auto-generation complexity threshold"
  default: "moderate"
  result: "{value}"
  single-select:
    - value: "simple"
      label: "Simple (5-10 points) - No subtasks"
    - value: "moderate"
      label: "Moderate (11-17 points) - Some subtasks"
    - value: "complex"
      label: "Complex (18-25 points) - Full subtasks"

# Execution Mode Settings
auto_clear_between_phases:
  prompt: "Auto-execute /clear between phases?"
  default: "yes"
  result: "{value}"
  single-select:
    - value: "yes"
      label: "Yes - Auto clear for memory management"
    - value: "no"
      label: "No - Manage manually"

pause_for_selection:
  prompt: "Pause for hypothesis selection?"
  default: "yes"
  result: "{value}"
  single-select:
    - value: "yes"
      label: "Yes - User selects hypothesis (recommended)"
    - value: "no"
      label: "No - Auto-select top hypothesis"

# Advanced Settings (Static)
enable_party_mode:
  result: "true"

max_agents_per_party:
  result: "3"

output_format:
  result: "markdown"

enable_verification:
  result: "true"

# Module paths (Static)
module_path:
  result: "{project-root}/bmad-custom-src/custom/modules/youra-research"

agents_path:
  result: "{project-root}/bmad-custom-src/custom/modules/youra-research/agents"

workflows_path:
  result: "{project-root}/bmad-custom-src/custom/modules/youra-research/workflows"

data_path:
  result: "{project-root}/bmad-custom-src/custom/modules/youra-research/data"