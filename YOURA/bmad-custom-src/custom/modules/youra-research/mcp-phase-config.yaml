# MCP Phase Configuration for Anonymous Pipeline
# Defines which MCP servers are required/optional for each phase

# =============================================================================
# MCP SERVER DEFINITIONS
# =============================================================================
mcp_servers:
  archon:
    name: "Archon"
    description: "Knowledge base RAG search, project management, task tracking"
    health_check: "mcp__archon__health_check"
    type: "core"
    tools:
      - "mcp__archon__health_check"
      - "mcp__archon__find_projects"
      - "mcp__archon__manage_project"
      - "mcp__archon__find_tasks"
      - "mcp__archon__manage_task"
      - "mcp__archon__find_documents"
      - "mcp__archon__manage_document"
      - "mcp__archon__rag_search_knowledge_base"
      - "mcp__archon__rag_search_code_examples"
      - "mcp__archon__rag_read_full_page"
      - "mcp__archon__rag_get_available_sources"

  scholar:
    name: "Semantic Scholar"
    description: "Academic paper search, citation networks, paper details"
    skill_name: "scholar-search"
    type: "research"
    tools:
      - "mcp__hamid-vakilzadeh-mcpsemanticscholar__paper_details"
      - "mcp__hamid-vakilzadeh-mcpsemanticscholar__search_papers"
      - "mcp__hamid-vakilzadeh-mcpsemanticscholar__get_citations"
      - "mcp__hamid-vakilzadeh-mcpsemanticscholar__get_references"

  exa:
    name: "Exa"
    description: "GitHub search, web search, code context retrieval"
    skill_name: "exa-search"
    type: "research"
    tools:
      - "mcp__exa__web_search_exa"
      - "mcp__exa__get_code_context_exa"
      - "mcp__exa__research_paper_search"
      - "mcp__exa__github_search"

  clearthought:
    name: "ClearThought"
    description: "Structured reasoning, hypothesis validation, dialectical analysis"
    skill_name: "clearthought-reasoning"
    type: "reasoning"
    tools:
      - "mcp__clearThought__sequentialthinking"
      - "mcp__clearThought__mentalmodel"
      - "mcp__clearThought__scientificmethod"
      - "mcp__clearThought__structuredargumentation"
      - "mcp__clearThought__metacognitivemonitoring"
      - "mcp__clearThought__decisionframework"
      - "mcp__clearThought__collaborativereasoning"

  serena:
    name: "Serena"
    description: "Code analysis, symbol search, memory management"
    health_check: "mcp__serena__list_memories"
    type: "implementation"
    tools:
      - "mcp__serena__list_dir"
      - "mcp__serena__get_symbols_overview"
      - "mcp__serena__find_symbol"
      - "mcp__serena__find_file"
      - "mcp__serena__find_referencing_symbols"
      - "mcp__serena__search_for_pattern"
      - "mcp__serena__insert_after_symbol"
      - "mcp__serena__replace_symbol_body"
      - "mcp__serena__list_memories"
      - "mcp__serena__write_memory"
      - "mcp__serena__delete_memory"

# =============================================================================
# PHASE-SPECIFIC MCP REQUIREMENTS
# =============================================================================
phase_requirements:
  phase0:
    name: "Brainstorm (Question Discovery)"
    required:
      - archon
    optional: []
    reasoning: "Only pipeline creation and task management - no research MCPs needed"
    primary_usage:
      - "Create Pipeline Project"
      - "Create 8 Phase Tasks"
      - "Update task status on completion"

  phase1:
    name: "Research Gathering (Data Collection)"
    required:
      - archon
      - scholar
      - exa
    optional: []
    reasoning: "All 3 skills mandatory for comprehensive research data collection"
    primary_usage:
      - "Archon: KB search for past cases and patterns"
      - "Scholar: Academic paper search and analysis"
      - "Exa: GitHub implementations and tutorials"

  phase2a_dialogue:
    name: "Hypothesis Generation (4-Perspective Round Table + Variable Inference + H0 Generation)"
    required:
      - archon
      - clearthought
      - scholar
      - exa
    optional: []
    reasoning: "Evidence re-fetch requires Scholar/Exa, ClearThought for structured reasoning"
    primary_usage:
      - "ClearThought: All reasoning tools for hypothesis generation"
      - "Scholar: Paper details re-fetch for evidence"
      - "Exa: Code context for implementation patterns"
      - "Archon: Pipeline check and KB search"

  # phase2a_extended: REMOVED in v7.7.0 - merged into phase2a_dialogue

  phase2b:
    name: "Research Planning (Roadmap Creation)"
    required:
      - archon
      - clearthought
      - exa
    optional: []
    reasoning: "ClearThought for structured reasoning, Archon for pipeline and KB, Exa for additional research"
    primary_usage:
      - "ClearThought: collaborativereasoning, sequentialthinking, scientificmethod, structuredargumentation"
      - "Archon: Pipeline updates, past failure case analysis"
      - "Exa: Additional research and implementation pattern search"

  phase2c:
    name: "Experiment Design"
    required:
      - archon
      - exa
    optional:
      - serena
    reasoning: "Implementation search required, code analysis optional if base code exists"
    primary_usage:
      - "Archon: KB search for implementation patterns"
      - "Exa: GitHub search for similar implementations"
      - "Serena: Optional code symbol analysis"

  phase3:
    name: "Implementation Planning"
    required:
      - archon
      - serena
    optional: []
    reasoning: "Archon for project/document/task creation, Serena for code analysis"
    primary_usage:
      - "Archon: Create hypothesis project, upload documents, create tasks"
      - "Serena: Symbol analysis, code structure understanding"

  phase4:
    name: "Coding & PoC Validation (MUST_WORK gate)"
    required:
      - archon
      - serena
      - exa
    optional: []
    reasoning: "Archon for task management, Serena for code manipulation, Exa for implementation pattern search"
    primary_usage:
      - "Archon: Task status management (todo/doing/review/done), KB search"
      - "Serena: Code analysis, memory for step tracking"
      - "Exa: Implementation pattern search, troubleshooting reference"

  phase5:
    name: "Baseline Repository Comparison (DETERMINES_SUCCESS gate)"
    required:
      - archon
      - serena
    optional:
      - exa
    reasoning: "Archon for state management and task tracking, Serena for code analysis and failure memory writing"
    primary_usage:
      - "Archon: Update verification_state, manage DETERMINES_SUCCESS gate"
      - "Serena: Code analysis, write phase5_failure_*.md memory files"
      - "Exa: Optional baseline repository search"

  phase6:
    name: "Paper Writing"
    required:
      - archon
    optional:
      - scholar
      - serena
    reasoning: "Archon for task management, Scholar for citation verification, Serena for code reference extraction"
    primary_usage:
      - "Archon: Task status management for writing tasks"
      - "Scholar: Optional citation verification and related work search"
      - "Serena: Optional code symbol extraction for paper examples"

  phase65:
    name: "Adversarial Review (Multi-round Devil's Advocate)"
    required:
      - archon
    optional:
      - clearthought
    reasoning: "Archon for task management, ClearThought for structured critical analysis"
    primary_usage:
      - "Archon: Task status management for review rounds"
      - "ClearThought: Optional structured argumentation for devil's advocate review"

# =============================================================================
# REFLECTION-SPECIFIC REQUIREMENTS (NEW)
# =============================================================================
reflection_requirements:
  required:
    - archon
    - clearthought
    - exa
  optional: []
  reasoning: "Reflection requires ClearThought for structured analysis of failures, Archon for state management, Exa for alternative approach search"
  primary_usage:
    - "ClearThought: Analyze experiment results for meaningful findings"
    - "Archon: Update verification_state, log modifications"
    - "Exa: Search for alternative approaches and implementation patterns"

# =============================================================================
# SESSION MANAGEMENT CONFIGURATION
# =============================================================================
session_config:
  startup_timeout_ms: 30000   # = mcp_timeout_seconds * 1000 in module.yaml
  retry_attempts: 3
  retry_delay_ms: 15000
  health_check_interval_ms: 60000
  graceful_shutdown_timeout_ms: 5000

# =============================================================================
# ERROR HANDLING
# =============================================================================
error_handling:
  on_required_unavailable: "FAIL"      # FAIL | WARN_AND_CONTINUE
  on_optional_unavailable: "WARN"      # FAIL | WARN_AND_CONTINUE | SILENT
  max_retries: 3
  retry_delay_seconds: 15

