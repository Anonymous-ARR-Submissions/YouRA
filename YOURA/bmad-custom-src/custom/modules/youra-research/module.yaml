# YouRA Research Module Configuration

# ============================================
# BMAD Module Metadata (REQUIRED)
# ============================================

code: youra-research
name: "YouRA Research - AI Research Assistant"
default_selected: true
type: module

# ============================================
# BMAD v6 Standard Configuration (REQUIRED)
# ============================================

user_name: Anonymous
communication_language: English
document_output_language: English
output_folder: '{project-root}/docs'

# ============================================
# YouRA Module Specific Configuration
# ============================================

# Research output path (subfolder of output_folder)
research_output_path: '{project-root}/docs/youra_research'

# MCP Server timeout settings
mcp_timeout_seconds: 30  # Unit: seconds (= startup_timeout_ms: 30000 in mcp-phase-config.yaml)

# ============================================
# MCP Phase Configuration
# ============================================

# Phase-specific MCP server configuration file
mcp_phase_config_file: 'mcp-phase-config.yaml'

# MCP error handling behavior
mcp_error_handling:
  on_required_unavailable: FAIL    # FAIL | WARN_AND_CONTINUE
  on_optional_unavailable: WARN    # FAIL | WARN_AND_CONTINUE | SILENT
  max_retries: 3
  retry_delay_seconds: 15

# ============================================
# Hypothesis Versioning
# ============================================

hypothesis_versioning:
  enabled: true
  max_modification_attempts: 3
  version_naming_format: "{original_id}-v{version}"

# Automatic reflection on PARTIAL/FAIL
auto_reflection:
  enabled: true
  trigger_on_partial: true
  trigger_on_fail: true
  requires_meaningful_findings: true

# ============================================
# Task Management Configuration
# ============================================
# Phase 4 implementation tasks are tracked locally, not in Archon.
# Archon only tracks Hypothesis-level tasks.
# This reduces MCP calls from ~30-45 per hypothesis to 2-3.

task_management:
  # Use local checkpoint file for Phase 4 implementation task tracking
  use_local_checkpoint: true

  # Local task files (relative to hypothesis folder)
  tasks_file: "03_tasks.yaml"          # From Phase 3 step-09
  checkpoint_file: "04_checkpoint.yaml" # Used by Phase 4 steps

  # Archon scope: what tasks to track in Archon MCP
  # - "all": All tasks including implementation tasks
  # - "hypothesis_only": Only Hypothesis-level tasks (recommended)
  archon_scope: "hypothesis_only"

  # Checkpoint format identifier
  checkpoint_schema_version: "3.5"

# ============================================
# Reflection & SUPERSEDED Configuration
# ============================================
# Controls LLM self-assessment behavior for PARTIAL results.
# Determines when hypothesis needs redesign (SUPERSEDED) vs self-modification.

reflection:
  # Enable compatibility check with dependent hypotheses
  enable_compatibility_check: true

  # Allow self-modification within same hypothesis ID
  allow_self_modify: true
  max_self_modify_attempts: 3

  # LLM self-assessment questions for compatibility check
  assessment_criteria:
    - "interface_compatibility"    # Do outputs match dependent inputs?
    - "data_flow_validity"        # Are tensor shapes/types correct?
    - "behavioral_assumptions"    # Are behavioral guarantees met?
    - "recovery_potential"        # Can issues be fixed without redesign?

  # SUPERSEDED routing configuration
  superseded_routing:
    route_to: "Phase 2A-Dialogue"
    create_new_hypothesis_version: true
    preserve_partial_results: true
    write_serena_memory: true
    memory_template: "superseded_{hypothesis_id}.md"

# ============================================
# Pipeline Options
# ============================================
pipeline_options:
  # Skip Phase 5 (Baseline Repository Comparison) entirely.
  # true: Phase 4.5 (Synthesis) → Phase 6 (Paper Writing) directly
  # false: Normal flow Phase 4.5 → Phase 5 → Phase 6 (default)
  skip_baseline_comparison: true

# Module metadata
module_name: youra-research
module_description: "AI Research Assistant - Full research pipeline with baseline comparison, local checkpoint task management, and paper writing."

# Research workflow phases
phases:
  phase0: "Brainstorm (Question Discovery)"
  phase1: "Research Gathering (Data Collection)"
  phase2a_dialogue: "Hypothesis Generation (4-Perspective Round Table + Variable Inference + H0 Generation)"
  phase2b: "Research Planning (Roadmap Creation)"
  phase2c: "Experiment Design"
  phase3: "Implementation Planning"
  phase4: "Coding & PoC Validation (MUST_WORK gate)"
  phase45: "Hypothesis Synthesis (Evidence-refined claims gateway to Phase 6)"
  phase5: "Baseline Repository Comparison (DETERMINES_SUCCESS gate)"
  phase6: "Paper Writing"
  phase65: "Adversarial Review (Multi-round Devil's Advocate)"

# Default settings
default_research_duration: "10-15 minutes"
default_max_rounds: 10
default_target_hypotheses: "3-5"
