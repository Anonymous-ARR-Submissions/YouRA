# Phase 0: Research Brainstorm Workflow
name: phase0-brainstorm
architecture: "step-file" # Uses step files for maintainability and resume support
description: "Interactive research question brainstorming session. Helps users discover, refine, and articulate research questions through adaptive facilitation. Outputs Phase 1 compatible research inputs (research_question, detailed_question, reference_papers)."
author: "Anonymous"
web_bundle: false 

# Critical variables from config (BMAD v6 Standard)
config_source: "{project-root}/bmad-custom-src/custom/modules/youra-research/module.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
date: system-generated

# YouRA Module Specific Variables
research_output_path: "{config_source}:research_output_path"

# Module path and component files
installed_path: "{project-root}/bmad-custom-src/custom/modules/youra-research/workflows/phase0-brainstorm"
template: "{installed_path}/template.md"
instructions: "{installed_path}/workflow.md"
validation: "{installed_path}/checklist.md"
research_techniques: "{installed_path}/research-methods.csv"

# Step Files (Step-based architecture)
step_files:
  step_00: "{installed_path}/steps/step-00-init.md"
  step_01: "{installed_path}/steps/step-01-session-setup.md"
  step_02: "{installed_path}/steps/step-02-approach.md"
  step_03: "{installed_path}/steps/step-03-techniques.md"
  step_04: "{installed_path}/steps/step-04-synthesize.md"
  step_05: "{installed_path}/steps/step-05-references.md"
  step_06: "{installed_path}/steps/step-06-validate.md"
  step_07: "{installed_path}/steps/step-07-complete.md"

# Output configuration
default_output_file: "{research_output_path}/00_brainstorm_session.md"

# Session parameters
session_duration: "10-20 minutes"

standalone: true

# Execution Mode Configuration
execution_mode:
  default: "interactive" # Normal interactive brainstorming
  supports_unattended: true # Can run in UNATTENDED mode

  unattended_triggers:
    - "batch_mode: true" # From invoke-workflow parameter
    - "mode: unattended" # From workflow invocation
    - "#batch-mode marker" # Text marker in input
    - "research_idea_content" # From full-pipeline-unattended

  unattended_behavior:
    skip_interactive_steps: true # Skip Steps 1-6
    auto_fill_from_input: true # Extract research components from input
    auto_create_pipeline: true # Create Archon pipeline
    auto_complete: true # Mark Phase 0 done, Phase 1 doing

# Progressive File System (Auto-Resume Support)
progressive_file:
  enabled: true
  placeholder_pattern: "{{UNFILLED:variable_name}}"
  skipped_marker: "*Skipped by user*"

  # Resume behavior
  resume:
    auto_detect: true # Automatically check for existing file on start
    ask_user: false # Do NOT ask user - just resume automatically
    show_summary: true # Show brief summary of completed steps on resume

  # Step to placeholder mapping for resume detection
  step_markers:
    step_00: ["lessons_from_previous_attempts"] # Init step - ROUTE_TO_0 context (optional)
    step_01: ["initial_interest", "existing_context"]
    step_02: ["approach_selection", "session_plan"]
    step_03: ["technique_sessions"]
    step_04: ["main_research_question", "refined_question", "detailed_questions"]
    step_05: ["reference_papers"]
    step_06: ["so_what_validation", "feasibility_validation"]
    step_07: ["phase1_research_question", "phase1_detailed_question", "phase1_reference_papers", "key_insights", "techniques_used", "areas_for_exploration", "session_duration", "next_steps"]

# Pipeline Position & Connections
pipeline:
  position: "Phase 0"
  sequence: "**Phase 0** → Phase 1 → Phase 2A-Dialogue → Phase 2B → (2C → 3 → 4) × N → 4.5 → [5] → 6 → 6.5 → 6.5.1"

  # Outputs for next phase
  outputs:
    - file: "00_brainstorm_session.md"
      description: "Research question, detailed questions, reference papers"
      used_by: "Phase 1 (Targeted Research)"

  # Next phase connection
  next_phase:
    name: "Phase 1"
    workflow: "phase1-targeted-research"
    inputs:
      - "research_question"
      - "detailed_question"
      - "reference_papers"

# MCP Server Requirements (NEW - for Pipeline Orchestration)
mcp_servers:
  required:
    - name: "Archon"
      purpose: "Pipeline project creation and task tracking"
      tools:
        - "mcp__archon__manage_project"
        - "mcp__archon__manage_task"
        - "mcp__archon__find_projects"
        - "mcp__archon__find_tasks"
      mandatory: true
      usage:
        step_0:
          description: "Create Pipeline Project and Phase Tasks"
          actions:
            - "Create 'Anonymous Pipeline: {research_topic}' project"
            - "Create 10 Phase Tasks (Phase 0 = doing, rest = todo)"
        step_9:
          description: "Update Pipeline Task status on completion"
          actions:
            - "Phase 0 Task → done"
            - "Phase 1 Task → doing"

    - name: "Serena"
      purpose: "Memory persistence for failure context recovery (ROUTE_TO_0 case)"
      tools:
        - "mcp__serena__list_memories"
        - "mcp__serena__read_memory"
      mandatory: false # Only required for ROUTE_TO_0 case
      usage:
        step_0:
          description: "Check for failure context from previous attempts"
          actions:
            - "List ALL memory files (phase5_failure_*, failure_*, pivot_*, limitation_*)"
            - "Read ALL matching files for complete failure history"
            - "Pass failure context to inform new brainstorm generation"

  validation: "Archon MUST be available for pipeline orchestration. Serena SHOULD be available for ROUTE_TO_0 failure context recovery."

# Pipeline Project Configuration
pipeline_project:
  name_pattern: "Anonymous Pipeline: {research_topic}"
  description: "Full research pipeline orchestration from Phase 0 to Phase 6.5"

  tasks:
    - title: "Phase 0 - Brainstorm"
      initial_status: "doing"
      task_order: 100
    - title: "Phase 1 - Research"
      initial_status: "todo"
      task_order: 90
    - title: "Phase 2A-Dialogue - Hypothesis"
      initial_status: "todo"
      task_order: 80
    - title: "Phase 2B - Planning"
      initial_status: "todo"
      task_order: 70
    - title: "Phase 2C - Experiment"
      initial_status: "todo"
      task_order: 50
    - title: "Phase 3 - Implementation"
      initial_status: "todo"
      task_order: 40
    - title: "Phase 4 - Coding"
      initial_status: "todo"
      task_order: 30
    - title: "Phase 5 - Baseline Comparison"
      initial_status: "todo"
      task_order: 20
    - title: "Phase 6 - Paper Writing"
      initial_status: "todo"
      task_order: 10
    - title: "Phase 6.5 - Adversarial Review"
      initial_status: "todo"
      task_order: 5
