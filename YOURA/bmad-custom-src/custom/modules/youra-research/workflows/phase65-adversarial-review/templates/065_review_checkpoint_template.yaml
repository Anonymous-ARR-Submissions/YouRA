# Phase 6.5 Adversarial Review Checkpoint Template
# Copy this file to: {research_folder}/paper/review/065_review_checkpoint.yaml
version: "2.0"
created_at: "" # ISO8601 timestamp
updated_at: "" # ISO8601 timestamp

# Workflow status
status: "IN_PROGRESS" # IN_PROGRESS | CONVERGED | MANUAL_REQUIRED | COMPLETED

# Round tracking
current_round: 1 # 1, 2, or 3
rounds_completed: [] # ["R1"] or ["R1", "R2"] or ["R1", "R2", "R3"]
max_rounds: 3

# ============================================================================
# INPUT VALIDATION
# ============================================================================

input_validation:
  paper_exists: false
  verification_state_exists: false
  phase4_files_found: 0
  phase5_files_found: 0
  ground_truth_extracted: false
  narrative_blueprint_exists: false # 

# Ground Truth File (for accuracy verification)
ground_truth_file: "" # Path to 065_ground_truth.yaml

# Narrative Blueprint File (for persuasiveness verification) 
narrative_blueprint_file: "" # Path to 06_narrative_blueprint.yaml

# Pre-computed Discrepancies
pre_computed_discrepancies:
  performance_discrepancies: 0
  detection_discrepancies: 0
  baseline_discrepancies: 0
  methodology_discrepancies: 0

# ============================================================================
# INPUT/OUTPUT TRACKING
# ============================================================================

input_paper: "" # Path to original paper (06_paper.md)
latest_paper_version: "" # Path to most recent version

# ============================================================================
# ISSUES BY ROUND
# ============================================================================

issues_by_round:
  R1:
    focus: "accuracy_and_engagement"

    # Issue counts
    fatal: 0
    major: 0
    resolved: 0

    by_persona:
      accuracy_checker:
        fatal: 0
        major: 0
      bored_reviewer:
        fatal: 0
        major: 0
      skeptical_expert:
        fatal: 0
        major: 0

    human_review_notes_count: 0

    # Output files
    review_file: "" # Path to 065_review_r1.md
    revised_paper: "" # Path to 06_paper_r1.md

  R2:
    focus: "verification_and_credibility"
    fatal: 0
    major: 0
    resolved: 0
    by_persona:
      accuracy_checker:
        fatal: 0
        major: 0
      bored_reviewer:
        fatal: 0
        major: 0
      skeptical_expert:
        fatal: 0
        major: 0
    human_review_notes_count: 0
    review_file: ""
    revised_paper: ""

  R3:
    focus: "final_check"
    fatal: 0
    major: 0
    resolved: 0
    by_persona:
      accuracy_checker:
        fatal: 0
        major: 0
      bored_reviewer:
        fatal: 0
        major: 0
      skeptical_expert:
        fatal: 0
        major: 0
    human_review_notes_count: 0
    review_file: ""
    revised_paper: ""

# ============================================================================
# PERSUASIVENESS TRACKING
# ============================================================================

persuasiveness_checks:
  R1:
    # Bored Reviewer checks
    abstract_compelling: null # true | false | null (not checked)
    problem_clear_in_1_minute: null
    novelty_clear_in_2_minutes: null
    figure_1_self_explanatory: null
    would_continue_reading: null
    attention_lost_at: null # Section where attention lost, or null

    # Skeptical Expert checks
    false_novelty_claims_found: 0
    unfair_baseline_comparisons: 0
    overclaims_found: 0
    missing_limitations: false

  R2:
    abstract_compelling: null
    problem_clear_in_1_minute: null
    novelty_clear_in_2_minutes: null
    figure_1_self_explanatory: null
    would_continue_reading: null
    attention_lost_at: null
    false_novelty_claims_found: 0
    unfair_baseline_comparisons: 0
    overclaims_found: 0
    missing_limitations: false

  R3:
    abstract_compelling: null
    problem_clear_in_1_minute: null
    novelty_clear_in_2_minutes: null
    figure_1_self_explanatory: null
    would_continue_reading: null
    attention_lost_at: null
    false_novelty_claims_found: 0
    unfair_baseline_comparisons: 0
    overclaims_found: 0
    missing_limitations: false

# ============================================================================
# HUMAN REVIEW NOTES
# ============================================================================

# Minor issues collected for human review (NOT auto-fixed)
human_review_notes:
  total_count: 0
  by_type:
    typo: 0
    grammar: 0
    style: 0
    clarity: 0
    formatting: 0

  # Actual notes (list)
  notes: []
  # Example:
  # - location: "Section 3, paragraph 2"
  # type: "grammar"
  # note: "Consider rephrasing for clarity"

# ============================================================================
# CONVERGENCE
# ============================================================================

convergence:
  met: false
  reason: "" # Why converged or why not
  evaluated_at: "" # ISO8601 timestamp

  criteria:
    fatal_issues_zero: false # MUST be true
    major_issues_zero: false # SHOULD be true for CONDITIONAL_ACCEPT
    persuasiveness_passed: false

  # Remaining issues at convergence
  remaining:
    fatal: 0
    major: 0
    # MINOR no longer tracked here - see human_review_notes

  recommendation: "" # CONDITIONAL_ACCEPT | MINOR_REVISION | MAJOR_REVISION

# ============================================================================
# EXECUTION
# ============================================================================

execution_mode: "UNATTENDED" # UNATTENDED | INTERACTIVE

timestamps:
  workflow_started: ""

  r1_adversary_started: ""
  r1_adversary_completed: ""
  r1_revision_started: ""
  r1_revision_completed: ""

  r2_adversary_started: ""
  r2_adversary_completed: ""
  r2_revision_started: ""
  r2_revision_completed: ""

  r3_adversary_started: ""
  r3_adversary_completed: ""
  r3_revision_started: ""
  r3_revision_completed: ""

  workflow_completed: ""

# ============================================================================
# FINAL OUTPUTS
# ============================================================================

final_outputs:
  final_paper: "" # Path to 06_paper_final.md
  review_summary: "" # Path to 065_review_summary.md
  changelog: "" # Path to 065_changelog.md
  human_review_notes_file: ""

  next_phase: "Phase 6.5.1" # Overleaf LaTeX/PDF generation

# ============================================================================
# ERROR TRACKING
# ============================================================================

errors: []
# Example:
# - timestamp: ""
# step: ""
# error: ""
# recovery: ""
