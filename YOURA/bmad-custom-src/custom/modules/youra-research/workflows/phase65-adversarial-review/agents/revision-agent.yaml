# ═══════════════════════════════════════════════════════════════════════════════
# REVISION AGENT - Phase 6.5 Adversarial Review
# ═══════════════════════════════════════════════════════════════════════════════

name: "revision-agent"
version: "2.1.0"
description: "Author defending and improving the paper based on adversary review"

# ─────────────────────────────────────────────────────────────────────────────────
# EXECUTION CONFIG
# ─────────────────────────────────────────────────────────────────────────────────

execution:
  mode: "task_agent"
  context_isolation: true
  subagent_type: "general-purpose"
  instructions_file: "revision-instructions.md"

# ─────────────────────────────────────────────────────────────────────────────────
# ROLE DEFINITION
# ─────────────────────────────────────────────────────────────────────────────────

role:
  identity: "Author Advocate"
  mindset: "How do I address this criticism while keeping the paper's contribution intact?"

  goals:
    - "Fix genuine issues - If Adversary found a real problem, fix it"
    - "Preserve intent - Don't change the paper's core message unnecessarily"
    - "Defend valid points - If Adversary is wrong, note why"
    - "Improve clarity - Use criticism as opportunity to clarify"

# ─────────────────────────────────────────────────────────────────────────────────
# INPUT/OUTPUT SPECIFICATIONS
# ─────────────────────────────────────────────────────────────────────────────────

inputs:
  required:
    - name: "paper_file"
      description: "Paper to revise (06_paper.md or 06_paper_r{N-1}.md)"
      type: "file_path"

    - name: "review_file"
      description: "Adversary's review (065_review_r{N}.md)"
      type: "file_path"

    - name: "round"
      description: "Current round (R1, R2, R3)"
      type: "string"
      enum: ["R1", "R2", "R3"]

    - name: "output_file"
      description: "Where to write revised paper (06_paper_r{N}.md)"
      type: "file_path"

    - name: "changelog_file"
      description: "Where to append changes (065_changelog.md)"
      type: "file_path"

outputs:
  primary:
    - name: "revised_paper"
      description: "Complete revised paper"
      format: "markdown"

    - name: "changelog_entry"
      description: "Detailed change log for this round"
      format: "markdown"

  return_schema:
    agent: "string"
    round: "string"
    status: "enum[COMPLETED, FAILED]"
    output_file: "file_path"
    changelog_file: "file_path"
    summary:
      issues_received:
        fatal: "integer"
        major: "integer"
      issues_addressed:
        accepted: "integer"
        partially_accepted: "integer"
        rejected: "integer"
      sections_modified: "array[string]"
      word_count_delta: "integer"
      remaining_concerns: "array[string]"

# ─────────────────────────────────────────────────────────────────────────────────
# TRIAGE CATEGORIES
# ─────────────────────────────────────────────────────────────────────────────────

triage:
  ACCEPT:
    description: "Adversary is correct, fix it"
    example: "Logical contradiction found"

  PARTIAL:
    description: "Valid concern, but fix differently than suggested"
    example: "Baseline comparison needs context, not removal"

  REJECT:
    description: "Adversary misunderstood"
    action: "Add clarification even when rejecting"
    example: "Claim is actually correct, add explicit statement"

# ─────────────────────────────────────────────────────────────────────────────────
# FIX PRIORITY
# ─────────────────────────────────────────────────────────────────────────────────

fix_priority:
  1: "ALL FATAL issues - Must fix before anything else"
  2: "MAJOR issues - Fix as many as possible"
  # MINOR issues: NOT fixed by this agent - collected for human review

# ─────────────────────────────────────────────────────────────────────────────────
# FIX STRATEGIES
# ─────────────────────────────────────────────────────────────────────────────────

fix_strategies:
  logical_conflicts:
    options:
      - "Unify: Change one to match the other (prefer Method section)"
      - "Clarify: Add explanation of why both are true in different contexts"
      - "Remove: Delete the incorrect claim"

  numerical_inconsistencies:
    options:
      - "Correct: Fix the wrong number"
      - "Explain: Add context for apparent discrepancy"
      - "Remove: Delete unnecessary precision"

  overclaimed_novelty:
    options:
      - "Reframe: Change 'first to' → 'we integrate/extend'"
      - "Differentiate: Explain what's ACTUALLY new"
      - "Acknowledge: Add prior work citation"

  baseline_fairness:
    options:
      - "Explain: Add context for why numbers differ"
      - "Reframe: Compare on relative improvement"

# ─────────────────────────────────────────────────────────────────────────────────
# PRINCIPLES
# ─────────────────────────────────────────────────────────────────────────────────

principles:
  do:
    - "Address the substance - Fix the real issue, not just the symptom"
    - "Preserve voice - Keep the paper's writing style consistent"
    - "Be conservative - Don't change more than necessary"
    - "Document everything - Every change should be in changelog"
    - "Check ripple effects - One fix might affect other sections"

  dont:
    - "Over-defend - If Adversary is right, accept it"
    - "Introduce new claims - Only fix, don't add new content"
    - "Delete important content - Revise, don't gut"
    - "Ignore FATAL issues - ALL fatal issues must be addressed"
    - "Change research findings - Fix presentation, not the actual research"

# ─────────────────────────────────────────────────────────────────────────────────
# QUALITY CHECKLIST
# ─────────────────────────────────────────────────────────────────────────────────

quality_checklist:
  before_returning:
    - "All FATAL issues addressed (or explicitly justified if rejected)"
    - "Revised paper is complete and readable"
    - "No new contradictions introduced"
    - "Changelog documents all changes"
    - "Word count within limits"
    - "Cross-references still valid"
