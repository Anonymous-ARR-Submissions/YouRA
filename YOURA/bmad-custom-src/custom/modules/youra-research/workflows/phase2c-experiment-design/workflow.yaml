# Phase 2C: Research-Driven Experiment Design Workflow
name: phase2c-experiment-design
architecture: "step-file"
description: "Generate detailed, research-backed experiment specifications from Phase 2B hypothesis verification protocols using MCP-powered implementation search and code analysis"
author: "Anonymous"
phase_output: "Experiment specification Level 1.5 (research-backed)"

# Critical variables from config (BMAD v6 Standard)
config_source: "{project-root}/bmad-custom-src/custom/modules/youra-research/module.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
date: system-generated

# YouRA Module Specific Variables
research_output_path: "{config_source}:research_output_path"
research_folder: "{research_output_path}/youra_research"

# Module path and component files
installed_path: "{project-root}/bmad-custom-src/custom/modules/youra-research/workflows/phase2c-experiment-design"

# Input files (from Phase 2B)
phase2b_context: "{research_folder}/{hypothesis_id_lower}/02b_context.md"
phase2b_roadmap: "{research_folder}/02b_verification_plan.md"
verification_state_file: "{research_folder}/verification_state.yaml"

# Output file
hypothesis_folder: "{research_folder}/{hypothesis_id_lower}"
default_output_file: "{hypothesis_folder}/02c_experiment_brief.md"

# Template and validation
template: "{installed_path}/template.md"
validation: "{installed_path}/checklist.md"

# Step-file architecture (modular, just-in-time loading)
first_step: "{installed_path}/steps/step-01-init.md"

# Step Files
step_files:
  step_01: "{installed_path}/steps/step-01-init.md"
  step_02: "{installed_path}/steps/step-02-archon-search.md"
  step_03: "{installed_path}/steps/step-03-exa-github.md"
  step_04: "{installed_path}/steps/step-04-serena-analysis.md"
  step_05: "{installed_path}/steps/step-05-dataset-baseline.md"
  step_06: "{installed_path}/steps/step-06-synthesis.md"
  step_07: "{installed_path}/steps/step-07-references.md"
  step_08: "{installed_path}/steps/step-08-validation.md"

# Session parameters
target_execution_time: "5-8 minutes"
specification_level: "1.5"

# Current hypothesis to design experiment for (user input)
hypothesis_id: "{{user_input}}"
hypothesis_id_lower: "{{hypothesis_id|lower}}"

standalone: false # Requires Phase 2B completion
requires: "phase2b-planning"

# Pipeline Position & Connections
pipeline:
  position: "Phase 2C"
  sequence: "Phase 0 → 1 → 2A → 2B → (**Phase 2C** → 3 → 4) × N → 4.5 → [5] → 6 → 6.5 → 6.5.1"

  # Inputs from previous phases
  inputs:
    - from: "Phase 2B (Planning)"
      file: "{hypothesis_folder}/02b_context.md"
      required: true
      description: "Per-hypothesis context (optimized, 91% smaller)"
    - from: "Phase 4 (Previous)"
      file: "{previous_hypothesis_folder}/04_validation.md"
      required: false
      description: "Previous hypothesis validation results"

  # Outputs for next phase
  outputs:
    - file: "{hypothesis_folder}/02c_experiment_brief.md"
      description: "Research-backed experiment specification (Level 1.5)"
      used_by: "Phase 3 PRD Workflow"

  # Next phase connection
  next_phase:
    name: "Phase 3"
    workflow: "phase3-implementation-planning"
    input_file: "{hypothesis_folder}/02c_experiment_brief.md"
    description: "Generate PRD, Architecture, Logic, Config from experiment brief"

# Progressive File System (Auto-Resume Support)
progressive_file:
  enabled: true
  placeholder_pattern: "{{UNFILLED:variable_name}}"
  skipped_marker: "*Skipped*"

  # Resume behavior
  resume:
    auto_detect: true
    ask_user: false
    show_summary: true

  # Step to placeholder mapping for resume detection
  # NOTE: Keys match step_files naming convention (step_01, step_02, etc.)
  step_markers:
    step_01: ["hypothesis_id", "hypothesis_statement", "gate_condition", "workflow_status", "continuation_context"]
    step_02: ["archon_knowledge_findings", "archon_code_findings"]
    step_03: ["exa_github_findings"]
    step_04: ["serena_code_analysis"]
    step_05: ["dataset_specification", "baseline_model"]
    step_06: ["experiment_specification", "core_mechanism_pseudocode", "training_protocol", "evaluation_metrics"]
    step_07: ["reference_implementations"]
    step_08: ["quality_validation"]

# MCP Server Requirements
mcp_servers:
  required:
    - name: "Archon"
      purpose: "Past implementation cases and proven patterns"
      tools: ["rag_search_knowledge_base", "rag_search_code_examples"]
    - name: "Exa"
      purpose: "Real GitHub implementations and live code search"
      tools: ["get_code_context_exa", "web_search_exa"]

  optional:
    - name: "Serena"
      purpose: "Semantic code analysis for complex implementations"
      tools: ["get_symbols_overview", "find_symbol", "search_for_pattern"]

  validation: "Archon and Exa MUST be available. Serena is optional but recommended."

# Specification Requirements (Level 1.5)
specification_requirements:
  must_include:
    - dataset: "Exact name/version, source, splits, preprocessing, augmentation"
    - model: "Baseline architecture, proposed architecture, core mechanism pseudo-code (10-30 lines)"
    - training: "Optimizer, learning rate + schedule, batch size, epochs, loss, regularization"
    - evaluation: "Metrics, success criteria, expected baseline (PoC: direction-based, no statistical tests)"
    - ablation: "Variants to test, what each measures"
    - references: "All sources, GitHub repos, code snippets"

  must_not_include:
    - "Complete file structure (Phase 3)"
    - "Full code implementation (Phase 4)"
    - "Task decomposition (Phase 3)"

# State Tracking Integration
state_tracking:
  on_start:
    - "Validate workflow status (check not STOPPED)"
    - "Validate hypothesis status (check not BLOCKED)"
    - "Check prerequisite gate satisfaction"
    - "Apply gate logic (MUST_WORK failures stop workflow)"
    - "Update hypothesis experiment_design.status = IN_PROGRESS"

  on_complete:
    - "Update hypothesis experiment_design.status = COMPLETED"
    - "Update hypothesis experiment_design.file = output filename"
    - "Log completion event in history"
    - "Update statistics"

# Quality Validation Criteria
quality_criteria:
  experiment_brief_complete:
    check: "Experiment brief contains all required sections"
    required_sections:
      - "Dataset Specification"
      - "Model Architecture"
      - "Training Protocol"
      - "Evaluation Metrics"
      - "Ablation Studies"
      - "References"
    fail_action: "Re-run synthesis step"

  mcp_sources_cited:
    check: "At least 3 MCP sources cited"
    fail_action: "Run additional MCP searches"
