# Full Pipeline UNATTENDED Mode Workflow
name: full-pipeline-unattended
architecture: "orchestration"
description: "Full automated UNATTENDED pipeline: Phase 0 → 1 → 2A → 2B → (2C → 3 → 4) × N → 4.5 → [5] → 6 → 6.5 → 6.5.1. Executes entire YouRA pipeline without user interaction. : Phase 6.5.1 added for LaTeX/PDF generation. Steps 0-11."
author: "Anonymous"
phase_output: "Complete research pipeline with validated hypotheses, paper (MD + PDF)"

# Critical variables from config (BMAD v6 Standard)
config_source: "{project-root}/bmad-custom-src/custom/modules/youra-research/module.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
date: system-generated

# YouRA Module Specific Variables
research_output_path: "{config_source}:research_output_path"
research_folder: "{research_output_path}/youra_research"
verification_state_file: "{research_folder}/verification_state.yaml"

# Module path and component files
installed_path: "{project-root}/bmad-custom-src/custom/modules/youra-research/workflows/full-pipeline-unattended"
instructions: "{installed_path}/instructions.md"

# Workflow paths for invoke-workflow
workflow_base_path: "{project-root}/bmad-custom-src/custom/modules/youra-research/workflows"
phase0_workflow: "{workflow_base_path}/phase0-brainstorm/workflow.yaml"
phase1_workflow: "{workflow_base_path}/phase1-targeted-research/workflow.yaml"
phase2a_workflow: "{workflow_base_path}/phase2a-dialogue/workflow.yaml"
phase2b_workflow: "{workflow_base_path}/phase2b-planning/workflow.yaml"
phase2c_workflow: "{workflow_base_path}/phase2c-experiment-design/workflow.yaml"
phase3_workflow: "{workflow_base_path}/phase3-implementation-planning/workflow.yaml"
phase4_workflow: "{workflow_base_path}/phase4-coding/workflow.yaml"
phase5_workflow: "{workflow_base_path}/phase5-baseline-repo-comparison/workflow.yaml"
phase6_workflow: "{workflow_base_path}/phase6-paper-writing/workflow.yaml"
phase65_workflow: "{workflow_base_path}/phase65-adversarial-review/workflow.yaml"
phase651_workflow: "{workflow_base_path}/phase651-overleaf/workflow.yaml"
hypothesis_loop_workflow: "{workflow_base_path}/hypothesis-loop/workflow.yaml"

# Input configuration (user provides research idea file)
input_file: "{{user_input}}" # Research idea file path

# Output configuration
outputs:
  # ============== Fixed Pipeline Outputs ==============
  brainstorm: "{research_folder}/00_brainstorm_session.md"
  research: "{research_folder}/01_targeted_research.md"
  discussion_log: "{research_folder}/discussion_log.md"
  refinement: "{research_folder}/03_refinement.yaml"
  synthesis: "{research_folder}/02_synthesis.yaml"
  final_opinions: "{research_folder}/01_round_table/final_opinions.yaml"
  plan: "{research_folder}/02b_verification_plan.md"
  state: "{verification_state_file}"
  paper: "{research_folder}/paper/06_paper.md"
  paper_final: "{research_folder}/paper/06_paper_final.md"
  review_summary: "{research_folder}/paper/review/065_review_summary.md"
  overleaf_pdf: "{research_folder}/paper/overleaf/main.pdf"

  # ============== Dynamic Per-Hypothesis Outputs ==============
  # Pattern: {research_folder}/{hypothesis_id}/ (e.g., h-e1, h-m1, h-e2)
  hypothesis_folder_pattern: "{research_folder}/{hypothesis_id}"

  # Phase 2C outputs (per hypothesis)
  experiment_brief: "{hypothesis_folder}/02c_experiment_brief.md"

  # Phase 3 outputs (per hypothesis)
  prd: "{hypothesis_folder}/03_prd.md"
  architecture: "{hypothesis_folder}/03_architecture.md"
  logic: "{hypothesis_folder}/03_logic.md"
  config: "{hypothesis_folder}/03_config.md"
  tasks: "{hypothesis_folder}/03_tasks.yaml"

  # Phase 4 outputs (per hypothesis)
  validation_report: "{hypothesis_folder}/04_validation.md"
  experiment_results: "{hypothesis_folder}/experiment_results.json"
  code_folder: "{hypothesis_folder}/code/"
  figures_folder: "{hypothesis_folder}/figures/"
  # Checkpoint files (active during execution, archived on completion)
  checkpoint_pattern: "{hypothesis_folder}/04_checkpoint.yaml"
  checkpoint_archived_pattern: "{hypothesis_folder}/04_checkpoint_archived_*.yaml"

  # Phase 5 outputs (per hypothesis, for FOUNDATION hypothesis only)
  baseline_comparison: "{hypothesis_folder}/baseline_comparison/05_baseline_comparison.md"
  baseline_checkpoint: "{hypothesis_folder}/baseline_comparison/05_baseline_checkpoint.yaml"

standalone: true

# Execution Mode Configuration
execution_mode:
  default: "unattended" # Full automatic mode
  skip_confirmations: true
  auto_select_feasible: true # Automatically select first FEASIBLE hypothesis
  auto_resume: true # Auto-detect and resume from last completed phase

# ============================================================================
# PIPELINE POSITION & CONNECTIONS (DOCUMENTATION ONLY)
# ============================================================================
# ⚠️ IMPORTANT: This structure is for DOCUMENTATION/FLOW VISUALIZATION only.
# DO NOT use this for Archon Task creation!
#
# Actual Archon Task definitions are in:
# workflows/helpers/archon_pipeline_creation.md → PIPELINE_PHASE_TASKS (11 tasks)
#
# The "Hypothesis Loop" below is a GROUPING LABEL for documentation purposes.
# In Archon, Phase 2C, 3, 4, 5 are INDIVIDUAL tasks, not grouped under "Hypothesis Loop".
# ============================================================================

pipeline:
  position: "Full Pipeline"
  sequence: "**Phase 0** → Phase 1 → Phase 2A-Dialogue → Phase 2B → (Phase 2C → Phase 3 → Phase 4) × N → Phase 4.5 → [Phase 5] → Phase 6 → Phase 6.5 → Phase 6.5.1"

  # NOTE: This phases list is for DOCUMENTATION. See archon_pipeline_creation.md for actual tasks.
  # Each phase below maps to ONE Archon Task (total: 11 phases = 11 tasks)
  phases:
    - name: "Phase 0"
      workflow: "{phase0_workflow}"
      output: "{outputs:brainstorm}"
      description: "Research question brainstorming"

    - name: "Phase 1"
      workflow: "{phase1_workflow}"
      output: "{outputs:research}"
      description: "Targeted research gathering"

    - name: "Phase 2A-Dialogue"
      workflow: "{phase2a_workflow}"
      output: "{outputs:dialogue}, {outputs:refinement}"
      description: "Hypothesis generation (4-Perspective Round Table + Variable Inference + H0 Generation)"

    - name: "Phase 2B"
      workflow: "{phase2b_workflow}"
      output: "{outputs:plan}"
      description: "Verification planning"

    # ========== HYPOTHESIS LOOP PHASES (Individual Tasks) ==========
    # Phase 5 is invoked SEPARATELY by Step 8 after hypothesis-loop completes
    # In Archon: Each is a SEPARATE task, NOT grouped under "Hypothesis Loop"
    # ================================================================

    - name: "Phase 2C"
      workflow: "{phase2c_workflow}"
      description: "Experiment design for current hypothesis"
      loop_note: "Runs for each READY hypothesis in verification_state.yaml"

    - name: "Phase 3"
      workflow: "{phase3_workflow}"
      description: "Implementation planning (PRD, Architecture, PRP)"
      loop_note: "Runs for each READY hypothesis in verification_state.yaml"

    - name: "Phase 4"
      workflow: "{phase4_workflow}"
      description: "Coding and validation (MUST_WORK gate)"
      loop_note: "Runs for each READY hypothesis in verification_state.yaml"

    - name: "Phase 5"
      workflow: "{phase5_workflow}"
      description: "Baseline comparison (DETERMINES_SUCCESS gate) — OPTIONAL: skipped when pipeline_options.skip_baseline_comparison=true"
      invocation_note: ": Invoked by Step 7 AFTER hypothesis-loop completes (not inside loop). Skipped entirely when skip_baseline_comparison=true."

    # ========== POST-VALIDATION PHASES ==========

    - name: "Phase 6"
      workflow: "{workflow_base_path}/phase6-paper-writing/workflow.yaml"
      description: "Academic paper generation (ICML format)"

    - name: "Phase 6.5"
      workflow: "{workflow_base_path}/phase65-adversarial-review/workflow.yaml"
      description: "Multi-round adversarial review"

    - name: "Phase 6.5.1"
      workflow: "{phase651_workflow}"
      description: "Overleaf LaTeX + PDF generation with automatic figure insertion"

# MCP Server Requirements
mcp_servers:
  required:
    - name: "Archon"
      purpose: "Pipeline project creation, task tracking, knowledge base"
      mandatory: true
    - name: "Serena"
      purpose: "Code analysis, memory for session state"
      mandatory: true
    - name: "Semantic Scholar"
      purpose: "Academic paper search (Phase 1)"
      mandatory: true
    - name: "Exa"
      purpose: "Web search, GitHub code search"
      mandatory: true
    - name: "ClearThought"
      purpose: "Advanced reasoning tools"
      mandatory: false

  validation: "Archon, Serena, Semantic Scholar, Exa MUST be available."

# Research Constraints (CRITICAL)
research_constraints:
  must_avoid:
    - "Ideas requiring humans to manually generate/label data"
    - "Ideas depending on external LLM APIs (OpenAI, Anthropic API calls)"
    - "Ideas requiring proprietary datasets not freely available"
  prefer:
    - "Ideas validatable with existing datasets (Defects4J, etc.)"
    - "Synthetic data generation approaches"
    - "Self-contained experiments without external services"

# Error Handling
error_handling:
  phase_failure:
    action: "attempt_recovery"
    max_retries: 1
    on_final_failure: "STOP"

  must_pass_failure:
    action: "STOP"
    report: true

  should_pass_failure:
    action: "CONTINUE"
    record_limitation: true

# Quality Validation & Resume Detection
quality_criteria:
  phase0_complete:
    check: "00_brainstorm_session.md exists with <phase1-input> section"
    fail_action: "Re-run Phase 0"
    resume_to: "Phase 1"

  phase1_complete:
    check: "01_targeted_research.md and 01_targeted_research_full.md exist"
    fail_action: "Re-run Phase 1"
    resume_to: "Phase 2A-Dialogue"

  phase2a_complete:
    check: "03_refinement.yaml exists with phase2b_readiness.status == READY"
    fail_action: "Re-run Phase 2A-Dialogue"
    resume_to: "Phase 2B"

  phase2b_complete:
    check: "02b_verification_plan.md and verification_state.yaml exist"
    fail_action: "Re-run Phase 2B"
    resume_to: "Hypothesis Loop"

  hypothesis_loop_complete:
    check: "All hypotheses processed according to verification_state.yaml"
    fail_action: "Resume from last READY hypothesis"
    resume_to: "Final Summary"

  phase5_complete:
    check: "baseline_comparison/05_baseline_comparison.md exists for processed hypotheses, OR baseline_comparison.status == SKIPPED (when skip_baseline_comparison=true)"
    fail_action: "Resume Phase 5 for incomplete hypothesis (unless skipped by config)"
    resume_to: "Hypothesis Loop"

# Resume Detection Rules
resume_detection:
  enabled: true
  priority_order: # Check in this order (latest first)
    - check: "verification_state.yaml with workflow.status == ACTIVE and current_phase == Phase 6.5.1"
      resume_to: "Step 10 (Phase 6.5.1)"
    - check: "verification_state.yaml with workflow.status == ACTIVE and current_phase == Phase 6.5"
      resume_to: "Step 9 (Phase 6.5)"
    - check: "verification_state.yaml with workflow.status == ACTIVE and current_phase == Phase 6"
      resume_to: "Step 8 (Phase 6)"
    - check: "verification_state.yaml with workflow.status == ACTIVE and current_phase == Phase 5"
      resume_to: "Step 7 (Phase 5)"
    - check: "verification_state.yaml with workflow.status == ACTIVE and current_phase == Phase 5 Skipped"
      resume_to: "Step 8 (Phase 6)"
    - check: "verification_state.yaml with workflow.status == ACTIVE and current_phase == Hypothesis Loop Complete"
      resume_to: "Step 7 (Phase 5)"
    - check: "verification_state.yaml with workflow.status == ACTIVE and current_phase in [Phase 2C, Phase 3, Phase 4]"
      resume_to: "Step 6 (Hypothesis Loop)"
    - check: "verification_state.yaml with workflow.status == ACTIVE"
      resume_to: "Step 6 or Step 5 based on current_phase"
    - check: "03_refinement.yaml exists with phase2b_readiness.status == READY"
      resume_to: "Step 5 (Phase 2B)"
    - check: "01_targeted_research.md exists"
      resume_to: "Step 3 (Phase 2A-Dialogue)"
    - check: "00_brainstorm_session.md exists"
      resume_to: "Step 2 (Phase 1)"
    - check: "No output files"
      resume_to: "Step 1 (Phase 0)"
