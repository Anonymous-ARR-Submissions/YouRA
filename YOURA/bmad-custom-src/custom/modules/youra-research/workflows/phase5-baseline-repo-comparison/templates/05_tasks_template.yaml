# Phase 5 Baseline Adaptation Tasks Template (Mode B)
# This file contains algorithm injection tasks for baseline comparison
# Generated by step-06-adapt.md
# Mode B:
# - Changed from 7 tasks to 4 tasks per baseline
# - REMOVED: config-override, data-adapter, model-adapter tasks
# - ADDED: algorithm-injection task
# - Mode B principle: USE baseline's model/dataset/config, ONLY inject our algorithm



# ═══════════════════════════════════════════════════════════════════════════════
# METADATA
# ═══════════════════════════════════════════════════════════════════════════════
metadata:
  hypothesis_id: "{{hypothesis_id}}" # e.g., "h-m1"
  main_hypothesis_id: "{{main_hypothesis_id}}" # e.g., "h-main"
  generated_at: "{{timestamp}}"
  baselines_count: "{{baselines_count}}"
  mode: "B" # Mode B: Inject OUR algorithm into BASELINE's environment
  mode_description: "Inject OUR algorithm into BASELINE's environment (model, dataset, config)"
  total_tasks: 0 # 4 × baselines_proceeding

  # Source context for algorithm injection
  source_context:
    phase4_code_folder: "{{hypothesis_folder}}/code"
    code_analysis_file: "{{baseline_folder}}/code_analysis.md"
    checkpoint_file: "{{baseline_folder}}/05_baseline_checkpoint.yaml"

# ═══════════════════════════════════════════════════════════════════════════════
# BASELINES
# Tasks organized by baseline (only PROCEED baselines have tasks)
# ═══════════════════════════════════════════════════════════════════════════════
baselines: []
  # Each baseline entry (generated in Step 6):
  # - repo_name: "baseline-repo-name"
  # repo_url: "https://github.com/owner/repo"
  # rank: 1 # 1, 2, or 3
  # status: "PROCEED" # PROCEED or SKIP
  # clone_path: "{baseline_folder}/baselines/baseline-repo-name"
  # conda_env: "baseline-{repo_name}"
  #
  # # Mode B: Baseline's environment (what we USE as-is)
  # baseline_environment:
  # model: "{model_architecture}" # Baseline's model we use
  # dataset: "{dataset_name}" # Baseline's dataset we use
  # config: "LR={lr}, Epochs={epochs}" # Baseline's config we use
  #
  # # Mode B: Algorithm injection analysis
  # injection_analysis:
  # optimizer_location:
  # file: "{file_path}"
  # line: {line_number}
  # current_optimizer: "{optimizer_class}"
  # interface: "standard|custom|wrapped"
  # backward_location:
  # file: "{file_path}"
  # line: {line_number}
  # injection_strategy: "replacement|wrapper|hook"
  # injection_complexity: "simple|moderate|complex"
  #
  # tasks: [] # 4 tasks for this baseline (Mode B)

# ═══════════════════════════════════════════════════════════════════════════════
# TASK SCHEMA
# Each task within baselines[i].tasks follows this structure:
# ═══════════════════════════════════════════════════════════════════════════════
#
# - id: "B1-algorithm-injection" # Unique ID: B{rank}-{task_type}
# type: "algorithm-injection" # Task type (see TASK TYPES below)
# title: "Algorithm Injection for baseline" # Display title
# description: | # Multi-line description
# Inject our optimizer/algorithm into baseline's training loop.
# Replace/wrap baseline's optimizer with ours.
# priority: 100 # 1-100, higher = more urgent
# status: "pending" # pending | doing | review | done | skipped
# retry_count: 0 # Current retry attempts
# max_retries: 3 # Maximum retry attempts
#
# # Mode B: Injection point (from Step 6 analysis)
# injection_point:
# file: "{file_path}"
# line: {line_number}
# current_code: "{current_optimizer_creation}"
# injection_strategy: "replacement|wrapper|hook"
#
# # Output paths
# output_file: "{adaptations_folder}/algorithm_injection.py"
# test_file: "{adaptations_folder}/tests/test_algorithm_injection.py"
#
# # Reference files
# reference_files:
# our_algorithm: "{{hypothesis_folder}}/code/..." # Our algorithm implementation
# injection_guide: "{{workflow_path}}/_references/algorithm-injection.md"
# baseline_analysis: "{{baseline_folder}}/code_analysis.md#injection-point"
#
# # Validation result (filled by step-08)
# validation:
# static_passed: null
# runtime_passed: null
# error_info: null
# validated_at: null

# ═══════════════════════════════════════════════════════════════════════════════
# TASK TYPES (4 per baseline - Mode B)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Priority order (higher = execute first):
#
# 1. algorithm-injection (priority: 100)
# - Inject OUR optimizer/algorithm into baseline's training loop
# - Replace or wrap baseline's optimizer with ours
# - Reference: _references/algorithm-injection.md
# - Output: algorithm_injection.py (OurOptimizer class)
#
# 2. metric-injection (priority: 95)
# - Add psi computation and metric tracking
# - Does NOT affect training, only measures our algorithm's behavior
# - Reference: _references/adapter-metrics.md
# - Output: metrics.py (compute_psi, MetricTracker)
#
# 3. results-saver (priority: 90)
# - Save results in standardized comparison format
# - Enables fair comparison between baseline and our algorithm
# - Reference: _references/adapter-results.md
# - Output: results_saver.py (ResultsSaver class)
#
# 4. training-script (priority: 85)
# - MINIMAL modification to baseline's train.py
# - Add --method argument (baseline vs ours)
# - Add imports for algorithm_injection, metrics, results_saver
# - DO NOT modify: data loading, model creation, hyperparameters
# - Reference: _references/adapter-training-script.md
# - Output: Modified train.py

# ═══════════════════════════════════════════════════════════════════════════════
# BUDGET SUMMARY
# ═══════════════════════════════════════════════════════════════════════════════
budget_summary:
  baselines_proceeding: 0 # Count of baselines with status=PROCEED
  tasks_per_baseline: 4 # Fixed: 4 task types (Mode B)
  total_tasks: 0 # baselines_proceeding × 4

  # Per-type counts (across all baselines)
  by_type:
    algorithm-injection: 0
    metric-injection: 0
    results-saver: 0
    training-script: 0

  # Status counts (updated during execution)
  by_status:
    pending: 0
    doing: 0
    review: 0
    done: 0
    skipped: 0

# ═══════════════════════════════════════════════════════════════════════════════
# CODER-VALIDATOR CYCLE TRACKING
# ═══════════════════════════════════════════════════════════════════════════════
coder_validator:
  current_cycle: 0
  max_cycles: 3
  cycle_history: []
  # Each cycle entry:
  # - cycle: 1
  # started_at: "timestamp"
  # completed_at: "timestamp"
  # tasks_processed: 5
  # tasks_passed: 4
  # tasks_failed: 1

# ═══════════════════════════════════════════════════════════════════════════════
# USAGE NOTES (Mode B)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Generation (Phase 5 step-06):
# 1. Read checkpoint for selected baselines (status=PROCEED)
# 2. Generate 4 tasks per PROCEED baseline (Mode B)
# 3. Fill injection_point from step-06 analysis
# 4. Set all tasks to status "pending"
# 5. Calculate budget_summary
#
# Consumption (Phase 5 step-07):
# 1. Read this file to get task list
# 2. For each baseline with tasks:
# a. Get pending tasks sorted by priority (descending)
# b. Process each task: pending → doing → review
# c. Search Archon KB before generating code
# d. Write code file and test file
# e. Update task status to "review"
# 3. Update coder_validator cycle tracking
# 4. Save file after each task update
#
# Validation (Phase 5 step-08):
# 1. Read this file to get tasks in "review" status
# 2. For each review task:
# a. Run static analysis (pyright/mypy)
# b. Run tests (pytest)
# c. Update task.validation fields
# d. If passed: status → "done"
# e. If failed: status → "pending", increment retry_count
# 3. If all done: proceed to step-09
# 4. If pending tasks remain and cycle < max: return to step-07
#
# Mode B Fair Comparison Principle:
# - We USE baseline's model as-is (NO model-adapter!)
# - We USE baseline's dataset as-is (NO data-adapter!)
# - We USE baseline's config as-is (NO config-override!)
# - We ONLY inject our algorithm/optimizer
# - This ensures we compare ALGORITHMS on baseline's turf
#
