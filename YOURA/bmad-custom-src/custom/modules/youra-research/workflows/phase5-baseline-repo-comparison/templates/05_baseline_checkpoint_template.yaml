# ============================================================================
# USAGE NOTES (Mode B)
# ============================================================================
#
# Mode B Principle:
# - We inject OUR ALGORITHM into BASELINE's ENVIRONMENT
# - Each baseline uses THEIR OWN model, dataset, and config
# - The ONLY difference is the algorithm/optimizer being compared
# - This is "baseline's home turf" - strong evidence if we still win
#
# Multi-Baseline Support:
# - selection.baselines is an array of 3 baseline objects
# - Each baseline has its own baseline_environment (model, dataset, config)
# - Each baseline has injection_analysis (where to inject our algorithm)
# - Baselines with injection_feasibility < 30% are marked status="SKIP"
# - Minimum 1 baseline required to proceed
#
# Gate Criteria (Mode B):
# - Must beat ≥2/3 baselines (at least 2 of 3)
# - "Beat" means: our algorithm outperforms baseline's algorithm
# - On BASELINE's OWN environment (their model, their data, their config)
# - Example PASS: Beat 2/3 baselines
# - Example PASS: Beat 3/3 baselines
# - Example PARTIAL: Beat 1/3 baselines
#
# Total Runs: 6 = 3 baselines × 2 methods × 1 seed
# - For each baseline: run with baseline's algorithm, run with our algorithm
# - Both runs use the SAME model, dataset, config (baseline's)
# - Only the optimizer/algorithm differs
#
