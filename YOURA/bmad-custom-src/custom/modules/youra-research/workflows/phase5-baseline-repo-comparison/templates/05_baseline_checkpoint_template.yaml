# Phase 5: Baseline Comparison Checkpoint Template (Mode B)
# This file tracks the state of the baseline comparison workflow
# Mode B:
# - Mode B: Inject OUR algorithm into BASELINE's environment
# - Removed dataset_selection (we use baseline's dataset)
# - Added baseline_environment to each baseline entry
# - Added injection_analysis to each baseline entry
# - Changed total_runs: 6 = 3 baselines × 2 methods × 1 seed
# - Updated gate criteria for Mode B comparison
# - Updated comparison structure (baseline_repo/method columns)
#
# - Adaptation tasks use local 05_tasks.yaml
# - archon_project_id now only used for Hypothesis-level status updates
# - Generated by Step 6, consumed by Step 7/8
# - Matches Phase 4's local task management pattern
#
# Placeholder Syntax: {{variable_name}} (consistent with Phase 4)

version: "4.0"
hypothesis_id: "{{hypothesis_id}}"
main_hypothesis_id: "{{main_hypothesis_id}}"
created_at: "{{timestamp}}"
updated_at: "{{timestamp}}"
current_step: 1
status: "IN_PROGRESS" # IN_PROGRESS | COMPLETED | FAILED
completed_at: null # Timestamp when workflow completed (root level shortcut)
gate_result: null # PASS | PARTIAL (root level shortcut for baseline_gate.result)

# Mode B Configuration
mode: "B"
mode_description: "Inject OUR algorithm into BASELINE's environment (model, dataset, config)"

# Multi-Baseline Configuration (Mode B)
baselines_count: "{{config_experiment_baselines}}"
methods_per_baseline: "{{config_experiment_methods_per_baseline}}" # baseline_original vs ours_injected
total_runs: "{{config_experiment_total_runs}}" # 3 baselines × 2 methods × 1 seed

# Workflow Config (Single Source of Truth: workflow.yaml → step-01-init → checkpoint)
workflow_config:
  comparison:
    max_candidates: "{{config_comparison_max_candidates}}"
    baselines_to_select: "{{config_comparison_baselines_to_select}}"
    min_baselines_required: "{{config_comparison_min_baselines_required}}"
    min_stars: "{{config_comparison_min_stars}}"
    recent_activity_months: "{{config_comparison_recent_activity_months}}"
    dataset_overlap_weight: "{{config_comparison_dataset_overlap_weight}}"
  experiment:
    seeds: "{{config_experiment_seeds}}"
    baselines: "{{config_experiment_baselines}}"
    methods_per_baseline: "{{config_experiment_methods_per_baseline}}"
    total_runs: "{{config_experiment_total_runs}}"
  gate:
    baseline_win_threshold: "{{config_gate_baseline_win_threshold}}"
    min_baselines_to_beat: "{{config_gate_min_baselines_to_beat}}"
  adaptation:
    max_retries: "{{config_adaptation_max_retries}}"
    max_coder_validator_cycles: "{{config_adaptation_max_coder_validator_cycles}}"
  experiment_retries:
    max_retries: "{{config_experiment_max_retries}}"

# Phase 4 context (input from hypothesis)
