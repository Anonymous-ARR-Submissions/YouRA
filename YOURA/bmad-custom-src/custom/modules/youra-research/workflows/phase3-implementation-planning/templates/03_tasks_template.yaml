# Phase 3 Implementation Tasks Template
# This file contains all implementation tasks extracted from Phase 3 documents
# Generated by step-09-finalize.md
version: "1.1"

# ═══════════════════════════════════════════════════════════════════════════════
# METADATA
# ═══════════════════════════════════════════════════════════════════════════════
metadata:
  hypothesis_id: "{hypothesis_id}" # e.g., "h-e1", "h-m1"
  hypothesis_id_upper: "{HYPOTHESIS_ID}" # e.g., "H-E1", "H-M1" (for display)
  tier: "{tier}" # LIGHT (15 tasks) or FULL (30 tasks)
  total_budget: 0 # Max tasks allowed for this tier
  generated_at: "{ISO8601}" # When this file was created

  # Source documents parsed to extract tasks
  source_documents:
    - "03_prd.md"
    - "03_architecture.md"
    - "03_logic.md"
    - "03_config.md"

  # Budget rebalancing (from Step 6)
  budget_rebalancing:
    applied: false # Whether exclusions were applied
    excluded_count: 0 # Number of subtasks excluded
    excluded_ids: [] # IDs of excluded subtasks

# ═══════════════════════════════════════════════════════════════════════════════
# TASKS
# All implementation tasks in priority order (highest first)
# ═══════════════════════════════════════════════════════════════════════════════
tasks: []
  # Each task entry:
  # - id: "task-001" # Unique ID within this file
  # epic: "Data Pipeline" # Parent epic name (from architecture)
  # title: "Download TGB dataset" # Task title
  # description: | # Multi-line description
  # Download from GitHub repository...
  # Place in: ./data/tgb/
  # feature_tag: "data-preparation" # Category: data-preparation, setup, model, training, etc.
  # priority: 100 # 1-100, higher = more urgent
  # source_document: "03_prd.md" # Which document this task came from
  # complexity: null # Complexity score (if available from Step 4/6)
  # test_requirements: | # Test requirements (for implementation tasks)
  # - Create tests/test_{module}.py
  # - Minimum 3 test methods with REAL assertions
  #
  # # Phase 3 Document References
  # # Enables Phase 4 Coder to locate exact sections for implementation context
  # reference_files:
  # architecture: null # "03_architecture.md#Epic-E1" - Epic definition & file targets
  # logic: null # "03_logic.md#PMLP_API" - API signatures & pseudo-code
  # config: null # "03_config.md#model_config" - Hyperparameters & defaults

# ═══════════════════════════════════════════════════════════════════════════════
# BUDGET SUMMARY
# Task counts by category
# ═══════════════════════════════════════════════════════════════════════════════
budget_summary:
  data_preparation: 0 # Data download/setup tasks (from PRD Section 4)
  environment_setup: 0 # Environment/dependency tasks (from PRD Section 7)
  epic_tasks: 0 # Epic implementation tasks (from Architecture)
  subtasks: 0 # Subtasks for high-complexity modules (from Logic/Config)
  failsafe: 1 # Pipeline continuation checkpoint task (always 1)
  total: 0 # Sum of all tasks (must be <= total_budget)

# ═══════════════════════════════════════════════════════════════════════════════
# USAGE NOTES
# ═══════════════════════════════════════════════════════════════════════════════
#
# Generation (Phase 3 step-09):
# 1. Parse all 4 source documents for tasks
# 2. Apply budget rebalancing exclusions (if any from Step 6)
# 3. Assign priorities (data prep: 100-95, setup: 94, epics: 93-50, subtasks: 49-1)
# 4. Generate this file instead of creating Archon tasks
# 5. Validate total <= total_budget
#
# Consumption (Phase 4 step-01):
# 1. Read this file to get task list
# 2. Initialize 04_checkpoint.yaml with tasks.items[] from this file
# 3. Set all tasks to status "todo"
# 4. Update Hypothesis Task in Archon to "doing" (single MCP call)
#
# Priority Order:
# 100-95: Data preparation tasks (download datasets)
# 94: Environment setup (install packages)
# 93-50: Epic implementation tasks (main modules)
# 49-2: Subtasks (for high-complexity modules)
# 1: Pipeline continuation checkpoint (failsafe)
#
# Feature Tags:
# - data-preparation: Dataset download/setup
# - setup: Environment, dependencies
# - data-pipeline: Data loading, preprocessing
# - model: Model architecture implementation
# - training: Training loop, optimization
# - evaluation: Metrics, validation
# - experiment: Experiment runner, logging
# - pipeline-continue: Failsafe continuation
#
# Reference Files:
# Each task can have reference_files pointing to Phase 3 document sections:
# - architecture: Epic definition with file targets and dependencies
# - logic: API signatures, pseudo-code, tensor shapes
# - config: Hyperparameters, default values, constraints
#
# Format: "filename.md#section-anchor"
# Example: "03_architecture.md#Epic-E1-DataLoader"
#
# Phase 4 Coder MUST read these references before implementing each task.
# This ensures implementation follows Phase 3 design specifications.
#
