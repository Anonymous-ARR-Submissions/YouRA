# Phase 3: Implementation Planning Workflow (Orchestration)
name: phase3-implementation-planning
description: "Orchestrate PRD/Architecture/Logic/Config generation via Multi-Agent system"
author: "Anonymous"
# Configuration Sources
config_source: "{project-root}/bmad-custom-src/custom/modules/youra-research/module.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
date: system-generated

# YouRA Module Variables
research_output_path: "{config_source}:research_output_path"
research_folder: "{research_output_path}/youra_research"
verification_state_file: "{research_folder}/verification_state.yaml"

# BMAD v6 Config
bmad_config: "{project-root}/_bmad/bmm/config.yaml"
bmad_project_name: "{bmad_config}:project_name"
bmad_output_folder: "{bmad_config}:output_folder"

# Module Paths
installed_path: "{project-root}/bmad-custom-src/custom/modules/youra-research/workflows/phase3-implementation-planning"
validation: "{installed_path}/checklist.md"
steps_path: "{installed_path}/steps"
first_step: "{installed_path}/steps/step-01-initialize.md"

# Hypothesis Configuration
hypothesis_id: "{{user_input}}"
hypothesis_id_lower: "{{hypothesis_id|lower}}"
base_hypothesis: "auto-detect"
base_hypothesis_lower: "{{base_hypothesis|lower}}"

# Input/Output Paths
phase2c_experiment_brief: "{research_folder}/{{hypothesis_id_lower}}/02c_experiment_brief.md"
hypothesis_folder: "{research_folder}/{{hypothesis_id_lower}}"
outputs:
  prd_file: "{hypothesis_folder}/03_prd.md"
  architecture_file: "{hypothesis_folder}/03_architecture.md"
  logic_file: "{hypothesis_folder}/03_logic.md"
  config_file: "{hypothesis_folder}/03_config.md"

# Multi-Agent Configuration
agents:
  definition_path: "{project-root}/.claude/agents/phase3-design"
  architecture_agent:
    definition: "{agents:definition_path}/architecture-agent.md"
    output: "{outputs:architecture_file}"
  logic_agent:
    definition: "{agents:definition_path}/logic-agent.md"
    output: "{outputs:logic_file}"
  config_agent:
    definition: "{agents:definition_path}/configuration-agent.md"
    output: "{outputs:config_file}"

# Task Constraints (2-Tier System)
task_constraints:
  budget_by_hypothesis_type:
    EXISTENCE:
      tier: "LIGHT"
      total_max: 15
      epic_range: [4, 8]
    MECHANISM:
      tier: "FULL"
      total_max: 30
      epic_range: [6, 12]
    COMPARISON:
      tier: "FULL"
      total_max: 30
      epic_range: [6, 12]
  default:
    tier: "FULL"
    total_max: 30
    epic_range: [6, 12]
  complexity_allocation:
    very_high: [4, 5]
    high: [3, 4]
    medium: [1, 2]
    low: 0

# Base References (incremental hypotheses)
base_hypothesis_folder: "{research_folder}/{{base_hypothesis_lower}}"
base_references:
  prd: "{base_hypothesis_folder}/03_prd.md"
  architecture: "{base_hypothesis_folder}/03_architecture.md"
  logic: "{base_hypothesis_folder}/03_logic.md"
  config: "{base_hypothesis_folder}/03_config.md"
  experiment_brief: "{base_hypothesis_folder}/02c_experiment_brief.md"

# Session Parameters
standalone: false
workflow_type: "orchestration"

# Pipeline Position
pipeline:
  position: "Phase 3"
  sequence: "Phase 0 → 1 → 2A → 2B → (2C → **Phase 3** → 4) × N → 4.5 → [5] → 6 → 6.5 → 6.5.1"

# Sub-Workflows
sub_workflows:
  prd_workflow:
    name: "BMAD v6 PRD Workflow"
    command: "/bmad:bmm:workflows:prd"
    output_file: "{outputs:prd_file}"
  architecture_workflow:
    name: "BMAD v6 Architecture Workflow"
    command: "/bmad:bmm:workflows:architecture"
    output_file: "{outputs:architecture_file}"

# MCP Requirements
mcp_servers:
  required:
    - name: "Archon"
      mandatory: true
    - name: "Serena"
      mandatory: true

# Execution Steps (see workflow.md for full details)
execution_steps:
  step_1:
    file: "{steps_path}/step-01-initialize.md"
    name: "Initialize and Validate"
  step_2:
    file: "{steps_path}/step-02-prd.md"
    name: "Invoke PRD Workflow"
  step_3:
    file: "{steps_path}/step-03-architecture-agent.md"
    name: "Spawn Architecture Agent"
  step_4:
    file: "{steps_path}/step-04-budget-allocation.md"
    name: "Budget Allocation"
  step_5:
    file: "{steps_path}/step-05-parallel-agents.md"
    name: "Spawn Logic + Config Agents (Parallel)"
  step_6:
    file: "{steps_path}/step-06-complexity-assessment.md"
    name: "Overall Complexity Assessment"
  step_7:
    file: "{steps_path}/step-07-verify-documents.md"
    name: "Verify Documents"
  step_8:
    file: "{steps_path}/step-08-archon-project.md"
    name: "Upload to Pipeline Project"
  step_9:
    file: "{steps_path}/step-09-generate-tasks.md"
    name: "Generate Tasks File"
  step_10:
    file: "{steps_path}/step-10-validation.md"
    name: "Validation and Summary"

# Quality Criteria (see checklist.md for full validation rules)
quality_criteria:
  prd_complete: "PRD exists with required sections"
  architecture_complete: "Architecture with Epic tasks + complexity scores"
  logic_complete: "Logic with API signatures + tensor shapes"
  config_complete: "Config with YAML schemas + dataclasses"
  task_budget_compliance: "LIGHT≤15, FULL≤30"
  archon_project_created: "5 documents uploaded"

# Output Summary
output_summary:
  files_created:
    - "{{hypothesis_id_lower}}/03_prd.md"
    - "{{hypothesis_id_lower}}/03_architecture.md"
    - "{{hypothesis_id_lower}}/03_logic.md"
    - "{{hypothesis_id_lower}}/03_config.md"
  archon_artifacts:
    - "Documents: 5"
    - "Tasks: ≤{{task_budget_total_max}}"
