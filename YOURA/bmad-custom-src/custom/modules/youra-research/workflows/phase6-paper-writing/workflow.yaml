# Phase 6: Paper Writing Workflow
# Anonymous Research Pipeline
#
# Purpose: Generate ICML-format academic paper from Phase 0-5 artifacts
# Principle: "Narrative-first approach: Design story BEFORE writing sections"
name: "phase6-paper-writing"
description: "Generate ICML-format academic paper using narrative-first approach"

# ============================================================================
# PATH VARIABLES (evaluated at runtime)
# ============================================================================

variables:
  # Base paths (injected from pipeline)
  project_root: "${PROJECT_ROOT}"
  research_folder: "${RESEARCH_FOLDER}"

  # Workflow paths
  workflow_path: "{project_root}/bmad-custom-src/custom/modules/youra-research/workflows/phase6-paper-writing"

  # Input files (from Phase 0-5)
  phase0_brainstorm: "{research_folder}/00_brainstorm_session.md"
  phase1_research: "{research_folder}/01_targeted_research.md"
  phase1_research_full: "{research_folder}/01_targeted_research_full.md"
  phase2a_dialogue: "{research_folder}/03_refinement.yaml"
  phase2a_synthesis: "{research_folder}/02_synthesis.yaml"
  phase2b_plan: "{research_folder}/02b_verification_plan.md"
  verification_state: "{research_folder}/verification_state.yaml"

  # Phase 4.5: Validated hypothesis synthesis
  phase45_synthesis: "{research_folder}/045_validated_hypothesis.md"

  # Per-hypothesis artifacts (pattern)
  hypothesis_folder_pattern: "{research_folder}/{hypothesis_id_lower}"
  phase2c_brief_pattern: "{hypothesis_folder}/02c_experiment_brief.md"
  phase3_prd_pattern: "{hypothesis_folder}/03_prd.md"
  phase3_architecture_pattern: "{hypothesis_folder}/03_architecture.md"
  phase4_validation_pattern: "{hypothesis_folder}/04_validation.md"
  phase5_baseline_pattern: "{hypothesis_folder}/baseline_comparison/05_baseline_comparison.md"

  # Figure sources (from Phase 4 & 5)
  phase4_figures_pattern: "{hypothesis_folder}/code/outputs/figures/"
  phase5_figures_pattern: "{hypothesis_folder}/baseline_comparison/reports/"

  # Output folders
  output_folder: "{research_folder}/paper"
  sections_folder: "{output_folder}/sections"
  figures_folder: "{output_folder}/figures"

  # Section files (individual generation - context isolation)
  section_abstract: "{sections_folder}/00_abstract.md"
  section_introduction: "{sections_folder}/01_introduction.md"
  section_related_work: "{sections_folder}/02_related_work.md"
  section_methodology: "{sections_folder}/03_methodology.md"
  section_experiments: "{sections_folder}/04_experiments.md"
  section_results: "{sections_folder}/05_results.md"
  section_discussion: "{sections_folder}/06_discussion.md"
  section_conclusion: "{sections_folder}/07_conclusion.md"

  # Narrative design output
  narrative_blueprint: "{output_folder}/06_narrative_blueprint.yaml"

  # Final output files (Markdown)
  paper_file: "{output_folder}/06_paper.md"
  references_file: "{output_folder}/06_references.bib"
  checkpoint_file: "{output_folder}/06_paper_checkpoint.yaml"

  # Ground truth for adversarial review (Phase 6.5)
  ground_truth_file: "{output_folder}/065_ground_truth.yaml"

# ============================================================================
# WORKFLOW CONFIGURATION
# ============================================================================

config:
  # Execution mode
  unattended_mode: true
  user_approval_required: [] # Full auto in UNATTENDED mode

  # Execution pattern: Story Group Architecture
  execution:
    pattern: "story_group_architecture"
    description: "Narrative-first: Design story, then generate sections in coherent groups"

    # Main Session responsibilities
    main_session:
      - step: "step-01"
        reason: "Initialize folders, collect figures"
      - step: "step-02"
        reason: "Narrative design requires broad context from all Phase 0-5 artifacts"
      - step: "step-07"
        reason: "Full context required for coherence check and merge"

    # Story Groups (shared context within group)
    story_groups:
      # Story Group A - Foundation sections with narrative coherence
      group_a:
        name: "Story Group A: Foundation"
        step: "step-03"
        sections: ["introduction", "related_work", "methodology"]
        narrative_role: "Hook → Problem → Insight → Solution preview"
        context_sharing: true # Sections share context within group

      # Story Group B - Evidence sections with results coherence
      group_b:
        name: "Story Group B: Evidence"
        step: "step-04"
        sections: ["experiments", "results", "discussion"]
        narrative_role: "Test design → Evidence → Interpretation"
        context_sharing: true
        depends_on: ["group_a"]

      # Story Group C - Closure with full narrative arc
      group_c:
        name: "Story Group C: Closure"
        step: "step-05"
        sections: ["conclusion", "abstract"]
        narrative_role: "Reinforce message + compress full story"
        context_sharing: true
        depends_on: ["group_a", "group_b"]

    # Final Tasks
    final_tasks:
      - step: "step-06"
        name: "References"
        reason: "Extract and verify citations from all sections"
      - step: "step-07"
        name: "Finalize"
        reason: "Merge all sections with full context awareness"

  # Paper format
  format:
    style: "ICML2025"
    max_main_pages: 8
    abstract_sentences: "4-6"
    heading_levels: 3

  # Section configuration (word targets are guidelines, not strict limits)
  sections:
    - id: "abstract"
      name: "Abstract"
      word_target: "~150" # Guidelines, not strict
      narrative_role: "Compress full story"

    - id: "introduction"
      name: "Introduction"
      word_target: "~800-1000"
      narrative_role: "Hook → Problem → Insight → Preview"
      subsections:
        - "Opening hook (NOT generic 'X is important')"
        - "Problem framing (surface → deeper → gap)"
        - "Key insight preview"
        - "Contributions (as story, not list)"

    - id: "related_work"
      name: "Related Work"
      word_target: "~600-800"
      narrative_role: "Show existing work insufficient → justify our approach"

    - id: "methodology"
      name: "Methodology"
      word_target: "~1000-1200"
      narrative_role: "WHY this design solves the problem"
      subsections:
        - "Connection to key insight"
        - "Method overview"
        - "Key design decisions with rationale"

    - id: "experiments"
      name: "Experimental Setup"
      word_target: "~800-1000"
      narrative_role: "Design experiments that test our specific claims"
      subsections:
        - "Experimental questions"
        - "Datasets (with rationale)"
        - "Baselines (with rationale)"
        - "Evaluation metrics"

    - id: "results"
      name: "Results"
      word_target: "~1000-1200"
      narrative_role: "Present evidence supporting claims"
      subsections:
        - "Main results with interpretation"
        - "Ablation studies"
        - "Analysis"

    - id: "discussion"
      name: "Discussion"
      word_target: "~400-600"
      narrative_role: "Interpret results, acknowledge limits"
      subsections:
        - "Key findings interpretation"
        - "Honest limitations"
        - "Broader impact"

    - id: "conclusion"
      name: "Conclusion"
      word_target: "~300-400"
      narrative_role: "Callback to hook, open future"
      subsections:
        - "Summary"
        - "Future work vision"

# ============================================================================
# INPUT REQUIREMENTS
# ============================================================================

inputs:
  required:
    - file: "{verification_state}"
      description: "Verification state with completed hypotheses"
      check: "file_exists"

    - file: "{phase45_synthesis}"
      description: "Phase 4.5 validated hypothesis synthesis — PRIMARY source for claims, evidence, interpretation"
      check: "file_exists"

    - file: "{phase2a_dialogue}"
      description: "Phase 2A Dialogue hypothesis refinement (original hypothesis for context)"
      check: "file_exists"

    - file: "{phase2b_plan}"
      description: "Verification plan with sub-hypotheses"
      check: "file_exists"

  conditional:
    - file: "{phase5_baseline_pattern}"
      description: "Phase 5 baseline comparison (if exists)"
      condition: "hypothesis.baseline_comparison.status == COMPLETED"

  optional:
    - file: "{phase0_brainstorm}"
      description: "Brainstorm session for context"

    - file: "{phase1_research_full}"
      description: "Full research data for citations"

    - file: "{phase4_validation_pattern}"
      description: "Phase 4 validation report — optional, for Serena code analysis only"
      note: ": Phase 6 primarily reads 045_validated_hypothesis.md instead"

# ============================================================================
# OUTPUT SPECIFICATIONS
# ============================================================================

outputs:
  primary:
    - file: "{paper_file}"
      description: "Complete ICML-format paper (06_paper.md)"
      format: "markdown"

    - file: "{references_file}"
      description: "BibTeX references (06_references.bib)"
      format: "bibtex"

    - file: "{narrative_blueprint}"
      description: "Narrative blueprint for story coherence"
      format: "yaml"

    - file: "{ground_truth_file}"
      description: "Ground truth values for Phase 6.5 adversarial review"
      format: "yaml"

  secondary:
    - file: "{checkpoint_file}"
      description: "Paper generation checkpoint"
      format: "yaml"

  # NOTE: Overleaf generation moved to Phase 6.5.1 (after adversarial review)

# ============================================================================
# MCP SERVER REQUIREMENTS
# ============================================================================

mcp_servers:
  required:
    - name: "semantic_scholar"
      purpose: "Citation verification and paper metadata"
      tools:
        - "paper_relevance_search"
        - "paper_title_search"
        - "paper_details"
        - "paper_citations"
        - "paper_references"

    - name: "serena"
      purpose: "Phase 4/5 code structure analysis for methodology/results"
      tools:
        - "get_symbols_overview"
        - "find_symbol"
        - "search_for_pattern"
        - "list_dir"
        - "find_file"

  recommended:
    - name: "archon"
      purpose: "Knowledge base search for related work"
      tools:
        - "rag_search_knowledge_base"
        - "rag_search_code_examples"

  optional:
    - name: "exa"
      purpose: "Additional web search for recent papers/implementations"
      tools:
        - "web_search_exa"
        - "get_code_context_exa"

    - name: "clearthought"
      purpose: "Complex argumentation structuring"
      tools:
        - "sequentialthinking"
        - "structuredargumentation"

# ============================================================================
# FIGURE HANDLING
# ============================================================================

figures:
  sources:
    phase4:
      path: "{phase4_figures_pattern}"
      types: ["*.png", "*.pdf", "*.svg"]
      usage: "Results, Methodology (architecture diagrams)"

    phase5:
      path: "{phase5_figures_pattern}"
      types: ["*.png", "*.pdf"]
      usage: "Results (comparison plots)"

  output:
    folder: "{figures_folder}"
    naming: "fig_{section}_{number}.{ext}"

  references:
    format: "Figure {number}"
    placement: "top of page, after first reference"

# ============================================================================
# STEP DEFINITIONS
# ============================================================================

# Architecture: Narrative-First with Story Groups
# - Step 02: Design paper narrative BEFORE any section generation
# - Sections grouped by narrative role (Foundation, Evidence, Closure)
# - Shared context within groups for coherence
# - Final merge ensures cross-group consistency

steps:
  # =========================================================================
  # STEP 01: INITIALIZE
  # =========================================================================

  - id: "step-01"
    name: "Initialize"
    file: "steps/step-01-init.md"
    description: "Initialize paper generation, collect figures, create folder structure"
    execution_mode: "main_session"
    inputs: ["verification_state", "phase2a_dialogue"]
    outputs: ["checkpoint_file", "sections_folder", "figures_folder"]
    tasks:
      - "Create output folder structure"
      - "Collect figures from Phase 4/5"
      - "Verify required artifacts"
      - "Initialize checkpoint"

  # =========================================================================
  # STEP 02: NARRATIVE DESIGN
  # =========================================================================

  - id: "step-02"
    name: "Narrative Design"
    file: "steps/step-02-narrative-design.md"
    description: "Design paper narrative structure BEFORE section generation"
    execution_mode: "main_session"
    inputs:
      - "phase0_brainstorm"
      - "phase1_research"
      - "phase2a_dialogue"
      - "phase2b_plan"
      - "phase45_synthesis"
      - "phase5_baseline_pattern"
    outputs: ["narrative_blueprint"]
    context_isolation: false # Needs ALL artifacts for narrative synthesis
    tasks:
      - "Load Phase 4.5 synthesis (primary evidence source)"
      - "Load Phase 0-2B artifacts for context"
      - "Design opening hook (NOT generic)"
      - "Frame problem in three levels"
      - "Articulate key insight"
      - "Design evidence narrative"
      - "Set section-level narrative goals"
      - "Create 06_narrative_blueprint.yaml"

  # =========================================================================
  # STEP 03: STORY GROUP A - Foundation (Intro + Related + Methodology)
  # =========================================================================

  - id: "step-03"
    name: "Story Group A: Foundation"
    file: "steps/step-03-story-group-a.md"
    description: "Generate Introduction, Related Work, and Methodology with shared narrative context"
    execution_mode: "task_agent"
    depends_on: ["step-02"]
    inputs:
      - "narrative_blueprint"
      - "phase0_brainstorm"
      - "phase1_research"
      - "phase1_research_full"
      - "phase2a_dialogue"
      - "phase2a_hypotheses"
      - "phase2c_brief_pattern"
      - "phase3_architecture_pattern"
    outputs:
      - "section_introduction"
      - "section_related_work"
      - "section_methodology"
    mcp: ["semantic_scholar", "archon", "serena"]
    context_isolation: false # Sections share context within group
    figures: ["architecture_diagram"]
    narrative_role: "Hook → Problem → Insight → Solution preview"

  # =========================================================================
  # STEP 04: STORY GROUP B - Evidence (Experiments + Results + Discussion)
  # =========================================================================

  - id: "step-04"
    name: "Story Group B: Evidence"
    file: "steps/step-04-evidence-group-b.md"
    description: "Generate Experiments, Results, and Discussion with shared narrative context"
    execution_mode: "task_agent"
    depends_on: ["step-03"] # Needs methodology context
    inputs:
      - "narrative_blueprint"
      - "phase45_synthesis"
      - "phase2c_brief_pattern"
      - "phase3_prd_pattern"
      - "phase5_baseline_pattern"
      - "verification_state"
      - "figure_registry"
    outputs:
      - "section_experiments"
      - "section_results"
      - "section_discussion"
    mcp: ["serena"]
    context_isolation: false # Sections share context within group
    figures: ["results_plots", "comparison_plots", "ablation_plots"]
    narrative_role: "Test design → Evidence → Interpretation"

  # =========================================================================
  # STEP 05: STORY GROUP C - Closure (Conclusion + Abstract)
  # =========================================================================

  - id: "step-05"
    name: "Story Group C: Closure"
    file: "steps/step-05-conclusion-abstract.md"
    description: "Generate Conclusion and Abstract - needs full narrative arc"
    execution_mode: "task_agent"
    depends_on: ["step-03", "step-04"] # Needs all other sections
    inputs:
      - "narrative_blueprint"
      - "section_introduction"
      - "section_methodology"
      - "section_results"
    outputs:
      - "section_conclusion"
      - "section_abstract"
    context_isolation: false # Needs full story context
    narrative_role: "Callback to hook + compress full story"

  # =========================================================================
  # STEP 06: COMPILE REFERENCES
  # =========================================================================

  - id: "step-06"
    name: "Compile References"
    file: "steps/step-06-references.md"
    description: "Extract citations from all sections, verify with Scholar MCP"
    execution_mode: "task_agent"
    depends_on: ["step-03", "step-04", "step-05"]
    inputs: ["sections_folder"]
    outputs: ["references_file"]
    mcp: ["semantic_scholar"]
    context_isolation: true

  # =========================================================================
  # STEP 07: FINALIZE AND MERGE
  # =========================================================================

  - id: "step-07"
    name: "Final Merge"
    file: "steps/step-07-finalize.md"
    description: "Merge all sections with FULL CONTEXT - coherence check, ground truth extraction"
    execution_mode: "main_session"
    depends_on: ["step-06"]
    inputs: ["sections_folder", "figures_folder", "references_file", "narrative_blueprint"]
    outputs: ["paper_file", "ground_truth_file"]
    context_isolation: false # REQUIRES FULL CONTEXT
    tasks:
      - "Read ALL section files (00-07)"
      - "Check cross-section coherence against narrative blueprint"
      - "Verify figure-content natural matching"
      - "Insert figure placements"
      - "ICML 2025 format compliance check"
      - "Generate final 06_paper.md"
      - "Extract ground truth for Phase 6.5 adversarial review"
      - "Generate 065_ground_truth.yaml"

# ============================================================================
# CHECKPOINT SCHEMA
# ============================================================================

checkpoint:
  version: "2.0"
  fields:
    created_at: "ISO8601"
    updated_at: "ISO8601"
    current_step: "integer"
    main_hypothesis_id: "string"

    # Narrative design status
    narrative_design:
      status: "pending|complete"
      blueprint_file: "string"
      hook_strategy: "string"
      key_insight: "string"

    # Story group completion
    story_groups:
      group_a:
        status: "pending|in_progress|complete"
        sections: ["introduction", "related_work", "methodology"]
      group_b:
        status: "pending|in_progress|complete"
        sections: ["experiments", "results", "discussion"]
      group_c:
        status: "pending|in_progress|complete"
        sections: ["conclusion", "abstract"]

    # Section tracking (for compatibility)
    sections_completed: "array"
    sections_word_counts: "object"
    total_word_count: "integer"
    citations_count: "integer"
    citations_verified: "integer"
    verification_rate: "float"

    # Ground truth extracted
    ground_truth_extracted: "boolean"

# ============================================================================
# ERROR HANDLING
# ============================================================================

error_handling:
  on_step_failure:
    - log_error_to_checkpoint
    - attempt_recovery
    - if_unrecoverable: "continue_with_placeholder"

  citation_verification_failure:
    action: "mark_unverified"
    continue: true

  word_count_exceeded:
    action: "flag_for_review" # Not strict limit
    continue: true

# ============================================================================
# INTEGRATION WITH VERIFICATION STATE
# ============================================================================

verification_state_updates:
  on_start:
    path: "paper_writing"
    value:
      status: "IN_PROGRESS"
      started_at: "{ISO8601}"

  on_complete:
    path: "paper_writing"
    value:
      status: "COMPLETED"
      completed_at: "{ISO8601}"
      paper_file: "{paper_file}"
      references_file: "{references_file}"
      word_count: "{total_word_count}"
      citations_verified: "{verification_rate}%"
      narrative_blueprint: "{narrative_blueprint}"
      ground_truth_file: "{ground_truth_file}"
