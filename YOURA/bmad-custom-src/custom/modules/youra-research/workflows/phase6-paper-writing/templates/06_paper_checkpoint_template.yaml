# Phase 6: Paper Writing Checkpoint
# Anonymous Research Pipeline 
#
# Purpose: Track paper generation progress and state (Narrative-First Architecture)
# Location: {research_folder}/paper/06_paper_checkpoint.yaml

version: "2.0"
created_at: "{ISO8601}"
updated_at: "{ISO8601}"

# ============================================================================
# PROGRESS TRACKING
# ============================================================================

# Current step (1-7)
current_step: 1
total_steps: 7
status: "IN_PROGRESS" # IN_PROGRESS | COMPLETED | FAILED

# Step mapping:
# Step 1: Init - Create folders, collect figures
# Step 2: Narrative Design - Design story structure
# Step 3: Story Group A - Introduction, Related Work, Methodology
# Step 4: Story Group B - Experiments, Results, Discussion
# Step 5: Story Group C - Conclusion, Abstract (LAST)
# Step 6: References - Compile and verify citations
# Step 7: Finalize - Merge, coherence check, ground truth extraction

# ============================================================================
# HYPOTHESIS CONTEXT
# ============================================================================

main_hypothesis:
  id: "{hypothesis_id}"
  title: "{hypothesis_title}"
  gate_result: "{PASS|PARTIAL|FAIL}"

# ============================================================================
# NARRATIVE DESIGN
# ============================================================================

narrative_design:
  status: "pending" # pending | complete
  blueprint_file: "" # 06_narrative_blueprint.yaml
  completed_at: null

  # Key narrative elements (extracted from blueprint)
  hook_strategy: "" # e.g., "surprising_statistic", "counterintuitive_finding"
  key_insight: "" # One-sentence key insight
  main_contribution: "" # One-sentence contribution

# ============================================================================
# STORY GROUP PROGRESS
# ============================================================================

story_groups:
  # Group A: Foundation sections
  group_a:
    name: "Story Group A: Foundation"
    status: "pending" # pending | in_progress | complete
    narrative_role: "Hook → Problem → Insight → Solution preview"
    sections:
      introduction:
        status: "pending"
        word_count: 0
      related_work:
        status: "pending"
        word_count: 0
      methodology:
        status: "pending"
        word_count: 0
    started_at: null
    completed_at: null

  # Group B: Evidence sections
  group_b:
    name: "Story Group B: Evidence"
    status: "pending"
    narrative_role: "Test design → Evidence → Interpretation"
    sections:
      experiments:
        status: "pending"
        word_count: 0
      results:
        status: "pending"
        word_count: 0
      discussion:
        status: "pending"
        word_count: 0
    started_at: null
    completed_at: null

  # Group C: Closure sections
  group_c:
    name: "Story Group C: Closure"
    status: "pending"
    narrative_role: "Callback to hook + compress full story"
    sections:
      conclusion:
        status: "pending"
        word_count: 0
      abstract:
        status: "pending"
        word_count: 0
    started_at: null
    completed_at: null

# ============================================================================
# ARTIFACT LOADING STATUS
# ============================================================================

artifacts_loaded:
  # Core files (required)
  verification_state: false
  phase2a_dialogue: false
  phase2b_plan: false

  # Optional context files
  phase0_brainstorm: false
  phase1_research: false
  phase1_research_full: false
  phase2a_hypotheses: false

# Per-hypothesis artifacts
hypotheses_loaded:
  - id: "{hypothesis_id}"
    folder: "{hypothesis_folder}"
    phase2c_brief: false
    phase3_prd: false
    phase3_architecture: false
    phase4_validation: false
    phase5_baseline: false

# ============================================================================
# SECTION PROGRESS (Compatibility)
# ============================================================================

# List of completed sections (for backwards compatibility)
sections_completed: []
# Populated with: abstract, introduction, related_work, methodology,
# experiments, results, discussion, conclusion, references

# Word counts (for final statistics)
sections_word_counts:
  abstract: 0
  introduction: 0
  related_work: 0
  methodology: 0
  experiments: 0
  results: 0
  discussion: 0
  conclusion: 0

total_word_count: 0

# Word count guidelines
# Note: Focus on narrative quality, not exact word counts
word_count_guidelines:
  abstract: "~150 words"
  introduction: "~800-1000 words"
  related_work: "~600-800 words"
  methodology: "~1000-1200 words"
  experiments: "~800-1000 words"
  results: "~1000-1200 words"
  discussion: "~400-600 words"
  conclusion: "~300-400 words"
  total_max_pages: 8 # ICML limit

# ============================================================================
# CITATION TRACKING
# ============================================================================

citations:
  total: 0
  verified: 0
  partial: 0
  unverified: 0
  verification_rate: 0.0

# Citation details (populated during Step 3 and Step 6)
citation_details: []
# Example entry:
# - key: "Vaswani2017Attention"
# inline: "[Vaswani et al., 2017]"
# title: "Attention Is All You Need"
# paperId: "abc123..."
# status: "VERIFIED" # VERIFIED | PARTIAL | UNVERIFIED
# section: "related_work"

# ============================================================================
# FIGURE TRACKING
# ============================================================================

figures:
  total: 0
  from_phase4: 0
  from_phase5: 0
  registry_file: "" # figure_registry.yaml

figure_registry: []
# Example entry:
# - id: "fig_results_1"
# source: "phase4"
# original_path: "{hypothesis_folder}/code/outputs/figures/results.png"
# paper_path: "figures/fig_results_1.png"
# section: "results"
# referenced: false

# ============================================================================
# OUTPUT FILES
# ============================================================================

outputs:
  # Main outputs
  paper_file: "{research_folder}/paper/06_paper.md"
  paper_exists: false

  references_file: "{research_folder}/paper/06_references.bib"
  references_exists: false

  # Narrative design
  narrative_blueprint: "{research_folder}/paper/06_narrative_blueprint.yaml"
  narrative_blueprint_exists: false

  # Ground truth for Phase 6.5
  ground_truth_file: "{research_folder}/paper/065_ground_truth.yaml"
  ground_truth_exists: false

  # Sections folder
  sections_folder: "{research_folder}/paper/sections/"
  figures_folder: "{research_folder}/paper/figures/"

# ============================================================================
# COHERENCE CHECK RESULTS
# ============================================================================

coherence_checks:
  follows_narrative_blueprint: null # true | false | null (not checked yet)
  terminology_consistent: null
  claims_supported_by_evidence: null
  figures_referenced_correctly: null
  hook_callback_present: null # Conclusion callbacks to Introduction hook

# ============================================================================
# ERROR TRACKING
# ============================================================================

errors: []
# Example entry:
# - step: 4
# type: "citation_verification_failed"
# message: "Could not find paper: Smith 2023"
# timestamp: "{ISO8601}"
# resolved: false

warnings: []
# Example entry:
# - step: 7
# type: "word_count_guideline_exceeded"
# message: "Results section exceeds guideline (~1200 words)"
# value: 1350

# ============================================================================
# COMPLETION
# ============================================================================

completed_at: null # Set when status = COMPLETED

final_statistics:
  total_word_count: null
  estimated_pages: null
  figures_count: null
  tables_count: null
  citations_total: null
  citations_verified: null
  verification_rate: null
  sections_completed: null
  generation_time_minutes: null

  narrative_coherence_score: null # 0-100
  story_groups_completed: null # 0-3
  ground_truth_extracted: null # true | false
