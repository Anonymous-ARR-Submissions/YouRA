# ═══════════════════════════════════════════════════════════════════════════════
# NARRATIVE BLUEPRINT TEMPLATE
# Phase 6 Step 02 - Narrative Design
# ═══════════════════════════════════════════════════════════════════════════════
#
# PURPOSE:
# This template structures the paper's narrative BEFORE any section generation.
# A compelling academic paper tells a story - this blueprint designs that story.
#
# PHILOSOPHY:
# - Good paper = Good story with evidence
# - Every section serves the narrative arc
# - "Why?" matters more than "What?"
# - Reader engagement is the goal
#
# USAGE:
# 1. Step 02 loads Phase 0-5 artifacts
# 2. Step 02 fills this template through analysis and synthesis
# 3. Steps 03-05 use this blueprint to maintain narrative coherence
#
# ═══════════════════════════════════════════════════════════════════════════════

version: "1.0.0"
schema: "narrative_blueprint"
created_at: "" # ISO8601 timestamp
updated_at: "" # ISO8601 timestamp

# ─────────────────────────────────────────────────────────────────────────────
# METADATA
# ─────────────────────────────────────────────────────────────────────────────

metadata:
  hypothesis_id: ""
  hypothesis_title: ""
  research_folder: ""
  target_venue: "ICML 2025" # Affects style and constraints

  # Source artifacts used to create this blueprint
  source_artifacts:
    brainstorm_session: "" # 00_brainstorm_session.md
    targeted_research: "" # 01_targeted_research.md
    refinement: "" # 03_refinement.yaml (Phase 2A Dialogue output)
    synthesis: "" # 02_synthesis.yaml (Phase 2A synthesis)
    verification_plan: "" # 02b_verification_plan.md
    experiment_brief: "" # 02c_experiment_brief.md
    validation_report: "" # 04_validation.md
    baseline_comparison: "" # 05_baseline_comparison.md (if exists)

# ═══════════════════════════════════════════════════════════════════════════════
# PART 1: HOOK & MOTIVATION
# ═══════════════════════════════════════════════════════════════════════════════
# The first impression determines whether the reader continues.
# This section designs how to capture attention and establish importance.

hook:
  # ─────────────────────────────────────────────────────────────────────────────
  # Opening Statement
  # The very first sentence(s) of the paper. Must grab attention.
  # ─────────────────────────────────────────────────────────────────────────────
  opening_statement:
    content: ""
    strategy: "" # e.g., "surprising_statistic", "counterintuitive_finding", "practical_failure"

    # AVOID these patterns:
    # ❌ "X is an important problem in Y field"
    # ❌ "Recently, X has attracted significant attention"
    # ❌ "With the rapid development of X..."
    #
    # PREFER these patterns:
    # ✅ Specific failure case or limitation
    # ✅ Surprising statistic or finding
    # ✅ Concrete example that resonates

  # ─────────────────────────────────────────────────────────────────────────────
  # Why Reader Should Care
  # The "so what?" answer - why does this matter?
  # ─────────────────────────────────────────────────────────────────────────────
  why_reader_should_care:
    main_reason: ""
    concrete_example: "" # Real-world scenario where this matters
    stakes: "" # What happens if this problem isn't solved?

  # ─────────────────────────────────────────────────────────────────────────────
  # Real-World Impact
  # Grounds the research in practical significance
  # ─────────────────────────────────────────────────────────────────────────────
  real_world_impact:
    application_domain: ""
    potential_beneficiaries: ""
    scale_of_impact: "" # How many people/systems affected?

# ─────────────────────────────────────────────────────────────────────────────
# PROBLEM FRAMING
# Structure the problem in layers to show depth of understanding
# ─────────────────────────────────────────────────────────────────────────────

problem_framing:
  # Level 1: What everyone knows
  surface_problem:
    description: ""
    common_understanding: ""

  # Level 2: What we discovered / emphasized
  deeper_problem:
    description: ""
    why_overlooked: "" # Why has this been missed or underappreciated?
    our_perspective: "" # How do we frame this differently?

  # Level 3: The gap that creates our opportunity
  gap_in_existing_work:
    description: ""
    why_gap_exists: "" # Technical? Conceptual? Resource constraint?
    why_gap_matters: "" # What's lost by not addressing this?

# ═══════════════════════════════════════════════════════════════════════════════
# PART 2: THE INSIGHT
# ═══════════════════════════════════════════════════════════════════════════════
# The intellectual contribution - what makes this paper worth publishing.
# This is the "aha!" moment that drives the entire research.

key_insight:
  # ─────────────────────────────────────────────────────────────────────────────
  # The Core "Aha!" Moment
  # The central insight that enables our solution
  # ─────────────────────────────────────────────────────────────────────────────
  aha_moment:
    one_sentence: "" # Capture the insight in ONE sentence
    expanded_explanation: "" # 2-3 sentences expanding on it

  # ─────────────────────────────────────────────────────────────────────────────
  # Why Others Missed It
  # Positioning - what made this insight non-obvious?
  # ─────────────────────────────────────────────────────────────────────────────
  why_others_missed_it:
    common_assumptions: "" # What assumptions did others make?
    our_different_view: "" # How did we see it differently?
    enabling_factor: "" # What enabled us to see this?

  # ─────────────────────────────────────────────────────────────────────────────
  # Why It Works
  # Intuitive explanation of the mechanism
  # ─────────────────────────────────────────────────────────────────────────────
  what_makes_it_work:
    intuitive_explanation: "" # Explain like to a smart colleague in adjacent field
    key_mechanism: "" # The technical core
    analogy: "" # Optional: helpful analogy if applicable

# ═══════════════════════════════════════════════════════════════════════════════
# PART 3: EVIDENCE STORY
# ═══════════════════════════════════════════════════════════════════════════════
# Results are not just numbers - they tell a story that supports your claims.
# Design how the evidence narrative unfolds.

evidence_narrative:
  # ─────────────────────────────────────────────────────────────────────────────
  # Main Claim
  # What are we trying to prove with our evidence?
  # ─────────────────────────────────────────────────────────────────────────────
  main_claim:
    statement: ""
    measurable_criteria: "" # How do we know if it's true?

  # ─────────────────────────────────────────────────────────────────────────────
  # Supporting Evidence
  # Each piece of evidence and what it means
  # ─────────────────────────────────────────────────────────────────────────────
  supporting_evidence:
    - id: "evidence_1"
      what: "" # What result/finding?
      so_what: "" # Why does this matter?
      how_it_supports_claim: "" # Connection to main claim

    - id: "evidence_2"
      what: ""
      so_what: ""
      how_it_supports_claim: ""

    - id: "evidence_3"
      what: ""
      so_what: ""
      how_it_supports_claim: ""

  # ─────────────────────────────────────────────────────────────────────────────
  # Surprising Findings
  # Unexpected results often make papers memorable
  # ─────────────────────────────────────────────────────────────────────────────
  surprising_findings:
    finding: ""
    why_surprising: ""
    our_interpretation: ""

  # ─────────────────────────────────────────────────────────────────────────────
  # What Results Mean
  # Synthesis of evidence into meaning
  # ─────────────────────────────────────────────────────────────────────────────
  what_results_mean:
    synthesis: "" # Big picture interpretation
    confidence_level: "" # How confident are we?
    caveats: "" # Important limitations on interpretation

# ═══════════════════════════════════════════════════════════════════════════════
# PART 4: BROADER IMPACT
# ═══════════════════════════════════════════════════════════════════════════════
# What does this mean beyond the immediate results?
# Connect the work to larger context.

takeaway:
  # ─────────────────────────────────────────────────────────────────────────────
  # Main Contribution
  # The ONE thing readers should remember
  # ─────────────────────────────────────────────────────────────────────────────
  main_contribution:
    one_sentence: ""
    why_significant: ""

  # ─────────────────────────────────────────────────────────────────────────────
  # Broader Implications
  # Beyond the immediate scope
  # ─────────────────────────────────────────────────────────────────────────────
  implications:
    for_field: "" # What does this mean for the research community?
    for_practice: "" # What does this mean for practitioners?
    conceptual_contribution: "" # Any new way of thinking?

  # ─────────────────────────────────────────────────────────────────────────────
  # Future Possibilities
  # What doors does this open?
  # ─────────────────────────────────────────────────────────────────────────────
  future_possibilities:
    immediate_extensions: "" # What could be done next?
    longer_term_vision: "" # Where could this lead?
    open_questions: "" # What questions does this raise?

# ═══════════════════════════════════════════════════════════════════════════════
# PART 5: SECTION-LEVEL NARRATIVE GOALS
# ═══════════════════════════════════════════════════════════════════════════════
# Each section has a role in the overall narrative.
# Define what each section should accomplish.

section_goals:

  # ─────────────────────────────────────────────────────────────────────────────
  # ABSTRACT
  # ─────────────────────────────────────────────────────────────────────────────
  abstract:
    narrative_purpose: "Compress the entire story into ~150 words"
    key_message: "" # The ONE thing reader should get from abstract
    structure_notes: |
      - Sentence 1-2: Problem and its importance
      - Sentence 3: Our approach (key insight)
      - Sentence 4-5: Main results (quantitative)
      - Sentence 6: Significance/contribution
    avoid:
      - "Citations in abstract"
      - "Vague claims without numbers"
      - "Undefined acronyms"

  # ─────────────────────────────────────────────────────────────────────────────
  # INTRODUCTION
  # ─────────────────────────────────────────────────────────────────────────────
  introduction:
    narrative_purpose: "Hook → Problem → Insight → Solution preview"

    hook_strategy: "" # How will we grab attention?

    problem_escalation: |
      # How to build up the problem:
      # 1. Start with surface problem (known to all)
      # 2. Reveal deeper problem (our framing)
      # 3. Show gap in existing solutions

    insight_preview: "" # How to hint at our solution without full detail

    contributions_framing: |
      # Contributions should feel like natural outcomes of the insight
      # NOT a disconnected bulleted list
      # "Building on this insight, we..."

    transition_to_related_work: "" # How to smoothly connect to next section

  # ─────────────────────────────────────────────────────────────────────────────
  # RELATED WORK
  # ─────────────────────────────────────────────────────────────────────────────
  related_work:
    narrative_purpose: "Show why existing work is insufficient → justify our approach"

    # NOT just listing papers - building an argument
    positioning_strategy: "" # How do we position our work?

    key_comparison_points:
      - area: ""
        limitation_to_highlight: ""
        how_we_differ: ""
      - area: ""
        limitation_to_highlight: ""
        how_we_differ: ""

    papers_to_discuss: [] # Key papers that MUST be discussed

    avoid:
      - "Just listing papers without critique"
      - "Being unfair to prior work"
      - "Missing obvious related work"

  # ─────────────────────────────────────────────────────────────────────────────
  # METHODOLOGY
  # ─────────────────────────────────────────────────────────────────────────────
  methodology:
    narrative_purpose: "Explain WHY this design solves the problem"

    # The method should feel like natural consequence of the insight
    connection_to_insight: ""

    key_design_decisions:
      - decision: ""
        rationale: "" # WHY this choice?
        alternatives_considered: ""

      - decision: ""
        rationale: ""
        alternatives_considered: ""

    intuition_building: |
      # How to help reader understand intuitively?
      # - Diagrams?
      # - Analogies?
      # - Step-by-step walkthrough?

    technical_depth_balance: |
      # ICML: Technical details in main paper, proofs in appendix
      # Focus on "why" in main text, "how exactly" in appendix

  # ─────────────────────────────────────────────────────────────────────────────
  # EXPERIMENTS
  # ─────────────────────────────────────────────────────────────────────────────
  experiments:
    narrative_purpose: "Design experiments that test our specific claims"

    # Each experiment should answer a specific question
    experimental_questions:
      - question: "" # What are we testing?
        experiment: "" # How do we test it?
        expected_outcome: "" # What would success look like?

    baseline_rationale: "" # WHY these baselines?
    dataset_rationale: "" # WHY these datasets?
    metric_rationale: "" # WHY these metrics?

    fairness_considerations: |
      # How do we ensure fair comparison?
      # - Same hyperparameter budget
      # - Same compute resources
      # - Standard evaluation protocol

  # ─────────────────────────────────────────────────────────────────────────────
  # RESULTS
  # ─────────────────────────────────────────────────────────────────────────────
  results:
    narrative_purpose: "Present evidence that supports our claims"

    main_result_highlight: "" # THE key result to emphasize

    result_presentation_order:
      # Order results to build the argument
      - result: ""
        purpose: "" # Why show this first/here?

    surprising_result_handling: "" # How to explain unexpected findings

    avoid:
      - "Table 1 shows X, Table 2 shows Y" (no interpretation)
      - "Cherry-picking favorable results"
      - "Hiding negative results"

  # ─────────────────────────────────────────────────────────────────────────────
  # DISCUSSION
  # ─────────────────────────────────────────────────────────────────────────────
  discussion:
    narrative_purpose: "Interpret results, acknowledge limits, show significance"

    key_findings_interpretation: "" # What do results mean?

    honest_limitations:
      - limitation: ""
        why_acceptable: "" # Why this doesn't invalidate the work
        future_mitigation: "" # How could this be addressed?

    broader_impact_statement: "" # ICML requirement

  # ─────────────────────────────────────────────────────────────────────────────
  # CONCLUSION
  # ─────────────────────────────────────────────────────────────────────────────
  conclusion:
    narrative_purpose: "Reinforce key message + open future directions"

    # Should connect back to the opening hook
    callback_to_hook: "" # How do we close the loop?

    memorable_ending: "" # What's the lasting impression?

    future_work_vision: "" # Not just "more experiments" - real vision

# ═══════════════════════════════════════════════════════════════════════════════
# PART 6: NARRATIVE FLOW VERIFICATION
# ═══════════════════════════════════════════════════════════════════════════════
# Checklist to verify the narrative holds together

narrative_coherence_checklist:
  # Story arc
  - check: "Does Introduction hook connect to Conclusion ending?"
    status: "" # "verified" | "needs_work" | "pending"

  - check: "Does each section naturally flow to the next?"
    status: ""

  - check: "Is the key insight consistently emphasized throughout?"
    status: ""

  # Claim-evidence alignment
  - check: "Are all major claims supported by evidence in Results?"
    status: ""

  - check: "Do experimental questions match the claims in Introduction?"
    status: ""

  # Reader engagement
  - check: "Would a busy reviewer find the Abstract compelling?"
    status: ""

  - check: "Can the key contribution be understood from Figure 1?"
    status: ""

  - check: "Is the paper interesting, not just correct?"
    status: ""

# ═══════════════════════════════════════════════════════════════════════════════
# NOTES
# ═══════════════════════════════════════════════════════════════════════════════

notes:
  creation_notes: "" # Notes from Step 02 about design decisions
  revision_history: [] # Track major changes to narrative
