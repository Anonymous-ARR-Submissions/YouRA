# Phase 2A Step-Level Archon Task Tracking
# Purpose: Store Archon task IDs for step-level progress tracking.
# This file enables status transitions across step files.
# Generated by: step-00-initialize.md Section 1.6
#
# NOTE: This is Phase 2A-Dialogue specific.
# Phase 2A-Extended does NOT use step-level tasks.

# ============================================
# VERSION INFORMATION
# ============================================

version: {{version}} # 1, 2, 3, ... (for recursive entries)
feature: "{{feature}}" # Phase2A-v1, Phase2A-v2, ...
is_recursive: {{is_recursive}} # true if routed from Phase 4/5 failure
pipeline_project_id: "{{pipeline_project_id}}"
gap_id: "{{gap_id}}"

# ============================================
# CREATION METADATA
# ============================================

created_at: "{{timestamp}}"
created_by: "step-00-initialize.md"

# Recursive entry context (if applicable)
recursive_context:
  source_phase: "{{source_phase}}" # null | "Phase 4" | "Phase 5"
  source_hypothesis: "{{source_hypothesis}}" # null | "H-E1" | "H-M1" etc.
  failure_type: "{{failure_type}}" # null | "FAIL" | "PARTIAL"
  serena_memory: "{{serena_memory}}" # null | memory file name

# ============================================
# STEP TASK MAPPING
# ============================================

tasks:
  gap_selection:
    key: "2A-0"
    title: "2A-0: Gap Selection"
    id: "{{task_id_2a_0}}"
    status: "doing"
    order: 100

  paper_prep:
    key: "2A-P"
    title: "2A-P: Paper Preparation"
    id: "{{task_id_2a_p}}"
    status: "todo"
    order: 95

  discussion:
    key: "2A-1"
    title: "2A-1: Tikitaka Discussion"
    id: "{{task_id_2a_1}}"
    status: "todo"
    order: 90

  structuring:
    key: "2A-2"
    title: "2A-2: Result Structuring"
    id: "{{task_id_2a_2}}"
    status: "todo"
    order: 80

# ============================================
# STATUS TRANSITION LOG
# ============================================
# Updated by each step file when transitions occur

transitions: []
# Example entry:
# - timestamp: "2026-01-20T10:30:00Z"
# step: "step-01-discussion"
# from_task: "2A-P"
# from_status: "doing"
# to_task: "2A-1"
# to_status: "doing"
# message: "Paper preparation complete, starting Tikitaka Discussion"

# ============================================
# RETRY STATE
# ============================================
# Tracks retry counts for BINDING_BLOCKED and CLARITY_LOW

retry_state:
  # BINDING_BLOCKED retry tracking
  binding_retry_count: 0
  # CLARITY_LOW retry tracking
  clarity_retry_count: 0
  # Last retry reason
  last_retry_reason: null
  # retry_context (set when BINDING_BLOCKED triggers retry)
  retry_context: null
  # agent_guidance (derived from retry_context, used by agents)
  agent_guidance: null
  # last_clarity_feedback (set when CLARITY_LOW triggers retry)
  last_clarity_feedback: null

# Example retry_context:
# retry_context:
# reason: "BINDING_BLOCKED"
# attempt: 1
# max_attempts: 3
# missing_bindings:
# - agent: "novelty"
# missing_field: "experimental_anchoring"
# guidance: "Must anchor novelty claims to experiments"
# timestamp: "2026-01-20T10:30:00Z"

# ============================================
# FALLBACK QUERY CONFIGURATION
# ============================================
# If task ID lookup fails, query by feature field

fallback_query:
  enabled: true
  method: "query_by_feature"
  feature_pattern: "Phase2A-v{{version}}"
