# ═══════════════════════════════════════════════════════════════
# Phase 2A Round Table Metadata Template
# ═══════════════════════════════════════════════════════════════
#
# This template defines the structure for 01_round_table/00_metadata.yaml
# Generated during step-00-initialize.md
# Features:
# - Novelty-First execution mode (novelty alone, then 3 in parallel)
# - Single round mode (Round 0 only)
# - Creative Ideation + Novelty Preservation
# - Constructive Assessment by Plausibility
# - Round 0 agents check Serena Memory for failure context
#
# Part of the Per-Round File Split structure:
# 01_round_table/
# ├── 00_metadata.yaml <-- THIS FILE
# ├── round_0.yaml
# ├── convergence.yaml
# └── final_opinions.yaml
#
# Usage: Replace {{placeholder}} values during execution
# ═══════════════════════════════════════════════════════════════

metadata:
  gap_id: "{{gap_id}}"
  gap_title: "{{gap_title}}"
  created_at: "{{timestamp}}"
  workflow_version: "7.5.0"
  execution_mode: "novelty_first" # 
  stage: "round_table"
  research_question: "{{research_question}}"

  # Per-Round Split Configuration
  file_structure:
    type: "per_round_split"
    folder: "01_round_table"
    files:
      metadata: "00_metadata.yaml"
      round_prefix: "round_"
      convergence: "convergence.yaml"
      final_opinions: "final_opinions.yaml"

materials_read:
  papers:
    # - arxiv_id: "2301.00001"
    # title: "Paper Title"
    # file: "papers/arxiv_2301_00001.md"
  github_repos: []
  archon_queries: []

round_tracking:
  current_round: 0
  min_rounds: 1
  max_rounds: 1
  execution_mode: "novelty_first" # 
  rounds_completed: []
  # - round: 0
  # file: "round_0.yaml"
  # timestamp: "{{timestamp}}"
  # status: "completed"
  # execution_order: ["novelty", ["falsifiability", "significance", "plausibility"]]
