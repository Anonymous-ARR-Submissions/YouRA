# =============================================================================
# Phase 2A Research Dialogue Orchestrator Configuration
# =============================================================================
# This configuration controls the standalone orchestrator script
# (orchestrate_exchange.py) for Phase 2A Research Hypothesis Discussion.
#
# Called via Bash from step-01-discussion.md's Self-Contained Loop.
# =============================================================================

# -----------------------------------------------------------------------------
# MASTER SWITCH
# -----------------------------------------------------------------------------
enabled: true

# -----------------------------------------------------------------------------
# LLM SETTINGS (OpenRouter)
# -----------------------------------------------------------------------------
# External LLM orchestrates the discussion by:
# 1. Analyzing discussion_log.md for current state
# 2. Selecting persona(s) for next exchange (based on configuration)
# 3. Providing instructions for each persona (topic-based or detailed)
# 4. Detecting when hypothesis has converged
openrouter:
  enabled: true

  # Model for orchestration analysis
  model: "openai/gpt-5.2-chat"

  # API key environment variable (loaded from .env)
  api_key_env: "OPENROUTER_API_KEY"

  # Request timeout in seconds
  timeout_seconds: 60

  # Maximum tokens for LLM response
  max_tokens: 1000

# -----------------------------------------------------------------------------
# DISCUSSION PARAMETERS
# -----------------------------------------------------------------------------
discussion:
  # ⚠️ AUTHORITATIVE SOURCE for exchange counts.
  # These values override personas.yaml convergence.min_exchanges / max_exchanges.
  # The orchestrator reads these FIRST.
  #
  # Production recommendation: min=15, max=50
  # Current values (min=7, max=7) are TEST values for quick iteration.
  min_exchanges: 15

  # Maximum exchanges - force convergence after this
  max_exchanges: 20

  # -------------------------------------------------------------------------
  # Instruction Mode Configuration
  # -------------------------------------------------------------------------
  # Controls how the external LLM provides instructions to Claude Code
  # - "topic": Brief 2-5 word topics (Claude loads full persona from personas.yaml)
  # - "detailed": Full detailed instructions (more verbose)
  instruction_mode: "topic"

  # -------------------------------------------------------------------------
  # Turn-Based Mode Configuration
  # -------------------------------------------------------------------------
  # Number of personas to select per exchange
  # - 1: One-on-one turn-based conversation
  # - 2-3: Group discussion with multiple perspectives per exchange
  personas_per_exchange: 1

  # Turn selection strategy (only relevant when personas_per_exchange = 1)
  # - "round-robin": Rotate through personas in fixed order
  # - "intelligent": LLM selects most relevant persona based on discussion state
  # - "free": No constraints on selection
  turn_mode: "intelligent"

# -----------------------------------------------------------------------------
# DYNAMIC PAPER REFERENCE
# -----------------------------------------------------------------------------
# Enable LLM to instruct Claude to read specific paper sections during discussion
papers:
  # Enable dynamic paper loading during discussion
  enabled: true

  # Paper files location (relative to research folder)
  folder_pattern: "papers/*.md"

  # When to suggest paper references
  suggest_on:
    - methodology
    - mechanism
    - evidence
    - comparison

# -----------------------------------------------------------------------------
# DETECTION SETTINGS
# -----------------------------------------------------------------------------
detection:
  # Discussion log file name
  discussion_log: "discussion_log.md"

  # Marker for completed discussion
  completion_marker: "## Final Assessments"

# -----------------------------------------------------------------------------
# DEBUG SETTINGS
# -----------------------------------------------------------------------------
debug:
  # Enable verbose logging (to stderr)
  verbose: true

  # Log LLM prompts and responses
  log_llm_interactions: true
