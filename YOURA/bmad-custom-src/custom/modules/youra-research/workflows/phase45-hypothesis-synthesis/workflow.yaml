# Phase 4.5: Hypothesis Synthesis Workflow 
# Purpose: Refine hypotheses based on experiment evidence, produce theoretical interpretation,
# and serve as the SINGLE information gateway to Phase 6 Paper Writing.
#
# Key Change: Phase 4.5 is no longer simple result aggregation.
# Phase 2A theories = motivating theories (possibly speculative)
# Phase 4.5 = keep ONLY experiment-supported claims, remove overclaims,
# connect to literature, derive grounded future work.

name: phase45-hypothesis-synthesis
architecture: "step-based"
version: "2.0"
description: >
  Refine initial hypotheses using experiment evidence. Reads all h-*/04_validation.md
  and h-*/04_checkpoint.yaml to: (1) align predictions with results, (2) refine hypothesis
  by removing unsupported claims, (3) provide theoretical interpretation connected to
  literature, (4) define principled limitations, and (5) derive results-grounded future work.
  Output is the SINGLE source consumed by Phase 6 Paper Writing.
author: "Anonymous"
phase_output: "045_validated_hypothesis.md - Evidence-refined hypothesis with theoretical interpretation"

# ============================================================================
# PATH VARIABLES
# ============================================================================

config_source: "{project-root}/bmad-custom-src/custom/modules/youra-research/module.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
date: system-generated

# YouRA Module Specific Variables
research_output_path: "{config_source}:research_output_path"
research_folder: "{research_output_path}/youra_research"

# Module path and component files
installed_path: "{project-root}/bmad-custom-src/custom/modules/youra-research/workflows/phase45-hypothesis-synthesis"
instructions: "{installed_path}/instructions.md"
steps_folder: "{installed_path}/steps"

# ============================================================================
# INPUT FILES
# ============================================================================

input_files:
  # From Phase 4 (per-hypothesis experiment results)
  validation_reports:
    pattern: "{research_folder}/h-*/04_validation.md"
    required: true
    description: "Phase 4 validation reports with experiment results, gate outcomes, lessons learned"

  checkpoints:
    pattern: "{research_folder}/h-*/04_checkpoint.yaml"
    required: true
    description: "Phase 4 checkpoints with pass_rate, failed_checks, limitation_note, reflection_outcome"

  # From Phase 2A-Dialogue (original hypothesis)
  original_hypothesis:
    file: "{research_folder}/03_refinement.yaml"
    required: true
    description: "Original hypothesis with core_statement, predictions (P1-P3), causal_mechanism, key_assumptions, variables"

  # From Phase 3 (implementation task definitions)
  task_definitions:
    pattern: "{research_folder}/h-*/03_tasks.yaml"
    required: true
    description: "Phase 3 task definitions with planned metrics, success criteria, and implementation scope — needed for planned-vs-actual comparison"

  # From Phase 2C (experiment design)
  experiment_briefs:
    pattern: "{research_folder}/h-*/02c_experiment_brief.md"
    required: true
    description: "Phase 2C experiment briefs with variables (IV/DV/CV), controlled conditions, datasets, evaluation protocol — needed for interpreting result validity"

  # From Phase 2A synthesis
  synthesis:
    file: "{research_folder}/02_synthesis.yaml"
    required: false
    description: "Phase 2A synthesis output for additional context"

  # Pipeline state
  verification_state:
    file: "{research_folder}/verification_state.yaml"
    required: true
    description: "Pipeline state with hypothesis statuses and gate results"

  # NOTE: Phase 5 (baseline comparison) runs AFTER Phase 4.5, so its outputs are NOT available here.
  # Phase 5 reads 045_validated_hypothesis.md as input. Do NOT reference 05_baseline_comparison.md.

# ============================================================================
# OUTPUT FILES
# ============================================================================

output_files:
  primary:
    - file: "{research_folder}/045_validated_hypothesis.md"
      description: "Evidence-refined hypothesis synthesis — SINGLE source for Phase 6"
      used_by: "Phase 6 Paper Writing (narrative design, evidence sections, discussion, conclusion)"

  template: "{installed_path}/templates/045_validated_hypothesis_template.md"

# ============================================================================
# EXTRACTION TARGETS (what Phase 4.5 reads from inputs)
# ============================================================================

extraction_targets:
  from_04_validation:
    - "Gate Result (PASS/FAIL/PARTIAL)"
    - "Experiment Metrics (tables, numbers)"
    - "Lessons Learned (What Worked, What Didn't Work, Unexpected Findings)"
    - "Key Insights"
    - "Proven Components"
    - "Optimal Hyperparameters"
    - "Recommendations for Dependents"
    - "Figure paths and descriptions"

  from_04_checkpoint:
    - "pass_rate: 0.0~1.0"
    - "failed_checks: List of specific failures"
    - "limitation_note: Recorded limitations"
    - "reflection_outcome: SELF_MODIFY | ROUTED_TO_PHASE_2A | etc."
    - "modification_attempt: Number of hypothesis modifications"
    - "sdd_metrics: SDD compliance data"

  from_03_refinement:
    - "core_statement (original)"
    - "variables (IV, DV, CV)"
    - "predictions (P1, P2, P3) with test_method and success_criterion"
    - "causal_mechanism (steps with falsifiers)"
    - "key_assumptions"
    - "scope"
    - "established_facts"

  from_03_tasks:
    - "Task definitions with expected metrics and success criteria"
    - "Planned implementation scope and approach"
    - "SDD compliance expectations"

  from_02c_experiment_brief:
    - "Independent/Dependent/Controlled variables"
    - "Experimental conditions and control groups"
    - "Evaluation protocol and datasets"
    - "Planned statistical tests"

  from_verification_state:
    - "Hypothesis statuses and gate results"
    - "Dependency structure"
    - "Workflow completion status"

# ============================================================================
# PIPELINE POSITION & CONNECTIONS
# ============================================================================

pipeline:
  position: "Phase 4.5"
  sequence: "Phase 0 → 1 → 2A → 2B → (2C → 3 → 4) × N → **Phase 4.5** → [5] → 6 → 6.5 → 6.5.1"

  requires:
    - "All sub-hypotheses completed Phase 4 (VALIDATED, COMPLETED, or FAILED)"
    - "verification_state.yaml exists with workflow.sub_hypotheses_complete = true"

  outputs:
    - file: "{research_folder}/045_validated_hypothesis.md"
      description: "Evidence-refined hypothesis — SINGLE source for Phase 6"
      used_by: "Phase 6 Paper Writing"

  next_phase:
    name: "Phase 5 (optional) or Phase 6"
    description: "Phase 5 baseline comparison if enabled, otherwise directly to Phase 6 Paper Writing"

# ============================================================================
# INVOCATION CONTROL
# ============================================================================

standalone: true # Can run independently after hypothesis-loop completes
invocation:
  standalone: "/phase45-hypothesis-synthesis"
  full_pipeline: "Invoked between hypothesis-loop and Phase 5/6"

# ============================================================================
# MCP SERVER REQUIREMENTS
# ============================================================================

mcp_servers:
  required:
    - name: "Archon"
      purpose: "Update pipeline task status"
      tools: ["manage_task"]

    - name: "Serena"
      purpose: "Code/experiment analysis, session memory"
      tools: ["list_memories", "read_memory", "write_memory", "find_symbol", "search_for_pattern"]

  recommended:
    - name: "Semantic Scholar"
      purpose: "Connect findings to existing literature for theoretical interpretation"
      tools: ["paper_relevance_search", "paper_title_search", "paper_details"]
      used_in: ["step-04-interpretation"]

    - name: "ClearThought"
      purpose: "Competing hypothesis analysis, structured argumentation for refinement"
      tools: ["structuredargumentation", "debuggingapproach", "scientificmethod"]
      used_in: ["step-03-refinement", "step-04-interpretation"]

  validation: "Archon and Serena MUST be available. Semantic Scholar and ClearThought recommended."

# ============================================================================
# STEP DEFINITIONS
# ============================================================================

steps:
  - id: "step-01"
    name: "Initialize"
    file: "steps/step-01-init.md"
    description: "Load pipeline state, verify preconditions, collect hypothesis data, read original hypothesis"
    execution_mode: "main_session"
    inputs: ["verification_state", "original_hypothesis", "task_definitions", "experiment_briefs"]
    outputs: ["hypothesis_list", "original_hypothesis_data", "task_definitions_data", "experiment_design_data"]
    mcp: ["serena"]

  - id: "step-02"
    name: "Prediction-Result Alignment"
    file: "steps/step-02-alignment.md"
    description: "Map P1/P2/P3 predictions to experiment results, verify causal mechanism steps"
    execution_mode: "main_session"
    depends_on: ["step-01"]
    inputs: ["validation_reports", "checkpoints", "original_hypothesis_data", "task_definitions_data", "experiment_design_data"]
    outputs: ["prediction_result_matrix", "causal_mechanism_verification", "planned_vs_actual_comparison"]

  - id: "step-03"
    name: "Hypothesis Refinement"
    file: "steps/step-03-refinement.md"
    description: "Remove overclaims, generate refined core statement, verify assumptions"
    execution_mode: "main_session"
    depends_on: ["step-02"]
    inputs: ["prediction_result_matrix", "original_hypothesis_data"]
    outputs: ["refined_hypothesis", "claims_changelog", "assumptions_status"]
    mcp: ["clearthought"]

  - id: "step-04"
    name: "Theoretical Interpretation"
    file: "steps/step-04-interpretation.md"
    description: "Connect to literature, analyze unexpected findings, identify theoretical contributions"
    execution_mode: "main_session"
    depends_on: ["step-02", "step-03"]
    inputs: ["prediction_result_matrix", "refined_hypothesis", "validation_reports"]
    outputs: ["theoretical_interpretation", "literature_connections"]
    mcp: ["semantic_scholar", "clearthought"]

  - id: "step-05"
    name: "Limitations & Scope"
    file: "steps/step-05-limitations.md"
    description: "Define principled boundary conditions, root cause analysis, scope conditions"
    execution_mode: "main_session"
    depends_on: ["step-02", "step-03"]
    inputs: ["prediction_result_matrix", "assumptions_status", "checkpoints"]
    outputs: ["limitations_analysis", "scope_boundaries"]

  - id: "step-06"
    name: "Future Work"
    file: "steps/step-06-future-work.md"
    description: "Derive results-grounded future directions from untested alternatives and unverified assumptions"
    execution_mode: "main_session"
    depends_on: ["step-03", "step-04", "step-05"]
    inputs: ["refined_hypothesis", "theoretical_interpretation", "limitations_analysis"]
    outputs: ["future_work_directions"]

  - id: "step-07"
    name: "Generate Document"
    file: "steps/step-07-generate.md"
    description: "Assemble 045_validated_hypothesis.md from all previous step outputs"
    execution_mode: "main_session"
    depends_on: ["step-01", "step-02", "step-03", "step-04", "step-05", "step-06"]
    inputs: ["all_previous_step_outputs", "template"]
    outputs: ["045_validated_hypothesis.md"]

  - id: "step-08"
    name: "Finalize"
    file: "steps/step-08-finalize.md"
    description: "Update verification_state.yaml, Archon task status, display completion summary"
    execution_mode: "main_session"
    depends_on: ["step-07"]
    inputs: ["045_validated_hypothesis.md"]
    outputs: ["updated_verification_state"]
    mcp: ["archon", "serena"]

# ============================================================================
# QUALITY VALIDATION CRITERIA
# ============================================================================

quality_criteria:
  synthesis_complete:
    check: "All 8 sections of 045_validated_hypothesis.md are filled"
    required_sections:
      - "Executive Summary"
      - "Prediction-Result Matrix"
      - "Hypothesis Refinement"
      - "Theoretical Interpretation"
      - "Experiment Results"
      - "Limitations & Scope Boundaries"
      - "Future Work"
      - "Implications for Phase 6"
    fail_action: "Re-read source files and complete missing sections"

  prediction_alignment:
    check: "Every prediction (P1, P2, P3) has a status assignment with evidence"
    fail_action: "Re-read validation reports and assign status"

  refinement_integrity:
    check: "Refined core statement differs from original AND is supported by evidence"
    fail_action: "Re-analyze prediction results and revise refinement"

  all_hypotheses_covered:
    check: "Every h-*/04_validation.md is referenced in synthesis"
    fail_action: "Read missing validation files and incorporate"

  phase6_readiness:
    check: "Section 8 (Implications for Phase 6) contains all 5 subsections"
    required_subsections:
      - "Recommended Narrative Hook"
      - "Key Insight (experiment-verified)"
      - "Strongest Claims"
      - "Honest Limitations"
      - "Evidence Highlights"
    fail_action: "Complete Phase 6 implications from synthesis data"
