# Phase 1: Targeted Research Workflow
# Separated from workflow.md frontmatter for workflow.xml compatibility
name: phase1-targeted-research
description: Targeted research based on specific research questions and optional reference papers. Outputs phase1-compatible data for hypothesis generation in Phase 2A.
web_bundle: false
architecture: "step-file"
author: "Anonymous"
phase_output: "Research data, gaps (Pre-hypothesis, targeted approach)"

# Critical variables from config 
config_source: "{project-root}/bmad-custom-src/custom/modules/youra-research/module.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
date: system-generated
processing_time: system-generated

# YouRA Module Specific Variables
research_output_path: "{config_source}:research_output_path"

# Optional input from Phase 0 Brainstorm
recommended_inputs:
  - brainstorm_session: "{research_output_path}/00_brainstorm_session.md"

# Input/Output
template: "{installed_path}/template.md"
validation: "{installed_path}/checklist.md"
instructions: "{installed_path}/workflow.md"

installed_path: "{project-root}/bmad-custom-src/custom/modules/youra-research/workflows/phase1-targeted-research"
workflow_path: "{installed_path}"

# Step Files (Step-based architecture)
step_files:
  step_00: "{installed_path}/steps/step-00-reference-analysis.md"
  step_01: "{installed_path}/steps/step-01-initialize.md"
  step_02: "{installed_path}/steps/step-02-query-generation.md"
  step_03: "{installed_path}/steps/step-03-archon-search.md"
  step_04: "{installed_path}/steps/step-04-scholar-search.md"
  step_05: "{installed_path}/steps/step-05-exa-search.md"
  step_06: "{installed_path}/steps/step-06-chain-analysis.md"
  step_07: "{installed_path}/steps/step-07-verification.md"
  step_08: "{installed_path}/steps/step-08-gaps-identification.md"
  step_09: "{installed_path}/steps/step-09-final-compilation.md"

# Output files
full_output_file: "{research_output_path}/01_targeted_research_full.md"
default_output_file: "{research_output_path}/01_targeted_research.md"

standalone: false
requires: "phase0-brainstorm"

# Progressive File System (Auto-Resume Support)
progressive_file:
  enabled: true
  placeholder_pattern: "{{UNFILLED:variable_name}}"
  skipped_marker: "*Skipped by user*"
  resume:
    auto_detect: true
    ask_user: false
    show_summary: true
  step_markers:
    step_0: ["reference_paper_analysis"]
    step_1: ["research_question", "primary_research_question", "detailed_questions", "lessons_from_previous_attempts"]
    step_2: ["query_summary", "reference_queries", "brainstorm_queries", "direct_queries"]
    step_3: ["archon_implementations", "archon_patterns", "archon_code_examples"]
    step_4: ["scholar_relevant_papers", "scholar_foundational_papers", "scholar_citation_network"]
    step_5: ["exa_implementations", "exa_components", "exa_tutorials", "exa_code_analysis"]
    step_6: ["research_evolution_path", "concept_integration_map", "cross_reference_matrix"]
    step_7: ["verification_statistics", "mcp_performance", "data_quality_assessment"]
    step_8: ["user_input_recall", "gap1_title", "gap1_current_state", "gap1_missing_piece", "gap1_impact", "gap1_archon_evidence", "gap1_scholar_evidence", "gap1_exa_evidence", "gap2_title", "gap2_archon_evidence", "gap2_scholar_evidence", "gap2_exa_evidence", "gap3_title", "gap3_archon_evidence", "gap3_scholar_evidence", "gap3_exa_evidence", "gap_priority_matrix", "gap_traceability"]
    step_9: ["executive_summary", "key_findings", "preliminary_answer", "phase2_readiness", "next_steps", "processing_time"]

# Post-Step Validation (Step 9 Dual Output Enforcement)
post_step_validation:
  step_09:
    enabled: true
    description: "Validate that both full and compact reports were generated correctly"
    checks:
      - name: "full_report_exists"
        type: "file_exists"
        file: "{research_output_path}/01_targeted_research_full.md"
        required: true
      - name: "compact_report_exists"
        type: "file_exists"
        file: "{research_output_path}/01_targeted_research.md"
        required: true
    on_failure:
      action: "auto_fix"
      auto_fix:
        workflow: "{project-root}/bmad-custom-src/custom/modules/youra-research/workflows/fix-phase1-output.md"

# Pipeline Position
pipeline:
  position: "Phase 1"
  sequence: "Phase 0 → **Phase 1** → Phase 2A-Dialogue → Phase 2B → (2C → 3 → 4) × N → 4.5 → [5] → 6 → 6.5 → 6.5.1"
  inputs:
    - from: "Phase 0 (Brainstorm)"
      files:
        - "00_brainstorm_session.md"
      required: true
  outputs:
    - file: "01_targeted_research.md"
      description: "Compact research report for Phase 2A"
    - file: "01_targeted_research_full.md"
      description: "Full detailed research report"

# MCP Server Requirements
mcp_servers:
  required:
    - name: "Archon"
      purpose: "Past cases and best practices search"
      tools:
        - "mcp__archon__rag_search_knowledge_base"
        - "mcp__archon__rag_search_code_examples"
      mandatory: true
    - name: "Semantic Scholar"
      purpose: "Academic paper search"
      mandatory: true
    - name: "Exa"
      purpose: "GitHub repositories and implementation search"
      mandatory: true
  validation: "Archon, Semantic Scholar, and Exa MUST be available."
