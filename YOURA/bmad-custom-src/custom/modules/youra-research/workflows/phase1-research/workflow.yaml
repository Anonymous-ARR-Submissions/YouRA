# Phase 1: Research Gathering Workflow (Broad Exploration)
name: phase1-research
architecture: "step-file"
description: "Broad systematic data collection for deep learning research. Requires Phase 0 brainstorm output. Focuses on wide exploration without specific reference papers."
author: "Anonymous"
phase_output: "Research data, gaps (Pre-hypothesis, broad approach)"

# Critical variables from config (BMAD v6 Standard)
config_source: "{project-root}/bmad-custom-src/custom/modules/youra-research/module.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
date: system-generated
processing_time: system-generated

# YouRA Module Specific Variables
research_output_path: "{config_source}:research_output_path"

# Optional input from Phase 0 Brainstorm (REQUIRED)
recommended_inputs:
  - brainstorm_session: "{research_output_path}/00_brainstorm_session.md"

# Input/Output
instructions: "{installed_path}/instructions.md"
template: "{installed_path}/template.md"
validation: "{installed_path}/checklist.md"

installed_path: "{project-root}/bmad-custom-src/custom/modules/youra-research/workflows/phase1-research"

# Step-File Architecture (BMAD v6 Modern Workflow)
step_file_architecture:
  enabled: true
  workflow_path: "{installed_path}"
  first_step: "{workflow_path}/steps/step-01-initialize.md"

  # Step sequence mapping
  steps:
    - id: "step-01-initialize"
      file: "steps/step-01-initialize.md"
      description: "Initialize Research Pipeline"
      required: true
    - id: "step-02-query-generation"
      file: "steps/step-02-query-generation.md"
      description: "Question-Based Query Generation"
      required: true
    - id: "step-03-archon-search"
      file: "steps/step-03-archon-search.md"
      description: "Archon Knowledge Base Search"
      required: true
      skill_required: "archon-research"
    - id: "step-04-scholar-search"
      file: "steps/step-04-scholar-search.md"
      description: "Semantic Scholar Paper Search"
      required: true
      skill_required: "scholar-search"
    - id: "step-05-exa-search"
      file: "steps/step-05-exa-search.md"
      description: "Exa GitHub and Additional Resources"
      required: true
      skill_required: "exa-search"
    - id: "step-06-chain-analysis"
      file: "steps/step-06-chain-analysis.md"
      description: "Chain-of-Relations Analysis"
      required: false
    - id: "step-07-verification"
      file: "steps/step-07-verification.md"
      description: "Verification Summary"
      required: false
    - id: "step-08-gaps-identification"
      file: "steps/step-08-gaps-identification.md"
      description: "Research Gaps Identification"
      required: true
    - id: "step-09-final-compilation"
      file: "steps/step-09-final-compilation.md"
      description: "Final Report Compilation"
      required: true

# Output files (used by workflow engine for default file creation)
# Dual output system:
# - default_output_file: Lightweight summary for Phase 2A (500-1000 lines)
# - full_output_file: Complete detailed report for user review (5000-10000 lines)
default_output_file: "{research_output_path}/01_research_data.md"
full_output_file: "{research_output_path}/01_research_data_full.md"

# Research parameters (loaded from Phase 0 Brainstorm session)
# - research_question: Extracted from brainstorm session
# - detailed_question: Optional - extracted if provided
# Note: This workflow does NOT use reference_papers (use phase1-targeted for that)

standalone: false
requires: "phase0-brainstorm"

# Progressive File System (Auto-Resume Support)
progressive_file:
  enabled: true
  placeholder_pattern: "{{UNFILLED:variable_name}}"
  skipped_marker: "*Skipped by user*"

  # Resume behavior
  resume:
    auto_detect: true # Automatically check for existing file on start
    ask_user: false # Do NOT ask user - just resume automatically
    show_summary: true # Show brief summary of completed steps on resume

  # Step to placeholder mapping for resume detection
  step_markers:
    step_1: ["research_topic", "primary_research_question", "detailed_questions"]
    step_2: ["query_generation_summary", "key_insights_queries", "exploration_queries", "direct_decomposition_queries", "query_rationale"]
    step_3: ["archon_implementations", "archon_patterns", "archon_code_examples"]
    step_4: ["scholar_core_papers", "scholar_citation_network"]
    step_5: ["exa_repositories", "exa_additional_resources", "exa_code_analysis"]
    step_6: ["research_evolution_path", "cross_reference_matrix"]
    step_7: ["verification_statistics", "mcp_performance", "data_quality_assessment"]
    step_8: ["gap1_title", "gap1_current_state", "gap1_missing_piece", "gap1_impact", "gap1_archon_evidence", "gap1_scholar_evidence", "gap1_exa_evidence", "gap2_title", "gap2_archon_evidence", "gap2_scholar_evidence", "gap2_exa_evidence", "gap3_title", "gap3_archon_evidence", "gap3_scholar_evidence", "gap3_exa_evidence", "gap_priority_matrix", "evidence_label_summary"]
    step_9: ["executive_summary", "key_findings", "phase2_readiness", "next_steps", "processing_time"]

# Post-Step Validation (Step 9 Dual Output Enforcement)
# Automatically validates and fixes missing compact version BEFORE Phase 2A starts
post_step_validation:
  step_09:
    enabled: true
    description: "Validate that both full and lightweight reports were generated correctly"

    checks:
      - name: "full_report_exists"
        type: "file_exists"
        file: "{research_output_path}/01_research_data_full.md"
        required: true
        error_message: "Full report file missing - Step 9 File 2 not completed"

      - name: "lightweight_report_exists"
        type: "file_exists"
        file: "{research_output_path}/01_research_data.md"
        required: true
        error_message: "Lightweight report file missing - Step 9 File 1 not completed"

      - name: "lightweight_is_smaller"
        type: "file_size_comparison"
        file1: "{research_output_path}/01_research_data.md"
        file2: "{research_output_path}/01_research_data_full.md"
        condition: "file1 < file2"
        error_message: "Lightweight version is not smaller than full version - incorrect format detected"

      - name: "lightweight_has_gaps"
        type: "content_check"
        file: "{research_output_path}/01_research_data.md"
        pattern: "## Research Gaps (CRITICAL for Hypothesis Generation)"
        required: true
        error_message: "Lightweight version missing critical Research Gaps section"

    on_failure:
      action: "auto_fix"
      silent: false # Show progress transparently to user
      skip_confirmation: true # CRITICAL: NO user prompt - automatic execution
      display_message: |
        ⚠️ **Dual Output Validation Failed - Auto-Recovery Starting**

        Step 9 did not generate both required files correctly.
        Automatically starting recovery workflow (no user action needed)...

        **Expected Files:**
        - Full: 01_research_data_full.md
        - Lightweight: 01_research_data.md ❌ (missing or wrong format)

        **Recovery Action:** Generating lightweight version from full report...

      auto_fix:
        workflow: "{project-root}/bmad-custom-src/custom/modules/youra-research/workflows/fix-phase1-research-output.md"
        description: "Automatically generate missing/incorrect lightweight version from full report"
        timeout_minutes: 15

      post_fix_validation:
        re_run_checks: true # Re-validate after auto-fix
        max_retries: 1
        on_retry_failure:
          action: "notify_user"
          message: |
            ⚠️ **Automatic recovery failed after 1 retry.**

            Please check the following files manually:
            - 01_research_data_full.md
            - 01_research_data.md

            Or re-run Step 9 manually with: `/phase1-research --step=09`