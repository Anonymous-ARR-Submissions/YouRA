# Verification State Tracking File
# Auto-generated by Phase 2B | Updated by Phase 2C, Phase 3, Phase 4, Phase 5
# DO NOT EDIT MANUALLY - managed by workflow automation

# ============================================================================
# PIPELINE SECTION
# ============================================================================
# This section provides backward compatibility for older workflows.
# New workflows should use metadata.pipeline_project_id.
# Both locations are checked by all workflows (priority: metadata > pipeline).
pipeline:
  project_id: null # Same as metadata.pipeline_project_id (mirror)
  project_title: null # Full title: "Anonymous Pipeline: {research_topic}"
  research_topic: "{{project_name}}" # Topic part only (without "Anonymous Pipeline: " prefix)
  created_at: "{{timestamp}}"

# Metadata
metadata:
  project_name: "{{project_name}}"
  main_hypothesis_id: "{{main_hypothesis_id}}"
  phase2b_roadmap: "02b_verification_plan.md"
  created_at: "{{timestamp}}"
  last_updated: "{{timestamp}}"
  schema_version: "3.5" # Set by helpers/state_validator.md

  # ========================================================================
  # ARCHON UNIFIED PROJECT MANAGEMENT
  # ========================================================================
  # All hypothesis tasks are managed in ONE Pipeline Project using feature field
  # See: workflows/helpers/archon_hypothesis_tasks.md for implementation details
  pipeline_project_id: null # UUID of the unified Pipeline Project (from Phase 0)

  # Maps hypothesis_id to its parent task_id in Pipeline Project
  # Created in Phase 2B, used in Phase 3/4/6B
  hypothesis_task_mapping: {}
  # Example:
  # h-e1: "task-uuid-1"
  # h-m1: "task-uuid-2"
  # h-m2: "task-uuid-3"

  # ========================================================================
  # PER-HYPOTHESIS PHASE TASK TRACKING
  # ========================================================================
  # Maps hypothesis_id to per-phase Archon task IDs
  # Set by: hypothesis-loop/step-04-loop-start.md
  # Used by: helpers/archon_hypothesis_phase.md
  hypothesis_phase_tasks: {}
  # Example:
  # h-e1:
  # phase_2c: "task-uuid-1"
  # phase_3: "task-uuid-2"
  # phase_4: "task-uuid-3"
  # h-m1:
  # phase_2c: "task-uuid-4"
  # phase_3: "task-uuid-5"
  # phase_4: "task-uuid-6"

  # ========================================================================
  # PIPELINE-LEVEL PHASE TASK IDS
  # ========================================================================
  # Maps pipeline phases to their Archon task IDs (display-friendly keys)
  # Set by: helpers/archon_pipeline_creation.md (create_pipeline_phase_tasks)
  # Used by: helpers/archon_hypothesis_phase.md (sync_pipeline_phase_status)
  pipeline_phase_task_ids: {}
  # Example:
  # "Phase 0": "task-uuid-1"
  # "Phase 1": "task-uuid-2"
  # "Phase 2A": "task-uuid-3"
  # "Phase 2B": "task-uuid-4"
  # "Phase 2C": "task-uuid-5"
  # "Phase 3": "task-uuid-6"
  # "Phase 4": "task-uuid-7"
  # "Phase 5": "task-uuid-8"
  # "Phase 6": "task-uuid-9"
  # "Phase 6.5": "task-uuid-10"
  # "Phase 6.5.1": "task-uuid-11"

# ============================================================================
# MAIN HYPOTHESIS
# ============================================================================
# The overall research hypothesis being validated
# Phase 5 DETERMINES_SUCCESS gate operates at this level
main_hypothesis:
  id: "{{main_hypothesis_id}}"
  title: "{{main_hypothesis_title}}"
  statement: "{{main_hypothesis_statement}}"
  defined_in: "03_refinement.yaml"

  # Controlled variables (from Phase 2A Dialogue)
  controlled_variables:
    dataset: null # e.g., "CIFAR-10", "synthetic"
    model: null # e.g., "ResNet-18", "2-layer MLP"
    optimizer: null # e.g., "SGD", "Adam"
    hyperparameters: {} # LR range, batch size, epochs, seeds

  # Phase 5: Baseline Comparison (DETERMINES_SUCCESS gate)
  baseline_comparison:
    status: "NOT_STARTED" # NOT_STARTED | IN_PROGRESS | COMPLETED | FAILED | SKIPPED

    gate:
      type: "DETERMINES_SUCCESS"
      satisfied: null # true | false (set after Phase 5)
      result: null # PASS | PARTIAL | SKIPPED

    # Selected baseline repository
    selected_baseline:
      name: null # Repository name
      url: null # Repository URL
      method: null # Baseline method name (e.g., "vanilla SGD")

    # Comparison results
    results:
      ours_best_psi: null
      baseline_best_psi: null
      ours_best_lr: null
      baseline_best_lr: null
      performance_gap: null # ours - baseline (positive = we win)
      statistical_significance:
        p_value: null
        cohens_d: null
        significant: null # true if p < 0.05 and cohens_d > 0.5

    # Failure context (populated on PARTIAL)
    failure_context:
      failure_type: null # WORSE_THAN_BASELINE | MARGINAL_LOSS
      gap_percentage: null # Performance gap as percentage
      root_causes: [] # List of identified causes
      lessons_learned: [] # Lessons for Phase 0 brainstorming
      serena_memory_file: null # "phase5_failure_{main_hypothesis_id}.md"

    # Timestamps
    started_at: null
    completed_at: null
    failed_at: null # ISO8601 timestamp on failure (Set by Phase 5 workflow.yaml)
    report_file: null # "05_baseline_comparison.md"

    # Skip tracking (set when pipeline_options.skip_baseline_comparison=true)
    skipped_at: null # ISO8601 timestamp when Phase 5 was skipped
    skip_reason: null # "skip_baseline_comparison=true in module.yaml"

# ============================================================================
# EPISODE TERMINATION
# ============================================================================
# Tracks proper episode termination for benchmark evaluation
# Key differentiator: "We honestly record failures and make termination decisions"
episode:
  status: "ACTIVE" # ACTIVE | COMPLETED | TERMINATED

  # Termination metrics (for benchmark evaluation)
  terminated_properly: false # true = proper gate-based termination
  termination_trigger: null # "DETERMINES_SUCCESS_PASS" | "DETERMINES_SUCCESS_PARTIAL" | "MUST_WORK_FAIL" | etc.

  # Final gate result
  final_gate:
    type: null # MUST_WORK | DETERMINES_SUCCESS
    result: null # PASS | PARTIAL | FAIL
    phase: null # "Phase 4" | "Phase 5"

  # Routing decision (recorded, not executed for benchmarks)
  routing_decision: null # "Phase 6" | "Phase 0" | "Phase 2A-Dialogue"
  routing_reason: null # Why this routing was chosen

  # Timestamps
  started_at: "{{timestamp}}"
  terminated_at: null

  # ========================================================================
  # BENCHMARK METRICS (Core Differentiators for Paper)
  # ========================================================================
  # These metrics distinguish our system from existing AI scientist agents.
  # Key insight: "80% of AI agents fabricate results" (MLR-Bench finding)
  # Our differentiator: We honestly record failures and terminate properly.

  benchmark_metrics:
    # ------------------------------------------------------------------
    # METRIC 1: Failure Recording Rate
    # "Did the system actually record and report failures?"
    # ------------------------------------------------------------------
    failure_recording:
      total_failure_events: 0 # Total failures that occurred
      recorded_failures: 0 # Failures that were properly logged
      failure_recording_rate: null # recorded / total (0.0 ~ 1.0)

      # Breakdown by failure type
      failures_by_type:
        must_work_partial: 0 # Phase 4 MUST_WORK PARTIAL results
        must_work_fail: 0 # Phase 4 MUST_WORK FAIL results
        determines_success_partial: 0 # Phase 5 DETERMINES_SUCCESS PARTIAL
        experiment_error: 0 # Runtime experiment failures
        validation_error: 0 # Code validation failures

      # Evidence of recording (for audit)
      serena_memory_files_created: [] # List of failure memory files
      checkpoint_failure_logs: [] # Checkpoint files with failure info

    # ------------------------------------------------------------------
    # METRIC 2: Proper Termination Rate
    # "Did the system terminate correctly based on gate conditions?"
    # ------------------------------------------------------------------
    termination_quality:
      total_termination_events: 0 # Total episodes that ended
      proper_terminations: 0 # Terminated via gate decision
      improper_terminations: 0 # Terminated without gate (crash, skip, etc.)
      proper_termination_rate: null # proper / total (0.0 ~ 1.0)

      # Termination breakdown
      terminations_by_trigger:
        determines_success_pass: 0 # Phase 5 PASS → Phase 6
        determines_success_partial: 0 # Phase 5 PARTIAL → Phase 0
        must_work_fail: 0 # Phase 4 FAIL → Phase 0
        must_work_partial_routed: 0 # Phase 4 PARTIAL → Phase 2A-Dialogue
        user_interrupt: 0 # User stopped the process
        system_error: 0 # Unhandled exception
        max_retries_exceeded: 0 # Hit retry limit

      # Routing decision quality
      routing_decisions_made: 0 # Total routing decisions
      routing_decisions_correct: 0 # Correct based on gate result
      routing_accuracy: null # correct / made (0.0 ~ 1.0)

    # ------------------------------------------------------------------
    # METRIC 3: Gate Violation Rate
    # "How often did the system violate stated constraints?"
    # ------------------------------------------------------------------
    gate_compliance:
      total_gate_checks: 0 # Total gate evaluations
      gates_passed: 0 # Gates that passed
      gates_violated: 0 # Gates that were violated/bypassed
      gate_violation_rate: null # violated / total (0.0 ~ 1.0)

      # Violation breakdown
      violations_by_type:
        must_work_bypassed: 0 # Continued despite MUST_WORK fail
        determines_success_ignored: 0 # Ignored DETERMINES_SUCCESS result
        prerequisite_skipped: 0 # Skipped required prerequisites
        step_order_violated: 0 # Executed steps out of order
        unattended_mode_broken: 0 # Asked user in UNATTENDED mode

      # Gate evaluation log (for audit)
      gate_evaluation_history: []
      # Each entry:
      # - gate_id: "H-E1_MUST_WORK"
      # phase: "Phase 4"
      # expected_action: "STOP if FAIL"
      # actual_action: "STOPPED"
      # compliant: true
      # timestamp: "2025-12-25T10:00:00"

    # ------------------------------------------------------------------
    # AGGREGATE SCORES (for paper tables)
    # ------------------------------------------------------------------
    aggregate_scores:
      # Primary metrics (0.0 ~ 1.0, higher is better)
      failure_recording_rate: null
      proper_termination_rate: null
      gate_compliance_rate: null # 1.0 - gate_violation_rate

      # Combined score (average of three metrics)
      integrity_score: null # (recording + termination + compliance) / 3

      # Comparison context
      sub_hypotheses_count: 0
      phases_executed: [] # ["Phase 2B", "Phase 2C", ...]
      total_experiment_runs: 0
      total_tokens_used: 0 # For cost comparison if needed

# ============================================================================
# WORKFLOW STATUS
# ============================================================================
workflow:
  status: "ACTIVE" # ACTIVE | STOPPED | ROUTED | COMPLETED | FAILED
  current_phase: "Phase 2B" # Phase 2B | Phase 2C | Phase 3 | Phase 4 | Phase 5 | "Phase 5 Skipped" | "Hypothesis Loop Complete"
  execution_mode: "UNATTENDED" # UNATTENDED | INTERACTIVE
  stop_reason: null # Reason if status = STOPPED
  next_action: "Begin Phase 2C with first READY hypothesis"

  # ========================================================================
  # RUNTIME STATE FIELDS
  # ========================================================================
  # These fields are set by workflow steps during runtime, not at template creation.
  # They track execution context and completion status.

  # Set by: full-pipeline-unattended/instructions.md
  # Purpose: Tells hypothesis-loop which mode it's running in
  execution_source: null # "full-pipeline" | "standalone" (default if null)

  # Set by: hypothesis-loop/step-11-complete.md, step-09-loop-continue.md
  # Purpose: Signals that all sub-hypotheses have been processed (Phase 2C→3→4 complete)
  sub_hypotheses_complete: false

  # Set by: hypothesis-loop/step-11-complete.md
  # Purpose: Timestamp when hypothesis loop finished
  hypothesis_loop_completed_at: null

  # Set by: phase5-baseline-repo-comparison/steps/step-10b-finalize.md
  # Purpose: Timestamp when Phase 5 completed
  phase5_completed_at: null

  # Set by: Phase 4/5 gate processing on routing decision
  # Purpose: Context for routing decisions (Phase 0 or Phase 2A-Dialogue)
  routing:
    target: null # "Phase 0" | "Phase 2A-Dialogue" | null
    reason: null # Why routing was triggered
    source_hypothesis: null # Which hypothesis triggered the routing
    timestamp: null # When routing was decided

  # Failure routing configuration
  failure_routing:
    # Phase 4: MUST_WORK gate (PoC validation)
    phase4_must_work_partial:
      max_attempts: 1 # 1 modification attempt, then Phase 2A-Dialogue
      route_after_max: "Phase 2A-Dialogue"
      serena_memory: "failure_{hypothesis_id}.md"
      note: "Mechanism issue, not fundamental flaw"

    phase4_must_work_fail:
      route_to: "Phase 0" # Fundamental flaw - new direction needed
      serena_memory: "failure_{hypothesis_id}.md"
      note: "PoC shows methodology doesn't work at all"

    # Phase 5: DETERMINES_SUCCESS gate (final validation)
    phase5_determines_success_partial:
      route_to: "Phase 0" # Baseline outperforms - new direction needed
      reason: "Approach fundamentally inferior to baseline"
      serena_memory: "phase5_failure_{hypothesis_id}.md"
      note: "Not just implementation issue - approach is wrong"

    phase5_retry_limit:
      max_retries: 3 # Maximum Phase 5 retry attempts
      route_after_max: "Phase 0"
      stop_pipeline: true

  # Workflow status change history
  status_history: []
  # Example entries:
  # - status: "ACTIVE"
  # phase: "Phase 2B"
  # timestamp: "2025-12-25T10:00:00"
  # trigger: "Pipeline initialized"
  # details: "Generated verification plan with 4 sub-hypotheses"
  #
  # - status: "COMPLETED"
  # phase: "Phase 5"
  # timestamp: "2025-12-25T18:00:00"
  # trigger: "DETERMINES_SUCCESS gate passed"
  # details: "Our method outperformed baseline by 15%"

# ============================================================================
# SUB-HYPOTHESES
# ============================================================================
# Individual verification steps for the main hypothesis
# Types: H-E (Existence), H-M (Mechanism), H-C (Condition)
# Phase 5 handles baseline comparison (H-CP not needed as sub-hypothesis)
sub_hypotheses:
  # Format: hypothesis_id as key
  # Example:
  # h-e1:
  # type: "EXISTENCE"
  # statement: "The phenomenon X exists under conditions Y"
  # status: "READY" # NOT_STARTED | READY | IN_PROGRESS | VALIDATED | BLOCKED | CASCADE_FAILED | CASCADE_SUPERSEDED | SUPERSEDED | FAILED
  #
  # # Initial Status Logic:
  # # - No prerequisites → status: "READY" (can be processed immediately)
  # # - Has prerequisites → status: "NOT_STARTED" (wait for prerequisites)
  #
  # gate:
  # type: "MUST_WORK" # MUST_WORK (required) | SHOULD_WORK (optional)
  # satisfied: null
  # failed_checks: []
  #
  # # Gate Type Guide:
  # # - MUST_WORK: Foundation hypothesis, core mechanisms → Failure blocks Phase 5
  # # - SHOULD_WORK: Alternative mechanisms, conditions → Failure does NOT block Phase 5
  #
  # prerequisites: []
  #
  # # CASCADE STATE FIELDS
  # # Used when parent hypothesis is MODIFIED, FAILED, or SUPERSEDED
  # blocked_by: null # Hypothesis ID that blocked this one
  # blocked_reason: null # Reason for blocking (for debugging)
  # awaiting: null # New hypothesis version to wait for
  # failed_by: null # Hypothesis ID that caused cascade failure
  #
  # # SUPERSEDED FIELDS (nested object)
  # # Set when hypothesis has PARTIAL results but is incompatible with dependents
  # superseded:
  # superseded_by: null # New hypothesis version ID
  # superseded_at: null # ISO timestamp
  # superseded_reason: null # Reason from LLM self-assessment
  # partial_results_preserved: false
  #
  # # Data Setup (Set by Phase 4 step-01a-data-setup.md)
  # data_setup:
  # status: "NOT_STARTED" # NOT_STARTED | COMPLETED
  # dataset:
  # name: null
  # type: null # standard | custom | synthetic
  # cache_path: null
  # verified: false
  # model:
  # name: null
  # pretrained: null
  # cache_path: null
  # verified: false
  # completed_at: null
  #
  # # Phase progression
  # experiment_design:
  # status: "NOT_STARTED"
  # file: null
  # implementation_planning:
  # status: "NOT_STARTED"
  # tier: null # 1 | 2 | 3 (Set by Phase 3 step-09)
  # budget: null # Task budget
  # tasks_file: null # "03_tasks.yaml"
  # task_count: null
  # task_breakdown: # Set by Phase 3 step-09
  # data_preparation: 0
  # environment_setup: 0
  # epic_tasks: 0
  # subtasks: 0
  # failsafe: 0
  # archon_document_ids: # Set by Phase 3 step-08
  # prd: null
  # architecture: null
  # logic: null
  # config: null
  # experiment_design: null
  # files: []
  # validation:
  # status: "NOT_STARTED"
  # result: null # PASS | PARTIAL | FAIL
  # key_findings: []
  #
  # # Version tracking (for modifications)
  # version: 1
  # modification_attempt: 0
  # version_history: []
  #
  # completed: false
  # completed_at: null

# ============================================================================
# GATE VIOLATIONS LOG
# ============================================================================
gate_violations: []
# Example:
# - hypothesis_id: "h-m1"
# gate_type: "MUST_WORK"
# result: "PARTIAL"
# phase: "Phase 4"
# timestamp: "2025-12-25T14:00:00"
# action_taken: "Modification attempted"
# outcome: "MODIFIED" # MODIFIED | FAILED | ROUTED

