# Phase 4 Checkpoint Template
# This file tracks workflow progress for recovery in UNATTENDED mode
# USAGE: This template is loaded by step-01-initialize.md and dynamic values are filled at runtime.
# Placeholders use {{variable}} syntax (same as verification_state_template.yaml).
#
# - Added partial_results.experiment_info (SET by step-04)
# - Added partial_results.gate_info (SET by step-04)
# - Added partial_results.experiment_results (SET by step-05c)
# - Added partial_results.pass_rate (READ by step-06b)
# - Added partial_results.failed_checks (READ by step-06b)
# - Template now loaded at runtime (not inline in step file)
# - Added {{placeholder}} syntax for dynamic values

schema_version: "3.5"

# Hypothesis identification
hypothesis_id: "{{hypothesis_id}}" # e.g., "h-e1", "h-m1"

# Timestamps
created_at: "{{timestamp}}" # When workflow started
updated_at: "{{timestamp}}" # Last update time

# Current position in workflow
current_step: 1 # 1-8 corresponding to step files
current_task_id: null # Task ID being processed (null if between tasks)
current_task_index: 0 # Index into tasks.items[] array

# Step routing control
after_validator_goto: null # "step5" when return_to_step5_after_coder is set
return_reason: null # Reason for returning (e.g., "mock_data_detected", "MOCK_MODEL_DETECTED")

# ═══════════════════════════════════════════════════════════════════════════════
# TASK TRACKING
# Tasks are loaded from 03_tasks.yaml and tracked locally (not in Archon)
# ═══════════════════════════════════════════════════════════════════════════════
tasks:
  # Summary counts (dynamically set from 03_tasks.yaml)
  summary:
    total: "{{task_count}}" # Total tasks from 03_tasks.yaml
    completed: 0 # Tasks in "done" status
    in_progress: 0 # Tasks in "doing" status (should be 0 or 1)
    remaining: "{{task_count}}" # Tasks in "todo" status

  # Full task list with execution state
  # Loaded from 03_tasks.yaml on first run, then tracked here
  items: []
    # Each task entry:
    # - id: "task-001" # Task ID from 03_tasks.yaml
    # title: "Download TGB dataset" # Task title
    # status: "todo" # todo | doing | done | failed
    # output_file: null # Path to generated code file
    # test_file: null # Path to generated test file
    # started_at: null # When task started
    # completed_at: null # When task completed
    # sdd_phases: # SDD phase results
    # TEST: null # passed | base_exists | weak_tests_warning
    # IMPL: null # passed | failed | skipped
    # VERIFY: null # passed | rolled_back | skipped
    # retry_count: 0 # Number of retry attempts
    # priority: 0 # Priority score (higher = processed first)
    # complexity: null # Complexity score from Phase 3 analysis
    # epic: null # Parent epic name (e.g., "Data Pipeline")
    # description: null # Task description
    # feature_tag: null # Category: data-preparation, model, training, etc.
    # reference_files:
    # architecture: null # "03_architecture.md#Epic-E1" - Epic definition
    # logic: null # "03_logic.md#PMLP_API" - API signatures
    # config: null # "03_config.md#model_config" - Hyperparameters

# Task execution history
task_history: []
  # Each entry:
  # - task_id: "{uuid}"
  # status: "done|failed|skipped"
  # attempts: 1
  # completed_at: "{ISO8601}"
  # issues: [] # List of issues if failed

# Loop tracking
coder_validator_cycles: 0 # Current cycle count (max 5)

# Per-task retry counts (max 3 per task)
task_retry_counts: {}
  # "{task-id}": count

# Partial results
partial_results:
  code_files_generated: [] # List of generated file paths
  test_files_generated: [] # List of generated test file paths (Task-based)
  tests_passed: false # Whether all pytest tests passed
  validation_passed: false # Whether last validation passed
  experiment_status: "pending" # pending|running|completed|skipped
  experiment_option: null # auto|manual|load|skip (after Step 4)
  experiment_results_path: null # Path to results file (if load mode)
  gate_result: null # PASS|FAIL|INCOMPLETE|SKIPPED (after Step 6)
  gate_type: null # MUST_WORK|SHOULD_WORK|DETERMINES_SUCCESS
  experiment_info: null # Experiment config info (epochs, lr, batch_size, etc.) - SET by step-04
  gate_info: null # Gate configuration info (type, criteria) - SET by step-04
  experiment_results: null # Full experiment results object - SET by step-05c
  pass_rate: null # 0.0 ~ 1.0 - READ by step-06b for LLM assessment
  failed_checks: [] # List of failed validation checks - READ by step-06b
  # Completion blocking (step-08)
  completion_blocked: false
  completion_blocked_reason: null

# Task-to-Test mapping (tracks which tasks have tests)
task_test_mapping: {}
  # "{task-id}": "test_file_path"

# ═══════════════════════════════════════════════════════════════════════════════
# SDD METRICS
# Track Specification-Driven Development compliance and metrics
# ═══════════════════════════════════════════════════════════════════════════════
sdd_metrics:
  # Aggregate counters
  tasks_completed: 0 # Total tasks that went through SDD cycle
  sdd_compliant_tasks: 0 # Tasks that followed SDD correctly

  # TEST Phase metrics (Pre-implementation check)
  test_attempts: 0 # Total TEST phase attempts across all tasks
  pre_impl_checks_passed: 0 # Pre-impl checks that confirmed module doesn't exist
  weak_tests_detected: 0 # Times tests passed before implementation (unexpected)
  pre_impl_warnings: [] # Task IDs with pre-impl warnings

  # IMPL Phase metrics
  impl_phases_passed: 0 # IMPL phases completed successfully
  impl_phases_failed: 0 # IMPL phases that failed after max attempts
  total_impl_attempts: 0 # Total attempts across all IMPL phases

  # VERIFY Phase metrics
  verify_phases_passed: 0 # VERIFY phases completed successfully
  verify_rollbacks: 0 # Times polish was rolled back due to spec compliance issues

  # SDD Order Verification
  sdd_order_violations: 0 # Times implementation was created before test (violation)

  # Final spec compliance gate
  final_test_failures: 0 # Times final pytest check failed before review transition

  # Per-task SDD status (detailed tracking)
  task_sdd_status: {}

# SDD Phase summary per task (simplified view)
sdd_phases: {}

# Error tracking
last_error:
  step: null # Step number where error occurred
  task_id: null # Task ID if error was task-specific
  message: null # Error message
  timestamp: null # When error occurred

# Step 5 Error Escalation
error_escalation:
  quick_fix_attempts: 0 # Current quick fix attempt count (max 3)
  step2_retries: 0 # Step 2 escalation count (max 1)
  error_history: [] # List of error objects
  tasks_created: [] # Archon Task IDs created for errors

# Step 5 → Step 2 Return Flag
return_to_step5_after_coder: false # If true, return to Step 5 after Coder-Validator loop
step5_error_context: null # Error info that triggered escalation

# Execution mode
unattended_mode: "{{unattended_mode}}" # Whether running in UNATTENDED (fully automatic) mode

# Gate action (set in Step 6 based on gate result)
gate_action: null # null | "STOP_AFTER_REPORT" | "CONTINUE_WITH_WARNING"

# Mechanism verification (Step 6 - Gate Processing)
mechanism_verification: null # Result of hypothesis mechanism check

# ═══════════════════════════════════════════════════════════════════════════════
# REFLECTION AND ROUTING (step-06, step-06b)
# Tracks reflection decisions and routing outcomes
# ═══════════════════════════════════════════════════════════════════════════════
reflection_pending: false # Whether reflection is needed
reflection_outcome: null # SELF_MODIFY | ROUTED_TO_PHASE_2A | ROUTED_TO_PHASE_0 | FAILED | LIMITATION_RECORDED
reflection_type: null # self_recovery | llm_assessment_should_work
reflection_may_route: false # Whether reflection can trigger routing
next_step_after_report: null # Step file to execute after report generation
route_to: null # Target phase for routing (Phase 0, Phase 2A, etc.)
new_hypothesis_id: null # New hypothesis ID if created (e.g., "H-E1-v2")
superseded_hypothesis_id: null # ID of superseded hypothesis

# ═══════════════════════════════════════════════════════════════════════════════
# SHOULD_WORK GATE TRACKING (step-06)
# Fields for SHOULD_WORK gate self-recovery and LLM assessment
# ═══════════════════════════════════════════════════════════════════════════════
should_work_retry_count: 0 # Self-recovery attempt count (max 3)
should_work_failed: false # Whether SHOULD_WORK gate failed after max retries
should_work_modification: null # Modification details for SHOULD_WORK retry
should_work_limitation_recorded: false # Whether limitation was recorded
limitation_note: null # Note describing the limitation
allow_phase2c_route: false # Whether routing to Phase 2C is allowed

# Modification attempt tracking (used by checkpoint_helpers)
modification_attempt: 0 # Current modification attempt number

# ═══════════════════════════════════════════════════════════════════════════════
# EXPERIMENT EXECUTION (step-05a/b/c)
# Tracks experiment execution state and validation results
# ═══════════════════════════════════════════════════════════════════════════════

# Dry Run / Sanity Check (Step 4)
dry_run:
  status: "pending" # pending, running, passed, failed
  retry_count: 0 # Number of retry attempts (max 3)
  error: null # Error message if failed
  completed_at: null # Timestamp when passed
  metrics: null # Basic metrics from dry run (e.g., loss value)
  config:
    epochs: 1
    data_subset: 0.01 # 1% of data
    seed: 0
    lr: null # Set from experiment config

# Pre-mock check (Step 4)
pre_mock_check: null # Result of pre-execution mock check

# Dataset verification (Step 5a)
dataset_verification: null # Dataset verification result
mock_data_check: null # Mock data check result
dataset_usage_verification: null # Dataset usage verification result

# Execution plan (Step 5b)
execution_plan: null # Experiment execution plan details
experiment_pid: null # Process ID of running experiment
experiment_started_at: null # Timestamp when experiment started

# Smoke Test (Step 5b/5c)
smoke_test_completed: false # Whether smoke test completed
smoke_test_results: null # Smoke test results
  # epoch_reached: null
  # loss_value: null
  # duration_seconds: null

# Post-validation (Step 5c)
mock_data_status: null # Mock data detection status
reality_check_status: null # Reality check status
full_experiment_completed: false # Whether full experiment completed

# LLM-Based Verification (Step 5a/5c) - Simplified 
llm_verification:
  mock_data_detected: false # Whether mock/synthetic data was found
  mock_model_detected: false # Whether mock model was detected
  task_completion_verified: false # Whether all tasks are complete

mock_data_retries: 0 # Number of re-executions due to mock data (max 3)
mock_model_retries: 0 # Number of re-executions due to mock model (max 3)
mock_fix_required: false # Flag for Step 2 to know context

# Training Sufficiency (Step 5c Section 3.7)
training_sufficiency_retries: 0 # Number of re-executions due to insufficient training (max 3)
training_sufficiency_status: null # PASSED | BLOCKED_MAX_RETRIES
training_sufficiency_blocked: false # Whether blocked due to max retries

# ═══════════════════════════════════════════════════════════════════════════════
# ARCHON OPERATIONS (step-06b, step-08)
# Deferred Archon operations executed after report generation
# ═══════════════════════════════════════════════════════════════════════════════
archon_operations_pending: false # Whether deferred Archon operations are pending
archon_operations_context: {} # Context for deferred operations
  # reflection_outcome: null
  # hypothesis_id: null
  # hypothesis_task_id: null
  # pipeline_project_id: null
  # new_hypothesis_id: null
  # failure_reason: null
  # modification_attempt: 0
  # dependents: []
archon_operations_completed: false # Whether deferred operations completed
archon_operations_completed_at: null # Timestamp of completion

# ═══════════════════════════════════════════════════════════════════════════════
# SYNC AND FINALIZATION (checkpoint_helpers, step-08)
# State synchronization between checkpoint and verification_state
# ═══════════════════════════════════════════════════════════════════════════════
hypothesis_validated: false # Whether hypothesis was validated (PASS/COMPLETED)
hypothesis_failed: false # Whether hypothesis failed (FAILED)
hypothesis_superseded: false

synced_from_verification_state: {} # Sync info from verification_state
  # hypothesis_status: null
  # gate_type: null
  # gate_satisfied: null
  # validation_status: null
  # synced_at: null

finalization: {} # Gate finalization info
  # gate_result: null
  # gate_type: null
  # tasks_finalized: 0
  # finalized_at: null

# ═══════════════════════════════════════════════════════════════════════════════
# ARCHON CONNECTION
# Pipeline and task tracking in Archon
# ═══════════════════════════════════════════════════════════════════════════════
archon:
  project_id: "{{pipeline_project_id}}" # Pipeline Project UUID
  hypothesis_task_id: "{{hypothesis_task_id}}" # Hypothesis Task UUID
  connected: true # Whether connection verified
  # Hypothesis task status updates (step-06)
  hypothesis_task_updated: false # Whether hypothesis task was updated in Archon
  hypothesis_task_status: null # Current status of hypothesis task in Archon

# ═══════════════════════════════════════════════════════════════════════════════
# CONDA ENVIRONMENT
# ═══════════════════════════════════════════════════════════════════════════════
conda:
  env_name: "{{conda_env_name}}" # Environment name, e.g., "youra-h-e1"
  conda_path: "{{conda_path}}" # Full path to conda installation
  python_version: "3.10" # Python version (fixed)
  created: true # Whether environment was created successfully

# ═══════════════════════════════════════════════════════════════════════════════
# GPU DETECTION
# ═══════════════════════════════════════════════════════════════════════════════
gpu:
  available: "{{gpu_available}}" # Whether GPU is available
  info: "{{gpu_info}}" # GPU info string
  count: "{{gpu_count}}" # Number of GPUs
  pytorch_cuda_needed: "{{pytorch_cuda_needed}}" # Whether PyTorch CUDA needs to be installed
  auto_execute: "{{gpu_available}}" # Whether to auto-execute experiment

# GPU Utilization Tracking (experiment monitoring)
gpu_utilization: null # GPU utilization during experiment
  # detected: null # Detected utilization percentage
  # status: null # normal | underutilized | overutilized

# ═══════════════════════════════════════════════════════════════════════════════
# DATA SETUP (Step 1a)
# ═══════════════════════════════════════════════════════════════════════════════
data_setup:
  status: "pending" # pending | completed | failed | blocked
  completed_at: null # Timestamp when completed
  error: null # Error message if failed
  manual_action_required: false # Whether manual intervention needed
  instructions: null # Manual action instructions (when blocked)

  dataset:
    name: null # Dataset name from 02c
    type: null # standard | custom | synthetic
    source: null # torchvision | huggingface | url | local
    path: null # Path in hypothesis folder
    cache_path: null # Path in shared cache
    verified: false # Whether verification passed
    note: null # Additional notes

  model:
    name: null # Model name from 02c
    pretrained: false # Whether pretrained model is used
    source: null # torchvision | huggingface | timm | url
    path: null # Path in hypothesis folder
    cache_path: null # Path in shared cache
    verified: false # Whether verification passed

  packages_installed: [] # List of installed packages

# ═══════════════════════════════════════════════════════════════════════════════
# INCREMENTAL HYPOTHESIS (Step 1)
# For hypotheses that build on previous hypothesis code
# ═══════════════════════════════════════════════════════════════════════════════
incremental:
  hypothesis_type: "{{hypothesis_type}}" # FOUNDATION | INCREMENTAL
  base_hypothesis_id: "{{base_hypothesis_id}}" # First prerequisite ID (if INCREMENTAL), null if FOUNDATION
  base_code_folder: "{{base_code_folder}}" # Path to base hypothesis code folder, null if FOUNDATION
  code_copied: "{{code_copied}}" # Whether code was copied from base
  copied_files: "{{copied_files}}" # List of copied files

# ═══════════════════════════════════════════════════════════════════════════════
# FIGURES (Step 7 - Report Generation)
# Generated figures for validation report
# ═══════════════════════════════════════════════════════════════════════════════
figures:
  generated: false # Whether figures were generated
  folder: null # Path to figures folder
  files: [] # List of generated figure files
  generation_method: null # LLM-autonomous | template-based
  generated_at: null # Timestamp of generation

# ═══════════════════════════════════════════════════════════════════════════════
# EXPERIMENT LOG
# ═══════════════════════════════════════════════════════════════════════════════
experiment_log:
  path: "{{hypothesis_folder}}/code/experiment.log" # Path to experiment.log file
  mandatory: true # Whether experiment log is mandatory

# ═══════════════════════════════════════════════════════════════════════════════
# SERENA MEMORY (Cross-phase persistence)
# Tracks Serena Memory operations for failure/pivot records
# ═══════════════════════════════════════════════════════════════════════════════
serena_memory:
  memory_written: false # Whether memory was written
  failure_memory_file: null # Path to failure record (e.g., "failure_h-e1.md")
  pivot_memory_file: null # Path to pivot record (e.g., "pivot_h-e1_h-e1-v2.md")
  written_at: null # Timestamp of memory write
