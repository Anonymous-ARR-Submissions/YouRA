# Phase 4: PoC Implementation & Validation Workflow (PoC-Focused)
name: phase4-coding
architecture: "step-file"
description: "PoC-focused implementation. Proves methodology has effect (Does it work?)."
author: "Anonymous"
phase_output: "PoC validated code + 04_validation.md"

# - Gate changed from MUST_PASS/DETERMINES_SUCCESS to MUST_WORK (functionality verification)
# - Experiment scope: Smoke test level (reduced epochs/seeds)
# - Baseline comparison removed (handled in Phase 5)
# - Focus: "Does the methodology work?" not "How well does it perform?"

# Critical variables from config (BMAD v6 Standard)
config_source: "{project-root}/bmad-custom-src/custom/modules/youra-research/module.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
date: system-generated

# YouRA Module Specific Variables
research_output_path: "{config_source}:research_output_path"
research_folder: "{research_output_path}/youra_research"
verification_state_file: "{research_folder}/verification_state.yaml"

# Module path and component files
installed_path: "{project-root}/bmad-custom-src/custom/modules/youra-research/workflows/phase4-coding"
validation: "{installed_path}/checklist.md"
steps_path: "{installed_path}/steps"

# Step-file architecture (modular, just-in-time loading)
first_step: "{installed_path}/steps/step-01-initialize.md"

# Current hypothesis (user input)
hypothesis_id: "{{user_input}}"
hypothesis_id_lower: "{{hypothesis_id|lower}}"

# Input from Phase 3 (required) - hypothesis-specific folder
hypothesis_folder: "{research_folder}/{hypothesis_id_lower}"
inputs:
  prd_file: "{hypothesis_folder}/03_prd.md"
  architecture_file: "{hypothesis_folder}/03_architecture.md"
  logic_file: "{hypothesis_folder}/03_logic.md"
  config_file: "{hypothesis_folder}/03_config.md"
  experiment_brief: "{hypothesis_folder}/02c_experiment_brief.md"

# Output configuration
outputs:
  validation_report: "{hypothesis_folder}/04_validation.md"
  checkpoint_file: "{hypothesis_folder}/04_checkpoint.yaml"
  code_folder: "{hypothesis_folder}/code"
  experiment_results: "{hypothesis_folder}/experiment_results.json"
  results_csv: "{hypothesis_folder}/code/outputs/results.csv"
  figures_folder: "{hypothesis_folder}/figures"

# Step Files
step_files:
  step_01: "{steps_path}/step-01-initialize.md"
  step_01a: "{steps_path}/step-01a-data-setup.md"
  step_01b: "{steps_path}/step-01b-continue.md"
  step_02: "{steps_path}/step-02-coder-loop.md"
  step_03: "{steps_path}/step-03-validator.md"
  step_04: "{steps_path}/step-04-experiment-confirm.md"
  step_05a: "{steps_path}/step-05a-pre-validation.md"
  step_05b: "{steps_path}/step-05b-execution.md"
  step_05c: "{steps_path}/step-05c-post-validation.md"
  step_06: "{steps_path}/step-06-gate-processing.md"
  step_06b: "{steps_path}/step-06b-reflection.md"
  step_07: "{steps_path}/step-07-report-generation.md"
  step_08: "{steps_path}/step-08-completion.md"

standalone: false # Requires Phase 3 completion
requires: "phase3-implementation-planning"

# Pipeline Position & Connections
pipeline:
  position: "Phase 4"
  sequence: "Phase 0 → 1 → 2A → 2B → (2C → 3 → **Phase 4**) × N → 4.5 → [5] → 6 → 6.5 → 6.5.1"

  # Inputs from previous phases
  inputs:
    - from: "Phase 3 (Implementation Planning)"
      files:
        - "03_prd.md"
        - "03_architecture.md"
        - "03_logic.md"
        - "03_config.md"
        - "02c_experiment_brief.md"
      required: true
      description: "Implementation plans and experiment specification"

    - from: "Archon"
      type: "step-level-tasks"
      required: true
      description: "Step-Level Tasks (4-01, 4-02, etc.) for workflow progress tracking. Implementation tasks tracked locally in 04_checkpoint.yaml"

  # Outputs for next phase
  outputs:
    - file: "04_validation.md"
      description: "Validation report with results"
      used_by: "Phase 5 (Reporting), Phase 6 (Paper Writing)"

    - file: "04_checkpoint.yaml"
      description: "Checkpoint for recovery"
      used_by: "Phase 4 (Resume)"

    - folder: "code/"
      description: "Generated implementation code"
      used_by: "Phase 5 (Baseline Comparison)"

    - file: "experiment_results.json"
      description: "Structured experiment results (metrics, training data)"
      used_by: "Phase 5 (Input), Phase 6 (Paper Writing)"

    - file: "code/outputs/results.csv"
      description: "Raw experimental data (per-epoch/seed metrics)"
      used_by: "Phase 5 (Baseline Comparison)"

    - folder: "figures/"
      description: "LLM-generated figures from experiment data"
      used_by: "Phase 6 (Paper Writing)"

# Multi-Agent Design
agents:
  coder:
    execution_mode: "Main Session"
    purpose: "Cross-task code generation with context"
    task_flow: "todo -> doing -> review"

  validator:
    execution_mode: "Sub-Agent"
    purpose: "Structured validation with checklist"
    definition: "{installed_path}/agents/validator-agent.md"
    task_flow: "review -> done (pass) OR review -> todo (fail)"

# Coder-Validator Loop Configuration
coder_validator_loop:
  max_cycles: 5 # Standard limit for Coder-Validator loop
  task_tracking:
    implementation_tasks: "04_checkpoint.yaml (Local)" # 
    step_level_tasks: "Archon (4-01, 4-02, 4-03, etc.)"
    note: "Implementation tasks (code modules) tracked locally. Step-Level tasks (workflow progress) in Archon."
  flow:
    - "Coder generates code per Local checkpoint task"
    - "All tasks reach 'review' status (in Local checkpoint)"
    - "Validator validates code (PoC level)"
    - "Pass: All tasks to 'done' -> Exit loop"
    - "Fail: Failed tasks to 'todo' -> Repeat"
  poc_focus:
    - "Verify code runs without errors"
    - "Verify mechanism is implemented correctly"
    - "Verify basic metrics can be measured"
    - "NOT: Full performance validation (deferred to Phase 5)"

# Incremental Hypothesis Support
incremental_support:
  auto_detection: true
  detection_source: "verification_state.yaml -> prerequisites"
  behavior:
    foundation: "No code copy, start fresh"
    incremental: "Auto-copy prerequisite code/, modify for mechanism"

# Progressive File System (Auto-Resume Support)
progressive_file:
  enabled: true
  checkpoint_file: "{hypothesis_folder}/04_checkpoint.yaml"

  resume:
    auto_detect: true
    ask_user: false
    show_summary: true
    # State persistence via 04_checkpoint.yaml (not Serena memory)

# MCP Server Requirements
mcp_servers:
  required:
    - name: "Archon"
      purpose: "Step-Level Task progress (4-01 → 4-02 → ...) + Knowledge Base search"
      note: ": Implementation tasks tracked locally in 04_checkpoint.yaml"
      tools:
        - "mcp__archon__find_tasks"
        - "mcp__archon__manage_task"
        - "mcp__archon__rag_search_knowledge_base"
        - "mcp__archon__rag_search_code_examples"
      mandatory: true

    - name: "Serena"
      purpose: "Code analysis, symbol manipulation"
      tools:
        - "mcp__serena__get_symbols_overview"
        - "mcp__serena__find_symbol"
        - "mcp__serena__search_for_pattern"
        - "mcp__serena__replace_symbol_body"
        - "mcp__serena__insert_after_symbol"
      mandatory: true

  fallback:
    - name: "Exa"
      purpose: "PyTorch patterns, GitHub examples, latest documentation"
      tools:
        - "mcp__exa__get_code_context_exa"
        - "mcp__exa__web_search_exa"
      trigger: "Archon KB returns insufficient results"

  validation: "Archon and Serena MUST be available. Exa as fallback."

# Error Recovery Configuration
error_recovery:
  checkpoint:
    save_after_each_task: true
    max_retry_attempts: 3

  coder_validator:
    max_cycles: 5

  experiment_execution:
    quick_fix_attempts: 3
    step2_escalation: 1

  recovery_options:
    - "Automatic: Detect checkpoint on restart"
    - "Manual: User inspects and modifies checkpoint"
    - "Reset: Delete checkpoint to start fresh"
    - "Error Escalation: Step 5 errors escalate to Coder-Validator loop"

# Gate Types
# NOTE: Phase 4 uses simplified MUST_WORK gate for PoC validation
# DETERMINES_SUCCESS moved to Phase 5 (Baseline Comparison)
gate_types:
  MUST_WORK:
    description: "PoC validation - does the methodology work?"
    criteria:
      - "Code executes without errors"
      - "Mechanism is correctly implemented"
      - "Metrics can be measured"
    on_failure: "Return to Phase 2A for hypothesis redesign"
    on_success: "Proceed to Phase 5 for baseline comparison"
  SHOULD_WORK:
    description: "Optional validation - nice to have"
    on_failure: "Continue with limitation note"
  # DETERMINES_SUCCESS removed - moved to Phase 5

# Quality Validation Criteria
quality_criteria:
  code_generated:
    check: "All Local checkpoint tasks have corresponding code files"
    fail_action: "Re-run Coder loop"

  tests_generated:
    check: "test_*.py files exist for each task"
    fail_action: "Generate missing test files"

  validation_passed:
    check: "Validator approved all tasks"
    fail_action: "Re-run Coder-Validator loop"

  experiment_executed:
    check: "Experiment ran successfully"
    fail_action: "Apply Quick Fix or escalate"

# Output Summary Structure
output_summary:
  files_created:
    - "04_validation.md"
    - "04_checkpoint.yaml"
    - "experiment_results.json"
    - "code/**/*.py"
    - "code/outputs/results.csv"
    - "figures/*.png"

  code_structure:
    - "code/config/"
    - "code/data/"
    - "code/models/"
    - "code/train/"
    - "code/eval/"
    - "code/analysis/"
    - "code/tests/"
    - "code/run_experiment.py"

  ready_for_phase_5:
    - "Validation report documents results"
    - "Code folder contains working implementation"
    - "Experiment results ready for analysis"
