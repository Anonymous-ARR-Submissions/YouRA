# Phase 6.5.1: Overleaf LaTeX + PDF Generation
name: phase651-overleaf
architecture: "inline"
description: "Convert final reviewed paper to Overleaf-compilable LaTeX project and compile to PDF. Phase 0 → ... → 6.5 → 6.5.1"
author: "Anonymous"
version: "1.0"
phase_output: "Overleaf LaTeX project with compiled PDF"

# Variables
variables:
  project_root: "${PROJECT_ROOT}"
  research_folder: "${RESEARCH_FOLDER}"
  workflow_path: "{project_root}/bmad-custom-src/custom/modules/youra-research/workflows/phase651-overleaf"

  # Input files (from Phase 6 / 6.5)
  paper_final: "{research_folder}/paper/06_paper_final.md"
  references_bib: "{research_folder}/paper/06_references.bib"
  figures_folder: "{research_folder}/paper/figures"

  # Template
  template_folder: "{project_root}/bmad-custom-src/custom/modules/youra-research/workflows/phase6-paper-writing/templates/overleaf"

  # Output
  overleaf_folder: "{research_folder}/paper/overleaf"
  output_pdf: "{overleaf_folder}/main.pdf"

# Input requirements
inputs:
  required:
    - file: "{paper_final}"
      description: "Final reviewed paper from Phase 6.5"
      check: "file_exists"
  recommended:
    - file: "{references_bib}"
      description: "BibTeX references"
      check: "file_exists"
    - file: "{figures_folder}"
      description: "Paper figures"
      check: "directory_exists"

# Output specifications
outputs:
  primary:
    - file: "{overleaf_folder}"
      description: "Complete Overleaf-compilable LaTeX project"
      format: "directory"
    - file: "{output_pdf}"
      description: "Compiled PDF paper"
      format: "pdf"
  structure:
    overleaf_folder:
      - "main.tex"
      - "references.bib"
      - "sections/*.tex (9 files)"
      - "figures/*"
      - "output.pdf"
      - "README.md"

# Execution
execution_mode:
  default: "unattended"
  skip_confirmations: true

standalone: true

# Steps
steps:
  - id: "step-01"
    name: "Initialize"
    description: "Create overleaf/ folder structure, validate inputs, check LaTeX toolchain"
    tasks:
      - "Validate 06_paper_final.md exists"
      - "Create overleaf/ folder with sections/ and figures/ subdirs"
      - "Check pdflatex and bibtex availability"
      - "Locate or note ICML 2025 style files"

  - id: "step-02"
    name: "Markdown to LaTeX Conversion"
    description: "Split 06_paper_final.md into sections and convert each to LaTeX"
    tasks:
      - "Parse paper into 8 sections (abstract through conclusion)"
      - "Convert each section from Markdown to LaTeX format"
      - "Escape special characters (%, &, #, _, {, })"
      - "Convert tables to booktabs format"
      - "Convert figure references to LaTeX figure environments"
      - "Convert citations [Author, Year] to \\cite{key}"
      - "Write 9 .tex files to overleaf/sections/"

  - id: "step-03"
    name: "Assemble Project"
    description: "Generate main.tex from template, copy figures and references"
    tasks:
      - "Copy main.tex template and replace placeholder tokens"
      - "Copy 06_references.bib to overleaf/references.bib"
      - "Copy all figures from paper/figures/ to overleaf/figures/"
      - "Generate README.md with compilation instructions"

  - id: "step-04"
    name: "Compile and Verify"
    description: "Run pdflatex + bibtex to produce PDF, verify output"
    tasks:
      - "Run: pdflatex main.tex (first pass)"
      - "Run: bibtex main"
      - "Run: pdflatex main.tex (resolve references)"
      - "Run: pdflatex main.tex (final pass)"
      - "Check for compilation errors, attempt fixes (max 3 retries)"
      - "Verify output.pdf exists and is non-empty"
      - "Update verification_state.yaml"
      - "Create .phase_state.json (SUCCESS/ERROR)"

# Error handling
error_handling:
  missing_style_file:
    action: "warn_and_continue"
    message: "ICML style files not found. LaTeX project created but PDF compilation may fail."
  compilation_failure:
    action: "retry_with_fix"
    max_retries: 3
    message: "pdflatex compilation failed. Analyzing log for errors."
  missing_figures:
    action: "warn_and_continue"
    message: "Some figures missing. Compilation will proceed with placeholders."
