# Phase 2B Planning Workflow Configuration
name: 'phase2b-planning'
description: 'Creates PoC verification roadmap to prove methodology effectiveness. Sub-hypotheses (2-6) without H-CP. Baseline comparison deferred to Phase 5.'
author: "Anonymous"
architecture: 'step-file' # BMAD Standard: Step-file architecture for modular execution

# Critical variables from config (BMAD v6 Standard)
#
# CONFIG_SOURCE PATTERN DOCUMENTATION (YouRA Research Module)
# ============================================================
# This workflow uses a config_source reference pattern:
# '{config_source}:variable_name' → resolves to value from config file
#
# Pattern: '{config_source}:output_folder'
# Resolves: Read 'output_folder' from the config_source file
#
# Equivalent BMAD Standard:
# config_source pattern →  Standard BMAD
# ─────────────────────────────────────────
# '{config_source}:var' →  '{var}' (direct variable reference)
#
# Rationale:
# - Explicit config file reference for clarity
# - Supports module-specific config isolation
# - Enables cross-module config inheritance
# - Self-documenting variable source
#
# Workflow Engine Behavior:
# 1. Load config_source file
# 2. Parse '{config_source}:var' patterns
# 3. Replace with actual values from config
#
# This is a DOCUMENTED EXTENSION to standard BMAD variable patterns.
# ============================================================
#
config_source: '{project-root}/bmad-custom-src/custom/modules/youra-research/module.yaml'
output_folder: '{config_source}:output_folder'
user_name: '{config_source}:user_name'
communication_language: '{config_source}:communication_language'
date: system-generated

# YouRA Module Specific Variables
research_output_path: "{config_source}:research_output_path"

# Input from Phase 2A Dialogue
input_file_patterns:
  phase2a_dialogue_output:
    primary: '{research_output_path}/03_refinement.yaml'
    synthesis: '{research_output_path}/02_synthesis.yaml'
    round_table: '{research_output_path}/01_round_table/final_opinions.yaml'
    load_strategy: 'FULL_LOAD'
    description: 'Phase 2A Dialogue output with validated hypothesis, variables (IV/DV/CV), H0, and clarity verification'

# Research scope configuration
research_scope:
  accepts_established_baseline: true # Can exclude already-validated assumptions
  incremental_mode: true # Focus on NEW mechanisms only (vs. comprehensive from-scratch)
  default_mode: 'incremental' # 'incremental' or 'comprehensive'

# Dynamic Hypothesis Configuration
# NOTE: H-CP (Comparison) removed - baseline comparison handled in Phase 5
hypothesis_config:
  # Hypothesis count range (without H-CP)
  min_hypotheses: 2 # Minimum: H-E1, H-M(integrated)
  max_hypotheses: 6 # Maximum: H-E1-2, H-M1-N, H-C1-2
  default_hypotheses: 4 # Default when Phase 2A has 3-step causal chain (H-E1, H-M1, H-M2, H-M3)

  # Dynamic detection from Phase 2A
  dynamic_detection:
    enabled: true
    causal_chain_length: 'auto' # Detect from Phase 2A causal_steps count
    existence_count: 'auto' # Detect from Phase 2A SH count
    condition_hypotheses: 'optional' # 'auto', 'optional', 'skip'
    # comparison_count removed - Phase 5 handles baseline comparison

  # Hypothesis types (H-CP removed)
  types:
    existence:
      min: 1
      max: 2
      prefix: 'H-E'
      purpose: 'Validate phenomenon exists'
    mechanism:
      min: 1 # Can be integrated as single H-M
      max: 5 # For longer causal chains
      prefix: 'H-M'
      purpose: 'Test causal chain steps'
    condition:
      min: 0 # Optional
      max: 2
      prefix: 'H-C'
      purpose: 'Boundary conditions (optional)'
    # comparison type removed - Phase 5 handles baseline comparison

# Phase 4/5 Role Clarification
phase_roles:
  phase4:
    purpose: 'PoC Verification'
    goal: 'Prove methodology has effect (Does it work?)'
    gate_type: 'MUST_WORK'
    scope: 'Smoke test level, verify mechanism works'
  phase5:
    purpose: 'Baseline Comparison'
    goal: 'Compare against baseline (How much better?)'
    gate_type: 'DETERMINES_SUCCESS'
    scope: 'Full-scale experiment, Ours vs Baseline'

# Module path and component files
installed_path: '{project-root}/bmad-custom-src/custom/modules/youra-research/workflows/phase2b-planning'
template: '{installed_path}/template.md'
instructions: '{installed_path}/workflow.md'
validation: '{installed_path}/checklist.md'

# Output configuration
default_output_file: '{research_output_path}/02b_verification_plan.md'
# Note: Visualization (DAG + Gantt) is now integrated into main file (Section 5)
# Note: Per-hypothesis context files (02b_context_H-*.md) are generated JIT by Phase 2C

# Invocation control
standalone: true

# Step Files (Step-based architecture)
step_files:
  step_00: "{installed_path}/steps/step-00-init-environment.md"
  step_01: "{installed_path}/steps/step-01-init-parsing.md"
  step_02: "{installed_path}/steps/step-02-input-hypothesis.md"
  step_03: "{installed_path}/steps/step-03-hypothesis-generation.md"
  step_04: "{installed_path}/steps/step-04-hypothesis-inventory.md"
  step_05: "{installed_path}/steps/step-05-risk-analysis.md"
  step_06: "{installed_path}/steps/step-06-dependency-graph.md"
  step_07: "{installed_path}/steps/step-07-timeline-planning.md"
  step_08: "{installed_path}/steps/step-08-dialectical-analysis.md"
  step_09: "{installed_path}/steps/step-09-summary.md"
  step_10: "{installed_path}/steps/step-10-finalize.md"

# Progressive File System (Auto-Resume Support)
progressive_file:
  enabled: true
  placeholder_pattern: "{{UNFILLED:variable_name}}"
  skipped_marker: "*Skipped by user*"

  # Resume behavior
  resume:
    auto_detect: true # Automatically check for existing file on start
    ask_user: false # Do NOT ask user - just resume automatically
    show_summary: true # Show brief summary of completed steps on resume

  # Step to placeholder mapping for resume detection
  # NOTE: Must match actual instruction step numbers and their template-output tags
  # Full 11-step workflow (step-00 through step-10)
  step_markers:
    step_00: [] # Initialize environment - no placeholders
    step_01: [] # Init parsing - no placeholders (loads Phase 2A)
    step_02: [
      "hypothesis_id", "confidence_level", "total_hypothesis_count",
      "core_hypothesis_statement", "alternative_hypothesis_h0",
      "baseline_table", "assumptions_table", "gap_and_novelty",
      "selected_dataset_name", "selected_dataset_type", "selected_dataset_source",
      "selected_dataset_path", "dataset_hypothesis_fit",
      "selected_model_name", "selected_model_type", "selected_model_source", "model_hypothesis_fit"
    ] # Section 1: Main Hypothesis & Baselines
    step_03: [] # Hypothesis generation - interactive, no template placeholders
    step_04: ["hypothesis_inventory_table", "all_hypotheses_specs"] # Section 2: Hypotheses Inventory
    step_05: ["risk_analysis", "risk_hypothesis_mapping", "mitigation_strategies", "risk_summary_table"] # Risk Analysis
    step_06: ["dependency_graph", "dependency_hierarchy"] # Dependency Graph (DAG)
    step_07: ["gantt_timeline", "critical_path_analysis", "resource_summary", "execution_order"] # Timeline Planning
    step_08: ["dialectical_analysis", "thesis_statement", "antithesis_development", "synthesis", "robustness_assessment"] # Dialectical Analysis
    step_09: ["executive_summary", "final_summary", "conclusions", "appendices"] # Summary & Conclusions
    step_10: ["verification_state_status", "pipeline_tasks_updated", "hypothesis_tasks_created"] # Finalize & State Generation

# Extension parameters
extension_depth: 2 # Default extension depth (1-3)

# MCP Server Integration - REQUIRED for this workflow
mcp_services:
  archon:
    enabled: true # REQUIRED: Past failure case analysis and risk identification
    purpose: 'Past failure case analysis and risk identification'

  clearthought:
    enabled: true # REQUIRED: Advanced reasoning with specialized tools
    purpose: 'Multi-method reasoning: Sequential Thinking, First Principles, Scientific Method, Structured Argumentation, Collaborative Reasoning'
    tools:
      - 'Sequential Thinking' # Complex decomposition and step-by-step analysis
      - 'Mental Model - First Principles'
      - 'Scientific Method'
      - 'Structured Argumentation'
      - 'Collaborative Reasoning'

  exa:
    enabled: true # REQUIRED: Latest research search and verification
    purpose: 'Additional research and verification'
