# =============================================================================
# Phase 2C Auto-Responder Configuration
# =============================================================================
# Controls the Phase 2C (Experiment Design) auto-responder behavior.
# Used by phase_auto_responder.py when active_phase.json has phase: "phase2c".
#
# Phase 2C has 8 steps (Step 01 ~ Step 08):
#   Step 01: Init (hypothesis load, verification_state.yaml check)
#   Step 02: Archon KB Search (past experiment cases)
#   Step 03: Exa GitHub Search (implementation code)
#   Step 04: Serena Codebase Analysis (optional)
#   Step 05: Dataset & Baseline Design
#   Step 06: Synthesis (experiment spec integration)
#   Step 07: References (reference list compilation)
#   Step 08: Validation (verification_state.yaml update)
#
# The hook fires at step transitions and if Claude stops mid-step.
# =============================================================================

phase: "phase2c"
enabled: true

# -----------------------------------------------------------------------------
# LLM ORCHESTRATOR INSTRUCTION PROMPT
# -----------------------------------------------------------------------------
# GPT-5.2 reads this prompt to understand Phase 2C's 8-step structure
# and generate appropriate resume prompts at step transitions.

# -----------------------------------------------------------------------------
# OPENROUTER SETTINGS
# -----------------------------------------------------------------------------
openrouter:
  enabled: true
  model: "openai/gpt-5.2"
  api_key_env: "OPENROUTER_API_KEY"
  timeout_seconds: 180
  max_tokens: 3000

# -----------------------------------------------------------------------------
# CONTEXT SETTINGS
# -----------------------------------------------------------------------------
context:
  # Phase 2C has 8 steps with MCP calls — capture enough context
  # for accurate step detection by the orchestrator LLM
  focus_chars: 5000

# -----------------------------------------------------------------------------
# COMPLETION SIGNALS (Fast-path before LLM call)
# -----------------------------------------------------------------------------
# These strings in the conversation trigger immediate PHASE_COMPLETE
# without calling the orchestrator LLM.
completion_signals: []
  # Removed: fast-path text matching bypasses LLM judgment.

# -----------------------------------------------------------------------------
# RATE LIMITING
# -----------------------------------------------------------------------------
# Phase 2C has 8 steps with MCP calls (Archon, Exa, Serena),
# similar to Phase 0 in complexity.
rate_limit:
  max_triggers: 6
  time_window_seconds: 300

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
debug:
  verbose: true
  log_file: "phase2c_auto_responder.log"
  log_llm_interactions: true
