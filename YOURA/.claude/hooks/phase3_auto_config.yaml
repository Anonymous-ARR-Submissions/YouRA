# =============================================================================
# Phase 3 Auto-Responder Configuration
# =============================================================================
# Controls the Phase 3 (Implementation Planning) auto-responder behavior.
# Used by phase_auto_responder.py when active_phase.json has phase: "phase3".
#
# Phase 3 has 10 steps (Step 01 ~ Step 10):
#   Step 01: Initialize (Phase 2C completion check)
#   Step 02: PRD Generation
#   Step 03: Architecture Agent (Task tool sub-agent)
#   Step 04: Budget Allocation
#   Step 05: Parallel Agents (Logic + Config, Task tool sub-agents)
#   Step 06: Complexity Assessment
#   Step 07: Document Verification
#   Step 08: Archon Project Update
#   Step 09: Task Generation (03_tasks.yaml)
#   Step 10: Validation + state update
#
# The hook fires at step transitions and between sub-agent executions.
# Steps 03 and 05 launch sub-agents that can take significant time.
# =============================================================================

phase: "phase3"
enabled: true

# -----------------------------------------------------------------------------
# LLM ORCHESTRATOR INSTRUCTION PROMPT
# -----------------------------------------------------------------------------
# GPT-5.2 reads this prompt to understand Phase 3's 10-step structure
# and generate appropriate resume prompts at step transitions.

# -----------------------------------------------------------------------------
# OPENROUTER SETTINGS
# -----------------------------------------------------------------------------
openrouter:
  enabled: true
  model: "openai/gpt-5.2"
  api_key_env: "OPENROUTER_API_KEY"
  timeout_seconds: 240
  max_tokens: 3000

# -----------------------------------------------------------------------------
# CONTEXT SETTINGS
# -----------------------------------------------------------------------------
context:
  # Phase 3 has 10 steps with sub-agent execution — capture enough context
  # for accurate step and agent-state detection
  focus_chars: 6000

# -----------------------------------------------------------------------------
# COMPLETION SIGNALS (Fast-path before LLM call)
# -----------------------------------------------------------------------------
# These strings in the conversation trigger immediate PHASE_COMPLETE
# without calling the orchestrator LLM.
completion_signals: []
  # Removed: fast-path text matching bypasses LLM judgment.

# -----------------------------------------------------------------------------
# RATE LIMITING
# -----------------------------------------------------------------------------
# Phase 3 has 10 steps with 3 sub-agent executions (architecture, logic, config),
# which cause frequent stop events. Higher limit needed.
rate_limit:
  max_triggers: 8
  time_window_seconds: 300

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
debug:
  verbose: true
  log_file: "phase3_auto_responder.log"
  log_llm_interactions: true
