# =============================================================================
# Phase 2B Auto-Responder Configuration
# =============================================================================
# Controls the Phase 2B (Verification Planning) auto-responder behavior.
# Used by phase_auto_responder.py when active_phase.json has phase: "phase2b".
#
# Phase 2B has 11 steps (Step 00 ~ Step 10):
#   Step 00: Init Environment (MCP service verification)
#   Step 01: Init Parsing (Phase 2A file loading)
#   Step 02: Input Hypothesis (confirmation menu)
#   Step 03: Hypothesis Generation (MCP-powered sub-hypothesis generation)
#   Step 04: Hypothesis Inventory (inventory creation)
#   Step 05: Risk Analysis (risk mapping)
#   Step 06: Dependency Graph (DAG generation)
#   Step 07: Timeline Planning (Gantt generation)
#   Step 08: Dialectical Analysis (thesis-antithesis-synthesis)
#   Step 09: Summary (summary generation)
#   Step 10: Finalize (verification_state.yaml generation)
#
# The hook fires primarily at step transitions and if Claude stops
# mid-step unexpectedly. With 11 steps, there are more transition
# points than Phase 2A, so rate limits are higher.
# =============================================================================

phase: "phase2b"
enabled: true

# -----------------------------------------------------------------------------
# LLM ORCHESTRATOR INSTRUCTION PROMPT
# -----------------------------------------------------------------------------
# GPT-5.2 reads this prompt to understand Phase 2B's 11-step structure
# and generate appropriate resume prompts at step transitions.

# -----------------------------------------------------------------------------
# OPENROUTER SETTINGS
# -----------------------------------------------------------------------------
openrouter:
  enabled: true
  model: "openai/gpt-5.2"
  api_key_env: "OPENROUTER_API_KEY"
  timeout_seconds: 240
  max_tokens: 3000

# -----------------------------------------------------------------------------
# CONTEXT SETTINGS
# -----------------------------------------------------------------------------
context:
  # Phase 2B has 11 steps with MCP calls — capture enough context
  # for accurate step detection by the orchestrator LLM
  focus_chars: 6000

# -----------------------------------------------------------------------------
# COMPLETION SIGNALS (Fast-path before LLM call)
# -----------------------------------------------------------------------------
# These strings in the conversation trigger immediate PHASE_COMPLETE
# without calling the orchestrator LLM.
completion_signals: []
  # Removed: fast-path text matching bypasses LLM judgment.

# -----------------------------------------------------------------------------
# RATE LIMITING
# -----------------------------------------------------------------------------
# Phase 2B has 11 steps with multiple step transitions + MCP calls,
# so allow more triggers than Phase 2A (which has 8).
rate_limit:
  max_triggers: 10
  time_window_seconds: 300

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
debug:
  verbose: true
  log_file: "phase2b_auto_responder.log"
  log_llm_interactions: true
