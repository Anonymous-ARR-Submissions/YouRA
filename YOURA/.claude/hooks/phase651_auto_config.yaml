# =============================================================================
# Phase 6.5.1 Auto-Responder Configuration
# =============================================================================
# Controls the Phase 6.5.1 (Overleaf LaTeX + PDF) auto-responder behavior.
# Used by phase_auto_responder.py when active_phase.json has phase: "phase651".
#
# Phase 6.5.1 is a 4-step LaTeX generation workflow:
#   Step 01: Initialize (validate inputs, create folder, check LaTeX toolchain)
#   Step 02: Markdown to LaTeX (split paper, convert sections, escape chars)
#   Step 03: Assemble Project (main.tex, copy figures/references, README)
#   Step 04: Compile and Verify (pdflatex + bibtex, verify PDF, update state)
#
# Phase 6.5.1 runs Bash commands (pdflatex, bibtex, wget) and file operations.
# Stop events typically occur at shell command completions and file writes.
# =============================================================================

phase: "phase651"
enabled: true

# -----------------------------------------------------------------------------
# LLM ORCHESTRATOR INSTRUCTION PROMPT
# -----------------------------------------------------------------------------
# GPT-5.2 reads phase651_responder.md to understand Phase 6.5.1's step structure
# and generate appropriate resume prompts at step transitions.

# -----------------------------------------------------------------------------
# OPENROUTER SETTINGS
# -----------------------------------------------------------------------------
openrouter:
  enabled: true
  model: "openai/gpt-5.2"
  api_key_env: "OPENROUTER_API_KEY"
  timeout_seconds: 240
  max_tokens: 3000

# -----------------------------------------------------------------------------
# CONTEXT SETTINGS
# -----------------------------------------------------------------------------
context:
  # Phase 6.5.1 is mostly file operations and shell commands.
  # Moderate context sufficient to track step progress.
  focus_chars: 4000

# -----------------------------------------------------------------------------
# COMPLETION SIGNALS (Fast-path before LLM call)
# -----------------------------------------------------------------------------
# All completion detection handled by the LLM orchestrator
# reading the transcript and phase651_responder.md instructions.
completion_signals: []

# -----------------------------------------------------------------------------
# RATE LIMITING
# -----------------------------------------------------------------------------
# Phase 6.5.1 is relatively short (4 steps, mostly file ops).
# Lower trigger frequency than writing/review phases.
rate_limit:
  max_triggers: 10
  time_window_seconds: 600

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
debug:
  verbose: true
  log_file: "phase651_auto_responder.log"
  log_llm_interactions: true
