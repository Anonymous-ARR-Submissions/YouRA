# =============================================================================
# Phase 6 Auto-Responder Configuration
# =============================================================================
# Controls the Phase 6 (Paper Writing) auto-responder behavior.
# Used by phase_auto_responder.py when active_phase.json has phase: "phase6".
#
# Phase 6 has 7 steps:
#   Step 01: Initialize (folder setup, collect figures, verify prerequisites)
#   Step 02: Narrative Design (story structure → 06_narrative_blueprint.yaml)
#   Step 03: Story Group A — Foundation (Introduction, Related Work, Methodology)
#   Step 04: Story Group B — Evidence (Experiments, Results, Discussion)
#   Step 05: Story Group C — Closure (Conclusion, Abstract)
#   Step 06: References (citation compilation → 06_references.bib)
#   Step 07: Final Merge & Ground Truth (06_paper.md, 065_ground_truth.yaml)
#
# Phase 6 is primarily writing/generation — moderate stop events.
# Main stop points: MCP calls (Semantic Scholar), step transitions,
# story group agent completions.
# =============================================================================

phase: "phase6"
enabled: true

# -----------------------------------------------------------------------------
# LLM ORCHESTRATOR INSTRUCTION PROMPT
# -----------------------------------------------------------------------------
# GPT-5.2 reads phase6_responder.md to understand Phase 6's step structure
# and generate appropriate resume prompts at step transitions.

# -----------------------------------------------------------------------------
# OPENROUTER SETTINGS
# -----------------------------------------------------------------------------
openrouter:
  enabled: true
  model: "openai/gpt-5.2"
  api_key_env: "OPENROUTER_API_KEY"
  timeout_seconds: 240
  max_tokens: 3000

# -----------------------------------------------------------------------------
# CONTEXT SETTINGS
# -----------------------------------------------------------------------------
context:
  # Phase 6 is writing-intensive — larger context needed
  # to capture narrative blueprint, section outputs, and cross-references
  focus_chars: 8000

# -----------------------------------------------------------------------------
# COMPLETION SIGNALS (Fast-path before LLM call)
# -----------------------------------------------------------------------------
# These strings in the conversation trigger immediate PHASE_COMPLETE
# without calling the orchestrator LLM.
completion_signals: []
  # Removed: fast-path text matching bypasses GPT-5.2 LLM judgment.
  # All completion detection is now handled by the LLM orchestrator
  # reading the transcript and phase6_responder.md instructions.

# -----------------------------------------------------------------------------
# RATE LIMITING
# -----------------------------------------------------------------------------
# Phase 6 is writing-intensive with occasional MCP calls (Semantic Scholar).
# Story group steps (03-05) may take longer due to section generation.
rate_limit:
  max_triggers: 12
  time_window_seconds: 600

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
debug:
  verbose: true
  log_file: "phase6_auto_responder.log"
  log_llm_interactions: true
