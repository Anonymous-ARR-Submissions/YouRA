# =============================================================================
# Phase 1 Auto-Responder Configuration
# =============================================================================
# Controls the Phase 1 (Targeted Research) auto-responder behavior.
# No research inputs needed — Phase 0 output is loaded automatically by workflow.
# =============================================================================

phase: "phase1"
enabled: true

# -----------------------------------------------------------------------------
# LLM ORCHESTRATOR INSTRUCTION PROMPT
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# OPENROUTER SETTINGS
# -----------------------------------------------------------------------------
openrouter:
  enabled: true
  model: "openai/gpt-5.2"
  api_key_env: "OPENROUTER_API_KEY"
  timeout_seconds: 180
  max_tokens: 3000

# -----------------------------------------------------------------------------
# CONTEXT SETTINGS
# -----------------------------------------------------------------------------
context:
  focus_chars: 5000

# -----------------------------------------------------------------------------
# COMPLETION SIGNALS (Fast-path before LLM call)
# -----------------------------------------------------------------------------
completion_signals: []
  # Removed: fast-path text matching bypasses LLM judgment.

# -----------------------------------------------------------------------------
# RATE LIMITING
# -----------------------------------------------------------------------------
rate_limit:
  max_triggers: 8
  time_window_seconds: 300

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
debug:
  verbose: true
  log_file: "phase1_auto_responder.log"
  log_llm_interactions: true
