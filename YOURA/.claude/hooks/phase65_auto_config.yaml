# =============================================================================
# Phase 6.5 Auto-Responder Configuration
# =============================================================================
# Controls the Phase 6.5 (Adversarial Review) auto-responder behavior.
# Used by phase_auto_responder.py when active_phase.json has phase: "phase65".
#
# Phase 6.5 has 7 steps (with conditional rounds):
#   Step 01: Initialize (validate inputs, extract ground truth, create checkpoint)
#   Step 02: Adversary R1 (3-persona: Accuracy Checker, Bored Reviewer, Skeptical Expert)
#   Step 03: Revision R1 (fix FATAL/MAJOR, collect MINOR to human_review_notes)
#   Step 04: Convergence Check (FATAL=0, MAJOR=0, persuasiveness_passed, round>=2)
#   Step 05: Adversary R2 (numerical verification with Serena MCP) — CONDITIONAL
#   Step 06: Revision R2 (fix numerical issues) — CONDITIONAL
#   Step 07: Finalize (06_paper_final.md, review summary, changelog, state update)
#
# Phase 6.5 has Task Agent spawns (adversary/revision agents) and MCP calls
# (Serena, Semantic Scholar). Stop events at agent completions and MCP calls.
# =============================================================================

phase: "phase65"
enabled: true

# -----------------------------------------------------------------------------
# LLM ORCHESTRATOR INSTRUCTION PROMPT
# -----------------------------------------------------------------------------
# GPT-5.2 reads phase65_responder.md to understand Phase 6.5's step structure
# and generate appropriate resume prompts at step transitions.

# -----------------------------------------------------------------------------
# OPENROUTER SETTINGS
# -----------------------------------------------------------------------------
openrouter:
  enabled: true
  model: "openai/gpt-5.2"
  api_key_env: "OPENROUTER_API_KEY"
  timeout_seconds: 240
  max_tokens: 3000

# -----------------------------------------------------------------------------
# CONTEXT SETTINGS
# -----------------------------------------------------------------------------
context:
  # Phase 6.5 involves review reports, revision diffs, and convergence logic.
  # Moderate context needed to capture persona outputs and issue tracking.
  focus_chars: 6000

# -----------------------------------------------------------------------------
# COMPLETION SIGNALS (Fast-path before LLM call)
# -----------------------------------------------------------------------------
# All completion detection handled by the LLM orchestrator
# reading the transcript and phase65_responder.md instructions.
completion_signals: []

# -----------------------------------------------------------------------------
# RATE LIMITING
# -----------------------------------------------------------------------------
# Phase 6.5 has Task Agent spawns (adversary/revision) and MCP calls.
# Multiple rounds possible (up to 3). Moderate trigger frequency.
rate_limit:
  max_triggers: 12
  time_window_seconds: 600

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
debug:
  verbose: true
  log_file: "phase65_auto_responder.log"
  log_llm_interactions: true
