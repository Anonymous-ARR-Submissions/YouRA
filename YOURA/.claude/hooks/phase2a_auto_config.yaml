# =============================================================================
# Phase 2A Auto-Responder Configuration
# =============================================================================
# Controls the Phase 2A (Hypothesis Dialogue) auto-responder behavior.
# Used by phase_auto_responder.py when active_phase.json has phase: "phase2a".
#
# Phase 2A has 3 steps:
#   Step 0: Initialize (gap selection, paper preparation, discussion_log.md init)
#   Step 1: Tikitaka Discussion (self-contained inline loop — runs in one turn)
#   Step 2: Result Structuring (produces Phase 2B-compatible YAML outputs)
#
# The hook fires primarily at step transitions (Step 0→1, Step 1→2)
# and if Claude stops mid-step unexpectedly. Step 1's discussion loop
# runs inline without hook dependency, but the hook catches any unexpected
# stops during the loop.
# =============================================================================

phase: "phase2a"
enabled: true

# -----------------------------------------------------------------------------
# LLM ORCHESTRATOR INSTRUCTION PROMPT
# -----------------------------------------------------------------------------
# GPT-5.2 reads this prompt to understand Phase 2A's 3-step structure
# and generate appropriate resume prompts at step transitions.

# -----------------------------------------------------------------------------
# OPENROUTER SETTINGS
# -----------------------------------------------------------------------------
openrouter:
  enabled: true
  model: "openai/gpt-5.2"
  api_key_env: "OPENROUTER_API_KEY"
  timeout_seconds: 180
  max_tokens: 3000

# -----------------------------------------------------------------------------
# CONTEXT SETTINGS
# -----------------------------------------------------------------------------
context:
  # Phase 2A discussions can be long — capture more context for accurate
  # step detection by the orchestrator LLM
  focus_chars: 8000

# -----------------------------------------------------------------------------
# COMPLETION SIGNALS (Fast-path before LLM call)
# -----------------------------------------------------------------------------
# These strings in the conversation trigger immediate PHASE_COMPLETE
# without calling the orchestrator LLM.
completion_signals: []
  # Removed: fast-path text matching bypasses LLM judgment.

# -----------------------------------------------------------------------------
# RATE LIMITING
# -----------------------------------------------------------------------------
# Phase 2A has multiple step transitions + potential mid-step stops,
# so allow more triggers than Phase 0/1.
rate_limit:
  max_triggers: 8
  time_window_seconds: 300

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
debug:
  verbose: true
  log_file: "phase2a_auto_responder.log"
  log_llm_interactions: true
