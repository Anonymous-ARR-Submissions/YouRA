# =============================================================================
# Phase 4.5 Auto-Responder Configuration
# =============================================================================
# Controls the Phase 4.5 (Hypothesis Synthesis) auto-responder behavior.
# Used by phase_auto_responder.py when active_phase.json has phase: "phase45".
#
# Phase 4.5 has 8 steps:
#   Step 01: Initialize (state load, precondition check, read hypothesis + tasks + experiment briefs)
#   Step 02: Prediction-Result Alignment (P1/P2/P3 mapping, planned-vs-actual, causal mechanism)
#   Step 03: Hypothesis Refinement (overclaim removal, refined core statement)
#   Step 04: Theoretical Interpretation (literature connection, unexpected findings)
#   Step 05: Limitations & Scope Boundaries
#   Step 06: Future Work (results-grounded directions)
#   Step 07: Generate 045_validated_hypothesis.md
#   Step 08: Finalize (state update, completion summary)
#
# Phase 4.5 is primarily analysis/writing — fewer stop events than Phase 4.
# Main stop points: MCP calls (Semantic Scholar, ClearThought) and step transitions.
# =============================================================================

phase: "phase45"
enabled: true

# -----------------------------------------------------------------------------
# LLM ORCHESTRATOR INSTRUCTION PROMPT
# -----------------------------------------------------------------------------
# GPT-5.2 reads phase45_responder.md to understand Phase 4.5's step structure
# and generate appropriate resume prompts at step transitions.

# -----------------------------------------------------------------------------
# OPENROUTER SETTINGS
# -----------------------------------------------------------------------------
openrouter:
  enabled: true
  model: "openai/gpt-5.2"
  api_key_env: "OPENROUTER_API_KEY"
  timeout_seconds: 240
  max_tokens: 3000

# -----------------------------------------------------------------------------
# CONTEXT SETTINGS
# -----------------------------------------------------------------------------
context:
  # Phase 4.5 is analysis/writing — moderate context needed
  # to capture prediction matrices, refinement results, and section outputs
  focus_chars: 6000

# -----------------------------------------------------------------------------
# COMPLETION SIGNALS (Fast-path before LLM call)
# -----------------------------------------------------------------------------
# These strings in the conversation trigger immediate PHASE_COMPLETE
# without calling the orchestrator LLM.
completion_signals: []
  # Removed: fast-path text matching bypasses GPT-5.2 LLM judgment.
  # All completion detection is now handled by the LLM orchestrator
  # reading the transcript and phase45_responder.md instructions.

# -----------------------------------------------------------------------------
# RATE LIMITING
# -----------------------------------------------------------------------------
# Phase 4.5 is primarily analysis/writing with occasional MCP calls.
# Fewer stop events than Phase 4 (no Coder-Validator loops or GPU execution).
rate_limit:
  max_triggers: 10
  time_window_seconds: 600

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
debug:
  verbose: true
  log_file: "phase45_auto_responder.log"
  log_llm_interactions: true
