# =============================================================================
# Phase 4 Auto-Responder Configuration
# =============================================================================
# Controls the Phase 4 (Coding & Validation) auto-responder behavior.
# Used by phase_auto_responder.py when active_phase.json has phase: "phase4".
#
# Phase 4 has 13 steps (with sub-steps):
#   Step 01:  Initialize (Phase 3 completion check, 03_tasks.yaml load)
#   Step 01a: Data Setup (dataset/model download)
#   Step 01b: Continue (checkpoint-based resume)
#   Step 02:  Coder Loop (code generation, iterative)
#   Step 03:  Validator Agent (Task tool sub-agent)
#   Step 04:  Experiment Confirm
#   Step 05a: Pre-validation
#   Step 05b: Execution (experiment run — longest step, GPU usage)
#   Step 05c: Post-validation
#   Step 06:  Gate Processing (MUST_WORK gate verdict)
#   Step 06b: Reflection (failure reflection + routing decision)
#   Step 07:  Report Generation (04_validation.md)
#   Step 08:  Completion (verification_state.yaml update)
#
# The hook fires frequently during Coder-Validator loops (Step 02-03)
# and during experiment execution (Step 05b).
# =============================================================================

phase: "phase4"
enabled: true

# -----------------------------------------------------------------------------
# LLM ORCHESTRATOR INSTRUCTION PROMPT
# -----------------------------------------------------------------------------
# GPT-5.2 reads this prompt to understand Phase 4's multi-step structure
# and generate appropriate resume prompts at step transitions.

# -----------------------------------------------------------------------------
# OPENROUTER SETTINGS
# -----------------------------------------------------------------------------
openrouter:
  enabled: true
  model: "openai/gpt-5.2"
  api_key_env: "OPENROUTER_API_KEY"
  timeout_seconds: 240
  max_tokens: 3000

# -----------------------------------------------------------------------------
# CONTEXT SETTINGS
# -----------------------------------------------------------------------------
context:
  # Phase 4 has coding + experiment results — need larger context window
  # to capture code output, experiment logs, and validation results
  focus_chars: 8000

# -----------------------------------------------------------------------------
# COMPLETION SIGNALS (Fast-path before LLM call)
# -----------------------------------------------------------------------------
# These strings in the conversation trigger immediate PHASE_COMPLETE
# without calling the orchestrator LLM.
completion_signals: []
  # Removed: fast-path text matching bypasses GPT-5.2 LLM judgment.
  # All completion detection is now handled by the LLM orchestrator
  # reading the transcript and phase4_responder.md instructions.

# -----------------------------------------------------------------------------
# RATE LIMITING
# -----------------------------------------------------------------------------
# Phase 4 has Coder-Validator loops (Step 02-03) and experiment execution
# (Step 05b) that cause very frequent stop events. Highest limit needed.
rate_limit:
  max_triggers: 15
  time_window_seconds: 600

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
debug:
  verbose: true
  log_file: "phase4_auto_responder.log"
  log_llm_interactions: true
