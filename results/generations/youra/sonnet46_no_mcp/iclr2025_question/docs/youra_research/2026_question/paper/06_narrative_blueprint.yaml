notes:
  creation_notes: >
    Narrative strategy: COUNTERINTUITIVE NEGATIVE RESULT paper. The story is not
    "semantic entropy wins" but "semantic entropy catastrophically fails, and here is
    exactly why." This is a valid and valuable contribution to the UQ literature.
    The mechanism diagnosis (NLI aggregation failure, quantified) and polarity inversion
    finding (SCG below-random on ChatGPT-generated labels) give the paper depth beyond
    a generic null result.

    Key framing decision: present the NLI aggregation failure FIRST in Results (before
    AUROC numbers), because it is the causal explanation — not the consequence.
    This makes the AUROC results interpretable rather than mysterious.

