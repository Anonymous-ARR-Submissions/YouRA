# ═══════════════════════════════════════════════════════════════════════════════
# PART 1: HOOK & MOTIVATION
# ═══════════════════════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: >
      We deployed three state-of-the-art uncertainty quantification methods — semantic entropy,
      token entropy, and SelfCheckGPT-BERTScore — to detect hallucinations on HaluEval-QA, and
      found not that one method won, but that all three failed: AUROC values ranged from 0.356
      to 0.500, and the method designed to be best (semantic entropy) produced an entirely
      constant signal across 2,000 examples — indistinguishable from random guessing.
    strategy: "counterintuitive_finding"
    # This inverts the expected "which method wins" narrative. The surprising collapse of the
    # most theoretically motivated method (semantic entropy) demands explanation, pulling the
    # reader into the mechanism investigation.

  why_reader_should_care:
    main_reason: >
      Hallucination detection in LLMs is critical for safe deployment, and uncertainty
      quantification (UQ) signals are among the most practical detection approaches —
      requiring no additional training or human annotation. Understanding when and why
      these signals fail is as important as knowing when they succeed.
    concrete_example: >
      A practitioner deploying LLaMA-2-7B-chat for QA would naturally consider semantic
      entropy (Kuhn et al., 2023) as a hallucination detector, given its strong results
      on TriviaQA. Our results show this choice would yield zero discriminative power on
      HaluEval-QA — equivalent to random flag assignment.
    stakes: >
      Without understanding the boundary conditions of UQ methods, practitioners and
      researchers will miscalibrate their trust in hallucination detectors, deploying
      them in regimes where they are entirely non-informative or even adversely correlated
      with ground truth.

  real_world_impact:
    application_domain: "LLM safety, hallucination detection, uncertainty quantification for NLP"
    potential_beneficiaries: >
      ML practitioners deploying LLMs in high-stakes QA settings; researchers designing
      UQ benchmarks; authors of future UQ methods who need to understand generalization
      boundaries.
    scale_of_impact: >
      Affects any deployment of semantic entropy or SelfCheckGPT on short factual QA
      benchmarks — a common evaluation scenario given the popularity of HaluEval-QA
      (400+ citations) and the wide adoption of lorenzkuhn/semantic_uncertainty (~800 GitHub stars).

# ─────────────────────────────────────────────────────────────────────────────
# PROBLEM FRAMING (Three Levels)
# ─────────────────────────────────────────────────────────────────────────────

problem_framing:
  surface_problem:
    description: >
      LLMs hallucinate — they generate confident, plausible-sounding but factually
      incorrect responses — creating safety risks in deployed systems.
    common_understanding: >
      The field has developed UQ-based detectors (semantic entropy, SelfCheckGPT, token
      entropy) that leverage model internals or sampling consistency to flag uncertain
      outputs. These methods have shown promise on established benchmarks (TriviaQA, WikiBio).

  deeper_problem:
    description: >
      UQ methods are evaluated in siloed settings on different benchmarks with different
      LLMs. Semantic entropy was validated on TriviaQA/NQ (Kuhn 2023); SelfCheckGPT on
      WikiBio (Manakul 2023). No study compares them head-to-head on the same benchmark
      under matched conditions — making it impossible to know which method to trust for
      a given deployment scenario.
    why_overlooked: >
      Cross-method, cross-benchmark comparison requires running multiple costly inference
      pipelines and coordinating evaluation protocols. Each paper naturally optimizes
      for its own benchmark and method, leaving systematic comparison to future work.
    our_perspective: >
      We treat this as an empirical question with a controlled design: same dataset
      (HaluEval-QA, 2,000 stratified examples), same model (LLaMA-2-7B-chat), same
      evaluation protocol (AUROC + bootstrap CI), same compute budget. The controlled
      design makes the comparison interpretable — differences reflect method quality,
      not evaluation artifact.

  gap_in_existing_work:
    description: >
      No published study performs a controlled cross-signal comparison of token entropy,
      semantic entropy, and SelfCheckGPT on HaluEval-QA with modern open-source LLMs.
      More fundamentally, the generalization boundaries of the NLI-based semantic entropy
      mechanism have never been empirically quantified across benchmark types.
    why_gap_exists: >
      Technical: reproducing three distinct UQ pipelines (greedy logits for token entropy,
      N=5 stochastic samples + NLI clustering for semantic entropy, N=5 BERTScore passes
      for SelfCheckGPT) under matched conditions requires significant engineering effort.
      Conceptual: prior work assumed results from long-form generation benchmarks (TriviaQA,
      WikiBio) would transfer to short factual QA benchmarks — this assumption was untested.
    why_gap_matters: >
      The assumption that semantic entropy generalizes across benchmark types led researchers
      and practitioners to expect AUROC ≈ 0.7–0.8 on any QA benchmark. The actual result
      (AUROC = 0.500, constant signal) reveals a hard boundary: NLI-based clustering fails
      on short factual QA responses, making semantic entropy entirely non-informative in
      this setting. Knowing this boundary prevents misdeployment.

# ═══════════════════════════════════════════════════════════════════════════════
# PART 2: THE KEY INSIGHT
# ═══════════════════════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: >
      The deberta-large-mnli NLI model — the core of semantic entropy — cannot semantically
      aggregate short factual QA responses: 72.8% of 2,000 HaluEval-QA examples receive
      the maximum NLI cluster count (5/5), collapsing semantic entropy to a constant signal.
    expanded_explanation: >
      Semantic entropy's theoretical advantage over token entropy rests on NLI clustering:
      responses that express the same fact in different words should be grouped into one
      semantic cluster, producing low entropy. This filtering is supposed to remove
      surface-form noise and leave a cleaner uncertainty signal.

      On HaluEval-QA, this mechanism breaks down: deberta-large-mnli, trained on MNLI
      (news/fiction sentence pairs), applies an entailment threshold too strict for 1–2
      sentence factual QA answers. It classifies "The United States" and "America" as
      semantically non-equivalent, assigning each of the N=5 stochastic samples to a
      distinct cluster in 72.8% of cases. The resulting cluster entropy distribution
      is constant (maximum value) across all examples — semantic entropy carries zero
      information about hallucination.

      This is not a minor degradation: the aggregation_rate=0.272 (95% CI [0.253, 0.292])
      is far below the 0.50 threshold required for non-degenerate semantic entropy, and
      the effect is domain-specific — Kuhn et al. (2023) report AUROC ≈ 0.78 on TriviaQA
      with longer, more syntactically diverse responses where NLI aggregation succeeds.

  why_others_missed_it:
    common_assumptions: >
      Prior work assumed that NLI clustering works for any QA task because deberta-large-mnli
      is a general-purpose entailment model and semantic entropy was validated on QA benchmarks
      (TriviaQA, NQ). The critical difference — response length and style — was not flagged
      as a potential failure mode.
    our_different_view: >
      We treated the NLI clustering mechanism as an empirical question rather than an
      assumption. By measuring aggregation_rate directly (H-M2) as a prerequisite to
      interpreting AUROC results (H-E1), we isolated the mechanism failure from the
      performance failure.
    enabling_factor: >
      The hypothesis-loop architecture of the YouRA pipeline forced explicit mechanism
      verification (H-M1, H-M2) before accepting the main result. Without this structure,
      the constant AUROC=0.5000 would have been reported as a performance result rather
      than traced to a specific mechanism violation (A2: deberta-large-mnli aggregation).

  what_makes_it_work:
    intuitive_explanation: >
      Semantic entropy works by asking "do these N responses mean the same thing?" If yes,
      they're grouped together, producing low entropy (confident). On TriviaQA, LLM
      responses like "Paris", "the city of Paris", and "Paris, France" are correctly
      grouped as equivalent. On HaluEval-QA, responses like "The Battle of Hastings"
      and "the 1066 Norman conquest" may be semantically equivalent but the NLI model
      was not trained to recognize short factual QA equivalences — it classifies them
      as distinct, making every example look maximally uncertain.
    key_mechanism: >
      NLI domain mismatch: deberta-large-mnli trained on MNLI (long sentence pairs from
      news/fiction text) applies an entailment threshold calibrated for 20–50 word sentences.
      HaluEval-QA responses are typically 5–15 words. At this length, surface variation
      (different entity mentions, different phrasings of the same fact) exceeds the NLI
      model's semantic equivalence threshold, producing singleton clusters for nearly all
      response pairs.
    analogy: >
      It is like asking a foreign-language expert who knows formal written prose to
      determine whether two text messages say the same thing — the expert's equivalence
      criteria are miscalibrated for the informal, abbreviated style of the new domain.

# ═══════════════════════════════════════════════════════════════════════════════
# PART 3: EVIDENCE STORY
# ═══════════════════════════════════════════════════════════════════════════════

evidence_narrative:
  main_claim:
    statement: >
      The deberta-large-mnli NLI clustering mechanism underlying semantic entropy fails
      to generalize to short factual QA benchmarks (HaluEval-QA), rendering semantic
      entropy a constant, non-discriminative signal in this setting — a domain-specific
      failure mode with concrete quantified boundaries.
    measurable_criteria: >
      1. aggregation_rate < 0.50 on HaluEval-QA (H-M2: gate condition)
      2. SE AUROC ≈ 0.500 with CI = [0.5, 0.5] (degenerate constant, H-E1)
      3. SE std < 1e-6 across 2,000 examples (H-M1: degenerate diagnosis)
      4. 72.8% of examples at maximum cluster count (5/5) (H-M2: cluster histogram)

  supporting_evidence:
    - id: "evidence_1"
      what: >
        NLI clustering aggregation_rate = 0.272 (95% CI [0.253, 0.292]) on HaluEval-QA
        (H-M2); 72.8% of examples receive maximum cluster count (5/5).
      so_what: >
        The NLI model fails to group semantically equivalent responses. Semantic entropy's
        core mechanism — noise filtering via clustering — is inoperative on this benchmark.
      how_it_supports_claim: >
        Directly quantifies the mechanism failure (A2 violation). Provides the root cause
        explanation for the degenerate AUROC result in H-E1.

    - id: "evidence_2"
      what: >
        Semantic entropy AUROC = 0.5000 with degenerate CI [0.5000, 0.5000] on HaluEval-QA
        (H-E1); SE std = 4.14e-25 across 2,000 examples (H-M1).
      so_what: >
        Semantic entropy is a constant signal — every example receives identical maximum
        entropy score. It provides no information for hallucination discrimination.
      how_it_supports_claim: >
        Confirms the predicted consequence of mechanism failure: degenerate SE → AUROC = 0.5.
        The CI [0.5, 0.5] is uniquely diagnostic of a constant signal (not just near-random).

    - id: "evidence_3"
      what: >
        SelfCheckGPT-BERTScore AUROC = 0.3562 (95% CI [0.3321, 0.3803]) — well below
        random chance (H-E1). Token entropy AUROC = 0.4829 (CI [0.4585, 0.5090]) — near-random.
      so_what: >
        All three UQ signals fail on HaluEval-QA. SelfCheckGPT's below-random performance
        suggests a label polarity inversion: HaluEval-QA's ChatGPT-generated hallucinations
        are consistently stated, making consistent responses correlate with hallucination
        labels — inverting SelfCheckGPT's expected signal direction.
      how_it_supports_claim: >
        Establishes that the failure is not limited to semantic entropy. The broader context
        of near/below-random performance across all methods points to HaluEval-QA benchmark
        characteristics (ChatGPT-generated labels with confident-sounding hallucinations)
        as a contributing factor.

    - id: "evidence_4"
      what: >
        Pairwise comparison: SE > SCG Δ=0.1438, TE > SCG Δ=0.1268, both with non-overlapping
        95% bootstrap CIs after Bonferroni correction (H-E1, MUST_WORK gate PASS).
      so_what: >
        Despite all methods being near-random in absolute terms, the measurement framework
        correctly detects statistically significant differences between methods. The
        experimental infrastructure is valid and sensitive — the null results are
        methodologically sound, not artifacts of an insensitive evaluation.
      how_it_supports_claim: >
        Validates the experimental design's ability to detect real differences. If the
        methodology were insensitive, it would fail to find the SE > SCG gap. Finding
        significant gaps while all methods are near-random confirms that the near-random
        performance is a genuine property of the methods on this benchmark, not a noise floor.

  surprising_findings:
    finding: >
      SelfCheckGPT-BERTScore achieves AUROC = 0.3562 — significantly below random chance —
      suggesting it is negatively correlated with hallucination labels on HaluEval-QA.
    why_surprising: >
      SelfCheckGPT was designed so that inconsistent responses (high sampling variance)
      indicate hallucination. The original paper (Manakul et al., 2023) reports AUC-PR ≈ 0.85
      on WikiBio. An AUROC below 0.5 implies the opposite correlation: consistent responses
      are more likely hallucinated on HaluEval-QA.
    our_interpretation: >
      HaluEval-QA's hallucinations were generated by ChatGPT as confident, internally-
      consistent incorrect responses. LLaMA-2-7B-chat may produce high BERTScore consistency
      precisely for hallucinated examples (the model confidently repeats a wrong answer
      across stochastic samples), inverting the consistency–hallucination correlation.
      This is a label construction artifact specific to ChatGPT-generated adversarial
      hallucinations, not a general failure of SelfCheckGPT.

  what_results_mean:
    synthesis: >
      The joint negative result — semantic entropy degenerate (mechanism failure), token
      entropy near-random (model uncertainty not predictive), SelfCheckGPT below-random
      (label polarity inversion) — reveals a systematic mismatch between standard UQ
      methods and HaluEval-QA's characteristics. UQ methods validated on long-form
      generation benchmarks (TriviaQA, WikiBio) do not automatically transfer to short
      factual QA benchmarks with ChatGPT-generated labels. The controlled design
      (matched conditions, bootstrap CIs) ensures these are genuine null results, not
      evaluation artifacts.
    confidence_level: >
      HIGH for mechanism failure finding (aggregation_rate=0.272, n=2000, bootstrap CI);
      HIGH for SE degeneracy (std<1e-6, n=2000);
      HIGH for SCG below-random (CI [0.332, 0.380] non-overlapping with 0.5);
      MEDIUM for polarity inversion interpretation (plausible but not directly verified).
    caveats: >
      All results are LLaMA-2-7B-chat specific (Mistral not tested). HaluEval-QA labels
      are ChatGPT-generated (label quality unverified). N=5 stochastic samples is the
      minimum budget — larger N may partially recover NLI aggregation.

# ═══════════════════════════════════════════════════════════════════════════════
# PART 4: BROADER IMPACT
# ═══════════════════════════════════════════════════════════════════════════════

takeaway:
  main_contribution:
    one_sentence: >
      We provide the first empirical quantification of semantic entropy's NLI clustering
      failure on short factual QA (aggregation_rate=0.272), establishing a concrete
      domain boundary for NLI-based UQ methods and revealing a previously unknown polarity
      inversion in SelfCheckGPT on ChatGPT-generated hallucination benchmarks.
    why_significant: >
      This is a null result that teaches more than a positive result would: it identifies
      specific, actionable failure modes (NLI domain mismatch, label polarity inversion),
      quantifies them precisely, and motivates targeted remediation paths (QA-specific NLI
      models, larger N, inverted SelfCheckGPT signal). The controlled design ensures the
      findings are reproducible and interpretable.

  implications:
    for_field: >
      UQ benchmark papers should report aggregation_rate alongside AUROC when using
      semantic entropy — a high AUROC without confirmed NLI aggregation may be degenerate.
      Cross-benchmark comparison should be standard, not optional, when proposing new UQ methods.
      The HaluEval-QA benchmark's ChatGPT-generated label construction methodology warrants
      caution for consistency-based UQ evaluation.
    for_practice: >
      Practitioners should not deploy semantic entropy (lorenzkuhn/semantic_uncertainty with
      deberta-large-mnli) on short factual QA tasks without first verifying aggregation_rate.
      SelfCheckGPT-BERTScore may require signal inversion (1 - consistency) on benchmarks
      with adversarially consistent hallucinations. Token entropy remains the most stable
      (near-random but not inverted) signal under these conditions.
    conceptual_contribution: >
      The response-length domain boundary for NLI-based semantic filtering is a novel
      conceptual contribution: semantic entropy's advantage over token entropy depends on
      the NLI model's ability to recognize semantic equivalence at the target response
      length and style — a property that must be verified empirically, not assumed.

  future_possibilities:
    immediate_extensions: >
      (1) Replace deberta-large-mnli with a QA-specific NLI model to test if aggregation
      recovers on HaluEval-QA (zero new LLM inference required — reuse H-E1 stochastic samples).
      (2) Test inverted SelfCheckGPT signal (1 - consistency) on HaluEval-QA.
      (3) Execute H-M3: run full UQ pipeline on Mistral-7B-Instruct to test cross-model stability.
    longer_term_vision: >
      A systematic benchmark × method × response-length compatibility matrix would enable
      practitioners to select UQ methods by deployment context. The controlled comparison
      framework from this work (matched conditions, bootstrap CIs, mechanism verification
      before performance interpretation) provides a template for such a matrix.
    open_questions: >
      Does NLI aggregation rate predict AUROC recovery when a domain-appropriate NLI model
      is substituted? Is the SelfCheckGPT polarity inversion specific to ChatGPT-generated
      benchmarks, or does it occur for any benchmark with "confident wrong answers"? Do
      larger LLMs (LLaMA-2-70B, GPT-4) show similar mechanism failures on HaluEval-QA?

