# PART 5: SECTION-LEVEL NARRATIVE GOALS
# ═══════════════════════════════════════════════════════════════════════════════

section_goals:

  abstract:
    narrative_purpose: "Compress the entire story into ~150 words"
    key_message: >
      Semantic entropy and SelfCheckGPT-BERTScore both fail on HaluEval-QA — and we
      identify exactly why: NLI clustering mechanism failure (quantified) and label
      polarity inversion (hypothesized). These are actionable null results.
    structure_notes: |
      - Sentence 1: Problem context (hallucination detection with UQ)
      - Sentence 2: What we did (controlled cross-signal comparison on HaluEval-QA)
      - Sentence 3: Counterintuitive core result (all methods fail; semantic entropy constant)
      - Sentence 4: Mechanism explanation (NLI clustering failure, aggregation_rate=0.272)
      - Sentence 5: Secondary finding (SelfCheckGPT below-random, polarity inversion hypothesis)
      - Sentence 6: Contribution framing (boundary conditions + reproducible framework)
    avoid:
      - "Vague claims without quantitative results"
      - "Citing papers in abstract"
      - "Claiming 'state-of-the-art' when results are null"

  introduction:
    narrative_purpose: "Hook → Problem → Insight → Preview"
    hook_strategy: >
      Open with the counterintuitive finding: deploying three state-of-the-art UQ methods
      yields AUROC from 0.356 to 0.500 — all near or below random. The method expected
      to win (semantic entropy) is constant. This immediately signals "this paper has
      something surprising to say" — compelling the reader to understand why.
    problem_escalation: |
      1. Surface: LLM hallucination is a real problem; UQ signals are a practical solution
      2. Deeper: Methods validated on different benchmarks are hard to compare; which to trust?
      3. Gap: No controlled cross-signal comparison on HaluEval-QA; generalization of NLI mechanism untested
    insight_preview: >
      Hint that the failure is mechanistic (NLI clustering) rather than a general
      limitation of UQ — framing the investigation as diagnostic rather than purely negative.
    contributions_framing: |
      Frame contributions as natural outcomes of a controlled investigation:
      (1) First empirical quantification of NLI aggregation failure on short QA (aggregation_rate=0.272)
      (2) SelfCheckGPT polarity inversion finding on ChatGPT-generated hallucination labels
      (3) Reproducible cross-signal comparison framework (code + data + methodology)
    transition_to_related_work: >
      "To understand why these methods were expected to succeed, and what distinguishes
      our setting from prior evaluations, we review the relevant literature."

  related_work:
    narrative_purpose: "Show why existing work is insufficient → justify our approach"
    positioning_strategy: >
      Frame prior work as silo'd: each method paper validates on its own benchmark.
      Semantic entropy on TriviaQA/NQ (Kuhn 2023), SelfCheckGPT on WikiBio (Manakul 2023),
      HaluEval as benchmark paper without UQ evaluation (Li 2023). Our work fills the gap
      by applying all three to the same benchmark under matched conditions.
    key_comparison_points:
      - area: "Semantic entropy (Kuhn et al., 2023)"
        limitation_to_highlight: >
          Validated only on TriviaQA and NQ with longer responses; NLI aggregation rate
          not reported; generalization to short factual QA benchmarks not tested.
        how_we_differ: >
          We test semantic entropy on HaluEval-QA, measure aggregation_rate directly,
          and trace AUROC collapse to NLI mechanism failure — establishing a domain boundary.

      - area: "SelfCheckGPT (Manakul et al., 2023)"
        limitation_to_highlight: >
          Validated on WikiBio (biography generation, long responses, human-annotated labels).
          Label construction methodology of HaluEval-QA (ChatGPT-generated) differs fundamentally.
        how_we_differ: >
          We show SelfCheckGPT is below-random on HaluEval-QA and hypothesize a polarity
          inversion mechanism specific to ChatGPT-generated confident hallucinations.

      - area: "HaluEval benchmark (Li et al., 2023)"
        limitation_to_highlight: >
          Benchmark paper does not evaluate entropy-based UQ signals. QA subset uses
          ChatGPT-generated hallucinations (confident-sounding incorrect answers).
        how_we_differ: >
          We use HaluEval-QA as the comparison target and show its label construction
          methodology creates systematic challenges for consistency-based UQ methods.

      - area: "Uncertainty quantification for LLMs (Xiong et al., 2023; Xiao et al., 2022)"
        limitation_to_highlight: >
          Cross-method comparison exists but not focused on hallucination benchmarks or
          not under matched conditions (same model, same dataset, same compute budget).
        how_we_differ: >
          Strict matched-conditions design: same 2,000-example stratified HaluEval-QA
          sample, same LLM, same bootstrap CI protocol for all three methods.

    papers_to_discuss:
      - "Kuhn et al. (2023) arXiv:2302.09664 — semantic entropy"
      - "Manakul et al. (2023) arXiv:2303.08896 — SelfCheckGPT"
      - "Li et al. (2023) arXiv:2305.11747 — HaluEval"
      - "Kadavath et al. (2022) arXiv:2207.05221 — P(True) calibration"
      - "Xiong et al. (2023) arXiv:2306.13063 — LLM confidence elicitation"
      - "Guo et al. (2017) arXiv:1706.04599 — ECE calibration foundations"

    avoid:
      - "Just listing papers without critique"
      - "Being unfair to prior work — all methods have genuine contributions in their validated domains"
      - "Missing the point that negative results in our setting do NOT contradict prior positive results"

  methodology:
    narrative_purpose: "Explain WHY this design solves the comparison problem"
    connection_to_insight: >
      The controlled design is precisely motivated by the research gap: existing papers
      compare methods in different benchmarks with different conditions. Our design
      removes confounds (same dataset, model, budget) so that AUROC differences reflect
      method quality, not evaluation artifact. The mechanism verification sub-hypotheses
      (H-M1, H-M2) are a direct consequence of treating NLI aggregation as an empirical
      question rather than an assumption.
    key_design_decisions:
      - decision: "HaluEval-QA as evaluation benchmark (2,000 stratified examples)"
        rationale: >
          HaluEval-QA is a well-known benchmark for hallucination evaluation with a large,
          publicly available sample. The QA subset is the most reliable of HaluEval's
          three tasks (Li et al., 2023). Stratified sampling (1,000 hallucinated + 1,000
          factual, seed=42) ensures balanced AUROC estimation.
        alternatives_considered: >
          TriviaQA/NQ were considered but are less specifically focused on hallucination
          detection (they measure factual accuracy, not explicit hallucination labels).
          HaluEval-QA's explicit binary hallucination labels make it the natural choice
          for AUROC-based comparison.

      - decision: "N=5 stochastic samples for SelfCheckGPT and semantic entropy"
        rationale: >
          N=5 is the minimum inference budget validated by Manakul et al. (2023) and
          provides a fair fixed-budget comparison. All three methods use the same N=5
          stochastic responses — token entropy reuses the greedy logits, semantic entropy
          and SelfCheckGPT use the stochastic samples.
        alternatives_considered: >
          N=20 would provide more stable SelfCheckGPT estimates and might recover NLI
          aggregation. We chose N=5 as the practical minimum budget; N=20 experiments
          are listed as future work.

      - decision: "Bootstrap CI (N=1000) with Bonferroni correction for pairwise comparison"
        rationale: >
          Bootstrap CIs are standard for AUROC comparison without distributional assumptions.
          Bonferroni correction (α=0.05/3=0.0167) controls family-wise error rate for
          3 pairwise comparisons. Non-overlapping CI criterion (vs. significance testing)
          is a conservative and interpretable gate condition.
        alternatives_considered: >
          DeLong test for AUROC comparison requires assumptions about result distribution.
          Bootstrap resampling is distribution-free and directly applicable to our
          paired evaluation design.

      - decision: "Mechanism verification sub-hypotheses (H-M1: correlation; H-M2: aggregation rate)"
        rationale: >
          Without mechanism verification, a degenerate AUROC=0.500 for semantic entropy
          could be attributed to any number of causes (random noise, poor dataset,
          wrong model). By measuring NLI aggregation_rate directly (H-M2) and diagnosing
          the TE-SE correlation structure (H-M1), we identify the specific mechanism
          failure — a much more informative null result.
        alternatives_considered: >
          Could have reported AUROC results only. But a controlled comparison paper
          without mechanism analysis contributes little beyond a performance table.

    intuition_building: |
      Use a diagram showing the three UQ signal pipelines:
      - Token entropy: greedy inference → logit capture → Shannon entropy
      - Semantic entropy: stochastic sampling (N=5) → NLI pairwise clustering → cluster entropy
      - SelfCheckGPT: stochastic sampling (N=5) → BERTScore(greedy, sample_i) → mean consistency

      Highlight the NLI clustering box in semantic entropy as the critical mechanism step
      being investigated by H-M2. This makes the mechanistic story visually clear.

    technical_depth_balance: |
      Main paper: UQ pipeline design, dataset/model/metric choices, mechanism verification approach.
      Appendix (if needed): NLI bidirectional union-find clustering algorithm details,
      bootstrap CI implementation, fp16 safety handling.

  experiments:
    narrative_purpose: "Design experiments that directly test the claims"
    experimental_questions:
      - question: "Do the three UQ methods produce measurably different AUROC on HaluEval-QA?"
        experiment: "H-E1: compute AUROC + bootstrap 95% CI for all three methods on same 2,000 examples; pairwise Bonferroni-corrected comparison"
        expected_outcome: "At least one method pair shows Δ≥0.05 with non-overlapping CIs (existence check)"

      - question: "Is the TE-SE divergence real or a surface artifact?"
        experiment: "H-M1: compute Pearson r(token_entropy, semantic_entropy) with bootstrap CI; measure cluster count distribution"
        expected_outcome: "r < 0.9 confirms the two signals are not redundant; degenerate SE triggers diagnosis"

      - question: "Does NLI clustering actually aggregate responses on HaluEval-QA?"
        experiment: "H-M2: measure aggregation_rate (fraction of examples with cluster count < N); compare to 0.50 threshold"
        expected_outcome: "aggregation_rate ≥ 0.50 would confirm mechanism; PIVOT (0.272) reveals failure"

    baseline_rationale: >
      The three UQ methods are the baselines for each other — the study is a within-benchmark
      comparison. Token entropy is the weakest theoretical baseline (no semantic filtering);
      semantic entropy is the strongest theoretical baseline (NLI filtering); SelfCheckGPT-BERTScore
      is an orthogonal approach (sampling consistency vs. per-token entropy).
    dataset_rationale: >
      HaluEval-QA: binary hallucination labels (ChatGPT-generated), QA format, 10K+ samples
      (we use 2,000 stratified). Chosen for explicit hallucination labels and relevance to
      UQ signal evaluation. Stratification ensures 50% base rate (AUROC interpretable as
      discrimination above 0.5 random baseline).
    metric_rationale: >
      AUROC measures discrimination ability across all thresholds — appropriate for comparing
      UQ signals without committing to a specific operating point. Bootstrap CI (N=1000)
      provides uncertainty estimates. Bonferroni correction (k=3 pairwise comparisons)
      controls family-wise error rate.
    fairness_considerations: |
      - Same 2,000-example stratified sample for all methods (seed=42)
      - Same LLM (LLaMA-2-7B-chat) for all methods
      - Same stochastic samples (N=5, temperature=1.0) reused across semantic entropy and SelfCheckGPT
      - Same bootstrap protocol (N=1000 resamples, seed=42)
      - Same NLI model (deberta-large-mnli) for semantic entropy (lorenzkuhn/semantic_uncertainty)

  results:
    narrative_purpose: "Present evidence that builds the mechanism failure story"
    main_result_highlight: >
      Semantic entropy is constant (AUROC=0.5000, std<1e-6) — not merely weak, but
      completely non-discriminative. This is causally explained by NLI aggregation failure:
      72.8% maximum clusters (aggregation_rate=0.272).
    result_presentation_order:
      - result: "NLI aggregation failure (H-M2: aggregation_rate=0.272)"
        purpose: >
          Present mechanism result FIRST — it causally explains the AUROC result.
          This is the insight that makes the null AUROC results interpretable rather
          than mysterious.

      - result: "Semantic entropy degenerate (H-E1: AUROC=0.5000, CI=[0.5,0.5]; H-M1: std<1e-6)"
        purpose: >
          Show the consequence of mechanism failure: SE provides zero information.
          The degenerate CI [0.5, 0.5] is a unique signature of a constant signal
          and should be highlighted as qualitatively different from near-random (CI spanning 0.5).

      - result: "SelfCheckGPT below-random (H-E1: AUROC=0.3562, CI=[0.332, 0.380])"
        purpose: >
          The secondary surprising finding. Present with polarity inversion interpretation.
          Emphasize that the non-overlapping CI with 0.5 confirms this is a genuine
          negative correlation, not noise.

      - result: "Token entropy near-random (H-E1: AUROC=0.4829, CI=[0.458, 0.509])"
        purpose: >
          Complete the picture: all three methods fail. Token entropy is the "least bad"
          but still non-informative. The CI spans 0.5, so token entropy could be
          either positive or negative discriminator — genuinely non-informative.

      - result: "Significant pairwise gaps (H-E1: SE>SCG Δ=0.1438; TE>SCG Δ=0.1268)"
        purpose: >
          Show the experimental infrastructure is sensitive: it correctly detects the
          large method-difference signal (SE vs. SCG) even when all methods are near-random.
          This validates the methodology for future use with discriminative signals.

    surprising_result_handling: >
      Present SelfCheckGPT's below-random result with explicit framing: "This result
      deserves careful interpretation." Distinguish between (a) SelfCheckGPT being
      a bad method (not claimed) and (b) the label construction methodology of
      HaluEval-QA creating an adversarial relationship with consistency-based detection.
      The polarity inversion hypothesis is clearly marked as a post-hoc interpretation
      requiring further experimental validation.

    avoid:
      - "Presenting AUROC numbers without mechanism context"
      - "Claiming semantic entropy 'performs poorly' without explaining the degeneracy diagnosis"
      - "Hiding the DEGENERATE_PASS result for H-M1 — it is scientifically meaningful"

  discussion:
    narrative_purpose: "Interpret results, acknowledge limits, show broader significance"
    key_findings_interpretation: >
      The joint result (SE degenerate, TE near-random, SCG below-random) establishes that
      standard UQ methods do not reliably detect hallucinations on HaluEval-QA with
      LLaMA-2-7B-chat. The mechanism diagnosis (NLI domain mismatch) and polarity
      inversion hypothesis (label construction artifact) convert this from a generic
      negative result into actionable scientific findings. The contribution is the
      diagnosis, not the performance.
    honest_limitations:
      - limitation: "Single LLM (LLaMA-2-7B-chat); Mistral-7B-Instruct not tested (H-M3 not executed)"
        why_acceptable: >
          The NLI mechanism failure (aggregation_rate=0.272) is a property of
          deberta-large-mnli on HaluEval-QA responses, not of LLaMA-2 specifically.
          The SE degeneracy finding should generalize to any LLM producing similar
          short factual QA responses.
        future_mitigation: "Execute H-M3 with Mistral-7B-Instruct; reuse h-e1 code pipeline."

      - limitation: "HaluEval-QA labels are ChatGPT-generated, not human-annotated"
        why_acceptable: >
          All three methods are subject to the same label noise, preserving the validity
          of between-method comparisons. The polarity inversion hypothesis motivates
          comparison to human-annotated benchmarks (TriviaQA, NQ) as future work.
        future_mitigation: "Run same pipeline on TriviaQA/NQ with same LLM for direct comparison."

      - limitation: "N=5 stochastic samples — minimum budget for SelfCheckGPT and SE"
        why_acceptable: >
          SCG AUROC=0.356 magnitude is too large to be a N=5 sampling artifact.
          NLI aggregation failure at N=5 is expected to partially recover at N=20
          but not fully (72.8% at max clusters is far from the ≥50% aggregation threshold).
        future_mitigation: "Test N=20 on 500-example subset to quantify N effect on aggregation."

    broader_impact_statement: >
      This work advances safe LLM deployment by providing concrete boundary conditions
      for three widely-used hallucination detection methods. Negative results with
      mechanism analysis are more actionable than positive results from siloed evaluations:
      they tell practitioners exactly when and why to distrust a detection method,
      and what to test to recover performance.

  conclusion:
    narrative_purpose: "Reinforce key message + open future directions with callback to hook"
    callback_to_hook: >
      Return to the opening finding: "We set out to test which of three state-of-the-art
      UQ methods best detects hallucinations on HaluEval-QA. The answer — that none of them
      do — turns out to be the more informative finding." This closes the narrative loop
      from the counterintuitive opening.
    memorable_ending: >
      "The NLI aggregation failure that collapses semantic entropy on HaluEval-QA is not
      a dead end — it is a precise specification of what the next step must be: a NLI model
      calibrated for short factual QA responses. The measurement framework and codebase
      developed here make that next experiment straightforward."
    future_work_vision: >
      Three high-priority extensions: (1) QA-specific NLI model substitution (zero new
      LLM inference, reuse H-E1 stochastic samples); (2) Cross-model validation with
      Mistral-7B-Instruct; (3) Comparison on human-annotated benchmarks (TriviaQA, NQ)
      to isolate benchmark-type effect from model effect.

