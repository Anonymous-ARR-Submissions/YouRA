hypothesis_draft:
  title: "Semantic Entropy Superiority for Hallucination Detection: A Controlled Cross-Signal Comparison on HaluEval-QA"
  hypothesis_id: "H-SemanticEntropyUQ-v1"
  core_claim: |
    Semantic entropy achieves statistically significantly higher AUROC for binary hallucination
    detection on HaluEval-QA than both token-level entropy and SelfCheckGPT-BERTScore (N=5),
    when all methods are applied to the same open-source LLM (LLaMA-2-7B-chat and
    Mistral-7B-Instruct) under fixed-budget matched inference conditions.
    This advantage arises because semantic entropy filters surface-form noise via NLI clustering,
    while token entropy conflates surface and semantic variance, and SelfCheckGPT achieves
    similar discrimination power at 5× the compute cost.
  mechanism: |
    Step 1: LLM token probability distributions contain mixed surface-form and semantic uncertainty.
    Step 2: Semantic entropy isolates semantic uncertainty by clustering NLI-equivalent responses
            (via deberta-large-mnli), filtering surface noise that reduces token entropy's discriminative power.
    Step 3: The cleaner semantic signal produces better AUROC discrimination between hallucinated
            (high semantic uncertainty) and factual (low semantic uncertainty) responses on HaluEval-QA.
  predictions:
    - P1: "Semantic entropy AUROC > token entropy AUROC by ≥ 0.05 on HaluEval-QA (both LLMs, bootstrap p < 0.05)"
    - P2: "SelfCheckGPT-BERTScore (N=5) AUROC is intermediate between token entropy and semantic entropy"
    - P3: "AUROC ranking order (semantic entropy ≥ SelfCheckGPT ≥ token entropy) preserved across both LLMs"

variables_summary:
  independent: "UQ Signal Type (7 levels: 3 token entropy variants, semantic entropy, 3 SelfCheckGPT variants) × LLM Model (2 levels: LLaMA-2-7B-chat, Mistral-7B-Instruct)"
  dependent_primary: "AUROC for binary hallucination detection on HaluEval-QA (bootstrap 95% CI, N=1000)"
  controlled: "Inference parameters (temperature, max_new_tokens, tokenizer), dataset sample (fixed 2,000-example stratified), NLI model (deberta-large-mnli), SelfCheckGPT N=5"

null_hypothesis:
  h0_statement: |
    There is no statistically significant difference in AUROC for binary hallucination detection
    on HaluEval-QA among token-level entropy (mean), semantic entropy, and SelfCheckGPT-BERTScore (N=5)
    when applied to the same LLM under matched inference conditions
    (all pairwise bootstrap 95% CIs overlap; p ≥ 0.05 for all comparisons).
  statistical_test: "Bootstrap AUROC comparison with 95% confidence intervals (N=1000 resamples); Bonferroni correction for 3 pairwise comparisons per LLM."
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "Controlled cross-signal comparison eliminating benchmark and model confounds from prior work (Kuhn 2023 on TriviaQA only; Manakul 2023 on WikiBio only). First AUROC comparison of all three UQ signal families + all SelfCheckGPT variants on HaluEval-QA."
  differentiation_summary: |
    Kuhn et al. (2023) established semantic entropy but evaluated on different benchmarks without SelfCheckGPT comparison.
    Manakul et al. (2023) established SelfCheckGPT but evaluated on biography generation without entropy baselines.
    Xiong et al. (2023) compared confidence elicitation methods but not specifically AUROC on hallucination benchmarks.
    This study is the first to place all three signal families on the same benchmark, same LLMs, same statistical framework.
    Additionally novel: stratification by HaluEval question type (QA/dialogue/summarization), all SelfCheckGPT variants, 3 token entropy aggregations.

