  baselines:
    - "token_entropy_mean"
    - "token_entropy_first"
    - "token_entropy_logprob"
    - "semantic_entropy (lorenzkuhn/semantic_uncertainty + deberta-large-mnli)"
    - "selfcheckgpt_bertscore_n5 (potsawee/selfcheckgpt)"
    - "selfcheckgpt_nli_n5"
    - "selfcheckgpt_ngram_n5"

measurement_plan:
  data_collection:
    - source: "HaluEval-QA: stratified 2,000-example sample (balanced hallucinated/factual). Load via HuggingFace datasets API."
    - source: "LLM generations: for each example, generate 1 greedy response (for entropy) + 5 stochastic samples at temp=1.0 (for SelfCheckGPT). Save to disk to avoid re-generation."
    - source: "Token scores: extracted via model.generate(output_scores=True, return_dict_in_generate=True)."
  procedure:
    - step: "1. Stratified sample 2,000 examples from HaluEval-QA (balanced by question type and hallucination label)"
    - step: "2. For each example × model: generate greedy response (temp=0) + 5 stochastic samples (temp=1.0), save all logits"
    - step: "3. Compute token entropy variants (mean, first, logprob) from greedy generation logits"
    - step: "4. Run semantic entropy: load semantic_uncertainty codebase, run NLI clustering on 5 stochastic samples, compute semantic entropy"
    - step: "5. Run SelfCheckGPT variants (BERTScore, NLI, nGram) on 5 stochastic samples vs. greedy response"
    - step: "6. Compute AUROC for each UQ signal vs. HaluEval-QA binary labels using sklearn.metrics.roc_auc_score"
    - step: "7. Bootstrap 1000 resamples for each AUROC; compute 95% CI and pairwise p-values"
    - step: "8. Stratify results by HaluEval question type (QA/dialogue/summarization)"
    - step: "9. Repeat steps 2-8 for second LLM (Mistral-7B-Instruct)"
    - step: "10. Compute Spearman rank correlation of method rankings across the two LLMs (P3 test)"
  success_criteria:
    - "AUROC(semantic entropy) > AUROC(token_entropy_mean) by ≥ 0.05 with non-overlapping 95% bootstrap CIs for both LLMs (P1)"
    - "AUROC(SelfCheckGPT-BERTScore) falls between AUROC(token_entropy_mean) and AUROC(semantic entropy) or is not significantly different from semantic entropy (P2)"
    - "Spearman ρ ≥ 0.8 for method AUROC rankings across LLaMA-2-7B and Mistral-7B (P3)"

validation:
  internal_validity:
    - "Fixed experimental conditions (same tokenizer, same inference parameters, same dataset sample) prevent method-specific confounds"
    - "Pre-specified token entropy aggregation strategy prevents post-hoc cherry-picking"
    - "Bonferroni correction prevents false positives from multiple comparisons (3 UQ methods × 2 LLMs = 6 primary tests)"
    - "NLI model fixed to official Kuhn 2023 implementation (deberta-large-mnli) prevents NLI-quality confounds"
  external_validity:
    - "Two LLM families (LLaMA-2 architecture, Mistral architecture) improves generalizability beyond single model"
    - "HaluEval-QA covers diverse factual QA questions; stratification by question type enables subgroup analysis"
    - "Public code and data enable independent replication"
    - "Acknowledged limitation: results may not generalize to larger models (>13B), closed-source models, or non-English QA"

discussion_synthesis:
  key_insights:
    - "The core gap is a benchmark confound: Kuhn (TriviaQA) and Manakul (WikiBio) never competed on the same field — this study creates the level playing field."
    - "Signal efficiency is a practical novelty: semantic entropy achieves higher discrimination in a single forward pass vs. SelfCheckGPT's N forward passes."
    - "HaluEval's label noise (ChatGPT-generated) is a limitation but not a fatal flaw — it affects all methods equally and can be analyzed via question-type stratification."
    - "The negative-result framing (token entropy ≈ semantic entropy) is equally valuable: if confirmed, it shows semantic clustering adds no value over simpler token entropy."
    - "Cross-model stability is the high-impact scientific question — if the ranking reverses for Mistral, practitioners need model-specific guidance."
  breakthrough_moments:
    - "Exchange 3 (Dr. Sage): Reframing from 'ranking study' to 'cross-model stability of ranking' elevated scientific significance substantially."
    - "Exchange 6 (Prof. Rex): Identifying token entropy aggregation ambiguity as a pre-registration requirement prevented a critical post-hoc analysis flaw."
    - "Exchange 7 (Dr. Nova): Turning HaluEval label noise from a limitation into an analysis variable (question-type stratification) added genuine novelty."
  resolved_tensions:
    - "Tension: 3 LLMs (Dr. Sage) vs. 2 LLMs (Prof. Pax) — resolved in favor of 2 LLMs for compute feasibility, with cross-model stability as a prediction rather than exhaustive coverage."
    - "Tension: Token entropy underspecified — resolved by pre-specifying all 3 aggregation strategies and reporting best-performing as the baseline."
    - "Tension: SelfCheckGPT variant selection bias — resolved by reporting all 3 variants and using best-performing for primary comparison."
