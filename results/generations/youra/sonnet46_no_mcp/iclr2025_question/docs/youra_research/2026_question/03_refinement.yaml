variables:
  independent:
    - name: "UQ Signal Type"
      type: "categorical"
      operationalization: "Which uncertainty quantification method is applied to the LLM output"
      levels:
        - "token_entropy_mean: mean Shannon entropy across all generated tokens from model.generate(output_scores=True)"
        - "token_entropy_first: entropy of first generated token only"
        - "token_entropy_logprob: negative mean log-probability of generated tokens"
        - "semantic_entropy: entropy over NLI-clustered semantic equivalence classes [Kuhn 2023, deberta-large-mnli]"
        - "selfcheckgpt_bertscore: cross-sample BERTScore consistency across N=5 stochastic samples"
        - "selfcheckgpt_nli: cross-sample NLI consistency across N=5 stochastic samples"
        - "selfcheckgpt_ngram: n-gram overlap consistency across N=5 stochastic samples"
    - name: "LLM Model"
      type: "categorical"
      operationalization: "Which open-source LLM generates the responses"
      levels:
        - "llama2-7b-chat: LLaMA-2-7B-chat (HuggingFace: meta-llama/Llama-2-7b-chat-hf)"
        - "mistral-7b-instruct: Mistral-7B-Instruct-v0.2 (HuggingFace: mistralai/Mistral-7B-Instruct-v0.2)"
  dependent:
    - name: "AUROC for Hallucination Detection"
      type: "continuous"
      operationalization: "Area Under the ROC Curve for binary hallucination/factual classification on HaluEval-QA labels. Range [0,1]; higher = better discrimination. Bootstrap 95% CI reported (N=1000 resamples)."
      primary: true
    - name: "AUROC by Question Type"
      type: "continuous"
      operationalization: "AUROC stratified by HaluEval question type: QA, dialogue, summarization. Reported separately per UQ signal per model."
      primary: false
    - name: "Inference Compute Cost"
      type: "continuous"
      operationalization: "Wall-clock seconds per example on single GPU (A100 or equivalent). Reported for fixed N=5 SelfCheckGPT budget vs. single-pass entropy methods."
      primary: false
  controlled:
    - name: "LLM Inference Parameters"
      operationalization: "Fixed: temperature=1.0 (SelfCheckGPT sampling), temperature=0 (greedy for entropy computation), max_new_tokens=256, same tokenizer"
    - name: "Dataset Sample"
      operationalization: "Fixed stratified 2,000-example sample from HaluEval-QA; same sample used for all UQ signals and both LLMs"
    - name: "NLI Model for Semantic Entropy"
      operationalization: "Fixed: microsoft/deberta-large-mnli as specified in lorenzkuhn/semantic_uncertainty official implementation"
    - name: "SelfCheckGPT Sample Count"
      operationalization: "Fixed: N=5 stochastic samples per example for all SelfCheckGPT variants"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 3
  steps:
    - step: 1
      description: "LLM token probability distributions encode both surface-form and semantic uncertainty simultaneously. When generating a factual response, uncertainty about the correct fact (semantic uncertainty) and uncertainty about word choice/phrasing (surface uncertainty) both contribute to token entropy."
      evidence: "Kuhn et al. (2023) demonstrate that token entropy and semantic entropy diverge on factual QA tasks where surface synonymy is high — 'United States', 'the US', 'America' produce high token diversity but identical semantic meaning."
      falsifier: "If token entropy and semantic entropy are highly correlated (r > 0.9) across all HaluEval-QA responses, the conflation claim is false and both signals capture the same variance."
    - step: 2
      description: "Semantic entropy filters surface-form noise by clustering NLI-equivalent responses before computing entropy. The NLI model (deberta-large-mnli) assigns semantic equivalence labels; entropy is computed over the cluster distribution, not the token distribution. This produces a cleaner estimate of uncertainty about the correct factual answer."
      evidence: "Kuhn et al. (2023) official implementation demonstrates this clustering approach; empirically outperforms token entropy on TriviaQA/NQ in their controlled experiments."
      falsifier: "If NLI clustering produces singleton clusters for most responses (i.e., all N samples are semantically distinct), semantic entropy collapses to token-level diversity and the filtering advantage disappears."
    - step: 3
      description: "The cleaner semantic uncertainty signal provides better discrimination between hallucinated responses (high semantic uncertainty) and factual responses (low semantic uncertainty), yielding higher AUROC on HaluEval-QA binary labels than token entropy. SelfCheckGPT achieves intermediate performance: it implicitly measures semantic consistency (agreement across N samples) but requires N forward passes to do what semantic entropy does in one."
      evidence: "HaluEval-QA binary labels partition responses into hallucinated/factual; semantic entropy's better calibration to the hallucination/factual distinction should produce higher AUROC than token entropy."
      falsifier: "If SelfCheckGPT AUROC ≥ semantic entropy AUROC, the 'single-pass advantage' claim for semantic entropy fails. If token entropy AUROC ≥ semantic entropy AUROC on HaluEval-QA, the surface-noise filtering mechanism is not the relevant discriminator on this benchmark."
  key_tension: "The NLI clustering in semantic entropy introduces a dependency on NLI model quality. If deberta-large-mnli makes systematic errors on HaluEval-QA response types, semantic entropy's 'cleaner signal' claim may not hold. Additionally, HaluEval labels are ChatGPT-generated (not human-annotated), introducing label noise that could attenuate all AUROC values toward 0.5."
  evidence_summary: |
    Kuhn et al. (2023) provide strong evidence for Step 1-2 (semantic > token entropy on TriviaQA/NQ).
    The mechanism generalizes to HaluEval-QA if: (a) the NLI model handles QA-style short responses well,
    and (b) semantic variation in HaluEval-QA hallucinations is similar to TriviaQA/NQ hallucinations.
    Both assumptions are plausible but untested on HaluEval — this is the core empirical contribution.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "HaluEval-QA binary labels (ChatGPT-generated) have sufficient quality to discriminate hallucinated from factual responses, despite not being human-annotated."
    supporting_evidence: "Li et al. (2023) report high inter-annotator agreement on HaluEval-QA subset; the QA subset is considered the most reliable of the three HaluEval tasks."
    consequence_if_violated: "AUROC values for all UQ signals will be attenuated toward 0.5; the comparison remains valid (same noise affects all methods equally) but absolute AUROC values cannot be generalized to human-labeled benchmarks."
  - id: "A2"
    assumption: "deberta-large-mnli correctly identifies semantic equivalence for short factual QA responses (1-3 sentences) from LLaMA-2 and Mistral."
    supporting_evidence: "Kuhn et al. (2023) use this NLI model for TriviaQA/NQ responses of similar length and report reliable clustering."
    consequence_if_violated: "Semantic entropy clustering will be noisy; advantage over token entropy may vanish or reverse. Falsifies Step 2 of causal mechanism."
  - id: "A3"
    assumption: "N=5 stochastic samples for SelfCheckGPT provides stable consistency estimates (low variance in AUROC)."
    supporting_evidence: "Manakul et al. (2023) report stable results with N=5-20; N=5 is the lower bound of their tested range."
    consequence_if_violated: "SelfCheckGPT AUROC estimates will have high variance; bootstrap CIs will overlap and cross-method comparisons become inconclusive."
  - id: "A4"
    assumption: "LLaMA-2-7B-chat and Mistral-7B-Instruct are sufficiently capable on HaluEval-QA questions to exhibit meaningful uncertainty variation (i.e., they sometimes hallucinate, sometimes answer correctly)."
    supporting_evidence: "Both models are known to hallucinate on factual QA tasks; HaluEval-QA was designed to elicit such hallucinations."
    consequence_if_violated: "If models answer all questions confidently (low entropy, high consistency), UQ signals will not vary and AUROC will be near 0.5 for all methods."
  - id: "A5"
    assumption: "The AUROC ranking order observed on HaluEval-QA (semantic entropy > SelfCheckGPT > token entropy) generalizes to the Mistral model if it holds for LLaMA-2."
    supporting_evidence: "Dr. Sage noted that cross-model stability is the key high-impact question; the assumption is that the mechanism is model-architecture-independent."
    consequence_if_violated: "If the ranking reverses for Mistral, the result is a model-dependent finding rather than a universal recommendation — scientifically interesting but limits practical guidance."

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Open-source decoder-only LLMs with accessible logits (HuggingFace Transformers compatible)
    - Factual QA hallucination detection tasks with existing binary labels
    - Benchmarks with sufficient label quality for AUROC computation
    - Models in the 7B parameter range (tested: LLaMA-2-7B-chat, Mistral-7B-Instruct)
    - Short-to-medium factual responses (1-3 sentences; QA-style outputs)
  does_not_apply_to: |
    - Closed-source LLMs without logit access (GPT-4, Claude, Gemini) — token entropy and semantic entropy are inaccessible
    - Multimodal VLMs (addressed in Gap 3 of Phase 1 — separate hypothesis required)
    - Long-form generation tasks (summarization, dialogue) where entropy aggregation becomes ambiguous
    - Models > 13B parameters (compute budget constraints of this study)
    - Languages other than English (HaluEval-QA is English-only; NLI model trained on English)
  known_limitations: |
    - HaluEval labels are ChatGPT-generated, not human-annotated (label noise)
    - N=5 stochastic samples for SelfCheckGPT is the minimum tested budget (may underestimate optimal SelfCheckGPT performance)
    - Generalization to other benchmarks (TriviaQA, NQ) not empirically verified in this study
    - Semantic entropy compute overhead (~30% more than token entropy, ~5× less than SelfCheckGPT N=5) not measured precisely

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "Semantic entropy achieves statistically significantly higher AUROC than token-level entropy (best aggregation: mean entropy) on HaluEval-QA for both LLaMA-2-7B-chat and Mistral-7B-Instruct."
    test_method: "Compute AUROC for both methods on the same 2,000-example stratified HaluEval-QA sample. Bootstrap CI (N=1000 resamples). Report pairwise AUROC difference with 95% CI."
    success_criterion: "AUROC(semantic entropy) > AUROC(token entropy) by ≥ 0.05, with non-overlapping 95% bootstrap CIs, for both LLMs independently."
    falsification: "If AUROC difference < 0.05 or CIs overlap for either LLM, P1 is falsified. If token entropy outperforms semantic entropy, the surface-noise filtering mechanism is not the relevant discriminator on HaluEval-QA."
  - id: "P2"
    primary: false
    statement: "SelfCheckGPT-BERTScore (N=5) achieves intermediate AUROC between token entropy and semantic entropy on HaluEval-QA."
    test_method: "Compare AUROC of all three methods using bootstrap CI. SelfCheckGPT AUROC should fall in the interval [AUROC(token entropy), AUROC(semantic entropy)] or within their overlapping CI range."
    success_criterion: "AUROC(token entropy) < AUROC(SelfCheckGPT-BERTScore) < AUROC(semantic entropy) OR no significant difference between SelfCheckGPT and semantic entropy (both > token entropy)."
    falsification: "If SelfCheckGPT AUROC > semantic entropy AUROC (with non-overlapping CIs), P2 is falsified and SelfCheckGPT is the superior practical method despite higher compute cost."
  - id: "P3"
    primary: false
    statement: "The AUROC ranking order (semantic entropy ≥ SelfCheckGPT-BERTScore ≥ token entropy) is preserved across both LLaMA-2-7B-chat and Mistral-7B-Instruct."
    test_method: "Compute AUROC rankings independently for each LLM. Compare whether the ordinal ranking is preserved. Spearman rank correlation between LLM-specific AUROC vectors."
    success_criterion: "Spearman ρ ≥ 0.8 for method ranking across the two LLMs; individual method rankings do not reverse between models."
    falsification: "If the ranking reverses for Mistral (e.g., token entropy outperforms semantic entropy on Mistral but not on LLaMA-2), P3 is falsified and findings are model-specific."

