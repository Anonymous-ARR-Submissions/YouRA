# SECTION 2: Experimental Setup Selection
# ═══════════════════════════════════════════════════════════════

experimental_setup:
  dataset:
    name: "HaluEval-QA"
    type: "standard"
    source: "Li et al. (2023) arXiv:2305.11747"
    path: "HuggingFace datasets: pminervini/HaluEval or RUCAIBox/HaluEval (QA subset)"
    hypothesis_fit: "HaluEval-QA provides binary hallucination labels for factual QA responses, directly enabling AUROC computation for UQ signal discrimination. The QA subset has highest label reliability of the three HaluEval tasks. 2,000-example stratified sample provides stable AUROC estimates (standard error < 0.02 for AUROC > 0.6)."
  model:
    name: "LLaMA-2-7B-chat + Mistral-7B-Instruct-v0.2"
    type: "decoder-only causal LM"
    source: "HuggingFace: meta-llama/Llama-2-7b-chat-hf, mistralai/Mistral-7B-Instruct-v0.2"
    hypothesis_fit: "Both models have accessible logits via HuggingFace Transformers generate(output_scores=True). Both are known to hallucinate on factual QA, providing sufficient label-positive examples. 7B scale is feasible on single A100 GPU within compute budget."
  baselines:
    - name: "Token Entropy (Mean)"
      method: "Mean Shannon entropy across all generated tokens: H = -sum(p * log(p)) averaged over token positions. Computed from output_scores in model.generate()."
    - name: "Token Entropy (First Token)"
      method: "Shannon entropy of first generated token only. Simple baseline testing whether first-token uncertainty is sufficient."
    - name: "Token Entropy (Mean Log-Prob)"
      method: "Negative mean log-probability of generated tokens: -(1/T) * sum(log p(t_i)). Standard LM confidence score."
    - name: "SelfCheckGPT-BERTScore (N=5)"
      method: "Cross-sample BERTScore consistency across 5 stochastic samples (temperature=1.0). Official potsawee/selfcheckgpt implementation."
    - name: "SelfCheckGPT-NLI (N=5)"
      method: "Cross-sample NLI consistency across 5 stochastic samples. Same NLI model (deberta-large-mnli) for comparability."
    - name: "SelfCheckGPT-nGram (N=5)"
      method: "Cross-sample n-gram overlap consistency across 5 stochastic samples. Lightweight variant."

