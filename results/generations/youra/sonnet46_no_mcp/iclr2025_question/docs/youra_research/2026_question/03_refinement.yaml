      evidence: "Manakul et al. (2023) arXiv:2303.08896 — official results on WikiBio"
    - claim: "HaluEval-QA provides binary hallucination labels for ~10K QA examples"
      status: "BUILD_ON"
      evidence: "Li et al. (2023) arXiv:2305.11747 — benchmark paper with public dataset"
    - claim: "No prior work compares all three UQ signal families on the same LLM under matched conditions on HaluEval"
      status: "PROVE_NEW"
      evidence: "Literature review in Phase 1 — cross-benchmark comparison gap confirmed"
    - claim: "Semantic entropy achieves higher AUROC than token entropy on HaluEval-QA (LLaMA-2-7B-chat)"
      status: "PROVE_NEW"
      evidence: "Core hypothesis — untested, requires empirical verification"
    - claim: "AUROC ranking order (semantic entropy > SelfCheckGPT > token entropy) is cross-model stable"
