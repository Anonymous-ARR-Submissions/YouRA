main_hypothesis:
  id: H-SemanticEntropyUQ-v1
  title: 'Semantic Entropy Superiority for Hallucination Detection: A Controlled Cross-Signal Comparison on HaluEval-QA'
  statement: 'Under fixed-budget inference conditions on HaluEval-QA (2,000 stratified examples),

    if three uncertainty quantification signals — token-level entropy (mean aggregation),

    semantic entropy [Kuhn et al., 2023], and SelfCheckGPT-BERTScore [Manakul et al., 2023]

    with N=5 stochastic samples — are applied to the same open-source LLM

    (LLaMA-2-7B-chat and Mistral-7B-Instruct),

    then semantic entropy will achieve statistically significantly higher AUROC for binary

    hallucination detection than both token entropy and SelfCheckGPT-BERTScore,

    because semantic entropy captures uncertainty at the semantic-meaning level by clustering

    NLI-equivalent responses, filtering the surface-form noise that inflates token entropy''s

    variance and reduces its discriminative power on multi-token factual QA responses.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: HaluEval-QA (2,000 stratified examples, QA subset)
    model: LLaMA-2-7B-chat + Mistral-7B-Instruct-v0.2
    optimizer: null
    hyperparameters:
      temperature_greedy: 0.0
      temperature_stochastic: 1.0
      max_new_tokens: 256
      selfcheckgpt_n_samples: 5
      bootstrap_resamples: 1000
      nli_model: microsoft/deberta-large-mnli
