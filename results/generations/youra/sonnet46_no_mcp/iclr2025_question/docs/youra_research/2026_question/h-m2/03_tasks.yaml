    dependencies: ["L-3-2"]
    reference_files:
      - file: "03_logic.md"
        section: "L-3-3"

  - id: "A-4"
    title: "Aggregation Rate + Bootstrap CI"
    type: "analysis"
    priority: 84
    complexity: 10
    description: >
      Implement analysis.py bootstrap functions.
      compute_aggregation_rate(cluster_counts, n_samples=5) = float(np.mean(cluster_counts < n_samples)).
      bootstrap_aggregation_ci(cluster_counts, n_resamples=1000, seed=42, n_samples=5):
      uses np.random.default_rng(seed) with .integers() for reproducible resampling,
      percentile method [2.5, 97.5], returns {aggregation_rate, ci_lower, ci_upper, gate_pass}.
      gate_pass = (aggregation_rate >= 0.50 AND ci_lower >= 0.30).
    acceptance_criteria:
      - "compute_aggregation_rate returns float in [0.0, 1.0]"
      - "bootstrap_aggregation_ci with seed=42 is deterministic"
      - "CI uses percentile method [2.5, 97.5] on 1000 bootstrap rates"
      - "gate_pass correctly AND-combines both threshold conditions"
    dependencies: ["A-3"]
    reference_files:
      - file: "03_logic.md"
        section: "A-4: Aggregation Rate + Bootstrap CI"
      - file: "03_prd.md"
        section: "FR-2: Compute Aggregation Rate"

