    acceptance_criteria:
      - "_cluster_count_for_example returns int in [1, n_samples]"
      - "Single sample list returns cluster_count=1"
      - "Uses cluster_by_nli from h-e1/code/uq_signals.py (not h-m1 inspect_cluster_distribution)"
    dependencies: ["L-3-1"]
    reference_files:
