      gate_pass combining both conditions.
    acceptance_criteria:
      - "Same seed produces identical CI across runs"
      - "gate_pass=False when aggregation_rate < 0.50 even if ci_lower >= 0.30"
      - "gate_pass=False when ci_lower < 0.30 even if aggregation_rate >= 0.50"
    dependencies: ["L-4-1"]
    reference_files:
