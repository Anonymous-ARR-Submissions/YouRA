      Two-tailed p-value. Direction hypothesis: lower cluster_count → factual (label=0) → expected r_pb > 0.
    acceptance_criteria:
      - "Returns correct (r_pb, p_value) from scipy.stats.pointbiserialr"
      - "meaningful=True when |r_pb| >= 0.10"
      - "p_value is two-tailed"
    dependencies: ["A-5"]
    reference_files:
