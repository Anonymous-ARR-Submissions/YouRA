    priority: 94
    description: >
      Create h-m2/code/ directory structure with tests/ subfolder. Verify all
      required input files exist: h-e1/code/data/halueval_qa_2k.json (2000 entries),
      h-e1/code/outputs/stochastic_samples.jsonl (2000 lines),
