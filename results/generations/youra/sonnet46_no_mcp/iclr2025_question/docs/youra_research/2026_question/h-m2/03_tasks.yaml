      h-m1/code/outputs/experiment_results.json.
      Install dependencies: numpy, scipy, matplotlib, seaborn, tqdm.
      transformers + torch only needed for NLI re-clustering fallback path.
    acceptance_criteria:
      - "h-m2/code/ directory structure created with tests/__init__.py"
      - "All 4 H-E1/H-M1 input files verified to exist"
      - "pip install numpy scipy matplotlib seaborn tqdm completes without error"
