      Validate input is np.ndarray with values in [1,5].
    acceptance_criteria:
      - "Returns correct rate for known inputs (e.g., all-5 array → 0.0)"
      - "Returns 1.0 for all-1 array (all fully collapsed)"
    dependencies: ["A-4"]
    reference_files:
      - file: "03_logic.md"
        section: "L-4-1"

