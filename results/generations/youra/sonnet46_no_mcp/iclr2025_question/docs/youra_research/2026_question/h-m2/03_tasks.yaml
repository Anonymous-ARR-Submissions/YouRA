  - id: "A-1"
    title: "Config Module"
    type: "implementation"
    priority: 93
    complexity: 6
    description: >
      Implement ExperimentConfig dataclass in h-m2/code/config.py with all fields:
      seed=42, n_bootstrap=1000, n_samples_per_example=5,
      aggregation_gate_threshold=0.50, aggregation_ci_lower_threshold=0.30,
      collapse_rate_threshold=0.20, correlation_threshold=0.10.
      All input paths (relative to h-m2/code/), output paths, visualization settings
      (dpi=150, per-figure figsize). Also write config.yaml schema. get_config() helper.
    acceptance_criteria:
      - "ExperimentConfig dataclass with all fields and correct defaults"
      - "config.yaml file matches dataclass fields"
      - "Paths resolve correctly relative to h-m2/code/"
      - "nli_model_id field included (required by load_nli_pipeline)"
    dependencies: ["ENV-1"]
    reference_files:
      - file: "03_config.md"
        section: "ExperimentConfig Dataclass"
      - file: "03_architecture.md"
        section: "ExperimentConfig"

  - id: "A-2"
    title: "Data Loader — Primary Path"
    type: "implementation"
    priority: 90
    complexity: 8
    description: >
      Implement data_loader.py primary loading functions:
      load_labels() loads hallucination labels from halueval_qa_2k.json as np.ndarray (2000,) int.
      load_cluster_counts_from_se_json() attempts to extract per-example cluster counts
      from semantic_entropy.json — expected to return None (float scores only, not cluster counts).
      validate_cluster_counts() asserts len==2000, clamps values to [1,5], warns on out-of-range.
      load_cluster_counts() implements 3-priority loader: se_json → hm1_summary → nli_recluster.
    acceptance_criteria:
      - "load_labels() returns np.ndarray shape (2000,) with values in {0,1}"
      - "load_cluster_counts_from_se_json() returns None (float scores, not cluster counts)"
      - "validate_cluster_counts() clamps to [1,5] and raises if len != 2000"
      - "load_cluster_counts() tries all 3 sources in priority order"
    dependencies: ["A-1"]
    reference_files:
      - file: "03_architecture.md"
        section: "DataLoader"
      - file: "03_prd.md"
        section: "FR-1: Load H-E1 Cluster Count Data"

  - id: "A-3"
    title: "Data Loader — Fallback NLI Re-clustering"
    type: "implementation"
    priority: 87
    complexity: 14
    description: >
      Implement fallback NLI re-clustering path in data_loader.py.
      _get_nli_pipeline_for_recluster() injects h-e1/code to sys.path and loads
      deberta-large-mnli via load_nli_pipeline() from h-e1/code/uq_signals.py.
      _cluster_count_for_example() calls cluster_by_nli(samples, nli_pipeline, batch_size=16)
      and returns len(set(cluster_ids.values())) in [1,5].
      load_cluster_counts_from_stochastic_samples() iterates all 2000 examples with tqdm,
      sorts by record["id"], returns np.ndarray (2000,) int.
      CRITICAL: cluster_by_nli() returns Dict[int,int] ({sample_idx: cluster_id});
      use cluster_by_nli from h-e1/uq_signals.py (NOT inspect_cluster_distribution from h-m1).
    acceptance_criteria:
      - "sys.path injection for h-e1/code works before import"
      - "load_nli_pipeline requires cfg.nli_model_id attribute"
      - "_cluster_count_for_example returns int in [1,5]"
      - "load_cluster_counts_from_stochastic_samples returns ndarray shape (2000,)"
      - "tqdm progress bar shown during re-clustering"
    dependencies: ["A-2"]
    reference_files:
      - file: "03_logic.md"
        section: "A-3: Data Loader — Fallback NLI Re-clustering"
      - file: "03_logic.md"
        section: "External Dependencies API"
      - file: "02c_experiment_brief.md"
        section: "Implementation Research Summary"

