    description: |
      Implement compute_selfcheckgpt_bertscore() using official selfcheckgpt package.

      Key implementation details (from 03_logic.md):
        - Sentence segmentation: nltk.sent_tokenize(greedy_response)
        - If no sentences detected, wrap full response as single sentence
        - checker = SelfCheckBERTScore(rescale_with_baseline=True)
        - scores = checker.predict(sentences=[s1, s2, ...], sampled_passages=samples[:5])
        - scores shape: [num_sentences] — inconsistency per sentence
        - Aggregate: mean(scores) → single float
        - Higher score = more inconsistent = more hallucinated
        - Cache checker instance across examples (expensive to load)
    feature_tag: "model"
