  - id: "task-008"
    epic: "A-3 UQ Signal Computation"
    title: "L-A3-1: Implement NLI bidirectional clustering and semantic entropy"
    description: |
      Implement cluster_by_nli() using union-find bidirectional NLI entailment (Kuhn 2023).

      Key implementation details (from 03_logic.md):
        - Build N*(N-1) ordered pairs from N=5 samples → 20 pairs
        - NLI output shape: [B, 3] where labels are [contradiction, neutral, entailment]
        - Bidirectional: both (i→j) AND (j→i) must predict ENTAILMENT (label index 2)
        - Use union-find for transitive cluster closure (not greedy assignment)
        - Cluster frequency: Counter(cluster_ids.values()); probs = [c/N for c in counts]
        - Shannon entropy: -sum(p * log(p) for p in probs if p > 0)
        - Edge case: N=1 sample → entropy=0.0
    feature_tag: "model"
    priority: 49
    source_document: "03_logic.md"
    complexity: null
    test_requirements: |
      - test_clustering_identical_samples(): all same → 1 cluster
      - test_clustering_all_distinct(): all different → N clusters
      - test_entropy_zero_one_cluster(): single cluster → entropy=0
    reference_files:
      logic: "03_logic.md#L-A3-1"
      architecture: "03_architecture.md#A-3-UQ-Signal-Computation"
      config: null

  - id: "task-009"
    epic: "A-3 UQ Signal Computation"
    title: "L-A3-2: Implement token entropy mean with fp16 safety"
    description: |
      Implement compute_token_entropy_mean() with numerical stability.

      Key implementation details (from 03_logic.md):
        - Cast fp16 logits to float32 before softmax: logits.float()
        - probs = torch.softmax(logits.float(), dim=-1)  # shape [seq_len, vocab_size]
        - token_entropies = -torch.sum(probs * torch.log(probs + 1e-9), dim=-1)  # [seq_len]
        - return token_entropies.mean().item()
        - Only compute entropy over generated tokens (not prompt tokens)
        - Skip padding tokens (attention_mask=0 positions)
    feature_tag: "model"
    priority: 45
    source_document: "03_logic.md"
    complexity: null
    test_requirements: |
