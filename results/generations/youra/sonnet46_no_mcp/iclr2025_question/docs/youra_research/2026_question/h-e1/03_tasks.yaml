    title: "L-A2-2: Implement batched stochastic sampling (N=5 in single generate call)"
    description: |
      Implement run_stochastic_inference() using input_ids.expand() for efficiency.

      Key implementation details (from 03_logic.md):
        - Encode single example: input_ids shape [1, prompt_len]
        - Expand: input_ids.expand(N, -1) → [N, prompt_len] for N=5 parallel samples
        - model.generate(expanded_ids, do_sample=True, temperature=1.0, max_new_tokens=256)
        - Output shape: [N, prompt_len + max_new_tokens]
        - Decode each row: tokenizer.decode(output[i, prompt_len:], skip_special_tokens=True)
        - Save: {"id": idx, "samples": ["text1", ..., "text5"]} to stochastic_samples.jsonl
        - Memory note: N=5 parallel sequences in fp16 ≈ 5x memory; fallback to sequential if OOM
    feature_tag: "model"
