    title: "L-A3-4: Implement batched NLI pair inference with OOM fallback"
    description: |
      Implement _build_nli_pairs() and _run_nli_batch() for efficient NLI at scale.

      Key implementation details (from 03_logic.md):
        - N=5 samples → 20 ordered pairs (i,j) for i≠j
        - Format: "{sample_i} [SEP] {sample_j}" for DeBERTa input
        - Truncate to 512 tokens: tokenizer(text, truncation=True, max_length=512)
        - Run in chunks of batch_size=16: 20 pairs → 2 forward passes
        - OOM fallback: catch torch.cuda.OutOfMemoryError, retry batch_size=1
        - Return: List[int] of NLI label indices (0=contradiction, 1=neutral, 2=entailment)
        - Bidirectional check: pairs[2*k] and pairs[2*k+1] must BOTH be label=2
    feature_tag: "model"
