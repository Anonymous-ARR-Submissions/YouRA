gap_id: "gap-1"
gap_title: "No Systematic Evidence on Training Data Difficulty Composition Effects on Execution-Feedback GRPO Gains"
gap_description: |
  No prior work has systematically varied difficulty composition (easy-only / hard-only / uniform / curriculum)
  of GRPO training data and measured pass@1 on HumanEval+/MBPP+. This blocks Q1 (composition effect) and
  Q2 (curriculum ordering). APPS and CodeContests have difficulty metadata, but no published work stratifies
  GRPO training by these tiers and measures the outcome on standard benchmarks.
