# ============================================================
# CORE METRICS (from h-m1/04_validation.md — MUST_WORK PASSED)
# ============================================================

metrics:
  main_metric:
    name: "GRPO advantage variance ratio (repo-level / function-level)"
    our_value: 76.0
    function_level_value: 0.004167
    repo_level_value: 0.316667
    improvement: "76× higher at repo-level"
    source: "h-m1/04_validation.md"

  statistical_test:
    test: "Welch's t-test on log-transformed per-step advantage variance"
    t_statistic: 20.366
    p_value: 5.34e-44
    cohens_d: 1.904
    n_function_steps: 120
    n_repo_steps: 120
    significant: true
    source: "h-m1/04_validation.md"

  secondary_metrics:
    - name: "function-level positive reward rate"
      value: "≈ 0%"
      source: "h-m1/04_validation.md"
    - name: "repo-level positive reward rate"
      value: "≈ 6%"
      source: "h-m1/04_validation.md"

# ============================================================
# METHODOLOGY (from h-m1/03_architecture.md, 02c_experiment_brief.md)
# ============================================================

methodology:
  model_used: "CodeLlama-7b-Instruct-hf (codellama/CodeLlama-7b-Instruct-hf)"
  model_note: "NOT DeepSeek-Coder-7B-base — H-M1 used CodeLlama for mechanism study"

  function_level_dataset:
    name: "APPS + CodeContests"
    apps_source: "codeparrot/apps (NOT hendrycks/apps)"
    codecontests_source: "deepmind/code_contests (NOT google-deepmind/code_contests)"
    apps_size: 5000
    codecontests_size: 13328
    reward_type: "binary execution (all tests pass = 1.0, else 0.0)"

  repo_level_dataset:
    name: "SWE-bench Verified"
    source: "princeton-nlp/SWE-bench_Verified"
    size: 500
    reward_type: "partial credit (file-path overlap with gold patch)"

  training_config:
    group_size_G: 8
    batch_size_B: 4
    training_steps: 120
    temperature: 0.8
    max_new_tokens: 512
    framework: "TRL 1.3.0 GRPOTrainer"
    gpu: "NVIDIA H100 NVL"
    cuda_device: 0

  reward_density_definition: >
    compute_reward_density() returns 1.0 if std(rewards_group) > REWARD_EPSILON (1e-8),
    else 0.0. NOT max(group) > 0 as sometimes described in simplified explanations.

# ============================================================
