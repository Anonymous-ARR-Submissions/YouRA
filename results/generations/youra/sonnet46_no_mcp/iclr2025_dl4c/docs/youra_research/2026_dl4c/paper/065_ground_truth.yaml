h_e1_validation:
  gate_type: "MUST_WORK"
  gate_result: "PASSED"
  model: "DeepSeek-Coder-7B-base"
  conditions_tested: ["curriculum", "uniform", "easy_only", "hard_only"]
  steps_per_condition: 10  # SMOKE TEST ONLY — not 5000-step full training
  all_exit_codes: 0
  reward_density_all_conditions: 0.0  # Complete reward collapse even for easy-only
  checkpoints_saved: true
  reward_density_csvs_produced: true
  full_training_executed: false  # CRITICAL: 5000-step run NOT completed

