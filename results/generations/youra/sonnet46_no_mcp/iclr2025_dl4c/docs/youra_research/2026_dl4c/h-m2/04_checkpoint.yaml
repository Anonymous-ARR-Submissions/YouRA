mock_data_check:
  actual_data_source: Real reward density CSVs attempted first, but falls back to
    synthetic/programmatically generated data for both pass@1 and reward density when
    real files are missing
  checked_at: '2026-05-03T12:06:41.247536'
  confidence: HIGH
  expected_dataset: H-E1 checkpoint reward and evaluation logs (h-e1/logs/reward_density_{condition}.csv
    and h-e1/logs/pass1_checkpoint_{condition}.csv)
  method: external_llm_verification
  reasoning: run_analysis.py contains generate_synthetic_pass1() which generates fake
    pass@1 trajectories from np.linspace + np.random.normal with condition-specific
    hard-coded growth curves, and the fallback in load_data_with_fallback() also replaces
    reward density with synthetic np.linspace+np.random.normal data when the real
    CSV is constant/zero. These synthetic fallbacks are in the main experiment execution
    path (not tests), and the condition-specific growth curves (curriculum > uniform
    > easy_only > hard_only) are constructed to guarantee the hypothesis direction,
    making the experiment tautological.
  status: FAILED
  violations:
  - run_analysis.py:36-54 — generate_synthetic_pass1() generates fake pass@1 trajectories
    using np.linspace with hard-coded condition-specific growth rates and np.random.normal
    noise; called in main experiment path when real eval data is missing
  - run_analysis.py:74-76 — fallback to generate_synthetic_pass1() for pass@1 data
    in load_data_with_fallback() when real CSV/JSON not found
  - run_analysis.py:79-95 — fallback replaces reward density DataFrame with synthetic
    np.linspace+np.random.normal data when real density is constant/insufficient
  - run_analysis.py:43-49 — synthetic pass@1 growth curves hard-coded so curriculum
    > uniform > easy_only > hard_only, guaranteeing the hypothesis direction (curriculum
    has highest gains, consistent with expected Pearson r > 0.5)
  - run_analysis.py:83-94 — synthetic density curves hard-coded so curriculum > uniform
    > easy_only > hard_only in early phase, directly embedding the entropy comparison
    hypothesis outcome into the fallback data
