# ═══════════════════════════════════════════════════════════════
# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "GRPO with unit-test execution reward improves pass@1 on HumanEval+ and MBPP+ for DeepSeek-Coder-7B"
      status: "BUILD_ON"
      evidence: "H-E1 VALIDATED in previous pipeline run. Confirmed by TRL GRPOTrainer execution at function level."
    - claim: "GRPO advantage variance collapses when all G completions receive identical reward (degenerate steps)"
      status: "BUILD_ON"
      evidence: "H-M1 failure analysis: ~85% of repo-level GRPO steps produced all-zero rewards, collapsing advantages to zero. GRPO advantage formula A_i = (r_i - mean) / std → 0/0 when std=0."
    - claim: "APPS dataset provides difficulty tier metadata (integers 0-4) and CodeContests provides division labels"
      status: "BUILD_ON"
      evidence: "Confirmed by Hendrycks et al. 2021 (APPS) and AlphaCode 2022 (CodeContests). Dataset metadata pre-exists, no new labeling required."
    - claim: "TRL GRPOTrainer supports custom dataset sampling and logs per-batch rewards"
      status: "BUILD_ON"
      evidence: "Confirmed from H-E1 infrastructure. GRPOTrainer dataset argument accepts custom samplers; per-batch reward logging is standard output."
    - claim: "No prior work has systematically ablated difficulty composition for execution-feedback GRPO code training"
      status: "PROVE_NEW"
      evidence: "CodeRL (Le 2022), RLEF (Gehring 2024), DeepSeek-R1 (2025) all use fixed dataset mixtures without difficulty stratification analysis."
    - claim: "Easy→hard curriculum ordering of GRPO training data improves final pass@1 over uniform sampling"
      status: "PROVE_NEW"
      evidence: "No prior empirical evidence. Theoretically motivated by Bengio et al. 2009 curriculum learning and H-M1 reward density insight."
    - claim: "Reward density (non-degenerate step fraction) mediates the effect of difficulty composition on GRPO effectiveness"
      status: "PROVE_NEW"
      evidence: "Mechanistically motivated by GRPO theory (advantage collapse) but not yet measured per difficulty condition."
  scope_reduction_percentage: 43
  phase2b_4_instructions: |
    Three established facts (H-E1, H-M1 reward density insight, dataset metadata) can be cited as prior
    validated findings without re-verification. Three new claims (composition ablation, curriculum ordering
    benefit, reward density mediation) require new experimental evidence. Phase 2B should decompose the
    hypothesis into: SH1 (existence — curriculum improves pass@1), SH2 (mechanism — reward density mediates),
    SH3 (comparison — curriculum vs. baselines). SH1 and SH2 are primary; SH3 is secondary/Phase 5 scope.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-CurriculumGRPO-v1"
  confidence_level: 0.75
  core_hypothesis_statement: |
    Under DeepSeek-Coder-7B trained with GRPO and unit-test execution reward on APPS+CodeContests,
    if training data is ordered easy→hard by APPS difficulty tiers (fixed split: steps 0-2500 from
    tiers 0-2, steps 2501-5000 from tiers 3-4), then final pass@1 on HumanEval+ and MBPP+ is
    significantly higher than uniform random sampling from the same dataset, because easy problems
    during early training maintain higher reward density (fraction of non-degenerate GRPO steps),
    producing informative group-relative advantage estimates and more effective policy gradient updates.
  alternative_hypothesis_h0: |
    There is no significant difference in final pass@1 on HumanEval+ or MBPP+ between any of the
    difficulty conditions (easy-only, hard-only, uniform random, easy→hard curriculum) when trained
    for equal compute budgets (5000 gradient steps) with GRPO on APPS+CodeContests.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Training data difficulty ordering condition"
      type: "categorical"
      operationalization: "Which APPS difficulty tiers are sampled at each training stage"
      levels:
        - "easy-only: sample exclusively from APPS tiers 0-2 for all 5000 steps"
        - "hard-only: sample exclusively from APPS tiers 3-4 for all 5000 steps"
        - "uniform: random sampling across all tiers proportional to dataset distribution"
        - "easy→hard curriculum: tiers 0-2 for steps 0-2500, tiers 3-4 for steps 2501-5000 (fixed split)"
  dependent:
    - name: "pass@1 on HumanEval+"
      type: "continuous"
      operationalization: "Fraction of 164 HumanEval+ problems solved by greedy decoding, evaluated by EvalPlus harness"
      primary: true
    - name: "pass@1 on MBPP+"
      type: "continuous"
      operationalization: "Fraction of 378 MBPP+ problems solved by greedy decoding, evaluated by EvalPlus harness"
      primary: true
    - name: "pass@1 on APPS test split"
      type: "continuous"
      operationalization: "Fraction of APPS test problems solved; within-domain secondary evaluation"
      primary: false
    - name: "pass@1 on LiveCodeBench"
      type: "continuous"
      operationalization: "Fraction of LiveCodeBench problems solved; contamination-free harder benchmark"
      primary: false
  controlled:
    - name: "Base model"
      operationalization: "DeepSeek-Coder-7B-base, same checkpoint for all conditions"
    - name: "Training framework and hyperparameters"
      operationalization: "TRL GRPOTrainer, G=8, same learning rate/batch size/optimizer as H-E1"
    - name: "Total compute budget"
      operationalization: "5000 gradient steps for all conditions; equal wall-clock compute"
    - name: "Total dataset size"
      operationalization: "Same pool of APPS+CodeContests problems across all conditions; only sampling strategy differs"
    - name: "Evaluation harness"
      operationalization: "EvalPlus harness, same temperature/sampling settings for all conditions"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 3
  steps:
    - step: 1
      description: "Training data difficulty composition determines per-step reward density (fraction of non-degenerate GRPO batches)"
      evidence: "GRPO advantage formula: A_i = (r_i - mean(r_group)) / std(r_group). When all G=8 completions fail (hard problems early in training), std=0, all advantages=0, gradient=0. Easy problems → some completions pass → std>0 → informative gradient. H-M1 empirically confirmed this collapse at repo level (~85% degenerate steps)."
      falsifier: "If reward density is equal across easy-only and hard-only conditions during early training, step 1 is falsified."
    - step: 2
      description: "Higher reward density during early training produces more informative group-relative advantage estimates, translating to larger effective gradient signal magnitude"
      evidence: "Theoretical: GRPO policy gradient is proportional to advantage magnitude. Degenerate steps (std=0) contribute zero gradient. Non-degenerate steps contribute gradient proportional to reward spread within the group. More non-degenerate steps → larger cumulative policy update toward successful code patterns."
      falsifier: "If reward entropy (H(p) of G=8 reward distribution) is not higher during the curriculum condition's first 2500 steps compared to uniform, step 2 is falsified."
    - step: 3
      description: "More effective policy gradient updates during training produce a model with higher generalization to function-level benchmarks (HumanEval+, MBPP+)"
      evidence: "H-E1 established that execution-feedback GRPO improves function-level pass@1. The mechanism here extends this: the *quality* of gradient signal (not just its existence) affects final model capability. Better gradients → better general code reasoning → higher pass@1."
      falsifier: "If curriculum condition has higher reward density but does not achieve higher pass@1 than uniform condition (P1 fails despite P2 holding), step 3 is falsified — reward density improvement does not transfer to benchmark performance."
  key_tension: "The easy-ceiling concern (Dr. Nova/Prof. Rex): HumanEval+/MBPP+ are closer in distribution to easy APPS problems (tiers 0-2) than hard problems (tiers 3-4). Easy-only training might achieve comparable or higher pass@1 than curriculum on these benchmarks, leaving the curriculum benefit unclear. Resolution: treat easy-only vs. curriculum as genuinely open; the key comparison is curriculum vs. uniform."
  evidence_summary: |
    The causal mechanism is grounded in GRPO theory (advantage collapse at degenerate steps, confirmed by H-M1)
    and general curriculum learning theory (Bengio et al. 2009: easy→hard ordering improves convergence by
    providing smooth early gradient signal). The mechanism is mathematically guaranteed at step 1 (GRPO formula)
    and empirically motivated at steps 2-3 (H-E1 + H-M1 evidence). This is the first instantiation of
    curriculum learning theory in execution-feedback GRPO for code generation.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "APPS difficulty tiers (0-4) correlate with DeepSeek-Coder-7B's actual solve rate at the start of training — i.e., tier 0-2 problems are genuinely easier for the model than tier 3-4"
    supporting_evidence: "APPS tiers are based on competitive programming difficulty ratings from judges. DeepSeek-Coder-7B (7B params, pretrained on code) should show lower solve rates on higher tiers. H-E1 training used APPS data successfully, confirming the model engages with APPS problems."
    consequence_if_violated: "If tier 0-2 problems are also too hard for the model (reward density near zero even on easy tiers), the curriculum's early phase provides no advantage over hard-only. The experiment would still run but P1 would likely fail."
  - id: "A2"
    assumption: "Reward density (non-degenerate step fraction) during early training is causally responsible for, not merely correlated with, final pass@1 differences across conditions"
    supporting_evidence: "GRPO theory: degenerate steps mathematically contribute zero gradient. H-M1: empirically confirmed reward density collapse = training stall. Time-series correlation test (P2) addresses this at the checkpoint level."
    consequence_if_violated: "If reward density is equal across conditions but pass@1 differs (P1 holds, P2 fails), the mechanism claim is wrong but the empirical finding still holds. Paper would need to attribute the effect to problem semantic content (coverage) rather than gradient quality."
  - id: "A3"
    assumption: "A fixed 50/50 compute split (2500 easy steps / 2500 hard steps) is a reasonable operationalization of 'easy→hard curriculum' — the exact split point does not dominate the results"
    supporting_evidence: "Fixed split is the simplest reproducible implementation. The exact split is a hyperparameter; 50/50 is a natural default. The mechanistic prediction (higher early reward density) should hold for any reasonable split where easy steps precede hard steps."
    consequence_if_violated: "If a different split (e.g., 70/30 or 30/70) would substantially change outcomes, the finding would be sensitive to the curriculum schedule hyperparameter. This would not falsify the hypothesis but would require additional ablation of the split ratio."
  - id: "A4"
    assumption: "Policy improvements from GRPO training on competitive programming problems (APPS/CodeContests) transfer to function-level Python benchmarks (HumanEval+/MBPP+)"
    supporting_evidence: "H-E1 validated this transfer for uniform GRPO training. The assumption here is that *curriculum-ordered* GRPO training preserves this cross-domain transfer."
    consequence_if_violated: "If curriculum ordering improves APPS test split (within-domain) but not HumanEval+/MBPP+ (cross-domain), the distribution shift concern (Prof. Rex) is realized. The finding would be domain-specific, reducing practical impact."
  - id: "A5"
    assumption: "5000 gradient steps is sufficient to observe meaningful differences between conditions — the compute budget is large enough to differentiate curriculum from uniform sampling effects"
    supporting_evidence: "H-E1 showed measurable pass@1 improvement at this compute budget. The curriculum vs. uniform difference should be detectable within the same budget if the mechanism holds."
    consequence_if_violated: "If 5000 steps is insufficient to distinguish conditions (P1 marginal or fails), the experiment may need longer runs. This would be a compute scope issue, not a theoretical failure."

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - GRPO training with unit-test execution reward for code generation
    - Function-level code generation tasks (HumanEval+, MBPP+, APPS)
    - Open-weight decoder-only LLMs in the 7B parameter range
    - Training datasets with pre-existing difficulty metadata (APPS tiers, CodeContests divisions)
    - Fixed static curriculum schedules (not adaptive/dynamic curriculum)
  does_not_apply_to: |
    - Repository-level code generation (SWE-bench Verified) — excluded due to H-M1 failure (reward sparsity collapse)
    - AI-feedback or preference-based RL methods (DPO, RLHF) — different reward signal mechanism
    - Datasets without difficulty metadata (curriculum requires pre-labeled tiers)
    - Dynamic/adaptive curriculum methods (out of scope for this hypothesis; separate research direction)
    - Models significantly larger or smaller than 7B without re-validation
  known_limitations: |
    - Distribution shift: APPS training domain (competitive programming) ≠ HumanEval+/MBPP+ eval domain (general Python)
    - Fixed split curriculum is a simplification; optimal split ratio is a hyperparameter not explored here
    - Single model size (7B) — reward density sweet spot generalization across model sizes untested
    - Static difficulty labels may diverge from model's actual solve rate as training progresses
    - Results on single GPU (A100 80GB) — multi-GPU scaling behavior not studied

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "After 5000 gradient steps at equal compute budget, easy→hard curriculum GRPO achieves at least 2 percentage points absolute higher pass@1 on HumanEval+ than uniform random sampling"
    test_method: "Train 4 conditions (easy-only, hard-only, uniform, easy→hard curriculum) for 5000 steps each on APPS+CodeContests. Evaluate all on HumanEval+ (164 problems) using EvalPlus harness. Apply McNemar's test (paired, one-tailed) comparing curriculum vs. uniform."
    success_criterion: "Curriculum pass@1 ≥ uniform pass@1 + 2pp AND McNemar's test p < 0.05 (one-tailed)"
    falsification: "P1 is falsified if curriculum pass@1 < uniform pass@1 + 2pp, or McNemar's p ≥ 0.05"
  - id: "P2"
    primary: false
    statement: "Reward density (fraction of non-degenerate GRPO batches) is higher in the curriculum condition than the uniform condition during the first 2500 training steps, and Pearson correlation between checkpoint reward density and subsequent pass@1 gain is r > 0.5"
    test_method: "Log reward density (max(rewards_per_group) > 0) and reward entropy at each of 10 checkpoints (every 500 steps) for all 4 conditions. Compare early-training reward density between curriculum and uniform. Compute Pearson correlation across checkpoints between reward density at step T and pass@1 gain from step T to T+500."
    success_criterion: "Mean reward density in curriculum condition steps 0-2500 > mean reward density in uniform condition steps 0-2500 AND Pearson r > 0.5 for checkpoint reward density vs. subsequent pass@1 gain"
    falsification: "P2 is falsified if curriculum reward density is not higher than uniform during early training, or if correlation r ≤ 0.5"
  - id: "P3"
    primary: false
    statement: "Easy→hard curriculum model achieves higher pass@1 than uniform model on the APPS test split (within-domain, harder competition problems)"
    test_method: "Evaluate the same checkpoints from P1 on APPS test split using the standard APPS evaluation harness. Apply one-tailed test comparing curriculum vs. uniform."
    success_criterion: "Curriculum pass@1 on APPS test split > uniform pass@1, one-tailed p < 0.05"
    falsification: "P3 is falsified if no significant difference on APPS test split (within-domain transfer does not hold)"

