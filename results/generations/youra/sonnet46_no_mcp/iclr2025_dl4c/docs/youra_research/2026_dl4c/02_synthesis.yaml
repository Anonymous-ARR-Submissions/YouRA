hypothesis_draft:
  title: "Difficulty-Stratified Curriculum GRPO: Reward Density Mediation in Execution-Feedback Code LLM Training"
  hypothesis_id: "H-CurriculumGRPO-v1"
  core_claim: |
    Easy→hard curriculum ordering of GRPO training data (by APPS difficulty tiers, fixed 50/50 split)
    yields significantly higher pass@1 on HumanEval+ and MBPP+ than uniform random sampling from the
    same APPS+CodeContests dataset, when training DeepSeek-Coder-7B for equal compute budgets (5000
    gradient steps). The effect is mediated by reward density: easy problems during early training
    maintain a higher fraction of non-degenerate GRPO steps (where at least 1 of G=8 completions
    passes a unit test), producing informative group-relative advantages and effective policy gradients.
  mechanism: |
    Three-step causal chain:
    (1) Training data difficulty composition determines per-step reward density. Hard problems early
        in training cause all G=8 completions to fail → GRPO advantage std=0 → zero gradient (same
        mechanism as H-M1's repo-level collapse). Easy problems → some completions pass → informative
        advantages → effective gradient.
    (2) Higher reward density during early training accumulates larger effective policy updates toward
        successful code generation patterns, as measured by reward entropy (H(p) of G=8 reward
        distribution) peaking in the "Goldilocks zone" (≈4/8 successes, maximizing gradient informativeness).
    (3) More effective early policy updates generalize to function-level benchmarks (HumanEval+, MBPP+),
        producing higher final pass@1. This generalizes Bengio et al. 2009 curriculum theory to the
        GRPO execution-feedback setting — the first such instantiation.
  predictions:
    - P1: "Easy→hard curriculum achieves ≥2pp absolute higher HumanEval+ pass@1 than uniform (McNemar's p<0.05)"
    - P2: "Curriculum reward density > uniform during steps 0-2500; checkpoint reward density predicts subsequent pass@1 gain (Pearson r>0.5)"
    - P3: "Curriculum model outperforms uniform on APPS test split (within-domain, p<0.05)"

variables_summary:
  independent: "Training data difficulty ordering condition: {easy-only, hard-only, uniform, easy→hard curriculum (fixed split)}"
  dependent_primary: "pass@1 on HumanEval+ (164 problems) and MBPP+ (378 problems) via EvalPlus harness"
  controlled: "Base model (DeepSeek-Coder-7B-base), training framework (TRL GRPOTrainer G=8), compute budget (5000 steps), dataset pool (same APPS+CodeContests), evaluation harness (EvalPlus)"

null_hypothesis:
  h0_statement: |
    There is no significant difference in final pass@1 on HumanEval+ or MBPP+ between any of the
    four difficulty conditions (easy-only, hard-only, uniform random, easy→hard curriculum) when
    trained for 5000 gradient steps with GRPO on the same APPS+CodeContests dataset pool.
  statistical_test: "McNemar's test (paired, one-tailed) for pairwise comparisons; primary comparison is curriculum vs. uniform"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: |
    First systematic ablation of training data difficulty composition for execution-feedback GRPO
    code training. First measurement of reward density/entropy stratified by difficulty condition
    with time-series mediation analysis. First instantiation of Bengio et al. 2009 curriculum
    learning theory in GRPO execution-feedback RL, deriving a practical dataset curation heuristic:
    select training problems where model solve rate ≈ 10-40%.
  differentiation_summary: |
    CodeRL (2022), RLEF (2024), and DeepSeek-R1 (2025) all use fixed dataset mixtures without
    difficulty stratification or reward density analysis. Bengio et al. (2009) curriculum theory
    has not been instantiated in execution-feedback RL. This work provides the empirical ablation,
    mechanistic measurement, and practical guidance that the field currently lacks.

