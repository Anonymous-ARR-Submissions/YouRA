measurement_plan:
  data_collection:
    - source: "TRL GRPOTrainer per-batch reward logs (reward density, reward entropy at each of 10 checkpoints)"
    - source: "EvalPlus harness pass@1 evaluation at each checkpoint (HumanEval+ 164, MBPP+ 378)"
    - source: "APPS test split evaluation at final checkpoint"
    - source: "LiveCodeBench evaluation at final checkpoint"
  procedure:
    - step: "Train 4 conditions × 5000 steps with identical hyperparameters (H-E1 settings)"
    - step: "Save checkpoint every 500 steps (10 checkpoints per condition)"
    - step: "Evaluate each checkpoint on HumanEval+ and MBPP+ (primary); record pass@1"
    - step: "Log reward density (fraction of batches where max(rewards_per_group)>0) and reward entropy per checkpoint"
    - step: "Evaluate final checkpoint of all 4 conditions on APPS test split and LiveCodeBench"
    - step: "Run statistical tests: McNemar's for P1/P3; Pearson correlation for P2"
  success_criteria:
    - "P1: curriculum HumanEval+ pass@1 ≥ uniform + 2pp, McNemar's p<0.05 (one-tailed)"
    - "P2: curriculum reward density > uniform during steps 0-2500; Pearson r>0.5 for checkpoint reward density vs. subsequent pass@1 gain"
    - "P3: curriculum APPS test split pass@1 > uniform, p<0.05 (one-tailed)"

validation:
  internal_validity:
    - "Equal compute budget across all 4 conditions eliminates compute as confound"
    - "Same dataset pool (only sampling strategy differs) controls for data content"
    - "Same model initialization (DeepSeek-Coder-7B-base) eliminates starting-point variance"
    - "Fixed curriculum split (50/50) makes the curriculum schedule fully reproducible"
    - "Automated evaluation harness (EvalPlus) eliminates subjective scoring"
  external_validity:
    - "Q4 secondary evaluation (APPS test split, LiveCodeBench) tests within-domain and harder-benchmark transfer"
    - "Open datasets, open-weight model, open-source framework enable full reproducibility"
    - "Distribution shift limitation (APPS training → HumanEval+ eval) acknowledged as boundary condition"
    - "Single model size (7B) is a known scope boundary; generalization to other sizes is future work"

discussion_synthesis:
  key_insights:
    - "The H-M1 failure (reward density collapse at repo level) is the generative insight: the same mechanism applies at function level when problem difficulty is mismatched to model capability"
    - "Reward density (binary degenerate/non-degenerate) and reward entropy (H(p) of reward distribution) together characterize gradient signal quality — entropy is richer but density is sufficient for mediation test"
    - "The 'Goldilocks zone' (1-3/8 completions succeed, ≈12-37% reward density) is where GRPO advantage variance is maximized — this is the mechanistic sweet spot, not a metaphor"
    - "Prof. Rex's distribution shift concern is real but mitigated: if curriculum improves both HumanEval+/MBPP+ (cross-domain) and APPS test split (within-domain), the mechanism generalizes beyond domain artifacts"
  breakthrough_moments:
    - "Exchange 6 (Prof. Rex): Identifying that reward density mediation is confounded if measured cross-condition only — resolved by time-series correlation approach (Exchange 7-8)"
    - "Exchange 2 (Prof. Vera): Separating static curriculum (testable, primary IV) from dynamic difficulty selection (secondary, different hypothesis) — keeps the ablation clean"
    - "Exchange 9 (Dr. Sage): Framing the contribution as a three-level structure (empirical + mechanistic + guidance) rather than just an ablation — elevates significance"
  resolved_tensions:
    - "Easy-ceiling concern: resolved by treating easy-only vs. curriculum as open/empirical, predicting only curriculum ≥ uniform"
    - "Mediation circularity: resolved by time-series correlation test (checkpoint reward density → subsequent pass@1 gain)"
    - "Compute interaction: resolved by directional prediction (curriculum advantage largest at lowest compute) + free measurement using mid-training checkpoints"
