main_hypothesis:
  id: H-CurriculumGRPO-v1
  title: 'Difficulty-Stratified Curriculum GRPO: Reward Density Mediation in Execution-Feedback Code LLM Training'
  statement: 'Under DeepSeek-Coder-7B trained with GRPO and unit-test execution reward on APPS+CodeContests,

    if training data is ordered easy->hard by APPS difficulty tiers (fixed split: steps 0-2500 from

    tiers 0-2, steps 2501-5000 from tiers 3-4), then final pass@1 on HumanEval+ and MBPP+ is

    significantly higher than uniform random sampling from the same dataset, because easy problems

    during early training maintain higher reward density (fraction of non-degenerate GRPO steps),

    producing informative group-relative advantage estimates and more effective policy gradient updates.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: APPS + CodeContests (hendrycks/apps + google-deepmind/code_contests)
    model: DeepSeek-Coder-7B-base (deepseek-ai/DeepSeek-Coder-7B-base)
    optimizer: TRL GRPOTrainer (same hyperparameters as H-E1)
    hyperparameters:
      training_steps: 5000
      group_size_G: 8
      checkpoint_interval: 500
      num_checkpoints: 10
      eval_harness: EvalPlus
      eval_temperature: greedy decoding
