      of GRPO batches where max(rewards_per_group) > 0) is measurably higher in the curriculum

      condition than in the uniform condition during those steps, because GRPO advantage formula

      A_i = (r_i - mean) / std -> 0 when all G=8 completions fail (std=0), and easier problems

