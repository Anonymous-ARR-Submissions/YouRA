  - id: task-004
    epic: A-3
    title: N-gram Extraction
    description: |
      Implement code/ngram_extractor.py: NgramExtractor class.
      - extract(text): sliding-window 13-gram extraction over whitespace-tokenized text
        tokens = text.split(); ngrams = [" ".join(tokens[i:i+13]) for i in range(len(tokens)-12)]
        Returns [] if len(tokens) < min_token_length (13); log skipped count
      - extract_batch(texts): batch extraction with skip logging
      Case-sensitive, no lowercasing, no punctuation removal (WIMBD standard).
    feature_tag: data-pipeline
    priority: 97
    source_document: 03_architecture.md
    complexity: 6
    test_requirements: |
