hypothesis_draft:
  title: "Cross-Corpus Contamination Atlas: Systematic N-gram Overlap Mapping Across Major NLP Benchmarks and Training Corpora"
  hypothesis_id: "H-ContamMatrix-v1"
  core_claim: |
    13-gram contamination rates between major NLP benchmarks (MMLU, HellaSwag, BIG-Bench Hard)
    and major open training corpora (The Pile v1, C4 en.noclean, RedPajama-v1) vary significantly
    across benchmark sub-tasks and across corpora, revealing corpus-specific contamination signatures
    driven by structural differences in corpus source composition. Both 13-gram containment and
    Jaccard similarity produce consistent sub-task contamination rankings.
  mechanism: |
    Different training corpora have structurally different source compositions: The Pile emphasizes
    academic and diverse web sources; C4 is filtered CommonCrawl; RedPajama combines multiple curated
    sources. These compositional differences produce systematically different n-gram overlap profiles
    with different types of benchmark content — domain-specific MMLU sub-tasks (medical genetics,
    jurisprudence) contaminate more heavily in corpora with academic/encyclopedic sources, while
    commonsense benchmarks (HellaSwag) contaminate more in web-heavy corpora. This corpus-specific
    signature is the central empirical finding.
  predictions:
    - P1: "Kruskal-Wallis p < 0.05 for contamination rate variance across 57 MMLU sub-tasks"
    - P2: "Kruskal-Wallis p < 0.05 for contamination rate variance across 3 corpora"
    - P3: "Spearman ρ significantly positive (p < 0.05) between 13-gram containment and Jaccard rankings"

variables_summary:
  independent: "Corpus identity (3 levels: Pile/C4/RedPajama) × Benchmark sub-task identity (59 levels: 57 MMLU + HellaSwag + BBH)"
  dependent_primary: "13-gram containment rate per (sub-task, corpus) cell; range [0,1]"
  controlled: "n-gram size (13), benchmark versions (pinned HF), corpus versions (pinned), text format (question+choices)"

null_hypothesis:
  h0_statement: |
    13-gram contamination rates do not differ significantly across benchmark sub-tasks
    (Kruskal-Wallis p >= 0.05) or across training corpora (Kruskal-Wallis p >= 0.05),
    and contamination rankings by 13-gram containment and Jaccard similarity are
    uncorrelated (Spearman p >= 0.05). Contamination is uniformly distributed.
  statistical_test: "Kruskal-Wallis H-test (non-parametric) for variance; Spearman rank correlation for metric agreement"
  significance_level: 0.05

