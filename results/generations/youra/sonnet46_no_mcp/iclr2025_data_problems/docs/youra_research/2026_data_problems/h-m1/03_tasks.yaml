      config: "03_config.md#Overall-Config"

  - id: "task-014"
    epic: "A-4: Corpus Index Construction"
    title: "L-4-5: Fallback sampling strategy (10% sample when streaming fails)"
    description: |
      Implement fallback sampling in _stream_corpus():
      1. Calculate approximate corpus size (C4 ~300GB → ~30M docs; RP ~1.2TB → ~120M docs)
      2. sample_size = int(total_docs * config.sample_fraction)
      3. Stream first sample_size documents (use itertools.islice)
      4. Record flag: results/statistical_tests.json must include
         "c4_sampled": true/false, "rp_sampled": true/false
      5. Log: f"WARNING: {corpus_name} using {sample_fraction*100}% sample due to streaming failure"
      Fallback is documented as limitation in results JSON.
    feature_tag: "data-pipeline"
    priority: 40
    source_document: "03_logic.md"
    complexity: 18
    test_requirements: |
      - Fallback activates when streaming mock raises exception
      - Sampled flag recorded in results JSON
    reference_files:
      architecture: "03_architecture.md#CorpusIndexer"
      logic: "03_logic.md#A-4"
      config: "03_config.md#C-8-2"

  - id: "task-015"
    epic: "A-6: Statistical Analysis"
    title: "L-6-1: StatsAnalyzer.kruskal_wallis() full implementation"
    description: |
      Implement kruskal_wallis(matrix_wide) body:
      1. pile_rates = matrix_wide['pile'].tolist()
         c4_rates   = matrix_wide['c4'].tolist()
         rp_rates   = matrix_wide['redpajama'].tolist()
      2. H, p = scipy.stats.kruskal(pile_rates, c4_rates, rp_rates)
      3. corpus_means = {c: np.mean(rates) for c, rates in zip(['pile','c4','rp'], [pile_rates,c4_rates,rp_rates])}
      4. max_pair_diff = max(abs(a-b) for a,b in combinations(corpus_means.values(), 2))
      5. gate_pass = (p < config.gate_p_threshold)
      6. return {kruskal_H: H, kruskal_p: p, gate_pass: gate_pass,
                 corpus_means: corpus_means, max_pair_diff_pp: max_pair_diff}
    feature_tag: "evaluation"
    priority: 38
    source_document: "03_logic.md"
    complexity: 14
    test_requirements: |
      - Returns dict with all 5 keys
      - gate_pass=True when p<0.05
    reference_files:
      architecture: "03_architecture.md#StatsAnalyzer"
      logic: "03_logic.md#A-6"
      config: null

  - id: "task-016"
    epic: "A-6: Statistical Analysis"
    title: "L-6-2: StatsAnalyzer.dunn_posthoc() with Bonferroni correction"
    description: |
      Implement dunn_posthoc(matrix_wide):
      1. groups = [matrix_wide['pile'].tolist(),
                   matrix_wide['c4'].tolist(),
                   matrix_wide['redpajama'].tolist()]
      2. posthoc_df = scikit_posthocs.posthoc_dunn(groups, p_adjust='bonferroni')
      3. Rename index/columns to ['pile','c4','redpajama']
      4. return posthoc_df  # 3×3 DataFrame of corrected p-values
      Bonferroni alpha = 0.05/3 = 0.0167 per pair.
    feature_tag: "evaluation"
    priority: 36
    source_document: "03_logic.md"
    complexity: 14
    test_requirements: |
      - Returns 3×3 DataFrame
      - All p-values between 0 and 1
    reference_files:
      architecture: "03_architecture.md#StatsAnalyzer"
      logic: "03_logic.md#A-6"
      config: null

  - id: "task-017"
    epic: "A-6: Statistical Analysis"
    title: "L-6-3: StatsAnalyzer.spearman_wimbd() WIMBD consistency check"
    description: |
      Implement spearman_wimbd(pile_rates, wimbd_reference):
      wimbd_reference: dict {subtask_name: published_rate} from WIMBD paper
        (professional_medicine→0.173, high_school_math→0.004, etc.)
      1. Filter pile_rates to MMLU sub-tasks only (57 tasks)
      2. Align with wimbd_reference keys (intersection)
      3. rho, p = scipy.stats.spearmanr(h_m1_pile_vals, wimbd_vals)
      4. log: f"WIMBD consistency: Spearman rho={rho:.3f}, p={p:.4f}"
      5. assert rho >= config.wimbd_spearman_min_rho, f"WIMBD consistency low: rho={rho}"
      6. return (rho, p)
      Hard-code top WIMBD reference rates in module constant WIMBD_REFERENCE.
    feature_tag: "evaluation"
    priority: 34
    source_document: "03_logic.md"
    complexity: 14
    test_requirements: |
      - Returns (rho, p) tuple
      - WIMBD_REFERENCE constant defined in module
    reference_files:
      architecture: "03_architecture.md#StatsAnalyzer"
      logic: "03_logic.md#A-6"
      config: null

  - id: "task-018"
    epic: "A-6: Statistical Analysis"
    title: "L-6-4: StatsAnalyzer.sensitivity_analysis() cross-format correlation"
    description: |
      Implement sensitivity_analysis(matrix_wide_primary, matrix_wide_sensitivity):
      1. Run kruskal_wallis() on both matrices
      2. Compute Spearman rho between primary and sensitivity pile_rates
      3. Compute Spearman rho between primary and sensitivity c4_rates
      4. Compute Spearman rho between primary and sensitivity rp_rates
      5. return {
           primary_kruskal_p, sensitivity_kruskal_p,
           format_spearman_rho: {pile: rho, c4: rho, rp: rho},
           conclusion: "Rankings robust" if all rho > 0.7 else "Rankings diverge"
         }
    feature_tag: "evaluation"
    priority: 32
    source_document: "03_logic.md"
    complexity: 14
    test_requirements: |
      - Returns dict with all required keys
      - Spearman rho computed for all 3 corpora
    reference_files:
      architecture: "03_architecture.md#StatsAnalyzer"
      logic: "03_logic.md#A-6"
      config: null

  - id: "task-019"
    epic: "A-5: Contamination Matrix"
    title: "L-5-1: MatrixBuilder.query_cell() MinHash query and rate computation"
    description: |
      Implement query_cell(subtask_name, texts, corpus_name, lsh):
      1. n_contaminated = 0
      2. for text in texts:
           minhash = extractor.text_to_minhash(text)
           if lsh.query(minhash):  # returns list of candidate doc IDs
               n_contaminated += 1
      3. rate = n_contaminated / len(texts) if texts else 0.0
      4. log: f"Querying {corpus_name} for {subtask_name}: {n_contaminated}/{len(texts)} ({rate:.3f})"
      5. return {subtask: subtask_name, corpus: corpus_name,
                 n_items: len(texts), n_contaminated: n_contaminated, rate: rate}
    feature_tag: "evaluation"
    priority: 30
    source_document: "03_logic.md"
    complexity: 13
    test_requirements: |
      - Returns dict with all 5 keys
      - rate = n_contaminated/n_items
    reference_files:
      architecture: "03_architecture.md#MatrixBuilder"
      logic: "03_logic.md#A-5"
      config: null

  - id: "task-020"
    epic: "A-5: Contamination Matrix"
    title: "L-5-2: MatrixBuilder.build_matrix() full 177-cell iteration"
    description: |
      Implement build_matrix(benchmarks, indices):
      1. rows = []
      2. total_cells = len(benchmarks) * len(indices)  # 59 × 3 = 177
      3. for i, (subtask, texts) in enumerate(benchmarks.items()):
           for corpus_name, lsh in indices.items():
               cell = self.query_cell(subtask, texts, corpus_name, lsh)
               rows.append(cell)
               log progress every 10 cells: f"Matrix: {len(rows)}/{total_cells} cells"
      4. df = pd.DataFrame(rows)
      5. df.to_csv(Path(config.results_dir)/"contamination_matrix.csv", index=False)
      6. return df
    feature_tag: "evaluation"
    priority: 28
    source_document: "03_logic.md"
    complexity: 13
    test_requirements: |
      - Returns DataFrame with 177 rows
      - CSV saved to results/contamination_matrix.csv
    reference_files:
      architecture: "03_architecture.md#MatrixBuilder"
      logic: "03_logic.md#A-5"
      config: null

  - id: "task-021"
    epic: "A-2: Benchmark Data Loading"
    title: "L-2-1: DataLoader.load_all() with version pinning and format dispatch"
    description: |
      Implement load_all():
      1. mmlu = self.load_mmlu()    # returns {subtask: [texts]} for 57 sub-tasks
      2. hs   = self.load_hellaswag()  # returns {"hellaswag": [texts]}
      3. bbh  = self.load_bbh()     # returns {"bbh_combined": [texts]}
      4. merged = {**mmlu, **hs, **bbh}
