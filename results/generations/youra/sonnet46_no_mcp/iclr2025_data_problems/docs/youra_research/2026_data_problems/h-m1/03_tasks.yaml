  # ── Logic Subtasks ─────────────────────────────────────────────────────────
  - id: "task-010"
    epic: "A-4: Corpus Index Construction"
    title: "L-4-1: CorpusIndexer.build() streaming algorithm with checkpointing"
    description: |
      Implement the full build() method body:
      1. Init MinHashLSH(threshold=0.5, num_perm=128)
      2. Iterate _stream_corpus() yielding (doc_id, text)
      3. For each doc: extractor.text_to_minhash(text) → lsh.insert(f"d{doc_id}", minhash)
      4. Every checkpoint_interval docs: call self.checkpoint(lsh, corpus_name, doc_id)
      5. Log progress: f"Building {corpus_name} index: {doc_id:,} docs processed"
      6. On completion: self.save(lsh, config.{corpus}_index_path)
      7. Return lsh
    feature_tag: "data-pipeline"
    priority: 48
    source_document: "03_logic.md"
    complexity: 18
    test_requirements: |
      - build() on small mock corpus produces non-empty LSH
      - Checkpoint files created at correct intervals
    reference_files:
      architecture: "03_architecture.md#CorpusIndexer"
      logic: "03_logic.md#A-4"
      config: null

  - id: "task-011"
    epic: "A-4: Corpus Index Construction"
    title: "L-4-2: CorpusIndexer._stream_corpus() exponential backoff retry"
    description: |
      Implement _stream_corpus() with retry logic:
      1. attempt = 0
      2. while attempt < config.retry_attempts:
           try: yield from load_dataset(hf_path, config, streaming=True, split="train")
           except Exception as e:
             delay = min(2 ** attempt * 2, 30)
             log warning, sleep(delay), attempt += 1
      3. If all retries fail and sample_fraction < 1.0:
           log warning "Falling back to {sample_fraction*100}% sample"
           yield from sampled stream (take first N docs)
           set self._sampled_flag[corpus_name] = True
      4. If no fallback: raise RuntimeError
    feature_tag: "data-pipeline"
    priority: 46
    source_document: "03_logic.md"
    complexity: 18
    test_requirements: |
      - Retries on exception (mock HF failure)
      - Fallback sample flag set correctly
    reference_files:
      architecture: "03_architecture.md#CorpusIndexer"
      logic: "03_logic.md#A-4"
      config: null

  - id: "task-012"
    epic: "A-4: Corpus Index Construction"
    title: "L-4-3: CorpusIndexer.checkpoint() + save/load pickle protocol"
    description: |
      Implement checkpoint(), save(), and load() methods:
      checkpoint(lsh, corpus_name, doc_id):
        path = Path(config.indices_dir) / f"{corpus_name}_ckpt_{doc_id}.pkl"
        self.save(lsh, str(path))
        log: f"Checkpoint saved: {path}"
      save(lsh, path):
        with open(path, 'wb') as f: pickle.dump(lsh, f)
      load(path):
        with open(path, 'rb') as f: return pickle.load(f)
      load_or_build() uses Path(config.{corpus}_index_path).exists() to decide.
    feature_tag: "data-pipeline"
    priority: 44
    source_document: "03_logic.md"
    complexity: 18
    test_requirements: |
      - save/load round-trip preserves LSH state
      - checkpoint() creates file at correct path
    reference_files:
      architecture: "03_architecture.md#CorpusIndexer"
      logic: "03_logic.md#A-4"
      config: null

  - id: "task-013"
    epic: "A-4: Corpus Index Construction"
    title: "L-4-4: MinHash LSH threshold calibration and accuracy validation"
    description: |
      Implement spot-validation after index build:
      1. Select 5-10 benchmark texts known to appear in corpus (WIMBD reference)
      2. Query each against lsh: hits = lsh.query(text_to_minhash(text))
      3. Compare hit rate against WIMBD published rates for Pile
      4. Assert abs(measured_rate - wimbd_rate) <= config.wimbd_pile_tolerance_pp
         for Pile column only (sanity check)
      5. Log validation summary: f"LSH validation: {n_correct}/{n_total} within tolerance"
      This is the WIMBD sanity check (FR-3.1c).
    feature_tag: "evaluation"
