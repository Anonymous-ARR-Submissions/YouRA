      if config.text_format == "question_choices":
        if dataset == "mmlu":
          return f"{item['question']} {' '.join(item['choices'])}"
        elif dataset == "hellaswag":
          return f"{item['ctx']} {' '.join(item['endings'])}"
        elif dataset == "bbh":
          return item['input']  # BBH already has full context
      elif config.text_format == "question_only":
        if dataset == "mmlu":    return item['question']
