predictions:
  - id: "P1"
    primary: true
    statement: "13-gram containment rates vary significantly across MMLU's 57 sub-tasks when computed against any single corpus"
    test_method: "Kruskal-Wallis H-test on contamination rates across 57 MMLU sub-tasks (non-parametric, does not assume normality)"
    success_criterion: "p < 0.05; additionally, at least one sub-task pair shows contamination rate difference > 5 percentage points"
    falsification: "p >= 0.05 or all sub-task rates within 2 percentage points of each other"
  - id: "P2"
    primary: false
    statement: "13-gram contamination rates vary significantly across the three corpora (The Pile, C4, RedPajama) when averaged over all benchmark sub-tasks"
    test_method: "Kruskal-Wallis H-test on per-corpus mean contamination rates across all benchmark sub-tasks"
    success_criterion: "p < 0.05; at least one corpus pair shows mean contamination rate difference > 2 percentage points"
    falsification: "p >= 0.05 or all three corpus means within 1 percentage point"
  - id: "P3"
    primary: false
    statement: "Sub-task contamination rankings by 13-gram containment correlate positively with rankings by Jaccard similarity"
    test_method: "Spearman rank correlation between 13-gram containment ranks and Jaccard similarity ranks across all benchmark sub-tasks, for each corpus separately and overall"
    success_criterion: "Spearman ρ > 0 with p < 0.05 for at least 2 of 3 corpora"
    falsification: "Spearman ρ <= 0 or p >= 0.05 for 2 or more corpora"

