    - claim: "The Pile v1, C4, and RedPajama are publicly available training corpora"
      status: "BUILD_ON"
      evidence: "Gao et al. 2020 (Pile), Dodge et al. 2021 (C4), TogetherComputer 2023 (RedPajama)"
    - claim: "allenai/wimbd provides open-source 13-gram contamination tooling for The Pile"
      status: "BUILD_ON"
      evidence: "GitHub: allenai/wimbd (~500 stars); confirmed in Phase 1 research"
    - claim: "No unified cross-corpus x cross-benchmark contamination matrix exists"
      status: "PROVE_NEW"
      evidence: "Gap confirmed by Phase 1 literature review — WIMBD covers Pile only; GPT-4 TR uses Jaccard on select benchmarks; no systematic 3-corpus analysis"
    - claim: "Contamination rates vary significantly across benchmark sub-tasks and corpora"
      status: "PROVE_NEW"
