# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 3
  steps:
    - step: 1
      description: "Different corpora have structurally different source compositions (domain emphasis, curation filters, quality thresholds)"
      evidence: "The Pile: diverse academic+web; C4: CommonCrawl with quality filter; RedPajama: curated multi-source. Documented in corpus papers [Gao 2020, Dodge 2021, Together 2023]"
      falsifier: "If all three corpora have statistically identical domain distributions, this step fails — but corpus documentation confirms they differ"
    - step: 2
      description: "Different source compositions produce systematically different n-gram overlap profiles with domain-specific benchmark sub-tasks"
      evidence: "Medical/legal MMLU sub-tasks appear in academic sources (heavy in Pile/RedPajama); commonsense benchmarks appear in web sources (heavy in C4). Supported by WIMBD's finding of varying rates across Pile sub-corpora [Elazar 2023]"
      falsifier: "If contamination rates across 57 MMLU sub-tasks do not differ significantly (Kruskal-Wallis p >= 0.05)"
    - step: 3
      description: "Both 13-gram containment and Jaccard similarity capture the same underlying contamination signal, producing consistent rankings despite different normalizations"
      evidence: "Both metrics are derived from n-gram set intersection; asymmetry in normalization (test-size vs. union-size) should not change relative rankings for small test sets against large corpora [Prof. Vera's analysis]"
      falsifier: "If Spearman ρ between 13-gram containment and Jaccard rankings is not significantly positive (p >= 0.05)"
  key_tension: "Whether corpus-level variance (step 1→2) is strong enough to be detected against within-corpus sub-task variance — the signal-to-noise ratio for corpus effects may be lower than for sub-task effects"
  evidence_summary: |
    The mechanism is grounded in established corpus documentation and the theoretical
    analysis from WIMBD. The main empirical question is whether the corpus-level effect
    (step 2) is detectable above the within-corpus sub-task noise. WIMBD's own finding
    of significant sub-task variation within The Pile supports step 2 within one corpus;
    the cross-corpus generalization is the novel claim.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Benchmark test set versions available on Hugging Face match the versions used during FM pretraining"
    supporting_evidence: "Most major FMs (Pythia, LLaMA, etc.) were trained before these Hugging Face versions were finalized — minor version differences may exist"
    consequence_if_violated: "Contamination rates could be slightly under- or over-estimated; rankings should be robust to minor version differences"
  - id: "A2"
    assumption: "13-gram containment is a valid proxy for 'has this test instance been seen during training'"
    supporting_evidence: "WIMBD [Elazar 2023] validates this proxy; shorter n-grams increase false positives, longer n-grams increase false negatives; 13-gram is empirically validated"
    consequence_if_violated: "Contamination rates are proxies, not exact measurements — acknowledged limitation in all n-gram contamination work"
  - id: "A3"
    assumption: "Full corpus text is accessible for streaming (Hugging Face datasets API)"
    supporting_evidence: "The Pile v1, C4 en.noclean, RedPajama-v1 all available via Hugging Face; confirmed in Phase 1 implementation resources"
    consequence_if_violated: "If streaming fails, fallback to pre-downloaded sample — but full-corpus analysis would be compromised"
  - id: "A4"
    assumption: "MinHash LSH approximation in WIMBD is sufficiently accurate for rank-level analysis (not exact counting)"
    supporting_evidence: "MinHash LSH is a well-characterized approximation; for rank-level analysis (Spearman), exact counts are not required — relative ordering is sufficient"
    consequence_if_violated: "Exact contamination rates may have small approximation error; rank-based conclusions should be robust"
  - id: "A5"
    assumption: "Question+choices concatenation is an appropriate unit for contamination measurement in multiple-choice benchmarks"
    supporting_evidence: "Used by WIMBD in benchmark analysis; captures both question stem and answer options as potential contamination sources"
    consequence_if_violated: "Sensitivity analysis (question-only vs. question+choices) will quantify impact; main findings should hold for either choice"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    Open-source training corpora with available text files (The Pile v1, C4, RedPajama-v1).
    Multiple-choice and sentence-completion benchmarks with short question texts (MMLU, HellaSwag, BIG-Bench Hard).
    N-gram overlap as a contamination proxy (not semantic similarity or memorization-based measures).
    Static, text-only datasets (not multimodal benchmarks).
  does_not_apply_to: |
    Closed-source corpora (GPT-4 training data, Gemini training data).
    Instruction-tuning contamination (fine-tuning datasets are not analyzed here).
    Semantic similarity-based contamination (requires embedding models).
    Long-form generation benchmarks (n-gram overlap metrics are less meaningful).
    Post-2023 corpora (RedPajama-v2, Dolma, etc.) — out of scope for this study.
  known_limitations: |
    N-gram overlap is a necessary but not sufficient condition for contamination-driven
    performance inflation (addressed by Gap 2 / H-InflationCorr).
    MinHash LSH introduces approximate counting error (~1-5% for standard parameters).
    Multiple-choice formatting variation (Hugging Face vs. original papers) may affect rates marginally.
    We measure static corpus overlap, not whether models actually memorized the content.

