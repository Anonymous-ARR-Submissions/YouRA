# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-ContamMatrix-v1"
  confidence_level: 0.80
  core_hypothesis_statement: |
    Under experimental conditions of pinned benchmark and corpus versions, if 13-gram
    containment rates are computed between MMLU (57 sub-tasks), HellaSwag, and BIG-Bench
    Hard test sets (question+choices concatenation) and The Pile v1, C4 en.noclean, and
    RedPajama-v1 training corpora, then contamination rates will vary significantly across
    sub-tasks (Kruskal-Wallis p < 0.05) and across corpora (Kruskal-Wallis p < 0.05), and
    sub-task contamination rankings will correlate positively and significantly between
    13-gram containment and Jaccard similarity (Spearman ρ, p < 0.05), because different
    corpora have structurally different source compositions leading to corpus-specific
    contamination signatures in specialized benchmark sub-tasks.
  alternative_hypothesis_h0: |
    13-gram contamination rates do not differ significantly across benchmark sub-tasks or
    across training corpora (Kruskal-Wallis p >= 0.05), and contamination rankings by
    13-gram containment and Jaccard similarity are uncorrelated (Spearman p >= 0.05),
    indicating that contamination is uniformly distributed regardless of sub-task domain
    or corpus source composition.

