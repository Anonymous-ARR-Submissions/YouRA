hypothesis_draft:
  title: "Epistemic Reliability as a Latent Dimension in LLM Trustworthiness: A Cross-Property Correlation Study"
  hypothesis_id: "H-EpistemicReliability-v1"
  core_claim: |
    Instruction-tuned open-weight LLMs (7B–70B) exhibit a latent "epistemic reliability"
    dimension — reflected jointly by ECE, Brier score, TruthfulQA %, AdvGLUE drop, and ANLI
    drop — that is statistically distinct from raw capability (MMLU), structurally stable
    across evaluation protocols, and predictive of adversarial failure out-of-sample.
  mechanism: |
    Models with well-calibrated internal confidence distributions (low ECE/Brier) have
    representations that faithfully track prediction uncertainty. This calibration quality
    reduces hallucination susceptibility (TruthfulQA) and correlates with smoother decision
    surfaces that degrade less under input perturbation (AdvGLUE, ANLI). The shared root is
    "epistemic reliability" — fidelity of internal uncertainty representations — which is
    mechanistically tested via embedding perturbation dose-response (ε ∈ {0.005, 0.01, 0.02}).
  predictions:
    - P1: "Partial Spearman ρ(ECE, TruthfulQA% | MMLU) ≥ 0.40 and ρ(ECE, AdvGLUE drop | MMLU) ≥ 0.40 with BCa 95% CI excluding zero; factor analysis of 5-indicator set extracts stable structure (Tucker's congruence ≥ 0.85 across decoding regimes)"
    - P2: "LOO-AUC ≥ 0.70 for predicting top-quartile AdvGLUE drop from (ECE + TruthfulQA% + Brier), exceeding MMLU-only baseline by ΔR² ≥ 0.10"
    - P3: "|ρ(ECE, embedding perturbation instability)| ≥ 0.40 with monotonic dose-response across ε levels (Jonckheere-Terpstra p < 0.05) and bootstrap mediation ≥ 30% of ECE→AdvGLUE indirect effect"

variables_summary:
  independent: "N=30 open-weight LLMs (7B–70B, ≥3 families: LLaMA-2, Mistral, Falcon, Pythia, Qwen, Yi, OLMo, Gemma); decoding regime (greedy vs. T=0.7); perturbation magnitude ε"
  dependent_primary: "Cross-property Spearman correlation matrix with partial correlations controlling for MMLU; LOO-AUC for adversarial failure prediction; Tucker's factor congruence across decoding regimes"
  controlled: "MMLU accuracy (capability covariate); log-parameter count (family clustering covariate); lm-evaluation-harness version and prompt format (pipeline consistency); HumanEval (discriminant validity negative control)"

null_hypothesis:
  h0_statement: |
    There is no significant cross-property Spearman correlation structure in the
    (ECE, Brier, TruthfulQA %, AdvGLUE drop, ANLI drop) space that survives MMLU
    capability control and decoding invariance tests. Any observed correlations are
    attributable to raw capability confound or evaluation pipeline artifacts, and
    LOO-AUC for adversarial failure prediction does not exceed 0.60.
  statistical_test: "Spearman partial correlation with BCa bootstrap CI (10,000 resamples); factor analysis with Tucker's congruence; leave-one-out logistic regression with AUC-ROC"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "Psychometric factor analysis of LLM trustworthiness metrics with multi-layer validation: capability-independence test, decoding invariance, out-of-sample prediction, mechanistic dose-response probe, and discriminant validity via HumanEval negative control"
  differentiation_summary: |
    DecodingTrust and TrustLLM evaluate multiple trustworthiness dimensions but neither
    computes partial correlation matrices controlling for capability, nor applies factor
    analysis with stability tests, nor builds predictive models from score vectors.
    HELM provides multi-metric scores but performs no cross-metric correlation analysis.
    Zhao et al. 2023 demonstrate ECE-TruthfulQA correlation for specific models but not
    across diverse families with capability control or adversarial robustness as a third
    dimension. This work fills the gap: first systematic quantitative characterization of
    cross-property trustworthiness structure with full pre-registered falsification criteria.

