experimental_scope:
  models:
    - "LLaMA-2-7B-chat, 13B-chat, 70B-chat (Meta, RLHF-tuned)"
    - "Mistral-7B-Instruct-v0.1 (Mistral AI, SFT)"
    - "Falcon-7B-Instruct, Falcon-40B-Instruct (TII, SFT)"
    - "Pythia-6.9B-deduped, Pythia-12B-deduped (EleutherAI, pretrain-only)"
    - "Qwen-7B-Chat (Alibaba, RLHF-tuned)"
    - "Yi-6B-Chat (01.AI, SFT)"
    - "OLMo-7B-Instruct (AI2, SFT)"
    - "Gemma-7B-IT (Google, SFT)"
    - "MPT-7B-Instruct (MosaicML, SFT)"
    - "Additional models to reach N=30 total"
  datasets:
    - "MMLU (57 subjects, multi-choice) — ECE and Brier score from logits"
    - "TruthfulQA (817 questions) — hallucination rate (% truthful)"
    - "AdvGLUE (adversarial GLUE tasks) — accuracy drop vs. clean GLUE"
    - "ANLI (adversarial NLI, rounds 1-3) — accuracy drop"
    - "HumanEval (164 coding problems) — pass@1 as discriminant validity control"
  baselines:
    - "MMLU-only logistic regression (LOO-AUC capability baseline)"
    - "Random predictor (LOO-AUC = 0.50 floor)"
    - "DecodingTrust/TrustLLM qualitative trustworthiness rankings (comparison reference)"

measurement_plan:
  data_collection:
    - source: "Run lm-evaluation-harness v0.4.x on each of N=30 models for MMLU, TruthfulQA, AdvGLUE, ANLI, HumanEval tasks"
    - source: "Extract per-task logit outputs for ECE and Brier score computation (MMLU logits → confidence bins)"
    - source: "Run embedding perturbation experiment: 20 Gaussian draws per ε level × 3 ε levels per model on MMLU test subset (200 examples)"
    - source: "Collect model metadata (parameter count, training regime, release date) from HuggingFace model cards"
  procedure:
    - step: "1. Set up lm-evaluation-harness with standardized prompt templates; run all tasks under greedy decoding"
    - step: "2. Run all tasks under temperature=0.7 (fixed seed, 3 runs averaged) for decoding invariance test"
    - step: "3. Compute ECE (equal-width bins, n=10) and Brier score from MMLU logit outputs using netcal library"
    - step: "4. Run embedding perturbation experiment for each model at ε ∈ {0.005, 0.01, 0.02}"
    - step: "5. Assemble N×6 score matrix (ECE, Brier, TruthfulQA%, AdvGLUE drop, ANLI drop, HumanEval) + MMLU as covariate"
    - step: "6. Run partial Spearman correlations with BCa bootstrap (pingouin/scipy); factor analysis (FactorAnalyzer); LOO logistic regression (sklearn)"
    - step: "7. Compute Tucker's congruence between greedy and T=0.7 factor solutions"
    - step: "8. Run bootstrap mediation analysis (ECE → instability → AdvGLUE) using pingouin indirect effects"
    - step: "9. Run permutation MANOVA for family-level clustering (controlling for log-parameter count)"
  success_criteria:
    - "Partial ρ(ECE, TruthfulQA% | MMLU) ≥ 0.40 with BCa 95% CI excluding zero"
    - "Partial ρ(ECE, AdvGLUE drop | MMLU) ≥ 0.40 with BCa 95% CI excluding zero"
    - "Factor analysis: ≥1 factor explaining ≥50% variance with Tucker's congruence ≥ 0.85 across decoding regimes"
    - "LOO-AUC ≥ 0.70 for composite predictor; ΔR² ≥ 0.10 over MMLU baseline"
    - "|ρ(ECE, instability)| ≥ 0.40; monotonic dose-response (Jonckheere-Terpstra p < 0.05); mediation ≥ 30%"
    - "HumanEval factor loading < 0.40 on epistemic reliability factor (discriminant validity)"

validation:
  internal_validity:
    - "Pre-registered joint success criteria prevent post-hoc interpretation"
    - "Decoding invariance test (greedy vs. T=0.7) controls for evaluation pipeline artifacts"
    - "Capability control (MMLU partial correlation) isolates epistemic reliability from general competence"
    - "Discriminant validity test (HumanEval negative control) prevents construct conflation with reasoning"
    - "Three-outcome pre-registration (unidimensional / multi-factor / unstable) ensures all results are interpretable"
  external_validity:
    - "Population explicitly bounded to instruction-tuned open-weight LLMs 7B–70B, HuggingFace-accessible 2024-01"
    - "≥3 model families with diverse training regimes ensures cross-family generalizability within stated scope"
    - "Explicit limitation statement: effects below |ρ|=0.40 are indeterminate, not null (power constraint)"
    - "Results not claimed to generalize to closed frontier models (GPT-4, Claude, Gemini)"

discussion_synthesis:
  key_insights:
    - "The psychometric framing (models as subjects, benchmarks as test items) is the core conceptual innovation — it recasts the measurement question from 'which model is most trustworthy?' to 'is trustworthiness a coherent measurable construct?'"
    - "The study design is informative under ANY outcome: unidimensional finding reshapes evaluation practice; multi-factor finding provides principled decomposition; null (capability confound) disciplines conceptual inflation in trustworthiness research"
    - "Prof. Pax's feasibility constraint (ECE not available in public leaderboards; must compute locally via lm-evaluation-harness) is the most critical practical insight — it changes the data collection strategy from public scraping to local evaluation"
    - "Prof. Rex's HumanEval discriminant validity suggestion is stronger than the initially proposed latency control — coding performance is genuinely orthogonal to epistemic calibration"
  breakthrough_moments:
    - "Exchange 5 (Dr. Sage): Reframing from 'test unidimensionality' to 'characterize cross-property structure' — both outcomes are publishable, making the study robust to any result"
    - "Exchange 7 (Dr. Ally): Synthesis of the 'epistemic reliability' construct as a causal anchor linking ECE, TruthfulQA, and AdvGLUE through shared uncertainty representation fidelity"
    - "Exchange 9 (Prof. Pax): Concrete feasibility solution — LOO cross-validated threshold optimization instead of arbitrary fixed threshold; LOO-AUC as primary metric"
    - "Exchange 15 (Prof. Pax): Power analysis establishing N=30 as target (minimum detectable |ρ| = 0.40); expansion to Qwen/Yi/OLMo/Gemma; 5-indicator factor model with HumanEval discriminant control"
  resolved_tensions:
    - "Tension: Factor analysis on 3 variables is too minimal → Resolved: expand to 5 indicators (ECE, Brier, TruthfulQA%, AdvGLUE drop, ANLI drop) + HumanEval negative control"
    - "Tension: ECE not available in public leaderboards → Resolved: compute locally via lm-evaluation-harness for open-weight models; scope limited to HuggingFace-accessible models"
    - "Tension: Arbitrary screening threshold → Resolved: replace fixed threshold with LOO cross-validated threshold optimization; report LOO-AUC as primary metric"
    - "Tension: RLHF causal claim → Resolved: downgraded to observational clustering associated with documented training pipeline differences; no causal inference"
    - "Tension: N=20 underpowered → Resolved: extend to N=30 with additional model families; pre-register minimum detectable effect |ρ| ≥ 0.40"
