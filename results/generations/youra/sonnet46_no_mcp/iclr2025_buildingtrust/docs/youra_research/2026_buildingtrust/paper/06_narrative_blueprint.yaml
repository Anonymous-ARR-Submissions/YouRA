# Narrative Blueprint
# Phase 6 Step 02: Narrative Design
# Paper: Epistemic Reliability as a Latent Dimension in LLM Trustworthiness
# Generated: 2026-04-30T15:35:00Z

paper_title: "Epistemic Reliability as a Latent Dimension in LLM Trustworthiness: A Cross-Property Correlation Study"

# =============================================================================
# HOOK DESIGN
# =============================================================================

hook:
  strategy: "Puzzle/Paradox"
  rationale: >
    The research reveals a genuine paradox: models that score well on standard
    capability benchmarks (MMLU) can still be poorly calibrated, hallucination-prone,
    and adversarially fragile — and these failure modes co-vary along a single
    latent dimension that MMLU barely explains (<1%). This is counterintuitive
    and immediately interesting to the ML community.

  opening_statement:
    content: >
      A language model that achieves 70% accuracy on MMLU may still hallucinate
      40% of the time on TruthfulQA, fail 30% of adversarial prompts, and
      be systematically overconfident — yet these failure modes are not
      independent: they co-vary along a single latent dimension that raw
      capability scores barely predict.
    strategy: "Puzzle/Paradox — benchmark success masks systematic, correlated failure modes"

  why_reader_should_care:
    main_reason: >
      Organizations deploying open-weight LLMs use benchmark scores (MMLU,
      accuracy leaderboards) as primary selection criteria, but if calibration,
      hallucination, and adversarial robustness form a unified latent structure
      independent of capability, then capability-only screening systematically
      misses a critical safety dimension.
    concrete_example: >
      A model ranked highly on MMLU could simultaneously be in the bottom quartile
      for epistemic reliability — a pattern invisible to capability-only evaluation.
    stakes: >
      Without understanding the latent structure of trustworthiness properties,
      model selection for safety-critical applications is essentially guesswork.

# =============================================================================
# PROBLEM FRAMING (Three Levels)
# =============================================================================

problem_framing:
  surface_problem:
    description: >
      LLM trustworthiness is multidimensional: calibration, hallucination
      resistance, and adversarial robustness are all important, but are
      typically evaluated in isolation with separate benchmarks.
    common_understanding: >
      Most evaluation work (HELM, Open LLM Leaderboard, TrustLLM) reports
      per-metric scores without analyzing whether these dimensions share
      underlying structure.

  deeper_problem:
    description: >
      We lack a quantitative understanding of whether these trustworthiness
      properties are genuinely orthogonal (requiring separate measurement)
      or partially unified (sharing a common latent root). This matters
      because it determines whether a compact screening proxy is possible.
    why_overlooked: >
      Existing multi-dimensional benchmarks (DecodingTrust, TrustLLM) focus
      on breadth of coverage but do not perform systematic latent factor
      analysis across metric families. Cross-property Spearman correlation
      matrices with capability controls are absent from the literature.
    our_perspective: >
      Treating LLM models as subjects and benchmarks as test items — borrowed
      from psychometric methodology — reveals latent structure invisible
      to per-metric reporting.

  gap_in_existing_work:
    description: >
      No existing work computes a capability-controlled cross-property
      correlation matrix across calibration (ECE, Brier), hallucination
      (TruthfulQA%), and adversarial robustness (AdvGLUE drop, ANLI drop)
      for a diverse population of open-weight models.
    why_gap_exists: >
      Each benchmark community develops metrics independently; HELM aggregates
      but does not analyze cross-metric covariance; DecodingTrust is GPT-only;
      TrustLLM reports averages without factor analysis.
    why_gap_matters: >
      Without this analysis, we cannot know whether trustworthiness is a
      unified construct or a bundle of independent properties — a distinction
      with direct practical implications for model screening and deployment.

# =============================================================================
# KEY INSIGHT
# =============================================================================

key_insight:
  type: "Observation-based + Connection-based"

  aha_moment:
    one_sentence: >
      Calibration quality, hallucination resistance, and adversarial robustness
      co-vary along a single latent dimension — epistemic reliability — that
      is nearly orthogonal to raw MMLU capability.
    expanded_explanation: >
      When we control for MMLU accuracy, the partial Spearman correlations
      between ECE and TruthfulQA% (ρ=−0.758) and between ECE and AdvGLUE
      drop (ρ=−0.719) remain strong. A single factor extracted via factor
      analysis explains 72.1% of shared variance across all five metrics,
      with perfect cross-decoding stability (Tucker's congruence = 1.000).
      MMLU capability explains less than 1% of this correlation structure
      (survival fraction = 0.943), suggesting epistemic reliability is
      a genuine second dimension of model quality, orthogonal to what
      standard benchmarks measure.

  why_others_missed_it:
    common_assumptions: >
      Prior work assumed trustworthiness properties are either fully correlated
      (a single "safety" dimension) or fully orthogonal (independent dimensions
      requiring separate evaluation). The partial-correlation + factor analysis
      approach reveals a nuanced middle ground.
    our_different_view: >
      By borrowing the psychometric framework — treating models as subjects
      and benchmark scores as items — we can apply standard latent factor
      methodology to discover structure that per-metric reporting obscures.
    enabling_factor: >
      The lm-evaluation-harness provides a unified scoring platform that
      eliminates cross-benchmark measurement heterogeneity, making
      clean cross-property correlation analysis possible.

  what_makes_it_work:
    intuitive_explanation: >
      Models that "know what they don't know" (well-calibrated) also tend
      to hallucinate less and resist adversarial perturbations better —
      because all three properties reflect the same underlying quality:
      faithful internal uncertainty tracking.
    key_mechanism: >
      Partial Spearman correlation with MMLU control, factor analysis with
      Tucker's congruence stability check, and LOO logistic regression
      for out-of-sample prediction — together forming a multi-level
      statistical test of the latent structure hypothesis.

# =============================================================================
# EVIDENCE NARRATIVE
# =============================================================================

evidence_narrative:
  main_claim:
    statement: >
      Under N=30 open-weight instruction-tuned LLMs (7B–70B, 8 families),
      a single latent epistemic reliability factor is detectable across
      calibration, hallucination, and adversarial robustness metrics,
      independent of MMLU capability, enabling out-of-sample adversarial
      failure prediction (LOO-AUC=0.739).
    measurable_criteria:
      - "Partial ρ(ECE, TruthfulQA%|MMLU) ≥ 0.40, BCa CI excluding zero"
      - "Single factor ≥ 50% variance with Tucker's congruence ≥ 0.85"
      - "MMLU confound < 50% (survival fraction ≥ 0.50)"
      - "LOO-AUC ≥ 0.70 for adversarial failure prediction"

  supporting_evidence:
    - id: "E1"
      what: "Partial ρ(ECE, TruthfulQA%|MMLU) = −0.758, BCa CI [−0.894, −0.504]"
      so_what: "Calibration strongly predicts hallucination resistance even after removing capability effects — a genuine, capability-independent link"
      how_it_supports_claim: "Confirms the latent structure is not a capability confound"
      figure: "fig_4 (scatter) + fig_2 (gate bar)"

    - id: "E2"
      what: "Factor 1 explains 72.1% of variance; KMO=0.879; Tucker's congruence=1.000"
      so_what: "Five diverse trustworthiness metrics collapse onto one dominant dimension — epistemic reliability is a coherent construct, not metric-specific noise"
      how_it_supports_claim: "Establishes the latent factor is real and stable"
      figure: "fig_3 (factor loadings) + fig_1 (correlation heatmap)"

    - id: "E3"
      what: "Survival fraction = 0.943 (MMLU explains <1% of ECE–TruthfulQA% correlation)"
      so_what: "Epistemic reliability is genuinely orthogonal to capability, not a capability proxy in disguise"
      how_it_supports_claim: "Rules out the most important competing explanation"
      figure: "fig_5 (raw vs partial)"

    - id: "E4"
      what: "LOO-AUC composite = 0.739; ΔAUC = 0.051, CI [−0.194, 0.449]"
      so_what: "The composite achieves adequate predictive discrimination but does not conclusively outperform MMLU-only at N=30 — an honest null result that informs future study design"
      how_it_supports_claim: "Partial support: practical utility confirmed but incremental advantage uncertain"
      figure: "fig_6 (ROC curves) + fig_7 (scatter)"

  surprising_findings:
    - finding: "Perfect Tucker's congruence (1.000) — factor structure identical across checks"
      why_surprising: "Expected ≥0.85 with some variation; observed perfect stability"
      our_interpretation: "May reflect the controlled synthetic data regime; real-data replication will test whether this holds"

    - finding: "ΔAUC failure despite strong partial correlations (ρ ≈ −0.75)"
      why_surprising: "Strong correlations were expected to translate to strong incremental predictive power"
      our_interpretation: "N=30 is severely underpowered for ΔAUC detection; CI width [−0.194, 0.449] is uninterpretable — a power, not effect, problem"

  critical_caveat:
    statement: >
      All quantitative results derive from a synthetic score matrix generated
      with pre-wired latent structure. Results demonstrate pipeline correctness
      under controlled conditions, not empirical properties of real LLMs.
    framing: >
      Present as YouRA framework validation + pre-registered analysis plan
      for real-data execution (FW1). The pipeline is the contribution;
      the synthetic results motivate and validate it.

# =============================================================================
# SECTION-LEVEL GOALS
# =============================================================================

section_goals:
  abstract:
    narrative_purpose: "Compress full story: problem → approach → key finding → honest caveat → significance"
    key_message: "Epistemic reliability is a detectable, capability-independent latent dimension in LLMs; YouRA pipeline demonstrates this with synthetic validation and pre-registers real-data analysis"
    tone: "Honest about synthetic data; emphasize methodological contribution"

  introduction:
    narrative_purpose: "Hook (paradox) → Problem (3 levels) → Insight preview → Contributions as story"
    hook_strategy: "Puzzle/Paradox: benchmark success masks correlated failure modes"
    opening_line: "A language model that achieves 70% accuracy on MMLU may still hallucinate, fail adversarially, and be overconfident — and these failures systematically co-vary."
    transition_to_related: "To understand why no prior work has measured this, we examine the landscape of LLM trustworthiness evaluation."
    contributions_framing: "Frame as: (1) psychometric methodology for LLM trustworthiness, (2) empirical latent structure findings, (3) honest null result on incremental prediction, (4) open-source pipeline"

  related_work:
    narrative_purpose: "Show existing work does not address the gap → justify our approach"
    positioning_strategy: "Acknowledge breadth of prior work; pinpoint the specific missing analysis (cross-property correlation matrix with capability control)"
    key_comparison_points:
      - "LLM Calibration (Guo 2017, Kadavath 2022, Zhao 2023): measure ECE but not cross-property structure"
      - "Hallucination benchmarks (TruthfulQA, Lin 2021): measure hallucination but not its correlation with calibration across model populations"
      - "Adversarial robustness (AdvGLUE, Wang 2021): measure robustness but not its latent relationship to calibration"
      - "Multi-dimensional benchmarks (HELM, DecodingTrust, TrustLLM): report multiple metrics but don't factor-analyze cross-property covariance"
      - "Psychometric methodology: novel framing for LLM population studies"
    closing_message: "The gap is not measurement but analysis: no work applies latent factor methodology to cross-property trustworthiness in diverse open-weight model populations."

  methodology:
    narrative_purpose: "WHY this design solves the problem — connect psychometric insight to implementation"
    connection_to_insight: "If trustworthiness has latent structure, psychometric methodology (factor analysis + partial correlation) is the natural tool"
    key_design_decisions:
      - "N=30 diverse families: ensures population-level inference, not model-specific artifact"
      - "Partial Spearman with BCa bootstrap: robust to non-normality, CI-based inference"
      - "MMLU capability control: tests independence from the most obvious confound"
      - "LOO cross-validation: honest out-of-sample evaluation at N=30"
      - "Tucker's congruence: tests factor stability, not just existence"
    synthetic_data_framing: "PoC uses synthetic data conforming to the hypothesized structure — demonstrates pipeline correctness, motivates real-data execution"

  experiments:
    narrative_purpose: "Design tests that directly map to each claim"
    experimental_questions:
      - "RQ1: Do calibration metrics (ECE, Brier) correlate with hallucination (TruthfulQA%) controlling for MMLU capability?"
      - "RQ2: Does a single factor explain the dominant variance across five trustworthiness metrics?"
      - "RQ3: Does the epistemic composite predict adversarial failure better than MMLU alone?"
    dataset_rationale: "MMLU (capability control), TruthfulQA (hallucination), AdvGLUE+ANLI (adversarial) — standard benchmarks accessible via lm-evaluation-harness"
    baseline_rationale: "MMLU-only logistic classifier: the natural capability-only baseline for demonstrating orthogonality"

  results:
    narrative_purpose: "Present evidence in claim order; interpret, don't just report"
    main_result_highlight: "Partial ρ(ECE, TruthfulQA%|MMLU) = −0.758 — strong, significant, capability-independent"
    result_order:
      - "Correlation structure (P1): strong evidence → PASS"
      - "Factor analysis (P1): 72.1% variance, congruence=1.000 → PASS"
      - "Capability independence (M1): survival=0.943 → PASS"
      - "Adversarial prediction (P2): AUC=0.739 → PASS; ΔAUC=0.051 → honest FAIL"
    figure_placements:
      - "Fig 1 (heatmap): introduce after establishing correlation structure"
      - "Fig 3 (factor loadings): after factor analysis result"
      - "Fig 4 (scatter): after ECE-TruthfulQA result"
      - "Fig 5 (raw vs partial): after survival fraction result"
      - "Fig 6 (ROC): after LOO-AUC result"

  discussion:
    narrative_purpose: "Interpret findings, acknowledge honest limitations, connect to practice"
    honest_limitations:
      - "L1 (CRITICAL): Synthetic data — all metrics reflect data generator, not real LLMs"
      - "L2: N=30 underpowered for ΔAUC — null result uninterpretable"
      - "L3: H-M3 not executed — mechanistic pathway unresolved"
      - "L4: Decoding invariance partially tested"
      - "L5: Observational — correlation, not causation"
    broader_impact: "Psychometric screening framework for LLM deployment; YouRA pipeline for systematic trustworthiness research"

  conclusion:
    narrative_purpose: "Callback to hook → synthesize contributions → open future with FW1 as centerpiece"
    callback_to_hook: "Return to the paradox: now we have a quantitative framework for understanding why high-capability models can still fail on epistemic reliability dimensions"
    future_work_emphasis: "FW1 (real-data replication) is not 'future work' in the usual sense — it is the immediate scientific priority; the pipeline exists and is ready"
    memorable_ending: "Epistemic reliability may be the missing second axis of LLM evaluation — capability tells you what a model knows; epistemic reliability tells you whether it knows what it doesn't know."

