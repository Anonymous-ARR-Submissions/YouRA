main_hypothesis:
  id: H-EpistemicReliability-v1
  title: 'Epistemic Reliability as a Latent Dimension in LLM Trustworthiness: A Cross-Property Correlation Study'
  statement: 'Under a population of N≈30 instruction-tuned open-weight LLMs (7B–70B parameters,

    ≥3 model families, HuggingFace-accessible as of 2024-01), if we compute a cross-property

    score matrix spanning ECE (from MMLU logits), TruthfulQA accuracy %, AdvGLUE accuracy drop,

    Brier score, and ANLI drop using lm-evaluation-harness under standardized conditions,

    then statistically significant, stable Spearman correlation structure will be detectable

    (|ρ| ≥ 0.40, BCa 95% CI excluding zero, Tucker''s congruence ≥ 0.85 across greedy and T=0.7

    decoding regimes), because these metrics reflect a shared latent "epistemic reliability"

    property — the degree to which a model''s internal representations faithfully track uncertainty

    about its outputs — that partially determines graceful degradation under input perturbation.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: 'Multi-benchmark suite: MMLU + TruthfulQA + AdvGLUE + ANLI + HumanEval (lm-evaluation-harness v0.4.x)'
    model: N=30 open-weight instruction-tuned LLMs (7B–70B), HuggingFace 2024-01
    optimizer: null
    hyperparameters:
      n_models: 30
      param_range: 7B–70B
      model_families:
      - LLaMA-2
      - Mistral
      - Falcon
      - Pythia
      - Qwen
      - Yi
      - OLMo
      - Gemma
      decoding_greedy_temp: 0
      decoding_stochastic_temp: 0.7
      stochastic_seeds: 3
      perturbation_epsilon:
      - 0.005
      - 0.01
      - 0.02
      perturbation_draws_per_epsilon: 20
      perturbation_examples: 200
      bootstrap_resamples: 10000
      ece_bins: 10
