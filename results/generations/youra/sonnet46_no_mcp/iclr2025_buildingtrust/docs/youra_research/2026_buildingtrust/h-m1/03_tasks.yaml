    title: "A-5: Implement primary gate analysis in analyzers.py"
    description: |
      Implement (PRIMARY GATE — MUST_WORK):
        compute_partial_corr_bca(df, x, y, covar, n_boot, seed) -> dict
        Returns: {rho_partial, bca_ci_low, bca_ci_high, ci_excludes_zero, passes_threshold}
        - Uses pingouin.partial_corr(data=df, x=x, y=y, covar=covar, method='spearman')
        - Uses _bca_bootstrap_partial for CI
        - ci_excludes_zero: (ci_low > 0 or ci_high < 0)
        - passes_threshold: abs(rho_partial) >= PRIMARY_THRESHOLD and ci_excludes_zero

        compute_confound_magnitude(raw_rho, partial_rho) -> dict
        Returns: {survival_fraction, confound_fraction, interpretation}
        - survival_fraction = abs(partial_rho) / abs(raw_rho)

        evaluate_gate(partial_result, threshold) -> bool
        Returns True if abs(rho_partial) >= threshold AND ci_excludes_zero
    feature_tag: "evaluation"
    priority: 89
    source_document: "03_architecture.md"
    complexity: 11
    test_requirements: |
