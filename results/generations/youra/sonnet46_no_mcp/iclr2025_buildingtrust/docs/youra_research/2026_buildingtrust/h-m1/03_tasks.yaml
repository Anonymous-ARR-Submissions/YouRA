  - id: "task-004"
    epic: "BCa Bootstrap Core"
    title: "A-3: Implement BCa bootstrap functions in analyzers.py"
    description: |
      Implement core BCa bootstrap CI functions (adapted from H-E1 bca_bootstrap_ci):
        - _bca_bootstrap_spearman(df, x, y, n_boot, seed) -> tuple[float, float]
          BCa CI for unconditional spearmanr
        - _bca_bootstrap_partial(df, x, y, covar, n_boot, seed) -> tuple[float, float]
          BCa CI for pg.partial_corr

      Pseudo-code for BCa:
        1. Compute observed statistic (rho_obs)
        2. rng = np.random.default_rng(seed)
        3. boot_stats = [] for n_boot resamples with replacement
        4. jackknife_stats = leave-one-out estimates
        5. acceleration = sum((jack_mean - jack_i)^3) / (6 * sum((jack_mean - jack_i)^2)^1.5)
        6. bias = norm.ppf(mean(boot < obs))
        7. alpha1 = norm.cdf(bias + (bias + z_alpha) / (1 - accel*(bias+z_alpha)))
        8. alpha2 = norm.cdf(bias + (bias + z_1alpha) / (1 - accel*(bias+z_1alpha)))
        9. ci = (percentile(boot, alpha1*100), percentile(boot, alpha2*100))
    feature_tag: "evaluation"
    priority: 91
    source_document: "03_architecture.md"
    complexity: 10
    test_requirements: |
