  confidence: HIGH
  expected_dataset: MMLU, TruthfulQA (truthfulqa_mc1), AdvGLUE (adv_glue), ANLI (anli_r3),
    HumanEval — loaded via lm-evaluation-harness from real HuggingFace benchmarks
  method: external_llm_verification
  reasoning: run_experiment_poc.py is the PoC entry point (invoked as __main__) and
    entirely bypasses lm-evaluation-harness, generating all 30 model scores from parametric
    random distributions (rng.normal) with a pre-wired latent factor structure that
    guarantees the gate conditions (|ρ| ≥ 0.40) will pass. The synthetic data generator
    explicitly encodes the hypothesis-confirming correlation structure, making the
    experiment tautological.
  status: FAILED
  violations:
  - run_experiment_poc.py:45-94 — generate_synthetic_score_matrix() generates all
    ECE, Brier, TruthfulQA_pct, AdvGLUE_drop, ANLI_drop, MMLU_acc values from np.random.default_rng
    with a latent factor; no real benchmark data loaded
  - run_experiment_poc.py:53-77 — latent factor is hard-wired so that ECE, TruthfulQA%,
    AdvGLUE_drop all correlate with it at known loadings (0.08, 8, 0.06), guaranteeing
    partial ρ ≥ 0.40 gate will pass
  - run_experiment_poc.py:108 — df = generate_synthetic_score_matrix(n=30) is the
    sole data source in the PoC main path; lm-eval (run_eval.py) is never called
  - run_experiment_poc.py:209 — sys.exit(0 if result['gate_eval']['PASS'] else 1)
    exits 0 because the synthetic latent structure is designed to pass the gate, making
    the experiment cannot-fail
