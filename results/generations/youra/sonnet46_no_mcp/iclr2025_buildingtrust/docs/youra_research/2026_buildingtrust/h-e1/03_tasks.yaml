version: "1.0"

metadata:
  hypothesis_id: h-e1
  hypothesis_type: EXISTENCE
  tier: LIGHT
  total_budget: 15
  generated_at: "2026-04-30T00:00:00Z"
  source_documents:
    - h-e1/03_prd.md
    - h-e1/03_architecture.md
    - h-e1/03_logic.md
