# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 3
  steps:
    - step: 1
      description: "Models with well-calibrated internal confidence distributions (low ECE, low Brier score) have internal representations that faithfully track prediction uncertainty"
      evidence: "Kadavath et al. 2022 show P(True) probing captures genuine self-knowledge; Zhao et al. 2023 show generation-based ECE correlates with TruthfulQA hallucination rates"
      falsifier: "If ECE and Brier score do not correlate with each other (ρ < 0.3), the calibration construct is inconsistent across measurement methods"
    - step: 2
      description: "Models with faithful uncertainty representations are less likely to confidently produce false factual claims (lower hallucination rate on TruthfulQA), because overconfidence and hallucination share a common root in miscalibrated confidence"
      evidence: "Zhao et al. 2023 directly demonstrate ECE-TruthfulQA correlation; Yin et al. 2023 show overconfidence and under-refusal are correlated failure modes"
      falsifier: "If partial ρ(ECE, TruthfulQA % | MMLU) < 0.30, the calibration-hallucination link is capability-confounded rather than mechanistic"
    - step: 3
      description: "Models with faithful uncertainty representations exhibit more stable output distributions under input perturbation (lower embedding perturbation instability), because well-calibrated models have smoother decision surfaces that do not catastrophically flip under small input changes — and this stability predicts lower adversarial accuracy drop (AdvGLUE, ANLI)"
      evidence: "Theoretical: smoother loss landscapes correlate with better calibration (Guo et al. 2017 temperature scaling smooths decision boundaries); dose-response test (ε manipulation) provides empirical test"
      falsifier: "If ECE does not correlate with perturbation instability at |ρ| ≥ 0.40, or if instability does not mediate ≥30% of ECE→AdvGLUE relationship (bootstrap 95% CI including zero), the mechanistic pathway is not supported"
  key_tension: "The causal direction from calibration to robustness is theoretically motivated but empirically unconfirmed — both ECE and AdvGLUE drop may reflect a common upstream cause (distributional shift sensitivity) rather than a true causal chain. The dose-response perturbation test and mediation analysis are designed to distinguish these but cannot fully resolve confounding in an observational study."
  evidence_summary: |
    Evidence for the causal chain rests on three pillars: (1) Zhao et al. 2023 demonstrating
    ECE-TruthfulQA correlation in existing models; (2) theoretical smoothness arguments linking
    calibration to decision boundary stability; (3) the empirical dose-response test (varying ε)
    to establish monotonic instability-robustness relationship. The chain is plausible but
    acknowledges the observational nature of the study — causal language is avoided in claims.

