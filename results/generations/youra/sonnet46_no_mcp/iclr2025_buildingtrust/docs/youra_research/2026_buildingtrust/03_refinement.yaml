# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "lm-evaluation-harness produces consistent, reproducible scores across runs for a given model and task, with test-retest reliability ≥ 0.8"
    supporting_evidence: "lm-evaluation-harness is the standard community tool with deterministic evaluation for greedy decoding; stochastic mode uses fixed seeds"
    consequence_if_violated: "Measurement noise would attenuate correlations, making it appear the construct doesn't exist when it does (Type II error inflation)"
  - id: "A2"
    assumption: "ECE computed from MMLU multi-choice logits is a valid proxy for overall model calibration quality"
    supporting_evidence: "Standard practice since Guo et al. 2017; Kadavath et al. 2022 validate on LLMs; MMLU's multi-choice format enables direct confidence extraction"
    consequence_if_violated: "ECE would be a task-specific measurement rather than a general calibration estimate, weakening the cross-property correlation interpretation"
  - id: "A3"
    assumption: "Open-weight models on HuggingFace represent a meaningful, diverse slice of the 7B–70B instruction-tuned model population as of 2024-01"
    supporting_evidence: "Major model families (LLaMA-2, Mistral, Falcon, Pythia, Qwen, Yi, OLMo, Gemma) cover diverse architectures and training regimes; N=30 samples ≥3 families"
    consequence_if_violated: "Results may not generalize beyond the sampled families; external validity is bounded to the stated population"
  - id: "A4"
    assumption: "Gaussian noise in embedding space (at ε = 0.005–0.02 × ‖e‖₂) captures the model's sensitivity to distributional shift in a way that correlates with adversarial text perturbations"
    supporting_evidence: "Embedding-space perturbations are a standard proxy for input sensitivity; AdvGLUE uses text-level perturbations that propagate through the embedding layer"
    consequence_if_violated: "If embedding perturbation instability is decorrelated with adversarial text perturbations, the mechanistic mediation test is invalid — but the purely empirical predictive claim (LOO-AUC) remains unaffected"
  - id: "A5"
    assumption: "Training regime metadata (RLHF-tuned vs. SFT-only) is accurately documented in HuggingFace model cards for the selected models"
    supporting_evidence: "Major model families publish training details (LLaMA-2 chat = RLHF; Pythia-deduped = pretraining only; Mistral-Instruct = SFT); model cards are generally reliable for well-known models"
    consequence_if_violated: "Family-level clustering analysis would use incorrect regime labels, potentially masking or inflating the training-regime association"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    Instruction-tuned open-weight LLMs with 7B–70B parameters available on HuggingFace
    as of 2024-01, covering ≥3 distinct model families (LLaMA-2, Mistral, Falcon, Pythia,
    Qwen, Yi, OLMo, Gemma). Inference target is specifically: organizations deploying
    open-weight models who need low-cost safety proxies without proprietary safety reports.
  does_not_apply_to: |
    Closed frontier models (GPT-4, Claude, Gemini) — different training pipelines, no logit
    access for ECE computation, different evaluation infrastructure. Models below 1B parameters —
    different calibration dynamics. Non-instruction-tuned base models (except as comparison point
    within Pythia family). Models released after 2024-01 (temporal scope bound).
  known_limitations: |
    N=30 provides 80% power only for |ρ| ≥ 0.40 partial correlations; effects below this
    threshold are indeterminate, not null. All claims are observational — no causal inference
    about RLHF causing epistemic reliability. Training regime metadata reliability varies by
    model family. The embedding perturbation test probes a proxy for adversarial sensitivity,
    not adversarial text perturbations directly.

