# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-EpistemicReliability-v1"
  confidence_level: 0.72
  core_hypothesis_statement: |
    Under a population of N≈30 instruction-tuned open-weight LLMs (7B–70B parameters,
    ≥3 model families, HuggingFace-accessible as of 2024-01), if we compute a cross-property
    score matrix spanning ECE (from MMLU logits), TruthfulQA accuracy %, AdvGLUE accuracy drop,
    Brier score, and ANLI drop using lm-evaluation-harness under standardized conditions,
    then statistically significant, stable Spearman correlation structure will be detectable
    (|ρ| ≥ 0.40, BCa 95% CI excluding zero, Tucker's congruence ≥ 0.85 across greedy and T=0.7
    decoding regimes), because these metrics reflect a shared latent "epistemic reliability"
    property — the degree to which a model's internal representations faithfully track uncertainty
    about its outputs — that partially determines graceful degradation under input perturbation.
  alternative_hypothesis_h0: |
    There is no significant cross-property Spearman correlation structure in the (ECE, TruthfulQA %,
    AdvGLUE drop, Brier score, ANLI drop) space that survives capability control (MMLU partial
    correlation) and decoding invariance tests; any observed correlations reflect MMLU-driven
    capability confound or evaluation pipeline artifacts, and LOO-AUC for adversarial failure
    prediction does not exceed 0.60.

