predictions:
  - id: "P1"
    primary: true
    statement: "Cross-property Spearman correlation structure across (ECE, Brier score, TruthfulQA %, AdvGLUE drop, ANLI drop) is statistically significant and capability-independent: partial ρ(ECE, TruthfulQA % | MMLU) ≥ 0.40 AND partial ρ(ECE, AdvGLUE drop | MMLU) ≥ 0.40, with BCa 95% CIs excluding zero"
    test_method: "Compute partial Spearman correlations using pingouin or statsmodels on the N=30 model score matrix; bootstrap 10,000 resamples for BCa CIs"
    success_criterion: "Both partial correlations ≥ 0.40 with 95% CI excluding zero; factor analysis extracts ≥1 factor explaining ≥50% of variance in the 5-indicator set"
    falsification: "Either partial correlation collapses below 0.20 after MMLU control, OR factor structure is unstable (Tucker's congruence < 0.85 across decoding regimes)"
  - id: "P2"
    primary: false
    statement: "The cross-property structure predicts adversarial failure out-of-sample: LOO-AUC for predicting top-quartile AdvGLUE drop using (ECE + TruthfulQA % + Brier) ≥ 0.70, exceeding MMLU-only baseline by ΔR² ≥ 0.10"
    test_method: "Leave-one-model-out cross-validation with logistic regression; compute AUC-ROC and R² for both composite and MMLU-only predictors using sklearn"
    success_criterion: "LOO-AUC ≥ 0.70 AND ΔR² ≥ 0.10 with bootstrap 95% CI excluding zero"
    falsification: "LOO-AUC < 0.60 or ΔR² CI includes zero — composite scores provide no predictive advantage over capability baseline"
  - id: "P3"
    primary: false
    statement: "ECE correlates with embedding perturbation instability at |ρ| ≥ 0.40, and perturbation instability shows monotonic dose-response with AdvGLUE drop across ε ∈ {0.005, 0.01, 0.02} — supporting the mechanistic pathway"
    test_method: "Compute embedding-space Gaussian perturbations (20 draws per ε level) for each model on MMLU test set; measure answer-flip probability; compute Spearman ρ(ECE, instability) and test monotonicity across ε levels via Jonckheere-Terpstra test"
    success_criterion: "|ρ(ECE, instability)| ≥ 0.40 AND monotonic dose-response (p < 0.05 Jonckheere-Terpstra) AND bootstrap mediation ≥ 30% of ECE→AdvGLUE (95% CI excluding zero)"
    falsification: "ρ(ECE, instability) < 0.25 OR non-monotonic dose-response OR mediation CI includes zero — mechanistic pathway is not supported; predictive claim downgraded to 'empirically predictive but mechanistically unresolved'"

