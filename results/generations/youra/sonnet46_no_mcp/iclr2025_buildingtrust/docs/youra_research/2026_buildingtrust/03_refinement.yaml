      levels: ["LLaMA-2-7B-chat", "LLaMA-2-13B-chat", "LLaMA-2-70B-chat", "Mistral-7B-Instruct", "Falcon-7B-Instruct", "Falcon-40B-Instruct", "Pythia-6.9B-deduped", "Pythia-12B-deduped", "Qwen-7B-Chat", "Yi-6B-Chat", "OLMo-7B-Instruct", "Gemma-7B-IT", "MPT-7B-Instruct", "... (N=30 total)"]
    - name: "Decoding regime"
      type: "categorical"
      operationalization: "Greedy decoding (temperature=0) vs. stochastic decoding (temperature=0.7, fixed seed, averaged over 3 runs)"
      levels: ["greedy", "temperature_0.7"]
    - name: "Perturbation magnitude ε"
      type: "continuous"
      operationalization: "Gaussian noise magnitude applied to input embeddings, normalized as fraction of mean embedding L2 norm: {0.005, 0.01, 0.02} × ‖e‖₂"
  dependent:
    - name: "Cross-property Spearman correlation structure"
      type: "continuous"
      operationalization: "Spearman ρ matrix across (ECE, Brier score, TruthfulQA %, AdvGLUE drop, ANLI drop) per model; primary estimand is the partial correlation after controlling for MMLU accuracy"
      primary: true
    - name: "LOO adversarial failure prediction AUC"
      type: "continuous"
      operationalization: "Leave-one-model-out AUC for predicting whether a model is in the top quartile of AdvGLUE drop, using ECE + TruthfulQA % + Brier score as predictors vs. MMLU-only baseline"
      primary: false
    - name: "Tucker's factor congruence across decoding regimes"
      type: "continuous"
      operationalization: "Tucker's congruence coefficient for each extracted factor between greedy and T=0.7 factor solutions; computed via FactorAnalyzer Python library"
      primary: false
    - name: "Embedding perturbation instability"
      type: "continuous"
      operationalization: "Proportion of answer flips under 20 Gaussian perturbations at each ε level; dose-response curve across ε ∈ {0.005, 0.01, 0.02}"
      primary: false
  controlled:
    - name: "MMLU accuracy (capability control)"
      operationalization: "Partialled out via partial Spearman correlation using statsmodels; ensures residual correlations reflect epistemic reliability independent of raw capability"
    - name: "Parameter count (log scale)"
      operationalization: "log₂(parameter count) included as covariate in permutation MANOVA for family-level clustering analysis"
    - name: "Evaluation pipeline"
      operationalization: "All metrics computed via lm-evaluation-harness v0.4.x with identical prompt templates and batch sizes across models; decoding invariance test verifies pipeline artifact control"
    - name: "HumanEval pass@1 (discriminant validity control)"
      operationalization: "Included in factor analysis as negative control; must NOT load ≥ 0.4 on the 'epistemic reliability' factor for discriminant validity to hold"

