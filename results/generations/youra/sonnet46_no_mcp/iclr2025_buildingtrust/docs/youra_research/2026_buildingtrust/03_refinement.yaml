established_facts:
  claims:
    - claim: "ECE (Expected Calibration Error) is a valid and computable calibration metric for LLMs via logit outputs on MMLU"
      status: "BUILD_ON"
      evidence: "Guo et al. 2017 (ECE definition); Kadavath et al. 2022 (P(True) probing); lm-evaluation-harness supports ECE computation from logits"
    - claim: "TruthfulQA % is a valid, reproducible hallucination rate proxy for LLMs"
      status: "BUILD_ON"
      evidence: "Lin et al. 2021 (TruthfulQA); Open LLM Leaderboard uses TruthfulQA % as standard metric"
    - claim: "AdvGLUE and ANLI provide adversarial robustness scores measurable via lm-evaluation-harness"
      status: "BUILD_ON"
      evidence: "Wang et al. 2021 (AdvGLUE); datasets library supports ANLI; lm-evaluation-harness has task implementations"
    - claim: "DecodingTrust and TrustLLM show trustworthiness properties are partially but NOT fully correlated"
      status: "BUILD_ON"
      evidence: "Wang et al. 2023 (DecodingTrust, NeurIPS Outstanding); Sun et al. 2024 (TrustLLM, 16 LLMs)"
    - claim: "No systematic cross-property Pearson/Spearman correlation matrix has been computed across ECE, TruthfulQA, and AdvGLUE simultaneously for a diverse open-weight model population"
      status: "PROVE_NEW"
      evidence: "Phase 1 gap analysis; HELM provides multi-metric scores but no cross-metric correlation analysis"
    - claim: "A latent 'epistemic reliability' dimension orthogonal to MMLU capability exists in the (ECE, TruthfulQA, AdvGLUE) space"
      status: "PROVE_NEW"
      evidence: "Theoretical grounding from Zhao et al. 2023 (ECE-hallucination link); no empirical validation exists"
