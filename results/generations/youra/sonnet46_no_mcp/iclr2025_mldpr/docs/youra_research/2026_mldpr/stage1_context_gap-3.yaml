gap_id: "gap-3"
gap_title: "Lack of Large-Scale Empirical Evidence Linking FAIR Compliance to ML Research Outcomes"
gap_description: >
  FAIR principles are well-defined and FAIR-related metadata tags exist in OpenML and HuggingFace.
  F-UJI provides automated FAIR scoring for general scientific data.
  However, no ML-specific large-scale empirical study has correlated FAIR compliance scores
  with reuse frequency, citation counts, or downstream model performance.
  Missing piece: observational study computing FAIR scores for ML datasets, measuring reuse
  frequency and downstream performance, and statistically comparing high-FAIR vs low-FAIR groups.
  Natural quasi-experimental design already exists in OpenML metadata.
