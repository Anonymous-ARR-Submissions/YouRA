main_hypothesis:
  id: H-FAIROutcomes-v1
  title: 'FAIR Compliance Predicts ML Dataset Research Longevity: A Multi-Repository Survival Analysis'
  statement: 'Under the conditions of public ML dataset repositories (OpenML post-2018 tabular cohort;

    HuggingFace vision/NLP datasets with card metadata), if a dataset has higher automated

    FAIR compliance scores (F-UJI sub-criteria >= 0.5 threshold for OpenML; documentation

    completeness proportion of filled card YAML fields for HuggingFace), then it will show

    significantly higher longitudinal research engagement (run accumulation trajectories on

    OpenML; Kaplan-Meier log-rank p < 0.05) and downstream model adoption (download counts

    and model card citations on HuggingFace; Spearman r > 0.15), because FAIR compliance

    reduces friction in dataset discovery, access, and integration.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: OpenML post-2018 tabular cohort + HuggingFace dataset hub
    model: Statistical analysis pipeline (Kaplan-Meier, Spearman, propensity matching, regression)
    optimizer: null
    hyperparameters:
      fair_threshold: 0.5
      significance_level: 0.05
      spearman_r_min_downloads: 0.15
      spearman_r_min_adoption: 0.1
      beta_reusable_min: 0.15
      cohort_start_date: '2018-01-01'
      min_matched_pairs: 500
      matching_variables:
      - creation_year_quartile
      - task_type
      - dataset_size_decile
