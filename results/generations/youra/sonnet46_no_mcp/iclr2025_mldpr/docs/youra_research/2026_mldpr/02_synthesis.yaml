hypothesis_draft:
  title: "FAIR Compliance Predicts ML Dataset Research Longevity: A Multi-Repository Survival Analysis"
  hypothesis_id: "H-FAIROutcomes-v1"
  core_claim: |
    FAIR compliance in ML datasets — measured by automated F-UJI sub-criteria scores (OpenML)
    and documentation completeness proportion (HuggingFace) — significantly predicts longitudinal
    research engagement (run accumulation trajectories) and downstream model adoption,
    independently of confounders, because FAIR compliance reduces friction in dataset
    discovery, access, and integration across the dataset's research lifetime.
  mechanism: |
    Step 1: High FAIR scores → reduced discovery friction (Findable: persistent IDs, rich metadata)
    Step 2: Reduced friction → higher first-use rate (Accessible: open license, standard format)
    Step 3: High Reusable scores → sustained research engagement (clear provenance, usage terms)
    Step 4: Sustained engagement → higher run counts, longer longevity, more downstream model adoptions
    The Reusable dimension is predicted to dominate, as ML researchers are primarily deterred
    by unclear provenance and license ambiguity — not discoverability.
  predictions:
    - P1: "Kaplan-Meier log-rank p < 0.05 for time-to-50-runs between high-FAIR (F-UJI ≥ 0.5) and low-FAIR matched pairs in post-2018 OpenML cohort"
    - P2: "Reusable F-UJI sub-criteria show largest regression coefficient (β > 0.15) predicting total OpenML run count"
    - P3: "HuggingFace documentation completeness correlates with downloads (Spearman r > 0.15) and model adoption (r > 0.10)"

variables_summary:
  independent: "FAIR compliance: F-UJI sub-criteria scores (0–1, OpenML); proportion of filled card YAML fields (0–1, HuggingFace)"
  dependent_primary: "Time-to-50-runs via Kaplan-Meier survival (OpenML); download count (HuggingFace)"
  controlled: "Dataset creation year quartile, task type, dataset size decile, data modality"

null_hypothesis:
  h0_statement: |
    There is no significant difference in run accumulation trajectories (Kaplan-Meier survival curves)
    between high-FAIR and low-FAIR matched OpenML dataset pairs in the post-2018 cohort, and no
    significant Spearman correlation between documentation completeness and download counts or
    downstream model adoption on HuggingFace, after controlling for dataset age, task type, and size.
  statistical_test: "Kaplan-Meier log-rank test (OpenML); Spearman rank correlation (HuggingFace); linear regression with sub-criteria features"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "Multi-repository survival analysis design with F-UJI sub-criteria disaggregation — first empirical study linking automated FAIR scores to ML dataset research longevity across OpenML and HuggingFace"
  differentiation_summary: |
    All prior FAIR literature is theoretical (Wilkinson 2016) or infrastructure-descriptive (Vanschoren 2019).
    No prior work has: (a) applied automated FAIR scoring to ML datasets at scale, (b) used survival
    analysis to model dataset research longevity, (c) disaggregated FAIR dimensions to identify which
    predict ML outcomes, or (d) compared FAIR effects across repository types (tabular vs vision/NLP).
    The cross-repository comparison tests whether FAIR effects are universal or repository-culture-specific.

clarity:
  overall_level: "HIGH"
  clarity_verified: true
  improvements_needed: []

experimental_scope:
  models:
    - "No ML model training — observational statistical analysis"
    - "Statistical methods: Kaplan-Meier, log-rank test, Spearman correlation, linear regression, propensity-score matching"
  datasets:
    - "OpenML post-2018 tabular cohort (~3,000-5,000 datasets, upload_date >= 2018-01-01)"
    - "HuggingFace dataset hub (all datasets with structured card YAML metadata)"
  baselines:
    - "Unadjusted FAIR-reuse correlation (unmatched; demonstrates confounding)"
    - "F-UJI aggregate score vs. sub-criteria disaggregation (demonstrates added value of disaggregation)"
    - "OpenML machine-computed qualities as IV (F-UJI instrument validity anchor)"

measurement_plan:
  data_collection:
    - source: "OpenML API: query datasets with upload_date >= 2018-01-01; extract dataset IDs, qualities, run counts, run timestamps, landing page URLs"
    - source: "F-UJI tool: apply to OpenML landing page URLs in parallel (asyncio); extract 17 sub-criteria scores per dataset"
    - source: "HuggingFace Hub API: enumerate dataset cards; extract YAML fields, download counts, creation dates, task_categories, license tags"
    - source: "HuggingFace model cards: search models with non-empty `datasets` field; count per-dataset model adoptions"
  procedure:
    - step: "1. Query OpenML cohort (upload_date >= 2018) and HuggingFace datasets with card YAML"
    - step: "2. Compute F-UJI sub-criteria scores on OpenML datasets (parallelized, rate-limited)"
    - step: "3. Compute documentation completeness score for HuggingFace datasets (proportion of filled YAML fields)"
    - step: "4. Validate F-UJI scores against OpenML qualities metrics (Spearman correlation diagnostic)"
    - step: "5. Diagnostic: test FAIR score × upload_date correlation to detect retroactive tagging"
    - step: "6. Propensity-score matching on creation year × task type × dataset size (OpenML); analogous matching for HuggingFace"
    - step: "7. Kaplan-Meier survival analysis on matched OpenML pairs (time-to-50-runs, log-rank test)"
    - step: "8. Linear regression of total run count on F-UJI sub-criteria (OpenML)"
    - step: "9. Spearman correlations between card completeness and DVs (HuggingFace)"
    - step: "10. Cross-repository effect size comparison (Cohen's d vs Spearman r meta-analysis)"
  success_criteria:
    - "P1 met: log-rank p < 0.05 for matched OpenML survival curves"
    - "P2 met: Reusable β > 0.15 and dominates over other FAIR dimensions"
    - "P3 met: r > 0.15 for HuggingFace downloads, r > 0.10 for model adoption"
    - "F-UJI validity confirmed: sub-criteria correlate with OpenML qualities (r > 0.10 for overlapping dimensions)"

validation:
  internal_validity:
    - "Propensity-score matching on creation year, task type, dataset size controls primary confounders"
    - "Post-2018 cohort restriction addresses left censoring from retroactive FAIR tagging"
    - "FAIR × upload_date correlation diagnostic detects residual retroactive tagging contamination"
    - "F-UJI sub-criteria validation against OpenML qualities confirms instrument reliability"
    - "Pre-registered thresholds (F-UJI ≥ 0.5, p < 0.05, β > 0.15, r > 0.15) prevent post-hoc interpretation"
  external_validity:
    - "Cross-repository comparison (OpenML tabular + HuggingFace vision/NLP) tests generalizability across modalities"
    - "Modality stratification within HuggingFace tests within-repository generalizability"
    - "Scope limitation explicitly acknowledged: findings pertain to OpenML/HuggingFace, not all ML repositories"
    - "Null results treated as equally valid and publishable — reduces publication bias concern"

discussion_synthesis:
  key_insights:
    - "Run counts (deliberate experimental engagement) are a stronger DV than download counts for OpenML — avoids scraping/course-project contamination"
    - "Survival analysis framing transforms static correlation into dynamic longevity measurement — more actionable for repository administrators"
    - "F-UJI sub-criteria disaggregation enables identification of which FAIR dimension to invest in — higher practical value than aggregate score"
    - "Cross-repository design tests whether FAIR effects are universal or repository-culture-specific — could reveal 'social infrastructure' as HuggingFace alternative"
    - "Pre-registering null results as equally publishable removes perverse incentive to over-interpret marginal effects"
  breakthrough_moments:
    - "Exchange 6 (Prof. Rex): Run counts as DV instead of download counts — eliminates noise from course projects and scraping"
    - "Exchange 7 (Dr. Nova): Survival analysis on run timestamps — transforms study from static snapshot to longitudinal longevity measurement"
    - "Exchange 8 (Prof. Vera): Left censoring threat identification — motivates post-2018 cohort restriction"
    - "Exchange 11 (Prof. Rex): F-UJI 0.5 threshold pre-commitment — avoids circular median-based thresholding"
    - "Exchange 12 (Dr. Nova): Multi-repository design — HuggingFace card completeness proxy enables cross-repository comparison"
  resolved_tensions:
    - "FAIR aggregate vs. sub-criteria: resolved by using sub-criteria as regression features (disaggregated analysis)"
    - "F-UJI validity for ML datasets: partially resolved by OpenML qualities cross-validation; Interoperability remains a concern"
    - "Causal vs. correlational claims: resolved by quasi-experimental matched design with explicit causal pathway assumptions"
    - "Scope breadth vs. feasibility: resolved by focusing on OpenML (primary) + HuggingFace (secondary) with explicit scope boundaries"
