# ============================================================================
# METHODOLOGY (From Phase 3 artifacts)
# ============================================================================

methodology:
  analysis_type: "Observational study — no ML model training"
  primary_iv: "Proxy Findable FAIR score (OpenML quality metrics)"
  primary_dv: "Time-to-first-run (TTFR) in days"
  matching_method: "1:1 nearest-neighbor propensity score matching"
  survival_methods: ["Kaplan-Meier", "Cox proportional hazards"]

  proxy_score_weights:
    f1_persistent_identifier: 0.25
    f2_metadata_richness: 0.50
    f3_search_indexed: 0.25

  matching_covariates:
    - "creation_year_quartile"
    - "task_type_encoded"
    - "size_decile"

  hyperparameters:
    caliper_smoke: 0.8
    caliper_production: 0.2
    min_matched_pairs_smoke: 30
    min_matched_pairs_production: 500
    observation_window_days: 730
    log_rank_alpha: 0.05
    cox_hr_gate: 1.2
    seed: 42

  libraries:
    - "lifelines==0.27.4"
    - "scikit-learn==1.2.0"
    - "openml==0.14.0"
    - "scipy==1.10.0"
    - "numpy==1.24.0"
    - "pandas==1.5.0"

  unit_tests:
    h_e1_passing: 29
    h_e1_total: 29
    h_m1_passing: 30
    h_m1_total: 30

