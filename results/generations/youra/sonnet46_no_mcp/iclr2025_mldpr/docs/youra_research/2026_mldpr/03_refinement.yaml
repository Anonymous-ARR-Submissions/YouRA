# ═══════════════════════════════════════════════════════════════
# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "FAIR principles are well-defined with 20,000+ citations (Wilkinson et al., 2016)"
      status: "BUILD_ON"
      evidence: "Foundational paper with massive citation count; framework widely adopted in scientific data communities"
    - claim: "OpenML Python API provides upload_date, run counts, and dataset qualities for all hosted datasets"
      status: "BUILD_ON"
      evidence: "OpenML is a public, stable API with documented endpoints for dataset metadata, run history, and quality metrics"
    - claim: "HuggingFace Hub API provides card YAML, download counts, and model card dataset fields"
      status: "BUILD_ON"
      evidence: "huggingface_hub Python library exposes full card YAML and usage statistics programmatically"
    - claim: "F-UJI tool is open-source and accepts landing page URLs for automated FAIR scoring"
      status: "BUILD_ON"
      evidence: "pangaea-data-publisher/fuji GitHub repository (~200 stars); validated for general scientific repositories"
    - claim: "No ML-specific large-scale FAIR-outcome empirical study exists"
      status: "PROVE_NEW"
      evidence: "Phase 1 literature review confirmed this gap; Wilkinson (2016) and Vanschoren (2019) do not provide ML outcome correlation"
    - claim: "FAIR compliance reduces friction in dataset discovery and reuse"
      status: "PROVE_NEW"
      evidence: "Theoretical claim from Wilkinson et al. (2016); not empirically validated for ML datasets at scale"
  scope_reduction_percentage: 67
  phase2b_4_instructions: |
    The first 4 established facts (FAIR framework, OpenML API, HuggingFace API, F-UJI tool) are
    BUILD_ON — Phase 2B should not re-verify these but treat them as confirmed infrastructure.
    The 2 PROVE_NEW claims (no prior study exists; FAIR reduces friction) are the core empirical
    contributions that Phase 2B experiments must demonstrate.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-FAIROutcomes-v1"
  confidence_level: 0.75
  core_hypothesis_statement: |
    Under the conditions of public ML dataset repositories (OpenML post-2018 tabular cohort;
    HuggingFace vision/NLP datasets with card metadata), if a dataset has higher automated
    FAIR compliance scores (F-UJI sub-criteria ≥ 0.5 threshold for OpenML; documentation
    completeness proportion of filled card YAML fields for HuggingFace), then it will show
    significantly higher longitudinal research engagement (run accumulation trajectories on
    OpenML; Kaplan-Meier log-rank p < 0.05) and downstream model adoption (download counts
    and model card citations on HuggingFace; Spearman r > 0.15), because FAIR compliance
    reduces friction in dataset discovery, access, and integration — making deliberate
    research engagement more likely and sustained across the dataset's lifetime.
  alternative_hypothesis_h0: |
    There is no significant difference in run accumulation trajectories (Kaplan-Meier survival
    curves) between high-FAIR (F-UJI ≥ 0.5) and low-FAIR (F-UJI < 0.5) matched OpenML
    dataset pairs in the post-2018 cohort, and no significant Spearman correlation between
    documentation completeness score and download counts or downstream model adoption on
    HuggingFace, after controlling for dataset age, task type, and size.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "FAIR compliance score (OpenML)"
      type: "continuous"
      operationalization: "F-UJI sub-criteria scores (0–1 per dimension) across Findable, Accessible, Interoperable, Reusable dimensions; binary classification at 0.5 threshold for matched pairs analysis"
    - name: "Documentation completeness score (HuggingFace)"
      type: "continuous"
      operationalization: "Proportion of filled metadata fields in HuggingFace dataset card YAML front-matter (0.0–1.0); extracted programmatically via huggingface_hub library"
  dependent:
    - name: "Time-to-50-runs (OpenML)"
      type: "continuous"
      operationalization: "Days from dataset upload_date to 50th experimental run on OpenML; Kaplan-Meier survival outcome; right-censored for datasets not yet reaching 50 runs"
      primary: true
    - name: "Total run count (OpenML)"
      type: "continuous"
      operationalization: "Total number of experimental runs on OpenML task(s) associated with dataset; from OpenML runs API"
      primary: false
    - name: "Download count (HuggingFace)"
      type: "continuous"
      operationalization: "Total download count from HuggingFace Hub API dataset metadata; log-transformed for regression"
      primary: true
    - name: "Downstream model adoption (HuggingFace)"
      type: "continuous"
      operationalization: "Count of HuggingFace model cards listing dataset in `datasets` YAML field; extracted via model card search API"
      primary: false
  controlled:
    - name: "Dataset creation year quartile"
      operationalization: "Year of upload_date (OpenML) or creation_date (HuggingFace) binned into quartiles; matched 1:1 in propensity score matching"
    - name: "Task type"
      operationalization: "OpenML: classification/regression/clustering/other from task type field; HuggingFace: task_categories tag; matched within same task type category"
    - name: "Dataset size decile"
      operationalization: "Number of instances × features (OpenML qualities API); file size in GB (HuggingFace); binned into deciles for matching"
    - name: "Data modality"
      operationalization: "OpenML: tabular (default); HuggingFace: image/text/audio/multimodal from dataset tags; used as stratification variable"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "FAIR compliance → reduced discovery friction (Findable dimension)"
      evidence: "Persistent identifiers (DOIs), rich metadata, and standardized schemas improve repository search ranking and dataset discoverability; Wilkinson et al. (2016) theoretical basis"
      falsifier: "If FAIR scores do not correlate with time-to-first-run (discovery proxy), this step fails"
    - step: 2
      description: "Reduced discovery friction → increased first-use rate (Accessible dimension)"
      evidence: "Open licenses, standard file formats, and documented access procedures lower the barrier to initial dataset download and experimental use"
      falsifier: "If Accessible sub-criteria have near-zero coefficients in regression on run counts, this step fails"
    - step: 3
      description: "Increased first-use rate + high Reusable scores → sustained research engagement"
      evidence: "Clear provenance, usage terms, and citation guidance enable researchers to confidently build on the dataset across multiple publications"
      falsifier: "If Reusable sub-criteria coefficient β < 0.15 in run count regression, this step fails; predicted to be the strongest predictor"
    - step: 4
      description: "Sustained engagement → higher run counts, longer research longevity, and more downstream model adoptions"
      evidence: "Cumulative effect of steps 1-3: datasets that are easy to find, access, and reuse accumulate experimental runs over time and are adopted as training/evaluation data in downstream models"
      falsifier: "If survival analysis shows no log-rank difference (p ≥ 0.05) in time-to-50-runs between matched high/low FAIR pairs, this step fails"
  key_tension: "Retroactive FAIR tagging (high-reuse datasets may be tagged FAIR after achieving reuse) could reverse the causal arrow. Addressed by post-2018 cohort restriction and FAIR-score × creation-date correlation diagnostic."
  evidence_summary: |
    The causal chain is grounded in the FAIR theoretical framework (Wilkinson et al., 2016)
    and motivated by analogous findings in scientific data repositories (F-UJI validation studies
    showing FAIR-compliant datasets receive more downloads in general science). The ML-specific
    empirical test is the novel contribution. The Reusable dimension is predicted to dominate
    based on the specific friction point in ML research: researchers are deterred from reusing
    datasets by unclear provenance and license ambiguity, not primarily by discoverability.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "FAIR metadata in OpenML post-2018 was predominantly set at publication time, not retroactively"
    supporting_evidence: "Post-2018 datasets were uploaded after FAIR became standard practice in ML; retroactive tagging is more likely for pre-2016 datasets"
    consequence_if_violated: "Left censoring contaminates causal ordering; FAIR compliance would reflect achieved reuse rather than predict it; mitigation: add FAIR tagging date as covariate"
  - id: "A2"
    assumption: "OpenML run counts reflect deliberate research engagement rather than automated pipeline activity"
    supporting_evidence: "OpenML runs require specifying algorithm, hyperparameters, and uploading results — higher effort than simple downloads; reduces automated scraping contamination"
    consequence_if_violated: "DV is inflated by pipeline runs; mitigation: filter runs by unique user IDs and non-trivial algorithm variety"
  - id: "A3"
    assumption: "F-UJI sub-criteria scores are sufficiently reliable for ML datasets on OpenML"
    supporting_evidence: "F-UJI validated on Zenodo, Pangaea; sub-criteria for Findable (DOI, metadata richness) and Reusable (license, citation) transfer well to OpenML; Interoperability sub-criteria may be less reliable"
    consequence_if_violated: "IV measurement error attenuates effect estimates; mitigation: validate F-UJI scores against OpenML machine-computed qualities metrics (available via qualities API)"
  - id: "A4"
    assumption: "HuggingFace card completeness (proportion of filled YAML fields) is a valid proxy for FAIR compliance"
    supporting_evidence: "HuggingFace card fields map to FAIR dimensions: license (Reusable), task_categories (Findable), language/size_categories (Accessible), citation (Reusable); completeness proxy is continuous and sensitive"
    consequence_if_violated: "HuggingFace IV is a noisy FAIR proxy; could produce null results due to measurement error rather than true null effect; acknowledged as study limitation"
  - id: "A5"
    assumption: "Propensity matching on creation year × task type × dataset size adequately controls for the most important confounders"
    supporting_evidence: "These three variables capture the primary alternative explanations (older datasets have more time to accumulate runs; larger/more prominent datasets more likely to be FAIRified and reused)"
    consequence_if_violated: "Residual confounding from unmeasured variables (institution prestige, dataset marketing/promotion); acknowledged limitation; addressed by sensitivity analysis with additional covariates"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - OpenML datasets uploaded post-2018 with sufficient run history (tabular/structured data:
      classification, regression, clustering tasks)
    - HuggingFace datasets with structured card metadata (any modality with card YAML)
    - FAIR compliance as measured by automated scoring (F-UJI for OpenML; card completeness for HuggingFace)
    - Research engagement outcomes observable from public repository APIs without new data collection
  does_not_apply_to: |
    - Proprietary or non-public ML datasets (no API access)
    - Pretraining corpora for foundation models without structured dataset cards
    - Datasets not hosted on OpenML or HuggingFace
    - Causal claims beyond observational association (quasi-experimental design, not RCT)
    - Human-evaluated dataset quality dimensions not captured by automated FAIR scoring
  known_limitations: |
    - OpenML overrepresents tabular/structured data; findings may not generalize to vision/NLP
    - HuggingFace downstream model adoption DV is sparse for datasets uploaded before 2020
    - F-UJI Interoperability sub-criteria may produce artifactually low scores for ML datasets
      due to schema mismatch with general scientific data standards (Dublin Core, DataCite)
    - Propensity matching eliminates all unmatched observations, potentially reducing sample size
    - Study scope limited to two repositories; Kaggle, UCI, and domain-specific repositories excluded

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "High-FAIR (F-UJI ≥ 0.5) datasets show significantly faster run accumulation than low-FAIR datasets in matched post-2018 OpenML cohort"
    test_method: "Kaplan-Meier survival curves for time-to-50-runs; log-rank test on matched pairs"
    success_criterion: "Log-rank p < 0.05; high-FAIR median time-to-50-runs < low-FAIR median"
    falsification: "Log-rank p ≥ 0.05 or high-FAIR median time-to-50-runs ≥ low-FAIR median"
  - id: "P2"
    primary: false
    statement: "Among F-UJI sub-criteria, the 'Reusable' dimension shows the largest positive regression coefficient predicting total OpenML run count"
    test_method: "Linear regression of total run count on F-UJI sub-criteria scores (17 features); compare standardized coefficients across FAIR dimensions"
    success_criterion: "Reusable sub-criteria standardized β > 0.15 and larger than Findable, Accessible, Interoperable coefficients"
    falsification: "Reusable β ≤ 0.15 or another dimension shows larger coefficient"
  - id: "P3"
    primary: false
    statement: "HuggingFace documentation completeness score correlates positively with download count and downstream model adoption"
    test_method: "Spearman rank correlation between card completeness score and (a) total download count, (b) count of downstream model cards citing dataset; controlling for dataset age and modality"
    success_criterion: "Spearman r > 0.15 for downloads (p < 0.05); r > 0.10 for model adoption (p < 0.05)"
    falsification: "r ≤ 0.15 for downloads or r ≤ 0.10 for model adoption after age/modality control"

