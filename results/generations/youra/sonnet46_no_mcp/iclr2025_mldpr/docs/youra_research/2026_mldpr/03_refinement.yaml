experimental_setup:
  dataset:
    name: "OpenML post-2018 tabular cohort + HuggingFace dataset hub"
    type: "standard"
    source: "OpenML Python API (openml.org); HuggingFace Hub API (huggingface.co)"
    path: "Accessed programmatically via openml-python and huggingface_hub libraries"
    hypothesis_fit: "OpenML provides structured run history, upload dates, and machine-computed qualities enabling survival analysis on research engagement trajectories. HuggingFace provides card YAML and download statistics enabling documentation completeness scoring and adoption measurement. Together they span tabular and vision/NLP modalities for cross-repository comparison."
  model:
    name: "Statistical analysis pipeline (no ML model training)"
    type: "Observational study: Kaplan-Meier survival analysis + propensity-score matching + Spearman correlation + linear regression"
    source: "scipy, lifelines, sklearn (MatchIt equivalent), pandas"
    hypothesis_fit: "Hypothesis concerns observational prediction of research outcomes from FAIR scores — statistical methods are appropriate; no ML model training required or appropriate"
  baselines:
    - name: "Unadjusted correlation (no propensity matching)"
      method: "Pearson/Spearman correlation between raw FAIR scores and outcomes without matching; demonstrates confounding effect"
    - name: "F-UJI aggregate score vs. sub-criteria disaggregation"
      method: "Compare predictive power of aggregate F-UJI score vs. individual sub-criteria in regression; demonstrates added value of disaggregation"
    - name: "OpenML machine-computed qualities as IV"
      method: "Replace F-UJI scores with OpenML's own quality metrics as IV; serves as F-UJI instrument validity anchor"

