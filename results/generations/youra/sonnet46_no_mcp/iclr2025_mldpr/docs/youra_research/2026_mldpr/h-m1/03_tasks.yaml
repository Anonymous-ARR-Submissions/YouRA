        -> DataFrame[covariate, smd_before, smd_after]
      SMD formula: |mean_treated - mean_control| / sqrt((var_treated + var_control) / 2)
      Implement run_matching(survival_df, cfg, caliper_factor=None, ratio=1)
        -> (matched_df, smd_df, matching_meta dict)
      Orchestrate: fit PS → match → compute SMD → validate SMD < 0.1
