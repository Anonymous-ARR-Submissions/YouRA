  - id: "task-018"
    epic: "A-5"
    title: "L-5-2: nearest_neighbor_match — 1:N NN matching with caliper constraint"
    description: |
      Implement nearest_neighbor_match(survival_df, ps_scores, treatment_col, caliper, ratio=1)
        -> matched_df with pair_id column
      Algorithm:
        1. Compute logit_ps = log(ps/(1-ps))
        2. Separate treated (high_findable=1) and control (high_findable=0) units
        3. For each treated unit: find nearest control by |logit_ps_i - logit_ps_j| <= caliper
        4. 1:ratio matching (default 1:1); mark matched pair_id
        5. Exclude unmatched units
      Returns DataFrame where len = 2 * n_matched_pairs
      Source: 03_logic.md#Subtask-L-5-2
    feature_tag: "model"
    priority: 45
    source_document: "03_logic.md"
    complexity: 15
    test_requirements: |
