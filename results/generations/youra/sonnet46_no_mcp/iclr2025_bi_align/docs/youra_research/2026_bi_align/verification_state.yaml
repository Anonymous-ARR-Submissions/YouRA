main_hypothesis:
  id: H-AAI-v1
  title: 'Human→AI Annotation Drift: Measuring Directional Stylistic Adaptation in RLHF Preference Datasets via the Alignment
    Asymmetry Index'
  statement: 'Under conditions of repeated RLHF annotation exposure (HH-RLHF 3-round structure;

    WebGPT longitudinal sessions), if human annotators have cumulative exposure to

    AI-generated text across annotation rounds, then their preference labels will exhibit

    directional stylistic drift toward AI-typical features (increased weight on verbosity,

    structured reasoning, hedging — measured via the Alignment Asymmetry Index AAI),

    because automation bias induces annotators to internalize AI stylistic norms as quality

    heuristics, particularly under high-ambiguity prompts where annotation uncertainty is greatest.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: Anthropic HH-RLHF (~169K comparisons) + OpenAI WebGPT Comparisons
    model: HuggingFace TRL RewardTrainer (GPT-2 or LLaMA-7B base)
    optimizer: TRL PPO (RLHF fine-tuning)
    hyperparameters:
      quality_covariate: Q_early (logistic regression on round-1, affine recalibration)
      embedding_encoder: all-MiniLM-L6-v2 (frozen, static)
      evaluation_harness: EleutherAI lm-evaluation-harness
      benchmarks:
      - TruthfulQA (817 MC1 questions)
      - BIG-Bench Hard (6511 questions)
