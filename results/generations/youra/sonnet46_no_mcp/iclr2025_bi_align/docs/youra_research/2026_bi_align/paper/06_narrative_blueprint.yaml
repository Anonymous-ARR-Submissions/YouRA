# Narrative Blueprint for Phase 6 Paper Writing
# Paper: Human→AI Annotation Drift via the Alignment Asymmetry Index
# Generated: 2026-05-03T12:05:00Z
# Strategy: Narrative-First (v2.0)

metadata:
  paper_title: "Human→AI Annotation Drift: Measuring Directional Stylistic Adaptation in RLHF Preference Datasets"
  short_title: "Annotation Drift in RLHF"
  hypothesis_id: "H-AAI-v1"
  format: "ICML2025"
  generated_at: "2026-05-03T12:05:00Z"

# ============================================================================
# HOOK DESIGN
# ============================================================================

hook:
  strategy: "counterintuitive_reversal"
  rationale: >
    The RLHF pipeline is supposed to align AI to human preferences. But our data
    shows the annotators themselves shifted their preferences toward AI-typical
    style over annotation rounds. The aligner was being aligned.

  opening_statement:
    content: >
      We trained reward models to make AI systems more helpful and honest —
      but the annotators providing the preference signal appear to have
      progressively adapted their own preferences toward the AI text they
      were evaluating. The verbosity preference of annotators flipped sign:
      early-round annotators penalized verbose responses (β_L = −0.025),
      while later-round annotators rewarded them (β_L = +0.056) — a
      non-overlapping bootstrap confidence interval shift of Δ = +0.080.
    strategy: "counterintuitive_reversal"

  why_reader_should_care:
    main_reason: >
      RLHF's validity rests on the assumption that human preferences are
      stable signals of quality. If annotators systematically adapt toward
      the stylistic profile of the AI text they evaluate, the "ground truth"
      signal used to train reward models is itself corrupted over time.
    concrete_example: >
      The HH-RLHF dataset — used to align some of the most widely deployed
      conversational AI systems — shows this verbosity sign reversal across
      its three annotation rounds (160,800 preference comparisons).
    stakes: >
      Reward models trained on drift-contaminated labels may propagate
      stylistic preferences (verbosity, hedging, structured formatting)
      rather than genuine semantic quality — a form of alignment misspecification
      that accumulates invisibly as annotation proceeds.

# ============================================================================
# PROBLEM FRAMING (Three Levels)
# ============================================================================

problem_framing:
  surface_problem:
    description: >
      RLHF annotation relies on human preference labels as a proxy for
      response quality. Reward misspecification — where reward models learn
      to optimize proxies rather than true quality — is a known failure mode.
    common_understanding: >
      Prior work (Pan et al. 2022, Coste et al. 2023) documents that reward
      overoptimization degrades downstream benchmarks. The assumed cause is
      the limited expressiveness of scalar rewards, not the stability of the
      annotation signal itself.

  deeper_problem:
    description: >
      The annotation signal itself may be directionally non-stationary:
      human annotators exposed repeatedly to AI-generated text may
      internalize AI stylistic norms as quality heuristics, causing
      their preference labels to drift toward AI-typical features over
      annotation rounds.
    why_overlooked: >
      Prior work treats annotator preferences as static. The temporal
      structure of multi-round annotation datasets (HH-RLHF, WebGPT) has
      not been analyzed for annotator-level stylistic adaptation.
    our_perspective: >
      Automation bias — the well-documented tendency of humans to
      over-rely on automated systems under uncertainty — provides a
      mechanistic account: annotators use AI-typical stylistic features
      as implicit quality heuristics when semantic quality judgment is
      ambiguous.

  gap_in_existing_work:
    description: >
      No prior study has computationally measured directional stylistic
      drift in RLHF preference datasets at coefficient resolution, nor
      proposed an instrument (the Alignment Asymmetry Index, AAI) to
      monitor annotation-level Human→AI adaptation.
    why_gap_exists: >
      Existing work focuses on downstream model behavior (overoptimization,
      benchmark degradation) rather than tracing the problem to its source
      in the annotation pipeline. Dataset documentation (Bai et al. 2022,
      Stiennon et al. 2020) describes annotation phases as sequential but
      does not analyze annotator preference evolution across phases.
    why_gap_matters: >
      Without a measurement instrument for annotation drift, RLHF
      practitioners cannot detect when their training signal has been
      contaminated by annotator adaptation — making drift-aware dataset
      curation and quality auditing impossible.

# ============================================================================
# KEY INSIGHT
# ============================================================================

key_insight:
  aha_moment:
    one_sentence: >
      Verbosity preference — the single most perceptually salient stylistic
      feature of AI-generated text — reverses direction across annotation
      strata, with annotators shifting from penalizing to rewarding longer
      responses as annotation proceeds.
    expanded_explanation: >
      Early-round annotators in HH-RLHF assign a negative coefficient to
      verbosity (β_L = −0.025, CI [−0.043, −0.006]), penalizing longer
      responses. Later-round annotators assign a positive coefficient
      (β_L = +0.056, CI [+0.043, +0.068]), rewarding them — tracking the
      verbose stylistic profile of the AI text they were exposed to.
      This reversal is specific to the AI-typicality direction in embedding
      space (geometric projection β_exposure = 0.041, p = 2.05×10⁻⁵;
      placebo p = 0.48), confirming discriminant validity.

  why_others_missed_it:
    common_assumptions: >
      Prior work assumes annotator preferences are stable within a dataset.
      Temporal metadata (annotation timestamps, worker IDs) is rarely
      analyzed; HH-RLHF's sequential annotation phases are treated as a
      single homogeneous pool.
    our_different_view: >
      We treat annotation rounds as temporal strata and ask whether the
      preference signal changes direction — not just magnitude — across
      strata. This reframes annotation quality as a time-series problem
      rather than a static calibration problem.
    enabling_factor: >
      The combination of logistic regression coefficient comparison with
      bootstrap confidence interval non-overlap testing provides a
      statistically precise instrument for detecting directional shifts
      without requiring individual annotator timestamps.

  what_makes_it_work:
    intuitive_explanation: >
      Annotators who have seen thousands of AI responses begin to treat
      AI-typical features — especially verbosity — as signals of quality,
      even when those features are orthogonal to actual semantic quality.
      We can detect this by asking: does the weight annotators assign to
      verbosity change sign across annotation phases?
    key_mechanism: >
      Round-stratified logistic regression with a frozen Q_early quality
      covariate decomposes preference into a quality component (β_Q) and
      stylistic components (β_L, β_H, β_S). The stylistic residuals,
      especially β_L, shift directionally across rounds even after
      controlling for semantic quality — isolating style adaptation from
      rational quality updating.

# ============================================================================
# EVIDENCE NARRATIVE
# ============================================================================

evidence_narrative:
  main_claim:
    statement: >
      RLHF preference datasets contain a detectable, directional shift in
      verbosity preference weighting (Δβ_L = +0.080) across annotation strata,
      with an AI-typicality geometric projection that is statistically significant
      (p = 2.05×10⁻⁵) and discriminant-valid (placebo p = 0.48).
    measurable_criteria:
      - "β_L sign reversal with non-overlapping 95% bootstrap CIs (h-m2)"
      - "AI-typicality projection β_exposure > 0, p < 0.05 (h-m1)"
      - "Placebo permutation p > 0.05 (h-m1 discriminant validity)"
      - "All three stylistic feature deltas positive — sign_consistent=true (h-m2)"

  supporting_evidence:
    - id: "evidence_1"
      what: "β_L coefficient reversal: early [−0.043, −0.006] → late [+0.043, +0.068], Δ=+0.080"
      so_what: >
        Annotators changed from penalizing verbosity to rewarding it —
        a direction-level shift, not merely a magnitude shift.
      how_it_supports_claim: "Primary quantitative evidence for stylistic drift (h-m2)"
      figure: "fig_1 (fig1_coefficient_comparison.png)"

    - id: "evidence_2"
      what: "AI-typicality projection β_exposure=0.041, p=2.05e-05; tercile F=82.92, p≈1.4e-36"
      so_what: >
        The annotation preference gradient is aligned with the AI-typicality
        direction in embedding space — not random stylistic variation.
      how_it_supports_claim: "Geometric projection confirms AI-specific adaptation direction (h-m1)"
      figure: "fig_4 (dose_response.png), fig_5 (discriminant_validity.png)"

    - id: "evidence_3"
      what: "Discriminant validity: placebo permutation test p=0.48 vs. observed p=2.05e-05"
      so_what: >
        The signal is specific to the AI-typicality vector, not a general
        artifact of the embedding space.
      how_it_supports_claim: "Rules out spurious projection results (h-m1)"
      figure: "fig_6 (placebo_permutation.png)"

    - id: "evidence_4"
      what: "sign_consistent=true across all three features (β_L Δ=+0.080, β_H Δ=+0.021, β_S Δ=+0.012)"
      so_what: >
        Even features that don't meet the CI non-overlap threshold all trend
        in the same direction — consistent with a systematic, not random, shift.
      how_it_supports_claim: "Directional consistency across all AAI components (h-m2)"
      figure: "fig_3 (fig3_feature_stability_rounds.png)"

    - id: "evidence_5"
      what: "Null result: interaction p=1.0 (h-e1), worker_id absent (WebGPT), topic imbalance p=4e-275"
      so_what: >
        The null results are informative — they specify the minimum data
        requirements for confirming individual annotator-level causal adaptation.
      how_it_supports_claim: "Methodological contribution: data requirements for drift detection"
      figure: "fig_9 (fig5_topic_balance.png)"

  surprising_findings:
    - finding: >
        Verbosity is the sole dominant stylistic drift signal — hedging and
        structured reasoning trend positive but fail the CI non-overlap criterion.
      why_surprising: >
        Phase 2A assigned equal theoretical weight to all three AAI components.
        All three experiments (h-e1, h-m1, h-m2) converge on verbosity as the
        primary adaptation channel.
      our_interpretation: >
        Verbosity is the most perceptually salient feature of AI-generated text;
        annotators adapt to it first and most strongly. Statistical power is
        insufficient for β_H and β_S under the available index-based round proxy.

    - finding: >
        The interaction model (round × ambiguity) returned p=1.0 — the predicted
        moderation effect of annotation ambiguity is untestable with HH-RLHF.
      why_surprising: >
        Ambiguity moderation was the core theoretical prediction (P1) from Phase 2A.
      our_interpretation: >
        HH-RLHF lacks per-prompt disagreement labels; the test was architecturally
        impossible with available metadata. This is a data limitation, not
        evidence against the automation bias mechanism.

# ============================================================================
# BROADER IMPACT / TAKEAWAY
# ============================================================================

takeaway:
  main_contribution:
    one_sentence: >
      We provide the first computational evidence that RLHF preference annotation
      exhibits directional stylistic drift toward AI-typical features, and propose
      the Alignment Asymmetry Index (AAI) as an instrument for monitoring it.
    why_significant: >
      This finding challenges the assumption of static human preferences in RLHF
      and provides a practical measurement framework for annotation quality auditing.

  implications:
    for_field: >
      Dataset curators should treat multi-round RLHF annotation as a time-series
      and audit preference signal stationarity before training reward models.
      The AAI framework is directly applicable to any RLHF dataset with
      temporal structure.
    for_practice: >
      RLHF practitioners can use round-stratified coefficient comparison (with
      bootstrap CI non-overlap testing) as a low-cost quality gate: if β_L
      changes sign across rounds, annotation drift may be confounding the
      reward model training signal.

  future_possibilities:
    immediate_extensions: >
      Complete H-M3 and H-M4: test whether verbosity upweighting in later-round
      labels propagates to reward model style scoring and downstream benchmark
      accuracy (TruthfulQA, BIG-Bench Hard). Requires ~4-8 GPU hours.
    longer_term_vision: >
      Purpose-built annotation experiments with genuine within-annotator
      tracking (Prolific/MTurk, ≥3 sessions per worker) to confirm the
      individual-level causal adaptation claim and test ambiguity moderation.

# ============================================================================
# SECTION-LEVEL NARRATIVE GOALS
# ============================================================================

section_goals:
  abstract:
    narrative_purpose: >
      Compress the full story: RLHF ground truth may drift as annotators adapt
      to AI style; we measure this drift in HH-RLHF via the AAI; verbosity
      preference reverses; implications for annotation quality.
    key_message: >
      The human preference signal in RLHF may systematically adapt toward AI
      style as annotation proceeds — and we can measure it.

  introduction:
    narrative_purpose: "Hook (reversal) → Problem (non-stationary annotation) → Insight (verbosity sign flip) → Contributions"
    hook_strategy: "counterintuitive_reversal"
    opening_approach: >
      Open with the verbosity sign flip as a concrete empirical fact, then
      zoom out to the broader implication for RLHF validity.
    transition_to_related: >
      After establishing the gap, transition via: 'Despite extensive work on
      reward misspecification and annotation variance, the temporal stability
      of human preferences in multi-round RLHF annotation has not been studied.'

  related_work:
    narrative_purpose: >
      Show that prior work addresses downstream symptoms (overoptimization,
      evaluation bias) but not the upstream annotation drift source.
    positioning_strategy: >
      Position along three axes: (1) reward misspecification literature
      (Pan, Coste) — they study the degradation but not the source;
      (2) LLM-as-judge adaptation (Thakur 2024) — we extend to annotators
      in training pipelines; (3) automation bias (Skitka et al.) — we
      operationalize theoretically grounded mechanism in RLHF context.
    key_comparison_points:
      - "Reward misspecification / overoptimization (Pan 2022, Coste 2023)"
      - "LLM-as-judge and evaluation adaptation (Thakur 2024)"
      - "RLHF annotation dynamics (Bai 2022, Stiennon 2020, Christiano 2017)"
      - "Automation bias theory (Skitka et al.)"

  methodology:
    narrative_purpose: >
      Show WHY the design (round-stratified coefficient comparison + geometric
      projection) follows from the insight (detecting directional shift in
      stylistic preference weighting).
    connection_to_insight: >
      The key insight is that drift is detectable as a sign change in
      stylistic coefficients. The methodology directly operationalizes this:
      freeze Q_early quality control, compute β_L/β_H/β_S per round stratum,
      test CI non-overlap.
    key_design_decisions:
      - "Q_early quality covariate: isolates stylistic from quality adaptation"
      - "Bootstrap CI non-overlap (2000 resamples): detects direction-level shifts"
      - "AI-typicality geometric projection + placebo: measures vector-specific adaptation"
      - "Shared StandardScaler across rounds: ensures coefficient comparability"

  experiments:
    narrative_purpose: >
      Map experimental questions directly to claims from Introduction.
    experimental_questions:
      - "RQ1: Do stylistic preference coefficients shift directionally across HH-RLHF annotation strata? (tests main claim)"
      - "RQ2: Is the annotation preference gradient aligned with the AI-typicality direction in embedding space? (tests mechanism)"
      - "RQ3: What minimum data requirements are needed to confirm individual annotator causal adaptation? (derives from null results)"

  results:
    narrative_purpose: >
      Lead with the verbosity sign reversal (most striking), support with
      geometric projection, characterize the broader directional consistency,
      and present null results as methodological contribution.
    main_result_highlight: >
      "Verbosity preference reversal: β_L transitions from −0.025 to +0.056
      with non-overlapping 95% bootstrap CIs (Δ=+0.080) across annotation strata."

  discussion:
    narrative_purpose: >
      Interpret findings within automation bias theory, acknowledge data
      limitations honestly, and frame null results as forward-looking
      data standards specification.
    honest_limitations:
      - "HH-RLHF lacks genuine temporal metadata — round stratification is a population-level proxy"
      - "WebGPT within-annotator design collapsed to between-group due to absent worker IDs"
      - "AAI composite only 2/3 components tested — behavioral divergence pending"
      - "Extreme topic imbalance (p=4e-275) may confound β_H and β_S"

  conclusion:
    narrative_purpose: >
      Return to the opening hook: the alignment pipeline that aligns AI to humans
      may also align humans to AI. Summarize contributions. Open with the
      AAI framework as a practical monitoring tool for RLHF practitioners.
    callback_to_hook: >
      "We began by noting that RLHF annotators appear to have been progressively
      aligned toward the AI they were supposed to be evaluating. Our experiments
      provide the first computational evidence for this direction of adaptation..."

