  - id: "task-002"
    epic: "A-4: AI-Typicality Projection"
    title: "Implement projection.py — AI-typicality vector and projection scores"
    description: |
      Implement h-m1/code/projection.py with:
      - build_ai_typicality_vector(encoder, ai_texts, human_texts) -> np.ndarray (384,)
        Centroid difference: mean(ai_embs) - mean(human_embs), L2-normalized
      - compute_raw_projection(embeddings, ai_typicality_vec) -> np.ndarray (N,)
        Dot product of (N,384) embeddings with (384,) unit vector
      - partial_out_q_early(raw_proj, q_early_scores) -> np.ndarray (N,)
        OLS regression raw_proj ~ q_early_scores; return residuals
      - zscore_projection(residuals) -> np.ndarray (N,)
        Standardize to mean=0, std=1
      - build_topic_axis_vector(encoder, prompt_texts, n_components=1) -> np.ndarray (384,)
        PCA first PC of (N_prompts, 384) prompt embeddings; L2-normalize
      - placebo_permute_vector(encoder, ai_texts, human_texts, n_permutations=1000, seed=42) -> np.ndarray (1000, 384)
        Permute AI/human labels; compute centroid difference for each permutation
    feature_tag: "model"
    priority: 93
    source_document: "03_architecture.md"
    complexity: 16
