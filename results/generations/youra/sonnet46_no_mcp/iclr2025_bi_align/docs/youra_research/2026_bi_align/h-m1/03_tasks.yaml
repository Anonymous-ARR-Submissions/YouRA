      - InteractionResult dataclass: interaction_coef, interaction_p, high_ambiguity_beta,
        low_ambiguity_beta, discriminant_valid, placebo_p, summary
      - run_ambiguity_modulation_test(hh_df, proj_scores_z, q_early_model, feature_matrix_fn) -> InteractionResult
        statsmodels Logit: proj_score_z ~ C(round) + high_ambiguity + C(round):high_ambiguity + Q_early
        high_ambiguity = |score_0 - score_1| < AMBIGUITY_KAPPA_THRESHOLD
        Extract interaction_coef and interaction_p
      - run_discriminant_validity(stylistic_panel_result, topic_panel_result) -> bool
        Returns True if stylistic.beta_exposure > topic.beta_exposure
      - run_projection_placebo(null_vectors, embeddings, observed_proj_scores) -> float
        For each null vector: compute mean projection score
        Return empirical p-value = proportion(null_means >= observed_mean)
      - check_monotonicity_hh(round_proj_means: dict) -> bool
        Returns True if round_proj_means[1] < [2] < [3]
