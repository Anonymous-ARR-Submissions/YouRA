      - PanelResult dataclass: beta_exposure, p_value, ci_lower, ci_upper,
        effect_size_per_1k, n_workers, n_obs, model_type, summary
      - run_panel_ols(panel_df, outcome_col, exposure_col, entity_col, time_col) -> PanelResult
        panel_df MultiIndex (worker_id, session_order)
        PanelOLS.from_formula("proj_score_z ~ cumulative_tokens_k + EntityEffects")
        cov_type="clustered", cluster_entity=True
        Fall back to run_lsdv_fallback on ImportError
      - run_lsdv_fallback(panel_df, outcome_col, exposure_col, entity_col) -> PanelResult
        statsmodels OLS with C(worker_id) dummy variables
      - between_worker_tercile_comparison(panel_df, outcome_col, exposure_col) -> dict
        Split workers into 3 terciles by total cumulative_tokens_k
        Return: {tercile_means: [low, mid, high], f_stat, p_value}
      - bootstrap_beta_ci(panel_df, n_iter=1000, seed=42) -> tuple[float, float]
        Resample workers with replacement; refit PanelOLS; return (ci_2.5%, ci_97.5%)
    feature_tag: "model"
    priority: 90
    source_document: "03_architecture.md"
    complexity: 17
