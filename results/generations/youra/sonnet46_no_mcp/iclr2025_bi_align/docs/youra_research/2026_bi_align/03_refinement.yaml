novelty:
  preserved_novelty: "First empirical measurement of Human→AI stylistic adaptation in real RLHF annotation datasets using existing open data. First signed, directional alignment asymmetry instrument (AAI) validated against objective benchmarks without human evaluation."
  key_innovation: "The Alignment Asymmetry Index (AAI) — a composite monitoring instrument triangulating three independent signals (coefficient drift, geometric projection, behavioral divergence) that provides a scalar, pre-registerable, fully automated measure of Human→AI preference adaptation in RLHF annotation pipelines."
  differentiation:
    - prior_work: "Thakur et al. 2024 (Judging the Judges)"
      difference: "Thakur measures judge adaptation in evaluation settings; this work measures annotator adaptation in training data collection, directly linking it to reward model corruption and downstream benchmark degradation"
    - prior_work: "Coste et al. 2023 (Reward Model Ensembles)"
      difference: "Coste addresses annotation variance globally; this work isolates temporal drift specifically as a directional, exposure-dependent process with a causal mechanism"
    - prior_work: "Pan et al. 2022 (Reward Misspecification)"
      difference: "Pan maps reward errors to benchmark degradation without identifying temporal annotation drift as a source; this work fills that specific gap with a measured causal pathway"
    - prior_work: "Christiano et al. 2017 (RLHF)"
      difference: "Christiano assumes static human preferences; this work provides the first empirical test of whether that assumption holds in practice across annotation rounds"

