# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-AAI-v1"
  confidence_level: 0.72
  core_hypothesis_statement: |
    Under conditions of repeated RLHF annotation exposure (HH-RLHF 3-round structure; WebGPT longitudinal sessions),
    if human annotators have cumulative exposure to AI-generated text across annotation rounds,
    then their preference labels will exhibit directional stylistic drift toward AI-typical features
    (increased weight on verbosity, structured reasoning, hedging — measured via the Alignment Asymmetry Index AAI),
    because automation bias induces annotators to internalize AI stylistic norms as quality heuristics,
    particularly under high-ambiguity prompts where annotation uncertainty is greatest.
  alternative_hypothesis_h0: |
    After conditioning on prompt features, model checkpoint version, and affine-recalibrated early-round
    quality surrogate (Q_early), stylistic preference coefficients (β_L, β_H, β_S) do not change
    directionally across annotation rounds beyond what is expected from sampling variability or
    annotator cohort turnover. AAI trajectory shows no significant correlation (Spearman ρ ≤ 0.2)
    with TruthfulQA/BBH performance across rounds.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Annotation round / cumulative AI-text exposure"
      type: "ordinal_and_continuous"
      operationalization: "Round number (1-3 in HH-RLHF); cumulative tokens of AI-generated text viewed per annotator worker (WebGPT, continuous)"
      levels: ["round-1 (early)", "round-2 (mid)", "round-3 (late)"]
    - name: "Prompt ambiguity level"
      type: "categorical"
      operationalization: "High vs. low ambiguity, operationalized as annotator disagreement rate (Fleiss κ < 0.4 = high ambiguity)"
      levels: ["high_ambiguity", "low_ambiguity"]
  dependent:
    - name: "Alignment Asymmetry Index (AAI)"
      type: "continuous"
      operationalization: "Composite of: (1) directional stylistic coefficient drift Δβ_stylistic across rounds after Q_early recalibration; (2) cosine projection of late-round residual preference gradient onto pre-defined AI-typicality embedding vector; (3) behavioral divergence (token length Δ, structure score Δ) between early-round vs. late-round RLHF-trained models"
      primary: true
    - name: "TruthfulQA accuracy"
      type: "continuous"
      operationalization: "MC1 accuracy on TruthfulQA benchmark (817 questions) for RLHF-fine-tuned models; range [0,1]"
      primary: false
    - name: "BBH accuracy"
      type: "continuous"
      operationalization: "Exact match accuracy on BIG-Bench Hard (6511 questions) for RLHF-fine-tuned models; range [0,1]"
      primary: false
  controlled:
    - name: "Model checkpoint version"
      operationalization: "Restrict analysis to same-checkpoint responses where possible; include checkpoint version as covariate in regression"
    - name: "Prompt topic distribution"
      operationalization: "Stratify early/late split by topic category; include topic fixed effects in regression"
    - name: "Annotator fixed effects"
      operationalization: "Within-annotator panel regression in WebGPT; bootstrap cohort-turnover null in HH-RLHF"
    - name: "Semantic quality (Q_early)"
      operationalization: "Frozen logistic regression trained on round-1 labels; affine recalibration (scale+shift only) applied to later rounds"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Repeated annotation exposure internalizes AI-typical stylistic norms as quality heuristics"
      evidence: "Automation bias literature (Skitka et al.); Thakur 2024 empirically observes LLM-judge criterion shift after AI text exposure"
      falsifier: "No significant coefficient drift in stylistic features (β_L, β_H, β_S) across rounds after Q_early recalibration; drift absent in low-ambiguity prompts where bias theory predicts null effect"
    - step: 2
      description: "Internalized norms cause systematic upweighting of AI-typical stylistic features in preference labels"
      evidence: "Round-conditioned preference logistic regression with Q_early control; geometric projection onto pre-defined AI-typicality vector computed from round-1 data"
      falsifier: "Stylistic coefficients non-monotonic or sign-inconsistent across rounds; geometric projection onto AI-typicality vector not significantly positive; drift explained by Q_early calibration shift alone"
    - step: 3
      description: "Stylistic preference drift corrupts RLHF reward model training signal — reward model learns to optimize for drift-contaminated preferences"
      evidence: "Split-training experiment: reward model trained on late-round labels predicts longer, more hedged outputs than early-round-trained model on identical prompts"
      falsifier: "No significant behavioral divergence between early-round and late-round trained RLHF models on style metrics; late-round model not systematically longer/more structured"
    - step: 4
      description: "Stylistic reward model bias propagates to RLHF-fine-tuned model, causing degradation on style-invariant objective benchmarks"
      evidence: "Pan et al. 2022 methodology for benchmark degradation from reward misspecification; TruthfulQA and BBH as style-invariant objective criteria"
      falsifier: "Late-round RLHF model matches early-round model on TruthfulQA/BBH within 1% absolute; length increase fully mediates any factual improvement (indirect path ≥ 50%)"
  key_tension: "Separating annotator norm shift (human adaptation) from model quality improvement (rational updating) — addressed via Q_early affine recalibration and fixed-checkpoint analysis, but omitted variable bias from unmeasured quality dimensions remains a residual limitation"
  evidence_summary: |
    The causal chain is supported by convergent evidence from multiple literature clusters:
    automation bias theory (steps 1-2), RLHF annotation dynamics from Bai/Stiennon/Ouyang datasets (steps 1-2),
    reward misspecification-to-benchmark-degradation pathway from Pan/Coste (steps 3-4), and
    LLM-judge adaptation from Thakur 2024 (step 1). No single paper closes the full chain;
    this research provides the first integrated empirical test spanning all four steps.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "HH-RLHF annotation rounds represent genuine temporal exposure strata — annotators in later rounds have had cumulative prior exposure to AI-generated text from earlier rounds"
    supporting_evidence: "Bai et al. 2022 describes sequential annotation phases (helpful → harmless → red-team); annotator pool overlap across phases is plausible but not explicitly documented"
    consequence_if_violated: "Round-level analysis becomes cross-sectional cohort comparison rather than within-annotator longitudinal study; still testable but identification of adaptation mechanism weakens to population-level norm shift"
  - id: "A2"
    assumption: "Q_early (round-1 preference predictor) provides a stable quality surrogate for later rounds after affine recalibration"
    supporting_evidence: "Standard covariate adjustment in causal inference; multiple quality proxies (perplexity, length, toxicity) reduce omitted variable bias"
    consequence_if_violated: "Residual stylistic coefficients conflate quality with style; entire decomposition loses interpretive validity — Q_early calibration test is a go/no-go gate"
  - id: "A3"
    assumption: "The AI-typicality vector (centroid difference between model-generated and human-written text in round-1 embedding space) captures stylistic rather than topical variation"
    supporting_evidence: "Computed from fixed round-1 data using static sentence-transformer encoder; placebo test (prompt-matched permutation) validates robustness"
    consequence_if_violated: "Geometric projection measures domain/topic shift rather than stylistic adaptation; discriminant validity fails"
  - id: "A4"
    assumption: "WebGPT annotator worker IDs enable within-annotator fixed effects with sufficient within-worker exposure variation for dose-response analysis"
    supporting_evidence: "WebGPT comparison dataset documented to contain worker IDs and timestamps (Stiennon et al. 2020); crowdwork is typically asynchronous with multiple sessions per worker"
    consequence_if_violated: "Dose-response analysis reduces to between-worker comparison; cannot distinguish individual adaptation from cohort-level selection effects"
  - id: "A5"
    assumption: "Automation bias ambiguity-modulation prediction holds in annotation settings — drift is strongest in high-annotator-disagreement prompts"
    supporting_evidence: "Foundational automation bias literature consistently finds strongest effects under uncertainty; Thakur 2024 shows LLM-judge adaptation most pronounced for ambiguous quality judgments"
    consequence_if_violated: "Uniform drift across ambiguity levels would contradict the automation bias mechanism; hypothesis would require alternative theoretical grounding"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    RLHF datasets with multi-round annotation structure and temporal metadata enabling round-level or
    within-annotator analysis. Specifically: Anthropic HH-RLHF (3 annotation phases, 169K comparisons),
    OpenAI WebGPT comparisons (worker IDs + timestamps). English-language preference annotation.
    Human-in-the-loop annotation pipelines where annotators have repeated exposure to AI-generated text.
  does_not_apply_to: |
    Single-round annotation datasets (no temporal structure to analyze).
    RLAIF (AI feedback) pipelines without human annotators.
    Datasets without any temporal ordering or annotator identity metadata.
    Non-English annotation pipelines (generalizability unverified).
    Constitutional AI or other non-preference-based alignment methods.
  known_limitations: |
    HH-RLHF annotator ID availability: if individual worker IDs are not present in the public dataset,
    within-annotator fixed effects are unavailable and analysis falls back to cohort-level inference.
    Omitted variable bias from unmeasured semantic quality dimensions not captured by Q_early.
    Effect sizes may be small given the limited number of annotation rounds (N=3 in HH-RLHF).
    Cannot establish that drift generalizes beyond the specific AI models used in original annotation.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "Stylistic preference coefficient drift (Δβ_L, Δβ_H, Δβ_S) across annotation rounds is significantly larger in high-ambiguity prompts than in low-ambiguity prompts, after controlling for Q_early, checkpoint, and prompt topic distribution"
    test_method: "Round-conditioned logistic regression with Q_early covariate; interaction term between round and ambiguity level; bootstrap 95% CI on coefficient differences"
    success_criterion: "Interaction term for round × high_ambiguity is positive and significant (p < 0.05 after Bonferroni correction); stylistic coefficients show net positive directional shift in high-ambiguity stratum"
    falsification: "Interaction term is non-significant or negative; drift is uniform across ambiguity levels; coefficient signs are inconsistent across stylistic features"
  - id: "P2"
    primary: false
    statement: "AAI trajectory across annotation rounds shows Spearman ρ > 0.4 correlation with TruthfulQA/BBH accuracy trajectory of RLHF models trained on each round's labels"
    test_method: "Compute AAI per round; train reward model on each round's labels; fine-tune base model with RLHF; evaluate on TruthfulQA and BBH; compute Spearman rank correlation between AAI and benchmark accuracy"
    success_criterion: "Spearman ρ > 0.4 for at least one of TruthfulQA or BBH; ρ < 0 (negative correlation — higher AAI associated with lower benchmark accuracy)"
    falsification: "Spearman ρ ≤ 0.2 for both benchmarks; or positive correlation (higher AAI associated with higher benchmark accuracy, suggesting drift is adaptive)"
  - id: "P3"
    primary: false
    statement: "Within-annotator WebGPT dose-response analysis shows significant positive relationship between cumulative AI-text token exposure and AI-typicality geometric projection, after worker fixed effects"
    test_method: "Panel regression: projection_score ~ cumulative_tokens_viewed + worker_FE + task_type_FE; standard errors clustered by worker"
    success_criterion: "β_exposure > 0 with p < 0.05; effect size meaningful at ≥ 0.1 SD increase in projection per 1000 tokens viewed"
    falsification: "β_exposure ≤ 0 or not significant after worker fixed effects; drift correlates with calendar time but not individual exposure counts"

