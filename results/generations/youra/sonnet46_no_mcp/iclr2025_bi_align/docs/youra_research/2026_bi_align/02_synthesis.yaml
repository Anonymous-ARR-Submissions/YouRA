hypothesis_draft:
  title: "Human→AI Annotation Drift: Measuring Directional Stylistic Adaptation in RLHF Preference Datasets via the Alignment Asymmetry Index"
  hypothesis_id: "H-AAI-v1"
  core_claim: |
    Under repeated RLHF annotation exposure, human annotators exhibit directional stylistic
    adaptation toward AI-typical output features — measurable via the Alignment Asymmetry
    Index (AAI) across annotation rounds in HH-RLHF and WebGPT — and this adaptation
    correlates with downstream degradation on held-out objective benchmarks (TruthfulQA, BBH),
    constituting empirical evidence for Human→AI alignment drift as a systematic bias source
    in RLHF training signals.
  mechanism: |
    Four-step causal chain:
    (1) Repeated annotation exposure internalizes AI-typical stylistic norms as quality heuristics
        (grounded in automation bias theory; Thakur 2024 empirical precedent).
    (2) Internalized norms cause systematic upweighting of AI-typical stylistic features in
        preference labels — measurable via round-conditioned logistic regression coefficient drift
        and geometric projection onto a pre-defined AI-typicality embedding vector.
    (3) Stylistic preference drift corrupts the RLHF reward model training signal — the reward
        model learns to optimize for drift-contaminated preferences rather than stable human values.
    (4) Stylistic reward bias propagates to RLHF fine-tuned models, causing degradation on
        style-invariant objective benchmarks (TruthfulQA, BBH) without proportional factual gains.
  predictions:
    - P1: "Stylistic coefficient drift is significantly larger in high-ambiguity prompts (automation bias ambiguity modulation); interaction term round × high_ambiguity positive and significant (p < 0.05)"
    - P2: "AAI trajectory correlates with TruthfulQA/BBH degradation across rounds (Spearman ρ > 0.4, negative direction)"
    - P3: "WebGPT within-annotator dose-response: stylistic projection increases with cumulative token exposure after worker fixed effects (β_exposure > 0, p < 0.05)"

variables_summary:
  independent: "Annotation round (ordinal 1-3 in HH-RLHF) and/or cumulative AI-text tokens viewed per annotator (continuous, WebGPT)"
  dependent_primary: "Alignment Asymmetry Index (AAI) — composite of stylistic coefficient drift, AI-typicality geometric projection, and behavioral divergence between early/late RLHF models"
  controlled: "Model checkpoint version, prompt topic distribution, annotator fixed effects (WebGPT), affine-recalibrated Q_early quality surrogate"

null_hypothesis:
  h0_statement: |
    After conditioning on prompt features, model checkpoint, and affine-recalibrated Q_early,
    stylistic preference coefficients (β_L, β_H, β_S) do not change directionally across
    annotation rounds beyond sampling variability or annotator cohort turnover. AAI shows
    no significant correlation with TruthfulQA/BBH performance (Spearman ρ ≤ 0.2).
  statistical_test: "Round-conditioned logistic regression with interaction term; Spearman rank correlation for AAI-benchmark relationship; bootstrap CI for indirect mediation effects"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "Alignment Asymmetry Index (AAI) — first signed, directional, fully automated monitoring instrument for Human→AI preference adaptation in RLHF pipelines, validated against objective benchmarks without human evaluation"
  differentiation_summary: |
    Differs from Thakur 2024 (judge adaptation in evaluation vs. training data collection),
    Coste 2023 (global annotation variance vs. directional temporal drift), Pan 2022
    (benchmark degradation methodology without temporal drift source), and Christiano 2017
    (first empirical test of the static preference assumption). No existing work directly
    measures temporal preference drift in RLHF annotation datasets and links it to
    downstream benchmark degradation via a validated composite instrument.

clarity:
  overall_level: "HIGH"
  clarity_verified: true
  improvements_needed: []

experimental_scope:
  models:
    - "Q_early: logistic regression trained on round-1 HH-RLHF labels"
    - "Reward models: TRL RewardTrainer on early-round vs. late-round HH-RLHF subsets"
    - "RLHF fine-tuned models: PPO from early-round vs. late-round reward models"
    - "Embedding encoder: static frozen sentence-transformer (e.g., all-MiniLM-L6-v2)"
  datasets:
    - "Anthropic HH-RLHF (169K comparisons, 3 annotation phases)"
    - "OpenAI WebGPT comparisons (worker IDs + timestamps)"
  baselines:
    - "Full-dataset RLHF model (all rounds combined)"
    - "Random-split RLHF model (same size as temporal splits, no temporal structure)"
    - "Q_early frozen quality predictor"

measurement_plan:
  data_collection:
    - source: "HuggingFace datasets API: Anthropic/hh-rlhf"
    - source: "GitHub: openai/summarize-from-feedback"
    - source: "TruthfulQA and BBH via EleutherAI/lm-evaluation-harness"
  procedure:
    - step: "1. Load HH-RLHF; partition by annotation phase into early/mid/late strata"
    - step: "2. Train Q_early logistic regression on round-1 data; validate calibration on later rounds"
    - step: "3. Compute stylistic features per response (length, hedging phrase count, structured reasoning markers)"
    - step: "4. Run round-conditioned logistic regression with Q_early covariate; extract β_L, β_H, β_S per round"
    - step: "5. Compute AI-typicality vector (centroid difference AI-generated vs. human-written text, round-1, frozen encoder)"
    - step: "6. Compute geometric projection of late-round residual preference gradients onto AI-typicality vector"
    - step: "7. Train reward models on early-round and late-round HH-RLHF subsets (TRL RewardTrainer)"
    - step: "8. RLHF fine-tune base model from each reward model (TRL PPO)"
    - step: "9. Evaluate all models on TruthfulQA and BBH via lm-evaluation-harness"
    - step: "10. Compute AAI composite; run Spearman correlation with benchmark trajectories"
    - step: "11. WebGPT dose-response panel regression with worker fixed effects"
    - step: "12. Run mediation analysis (length → factual accuracy indirect path)"
  success_criteria:
    - "P1: Interaction term round × high_ambiguity positive and significant (p < 0.05)"
    - "P2: Spearman ρ > 0.4 between AAI and TruthfulQA/BBH degradation (negative direction)"
    - "P3: β_exposure > 0 in WebGPT worker fixed effects regression (p < 0.05)"
    - "Split-training: late-round model ≥ 10% longer outputs with ≤ 1% factual accuracy gain"

validation:
  internal_validity:
    - "Q_early affine recalibration isolates stylistic from semantic quality drift"
    - "Prompt-stratified early/late temporal split controls for topic distribution shift"
    - "Worker fixed effects (WebGPT) control for annotator-level heterogeneity"
    - "Bootstrap null simulation for cohort-turnover comparison in HH-RLHF"
    - "Placebo test: AI-typicality vector robust to prompt-matched permutation"
  external_validity:
    - "Cross-dataset replication (HH-RLHF dialogue + WebGPT summarization) tests generalizability across task domains"
    - "TruthfulQA and BBH as style-invariant objective criteria independent of annotator preferences"
    - "Null result (no drift) is also scientifically valid — establishes RLHF annotation robustness"

discussion_synthesis:
  key_insights:
    - "The static oracle assumption of RLHF is empirically testable using existing open datasets — no new data collection required"
    - "Automation bias ambiguity-modulation predicts strongest drift in high-uncertainty prompts, providing a theoretically grounded boundary condition"
    - "The AAI composite instrument unifies three independent measurement approaches into a single scalar, enabling future monitoring pipeline integration"
    - "Both positive and null results advance the field — the study is informative regardless of outcome"
    - "Component-wise criterion validity (against TruthfulQA/BBH) replaces CFA due to mixed observational levels across AAI components"
  breakthrough_moments:
    - "Exchange 6 (Dr. Ally): Conditional causal hypothesis formulation with ambiguity moderation as boundary condition — sharpened from 'round causes drift' to exposure-dependent, ambiguity-modulated directional adaptation"
    - "Exchange 13 (Dr. Nova): Alignment Asymmetry Index (AAI) reframes contribution from 'detecting drift' to 'providing a validated monitoring instrument' — dramatically strengthens the impact story"
    - "Exchange 15 (Prof. Pax): CFA observational level mismatch identified and resolved with component-wise criterion validity — saves the AAI construct without losing rigor"
  resolved_tensions:
    - "Round vs. exposure: resolved by using cumulative token count per worker (WebGPT) as the exposure variable, not just round number"
    - "Monotonicity vs. saturation: resolved by fitting multiple functional forms (linear, logistic, step) with AIC/BIC selection while pre-registering net directional convergence"
    - "Quality vs. style confound: resolved via Q_early affine recalibration go/no-go gate before downstream analyses"
    - "CFA vs. component-wise validation: resolved by recognizing mixed observational levels and adopting criterion validity convergence against common external benchmarks"
