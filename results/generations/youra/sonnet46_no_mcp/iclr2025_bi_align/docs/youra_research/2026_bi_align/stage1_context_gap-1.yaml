gap_id: "gap-1"
gap_title: "Absence of Temporal Drift Measurement in RLHF Preference Datasets"
gap_description: |
  No published study has systematically measured whether annotation patterns
  (inter-annotator agreement, label distributions, vocabulary preferences) shift
  across consecutive annotation rounds within existing RLHF datasets (HH-RLHF,
  WebGPT comparisons). This blocks answering the existence component of the main
  research question on bidirectional alignment directional asymmetry.
