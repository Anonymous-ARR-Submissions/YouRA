        n_directional += int(non_overlap_j)
      Note: early_ci shape is (2, 3) where row 0 = low, row 1 = high.
      So early_ci[1, j] = upper bound of early CI for feature j.
      And late_ci[0, j] = lower bound of late CI for feature j.
      Non-overlap means late is strictly above early at 95% confidence.
