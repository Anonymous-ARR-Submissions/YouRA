  - id: "task-014"
    epic: "A-5: Bootstrap CI"
    title: "L-5-1: BootstrapLoop — stratified resample loop with degenerate case handling"
    description: |
      Implement the bootstrap resampling loop in bootstrap_ci():
      - rng = np.random.default_rng(random_state)
      - pos_idx = np.where(split.y_train == 1)[0]
      - neg_idx = np.where(split.y_train == 0)[0]
      - boot_coefs = np.zeros((n_resamples, 3))
      - For each i in range(n_resamples):
          idx = np.concatenate([rng.choice(pos_idx, len(pos_idx), replace=True),
                                rng.choice(neg_idx, len(neg_idx), replace=True)])
          X_b = shared_scaler.transform(split.X_train[idx])       # [N, 3]
          q_b = q_early_model.predict_proba(split.X_train[idx])[:, 1:2]  # [N, 1]
          X_aug = np.hstack([X_b, q_b])                           # [N, 4]
          y_b = split.y_train[idx]
          try:
              lr = LogisticRegression(**LR_PARAMS).fit(X_aug, y_b)
              boot_coefs[i] = lr.coef_[0, :3]
          except Exception:
              boot_coefs[i] = np.zeros(3)  # degenerate single-class case
