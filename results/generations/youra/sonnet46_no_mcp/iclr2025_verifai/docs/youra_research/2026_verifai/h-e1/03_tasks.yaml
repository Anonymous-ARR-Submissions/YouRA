    epic: "Failsafe"
    title: "Pipeline Continuation Checkpoint"
    description: |
      Final validation checkpoint for h-e1 Phase 4 execution.
      Verify all experiment outputs are present:
      - h-e1/data/baseline_pool.jsonl (164 × 20 = 3280 lines)
      - h-e1/data/syncode_pool.jsonl (3280 lines)
      - h-e1/data/z3_eligibility.json (164 entries)
      - h-e1/data/mypy_results.json (50 entries)
      - h-e1/results/metrics.json (gate_pass key present)
      - h-e1/figures/*.pdf and *.png (8 files total)
      Read metrics.json and extract gate_pass, delta_ast, z3_eligibility_rate, mypy_structured_rate.
      Report GATE PASS or GATE FAIL for Phase 4 validator.
    feature_tag: "pipeline-continue"
    priority: 1
    source_document: "03_architecture.md"
    complexity: null
    test_requirements: |
      - Verify all output files exist with correct sizes
      - Assert metrics.json is valid JSON with gate_pass key
