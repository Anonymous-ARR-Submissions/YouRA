main_hypothesis:
  id: H-FormalComplement-v1
  title: Conditional Mechanistic Complementarity of Formal Repair Strategies for LLM-Generated Python Code
  statement: 'Under evaluation of LLM-generated Python code on HumanEval/EvalPlus benchmarks using

    CodeLlama-7B with Python-native infrastructure (no Docker), if formal repair strategies

    (SynCode grammar-constrained decoding, Z3-guided post-hoc repair, mypy/ast static

    analysis feedback) are applied in a causally-ordered sequential pipeline and via

    feature-aware routing, then the ensemble achieves statistically significant pass@1

    improvement over any single strategy (union gain > best-single-method upper 95%

    bootstrap CI), with failure-to-success transition sets exhibiting overlap below

    independence expectation (C_score > 0, p < 0.05) within eligibility-conditioned

    failure-type-stratified subsets, because each method operates on a distinct signal

    channel (decoding prior / structural conformance / symbolic constraint) that targets

    a different failure class in a causal hierarchy, and sequential staging expands

    downstream method eligibility by providing cleaner input distributions.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: HumanEval (164) + EvalPlus + MBPP (374)
    model: CodeLlama-7B (codellama/CodeLlama-7b-hf, device=auto)
    optimizer: null
    hyperparameters:
