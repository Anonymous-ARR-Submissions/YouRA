    - "StarCoder (secondary; optional extension if time/GPU permits)"
  datasets:
    - "HumanEval (164 problems) — primary training data for RSS, primary complementarity analysis"
    - "EvalPlus HumanEval+ (964 problems) — harder evaluation of same problems"
    - "MBPP (374 problems) — held-out test set for RSS routing evaluation"
  baselines:
    - "Unconstrained CodeLlama-7B (no repair)"
    - "SynCode-only (grammar-constrained generation)"
    - "mypy-feedback-only (iterative static analysis, max 3 rounds)"
    - "Z3-repair-only (SMT post-hoc repair on eligible tasks)"
    - "Oracle ensemble (oracle-selected best strategy per problem)"
    - "Parallel full ensemble (all methods applied, best result)"

measurement_plan:
  data_collection:
    - source: "Generate frozen pool: CodeLlama-7B, N=20 samples/problem, T=0.8, fixed seeds, serialized to disk"
    - source: "Apply SynCode: regenerate same problems with grammar-constrained decoding (separate pool, same seeds)"
    - source: "Apply mypy-feedback: iterative loop (max 3 rounds) on baseline pool, log all repair attempts"
    - source: "Attempt Z3 encoding on baseline pool and post-mypy pool; log encoding success/failure per problem"
    - source: "Apply Z3-repair on eligible baseline problems; log repair success/failure"
    - source: "Evaluate all pools with EvalPlus.evaluate() API; collect pass/fail per problem per sample"
    - source: "Extract program features: AST analysis (depth, branching), mypy annotation count, arithmetic density, cyclomatic complexity"
    - source: "Synthetic perturbation: inject 10 examples each of syntax/type/constraint errors into HumanEval reference solutions"
  procedure:
    - step: "Step 0 (FMD): Parallel failure classification of baseline pool — ast.parse, mypy.api.run, Z3 encoding attempt, EvalPlus test execution — independently for all samples"
    - step: "Step 1 (Repair): Apply SynCode (separate pool), mypy-feedback, Z3-repair to baseline pool; collect Fₘ→✓ per method"
    - step: "Step 2 (Complementarity): Compute pairwise Jaccard, E[Jaccard], C_score within full / eligibility-conditioned / failure-type-stratified / difficulty-quintile-stratified subsets"
    - step: "Step 3 (Cascade): Compare Z3 eligibility on baseline vs. post-mypy code; compute ΔP with bootstrap CI"
    - step: "Step 4 (Mechanistic Regression): Three-block logistic regression per method; incremental ΔlogL; FDR correction"
    - step: "Step 5 (Synthetic Validation): Measure which method repairs which synthetic failure type; confirm mechanism specificity"
    - step: "Step 6 (RSS Routing): Train logistic regression on HumanEval features; evaluate on MBPP; report cost accounting"
    - step: "Step 7 (Sequential Pipeline): Apply SynCode → mypy → Z3 pipeline; compare to parallel and single-method baselines"
  success_criteria:
    - "P1: C_score > 0, J_obs < E[J] at p < 0.05, ≥2 method pairs, eligibility-conditioned"
    - "P2: ΔP(Z3 | post-mypy) > 0.05, 95% CI lower bound > 0"
    - "P3: RSS_pass@1 > best_single at p < 0.05, cost ratio ≤ 1.3×"

validation:
  internal_validity:
    - "Frozen generation pool eliminates stochastic variation between repair conditions"
    - "Parallel FMD avoids order-dependent failure classification artifacts"
    - "Bootstrap CI at problem level (not per-generation) gives valid variance estimates for pass@k"
    - "Bonferroni correction controls family-wise error rate across 3 pairwise Jaccard tests"
    - "Difficulty stratification (quintiles of baseline pass@1) prevents Simpson's paradox in complementarity analysis"
    - "Three-block logistic model with difficulty-control prevents spurious mechanistic attributions"
    - "Synthetic perturbation validation isolates mechanism from natural distribution confounds"
  external_validity:
    - "HumanEval and MBPP are standard Python code generation benchmarks with broad community adoption"
    - "EvalPlus harder tests reduce false positives from superficial syntax-matching solutions"
    - "RSS trained/evaluated across different benchmarks (HumanEval/MBPP) tests generalization"
    - "CodeLlama-7B is representative of open-source code LLMs; findings may differ for GPT-4/larger models (explicit limitation)"
    - "All tools pip-installable: results reproducible in any Python environment without specialized infrastructure"

discussion_synthesis:
  key_insights:
    - "The core hypothesis evolved from 'methods fix different problems' to 'methods exhibit conditional super-independence below independence expectation within matched failure strata' — a much more rigorous operationalization"
    - "Failure Mass Decomposition emerged as an essential pre-experiment step that establishes theoretical repair ceilings and prevents post-hoc rationalization"
    - "The cascade reframing (Dr. Nova, Exchange 14) — viewing sequential staging as a test of causal failure hierarchy rather than naive pipeline — is the most novel conceptual contribution"
    - "Independence null model (C_score = (E[J] - J_obs) / E[J]) replaces arbitrary Jaccard thresholds with principled statistical operationalization"
    - "Synthetic perturbation validation (inject known failure types into correct reference solutions) provides clean mechanism isolation without new data collection"
  breakthrough_moments:
    - "Exchange 3 (Prof. Rex): Identifying that eligibility restriction masquerades as complementarity — prompted the conditioning framework"
    - "Exchange 10 (Dr. Sage): Formalizing C_score metric and recognizing that null results are equally publishable"
    - "Exchange 11 (Dr. Ally): Proposing three-block logistic model with difficulty control for mechanistic regression"
    - "Exchange 14 (Dr. Nova): Cascade reframing — failure types as causally ordered, sequential staging as eligibility expansion test"
    - "Exchange 16 (Dr. Sage): Synthetic perturbation as a feasible, low-cost mechanism validation step"
  resolved_tensions:
    - "Arbitrary Jaccard threshold → Independence null model with C_score metric (resolved by Dr. Sage + Dr. Ally)"
    - "Eligibility restriction vs. complementarity → Conditioning framework with stratified analysis (resolved by Prof. Rex + Prof. Vera)"
    - "Mechanistic claims vs. difficulty confounds → Three-block logistic regression with explicit difficulty controls (resolved by Prof. Rex + Dr. Ally)"
    - "Variance as noise vs. signal → Variance decomposition (Var_problem vs. Var_seed) to assess routing learnability (resolved by Prof. Pax + Prof. Rex)"
    - "Cascade hypothesis vs. parallel independence → Separate cascade eligibility test (ΔP measurement) as secondary hypothesis (resolved by Prof. Rex + Dr. Sage)"
