hypothesis_draft:
  title: "Conditional Mechanistic Complementarity of Formal Repair Strategies for LLM-Generated Python Code"
  hypothesis_id: "H-FormalComplement-v1"
  core_claim: |
    Formal repair methods (SynCode grammar-constrained decoding, Z3-guided post-hoc repair,
    mypy/ast static analysis feedback) exhibit conditional mechanistic complementarity on
    LLM-generated Python code: within eligibility-conditioned, failure-type-stratified subsets
    of HumanEval/EvalPlus, their failure-to-success transition sets overlap less than predicted
    by independence expectation (C_score > 0). Moreover, sequential staging (SynCode → mypy → Z3)
    expands downstream Z3 eligibility, and a feature-aware routing policy approaches oracle
    ensemble performance at sublinear cost on held-out MBPP benchmark.
  mechanism: |
    Three distinct information channels mediate repair:
    (1) SynCode: modifies the LLM generation prior via CFG-based token masking — eliminates
        syntactic invalidity by construction during decoding.
    (2) mypy/ast: applies structural/type conformance checking post-generation — identifies
        type violations and structural anomalies in syntactically valid code; cleans the input
        distribution for Z3 by resolving type inconsistencies that block SMT encoding.
    (3) Z3-repair: applies symbolic constraint satisfaction — extracts arithmetic invariants from
        failing test assertions and searches for minimal repairs satisfying SMT constraints.
    Because these channels access fundamentally different program representations (probability
    distribution over tokens / type system / constraint algebra), they target categorically
    different failure classes with non-overlapping repair capability.
  predictions:
    - P1: "C_score > 0 AND J_obs < E[Jaccard] at p < 0.05 for ≥2 method pairs within eligibility-conditioned failure-type-stratified subset"
    - P2: "ΔP(Z3_success | post-mypy) - P(Z3_success | baseline) > 0.05, 95% CI lower bound > 0"
    - P3: "RSS_pass@1 > best_single_method_pass@1 at p < 0.05, cost ratio ≤ 1.3× on held-out MBPP"

variables_summary:
  independent: "Repair strategy (6 levels: baseline, SynCode, Z3-repair, mypy-feedback, sequential pipeline, RSS-routed); staging order (causal vs. random ablation); temperature (0.2 / 0.8)"
  dependent_primary: "pass@1 (EvalPlus unbiased estimator); C_score (independence-normalized Jaccard complement); cascade eligibility expansion ΔP; cost-normalized gain"
  controlled: "CodeLlama-7B (fixed weights, device=auto); frozen generation pool (N=20/problem, fixed seeds); EvalPlus evaluation harness; HumanEval as primary benchmark, MBPP as held-out"

null_hypothesis:
  h0_statement: |
    H0_complementarity: Within eligibility-conditioned failure-type-stratified strata, all method
    pairs exhibit C_score ≤ 0 (overlap consistent with or exceeding independence expectation).
    H0_cascade: ΔP(Z3_success | post-mypy) ≤ 0 (sequential staging provides no eligibility benefit).
    H0_routing: RSS_pass@1 ≤ best_single_method_pass@1 (routing adds no statistical improvement).
  statistical_test: "Bootstrap confidence intervals at problem level (resample at problem, not per-generation); Bonferroni correction for 3 pairwise Jaccard comparisons; one-sided tests for directional predictions."
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First cross-strategy failure-set complementarity analysis for formal methods in LLM Python code generation, combining Failure Mass Decomposition, independence-normalized Jaccard analysis, cascade eligibility testing, synthetic perturbation validation, and RSS routing — producing a reusable evaluation protocol regardless of outcome."
  differentiation_summary: |
    SynCode [Ugare et al. ~2024] evaluated in isolation; no complementarity measurement.
    SELF-REFINE [Madaan et al. 2023] uses LLM feedback, not formal method signals; no failure-type stratification.
    CodeT [Chen MSFT 2022] shows ensemble benefit but not with formal methods or mechanism-specific analysis.
    No existing work: (a) measures pairwise Jaccard between formal method repair sets, (b) applies independence
    null model to normalize complementarity, (c) measures cascade eligibility expansion, (d) validates mechanism
    via synthetic perturbation, (e) trains RSS routing across benchmarks. This work does all five.

