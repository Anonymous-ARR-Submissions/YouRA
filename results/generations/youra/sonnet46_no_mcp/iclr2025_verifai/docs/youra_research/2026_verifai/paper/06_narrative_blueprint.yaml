# PART 5: SECTION-LEVEL NARRATIVE GOALS
# ═══════════════════════════════════════════════════════════════════════════════

section_goals:

  abstract:
    narrative_purpose: "Compress the entire story into ~150 words: null result is the hook"
    key_message: >
      We built a formal repair pipeline (SynCode + Z3 + mypy) and discovered that mypy is
      inapplicable to CodeLlama-7B because it generates annotation-free Python code —
      a precondition no prior evaluation measured.
    structure_notes: |
      - Sentence 1: State the research question (formal repair complementarity for LLM code)
      - Sentence 2: Our approach (FMD-stratified analysis, three repair methods)
      - Sentence 3: Surprising finding (0% type errors in 2680 samples — mypy vacuous)
      - Sentence 4: Positive results (SynCode direction, Z3 33% eligibility, unified pipeline PASS)
      - Sentence 5: What this means (scope conditions for formal repair methods established)
    avoid:
      - "Vague claims about 'improved performance'"
      - "Citing the complementarity claim as confirmed (h-m3 not executed)"
      - "Undefined acronyms (FMD, RSS)"

  introduction:
    narrative_purpose: "Hook with null result → problem depth → FMD insight → contributions preview"

    hook_strategy: >
      Open with the counterintuitive null result: 2,680 samples, 0 type errors, mypy returns
      nothing to repair. Immediately explain why this is surprising (prior work assumed type errors
      would be present). Then layer the problem: formal repair is valuable, but scope conditions
      matter. Our contribution is the empirical framework to measure scope.

    problem_escalation: |
      1. Surface: LLMs make mistakes; automated repair is useful (known)
      2. Deeper: Different error types require different repair signals; methods have preconditions (our framing)
      3. Gap: No prior work measured failure mode distributions to verify precondition satisfaction
         before applying formal repair — we do this empirically

    insight_preview: >
      Hint that the FMD measurement framework reveals which channels are viable for a given
      model-benchmark pair, transforming repair method selection from assumption-based to
      evidence-based.

    contributions_framing: |
      Frame contributions as outcomes of the FMD framework:
      1. "First unified operational verification of SynCode + Z3 + mypy with CodeLlama-7B (Python-native)"
      2. "Empirical FMD characterization: 97.5% syntax dominance, 0% type stratum, 33% Z3 eligibility"
      3. "Principled scope boundary for type-checking repair in annotation-free LLM settings"
      4. "Infrastructure for SynCode-Z3 complementarity testing (h-m3 ready)"

    transition_to_related_work: >
      "These findings position formal repair methods differently from prior iterative feedback
      approaches — a positioning we develop in Section 2."

  related_work:
    narrative_purpose: "Show prior repair work assumes failure mode distributions; we measure them"

    positioning_strategy: >
      Position our work as providing the empirical precondition analysis that prior repair papers
      assumed away. We do not claim to outperform baselines — we claim to characterize when
      formal repair methods can and cannot activate.

    key_comparison_points:
      - area: "Iterative feedback repair (SELF-REFINE, Olausson 2023)"
        limitation_to_highlight: >
          These methods implicitly assume the feedback signal (type errors, test failures)
          will be present and informative. The assumption is not empirically validated for
          specific model-benchmark pairs.
        how_we_differ: >
          We measure feedback signal presence before applying the repair loop. This distinguishes
          mechanism operationality (confirmed) from scope satisfaction (model-dependent).

      - area: "Grammar-constrained decoding (SynCode, Ugare 2024)"
        limitation_to_highlight: >
          SynCode was evaluated on its own benchmark; integration with post-hoc repair
          methods and failure mode analysis was not reported.
        how_we_differ: >
          We extend SynCode into a multi-method pipeline and measure its failure mode
          distribution contribution (FMD syntax channel reduction) in conjunction with
          other repair methods.

      - area: "Neural program repair / LLM repair (Xia 2023, Chen 2022)"
        limitation_to_highlight: >
          Focus on neural repair without formal method integration; failure type characterization
          is not a primary analysis target.
        how_we_differ: >
          Formal methods provide interpretable, mechanism-grounded repair signals. Our FMD
          framework connects formal method scope to measurable preconditions.

      - area: "SMT-based verification and repair"
        limitation_to_highlight: >
          SMT repair assumes tractable encodings exist for the target problem class; applicability
          to code generation benchmarks is not characterized.
        how_we_differ: >
          We quantify Z3 eligibility (33% of HumanEval) using test-assertion scanning —
          an empirical measurement rather than a theoretical bound.

    papers_to_discuss:
      - "Ugare et al. 2024 (SynCode)"
      - "Olausson et al. 2023 (repair survey)"
      - "Madaan et al. 2023 (SELF-REFINE)"
      - "Chen et al. 2021 (HumanEval)"
      - "Chen et al. 2022 (CodeT)"
      - "Roziere et al. 2023 (Code Llama)"
      - "De Moura & Bjorner 2008 (Z3)"

    avoid:
      - "Claiming our approach outperforms all baselines (h-m3/h-m4 not executed)"
      - "Dismissing iterative feedback methods — we extend, not replace"

  methodology:
    narrative_purpose: "Present the FMD-conditioned repair pipeline as the natural consequence of the insight"

    connection_to_insight: >
      The FMD framework operationalizes the insight: each repair channel has an empirically
      measurable precondition. The pipeline first measures preconditions (FMD classification),
      then applies methods conditioned on those measurements.

    key_design_decisions:
      - decision: "Python-native tool installation (no Docker)"
        rationale: >
          SynCode, z3-solver, and mypy are all pip-installable. Docker-free deployment
          reduces infrastructure complexity and enables reproducibility on standard compute.
        alternatives_considered: "Docker-based evaluation (more isolation but higher setup cost and portability reduction)"

      - decision: "20-sample frozen pool per problem"
        rationale: >
          Fixed random seed pool eliminates seed-to-seed variance as a confound.
          Enables consistent comparison across repair methods on identical generation samples.
        alternatives_considered: "Per-method sampling (introduces variance confound); single sample (too noisy)"

      - decision: "FMD classification before repair application"
        rationale: >
          Measuring the failure distribution before applying repair isolates mechanism scope
          from mechanism effectiveness. This is the empirical contribution — not the repair
          performance, but the scope verification.
        alternatives_considered: "Apply repair then measure improvement (cannot distinguish scope from mechanism failure)"

      - decision: "Bootstrap CI (10,000 iterations) for statistical validation"
        rationale: >
          Distribution-free statistical test appropriate for delta_ast and C_score metrics
          without normality assumptions. Bonferroni correction applied for multiple comparisons.
        alternatives_considered: "McNemar test (parametric; less appropriate for small N), permutation test (equivalent but slower)"

    intuition_building: |
      Figure: Pipeline architecture showing three parallel repair channels conditioned on FMD.
      Each channel has: (1) precondition measurement, (2) activation gate, (3) repair application.
      The architecture is a DAG with FMD at the root and repair methods as conditional branches.

    technical_depth_balance: |
      Main text: FMD classification protocol, eligibility criteria, repair activation conditions.
      Appendix: Full Z3 encoding specification, SynCode grammar configuration, mypy API usage.

  experiments:
    narrative_purpose: "Design three experiments that test existence, mechanism, and distribution"

    experimental_questions:
      - question: "Are all three formal repair tools operational in a unified Python-native pipeline? (h-e1)"
        experiment: "20-problem HumanEval subset; measure delta_ast, z3_eligibility, mypy_structured_rate"
        expected_outcome: "All three gates pass; tools confirmed operational"

      - question: "Does SynCode's CFG masking produce measurable FMD improvement? (h-m1)"
        experiment: "20-problem subset; bootstrap CI on delta_ast; FMD classification; F_SynCode→✓ extraction"
        expected_outcome: "Direction confirmed; statistical significance requires N≥60"

      - question: "What is CodeLlama-7B's failure mode distribution on HumanEval? (h-m2)"
        experiment: "134-problem analysis; FMD classification; mypy repair loop; Z3 eligibility measurement"
        expected_outcome: "FMD characterized; mypy channel scope determined empirically"

    baseline_rationale: >
      Baseline is unconstrained CodeLlama-7B generation (temperature=0.8, N=20 samples).
      This is the standard protocol from HumanEval evaluation. Repair methods are applied
      post-hoc to identify failure-to-success transitions.

    dataset_rationale: >
      HumanEval (164 function-level synthesis problems) is the standard code generation
      benchmark. Its test-function structure enables Z3 eligibility scanning. Its size
      (164 problems) provides sufficient statistical power for FMD characterization.

    metric_rationale: >
      delta_ast = AST failure rate reduction (operationality and mechanism proxy);
      C_score = Jaccard-based complementarity within failure strata (mechanism diversity proxy);
      z3_eligibility_rate = fraction of problems amenable to SMT encoding (Z3 scope proxy);
      mypy_structured_rate = fraction of samples with structured mypy output (operational proxy).

    fairness_considerations: |
      - Fixed seed pool ensures all methods compared on identical samples
      - Same model checkpoint (codellama/CodeLlama-7b-hf) for all experiments
      - Bonferroni correction applied for multiple comparisons in h-m2

  results:
    narrative_purpose: "Build the empirical argument from operationality → distribution → scope boundary"

    main_result_highlight: >
      FMD analysis: 97.5% syntax-dominated failures, 0% type stratum across 2,680 samples.
      This is the paper's core finding — a clean, strong null result that defines the
      mypy repair channel's scope boundary.

    result_presentation_order:
      - result: "Unified pipeline operationality (h-e1 gate metrics)"
        purpose: "Establish credibility — all results come from a confirmed working system"

      - result: "Failure Mode Distribution (FMD) analysis (h-m2)"
        purpose: "The core finding — establish the empirical failure landscape before repair"

      - result: "SynCode directional reduction (h-m1 delta_ast)"
        purpose: "Positive result — the one repair channel that universally activates"

      - result: "Z3 eligibility quantification (h-e1, h-m2)"
        purpose: "Scope for the second testable channel; positions h-m3 as the next step"

      - result: "mypy null result — 0 type errors in 134 problems"
        purpose: "The surprising finding — strong empirical evidence for scope boundary"

    surprising_result_handling: >
      Present the mypy null result as a principled empirical finding, not an experimental
      failure. Explain the competing explanations (model generates untyped code; FMD
      priority masking) and present the most likely explanation (joint effect of both).
      Frame as a contribution: prior work assumed type errors would occur; we measured
      that they do not for this model-benchmark pair.

    avoid:
      - "Treating 0/134 type errors as a system error (it is a mechanism finding)"
      - "Glossing over the incomplete h-m3/h-m4 status"
      - "Overstating the SynCode result as statistically significant"

  discussion:
    narrative_purpose: "Interpret the null result, scope the limitations, open the path forward"

    key_findings_interpretation: >
      The 97.5% syntax dominance and 0% type stratum together establish that CodeLlama-7B's
      failure distribution on HumanEval is almost entirely syntax-layer. This means:
      (1) SynCode is the universally-applicable first-stage repair; (2) mypy is out of scope
      for this model-benchmark pair without annotation prompting; (3) Z3 is applicable to
      one-third of problems. The repair problem for this setting is effectively a 2-method
      problem (SynCode + Z3) rather than a 3-method problem.

    honest_limitations:
      - limitation: "h-m3 and h-m4 not executed — complementarity claim untested"
        why_acceptable: >
          All infrastructure for h-m3 is implemented. The complementarity question remains
          scientifically open; our contribution is establishing the empirical conditions
          that make h-m3 the correct next experiment.
        future_mitigation: "Execute h-m3 (SynCode-Z3 C_score); ~1h GPU time with existing code"

      - limitation: "SynCode statistical significance pending N=164"
        why_acceptable: >
          Direction is consistent across two independent experiments (delta_ast=0.075 in
          both h-e1 and h-m1). Underpowering is a resource constraint, not a mechanism issue.
        future_mitigation: "N=164 run with existing h-m1 code (~4h GPU)"

      - limitation: "Single base model (CodeLlama-7B, 7B parameters)"
        why_acceptable: >
          CodeLlama-7B is a standard benchmark model. The null result is model-specific
          and reproducible — a valid contribution in its own right.
        future_mitigation: "FW3: annotation-prompted experiment or GPT-4/CodeLlama-34B"

    broader_impact_statement: >
      This work establishes that formal repair method applicability is empirically measurable
      and model-specific. Researchers should characterize failure mode distributions for
      their target model before designing repair pipelines. The FMD framework is a reusable
      diagnostic tool for the code generation community.

  conclusion:
    narrative_purpose: "Return to the opening surprise, reframe as contribution, open the future"

    callback_to_hook: >
      "We opened with 2,680 samples producing 0 type errors. This is not a failure —
      it is a measurement. Our framework reveals which formal repair channels are viable
      for a given model-benchmark pair, transforming repair method selection from
      theoretical assumption to empirical verification."

    memorable_ending: >
      The most valuable result in this paper is the one that shows a method cannot activate.
      Knowing when formal repair methods fail to engage is as important as knowing when
      they succeed — and it is knowledge that must be measured, not assumed.

    future_work_vision: >
      Three experiments stand ready: (FW1) N=164 SynCode run for statistical confirmation;
      (FW2) h-m3 SynCode-Z3 complementarity test; (FW3) annotation-prompted mypy activation
      experiment. Together these complete the minimal verification program for formal repair
      complementarity in LLM code generation.

