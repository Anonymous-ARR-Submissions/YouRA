      compute_distribution(classifications): {category: proportion} over all 3280 samples.
      compute_syntax_shift(baseline_dist, syncode_dist): syntax_rate_baseline - syntax_rate_syncode.
      save_results(): serialize to h-m1/results/fmd_results.json.
    feature_tag: "evaluation"
