      - test_all_invalid: failure_rate == 1.0 when all ast_valid=False
      - test_delta_ast_positive: delta > 0 when baseline_rates > syncode_rates
      - test_arrays_aligned: baseline_rates.shape == syncode_rates.shape == (164,)
    reference_files:
