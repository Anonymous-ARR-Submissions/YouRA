  - id: "task-006"
    epic: "A-5"
    title: "Bootstrap CI Statistical Test"
    description: |
      Implement h-m1/code/bootstrap_ci.py with BootstrapCI class.
      compute(baseline_rates[164], syncode_rates[164]): paired problem-level bootstrap, 10,000 iterations.
      Uses diffs = baseline_rates - syncode_rates; bootstrap resamples diffs with replacement.
      Returns (delta_mean, ci_lower, ci_upper, p_value) where p_value = fraction of boot_deltas <= 0 (one-sided).
      evaluate_gate(delta_mean, ci_lower): PASS if both > 0; PARTIAL if only delta > 0; FAIL if delta <= 0.
      save_results(): serialize to h-m1/results/bootstrap_ci.json.
    feature_tag: "evaluation"
    priority: 85
    source_document: "03_architecture.md"
    complexity: 10
    test_requirements: |
      - Create tests/test_bootstrap_ci.py
      - test_perfect_improvement: delta=0.5 → ci_lower > 0, p_value < 0.05
      - test_no_improvement: equal rates → delta ≈ 0, p_value ≈ 0.5
      - test_gate_pass: delta_mean=0.05, ci_lower=0.01 → PASS
      - test_gate_partial: delta_mean=0.02, ci_lower=-0.01 → PARTIAL
      - test_gate_fail: delta_mean=-0.01 → FAIL
    reference_files:
      architecture: "03_architecture.md#bootstrap_ci"
