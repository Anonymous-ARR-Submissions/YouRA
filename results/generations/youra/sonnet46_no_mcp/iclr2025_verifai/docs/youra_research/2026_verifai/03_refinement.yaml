# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-FormalComplement-v1"
  confidence_level: 0.72
  core_hypothesis_statement: |
    Under evaluation of LLM-generated Python code on HumanEval/EvalPlus benchmarks using
    CodeLlama-7B with Python-native infrastructure (no Docker), if formal repair strategies
    (SynCode grammar-constrained decoding, Z3-guided post-hoc repair, mypy/ast static
    analysis feedback) are applied in a causally-ordered sequential pipeline and via
    feature-aware routing, then the ensemble achieves statistically significant pass@1
    improvement over any single strategy (union gain > best-single-method upper 95%
    bootstrap CI), with failure-to-success transition sets exhibiting overlap below
    independence expectation (C_score > 0, p < 0.05) within eligibility-conditioned
    failure-type-stratified subsets, because each method operates on a distinct signal
    channel (decoding prior / structural conformance / symbolic constraint) that targets
    a different failure class in a causal hierarchy, and sequential staging expands
    downstream method eligibility by providing cleaner input distributions.
  alternative_hypothesis_h0: |
    H0_complementarity: Within eligibility-conditioned failure-type-stratified subsets,
    the pairwise Jaccard similarity of failure-to-success transition sets between any
    two repair methods is consistent with independence expectation (C_score ≤ 0, or
    J_obs ≥ E[J] at p < 0.05), meaning methods address the same failure subset and
    provide no complementary coverage.

    H0_cascade: Sequential staging (SynCode → mypy → Z3) does not expand downstream
    Z3 eligibility: ΔP(Z3_success | after mypy) - P(Z3_success | baseline) ≤ 0,
    meaning causal ordering provides no benefit over independent parallel repair.

    H0_routing: A Repair Strategy Selector trained on program features does not
    outperform the best single method on held-out MBPP benchmark: RSS_pass@1 ≤
    best_single_method_pass@1 (p < 0.05).

