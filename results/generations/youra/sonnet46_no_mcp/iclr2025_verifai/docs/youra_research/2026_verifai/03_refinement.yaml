# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "The three repair methods operate on sufficiently orthogonal information channels that their failure-to-success transition sets are not fully correlated by shared latent variables (e.g., overall problem difficulty)."
    supporting_evidence: "Theoretically motivated by distinct signal channel analysis (prior / structural / symbolic). CodeT [Chen MSFT 2022] shows diverse strategies provide ensemble benefit."
    consequence_if_violated: "Complementarity claim collapses; C_score ≤ 0; methods address same failure subset. Still publishable as null result characterizing formal method limitations."
  - id: "A2"
    assumption: "Z3 constraint encoding is tractable for 30–40% of HumanEval/MBPP problems using only the z3-solver pip package (without symbolic execution infrastructure)."
    supporting_evidence: "Z3 API supports linear integer arithmetic, finite-domain constraints; HumanEval has arithmetic-heavy subset; constraint tractability estimated from problem structure. [INFERRED]"
    consequence_if_violated: "If Z3 eligibility < 15%, cascade and complementarity claims for Z3 are underpowered; paper scope reduces to SynCode + mypy complementarity only."
  - id: "A3"
    assumption: "Intra-method repair variance across seeds (Var_seed) is substantially lower than inter-problem variance (Var_problem), making routing signals learnable."
    supporting_evidence: "For SynCode: deterministic given same seed. For mypy-feedback: deterministic up to LLM regeneration stochasticity. For Z3: deterministic. Var_seed should be low for Z3/SynCode."
    consequence_if_violated: "RSS routing is not learnable (signal-to-noise too low); routing policy contribution dropped from paper."
  - id: "A4"
    assumption: "Sequential staging (SynCode → mypy → Z3) expands downstream eligibility — i.e., the post-mypy code distribution has higher Z3 encoding success rate than baseline-generated code."
    supporting_evidence: "Theoretical: type-consistent code is more likely to have encodable arithmetic invariants. Not yet measured empirically."
    consequence_if_violated: "Cascade hypothesis drops; sequential staging provides no benefit; paper focuses on parallel independent repair complementarity only."
  - id: "A5"
    assumption: "Failure types (syntax, type, constraint, logical) can be classified in parallel (independently) from Python-native signals without sequential dependency."
    supporting_evidence: "ast.parse() is independent of mypy; mypy can run on syntactically invalid files with partial output; Z3 encoding attempt is independent of mypy result."
    consequence_if_violated: "FMD base-rate proportions are order-dependent artifacts; theoretical ceilings are invalid. Parallel FMD must be validated by comparing sequential vs. parallel classification outputs."

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Python code generation benchmarks: HumanEval (164 problems), MBPP (374 problems), EvalPlus variants
    - Decoder-only LLMs available via HuggingFace with Python-native generation: CodeLlama-7B, StarCoder (secondary)
    - Python-native infrastructure only: pip-installable tools, subprocess execution, no Docker
    - Z3-eligible problem subset: problems with tractable arithmetic/constraint specifications (~30–40% of HumanEval)
    - Temperature range T ∈ {0.2, 0.8} for CodeLlama-7B
  does_not_apply_to: |
    - Multi-language code generation (Java, TypeScript, C++, etc.) — explicitly excluded (Docker required for non-Python runners)
    - Problems requiring symbolic execution infrastructure beyond z3-solver pip package
    - Open-ended code generation tasks without test oracle (no pass@k evaluation possible)
    - LLMs requiring API access only (no local generation pool creation)
    - Code completion tasks (Hypothesis applies to function-level synthesis from docstring)
  known_limitations: |
    - All Phase 1 evidence is [INFERRED] — no live MCP verification during research gathering
    - Z3 eligibility estimate (30–40%) is domain-knowledge estimate, not empirically measured
    - Single base model (CodeLlama-7B); complementarity pattern may differ for GPT-4/larger models
    - Synthetic perturbation validation uses 30 examples — sufficient for mechanism confirmation but not
      for statistical power analysis
    - Workshop paper scope: full ordering ablation (6 permutations) may be deferred to extended version

