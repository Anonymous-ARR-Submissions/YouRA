# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "Within the eligibility-conditioned, failure-type-stratified subset of HumanEval problems, at least two method pairs exhibit C_score > 0 (failure-to-success transition sets with overlap below independence expectation), indicating genuine mechanistic complementarity."
    test_method: "Compute Jaccard(F_m1→✓, F_m2→✓) within eligibility-conditioned strata; compute E[Jaccard] = (r1×r2)/(r1+r2-r1×r2); compute C_score = (E[J]-J_obs)/E[J]; bootstrap 95% CI at problem level."
    success_criterion: "C_score > 0 AND J_obs < E[J] at p < 0.05 (bootstrap) for ≥2 of 3 method pairs (SynCode-Z3, SynCode-mypy, Z3-mypy) within eligibility ∩ failure-type-stratified subset."
    falsification: "If C_score ≤ 0 for all method pairs within conditioned strata, or if J_obs ≥ E[J] for all pairs, complementarity fails and methods address the same failure subset regardless of mechanism."
  - id: "P2"
    primary: false
    statement: "Sequential staging (SynCode → mypy → Z3) expands Z3 eligibility: ΔP(Z3 encoding success | code after mypy-feedback) > ΔP(Z3 encoding success | baseline-generated code) by at least 5 percentage points."
    test_method: "Generate baseline pool; apply mypy-feedback loop (max 3 rounds) to baseline pool; attempt Z3 SMT encoding on both baseline outputs and post-mypy outputs; compare encoding success rates."
    success_criterion: "ΔP(Z3_eligible | post-mypy) - P(Z3_eligible | baseline) > 0.05, with bootstrap 95% CI lower bound > 0."
    falsification: "If ΔP ≤ 0 or CI lower bound ≤ 0, cascade hypothesis fails; sequential staging provides no eligibility benefit."
  - id: "P3"
    primary: false
    statement: "A Repair Strategy Selector (RSS) trained on program features (arithmetic density, annotation richness, AST depth, cyclomatic complexity, baseline syntax invalidity rate) achieves pass@1 on held-out MBPP that exceeds the best single method's pass@1 (p < 0.05), at ≤1.3× median computational cost."
    test_method: "Train logistic regression RSS on HumanEval feature-repair-success pairs; evaluate routing decisions on MBPP (374 problems); report Δpass@1 vs. best single method with bootstrap CI; report full cost accounting C_total."
    success_criterion: "RSS_pass@1 > best_single_pass@1 at p < 0.05 (bootstrap), AND C_total_RSS / C_total_best_single ≤ 1.3."
    falsification: "If RSS does not outperform best single method statistically, or cost ratio > 1.3, routing policy adds no practical value."

