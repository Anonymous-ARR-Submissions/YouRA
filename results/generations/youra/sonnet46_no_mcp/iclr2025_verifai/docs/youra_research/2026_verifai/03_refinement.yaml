# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "SynCode grammar-constrained decoding eliminates syntactic invalidity at generation time by masking tokens that would violate Python CFG. This cleanses the generated code pool of syntax errors, producing structurally valid code as input to subsequent methods."
      evidence: "SynCode pushdown automaton confirmed operational in h-e1; reduces syntax errors to near-zero [Ugare et al. ~2024, INFERRED]; Python ast.parse() failure rate measurably decreases under SynCode."
      falsifier: "If SynCode-generated code shows similar ast.parse() failure rate as unconstrained baseline, Step 1 mechanism fails."
    - step: 2
      description: "mypy/ast static analysis feedback loop identifies type violations and structural anomalies in syntactically valid code. Applied post-SynCode, it operates on a cleaner input distribution, potentially increasing Z3 eligibility by resolving type inconsistencies that prevent SMT encoding."
      evidence: "mypy.api.run() provides structured type errors; ast structural analysis detects anomalies; SELF-REFINE pattern [Madaan et al. 2023] shows iterative feedback improves code quality."
      falsifier: "If ΔP(Z3_success | after mypy) - P(Z3_success | baseline) ≤ 0, cascade eligibility expansion fails and Step 2 provides no benefit to Step 3."
    - step: 3
      description: "Z3-guided SMT repair addresses arithmetic constraint violations in type-consistent, syntactically valid code. Eligibility (tractable SMT encoding) expands after Steps 1-2 because the code is now structurally cleaner. Z3 repair targets a distinct failure class from mypy/SynCode."
      evidence: "z3-solver Python API; Z3 repairs logically inconsistent assertions by extracting constraints from failing test cases; distinct from syntax/type repair."
      falsifier: "If Z3's Jaccard overlap with mypy repair set is ≥ E[J] (independence expectation) within eligibility-conditioned logical-failure stratum, Step 3 mechanism is not distinct from Step 2."
    - step: 4
      description: "Feature-aware routing (RSS) identifies the most cost-effective repair strategy for each problem based on measurable program features (arithmetic density, type annotation richness, AST depth, baseline syntax invalidity rate, control-flow complexity). This exploits the complementarity pattern learned from HumanEval to achieve near-oracle performance on held-out MBPP at sublinear cost."
      evidence: "Program features are deterministically computable; logistic regression on per-problem features predicts repair success; train/test split (HumanEval/MBPP) eliminates data leakage."
      falsifier: "If RSS pass@1 on MBPP ≤ best_single_method pass@1 (p < 0.05), or if Var_seed >> Var_problem in variance decomposition, routing is not learnable and Step 4 fails."
  key_tension: "Whether complementarity in repair sets reflects genuine mechanistic distinctness (operating on different signal channels) vs. domain restriction (Z3 simply non-applicable to most tasks, mypy non-informative on complex code). Prof. Rex's difficulty-stratification and synthetic perturbation demands address this tension."
  evidence_summary: |
    The causal chain is grounded in three distinct information channels: (1) generation prior (SynCode/CFG),
    (2) structural/type conformance (mypy/ast), and (3) symbolic constraint satisfaction (Z3/SMT).
    These channels are theoretically orthogonal — they access different representations of program correctness.
    The cascade benefit from sequential staging is an empirical question that the experiment will directly measure
    via eligibility expansion at each stage. Evidence quality is INFERRED (MCP unavailable during Phase 1);
    all claims require experimental verification.

