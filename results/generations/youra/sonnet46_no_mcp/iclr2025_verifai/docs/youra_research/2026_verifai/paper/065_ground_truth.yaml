# ============================================================================
# POTENTIAL ADVERSARY ATTACK VECTORS (pre-identified)
# ============================================================================

adversary_attack_vectors:
  - attack: "Claim complementarity hypothesis is falsified"
    defense: >
      The hypothesis is INCONCLUSIVE for SynCode-Z3 (h-m3 not executed),
      REFUTED for mypy-SynCode (precondition unmet, not mechanism failure).
      Paper explicitly states h-m3/h-m4 not executed and positions as open result.
    paper_location: "Sections 6.3, 6.5, 7"

  - attack: "SynCode result is statistically insignificant"
    defense: >
      Paper correctly states statistical significance not achieved at N=20.
      Directional result reported with appropriate caveats. Power analysis included.
      Two independent experiments producing same delta_ast=0.075 provides corroborating evidence.
    paper_location: "Sections 5.3, 6.2"

  - attack: "Null result (mypy 0 type errors) invalidates the research"
    defense: >
      Null result is framed as a scientific contribution: empirical scope boundary for
      mypy-based repair in annotation-free LLM settings. This is the paper's central claim.
      Not all papers must show positive results to contribute.
    paper_location: "Sections 5.2, 6.1, 7"

  - attack: "Z3 eligibility inconsistency between h-e1 (25%) and h-m2 (0%) undermines results"
    defense: >
      Inconsistency is identified, root cause documented (annotation-based vs. assertion-scanning heuristic),
      and the correct measurement (h-e1, 33%) is presented as authoritative. The inconsistency
      does not affect the core FMD finding (type_stratum=0).
    paper_location: "Section 5.4"

  - attack: "Results limited to one model and one benchmark"
    defense: >
      Explicitly acknowledged as L3 limitation. CodeLlama-7B is a standard model;
      HumanEval is a standard benchmark. The findings are model-specific and reproducible —
      a valid contribution even without cross-model generalization.
    paper_location: "Section 6.5"

  - attack: "Citation verification rate is low (12.5%)"
    defense: >
      Explicitly noted: Semantic Scholar MCP unavailable in no-mcp environment.
      Citations are marked [INFERRED] or [VERIFIED]. Author verification required before submission.
      Core experimental results (metrics, tables) are not citation-dependent.
    paper_location: "References section note"

