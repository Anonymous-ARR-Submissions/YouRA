hypothesis_draft:
  title: "Permutation-Equivariant Inductive Bias Advantage in Weight-Space Accuracy Prediction: A Controlled Δρ Benchmark"
  hypothesis_id: "H-NFNDeltaRho-v1"
  core_claim: |
    Under matched encoder capacity (~500K parameters ±5%), permutation-equivariant NFN encoders
    (Navon et al. 2023) achieve Δρ ≥ 0.05 higher Spearman rank correlation than flat MLP encoders
    for test accuracy prediction on the Schurholt MNIST-CNN model zoo, with bootstrap 95% CI
    lower bound > 0, because NFNs operate on the permutation-quotient weight space and direct
    all capacity toward accuracy-predictive features.
  mechanism: |
    Three-step causal chain:
    (1) Feedforward networks have factorial-sized permutation orbit spaces (|S_{n_1}|×...×|S_{n_L}|
        equivalent weight configurations per function) — mathematical fact.
    (2) Flat MLP encoders must navigate these orbits, wasting capacity on redundant representations;
        NFN encoders are equivariant by construction and operate on the quotient space.
    (3) At matched capacity, NFN capacity reallocation produces more consistent embeddings for
        functionally equivalent models → higher Spearman ρ on accuracy prediction.
  predictions:
    - P1: "Δρ ≥ 0.05 on MNIST-CNN (CI lower > 0); Δρ > 0 on CIFAR-10 (CI lower > 0) at matched ~500K params"
    - P2: "Monotone symmetry spectrum: ρ(flat) < ρ(Deep Sets invariant) < ρ(NFN equivariant) on MNIST-CNN"
    - P3: "Mid-accuracy tier (40th–60th percentile) shows largest Δρ — mechanistic fingerprint of orbit navigation cost"

variables_summary:
  independent: "Encoder architecture type: flat MLP / symmetrized MLP (Deep Sets neuron-level) / NFN (Navon et al. equivariant)"
  dependent_primary: "Spearman rank correlation ρ on test accuracy prediction; derived Δρ = ρ(NFN) − ρ(flat MLP) with bootstrap 95% CI"
  controlled: "Total encoder parameter count (~500K ±5%); Schurholt zoo datasets; Spearman ρ evaluation metric"

null_hypothesis:
  h0_statement: |
    There is no significant difference (Δρ = 0) in Spearman rank correlation between
    matched-capacity NFN (Navon et al. equivariant, ~500K parameters) and flat MLP encoders
    for test accuracy prediction on the Schurholt MNIST-CNN and CIFAR-10 model zoos.
  statistical_test: "Bootstrap confidence interval on Δρ (n=1000 resamples); H0 rejected if 95% CI lower bound > 0"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First controlled, matched-capacity Δρ measurement with bootstrap CIs on Schurholt model zoo benchmarks — resolves capacity-confound in prior NFN vs flat MLP comparisons"
  differentiation_summary: |
    Prior work (Navon et al. 2023, Zhou et al. 2023, Schurholt et al. 2023) reports Spearman ρ
    values for equivariant and flat encoders in heterogeneous experimental setups with different
    capacity regimes, making direct comparison unreliable. This work introduces:
    (1) Matched capacity (±5% total parameters via width grid search) as the controlled condition
    (2) Bootstrap 95% CI on Δρ as the statistical inference method
    (3) Cross-zoo consistency analysis (MNIST-CNN vs CIFAR-10 in single experiment)
    (4) Deep Sets symmetrized MLP as an intermediate baseline completing the symmetry spectrum
    None of these four elements have been combined in a single published study.

