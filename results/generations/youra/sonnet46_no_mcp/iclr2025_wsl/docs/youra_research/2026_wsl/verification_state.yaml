      batch normalization), if we analyze the zoo''s weight tensor distribution, then we will

      find a non-trivial proportion of model pairs with similar test accuracy but different

      weight configurations (permutation-equivalent representatives), because feedforward

      neural networks with L layers of widths n_1,...,n_L have |S_{n_1}| × ... × |S_{n_L}|

