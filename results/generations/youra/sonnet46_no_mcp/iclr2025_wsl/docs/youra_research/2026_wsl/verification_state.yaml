main_hypothesis:
  id: H-NFNDeltaRho-v1
  title: 'Permutation-Equivariant Inductive Bias Advantage in Weight-Space Accuracy Prediction: A Controlled Δρ Benchmark'
  statement: 'Under conditions of matched encoder capacity (~500K parameters, ±5% via per-architecture

    width grid search) on the Schurholt et al. MNIST-CNN and CIFAR-10 model zoo benchmarks,

    if we replace a flat MLP encoder with a permutation-equivariant NFN encoder (Navon et al.

    2023 equivariant architecture), then the Spearman rank correlation in test accuracy

    prediction increases by Δρ ≥ 0.05 on the MNIST-CNN zoo (with bootstrap 95% CI lower

    bound > 0), because NFN encoders operate on the permutation-quotient weight space and

    direct all encoder capacity toward accuracy-predictive features rather than navigating

    the factorial-sized permutation orbits that confuse flat MLP encoders.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: Schurholt ModelZooDataset (MNIST-CNN ~4K + CIFAR-10 ~1.5K checkpoints)
    model: Navon et al. equivariant NFN encoder; Deep Sets symmetrized MLP; flat MLP
    optimizer: Adam (pre-registered)
    hyperparameters:
      capacity_target: ~500K parameters ±5%
      capacity_matching: per-architecture layer width grid search
      bootstrap_resamples: 1000
      evaluation_metric: Spearman rank correlation ρ
      train_test_split: Schurholt et al. standard splits
