    type: MECHANISM
    statement: 'Under conditions of matched encoder capacity (~500K parameters ±5%) on the Schurholt

      MNIST-CNN zoo, if we train a flat MLP encoder (concatenated weight vector input) on

      accuracy prediction, then its learned embeddings will exhibit permutation sensitivity

      (different embeddings for permutation-equivalent weight configurations of similar-accuracy

      models), because flat MLPs receive all permutations of a network''s weights as distinct

      input vectors and must learn to map all equivalent permutations to the same output —

      consuming capacity for redundant mappings.

      '
