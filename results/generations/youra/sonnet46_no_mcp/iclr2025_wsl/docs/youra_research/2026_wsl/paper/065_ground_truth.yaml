# ============================================================================
# KNOWN LIMITATIONS (for adversarial review)
# ============================================================================

known_limitations:
  - id: "L1"
    severity: "HIGH"
    description: "Single zoo — CIFAR-10 not executed (download failure)"
    location: "Discussion Section 6.3"
    impact: "Cannot confirm cross-zoo generalization"

  - id: "L2"
    severity: "HIGH"
    description: "Flat MLP uses single narrow hidden layer (width=193) — severe bottleneck"
    location: "Discussion Section 6.3"
    impact: "Δρ estimate may be inflated; true advantage over well-tuned flat MLP may be smaller"

  - id: "L3"
    severity: "MEDIUM"
    description: "H-M3 flat MLP evaluated untrained (H-M1 checkpoint not found at expected path)"
    location: "Discussion Section 6.3 (implicit)"
    impact: "Both trained (ρ=0.1041) and untrained (ρ=0.1688) give similarly poor ρ; conclusion robust"

  - id: "L4"
    severity: "MEDIUM"
    description: "Single capacity point (500K); capacity curve not analyzed"
    location: "Discussion Section 6.3"
    impact: "Unknown whether symmetry hierarchy holds uniformly across capacity spectrum"

  - id: "L5"
    severity: "LOW"
    description: "Single training seed; training variance uncharacterized"
    location: "Discussion Section 6.3"
    impact: "Bootstrap CI covers test-set sampling variance; training variance not quantified"

