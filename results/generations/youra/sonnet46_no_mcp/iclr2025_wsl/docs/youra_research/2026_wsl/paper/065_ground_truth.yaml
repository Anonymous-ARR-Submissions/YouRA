# ============================================================================
# METHODOLOGY (from Phase 3 PRD/Architecture + experiments)
# ============================================================================

methodology:
  algorithm_name: "Neural Functional Network (NFN) encoder — Navon et al. (2023)"
  dataset: "Schurholt et al. MNIST-CNN model zoo (hyp_rand variant)"
  dataset_split:
    train: 1589
    val: 322
    test: 338
    total: 2249
  capacity_target: "~500K parameters (±5%)"
  capacity_range: "[475000, 525000]"

  encoder_architectures:
    flat_mlp:
      hidden_dims: [193]
      embed_dim: 128
      input_dim: 2464
      param_count: 500577
      in_range: true
    deep_sets:
      phi_hidden: 256
      embed_dim: 128
      param_count: 471936
      in_range: true
    nfn:
      channel_dim: 112
      n_layers: 3
      param_count: 521953
      in_range: true

  key_hyperparameters:
    - name: "optimizer"
      value: "Adam (β₁=0.9, β₂=0.999)"
    - name: "learning_rate"
      value: "1e-3 with cosine annealing to 1e-6"
    - name: "epochs"
      value: 150
    - name: "batch_size"
      value: 32
    - name: "weight_decay"
      value: 1e-4
    - name: "loss"
      value: "MSE"
    - name: "seed"
      value: 42

  training_details:
    epochs: 150
    batch_size: 32
    learning_rate: 1.0e-3
    lr_schedule: "cosine annealing to 1e-6"
    optimizer: "Adam"
    weight_decay: 1.0e-4
    loss: "MSE"
    seed: 42
    nfn_best_checkpoint_epoch: 114
    deep_sets_best_checkpoint_epoch: 39
    deep_sets_best_val_loss: 0.0203

  permutation_sensitivity_probe:
    n_pairs: 500
    stratification: "10 accuracy deciles, 50 pairs per decile"
    formula: "sensitivity = E[‖f(w) − f(σ(w))‖₂] / E[‖f(w) − f(w')‖₂]"

