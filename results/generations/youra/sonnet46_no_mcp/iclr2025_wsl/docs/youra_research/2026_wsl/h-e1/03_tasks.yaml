  - id: "task-012"
    epic: "A-2: Data Loading"
    title: "L-2-1: load_via_package ModelZooDataset API integration"
    description: |
      Implement load_via_package with correct ModelZooDataset API:
      - Handle different API versions (zoo[i] vs iter(zoo))
      - Extract state_dict and metrics correctly from dataset items
      - Convert metrics dict to float test_accuracy
      - Add tqdm progress bar for loading indication
      - Return consistent format: [{'state_dict': OrderedDict, 'test_accuracy': float}]
      - Raise ImportError cleanly if modelzoo package not installed
        (allows fallback to load_via_files in load_zoo_checkpoints)
    feature_tag: "data-pipeline"
    priority: 40
    source_document: "03_logic.md"
    complexity: null
