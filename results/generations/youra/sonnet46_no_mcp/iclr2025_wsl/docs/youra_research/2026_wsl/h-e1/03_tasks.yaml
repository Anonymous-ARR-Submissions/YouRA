  - id: "task-004"
    epic: "A-2: Data Loading"
    title: "Implement data_loader.py"
    description: |
      Implement ModelZooDataset loading with dual-path fallback.

      load_zoo_checkpoints(cfg: ExperimentConfig) -> List[Dict[str, Any]]:
        Try load_via_package(cfg) first; on ImportError/Exception fall back to load_via_files(cfg).

      load_via_package(cfg) -> List[Dict]:
        from modelzoo.datasets import ModelZooDataset
        zoo = ModelZooDataset(cfg.zoo_name, split="all", data_dir=str(cfg.data_dir))
        return [{"state_dict": sd, "test_accuracy": acc} for sd, metrics in zoo]

      load_via_files(cfg) -> List[Dict]:
        Use Path(cfg.data_dir).glob("**/*.pt") with tqdm progress bar.
        torch.load(p, map_location="cpu") for each file.
        Extract state_dict and test_accuracy from checkpoint dict.
        Return list of {"state_dict": OrderedDict, "test_accuracy": float}.

      Expected output: ~4,100 dicts with float test_accuracy in [0.85, 0.99].
    feature_tag: "data-pipeline"
    priority: 85
    source_document: "03_architecture.md"
    complexity: 10
    test_requirements: |
      - load_zoo_checkpoints returns non-empty list
      - Each item has 'state_dict' (OrderedDict) and 'test_accuracy' (float) keys
      - test_accuracy values in [0, 1]
