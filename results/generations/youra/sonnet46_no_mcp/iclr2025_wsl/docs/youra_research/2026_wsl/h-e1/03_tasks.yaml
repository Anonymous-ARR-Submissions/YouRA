  - id: "task-014"
    epic: "A-5: Orbit Statistics & Gate"
    title: "L-5-1: compute_orbit_statistics memory-efficient implementation"
    description: |
      Implement memory-efficient compute_orbit_statistics:
      - Flatten weights on-the-fly per pair (do NOT pre-flatten all ~4100 models)
      - Use tqdm progress bar for 500-pair loop
      - Store only scalar cosine_dist per pair (not weight tensors)
      - Memory budget: ~500 pairs × 2 × ~5MB = manageable but flatten on-demand
      - Log progress every 100 pairs
      - Return format: (List[{'decile':int,'cosine_dist':float,'is_orbit_candidate':bool}], float)
    feature_tag: "evaluation"
