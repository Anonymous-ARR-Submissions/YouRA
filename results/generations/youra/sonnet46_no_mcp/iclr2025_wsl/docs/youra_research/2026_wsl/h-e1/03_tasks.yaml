  - id: "task-013"
    epic: "A-2: Data Loading"
    title: "L-2-2: load_via_files direct .pt checkpoint loading"
    description: |
      Implement load_via_files for direct .pt file loading:
      - Glob patterns: cfg.data_dir/**/*.pt and cfg.data_dir/**/*.pth
      - Handle checkpoint formats:
          Format A: {'state_dict': ..., 'metrics': {'test_accuracy': float}}
          Format B: {'state_dict': ..., 'test_accuracy': float}
          Format C: state_dict directly (no wrapper dict)
      - Use map_location="cpu" for all torch.load calls
