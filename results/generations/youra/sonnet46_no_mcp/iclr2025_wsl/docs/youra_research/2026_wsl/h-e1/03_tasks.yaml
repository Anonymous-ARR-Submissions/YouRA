  - id: "task-005"
    epic: "A-3: BN Verification"
    title: "Implement bn_verify.py"
    description: |
      Implement BatchNorm-free verification functions.

      verify_bn_free(state_dict: Dict[str, torch.Tensor]) -> bool:
        bn_keys = [k for k in state_dict.keys()
                   if any(s in k.lower() for s in ['bn', 'batch_norm', 'running_mean', 'running_var'])]
        return len(bn_keys) == 0

      verify_zoo_bn_free(checkpoints: list, sample_size: int = 5, seed: int = 42) -> bool:
        random.seed(seed)
        sample = random.sample(checkpoints, min(sample_size, len(checkpoints)))
        return all(verify_bn_free(c['state_dict']) for c in sample)

      Gate logic: ALL sampled checkpoints must return True.
      Expected: True (Navon et al. 2023 confirms has_bn=False for MNIST-CNN zoo).
    feature_tag: "evaluation"
    priority: 80
    source_document: "03_architecture.md"
    complexity: 7
    test_requirements: |
      - verify_bn_free returns True for state_dict without BN keys
      - verify_bn_free returns False for state_dict with 'running_mean' key
      - verify_zoo_bn_free is deterministic with fixed seed
    reference_files:
      architecture: "03_architecture.md#BNVerifier"
      logic: "03_logic.md#A-4-Weight-Analysis"
      config: "03_config.md#ExperimentConfig"

  - id: "task-006"
    epic: "A-4: Weight Analysis Pipeline"
    title: "Implement weight_analysis.py"
    description: |
      Implement core weight analysis functions.

      Weight tensor shapes for Conv(32)-Conv(64)-FC(128)-FC(10) MNIST-CNN:
        conv1.weight: [32, 1, 3, 3]   conv1.bias: [32]
        conv2.weight: [64, 32, 3, 3]  conv2.bias: [64]
        fc1.weight:   [128, ~2304]    fc1.bias: [128]    (exact size depends on input dims)
        fc2.weight:   [10, 128]       fc2.bias: [10]
        Total: ~500K–1.2M parameters

      flatten_weights(state_dict: Dict[str, torch.Tensor]) -> torch.Tensor:
        return torch.cat([p.detach().float().flatten()
                          for k, p in state_dict.items()
                          if 'weight' in k or 'bias' in k]).cpu()

      compute_cosine_distance(w1: torch.Tensor, w2: torch.Tensor) -> float:
        return (1.0 - F.cosine_similarity(w1.unsqueeze(0), w2.unsqueeze(0))).item()

      stratified_pair_sample(checkpoints, n_per_decile=50, acc_threshold=0.01, seed=42):
        np.random.seed(seed)
        accuracies = np.array([c['test_accuracy'] for c in checkpoints])
        decile_bins = np.percentile(accuracies, np.arange(0, 110, 10))
        pairs = []
        for d in range(10):
            lo, hi = decile_bins[d], decile_bins[d+1]
            in_decile = [c for c in checkpoints if lo <= c['test_accuracy'] <= hi]
            sampled = 0
            indices = list(range(len(in_decile)))
            np.random.shuffle(indices)
            for i in indices:
                for j in indices:
                    if i >= j: continue
                    if abs(in_decile[i]['test_accuracy'] - in_decile[j]['test_accuracy']) < acc_threshold:
                        pairs.append((in_decile[i], in_decile[j], d))
                        sampled += 1
                        if sampled >= n_per_decile: break
                if sampled >= n_per_decile: break
        return pairs
    feature_tag: "data-pipeline"
    priority: 75
    source_document: "03_architecture.md"
    complexity: 11
    test_requirements: |
      - flatten_weights returns 1D float32 CPU tensor
      - compute_cosine_distance returns value in [0, 2]
      - compute_cosine_distance of identical vectors ≈ 0
      - stratified_pair_sample returns ≤ 500 pairs
      - Output is deterministic with fixed seed
    reference_files:
      architecture: "03_architecture.md#WeightAnalysis"
      logic: "03_logic.md#A-4-Weight-Analysis"
      config: "03_config.md#ExperimentConfig"

  - id: "task-007"
    epic: "A-5: Orbit Statistics & Gate"
    title: "Implement orbit_statistics.py"
    description: |
      Implement orbit statistics computation and gate evaluation.

      compute_orbit_statistics(pairs, cosine_dist_threshold=0.1) -> Tuple[List[Dict], float]:
        distances = []
        for m1, m2, decile in pairs:
            w1 = flatten_weights(m1['state_dict'])
            w2 = flatten_weights(m2['state_dict'])
            dist = compute_cosine_distance(w1, w2)
            distances.append({'decile': decile, 'cosine_dist': dist,
                               'is_orbit_candidate': dist > cosine_dist_threshold})
        proportion = float(np.mean([d['is_orbit_candidate'] for d in distances]))
        return distances, proportion

      per_decile_proportions(distances: List[Dict]) -> Dict[int, float]:
        result = {}
        for d in range(10):
            decile_dists = [x for x in distances if x['decile'] == d]
            if decile_dists:
                result[d] = float(np.mean([x['is_orbit_candidate'] for x in decile_dists]))
        return result

      evaluate_gate(bn_free: bool, orbit_proportion: float, threshold=0.05) -> Dict:
        passed = bn_free and (orbit_proportion > threshold)
        return {'passed': passed, 'bn_free': bn_free,
                'orbit_proportion': orbit_proportion, 'threshold': threshold,
                'message': 'PASS' if passed else 'FAIL'}
    feature_tag: "evaluation"
    priority: 70
    source_document: "03_architecture.md"
    complexity: 10
    test_requirements: |
      - compute_orbit_statistics returns (list, float) tuple
      - orbit_proportion in [0, 1]
      - evaluate_gate returns dict with 'passed' bool key
      - evaluate_gate PASS when bn_free=True and proportion=0.5 > 0.05
      - evaluate_gate FAIL when bn_free=False or proportion=0.01 < 0.05
    reference_files:
      architecture: "03_architecture.md#OrbitStatistics"
      logic: "03_logic.md#A-5-Orbit-Statistics-Gate"
      config: "03_config.md#ExperimentConfig"

  - id: "task-008"
    epic: "A-6: Visualization"
    title: "Implement visualization.py"
    description: |
      Implement 4 figure generators saving to cfg.figures_dir.

      plot_gate_metrics(orbit_proportion, per_decile, threshold, save_path):
        Bar chart: overall orbit_proportion vs threshold (horizontal line at 0.05).
        Include per-decile bars. Title: "H-E1 Gate Metrics: Orbit Candidate Proportion".
        Colors: green if proportion > threshold, red otherwise.

      plot_cosine_dist_histogram(distances, save_path):
        Histogram of cosine_dist values for all 500 pairs, colored by decile.
        X-axis: cosine distance [0, 2]. Vertical line at threshold=0.1.

      plot_acc_vs_distance(pairs, distances, save_path):
        Scatter: |Δacc| (y-axis) vs cosine_dist (x-axis) for all pairs.
        Color by decile. Vertical line at cosine_dist=0.1.

      plot_per_decile_proportion(per_decile, threshold, save_path):
        Bar chart: orbit proportion per accuracy decile (0-9).
        Horizontal line at threshold=0.05.

      generate_all_figures(distances, pairs, orbit_proportion, per_decile, cfg):
        Call all 4 plot functions with cfg.figures_dir paths, DPI=150.

      Use VisualizationConfig from config.py for figure sizes and DPI.
    feature_tag: "evaluation"
    priority: 65
    source_document: "03_architecture.md"
    complexity: 9
    test_requirements: |
      - generate_all_figures runs without error with mock data
      - 4 PNG files created in figures_dir
      - Files are non-empty (> 0 bytes)
    reference_files:
      architecture: "03_architecture.md#Visualization"
      logic: "03_logic.md#A-5-Orbit-Statistics-Gate"
      config: "03_config.md#VisualizationConfig"

  - id: "task-009"
    epic: "A-7: Orchestration & Results"
    title: "Implement run_experiment.py"
    description: |
      Implement main experiment orchestration script.

      main(cfg: ExperimentConfig) -> Dict[str, Any]:
        1. set_seed(cfg.seed); setup_logging(); ensure_dirs(cfg)
        2. checkpoints = load_zoo_checkpoints(cfg)          # ~4100 items
        3. bn_free = verify_zoo_bn_free(checkpoints, cfg.bn_verify_sample_size, cfg.seed)
        4. pairs = stratified_pair_sample(checkpoints, cfg.n_per_decile, cfg.acc_threshold, cfg.seed)
        5. distances, orbit_proportion = compute_orbit_statistics(pairs, cfg.cosine_dist_threshold)
        6. per_decile = per_decile_proportions(distances)
        7. gate_result = evaluate_gate(bn_free, orbit_proportion, cfg.orbit_proportion_gate)
        8. generate_all_figures(distances, pairs, orbit_proportion, per_decile, cfg)
        9. results = {gate: gate_result, statistics: {mean_cosine_dist, std_cosine_dist,
                      per_decile_proportions, n_pairs}, metadata: {hypothesis_id, date, seed, zoo_name}}
        10. save_results_yaml(results, cfg.results_dir / "h_e1_results.yaml")
        11. Print gate summary: BN-free status + orbit_proportion + PASS/FAIL
        12. return results

      if __name__ == "__main__": ExperimentConfig() → main(cfg)

      Gate reporting output format (FR-8.1/8.2):
        H-E1 Gate: PASS/FAIL
          BN-free: True/False
          Orbit proportion: 0.XXX (threshold: >0.05)
    feature_tag: "experiment"
    priority: 60
    source_document: "03_architecture.md"
    complexity: 8
    test_requirements: |
      - main() runs end-to-end with real or mock data
      - h_e1_results.yaml created with required keys
      - Gate result printed to stdout
      - Returns dict with 'gate', 'statistics', 'metadata' keys
    reference_files:
      architecture: "03_architecture.md#RunExperiment"
      logic: "03_logic.md#A-5-Orbit-Statistics-Gate"
      config: "03_config.md#ExperimentConfig"

  # ── SUBTASKS — Logic Agent (priority 49-20) ──────────────────────────────────

  - id: "task-010"
    epic: "A-4: Weight Analysis Pipeline"
    title: "L-4-1: flatten_weights edge cases and tensor shape validation"
    description: |
      Implement and test flatten_weights for edge cases:
      - Handle state_dicts with non-standard key names (filter by 'weight'/'bias' substring)
      - Handle mixed precision (convert to float32 explicitly)
      - Validate output shape matches expected total parameter count
      - Document expected tensor shapes for MNIST-CNN: conv1[32,1,3,3], conv2[64,32,3,3],
        fc1[128,N], fc2[10,128] plus all bias vectors
      - Add assertion: output.dtype == torch.float32, output.device == cpu
    feature_tag: "data-pipeline"
    priority: 49
    source_document: "03_logic.md"
    complexity: null
