  - id: "task-010"
    epic: "A-5: Permutation Generation"
    title: "Implement get_mnist_cnn_layer_order and permutation helper functions"
    description: |
      Implement in h-m1/code/probe.py:

      get_mnist_cnn_layer_order() -> LayerOrder:
        Returns permutation spec for Conv(32)-Conv(64)-FC(128)-FC(10):
        [('conv1.weight', 'conv2.weight', 32),
         ('conv2.weight', 'fc1.weight',  64),
         ('fc1.weight',   'fc2.weight',  128)]
        Biases follow outgoing layer permutation.

      Helper functions:
        _permute_conv_out(weight, perm): permute dim-0 of [C_out, C_in, kH, kW]
        _permute_conv_in(weight, perm): permute dim-1 of [C_out, C_in, kH, kW]
        _permute_fc_out(weight, perm): permute rows of [N_out, N_in]
        _permute_fc_in(weight, perm): permute cols of [N_out, N_in]
    feature_tag: "experiment"
    priority: 91
    source_document: "03_logic.md"
    complexity: null
    test_requirements: |
      Create tests/test_probe.py.
      - test_layer_order_keys: Verify layer_order contains 3 tuples with correct keys
      - test_permute_helpers_shape: Verify output shapes unchanged after permutation
    reference_files:
      architecture: "03_architecture.md#A-5"
      logic: "03_logic.md#A-5"
      config: null

  - id: "task-011"
    epic: "A-5: Permutation Generation"
    title: "Implement generate_permuted_weights with conv→fc spatial reshape"
    description: |
      Implement generate_permuted_weights(state_dict, layer_order, seed=None) in h-m1/code/probe.py.
      For each (out_key, in_key, n_neurons) in layer_order:
        1. perm = torch.randperm(n_neurons, generator=rng)
        2. Permute new_sd[out_key] dim-0 AND corresponding bias (out_key.replace('weight','bias'))
        3. For in_key: if FC (dim==2), handle conv->fc boundary with spatial reshape:
             w_in = w_in.view(w_out_size, n, spatial)[:, perm, :].view(w_out_size, -1)
           If conv (dim==4): permute dim-1
      Returns new state_dict with same keys and shapes (functionally equivalent).
      CRITICAL: Functional equivalence preserved — permuted network computes same function.
    feature_tag: "experiment"
    priority: 90
    source_document: "03_logic.md"
    complexity: null
    test_requirements: |
      - test_permuted_same_keys: Verify permuted state_dict has same keys and shapes
      - test_functional_equivalence: Load permuted weights into actual MNIST-CNN, verify same output on same input
    reference_files:
      architecture: "03_architecture.md#A-5"
      logic: "03_logic.md#A-5"
      config: null

