      logic: "03_logic.md#A-6"
      config: null

  - id: "task-013"
    epic: "A-6: Sensitivity Probing"
    title: "Implement equiv and random L2 distance computation loops"
    description: |
      Implement compute_permutation_sensitivity() equiv pairs loop in h-m1/code/probe.py.
      Get pairs via stratified_pair_sample(checkpoints, n_per_decile=50, acc_threshold=0.01, seed=42).
      For each (ckpt_i, ckpt_j, decile):
        e_orig = _embed_state_dict(encoder, ckpt_i['state_dict'], ...)
        perm_sd = generate_permuted_weights(ckpt_i['state_dict'], layer_order, seed=cfg.seed)
        e_perm = _embed_state_dict(encoder, perm_sd, ...)
        equiv_dists.append(torch.norm(e_orig - e_perm).item())
        e_j = _embed_state_dict(encoder, ckpt_j['state_dict'], ...)
        random_dists.append(torch.norm(e_orig - e_j).item())
      Assert len(pairs) >= cfg.min_pairs (50) before loop.
    feature_tag: "experiment"
    priority: 88
    source_document: "03_logic.md"
    complexity: null
    test_requirements: |
      - test_equiv_random_lists_length: Verify equiv_dists and random_dists have same length >= 50
      - test_positive_distances: Verify all L2 distances > 0
    reference_files:
      architecture: "03_architecture.md#A-6"
      logic: "03_logic.md#A-6"
      config: null

  - id: "task-014"
    epic: "A-6: Sensitivity Probing"
    title: "Implement sensitivity score aggregation and result dict"
    description: |
      Complete compute_permutation_sensitivity() in h-m1/code/probe.py.
      Compute:
        mean_equiv = float(np.mean(equiv_dists))
        mean_random = float(np.mean(random_dists))
        sensitivity_score = mean_equiv / (mean_random + 1e-8)
      Return dict:
        sensitivity_score, mean_equiv_L2, mean_random_L2, n_pairs,
        equiv_dists (List[float]), random_dists (List[float])
      Log: [H-M1] Encoder trained. Spearman ρ = {rho:.4f}. Running permutation sensitivity
           probing on {n_pairs} pairs...
      Log result: [H-M1] sensitivity_score={:.4f}, mean_equiv_L2={:.4f}, mean_random_L2={:.4f}
    feature_tag: "experiment"
    priority: 87
    source_document: "03_logic.md"
    complexity: null
