  - id: "task-011"
    epic: "A-9: Orchestration"
    title: "Implement run_experiment.py orchestrator"
    description: |
      Implement main() in run_experiment.py to sequence the full h-m3 experiment.

      Execution order:
        1. set_seed(cfg.seed); device = torch.device("cuda" if available else "cpu")
        2. Create results/ and figures/ dirs
        3. download_cifar_zoo(cfg) — if fails and skip_cifar_if_unavailable=True, proceed
        4. MNIST-CNN flat data → load FlatMLP checkpoint → evaluate_flat_encoder
        5. MNIST-CNN NFN data → load NFN checkpoint → evaluate_nfn_encoder
        6. MNIST-CNN flat data → grid_search_deep_sets → train_deep_sets → evaluate_deep_sets_encoder
        7. CIFAR-10 flat data → train FlatMLP fresh → evaluate_flat_encoder (if available)
        8. CIFAR-10 NFN data → train NFN fresh → evaluate_nfn_encoder (if available)
        9. CIFAR-10 flat data → train DeepSets fresh → evaluate_deep_sets_encoder (if available)
        10. compute_delta_rho_ci for MNIST-CNN and CIFAR-10
        11. compute_tier_analysis on MNIST-CNN test set (P3)
        12. check_hm3_gate(results) → print P1/P2 result
        13. All visualization figures
        14. save_results(results, cfg)

      Error handling:
        - CIFAR-10 unavailable → log and skip steps 7-9
        - Checkpoint missing → retrain with logged warning
        - Log all ρ values as they are computed
    feature_tag: "experiment"
    priority: 90
    source_document: "03_architecture.md"
    complexity: 9
    test_requirements: |
