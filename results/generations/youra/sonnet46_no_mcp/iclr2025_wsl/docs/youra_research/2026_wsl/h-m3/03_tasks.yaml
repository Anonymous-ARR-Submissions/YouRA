    epic: "A-5: CIFAR-10 Training (All Encoders)"
    title: "Train all three encoders on CIFAR-10 zoo"
    description: |
      Train FlatMLP, DeepSets, and NFN from scratch on CIFAR-10 (different weight shapes).
      Implement get_weight_shapes for CIFAR-10 and handle input_dim differences.

      Step 1: get_weight_shapes(zoo_data) → List[tuple]
        Extract weight tensor shapes from CIFAR-10 zoo state_dict keys.
        CIFAR-10 CNNs have different architecture from MNIST-CNN.
        input_dim for flat/DeepSets: sum of all parameter counts per CIFAR-10 model.

      Step 2: CIFAR-10 FlatMLP training
        Reconstruct FlatMLPEncoder with CIFAR-10 input_dim (different from h-m1).
        Same hyperparameters: AdamW lr=1e-3, epochs=150, seed=42.
        Checkpoint: cfg.results_dir / "best_flat_mlp_cifar.pt"

      Step 3: CIFAR-10 NFN training
        Reconstruct NFNEncoder with CIFAR-10 weight_shapes.
        Same hyperparameters as h-m2 (channel_dim=112, n_layers=3).
        Checkpoint: cfg.results_dir / "best_nfn_cifar.pt"

      Step 4: CIFAR-10 DeepSets training
        Grid search phi_hidden for CIFAR-10 input_dim → ~500K params.
        element_dim differs from MNIST-CNN (CIFAR-10 layer sizes).
        Checkpoint: cfg.results_dir / "best_deep_sets_cifar.pt"

      Fallback: If CIFAR-10 unavailable (skip_cifar_if_unavailable=True),
        log warning and return None for all CIFAR-10 results.
    feature_tag: "training"
