  - id: "task-015"
    epic: "A-6 Subtask: compute_tier_analysis"
    title: "Implement accuracy tercile partitioning for P3 mechanistic fingerprint"
    description: |
      Sort test set by true accuracy labels.
      Split into 3 equal terciles: low (bottom 33%), mid (middle 33%), high (top 33%).
      For each tercile: compute Δρ(NFN vs flat) = spearmanr(nfn_preds[mask], labels[mask])[0]
                                                  - spearmanr(flat_preds[mask], labels[mask])[0]
      Return {'low': float, 'mid': float, 'high': float}.
      Check P3: mid > low AND mid > high (non-monotone pattern expected).
