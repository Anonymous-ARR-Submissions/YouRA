        x_elements: (B, N_layers, element_dim)
        after phi (shared Linear): (B, N_layers, phi_hidden)
        after sum pool over dim=1: (B, phi_hidden)
        after rho (Linear stack): (B, embed_dim)
        head: (B, 1) → squeeze → (B,)

