  - id: "task-014"
    epic: "A-6 Subtask: compute_delta_rho_ci paired bootstrap"
    title: "Implement paired bootstrap for Δρ CI"
    description: |
      Paired resampling: resample indices applied to (flat_preds, nfn_preds, labels) simultaneously.
      Per resample: delta = spearmanr(nfn[idx], labels[idx])[0] - spearmanr(flat[idx], labels[idx])[0]
      Point estimate: spearmanr on full arrays (not bootstrap median).
      CI: percentile method (2.5th / 97.5th of boot_deltas list).
