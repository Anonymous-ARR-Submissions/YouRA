  - id: "task-008"
    epic: "A-6: Evaluation & Bootstrap CI"
    title: "Implement Spearman ρ evaluation with bootstrap CI for all encoders"
    description: |
      Implement all evaluation functions in evaluate.py.

      bootstrap_spearman_ci(y_true, y_pred, n_resamples=1000, seed=42):
        rng = np.random.default_rng(seed)
        boot_rhos = []
        for _ in range(n_resamples):
            idx = rng.integers(0, n, size=n)
            rho, _ = spearmanr(y_true[idx], y_pred[idx])
            boot_rhos.append(rho)
        return median(boot_rhos), percentile(2.5), percentile(97.5)

      evaluate_flat_encoder(model, loader, device, n_resamples):
        Batch format: (flat_w: Tensor(B,D), acc: Tensor(B,)) from h-m1 WeightDataset
        Returns: {'rho': float, 'ci_lower': float, 'ci_upper': float,
                  'preds': list, 'labels': list}

      evaluate_deep_sets_encoder(model, loader, device, weight_shapes, n_resamples):
        Reshape flat_w → elements via prepare_flat_elements before forward.
        Same batch format as flat encoder (from load_mnist_flat / load_cifar_flat).

      evaluate_nfn_encoder(model, loader, device, n_resamples):
        Batch format: (weight_list, flat_w, acc) from h-m2 collate_nfn
        Returns same dict structure.

      compute_delta_rho_ci(nfn_preds, flat_preds, labels, n_resamples=1000, seed=42):
        Paired bootstrap: resample (flat_pred_i, nfn_pred_i, label_i) triples together.
        delta_rho_boot = [spearmanr(nfn[idx], labels[idx])[0] -
                          spearmanr(flat[idx], labels[idx])[0]
                          for idx in resamples]
        Returns (delta_rho_point, ci_lower_2.5pct, ci_upper_97.5pct)

      compute_tier_analysis(flat_preds, nfn_preds, labels):
        Sort labels, partition into terciles (low/mid/high accuracy).
        Compute Δρ(NFN vs flat) per tercile.
        Returns {'low': float, 'mid': float, 'high': float}

      check_hm3_gate(results):
        P1: delta_rho_mnist >= 0.05 AND ci_lower_mnist > 0
            AND delta_rho_cifar > 0 AND ci_lower_cifar > 0
        P2: rho_flat_mnist < rho_deep_sets_mnist < rho_nfn_mnist
        Returns (p1_pass: bool, p2_pass: bool)
    feature_tag: "evaluation"
    priority: 93
    source_document: "03_architecture.md"
    complexity: 15
    test_requirements: |
      Create tests/test_evaluate.py:
        - test_bootstrap_spearman_ci_reproducible()
        - test_compute_delta_rho_ci_paired_bootstrap()
        - test_compute_tier_analysis_tercile_partition()
        - test_check_hm3_gate_p1_p2()
    reference_files:
      architecture: "03_architecture.md#Evaluate"
      logic: "03_logic.md#A-6-evaluation"
      config: "03_config.md#gate-thresholds"

