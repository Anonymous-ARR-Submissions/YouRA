  - id: "task-005"
    epic: "A-3: Checkpoint Loading"
    title: "Implement checkpoint loaders for flat MLP and NFN"
    description: |
      Implement load_flat_mlp_checkpoint and load_nfn_checkpoint in models.py.
      Must handle actual checkpoint formats verified from h-m1/h-m2 code.

      CRITICAL: h-m1 checkpoint format (verified from actual code):
        train_encoder() may return model in-memory only (no guaranteed .pt file).
        Probe for both formats:
          1. raw state_dict (OrderedDict of tensors)
          2. {"model_state_dict": state_dict}
        If checkpoint missing → retrain with same hyperparameters as h-m1.

      CRITICAL: h-m2 checkpoint format (verified from actual code):
        Saved as: {"encoder_state": ..., "head_state": ..., "epoch": ..., "val_loss": ...}
        Load with:
          model.encoder.load_state_dict(ckpt["encoder_state"])
          model.head.load_state_dict(ckpt["head_state"])
        If checkpoint missing → retrain with same hyperparameters as h-m2.

      load_flat_mlp_checkpoint(cfg, input_dim) → FlatMLPWithHead:
        Reconstruct FlatMLPEncoder(input_dim=input_dim, hidden_dims=[193], embed_dim=128)
        Load from cfg.hm1_code_dir / "results" / "best_flat_mlp_encoder.pt"

      load_nfn_checkpoint(cfg, weight_shapes) → NFNWithHead:
        Reconstruct NFNEncoder(weight_shapes=weight_shapes, channel_dim=112,
                               embed_dim=128, n_layers=3)
        Load from cfg.hm2_code_dir / "results" / "best_nfn_encoder.pt"
    feature_tag: "model"
    priority: 96
    source_document: "03_architecture.md"
    complexity: 9
