            "deep_sets_cifar": {"phi_hidden": int, "param_count": int}
          }
        }

      save_results(results, cfg):
        json.dump(results, open(cfg.results_dir / "h-m3_results.json", "w"), indent=2)
    feature_tag: "evaluation"
    priority: 92
