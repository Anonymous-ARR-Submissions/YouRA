        Output: figures/tier_delta_rho.png (figsize=(7,5))

      plot_bootstrap_distribution(boot_deltas, ci, figures_dir):
        Histogram of bootstrap Δρ values; shade CI region.
        Vertical line at point estimate and zero.
        Output: figures/bootstrap_dist.png (figsize=(8,5))

      plot_cross_zoo_consistency(results, figures_dir):
        Side-by-side ρ bars: MNIST-CNN vs CIFAR-10 for all three encoders.
        Output: figures/cross_zoo.png (figsize=(10,5))
    feature_tag: "evaluation"
    priority: 91
    source_document: "03_architecture.md"
