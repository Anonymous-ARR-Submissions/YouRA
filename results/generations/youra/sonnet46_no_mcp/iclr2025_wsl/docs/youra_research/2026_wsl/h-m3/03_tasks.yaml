  - id: "task-006"
    epic: "A-4: Deep Sets Training (MNIST-CNN)"
    title: "Train Deep Sets encoder on MNIST-CNN"
    description: |
      Implement train_deep_sets in train.py and run Deep Sets training on MNIST-CNN.

      Training loop (AdamW + CosineAnnealingLR):
        optimizer = AdamW(model.parameters(), lr=cfg.lr, weight_decay=cfg.weight_decay)
        scheduler = CosineAnnealingLR(optimizer, T_max=cfg.t_max, eta_min=cfg.eta_min)
        criterion = MSELoss()
        Early stopping: save best checkpoint by val loss

      Batch format from load_mnist_flat:
        (flat_w: Tensor(B, D), acc: Tensor(B,))
        Reshape flat_w → elements via prepare_flat_elements before forward pass.

      Checkpoint saved to: cfg.results_dir / "best_deep_sets_mnist.pt"
      Format: {"model_state_dict": state_dict, "epoch": int, "val_loss": float,
               "phi_hidden": int, "param_count": int}
    feature_tag: "training"
