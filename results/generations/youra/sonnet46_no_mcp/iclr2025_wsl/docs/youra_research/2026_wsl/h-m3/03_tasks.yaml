  - id: "task-004"
    epic: "A-2: Deep Sets Model"
    title: "Implement DeepSetsEncoder with grid search for ~500K params"
    description: |
      Implement DeepSetsEncoder and DeepSetsWithHead in models.py.
      Add grid_search_deep_sets to find phi_hidden that hits [475K, 525K] params.
      Add prepare_flat_elements to reshape flat weight vectors into set elements.

      DeepSetsEncoder.forward tensor shapes:
        Input:  x_elements (B, N_layers, element_dim)  — padded weight layers
        phi:    (B, N_layers, element_dim) → (B, N_layers, phi_hidden)
        pool:   sum over dim=1 → (B, phi_hidden)
        rho:    (B, phi_hidden) → (B, embed_dim)
        Output: (B, embed_dim)

      DeepSetsWithHead.forward:
        Input:  x_elements (B, N_layers, element_dim)
        Output: (embedding (B, embed_dim), prediction (B, 1))

      Grid search: phi_hidden_candidates = [64, 96, 128, 160, 192, 256]
        For each phi_hidden, construct encoder, count params, return first in [475K, 525K].

      prepare_flat_elements(flat_w, weight_shapes):
        Splits flat_w into per-layer tensors, pads each to max layer dim,
        returns (N_layers, element_dim) tensor.
    feature_tag: "model"
    priority: 97
    source_document: "03_architecture.md"
    complexity: 13
    test_requirements: |
