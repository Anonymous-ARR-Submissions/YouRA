  - id: task-004
    epic: "A-3"
    title: "NPLinear Layer"
    description: |
      Implement NPLinear in models.py — permutation-equivariant linear layer
      (Navon et al. 2023). Maps list of per-layer tensors [B, n_elements_i, in_ch]
      to list [B, n_elements_i, out_ch]. Uses two ModuleLists:
        - diag: nn.Linear(in_ch, out_ch, bias=False) per layer shape
        - bias_terms: nn.Linear(in_ch, out_ch) per layer shape
      forward(Ws): for each Ws[i] of shape [B, n_i, in_ch]:
        pooled = Ws[i].mean(dim=1, keepdim=True)  # [B, 1, in_ch]
        out[i] = diag[i](Ws[i]) + bias_terms[i](pooled).expand_as(diag[i](Ws[i]))
      CRITICAL: preserve equivariant structure — no arbitrary nn.Linear inside encoder.
    feature_tag: model
    priority: 88
    source_document: "03_architecture.md#Epic-A-3"
    complexity: 14
    test_requirements: "Equivariance unit test: permuting neurons in input must produce same output up to permutation. Test all 8 MNIST-CNN weight shapes."
    reference_files:
      - path: "docs/youra_research/20260505_wsl/h-m2/03_architecture.md"
        section: "NPLinear + NFNEncoder + NFNWithHead"
      - path: "docs/youra_research/20260505_wsl/h-m2/03_logic.md"
        section: "A-3: NPLinear Layer"

  - id: task-005
    epic: "A-4"
    title: "NFNEncoder + NFNWithHead + grid_search_nfn"
    description: |
      Implement in models.py:
        - NFNEncoder(weight_shapes, channel_dim, embed_dim=128, n_layers):
            _prepare_inputs: reshape each w to [B, n_elements_i, 1]
            in_proj: NPLinear(1, channel_dim, weight_shapes)
            n_layers-1 NPLinear(channel_dim, channel_dim, weight_shapes) layers
            Global mean pool: stack per-layer means → mean across layers → [B, channel_dim]
            readout: Linear(channel_dim, embed_dim) → [B, embed_dim]
        - NFNWithHead(encoder, embed_dim=128):
            forward returns (embedding [B,128], prediction [B,1]) two-tuple
        - count_params(model): sum(p.numel() for p in model.parameters())
        - grid_search_nfn: iterate channel_dim∈{24,32,40,48,56} × n_layers∈{2,3,4},
          return first (encoder, channel_dim, n_layers, param_count) with
          param_count ∈ [475K, 525K]. Raise ValueError if none found.
    feature_tag: model
    priority: 86
    source_document: "03_architecture.md#Epic-A-4"
    complexity: 13
    test_requirements: "Verify grid_search_nfn finds valid config; NFNEncoder forward produces [B,128]; NFNWithHead returns two-tuple."
    reference_files:
      - path: "docs/youra_research/20260505_wsl/h-m2/03_architecture.md"
        section: "NPLinear + NFNEncoder + NFNWithHead"
      - path: "docs/youra_research/20260505_wsl/h-m2/03_logic.md"
        section: "A-4: NFNEncoder + NFNWithHead"

  - id: task-006
    epic: "A-5"
    title: "Train Loop Adaptation"
    description: |
      Implement train.py adapted from h-m1 for NFN collated batches:
        - TrainHistory dataclass: train_loss, val_loss, train_spearman, val_spearman lists
        - train_encoder(model, train_loader, val_loader, cfg, device):
            Unpack batch as (weight_list, flat_w, acc) — uses weight_list for forward
            Adam(lr=cfg.lr, weight_decay=cfg.weight_decay, betas=cfg.betas)
            CosineAnnealingLR(T_max=cfg.t_max, eta_min=cfg.eta_min)
            MSELoss on (pred.squeeze(), acc)
            Log train/val loss + Spearman rho every epoch
            Save best-val-loss checkpoint to cfg.results_dir/"best_nfn_encoder.pt"
    feature_tag: training
    priority: 84
    source_document: "03_architecture.md#Epic-A-5"
    complexity: 9
    test_requirements: "Verify training loop runs 2 epochs without error; loss decreases; checkpoint saved."
    reference_files:
      - path: "docs/youra_research/20260505_wsl/h-m2/03_architecture.md"
        section: "train_encoder"
      - path: "docs/youra_research/20260505_wsl/h-m2/03_config.md"
        section: "A-5: Train Loop Adaptation"

  - id: task-007
    epic: "A-6"
    title: "NFN Probing"
    description: |
      Implement probe.py for permutation sensitivity probing with NFN encoder:
        - _embed_nfn(encoder, state_dict, weight_key_order, device):
            Discover actual keys at runtime from state_dict
            Extract ordered weight list, add batch dim [1, n_i, 1] per tensor
            encoder.forward in eval+no_grad → squeeze → [embed_dim] CPU tensor
            No mean/std normalization (NFN operates on raw tensors)
        - compute_permutation_sensitivity_nfn(encoder, checkpoints, weight_key_order, cfg, device):
            Reuse stratified_pair_sample from h-e1/code/weight_analysis.py (sys.path insert)
            Reuse generate_permuted_weights from h-m1/code/probe.py
            For each of 500 pairs: compute L2(embed(w), embed(perm(w)))
            sensitivity_score = mean_equiv_L2 / mean_random_L2
            Return dict: {sensitivity_score, mean_equiv_L2, mean_random_L2,
                          n_pairs, equiv_dists, random_dists, decile_scores}
    feature_tag: evaluation
    priority: 82
    source_document: "03_architecture.md#Epic-A-6"
    complexity: 12
    test_requirements: "Verify sensitivity_score > 0; equiv_dists < random_dists on average for well-trained NFN."
    reference_files:
      - path: "docs/youra_research/20260505_wsl/h-m2/03_architecture.md"
        section: "compute_permutation_sensitivity_nfn"
      - path: "docs/youra_research/20260505_wsl/h-m2/03_logic.md"
        section: "A-6: NFN Probing"

  - id: task-008
    epic: "A-7"
    title: "Evaluation + Gate Check"
    description: |
      Implement evaluate.py:
        - compute_spearman(model, loader, device):
            Unpack (weight_list, flat_w, acc) from loader
            model.forward(weight_list) → (embedding, pred)
            spearmanr(pred.cpu().numpy(), acc.cpu().numpy()).statistic
        - run_gate_check_nfn(sensitivity_score, spearman_rho, param_count, n_pairs, cfg):
            gate_absolute = sensitivity_score < cfg.sensitivity_gate_absolute  # 0.1
            gate_relative = sensitivity_score < cfg.sensitivity_gate_relative  # 0.3245
            gate_pass = gate_absolute and gate_relative
            Return full metrics dict with all gate details
        - save_results(results, cfg): save to cfg.results_dir/"h-m2_results.json"
    feature_tag: evaluation
    priority: 80
    source_document: "03_architecture.md#Epic-A-7"
    complexity: 8
    test_requirements: "Verify gate_pass logic with mock sensitivity scores above/below thresholds."
    reference_files:
      - path: "docs/youra_research/20260505_wsl/h-m2/03_architecture.md"
        section: "evaluate"
      - path: "docs/youra_research/20260505_wsl/h-m2/03_logic.md"
        section: "External Dependencies"

  - id: task-009
    epic: "A-8"
    title: "6 Required Figures"
    description: |
