        section: "visualize"
      - path: "docs/youra_research/20260505_wsl/h-m2/03_prd.md"
        section: "FR-7: Visualizations"
      - path: "docs/youra_research/20260505_wsl/h-m2/03_config.md"
        section: "A-8: 6 Required Figures"

  - id: task-010
    epic: "A-9"
    title: "run_experiment.py"
    description: |
      Implement run_experiment.py main entry point:
        1. set_seed(cfg.seed)
        2. load_and_split_dataset_nfn(cfg) → train_ds, val_ds, test_ds, mean, std, all_checkpoints
        3. grid_search_nfn(cfg.weight_shapes, cfg.channel_dim_candidates,
                           cfg.n_layers_candidates, cfg.embed_dim,
                           cfg.target_params_min, cfg.target_params_max)
           → nfn_encoder, channel_dim, n_layers, param_count
        4. Assert param_count in [475K, 525K] before training
        5. NFNWithHead(nfn_encoder) → nfn_model; train_encoder(...) → history
        6. compute_spearman(nfn_model, test_loader, device)
        7. compute_permutation_sensitivity_nfn(nfn_encoder.eval(), all_checkpoints, ...)
        8. run_gate_check_nfn(...) → gate_results
        9. save_results(gate_results, cfg)
        10. Generate all 6 figures
        Log: "[H-M2] NFN trained. Spearman ρ = {rho:.4f}. Running permutation sensitivity probing..."
    feature_tag: integration
    priority: 76
    source_document: "03_architecture.md#Epic-A-9"
    complexity: 9
    test_requirements: "Integration test: run with 2 epochs, 10 pairs — verify results JSON and gate_results dict produced."
    reference_files:
      - path: "docs/youra_research/20260505_wsl/h-m2/03_architecture.md"
        section: "run_experiment"
      - path: "docs/youra_research/20260505_wsl/h-m2/03_config.md"
        section: "A-9: run_experiment.py"

  # ── Subtasks ─────────────────────────────────────────────────────────────────
  # A-3 NPLinear subtasks (4)
  - id: task-011
    epic: "A-3"
    title: "L-3-1: NPLinear shape flattening"
    description: |
      Implement _prepare_ws helper: reshape each Ws[i] (arbitrary shape with batch dim)
      to [B, n_elements_i, in_ch] for conv weights (e.g. [B,32,1,3,3] → [B,32,9])
      and bias weights (e.g. [B,32] → [B,32,1]). This normalization is required
      before applying diag and bias_terms Linear layers.
    feature_tag: model
    priority: 49
    source_document: "03_logic.md#A-3-NPLinear-Layer"
    complexity: null
    test_requirements: "Verify all 8 MNIST-CNN weight shapes produce correct [B, n_i, in_ch] output."
    reference_files:
      - path: "docs/youra_research/20260505_wsl/h-m2/03_logic.md"
        section: "A-3: NPLinear Layer - Subtasks"

  - id: task-012
    epic: "A-3"
    title: "L-3-2: NPLinear diag path"
    description: |
      Implement diag transformation: self.diag[i](Ws_flat[i]) → [B, n_i, out_ch].
      diag ModuleList uses nn.Linear(in_ch, out_ch, bias=False) to avoid double-counting
      bias with the bias_terms path. One Linear per weight shape in weight_shapes.
    feature_tag: model
    priority: 48
    source_document: "03_logic.md#A-3-NPLinear-Layer"
    complexity: null
    test_requirements: "Verify diag output shape [B, n_i, out_ch] for all 8 shapes."
    reference_files:
      - path: "docs/youra_research/20260505_wsl/h-m2/03_logic.md"
        section: "A-3: NPLinear Layer - Subtasks"

  - id: task-013
    epic: "A-3"
    title: "L-3-3: NPLinear bias_terms path"
    description: |
      Implement bias_terms transformation: pool Ws_flat[i] over neuron dim →
      [B, 1, in_ch]; apply self.bias_terms[i] → [B, 1, out_ch]; expand to [B, n_i, out_ch].
      Final: out[i] = diag_out[i] + bias_terms_out[i]. This mean-pool+broadcast
      pattern provides the permutation-invariant correction term.
    feature_tag: model
    priority: 47
    source_document: "03_logic.md#A-3-NPLinear-Layer"
    complexity: null
    test_requirements: "Verify combined output shape [B, n_i, out_ch]; check equivariance: permuting n_i dim in input permutes same dim in output."
    reference_files:
      - path: "docs/youra_research/20260505_wsl/h-m2/03_logic.md"
        section: "A-3: NPLinear Layer - Subtasks"

  - id: task-014
    epic: "A-3"
    title: "L-3-4: NPLinear equivariance unit test"
    description: |
      Write equivariance verification: create random Ws list with MNIST_CNN_WEIGHT_SHAPES,
      apply random neuron permutation to Ws[0] (conv1), run NPLinear forward on both,
      verify output[0] is permuted version of original output[0] (up to float32 tolerance).
      Run for all 8 weight shapes.
    feature_tag: model
    priority: 46
    source_document: "03_logic.md#A-3-NPLinear-Layer"
    complexity: null
    test_requirements: "Test passes for all 8 MNIST-CNN weight shapes with allclose tolerance=1e-5."
    reference_files:
      - path: "docs/youra_research/20260505_wsl/h-m2/03_logic.md"
        section: "A-3: NPLinear Layer - Subtasks"

  # A-4 NFNEncoder subtasks (2)
  - id: task-015
    epic: "A-4"
    title: "L-4-1: NFNEncoder _prepare_inputs + forward pipeline"
    description: |
      Implement NFNEncoder._prepare_inputs(weights): for each weight tensor w,
      reshape to [B, n_elements_i, 1] (adding channel dim for NPLinear in_ch=1).
      Then forward pipeline: in_proj → ReLU → n_layers-1 × (NPLinear → ReLU) →
      global mean pool (stack per-layer [B, n_i, channel_dim].mean(1) → stack → mean(1)
      → [B, channel_dim]) → readout Linear → [B, embed_dim].
    feature_tag: model
    priority: 45
    source_document: "03_logic.md#A-4-NFNEncoder"
    complexity: null
    test_requirements: "Verify output shape [B, 128] for batch of 4 with all 8 weight shapes."
    reference_files:
      - path: "docs/youra_research/20260505_wsl/h-m2/03_logic.md"
        section: "A-4: NFNEncoder + NFNWithHead - Subtasks"

  - id: task-016
    epic: "A-4"
    title: "L-4-2: grid_search_nfn parameter counting"
    description: |
      Implement grid_search_nfn: iterate channel_dim ∈ {24,32,40,48,56} (outer),
      n_layers ∈ {2,3,4} (inner). For each: instantiate NFNEncoder, call count_params.
      Return first config with param_count ∈ [475_000, 525_000].
      Print param counts for all searched configs.
      Raise ValueError with param table if no config found in range.
    feature_tag: model
    priority: 44
    source_document: "03_logic.md#A-4-NFNEncoder"
    complexity: null
    test_requirements: "Verify grid_search_nfn returns valid config with param_count in [475K, 525K] for MNIST_CNN_WEIGHT_SHAPES."
    reference_files:
      - path: "docs/youra_research/20260505_wsl/h-m2/03_logic.md"
        section: "A-4: NFNEncoder + NFNWithHead - Subtasks"

  # A-6 NFN Probing subtasks (2)
  - id: task-017
    epic: "A-6"
    title: "L-6-1: _embed_nfn implementation"
    description: |
      Implement _embed_nfn(encoder, state_dict, weight_key_order, device):
        1. Discover actual state_dict keys matching weight_key_order at runtime
           (keys may be like "module_list.0.weight" — verify from first checkpoint)
        2. Extract tensors in order, move to device
        3. Add batch dim: each tensor t → t.unsqueeze(0) → [1, ...]
        4. Reshape to [1, n_elements_i, 1] for NPLinear in_ch=1 input
        5. encoder.eval(); torch.no_grad(); encoder.forward(weight_list)
        6. Squeeze batch dim → [embed_dim] on CPU
        No mean/std normalization (NFN operates on raw weight tensors).
    feature_tag: evaluation
    priority: 43
    source_document: "03_logic.md#A-6-NFN-Probing"
    complexity: null
    test_requirements: "Verify _embed_nfn returns [128] tensor; same state_dict always produces same embedding."
    reference_files:
      - path: "docs/youra_research/20260505_wsl/h-m2/03_logic.md"
        section: "A-6: NFN Probing - Subtasks"

  - id: task-018
    epic: "A-6"
    title: "L-6-2: compute_permutation_sensitivity_nfn decile breakdown"
    description: |
      Implement decile-level sensitivity breakdown in compute_permutation_sensitivity_nfn:
        - After computing 500 pair distances, group by accuracy decile (50 per decile)
        - decile_scores[d] = mean(equiv_dists[d*50:(d+1)*50]) / mean(random_dists[d*50:(d+1)*50])
        - Include decile_scores (list of 10 floats) in return dict
        - Reuse get_mnist_cnn_layer_order from h-m1/code/probe.py for weight_key_order
        - Reuse stratified_pair_sample from h-e1/code/weight_analysis.py (sys.path insert)
    feature_tag: evaluation
    priority: 42
    source_document: "03_logic.md#A-6-NFN-Probing"
    complexity: null
    test_requirements: "Verify decile_scores has 10 entries; all positive; sum consistent with overall sensitivity_score."
    reference_files:
      - path: "docs/youra_research/20260505_wsl/h-m2/03_logic.md"
        section: "A-6: NFN Probing - Subtasks"

  # Config subtasks (4)
  - id: task-019
    epic: "A-2"
    title: "C-2-1: collate_nfn + load_and_split_dataset_nfn"
    description: |
      Implement collate_nfn(batch): batch is list of (weight_list, flat_w, acc) tuples.
      Stack per layer: batched_weights[i] = torch.stack([item[0][i] for item in batch]).
      Returns (batched_weights: List[Tensor(B,...)], flat_w_batch: Tensor(B,D), acc_batch: Tensor(B,)).
      Implement load_and_split_dataset_nfn(cfg): load dataset, compute z-score from train,
      return (train_ds, val_ds, test_ds, mean, std, all_checkpoints).
    feature_tag: data-pipeline
    priority: 41
    source_document: "03_config.md#A-2-NFNWeightDataset"
    complexity: null
