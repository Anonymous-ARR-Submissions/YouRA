        2. plot_l2_distribution_comparison: side-by-side histograms equiv-pair L2 vs random-pair L2
        3. plot_embedding_pca: PCA 2D scatter colored by accuracy; equiv pairs connected
        4. plot_training_curves: loss + Spearman rho over 150 epochs (train/val)
        5. plot_sensitivity_by_decile: NFN per-decile bar chart (compare to h-m1)
        6. plot_nfn_vs_mlp_decile_comparison: grouped bar NFN vs flat MLP per decile
    feature_tag: visualization
    priority: 78
    source_document: "03_architecture.md#Epic-A-8"
    complexity: 10
    test_requirements: "Verify each figure saves to figures_dir without error."
    reference_files:
