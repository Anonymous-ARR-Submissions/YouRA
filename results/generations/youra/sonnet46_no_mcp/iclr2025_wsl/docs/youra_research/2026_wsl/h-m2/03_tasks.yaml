    reference_files:
      - path: "docs/youra_research/20260505_wsl/h-m2/03_config.md"
        section: "A-2: NFNWeightDataset"

  - id: task-020
    epic: "A-5"
    title: "C-5-1: TrainHistory dataclass + checkpoint saving"
    description: |
      Implement TrainHistory dataclass in train.py (not config.py):
        train_loss, val_loss, train_spearman, val_spearman: List[float] fields.
      Add checkpoint saving logic: save best model when val_loss improves.
      Save: {"encoder_state": nfn_model.encoder.state_dict(),
              "head_state": nfn_model.head.state_dict(),
              "epoch": epoch, "val_loss": best_val_loss}
