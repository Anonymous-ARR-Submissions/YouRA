    statement: "Matched-capacity NFN (Navon et al. equivariant, ~500K params) achieves Δρ ≥ 0.05 over flat MLP on MNIST-CNN zoo and Δρ > 0 on CIFAR-10 zoo, both with bootstrap 95% CI lower bound > 0"
    test_method: "Train all three encoders (flat MLP, symmetrized MLP, NFN) at matched ~500K params on Schurholt zoo train split; evaluate Spearman ρ on held-out test split; compute Δρ and bootstrap 95% CI (n=1000 resamples) for each zoo"
    success_criterion: "Δρ(MNIST-CNN) ≥ 0.05 AND CI_lower(MNIST-CNN) > 0 AND Δρ(CIFAR-10) > 0 AND CI_lower(CIFAR-10) > 0"
    falsification: "Δρ(MNIST-CNN) < 0.05 OR CI_lower(MNIST-CNN) ≤ 0 OR Δρ(CIFAR-10) ≤ 0 OR CI_lower(CIFAR-10) ≤ 0"
  - id: "P2"
    primary: false
    statement: "Symmetry spectrum is monotone on MNIST-CNN: ρ(flat MLP) < ρ(symmetrized MLP [Deep Sets neuron-level]) < ρ(NFN [Navon equivariant]), all at matched ~500K params"
    test_method: "Compare Spearman ρ values for all three encoder types on MNIST-CNN zoo test split at matched capacity; check strict monotone ordering"
    success_criterion: "ρ(flat) < ρ(invariant) AND ρ(invariant) < ρ(equivariant) on MNIST-CNN zoo"
    falsification: "Any ordering violation: ρ(invariant) ≤ ρ(flat) OR ρ(equivariant) ≤ ρ(invariant)"
  - id: "P3"
    primary: false
    statement: "Δρ(NFN vs flat MLP) is largest in the mid-accuracy tier (40th–60th percentile of MNIST-CNN zoo test accuracy distribution), reflecting where permutation-equivalent functional networks are most prevalent"
    test_method: "Partition MNIST-CNN zoo models into terciles by test accuracy; compute ρ(NFN) − ρ(flat MLP) separately for each tier; compare tier-specific Δρ values"
    success_criterion: "Δρ(mid-tier) > Δρ(low-tier) AND Δρ(mid-tier) > Δρ(high-tier)"
    falsification: "Δρ pattern is uniform across tiers (within ±0.01) or inverted (largest at extremes)"
  - id: "P4"
    primary: false
    statement: "[Optional/Exploratory] NFN advantage is largest at ≤100K parameter budget and decreases toward 500K, indicating capacity-efficiency advantage of equivariant inductive bias"
    test_method: "Train all encoders at multiple capacity levels (50K, 100K, 200K, 500K params) and plot ρ vs parameter count; compare convergence speed of NFN vs flat MLP"
    success_criterion: "Δρ(100K) > Δρ(500K) by a margin > 0.02 on MNIST-CNN"
    falsification: "Δρ is constant (within ±0.02) across capacity levels, suggesting capacity-independent advantage"

