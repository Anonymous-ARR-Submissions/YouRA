established_facts:
  claims:
    - claim: "Feedforward neural networks have neuron-permutation symmetry in their weight spaces"
      status: "BUILD_ON"
      evidence: "Mathematical fact established in NFN literature (Navon et al. 2023, Zhou et al. 2023); discussed in Exchange 4 and 10"
    - claim: "Schurholt MNIST-CNN zoo contains ~4,000 models with ground-truth test accuracies"
      status: "BUILD_ON"
      evidence: "Empirical fact from Schurholt et al. (2022) arXiv:2209.12892; CIFAR-10 zoo ~1,500 models"
    - claim: "Spearman ρ is the canonical evaluation metric for weight-space property prediction"
      status: "BUILD_ON"
      evidence: "Field convention established by Unterthiner et al. (2020) arXiv:2002.11448; used by all subsequent model zoo papers"
    - claim: "Deep Sets (Zaheer et al. 2017) provides permutation-invariant function approximation via ρ(Σφ(x_i))"
      status: "BUILD_ON"
      evidence: "Theoretical fact from Zaheer et al. (2017) arXiv:1703.06114; discussed in Exchange 4 and 7"
    - claim: "Navon et al. (2023) equivariant encoder outperforms flat MLP on Schurholt zoo accuracy prediction"
      status: "BUILD_ON"
      evidence: "Reported result in Navon et al. (2023) arXiv:2301.12780; however, comparison is NOT controlled for capacity — this is the gap we fill"
    - claim: "Bootstrap 95% CI on Δρ with matched-capacity controlled comparison has not been reported"
      status: "PROVE_NEW"
      evidence: "Gap identified in Phase 1: no paper provides standardized Δρ at matched ~500K params with bootstrap CIs on both Schurholt zoos"
    - claim: "Symmetry spectrum (flat < invariant < equivariant) ordering holds on Schurholt model zoo"
      status: "PROVE_NEW"
      evidence: "Deep Sets intermediate baseline has never been benchmarked on Schurholt zoos (Gap 3 from Phase 1)"
  scope_reduction_percentage: 57
  phase2b_4_instructions: |
