# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 3
  steps:
    - step: 1
      description: "Feedforward neural networks have factorial-sized permutation orbit spaces in their weight configurations"
      evidence: "For a network with L layers of widths n_1,...,n_L, the same functional network can be represented by |S_{n_1}| × |S_{n_2}| × ... × |S_{n_L}| different weight vectors (neuron permutations within each layer). This is a mathematical fact established in the NFN literature [Navon et al., 2023; Zhou et al., 2023]."
      falsifier: "If feedforward networks were shown to NOT have neuron-permutation symmetry (e.g., due to architectural constraints like tied weights or positional encoding), this step fails. However, plain feedforward CNNs without BN definitively have this symmetry."
    - step: 2
      description: "Flat MLP encoders waste capacity navigating permutation-equivalent weight representations; NFN encoders avoid this by operating on the permutation-quotient space"
      evidence: "A flat MLP receives any permutation of a network's weights as a distinct input vector and must learn to map all equivalent permutations to the same accuracy prediction — consuming capacity for redundant mappings. An NFN, by equivariant construction, maps all permutation-equivalent weight vectors to the same embedding [Navon et al., 2023]."
      falsifier: "If flat MLPs empirically learn permutation-invariant representations despite no structural constraint (demonstrable via probing experiments on the learned embeddings), then the capacity-wasting argument fails."
    - step: 3
      description: "At matched capacity, NFN's capacity reallocation toward accuracy-predictive features produces higher Spearman rank correlation than flat MLP"
      evidence: "If Steps 1 and 2 hold, the NFN encoder should produce more consistent embeddings for functionally equivalent models (same accuracy, different weight permutations), leading to better rank-ordering by accuracy → higher Spearman ρ [consistent with Navon et al. 2023 results, though without matched-capacity control]."
      falsifier: "If Δρ < 0.05 on MNIST-CNN or if bootstrap 95% CI crosses zero on either zoo, Step 3 fails empirically."
  key_tension: "Whether matched-capacity flat MLPs can learn approximate permutation invariance empirically from sufficient zoo training data, partially negating the structural advantage of NFN. Prof. Rex raised this in Exchange 12 (A1 concern)."
  evidence_summary: |
    The causal chain is supported by: (1) mathematical theory of permutation symmetry in weight spaces
    (established fact), (2) theoretical argument from NFN papers that equivariant encoders operate on
    the quotient space (Navon et al. 2023, Zhou et al. 2023), and (3) empirical reports of higher
    Spearman ρ for equivariant encoders in heterogeneous (non-capacity-controlled) comparisons.
    The missing piece — and the core contribution of this hypothesis — is the controlled, matched-capacity
    measurement with bootstrap CIs.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "CIFAR-10 zoo (n≈1,500) provides sufficient statistical power for detecting Δρ ≥ 0.05"
    supporting_evidence: "Bootstrap CI width for Spearman ρ at n=1,500 is approximately ±0.03; Δρ = 0.05 would yield 95% CI ≈ [0.02, 0.08] — marginal but non-zero lower bound. Acknowledged by Prof. Vera (Exchange 2) and Prof. Rex (Exchange 6)."
    consequence_if_violated: "CIFAR-10 result may show CI crossing zero even if true Δρ = 0.04-0.05. Mitigation: relax CIFAR-10 primary success threshold to Δρ > 0 (not ≥ 0.05); MNIST-CNN (n≈4,000) remains primary inference target."
  - id: "A2"
    assumption: "MNIST-CNN zoo models were trained without batch normalization, preserving neuron-permutation symmetry in weight tensors"
    supporting_evidence: "Schurholt et al. (2022) describes MNIST-CNN zoo as plain CNNs; BN would break permutation symmetry (BN parameters are permutation-tied to layer outputs). Flagged by Prof. Rex (Exchange 12)."
    consequence_if_violated: "If MNIST-CNN zoo uses BN, the permutation orbit argument fails and the mechanism prediction is invalid. Must verify from Schurholt et al. (2022) supplementary materials before Phase 4."
  - id: "A3"
    assumption: "Matching total parameter count (±5%) constitutes a fair capacity comparison between flat MLP and NFN encoders"
    supporting_evidence: "Prof. Pax (Exchange 4) and Prof. Rex (Exchange 12) noted that NFN and flat MLP distribute parameters differently (equivariant layers vs. dense matrices). Mitigation: include capacity curves (ρ vs parameter count) as supplementary analysis."
    consequence_if_violated: "If NFN and flat MLP have very different per-parameter efficiencies, matched total count comparison is misleading. Report FLOPs-matched comparison as sensitivity check."
  - id: "A4"
    assumption: "The Schurholt model zoo diversity is representative of the broader population of feedforward networks on MNIST/CIFAR-10"
    supporting_evidence: "Zoo was generated with specific training procedures and constrained hyperparameter ranges. However, for the purpose of this hypothesis, generalizability beyond the zoo is not claimed — the hypothesis is specifically about Δρ ON the Schurholt zoo. Internal validity is sufficient."
    consequence_if_violated: "External validity (generalizing to arbitrary model populations) would be reduced, but internal validity (the Δρ claim on the Schurholt zoo itself) remains intact."
  - id: "A5"
    assumption: "Navon et al. equivariant architecture can be adapted to match ~500K parameter budget via layer width adjustment without compromising architectural integrity"
    supporting_evidence: "The equivariant layer structure of Navon et al. (2023) is parameterized by layer widths; width adjustment is standard practice. The Schurholt zoo weight tensor shapes are documented and the repo supports the relevant architectures."
    consequence_if_violated: "If the minimum meaningful NFN architecture exceeds or cannot be tuned to ~500K params, the capacity matching procedure fails. Pre-check parameter counts before experiments."

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    Feedforward CNN model zoos without batch normalization; test accuracy as the
    prediction target; encoder capacity in the range ~100K–500K parameters;
    specifically the Schurholt et al. MNIST-CNN and CIFAR-10 model zoo benchmarks
    (publicly available, fixed datasets).
  does_not_apply_to: |
    Model zoos with batch normalization (BN breaks neuron-permutation symmetry);
    recurrent or attention-based zoo architectures (different symmetry structure);
    property prediction targets other than test accuracy (e.g., loss, generalization gap);
    encoder capacities outside the ~100K–500K range tested.
  known_limitations: |
    CIFAR-10 zoo small sample size (n≈1,500) limits statistical power — CIFAR-10
    success criterion is relaxed to Δρ > 0 (not ≥ 0.05).
    Results may not generalize to model populations generated with different training
    procedures or architectural families outside the Schurholt zoo.
    The symmetrized MLP (Deep Sets) baseline requires careful implementation at
    neuron-level granularity — wrong granularity (layer-level) could produce
    artificially low ρ and corrupt the symmetry spectrum prediction.

