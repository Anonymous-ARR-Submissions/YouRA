    Phase 4 experiments should focus on the two PROVE_NEW claims:
    (1) Measuring Δρ = ρ(NFN) − ρ(flat MLP) at matched ~500K params with bootstrap 95% CI on both Schurholt zoos.
    (2) Testing whether symmetrized MLP (Deep Sets neuron-level) falls between flat MLP and NFN in Spearman ρ.
    All BUILD_ON facts can be cited as background without experimental verification.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-NFNDeltaRho-v1"
  confidence_level: 0.75
  core_hypothesis_statement: |
    Under conditions of matched encoder capacity (~500K parameters, ±5% via per-architecture
    width grid search) on the Schurholt et al. MNIST-CNN and CIFAR-10 model zoo benchmarks,
    if we replace a flat MLP encoder with a permutation-equivariant NFN encoder (Navon et al.
    2023 equivariant architecture), then the Spearman rank correlation in test accuracy
    prediction increases by Δρ ≥ 0.05 on the MNIST-CNN zoo (with bootstrap 95% CI lower
    bound > 0), because NFN encoders operate on the permutation-quotient weight space and
    direct all encoder capacity toward accuracy-predictive features rather than navigating
    the factorial-sized permutation orbits that confuse flat MLP encoders.
  alternative_hypothesis_h0: |
    There is no significant difference (Δρ = 0) in Spearman rank correlation between
    matched-capacity NFN (Navon et al. equivariant architecture, ~500K parameters) and
    flat MLP encoders for test accuracy prediction on the Schurholt MNIST-CNN and
    CIFAR-10 model zoos.

