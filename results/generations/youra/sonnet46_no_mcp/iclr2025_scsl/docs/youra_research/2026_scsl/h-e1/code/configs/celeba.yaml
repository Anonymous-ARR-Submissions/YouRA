train:
  dataset: "celeba"
  data_root: "./data"
  checkpoint_dir: "./checkpoints/celeba"
  epochs: 50
  checkpoint_interval: 2
  batch_size: 128
  lr: 0.001
  momentum: 0.9
  weight_decay: 0.0001
  seeds: [1, 2, 3, 4, 5]
  num_workers: 4

probe:
  C: 1.0
  max_iter: 1000
  solver: "lbfgs"
  random_state: 42

gate:
  min_window_fraction: 0.10
  p_threshold: 0.05
  min_seeds: 3
  t_star_delta_threshold: 0.02
  t_star_consecutive: 3

paths:
  celeba_root: "./data"
  celeba_spurious_attr: "Blond_Hair"
  celeba_core_attr: "Male"
  celeba_splits:
    train: "train"
    val: "valid"
    test: "test"

results_dir: "./results/h-e1"
