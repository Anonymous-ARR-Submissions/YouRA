    title: GradientAlignmentAnalyzer
    description: |
      Implement gradient_analyzer.py with GradientAlignmentAnalyzer class:
        - extract_features(loader) -> Tuple[Tensor(N,2048), Tensor(N,), Tensor(N,)]
          Frozen backbone (model.eval() + torch.no_grad()), collects features+labels.
        - compute_label_gradient_norm(features, label_tensor, criterion) -> float
          fc-only backward: model.fc.zero_grad() -> logits=model.fc(features) ->
          loss.backward() -> grad_norm=model.fc.weight.grad.norm(p=2).item()
        - log_epoch_gradients(loader, criterion) -> Dict[str, float]
          Calls extract_features + 2x compute_label_gradient_norm,
          returns {spurious_grad_norm, core_grad_norm, gdr=spurious/(core+1e-8)},
          appends to history buffers.
        - get_history() -> Dict[str, List[float]]
          Returns {spurious_grad_norms, core_grad_norms, gdr_series}, length=15.
    feature_tag: model
    priority: 95
    source_document: 03_architecture.md
    complexity: 14
    test_requirements: |
