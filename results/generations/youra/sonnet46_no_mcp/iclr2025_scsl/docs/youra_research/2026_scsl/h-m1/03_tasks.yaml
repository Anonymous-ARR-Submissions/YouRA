  - id: task-013
    epic: A-4
    title: "L-4-2: compute_label_gradient_norm implementation"
    description: |
      Implement GradientAlignmentAnalyzer.compute_label_gradient_norm():
        - features.detach() (no gradient through backbone)
        - model.fc.zero_grad()
        - logits = model.fc(features_detached) [N,2]
        - loss = criterion(logits, label_tensor.to(device))
        - loss.backward()
        - grad_norm = model.fc.weight.grad.norm(p=2).item()
        - model.fc.zero_grad()  # cleanup
        - return grad_norm (positive float)
    feature_tag: model
    priority: 48
    source_document: 03_logic.md
    complexity: null
    test_requirements: Test returns positive float; test fc.weight.grad is None after cleanup.
    reference_files:
      logic: "03_logic.md#pseudo-code-compute_label_gradient_norm"

  - id: task-014
    epic: A-4
    title: "L-4-3: log_epoch_gradients implementation"
    description: |
      Implement GradientAlignmentAnalyzer.log_epoch_gradients():
        - features, core_labels, spurious_labels = self.extract_features(loader)
        - spurious_norm = self.compute_label_gradient_norm(features, spurious_labels, criterion)
        - core_norm = self.compute_label_gradient_norm(features, core_labels, criterion)
        - gdr = spurious_norm / (core_norm + 1e-8)
        - Append all 3 to history buffers
        - Return {'spurious_grad_norm': spurious_norm, 'core_grad_norm': core_norm, 'gdr': gdr}
    feature_tag: model
    priority: 47
    source_document: 03_logic.md
    complexity: null
