    priority: 40
    description: "plot_gate_metrics: bar of std(t*) vs 10-epoch threshold line, scatter of individual seed t* values. plot_delta_timeline: multi-seed delta(t) curves on same axes, vertical dashed lines at each t*."
    reference_files:
      - file: "h-m3/03_logic.md"
        section: "Visualizer"

  - id: C-5-2
    title: "plot_gap_area_boxplot + save_all"
    type: subtask
    parent_epic: A-5
    priority: 39
    description: "plot_gap_area_boxplot: box + strip of gap area per seed, horizontal CI band. save_all: run all applicable plots, return list of saved paths."
    reference_files:
      - file: "h-m3/03_logic.md"
        section: "Visualizer"

  # ── Subtasks for A-8 (Integration Test) ─────────────────────────────────────

  - id: T-8-1
    title: "Integration test: data loading + t* detection"
    type: subtask
    parent_epic: A-8
    priority: 38
    description: "Load H-E1 delta(t) data, run TransitionEpochAnalyzer.analyze_across_seeds(), verify all seeds return valid t* (not None), log per-seed t* values."
    reference_files:
      - file: "h-m3/03_prd.md"
        section: "PoC Success Check"

  - id: T-8-2
    title: "Integration test: gate evaluation + results export"
    type: subtask
    parent_epic: A-8
