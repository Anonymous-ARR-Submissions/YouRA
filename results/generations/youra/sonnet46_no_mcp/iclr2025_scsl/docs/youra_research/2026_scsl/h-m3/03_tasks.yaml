  - id: L-4-2
    title: "evaluate_gate + verify_mechanism_activated + run_full_validation"
    type: subtask
    parent_epic: A-4
    priority: 41
    description: "evaluate_gate: std < 10 PASS, [10,20] PARTIAL-PASS, >= 20 FAIL. verify_mechanism_activated: check 4 indicators. run_full_validation: compose gate + mechanism + CI."
    reference_files:
      - file: "h-m3/03_logic.md"
        section: "A-4: StatisticalValidator — evaluate_gate"

