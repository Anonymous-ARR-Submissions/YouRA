version: "1.0"

metadata:
  hypothesis_id: H-M3
  hypothesis_type: MECHANISM
  tier: FULL
  total_budget: 30
  complexity_score: 12
  complexity_level: Moderate
  created_at: "2026-05-04T17:00:00"
  description: "Transition Epoch t* Reproducibility Analysis — post-hoc statistical analysis of H-E1 delta(t) curves"

budget_summary:
  data_preparation: 0
  environment_setup: 1
  epic_tasks: 8
  subtasks: 14
