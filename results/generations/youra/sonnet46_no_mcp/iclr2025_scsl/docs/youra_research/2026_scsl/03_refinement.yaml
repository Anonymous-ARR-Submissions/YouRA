established_facts:
  claims:
    - claim: "DNNs learn lower-frequency (simpler) features before higher-frequency (complex) features under SGD"
      status: "BUILD_ON"
      evidence: "Frequency Principle [Xu et al. 2019, arXiv:1901.06523] — established empirically across multiple architectures"
    - claim: "DNNs exhibit simplicity bias, preferring simpler features even when complex ones are more predictive"
      status: "BUILD_ON"
      evidence: "Simplicity Bias [Shah et al. 2020, arXiv:2006.07710] — replicated finding"
    - claim: "Shortcut/spurious features emerge in early training epochs before core features solidify"
      status: "BUILD_ON"
      evidence: "Early Phases of Neural Network Training [Mangalam & Girshick 2021] — indirect temporal gap evidence"
    - claim: "GroupDRO/Waterbirds/CelebA are standard benchmarks for spurious correlation with established worst-group accuracy protocols"
      status: "BUILD_ON"
      evidence: "Sagawa et al. 2020 [arXiv:1911.08731] — benchmark paper, widely used"
    - claim: "JTT and DFR are the strongest annotation-free baselines for worst-group accuracy improvement"
      status: "BUILD_ON"
      evidence: "Liu et al. 2021 [JTT, arXiv:2107.09044]; Kirichenko et al. 2022 [DFR, arXiv:2204.02937]"
    - claim: "No systematic measurement protocol quantifies the spurious-vs-core temporal gap on standard benchmarks"
      status: "PROVE_NEW"
      evidence: "Gap identified in Phase 1 literature review — no paper found establishing this protocol"
    - claim: "DFR success is mechanistically explained by the temporal gap phenomenon"
      status: "PROVE_NEW"
      evidence: "Novel causal claim — to be verified by correlating DFR WGA with epochs trained past t*"
  scope_reduction_percentage: 71
  phase2b_4_instructions: |
    Claims marked BUILD_ON are established and should not be re-verified in Phase 2B.
    Phase 2B should focus verification effort on the two PROVE_NEW claims:
    (1) systematic measurement of temporal gap delta(t) on Waterbirds/CelebA, and
    (2) mechanistic correlation between DFR success and epochs trained past t*.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-TemporalGap-v1"
  confidence_level: 0.78
  core_hypothesis_statement: |
    Under standard ERM training on spurious correlation benchmarks (Waterbirds, CelebA),
    if checkpoint linear probing is applied to measure spurious-label and core-label probe
    accuracy at regular training intervals, then a measurable temporal gap delta(t) =
    spurious_probe_acc(t) - core_probe_acc(t) > 0 will be observed during early training,
    because SGD simplicity bias causes spurious (lower-complexity) features to be learned
    faster than core (higher-complexity) features — and the transition epoch t* where delta
    closes explains the success of post-hoc annotation-free methods (DFR, JTT).
  alternative_hypothesis_h0: |
    There is no significant difference in the temporal ordering of spurious vs. core feature
    learning under standard ERM training on Waterbirds/CelebA; delta(t) <= 0 at all training
    checkpoints, and DFR worst-group accuracy improvement is uncorrelated with epochs trained
    past t*.

