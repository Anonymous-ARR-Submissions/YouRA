# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Training epoch / checkpoint"
      type: "continuous"
      operationalization: "Checkpoint saved every 2 epochs during ERM training; range 0 to max_epochs"
    - name: "Dataset"
      type: "categorical"
      operationalization: "Waterbirds (primary), CelebA (replication)"
      levels: ["Waterbirds", "CelebA"]
    - name: "Probe label type"
      type: "categorical"
      operationalization: "Linear probe trained on spurious label (background/hair color) vs. core label (bird species/gender)"
      levels: ["spurious", "core"]
  dependent:
    - name: "Temporal gap delta(t)"
      type: "continuous"
      operationalization: "spurious_probe_acc(t) - core_probe_acc(t) at each checkpoint, measured on held-out validation split; range [-1, 1]"
      primary: true
    - name: "Gap area A"
      type: "continuous"
      operationalization: "Integral of max(delta(t), 0) over all training checkpoints — scalar summary of total temporal gap magnitude"
      primary: false
    - name: "Transition epoch t*"
      type: "continuous"
      operationalization: "First epoch where delta(t) < 0.02 for 3 consecutive checkpoints"
      primary: false
    - name: "Worst-group accuracy (WGA)"
      type: "continuous"
      operationalization: "Accuracy on the worst-performing demographic group in Waterbirds/CelebA test split; standard metric from GroupDRO codebase"
      primary: false
    - name: "DFR WGA improvement vs. epochs past t*"
      type: "continuous"
      operationalization: "Pearson correlation between (DFR WGA - ERM WGA) and (DFR backbone training epochs - t*) across truncated training runs"
      primary: false
  controlled:
    - name: "Architecture"
      operationalization: "ResNet-50 pretrained on ImageNet for all Waterbirds/CelebA experiments"
    - name: "Optimizer"
      operationalization: "SGD with standard hyperparameters from GroupDRO codebase (lr=1e-3, momentum=0.9, weight_decay=1e-4)"
    - name: "Probe type"
      operationalization: "Scikit-learn logistic regression with L2 regularization, trained on frozen backbone features"
    - name: "Probe training split"
      operationalization: "Held-out validation split (not training split) to prevent overfitting artifacts"
    - name: "Random seeds"
      operationalization: "Minimum 3 seeds per experiment for statistical significance"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "SGD optimization exhibits simplicity bias — the loss landscape gradient structure causes lower-complexity (lower-frequency) features to be learned preferentially in early training iterations"
      evidence: "Frequency Principle [Xu et al. 2019]; Simplicity Bias [Shah et al. 2020]; theoretical support from Fourier analysis of gradient descent dynamics"
      falsifier: "If spurious and core features have comparable complexity (similar frequency content), this step fails and delta(t) should be near zero throughout training"
    - step: 2
      description: "In spurious correlation datasets (Waterbirds, CelebA), spurious features (background texture, hair color) are simpler/lower-frequency than core features (bird species morphology, facial structure), causing spurious features to be learned in earlier training epochs"
      evidence: "Mangalam & Girshick 2021 — shortcuts emerge in early phases; implicit in JTT/DFR success patterns"
      falsifier: "If core features are measurably simpler than spurious features in the given dataset, delta(t) would be negative throughout training"
    - step: 3
      description: "The difference in learning speed creates a measurable temporal gap window where linear probes for spurious labels achieve higher accuracy than probes for core labels, persisting until the core features are sufficiently learned (transition epoch t*)"
      evidence: "Novel empirical claim — to be established by the checkpoint probing protocol"
      falsifier: "If delta(t) is statistically indistinguishable from zero at all checkpoints across multiple seeds, this step fails"
    - step: 4
      description: "Post-hoc annotation-free methods (DFR) succeed precisely because they are applied after t* — at which point the backbone encodes sufficient core feature information for last-layer reweighting to select core over spurious features"
      evidence: "DFR [Kirichenko et al. 2022] empirical success; implicit in their finding that ERM backbone 'already encodes core features'"
      falsifier: "If DFR WGA improvement is uncorrelated with epochs trained past t* across truncated training runs, this mechanistic step fails"
  key_tension: "Whether t* identification requires group labels (making the method semi-annotation-free) or can be approximated by a label-free proxy (validation loss variance, gradient norm dynamics)"
  evidence_summary: |
    Steps 1-2 are supported by established theoretical and empirical literature (Frequency Principle, Simplicity Bias, Early Phases). Steps 3-4 are novel empirical claims with strong theoretical motivation but requiring direct verification. The causal chain has a clean hierarchical structure: steps 1-2 are BUILD_ON (established), steps 3-4 are PROVE_NEW (primary experimental contribution).

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Spurious features in Waterbirds/CelebA are measurably simpler (lower-frequency/lower-complexity) than core features, such that SGD simplicity bias causes differential learning speed"
    supporting_evidence: "Consistent with Simplicity Bias literature; spurious features (background texture, hair color) are widely cited as simpler than core features (bird species morphology)"
    consequence_if_violated: "If spurious and core features have comparable complexity, delta(t) will be near zero and the entire hypothesis collapses"
  - id: "A2"
    assumption: "Linear probing at checkpoints provides a faithful measure of feature encoding — higher linear probe accuracy implies that feature is encoded in the representation"
    supporting_evidence: "Linear probe as representation quality measure is standard in self-supervised learning evaluation; widely used diagnostic"
    consequence_if_violated: "If linear probe accuracy does not faithfully reflect feature encoding (e.g., due to representational geometry issues), delta(t) will not measure what we claim"
  - id: "A3"
    assumption: "The temporal gap phenomenon is consistent across random seeds and is not an initialization artifact"
    supporting_evidence: "Simplicity bias is a structural property of gradient descent, not an initialization artifact; should be seed-independent"
    consequence_if_violated: "High variance across seeds would make t* unreliable as an intervention point"
  - id: "A4"
    assumption: "DFR's success is primarily attributable to the backbone encoding core features (rather than last-layer reweighting introducing some other inductive bias)"
    supporting_evidence: "DFR paper explicitly states the ERM backbone 'already encodes core features' — our hypothesis formalizes what this means temporally"
    consequence_if_violated: "If DFR's gains come from a different mechanism (e.g., regularization in last-layer reweighting itself), the mechanistic explanation fails even if delta(t) exists"
  - id: "A5"
    assumption: "Checkpoint saving every 2 epochs provides sufficient temporal resolution to identify t* reliably (t* is not between two checkpoints by a large margin)"
    supporting_evidence: "Standard ERM training on Waterbirds is ~300 epochs; 2-epoch intervals give 150 checkpoints — likely sufficient resolution"
    consequence_if_violated: "t* may be missed if it occurs sharply within a 2-epoch window; can be mitigated by reducing checkpoint interval to 1 epoch in a follow-up run"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Supervised ERM training on image classification benchmarks with spurious correlations (Waterbirds, CelebA)
    - ResNet-50 architecture with ImageNet pretraining
    - Datasets where spurious features are measurably simpler than core features
    - Annotation-free evaluation settings (no group labels at test time)
  does_not_apply_to: |
    - Group-annotated training methods (GroupDRO) — these directly suppress spurious features and may not exhibit a clear delta(t) window
    - Architectures trained from scratch (no pretraining) — temporal dynamics may differ significantly
    - Datasets where spurious and core feature complexity are comparable
    - Generative models, regression tasks, or non-classification settings
  known_limitations: |
    - t* identification in the primary protocol requires group labels (spurious + core) — annotation-free t* identification via proxy is a secondary contribution with higher uncertainty
    - MultiNLI/CivilComments replication requires BERT experiments — added computational cost and may reveal architecture-specific differences
    - All paper IDs are inferred (TEST environment) — verification recommended before Phase 4 implementation

