    primary: true
    statement: "Under standard ERM training on Waterbirds, delta(t) = spurious_probe_acc(t) - core_probe_acc(t) > 0 for a statistically significant contiguous window of early training epochs, replicated across at least 3 random seeds"
    test_method: "Train ResNet-50 ERM on Waterbirds; save checkpoints every 2 epochs; fit held-out-split logistic regression probes for spurious (background) and core (bird species) labels at each checkpoint; compute delta(t) and test significance via paired t-test across seeds"
    success_criterion: "delta(t) > 0 for at least 10% of training epochs (contiguous window), p < 0.05 across seeds, replicated on CelebA"
    falsification: "delta(t) <= 0 at all checkpoints across all seeds on both Waterbirds and CelebA"
  - id: "P2"
    primary: false
    statement: "DFR worst-group accuracy improvement (DFR WGA - ERM WGA) is positively correlated with the number of epochs the ERM backbone was trained past t*"
    test_method: "Run DFR with ERM backbones trained to 5 different epoch checkpoints (before t*, at t*, and 3 points past t*); measure DFR WGA at each; compute Pearson correlation between DFR WGA improvement and (training_epochs - t*)"
    success_criterion: "Pearson r > 0.7, p < 0.05; DFR WGA improvement monotonically increases with epochs past t*"
    falsification: "No significant correlation between DFR WGA improvement and epochs trained past t*"
  - id: "P3"
    primary: false
    statement: "Early stopping at t* followed by last-layer reweighting (using cluster-based pseudolabels or validation-set reweighting) achieves worst-group accuracy within 3 percentage points of DFR while requiring only one training run"
    test_method: "Train ResNet-50 ERM, identify t*, stop at t*, apply LLR with DFR-style reweighting; compare WGA to DFR (full training + LLR) on Waterbirds/CelebA test splits"
    success_criterion: "Early-stop LLR WGA within 3pp of DFR WGA, with at most 50% of DFR computational cost (one vs. two training runs)"
    falsification: "Early-stop LLR WGA more than 5pp below DFR WGA, indicating early stopping is harmful relative to full ERM pretraining"

