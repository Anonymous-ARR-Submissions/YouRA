train:
  dataset: waterbirds
  data_root: ./data/waterbirds
  checkpoint_dir: ./checkpoints/h-m1
  epochs: 30
  checkpoint_interval: 2
  batch_size: 64
  lr: 0.001
  momentum: 0.9
  weight_decay: 0.0001
  seeds: [1, 2, 3]
  num_workers: 4

gdr:
  early_window_epochs: [2, 4, 6]
  p_threshold: 0.05
  min_seeds_pass: 2
  he1_delta_path: null

results_dir: ./results/h-m1
figures_dir: ./figures
