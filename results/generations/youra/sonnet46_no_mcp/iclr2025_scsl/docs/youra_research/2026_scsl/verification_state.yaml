main_hypothesis:
  id: H-TemporalGap-v1
  title: 'Temporal Feature Learning Gap: Measuring and Exploiting the Spurious-Before-Core Dynamics of SGD'
  statement: 'Under standard ERM training on spurious correlation benchmarks (Waterbirds, CelebA),

    if checkpoint linear probing is applied to measure spurious-label and core-label probe

    accuracy at regular training intervals, then a measurable temporal gap delta(t) =

    spurious_probe_acc(t) - core_probe_acc(t) > 0 will be observed during early training,

    because SGD simplicity bias causes spurious (lower-complexity) features to be learned

    faster than core (higher-complexity) features — and the transition epoch t* where delta

    closes explains the success of post-hoc annotation-free methods (DFR, JTT).

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: Waterbirds (primary), CelebA (replication)
    model: ResNet-50 pretrained on ImageNet
    optimizer: SGD (lr=1e-3, momentum=0.9, weight_decay=1e-4)
    hyperparameters:
      checkpoint_interval_epochs: 2
      min_seeds: 3
      recommended_seeds: 5
      probe_type: L2 logistic regression (scikit-learn)
      probe_split: held-out validation split
