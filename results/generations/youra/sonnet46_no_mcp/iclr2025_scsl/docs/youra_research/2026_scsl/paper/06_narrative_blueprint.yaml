section_goals:
  abstract:
    narrative_purpose: "Compress full story — problem, insight, evidence, significance — in ~150 words"
    key_message: >
      SGD learns spurious features before core features in a measurable temporal window (δ(t) > 0);
      this gap is driven by a 7× gradient asymmetry rooted in feature complexity hierarchy;
      we provide the first systematic protocol to measure it on standard benchmarks.
    tone: "Confident, specific, story-driven — not a metrics table"

  introduction:
    narrative_purpose: "Hook → Problem escalation (3 levels) → Key insight preview → Contributions as story"
    hook_strategy: "counterintuitive_finding — model learns wrong answer first, predictably"
    opening_sentence: >
      When a neural network learns to classify birds from photographs, it learns the wrong
      answer first — and does so predictably.
    transition_to_related: >
      Connect to why existing work lacks systematic measurement: 'Despite this widely observed
      phenomenon, no systematic framework exists for measuring how fast spurious features are
      learned relative to core features during training.'

  related_work:
    narrative_purpose: "Show existing work insufficient → justify our measurement framework approach"
    positioning_strategy: >
      Organize by three themes: (1) SGD learning dynamics and simplicity bias — establishes
      theoretical background we build on; (2) spurious correlation benchmarks and mitigation
      methods — shows DFR/JTT are mechanistically ungrounded; (3) linear probing and feature
      analysis — shows our measurement tool is established but not applied to this setting.
    key_comparison_points:
      - area: "SGD dynamics: Frequency Principle & Simplicity Bias"
        limitation: "Theoretical/synthetic — not applied to spurious correlation benchmarks"
        our_advance: "First quantitative operationalization on Waterbirds/CelebA"
      - area: "Spurious correlation methods (GroupDRO, JTT, DFR)"
        limitation: "Heuristic exploitation of training dynamics without mechanistic measurement"
        our_advance: "Systematic δ(t) framework provides mechanistic grounding"
      - area: "Early training dynamics (Mangalam & Girshick 2021)"
        limitation: "Informal observation without quantification or protocol"
        our_advance: "Systematic measurement protocol with statistical validation across seeds"

  methodology:
    narrative_purpose: "Show WHY checkpoint linear probing solves the measurement problem"
    connection_to_insight: >
      'Building on the insight that spurious features are measurably simpler and receive higher
      gradient signal, we design a checkpoint linear probe battery that tracks the evolving
      competition between feature types throughout training.'
    key_design_decisions:
      - decision: "Checkpoint every 2 epochs (not just final model)"
        rationale: "Captures the temporal dynamics that are invisible in final-model analysis"
      - decision: "Separate spurious and core linear probes"
        rationale: "Directly measures the feature-type-specific probe accuracy needed for δ(t)"
      - decision: "Three complexity metrics (FFT, variance, separability) for feature characterization"
        rationale: "Triangulates complexity hierarchy from multiple independent angles"
      - decision: "Gradient instrumentation (per-feature gradient norms)"
        rationale: "Connects the complexity hierarchy to the gradient budget mechanism"
      - decision: "Five sub-hypotheses in sequential verification chain"
        rationale: "Verifies causal chain step-by-step: complexity → gradient → δ(t) → t* → DFR"

  experiments:
    narrative_purpose: "Design experiments that test our specific causal chain claims"
    experimental_questions:
      - "RQ1: Does δ(t) > 0 for a statistically significant contiguous window during ERM training? (H-E1)"
      - "RQ2: Do spurious features receive higher gradient signal than core features in early training? (H-M1)"
      - "RQ3: Are spurious features measurably simpler than core features on multiple complexity metrics? (H-M2)"
      - "RQ4: Is the transition epoch t* a reproducible structural property of SGD across seeds? (H-M3)"
      - "RQ5: Does DFR WGA improvement correlate positively with training depth past t*? (H-M4)"
    dataset_rationale: "Waterbirds: standard spurious correlation benchmark with known group structure for probe label creation"
    baseline_rationale: "ERM baseline (standard training) is the natural comparison; DFR is the strongest annotation-free method"
    metric_rationale: >
      δ(t) and gap area A measure the temporal gap directly; GDR measures gradient mechanism;
      complexity metrics characterize the feature hierarchy; std(t*) measures t* reproducibility;
      DFR WGA measures practical utility.

  results:
    narrative_purpose: "Present the causal chain evidence in order — complexity → gradient → gap → t* → DFR"
    main_result_highlight: >
      δ(t) > 0 confirmed (p = 0.022, 3/3 seeds, 13.3% window) — primary hypothesis supported.
    presentation_order:
      - "H-E1: Primary temporal gap result (δ(t) curves, p-value, window fraction)"
      - "H-M1: Gradient mechanism (GDR = 6.977, persistent asymmetry)"
      - "H-M2: Feature complexity hierarchy (3/3 metrics, 10× sample efficiency)"
      - "H-M3: t* reproducibility (std = 2.00 epochs, structural property confirmed)"
      - "H-M4: DFR analysis (robust WGA + ceiling effect finding as honest negative)"

  discussion:
    narrative_purpose: "Interpret the causal chain, explain the negative finding honestly, connect to broader field"
    key_findings_interpretation:
      - "Three-step causal chain confirmed: complexity → gradient asymmetry → temporal gap"
      - "ImageNet pretraining as dominant factor in DFR success (reframes community understanding)"
      - "t* as structural SGD property — deterministic, not stochastic"
    honest_limitations:
      - "30-epoch PoC (not full 300-epoch training) — window fraction likely understated"
      - "CelebA not replicated (network restriction) — cross-dataset generalizability unconfirmed"
      - "H-M4 metric confound — DFR improvement metric conflates feature quality and ERM ceiling"
      - "Single architecture (ResNet-50 + ImageNet) — transformer generalization untested"

  conclusion:
    narrative_purpose: "Callback to hook + synthesize contributions + open future vision"
    callback_to_hook: >
      'We began by observing that neural networks learn the wrong answer first — predictably.
      We have now measured that predictability: a temporal gap δ(t) that opens in early training,
      peaks at 7× gradient asymmetry, and closes at a reproducible transition epoch t*.'
    memorable_ending: >
      'The measurement framework we introduce transforms an informal observation into a
      quantitative diagnostic — one that can guide the next generation of annotation-free
      methods toward mechanistic rather than heuristic interventions in the ongoing effort
      to make neural networks robust to the shortcuts they inevitably learn first.'

