  paper_title: "Measuring the Spurious-Before-Core Temporal Gap: A Systematic Framework for SGD Feature Learning Dynamics"
  narrative_approach: "Counterintuitive Finding + Measurement Framework"

# ============================================================================
# HOOK DESIGN
# ============================================================================

hook:
  strategy: "Counterintuitive Finding"
  opening_statement:
    content: >
      When a neural network learns to classify birds from photographs, it learns the wrong
      answer first — and does so predictably. Within the first few training epochs, spurious
      background textures (ocean vs. land) dominate the model's gradient signal at roughly
      7× the magnitude of the true bird morphology signal. This is not a bug or an accident:
      it is a structural consequence of SGD simplicity bias, and it follows a reproducible
      temporal pattern we can now measure.
    strategy: "counterintuitive_finding"
    why_it_works: >
      Opens with a concrete, surprising image (model learns wrong answer first), immediately
      quantifies it (7×), and reframes a known problem (spurious correlations) as a measurable
      temporal phenomenon — inviting the reader to ask 'how do you measure that?'

  why_reader_should_care:
    main_reason: >
      Spurious correlations cause state-of-the-art models to fail catastrophically on minority
      groups. Understanding the temporal dynamics of how shortcuts are learned is the missing
      mechanistic layer between the observation ('models use shortcuts') and the intervention
      ('how to prevent it without group labels').
    concrete_example: >
      On Waterbirds, a ResNet-50 trained with standard ERM achieves high average accuracy but
      worst-group accuracy as low as 21.7% at early checkpoints (epoch 1) — while DFR applied
      to the same early checkpoint achieves 80.6% WGA. The temporal dynamics of feature learning
      determine where this gap comes from.
    stakes: >
      Without a systematic measurement framework for the temporal gap, annotation-free methods
      like DFR and JTT remain heuristics without mechanistic grounding, limiting principled
      improvements and cross-domain transfer.

# ============================================================================
# PROBLEM FRAMING (THREE LEVELS)
# ============================================================================

problem_framing:
  surface_problem:
    description: >
      Deep neural networks trained on biased datasets learn spurious correlations — features
      that predict labels in training data but fail under distribution shift. This causes
      significant worst-group accuracy (WGA) drops on standard benchmarks like Waterbirds
      and CelebA.
    common_understanding: >
      The field broadly recognizes that models 'take shortcuts' and that group-balanced training
      (GroupDRO) or post-hoc reweighting (DFR) can mitigate the problem. Most papers treat this
      as a static representation problem.

  deeper_problem:
    description: >
      The spurious correlation problem is fundamentally a temporal dynamics problem: spurious
      features are not merely learned — they are learned FIRST, before core features, in a
      predictable early-training window driven by SGD's gradient asymmetry. Existing methods
      (DFR, JTT) implicitly exploit this temporal structure but without quantifying it.
    why_overlooked: >
      The field focuses on the final trained model's representations, not on the trajectory of
      feature learning during training. Linear probing of intermediate checkpoints (the measurement
      tool we employ) is rarely applied to track the temporal competition between feature types.
    our_perspective: >
      We treat training as a dynamic process where features compete for gradient budget. The
      temporal gap δ(t) = spurious_probe_acc(t) − core_probe_acc(t) is a measurement of this
      competition's outcome at each epoch — a diagnostic tool that has never been systematically
      applied to spurious correlation benchmarks.

  gap_in_existing_work:
    description: >
      No paper establishes a systematic, reproducible protocol for measuring δ(t) on standard
      spurious correlation benchmarks, quantifying the transition epoch t* where spurious
      dominance ends, or characterizing the feature complexity hierarchy that drives this gap.
    why_gap_exists: >
      The connection between SGD's Frequency Principle (lower-frequency features learned first)
      and spurious correlation dynamics (lower-complexity spurious features learned first) has
      not been operationalized as a measurement framework on standard benchmarks. The two
      literatures (optimization theory and fairness/robustness) have developed separately.
    why_gap_matters: >
      Without this measurement framework, we cannot (a) verify mechanistic claims about why
      DFR works, (b) design principled early-stopping criteria for annotation-free methods, or
      (c) predict which features will be learned as shortcuts based on their complexity properties.

# ============================================================================
# KEY INSIGHT
# ============================================================================

key_insight:
  insight_type: "Connection-based"
  aha_moment:
    one_sentence: >
      Spurious features are systematically simpler than core features — measurable by spatial
      frequency, intra-class variance, and linear separability — and SGD's gradient asymmetry
      (GDR ≈ 7×) ensures they are learned first, creating a quantifiable temporal gap that
      closes at a reproducible transition epoch t*.
    expanded_explanation: >
      The key insight connects three independently known phenomena into a causal chain:
      (1) the Frequency Principle — SGD learns lower-frequency components first;
      (2) feature complexity hierarchy — spurious features (background texture) are measurably
      simpler than core features (bird morphology) on 3/3 complexity metrics;
      (3) gradient asymmetry — this complexity difference translates directly into a 7× gradient
      magnitude advantage for spurious features in early training.
      Together, these produce the temporal gap δ(t) > 0, which closes at t* when core features
      accumulate sufficient gradient signal. This is the first quantitative operationalization
      of this three-step causal chain on standard spurious correlation benchmarks.

  why_others_missed_it:
    common_assumptions: >
      Prior work assumed spurious correlation was a static property of the trained model.
      Optimization theory papers (Frequency Principle, Simplicity Bias) worked on synthetic
      tasks without connecting to real-world spurious correlation benchmarks. Fairness/robustness
      papers focused on intervention methods without mechanistic grounding.
    our_different_view: >
      We treat training as a dynamical system and apply linear probing at every checkpoint
      (every 2 epochs) to measure the evolving competition between feature types. This creates
      the δ(t) time series that makes the temporal gap observable and quantifiable.
    enabling_factor: >
      The combination of (a) checkpoint linear probing as a measurement tool, (b) feature
      complexity metrics from computer vision (FFT, variance, separability), and (c) gradient
      instrumentation (per-feature gradient norm tracking) applied jointly to the Waterbirds
      benchmark.

  what_makes_it_work:
    intuitive_explanation: >
      Imagine two students (spurious and core features) competing in an exam. The spurious
      student has simpler material to learn and initially receives more tutoring time (gradient
      signal). By the time the core student catches up (epoch t*), the spurious student already
      has a head start that influences the final model. Our framework measures how big this
      head start is and when it ends.
    key_mechanism: >
      GDR = grad_norm(spurious) / grad_norm(core) ≈ 7 in early epochs, driven by the 10×
      sample efficiency advantage of spurious features (50 vs. 500 samples to 90% probe accuracy).
      This gradient budget imbalance produces δ(t) > 0 for 13.3% of training epochs, closing
      when core probe accuracy catches up at t* (mean=2 epochs, std=2 epochs).

# ============================================================================
# EVIDENCE NARRATIVE
# ============================================================================

evidence_narrative:
  main_claim:
    statement: >
      Under standard ERM training on Waterbirds with ResNet-50, a measurable temporal gap
      δ(t) > 0 exists during early training (window fraction = 13.3%, p = 0.022), driven by
      spurious features being 7× simpler to learn (GDR = 6.977) and 10× more sample-efficient,
      with a reproducible transition epoch t* (std = 2.00 epochs across seeds).
    measurable_criteria:
      - "δ(t) contiguous window ≥ 10% of training epochs (PASS: 13.3%)"
      - "Statistical significance p < 0.05 (PASS: p = 0.022)"
      - "GDR > 1.0 in early epochs (PASS: GDR = 6.977, 598% above threshold)"
      - "3/3 complexity metrics confirm spurious < core (PASS: FFT p=0.033, Var p=0.027, Sep p=0.017)"
      - "std(t*) < 10 epochs across seeds (PASS: std = 2.00 epochs)"

  supporting_evidence:
    - id: "evidence_1_delta"
      what: "δ(t) = spurious_probe_acc(t) − core_probe_acc(t) > 0 for epochs 2–8 (window fraction = 13.3%)"
      so_what: "Confirms primary hypothesis: spurious features ARE learned before core features in a significant contiguous window"
      how_it_supports_claim: "Direct measurement of the temporal gap predicted by SGD simplicity bias theory"
      figure: "fig_1 (delta_curve_waterbirds.png)"

    - id: "evidence_2_gradient"
      what: "Gradient Dominance Ratio (GDR) = 6.977 in early training; spurious grad norm ~0.83 vs. core ~0.118"
      so_what: "Identifies the mechanism: SGD allocates 7× more gradient budget to spurious features in early training"
      how_it_supports_claim: "Mechanistic explanation (H-M1) for WHY spurious features are learned faster"
      figure: "fig_4 (grad_norm_dual_axis.png), fig_5 (gdr_timeline.png)"

    - id: "evidence_3_complexity"
      what: "3/3 complexity metrics show spurious < core (FFT p=0.033, Variance p=0.027, Separability AUC 0.923 vs 0.908 p=0.017)"
      so_what: "Establishes the causal prerequisite: spurious features ARE measurably simpler, which drives the gradient asymmetry"
      how_it_supports_claim: "Feature complexity hierarchy (H-M2) provides the root cause of GDR > 1.0"
      figure: "fig_6 (complexity_comparison.png), fig_7 (complexity_gap.png)"

    - id: "evidence_4_tstar"
      what: "t* detected across all 3 seeds with std = 2.00 epochs (primary threshold sufficient; 95% CI for std = [0.00, 2.31])"
      so_what: "t* is a structural property of SGD, not a stochastic artifact — enables principled use as a training diagnostic"
      how_it_supports_claim: "Reproducibility of t* (H-M3) validates the measurement framework as reliable"
      figure: "fig_8 (delta_timeline.png), fig_11 (gap_area_boxplot.png)"

    - id: "evidence_5_dfr"
      what: "DFR WGA = 0.806–0.871 across all 5 training checkpoints (epochs 1–30); ERM WGA rises from 0.217 to 0.730"
      so_what: "DFR is robustly effective regardless of training depth for pretrained backbones — ImageNet pretraining dominates"
      how_it_supports_claim: "Important negative finding (H-M4): the mechanistic link between t* and DFR improvement requires metric revision"
      figure: "fig_9 (wga_curves.png), fig_12 (scatter_correlation.png)"

  surprising_findings:
    - finding: "DFR achieves WGA = 0.806 at epoch 1 — before any Waterbirds-specific training"
      why_surprising: "The hypothesis predicted DFR would require training past t* to be effective. Instead, ImageNet pretraining alone provides sufficient core feature information for DFR's reweighting to extract."
      our_interpretation: >
        ResNet-50 pretrained on ImageNet already encodes discriminative bird morphology features.
        DFR's class-balanced logistic regression finds these features even without fine-tuning.
        This reveals that ImageNet pretraining is a dominant factor in DFR's success — a finding
        that refines the community's understanding of why DFR works and suggests pretraining
        quality as a key lever for annotation-free robustness.

    - finding: "GDR > 1.0 persists throughout entire training, not just early epochs"
      why_surprising: "We expected gradient asymmetry to decrease after t* as the model 'shifts attention' to core features. Instead, spurious features continue to receive higher gradient signal even as core features are learned."
      our_interpretation: >
        The closing of δ(t) at t* reflects increasing core probe accuracy (core features ARE
        being learned), not decreasing spurious gradient dominance. SGD does not de-prioritize
        spurious features — it simply allocates enough cumulative gradient to core features
        eventually. This distinction matters for designing gradient-based interventions.

  what_results_mean: >
    Together, the evidence establishes a validated three-step causal chain:
    (1) Feature complexity hierarchy (spurious simpler on 3/3 metrics) →
    (2) Gradient asymmetry (GDR = 7× in early training) →
    (3) Temporal gap δ(t) > 0 in early training, closing at reproducible t*.
    The fourth link — t* as threshold for DFR efficacy — requires metric reformulation (use
    DFR absolute WGA, not improvement over ERM, as the dependent variable).

# ============================================================================
# BROADER IMPACT
# ============================================================================

takeaway:
  main_contribution:
    one_sentence: >
      We introduce the first systematic, reproducible measurement framework for the temporal
      gap between spurious and core feature learning in neural networks, validating the
      three-step causal chain (complexity → gradient asymmetry → temporal gap) on
      Waterbirds with ResNet-50.
    why_significant: >
      This framework enables mechanistic grounding for annotation-free spurious correlation
      methods, provides a diagnostic tool for practitioners to measure feature learning
      dynamics, and reveals that DFR's success is driven more by ImageNet pretraining than
      by post-t* feature encoding — refining the field's understanding of why these methods work.

  implications:
    for_field: >
      Bridges the gap between optimization theory (Frequency Principle, Simplicity Bias) and
      practical spurious correlation benchmarks. Provides quantitative operationalization of
      informal observations (Mangalam & Girshick 2021). Opens the door to principled,
      mechanism-guided design of annotation-free robustness methods.
    for_practice: >
      Practitioners can apply checkpoint linear probing every few epochs to measure δ(t) and
      identify t* without group labels — a lightweight diagnostic that requires only a
      held-out validation split. The measurement framework is open-sourceable and applies to
      any spurious correlation benchmark.

  future_possibilities:
    immediate_extensions:
      - "Full 300-epoch training on Waterbirds to quantify t* timing and window fraction in standard training"
      - "CelebA replication to establish cross-dataset generalizability of δ(t) framework"
      - "Redesigned H-M4 with DFR absolute WGA as dependent variable (addresses ceiling effect)"
      - "Label-free t* proxy using GDR inflection point or validation loss curvature"
    longer_term_vision: >
      A training-time diagnostic toolkit that measures feature learning dynamics in real time,
      enabling automatic detection of spurious correlation acquisition and targeted interventions
      (gradient surgery, feature suppression) without requiring group annotations — extending
      to transformer architectures on text spurious correlations (MultiNLI, CivilComments).

