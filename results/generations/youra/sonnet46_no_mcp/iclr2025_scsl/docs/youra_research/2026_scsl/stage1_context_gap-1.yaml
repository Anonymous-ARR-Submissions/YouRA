gap_id: "gap-1"
gap_title: "SGD Temporal Feature Learning Gap — Lack of Systematic Measurement Framework"
gap_description: >
  Frequency Principle and Simplicity Bias establish theoretical basis for why spurious (simpler)
  features are learned first. Mangalam & Girshick 2021 show shortcuts emerge in early training
  phases. However, no systematic measurement framework exists that quantifies the spurious-vs-core
  temporal gap using linear probing at checkpoints across standard spurious correlation benchmarks
  (Waterbirds, CelebA) with standardized protocols.
