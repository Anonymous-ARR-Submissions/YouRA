    trained past t*.
  statistical_test: "Paired t-test on delta(t) across seeds at each checkpoint; Pearson correlation test for P2"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First standardized checkpoint linear probe battery producing delta(t) and gap area A metrics for temporal feature learning dynamics on spurious correlation benchmarks"
  differentiation_summary: |
    Prior work (Frequency Principle, Simplicity Bias, Early Phases of Neural Network Training)
    establishes the theoretical basis for differential feature learning speed but provides no
    systematic measurement protocol on standard spurious correlation benchmarks. JTT and DFR
    exploit the temporal gap heuristically without knowing the mechanism. This work is the first
    to (a) standardize the measurement protocol, (b) define delta(t) and gap area A as
    reproducible metrics, and (c) provide a mechanistic causal explanation for DFR's success
    via the transition epoch t*.

