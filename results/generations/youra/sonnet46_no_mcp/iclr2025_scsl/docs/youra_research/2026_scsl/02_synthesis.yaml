hypothesis_draft:
  title: "Temporal Feature Learning Gap: Measuring and Exploiting the Spurious-Before-Core Dynamics of SGD"
  hypothesis_id: "H-TemporalGap-v1"
  core_claim: |
    Under standard ERM training on spurious correlation benchmarks (Waterbirds, CelebA),
    SGD optimization produces a measurable temporal gap delta(t) = spurious_probe_acc(t) -
    core_probe_acc(t) > 0 during early training, because SGD simplicity bias causes spurious
    (lower-complexity) features to be learned faster than core (higher-complexity) features.
    The transition epoch t* where this gap closes mechanistically explains the success of
    annotation-free post-hoc methods (DFR, JTT).
  mechanism: |
    SGD gradient descent exhibits simplicity bias (Frequency Principle, Simplicity Bias
    literature): lower-complexity features generate lower-variance, higher-magnitude gradient
    signals and are therefore learned preferentially in early training. In spurious correlation
    datasets, spurious features (background texture in Waterbirds, hair color in CelebA) are
    measurably simpler than core features (bird species morphology, gender), causing spurious
    features to be encoded in the backbone before core features. This creates a window during
    which linear probes for spurious labels outperform probes for core labels. At transition
    epoch t*, core features have been sufficiently learned and the gap closes. DFR succeeds
    because it applies last-layer reweighting after t*, at which point the backbone already
    encodes core features.
  predictions:
    - P1: "delta(t) > 0 for a statistically significant contiguous window of early training, replicated across seeds and on Waterbirds + CelebA"
    - P2: "DFR worst-group accuracy improvement positively correlates (r > 0.7) with epochs trained past t*"
    - P3: "Early stopping at t* + last-layer reweighting achieves WGA within 3pp of DFR with 50% less compute"

variables_summary:
  independent: "Training epoch (continuous), dataset (Waterbirds/CelebA), probe label type (spurious/core)"
  dependent_primary: "delta(t) = spurious_probe_acc(t) - core_probe_acc(t) on held-out validation split"
  controlled: "ResNet-50 architecture, SGD optimizer with GroupDRO hyperparameters, L2 logistic regression probe, minimum 3 random seeds"

null_hypothesis:
