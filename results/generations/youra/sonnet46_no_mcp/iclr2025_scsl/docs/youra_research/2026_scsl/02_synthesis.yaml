measurement_plan:
  data_collection:
    - source: "Waterbirds dataset via kohpangwei/group_DRO codebase"
    - source: "CelebA dataset via kohpangwei/group_DRO codebase"
    - source: "Checkpoint files saved every 2 epochs during ERM training"
  procedure:
    - step: "Train ResNet-50 ERM on Waterbirds for full training schedule (approx. 300 epochs); save checkpoint every 2 epochs"
    - step: "At each checkpoint, extract frozen backbone features for all samples in held-out validation split"
    - step: "Fit L2 logistic regression probe for spurious label (background); record probe accuracy"
    - step: "Fit L2 logistic regression probe for core label (bird species); record probe accuracy"
    - step: "Compute delta(t) = spurious_acc(t) - core_acc(t) at each checkpoint"
    - step: "Identify t* as first epoch where delta(t) < 0.02 for 3 consecutive checkpoints"
    - step: "Compute gap area A = sum of max(delta(t), 0) over all checkpoints"
    - step: "Repeat for 3 random seeds; run paired t-test on delta(t) curves"
    - step: "Replicate full protocol on CelebA"
    - step: "Run DFR with 5 truncated ERM backbones (t*-20, t*, t*+20, t*+50, full); measure DFR WGA; compute Pearson r"
  success_criteria:
