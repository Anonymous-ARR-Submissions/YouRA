      compute_separability_metric(): run for spurious and core labels, compute
      auc_ratio and direction_correct (spurious_auc < core_auc → simpler).
    acceptance_criteria:
      - "probe_learning_curve() returns accs shape (3,7) (seeds × n_samples)"
      - "AUC computed via trapz on log-normalized N axis"
      - "samples_to_90pct returns first N where mean_acc >= 0.90 (None if not reached)"
      - "compute_separability_metric() direction_correct=True when spurious reaches 90% with fewer samples"
      - "3 seeds × 7 N values = 21 LogisticRegression fits per label type"
    reference_files:
      - file: "03_architecture.md"
        section: "SeparabilityMetric (complexity_metrics/separability_metric.py)"
      - file: "03_logic.md"
        section: "A-8: Linear Separability Probe"

  - id: "A-9"
