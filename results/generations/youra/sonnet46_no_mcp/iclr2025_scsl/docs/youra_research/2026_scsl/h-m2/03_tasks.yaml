      Clone kohpangwei/group_DRO repository and verify Waterbirds dataset.
      Confirm metadata.csv and segmentation mask files are present.
      Cache at .data_cache/datasets/waterbirds/.
      If masks unavailable, log fallback to quadrant-based extraction.
    acceptance_criteria:
      - ".data_cache/datasets/waterbirds/ exists with metadata.csv"
      - "4795 train images verified"
      - "Segmentation masks present (or fallback logged)"
    reference_files:
