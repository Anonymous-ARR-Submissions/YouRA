      extract_features(): batch inference (B=256), returns (N,2048) numpy float32, no gradient.
      extract_split_features(): convenience wrapper for spurious/core separate loaders.
    acceptance_criteria:
      - "model.training == False after build_model()"
      - "All parameters frozen (requires_grad=False)"
      - "extract_features() output shape (N,2048) float32"
      - "No gradient computed (torch.no_grad() context)"
      - "Batch size 256 used for inference"
    reference_files:
      - file: "03_architecture.md"
        section: "ResNetExtractor (feature_extractor/resnet_extractor.py)"
      - file: "03_config.md"
        section: "ModelConfig"

  - id: "A-6"
    title: "FFT Complexity Metric — mean spatial frequency (metric1)"
    type: "evaluation"
    priority: 88
    complexity: 11
    description: >
      Implement fft_metric.py:
      compute_mean_spatial_frequency(patch): grayscale → fft2 → fftshift → power spectrum
      → radial freq grid → power-weighted mean. Returns float (lower=simpler).
      compute_fft_metric(spurious_patches, core_patches): vectorized over patches,
      ttest_ind, direction_correct check. Returns dict with t_stat, p_value, direction_correct.
    acceptance_criteria:
      - "compute_mean_spatial_frequency() returns float in [0, 0.5]"
      - "Smooth patch (constant image) returns near-zero frequency"
      - "compute_fft_metric() processes 9590 patches in <60s on CPU"
      - "Returns direction_correct=True when spurious_mean_freq < core_mean_freq"
      - "p_value computed via scipy.stats.ttest_ind"
    reference_files:
      - file: "03_architecture.md"
        section: "FFTMetric (complexity_metrics/fft_metric.py)"
      - file: "03_logic.md"
        section: "A-6: FFT Complexity Metric"

  - id: "A-7"
    title: "Intra-class Variance Metric — layer-4 feature variance (metric2)"
    type: "evaluation"
    priority: 87
    complexity: 9
    description: >
