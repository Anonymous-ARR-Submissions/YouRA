        section: "A-3: Waterbirds Data Pipeline / L-3-2"

  - id: "L-8-1"
    title: "probe_learning_curve: LogisticRegression sweep with log-AUC"
    type: "subtask"
    parent_epic: "A-8"
    priority: 47
    description: >
      Implement probe_learning_curve() with seed loop × N loop.
      For each (seed, N): rng.choice(len(features), min(N, len), replace=False).
      Compute log-normalized AUC via trapz on log10(n_samples_list).
      samples_to_90pct: first N where mean_acc >= 0.90.
    reference_files:
      - file: "03_logic.md"
        section: "A-8: Linear Separability Probe / L-8-1"

  - id: "L-8-2"
    title: "compute_separability_metric: auc_ratio and direction_correct"
    type: "subtask"
    parent_epic: "A-8"
    priority: 46
    description: >
      Implement compute_separability_metric() calling probe_learning_curve for both
      spurious_labels and core_labels. Compute auc_ratio = spurious_auc / core_auc.
      direction_correct = True when spurious_auc < core_auc (simpler = lower AUC needed).
    reference_files:
      - file: "03_logic.md"
        section: "A-8: Linear Separability Probe / L-8-2"

  - id: "L-2-1"
    title: "extract_from_mask: bounding box crop with degenerate fallback"
    type: "subtask"
    parent_epic: "A-2"
    priority: 45
    description: >
      Implement extract_from_mask() using binary mask: compute fg/bg bounding boxes
      via np.where; crop and resize to (64,64,3) uint8. If mask sum < 100px or
      bounding box < 16x16, trigger degenerate fallback to extract_quadrant.
    reference_files:
      - file: "03_logic.md"
        section: "A-2: Patch Extractor / L-2-1"

  - id: "L-2-2"
    title: "extract_celeba_patches: hair/face crop with resize"
    type: "subtask"
    parent_epic: "A-2"
    priority: 44
    description: >
      Implement extract_celeba_patches() in PatchExtractor:
      hair_patch = image[:int(H*hair_top_frac), :, :] → resize to (64,64,3).
      face_patch = center crop (face_crop_size × face_crop_size) → resize to (64,64,3).
      Both as uint8 numpy arrays.
    reference_files:
      - file: "03_logic.md"
        section: "A-2: Patch Extractor / L-2-2"

  - id: "L-9-1"
    title: "evaluate_gate: >=2/3 metrics gate with Waterbirds primary"
    type: "subtask"
    parent_epic: "A-9"
    priority: 43
    description: >
      Implement evaluate_gate() iterating over 3 metric results for Waterbirds:
      count metrics where direction_correct=True AND p_value < alpha.
      gate_pass = (n_metrics_pass_waterbirds >= 2). Also check CelebA directional match.
      Return dict with gate_pass, n_metrics_pass_waterbirds, n_metrics_pass_celeba, gate_label.
    reference_files:
      - file: "03_logic.md"
        section: "A-9: Statistical Analysis & Gate / L-9-1"

  - id: "L-9-2"
    title: "compute_complexity_delta_ci: 10k bootstrap 95% CI"
    type: "subtask"
    parent_epic: "A-9"
    priority: 42
    description: >
      Implement compute_complexity_delta_ci() with 10000 bootstrap resamples (seed=42).
      delta_obs = mean(core_vals) - mean(spurious_vals).
      Bootstrap: resample both arrays, compute delta each iteration.
      CI = np.percentile(deltas, [2.5, 97.5]). ci_low > 0 → significant.
    reference_files:
      - file: "03_logic.md"
        section: "A-9: Statistical Analysis & Gate / L-9-2"

  - id: "L-6-1"
    title: "compute_mean_spatial_frequency: FFT power-weighted mean"
    type: "subtask"
    parent_epic: "A-6"
    priority: 41
    description: >
      Implement compute_mean_spatial_frequency():
      grayscale = patch.mean(axis=-1); fft = np.fft.fft2(grayscale);
      power = abs(fftshift(fft))^2; freq_grid = sqrt(fftfreq(W)^2 + fftfreq(H)^2).
      return (power * freq_grid).sum() / power.sum(). Range [0, 0.5].
    reference_files:
      - file: "03_logic.md"
        section: "A-6: FFT Complexity Metric / L-6-1"

  - id: "L-6-2"
    title: "compute_fft_metric: vectorized over patches with t-test"
    type: "subtask"
    parent_epic: "A-6"
    priority: 40
    description: >
      Implement compute_fft_metric(): apply compute_mean_spatial_frequency() to each patch
      in spurious_patches (N,64,64,3) and core_patches. Use list comprehension or vectorized ops.
      scipy.stats.ttest_ind(spurious_freqs, core_freqs). direction_correct = spurious_mean < core_mean.
    reference_files:
      - file: "03_logic.md"
        section: "A-6: FFT Complexity Metric / L-6-2"

  - id: "L-4-1"
    title: "extract_celeba_patches (module): stratified group sampling"
    type: "subtask"
    parent_epic: "A-4"
    priority: 39
    description: >
