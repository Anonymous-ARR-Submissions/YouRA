    acceptance_criteria:
      - "compute_intraclass_variance() returns positive scalar"
      - "compute_variance_metric() returns dict with var_spurious, var_core, t_stat, p_value"
      - "direction_correct=True when var_spurious < var_core"
      - "per_feature_var arrays shape (2048,)"
    reference_files:
      - file: "03_architecture.md"
        section: "VarianceMetric (complexity_metrics/variance_metric.py)"
      - file: "03_logic.md"
        section: "A-7: Intra-class Variance Metric (if present)"

  - id: "A-8"
    title: "Linear Separability Probe — learning curve AUC (metric3)"
    type: "evaluation"
    priority: 86
    complexity: 13
    description: >
      Implement separability_metric.py:
