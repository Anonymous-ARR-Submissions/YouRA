  # ============================================================
  # FAILSAFE TASK (priority 1)
  # ============================================================

  - id: "F-1"
    title: "Failsafe: Pipeline continuation checkpoint"
    type: "failsafe"
    priority: 1
    description: >
      If experiment fails mid-run, save partial results to results/partial_results_h_m2.json.
