# Stage 1 Context for Gap 1
gap_id: "gap-1"
gap_title: "Joint KV Cache Eviction and Fine-Tuning Co-Optimization"
gap_description: |
  KV cache eviction methods (H2O, StreamingLLM, SnapKV) are applied post-hoc to
  pre-trained or separately fine-tuned models. PEFT methods (AdaLoRA, DoRA) are
  applied without awareness of KV cache budget constraints. A systematic study on
  whether eviction-aware fine-tuning (training adapters while simulating reduced KV
  cache budgets) improves both throughput and task accuracy on LongBench/SCROLLS
  compared to sequential baselines is missing.
papers_folder: "docs/youra_research/20260504_scope/papers/"
github_repos:
  - "https://github.com/FMInference/H2O"
  - "https://github.com/mit-han-lab/streaming-llm"
  - "https://github.com/huggingface/peft"
archon_queries:
  - "KV cache eviction PEFT co-optimization joint training"
  - "eviction-aware fine-tuning LongBench"
exa_search_terms:
  - "KV cache eviction fine-tuning co-optimization"
  - "LoRA KV cache budget-aware training"
