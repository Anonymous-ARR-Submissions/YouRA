main_hypothesis:
  id: H-EvictionAwareLoRA-v1
  title: 'Eviction-Aware LoRA: Joint KV Cache Budget Simulation and Adapter Fine-Tuning for Long-Context LLMs'
  statement: 'Under long-context LLM fine-tuning with fixed KV cache budget constraints,

    if LoRA adapters are trained with hard H2O-style KV eviction masks applied

    during the forward pass (simulating budget ratio r in {25%, 50%, 75%}),

    then per-category LongBench accuracy will exceed the sequential baseline

    (standard LoRA fine-tuning followed by H2O eviction at inference only)

    by >=2% at r=50% KV retention across >=4/6 LongBench task categories on both

    LLaMA-2-7B and Mistral-7B-v0.1,

    because adapters trained under token-position scarcity learn more

    information-efficient attention representations that extract higher utility

    from surviving KV cache entries (token-scarcity regularization mechanism).

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: LongBench + LongAlpaca-12k
    model: LLaMA-2-7B + Mistral-7B-v0.1
    optimizer: AdamW (default HuggingFace PEFT)
    hyperparameters:
      lora_rank: 16
      lora_alpha: 32
      lora_dropout: 0.05
      eviction_policy: H2O (fixed — same for training simulation and inference)
      kv_budget_ratios:
      - 0.25
      - 0.5
      - 0.75
      fine_tuning_dataset: LongAlpaca-12k
      evaluation_dataset: LongBench (full test set, 21 tasks)
