  - id: "task-006"
    epic: "A-3 H2O Attention Wrapper"
    title: "Subtask L-3-2: Implement forward() — logit-level mask injection"
    description: |
      Implement H2OEvictionAwareAttention.forward() training path:
      1. Compute q/k projections from base_attention
      2. Build attn_scores = matmul(q, k.T) * scale
      3. evict_mask = ~h2o_mask(attn_scores)
      4. additive = attention_mask.clone() masked_fill(evict_mask, -inf)
      5. Delegate full forward to base_attention with modified mask
      See 03_logic.md pseudo-code for exact implementation.
    feature_tag: "model"
    priority: 48
    source_document: "03_logic.md"
    complexity: null
