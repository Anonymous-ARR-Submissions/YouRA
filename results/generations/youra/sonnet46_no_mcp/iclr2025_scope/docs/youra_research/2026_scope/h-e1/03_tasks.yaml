  # ── Subtask L-3-1 ──────────────────────────────────────────────────────────
  - id: "task-005"
    epic: "A-3 H2O Attention Wrapper"
    title: "Subtask L-3-1: Implement h2o_mask() — cumulative score thresholding"
    description: |
      Implement H2OEvictionAwareAttention.h2o_mask(attn_scores: [B,H,T_q,T_k]):
      1. softmax(attn_scores) with no_grad → scores [B,H,T_q,T_k]
      2. importance = scores.sum(dim=2) → [B,H,T_k]
      3. sort descending, cumsum, divide by total
      4. keep where cumsum/total <= kv_budget_ratio
      5. scatter back to original order, expand to [B,H,T_q,T_k]
      Returns bool keep-mask.
    feature_tag: "model"
    priority: 49
    source_document: "03_logic.md"
    complexity: null
    test_requirements: |
      - Test mask shape equals attn_scores shape
      - Test fraction of True entries ≈ kv_budget_ratio
    reference_files:
      architecture: null
      logic: "03_logic.md#subtask-l-3-1-h2o_mask----cumulative-score-thresholding"
      config: null

