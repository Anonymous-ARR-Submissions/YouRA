# ============================================================================
# METHODOLOGY (from 03_refinement.yaml, h-e1/03_prd.md, h-m1/03_prd.md)
# ============================================================================

methodology:
  method_name: "Eviction-Aware LoRA"
  also_called: "token-scarcity regularization"
  core_mechanism: "H2O eviction masks applied during LoRA forward pass via hook-based injection"

  key_hyperparameters:
    - name: "LoRA rank"
      proxy_value: 8
      target_value: 16
    - name: "LoRA alpha"
      value: 32
    - name: "LoRA dropout"
      value: 0.05
    - name: "KV budget ratio (rho)"
      value: 0.50
    - name: "Attention sinks (n_sink)"
      value: 4
    - name: "attn_implementation"
      value: "'eager'"
      reason: "H2O+SDPA incompatibility fix"

  training_details:
    proxy_steps: 30
    proxy_samples: 200
    proxy_model: "GPT-2 (117M)"
    target_epochs: 1
    target_dataset: "LongAlpaca-12k (full)"
    target_models: ["LLaMA-2-7B", "Mistral-7B-v0.1"]
    optimizer: "AdamW (HuggingFace PEFT default)"

  implementation:
    approach: "hook-based mask injection (no architectural changes)"
    training_only_guard: true
    compatible_with: ["HuggingFace transformers", "HuggingFace peft"]

