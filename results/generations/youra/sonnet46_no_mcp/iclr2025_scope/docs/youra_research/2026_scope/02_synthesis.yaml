experimental_scope:
  models:
    - "LLaMA-2-7B (meta-llama/Llama-2-7b-hf)"
    - "Mistral-7B-v0.1 (mistralai/Mistral-7B-v0.1)"
  datasets:
    - "LongBench (THUDM/LongBench) — evaluation"
    - "LongAlpaca-12k (Yukang/LongAlpaca) — fine-tuning"
    - "Alpaca-52k — sanity check fine-tuning (optional, Prof. Rex recommendation)"
  baselines:
    - "Sequential baseline: standard LoRA fine-tuning + H2O eviction at inference"
    - "Full-cache baseline: standard LoRA fine-tuning + no eviction at inference"
    - "Pre-trained model + H2O eviction (no fine-tuning)"

measurement_plan:
  data_collection:
    - source: "LongBench evaluation harness (THUDM GitHub) — outputs per-task scores for all 21 tasks"
    - source: "HuggingFace PEFT library — LoRA adapter training with custom attention mask injection for eviction simulation"
    - source: "FMInference/H2O implementation — H2O eviction policy for both training simulation and inference"
  procedure:
    - step: "1. Download LLaMA-2-7B and Mistral-7B-v0.1 base model weights from HuggingFace Hub"
    - step: "2. Fine-tune both models with standard LoRA on LongAlpaca-12k (sequential baseline)"
    - step: "3. Fine-tune both models with eviction-aware LoRA on LongAlpaca-12k — inject H2O hard-mask at ratios r ∈ {25%, 50%, 75%} during each forward pass"
    - step: "4. Evaluate all variants on LongBench 21 tasks with matched H2O eviction at each ratio r"
    - step: "5. Report per-category accuracy (6 categories), aggregate LongBench score, and throughput (tokens/sec on A100)"
    - step: "6. Apply paired t-test within each category; Bonferroni correction across 6 categories"
    - step: "7. (Optional) Sanity check: repeat steps 2-4 with Alpaca-52k to test data distribution confound"
  success_criteria:
    - "P1: ≥2% per-category LongBench improvement in ≥4/6 categories on both models at r=50% (p<0.05)"
    - "P2: Monotonically increasing accuracy gap as r decreases (Spearman ρ < -0.8)"
    - "P3: ≥1.8× throughput at r=50% vs. full-cache baseline on A100"

validation:
  internal_validity:
    - "Single-variable manipulation: eviction mask during training is the only difference between eviction-aware and sequential variants; all other hyperparameters held constant"
    - "Policy consistency: H2O eviction policy fixed across training simulation and inference evaluation — no policy mismatch"
    - "Data control: LongAlpaca-12k used identically for both variants; random seed fixed for reproducibility"
    - "Statistical rigor: paired t-test with Bonferroni correction prevents false positives across 6 category comparisons"
  external_validity:
    - "Two base models (LLaMA-2-7B, Mistral-7B-v0.1) test generality across different transformer implementations"
    - "LongBench 21 tasks across 6 categories provide broad coverage of long-context task types"
    - "KV budget range r ∈ {25%, 50%, 75%} covers practical compression scenarios from aggressive to conservative"
    - "All components (models, datasets, eviction implementation) are publicly available for replication"

discussion_synthesis:
  key_insights:
    - "The field has developed KV eviction and PEFT independently — joint optimization is the logical next step that has not been systematically studied"
    - "The dropout analogy (token-position eviction as token-level regularization) provides a theoretical basis for why eviction-aware training might improve generalization"
    - "Distribution mismatch between training (full KV cache) and inference (evicted cache) is the mechanistic root cause that eviction-aware training addresses"
    - "Per-category LongBench reporting is essential — aggregate scores can mask task-specific regression that would undermine the practical value of the method"
  breakthrough_moments:
    - "Prof. Vera's separation of two sub-hypotheses (eviction-robust adapters vs. rank-budget coupling) prevented experiment confounding and sharpened the core claim"
    - "Prof. Pax's confirmation that H2O hard-mask eviction is mathematically valid as structured attention masking removed the primary feasibility concern"
    - "Prof. Rex's three unstated assumptions (model dependence, task distribution, training data confound) were all addressable within the experimental design — no new data required"
  resolved_tensions:
    - "Tension: dropout analogy may not hold for token-position eviction (breaks sequence structure). Resolution: acknowledged as a limitation; the mechanism is distribution-mismatch elimination, not neuron-level regularization"
    - "Tension: rank-budget coupling (AdaLoRA rank guided by eviction scores) is theoretically attractive but adds confounds. Resolution: demoted to optional ablation; core hypothesis focuses on eviction simulation only"
    - "Tension: results may be specific to LongAlpaca-12k data distribution. Resolution: Alpaca-52k sanity check added as optional experiment; does not require new data collection"
