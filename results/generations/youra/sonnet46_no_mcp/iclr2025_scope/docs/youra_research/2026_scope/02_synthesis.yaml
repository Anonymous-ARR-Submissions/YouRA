hypothesis_draft:
  title: "Eviction-Aware LoRA: Joint KV Cache Budget Simulation and Adapter Fine-Tuning for Long-Context LLMs"
  hypothesis_id: "H-EvictionAwareLoRA-v1"
  core_claim: |
    Training LoRA adapters under simulated H2O KV cache eviction constraints
    (eviction-aware fine-tuning) produces adapters that outperform the sequential
    baseline (standard LoRA + post-hoc H2O eviction) on LongBench per-category
    accuracy at matched KV budget ratios, because joint training eliminates the
    training-inference distribution mismatch created by applying eviction to
    adapters trained on full KV cache.
  mechanism: |
    Token-scarcity regularization: during eviction-aware LoRA training, H2O hard-mask
    eviction removes low-cumulative-attention token positions from the KV cache in the
    forward pass. Adapters exposed to systematic token absence learn attention patterns
    that extract maximum information from surviving (high-attention) token positions.
    At inference under the same eviction policy, eviction-aware adapters face no
    distribution mismatch, while sequential-baseline adapters — trained on full KV
    cache — face a novel token-absence distribution that degrades their accuracy.
  predictions:
    - P1: "≥2% LongBench per-category accuracy improvement over sequential baseline at r=50% KV retention in ≥4/6 task categories on both LLaMA-2-7B and Mistral-7B-v0.1 (primary)"
    - P2: "Accuracy advantage increases monotonically as r decreases — larger benefit under tighter budget constraints (Spearman ρ < -0.8)"
    - P3: "≥1.8× inference throughput improvement at r=50% vs. full-cache baseline on A100 GPU"

variables_summary:
  independent: "Training eviction simulation (eviction-aware vs. sequential) × KV budget ratio r ∈ {25%, 50%, 75%} × Base model (LLaMA-2-7B, Mistral-7B-v0.1)"
  dependent_primary: "LongBench per-category accuracy (6 categories, 21 tasks total)"
  controlled: "Fine-tuning dataset (LongAlpaca-12k), eviction policy (H2O fixed), LoRA hyperparameters (rank=16, alpha=32)"

null_hypothesis:
  h0_statement: |
    There is no statistically significant difference in per-category LongBench accuracy
    between eviction-aware LoRA fine-tuning and sequential baseline (standard LoRA +
    H2O eviction at inference) at matched KV cache budget ratio r, across LongBench
    task categories on LLaMA-2-7B and Mistral-7B-v0.1.
  statistical_test: "Paired t-test across LongBench tasks within each category; Bonferroni correction for 6 category comparisons"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First systematic study integrating KV cache eviction simulation into PEFT fine-tuning — training adapters to be eviction-robust rather than applying eviction post-hoc to eviction-unaware adapters"
  differentiation_summary: |
    Existing KV cache methods (H2O, SnapKV, StreamingLLM) are deployment-time
    techniques applied to pre-trained or sequentially fine-tuned models. Existing
    PEFT methods (LoRA, AdaLoRA, DoRA) assume full KV cache at inference. No prior
    work closes the gap by making fine-tuning aware of deployment-time KV constraints.
    This hypothesis targets precisely that gap, establishing whether joint optimization
    is superior to sequential application — a question with direct practical relevance
    for deploying instruction-tuned LLMs under memory budget constraints.

