        - compute_gate_result(results, gate_layer_fraction=0.5): fraction of layers
          with entropy p < 0.05; gate passes if >= gate_layer_fraction.
        - summarize(results): print/log per-layer p-values and gate outcome.
    feature_tag: evaluation
    priority: 88
