      config: "03_config.md#A-2-LongBench-Data-Loader"

  - id: task-004
    epic: A-3
    title: Adapter Model Loading
    description: >
      Implement load_adapter_model() and set_h2o_training_mode() in h-m1/code/model.py.
      Use sys.path injection to import from h-e1/code/model.py:
        load_base_model, inject_h2o_wrappers, H2OEvictionAwareAttention.
      CRITICAL: H2OEvictionAwareAttention.forward() skips eviction when not self.training.
      set_h2o_training_mode() toggles only H2OEvictionAwareAttention submodules to
      train/eval mode to activate/deactivate inference-time eviction masking.
    feature_tag: model
    priority: 91
    source_document: 03_architecture.md
    complexity: 16
    test_requirements: |
