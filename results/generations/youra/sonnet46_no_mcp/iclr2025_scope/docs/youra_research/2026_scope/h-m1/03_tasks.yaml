      - Test eviction-aware condition calls inject_h2o_wrappers
    reference_files:
      architecture: "03_architecture.md#A-3"
      logic: "03_logic.md#A-3-Adapter-Model-Loading"

  - id: task-005
    epic: A-4
    title: Attention Extraction
    description: >
      Implement AttentionAnalysisExtractor class in h-m1/code/model.py with:
        - extract_metrics(input_ids, attention_mask): toggles H2O to train mode,
          runs model with output_attentions=True under torch.no_grad(), restores eval.
        - compute_entropy(attn_weights): H = -sum(p * log(p+eps)) over key dim,
          averaged over heads and query positions. Returns scalar (nats).
        - compute_hh_concentration(attn_weights, top_ratio=0.2): top-k attention mass ratio.
        - verify_attention_extraction(): smoke test shape/softmax checks.
    feature_tag: model
    priority: 90
    source_document: 03_architecture.md
    complexity: 15
    test_requirements: |
      ## Test Requirements (MANDATORY)
      - Create tests/test_extraction.py
      - Test compute_entropy on uniform attention returns log(S) nats
      - Test compute_hh_concentration on concentrated attention returns ~1.0
      - Test verify_attention_extraction smoke test passes on tiny model
    reference_files:
      architecture: "03_architecture.md#A-4"
      logic: "03_logic.md#A-4-Attention-Extraction"

