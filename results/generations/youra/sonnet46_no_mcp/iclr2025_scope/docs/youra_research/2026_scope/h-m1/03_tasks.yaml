      Apply middle truncation: keep first 1000 + last 3000 tokens up to max_seq_length=4096.
      Batch size=1 (required for long sequences with output_attentions=True).
    feature_tag: data-pipeline
    priority: 92
    source_document: 03_architecture.md
    complexity: 13
