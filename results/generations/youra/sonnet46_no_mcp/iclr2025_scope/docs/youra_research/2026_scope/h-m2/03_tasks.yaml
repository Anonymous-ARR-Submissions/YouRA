tasks:
  # ─── Environment Setup ───────────────────────────────────────────────────────
  - id: "ENV-1"
    title: "Environment Setup"
    type: "setup"
    priority: 94
    description: >
      Install required Python packages and verify GPU availability.
      Packages: torch>=2.0, transformers>=4.35, peft>=0.6, datasets>=2.14,
      scipy>=1.10, numpy>=1.24, matplotlib>=3.7, pandas>=2.0, tqdm>=4.65.
      Set CUDA_VISIBLE_DEVICES to a single empty GPU.
    reference_files:
      - file: "h-m2/03_prd.md"
        section: "## 7. Dependencies"
      - file: "h-m2/03_config.md"
        section: "## Environment / Path Configuration"
    acceptance_criteria:
      - "All packages importable without error"
      - "torch.cuda.is_available() == True"
      - "CUDA_VISIBLE_DEVICES set to single GPU"

  # ─── Epic Tasks ──────────────────────────────────────────────────────────────
  - id: "A-1"
    title: "Project Setup"
    type: "setup"
    priority: 93
    complexity: 7
    description: >
      Create h-m2/code/ directory structure. Implement config.py with
      BudgetSweepConfig and AdapterSpec dataclasses. Wire H-E1 adapter path
      resolution (outputs/h-e1/{model}-{condition}/). Implement get_default_config()
      returning all 4 adapter combinations (LLaMA-2-7B + Mistral-7B × sequential +
      eviction-aware). Implement validate_config() checking adapter path existence.
    reference_files:
      - file: "h-m2/03_architecture.md"
        section: "### config.py"
      - file: "h-m2/03_config.md"
        section: "## BudgetSweepConfig Dataclass"
      - file: "h-m2/03_logic.md"
        section: "## config.py — API"
    acceptance_criteria:
      - "BudgetSweepConfig instantiates with defaults"
      - "get_default_config() returns 4 AdapterSpec entries"
      - "validate_config() raises ValueError for missing adapter paths"

  - id: "A-2"
    title: "Dataset Module"
    type: "data-pipeline"
    priority: 92
    complexity: 10
    description: >
      Implement dataset.py as thin wrapper re-exporting from h-m1/code/data.py via
      importlib dynamic loading. Add TASK_SCORER_MAP mapping all 21 LongBench tasks
      to scorer functions (F1 / ROUGE-L / accuracy / edit-distance). Implement
      score_prediction(task_name, prediction, answers) and run_task_evaluation()
      running full test split for one task with batch_size=1. Implement
      compute_category_accuracies() aggregating to 6-category means using
      LONGBENCH_CATEGORIES with hyphenated keys.
    reference_files:
      - file: "h-m2/03_architecture.md"
        section: "### dataset.py"
      - file: "h-m2/03_logic.md"
        section: "## dataset.py — API"
      - file: "h-m2/03_config.md"
        section: "## LongBench Task Configuration"
    acceptance_criteria:
      - "LONGBENCH_TASKS has 21 entries"
      - "LONGBENCH_CATEGORIES has 6 hyphenated keys"
      - "compute_category_accuracies returns 6 non-NaN values"
      - "run_task_evaluation returns float score"

  - id: "A-3"
    title: "Model Module"
    type: "model"
    priority: 91
    complexity: 11
    description: >
      Implement model.py with importlib dynamic loading of H2OEvictionAwareAttention,
      inject_h2o_wrappers, load_base_model from h-e1/code/model.py and
      load_adapter_model, set_h2o_training_mode from h-m1/code/model.py.
      Implement set_h2o_budget(model, kv_budget_ratio) via direct attribute assignment
      on all H2OEvictionAwareAttention instances; raise ValueError if no wrappers found.
      Implement verify_budget_applied(model, expected_ratio) checking all wrappers.
      Implement load_model_for_sweep() loading base + PEFT adapter with
      attn_implementation='eager', injecting H2O wrappers for eviction-aware type,
      returning model in eval mode. Map "sequential" -> condition "baseline".
    reference_files:
      - file: "h-m2/03_architecture.md"
        section: "### model.py"
      - file: "h-m2/03_logic.md"
        section: "## model.py — API"
      - file: "h-m2/03_logic.md"
        section: "## External Dependencies API"
    acceptance_criteria:
      - "set_h2o_budget sets kv_budget_ratio on all H2OEvictionAwareAttention instances"
      - "verify_budget_applied returns True when ratio matches"
      - "load_model_for_sweep returns model in eval mode"
      - "ValueError raised if no H2O wrappers found"

  - id: "A-4"
    title: "BudgetSweepEvaluator"
    type: "evaluation"
    priority: 90
    complexity: 13
    description: >
      Implement evaluate.py with RunResult dataclass (model_name, adapter_type,
      budget_ratio, per_task_scores, category_scores). Implement
      BudgetSweepEvaluator.evaluate_single_run(): set H2O budget, activate eviction
      via set_h2o_training_mode(model, True), run all 21 LongBench tasks, return
      RunResult. Implement BudgetSweepEvaluator.run_all(): execute all 12 runs
      (2 adapter types × 3 budget ratios × 2 models) with GPU memory management
      (load/unload models). Implement save_run_results() saving CSV.
      Implement verify_mechanism_activated() checking budget_set + gap_variance_nonzero.
    reference_files:
      - file: "h-m2/03_architecture.md"
        section: "### evaluate.py"
      - file: "h-m2/03_logic.md"
        section: "## evaluate.py — API"
      - file: "h-m2/03_prd.md"
        section: "### FR-3: Budget-Ratio Sweep Evaluator"
    acceptance_criteria:
      - "run_all() returns exactly 12 RunResult objects"
      - "Each RunResult has 6 category_scores entries"
      - "CSV output contains all 12 runs"
      - "set_h2o_training_mode called before each evaluation run"

  - id: "A-5"
    title: "SpearmanAnalyzer"
    type: "analysis"
    priority: 89
    complexity: 12
    description: >
      Implement analyze.py with GapMatrix (per-model per-r per-category gaps and
      mean_gaps), SpearmanResult (model_name, rho, pval, gate_passed where
      gate_passed = rho < -0.8), MonotonicityResult (per_category bool dict,
      fraction_monotone). Implement SpearmanAnalyzer.compute_gap_matrix() building
      GapMatrix from List[RunResult]. Implement compute_spearman() calling
      scipy.stats.spearmanr([0.25, 0.50, 0.75], [mean_gap_25, mean_gap_50,
      mean_gap_75]). Implement check_monotonicity() per category. Implement
      run_full_analysis() returning {gap_matrices, spearman_results, monotonicity,
      gate_passed}. Implement save_summary() writing JSON.
    reference_files:
      - file: "h-m2/03_architecture.md"
        section: "### analyze.py"
      - file: "h-m2/03_logic.md"
        section: "## analyze.py — API"
      - file: "h-m2/03_prd.md"
        section: "### FR-5: Spearman Correlation Analysis"
    acceptance_criteria:
      - "SpearmanResult.gate_passed == True iff rho < -0.8"
      - "GapMatrix.mean_gaps has 3 entries (one per budget ratio)"
      - "MonotonicityResult.fraction_monotone is float in [0.0, 1.0]"
      - "JSON summary saved with all models' Spearman results"

  - id: "A-6"
    title: "Visualization"
    type: "visualization"
    priority: 88
    complexity: 10
    description: >
      Implement visualize.py with 4 mandatory figures:
      (1) plot_gap_vs_budget(): line plot x=budget ratio, y=mean gap, one line per model,
      error bars across categories, saved as gap_vs_budget.png.
      (2) plot_spearman_bar(): bar chart of Spearman rho per model, reference line at -0.8,
      saved as spearman_bar.png.
      (3) plot_gap_heatmap(): 6-category × 3-budget-ratio heatmap, color=gap magnitude,
      one per model, saved as gap_heatmap_{model}.png.
      (4) plot_absolute_accuracy_curves(): per-model line plots of absolute accuracy
      for both adapter types at each r, saved as absolute_curves_{model}.png.
      Implement save_all_figures() saving all figures to figures/ dir.
    reference_files:
      - file: "h-m2/03_architecture.md"
        section: "### visualize.py"
      - file: "h-m2/03_logic.md"
        section: "## visualize.py — API"
      - file: "h-m2/03_config.md"
        section: "## Visualization Configuration"
    acceptance_criteria:
      - "All 4 figure types generated as PNG"
      - "gap_vs_budget.png has reference annotations"
      - "spearman_bar.png has horizontal line at y=-0.8"
      - "figures/ directory created if not exists"

  - id: "A-7"
    title: "Mechanism Verification"
    type: "verification"
    priority: 87
    complexity: 8
    description: >
      Implement verify_mechanism_activated() in evaluate.py (or separate
      verification.py): three checks:
      (1) budget_set: all H2OEvictionAwareAttention instances have kv_budget_ratio == r,
      (2) all_ratios_evaluated: set(results_by_r.keys()) == {0.25, 0.50, 0.75},
      (3) gap_variance_nonzero: np.std(list(results_by_r.values())) > 1e-6.
      Return (all_pass, indicators_dict). Log activation indicator message per run.
      Fail fast if budget_set check fails (H2O injection not working).
    reference_files:
      - file: "h-m2/03_prd.md"
        section: "### FR-6: Mechanism Verification"
      - file: "h-m2/03_logic.md"
        section: "## Subtask L-7-1"
      - file: "h-m2/02c_experiment_brief.md"
        section: "### Mechanism Activation Indicators"
    acceptance_criteria:
      - "Returns (True, all_true_dict) when all 3 checks pass"
      - "Returns (False, indicators) with specific failing check identified"
      - "Fail-fast raises RuntimeError when budget_set=False"

  - id: "A-8"
    title: "Smoke Test"
    type: "testing"
    priority: 86
    complexity: 7
    description: >
      Implement smoke_test.py with run_smoke_test() function. Load one adapter
