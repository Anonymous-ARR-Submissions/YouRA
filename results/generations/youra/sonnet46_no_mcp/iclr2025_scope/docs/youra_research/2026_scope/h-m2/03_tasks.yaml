      Verify compute_category_accuracies returns 6 non-NaN values.
      Run before full 12-run evaluation. Return True if all checks pass.
    reference_files:
      - file: "h-m2/03_architecture.md"
        section: "### smoke_test.py"
      - file: "h-m2/03_prd.md"
        section: "### FR-8: Smoke Test"
      - file: "h-m2/03_logic.md"
        section: "## smoke_test.py — API"
    acceptance_criteria:
      - "run_smoke_test() returns True on valid setup"
      - "Budget ratio attribute verified for each r in {0.25, 0.50, 0.75}"
      - "category aggregation returns 6 non-NaN values"

  - id: "A-9"
