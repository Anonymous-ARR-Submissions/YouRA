    reference_files:
      - file: "h-m2/03_architecture.md"
        section: "### run_experiment.py"
      - file: "h-m2/03_logic.md"
        section: "## run_experiment.py — API"
      - file: "h-m2/03_config.md"
        section: "## Environment / Path Configuration"
    acceptance_criteria:
      - "Smoke test failure aborts with clear error message"
      - "All 12 runs complete and CSV saved"
      - "JSON summary includes gate_passed field"
      - "All 4 PNG figures saved"

