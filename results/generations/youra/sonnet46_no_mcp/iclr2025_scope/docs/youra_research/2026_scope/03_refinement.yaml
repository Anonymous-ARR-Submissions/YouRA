# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-EvictionAwareLoRA-v1"
  confidence_level: 0.75
  core_hypothesis_statement: |
    Under long-context LLM fine-tuning with fixed KV cache budget constraints,
    if LoRA adapters are trained with hard H2O-style KV eviction masks applied
    during the forward pass (simulating budget ratio r ∈ {25%, 50%, 75%}),
    then per-category LongBench accuracy will exceed the sequential baseline
    (standard LoRA fine-tuning followed by H2O eviction at inference only)
    by ≥2% at r=50% KV retention across ≥4/6 LongBench task categories on both
    LLaMA-2-7B and Mistral-7B-v0.1,
    because adapters trained under token-position scarcity learn more
    information-efficient attention representations that extract higher utility
    from surviving KV cache entries (token-scarcity regularization mechanism).
  alternative_hypothesis_h0: |
    There is no statistically significant difference in per-category LongBench
    accuracy between eviction-aware LoRA fine-tuning and sequential baseline
    (standard LoRA + H2O eviction at inference) at matched KV cache budget ratio r.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Training eviction simulation"
      type: "categorical"
      operationalization: "Whether H2O eviction mask is applied during LoRA forward pass"
      levels:
        - "eviction-aware (H2O mask at ratio r during training)"
        - "sequential baseline (standard LoRA, no mask during training)"
    - name: "KV cache budget ratio r"
      type: "categorical"
      operationalization: "Fraction of KV cache entries retained at inference time"
      levels:
        - "r=25% (aggressive compression)"
        - "r=50% (moderate compression)"
        - "r=75% (near-full cache)"
    - name: "Base model"
      type: "categorical"
      operationalization: "Pre-trained LLM used as LoRA base"
      levels:
        - "LLaMA-2-7B"
        - "Mistral-7B-v0.1"
  dependent:
    - name: "LongBench per-category accuracy"
      type: "continuous"
      operationalization: "Mean accuracy per task category (6 categories: single-doc QA, multi-doc QA, summarization, few-shot, synthetic, code); range 0-100%"
      primary: true
    - name: "LongBench aggregate score"
      type: "continuous"
      operationalization: "Mean accuracy across all 21 LongBench tasks; range 0-100%"
      primary: false
    - name: "Inference throughput"
      type: "continuous"
      operationalization: "Tokens per second at batch size 1 and batch size 8 on single A100 GPU at matched KV budget r"
      primary: false
  controlled:
    - name: "Fine-tuning dataset"
      operationalization: "LongAlpaca-12k, identical for baseline and eviction-aware variants"
    - name: "Eviction policy"
      operationalization: "H2O cumulative attention scoring fixed as both training simulation policy and inference eviction policy"
    - name: "LoRA hyperparameters"
      operationalization: "Rank=16, alpha=32, dropout=0.05 — identical for both variants"
    - name: "Training budget"
      operationalization: "Same number of gradient steps, learning rate schedule, and batch size for both variants"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 3
  steps:
    - step: 1
      description: "H2O eviction masks applied during LoRA forward pass remove low-attention-score token positions from KV cache simulation at budget ratio r"
      evidence: "H2O heavy-hitter selection (Zhang et al. 2023) is a deterministic function of cumulative attention scores — applying it as a hard mask during training is mathematically equivalent to structured attention masking, a well-defined operation"
      falsifier: "If the eviction mask does not change the gradient signal reaching LoRA parameters (i.e., adapter weights are identical to sequential baseline), then the mechanism does not engage"
    - step: 2
      description: "LoRA adapters exposed to systematic token absence during training learn attention patterns that extract maximum information from surviving (high-attention) token positions — token-scarcity regularization"
      evidence: "Analogous to dropout regularization (Srivastava et al. 2014) which trains neurons to be robust to co-adaptation; here applied at token-position level rather than neuron level"
      falsifier: "If per-layer attention entropy is identical between eviction-aware and sequential adapters at matched KV budget, regularization did not occur"
    - step: 3
      description: "At inference under matched KV budget r, eviction-aware adapters exhibit higher task accuracy because their attention patterns are calibrated to the evicted-cache distribution, while sequential-baseline adapters face distribution mismatch (trained on full cache, evaluated on truncated cache)"
      evidence: "Distribution mismatch between training and inference conditions degrades performance — this is established in domain adaptation literature; eviction-aware training eliminates this mismatch for the specific eviction policy"
      falsifier: "If sequential-baseline adapters show no accuracy degradation at r=50% vs. full cache, distribution mismatch is not the mechanism"
  key_tension: "Whether token-scarcity regularization produces genuinely better representations or merely overfits to the specific eviction policy used during training (i.e., the adapters may fail to generalize to different eviction policies at inference)"
  evidence_summary: |
    The causal chain draws on established principles (H2O eviction scoring, dropout
    regularization) applied in a novel combination. Step 1 is mechanistically sound
    (Prof. Pax confirmed no fundamental barriers). Step 2 is a theoretical hypothesis
    supported by analogy to dropout. Step 3 is the primary empirical claim — the
    distribution-mismatch argument is the key mechanism that distinguishes joint from
    sequential optimization.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "H2O eviction patterns are consistent enough across inputs that training with simulated eviction provides meaningful signal (not random noise)"
    supporting_evidence: "H2O paper shows heavy-hitter tokens are persistent across inputs for a given model — top-20% attention tokens are stable across sequences"
    consequence_if_violated: "If eviction patterns are highly input-dependent and unpredictable, simulated eviction during training is equivalent to random masking, reducing to a standard dropout variant with no specific benefit"
  - id: "A2"
    assumption: "The same eviction policy (H2O) is used at both training simulation and inference evaluation"
    supporting_evidence: "Experimental design constraint — fixed by Prof. Pax's recommendation; H2O open-source implementation available"
    consequence_if_violated: "Policy mismatch between training simulation and inference eviction would introduce distribution shift, potentially reversing the expected accuracy gain"
  - id: "A3"
    assumption: "LongBench per-category results are representative of the general long-context task performance of the fine-tuned model"
    supporting_evidence: "LongBench covers 21 tasks across 6 categories — the most comprehensive long-context NLP benchmark currently available"
    consequence_if_violated: "Results may not generalize to specific long-context applications outside LongBench's task distribution"
  - id: "A4"
    assumption: "LLaMA-2-7B and Mistral-7B-v0.1 have sufficiently different attention patterns that results on both constitute a general claim rather than a model-specific artifact"
    supporting_evidence: "Both are transformer-based decoder models but with different positional encoding (RoPE variants) and attention implementations; heavy-hitter distributions differ"
    consequence_if_violated: "If results hold on only one model, the contribution is model-specific and the generality claim must be narrowed"
  - id: "A5"
    assumption: "LongAlpaca-12k fine-tuning data provides sufficient long-context exposure for both variants to learn relevant representations"
    supporting_evidence: "LongAlpaca-12k contains long-context instruction pairs specifically designed for long-document tasks; publicly available"
    consequence_if_violated: "If fine-tuning data quality is the dominant factor (not eviction simulation), a sanity check on Alpaca-52k (short-context) would reveal this"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Decoder-only transformer LLMs in the 7B parameter class (LLaMA-2-7B, Mistral-7B-v0.1)
    - Long-context tasks measured by LongBench (single-doc QA, multi-doc QA, summarization,
      few-shot learning, synthetic tasks, code completion)
    - H2O eviction policy specifically (heavy-hitter selection by cumulative attention score)
    - LoRA-family adapters (low-rank matrix decomposition); AdaLoRA rank-budget coupling
      is excluded from core hypothesis (demoted to optional ablation)
    - KV cache budget ratios r ∈ {25%, 50%, 75%} — practical compression range
  does_not_apply_to: |
    - Sub-quadratic architectures (Mamba, RWKV) — different memory mechanism
    - MoE routing — different efficiency axis
    - RAG context compression — different intervention point
    - Models >13B parameters — not tested
    - Eviction policies other than H2O (SnapKV, StreamingLLM) — policy mismatch risk
    - Encoder-only or encoder-decoder architectures
    - Vision-language or multimodal models
  known_limitations: |
    - Results are specific to H2O eviction policy; generalization to SnapKV or other
      policies requires separate experiments
    - LongAlpaca-12k training data may favor eviction-aware training if data distribution
      aligns with LongBench tasks — Alpaca-52k sanity check recommended (Prof. Rex)
    - Throughput measurements are hardware-specific (A100 GPU); reported values may
      not generalize to other hardware configurations
    - Rank-budget coupling (AdaLoRA rank allocation guided by eviction scores) is not
      tested in the core hypothesis — represents a follow-up research direction

