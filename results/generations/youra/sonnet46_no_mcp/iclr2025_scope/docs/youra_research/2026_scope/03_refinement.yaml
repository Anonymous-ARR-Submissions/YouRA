novelty:
  preserved_novelty: "First systematic study of KV cache eviction-aware PEFT fine-tuning — no prior work trains adapters with simulated eviction constraints"
  key_innovation: "Token-scarcity regularization: applying H2O eviction masks during LoRA forward pass as a training-time constraint that produces inference-efficient adapters, eliminating the training-inference distribution mismatch for evicted-cache deployment"
  differentiation:
    - prior_work: "H2O (Zhang et al. 2023) — post-hoc eviction on pre-trained models"
      difference: "Our method integrates eviction awareness into the fine-tuning process; adapters are trained to be eviction-robust rather than applied to eviction-unaware adapters"
    - prior_work: "SnapKV (Li et al. 2024) — query-aware clustering at inference"
      difference: "SnapKV optimizes the eviction policy selection; our method optimizes the adapter to work with a fixed eviction policy"
    - prior_work: "AdaLoRA (Zhang et al. 2023) — adaptive rank allocation for PEFT"
      difference: "AdaLoRA optimizes rank allocation for accuracy; our method adds eviction simulation as an additional training constraint without changing the rank allocation mechanism"
    - prior_work: "Dropout (Srivastava et al. 2014) — neuron-level regularization"
      difference: "Dropout operates on individual neurons within each token; our method operates on entire token positions, which changes sequence structure and positional dependencies in a fundamentally different way"

