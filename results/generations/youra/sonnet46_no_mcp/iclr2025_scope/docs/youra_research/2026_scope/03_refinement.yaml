# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "Eviction-aware LoRA fine-tuning achieves ≥2% higher per-category LongBench accuracy than sequential baseline at r=50% KV retention, across ≥4/6 task categories, on both LLaMA-2-7B and Mistral-7B-v0.1"
    test_method: "Fine-tune both variants on LongAlpaca-12k; evaluate on LongBench 21 tasks with H2O eviction at r=50%; compute per-category mean accuracy; report paired t-test p-value across tasks"
    success_criterion: "≥2% improvement in per-category accuracy in ≥4/6 categories on both models; p<0.05 on paired t-test"
    falsification: "If the per-category improvement is <2% or holds in <4/6 categories on either model, the primary prediction fails"
  - id: "P2"
    primary: false
    statement: "The accuracy advantage of eviction-aware training increases monotonically as r decreases (more aggressive eviction) — i.e., joint training is more beneficial under tighter KV budget constraints"
    test_method: "Evaluate both variants at r ∈ {25%, 50%, 75%}; compute accuracy gap (eviction-aware minus sequential) at each r; test for monotonic increase using Spearman rank correlation"
    success_criterion: "Negative Spearman correlation between r and accuracy gap (smaller r → larger gap); ρ < -0.8"
    falsification: "If accuracy gap is constant or reversal occurs (sequential performs better at low r), the monotonicity prediction fails"
  - id: "P3"
    primary: false
    statement: "At r=50% KV retention, inference throughput (tokens/sec) is ≥1.8× that of the full-cache baseline (r=100%) at matched batch size, for both eviction-aware and sequential variants"
    test_method: "Measure tokens/sec on A100 GPU at batch size 1 and 8 for full-cache vs. r=50% eviction; compute throughput ratio"
    success_criterion: "≥1.8× throughput improvement at r=50% vs. r=100% (both variants); consistent across batch sizes"
    falsification: "If throughput improvement is <1.5× at r=50%, the memory-throughput tradeoff is weaker than expected from H2O's 50% memory reduction"

