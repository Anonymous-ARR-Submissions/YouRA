established_facts:
  claims:
    - claim: "H2O heavy-hitter eviction improves inference throughput on long-context tasks"
      status: "BUILD_ON"
      evidence: "Zhang et al. 2023 (arXiv:2306.14048) — cumulative attention scoring selects heavy hitters; post-hoc eviction reduces KV cache memory"
    - claim: "SnapKV query-aware clustering improves LongBench accuracy vs. uniform eviction"
      status: "BUILD_ON"
      evidence: "Li et al. 2024 (arXiv:2404.14469) — query-aware KV clustering evaluated on LongBench"
    - claim: "AdaLoRA achieves competitive NLU accuracy with fewer parameters than full fine-tuning"
      status: "BUILD_ON"
      evidence: "Zhang et al. 2023 (arXiv:2303.10512) — SVD-based rank allocation on GLUE benchmarks"
    - claim: "Joint eviction-aware fine-tuning outperforms sequential (fine-tune then evict) baseline"
      status: "PROVE_NEW"
      evidence: "No existing work combines KV eviction simulation with PEFT training — this is the core untested claim"
    - claim: "Token-scarcity regularization during LoRA training improves information efficiency"
      status: "PROVE_NEW"
      evidence: "Mechanistic hypothesis from discussion; requires experimental validation on LongBench"
  scope_reduction_percentage: 50
  phase2b_4_instructions: |
    BUILD_ON claims (H2O eviction efficacy, SnapKV accuracy, AdaLoRA parameter efficiency)
    can be cited as established baselines without re-verification. Experimental effort
