gap_id: "gap_1"
gap_title: "Joint LoRA Adapter Training and KV Cache Eviction Policy Co-Optimization"
gap_description: |
  No published work jointly trains LoRA adapter weights and KV eviction policies
  with evaluation on standard NLP benchmarks. The missing piece is a training framework
  that jointly optimizes LoRA adapter weights and KV eviction/compression parameters
  within a single differentiable objective, evaluated on standard NLP benchmarks.
