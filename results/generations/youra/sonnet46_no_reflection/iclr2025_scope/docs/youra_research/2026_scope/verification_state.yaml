main_hypothesis:
  id: H-JointLoRAKV-v1
  title: 'JointLoRA-KV: Task-Aware Joint Training of LoRA Adapters and KV Eviction Heads'
  statement: 'Under standard PEFT fine-tuning conditions on transformer-based LLMs with KV cache

    (specifically LLaMA-3.1-8B), with a fixed 50% KV retention budget, if LoRA adapter

    weights and KV eviction head weights (Locret retaining heads) are jointly trained

    end-to-end via a task classification loss using soft scoring during training and hard

    eviction at inference (JointLoRA-KV), then JointLoRA-KV will achieve >=3% higher

    accuracy than the sequential baseline (B3: LoRA->Locret sequential fine-tune) on

    LongBench-QA tasks and >=1% higher on GLUE (MNLI, SST-2, QNLI) at the same 50% KV

    budget, because task-specific gradient signals direct eviction toward discriminatively

    relevant tokens rather than merely high-attention-score tokens, and joint training

    allows the LoRA adapter itself to learn representations that concentrate

    task-discriminative information into eviction-surviving KV entries.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: GLUE Benchmark + LongBench
    model: LLaMA-3.1-8B (meta-llama/Meta-Llama-3.1-8B)
    optimizer: 'AdamW (separate LRs: LoRA 1e-4, Locret 5e-4)'
    hyperparameters:
      lora_rank: 16
      lora_alpha: 32
      lora_target_modules:
      - Q
      - K
      - V
      kv_budget_ratio: 0.5
      seeds:
      - 42
      - 123
      - 456
