# ============================================================================
# ADVERSARIAL REVIEW FOCUS AREAS
# ============================================================================

adversary_focus:
  critical_checks:
    - "Does the paper accurately represent H-M1 as PoC scale (NOT full protocol)?"
    - "Does the paper clearly distinguish B1 (frozen Locret) comparison from B3 (sequential) comparison?"
    - "Does the paper disclose that H-M3 was not executed and the primary performance claim is pending?"
    - "Does the abstract avoid overclaiming given the PoC nature of the mechanism evidence?"
    - "Are all numerical values in the paper consistent with Phase 4 validation reports?"

  known_risks:
    - risk: "Overclaiming the +1.50pp result as conclusive evidence"
      location: "Abstract and Section 5.2"
      mitigation_in_paper: "Paper uses language 'PoC run', '1-epoch', and explicitly notes training scale limitation in §6.2 L2"

    - risk: "H-M2 stability being presented as full-scale stability"
      location: "Section 5.3"
      mitigation_in_paper: "Paper explicitly states 'tiny PoC model (d=64, 2 layers)' in §4.1 and §5.3 note"

    - risk: "Missing prior work that addresses joint LoRA+KV"
      location: "Section 2.3"
      mitigation_in_paper: "arXiv 2604.21335 is discussed and distinguished; Molfese 2026 is cited"

  suggested_adversary_questions:
    - "Is +1.50pp over B1 in 1 epoch truly 'mechanism confirmation' or underpowered evidence?"
    - "Why does the paper title say 'Task-Aware' when the primary GLUE comparison is only vs B1, not B3?"
    - "Is the GQA expansion artifact in H-E1 serious enough to undermine the misalignment finding?"
    - "What prevents a reviewer from arguing the paper is incomplete without H-M3?"

