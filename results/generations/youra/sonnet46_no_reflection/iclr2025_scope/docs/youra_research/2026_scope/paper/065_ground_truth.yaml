# ============================================================================
# METHODOLOGY FACTS (from Phase 3 PRD/Architecture)
# ============================================================================

methodology:
  algorithm_name: "JointLoRA-KV"
  key_hyperparameters:
    lora_rank: 16
    lora_alpha: 32
    lora_dropout: 0.05
    lora_target_modules: ["q_proj", "k_proj", "v_proj"]
    kv_budget_ratio: 0.5
    soft_mask_temperature: 0.1
    lora_lr: 1.0e-4
    locret_lr: 5.0e-4
    weight_decay: 0.01
    grad_accum_steps: 8
    effective_batch_size: 32
    warmup_ratio: 0.06
    gradient_clip: 1.0
  base_model: "meta-llama/Meta-Llama-3.1-8B-Instruct"
  locret_checkpoint: "hyx21/Locret-llama-3.1-8B-instruct"
  ste_used: true
  soft_mask_function: "sigmoid"
  gradient_bridge: "straight-through estimator"

