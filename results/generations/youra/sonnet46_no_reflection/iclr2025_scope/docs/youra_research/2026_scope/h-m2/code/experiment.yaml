model:
  base_model: "meta-llama/Meta-Llama-3.1-8B"
  torch_dtype: "bfloat16"
  attn_implementation: "eager"

lora:
  r: 16
  lora_alpha: 32
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
  lora_dropout: 0.05
  bias: "none"

locret:
  hidden_dim: 1024
  n_heads: 8
  warm_init_checkpoint: "hyx21/Locret-llama-3.1-8B-instruct"
  kv_budget_ratio: 0.5

training:
  lora_lr: 0.0001
  locret_lr: 0.0005
  weight_decay: 0.01
  betas:
    - 0.9
    - 0.999
  eps: 1.0e-8
  warmup_ratio: 0.10
  lr_schedule: "cosine"
  batch_size: 8
  gradient_accumulation_steps: 4
  max_epochs: 3
  seeds:
    - 42
    - 123
    - 456
  grad_clip_norm: 1.0

dataset:
  glue_tasks:
    - "mnli"
    - "sst2"
    - "qnli"
  longbench_tasks:
    - "narrativeqa"
    - "qasper"
    - "multifieldqa_en"
  max_seq_len_glue: 512

stability:
  divergence_window: 100
  divergence_threshold: 2.0
  log_interval: 50

paths:
  output_dir: "h-m2/"
  checkpoint_dir: "h-m2/checkpoints/"
  figures_dir: "h-m2/figures/"
  results_dir: "h-m2/results/"
