selected_gap:
  id: "gap_1"
  title: "Joint LoRA Adapter Training and KV Cache Eviction Policy Co-Optimization"
  description: |
    No published work jointly trains LoRA adapter weights and KV eviction policies
    with evaluation on standard NLP benchmarks. Existing work (Locret, LESS, kvpress)
    applies KV compression to frozen or already-fine-tuned models. arXiv 2604.21335
    introduces sub-token routing combining routed LoRA with value-group KV routing,
    but focuses on language modeling quality (perplexity/RULER), not standard NLP
    benchmark performance (GLUE/SuperGLUE). A training framework that jointly
    optimizes LoRA adapter weights and KV eviction/compression parameters within
    a single differentiable objective, evaluated on standard NLP benchmarks, is missing.
  priority: "HIGH+PRIMARY"
  connection_to_research_question: "Directly blocks joint optimization answer"
  connection_to_dq: "DQ1 — joint LoRA+KV eviction co-training"

