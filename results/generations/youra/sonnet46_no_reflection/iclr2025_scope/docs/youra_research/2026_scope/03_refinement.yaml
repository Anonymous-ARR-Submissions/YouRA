    - name: "Training strategy"
      type: "categorical"
      operationalization: "Whether LoRA adapter and KV eviction heads are trained jointly (JointLoRA-KV) or sequentially (B1, B2, B3)"
      levels:
        - "JointLoRA-KV: joint end-to-end training via task loss"
        - "B1: LoRA training → frozen Locret (no eviction training)"
        - "B2: LoRA training → kvpress (no training, heuristic eviction)"
        - "B3: LoRA training → sequential Locret fine-tune (frozen LoRA)"
    - name: "KV retention budget"
      type: "categorical"
      operationalization: "Fraction of KV cache entries retained during inference (budget_ratio parameter in Locret)"
      levels:
        - "50% KV budget (primary experimental condition)"
        - "100% KV budget (no eviction — boundary condition check)"
    - name: "Evaluation context length regime"
      type: "categorical"
      operationalization: "Short-context (GLUE, ≤512 tokens) vs. long-context (LongBench, 2k-32k tokens)"
