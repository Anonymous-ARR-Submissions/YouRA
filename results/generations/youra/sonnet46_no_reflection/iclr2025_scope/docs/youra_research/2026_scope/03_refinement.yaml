# ═══════════════════════════════════════════════════════════════
# SECTION 5: Phase 2B Readiness
# ═══════════════════════════════════════════════════════════════

phase2b_readiness:
  status: "READY"
  sh1_existence: |
    SH1 (Existence): The mechanism precondition — that LoRA-modified attention weights
    are systematically misaligned with Locret retaining head scores for task-relevant tokens
    — must hold for joint training to provide any advantage. P3 (attribution analysis) tests
    this directly using existing fine-tuned models and MNLI data. If SH1 fails (ρ ≥ 0.7),
    the main hypothesis should be reconsidered.
  sh2_mechanism: |
    SH2 (Mechanism): The "representation compression" effect — that joint training causes
    LoRA to concentrate discriminative information in eviction-surviving KV entries, which
    sequential training (B3) cannot achieve because LoRA is frozen during Locret training.
    P4 (probing experiment) tests this directly.
  sh3_comparison: |
    SH3 (Comparison): The benchmark comparison against baselines B1, B2, B3 and vanilla LoRA.
    P1 (LongBench-QA, primary) and P2 (GLUE + boundary condition) test this.
    Phase 5 (Baseline Repository Comparison) is flagged skip_baseline_comparison=true
    in module.yaml — deferred.
  open_questions:
    - "Is the 3% threshold for P1 (LongBench-QA) achievable given B3's rapid adaptation ability? Pre-run P3 diagnostic first."
    - "Do short-context GLUE sequences (≤512 tokens) produce sufficient KV eviction events at 50% budget to show meaningful P2 effects?"
    - "What learning rate ratio between LoRA and retaining head parameters produces stable joint training?"
    - "Does the representation compression effect (P4) generalize across GLUE task types or is it task-specific?"

# ═══════════════════════════════════════════════════════════════
# DECISION & DISCUSSION CONTEXT
