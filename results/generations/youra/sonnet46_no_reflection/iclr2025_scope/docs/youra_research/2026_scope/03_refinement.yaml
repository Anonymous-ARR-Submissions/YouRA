# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "LoRA (Low-Rank Adaptation) effectively fine-tunes LLMs with <1% parameter overhead via A·B matrix injection into Q/K/V projections"
      status: "BUILD_ON"
      evidence: "LoRA paper (Hu et al., 2021); HuggingFace PEFT library; QLoRA (Dettmers et al., 2023)"
    - claim: "KV cache compression (eviction/quantization) can reduce memory footprint by 50-80% with manageable accuracy loss"
      status: "BUILD_ON"
      evidence: "Locret [Huang et al., 2024] achieves 20x compression; kvpress (NVIDIA, ★1025); ZSMerge 20:1 compression"
    - claim: "Soft-to-hard training (differentiable scoring during training, hard selection at inference) is an established pattern for learned sparse methods"
      status: "BUILD_ON"
      evidence: "Locret uses soft scoring during training; PruLong [Princeton, 2024] learns 0/1 attention masks via this pattern"
    - claim: "arXiv 2604.21335 demonstrates architectural feasibility of joint routed LoRA + KV value-group routing"
      status: "BUILD_ON"
      evidence: "arXiv 2604.21335 (2025): sub-token routing combining LoRA paths and KV value groups"
    - claim: "Task-specific gradient signals from classification loss differ from language modeling loss in what they reward"
      status: "PROVE_NEW"
      evidence: "Assumed based on functional difference (discriminative vs. next-token prediction); P3 attribution analysis will verify"
    - claim: "Joint end-to-end training of LoRA and KV eviction outperforms sequential (decoupled) training on NLP benchmarks"
      status: "PROVE_NEW"
      evidence: "Core hypothesis — no prior work directly tests this; arXiv 2604.21335 uses LM loss, not task loss; no GLUE/LongBench evaluation exists"
    - claim: "Joint training induces 'representation compression' — LoRA adapters learn to concentrate discriminative info in eviction-surviving KV entries"
      status: "PROVE_NEW"
      evidence: "Theorized from knowledge distillation analogy; P4 probing experiment will test this"
  scope_reduction_percentage: 43
  phase2b_4_instructions: |
    Three claims (BUILD_ON) are established and need no re-verification in Phase 2B.
    Three claims (PROVE_NEW) are the core experimental targets.
    Focus Phase 2B sub-hypotheses on the PROVE_NEW claims:
    H-M1: task gradient produces different eviction priorities than LM gradient (P3)
    H-M2: joint training outperforms sequential on LongBench-QA and GLUE (P1, P2)
    H-M3: representation compression effect is measurable via probing (P4)

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-JointLoRAKV-v1"
  confidence_level: 0.75
  core_hypothesis_statement: |
    Under standard PEFT fine-tuning conditions on transformer-based LLMs with KV cache
    (specifically LLaMA-3.1-8B), with a fixed 50% KV retention budget,
    if LoRA adapter weights and KV eviction head weights (Locret retaining heads) are
    jointly trained end-to-end via a task classification loss using soft scoring during
    training and hard eviction at inference (JointLoRA-KV),
    then JointLoRA-KV will achieve ≥3% higher accuracy than the sequential baseline
    (B3: LoRA → Locret sequential fine-tune) on LongBench-QA tasks and ≥1% higher on
    GLUE (MNLI, SST-2, QNLI) at the same 50% KV budget,
    because task-specific gradient signals direct eviction toward discriminatively relevant
    tokens rather than merely high-attention-score tokens, and joint training allows the
    LoRA adapter itself to learn representations that concentrate task-discriminative
    information into eviction-surviving KV entries ("representation compression").
  alternative_hypothesis_h0: |
    There is no statistically significant difference in GLUE or LongBench-QA accuracy
    between JointLoRA-KV and the sequential fine-tuning baseline (B3: LoRA → Locret
    sequential fine-tune) at matched 50% KV budget, when tested across 3 seeds
    on LLaMA-3.1-8B.

