  # EPIC IMPLEMENTATION TASKS (priority 93-50)
  # Source: 03_architecture.md Epic Tasks section
  # ─────────────────────────────────────────────────────────

  - id: "task-002"
    epic: "A-1 Data Pipeline"
    title: "Implement data_pipeline.py — PWC + OpenML loading and saturation labeling"
    description: |
      Implement h-e1/code/data_pipeline.py with 4 functions:

      1. load_pwc_panel(): Load from HuggingFace pwc-archive/evaluation-tables.
         Filter: >=20 submissions, >=2 years history, known domain (cv|nlp), 2018-2025.
         Returns DataFrame[benchmark, domain, model, date, score, quarter].

      2. load_openml_panel(): Load from openml.study.get_suite("amlb-classification-all") + CC18.
         Filter: >=20 evaluated runs, >=2 years history.
         Returns DataFrame[task_id, benchmark, model, date, score, quarter], domain="tabular".

      3. label_saturation(panel): Apply saturation labels per (benchmark, quarter).
         Saturated: Kendall tau > 0.90 for >=2 consecutive quarters.
         Healthy: tau < 0.70. Excluded: 0.70-0.90.

      4. get_domain_panels(panel, domain, min_saturated=15, min_healthy=15):
         Filter by domain, split by label, warn if below thresholds.
         Returns (saturated_df, healthy_df).
    feature_tag: "data-pipeline"
    priority: 93
    source_document: "03_architecture.md"
    complexity: 13
    test_requirements: |
      - Smoke test: load_pwc_panel() returns non-empty DataFrame with required columns
      - Smoke test: load_openml_panel() returns non-empty DataFrame
      - Unit test: label_saturation() correctly assigns saturated/healthy/excluded labels
      - Unit test: get_domain_panels() raises warning if below min thresholds
    reference_files:
      architecture: "03_architecture.md#DataPipeline"
      logic: "03_logic.md#Subtask-L-A1-1"
      config: "03_config.md#CONFIG-Dict"

  - id: "task-003"
    epic: "A-2 Signal Computation"
    title: "Implement signal_compute.py — domain-specific H_d signals"
    description: |
      Implement h-e1/code/signal_compute.py with 4 functions:

      1. compute_hd_cv(benchmark_scores, held_out_scores): Robustness gap.
         Fallback to score variance if held_out_scores is None/empty.

      2. compute_hd_nlp(benchmark_data, reference_benchmark_data): ConStat S_index.
         If ConStat unavailable: fallback to normalized mean difference.
         If data insufficient (<5 samples): return None.

      3. compute_hd_tabular(rankings_over_time, n_bootstrap=1000, seed=42):
         Block-bootstrapped mean Kendall tau. block_size = T // 4.
         Use np.random.default_rng(seed) for reproducibility.

      4. compute_domain_signals(panel, domain, lookback_months=24):
         Dispatch to appropriate compute_hd_* per domain.
         Returns DataFrame[benchmark, label, hd_signal, domain].
    feature_tag: "model"
    priority: 85
    source_document: "03_architecture.md"
    complexity: 15
    test_requirements: |
      - Unit test: compute_hd_cv with OOD scores vs. fallback (variance)
      - Unit test: compute_hd_nlp returns None for insufficient data
      - Unit test: compute_hd_tabular is reproducible with same seed
      - Integration test: compute_domain_signals returns correct schema
    reference_files:
      architecture: "03_architecture.md#SignalCompute"
      logic: "03_logic.md#Subtask-L-A2-1"
      config: "03_config.md#CONFIG-Dict"

  - id: "task-004"
    epic: "A-3 Baseline Model"
    title: "Implement baseline.py — naive feature extraction and logistic regression"
    description: |
      Implement h-e1/code/baseline.py with 3 functions:

      1. extract_naive_features(panel): Extract per-benchmark features:
         - score_variance_last_4q: variance of top-10 model scores over last 4 quarters
         - improvement_slope: linear trend of best score over time
         - benchmark_age_months: time since first submission
         Returns DataFrame[benchmark, label, score_variance_last_4q, improvement_slope, benchmark_age_months].

      2. fit_baseline(X_train, y_train): Fit LogisticRegression(class_weight='balanced').
         Returns fitted sklearn LogisticRegression.

      3. predict_baseline(model, X): Return predicted probabilities for saturated class (class=1).
    feature_tag: "model"
    priority: 78
    source_document: "03_architecture.md"
    complexity: 8
    test_requirements: |
      - Unit test: extract_naive_features returns correct columns
      - Unit test: fit_baseline trains without error on synthetic data
      - Unit test: predict_baseline returns probabilities in [0, 1]
    reference_files:
      architecture: "03_architecture.md#Baseline"
      logic: "03_logic.md#Module-baselinepy"
      config: "03_config.md#CONFIG-Dict"

  - id: "task-005"
    epic: "A-4 Evaluation + Gate Check"
    title: "Implement evaluate.py — statistical testing, mechanism verification, gate condition"
    description: |
      Implement h-e1/code/evaluate.py with 5 functions:

      1. test_discriminability(saturated_signals, healthy_signals):
         Mann-Whitney U test (two-sided), AUC = U/(n_sat * n_healthy), Cohen's d pooled std.
         Returns {"u_stat", "p_value", "cohens_d", "auc", "n_sat", "n_healthy"}.

      2. evaluate_domain(domain_signals, baseline_probs, domain):
         Full domain evaluation: discriminability + baseline AUC comparison.
         Returns {"domain", "discriminability", "baseline_auc", "signal_auc", "passes_gate"}.

      3. verify_mechanism_activated(domain_results):
         4 indicators per domain: p<0.05, |d|>0.5, auc>0.65, n_sufficient>=15.
         Returns (all_activated: bool, indicators dict).

      4. check_gate_condition(domain_results):
         PASS if p<0.05 AND Cohen's d>0.5 in >=2 of 3 domains.
         Returns (passed: bool, gate_details dict).

      5. run_temporal_test(panel, domain, lookbacks=[6,12,18,24]):
         Test discriminability at multiple lookback horizons.

      6. save_results(results, output_path): Save results dict as JSON.
    feature_tag: "evaluation"
    priority: 70
    source_document: "03_architecture.md"
    complexity: 14
    test_requirements: |
      - Unit test: test_discriminability on synthetic saturated vs. healthy signals
      - Unit test: check_gate_condition correctly counts passing domains
      - Unit test: verify_mechanism_activated returns correct boolean
      - Integration test: evaluate_domain combines discriminability + baseline correctly
    reference_files:
      architecture: "03_architecture.md#Evaluate"
      logic: "03_logic.md#Subtask-L-A4-1"
      config: "03_config.md#CONFIG-Dict"

  - id: "task-006"
    epic: "A-5 Visualization"
    title: "Implement visualize.py — 5 diagnostic figures"
    description: |
      Implement h-e1/code/visualize.py with 6 functions:

      1. plot_gate_metrics(domain_results, output_dir):
         Bar chart: p-value, Cohen's d, AUC per domain with threshold lines.
         Figure size (12, 5), DPI 150. Save as gate_metrics.png.

      2. plot_signal_boxplots(domain_signals, output_dir):
         Box plots: H_d distributions for saturated vs. healthy per domain.
         Figure size (10, 6), DPI 150. Save as boxplots.png.

      3. plot_roc_curves(domain_results, output_dir):
         ROC curves: signal vs. baseline per domain.
         Figure size (8, 6). Save as roc_curves.png.

      4. plot_temporal_separation(temporal_results, output_dir):
         Line plot: AUC/Cohen's d vs. lookback per domain.
         Figure size (12, 5). Save as temporal_separation.png.

      5. plot_scatter_saturation(domain_signals, output_dir):
         Scatter: H_d signal vs. Kendall tau, colored by label.
         Figure size (8, 7). Save as scatter.png.

      6. generate_all_figures(domain_results, domain_signals, temporal_results, output_dir):
         Call all plot_* functions; create output_dir if not exists.

      Use domain colors: cv=#2196F3, nlp=#FF5722, tabular=#4CAF50.
    feature_tag: "evaluation"
    priority: 62
    source_document: "03_architecture.md"
    complexity: 9
    test_requirements: |
      - Smoke test: generate_all_figures() runs without error on synthetic data
      - Verify all 5 PNG files are created in output_dir
    reference_files:
      architecture: "03_architecture.md#Visualize"
      logic: "03_logic.md#Module-visualizepy"
      config: "03_config.md#Subtask-C-A5-1"

  - id: "task-007"
    epic: "A-6 Orchestration + Integration"
    title: "Implement run_experiment.py — entry point with argparse and CSV logging"
    description: |
      Implement h-e1/code/run_experiment.py:

      1. CONFIG dict with all defaults (see 03_config.md for full dict including
         seed=42, n_bootstrap=1000, lookback_months=24, thresholds, output paths,
         domain_colors, threshold_line_styles).

      2. parse_args(config): argparse CLI overrides for seed, n_bootstrap,
         lookback_months, output_dir, results_csv.

      3. main(args=None): Orchestrate full pipeline:
         load_pwc_panel() + load_openml_panel()
         → label_saturation() for each panel
         → compute_domain_signals() per domain
         → fit_baseline + predict_baseline per domain
         → evaluate_domain() per domain
         → run_temporal_test() per domain
         → verify_mechanism_activated(domain_results)
         → check_gate_condition(domain_results)
         → generate_all_figures()
         → save_results(results, output_dir + "results.json")
         → print gate verdict: "GATE: PASS" or "GATE: FAIL"

      Ensure: os.makedirs(output_dir, exist_ok=True) before writing outputs.
    feature_tag: "experiment"
    priority: 55
    source_document: "03_architecture.md"
    complexity: 8
    test_requirements: |
      - Smoke test: python run_experiment.py --help exits cleanly
      - Integration smoke test: run end-to-end with small mock data (no API calls)
      - Verify results.json is created and gate verdict is printed
    reference_files:
      architecture: "03_architecture.md#RunExperiment"
      logic: "03_logic.md#Module-run_experimentpy"
      config: "03_config.md#CONFIG-Dict"

