      - compute_auc_comparison(): AUC of H_d(t-24mo) vs H_d(t) predicting collapse label
      - run_all_statistical_tests(): run MW + AUC for cv/nlp/tabular
      Secondary gate: mw_p_value < 0.05; supporting: auc_lead > 0.65
    reference_files:
