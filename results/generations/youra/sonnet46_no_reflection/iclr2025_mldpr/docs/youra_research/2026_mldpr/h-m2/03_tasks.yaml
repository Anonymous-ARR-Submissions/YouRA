  # ── Epic Tasks ─────────────────────────────────────────────────────────────
  - id: A-1
    title: "Data Pipeline Setup — Reuse H-M1 Panel"
    type: data-pipeline
    priority: 93
    complexity: 8
    description: |
      Implement h-m2/code/data_pipeline.py:
      - load_hm1_panel(): sys.path inject h-m1/code, load H-M1 panel with compression_event flags
      - filter_compressed_benchmarks(): filter to compression_event==1.0 and >=8 quarters
      - extend_panel_with_hd(): dispatch hd_signals.compute_all_hd_signals()
      Key: column is 'compression_event' (float 1.0), NOT 'compression_flag'
    reference_files:
      - path: "h-m2/03_logic.md"
        section: "A-1: Data Pipeline Setup"
      - path: "h-m2/03_prd.md"
        section: "FR-1: Data Pipeline"
      - path: "h-m2/03_config.md"
        section: "6. Run Config (Flat Dict)"

  - id: A-2
    title: "H_d Signal Computation (CV/NLP/Tabular)"
    type: model
    priority: 92
    complexity: 14
    description: |
      Implement h-m2/code/hd_signals.py:
      - compute_robustness_gap_cv(): rolling std of score_var_top10 (4-quarter window)
      - compute_contamination_nlp(): normalized abs deviation from baseline score
      - compute_kendall_tau_tabular(): block-bootstrapped Kendall tau (100 iters, seed=42)
      - compute_all_hd_signals(): dispatch per benchmark domain, merge hd_cv/hd_nlp/hd_tabular
      DOMAIN_THRESHOLDS = {cv:0.5, nlp:0.3, tabular:0.90}
    reference_files:
      - path: "h-m2/03_logic.md"
        section: "A-2: H_d Signal Computation"
      - path: "h-m2/03_prd.md"
        section: "FR-2: H_d Signal Computation per Domain"
      - path: "h-m2/03_config.md"
        section: "4. Domain Threshold Config"

  - id: A-3
    title: "Collapse Event Detection"
    type: model
    priority: 91
    complexity: 12
    description: |
      Implement h-m2/code/collapse_detector.py:
      - detect_collapse_events(): expanding Kendall tau > 0.90 for >=2 consecutive quarters
      - apply_r1_mitigation(): if events < 20, lower tau to 0.85 and re-detect
      Returns collapse_df: [benchmark_id, collapse_quarter]
    reference_files:
      - path: "h-m2/03_logic.md"
        section: "A-3: Collapse Event Detection"
      - path: "h-m2/03_prd.md"
        section: "FR-3: Collapse Event Detection"

  - id: A-4
    title: "Temporal Analysis + Kaplan-Meier Lead Time"
    type: model
    priority: 90
    complexity: 15
    description: |
      Implement h-m2/code/temporal_analysis.py:
      - compute_signal_onset_times(): first quarter H_d exceeds threshold; lead_months = (collapse_q - onset_q).n * 3
      - run_temporal_ordering_test(): KaplanMeierFitter fit, fraction_leading computation
      - compute_onset_for_all_domains(): orchestrate cv/nlp/tabular onset computation
      Primary gate metric: fraction_leading >= 0.60 in >= 2 domains
    reference_files:
      - path: "h-m2/03_logic.md"
        section: "A-4: Temporal Analysis + KM"
      - path: "h-m2/03_prd.md"
        section: "FR-4: Signal Onset Time Computation"

