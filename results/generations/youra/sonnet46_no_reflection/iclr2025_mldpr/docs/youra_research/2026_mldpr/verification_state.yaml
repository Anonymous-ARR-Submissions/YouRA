  id: H-BCBHS-v1
  statement: 'Under heterogeneous ML benchmarks spanning CV, NLP, and tabular domains (Papers With Code +

    OpenML corpora), if we compute domain-specific health estimators H_d(B,t) — robustness gap

    (CV), contamination-adjusted S_index via ConStat (NLP), block-bootstrapped Kendall τ rank

    stability (tabular) — and calibrate these into a shared Cox proportional hazards model

    (controlling for benchmark age, submission volume, model scale growth trend), then the resulting

    BCBHS(B,t) will predict time-to-discriminative-collapse T(B) with C-index ≥ 0.70 and

    lowest-quintile benchmarks showing ≥2× hazard ratio for collapse within 24 months, because

    benchmark health degrades through domain-specific measurable signals whose shared hazard

    calibration structure enables prospective early warning ≥12 months before community consensus.

    '
  title: 'BCBHS: Benchmark-Calibrated Health Score for Cross-Domain Discriminative Collapse Prediction'
