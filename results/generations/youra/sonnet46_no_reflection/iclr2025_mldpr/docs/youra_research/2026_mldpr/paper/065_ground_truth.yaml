# ============================================================
# HYPOTHESIS GATE RESULTS
# ============================================================

hypothesis_gates:
  h_e1:
    id: "H-E1"
    name: "Existence Validation"
    gate_result: "PASS"
    criterion: "p < 0.05 AND |d| > 0.5 in ≥2/3 domains"
    result: "All 3 domains pass with |d| > 5"

  h_m1:
    id: "H-M1"
    name: "Causal Mechanism Validation"
    gate_result: "PASS"
    criterion: "Granger p < 0.05 at lag=2"
    result: "Granger p=1.854e-05, reverse not confirmed"

  h_m2:
    id: "H-M2"
    name: "Temporal Ordering / Cross-sectional Diagnostic"
    gate_result: "SHOULD_WORK_FAIL"
    primary_criterion: "fraction_leading ≥ 0.60 in ≥2 domains"
    primary_result: "fraction_leading=0.000 all domains (1 collapse event detected)"
    secondary_result: "NLP AUC_lead=0.857 (PASS on secondary metric)"
    root_cause: "expanding_tau operationalization incompatible with quarterly panel data"

  h_m3:
    id: "H-M3"
    name: "Cox PH Survival Model"
    gate_result: "NOT_EXECUTED"
    reason: "Blocked by H-M2 operationalization failure"

  h_m4:
    id: "H-M4"
    name: "Lead Time Analysis (Kaplan-Meier)"
    gate_result: "NOT_EXECUTED"
    reason: "Blocked by H-M2 operationalization failure"

