    future_work: "FW1: re-run H-E1 on real H-M1 panel"

  L2:
    description: "Cox PH survival model (H-M3) not validated"
    severity: HIGH
    future_work: "FW2: recalibrate collapse events → FW3: re-run H-M3"

  L3:
    description: "Temporal ordering of H_d signals not established"
    severity: HIGH
    future_work: "FW2+FW3 prerequisite chain"

  L4:
    description: "Granger per-benchmark power limited (41 of 466 tested)"
    severity: MODERATE
