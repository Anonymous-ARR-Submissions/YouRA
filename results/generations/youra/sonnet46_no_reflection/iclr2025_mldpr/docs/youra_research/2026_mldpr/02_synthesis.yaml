hypothesis_draft:
  title: "BCBHS: Benchmark-Calibrated Health Score for Cross-Domain Discriminative Collapse Prediction"
  hypothesis_id: "H-BCBHS-v1"
  core_claim: |
    A domain-calibrated benchmark health scoring framework (BCBHS) using domain-specific observable
    signals — robustness gap (CV), contamination-adjusted S_index (NLP), Kendall τ rank stability
    (tabular) — fed into a shared Cox proportional hazards model can predict time-to-discriminative-
    collapse for ML benchmarks with C-index ≥ 0.70, providing ≥12 months early warning before
    community consensus on benchmark saturation, across CV, NLP, and tabular domains.
  mechanism: |
    Benchmark health degrades via domain-specific pathways: (1) CV benchmarks show widening
    robustness gaps as models overfit test set statistics (Recht et al. 2019); (2) NLP benchmarks
    accumulate contamination probability as training data overlaps test sets; (3) tabular benchmarks
    show premature rank correlation stabilization as model families converge on optimal solutions.
    Despite domain-specific manifestations, these signals share a common latent risk structure
    (tested via CFA/CCA) that can be calibrated into a shared hazard model — making "universal"
    mean shared risk prediction rather than a single formula.
  predictions:
    - P1: "Cox model C-index ≥ 0.70 predicting time-to-collapse on 2023–2025 test benchmarks with lowest-quintile BCBHS showing ≥2× hazard ratio"
    - P2: "Median lead time ≥ 12 months between BCBHS threshold crossing and discriminative collapse event in CV and NLP domains"
    - P3: "Partial metric invariance (configural + metric) across CV and NLP domains; LODO shared model ΔC-index ≥ 0.03 over domain-specific baselines"

variables_summary:
  independent: "BCBHS(B,t) — domain-specific health score calibrated to shared hazard via Cox model; domain type as stratification variable"
  dependent_primary: "Time-to-discriminative-collapse T(B): first quarter where Kendall τ(ranking_t, ranking_{t+2q}) > 0.90 with bootstrap CI"
  controlled: "Benchmark age (years), submission volume (log-transformed), model scale growth trend (log parameter count YoY)"

null_hypothesis:
  h0_statement: |
    BCBHS(B,t) does not significantly predict time-to-discriminative-collapse after controlling
    for benchmark age, submission volume, and model scale growth trend (Cox model hazard ratio = 1.0,
    p > 0.05; C-index ≤ 0.60 on held-out 2023–2025 benchmarks).
  statistical_test: "Cox proportional hazards model; Harrell's C-index; log-rank test; bootstrap CI"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: |
    Two-stage architecture separating domain-specific signal extraction from cross-domain hazard
    calibration. 'Universal' means shared risk prediction structure, not a single formula.
    First prospective survival analysis framework for benchmark lifecycle prediction on panel data.
  differentiation_summary: |
    Prior work (S_index, Polo et al. 2026) is LLM-specific and retrospective (R²=0.884 on current
    state). BCBHS is cross-domain (CV+NLP+tabular), prospective (predicts future collapse), and
    uses domain-calibrated survival analysis. Roelofs 2019 methodology covers CV only, post-hoc.
    evaleval/benchmark-saturation implements S_index without cross-domain extension or prospective
    validation. No prior work uses survival analysis on Papers With Code + OpenML panel data.

