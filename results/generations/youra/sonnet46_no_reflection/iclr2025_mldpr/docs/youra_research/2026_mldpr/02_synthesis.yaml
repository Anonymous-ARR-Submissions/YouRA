  overall_level: "HIGH"
  clarity_verified: true
  improvements_needed: []

experimental_scope:
  models:
    - "Cox Proportional Hazards (domain-stratified, time-varying covariates)"
    - "Multi-group CFA for measurement invariance testing"
    - "Canonical Correlation Analysis for cross-domain factor structure"
    - "Kaplan-Meier estimator for lead time distribution"
  datasets:
    - "Papers With Code leaderboard panel (CV + NLP, 3000+ benchmarks, 2018–2025)"
    - "OpenML benchmark panel (tabular, 21,000+ datasets, standardized protocols)"
    - "ConStat contamination probability estimates for NLP benchmarks"
    - "evaleval S_index values for NLP benchmark cross-validation"
  baselines:
    - "Slope-only Cox model"
    - "Slope + score variance Cox model"
    - "Slope + variance + benchmark age Cox model (primary ablation)"
    - "S_index-only Cox model (NLP domain)"

measurement_plan:
  data_collection:
    - source: "Papers With Code API — leaderboard submission time series per benchmark per task"
    - source: "OpenML Python client — model evaluation scores per dataset per run"
    - source: "ConStat (eth-sri/ConStat) — contamination probability estimates for NLP benchmarks"
    - source: "evaleval/benchmark-saturation — S_index cross-validation values for NLP"
    - source: "Semantic Scholar API — paper publication dates and citation counts for benchmark papers (scale growth proxy)"
  procedure:
    - step: "1. Construct panel dataset: (benchmark_id, year, quarter) × feature matrix from APIs"
    - step: "2. Compute domain-specific H_d(B,t): robustness gap (CV), contamination-adjusted S_index (NLP), block-bootstrapped Kendall τ (tabular)"
    - step: "3. Label collapse events: identify first quarter where discriminative collapse criterion met (Kendall τ > 0.90 threshold)"
    - step: "4. Train Cox model on ≤2022 data with BCBHS features + covariates; validate on 2023–2025"
    - step: "5. Nested ablation: slope → slope+variance → slope+variance+age → full BCBHS; report ΔC-index"
    - step: "6. CFA measurement invariance testing: configural → metric → scalar across domains"
    - step: "7. Leave-one-domain-out evaluation: train on 2 domains, test on held-out domain"
    - step: "8. Lead time analysis: Kaplan-Meier on BCBHS threshold crossing → collapse event intervals"
  success_criteria:
    - "C-index ≥ 0.70 on 2023–2025 test set (primary)"
    - "Hazard ratio ≥ 2.0 for lowest-quintile BCBHS benchmarks"
    - "ΔC-index ≥ 0.05 over slope+variance+age baseline"
    - "Median lead time ≥ 12 months in CV and NLP"
    - "Partial metric invariance confirmed (CFI ≥ 0.90 for configural + metric models)"

validation:
  internal_validity:
    - "Time-split validation prevents data leakage: train ≤2022, test 2023–2025"
    - "Feature/outcome separation prevents circularity: BCBHS features (robustness gap, contamination, rank stability) are distinct from collapse outcome (Kendall τ of ranking)"
    - "Schoenfeld residuals test validates proportional hazards assumption"
    - "Bootstrap CI for all performance metrics (1000 iterations)"
    - "Nested model comparison with statistical significance testing (likelihood ratio test)"
  external_validity:
    - "Coverage: test on both famous benchmarks (MMLU, ImageNet) and obscure OpenML tasks to avoid attention-modeling"
    - "Temporal generalization: rolling-origin evaluation to check predictive stability over time"
    - "Domain transfer: leave-one-domain-out tests whether hazard calibration generalizes to unseen domain types"
    - "Sociological validation (auxiliary): BCBHS predicts human retirement decisions after controlling for publication volume, citation velocity, model scale — if positive, confirms intrinsic health signal"

discussion_synthesis:
  key_insights:
    - "The S_index formula (exp(-R_norm²)) is domain-specific; cross-domain health requires domain-calibrated features not a single formula"
    - "'Universal' benchmark health means shared hazard calibration structure, not raw score comparability — a key conceptual reframe from the discussion"
    - "Discriminative power decay (Kendall τ rank stability) is a cleaner ground truth than human retirement decisions, avoiding sociological confounds"
    - "Panel survival analysis resolves the small-N collapse event problem by treating (benchmark × quarter) pairs as observations"
    - "Feature/outcome separation is critical: BCBHS features must be causally upstream signals, not concurrent symptoms of collapse"
  breakthrough_moments:
    - "Prof. Pax proposed replacing human retirement labels with discriminative power decay as ground truth — eliminated sociological confound cleanly"
    - "Prof. Rex reframed 'universal' from raw score equality to shared hazard calibration — resolved the commensurability objection that had blocked the discussion"
    - "Dr. Ally specified the Cox survival model with pre-registered falsification thresholds — converted vague hypothesis to testable scientific claim"
    - "Prof. Rex's insistence on time-split validation and leave-one-domain-out evaluation crystallized the experimental design"
  resolved_tensions:
    - "Universal vs. domain-specific: resolved via two-stage architecture (domain-specific extractors + shared hazard model)"
    - "Sociological vs. technical ground truth: resolved by adopting discriminative collapse (Kendall τ) as primary outcome, retirement as auxiliary validation"
    - "Small-N problem: resolved by panel survival analysis treating (benchmark × quarter) as observation unit"
    - "Circularity risk: resolved by strict feature/outcome separation"
