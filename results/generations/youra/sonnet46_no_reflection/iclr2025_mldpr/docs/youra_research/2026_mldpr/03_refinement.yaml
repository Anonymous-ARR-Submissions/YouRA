# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-BCBHS-v1"
  confidence_level: 0.78
  core_hypothesis_statement: |
    Under heterogeneous ML benchmarks spanning CV, NLP, and tabular domains (Papers With Code +
    OpenML corpora), if we compute domain-specific health estimators H_d(B,t) — robustness gap
    (CV), contamination-adjusted S_index via ConStat (NLP), block-bootstrapped Kendall τ rank
    stability (tabular) — and calibrate these into a shared Cox proportional hazards model
    (controlling for benchmark age, submission volume, model scale growth trend), then the resulting
    BCBHS(B,t) will predict time-to-discriminative-collapse T(B) — operationalized as the first
    quarter where expected Kendall τ(ranking_t, ranking_{t+Δ}) > 0.90 with bootstrap CI —
    with C-index ≥ 0.70 and lowest-quintile benchmarks showing ≥2× hazard ratio for collapse
    within 24 months, because benchmark health degrades through domain-specific measurable signals
    whose shared hazard calibration structure enables prospective early warning ≥12 months before
    community consensus.
  alternative_hypothesis_h0: |
    There is no significant difference in time-to-discriminative-collapse between benchmarks in
    the lowest BCBHS quintile and all other benchmarks after controlling for age, submission
    volume, and model scale growth (Cox model hazard ratio = 1.0, p > 0.05).

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "BCBHS(B,t) — Benchmark-Calibrated Health Score"
      type: "continuous"
      operationalization: |
        Stage 1: Compute domain-specific H_d(B,t):
          CV: robustness_gap(B,t) = accuracy_in_domain(B,t) - accuracy_shifted(B,t), normalized by historical σ
          NLP: contamination_adjusted_S_index = S_index × (1 - contamination_prob via ConStat)
          Tabular: block_bootstrapped_Kendall_τ stability across model family rankings over trailing 4 quarters
        Stage 2: Map H_d(B,t) values to calibrated hazard via domain-aware Cox model
      levels: []
    - name: "Domain type"
      type: "categorical"
      operationalization: "CV / NLP / Tabular — used as stratification variable in Cox model"
      levels: ["CV", "NLP", "Tabular"]
  dependent:
    - name: "Time-to-discriminative-collapse T(B)"
      type: "continuous"
      operationalization: |
        Discriminative collapse event E(B,t): first quarter where expected Kendall τ between
        top-k model rankings at t and t+2 quarters exceeds 0.90 threshold with 95% bootstrap CI
        (computed via block bootstrap over model family submissions). Operationally: mean pairwise
        score gap Δ(B,t) falls below noise floor ε = 1.5σ_measurement for ≥2 consecutive periods.
        T(B) = time from baseline measurement to first collapse event. Right-censored if no event
        by end of observation window.
      primary: true
    - name: "ΔC-index over baseline"
      type: "continuous"
      operationalization: "C-index(BCBHS full model) - C-index(slope+variance+age baseline)"
      primary: false
    - name: "Early-warning lead time"
      type: "continuous"
      operationalization: "Months between BCBHS first crossing retirement threshold (Youden's J optimized) and collapse event E(B,t)"
      primary: false
  controlled:
    - name: "Benchmark age"
      operationalization: "Years since benchmark publication date (from Papers With Code metadata)"
    - name: "Submission volume"
      operationalization: "Log-transformed total model submissions to leaderboard at time t"
    - name: "Model scale growth trend"
      operationalization: "Year-over-year log increase in parameter count of top-5 models on benchmark"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Benchmark over-optimization: as submissions accumulate, models increasingly overfit to test set statistical properties rather than generalizing underlying task"
      evidence: "Recht et al. 2019 (ImageNet → ImageNet-V2 accuracy drops); Roelofs 2019 (CIFAR-10 benchmark overfitting); MMLU saturation at GPT-4 >86%"
      falsifier: "Score-distribution compression absent despite high submission count on a well-maintained benchmark"
    - step: 2
      description: "Domain-specific degradation signals emerge: robustness gap widens (CV), contamination probability increases (NLP), rank correlation stabilizes prematurely (tabular) — all measurable before community consensus"
      evidence: "Recht et al. 2019 robustness gap methodology; ConStat contamination detection (eth-sri); S_index leaderboard rank analysis (Polo et al. 2026)"
      falsifier: "Domain-specific signals show no statistical difference between benchmarks known to be saturated vs. healthy at t-24 months"
    - step: 3
      description: "Shared hazard calibration: despite domain-specific manifestations, the underlying risk of discriminative power collapse shares a common structure detectable via a shared Cox model — 'universal' is hazard calibration, not raw score equality"
      evidence: "Hypothesis tested via CCA on domain-specific features; partial metric invariance required (configural + metric invariance across CV, NLP, tabular)"
      falsifier: "Leave-one-domain-out Cox model fails to predict collapse in held-out domain (C-index < 0.65); CCA shows <30% shared variance across domains"
    - step: 4
      description: "Early warning window: BCBHS signal precedes community consensus retirement by ≥12 months, enabling proactive benchmark replacement rather than reactive deprecation"
      evidence: "MMLU community recognition of saturation ~18 months after first measurable score compression; similar patterns in ImageNet post-2018"
      falsifier: "Median lead time between BCBHS threshold crossing and collapse event < 6 months (insufficient for practical benchmark replacement planning)"
  key_tension: "Whether domain-specific saturation signals share sufficient cross-domain hazard structure to justify a shared model vs. requiring fully independent domain-local predictors"
  evidence_summary: |
    Evidence chain: (1) benchmark over-optimization is empirically established (Recht 2019, Roelofs 2019);
    (2) domain-specific observable signals exist and are computable (ConStat, evaleval, robustness gap methodology);
    (3) shared hazard structure is the novel empirical claim to be tested via CCA + leave-one-domain-out;
    (4) community consensus lag is documented anecdotally (MMLU, ImageNet) and needs systematic quantification.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Papers With Code and OpenML contain sufficient collapse events (≥20 confirmed historical events) for survival model training and validation"
    supporting_evidence: "Papers With Code has 3000+ benchmarks × 6 years panel; estimated 40-60 benchmarks with measurable score compression events (MMLU, SQuAD, CIFAR-10, GLUE sub-tasks)"
    consequence_if_violated: "Insufficient power for Cox model; latent factor model underfitted; restrict analysis to well-documented benchmarks and report as preliminary study"
  - id: "A2"
    assumption: "Discriminative collapse (Kendall τ > 0.90 threshold) is a valid proxy for reduced scientific utility of a benchmark"
    supporting_evidence: "If top-k rankings are statistically indistinguishable, new methods cannot demonstrate improvement — this is the operational definition of 'saturated' from the community perspective"
    consequence_if_violated: "Ground truth is misaligned with research impact; mediation test (collapse → publication entropy reduction) would show no effect; require alternative outcome definition"
  - id: "A3"
    assumption: "Domain-specific feature signals (robustness gap, contamination probability, rank stability) are causally upstream of discriminative collapse rather than concurrent symptoms"
    supporting_evidence: "Contamination precedes inflation then collapse (documented in LLM benchmarks); robustness gap precedes score plateau in CV (Recht 2019); these are leading not lagging indicators"
    consequence_if_violated: "BCBHS is a concurrent descriptor not a prospective predictor; lead time would be near zero; early-warning claim fails"
  - id: "A4"
    assumption: "Benchmark submissions to Papers With Code and OpenML leaderboards are sufficiently complete and unbiased to reconstruct ranking distributions"
    supporting_evidence: "Papers With Code tracks 3000+ tasks with structured leaderboard data; OpenML has standardized evaluation protocols; however submission selectivity (only positive results reported) may bias rankings"
    consequence_if_violated: "Kendall τ estimates are biased toward apparent stability; robustness of collapse detection requires sensitivity analysis with imputed missing submissions"
  - id: "A5"
    assumption: "A shared Cox proportional hazards model across domains is appropriately specified (proportional hazards assumption holds)"
    supporting_evidence: "Domain stratification in Cox model absorbs baseline hazard differences; time-varying covariates (scale growth trend) are incorporated; Schoenfeld residuals test will validate PH assumption"
    consequence_if_violated: "Switch to accelerated failure time (AFT) model or stratified Cox; fundamental causal structure still testable, just with different model form"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    ML benchmarks with structured leaderboard submissions in Papers With Code (CV, NLP tasks)
    and OpenML (tabular classification/regression tasks) with ≥20 model submissions and ≥2 years
    of submission history. Domains covered: computer vision (image classification, object detection),
    natural language processing (QA, NLI, summarization), tabular classification/regression.
  does_not_apply_to: |
    Reinforcement learning benchmarks (insufficient structured leaderboard data for panel analysis);
    benchmarks with <20 submissions or <2 years history (insufficient for survival analysis);
    domain-specific medical/scientific benchmarks without standardized leaderboard infrastructure;
    private industry benchmarks without public submission data.
  known_limitations: |
    (1) Submission selectivity bias: only models achieving competitive results are typically submitted,
    creating right-skewed rank distributions. (2) Small-N for collapse events limits latent factor
    modeling power. (3) Partial metric invariance may be the honest finding rather than full universality.
    (4) Lead time estimate depends on collapse threshold choice (Youden's J optimized); threshold
    sensitivity analysis required.

