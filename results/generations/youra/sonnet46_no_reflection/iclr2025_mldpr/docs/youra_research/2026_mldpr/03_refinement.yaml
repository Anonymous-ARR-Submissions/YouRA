experimental_setup:
  dataset:
    name: "Papers With Code Leaderboard Panel + OpenML Benchmark Panel"
    type: "standard"
    source: "Papers With Code API (paperswithcode.com/api); OpenML Python client (openml-python)"
    path: "External APIs — no local storage required for metadata; leaderboard CSVs downloadable"
    hypothesis_fit: |
      Papers With Code provides time-series submission data across 3000+ CV and NLP benchmarks
      spanning 2018–2025, enabling panel construction for survival analysis. OpenML provides
      21,000+ tabular datasets with standardized evaluation protocols. Together they cover all
      three target domains with sufficient history for collapse event detection.
  model:
    name: "Cox Proportional Hazards Model (domain-stratified) + CFA for invariance testing"
    type: "survival analysis + structural equation modeling"
    source: "lifelines (Python); semopy or lavaan-equivalent for CFA; scikit-learn for baseline models"
    hypothesis_fit: |
      Cox PH model directly tests the core survival prediction claim. Domain stratification handles
      baseline hazard heterogeneity. CFA tests measurement invariance for latent universality claim.
      Both are interpretable and methodologically standard, enabling transparent falsification.
  baselines:
    - name: "Slope-only baseline"
      method: "Cox model with single covariate: linear slope of score improvement over trailing 8 quarters"
    - name: "Slope + variance baseline"
      method: "Cox model with slope + score variance across top-k models"
    - name: "Slope + variance + age baseline"
      method: "Cox model adding benchmark age (years since publication) — the critical confound control"
    - name: "S_index baseline (NLP only)"
      method: "Cox model using S_index = exp(-R_norm²) from Polo et al. 2026 as sole covariate on NLP benchmarks"

# ═══════════════════════════════════════════════════════════════
# SECTION 3: Novelty & Innovation
# ═══════════════════════════════════════════════════════════════

novelty:
  preserved_novelty: |
    First application of survival analysis to benchmark lifecycle prediction on panel leaderboard data.
    First cross-domain framework with domain-calibrated feature extractors unified via shared hazard
    calibration. Reframes 'universal benchmark health' from a single formula to a shared risk model.
  key_innovation: |
    The key innovation is the two-stage architecture: domain-specific signal extraction (robustness gap,
    contamination probability, rank stability) → shared Cox hazard calibration. This separates the
    'what to measure per domain' problem from the 'how to compare health across domains' problem,
    resolving the commensurability objection raised throughout the discussion. Prior work (S_index)
    provides a single-domain formula; BCBHS provides a cross-domain prospective prediction framework.
  differentiation:
    - prior_work: "S_index (Polo et al. 2026, arXiv:2602.16763)"
      difference: "S_index is LLM-specific, retrospective (describes current state), and uses a single formula. BCBHS is cross-domain, prospective (predicts future collapse), and uses domain-calibrated features with shared hazard model."
    - prior_work: "Roelofs 2019 (benchmark overfitting measurement)"
      difference: "Roelofs provides methodology for CV benchmarks only and characterizes overfitting post-hoc. BCBHS extends to NLP/tabular and predicts collapse prospectively."
    - prior_work: "evaleval/benchmark-saturation (GitHub)"
      difference: "evaleval implements S_index for LLM leaderboards with clustering and time-series tracking. BCBHS adds cross-domain generalization, survival model, and prospective early-warning validation."

