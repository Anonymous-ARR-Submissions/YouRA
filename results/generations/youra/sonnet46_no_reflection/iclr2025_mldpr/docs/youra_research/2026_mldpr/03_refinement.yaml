predictions:
  - id: "P1"
    primary: true
    statement: "BCBHS(B,t) predicts time-to-discriminative-collapse with C-index ≥ 0.70 under time-split validation (train ≤2022, test 2023–2025), with benchmarks in the lowest BCBHS quintile showing ≥2× hazard ratio for collapse within 24 months vs. top-4 quintiles combined"
    test_method: "Cox proportional hazards model with BCBHS as time-varying covariate; domain stratification; time-split validation; Harrell's C-index; bootstrap CI for hazard ratios; Schoenfeld residuals test for PH assumption"
    success_criterion: "C-index ≥ 0.70 on 2023–2025 test set; HR ≥ 2.0 for lowest quintile vs. rest; p < 0.05; ΔC-index ≥ 0.05 over slope+variance+age baseline"
    falsification: "C-index < 0.65 on test set; HR < 1.5 for lowest quintile; or baseline model achieves equivalent C-index (ΔC-index < 0.02)"
  - id: "P2"
    primary: false
    statement: "BCBHS provides ≥12-month median lead time between first threshold crossing (Youden's J optimized on training folds) and discriminative collapse event, across CV and NLP domains"
    test_method: "Kaplan-Meier analysis of lead time distribution; pre-register threshold via Youden's J on ≤2022 data; compute lead time for 2023–2025 collapse events; stratify by domain"
    success_criterion: "Median lead time ≥ 12 months in both CV and NLP; IQR reported; ≥70% of collapse events preceded by BCBHS threshold crossing"
    falsification: "Median lead time < 6 months in either domain; or <50% of collapse events preceded by threshold crossing"
  - id: "P3"
    primary: false
    statement: "Domain-specific BCBHS features share partial metric invariance across CV and NLP (configural + metric invariance; scalar invariance not required), and the latent factor improves leave-one-domain-out collapse prediction by ≥ΔC-index 0.03 over domain-only baselines"
    test_method: "Multi-group CFA with sequential invariance testing (configural → metric → scalar); leave-one-domain-out evaluation of shared Cox model vs. domain-specific Cox model; CCA for shared variance estimation"
    success_criterion: "Configural + metric invariance confirmed (CFI ≥ 0.90); shared factor explains ≥40% variance in collapse outcomes across domains; LODO ΔC-index ≥ 0.03"
    falsification: "Metric invariance rejected (factor loadings differ significantly across domains); LODO shared model underperforms domain-specific baseline (ΔC-index < 0)"

