# IMPLEMENTATION BUGS (from 045_validated_hypothesis.md Appendix B)
# ============================================================

implementation_bugs:
  B1:
    component: "NgramIndex.max_overlap"
    actual: "Counts total n-gram occurrences"
    correct: "Should count max consecutive run length"
    impact: "Inflates lexical scores; threshold semantics altered"
    severity: "moderate"

  B2:
    component: "StratifiedEvaluator f1_matrix"
    actual: "Scalar broadcast"
    correct: "Per-item computation required"
    impact: "Indeterminacy rate degenerate (0.000)"
    severity: "high"

  B3:
    component: "DCPDDDetector"
    actual: "Uses -ref_log_prob (single model)"
    correct: "Must use log P_target - log P_ref (two models)"
    impact: "All-zero DC-PDD outputs → 100% positive rate; Min-K++ variance unmeasurable"
    severity: "critical"

  B4:
    component: "ConStatDetector"
    actual: "Custom heuristic"
    correct: "Must use llmsanitize.contamination.constat() API"
    impact: "Non-standard ConStat outputs"
    severity: "high"

