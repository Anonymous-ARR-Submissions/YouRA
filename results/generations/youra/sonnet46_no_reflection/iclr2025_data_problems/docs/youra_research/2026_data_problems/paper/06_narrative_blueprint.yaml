# Narrative Blueprint for Phase 6 Paper Generation
# H-GeomRoute-v1: Geometry-Governed Contamination Detection
# Generated by Phase 6 Step 02 — Narrative Design
# Date: 2026-05-13

paper_title: "When Geometry Meets Contamination: Stratum Collapse as a Methodological Boundary Condition for Detector Routing in Foundation Model Evaluation"

# ============================================================================
# HOOK DESIGN
# ============================================================================

hook:
  strategy: "Counterintuitive Finding"
  opening_statement:
    content: >
      MMLU, the most widely used evaluation benchmark for foundation models, is verbatim-contaminated
      in every major pretraining corpus we tested — yet no existing contamination detector reliably
      predicts which detection method will work best for a given benchmark item. This is not a
      failure of the detectors themselves, but a failure of experimental methodology: without
      targeted corpus retrieval, geometry-based routing cannot even begin.
    rationale: >
      Counterintuitive because readers expect contamination detection to be a solved problem,
      but we show the methodology itself has a critical design boundary condition (stratum collapse)
      that prior work has not explicitly characterized.

  why_reader_should_care:
    main_reason: >
      Practitioners deploying contamination detection in FM evaluation pipelines need to know
      when their chosen method will fail — not just which method is best on average. Our work
      characterizes a fundamental failure mode (stratum collapse) that affects every geometry-based
      routing approach.
    concrete_example: >
      MMLU achieves n-gram recall = 1.0 against The Pile, C4, and FineWeb at 50K-doc sampling,
      while GSM8K achieves recall = 0.0 against all three corpora. These are not detection failures —
      they reveal that heterogeneous benchmarks require fundamentally different detection criteria.
    stakes: >
      If the contamination detection community continues using random corpus streaming for
      geometry feature computation, all geometry-based routing systems will silently collapse
      to single-stratum behavior, making routing comparisons meaningless.

# ============================================================================
# PROBLEM FRAMING (Three Levels)
# ============================================================================

problem_framing:
  surface_problem:
    description: >
      Foundation model evaluation benchmarks (MMLU, HellaSwag, GSM8K) may be contaminated
      in LLM pretraining corpora, inflating apparent performance. Multiple detection methods
      exist (n-gram overlap, embedding similarity, membership inference attacks) but give
      inconsistent signals.
    common_understanding: >
      Prior work (Singh et al. 2024, Fu et al. 2024) shows that different detectors disagree
      on which benchmarks are contaminated, and MIA-based detectors often perform near random
      guessing. The field acknowledges the problem but lacks a principled framework for choosing
      the right detector.

  deeper_problem:
    description: >
      The inconsistency across detectors is not random — it is structurally determined by the
      geometric relationship between benchmark items and their nearest corpus neighbors. N-gram
      detectors excel at lexical overlap; embedding-based methods capture semantic proximity;
      MIA-based methods detect memorization signatures. These are orthogonal signal types.
      A principled routing rule based on corpus-side geometry could resolve the inconsistency.
    why_overlooked: >
      Prior work has compared detectors head-to-head on aggregate benchmarks without asking
      whether the disagreement itself carries information about the contamination geometry of
      each item. The geometry of the corpus overlap space has not been used as a routing signal.
    our_perspective: >
      We hypothesize and attempt to verify that corpus-side geometric signals (max 13-gram
      overlap count + SBERT cosine similarity to nearest corpus neighbor) define a phase diagram
      that predicts which detector family will perform best for each benchmark item.

  gap_in_existing_work:
    description: >
      No existing study has (1) systematically characterized the geometry of corpus overlap
      for heterogeneous benchmarks, (2) tested whether geometric signals can route to the
      best detector, or (3) identified the methodological boundary conditions (specifically,
      the requirement for top-k retrieval vs. random streaming) that determine when
      geometry-based routing is even feasible.
    why_gap_exists: >
      Building the required infrastructure (large-scale FAISS indices, n-gram inverted indices,
      multi-detector evaluation) is expensive. The methodological dependency on targeted retrieval
      (as opposed to random corpus sampling) has not been previously identified as a critical
      design requirement.
    why_gap_matters: >
      Without understanding these boundary conditions, any geometry-based routing system will
      fail silently — producing a "stratum collapse" where all items land in a single stratum
      regardless of their true contamination geometry, making routing meaningless.

# ============================================================================
# KEY INSIGHT
# ============================================================================

key_insight:
  aha_moment:
    one_sentence: >
      Geometry-based contamination detector routing requires top-k nearest-neighbor corpus
      retrieval — random corpus streaming produces degenerate near-zero SBERT similarity
      distributions that collapse all benchmark items into a single stratum, making routing
      structurally impossible.
    expanded_explanation: >
      For a non-contaminated benchmark item, the probability that a randomly-sampled corpus
      document is semantically similar to it is near zero — making random streaming unable to
      produce meaningful SBERT cosine scores. Only top-k nearest-neighbor retrieval (where we
      actively find the most similar corpus documents for each item) produces a non-degenerate
      similarity distribution suitable for stratum formation. This is not an optimization —
      it is a binary prerequisite: without top-k retrieval, the semantic stratum cannot be formed.
      We call this the "stratum collapse" failure mode.

  why_others_missed_it:
    common_assumptions: >
      Prior work on embedding-based contamination detection (Yang et al. 2023, LLMSanitize)
      implicitly assumed that corpus subsets could be randomly sampled to build similarity
      reference distributions. The critical difference between "random sample" and "top-k
      nearest neighbor" was not identified as a methodological boundary condition.
    our_different_view: >
      We discovered this boundary condition through systematic failure: our experiment produced
      stratum collapse at full scale (50K docs) even though the same code showed 3-way
      stratification at 0.01× dry-run scale (500 docs). The dry-run/full-run discrepancy
      forced us to diagnose why — revealing the top-k retrieval requirement.
    enabling_factor: >
      Running the full experiment and carefully analyzing the root cause of gate failure,
      rather than stopping at "experiment failed."

  what_makes_it_work:
    intuitive_explanation: >
      Think of a library: if you randomly open books to find something similar to a specific
      topic, you will almost always find unrelated content. But if you use the library's
      search index to find the top-10 most relevant books, you will find meaningful matches.
      Contamination geometry requires the same: targeted search, not random sampling.
    key_mechanism: >
      SBERT cosine similarity between a benchmark item and a random corpus document is
      dominated by the base rate of semantic dissimilarity between random document pairs.
      For 50K random docs, the 75th-percentile threshold for "high similarity" is essentially
      zero — so all items exceed it, collapsing into the lexical stratum.

# ============================================================================
# EVIDENCE NARRATIVE
# ============================================================================

evidence_narrative:
  main_claim:
    statement: >
      Random corpus streaming is insufficient for contamination geometry decomposition —
      it produces stratum collapse. Top-k retrieval is a necessary design requirement,
      not an optimization. We document this as a boundary condition for all future
      geometry-based contamination detector routing systems.
    measurable_criteria:
      - "Stratum collapse documented: 25,403/25,403 items → lexical stratum (0 semantic, 0 indeterminate)"
      - "MMLU verbatim recall = 1.0 across all 3 corpora (The Pile, C4, FineWeb)"
      - "GSM8K verbatim recall = 0.0 across all 3 corpora"
      - "Root cause identified: random streaming → degenerate cosine distributions"
      - "Top-k retrieval requirement derived from theoretical analysis + empirical failure"

  supporting_evidence:
    - id: "evidence_1"
      what: "MMLU n-gram recall = 1.0 for all 3 corpora at 50K-doc sampling (14,042 items)"
      so_what: >
        MMLU is comprehensively verbatim-contaminated in all major pretraining corpora.
        This is the first confirmation of this fact using three independent corpora simultaneously.
      how_it_supports_claim: >
        Demonstrates that n-gram detectors work well for MMLU-type benchmarks with high
        lexical overlap, validating the geometry framework's lexical stratum concept.

    - id: "evidence_2"
      what: "GSM8K n-gram recall = 0.0 for all 3 corpora at 50K-doc sampling (1,319 items)"
      so_what: >
        Math reasoning benchmarks have fundamentally different corpus overlap characteristics
        than NLU benchmarks. A unified lexical recall criterion is inappropriate for heterogeneous
        benchmark sets.
      how_it_supports_claim: >
        Shows that benchmark type is a confounding variable that must be controlled in
        geometry-based routing experiments.

    - id: "evidence_3"
      what: "Complete stratum collapse: 0 items in semantic or indeterminate strata"
      so_what: >
        The three-zone phase diagram cannot be constructed with random corpus streaming.
        The methodological boundary condition is empirically confirmed.
      how_it_supports_claim: >
        Directly demonstrates the stratum collapse failure mode that is our main contribution.

    - id: "evidence_4"
      what: >
        Dry-run (0.01× scale, 500 docs) showed 3-way stratification (lexical=13, semantic=12,
        indeterminate=25); full run (50K docs) showed complete collapse.
      so_what: >
        Small-scale prototyping is unreliable for validating SBERT-based geometry features.
        Scale changes the distribution of cosine similarities qualitatively.
      how_it_supports_claim: >
        Identifies the specific mechanism by which scale causes stratum collapse —
        the 75th-percentile threshold becomes effectively zero at large corpus scale.

    - id: "evidence_5"
      what: >
        Infrastructure successfully built: 37.7M n-grams indexed for The Pile, 50K SBERT
        vectors per corpus, full 3×3 benchmark-corpus evaluation loop executed in ~94 minutes.
      so_what: >
        The infrastructure for geometry-based routing is technically feasible and reusable.
        The failure is methodological (random streaming), not infrastructural.
      how_it_supports_claim: >
        Shows that the theoretical framework is executable and the key fix (top-k retrieval)
        is the only remaining blocker.

  surprising_findings:
    - finding: "MMLU recall = 1.0 vs. GSM8K recall = 0.0 at the same sampling scale"
      why_surprising: >
        Both are popular FM evaluation benchmarks, yet they have completely opposite
        corpus overlap characteristics against the same pretraining corpora.
      our_interpretation: >
        MMLU items are factual QA with natural language text that overlaps with general
        web crawl corpora. GSM8K items are math problems with domain-specific notation
        that does not appear in general web text. This benchmark heterogeneity must be
        explicitly modeled in any contamination detection framework.

    - finding: "Dry-run showed healthy stratification; full-scale showed complete collapse"
      why_surprising: >
        The code was identical; only the number of corpus documents changed (500 → 50K).
        One would expect better stratification with more data, not worse.
      our_interpretation: >
        SBERT cosine similarity is sensitive to corpus composition. With 500 random docs,
        the 75th percentile by chance captures some near-zero but non-identical similarities,
        allowing stratification. With 50K docs, all similarities converge to near-zero,
        making the threshold degenerate.

# ============================================================================
# BROADER IMPACT
# ============================================================================

takeaway:
  main_contribution:
    one_sentence: >
      We identify and characterize "stratum collapse" as a fundamental boundary condition
      for geometry-based contamination detector routing, and establish that top-k corpus
      retrieval is a necessary prerequisite — not an optimization — for the three-zone
      phase diagram framework.
    why_significant: >
      Any future system attempting geometry-based contamination routing will face this
      boundary condition. Our work provides the empirical documentation and theoretical
      explanation needed to avoid the failure mode.

  implications:
    for_field: >
      Contamination detection researchers should not use random corpus streaming for
      embedding-based geometry features. Infrastructure choices (FAISS top-k vs. random
      stream) have qualitative, not quantitative, effects on stratification.
    for_practice: >
      Practitioners building contamination detection pipelines should verify that their
      similarity score distributions are non-degenerate before attempting stratum-based
      routing. The dry-run/full-run gap documented here is a specific failure mode to test for.

  future_possibilities:
    immediate_extensions: >
      Fix the top-k retrieval (FW1), fix detector implementations (FW2), validate with
      controlled injection (FW3) — then re-test the full geometry routing hypothesis.
    longer_term_vision: >
      A geometry-governed routing system that automatically selects the best contamination
      detector per benchmark item could make FM evaluation contamination auditing systematic
      and principled, replacing the current ad-hoc "try multiple methods" approach.

# ============================================================================
# PAPER FRAMING DECISION
# ============================================================================

paper_framing:
  chosen_frame: "negative_result_with_positive_methodological_contribution"
  rationale: >
    The routing hypothesis (H-GeomRoute-v1) is UNRESOLVED — gate failed due to experimental
    design failures, not falsifying evidence. The publishable content is:
    (1) methodological finding on stratum collapse and top-k retrieval requirement,
    (2) empirical characterization of MMLU/GSM8K corpus overlap differences,
    (3) explicit documentation of implementation pitfalls (DCPDDDetector, ConStat, NgramIndex).
    This frames as a valuable methodological negative result rather than a failed hypothesis paper.
  target_venue: "ICML 2025 (main track or workshop: BenchmarkEval / DataPerf)"

# ============================================================================
# SECTION-LEVEL NARRATIVE GOALS
# ============================================================================

section_goals:
  abstract:
    narrative_purpose: "Compress full story — problem, insight, findings, significance in ~150 words"
    key_message: >
      Geometry-based contamination detection routing requires top-k corpus retrieval;
      random streaming causes stratum collapse. We document this boundary condition
      and its root causes, plus confirm MMLU/GSM8K corpus overlap contrasts.
    tone: "Methodological contribution framing — honest about failure, clear about value"

  introduction:
    narrative_purpose: "Hook → Problem → Insight → Preview"
    hook_strategy: "Counterintuitive Finding — MMLU fully contaminated yet no detector reliably routes"
    opening_line: >
      MMLU is verbatim-contaminated in every major pretraining corpus we tested —
      yet predicting which contamination detector will work for a given benchmark item
      remains unsolved, and our attempt to solve it reveals why.
    transition_to_related: >
      Understanding why requires surveying how contamination detectors currently work
      and why their disagreement has been unexplained.

  related_work:
    narrative_purpose: "Show existing work insufficient → justify our geometry routing approach"
    positioning_strategy: >
      Frame prior work in three categories: (1) detection methods in isolation,
      (2) meta-studies showing inconsistency, (3) missing: principled routing framework.
      Our work fills the gap — but discovers a prerequisite condition the field missed.
    key_comparison_points:
      - "N-gram overlap methods (GPT-3 Appendix C, EleutherAI): work well for lexical contamination"
      - "MIA methods (Min-K%, Min-K%++, DC-PDD): work under specific assumptions, fail otherwise"
      - "ConTAM/ConStat: measure inconsistency but do not explain it"
      - "Missing: geometry-based routing that explains and resolves inconsistency"

  methodology:
    narrative_purpose: "WHY this design solves the problem — the phase diagram framework"
    connection_to_insight: >
      The three-zone phase diagram directly follows from the insight that detector families
      operate on orthogonal signal types. If we can classify benchmark items by their
      corpus overlap geometry, we can route to the best detector for each item.
    key_design_decisions:
      - "Max 13-gram count as lexical geometry feature (from EleutherAI production pipeline)"
      - "Max SBERT cosine similarity as semantic geometry feature (requires top-k retrieval)"
      - "75th-percentile thresholds for stratum boundaries"
      - "5 detector families evaluated per stratum: n-gram, embedding, Min-K%++, DC-PDD, ConStat"
      - "3 benchmarks × 3 corpora = 9 evaluation pairs"

  experiments:
    narrative_purpose: "Design experiments that test the existence of the phase diagram"
    experimental_questions:
      - "RQ1: Do benchmark items distribute across lexical, semantic, and indeterminate strata when geometry features are computed correctly?"
      - "RQ2: Do n-gram detectors show recall separation between lexical and semantic strata?"
      - "RQ3: Does Min-K%++ F1 vary across corpora (≥0.15), indicating corpus-dependent detector sensitivity?"
    dataset_rationale: >
      MMLU (NLU, high contamination expected), HellaSwag (NLU, commonsense), GSM8K (math, different overlap profile)
      against The Pile, C4, FineWeb — diverse corpora covering major pretraining data sources.

  results:
    narrative_purpose: "Present evidence — what happened, what it means"
    main_result_highlight: >
      Complete stratum collapse: all 25,403 items assigned to the lexical stratum.
      Root cause: random corpus streaming produces degenerate SBERT cosine distributions.
      MMLU recall = 1.0 (all corpora); GSM8K recall = 0.0 (all corpora).
    secondary_highlights:
      - "Infrastructure works: 37.7M n-grams indexed, 50K SBERT vecs per corpus, 94-min runtime"
      - "DCPDDDetector and ConStatDetector implementation bugs identified and documented"
      - "Dry-run/full-run scale discrepancy reveals SBERT distribution sensitivity"

  discussion:
    narrative_purpose: "Interpret the failure — boundary conditions, lessons, honest limitations"
    honest_limitations:
      - "Only h-e1 (EXISTENCE) reached Phase 4; routing accuracy (P1) never measured"
      - "FineWeb substituted for RedPajama — cross-corpus generalization untested"
      - "50K-doc corpus coverage < 6% of The Pile — all recall figures are lower bounds"
      - "Single Coder-Validator cycle left 4 advisory bugs unresolved"

  conclusion:
    narrative_purpose: "Reinforce message — boundary condition documented, path forward clear"
    callback_to_hook: >
      Return to MMLU/GSM8K contrast: the benchmark heterogeneity that makes geometry routing
      theoretically valuable is precisely what makes implementing it correctly non-trivial.
    memorable_ending: >
      The three-zone phase diagram for contamination detection routing remains a sound theoretical
      framework — but building it requires the right foundation. We have documented what that
      foundation requires.

