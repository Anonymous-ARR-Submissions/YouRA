gap_id: "gap_1"
gap_title: "No Systematic Multi-Method, Multi-Benchmark Contamination Detection Comparison"
gap_description: |
  Individual detection methods (Min-K% Prob, Min-K%++, DC-PDD, ConStat, PaCoST, n-gram overlap)
  have been proposed in isolation. No unified systematic comparison exists across all three paradigms
  (n-gram, embedding similarity, MIA) on the same set of real FM benchmarks (MMLU, HellaSwag, GSM8K)
  against the same real pretraining corpora (The Pile, C4, RedPajama). A controlled, reproducible
  evaluation framework is missing.
