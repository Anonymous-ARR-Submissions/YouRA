    - "The latent-variable clarification (Prof. Rex + Prof. Vera): scoping all claims to 'detector sensitivity to observable corpus overlap' sidesteps memorization causation without sacrificing scientific validity"
    - "The indeterminate zone as primary finding (Dr. Nova + Dr. Sage): items where no detector dominates are not a limitation to footnote but a structural blind spot to map and report prominently"
    - "Margin-based determinacy (Dr. Ally's synthesis of Prof. Rex's argmax-noise concern): replaces noisy argmax with robust dominance relation — turns the prediction target from stochastic to learnable"
  breakthrough_moments:
    - "Exchange 10 (Dr. Nova): reframe from 'compare detectors' to 'can geometry predict detector ordering?' — shifted entire discussion toward structural prediction"
    - "Exchange 13 (Prof. Rex): margin criterion and MMD covariate shift control identified as key remaining gaps — tightened the hypothesis considerably"
    - "Exchange 16 (Dr. Nova): three-zone diagram crystallized with indeterminate zone as central contribution — convergence achieved"
  resolved_tensions:
    - "Latent variable (corpus inclusion ≠ memorization): resolved by reframing claims to corpus overlap sensitivity, not causal memorization chains"
    - "Ground truth validity: resolved by two-pronged approach (Approach A known inclusions + Approach B simulated leakage with three injection regimes)"
    - "Threshold arbitrariness: resolved by simulation-calibrated falsification thresholds from synthetic separability surfaces"
    - "DC-PDD reference dependence: resolved by fixed neutral-corpus reference + explicit ablation pre-registration"
    - "Covariate shift: resolved by MMD computation + importance weighting for cross-corpus evaluation"
