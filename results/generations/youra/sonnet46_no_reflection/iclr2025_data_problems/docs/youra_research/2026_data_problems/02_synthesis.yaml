measurement_plan:
  data_collection:
    - source: "Approach A — Known Inclusion Audit: verify corpus inclusions from Yang et al. [2023] (HumanEval-in-RedPajama); EleutherAI lm-eval-harness decontamination outputs. Stratify into strong positives (13-gram match + documented training mixture) and weak positives (13-gram match, unverifiable training exposure)."
    - source: "Approach B — Simulated Leakage: Hidayat et al. [2025, 2505.24263] protocol on MMLU+HellaSwag with three injection regimes (uniform, clustered, paraphrased via lm-sys/llm-decontaminator). Perfect ground truth labels."
    - source: "Corpus-side features: precompute max 13-gram overlap count (inverted index) and SBERT cosine similarity (FAISS index) for all 25K benchmark items against all 3 corpora."
  procedure:
    - step: "Pre-registration: register hypothesis, falsification thresholds, analysis plan, and all pre-registered ablations (DC-PDD ablation, 70% proxy stress test, prevalence shift analysis)"
    - step: "Build corpus indices: 13-gram inverted index (EleutherAI pipeline) + FAISS embedding index (frozen SBERT) for The Pile, C4, RedPajama"
    - step: "Compute corpus-side features for all benchmark items; define geometry strata"
    - step: "Run all detector families on all benchmark-corpus pairs (25K items × 3 corpora × 5 detectors ~ 48 GPU-hours)"
    - step: "Compute per-stratum precision/recall/F1 with bootstrap CIs; identify determinate items (margin ≥ 0.05)"
    - step: "Train logistic regression routing classifier on The Pile; evaluate cross-corpus on C4 and RedPajama with MMD covariate shift control"
    - step: "Generate contamination phase diagram (2D: 13-gram × cosine, colored by dominant detector); compute indeterminacy rate"
    - step: "Run pre-registered ablations: DC-PDD ablation, 70% proxy stress test, prevalence shift (5%/10%/30%), Kendall's τ cross-injection-regime"
    - step: "Simulation-calibrated threshold derivation from Hidayat synthetic surfaces"
  success_criteria:
    - "P1: Top-1 cross-corpus routing accuracy > 40% AND Kendall's τ > simulation-calibrated threshold on determinate items"
    - "P2: N-gram recall ≥ 0.80 lexical stratum, ≤ 0.40 semantic stratum; Min-K%++ F1 variance ≥ 0.15 cross-corpus"
    - "P3: Indeterminacy rate in [10%, 50%]"
    - "Phase structure stability: Kendall's τ ≥ 0.7 across injection regimes (Approach B)"
    - "Threshold transfer: |ΔFPR| ≤ 0.03, |ΔFNR| ≤ 0.05 for n-gram methods; failure to meet this for MIA-based methods confirms distribution fragility"

validation:
  internal_validity:
    - "Strata defined by corpus-side signals (13-gram, frozen SBERT) orthogonal to detector feature spaces (LLM token probabilities) — no circularity"
    - "Strong/weak positive stratification in Approach A controls for latent-variable noise (training exposure uncertainty)"
    - "Fixed DC-PDD reference model across all corpora — controls reference-model confound"
    - "Equal-prevalence subsampling controls for class imbalance effects on F1"
    - "Margin-based determinacy (≥ 0.05 F1 gap) ensures routing target is a stable, learnable function — not sampling noise"
  external_validity:
    - "Three benchmark types (knowledge/commonsense/math) and three corpus families (curated/web/deduplicated) provide breadth"
    - "Three LLM families (Llama/Mistral/Pythia) provide cross-model robustness"
    - "Three injection regimes test whether phase structure is injection-mechanism-invariant (Kendall's τ cross-regime)"
    - "Partial observability stress test (70% corpus proxy) establishes minimum corpus coverage requirement for deployment"
    - "Scope explicitly limited to open-weight models — avoids over-generalization to proprietary APIs"

