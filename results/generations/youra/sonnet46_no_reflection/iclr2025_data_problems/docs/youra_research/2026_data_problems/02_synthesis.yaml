hypothesis_draft:
  title: "Geometry-Governed Contamination Detection: A Three-Zone Phase Diagram for Benchmark Audit Routing"
  hypothesis_id: "H-GeomRoute-v1"
  core_claim: |
    Contamination detection methods operate on fundamentally different signal types — lexical
    overlap (n-gram), semantic proximity (embedding), and likelihood perturbation (MIA-based) —
    and their precision-recall performance is structurally determined by which signal type
    dominates in a given benchmark-corpus pair. Corpus-side geometric signals (max 13-gram
    overlap count and SBERT cosine similarity) are sufficient to predict the top-performing
    detector family cross-corpus on determinate items (F1 margin ≥ 0.05), producing a learnable
    three-zone contamination phase diagram with an indeterminate zone that characterizes the
    current detection blind spot.
  mechanism: |
    (1) Corpus-side geometry determines which overlap signal dominates for each benchmark item.
    (2) Each detector family's sensitivity is tied to its signal type (n-gram → lexical,
    embedding → semantic, MIA → likelihood memorization).
    (3) Because sensitivity aligns with signal type, geometry predicts which detector wins.
    (4) A logistic regression classifier trained on geometry features (13-gram, cosine) on
    one corpus generalizes cross-corpus above chance, controlled for covariate shift via MMD
    and importance weighting.
  predictions:
    - P1: "Cross-corpus routing accuracy > 40% top-1, Kendall's τ > simulation-calibrated threshold on determinate items (margin ≥ 0.05)"
    - P2: "N-gram recall ≥ 0.80 in lexical stratum, ≤ 0.40 in semantic stratum; Min-K%++ F1 variance ≥ 0.15 across three corpora"
    - P3: "Indeterminate zone rate in [10%, 50%] — confirming detection blind spot exists but routing remains practically useful"

variables_summary:
  independent: "Contamination geometry stratum (lexical/semantic/indeterminate, defined by corpus-side 13-gram+SBERT signals), detector family (n-gram/embedding/Min-K++/DC-PDD/ConStat), pretraining corpus (The Pile/C4/RedPajama), injection regime (uniform/clustered/paraphrased)"
  dependent_primary: "Cross-corpus routing accuracy (top-1) on determinate items — fraction where geometry classifier correctly predicts top detector family"
  controlled: "DC-PDD fixed reference model (neutral corpus), SBERT encoder (frozen, non-evaluated), contamination prevalence (equal-prevalence subsampling at 10%), target LLM family (open-weight: Llama-2-7B/Mistral-7B/Pythia-7B)"

null_hypothesis:
  h0_statement: |
    Corpus-side geometric signals (13-gram overlap, embedding cosine similarity) are not
    sufficient to predict detector family performance ordering above chance (top-1 accuracy
    ≤ 40% cross-corpus, Kendall's τ ≤ simulation-calibrated threshold on determinate items).
    Contamination detection performance is not structurally determined by corpus overlap geometry.
  statistical_test: "Multinomial logistic regression cross-corpus accuracy vs. chance baseline (25% for 4 families); bootstrap CI for Kendall's τ; simulation-calibrated falsification thresholds from Hidayat et al. synthetic surfaces"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "Three-zone contamination phase diagram (lexical-dominant, semantic-dominant, indeterminate) with geometry-based routing rule. The indeterminate zone finding — characterizing the structural detection blind spot that no current method addresses — is the primary novel contribution independent of routing accuracy."
  differentiation_summary: |
    No prior work proposes using corpus-side geometric signals to predict detector ordering.
    Min-K%++ [ICLR'25], DC-PDD [Zhang et al. 2024], ConStat [Dekoninck et al. 2024] each
    optimize internally without geometry-aware selection. LLMSanitize [ntunlp] aggregates
    but does not route adaptively. The field currently treats contamination detection as a
    monolithic property; this work demonstrates it decomposes structurally by geometry.
    Singh et al. [2024] observe inconsistent signals across methods — we explain why.

