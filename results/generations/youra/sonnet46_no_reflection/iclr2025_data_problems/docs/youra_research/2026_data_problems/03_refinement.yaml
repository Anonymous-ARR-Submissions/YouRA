predictions:
  - id: "P1"
    primary: true
    statement: "Corpus geometry predicts detector ordering cross-corpus above chance: logistic regression routing classifier (trained on The Pile features) achieves top-1 accuracy > 40% and Kendall's τ above simulation-calibrated threshold on determinate items (F1 margin ≥ 0.05) when evaluated on C4 and RedPajama"
    test_method: "Train multinomial logistic regression on (max 13-gram count, SBERT cosine similarity) features from The Pile benchmark-corpus pairs. Evaluate top-1 accuracy and Kendall's τ on C4 and RedPajama benchmark items after MMD-based covariate shift control."
    success_criterion: "Top-1 accuracy > 40% AND Kendall's τ > simulation-calibrated threshold (derived from Hidayat et al. synthetic separability surfaces) on determinate items"
    falsification: "Top-1 accuracy ≤ 40% OR τ ≤ simulation-calibrated threshold after importance weighting — geometry is insufficient to predict detector ordering"
  - id: "P2"
    primary: false
    statement: "N-gram detectors achieve recall ≥ 0.80 in the lexical stratum (high 13-gram overlap) but recall ≤ 0.40 in the semantic stratum (high cosine similarity, low 13-gram), while MIA-based methods (Min-K%++) show F1 variance ≥ 0.15 across The Pile, C4, RedPajama for the same benchmark"
    test_method: "Apply all detector families to Approach A (known inclusion audit) and Approach B (simulated leakage) labeled items. Stratify results by geometry stratum. Compute per-stratum recall for n-gram; compute cross-corpus F1 variance for Min-K%++."
    success_criterion: "N-gram recall: ≥ 0.80 lexical stratum, ≤ 0.40 semantic stratum. Min-K%++ F1 variance ≥ 0.15 across 3 corpora for MMLU or HellaSwag."
    falsification: "N-gram recall ≥ 0.60 in semantic stratum (n-gram detects paraphrased contamination) OR Min-K%++ F1 variance < 0.10 (corpus-stable MIA) — detector-signal alignment hypothesis fails"
  - id: "P3"
    primary: false
    statement: "The contamination phase diagram has a measurable indeterminate zone (no-detector-dominates region) representing the current detection blind spot, with indeterminacy rate between 10% and 50% of benchmark items"
    test_method: "For each benchmark item in Approach A and B labeled sets, identify items where no detector achieves F1 margin ≥ 0.05 above the second-best. Plot distribution in 2D geometry space (13-gram × cosine similarity). Compute indeterminacy rate."
    success_criterion: "Indeterminacy rate in range [10%, 50%] — confirming blind spot exists but routing rule remains practically useful"
    falsification: "Indeterminacy rate < 5% (no blind spot — all methods disagree negligibly) OR > 50% (routing rule has limited utility — most items are ambiguous)"

