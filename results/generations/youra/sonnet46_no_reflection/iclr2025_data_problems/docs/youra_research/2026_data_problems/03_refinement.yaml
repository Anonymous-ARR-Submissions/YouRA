# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-GeomRoute-v1"
  confidence_level: 0.78
  core_hypothesis_statement: |
    Under the setting of contamination detection for FM evaluation benchmarks (MMLU, HellaSwag,
    GSM8K) against real pretraining corpora (The Pile, C4, RedPajama) using open-weight models
    (Llama, Mistral, Pythia), if corpus-side geometric signals (max 13-gram overlap count and
    embedding cosine similarity to nearest corpus neighbor via frozen SBERT) are used to classify
    benchmark items into contamination geometry strata, then a logistic regression routing rule
    trained on one corpus will predict the top-performing detector family (from: n-gram, embedding,
    Min-K%++, DC-PDD, ConStat) with cross-corpus top-1 accuracy > 40% and Kendall's τ > simulation-
    calibrated threshold on determinate items (margin ≥ 0.05 F1 gap under bootstrap), because
    contamination detection methods operate on fundamentally different signal types whose efficacy
    is structurally determined by which corpus overlap geometry dominates in each benchmark-corpus pair.
  alternative_hypothesis_h0: |
    Corpus-side geometric signals (13-gram overlap, embedding cosine similarity) are not sufficient
    to predict detector ordering above chance (top-1 accuracy ≤ 40% cross-corpus, τ ≤ simulation-
    calibrated threshold), indicating that contamination detection performance is not structurally
    determined by contamination geometry — i.e., method choice does not interact with overlap regime
    in a learnable, transferable way.

