    - prior_work: "ConTAM [Singh et al. 2024] — 13 benchmarks × 7 models, shows inconsistent signals"
      difference: "We explain *why* signals are inconsistent: different detectors are sensitive to different geometry regimes. Singh et al. observe the symptom; we characterize the cause."
