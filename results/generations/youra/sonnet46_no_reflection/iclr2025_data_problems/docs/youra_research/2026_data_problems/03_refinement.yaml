# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Contamination Geometry Stratum"
      type: "categorical"
      operationalization: "Defined by corpus-side signals: (1) Lexical stratum = max 13-gram overlap count ≥ threshold (top quartile); (2) Semantic stratum = cosine similarity to nearest SBERT corpus embedding ≥ threshold, low 13-gram; (3) Indeterminate = all remaining items. Strata defined prior to applying detectors."
      levels: ["Lexical-dominant", "Semantic-dominant", "Indeterminate"]
    - name: "Detector Family"
      type: "categorical"
      operationalization: "Four white-box families: 13-gram n-gram (EleutherAI lm-eval-harness), Embedding similarity (FAISS+SBERT), Min-K%++ (zjysteven/mink-plus-plus), DC-PDD (Zhang et al. 2024, fixed reference model). Plus ConStat as black-box arm."
      levels: ["N-gram", "Embedding", "Min-K++", "DC-PDD", "ConStat"]
    - name: "Pretraining Corpus"
      type: "categorical"
      operationalization: "Three real publicly available pretraining corpora: The Pile, C4, RedPajama. Used for corpus-side feature computation and detector evaluation."
      levels: ["The Pile", "C4", "RedPajama"]
    - name: "Injection Regime (Approach B)"
      type: "categorical"
      operationalization: "Three simulated contamination injection structures: (1) Uniform random injection, (2) Clustered document-level injection, (3) Paraphrased injection via lm-sys/llm-decontaminator"
      levels: ["Uniform", "Clustered", "Paraphrased"]
  dependent:
    - name: "Cross-Corpus Routing Accuracy (Top-1)"
      type: "continuous"
      operationalization: "Fraction of determinate items (margin ≥ 0.05) where routing classifier correctly predicts top-performing detector family. Trained on The Pile, evaluated on C4 and RedPajama."
      primary: true
    - name: "Kendall's τ (Detector Rank Correlation)"
      type: "continuous"
      operationalization: "Rank correlation between predicted detector ordering (from geometry routing) and actual detector F1 ordering per bin. Computed cross-corpus."
      primary: false
    - name: "Indeterminacy Rate"
      type: "continuous"
      operationalization: "Fraction of benchmark items where no detector achieves F1 margin ≥ 0.05 above second-best. Reports size of the detection blind spot."
      primary: false
    - name: "Threshold-Transfer Stability (ΔFPR, ΔFNR)"
      type: "continuous"
      operationalization: "FPR and FNR shift when fixed-FPR=5% threshold (learned on The Pile) is applied unchanged to C4 and RedPajama. Success: |ΔFPR| ≤ 0.03, |ΔFNR| ≤ 0.05."
      primary: false
    - name: "Phase Structure Stability (Kendall's τ across injection regimes)"
      type: "continuous"
      operationalization: "Kendall's τ of detector rank ordering across injection regimes (uniform, clustered, paraphrased). τ ≥ 0.7 = phase diagram structurally stable; τ ≤ 0.4 = injection-mechanism sensitivity."
      primary: false
  controlled:
    - name: "DC-PDD Reference Model"
      operationalization: "Fixed single frozen LM trained on neutral corpus disjoint from The Pile/C4/RedPajama. Applied identically across all corpora."
    - name: "SBERT Encoder for Semantic Features"
      operationalization: "Frozen SBERT model (not the target LLM) used for cosine similarity computation — orthogonal to LLM-probability-based detectors."
    - name: "Contamination Prevalence"
      operationalization: "Equal-prevalence subsampling applied across benchmarks to standardized base rate (10%) for inter-benchmark comparability. AUROC/AUPRC reported within each benchmark."
    - name: "Target LLM Family"
      operationalization: "Open-weight models only: Llama-2-7B, Mistral-7B, Pythia-7B. Consistent access to per-token log probabilities required for white-box detectors."

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Corpus-side geometry determines which overlap signal dominates for a given benchmark item vs. pretraining corpus pair (lexical, semantic, or neither)"
      evidence: "Established by design: 13-gram overlap detects exact copies; SBERT cosine similarity detects paraphrased proximity. These are orthogonal feature spaces by construction."
      falsifier: "If 13-gram and cosine similarity are highly correlated (r > 0.8), the two strata collapse into one and geometry decomposition is trivial"
    - step: 2
      description: "Each detector family's sensitivity is structurally tied to its signal type: n-gram detectors are sensitive to lexical overlap, MIA-based detectors to likelihood perturbation on memorized tokens, embedding-based to semantic proximity"
      evidence: "Min-K% Prob [Shi et al. 2023] — operates on min-k% token log probabilities (memorization signal); n-gram [EleutherAI] — counts exact substring matches; Fu et al. [2024] — documents MIA failure modes when assumptions violated"
      falsifier: "If Min-K%++ achieves high F1 in the semantic stratum (where lexical overlap is low), the signal-type alignment hypothesis fails"
    - step: 3
      description: "Because detector sensitivity aligns with corpus overlap signal type, the overlap geometry of a benchmark item predicts which detector family will perform best — creating learnable dominance regions in geometry space"
      evidence: "Logical consequence of Steps 1+2 if both hold. Dr. Nova's regime-mapping framework; Prof. Pax's geometric separability analysis of 2D proxy space."
      falsifier: "If dominance regions are chaotically interleaved (< 40% routing accuracy, Kendall's τ below simulation threshold), geometry does not govern performance"
    - step: 4
      description: "A logistic regression classifier trained on corpus-side geometry features (13-gram count, cosine similarity) on one corpus generalizes to predict detector ordering on other corpora with above-chance accuracy"
      evidence: "Cross-corpus generalizability is supported if geometric signal types are corpus-agnostic properties of benchmark items. MMD controls for covariate shift."
      falsifier: "If routing accuracy drops by ≥ 0.10 after importance weighting for covariate shift, or if MMD reveals fully disjoint feature support, cross-corpus generalization fails"
  key_tension: "The margin-based indeterminacy: if the majority of items (> 50%) fall in the indeterminate zone, the routing rule has limited practical utility even if geometry governs determinate items. Whether the indeterminate zone is large or small is a primary empirical question."
  evidence_summary: |
    The causal chain rests on two established facts (detector signal types are distinct; n-gram
    and MIA-based detectors have orthogonal feature spaces) and one novel claim (geometry predicts
    detector ordering cross-corpus). The established facts are supported by 6+ papers including
    [Shi et al. 2023], [Zhang et al. 2024], [Fu et al. 2024], [Singh et al. 2024]. The novel
    claim requires the proposed experiments to establish. The three-zone phase diagram is the
    empirical test of whether the causal chain produces observable dominance structure.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Corpus-side geometric signals (13-gram overlap, SBERT cosine similarity) are measurable proxies for contamination type, even though they do not directly measure model memorization"
    supporting_evidence: "Yang et al. [2023] verified 8-18% HumanEval in RedPajama; EleutherAI lm-eval-harness uses 13-gram decontamination in production. The reframing (detector sensitivity to corpus overlap, not memorization causation) is explicit in hypothesis scope."
    consequence_if_violated: "Ground truth labels become unreliable; precision/recall measurements reflect corpus overlap noise rather than true contamination detection quality"
  - id: "A2"
    assumption: "Detector performance differences between top-1 and top-2 families are large enough (≥ 0.05 F1 margin) on a meaningful fraction (> 50%) of items to constitute learnable targets"
    supporting_evidence: "Fu et al. [2024] documents clear performance gaps between methods on some benchmarks; Singh et al. [2024] shows inconsistent signals suggesting performance does vary. The 50% determinacy threshold is the explicit pass/fail criterion."
    consequence_if_violated: "Indeterminacy rate > 50%; routing utility is limited; hypothesis shifts from 'geometry governs detection' to 'geometry governs detection in easy regimes only'"
  - id: "A3"
    assumption: "The geometric feature distribution has sufficient overlap across The Pile, C4, and RedPajama to allow cross-corpus routing (low MMD or resolvable by importance weighting)"
    supporting_evidence: "All three corpora contain web-scraped text with similar domain distributions. However, RedPajama's deduplication may reduce lexical overlap features systematically — this is an empirical question."
    consequence_if_violated: "Cross-corpus routing degrades after importance weighting; the geometry-routing claim becomes corpus-local rather than universal; scope must be restricted"
  - id: "A4"
    assumption: "A fixed DC-PDD reference model (trained on neutral corpus) provides a stable calibration baseline across The Pile, C4, and RedPajama"
    supporting_evidence: "Zhang et al. [2024] uses a fixed reference in their original experiments. The neutral corpus reference is a standard approach for divergence calibration."
    consequence_if_violated: "DC-PDD performance varies by ≥ 0.10 AUROC across corpora due to reference mismatch; DC-PDD arm must be excluded from routing comparison or analyzed separately"
  - id: "A5"
    assumption: "The simulated leakage injection protocol (Hidayat et al. 2025, three regimes) captures the relevant contamination geometry space, producing synthetic ground truth that generalizes to real contamination patterns"
    supporting_evidence: "Hidayat et al. [2025, 2505.24263] demonstrated controlled leakage on MMLU+HellaSwag with n-gram achieving highest F1. Three injection regimes (uniform, clustered, paraphrased) cover the main real-world contamination mechanisms."
    consequence_if_violated: "Phase structure stability (Kendall's τ) varies dramatically across injection regimes; findings are injection-mechanism-specific rather than geometry-specific"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    Open-weight language models with white-box access to per-token log probabilities (Llama-2-7B,
    Mistral-7B, Pythia-7B). Multiple-choice and short-answer evaluation benchmarks with publicly
    available test sets (MMLU, HellaSwag, GSM8K). Real publicly available pretraining corpora
    (The Pile, C4, RedPajama). Contamination geometry strata defined by 13-gram overlap and
    SBERT cosine similarity as corpus-side observable signals.
  does_not_apply_to: |
    Proprietary models (GPT-4, Claude, Gemini) — no white-box access for MIA-based detectors.
    Generation benchmarks requiring open-ended output evaluation (excluded by pipeline feasibility
    constraints — no new rubrics or human annotation). Closed pretraining corpora where 13-gram
    index cannot be built. Synthetic or generated benchmark data. Models trained on corpora that
    are entirely distinct from The Pile/C4/RedPajama (routing classifier may not generalize).
  known_limitations: |
    Corpus inclusion is not equivalent to training memorization — all claims are scoped to
    "detector sensitivity to observable corpus overlap," not causal memorization chains.
    The indeterminate zone may be large; routing is only useful if determinacy rate > 50%.
    DC-PDD requires a fixed reference model that may not be universally available.
    Partial corpus observability (70% proxy stress test) sets a practical lower bound on
    corpus coverage needed for reliable routing.

