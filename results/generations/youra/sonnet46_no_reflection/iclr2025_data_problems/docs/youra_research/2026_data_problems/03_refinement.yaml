  key_innovation: "Three-zone contamination phase diagram with geometry-based routing — transforms detector comparison from leaderboard ranking to structural regime characterization. The indeterminate zone finding (what no current detector can see) is a field-level contribution independent of routing accuracy."
  differentiation:
