      difference: "We include DC-PDD as one arm in a controlled cross-corpus evaluation with fixed reference model and explicit ablation of its reference-model dependence"
    - prior_work: "Simulated leakage [Hidayat et al. 2025] — n-gram achieves highest F1 on controlled injection"
