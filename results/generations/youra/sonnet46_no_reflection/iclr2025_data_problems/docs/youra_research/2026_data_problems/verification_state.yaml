main_hypothesis:
  id: H-GeomRoute-v1
  title: 'Geometry-Governed Contamination Detection: Three-Zone Phase Diagram for
    Benchmark Audit Routing'
  confidence: 0.78
  statement: 'Under contamination detection for FM evaluation benchmarks (MMLU, HellaSwag,
    GSM8K)

    against real pretraining corpora (The Pile, C4, RedPajama) using open-weight models

    (Llama-2-7B, Mistral-7B, Pythia-7B), if corpus-side geometric signals (max 13-gram

    overlap count and SBERT cosine similarity) are used to classify benchmark items
    into

    contamination geometry strata, then a logistic regression routing rule trained
    on one

    corpus will predict the top-performing detector family with cross-corpus top-1
    accuracy

    > 40% and Kendall''s τ > simulation-calibrated threshold on determinate items
    (margin

    ≥ 0.05 F1 gap under bootstrap), because contamination detection methods operate
    on

    fundamentally different signal types whose efficacy is structurally determined
    by

    corpus overlap geometry.

    '
  h0: 'Corpus-side geometric signals (13-gram overlap, embedding cosine similarity)
    are not

    sufficient to predict detector ordering above chance (top-1 accuracy ≤ 40% cross-corpus,

    τ ≤ simulation-calibrated threshold). Contamination detection performance is not

    structurally determined by corpus overlap geometry.

    '
  scope_reduction_percentage: 50
  established_facts_count: 4
  proves_new_count: 3
