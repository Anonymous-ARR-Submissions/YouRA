  - id: "task-003"
    epic: "A-2"
    title: "Corpus Index Construction"
    description: |
      Implement code/index_builder.py with NgramIndexBuilder and SBERTIndexBuilder.

      NgramIndexBuilder.build_index(): wrap EleutherAI pipeline scripts as subprocess calls:
        generate_13_grams.py → sort_13_gram_buckets.py → compress_and_package.py
        Save index to h-e1/indices/{corpus_name}/
      NgramIndex.max_overlap(text): binary search bucket files, return max 13-gram count.
      NgramIndex.is_contaminated(text, threshold=1): return max_overlap >= threshold.

      SBERTIndexBuilder.build_index(): encode corpus texts with all-MiniLM-L6-v2 (batch=256),
        L2-normalize embeddings (shape M×384), build faiss.IndexFlatIP(384), serialize to disk.
      SBERTIndex.search(query_texts, k=1): encode queries, L2-normalize, index.search → (D, I).

      OOM guard: for C4/RedPajama cap at max_docs=500_000, write texts in shards before FAISS build.
      Build indices for all 3 corpora.
    feature_tag: "data-pipeline"
    priority: 92
    source_document: "03_architecture.md"
    complexity: 14
    test_requirements: |
      - Test NgramIndex.max_overlap returns int >= 0 for sample text
      - Test SBERTIndex.search returns (distances, indices) with correct shapes (Q,1)
      - Test build_index creates files at expected index_dir path
    reference_files:
      architecture: "03_architecture.md#IndexBuilder"
      logic: "03_logic.md#A-2-Corpus-Index-Construction"
      config: "03_config.md#IndexConfig"

  - id: "task-004"
    epic: "A-3"
    title: "Geometry Features & Stratification"
    description: |
      Implement code/geometry_features.py with GeometryStratifier.

      compute_geometry_features(benchmark_texts, ngram_index, sbert_index):
        - ngram_counts: shape (N,) int64 — max 13-gram overlap per item
        - cosines: shape (N,) float32 — max SBERT cosine per item (SBERTIndex.search k=1)

      compute_thresholds(ngram_counts, cosines):
        - lexical_thresh = np.percentile(ngram_counts, 75.0)
        - semantic_thresh = np.percentile(cosines, 75.0)

      assign_strata(ngram_counts, cosines, lexical_thresh, semantic_thresh):
        - Initialize all "indeterminate"
        - Apply semantic_mask first, then lexical_mask (lexical overrides)
        - Return shape (N,) object array: "lexical"|"semantic"|"indeterminate"
        - Validate output contains only the 3 valid labels

      Wire StratificationConfig (stratum_percentile=75.0) into __init__.
    feature_tag: "model"
    priority: 91
    source_document: "03_architecture.md"
    complexity: 10
    test_requirements: |
      - Test assign_strata with mock data: lexical items classified correctly
      - Test compute_thresholds returns two floats (one per feature)
      - Test output array contains only ["lexical","semantic","indeterminate"] labels
    reference_files:
      architecture: "03_architecture.md#GeometryStratifier"
      logic: "03_logic.md#A-3-Geometry-Features-Stratification"
      config: "03_config.md#StratificationConfig"

  - id: "task-005"
    epic: "A-4"
    title: "Ground Truth Generation"
    description: |
      Implement code/ground_truth.py with GroundTruthGenerator.

      approach_a_pile_labels(benchmark_texts, ngram_index):
        - Use The Pile NgramIndex to label items as contaminated if present
        - Return shape (N,) int64 binary labels

      approach_b_uniform(benchmark_texts, corpus_name):
        - Inject contamination_rate=10% of benchmark items into corpus uniformly
        - Return (augmented_corpus: list[str], labels: shape (N,) int64)

      approach_b_clustered(benchmark_texts, corpus_name):
        - Group by first 50 chars as topic proxy, inject clustered groups
        - Return (augmented_corpus, labels)

      approach_b_paraphrased(benchmark_texts, corpus_name):
        - Use lm-sys/llm-decontaminator to paraphrase items before injection
        - Return (augmented_corpus, labels)

      Use seed=42 for all random operations.
    feature_tag: "data-pipeline"
    priority: 90
    source_document: "03_architecture.md"
    complexity: 12
    test_requirements: |
      - Test approach_a_pile_labels returns binary array shape (N,) with values in {0,1}
      - Test approach_b_uniform injection rate ≈ contamination_rate ± 0.01
      - Test all methods are deterministic with seed=42
    reference_files:
