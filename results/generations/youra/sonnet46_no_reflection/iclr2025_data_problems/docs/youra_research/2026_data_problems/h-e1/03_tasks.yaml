      logic: "03_logic.md#A-4-Ground-Truth-Generation"
      config: "03_config.md#DataConfig"

  - id: "task-006"
    epic: "A-5"
    title: "Detector Families (5 total)"
    description: |
      Implement all 5 detector classes in code/detectors/ using strategy pattern.

      All detectors expose: predict(texts) → (N,) int64, score(texts) → (N,) float32

      NgramDetector (ngram_detector.py): wrap NgramIndex.max_overlap; threshold=1
      EmbeddingDetector (embedding_detector.py): wrap SBERTIndex.search; cosine threshold=0.95
      MinkPPDetector (minkpp_detector.py):
        - Lazy-load LM (Llama-2-7B / Mistral-7B / Pythia-7B)
        - Per-token log_probs via forward pass; select bottom k%=20% tokens
        - score = mean(bottom_k_log_probs); predict with threshold=0.0
      DCPDDDetector (dcpdd_detector.py):
        - Lazy-load Pythia-2.8B as reference model
        - score = log P_target - log P_ref per token; predict threshold=0.0
      ConStatDetector (constat_detector.py):
        - Wrap llmsanitize.contamination.constat(); threshold=0.5

      detectors/__init__.py: export dict of all 5 detectors + run_detector_evaluation()
        that loops benchmark × corpus × detector, stores preds in dict[str, ndarray].
    feature_tag: "model"
    priority: 89
    source_document: "03_architecture.md"
    complexity: 15
    test_requirements: |
