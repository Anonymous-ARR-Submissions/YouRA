# ═══════════════════════════════════════════════════════════════
# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "RLHF preference datasets (HH-RLHF, BeaverTails, PKU-SafeRLHF) exclusively encode the AI-to-human preference direction"
      status: "BUILD_ON"
      evidence: "Shen et al. (2024) 400+ paper systematic review; no existing corpus captures human-to-AI adaptation direction"
    - claim: "16/16 alignment benchmarks audited by Vishwarupe et al. (2026) lack user-facing verification"
      status: "BUILD_ON"
      evidence: "Vishwarupe et al. (2026) arXiv:2605.04454 — direct audit of 16 benchmarks"
    - claim: "BeaverTails provides dual helpfulness/harmlessness labels for 333K+ QA pairs across 14 harm categories"
      status: "BUILD_ON"
      evidence: "Ji et al. (2023) arXiv:2307.04657 — dataset paper with annotation protocol"
    - claim: "HH-RLHF helpful-online split was collected from deployed interactions; helpful-base from naive annotators"
      status: "BUILD_ON"
      evidence: "Anthropic HH-RLHF repository documentation and dataset paper"
    - claim: "No existing methodology quantifies the human-to-AI adaptation signal in existing preference corpora"
      status: "PROVE_NEW"
      evidence: "Gap identified by Shen et al. (2024) and J.H. Shen et al. (2024) — no prior measurement exists"
    - claim: "AI-idiomatic stylistic features (structured lists, safety-prefaces, CoT scaffolds) are specifically amplified in post-RLHF outputs relative to pre-LLM human expert writing"
      status: "PROVE_NEW"
      evidence: "Theoretical prediction requiring discriminant validation against StackOverflow 2018 and FLAN baselines"
  scope_reduction_percentage: 40
  phase2b_4_instructions: |
    Phase 2B should treat claims marked BUILD_ON as established baselines requiring no re-verification.
    Experimental effort should focus on PROVE_NEW claims: (1) measuring the β₄ logit interaction,
    (2) validating AIFS discriminantly against pre-LLM baselines, (3) demonstrating entropy compression
    with AIFS-bin specificity in BeaverTails. The established facts provide the motivating context
    and confirm the empirical tractability of the research question.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-AIFS-AdaptationDetection-v1"
  confidence_level: 0.78
  core_hypothesis_statement: |
    Under RLHF preference annotation conditions, if annotators have prior exposure to deployed
    RLHF-aligned AI systems (online condition) versus naive annotators (base condition), then
    online annotators show a statistically significant increase in conditional selection preference
    for AI-idiomatic stylistic features (β₄ > 0, OR ≥ 1.10 at α = 0.01 in a logit model
    controlling for supply, complexity, and cluster fixed effects), because repeated exposure to
    RLHF-optimized outputs causes annotators to internalize AI-native discourse norms — a
    human-to-AI stylistic adaptation effect latent in existing preference corpora.
  alternative_hypothesis_h0: |
    There is no significant difference in conditional preference for AI-idiomatic stylistic
    features between deployed (online) and naive (base) annotator conditions after controlling
    for marginal response supply, prompt complexity, and semantic cluster fixed effects.
    Formally: β₄ = 0 (OR = 1.0, 95% CI includes 1.0).

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Annotator condition (split)"
      type: "categorical"
      operationalization: "helpful-base vs. helpful-online in HH-RLHF; base vs. deployed annotation context in BeaverTails and PKU-SafeRLHF"
      levels: ["base", "online"]
  dependent:
    - name: "β₄ logit interaction coefficient (ΔAIFS × split)"
      type: "continuous"
      operationalization: "Coefficient from conditional logit: P(chosen=1) ~ β₁·ΔAIFS + β₂·Δlength + β₃·Δperplexity + β₄·(ΔAIFS×split) + cluster_FE. Measured as log-odds ratio."
      primary: true
    - name: "Helpfulness-harmlessness disagreement rate D by harm category and AIFS bin"
      type: "continuous"
      operationalization: "P(helpfulness label ≠ harmlessness label preference) per BeaverTails harm category, stratified by AIFS quartile of candidate responses"
      primary: false
    - name: "Schema bidirectionality index"
      type: "ordinal"
      operationalization: "0–4 score per dataset: 0=output-only, 1=static user attributes, 2=longitudinal linkage, 3=user belief/state change, 4=behavioral outcome tracking"
      primary: false
  controlled:
    - name: "Marginal AIFS supply distribution"
      operationalization: "Proportion of high-AIFS candidates available in each split; included as covariate in logit model"
    - name: "Prompt semantic complexity"
      operationalization: "Embedding-based difficulty estimate (sentence-transformer cosine distance from centroid) + query token count"
    - name: "Semantic cluster fixed effects"
      operationalization: "Prompt clusters at cosine ≥ 0.85 using single frozen sentence-transformer encoder"
    - name: "Response length and perplexity"
      operationalization: "Token count and GPT-2 perplexity per candidate response; included as logit covariates"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "RLHF training amplifies AI-idiomatic stylistic features in model outputs, creating a distinctive post-RLHF stylistic distribution not present in pre-LLM human expert writing"
      evidence: "DPO/RLHF optimization explicitly rewards structured responses, safety-prefaces, and CoT scaffolding [Rafailov et al. 2023, 8428 citations]; STEER-BENCH confirms LLMs systematically over-produce these features"
      falsifier: "If AIFS features in post-RLHF outputs do not exceed StackOverflow 2018 or FLAN baselines, the stylistic amplification premise fails"
    - step: 2
      description: "Annotators exposed to deployed RLHF-aligned models develop increased preference weighting for AI-idiomatic features in subsequent labeling tasks"
      evidence: "HH-RLHF helpful-online split (deployed annotators) vs. helpful-base (naive); differential in annotation context is documented in dataset papers"
      falsifier: "If β₄ = 0 after controlling for marginal AIFS supply, adaptation in annotator weighting is not supported"
    - step: 3
      description: "This preference convergence is strongest in RLHF-normed harm categories where AI safety norms are most explicit"
      evidence: "BeaverTails 14-category structure enables category-stratified entropy analysis; normative RLHF training is strongest in violence/illegality categories"
      falsifier: "If entropy compression is uniform across harm categories or strongest in socially ambiguous categories, normative adaptation is not supported"
    - step: 4
      description: "Existing dataset schemas structurally fail to capture this adaptation signal, scoring 0–1 on a 0–4 bidirectionality index"
      evidence: "Vishwarupe et al. (2026) confirmed absence of user-facing verification across 16 benchmarks; J.H. Shen et al. (2024) confirmed no directionality coverage metrics exist"
      falsifier: "If bidirectionality index fails to predict β₄ magnitude ordinally across datasets, schema design is not linked to adaptation detectability"
  key_tension: "Distinguishing genuine human-to-AI adaptation from model-side AIFS supply inflation and population shift confounds requires the conditional logit supply control — the entire hypothesis hinges on β₄ surviving this control."
  evidence_summary: |
    The causal chain is supported by: (1) established RLHF optimization dynamics that amplify AI-idiomatic features;
    (2) documented collection context differences between HH-RLHF splits; (3) BeaverTails harm category structure
    enabling normative convergence tests; (4) Vishwarupe (2026) audit confirming schema blindness. The chain is
    plausible but requires empirical confirmation at each step, particularly Step 2 (the β₄ interaction).

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "HH-RLHF helpful-online annotators had substantially more prior AI interaction experience than helpful-base annotators"
    supporting_evidence: "Online split was collected from deployed Claude users; base split from naive crowdworkers — documented in Anthropic HH-RLHF dataset paper"
    consequence_if_violated: "The online/base split comparison becomes invalid as an adaptation proxy; must reframe as population heterogeneity study"
  - id: "A2"
    assumption: "AIFS features (structured lists, safety-prefaces, CoT markers) are specifically amplified in post-RLHF model outputs relative to pre-LLM human expert writing"
    supporting_evidence: "Theoretical prediction based on RLHF optimization targets; requires discriminant validation against StackOverflow 2018 and FLAN baselines"
    consequence_if_violated: "β₄ interaction conflates adaptation with stable human preference for structured writing; hypothesis cannot be distinguished from null covariate shift"
  - id: "A3"
    assumption: "BeaverTails helpfulness and harmlessness labels were assigned with knowledge of harm category context, enabling category-stratified entropy analysis"
    supporting_evidence: "Ji et al. (2023) annotation protocol specifies category-aware labeling; dual-label structure is a core feature of the dataset"
    consequence_if_violated: "Category-specific entropy analysis becomes invalid; fall back to aggregate entropy analysis across all categories"
  - id: "A4"
    assumption: "Within semantically matched prompt clusters (cosine ≥ 0.85), residual AIFS supply differences are adequately captured by the marginal AIFS covariate"
    supporting_evidence: "Standard assumption in matched-pair preference analysis; partially validated by embedding-based cluster design"
    consequence_if_violated: "Supply confound is not fully controlled; β₄ estimate is biased upward; must use stricter matching or propensity score reweighting"
  - id: "A5"
    assumption: "PKU-SafeRLHF annotators evaluated turns sequentially within conversations (enabling within-conversation trajectory analysis)"
    supporting_evidence: "Multi-turn structure of dataset suggests sequential evaluation; requires verification against annotation protocol documentation in Ji et al. (2024)"
    consequence_if_violated: "Within-conversation trajectory test is invalid; scope PKU-SafeRLHF analysis to cross-split comparison only (still valid for bidirectionality index)"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    RLHF preference datasets with documented multi-condition collection (deployed vs. naive annotators).
    Automated stylistic feature analysis using regex-based AIFS extraction.
    Schema-level auditing of alignment dataset design using the bidirectionality index.
    NLP-based preference analysis on existing public datasets (HH-RLHF, BeaverTails, PKU-SafeRLHF).
  does_not_apply_to: |
    Individual-level psychological adaptation claims (no annotator-level longitudinal data available).
    Causal proof of adaptation mechanism (correlation evidence only; annotator IDs absent from public HH-RLHF).
    Datasets collected after 2024 or with substantially different annotation protocols.
    Cross-cultural variation in adaptation patterns (datasets are primarily English-language).
  known_limitations: |
    No annotator IDs in public HH-RLHF release — precludes within-annotator drift analysis (strongest causal evidence).
    Only three RLHF datasets available for cross-dataset bidirectionality regression — low statistical power; ordinal prediction more defensible than parametric regression.
    StackOverflow 2018 and FLAN as pre-LLM baselines are imperfect proxies for pre-AI human preference; some AI-idiomatic features (structured lists) were already present in expert human writing.
    AIFS is a construct-validated proxy, not a direct measure of annotator cognitive state.

