# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "In a conditional logit model on HH-RLHF preference pairs, the interaction term β₄ (ΔAIFS × split) is positive and significant, with OR ≥ 1.10 at α = 0.01, after controlling for marginal AIFS supply, response length, perplexity, and semantic cluster fixed effects"
    test_method: "Conditional logistic regression on matched preference pairs from HH-RLHF helpful-base and helpful-online splits; AIFS computed via regex; prompts clustered with frozen sentence-transformer at cosine ≥ 0.85"
    success_criterion: "β₄ > 0, OR ≥ 1.10, 95% CI excludes 1.0, p < 0.01, effect persists after controlling for marginal AIFS distribution in candidate pool"
    falsification: "β₄ = 0 or reverses sign after supply control; or effect disappears after topic cluster fixed effects"
  - id: "P2"
    primary: false
    statement: "In BeaverTails, the helpfulness-harmlessness disagreement rate reduction (ΔD) is larger in high-AIFS bins than low-AIFS bins, and this AIFS-bin differential is monotonically larger in RLHF-normed harm categories (violence, illegal_activities, hate_speech) than socially ambiguous categories (sycophancy, misinformation, privacy_violation)"
    test_method: "Compute D = P(helpfulness label ≠ harmlessness label) within matched prompt clusters, stratified by AIFS quartile and harm category; compare ΔD_high-AIFS vs. ΔD_low-AIFS across 14 categories"
    success_criterion: "ΔD_high-AIFS > ΔD_low-AIFS in at least 4/6 pre-registered RLHF-normed categories; rank correlation between category RLHF-norm intensity and AIFS-bin differential significant at p < 0.05"
    falsification: "AIFS-bin differential is uniform across categories, or strongest in socially ambiguous categories"
  - id: "P3"
    primary: false
    statement: "The schema bidirectionality index scores predict β₄ magnitude ordinally: HH-RLHF (score ≈ 0) < BeaverTails (score ≈ 0.5) < PKU-SafeRLHF (score ≈ 1)"
    test_method: "Apply 0–4 bidirectionality index to each dataset's annotation schema; compute β₄ interaction for each dataset separately; test ordinal alignment"
    success_criterion: "β₄(HH-RLHF) < β₄(BeaverTails) < β₄(PKU-SafeRLHF) with each pairwise difference in expected direction"
    falsification: "Ordinal ranking fails; bidirectionality score does not predict β₄ magnitude"

