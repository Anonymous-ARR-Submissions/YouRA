gap_id: "gap_1"
gap_title: "Systematic Directional Asymmetry in Preference Dataset Coverage (AIâ†’Human vs. Humanâ†’AI)"
gap_description: |
  Existing RLHF preference datasets (HH-RLHF: 160K+ pairs, BeaverTails: 333K+ pairs,
  PKU-SafeRLHF: 265K+ pairs) exclusively measure human preferences about AI outputs (AI-to-human
  direction). No existing corpus systematically captures how human preferences, behaviors, or
  cognitive strategies shift in response to AI interaction (human-to-AI direction). The asymmetry
  between dataset coverage of the two directions has never been quantified using existing corpora.
