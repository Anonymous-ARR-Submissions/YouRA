gap_id: "gap_1"
gap_title: "Systematic Directional Asymmetry in Preference Dataset Coverage (AI‚ÜíHuman vs. Human‚ÜíAI)"
timestamp: "2026-05-12T08:16:00Z"
priority: "Critical"
relevance: "PRIMARY"
selected_by: "highest_priority_primary"
description: |
  Existing RLHF preference datasets exclusively measure human preferences about AI outputs
  (AI-to-human direction). No existing corpus systematically captures how human preferences,
  behaviors, or cognitive strategies shift in response to AI interaction (human-to-AI direction).
  The asymmetry between dataset coverage of the two directions has never been quantified.
