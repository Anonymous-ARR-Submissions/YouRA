# 06_narrative_blueprint.yaml
# Phase 6 Step 02: Narrative Design
# Paper: Bidirectional Human-AI Alignment — AIFS Adaptation Detection
# Generated: 2026-05-12 (UNATTENDED mode)

metadata:
  hypothesis_id: "H-AIFS-AdaptationDetection-v1"
  paper_title: "Can Existing RLHF Preference Corpora Reveal Human-to-AI Stylistic Adaptation? A Null Result with Methodological Contributions"
  paper_format: "ICML2025"
  narrative_version: "1.0"

# ============================================================================
# HOOK DESIGN
# ============================================================================

hook:
  strategy: "counterintuitive_finding"
  rationale: >
    We have a real positive signal (β₁ = 0.025, p < 0.001 — AIFS features robustly
    predict annotator preference) but a precise null on the adaptation dimension
    (β₄ = -0.0016, OR = 0.9984, p = 0.796). The tension between "the signal is real"
    and "but not where we expected it" creates a natural narrative hook that defies
    the reader's expectation of either a clean success or a clean failure.

  opening_statement:
    content: >
      RLHF-optimized responses — with their structured bullet lists, cautious safety
      prefaces, and chain-of-thought scaffolding — are measurably preferred by human
      annotators. Yet whether two years of daily interaction with deployed AI systems
      makes annotators prefer these features even more turns out to be a question that
      existing preference datasets cannot answer.
    strategy: "counterintuitive_finding"

  why_reader_should_care:
    main_reason: >
      The bidirectional alignment research agenda (aligning humans to AI, not just AI
      to humans) is scientifically well-motivated, but its empirical foundation depends
      on data that does not yet exist in public RLHF corpora.
    concrete_example: >
      HH-RLHF's helpful-online split — widely assumed to capture deployed-AI-familiar
      annotators — turns out to be a data provenance label, not an annotator metadata
      field. The split cannot distinguish a seasoned AI power-user from a first-time
      annotator hired during the online collection phase.
    stakes: >
      Without knowing this structural limitation, researchers may continue designing
      experiments around HH-RLHF splits and produce underpowered null results without
      understanding why.

# ============================================================================
# PROBLEM FRAMING (Three Levels)
# ============================================================================

problem_framing:
  surface_problem:
    description: >
      RLHF alignment research focuses almost exclusively on aligning AI outputs to
      human preferences. The reverse direction — how humans adapt their own preferences,
      language use, and judgment heuristics toward AI norms — is understudied.
    common_understanding: >
      Papers in this space (Shen et al. 2024, 400+ paper review) acknowledge the gap
      at the conceptual level but note fewer than 10 empirical studies on the
      human-to-AI direction.

  deeper_problem:
    description: >
      Even researchers who recognize the gap and attempt measurement face a structural
      obstacle: existing RLHF preference datasets were designed to evaluate AI outputs,
      not to track annotator behavioral change. They lack the metadata needed to
      detect adaptation effects.
    why_overlooked: >
      The gap is invisible to standard RLHF practitioners, who treat annotator
      preferences as static ground truth rather than as a quantity that evolves with
      AI exposure.
    our_perspective: >
      We attempted to extract an adaptation signal from HH-RLHF using its documented
      helpful-base/helpful-online split and a rigorous conditional logistic regression
      design. The null result (β₄ ≈ 0, OR = 0.9984, p = 0.796) reveals the obstacle
      concretely: the split is not a valid annotator exposure proxy.

  gap_in_existing_work:
    description: >
      No prior work has empirically tested whether the HH-RLHF split can serve as an
      annotator AI-exposure proxy in a supply-controlled preference model. No prior
      work has deployed an automated AIFS construct to quantify AI-idiomatic stylistic
      density in preference data and linked it to annotator condition.
    why_gap_exists: >
      The AIFS construct (regex-based detection of structured lists, safety prefaces,
      CoT markers, hedging language) is new. The conditional logit supply-control
      design for annotator adaptation detection is new. The question of split validity
      as an exposure proxy has not been explicitly tested.
    why_gap_matters: >
      Filling this gap defines the minimum data requirements for the bidirectional
      alignment empirical program: annotator-linked datasets, longitudinal designs,
      or access to proprietary annotation metadata.

# ============================================================================
# KEY INSIGHT
# ============================================================================

key_insight:
  insight_type: "observation_based"

  aha_moment:
    one_sentence: >
      RLHF-idiomatic stylistic features robustly predict annotator preference
      (β₁ = 0.025, p < 0.001), but this preference is universal — not stronger
      in annotators with AI deployment exposure — because the helpful-online split
      measures where data was collected, not who collected it.
    expanded_explanation: >
      The presence of β₁ confirms that AIFS features are genuine preference signals
      recoverable from conditional logistic regression on 80K+ pairs. The absence of
      β₄ is not a power failure (27,034 semantic clusters, OR = 0.9984, CI width = 0.025)
      but a validity failure: the split variable does not operationalize annotator
      AI familiarity. This distinction — between a real signal and an invalid proxy
      for the effect of interest — is the core scientific contribution.

  why_others_missed_it:
    common_assumptions: >
      Researchers treat HH-RLHF splits as capturing annotator population differences
      (deployed users vs. naive crowdworkers) based on dataset documentation.
    our_different_view: >
      We tested this assumption statistically rather than accepting it. The β₄ ≈ 0
      result with a tight CI constitutes empirical evidence against the proxy's
      validity, not merely a negative result about adaptation.
    enabling_factor: >
      The AIFS construct and conditional logit design provide enough statistical
      power and construct specificity to distinguish "no effect in the data" from
      "no detectable effect due to underpowered design."

  what_makes_it_work:
    intuitive_explanation: >
      Think of the helpful-online split like a zip code: it tells you where the data
      came from, not whether the person who generated it has ever used AI. Two
      annotators with identical AI experience histories might be in opposite splits
      simply because they were hired during different collection campaigns.
    key_mechanism: >
      The HH-RLHF public release strips annotator IDs for privacy. Without
      individual-level metadata, any adaptation signal is averaged out across
      heterogeneous annotator pools. The split-level contrast cannot recover
      within-annotator adaptation effects that require longitudinal or panel data.

# ============================================================================
# EVIDENCE NARRATIVE
# ============================================================================

evidence_narrative:
  main_claim:
    statement: >
      AIFS features are valid preference predictors (β₁ = 0.025, p < 0.001),
      but the HH-RLHF helpful-base/helpful-online split cannot detect differential
      adaptation to these features (β₄ = -0.0016, OR = 0.9984, p = 0.796, 27,034
      semantic clusters), establishing the minimum data requirements for future
      bidirectional alignment measurement.
    measurable_criteria:
      - "β₁ > 0, p < 0.001 (AIFS construct validity)"
      - "β₄ ≈ 0, OR ≈ 1.0, p > 0.05 (split invalidity as exposure proxy)"
      - "CI width for OR < 0.03 (sufficient power to rule out OR ≥ 1.05)"

  supporting_evidence:
    - id: "evidence_1"
      what: "β₁ = 0.025 (p < 0.001): AIFS features significantly predict annotator preference across all 80,342 pairs"
      so_what: "Validates the AIFS construct — the signal we designed the pipeline to detect is real and recoverable from HH-RLHF"
      how_it_supports_claim: "Establishes that the null on β₄ is not due to a broken measurement instrument"

    - id: "evidence_2"
      what: "β₄ = -0.0016 (OR = 0.9984, 95% CI [0.9861, 1.0108], p = 0.796) across 27,034 semantic clusters"
      so_what: "Near-perfect null on the adaptation interaction term — not underpowered, genuinely absent"
      how_it_supports_claim: "Tight CI rules out effects as small as OR ≥ 1.015, far below our theoretical minimum of 1.10"

    - id: "evidence_3"
      what: "BFGS convergence failure on 80K-row dataset requiring Newton fallback"
      so_what: "Confirmatory diagnostic for flat likelihood surface — the data contains no curvature around β₄"
      how_it_supports_claim: "Optimizer behavior is consistent with a true null, not a numerical artifact"

    - id: "evidence_4"
      what: "All 5 mechanism verification indicators passed; pipeline operational"
      so_what: "The null result reflects the data, not the implementation"
      how_it_supports_claim: "Rules out methodology failure as an explanation for β₄ ≈ 0"

  surprising_findings:
    - finding: "Universal AIFS preference: β₁ significant across BOTH annotator conditions identically"
      why_surprising: "If 'online' annotators had more AI exposure, we expected β₁ to be larger in the online condition — but the main effect is constant"
      our_interpretation: >
        Either (a) 'naive' base annotators are already AI-familiar by 2022-2023 due to societal AI saturation,
        or (b) RLHF training ensures chosen responses have higher AIFS by construction, making β₁ partly
        a dataset artifact. Both explanations reinforce the split validity problem.

# ============================================================================
# BROADER IMPACT / TAKEAWAY
# ============================================================================

takeaway:
  main_contribution:
    one_sentence: >
      We introduce AIFS — a validated automated construct for AI-idiomatic stylistic features —
      demonstrate its validity on 80K+ preference pairs, and show that split-based annotator
      condition proxies in current public RLHF datasets are insufficient for detecting
      human-to-AI adaptation effects.
    why_significant: >
      This establishes empirically, rather than conceptually, what data infrastructure the
      bidirectional alignment research agenda requires: annotator-linked datasets, longitudinal
      designs, or within-annotator repeated measures. Without this negative finding, the field
      might spend years mining existing corpora for an adaptation signal that the data cannot
      contain.

  implications:
    for_field: >
      Future RLHF dataset releases should consider including annotator-level metadata
      (opt-in session tracking, AI tool usage self-report) to enable adaptation detection.
      The AIFS construct and conditional logit pipeline are reusable baselines for any
      such future datasets.
    for_practice: >
      Practitioners building annotation pipelines for preference data should distinguish
      between split-level population labels and annotator-level behavioral metadata.
      The conflation of these two undermines the empirical tractability of human adaptation
      research.

  future_possibilities:
    immediate_extensions:
      - "Apply the β₄ design to UltraFeedback or LMSYS-Chat-1M with annotator session metadata"
      - "Execute H-M1 standalone: AIFS construct validation vs. StackOverflow 2018 and FLAN baselines"
      - "Schema bidirectionality index audit across HH-RLHF, BeaverTails, PKU-SafeRLHF (publishable independently)"
    longer_term_vision: >
      Longitudinal annotator panel studies that track AIFS preference weighting before
      and after AI tool adoption — the only design that can provide causal evidence
      for the human-to-AI adaptation hypothesis.

# ============================================================================
# SECTION-LEVEL NARRATIVE GOALS
# ============================================================================

section_goals:
  abstract:
    narrative_purpose: "Compress full story: AIFS valid, split invalid, here is what we now know we need"
    key_message: "We built a valid tool to detect human-to-AI stylistic adaptation but found the dataset proxy it needed does not work — and we can prove why"
    tone: "Confident null result, not apologetic"

  introduction:
    narrative_purpose: "Hook → Problem (bidirectionality gap) → Deeper problem (no measurement infrastructure) → Insight (split invalidity) → Preview contributions"
    hook_strategy: "counterintuitive_finding"
    opening: "RLHF-optimized responses are measurably preferred — but deployed annotators prefer them no more than naive ones"
    transition_to_related: "This finding situates us in the bidirectional alignment landscape, where the conceptual gap is known but empirically unmeasured"

  related_work:
    narrative_purpose: "Show existing work confirms the gap conceptually but provides no empirical measurement — we are the first to attempt and characterize the obstacle"
    positioning_strategy: "We extend Shen et al. (2024) from conceptual to empirical; we operationalize Vishwarupe et al. (2026) schema critique with regression evidence"
    key_comparison_points:
      - "Shen et al. 2024 — systematic review identifying the gap (but no measurement)"
      - "Vishwarupe et al. 2026 — benchmark audit confirming schema blindness (but no RLHF regression)"
      - "J.H. Shen et al. 2024 — preference dataset comparison (scale/noise/info-content, not directionality)"
      - "Rafailov et al. 2023 / DPO — RLHF optimization dynamics (establishes β₁ theoretical basis)"
      - "Bradley-Terry / preference modeling literature — β₁ replication context"

  methodology:
    narrative_purpose: "WHY this design tests the hypothesis: AIFS construct → conditional logit supply control → interaction term → split validity test"
    connection_to_insight: "The design follows directly from the insight: if the split is a valid exposure proxy AND AIFS measures the adaptation signal, then β₄ should be positive and significant. The design is a falsification test."
    key_design_decisions:
      - "AIFS construct: 4 regex patterns chosen to capture RLHF-specific stylistic amplification (structured lists, safety prefaces, CoT markers, hedging)"
      - "Conditional logit with semantic cluster FE: controls for prompt-level confounds that could correlate with both condition and AIFS preference"
      - "Supply covariate: separates annotator preference shift from AIFS availability in the candidate pool"
      - "cosine ≥ 0.85 clustering: aggressive enough to create matched pairs, loose enough for sufficient cluster diversity (27,034 clusters)"

  experiments:
    narrative_purpose: "Design tests that verify the two core claims: AIFS construct validity (β₁) and split proxy validity (β₄)"
    experimental_questions:
      - "RQ1: Do AIFS features predict annotator preference in a supply-controlled conditional logit on HH-RLHF? (tests β₁, AIFS construct validity)"
      - "RQ2: Do deployed-condition annotators show stronger conditional preference for AIFS features than naive annotators? (tests β₄, main hypothesis)"
      - "RQ3: Is the β₄ null result due to insufficient power or genuine absence of effect? (tests CI bounds, optimizer diagnostics)"

  results:
    narrative_purpose: "Present the two-part finding: β₁ is real and robust, β₄ is precisely null with a tight CI"
    main_result_highlight: "β₄ = -0.0016 (OR = 0.9984, 95% CI [0.9861, 1.0108], p = 0.796) across 27,034 clusters — a null result with sufficient power to rule out OR ≥ 1.015"

  discussion:
    narrative_purpose: "Interpret split invalidity as the most plausible explanation; connect to dataset design implications; acknowledge scope honestly"
    honest_limitations:
      - "Only one dataset tested (HH-RLHF); cannot generalize null to BeaverTails or PKU-SafeRLHF"
      - "Annotator IDs stripped from public release — cannot verify split composition directly"
      - "Societal AI saturation may make ANY binary proxy insufficient by 2022-2023"
      - "AIFS construct not independently validated against pre-LLM baselines (H-M1 not executed)"

  conclusion:
    narrative_purpose: "Callback to hook (the measurement gap is deeper than expected) + future vision (what data would actually work)"
    callback_to_hook: "We began with a measurable preference signal and a seemingly valid experimental design. What we found instead was a lesson about the limits of repurposing existing data for questions it was never designed to answer."
    memorable_ending: "The bidirectional alignment research program is not blocked — it is redirected: toward annotator-linked datasets, longitudinal designs, and a new generation of preference corpora that treat annotator behavioral change as a first-class measurement target."

# ============================================================================
# NARRATIVE COHERENCE CHECKLIST
# ============================================================================

narrative_coherence_checklist:
  - check: "Does Introduction hook connect to Conclusion ending?"
    status: "YES — hook is 'AIFS signal real but adaptation not detectable'; conclusion is 'dataset infrastructure missing, not the hypothesis'"

  - check: "Does each section naturally flow to the next?"
    status: "YES — Intro sets up gap → Related Work confirms gap is known conceptually → Methodology operationalizes the test → Experiments design the test → Results show the two-part finding → Discussion explains why → Conclusion redirects"

  - check: "Is key insight (split invalidity) consistently emphasized throughout?"
    status: "YES — first mentioned in hook, elaborated in methodology, confirmed in results, interpreted in discussion, resolved in conclusion"

  - check: "Are all major claims supported by evidence?"
    status: "YES — β₁ supported by p < 0.001; β₄ null supported by CI bounds and optimizer diagnostics; power sufficiency supported by 27,034 clusters"

  - check: "Would a busy reviewer find Abstract compelling?"
    status: "YES — counterintuitive structure (we found the signal but not the effect) is immediately interesting; methodological contribution is concrete"
