experimental_scope:
  models:
    - "Conditional logistic regression (scikit-learn)"
    - "Sentence-transformers all-MiniLM-L6-v2 (frozen, for prompt clustering)"
    - "GPT-2 (for perplexity computation as control variable)"
  datasets:
    - "HH-RLHF helpful-base + helpful-online (primary; 160K+ pairs)"
    - "BeaverTails (secondary; 333K+ pairs, 14 harm categories, dual labels)"
    - "PKU-SafeRLHF (tertiary; 265K+ pairs, multi-turn; conditional on annotation protocol)"
    - "StackOverflow 2018 dump (AIFS discriminant baseline)"
    - "FLAN instruction templates (AIFS discriminant baseline)"
  baselines:
    - "HH-RLHF helpful-base (within-dataset control condition)"
    - "Pre-LLM AIFS distribution (StackOverflow 2018)"
    - "Pre-RLHF AIFS distribution (FLAN templates)"

measurement_plan:
  data_collection:
    - source: "HuggingFace anthropic/hh-rlhf (helpful-base and helpful-online splits)"
    - source: "HuggingFace PKU-Alignment/BeaverTails"
    - source: "HuggingFace PKU-Alignment/PKU-SafeRLHF"
    - source: "StackOverflow data dump 2018 (archive.org)"
    - source: "FLAN instruction templates (HuggingFace google/flan)"
  procedure:
    - step: "1. Load all datasets from HuggingFace; extract chosen/rejected response pairs from RLHF corpora"
    - step: "2. Compute AIFS per response via regex pipeline: structured lists (Markdown bullets/numbers), stepwise reasoning markers ('First,', 'Therefore,', 'Let me'), safety-prefaces ('I want to note', 'I should mention'), CoT scaffolds ('Step 1:', 'Let's think')"
    - step: "3. Compute ΔAIFS = AIFS(chosen) - AIFS(rejected) per preference pair"
    - step: "4. Cluster prompts using frozen all-MiniLM-L6-v2 at cosine ≥ 0.85; assign cluster IDs"
    - step: "5. Compute marginal AIFS distribution per split (proportion of high-AIFS candidates)"
    - step: "6. Fit conditional logit: P(chosen=1) ~ β₁·ΔAIFS + β₂·Δlength + β₃·Δperplexity + β₄·(ΔAIFS×split) + cluster_FE"
    - step: "7. Validate AIFS discriminantly: compute AIFS distribution over StackOverflow 2018 + FLAN; compare to post-RLHF model outputs"
    - step: "8. BeaverTails entropy analysis: compute D per harm category × AIFS bin; test ΔD_high-AIFS vs. ΔD_low-AIFS"
    - step: "9. Apply 0–4 bidirectionality index to all dataset schemas; test ordinal β₄ alignment"
  success_criteria:
    - "P1: β₄ > 0, OR ≥ 1.10, p < 0.01, effect survives supply control"
    - "P2: ΔD_high-AIFS > ΔD_low-AIFS in ≥ 4/6 pre-registered RLHF-normed harm categories"
    - "P3: Ordinal β₄ ranking matches bidirectionality score ordering across datasets"
    - "AIFS discriminant: features driving β₄ are disproportionately represented in post-RLHF outputs vs. StackOverflow/FLAN baselines"

validation:
  internal_validity:
    - "Supply control: marginal AIFS distribution included as logit covariate to separate selection preference from supply inflation"
    - "Semantic matching: frozen encoder prevents embedding drift across splits"
    - "Construct validation: AIFS features validated against pre-LLM baselines to rule out stable-clarity preference confound"
    - "Category-specific entropy contrast: internal comparison within categories rules out improved model calibration explanation"
  external_validity:
    - "Three-dataset replication (HH-RLHF → BeaverTails → PKU-SafeRLHF) tests whether β₄ effect generalizes across preference corpus designs"
    - "Ordinal bidirectionality test links schema design to empirical effect magnitude — validating schema audit as a generalizable measurement tool"
    - "Pre-LLM baselines ground AIFS in human writing patterns that predate AI influence"

discussion_synthesis:
  key_insights:
    - "The core hypothesis evolved from 'online vs. base splits encode adaptation' to a precisely specified β₄ interaction test with supply controls — much sharper and more defensible"
    - "AIFS construct validity is the critical assumption: if structured lists/safety-prefaces are already preferred pre-LLM, the adaptation signal is confounded with stable clarity preference"
    - "BeaverTails dual-label structure provides an underutilized within-dataset probe for preference normalization — never analyzed for adaptation content in prior work"
    - "The schema bidirectionality index transforms from a descriptive taxonomy into a validated measurement instrument via the cross-dataset predictive regression"
    - "The meta-finding (datasets are structurally blind to adaptation) may be as important as the empirical finding (adaptation signals exist)"
  breakthrough_moments:
    - "Prof. Rex's demand for 'adaptation-specific signature tests' (AI-idiomatic features vs. generic covariate shift) sharpened the hypothesis from unfalsifiable to testable"
    - "Prof. Vera's conditional logit formalization with β₄ interaction and pre-specified OR ≥ 1.10 threshold provided the precise falsification criterion"
    - "Dr. Nova's PKU-SafeRLHF multi-turn trajectory idea and Dr. Ally's BeaverTails entropy probe expanded the three-test battery beyond HH-RLHF"
    - "Prof. Pax's construct validity challenge (AIFS vs. clarity preference) led to the discriminant validation design using StackOverflow 2018 + FLAN baselines"
  resolved_tensions:
    - "Adaptation vs. population shift: resolved by conditional logit supply control + AI-idiomatic feature specificity test"
    - "Causal vs. correlational claims: resolved by framing as 'distributional asymmetry consistent with adaptation' — explicitly not causal proof"
    - "Directionality score as narrative vs. measurement: resolved by requiring predictive validity via cross-dataset β₄ regression"
    - "AIFS as AI-specific vs. general clarity: resolved by discriminant validation against pre-LLM human expert corpora"
