hypothesis_draft:
  title: "Latent Human-to-AI Adaptation Signatures in RLHF Preference Corpora"
  hypothesis_id: "H-AIFS-AdaptationDetection-v1"
  core_claim: |
    Existing RLHF preference corpora encode latent distributional signatures of human-to-AI
    stylistic adaptation, detectable via automated analysis of existing public data — and
    simultaneously exhibit schema-level structural blindness to these signals. Specifically,
    annotators exposed to deployed RLHF-aligned AI systems show increased conditional selection
    preference for AI-idiomatic stylistic features (β₄ > 0 in logit model controlling for supply),
    while dataset schemas score 0–1 on a 0–4 bidirectionality index, confirming measurement asymmetry.
  mechanism: |
    RLHF training amplifies AI-idiomatic stylistic features → annotators internalize these norms
    through repeated exposure → preference weighting shifts toward AI-native discourse → detectable
    as β₄ interaction above supply baseline → simultaneously: schema design never captured this
    feedback loop → creating structural measurement blind spot in alignment evaluation.
  predictions:
    - P1: "β₄ (ΔAIFS × split) > 0, OR ≥ 1.10, p < 0.01 in conditional logit on HH-RLHF"
    - P2: "BeaverTails entropy compression: ΔD_high-AIFS > ΔD_low-AIFS in RLHF-normed harm categories"
    - P3: "Ordinal bidirectionality: β₄(HH-RLHF) < β₄(BeaverTails) < β₄(PKU-SafeRLHF)"

variables_summary:
  independent: "Annotator condition (base=naive, online=deployed-AI-experienced)"
  dependent_primary: "β₄ logit interaction coefficient (ΔAIFS × split), measuring conditional selection preference shift above supply baseline"
  controlled: "Marginal AIFS supply distribution, prompt complexity, semantic cluster FE (frozen encoder), response length and perplexity"

null_hypothesis:
  h0_statement: |
    There is no significant difference in conditional preference for AI-idiomatic stylistic
    features between deployed (online) and naive (base) annotator conditions after controlling
    for marginal response supply, prompt complexity, and cluster fixed effects.
    Formally: β₄ = 0 (OR = 1.0, 95% CI includes 1.0).
  statistical_test: "Conditional logistic regression with interaction term; likelihood ratio test for β₄; bootstrap confidence intervals"
  significance_level: 0.01

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First automated detection of human-to-AI adaptation signals in existing RLHF corpora without new data, benchmarks, or human annotation; introduces AIFS construct and bidirectionality schema audit"
  differentiation_summary: |
    Prior work (Shen et al. 2024) identified the conceptual gap but provided no empirical measurement.
    Vishwarupe et al. (2026) confirmed benchmark blindness but did not detect latent adaptation signals.
    Our work bridges both: measuring the signal that exists in existing data while simultaneously
    documenting why current measurement infrastructure cannot see it. The AIFS + conditional logit
    supply-control design is the methodological innovation that makes this tractable.

