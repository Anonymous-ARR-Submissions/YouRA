dataset:
  name: waterbirds
  root: ./data/waterbirds/waterbird_complete95_forest2water2
  split: train
  num_classes: 2
  num_groups: 4
  img_size: 224
  augment: true

training:
  seed: 1
  epochs: 100
  early_stop_epoch: 5
  batch_size: 32
  optimizer: sgd
  lr: 0.001
  momentum: 0.9
  weight_decay: 0.001
  scheduler: null
  pretrained: true

clustering:
  k: 2
  n_init: 10
  seed: 42

gate:
  ami_threshold: 0.5
  purity_threshold: 0.75

output:
  checkpoint_dir: ./checkpoints/h-e1/waterbirds
  embeddings_dir: ./embeddings/h-e1
  embeddings_path: ./embeddings/h-e1/waterbirds_epoch5.npy
  labels_path: ./embeddings/h-e1/waterbirds_labels.npy
  group_ids_path: ./embeddings/h-e1/waterbirds_group_ids.npy
  results_dir: ./results/h-e1
  results_path: ./results/h-e1/waterbirds_results.yaml
  figures_dir: ./figures
