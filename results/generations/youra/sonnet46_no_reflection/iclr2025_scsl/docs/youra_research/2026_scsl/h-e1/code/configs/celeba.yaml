dataset:
  name: celeba
  root: ./data/celeba/celebA_v1.0
  split: train
  num_classes: 2
  num_groups: 4
  img_size: 224
  augment: true

training:
  seed: 1
  epochs: 50
  early_stop_epoch: 5
  batch_size: 128
  optimizer: sgd
  lr: 0.001
  momentum: 0.9
  weight_decay: 0.0001
  scheduler: null
  pretrained: true

clustering:
  k: 2
  n_init: 10
  seed: 42

gate:
  ami_threshold: 0.5
  purity_threshold: 0.75

output:
  checkpoint_dir: ./checkpoints/h-e1/celeba
  embeddings_dir: ./embeddings/h-e1
  embeddings_path: ./embeddings/h-e1/celeba_epoch5.npy
  labels_path: ./embeddings/h-e1/celeba_labels.npy
  group_ids_path: ./embeddings/h-e1/celeba_group_ids.npy
  results_dir: ./results/h-e1
  results_path: ./results/h-e1/celeba_results.yaml
  figures_dir: ./figures
