# ═══════════════════════════════════════════════════════════════
# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "SGD-based optimization exhibits simplicity bias, preferentially learning high-SNR spurious features"
      status: "BUILD_ON"
      evidence: "Shah et al. (2020) Pitfalls of Simplicity Bias; Geirhos et al. (2020) Shortcut Learning"
    - claim: "Invariant features ARE richly encoded in pretrained backbone representations even when spurious shortcuts dominate the linear head"
      status: "BUILD_ON"
      evidence: "Kirichenko et al. (2022) DFR achieves 97% worst-group on Waterbirds by retraining only last layer"
    - claim: "SSL (SimCLR-style) training still acquires spurious correlations through augmentation-invariant shortcuts"
      status: "BUILD_ON"
      evidence: "Robinson et al. (2023) Spurious Correlations in Self-Supervised Learning"
    - claim: "Annotation-free spurious feature detection without group labels remains unsolved at scale"
      status: "PROVE_NEW"
      evidence: "JTT/LFR use ERM misclassification proxy; no fully automated pipeline for unknown spurious features"
    - claim: "Early gradient SNR imbalance along cluster-discovered directions causally drives cross-paradigm shortcut crystallization"
      status: "PROVE_NEW"
      evidence: "No prior work establishes this temporal, mechanistic, annotation-free, cross-paradigm account"
    - claim: "Gradient SNR Balancing during early training (epochs 1-10) improves worst-group accuracy across supervised, SSL, and contrastive paradigms"
      status: "PROVE_NEW"
      evidence: "No prior annotation-free, paradigm-agnostic early intervention exists"
  scope_reduction_percentage: 50
  phase2b_4_instructions: |
    BUILD_ON claims (simplicity bias, DFR representational sufficiency, SSL shortcut existence) can be
    cited as background without re-verification. PROVE_NEW claims (annotation-free clustering validity,
    SNR predictive power, causal GSB intervention, cross-paradigm transfer) require new experiments.
    Phase 2B should focus verification protocol on the three PROVE_NEW claims.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-GSB-v1"
  confidence_level: 0.78
  core_hypothesis_statement: |
    Under spurious-correlation settings with pretrained backbone initialization (supervised ERM,
    SimCLR-style SSL, and contrastive learning on Waterbirds, CelebA, ColoredMNIST), if gradient
    signal-to-noise ratio (SNR) along annotation-free cluster-discovered feature directions is
    equalized during early training (epochs 1–10) via Gradient SNR Balancing (GSB), then worst-group
    accuracy improves ≥5 percentage points over ERM baseline without average accuracy degradation,
    because early gradient SNR imbalance along spurious feature directions causally drives
    representational suppression of invariant features during the shortcut consolidation critical period.
  alternative_hypothesis_h0: |
    There is no significant difference in worst-group accuracy between GSB-trained models and ERM
    baseline when controlling for matched-magnitude random subspace gradient balancing, and early
    gradient SNR imbalance does not predict final worst-group accuracy degradation with Spearman
    ρ > 0.5 across learning paradigms.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Training intervention"
      type: "categorical"
      operationalization: "Gradient SNR Balancing (GSB) applied during epochs 1-10 vs. ERM baseline vs. random-direction control vs. adversarial-orthogonal control"
      levels: ["ERM baseline", "Early-only GSB (epochs 1-10)", "Late-only GSB (epochs 11+)", "Full GSB", "Block-matched random balancing", "Adversarial-orthogonal balancing"]
    - name: "Learning paradigm"
      type: "categorical"
      operationalization: "Supervised ERM (cross-entropy), SimCLR-style SSL (contrastive loss), Correct-N-Contrast (contrastive with labels)"
      levels: ["Supervised ERM", "SimCLR SSL", "Contrastive (Correct-N-Contrast)"]
    - name: "SSL augmentation strength"
      type: "continuous"
      operationalization: "Color jitter intensity parameter (0.0, 0.2, 0.5, 0.8, 1.2) for SimCLR on Waterbirds"
    - name: "Backbone initialization"
      type: "categorical"
      operationalization: "ImageNet-pretrained ResNet-50/ViT-B vs. random initialization (ColoredMNIST only)"
      levels: ["ImageNet-pretrained", "Random initialization"]
  dependent:
    - name: "Worst-group accuracy"
      type: "continuous"
      operationalization: "Accuracy on the worst-performing group in the test set (using ground-truth group labels for evaluation only), range [0,1]"
      primary: true
    - name: "Average accuracy"
      type: "continuous"
      operationalization: "Mean accuracy across all test examples, range [0,1]"
      primary: false
    - name: "Early gradient SNR ratio"
      type: "continuous"
      operationalization: "SNR(d_spurious) / SNR(d_invariant) averaged over epochs 1-5, where SNR(d) = ||E[g·d]|| / sqrt(Var[g·d])"
      primary: false
    - name: "Cluster alignment quality"
      type: "continuous"
      operationalization: "Adjusted Mutual Information (AMI) and worst-cluster purity between k-means clusters and ground-truth groups at epoch 5"
      primary: false
    - name: "Spectral entropy of Fisher eigenspectrum"
      type: "continuous"
      operationalization: "Entropy of normalized eigenvalue distribution of between-cluster Fisher scatter matrix, measured epochs 1-20"
      primary: false
    - name: "CKA similarity to spuriosity-free representations"
      type: "continuous"
      operationalization: "Centered Kernel Alignment between model representations and representations from model trained on spuriosity-free data, at epochs 1,5,10,final"
      primary: false
  controlled:
    - name: "Backbone architecture"
      operationalization: "ResNet-50 (standard) and ViT-B (for comparison); fixed across conditions"
    - name: "Dataset spuriosity level"
      operationalization: "Standard Waterbirds (95% spurious), CelebA, ColoredMNIST (fixed color-label correlation)"
    - name: "Training hyperparameters"
      operationalization: "Learning rate, batch size, weight decay standardized across paradigms per dataset; only intervention varies"
    - name: "Random seeds"
      operationalization: "≥5 random seeds per condition; report mean ± std"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Annotation-free spurious direction discovery: k-means clustering on penultimate-layer embeddings at epoch 5 recovers spurious feature axes as cluster centroid difference vectors (top-k Fisher subspace, k≤5)"
      evidence: "GEORGE [Bao et al.] demonstrates clustering recovers spurious groups; DFR shows invariant features are linearly separable in pretrained embeddings [Kirichenko et al., 2022]"
      falsifier: "If AMI < 0.5 or worst-cluster purity < 75% on Waterbirds/CelebA across 5 seeds, clustering fails to recover spurious structure and the mechanism collapses"
    - step: 2
      description: "Early gradient SNR imbalance: during epochs 1-10, gradient signal-to-noise ratio along spurious cluster directions exceeds that along invariant directions (SNR ratio > 1.5), reflecting optimization preferentially amplifying high-variance spurious features"
      evidence: "Shah et al. (2020) SGD simplicity bias; gradient dominance by correlated features established in NLP shortcuts [Du et al., 2022]"
      falsifier: "If Spearman ρ between early SNR ratio and final worst-group accuracy degradation < 0.5 in either supervised or SSL paradigm, predictive validity fails"
    - step: 3
      description: "Shortcut consolidation critical period: spurious-direction variance increases while invariant-direction variance decreases during epochs 1-10 in ERM; spectral entropy of Fisher eigenspectrum decreases (compresses to fewer axes) during this window"
      evidence: "Reproducibility study [2026] confirms shortcut mechanisms link to optimization bias; temporal compression predicted by gradient SNR theory"
      falsifier: "If three-curve variance trajectories show no anti-correlation (spurious up, invariant down) in ERM, or if spectral entropy does not decrease during epochs 1-10, the critical period mechanism is not supported"
    - step: 4
      description: "GSB intervention: equalizing gradient SNR during epochs 1-10 (early-only) reverses invariant feature suppression, alters representation geometry (measurable via CKA), and improves worst-group accuracy across paradigms with direction-specific effect (not achievable by random subspace balancing)"
      evidence: "DFR success confirms invariant features present but suppressed; timing specificity predicted by critical period mechanism; directional specificity distinguishes from generic regularization"
      falsifier: "If early-only GSB does not outperform late-only GSB by ≥5pp, or if adversarial-orthogonal direction control achieves comparable improvement, the mechanism is not directionally specific"
  key_tension: "The mechanism requires pretrained backbone for epoch-5 cluster structure to be reliable — this conflates optimization dynamics with pretraining prior. The 2×2 factorial {pretrained, random init} × {GSB, baseline} addresses this but may reveal that the mechanism is partially pretraining-dependent."
  evidence_summary: |
    The causal chain builds on three established findings: (1) SGD simplicity bias drives high-SNR
    feature amplification [Shah et al. 2020], (2) invariant features are richly encoded in pretrained
    backbones despite shortcut dominance [Kirichenko et al. 2022 DFR], and (3) SSL also acquires
    spurious correlations via augmentation-invariant shortcuts [Robinson et al. 2023]. The novel
    claim is that these phenomena share a common early-phase gradient geometry mechanism, measurable
    annotation-free via representation clustering, and addressable via directionally-targeted
    gradient reweighting during a critical training window.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Pretrained backbone initialization is required for epoch-5 cluster structure to reliably reflect spurious feature axes"
    supporting_evidence: "ImageNet-pretrained ResNets encode color, texture, and background features strongly; all baseline papers (GroupDRO, DFR, JTT) use pretrained initialization"
    consequence_if_violated: "GSB would be inapplicable to from-scratch training; mechanism is limited to transfer learning settings. Addressed by 2×2 factorial analysis."
  - id: "A2"
    assumption: "Spurious feature directions are approximately low-dimensional (top-1 explains ≥60% of inter-cluster variance, top-5 ≥85%)"
    supporting_evidence: "GEORGE clustering analysis shows dominant cluster separation directions in embedding space; Fisher LDA typically yields compact subspaces for binary spurious attributes"
    consequence_if_violated: "1D/subspace SNR projection loses interpretability; mechanism must be reformulated as distributed anisotropy. Addressed by pre-registered eigenspectrum threshold test."
  - id: "A3"
    assumption: "Invariant features are present and suppressed (not absent) in ERM-trained models — gradient SNR equalization rescues signal, not noise"
    supporting_evidence: "DFR [Kirichenko et al. 2022] achieves 97% worst-group on Waterbirds by retraining only the last linear layer, proving invariant features are richly encoded"
    consequence_if_violated: "GSB would amplify noise rather than recover signal; worst-group accuracy would not improve. Addressed by absent-signal control on ColoredMNIST."
  - id: "A4"
    assumption: "The same gradient SNR mechanism governs shortcut acquisition in both supervised ERM and SimCLR-style SSL — cross-paradigm invariance holds"
    supporting_evidence: "Both paradigms use gradient-based optimization; SSL instance discrimination gradients can be projected onto feature directions analogously to supervised gradients"
    consequence_if_violated: "Cross-paradigm unification claim collapses; contribution reduces to supervised-only mechanism. Addressed by augmentation modulation test and mediation analysis."
  - id: "A5"
    assumption: "Early training phase (epochs 1-10) is the critical window; intervention timing matters causally"
    supporting_evidence: "Simplicity bias literature shows shortcuts are learned early in training [Shah et al. 2020]; DFR post-hoc repair suggests the damage is done by training end"
    consequence_if_violated: "Timing ablation (early-only vs late-only) would show no difference; mechanism would reduce to generic regularization effect. Directly tested by the ablation design."

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Vision classification tasks with known spurious correlations (bird-background, hair-gender)
    - Pretrained backbone fine-tuning settings (ImageNet → task-specific)
    - Supervised ERM, SimCLR-style SSL, and contrastive learning paradigms
    - Binary or low-cardinality spurious attributes that produce separable cluster structure
    - Datasets: Waterbirds, CelebA, ColoredMNIST (primary); MultiNLI as NLP extension
  does_not_apply_to: |
    - Reinforcement learning (RL) — explicitly scoped out; RL gradient decomposition requires known state factorization
    - Random initialization training without pretrained backbone (mechanism may be attenuated or absent)
    - High-cardinality spurious attributes distributed across many directions (violates low-dimensionality assumption A2)
    - Foundation model scale (LLM/LMM fine-tuning) — not tested in this hypothesis
    - Settings where invariant features are genuinely absent (not suppressed) — GSB cannot recover absent signals
  known_limitations: |
    - Pretrained backbone dependency limits applicability to transfer learning settings
    - Cluster quality at epoch 5 depends on spurious feature being visually/semantically dominant
    - Gradient hook overhead scales with batch size and embedding dimension (trivial at standard settings)
    - RL extension requires future work with controlled state factorization environments

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "Early-only GSB (epochs 1-10) improves worst-group accuracy by ≥5pp over ERM baseline on Waterbirds and CelebA, without average accuracy degradation, and outperforms matched random-subspace balancing by ≥5pp"
    test_method: "Train ResNet-50 on Waterbirds and CelebA under 6 conditions (ERM, early-only GSB, late-only GSB, full GSB, block-matched random, adversarial-orthogonal) with ≥5 seeds each. Measure worst-group and average accuracy."
    success_criterion: "Early-only GSB worst-group accuracy ≥ ERM + 5pp; random control gap ≥5pp; statistical significance p<0.01 across seeds"
    falsification: "If early-only GSB ≤ ERM + 5pp, or if random-direction control achieves ≥70% of GSB's improvement, the hypothesis is falsified"
  - id: "P2"
    primary: false
    statement: "Early gradient SNR ratio (spurious/invariant, computed via cluster-derived directions at epoch 5) predicts final worst-group accuracy degradation with Spearman ρ > 0.7 across supervised ERM and SimCLR-SSL, without retuning thresholds between datasets"
    test_method: "Compute SNR ratio at epoch 5 across multiple training runs with varying spuriosity levels on Waterbirds, CelebA, ColoredMNIST (supervised) and SimCLR-Waterbirds (SSL). Compute Spearman correlation with final worst-group accuracy."
    success_criterion: "Spearman ρ > 0.7 in both supervised and SSL paradigms; same SNR threshold (>1.5) applies across datasets"
    falsification: "If ρ < 0.5 in either paradigm, or if different thresholds are required per dataset, cross-paradigm predictive invariance fails"
  - id: "P3"
    primary: false
    statement: "In SimCLR on Waterbirds, increasing color-jitter augmentation strength (0.0→1.2) monotonically reduces early spurious SNR ratio (Spearman ρ ≤ -0.8) and improves worst-group linear probe accuracy (ρ ≥ 0.8), with augmentation strength having no residual effect on worst-group accuracy after controlling for SNR ratio (partial regression p > 0.1)"
    test_method: "Train SimCLR on Waterbirds with 5 color-jitter strengths (0.0, 0.2, 0.5, 0.8, 1.2), ≥3 seeds each. Measure early SNR ratio at epoch 5, worst-group linear probe accuracy at convergence. Run bootstrapped mediation analysis."
    success_criterion: "Both Spearman correlations exceed thresholds; mediation analysis shows significant indirect effect and non-significant direct effect"
    falsification: "If augmentation strength retains significant direct effect on worst-group accuracy after controlling for SNR, cross-paradigm mechanistic unification fails"

