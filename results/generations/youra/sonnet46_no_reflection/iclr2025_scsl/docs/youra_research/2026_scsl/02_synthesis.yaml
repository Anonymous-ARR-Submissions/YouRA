    There is no significant difference in worst-group accuracy between early-only GSB and ERM
    baseline after controlling for random-subspace gradient balancing, and early gradient SNR
    ratio does not predict final worst-group accuracy degradation with Spearman ρ > 0.5 across
    learning paradigms.
  statistical_test: "Two-sided t-test for worst-group accuracy differences; Spearman correlation for SNR predictive power; bootstrapped mediation for SSL indirect effects"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First annotation-free, early-phase, directionally-specific gradient intervention for cross-paradigm spurious correlation robustification, with mechanistic evidence via spectral entropy and variance trajectory analysis"
  differentiation_summary: |
    - GroupDRO: requires group annotations, loss-level intervention, supervised-only
    - DFR: post-hoc last-layer repair, requires labeled val set, supervised-only
    - JTT: loss-based proxy, paradigm-specific, no mechanistic account
    - Robinson et al. 2023: diagnoses SSL shortcuts, proposes no intervention
    - GSB: annotation-free + preventive (not post-hoc) + gradient-geometry-level + cross-paradigm + mechanistic (spectral entropy, variance trajectories)

