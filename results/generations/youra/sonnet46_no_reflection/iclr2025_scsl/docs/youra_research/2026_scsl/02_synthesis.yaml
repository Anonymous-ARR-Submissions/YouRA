measurement_plan:
  data_collection:
    - source: "Waterbirds dataset (kohpangwei/group_DRO repo), standard train/val/test splits"
    - source: "CelebA dataset (standard torchvision download), group splits per Sagawa et al. 2020"
    - source: "ColoredMNIST (generated via IRM codebase, facebookresearch/invariantriskminimization)"
  procedure:
    - step: "Train ResNet-50 under 6 conditions × 3 datasets × ≥5 seeds; log gradient statistics via PyTorch backward hooks"
    - step: "At epoch 5: compute k-means clusters (k=2) on penultimate-layer embeddings; compute AMI/purity vs. ground-truth groups; compute Fisher eigenspectrum"
    - step: "Compute gradient SNR ratio (spurious/invariant) at epochs 1-10 using cluster-derived directions"
    - step: "Measure worst-group and average accuracy at convergence for all conditions"
    - step: "Compute CKA between GSB and ERM representations at epochs 1,5,10,final"
    - step: "Track three-curve variance trajectories (spurious, invariant, worst-group accuracy) per epoch"
    - step: "Run SimCLR on Waterbirds at 5 augmentation strengths × ≥3 seeds; run bootstrapped mediation analysis"
    - step: "Run 2×2 factorial {pretrained, random init} × {early GSB, ERM} on ColoredMNIST"
  success_criteria:
    - "AMI≥0.5 and purity≥75% on Waterbirds and CelebA across ≥5 seeds"
    - "Spearman ρ>0.7 for SNR ratio vs. worst-group degradation across paradigms"
    - "Early-only GSB worst-group accuracy ≥ ERM + 5pp, p<0.01"
    - "Early-only GSB vs. random control gap ≥5pp"
    - "SSL augmentation modulation Spearman ρ ≤ -0.8 (SNR) and ≥ 0.8 (accuracy)"
    - "SSL mediation: direct effect of augmentation p>0.1 after controlling for SNR"

validation:
  internal_validity:
    - "2×2 factorial design isolates optimization dynamics from pretraining prior (interaction term analysis)"
    - "Three-way directional controls (isotropic, block-matched, adversarial-orthogonal) eliminate generic regularization explanation"
    - "Timing ablation (early-only vs. late-only vs. full) establishes causal critical period"
    - "Absent-signal ColoredMNIST control confirms GSB rescues suppressed signal, not absent signal"
    - "≥5 random seeds with reported mean ± std ensures statistical robustness"
  external_validity:
    - "Three datasets with different modalities/spurious attributes (Waterbirds, CelebA, ColoredMNIST)"
    - "Two architectures (ResNet-50, ViT-B) for architecture generalization"
    - "Two paradigms (supervised, SSL) for cross-paradigm validation"
    - "NLP extension (MultiNLI) as secondary modality check"

discussion_synthesis:
  key_insights:
    - "The gradient SNR mechanism provides a paradigm-agnostic explanation for shortcut learning, unifying supervised, SSL, and contrastive paradigms under one theoretical lens"
    - "Annotation-free cluster direction discovery (GEORGE-style) enables the SNR measurement without group labels — making the intervention practical for real-world deployment"
    - "The 'critical period' framing (spectral entropy decrease, epochs 1-10) connects shortcut learning to broader representation learning dynamics and opens new research directions"
    - "DFR's empirical success (post-hoc repair working well) paradoxically validates the mechanism: invariant features ARE present, they're just suppressed — exactly what GSB addresses preventively"
    - "The adversarial-orthogonal control and mediation completeness tests are the hardest falsification tests; passing them would cement the causal claim"
  breakthrough_moments:
    - "Exchange 4 (Prof. Rex): Identifying that annotation-free direction discovery is the prerequisite that makes the mechanism actually annotation-free — not a side detail"
    - "Exchange 6 (Dr. Ally): Showing that DFR's success is positive evidence for A3 (invariant features present but suppressed) — turning a constraint into supporting evidence"
    - "Exchange 9 (Prof. Rex): The adversarial-orthogonal control idea — the hardest and most creative specificity test"
    - "Exchange 10 (Dr. Nova): Augmentation strength as continuous modulation control — elegant natural experiment for SSL cross-paradigm test"
    - "Exchange 16 (Dr. Nova): Spectral entropy as scalar measure of shortcut consolidation phase transition — operationalizes 'critical period' with zero additional compute"
  resolved_tensions:
    - "Supervised → annotation-free: resolved by clustering-based direction discovery with explicit AMI validity threshold"
    - "Single-direction vs. subspace: resolved by pre-registered eigenspectrum thresholds (top-1 ≥60%, top-5 ≥85%)"
    - "Optimization vs. pretraining: resolved by 2×2 factorial design with interaction analysis"
    - "Correlation vs. causation: resolved by timing ablation + three-way directional controls + CKA representation geometry"
    - "RL scope: resolved by explicit out-of-scope decision — supervised+SSL+contrastive is already a strong publishable claim"
