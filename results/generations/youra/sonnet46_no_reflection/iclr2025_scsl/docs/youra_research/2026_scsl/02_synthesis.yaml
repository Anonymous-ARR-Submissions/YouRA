hypothesis_draft:
  title: "Gradient SNR Balancing (GSB): Annotation-Free Early-Phase Intervention for Cross-Paradigm Shortcut Robustification"
  hypothesis_id: "H-GSB-v1"
  core_claim: |
    Early gradient signal-to-noise ratio (SNR) imbalance along annotation-free cluster-discovered
    spurious feature directions causally drives shortcut crystallization during a critical training
    window (epochs 1-10). Equalizing this imbalance via Gradient SNR Balancing (GSB) improves
    worst-group accuracy across supervised ERM, SSL, and contrastive paradigms without requiring
    group annotations, and the effect is directionally specific (not achievable by random subspace
    balancing), temporally specific (early-only beats late-only), and cross-paradigm (modulated by
    augmentation strength in SSL via SNR mediation).
  mechanism: |
    Step 1: Penultimate-layer k-means clustering at epoch 5 (pretrained backbone) recovers spurious
    feature axes as cluster centroid difference vectors (top-k Fisher subspace, k≤5). AMI≥0.5 and
    purity≥75% on Waterbirds/CelebA validate the annotation-free proxy.
    Step 2: During epochs 1-10, gradient SNR along spurious directions exceeds that along invariant
    directions (ratio > 1.5), reflecting optimization's preferential amplification of high-SNR
    spurious features — the "simplicity bias" in gradient geometry.
    Step 3: This SNR imbalance drives a shortcut consolidation phase transition: spurious-direction
    variance increases while invariant-direction variance decreases; Fisher eigenspectrum entropy
    decreases (spectral compression).
    Step 4: GSB equalizes SNR during this critical window, reversing invariant feature suppression
    (confirmed by CKA divergence from ERM and three-curve variance trajectories), improving
    worst-group accuracy across paradigms.
  predictions:
    - P1: "Early-only GSB improves worst-group accuracy ≥5pp over ERM and ≥5pp over matched random-direction control on Waterbirds and CelebA (ResNet-50, ≥5 seeds)"
    - P2: "Early SNR ratio (epoch 5) predicts final worst-group degradation with Spearman ρ>0.7 across supervised and SimCLR-SSL paradigms without threshold retuning"
    - P3: "SimCLR augmentation strength monotonically reduces early spurious SNR ratio (ρ≤-0.8) and improves worst-group accuracy (ρ≥0.8), with full mediation (augmentation direct effect p>0.1 after controlling for SNR)"

variables_summary:
  independent: "Training intervention (ERM, early-only GSB, late-only GSB, full GSB, random controls), learning paradigm (supervised/SSL/contrastive), augmentation strength (SSL), backbone initialization (pretrained/random)"
  dependent_primary: "Worst-group accuracy (range [0,1], evaluated using ground-truth group labels for evaluation only)"
  controlled: "Backbone architecture (ResNet-50/ViT-B), dataset spuriosity level (standard Waterbirds/CelebA/ColoredMNIST), training hyperparameters, random seeds (≥5)"

