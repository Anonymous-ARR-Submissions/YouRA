# ============================================================
# RISK FLAGS FOR ADVERSARIAL REVIEW
# ============================================================

risk_flags:
  - risk: "PruSC paper citation unverified"
    severity: "MEDIUM"
    location: "Introduction, Section 5.5"
    detail: >
      Kim et al. 2024 PruSC paper not found in Semantic Scholar MCP. The >95% CelebA purity
      claim attributed to PruSC is sourced from 045_validated_hypothesis.md Section 6, which
      itself cites this claim. If PruSC paper doesn't exist or doesn't claim 95%, the comparison
      is invalid. Adversarial reviewer should verify independently.

  - risk: "Robinson et al. 2023 SSL spurious correlations citation unverified"
    severity: "LOW"
    location: "Section 2.3, Related Work"
    detail: >
      Not found in Semantic Scholar. Citation sourced from 03_refinement.yaml established facts.
      Claim (SSL acquires spurious correlations) is independently supported by other literature;
      specific citation may be wrong.

  - risk: "Ghaznavi et al. 2023 LFR citation unverified"
    severity: "LOW"
    location: "Section 2.2"
    detail: >
      Not found in Semantic Scholar. LFR method is mentioned in 03_refinement.yaml as a baseline.
      The specific paper may have different author names or title.

  - risk: "Single-seed results"
    severity: "LOW"
    location: "Section 6.3 (L1), acknowledged"
    detail: >
      All experiments use seed=42. Paper acknowledges this limitation honestly. Waterbirds
      gap is large (+0.262 AMI above threshold), making reversal unlikely but not impossible.

  - risk: "Downstream mechanism (GSB) entirely untested"
    severity: "HIGH"
    location: "Section 6.3 (L4), Section 1 (contributions framing)"
    detail: >
      The paper correctly scopes itself to the detection step (H-E1) and does not claim
      GSB intervention results. However, the title and framing of contributions (C1-C4)
      must not imply GSB was tested. Adversarial reviewer should verify no overclaims about
      the intervention itself appear in the paper.

