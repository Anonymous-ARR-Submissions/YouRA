gap_id: "gap_1"
gap_title: "No Unified Robustification Framework Spanning Multiple Learning Paradigms"
gap_description: |
  Robustification methods exist for supervised learning (GroupDRO, IRM, JTT/DFR) and some SSL
  extensions, but each paradigm has separate, incompatible methodology. No framework unifies
  the treatment of spurious correlations across supervised, self-supervised, contrastive, and
  reinforcement learning paradigms. A principled theoretical framework is missing that identifies
  the common mechanism by which spurious correlations arise and persist across paradigms.
papers_folder: "docs/youra_research/20260520_scsl/papers/"
