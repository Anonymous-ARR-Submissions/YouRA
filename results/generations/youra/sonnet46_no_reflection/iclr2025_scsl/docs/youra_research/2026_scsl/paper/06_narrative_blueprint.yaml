# Narrative Blueprint: Phase 6 Paper
# Research: Feature-Strength Conditionality in Annotation-Free Spurious Direction Recovery
# Generated: 2026-05-20 | Step 02 of Phase 6

paper_title: "When Shortcuts Hide in Plain Sight: Feature-Strength Conditionality in Annotation-Free Spurious Direction Recovery"

# ============================================================================
# HOOK DESIGN
# ============================================================================

hook:
  strategy: "counterintuitive_finding"

  opening_statement:
    content: >
      Clustering-based methods for detecting spurious correlations in pretrained neural networks
      are believed to work reliably across standard benchmarks — yet we find that the same
      algorithm achieves near-perfect spurious group recovery on one benchmark (AMI=0.762) and
      near-random performance on another (AMI=0.258), using identical hyperparameters, the same
      model architecture, and following published methodology.
    rationale: >
      Readers who rely on benchmark-to-benchmark transfer of annotation-free detection methods
      will immediately recognize this as a threat to their own work. The contrast (0.762 vs 0.258)
      is stark enough to be memorable.

  why_reader_should_care:
    main_reason: >
      Annotation-free spurious correlation detection is a prerequisite for scalable model
      robustification — if the detection step fails silently, all downstream interventions
      (gradient balancing, reweighting, retraining) are applied to the wrong directions.
    concrete_example: >
      k-means clustering on epoch-5 penultimate embeddings (following GEORGE/PruSC methodology)
      recovers Waterbirds background-bird spurious axes (purity=0.892) but collapses near-randomly
      on CelebA hair-color spurious groups (purity=0.456, barely above random baseline of 0.440).
    stakes: >
      Without understanding when annotation-free detection works, practitioners may apply
      robustification pipelines with false confidence, obtaining no actual protection against
      spurious shortcuts on datasets with fine-grained or subtle spurious attributes.

# ============================================================================
# PROBLEM FRAMING (THREE LEVELS)
# ============================================================================

problem_framing:
  surface_problem:
    description: >
      Spurious correlations cause deep learning models to rely on features that happen to
      correlate with labels in training data but fail under distribution shift — a well-documented
      cause of worst-group accuracy degradation.
    common_understanding: >
      The field has developed robustification methods (GroupDRO, JTT, DFR) that improve
      worst-group accuracy, but most require group annotations that are expensive to collect.

  deeper_problem:
    description: >
      Annotation-free detection methods — which cluster model representations to discover
      spurious groups automatically — carry an implicit assumption: that spurious features
      are salient enough in the pretrained embedding space to produce cluster-separable
      representations during early training. This assumption is never explicitly tested.
    why_overlooked: >
      Published results from GEORGE and PruSC demonstrate high cluster purity on standard
      benchmarks, creating a false impression that the detection step is robust. These results
      are presented without characterizing the relationship between spurious feature salience
      and clustering success.
    our_perspective: >
      We explicitly test this assumption by running the same clustering pipeline on two
      standard benchmarks with qualitatively different spurious features (dominant background
      texture vs. fine-grained hair color), revealing a sharp conditionality that existing
      literature does not acknowledge.

  gap_in_existing_work:
    description: >
      No prior work characterizes the conditions under which annotation-free clustering-based
      spurious detection succeeds or fails. The relationship between spurious feature salience,
      pretrained initialization prior, and cluster discoverability is absent from the literature.
    why_gap_exists: >
      Benchmark papers typically select datasets where their method works and report success.
      Systematic comparison across datasets with varying spurious feature strengths has not
      been conducted for the detection step specifically.
    why_gap_matters: >
      Without this characterization, practitioners cannot assess whether annotation-free
      detection is applicable to their dataset, leading to silently miscalibrated robustification
      pipelines.

# ============================================================================
# KEY INSIGHT
# ============================================================================

key_insight:
  aha_moment:
    one_sentence: >
      The success of annotation-free spurious direction discovery via clustering is determined
      by spurious feature salience in the pretrained initialization prior, not by the clustering
      algorithm or training protocol.
    expanded_explanation: >
      ImageNet-pretrained ResNet-50 strongly encodes scene/background features (aligned with
      Waterbirds' bird-habitat spurious correlation) before any task-specific training begins.
      This pretrained prior causes epoch-5 ERM embeddings to be cluster-separable for
      background-level spurious features. Hair color, however, is not a primary ImageNet
      category, so the pretrained prior does not pre-separate CelebA groups — and five epochs
      of ERM fine-tuning are insufficient to build this structure from scratch.

  why_others_missed_it:
    common_assumptions: >
      Prior work assumes that any spurious correlation strong enough to degrade worst-group
      accuracy will also produce cluster-separable embeddings. "Spurious feature strength" is
      conflated with "cluster discoverability."
    our_different_view: >
      Cluster discoverability depends on the alignment between the spurious attribute and the
      pretrained representation geometry — a property of the initialization, not just the
      spurious correlation strength in the labels.
    enabling_factor: >
      Running the identical pipeline on two benchmarks with explicitly controlled variation in
      spurious feature type (global background vs. local texture) made the conditionality visible.

  what_makes_it_work:
    intuitive_explanation: >
      A pretrained model "knows about" bird habitats (it was trained on ImageNet scene categories)
      but does not "know about" hair color as a semantically distinct category. When fine-tuned
      on Waterbirds, the existing background knowledge immediately produces separable clusters.
      CelebA requires the model to learn hair-color distinction from scratch.
    key_mechanism: >
      ImageNet pretraining encodes spurious attribute salience into the initialization prior.
      Features with high ImageNet-pretraining alignment produce cluster-separable embeddings
      during early ERM fine-tuning; features without this alignment require either more training
      epochs or different probe methodology.

# ============================================================================
# EVIDENCE NARRATIVE
# ============================================================================

evidence_narrative:
  main_claim:
    statement: >
      Annotation-free spurious direction discovery via k-means clustering on epoch-5 penultimate
      embeddings is feature-strength conditional: it succeeds for visually dominant spurious
      features (Waterbirds: AMI=0.762, purity=0.892) and fails for fine-grained texture-based
      spurious features (CelebA: AMI=0.258, purity=0.456).
    measurable_criteria: >
      Adjusted Mutual Information (AMI) ≥ 0.5 and worst-cluster purity ≥ 0.75 on each dataset.
      Waterbirds passes both thresholds; CelebA fails both.

  supporting_evidence:
    - id: "evidence_1"
      what: "Waterbirds AMI=0.762 vs. random baseline AMI≈0.0001"
      so_what: "The mechanism is not merely above-chance — it is strongly discriminative for dominant features"
      how_it_supports_claim: "Confirms existence of the mechanism for one feature type"

    - id: "evidence_2"
      what: "CelebA AMI=0.258 and purity=0.456 (barely above random purity=0.440)"
      so_what: "The failure is not marginal — it is near-random, indicating the mechanism does not activate"
      how_it_supports_claim: "Demonstrates the hard boundary of the conditionality"

    - id: "evidence_3"
      what: "Waterbirds worst-cluster purity=0.892 vs. random=0.727"
      so_what: "Near-perfect group separation confirms the cluster correctly identifies spurious group membership"
      how_it_supports_claim: "Validates AMI result with an independent metric"

    - id: "evidence_4"
      what: "Experiment design integrity: identical hyperparameters, same ResNet-50, same epoch, same code"
      so_what: "The performance gap is not an implementation artifact"
      how_it_supports_claim: "Isolates spurious feature type as the causal variable"

  surprising_findings:
    finding: >
      CelebA worst-cluster purity (0.456) is actually below the random baseline purity (0.440) by
      only 0.016 — k-means on CelebA embeddings performs essentially at chance for spurious group separation.
    why_surprising: >
      The PruSC paper reports >95% CelebA cluster purity using a clustering-based approach.
      Our reproduction at epoch 5 with k=2 yields near-random performance — a >2x gap from the
      published result.
    our_interpretation: >
      The PruSC result likely uses a different probe epoch, different k, or post-convergence
      embeddings. This reveals that published clustering-based detection results are highly
      configuration-sensitive and do not transfer across experimental setups without explicit
      characterization.

  what_results_mean: >
    Feature-strength conditionality is a previously undocumented constraint on all clustering-based
    annotation-free spurious detection methods. Any method that uses embedding clustering to discover
    spurious groups (GEORGE, PruSC, and derivatives) inherits this conditionality. The finding
    motivates a spurious feature salience pre-screen before applying such methods.

# ============================================================================
# BROADER IMPACT / TAKEAWAY
# ============================================================================

takeaway:
  main_contribution:
    one_sentence: >
      We identify and characterize feature-strength conditionality as a fundamental constraint
      on annotation-free clustering-based spurious direction discovery.
    why_significant: >
      This narrows an implicit assumption in several widely-cited robustification pipelines
      and provides a diagnostic framework for assessing whether annotation-free detection
      is applicable to a given dataset.

  implications:
    for_field: >
      Spurious correlation detection papers should characterize the spurious feature salience
      of their benchmark datasets and test whether detection transfers across datasets with
      varying feature salience. Reporting only the success cases is insufficient.
    for_practice: >
      Practitioners deploying annotation-free robustification pipelines should run a salience
      pre-screen (e.g., linear probe accuracy from pretrained embeddings for the suspected
      spurious attribute) before trusting cluster-based spurious direction estimates.

  future_possibilities:
    immediate_extensions: >
      (1) Adaptive probe epoch selection based on representational stability criterion;
      (2) k-adaptive GMM clustering to handle multi-group spurious structure;
      (3) Layer-wise probing for fine-grained spurious features in intermediate CNN layers.
    longer_term_vision: >
      A dataset-agnostic spurious feature salience score that gates the applicability of
      annotation-free detection methods, enabling reliable robustification pipelines across
      diverse real-world datasets without requiring group annotations.

# ============================================================================
# SECTION-LEVEL NARRATIVE GOALS
# ============================================================================

section_goals:
  abstract:
    narrative_purpose: >
      Compress the full story: surprising failure, key finding (conditionality), evidence
      (AMI gap), and implication (salience pre-screen). Lead with the finding, not the method.
    key_message: >
      Annotation-free spurious detection via clustering is feature-strength conditional —
      a constraint absent from existing literature.

  introduction:
    narrative_purpose: "Hook → Problem → Insight → Preview"
    hook_strategy: "counterintuitive_finding — same method, same setup, 3x AMI difference"
    opening_requirement: >
      Start with the stark quantitative contrast (AMI=0.762 vs AMI=0.258) to immediately
      establish the gap. Do NOT open with 'Spurious correlations are important...'
    transition_to_related: >
      After establishing the problem, transition by noting that existing methods assume
      clustering-based detection is reliable — but this assumption has never been tested.

  related_work:
    narrative_purpose: "Show existing work insufficient → justify our characterization study"
    positioning_strategy: >
      Organize by: (1) robustification methods requiring annotations, (2) annotation-free
      detection methods (GEORGE, PruSC, JTT), (3) feature learning and representation
      analysis (DFR, Shah et al. simplicity bias). Show each category either assumes detection
      works or does not address detection reliability.
    key_comparison_points:
      - "GroupDRO/DFR: require annotations; do not address annotation-free detection reliability"
      - "JTT: loss-based proxy; paradigm-specific; no characterization of when it works"
      - "GEORGE/PruSC: use clustering; report success; do not characterize conditionality"
      - "Shah et al. simplicity bias: explains WHY shortcuts form; does not address cluster detectability"

  methodology:
    narrative_purpose: "Show WHY this experimental design tests the conditionality claim"
    connection_to_insight: >
      The design is intentionally minimal — same algorithm, same model, two datasets that
      differ primarily in spurious feature salience. This isolates salience as the variable.
    key_design_decisions:
      - "k-means k=2: follows published methodology (GEORGE/PruSC) for fair comparison"
      - "epoch 5: published critical period for shortcut consolidation (Shah et al.)"
      - "ResNet-50 pretrained: standard for the benchmark; matches DFR/JTT/GroupDRO baselines"
      - "AMI + worst-cluster purity: two independent metrics to avoid single-metric artifacts"
      - "Random baseline comparison: establishes chance-level reference for AMI and purity"

  experiments:
    narrative_purpose: "Design tests that directly probe the conditionality claim"
    experimental_questions:
      - "RQ1: Does epoch-5 k-means recover spurious directions for visually dominant spurious features? (Waterbirds)"
      - "RQ2: Does the same pipeline succeed for fine-grained texture spurious features? (CelebA)"
      - "RQ3: Is the performance gap explained by experimental confounds, or is it genuine conditionality?"
    dataset_rationale: >
      Waterbirds (background texture = global, salient, ImageNet-aligned) and CelebA
      (hair color = local, fine-grained, NOT ImageNet-aligned) provide a natural contrast
      in spurious feature salience while keeping all other experimental factors constant.
    baseline_rationale: >
      Random clustering baseline (shuffled labels) establishes the floor for AMI and purity.
      Gap above random quantifies meaningful spurious structure recovery.
    metric_rationale: >
      AMI adjusts for cluster size differences; worst-cluster purity captures group-level
      separation quality. Together they validate the spurious direction recovery from different angles.

  results:
    narrative_purpose: "Present evidence of conditionality — quantitative gap, visualization, mechanistic analysis"
    main_result_highlight: >
      Waterbirds: AMI=0.762 (PASS), purity=0.892 (PASS).
      CelebA: AMI=0.258 (FAIL), purity=0.456 (FAIL, near-random 0.440).
      Same code, same model, same epoch — 3x AMI gap driven by spurious feature salience.
    figure_strategy:
      - "fig_1 (metrics_bar): lead with the quantitative gap — primary result"
      - "fig_2+fig_3 (tsne waterbirds): show success case — tight cluster-group alignment"
      - "fig_4 (tsne celeba): show failure case — diffuse, unstructured clusters"
      - "fig_5+fig_6 (cluster composition): mechanistic — how group membership distributes in each cluster"

  discussion:
    narrative_purpose: "Interpret conditionality, explain the mechanism, acknowledge limitations"
    honest_limitations:
      - "Single random seed (PoC mode) — Waterbirds gap is large (>0.14 above threshold) but single-seed"
      - "k=2 underspecification for CelebA's 4-group structure"
      - "Epoch 5 as non-universal critical period marker (different dataset sizes)"
      - "H-M1 through H-C1 blocked — gradient SNR mechanism itself untested"

  conclusion:
    narrative_purpose: "Callback to hook, elevate the finding, open future directions"
    callback_to_hook: >
      Return to the opening contrast: 'We began with a stark observation...' and frame
      the feature-strength conditionality as the explanation, positioning the salience
      pre-screen as the practical fix.
    memorable_ending: >
      End with the implication for the field: before applying annotation-free robustification,
      practitioners should ask whether their pretrained model already 'knows' the spurious attribute.

# ============================================================================
# NARRATIVE COHERENCE CHECKLIST
# ============================================================================

narrative_coherence_checklist:
  - check: "Does Introduction hook connect to Conclusion ending?"
    status: "YES — both anchor on the AMI gap and conditionality finding"

  - check: "Does each section naturally flow to the next?"
    status: "YES — Hook → Why detection matters → Who has worked on it → How we tested → What we found → What it means → Where next"

  - check: "Is key insight consistently emphasized throughout?"
    status: "YES — feature-strength conditionality appears in intro, methodology rationale, results interpretation, discussion"

  - check: "Are all major claims supported by evidence?"
    status: "YES — conditionality claim supported by AMI/purity gap + visualizations + random baseline"

  - check: "Would a busy reviewer find Abstract compelling?"
    status: "YES — concrete numbers (0.762 vs 0.258), clear finding (conditionality), clear implication (salience pre-screen)"
