main_hypothesis:
  id: H-GSB-v1
  title: 'Gradient SNR Balancing (GSB): Annotation-Free Early-Phase Intervention for Cross-Paradigm Shortcut Robustification'
  statement: 'Under spurious-correlation settings with pretrained backbone initialization (supervised ERM,

    SimCLR-style SSL, and contrastive learning on Waterbirds, CelebA, ColoredMNIST), if gradient

    signal-to-noise ratio (SNR) along annotation-free cluster-discovered feature directions is

    equalized during early training (epochs 1-10) via Gradient SNR Balancing (GSB), then worst-group

    accuracy improves >=5 percentage points over ERM baseline without average accuracy degradation,

    because early gradient SNR imbalance along spurious feature directions causally drives

    representational suppression of invariant features during the shortcut consolidation critical period.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: Waterbirds (primary), CelebA, ColoredMNIST
    model: ResNet-50 (ImageNet-pretrained, primary), ViT-B (secondary)
    optimizer: SGD (ERM standard), Adam (SSL)
    hyperparameters:
      seeds: '>=5 random seeds per condition'
      batch_size: standard per GroupDRO repo
      epochs: standard convergence per dataset
      early_window: epochs 1-10
