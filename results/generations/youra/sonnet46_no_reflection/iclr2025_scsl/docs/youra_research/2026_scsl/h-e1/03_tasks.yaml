  - id: A-4
    type: evaluation
    title: K-Means Clustering Probe with AMI and Purity Metrics
    priority: 75
    status: todo
    complexity: 11
    description: >
      Implement k-means (k=2) clustering on embeddings, compute AMI and worst-cluster
      purity vs ground-truth group labels, and verify mechanism activation.
    instructions: |
      Implement cluster.py:
      - run_kmeans_probe(embeddings, group_ids, k=2, n_init=10, seed=42) -> (ami, worst_purity, cluster_assignments)
        KMeans(n_clusters=k, n_init=n_init, random_state=seed).fit_predict(embeddings)
        ami = adjusted_mutual_info_score(group_ids, cluster_assignments)
        worst_purity = min(np.bincount(group_ids[cluster_assignments==c]).max() / (cluster_assignments==c).sum() for c in range(k))
      - compute_random_baseline(group_ids, k=2, seed=0) -> (ami_random, purity_random)
      - verify_mechanism_activated(embeddings, cluster_assignments, group_ids, k=2) -> (bool, dict)
        checks: shape==2048, both clusters>10 samples, ami_actual>ami_random+0.1
      - probe(embeddings_path, group_ids_path, k=2) -> dict (integration point for evaluate.py)
    success_criteria:
      - AMI >= 0.5 on Waterbirds (MUST_WORK gate)
      - AMI >= 0.5 on CelebA (MUST_WORK gate)
      - worst_cluster_purity >= 0.75 on both datasets (MUST_WORK gate)
      - verify_mechanism_activated returns (True, all_indicators_true)
    reference_files:
      - path: h-e1/03_logic.md
        section: "## A-4: K-Means Clustering Probe"
      - path: h-e1/02c_experiment_brief.md
        section: "### Mechanism Verification Protocol"
    estimated_tokens: 2000

