  - id: A-2
    type: model-training
    title: Model + ERM Training with Epoch-5 Checkpoint
    priority: 88
    status: todo
    complexity: 12
    description: >
      Implement ERMModel (ResNet-50 wrapper with feature extractor) and ERM training
      loop that saves checkpoint at epoch 5 and stops early.
    instructions: |
      Implement models/resnet.py:
      - ERMModel(num_classes=2, pretrained=True): backbone=resnet50, self.features=Sequential(*list(backbone.children())[:-1]), self.classifier=Linear(2048, num_classes)
      - forward(x): feat=self.features(x).squeeze(-1).squeeze(-1); return self.classifier(feat)
      - get_feature_extractor(): returns self.features (output: (B,2048,1,1))
      Implement train.py:
      - train_epoch(model, optimizer, dataloader, criterion, device) -> {"loss": float, "acc": float}
      - train(config_path, dataset_name, output_dir, stop_after_epoch=5) -> checkpoint_path
      - SGD(lr=1e-3, momentum=0.9, wd=1e-3 Waterbirds / 1e-4 CelebA)
      - Save checkpoint at epoch 5: torch.save({"epoch":e, "model":state_dict, "optimizer":opt_state}, path)
      - Early stop after stop_after_epoch epochs
    success_criteria:
      - ERMModel().get_feature_extractor()(rand_input).shape == (B,2048,1,1)
      - Checkpoint saved at epoch 5 (~200MB for ResNet-50)
      - Training loss decreases over 5 epochs
    reference_files:
      - path: h-e1/03_logic.md
        section: "## A-2: Model + ERM Training"
      - path: h-e1/03_config.md
        section: "### YAML Configs"
    estimated_tokens: 3000

  - id: A-3
