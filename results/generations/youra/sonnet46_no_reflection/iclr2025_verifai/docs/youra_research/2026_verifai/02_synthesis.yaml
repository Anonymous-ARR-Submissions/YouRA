hypothesis_draft:
  title: "Formal Feedback as Local Logical Oracle: Mechanistic Study of Step-Local vs. Episode-Level Signals in LLM Formal Reasoning"
  hypothesis_id: "H-FormalFeedbackOracle-v1"
  core_claim: |
    Semantically grounded step-local formal feedback signals (Lean4 compiler errors, Z3 SMT
    counterexamples via DSL bridge) function as "local logical oracles" that provide state-specific
    semantic information directing LLM policy toward formally valid continuations, producing
    significantly greater correctness recovery on hard benchmark instances (cold-start SFT baseline
    <20% pass rate) compared to episode-level or semantically ungrounded feedback under fixed search
    geometry and DPO training, because state-aligned contrastive supervision concentrates probability
    mass shifts on premise-consistent tactics (oracle function) rather than diffusely sharpening
    the policy (regularizer function).
  mechanism: |
    1. Formal verifier produces step-local semantically grounded rejection at proof state s
       (Lean4 compiler error with location + violated constraint, or Z3 counterexample via DSL)
    2. Step-local grounded rejection is encoded as DPO negative at the same proof state
       (s, a_w, a_l), creating state-aligned contrastive supervision
    3. DPO training with state-aligned grounded negatives shifts policy mass toward
       premise-consistent tactics (oracle function), not diffuse sharpening (regularizer)
    4. Under length-averse BFS (α=0), oracle guidance compensates for search depth bias,
       producing the largest hard-stratum recovery gains; advantage shrinks as α→1
  predictions:
    - P1: "Step-local grounded (A) produces ≥10pp greater hard-stratum pass@1 than episode-level ungrounded (D) under DPO, fixed search geometry, non-overlapping 95% CIs"
    - P2: "α-interaction: Δ(A−D) maximized at α=0.0, decreases monotonically to α=1.0, Cohen's d ≥ 0.3"
    - P3: "Locality prediction: post-DPO mass shift concentrates on premise-consistent tactics (locality score > permutation control, p<0.05)"

variables_summary:
  independent: "Feedback Signal Type (4 levels: A step-local grounded, B step-local ungrounded, C episode-level grounded, D episode-level ungrounded) × Length Normalization α (0.0/0.5/1.0) × DPO Training (on/off)"
  dependent_primary: "Hard-stratum pass@1 on miniF2F and Vericoding (cold-start SFT baseline <20%)"
  controlled: "Base LLM (Qwen2.5-Math-7B), BFS search infrastructure (expansion width, tactic budget, temperature), DPO hyperparameters (β=10, 1-epoch), hard subset definition (frozen cold-start SFT)"

null_hypothesis:
  h0_statement: |
    There is no significant difference in hard-stratum pass@1 between semantically grounded
    step-local feedback and episode-level or ungrounded feedback conditions under fixed search
    geometry and DPO training. All feedback conditions produce equivalent correctness recovery
    on hard instances (Δ < 2pp, 95% CIs overlapping).
  statistical_test: "Two-sided t-test on hard-stratum pass@1 across 3 random seeds; interaction effect via 2×3 ANOVA (Feedback Granularity × α)"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First controlled study of oracle vs. regularizer mechanism for formal feedback in LLM policy training; first to operationalize 'repair information density' as KL-shift with locality constraint; unifies PropertyGPT, Proof of Thought, and BFS-Prover under a single mechanistic claim"
  differentiation_summary: |
    Prior work (BFS-Prover, PropertyGPT, Proof of Thought) each used a single feedback type and
    never compared alternatives. This is the first paper to: (1) explicitly test whether formal
    feedback is causal or incidental in DPO training, (2) distinguish the oracle vs. regularizer
    mechanisms, (3) test the α-interaction as a discriminating prediction, (4) operationalize
    repair information density with a formal KL-based metric. Cross-formalism testing
    (Lean/Verus/Dafny) extends scope beyond any single prior paper.

