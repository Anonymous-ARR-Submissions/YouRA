measurement_plan:
  data_collection:
    - source: "BFS-Prover LeanDojo gym: tactic-state pairs from BFS rollouts on miniF2F training set"
    - source: "Vericoding benchmark specs (Lean/Verus/Dafny): same BFS infrastructure adapted per formalism"
    - source: "Hard subset definition: cold-start SFT-only pass rate per problem (frozen before expert iteration)"
    - source: "Formalization fidelity audit: 200-step random sample per benchmark, two annotators"
  procedure:
    - step: "1. Run cold-start SFT on Qwen2.5-Math-7B (replicate BFS-Prover initialization)"
    - step: "2. Define frozen hard subset: problems with SFT-only pass@1 < 20% on miniF2F and Vericoding"
    - step: "3. Run Experiment A (frozen policy): inference-time repair loop with 4 feedback conditions, fixed BFS"
    - step: "4. Run Experiment B (DPO): construct DPO pairs for each of 4 conditions, train 1 epoch, evaluate"
    - step: "5. Sweep α ∈ {0.0, 0.5, 1.0} for all DPO conditions; report hard-stratum pass@1 per α"
    - step: "6. Compute RID (KL shift) and locality score for condition A vs. permutation control"
    - step: "7. Run formalization fidelity audit (200-step sample, two annotators, κ)"
    - step: "8. Stratify all results by formalization fidelity quartile"
  success_criteria:
    - "P1: Δ(A−D) ≥ 10pp, non-overlapping 95% CIs across 3 seeds, DPO-on"
    - "P2: Monotonic α-interaction, Cohen's d ≥ 0.3"
    - "P3: Locality score condition A > permutation control, p < 0.05"
    - "Formalization fidelity ≥ 85% on both benchmarks (otherwise restrict scope)"

validation:
  internal_validity:
    - "Fixed search geometry (α, width, budget) across all feedback conditions prevents search confounds"
    - "State-aligned DPO pair construction via LeanDojo ensures consistent negative sampling protocol"
    - "Frozen hard subset definition prevents circularity with expert iteration filtering"
    - "Pre-registered failure thresholds (<2pp, d<0.3) prevent post-hoc reinterpretation"
  external_validity:
    - "Cross-benchmark: miniF2F (theorem proving) + Vericoding (code verification) tests domain generalization"
    - "Cross-formalism: Lean/Verus/Dafny in Vericoding tests formalism-agnostic vs. formalism-specific effects"
    - "Experiment A (frozen policy) + Experiment B (DPO) tests inference-time vs. training-time generalization"

discussion_synthesis:
  key_insights:
    - "The oracle/regularizer dichotomy is the key mechanistic question that prior work has implicitly answered but never explicitly tested"
    - "BFS-Prover's open-source codebase provides a ready-made scaffold — this is a variation study, not a new system build"
    - "PropertyGPT and Proof of Thought provide natural inference-time controls that already exist in the literature"
    - "The α-interaction prediction is the most discriminating test: only the oracle mechanism predicts α-dependent advantage"
    - "Formalization fidelity as a moderating variable converts a potential confound into a feature of the analysis"
  breakthrough_moments:
    - "Exchange 9 (Dr. Nova): identifying the 2×2 granularity × semantic groundedness design within BFS-Prover's existing DPO framework"
    - "Exchange 11 (Dr. Sage): recognizing PropertyGPT as a natural frozen-policy control, resolving the training vs. inference disentanglement concern"
    - "Exchange 15 (Dr. Nova): articulating the oracle/regularizer dichotomy as the unifying mechanistic claim that the α-interaction and locality predictions together discriminate"
  resolved_tensions:
    - "Tension: 'repair information density' was vague → resolved by KL-shift operationalization with locality constraint and permutation control"
    - "Tension: DPO pair construction for episode-level conditions → resolved by same-state failed-branch tactic protocol"
    - "Tension: hard stratum circularity with expert iteration → resolved by frozen cold-start SFT baseline definition"
    - "Tension: training vs. inference mechanism → resolved by two-experiment design (Experiment A frozen + Experiment B DPO)"
