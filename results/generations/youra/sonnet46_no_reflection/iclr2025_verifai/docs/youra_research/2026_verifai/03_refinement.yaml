    - claim: "Semantically grounded step-local feedback produces greater correctness recovery on hard instances than episode-level feedback"
      status: "PROVE_NEW"
      evidence: "Inferred from mechanism analysis; the oracle/regularizer distinction is the novel testable claim"
    - claim: "Feedback signal advantage scales with formalization fidelity and is moderated by search geometry (α)"
