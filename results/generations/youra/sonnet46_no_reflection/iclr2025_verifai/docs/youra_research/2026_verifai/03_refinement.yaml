key_assumptions:
  - id: "A1"
    assumption: "Formalization fidelity is ≥85%: the step-level T_i ⊢ Q_i extractions faithfully represent the natural-language reasoning intent for both miniF2F and Vericoding"
    supporting_evidence: "MATH-VF achieves >90% SimpleMath formalization coverage; LeanDojo returns structured compiler states for Lean4 proofs [Xin et al. 2025]"
    consequence_if_violated: "The 'semantic grounding' manipulation is confounded with formalization artifacts; effect may be spurious — restrict claims to high-fidelity quartile"
  - id: "A2"
    assumption: "State-aligned pair construction for episode-level condition preserves the state alignment invariant: a_l for conditions C and D are drawn from the same proof state s as a_w"
    supporting_evidence: "LeanDojo gym interface returns all tactic candidates at each state; failed-branch tactics are available at any proof state in the BFS tree"
    consequence_if_violated: "Episode-level conditions test 'misaligned negatives' rather than 'episode-level grounding'; 2×2 design is confounded"
  - id: "A3"
    assumption: "The hard subset (cold-start SFT baseline <20%) is well-populated: sufficient hard problems exist in both miniF2F and Vericoding for statistical power"
    supporting_evidence: "Vericoding has 12,504 specs with 27%(Lean)/44%(Verus)/82%(Dafny) overall success — the hard tail (below 20%) is large; miniF2F at ~27% overall baseline has many hard problems"
    consequence_if_violated: "Insufficient statistical power; widen threshold to <30% or pool across benchmarks"
  - id: "A4"
    assumption: "The tactic taxonomy for locality scoring is pre-specified and derivable from LeanDojo's existing tactic error categories before running experiments"
    supporting_evidence: "LeanDojo provides structured error categories (type errors, undefined names, tactic failures); these form a natural taxonomy"
    consequence_if_violated: "Post-hoc taxonomy construction introduces circularity; fall back to coarser binary locality measure (mass on correct tactic class vs. all others)"
  - id: "A5"
    assumption: "BFS-Prover's length normalization parameter α acts as a proxy for search depth bias, and the α-interaction prediction follows: oracle advantage is largest at α=0"
    supporting_evidence: "BFS-Prover ablations show α sensitivity; α=0 produces shortest-path bias; step-local guidance should compensate most where bias is strongest [Xin et al. 2025]"
    consequence_if_violated: "If α-interaction is absent, the oracle/regularizer distinction may still hold via the locality prediction alone; report null interaction as a boundary condition finding"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    LLM-based formal reasoning systems using tactic-level interaction with interactive theorem provers
    (Lean4, Isabelle) or SMT-solver-integrated verification loops; specifically: systems where the
    formal verifier returns step-local error messages tied to specific proof states. Applicable to
    both training-time (DPO/RL) and inference-time (iterative repair) feedback integration.
    Primary benchmarks: miniF2F (theorem proving), Vericoding (formally verified code generation
    with Lean/Verus/Dafny). Hard-instance regime: cold-start SFT baseline <20% pass rate.
  does_not_apply_to: |
    - Informal code generation benchmarks (HumanEval, MBPP) without formal specifications
    - Settings where formalization fidelity is <85% (e.g., Coq with <10% formalization coverage)
    - Episode-level-only verification systems where per-step feedback is unavailable
    - Human evaluation or subjective scoring scenarios
    - Benchmarks requiring new benchmark creation or synthetic data
  known_limitations: |
    - Results on miniF2F may not transfer directly to Vericoding due to different formalism levels
    - Qwen2.5-Math-7B as base model; results may differ for larger models (70B+) or code-specialized models
    - LeanDojo-specific tactic interface; generalization to other proof assistants requires separate validation
    - Formalization fidelity boundary (85%) is empirically chosen; exact threshold affects scope claims

