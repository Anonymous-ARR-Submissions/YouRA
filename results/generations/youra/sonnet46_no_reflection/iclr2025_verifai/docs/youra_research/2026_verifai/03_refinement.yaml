variables:
  independent:
    - name: "Feedback Signal Type"
      type: "categorical"
      operationalization: "Swap rejection source in DPO pairs within BFS-Prover framework"
      levels:
        - "A: Step-local grounded (Lean4 compiler errors via LeanDojo)"
        - "B: Step-local ungrounded (same-state failed-branch tactics, no compiler error)"
        - "C: Episode-level grounded (Z3 SMT failure on final goal, state-aligned via sampling)"
        - "D: Episode-level ungrounded (binary proof failure signal)"
    - name: "Length Normalization α"
      type: "categorical"
      operationalization: "BFS-Prover score(s_L) = Σlog p(a_t|s_t) / L^α"
      levels: ["0.0", "0.5", "1.0"]
    - name: "DPO Training"
      type: "categorical"
      operationalization: "DPO on/off for Experiment A (frozen policy) vs. Experiment B (DPO training)"
      levels: ["on", "off"]
  dependent:
    - name: "Hard-stratum pass@1"
      type: "continuous"
      operationalization: "pass@1 on frozen hard subset (cold-start SFT baseline <20% pass rate) on miniF2F and Vericoding"
      primary: true
    - name: "Repair Information Density (RID)"
      type: "continuous"
      operationalization: "KL(p_{θ+}(·|s) ‖ p_θ(·|s)) — KL divergence of action distribution before vs. after DPO update at each failed state s"
      primary: false
    - name: "Locality Score"
      type: "continuous"
      operationalization: "Fraction of post-DPO probability mass increase concentrated on tactics consistent with violated premises, measured over LeanDojo tactic taxonomy"
      primary: false
    - name: "Formalization Fidelity"
      type: "continuous"
      operationalization: "Fraction of 200-sample steps where extracted T_i ⊢ Q_i matches natural-language intent (two annotators, Cohen's κ ≥ 0.7)"
      primary: false
  controlled:
    - name: "Base LLM"
      operationalization: "Fixed at Qwen2.5-Math-7B with cold-start SFT initialization from BFS-Prover"
    - name: "Search infrastructure"
      operationalization: "Identical BFS expansion width (2/4/8 swept uniformly), tactic budget (2048×2×600), temperature (1.0-1.1), Ray distributed setup"
    - name: "DPO hyperparameters"
      operationalization: "β=10, 1-epoch training, lr decay 5e-6→5e-7, batch size 16"
    - name: "Hard subset definition"
      operationalization: "Frozen: defined by cold-start SFT-only model before any expert iteration"
    - name: "Benchmark"
      operationalization: "miniF2F hard subset + Vericoding hard subset (Lean/Verus/Dafny); no new benchmark construction"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Formal verifier produces step-local semantically grounded rejection: at proof state s, tactic a_l causes Lean4 compiler error or Z3 counterexample with specific location, violated constraint, and premise information"
      evidence: "BFS-Prover: LeanDojo returns compiler error messages at specific tactic-state pairs [Xin et al. 2025]; Proof of Thought: Z3 via JSON DSL returns typed counterexamples [Ganguly et al. 2024]"
      falsifier: "If verifier returns only binary pass/fail without localization, step 1 collapses to episode-level signal"
    - step: 2
      description: "Step-local grounded rejection is encoded as DPO negative at the same proof state (s, a_w, a_l), creating state-aligned contrastive supervision that associates the violated formal constraint with the specific policy decision that caused it"
      evidence: "BFS-Prover DPO construction uses compiler-error tactics as a_l at identical proof state s [Xin et al. 2025]; PropertyGPT repair loop uses PSL compiler errors to update LLM prompt at same property generation step [Liu et al. 2024]"
      falsifier: "If DPO pairs use different proof states for a_w and a_l, state alignment breaks and step 2 becomes equivalent to episode-level signal"
    - step: 3
      description: "DPO training with state-aligned grounded negatives shifts policy probability mass specifically toward tactics consistent with the violated premises at each failed state (oracle function), rather than diffusely sharpening the policy (regularizer function)"
      evidence: "Theoretical: state-aligned contrastive supervision provides tighter gradient signal than episode-level failure; empirically predicted by locality score > diffuse KL shift"
      falsifier: "If post-DPO probability mass spreads diffusely (locality score near chance) despite high KL, step 3 fails — mechanism is regularizer, not oracle"
    - step: 4
      description: "Under length-averse BFS (α=0), the policy's improved local guidance compensates for search bias against deep proofs, producing the largest hard-stratum recovery gains; as α→1 (length-neutral), the search bias reduction from length normalization reduces the oracle's marginal advantage"
      evidence: "Predicted from BFS-Prover's α sensitivity analysis: α=0 biases against depth; local oracles are most needed when search is most depth-averse [Xin et al. 2025]"
      falsifier: "If hard-stratum gain is invariant across α, the α-interaction prediction fails — oracle mechanism not compensating for search bias"
  key_tension: "Whether the performance advantage of step-local grounded feedback survives when DPO is removed (Experiment A frozen policy) — if it does, the oracle function operates at inference time; if not, the mechanism requires training-time preference shaping"
  evidence_summary: |
    Three independent systems provide convergent evidence for the oracle mechanism direction:
    PropertyGPT inference-time repair (87% vs 63%, no training), Proof of Thought Z3 loop
    (0% vs 14.6% compilation errors, no training), and BFS-Prover DPO training (72.95% miniF2F).
    The oracle/regularizer distinction explains WHY these systems work, unifying them under
    a single testable mechanistic claim.

