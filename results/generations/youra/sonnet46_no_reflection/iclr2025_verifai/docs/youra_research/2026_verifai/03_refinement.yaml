# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-FormalFeedbackOracle-v1"
  confidence_level: 0.78
  core_hypothesis_statement: |
    Under fixed search geometry (BFS with length normalization α, fixed expansion width and tactic budget)
    and high formalization fidelity (≥85% audit threshold), if LLM policy training uses semantically
    grounded step-local formal feedback signals (Lean4 compiler errors or Z3 SMT counterexamples via
    DSL bridge) as DPO negative examples, then correctness recovery on hard benchmark instances
    (cold-start SFT baseline pass rate <20%) will be significantly greater (≥10pp, non-overlapping 95% CIs)
    compared to episode-level or semantically ungrounded feedback, because step-local grounded signals
    function as "local logical oracles" — providing state-specific semantic information that directs the
    policy toward formally valid continuations — rather than as "policy regularizers" that sharpen any
    policy regardless of semantic content.
  alternative_hypothesis_h0: |
    There is no significant difference in hard-stratum pass@1 between semantically grounded step-local
    feedback and episode-level or ungrounded feedback conditions under fixed search geometry and DPO
    training (i.e., all feedback conditions produce equivalent correctness recovery on hard instances).

