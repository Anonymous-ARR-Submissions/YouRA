# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "Semantically grounded step-local feedback (condition A: Lean4 compiler errors) produces ≥10 percentage point greater hard-stratum pass@1 than episode-level ungrounded feedback (condition D: binary pass/fail) under DPO training with fixed search geometry"
    test_method: "2×2×3 factorial experiment within BFS-Prover framework: conditions A vs D × DPO on/off × α ∈ {0, 0.5, 1.0}, Qwen2.5-Math-7B base model, miniF2F and Vericoding hard subsets (cold-start SFT <20%)"
    success_criterion: "Δ(pass@1_A − pass@1_D) ≥ 10pp with non-overlapping 95% CIs across 3 random seeds, in DPO-on conditions"
    falsification: "If Δ < 2pp or 95% CIs overlap across all α settings under DPO-on, the core hypothesis is rejected"
  - id: "P2"
    primary: false
    statement: "The hard-stratum advantage of step-local grounded (A) over episode-level (C/D) feedback is maximized at α=0.0 and decreases monotonically as α→1.0 (α-interaction prediction)"
    test_method: "Within the 2×2×3 factorial: report Δ(A−D) at each α ∈ {0.0, 0.5, 1.0}; compute Cohen's d for the interaction effect"
    success_criterion: "Δ(A−D)|α=0 > Δ(A−D)|α=0.5 > Δ(A−D)|α=1.0, Cohen's d ≥ 0.3 for the interaction"
    falsification: "If interaction effect Cohen's d < 0.3 or non-monotonic across α, the oracle-compensates-search-bias mechanism is not supported"
  - id: "P3"
    primary: false
    statement: "After DPO training with step-local grounded negatives (condition A), post-update probability mass at each failed state concentrates specifically on tactics consistent with violated premises (locality prediction), rather than diffusing across all tactics"
    test_method: "Measure locality score: fraction of post-DPO probability mass increase on tactics in the 'correct' category of LeanDojo tactic taxonomy at each failed state; compare to permutation control (shuffled error messages)"
    success_criterion: "Locality score for condition A > locality score for permutation control (p < 0.05); mass shift on correct tactic category > diffuse mass shift"
    falsification: "If locality score A ≈ permutation control, semantic content of feedback is not the active ingredient — mechanism is regularizer, not oracle"

