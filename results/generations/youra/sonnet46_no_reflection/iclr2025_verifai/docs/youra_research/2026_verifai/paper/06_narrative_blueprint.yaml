# Narrative Blueprint — Phase 6 Step 02
# Paper: Formal Feedback as Local Logical Oracle
# Anonymous Pipeline | Generated: 2026-05-20

title: "Formal Feedback as Local Logical Oracle: A Mechanistic Study of Step-Local vs. Episode-Level Signals in LLM Theorem Proving"

# ============================================================
# HOOK DESIGN
# ============================================================

hook:
  strategy: "counterintuitive_finding"
  opening_statement:
    content: |
      Three independent LLM formal reasoning systems — BFS-Prover, PropertyGPT, and Proof of Thought —
      all report substantial improvements when formal verifiers provide structured error feedback.
      Yet none of them can tell you *why* it works.
    rationale: "Opens with established fact, immediately pivots to the gap — creates intellectual tension"

  why_reader_should_care:
    main_reason: "Without understanding the mechanism, we cannot predict when formal feedback will fail, how to design better feedback signals, or whether the improvements will transfer across settings."
    concrete_example: "BFS-Prover achieves 72.95% on miniF2F with Lean4 compiler feedback — but if this is just DPO regularization, any negative examples would do equally well."
    stakes: "The entire neurosymbolic LLM field is building on a mechanism it has never empirically validated."

# ============================================================
# PROBLEM FRAMING (Three Levels)
# ============================================================

problem_framing:
  surface_problem:
    description: "LLMs struggle with formal reasoning tasks — theorem proving, formally verified code generation — and need structured feedback signals to improve."
    common_understanding: "Formal verification feedback loops help LLMs via error-guided repair or DPO training. BFS-Prover (72.95% miniF2F), PropertyGPT (80% recall), and Proof of Thought (81.55% win rate) demonstrate this."

  deeper_problem:
    description: "The field has two competing mechanistic explanations for why formal feedback helps, and has never tested them against each other."
    why_overlooked: "Each prior paper uses exactly one feedback type and claims its chosen type works — but no paper isolates the *causal* contribution of semantic content vs. structural regularization."
    our_perspective: |
      Formal feedback might work as a 'local logical oracle' — providing state-specific semantic information
      that directs probability mass toward premise-consistent tactics — or as a 'policy regularizer' that
      sharpens the policy regardless of the semantic content of the negative example. These two mechanisms
      have radically different implications for feedback design.

  gap_in_existing_work:
    description: "No controlled comparison of formal feedback signal types exists on the same LLM, benchmark, and experimental infrastructure."
    why_gap_exists: "Each paper in the area uses its own model, benchmark, and feedback mechanism — making cross-system comparison impossible and the oracle/regularizer distinction untestable."
    why_gap_matters: "Without isolating the mechanism, we cannot design better feedback systems, predict failure modes, or understand when formal feedback will generalize."

# ============================================================
# KEY INSIGHT
# ============================================================

key_insight:
  type: "connection_based"
  aha_moment:
    one_sentence: |
      The distinction between a 'local logical oracle' and a 'policy regularizer' is not just philosophical —
      it is measurable via a novel metric (locality score) and uniquely discriminated by the BFS search
      geometry parameter α.
    expanded_explanation: |
      A local logical oracle concentrates post-DPO probability mass on tactics that address the specific
      violated constraint — measurable via the locality score (fraction of mass shift on premise-consistent
      tactic categories). A regularizer spreads mass diffusely. These produce different locality scores and,
      critically, different α-interaction patterns: oracle advantage should be maximized under length-averse
      BFS (α=0) where local guidance compensates for search depth bias.

  why_others_missed_it:
    common_assumptions: "Prior work assumed that if formal feedback improves performance, the mechanism is self-evident — 'structured error feedback gives useful signal'."
    our_different_view: "We recognize that 'useful signal' could mean either directed semantic guidance (oracle) or general contrastive sharpening (regularizer), and these are experimentally separable."
    enabling_factor: "The BFS-Prover framework's α parameter provides a natural mechanistic probe — no competing explanation predicts α-dependent advantage."

  what_makes_it_work:
    intuitive_explanation: "If formal feedback is an oracle, it should tell the model specifically what went wrong and how to fix it — producing focused probability mass shifts, not diffuse ones."
    key_mechanism: "State-aligned DPO pairs using Lean4 compiler errors as negatives should concentrate post-training probability mass on premise-consistent tactic categories, measurable as locality score LS_A > LS_P (permutation control)."

# ============================================================
# EVIDENCE NARRATIVE
# ============================================================

evidence_narrative:
  main_claim:
    statement: "The oracle/regularizer distinction for formal feedback in LLM DPO training is empirically testable via locality score, and the experimental infrastructure required to test it revealed a critical methodological gap in the field."
    measurable_criteria:
      - "Locality score metric definition and validation"
      - "3-condition DPO design (A: grounded, B: ungrounded, P: permuted control)"
      - "Infrastructure failure diagnosis: LeanDojo absent → synthetic fallback → uninformative results"
      - "DPO training loop correctness validation (β=10, state alignment 100%)"

  supporting_evidence:
    - id: "evidence_1"
      what: "DPO training infrastructure correctly implemented: β=10, lr 5e-6→5e-7, 1-epoch, average_log_prob=False, 100% state alignment rate."
      so_what: "The experimental design is sound. The null locality scores are not from implementation error."
      how_it_supports_claim: "Establishes that any future run with real LeanDojo data will produce a valid test of the oracle hypothesis."

    - id: "evidence_2"
      what: "Silent synthetic data fallback: _generate_synthetic_triples() in leandojo_tracing.py substituted hardcoded error strings for real Lean4 compiler outputs."
      so_what: "The LS=0.0 result is a synthetic artifact, not a finding about the oracle mechanism."
      how_it_supports_claim: "Reveals a class of infrastructure failure that can invalidate entire experimental pipelines without visible error messages."

    - id: "evidence_3"
      what: "Convergent evidence from 3 independent systems (BFS-Prover 72.95%, PropertyGPT 87% vs 63%, Proof of Thought 0% vs 14.6% errors) in the oracle direction."
      so_what: "Prior literature is consistent with the oracle hypothesis, though none provides controlled mechanistic evidence."
      how_it_supports_claim: "Motivates the oracle framing and establishes why the controlled test matters."

    - id: "evidence_4"
      what: "Mock detection system successfully identified the synthetic substitution post-run via external LLM verification of leandojo_tracing.py lines 50-51, 62-64, 114-137."
      so_what: "Automated validity checking of experimental outputs is feasible and should be standard practice."
      how_it_supports_claim: "Supports the methodological contribution: pre-run environment validation gates."

  surprising_findings:
    finding: "A GPU cluster environment can appear to run an LLM formal reasoning experiment correctly — producing training loss curves, locality scores, and formatted results — while never invoking the formal verifier at all."
    why_surprising: "The synthetic fallback produced numerically consistent (if uniformly zero) outputs that passed all format checks. The failure was invisible until post-hoc code review."
    our_interpretation: "This is not a unique failure of this pipeline — it represents a systemic risk in any LLM+formal-verifier experiment where the verifier is an external tool with complex installation dependencies."

# ============================================================
# BROADER IMPACT
# ============================================================

takeaway:
  main_contribution:
    one_sentence: "We introduce the oracle/regularizer distinction for formal feedback in LLM DPO training, propose the locality score metric to test it, design a 3-condition 2×2 factorial experiment, and reveal a critical class of infrastructure failure that can silently invalidate LLM+formal-verifier experiments."
    why_significant: "The oracle hypothesis unifies three disparate prior systems under a single testable causal mechanism, while the infrastructure finding warns the field of a validation gap."

  implications:
    for_field: "LLM formal reasoning research should adopt pre-run environment validation gates before any experiment that relies on external tool dependencies (LeanDojo, Z3, Isabelle). The locality score metric provides a new mechanistic probe beyond pass@1."
    for_practice: "Systems integrating LLMs with formal verifiers should validate verifier invocation with real outputs before relying on training results."

  future_possibilities:
    immediate_extensions:
      - "Fix LeanDojo installation and re-run H-E1 with real proof state triples"
      - "Test oracle effect at inference time (frozen policy) to disentangle training-time DPO from inference-time repair"
    longer_term_vision: "A unified oracle/regularizer theory of formal feedback could guide design of next-generation neurosymbolic LLM systems across theorem proving, program verification, and formal code generation."

# ============================================================
# SECTION GOALS
# ============================================================

section_goals:
  abstract:
    narrative_purpose: "Compress full story — oracle/regularizer question, experimental design, infrastructure finding, methodological contribution. Prioritize story over metrics."
    key_message: "We designed the first controlled test of the oracle/regularizer mechanism for formal feedback in LLM DPO training, and the attempt revealed a critical class of infrastructure failure that the field needs to address."

  introduction:
    narrative_purpose: "Hook → Problem (oracle/regularizer gap) → Insight (locality score + α-probe) → Contributions"
    hook_strategy: "counterintuitive_finding: Three systems show formal feedback works, but none can explain why"
    transition_to_related: "This mechanistic gap motivates examining prior work not just for performance numbers but for what each system actually tests."

  related_work:
    narrative_purpose: "Show existing work insufficient to answer the oracle/regularizer question → justify our 3-condition design"
    positioning_strategy: "Organize by feedback type (compiler error, SMT, static analysis) and show each operates in isolation; then show no prior work tests the mechanism"
    key_comparison_points:
      - "BFS-Prover: uses Lean4 compiler feedback but never ablates against ungrounded alternatives"
      - "PropertyGPT: uses static analysis at inference time — no training-time mechanism test"
      - "Proof of Thought: uses Z3 episode-level — no step-local comparison"
      - "STP: self-play feedback — confirms training signal value but not semantic content role"

  methodology:
    narrative_purpose: "WHY this design (3 conditions + locality score + α parameter) isolates the oracle/regularizer distinction"
    connection_to_insight: "The 2×2 factorial (granularity × semantic groundedness) is the minimal design that can isolate the oracle mechanism; the locality score is the mechanistic probe; α is the discriminating experimental variable."
    key_design_decisions:
      - "3 DPO conditions: A (grounded), B (ungrounded), P (permuted) — isolates semantic content contribution"
      - "Locality score: fraction of post-DPO mass shift on premise-consistent tactic categories — measures oracle function"
      - "State alignment (100%): ensures conditions differ only in a_l content, not state distribution"
      - "Pre-specified tactic taxonomy from LeanDojo categories — prevents post-hoc circularity"

  experiments:
    narrative_purpose: "Design tests that verify oracle existence (locality), mechanism (mass shift), and performance (pass@1 recovery)"
    experimental_questions:
      - "RQ1: Does step-local grounded feedback (condition A) produce higher locality scores than permuted control (condition P)? [H-E1]"
      - "RQ2: Does the DPO pair construction achieve 100% state alignment? [H-M1]"
      - "RQ3: Does the oracle advantage on hard-stratum pass@1 vary with search geometry α? [H-M4]"

  results:
    narrative_purpose: "Report the infrastructure failure as the main finding, with DPO implementation validation as the secondary positive result"
    main_result_highlight: "LS_A = LS_B = LS_P = 0.0 on both benchmarks — a synthetic artifact, not a scientific finding. The gate FAIL is an infrastructure failure, not a falsification."

  discussion:
    narrative_purpose: "Interpret the infrastructure finding as a methodological contribution; acknowledge limitations; connect to broader practice"
    honest_limitations:
      - "H-E1 oracle hypothesis remains empirically untested — no conclusion about oracle vs. regularizer can be drawn"
      - "Results depend on a single pipeline run without LeanDojo; a valid run may produce very different locality scores"
      - "The locality score metric has not been validated on real Lean4 compiler outputs"

  conclusion:
    narrative_purpose: "Return to the opening question (why does formal feedback work?) and reframe: we now know the question is harder to answer than the field assumed, and we have the tools to answer it"
    callback_to_hook: "We opened by noting that three systems know formal feedback works but not why. We can now add: testing 'why' requires infrastructure that the field has not yet systematically validated."

