main_hypothesis:
  id: H-FormalFeedbackOracle-v1
  title: Formal Feedback as Local Logical Oracle
  statement: 'Under fixed search geometry (BFS with length normalization alpha, fixed expansion width

    and tactic budget) and high formalization fidelity (>=85% audit threshold), if LLM policy

    training uses semantically grounded step-local formal feedback signals (Lean4 compiler

    errors or Z3 SMT counterexamples via DSL bridge) as DPO negative examples, then

    correctness recovery on hard benchmark instances (cold-start SFT baseline pass rate <20%)

    will be significantly greater (>=10pp, non-overlapping 95% CIs) compared to episode-level

    or semantically ungrounded feedback, because step-local grounded signals function as

    "local logical oracles" rather than "policy regularizers".

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: miniF2F hard subset + Vericoding hard subset (cold-start SFT <20%)
    model: Qwen2.5-Math-7B (cold-start SFT from BFS-Prover)
    optimizer: DPO (beta=10, 1-epoch, lr decay 5e-6 to 5e-7, batch 16)
    hyperparameters:
      alpha_levels:
      - 0.0
      - 0.5
      - 1.0
      expansion_width: 2/4/8 swept uniformly
      tactic_budget: 2048x2x600
      temperature: 1.0-1.1
      seeds: 3
