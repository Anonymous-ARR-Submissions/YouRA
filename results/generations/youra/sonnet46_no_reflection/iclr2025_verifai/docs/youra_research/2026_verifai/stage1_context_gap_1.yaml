gap_id: "gap_1"
gap_title: "No Systematic Comparative Study of Formal Feedback Signal Effectiveness"
gap_description: |
  Existing work uses formal feedback in isolation: PropertyGPT uses static analysis feedback;
  BFS-Prover/STP use proof checker (Lean compiler) feedback; Proof of Thought uses Z3 SMT feedback;
  esbmc-ai uses bounded model checker feedback. Each paper claims effectiveness for its chosen
  feedback type but within a single domain and without cross-signal comparison.
  Missing: a unified empirical study that applies multiple feedback signal types to the same LLM
  on the same task, measuring correctness improvement per feedback type, identifying which feedback
  granularity best guides LLM repair, and testing whether feedback effectiveness transfers across domains.

