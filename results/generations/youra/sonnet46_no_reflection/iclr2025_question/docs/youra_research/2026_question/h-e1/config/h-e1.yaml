hypothesis_id: "h-e1"
hypothesis_type: "EXISTENCE"

sampling:
  n_samples: 10
  temperature: 1.0
  top_p: 0.9
  seed: 42
  max_new_tokens: 50
  n_few_shot: 5

models:
  small:
    hf_id: "meta-llama/Meta-Llama-3-8B"
    dtype: "bfloat16"
    device_map: "auto"
  large:
    hf_id: "meta-llama/Meta-Llama-3-70B"
    dtype: "bfloat16"
    quantization: "8bit"
    device_map: "auto"
  entailment:
    hf_id: "microsoft/deberta-large-mnli"

datasets:
  primary:
    - name: "trivia_qa"
      hf_id: "mandarjoshi/trivia_qa"
      config: "rc.nocontext"
      split: "test"
      size: 17944
    - name: "natural_questions"
      hf_id: "google-research-datasets/natural_questions"
      config: "default"
      split: "validation"
      size: 3610
  secondary:
    - name: "truthful_qa"
      hf_id: "truthful_qa"
      config: "mc1_targets"
      split: "validation"
      size: 817

evaluation:
  bootstrap_resamples: 1000
  alpha: 0.05
  batch_size_8b: 16
  batch_size_70b: 4
  checkpoint_every: 500

output:
  base_dir: "h-e1"
  figures_dir: "h-e1/figures"
  results_dir: "h-e1/results"
  code_dir: "h-e1/code"
