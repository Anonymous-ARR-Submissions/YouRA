# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-EGSH-v1"
  confidence_level: 0.78
  core_hypothesis_statement: |
    Under the Llama-3 model family evaluated on standard factual QA benchmarks (TriviaQA, NaturalQuestions),
    if model scale increases from 8B to 70B base checkpoints while holding dataset splits, evaluation
    harness, and benchmark conditions fixed, then semantic-structural UQ methods (SE, KLE) will show a
    significantly larger AUROC advantage over token-probability than at smaller scale, AND correctness-
    predictive information will shift to deeper transformer layers — because larger model capacity enables
    richer semantic equivalence class representations that surface-level token distributions cannot capture.
  alternative_hypothesis_h0: |
    There is no significant difference in the relative AUROC advantage of semantic-structural UQ methods
    (SE, KLE) over token-probability between Llama-3-8B and Llama-3-70B base checkpoints on TriviaQA
    and NaturalQuestions; all methods scale proportionally (no method × scale interaction).

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Model scale"
      type: "categorical"
      operationalization: "Llama-3 base checkpoint size"
      levels: ["Llama-3-8B-Base", "Llama-3-70B-Base"]
    - name: "UQ method paradigm"
      type: "categorical"
      operationalization: "Uncertainty estimation approach applied identically to model outputs"
      levels:
        - "token-probability (log-prob, max softmax)"
        - "sampling consistency (SelfCheckGPT-BERTScore, SelfCheckGPT-NLI)"
        - "semantic entropy (SE)"
        - "kernel language entropy (KLE)"
        - "semantic entropy probes (SEPs, linear)"
        - "nonlinear probe (2-layer MLP, 1024 hidden)"
    - name: "Alignment type (within-scale control)"
      type: "categorical"
      operationalization: "Base vs instruction-tuned at 70B scale"
      levels: ["Llama-3-70B-Base", "Llama-3-70B-Instruct"]
  dependent:
    - name: "AUROC for correctness prediction"
      type: "continuous"
      operationalization: "Area under ROC curve predicting binary correctness label from UQ score; range [0,1]"
      primary: true
    - name: "Method x scale AUROC interaction (Δ)"
      type: "continuous"
      operationalization: "Δ = (AUROC_SE^70B - AUROC_TP^70B) - (AUROC_SE^8B - AUROC_TP^8B); pre-registered δ = 0.02"
      primary: true
    - name: "Cumulative-MI 50th-percentile depth (d_50)"
      type: "continuous"
      operationalization: "Layer index l at which cumulative MI(h_l; y) reaches 50% of total MI, normalized by L"
      primary: false
    - name: "Permutation-corrected layer-wise probe gap G_corrected(l)"
      type: "continuous"
      operationalization: "G_corrected(l) = G_true(l) - G_perm(l) per transformer layer; derived from 2-layer MLP probes"
      primary: false
    - name: "ECE (Expected Calibration Error)"
      type: "continuous"
      operationalization: "Calibration quality of UQ scores; 15-bin calibration curve"
      primary: false
  controlled:
    - name: "Dataset splits"
      operationalization: "Identical standard train/val/test splits for TriviaQA, NQ, TruthfulQA across all methods"
    - name: "Evaluation harness"
      operationalization: "Single unified harness (UQLM or lm-evaluation-harness) with identical answer normalization"
    - name: "Sampling parameters"
      operationalization: "N=10 samples per query for sampling-based methods (temperature=1.0, top-p=0.9)"
    - name: "Probe architecture"
      operationalization: "2-layer MLP, 1024 hidden units, ReLU, identical hyperparameters across scales, 5-fold CV"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Larger models develop richer semantic equivalence class representations in deeper layers"
      evidence: "Analogous to vision transformer feature hierarchies; capacity enables abstraction over lexical variability"
      falsifier: "If d_50 does not shift deeper at 70B vs 8B under dimensionality controls, this step fails"
    - step: 2
      description: "Token-probability saturates as a UQ signal because it operates on vocabulary distributions, which larger models compress; semantic-level aggregators (SE, KLE) capture the remaining uncertainty at the equivalence-class level"
      evidence: "SE outperforms token-prob on TriviaQA/NQ/BioASQ [Farquhar et al. 2024]; survey identifies fragmentation [Kang et al. 2025]"
      falsifier: "If token-prob AUROC also improves with scale at the same rate as SE, semantic migration is not the mechanism"
    - step: 3
      description: "The growing semantic-structure advantage manifests as a method × scale AUROC interaction: Δ_70B > Δ_8B"
      evidence: "Follows from Steps 1-2; SE clusters by semantic meaning rather than surface tokens, gaining advantage as semantic organization deepens"
      falsifier: "If AUROC interaction Δ_70B - Δ_8B ≤ δ (0.02) with CI including zero across TriviaQA and NQ"
    - step: 4
      description: "Linear decodability of correctness from hidden states increases with scale at deeper layers (probe gap narrows), reflecting that epistemic uncertainty becomes more organizationally accessible"
      evidence: "SEP single-pass approximation matches generative SE [Kossen et al. 2024]; decodability increases with capacity"
      falsifier: "If G_corrected(l) does not narrow at 70B under permutation calibration and JL-projection dimensionality control"
  key_tension: "The mechanistic claim (reorganization) cannot be causally established from a two-point scale comparison; training-data and optimization-schedule differences between 8B and 70B remain as irreducible confounds even with base-model controls."
  evidence_summary: |
    The causal chain flows from capacity-driven semantic representation depth (Step 1) through
    token-probability saturation and semantic-aggregator advantage (Step 2) to measurable
    AUROC interaction effects (Step 3) and probe decodability depth shifts (Step 4).
    Each step has a targeted falsification condition. Convergence of external (AUROC) and
    internal (MI depth, probe gap) diagnostics is required to support the structural claim.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Llama-3-8B and 70B base checkpoints share sufficient pretraining data distribution similarity that observed differences can be attributed primarily to capacity rather than data mixture"
    supporting_evidence: "Meta Llama-3 technical report indicates shared pretraining corpus; base-model control eliminates RLHF differences"
    consequence_if_violated: "Method × scale interaction may reflect training-regime artifacts rather than capacity-driven reorganization; results remain valid as empirical observations but mechanistic interpretation weakens"
  - id: "A2"
    assumption: "AUROC over binary correctness labels is a valid proxy for UQ quality on TriviaQA/NQ with standard exact-match normalization"
    supporting_evidence: "AUROC is the standard metric in SE, SelfCheckGPT, and LM-Polygraph benchmark papers; exact-match normalization is established in QA literature"
    consequence_if_violated: "Cross-method AUROC comparisons may be contaminated by label inconsistency; mitigated by single evaluation harness with identical normalization"
  - id: "A3"
    assumption: "Probe-based MI approximation (linear and 2-layer MLP) captures the relevant correctness-predictive signal in hidden states"
    supporting_evidence: "Linear probes are standard in representation analysis; SEPs [Kossen et al. 2024] demonstrate their effectiveness for UQ"
    consequence_if_violated: "Nonlinear structure in hidden states may not be captured; mitigated by including 2-layer MLP as nonlinear baseline"
  - id: "A4"
    assumption: "N=10 samples per query provides stable sampling-based UQ estimates for SelfCheckGPT and SE"
    supporting_evidence: "Farquhar et al. 2024 used N=10; SelfCheckGPT paper used N=20 but N=10 is sufficient for AUROC stability on TriviaQA/NQ scale"
    consequence_if_violated: "Sampling-based methods may have high variance; mitigated by bootstrap CI on all AUROC estimates"
  - id: "A5"
    assumption: "TriviaQA and NQ represent factual retrieval epistemic uncertainty (not adversarial misconception), making them valid for testing the scaling hypothesis"
    supporting_evidence: "Both benchmarks are standard factual QA with ground-truth labels; P4 explicitly predicts attenuation on TruthfulQA (adversarial setting)"
    consequence_if_violated: "If TriviaQA/NQ contain significant adversarial items, the benchmark-specific attenuation prediction becomes harder to interpret"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    Autoregressive LLMs within the same model family evaluated on factual knowledge-intensive QA
    benchmarks (TriviaQA, NaturalQuestions) using standard exact-match correctness labels.
    Specifically validated for Llama-3 base checkpoints at 8B and 70B parameter scale.
  does_not_apply_to: |
    - Multimodal LLMs or vision-language models (separate research question)
    - Code generation or structured output tasks
    - Benchmarks requiring adversarial misconception detection (TruthfulQA expected to show attenuation — P4)
    - Models from different families (cross-family comparison introduces additional confounds)
    - API-only models without hidden-state access (internal diagnostics require white-box access)
  known_limitations: |
    - Two-point scale comparison (8B, 70B) is correlational, not causal; cannot prove scale causes reorganization
    - Training-data and optimization-schedule differences between checkpoints are irreducible confounds
    - Layer-wise MI estimation at 70B scale is computationally intensive; probe-based approximations may not capture all relevant information
    - SelfCheck scorer type (BERTScore vs NLI) affects consistency scores differently; must stratify

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "The AUROC advantage of semantic entropy (SE) and KLE over token-probability widens significantly from Llama-3-8B-Base to Llama-3-70B-Base on TriviaQA and NaturalQuestions"
    test_method: "Compute Δ = (AUROC_SE^70B - AUROC_TP^70B) - (AUROC_SE^8B - AUROC_TP^8B) for SE and KLE separately; 95% bootstrap CI with 1000 resamples on both TriviaQA and NQ test splits; verify CI excludes zero on ≥2 of 2 datasets"
    success_criterion: "Δ > 0.02 with 95% bootstrap CI excluding zero on both TriviaQA and NQ, for both SE and KLE, in Llama-3 base variants"
    falsification: "Δ ≤ 0.02 or CI includes zero on either dataset for both SE and KLE; or token-prob shows equivalent Δ, indicating uniform scaling"
  - id: "P2"
    primary: false
    statement: "The rank correlation between SelfCheck-NLI disagreement and SE scores increases from 8B to 70B after controlling for output lexical diversity, while SelfCheck-BERTScore shows smaller correlation increase"
    test_method: "Compute Spearman rank correlation between SelfCheck and SE; regress against type-token ratio across samples; partial correlation controlling for diversity; compare BERTScore vs NLI scorer stratification across scales"
    success_criterion: "Partial correlation (SelfCheck-NLI, SE) increases significantly from 8B to 70B; BERTScore partial correlation shows smaller or zero increase; consistent with semantic convergence not diversity inflation"
    falsification: "BERTScore and NLI partial correlations increase equivalently with scale, indicating output-diversity artifact rather than semantic convergence"
  - id: "P3"
    primary: false
    statement: "The permutation-corrected layer-wise probe gap G_corrected(l) is smaller at 70B than 8B, and the cumulative-MI 50th-percentile depth d_50 shifts significantly deeper at 70B"
    test_method: "For each transformer layer l: train 2-layer MLP probe (1024 hidden, ReLU, 5-fold CV, fixed hyperparameters) on correctness prediction; compute G_true(l) and G_perm(l) (shuffled labels); G_corrected(l) = G_true(l) - G_perm(l); derive d_50 from corrected MI profile; bootstrap CI on d_50 shift"
    success_criterion: "d_50_70B > d_50_8B with 95% bootstrap CI excluding zero; G_corrected(l) peak shifts to deeper layers at 70B; effect persists under JL-projection dimensionality matching"
    falsification: "d_50 does not shift or shifts shallower at 70B; G_corrected shows no significant layer-wise difference; JL-projection eliminates the effect"
  - id: "P4"
    primary: false
    statement: "The method × scale AUROC interaction (P1) is attenuated or absent on TruthfulQA compared to TriviaQA and NQ"
    test_method: "Repeat P1 analysis on TruthfulQA test split; compare Δ on TruthfulQA vs TriviaQA/NQ; compare d_50 shift on TruthfulQA"
    success_criterion: "Δ on TruthfulQA is significantly smaller than on TriviaQA/NQ (pre-registered directional prediction); interaction effect is benchmark-specific for factual retrieval"
    falsification: "Δ on TruthfulQA is equivalent to TriviaQA/NQ, suggesting the effect is not specific to factual retrieval epistemic uncertainty"

