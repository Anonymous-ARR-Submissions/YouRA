# Narrative Blueprint: Phase 6 Paper
# Epistemic Geometry Scaling Hypothesis (EGSH) — H-EGSH-v1
# Generated: 2026-05-21T12:35:00
# Framing: Negative result + diagnosis (Option A from 045_validated_hypothesis.md)

metadata:
  paper_title: "When Semantic Entropy Fails: Sampling Degeneracy in Base Language Models Undermines Clustering-Based Uncertainty Quantification"
  short_title: "Sampling Degeneracy and Semantic Entropy Failure"
  hypothesis_id: "H-EGSH-v1"
  verdict: "REFUTED (MUST_WORK gate FAIL)"
  paper_type: "negative_result_with_diagnosis"
  narrative_approach: "Counterintuitive finding — trusted method fails, but failure is mechanistically explained"

# ============================================================================
# HOOK STRATEGY
# ============================================================================

hook:
  strategy: "Counterintuitive Finding"
  rationale: "SE is a celebrated, Nature-published method with 1198 citations. Showing it fails — and explaining exactly why — is surprising, important, and actionable."

  opening_statement:
    content: |
      Semantic entropy—a method published in Nature and cited over 1,000 times—fails as an
      uncertainty estimator on 89% of factual queries when applied to base language models, and
      is systematically anti-correlated with correctness on TriviaQA.
    strategy: "counterintuitive_finding"
    specificity: "concrete numbers (89%, Nature, 1000+ citations)"
    anti_pattern_avoided: "No 'X is an important problem' opening"

  why_reader_should_care:
    main_reason: "SE is widely used as the de facto standard for uncertainty quantification in LLMs — practitioners need to know its applicability boundaries"
    concrete_example: "degenerate_fraction=0.894 means N=10 samples from Llama-3-8B-Base produce K=1 semantic cluster for 89% of TriviaQA queries"
    stakes: "Benchmarking studies using SE on base models produce misleading results; this is a reproducibility and methodology issue for the field"

# ============================================================================
# PROBLEM FRAMING (THREE LEVELS)
# ============================================================================

problem_framing:
  surface_problem:
    description: "LLMs hallucinate, and we need reliable uncertainty quantification to detect and flag these failures"
    common_understanding: "Semantic entropy outperforms token-probability for hallucination detection (Farquhar et al., 2024)"
    field_consensus: "Sampling-based UQ methods like SE are becoming standard practice for safety-critical LLM deployment"

  deeper_problem:
    description: "SE's superiority has only been validated on instruction-tuned models with high sampling diversity; its application to base models assumes diversity that does not exist"
    why_overlooked: "Published results mix base and instruction-tuned models without explicitly reporting degenerate_fraction; the sampling degeneracy phenomenon has no commonly-used diagnostic"
    our_perspective: "SE is a valid method in the right regime; the regime assumption (semantic diversity across N=10 samples) is routinely violated for base models on factual QA"

  gap_in_existing_work:
    description: "No UQ benchmarking study systematically audits sampling diversity as a prerequisite for sampling-based methods"
    why_gap_exists: "The field implicitly assumes that N=10, temp=1.0 produces meaningful diversity; this assumption was valid for Llama-2-Instruct but fails for Llama-3-Base"
    why_gap_matters: "Without a diversity prerequisite check, benchmarks silently produce invalid SE scores, leading to misleading method rankings and unreliable deployment decisions"

# ============================================================================
# KEY INSIGHT
# ============================================================================

key_insight:
  aha_moment:
    one_sentence: "Semantic entropy is a diversity-conditional uncertainty estimator — it measures epistemic uncertainty only when the model generates semantically diverse outputs, and base models on factual QA rarely satisfy this condition."
    expanded_explanation: |
      When Llama-3-8B-Base generates N=10 samples for a factual question at temperature=1.0,
      it produces near-identical answers 89% of the time (K=1 semantic cluster). For these
      queries, SE≈0 regardless of whether the model is correct or wrong. The resulting score
      distribution has no discriminative signal for correctness — and since confident incorrect
      answers dominate the K=1 regime, SE becomes anti-correlated with correctness (AUROC<0.5).
      The failure is structural, not implementation-specific.

  why_others_missed_it:
    common_assumptions: "SE papers typically evaluate on instruction-tuned models (Llama-2-Chat, GPT-4-turbo) which exhibit higher sampling diversity due to RLHF-induced output variation"
    our_different_view: "We explicitly separate model type (base vs. instruct) and measure degenerate_fraction as a first-order diagnostic, revealing the diversity precondition violation"
    enabling_factor: "Running SE on Llama-3-Base (not instruct) made the degeneracy visible; the quantitative degenerate_fraction metric made it measurable"

  what_makes_it_work:
    intuitive_explanation: "SE needs variety to measure uncertainty; base models are too consistent to generate variety on factual questions"
    key_mechanism: "SE entropy H = -sum(p_c * log(p_c)) over semantic clusters c. When K=1 for 89% of queries, H≈0 uniformly, destroying all discriminative power. KLE (eigenvalue sum of similarity Laplacian) suffers identically: rank-1 Laplacian for K=1 → score≈0 → inverted AUROC."

# ============================================================================
# EVIDENCE NARRATIVE
# ============================================================================

evidence_narrative:
  main_claim:
    statement: "Semantic entropy and KLE fail as uncertainty estimators for base language models on factual QA due to sampling degeneracy (degenerate_fraction≈0.89), producing AUROC substantially below token-probability and below chance on TriviaQA"
    measurable_criteria: "SE AUROC < token_prob AUROC, SE AUROC < 0.5 on TriviaQA, degenerate_fraction > 0.80 on both datasets"

  supporting_evidence:
    - id: "evidence_1"
      what: "SE AUROC = 0.4735 on TriviaQA vs token_prob AUROC = 0.6835 (Δ = −0.210)"
      so_what: "SE is anti-correlated with correctness — worse than random on TriviaQA"
      how_it_supports_claim: "Directly demonstrates the failure; anti-correlation (AUROC < 0.5) is stronger than mere underperformance"

    - id: "evidence_2"
      what: "SE AUROC = 0.5524 on NQ vs token_prob AUROC = 0.6551 (Δ = −0.103)"
      so_what: "Failure replicates across datasets with different difficulty distributions"
      how_it_supports_claim: "Cross-dataset replication rules out dataset-specific artifact"

    - id: "evidence_3"
      what: "degenerate_fraction = 0.894 (TriviaQA) and 0.848 (NQ)"
      so_what: "89%/85% of queries produce K=1 semantic cluster — SE mechanism has no input to work with"
      how_it_supports_claim: "Root cause: degeneracy precedes and explains the AUROC failure"

    - id: "evidence_4"
      what: "KLE AUROC = 0.2642 on TriviaQA (well below chance)"
      so_what: "KLE suffers even more severely because rank-1 Laplacian produces near-zero scores that are systematically inverted"
      how_it_supports_claim: "Both semantic-structural methods fail by the same mechanism; not method-specific"

    - id: "evidence_5"
      what: "SelfCheckGPT-NLI AUROC = 0.6862 on TriviaQA (competitive with token_prob)"
      so_what: "Consistency-based methods without clustering can succeed even in low-diversity regimes"
      how_it_supports_claim: "Contrast shows the failure is clustering-specific, not sampling-general"

  surprising_findings:
    - finding: "SE AUROC below 0.5 (anti-correlated) on TriviaQA"
      why_surprising: "Random would score 0.5; an acclaimed method scoring 0.47 means it actively misleads"
      our_interpretation: "High-confidence incorrect answers produce K=1 (low SE); uncertain-but-correct answers occasionally produce K>1 (higher SE). With 89% of queries at K=1, residual variation inverts the AUROC."

    - finding: "SelfCheckGPT-NLI matches token_prob despite near-identical samples"
      why_surprising: "NLI-based consistency requires sample variation to work — yet it succeeds where SE fails"
      our_interpretation: "NLI detects semantic entailment between near-paraphrases more sensitively than BERTScore; the 11% diverse queries provide sufficient discriminative signal for NLI but not for clustering-based SE"

    - finding: "SE mechanism (K<N) is correctly implemented but produces degenerate output"
      why_surprising: "The code is correct; the failure is conceptual, not technical"
      our_interpretation: "This makes the contribution more general: any correct SE implementation on base models faces this failure"

# ============================================================================
# BROADER IMPACT
# ============================================================================

takeaway:
  main_contribution:
    one_sentence: "We establish sampling degeneracy as the primary failure mode for clustering-based UQ methods on base language models, introduce degenerate_fraction as a diagnostic metric, and demonstrate that token-probability and SelfCheckGPT-NLI are robust UQ baselines in this regime."
    why_significant: "Practitioners deploying UQ on base LLMs may be unknowingly using invalid uncertainty scores; this work provides actionable diagnostics and fallback methods"

  implications:
    for_field: "UQ benchmarking protocols should include diversity audits (degenerate_fraction) as a prerequisite check before reporting SE/KLE scores; method ranking comparisons on base models are likely contaminated in prior work"
    for_practice: "When using base (non-instruct) models for uncertainty estimation, use token-probability or SelfCheckGPT-NLI rather than SE/KLE; or switch to instruction-tuned models if SE is required"

  future_possibilities:
    immediate_extensions: "F1: Verify SE > TP on Llama-3-8B-Instruct (1-2 days with existing infrastructure); F2: Temperature sweep to find SE-viable regime for base models"
    longer_term_vision: "Diversity-conditional UQ selection protocol that auto-selects methods based on degenerate_fraction at inference time; applicable to any new model release"

