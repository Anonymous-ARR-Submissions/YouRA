    - "SelfCheckGPT-BERTScore (N=10)"
    - "SelfCheckGPT-NLI (N=10)"
    - "Semantic Entropy (N=10, NLI clustering)"
    - "Kernel Language Entropy (semantic similarity kernel)"
    - "Semantic Entropy Probes (linear, OATML repo)"
    - "2-layer MLP probe (nonlinear baseline, fixed capacity)"

measurement_plan:
  data_collection:
    - source: "Model generations: N=10 samples per query per model; all generations stored for reuse across UQ methods"
    - source: "Hidden states: extracted per-layer for all test queries; stored for probe training"
    - source: "Ground-truth correctness: exact-match against TriviaQA/NQ/TruthfulQA answer sets via UQLM normalization"
  procedure:
    - step: "Generate N=10 samples for each test query using Llama-3-8B-Base and Llama-3-70B-Base (temperature=1.0, top-p=0.9)"
    - step: "Extract hidden states at all transformer layers for each query's greedy-decoded generation"
    - step: "Apply all UQ methods through UQLM unified harness to compute uncertainty scores"
    - step: "Compute AUROC for each method × model combination; bootstrap CI (1000 resamples)"
    - step: "Compute method × scale interaction Δ for SE and KLE vs token-prob; test against δ=0.02 threshold"
    - step: "Train layer-wise probes (linear + 2-layer MLP, fixed hyperparameters, 5-fold CV) on hidden states"
    - step: "Compute true-label and permuted-label probe AUROC per layer; derive G_corrected(l)"
    - step: "Compute cumulative MI profile; derive d_50 (50th-percentile depth); bootstrap CI on d_50 shift"
    - step: "Apply JL-projection (70B → 8B dimensionality) and re-run probes as dimensionality control"
    - step: "Repeat P1 analysis on TruthfulQA; compare Δ to TriviaQA/NQ (P4 scope test)"
  success_criteria:
    - "P1: Δ > 0.02 (SE, KLE) with 95% CI excluding zero on both TriviaQA and NQ in base-model variants"
    - "P2: Partial correlation (SelfCheck-NLI, SE) increases from 8B to 70B; BERTScore shows smaller increase"
    - "P3: d_50_70B > d_50_8B with 95% CI excluding zero; G_corrected narrows; JL-projection preserves effect"
    - "P4: Δ on TruthfulQA significantly smaller than on TriviaQA and NQ"

validation:
  internal_validity:
    - "Within-scale control (base vs instruct 70B): distinguishes scale-driven from post-training effects"
    - "JL-projection dimensionality matching: rules out dimensionality-driven probe advantage"
    - "Permutation-calibrated probe baselines: rules out generic representational expressiveness inflation"
    - "Lexical diversity partial correlation: rules out output-diversity inflation in SelfCheck-SE convergence"
    - "Two-way ANOVA interaction term: distinguishes reorganization from uniform scaling"
  external_validity:
    - "Results on TriviaQA and NQ provide cross-benchmark consistency for the scaling claim"
    - "TruthfulQA attenuation (P4) scopes the hypothesis to factual retrieval settings"
    - "Base-model control enables generalization beyond RLHF-specific artifacts"

discussion_synthesis:
  key_insights:
    - "The question 'how does uncertainty reorganize with scale' is more scientifically productive than 'which method ranks first'"
    - "Convergence across three independent diagnostic types (AUROC interaction + probe gap + MI depth) is required to claim structural reorganization"
    - "Permutation-corrected probe gap G_corrected(l) is a new metric contribution that isolates epistemic from generic expressiveness effects"
    - "Training-regime confound (different pretraining budgets at 8B vs 70B) is irreducible; base-model control mitigates RLHF but not all confounds"
    - "TruthfulQA predicted to show attenuation — this domain-scoping makes the hypothesis more precise, not weaker"
  breakthrough_moments:
    - "Exchange 4 (Prof. Rex): identified ranking claim vs mechanistic claim conflation — led to adding KLE as 5th method and SelfCheck scorer stratification"
    - "Exchange 7 (Prof. Pax): proposed layer-wise MI analysis — transformed a confound control into the primary mechanistic finding"
    - "Exchange 13 (Prof. Pax): proposed nonlinear MLP probe and decodability inflation factor — closed geometry-vs-information gap"
    - "Exchange 15 (Prof. Rex): proposed cumulative-MI depth quantile and layer-wise permutation correction — eliminated argmax instability concern"
  resolved_tensions:
    - "RLHF confound vs architectural claim: resolved by base-model control + within-scale instruct comparison"
    - "AUROC as behavioral vs structural evidence: resolved by adding internal MI depth diagnostics"
    - "Dimensionality artifact in probe analysis: resolved by JL-projection and layer-wise permutation correction"
    - "Single benchmark risk: resolved by cross-dataset consistency requirement (TriviaQA + NQ) and TruthfulQA scope test"
