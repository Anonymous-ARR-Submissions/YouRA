hypothesis_draft:
  title: "Epistemic Geometry Scaling Hypothesis (EGSH)"
  hypothesis_id: "H-EGSH-v1"
  core_claim: |
    Within the Llama-3 model family, scaling from 8B to 70B base checkpoints produces a
    consistent pattern of epistemic reorganization: uncertainty encoding shifts from surface
    token-distributional representations to deep semantic-structural representations.
    This is evidenced by four convergent diagnostics: a method × scale AUROC interaction
    favoring SE/KLE over token-probability, stratified SelfCheck partial-correlation
    consistency, permutation-corrected probe gap narrowing, and cumulative-MI depth d_50
    shifting to deeper transformer layers.
  mechanism: |
    Larger model capacity enables richer semantic equivalence class representations in deeper
    transformer layers (analogous to vision transformer feature hierarchies). As scale increases:
    (1) token-probability saturates as a UQ signal because lexical ambiguity is compressed;
    (2) semantic-level aggregators (SE, KLE) capture the remaining uncertainty at the
    equivalence-class level, gaining relative advantage; (3) correctness-predictive information
    migrates to deeper layers, measurable via layer-wise MI profiles and probe gap narrowing.
  predictions:
    - P1: "AUROC interaction Δ_70B - Δ_8B > 0.02 with 95% bootstrap CI on TriviaQA and NQ (SE, KLE vs token-prob)"
    - P2: "Partial correlation between SelfCheck-NLI and SE strengthens from 8B to 70B after controlling for lexical diversity"
    - P3: "Permutation-corrected probe gap G_corrected(l) narrows and d_50 shifts deeper at 70B under JL-projection and 2-layer MLP probes"
    - P4: "Method × scale interaction attenuated on TruthfulQA relative to TriviaQA/NQ (domain-scope boundary)"

variables_summary:
  independent: "Model scale (Llama-3-8B-Base vs 70B-Base) × UQ method paradigm (token-prob, SelfCheck-BERTScore, SelfCheck-NLI, SE, KLE, SEPs-linear, MLP-probe)"
  dependent_primary: "AUROC for correctness prediction; method × scale interaction Δ; cumulative-MI depth d_50"
  controlled: "Dataset splits (identical standard splits), evaluation harness (UQLM unified), sampling parameters (N=10, T=1.0, top-p=0.9), probe architecture (2-layer MLP, 1024 hidden, 5-fold CV)"

null_hypothesis:
  h0_statement: |
    There is no significant method × scale interaction: all UQ methods scale proportionally
    from 8B to 70B, preserving relative AUROC rankings. Token-probability, SelfCheckGPT, SE,
    and KLE all improve by similar Δ amounts, and no depth shift occurs in MI profiles.
  statistical_test: "Two-way ANOVA (method × scale) on AUROC; bootstrap CI on Δ = AUROC_diff_70B - AUROC_diff_8B"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: |
    Three methodological innovations: (1) permutation-corrected layer-wise probe gap
    G_corrected(l) isolates epistemic accessibility from generic representational expressiveness;
    (2) cumulative-MI 50th-percentile depth d_50 provides a scale-robust depth measure robust
    to argmax instability; (3) convergent multi-diagnostic framework combining external AUROC
    interactions with internal depth diagnostics to support structural UQ claims.
  differentiation_summary: |
    Prior work (SE, SelfCheckGPT, SEPs, KLE) evaluated methods at fixed scale on fixed benchmarks.
    No existing work treats scale as the independent variable or measures internal representational
    depth reorganization as a function of scale. The UQ survey [Kang et al. 2025] identifies
    evaluation fragmentation as the key limitation — EGSH directly addresses it with a controlled
    within-family comparison and mechanistic depth diagnostics.

