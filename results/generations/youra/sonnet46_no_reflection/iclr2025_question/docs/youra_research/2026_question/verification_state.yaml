main_hypothesis:
  id: H-EGSH-v1
  title: Epistemic Geometry Scaling Hypothesis (EGSH)
  statement: 'Under the Llama-3 model family evaluated on standard factual QA benchmarks (TriviaQA, NaturalQuestions), if
    model scale increases from 8B to 70B base checkpoints while holding dataset splits, evaluation harness, and benchmark
    conditions fixed, then semantic-structural UQ methods (SE, KLE) will show a significantly larger AUROC advantage over
    token-probability than at smaller scale, AND correctness-predictive information will shift to deeper transformer layers
    — because larger model capacity enables richer semantic equivalence class representations that surface-level token distributions
    cannot capture.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: TriviaQA rc.nocontext + NaturalQuestions open-domain (primary); TruthfulQA mc1_targets (scope)
    model: Llama-3-8B-Base, Llama-3-70B-Base; Llama-3-70B-Instruct (within-scale control)
    optimizer: null
    hyperparameters:
      sampling_n: 10
      temperature: 1.0
      top_p: 0.9
      probe_hidden: 1024
      probe_layers: 2
      probe_cv_folds: 5
      bootstrap_resamples: 1000
      auroc_interaction_threshold: 0.02
