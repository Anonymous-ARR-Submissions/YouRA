# ============================================================
# METHODOLOGY DETAILS (from Phase 3 PRD/Architecture)
# ============================================================

methodology:
  algorithm_name: "Structural Efficiency of Policy Movement Framework"
  framework_components:
    - "ast_decomposition.py — FA-AST node classification, SEP computation"
    - "ast_metric.py — ZSS semantic edit distance (CF+DF nodes only)"
    - "kl_metric.py — KL log computation, checkpoint matching"
    - "sep_analysis.py — SEP analysis across matched checkpoint pairs"
    - "statistical_tests.py — Mann-Whitney U, Spearman correlation, bootstrap CI"

  fa_ast_taxonomy:
    control_flow_nodes: ["If", "For", "While", "Try", "With"]
    data_flow_nodes: ["Assign", "Call", "Return", "FunctionDef"]
    surface_nodes: "all other node types"
    source_paper: "Wang et al., 2020 (arXiv:2002.08653)"

  key_hyperparameters:
    grpo:
      - name: "learning_rate"
        value: "1e-6"
      - name: "batch_size"
        value: 4
      - name: "gradient_accumulation"
        value: 4
      - name: "kl_penalty_beta"
        value: 0.04
      - name: "training_steps"
        value: 1000
      - name: "checkpoint_save_interval"
        value: "every 100 steps"
    dpo:
      - name: "learning_rate"
        value: "5e-7"
      - name: "batch_size"
        value: 2
      - name: "gradient_accumulation"
        value: 8
      - name: "kl_penalty_beta"
        value: 0.1
      - name: "training_steps"
        value: 1000
      - name: "checkpoint_save_interval"
        value: "every 100 steps"

  kl_matching:
    tolerance_specified: 0.05
    tolerance_used_in_preliminary: 0.15
    reason_for_relaxed_tolerance: "Limited checkpoint availability due to aliasing"
    n_min_recommended: 10

  statistical_tests:
    primary: "Mann-Whitney U test"
    secondary: "Bootstrap 95% CI (10,000 samples)"
    significance_threshold: 0.05
    bootstrap_samples: 10000

# ============================================================
# CHECKPOINT ALIASING CONFOUND (KEY FINDING)
# ============================================================

checkpoint_aliasing:
  description: "Previously undocumented confound in RL fine-tuning analysis"
  what_happened: >
    h-e1 smoke test saved only 2 real GRPO checkpoints (step-100, step-200).
    h-m1 analysis used checkpoints for steps 100-1000, but steps 300-1000
    fell back to checkpoint-100 when requested files were not found.
  aliased_pairs: 25
  total_nominal_pairs: 27
  real_unique_checkpoints: 2
  n_effective: 2
  n_nominal: 192
  consequence: "Independence assumption of Mann-Whitney test violated; Spearman correlation undefined (NaN)"
  detection_method: "SEP-vs-KL trajectory shows near-flat line; tight reward clustering"
  safeguard_code: |
    unique_checkpoints = len(set(checkpoint_paths))
    assert unique_checkpoints >= N_min, (
        f"Checkpoint aliasing detected: only {unique_checkpoints} unique "
        f"checkpoints found (required >= {N_min}). Abort analysis."
    )
  n_min_for_mechanism_analysis: 10
  n_min_for_existence_check: 5

# ============================================================
# RESULTS VERIFICATION
# ============================================================

results:
  main_result:
    claimed: >
      GRPO and DPO produce nearly identical Semantic Edit Proportions (≈0.237
      for both) despite GRPO exhibiting substantially higher raw semantic AST
      edit distances (+250% on proof-of-concept data).
    actual: >
      GRPO-binary SEP = 0.2371, DPO SEP = 0.2377. Mann-Whitney p = 0.4248
      (not significant). Raw edit distance GRPO = 3.500, DPO = 1.000 on h-e1
      synthetic data.
    match: true
    caveat: "h-m1 SEP result is underpowered (n_eff≈2). h-e1 uses synthetic data only."

  framework_validation:
    claimed: "Framework executes correctly end-to-end on real checkpoints"
    actual: "All 5 modules run without errors; SEP values in [0,1]; bootstrap CI computed correctly"
    match: true

  checkpoint_aliasing_finding:
    claimed: "25/27 analysis pairs aliased to checkpoint-100"
    actual: "Confirmed via checkpoint path analysis; n_eff≈2"
    match: true

  bootstrap_ci:
    claimed: "95% CI [4.6500, 8.7314] excludes zero"
    actual: "CI lower bound 4.65 > 0; confirms infrastructure detects engineered difference"
    match: true
    note: "Based on synthetic data with guaranteed GRPO advantage — not empirical training result"

