main_hypothesis:
  id: H-StructuralEfficiency-v1
  title: 'Structural Efficiency of Policy Movement: Execution-RL vs DPO for Code Generation'
  statement: 'Under controlled post-training conditions (identical base model DeepSeek-Coder-7B,

    training data, and compute budget), if execution-feedback RL (GRPO with binary or

    error-type rewards) is applied instead of DPO, then execution-RL achieves higher

    structural efficiency of policy movement — measured as greater semantically-relevant

    AST edit distance per unit KL divergence from the base model — because execution

    reward directly penalizes functional incorrectness at the program level, forcing

    probability mass reallocation toward control-flow and data-flow transformations

    rather than surface-level stylistic changes.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: HumanEval+ / MBPP+ / LiveCodeBench
    model: DeepSeek-Coder-7B-instruct
    optimizer: GRPO (TRL GRPOTrainer) / DPO (TRL DPOTrainer)
    hyperparameters:
      training_prompts: CodeAlpaca/OSS-Instruct prompt set
      equalization: equal-prompts and equal-tokens regimes
      kl_matching_tolerance: ±5%
      bootstrap_samples: 10000
