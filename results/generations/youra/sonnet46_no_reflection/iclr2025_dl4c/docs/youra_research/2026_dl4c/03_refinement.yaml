# ═══════════════════════════════════════════════════════════════
# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "Execution-feedback RL outperforms SFT baseline on code generation benchmarks"
      status: "BUILD_ON"
      evidence: "CodeRL [Le et al., 2022], PPOCoder [Shojaee et al., 2023], CoTran [Jana et al., 2023], TÜLU 3 [Lambert et al., 2024] all demonstrate consistent improvements over SFT"
    - claim: "Binary pass/fail reward is inferior to variable-level execution trajectory"
      status: "BUILD_ON"
      evidence: "CodeRL+ [Jiang et al., 2025, arXiv:2510.18471] shows +4.6% pass@1 improvement of variable-level over binary reward RLVR"
    - claim: "TRL library unifies GRPO, DPO, and PPO trainers in a single framework"
      status: "BUILD_ON"
      evidence: "Verified from huggingface/trl (18K stars, v1.3.0 2026-04-26); GRPOTrainer, DPOTrainer, PPOTrainer all available"
    - claim: "evalplus (HumanEval+/MBPP+) is the standard evaluation harness used by major code LLMs"
      status: "BUILD_ON"
      evidence: "Used by Llama 3.1, TÜLU 3, DeepSeek-Coder, StarCoder2; 1.7K stars; active maintenance"
    - claim: "No controlled RLHF/DPO vs execution-RL comparison exists under identical model+data+benchmark conditions"
      status: "PROVE_NEW"
      evidence: "Confirmed gap from literature review: CodeRL+ vs binary RLVR only; TÜLU 3 mixes math+code; PPOCoder predates modern DPO; RL survey [Wang et al., 2024] explicitly notes absence"
    - claim: "Execution-feedback RL induces higher structural efficiency of policy movement than DPO"
      status: "PROVE_NEW"
      evidence: "Novel hypothesis from discussion — no prior work measures semantic AST edit distance per unit KL divergence as alignment training signal quality metric"
  scope_reduction_percentage: 40
  phase2b_4_instructions: |
    Four established facts (BUILD_ON) can be cited as prior work without re-verification.
    Two new claims (PROVE_NEW) are the core experimental contributions requiring Phase 2B-4 verification:
    (1) execution-RL > DPO on structural efficiency (primary), and
    (2) structural efficiency mediates correctness/calibration/transfer (mechanistic).
    Phase 2B should design sub-hypotheses around the PROVE_NEW claims only.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-StructuralEfficiency-v1"
  confidence_level: 0.78
  core_hypothesis_statement: |
    Under controlled post-training conditions (identical base model DeepSeek-Coder-7B,
    training data, and compute budget), if execution-feedback RL (GRPO with binary or
    error-type rewards) is applied instead of DPO, then execution-RL achieves higher
    structural efficiency of policy movement — measured as greater semantically-relevant
    AST edit distance per unit KL divergence from the base model — because execution
    reward directly penalizes functional incorrectness at the program level, forcing
    probability mass reallocation toward control-flow and data-flow transformations
    rather than surface-level stylistic changes.
  alternative_hypothesis_h0: |
    There is no significant difference in structural efficiency of policy movement
    (semantic AST edit distance per unit KL) between execution-RL and DPO at matched
    KL budgets; any pass@1 differences are fully explained by total KL or entropy
    differences alone, with no residual structural alignment effect.

