      operationalization: "Pairs generated via execution oracle (passing solution = chosen, failing = rejected) — identical data source as RL reward"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Execution reward directly signals functional incorrectness at program level"
      evidence: "CodeRL [Le et al., 2022], PPOCoder [Shojaee et al., 2023]: unit-test feedback provides non-differentiable but accurate functional correctness signal"
      falsifier: "If execution reward does not correlate with functional correctness improvement, the signal is uninformative — testable by checking reward-correctness correlation during training"
    - step: 2
      description: "Program-level signal forces probability mass reallocation toward control-flow and data-flow AST transformations"
      evidence: "CodeRL+ [Jiang et al., 2025]: variable-level trajectory shows +4.6% over binary — suggests model learns to modify semantically relevant code structures"
      falsifier: "If AST edit distance distribution is identical between DPO and execution-RL at matched KL, structural reallocation is not occurring"
    - step: 3
      description: "Structural reallocation produces higher semantic-edit-per-KL (structural movement efficiency)"
      evidence: "Novel claim — no prior paper measures this ratio; theoretically follows from steps 1-2"
      falsifier: "Prediction 1: bootstrap 95% CI for efficiency differential includes zero (≥20% threshold not met)"
    - step: 4
      description: "Structural efficiency mediates correctness, calibration, granularity sensitivity, and OOD transfer"
      evidence: "Mixed-effects regression (Prediction 2), ECE analysis (Prediction 3), granularity interaction (Prediction 4), LiveCodeBench R² (Prediction 5)"
      falsifier: "If semantic-edit-per-KL coefficient is non-significant in mixed-effects regression after controlling for KL/entropy, mediation claim fails"
  key_tension: "KL divergence is token-level and local; functional correctness is program-level and global. Whether token-level KL is a valid budget for program-level behavioral change requires empirical validation via AST edit distance vs. KL sanity plot."
  evidence_summary: |
    Steps 1-2 are supported by existing literature (CodeRL, PPOCoder, CodeRL+). Steps 3-4 are
    novel claims. The key mechanism — that execution reward selectively pressures control-flow
    and data-flow modifications while DPO distributes updates toward stylistic changes —
    is theoretically grounded in the objective mismatch between program-level correctness
    and preference-pair log-ratio optimization, and is directly testable via the proposed
    AST edit distance decomposition and triangular calibration analysis.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "KL divergence from base model is a valid budget for policy movement when normalized by semantic behavioral change"
    supporting_evidence: "Standard practice in RLHF literature for measuring policy drift; Monte Carlo estimation via token log-probabilities is established"
    consequence_if_violated: "Predictions 1, 2, 5 all depend on KL as normalization — if KL is uninformative about behavioral change, the structural efficiency metric is meaningless; mitigated by AST edit distance vs. KL sanity plot"
  - id: "A2"
    assumption: "AST control-flow and data-flow edit distance is a meaningful proxy for semantically relevant code transformation"
    supporting_evidence: "Control-flow (if/for/while) and data-flow (variable assignments, function calls) edits directly determine program execution behavior; surface edits (comments, whitespace, renaming) do not"
    consequence_if_violated: "Structural efficiency metric conflates meaningful and meaningless changes; mitigated by pre-validating AST classifier on 50 held-out problems with human annotation"
  - id: "A3"
    assumption: "Partial correctness density (Jaccard stability of intermediate states under test perturbation) reflects latent structural scaffolding exploitable by fine-grained rewards"
    supporting_evidence: "ReCode [Fan et al., 2025] shows process rewards help on problems with intermediate structure; CodeRL+ variable-level gains suggest exploitable intermediate states exist"
    consequence_if_violated: "Prediction 4 granularity interaction loses its mechanistic interpretation; granularity gains attributed to gradient densification rather than structural scaffolding"
  - id: "A4"
    assumption: "DPO preference pairs generated via execution oracle preserve the preference-based learning dynamic and constitute a fair comparison"
    supporting_evidence: "Execution oracle provides deterministic preference labels (pass/fail); this is the cleanest DPO data construction eliminating human annotation noise"
    consequence_if_violated: "If execution-oracle DPO is not representative of standard DPO, results may not generalize to human-preference DPO settings; mitigated by reporting this as a controlled variant"
  - id: "A5"
    assumption: "LiveCodeBench distribution shift from HumanEval+/MBPP+ is sufficient to test transfer generalization without being so extreme as to make the task trivially different"
    supporting_evidence: "LiveCodeBench uses recent competitive programming problems (post-2023) designed to be contamination-free; used by ReCode [Fan et al., 2025] for OOD evaluation"
    consequence_if_violated: "If LiveCodeBench is too easy/hard relative to training distribution, R² threshold may be artificially inflated/deflated; mitigated by reporting Spearman rank correlation alongside R²"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    Function-level Python code generation benchmarks (HumanEval+, MBPP+, LiveCodeBench)
    with short, deterministic functions (≤50 lines). 7B-scale open-weight code LLMs
    (DeepSeek-Coder-7B, generalizable to similar scales). Post-training alignment via
    GRPO or DPO with execution-oracle preference construction. Training on competitive
    programming / coding interview problem distributions.
  does_not_apply_to: |
    Repository-level tasks (SWE-bench): instrumented execution via sys.settrace is
    computationally intractable for multi-file, multi-module Python codebases.
    Non-Python languages: error-type taxonomy assumes Python exception hierarchy.
    Models >13B: compute equalization across methods becomes practically infeasible
    without specialized hardware. Human-annotated preference pairs for DPO (distinct
    from execution-oracle construction used here).
  known_limitations: |
    DPO preference pairs are constructed via execution oracle in this study — this
    is a controlled choice that eliminates human annotation noise but may not
    represent the full DPO design space. The granularity sub-experiment (variable-level
    rewards) requires offline instrumented execution preprocessing (~2-4 GPU-hours).
    Hard-bin sample sizes (~80-100 problems across HumanEval+/MBPP+) are borderline
    for the three-way interaction power requirement; LiveCodeBench hard-bin inclusion
    recommended. AST semantic-edit classifier requires pre-validation.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "At KL-matched checkpoints (±5% tolerance), execution-RL exhibits ≥20% higher semantic-edit-per-KL than DPO on held-out HumanEval+/MBPP+"
    test_method: "Compute semantic AST edit distance (control-flow + data-flow edits) between base and fine-tuned model outputs at matched KL checkpoints; divide by KL; bootstrap 95% CI for difference"
    success_criterion: "Bootstrap 95% CI for efficiency differential excludes zero and magnitude ≥20%"
    falsification: "CI includes zero or reverses sign — structural efficiency claim collapses"
  - id: "P2"
    primary: false
    statement: "Semantic-edit-per-KL significantly mediates pass@1 gains in mixed-effects regression after controlling for total KL and entropy"
    test_method: "Mixed-effects regression: Δpass@1 ~ semantic-edit/KL + KL + entropy + method + (1|problem); test coefficient on semantic-edit/KL"
    success_criterion: "Coefficient significant at p < 0.05 with method as control; Sobel test confirms mediation"
    falsification: "Effect vanishes when KL is included as covariate — raw policy movement, not structural alignment, explains gains"
  - id: "P3"
    primary: false
    statement: "Problem-level structural efficiency negatively correlates with ECE (ρ ≤ −0.3) under entropy-matched, marginal-confidence-matched conditions"
    test_method: "Temperature scaling to equalize marginal entropy; Spearman ρ between problem-level semantic-edit/KL and problem-level ECE contribution"
    success_criterion: "ρ ≤ −0.3, p < 0.05 under entropy-matched conditions"
    falsification: "No significant correlation — calibration independent of structural movement, unified theory fragments"

