takeaway:
  main_contribution:
    one_sentence: >
      We introduce structural efficiency of policy movement as a diagnostic metric
      for comparing code generation alignment methods, and provide a validated
      end-to-end measurement framework with a preliminary finding that challenges
      the assumed mechanism of execution-RL superiority.
    why_significant: >
      Methods papers that introduce validated diagnostic frameworks have lasting
      impact: they enable the next generation of controlled comparisons. The
      checkpoint aliasing finding alone is valuable to any team running RL
      fine-tuning analysis.

  implications:
    for_field: >
      Future alignment method comparisons should report structural efficiency
      alongside pass@1 to distinguish structural learning from confidence shifts.
      The FA-AST + ZSS + KL-matching pipeline is a ready-to-use reference
      implementation for this purpose.
    for_practice: >
      Teams running RL fine-tuning analysis must verify checkpoint diversity
      (assert len(unique_checkpoints) >= N) before running multi-pair analysis
      to avoid silent data aliasing that corrupts statistical tests.
    conceptual_contribution: >
      Separating policy movement quality (structural efficiency) from policy
      outcome (pass@1) is a conceptual contribution that reframes how we think
      about the "alignment tax" and information efficiency of post-training methods.

  future_possibilities:
    immediate_extensions: >
      (FW-1) Corrected real-training run with ≥10 GRPO checkpoints and execution-oracle
      DPO pairs to obtain valid SEP comparison. (FW-2) Disentangle raw edit distance
      vs SEP proportion as complementary metrics in the same experiment.
    longer_term_vision: >
      Extend structural efficiency to other programming languages and model scales.
      Apply the framework to compare instruction tuning, RLHF, DPO, and GRPO
      variants across code domains. Use structural efficiency as a training signal
      itself (reward shaping toward semantic AST edit distance).
    open_questions: >
      Does GRPO's raw edit distance advantage persist with real training?
      Is SEP proportion truly invariant across alignment methods, or does the
      dry-run finding reflect data insufficiency? Does structural efficiency
      correlate with OOD generalization (LiveCodeBench)?

