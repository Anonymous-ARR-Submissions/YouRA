# ═══════════════════════════════════════════════════════════════════════════════
# PART 1: HOOK & MOTIVATION
# ═══════════════════════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: >
      When we train a language model with execution feedback, does it learn to think
      differently about code — restructuring control flow and data dependencies — or
      does it simply become more confident about the same surface patterns?
      Despite widespread adoption of execution-feedback reinforcement learning for
      code generation, no measurement framework exists to distinguish these two
      fundamentally different modes of policy change.
    strategy: "puzzle_paradox"
    rationale: >
      The puzzle framing (execution-RL vs DPO: structurally different or just
      more confident?) directly motivates the metric contribution. It is specific,
      raises a genuine scientific question, and does not overclaim empirical results
      we do not have. A busy reviewer at ICML will recognize this as a real gap.

  why_reader_should_care:
    main_reason: >
      As execution-RL methods (GRPO, PPO with code rewards) proliferate, practitioners
      and researchers lack principled tools to understand HOW these methods change
      model behavior — not just WHAT benchmark scores they achieve.
    concrete_example: >
      A model fine-tuned with GRPO-binary might achieve +3% pass@1 over DPO on
      HumanEval+, but this number alone cannot tell us whether the model learned
      to structure programs differently or merely became more decisive about
      existing patterns. Benchmark inflation masking structurally equivalent
      policy movement is a real risk when comparing alignment methods.
    stakes: >
      Without principled metrics for policy movement quality, the field risks
      selecting alignment methods based on benchmark artifacts rather than
      genuinely improved structural understanding of code. This has downstream
      consequences for robustness, generalization, and interpretability of
      code-generating models.

  real_world_impact:
    application_domain: "Alignment of code generation models; post-training methodology"
    potential_beneficiaries: >
      Researchers designing RL-based code alignment methods; practitioners
      choosing between DPO and execution-RL for production code assistants;
      teams auditing model training pipelines for structural learning.
    scale_of_impact: >
      Code LLMs are deployed in millions of developer environments. Alignment
      method selection affects the structural correctness, robustness, and
      interpretability of AI-generated code at scale.

# ─────────────────────────────────────────────────────────────────────────────
# PROBLEM FRAMING (three levels)
# ─────────────────────────────────────────────────────────────────────────────

problem_framing:
  surface_problem:
    description: >
      Execution-feedback RL and DPO are both widely used to post-train code LLMs,
      but they are typically compared only on benchmark pass@1 scores.
    common_understanding: >
      Papers compare methods by final accuracy. GRPO/PPO methods often outperform
      DPO on code benchmarks, which is taken as evidence that execution feedback
      is the better alignment signal.

  deeper_problem:
    description: >
      Pass@1 comparisons conflate two distinct phenomena: (1) genuinely different
      structural policy movement — models learning to write functionally different,
      semantically richer code — versus (2) confidence redistribution — models
      becoming more decisive about existing patterns without structural change.
      These two phenomena have different implications for generalization,
      interpretability, and robustness, yet benchmark scores cannot distinguish them.
    why_overlooked: >
      The field has focused on benchmark outcomes (pass@1) as the primary evaluation
      signal. AST-level analysis of policy movement requires combining multiple tools
      (ZSS edit distance, KL divergence matching, FA-AST taxonomy) that are available
      in isolation but have not been composed into a unified metric framework.
    our_perspective: >
      We reframe the question from "which method achieves higher pass@1?" to
      "which method induces structurally richer policy movement per unit of
      KL divergence from the base model?" This yields a more diagnostic metric:
      semantic-edit-per-KL (structural efficiency).

  gap_in_existing_work:
    description: >
      No controlled, head-to-head comparison of execution-RL and DPO exists under
      identical base model, training data, and compute budget conditions — and no
      metric for measuring structural quality of policy movement (as opposed to
      benchmark outcome) has been proposed or validated.
    why_gap_exists: >
      Controlled comparisons require significant compute and careful experimental
      design (KL-matched checkpoints, identical data regimes). The AST-level
      measurement framework (FA-AST taxonomy + ZSS edit distance + KL matching)
      requires combining tools from multiple communities (program analysis,
      information theory, statistical testing) that have not been integrated.
    why_gap_matters: >
      Without this metric, the field cannot rigorously answer whether execution-RL
      produces structurally different policies or merely more confident ones.
      A validated measurement framework is a prerequisite for any principled
      comparison of alignment methods for code generation.

# ═══════════════════════════════════════════════════════════════════════════════
# PART 2: THE INSIGHT
# ═══════════════════════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: >
      Policy movement quality in code generation can be measured as semantic AST
      edit distance per unit KL divergence — structural efficiency — separating
      genuine program-structural learning from surface-level confidence shifts.
    expanded_explanation: >
      The key insight is that KL divergence from the base model is a budget for
      policy change, and semantic AST edit distance (restricted to control-flow
      and data-flow nodes via FA-AST taxonomy) measures how much of that budget
      goes toward structurally meaningful program transformations. The ratio —
      structural efficiency — is a diagnostic that applies equally to any
      post-training method and can be computed from model checkpoints without
      additional training. Our preliminary experiments reveal an unexpected
      finding: while GRPO produces higher raw AST edit distances than DPO
      (suggesting more aggressive structural change), the proportion of edits
      targeting semantic nodes (SEP) is nearly identical — a finding that
      challenges the assumed mechanism of execution-RL superiority.

  why_others_missed_it:
    common_assumptions: >
      Prior work assumes pass@1 improvements from execution-RL reflect better
      structural understanding. The field has lacked both the metric (structural
      efficiency) and the experimental infrastructure (KL-matched checkpoints,
      FA-AST decomposition) to test this assumption.
    our_different_view: >
      We separate the question of WHAT a model achieves (pass@1) from HOW its
      policy moves (structural efficiency). This requires treating policy movement
      as an object of study in its own right, not just a means to benchmark ends.
    enabling_factor: >
      The combination of ZSS-based AST edit distance (validated by arXiv:2404.08817),
      FA-AST taxonomy for node classification (arXiv:2002.08653), and KL-matched
      checkpoint comparison provides the necessary toolkit. TRL's unified GRPO/DPO
      interface enables controlled training under identical conditions.

  what_makes_it_work:
    intuitive_explanation: >
      Think of policy movement as a "budget" measured by KL divergence from the
      base model. Semantic efficiency asks: of all the probability mass you moved,
      how much went toward changing control flow and data operations (the parts
      that determine whether code is correct) versus surface style (whitespace,
      variable naming, comment placement)? A high-efficiency method spends its
      KL budget on the parts that matter most for functional correctness.
    key_mechanism: >
      FA-AST taxonomy classifies Python AST nodes into CONTROL_FLOW
      ({If, For, While, Try, With}), DATA_FLOW ({Assign, Call, Return, FunctionDef}),
      and SURFACE categories. ZSS tree edit distance counts minimum node
      operations between two ASTs. Restricting edit distance to CF+DF nodes
      and dividing by KL divergence at matched checkpoints yields the
      structural efficiency metric. The metric is interpretable, reproducible,
      and composable with any checkpoint-producing training run.
    analogy: >
      Analogous to measuring learning efficiency in students: two students may
      both improve their test scores (pass@1), but one is learning underlying
      principles (structural efficiency) while the other is memorizing surface
      patterns (low structural efficiency). The score alone cannot tell them apart.

