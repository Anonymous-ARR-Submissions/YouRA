section_goals:

  abstract:
    narrative_purpose: "Compress the story: gap → framework → findings → implications"
    key_message: >
      We lack tools to distinguish structural learning from confidence shifts in
      code alignment methods. We provide the first measurement framework for this,
      find that the infrastructure works, and reveal a surprising preliminary result
      about SEP proportions.
    structure_notes: |
      - Sentence 1: The diagnostic gap (execution-RL vs DPO: structural or confidence?)
      - Sentence 2: What the field has been missing
      - Sentence 3: Our framework (structural efficiency = semantic-edit-per-KL)
      - Sentence 4: Framework validation result (end-to-end functional)
      - Sentence 5: Preliminary finding (SEP near-equality despite raw edit distance gap)
      - Sentence 6: Implication (checkpoint aliasing confound + corrected protocol)
    avoid:
      - "Claiming empirical GRPO superiority (not validated)"
      - "Citing numbers from synthetic h-e1 data as real findings"
      - "Vague 'novel framework' without what it measures"

  introduction:
    narrative_purpose: "Hook → Problem → Insight → Contributions"
    hook_strategy: >
      Puzzle/paradox: execution-RL produces higher raw AST edit distances than DPO,
      yet the proportion targeting semantic nodes is identical. What does this mean?
      Use this as the opening puzzle, then walk back to motivate the framework.
    problem_escalation: |
      Level 1: Execution-RL and DPO are compared on pass@1 (known to all)
      Level 2: pass@1 cannot distinguish structural learning from confidence shifts
      Level 3: No metric or framework exists to make this distinction under controlled conditions
    insight_preview: >
      Introduce "structural efficiency" as the ratio of semantic AST edit distance
      to KL divergence — a single number that characterizes how a method spends
      its "policy change budget."
    contributions_framing: |
      Frame as three natural outcomes of the insight:
      1. The structural efficiency metric and its formal definition
      2. An end-to-end measurement framework (FA-AST + ZSS + KL-matching + bootstrap CI)
      3. A preliminary empirical analysis with a surprising finding and a documented
         methodological confound (checkpoint aliasing)
    transition_to_related_work: >
      "To understand where this framework fits, we survey three lines of work:
      execution-feedback RL for code, AST-based code analysis, and alignment
      method comparison — showing that none of them provides structural efficiency
      measurement under controlled conditions."

  related_work:
    narrative_purpose: "Show three insufficient lines of work → gap → our approach"
    positioning_strategy: >
      Not dismissive of prior work — each area has made real progress, but none
      answers the specific question of structural efficiency comparison. We are
      filling a specific gap, not replacing prior work.
    key_comparison_points:
      - area: "Execution-feedback RL for code generation"
        limitation_to_highlight: >
          CodeRL, PPOCoder, TÜLU 3, CodeRL+: all compare on pass@1. None measures
          how the policy moves structurally relative to the base model.
        how_we_differ: >
          We add a structural dimension to the evaluation of these methods,
          complementing pass@1 with a diagnostic about policy movement quality.
      - area: "AST-based code analysis"
        limitation_to_highlight: >
          FA-AST taxonomy (arXiv:2002.08653) and ZSS edit distance (arXiv:2404.08817)
          provide node classification and edit distance primitives, but neither is
          combined with KL divergence into a training-diagnostic metric.
        how_we_differ: >
          We compose these tools into a unified framework specifically designed for
          checkpoint comparison in post-training analysis.
      - area: "Alignment method comparison and KL-divergence analysis"
        limitation_to_highlight: >
          DPO vs RLHF comparisons (Rafailov et al., 2023; Azar et al., 2024)
          focus on preference optimization theory and benchmark outcomes. KL
          divergence is used as a training constraint, not as a structural
          analysis tool.
        how_we_differ: >
          We use KL divergence as a normalizer for structural movement, turning
          it into a diagnostic rather than a constraint.
    papers_to_discuss:
      - "CodeRL (Le et al., 2022)"
      - "PPOCoder (Shojaee et al., 2023)"
      - "TÜLU 3 (Lambert et al., 2024)"
      - "CodeRL+ (Jiang et al., 2025, arXiv:2510.18471)"
      - "DPO (Rafailov et al., 2023)"
      - "GRPO (Shao et al., 2024)"
      - "FA-AST (Wang et al., 2020, arXiv:2002.08653)"
      - "ZSS edit distance / AST similarity (arXiv:2404.08817)"
      - "DeepSeek-Coder (Guo et al., 2024)"
      - "evalplus (Liu et al., 2023)"

  methodology:
    narrative_purpose: "Define structural efficiency formally, describe framework components"
    connection_to_insight: >
      The framework is a direct operationalization of the key insight: measure
      how much of the KL budget goes toward semantic AST transformations.
      Each component addresses a specific challenge in making this measurement
      rigorous and reproducible.
    key_design_decisions:
      - decision: "FA-AST taxonomy for node classification (not custom taxonomy)"
        rationale: >
          Uses an established, reproducible classification (arXiv:2002.08653)
          rather than ad hoc rules. Control-flow and data-flow node sets are
          theoretically grounded in program analysis.
        alternatives_considered: >
          Could classify nodes by syntactic role (statements vs expressions) or
          by execution relevance heuristics. FA-AST provides a principled,
          literature-validated alternative.
      - decision: "ZSS tree edit distance (not token-level or line-level diff)"
        rationale: >
          AST-level edit distance captures structural program changes that
          token-level diffs miss (e.g., refactoring a loop as equivalent edits).
          ZSS is the standard minimum-cost tree edit distance algorithm.
        alternatives_considered: >
          BLEU/CodeBLEU operate at token level. Line-level diffs miss structural
          equivalences. Graph edit distance is NP-hard for general DAGs.
      - decision: "KL-matched checkpoint comparison (not step-aligned)"
        rationale: >
          GRPO and DPO diverge from the base model at different rates per step.
          KL-matching ensures we compare checkpoints with equal policy divergence,
          making structural efficiency a fair comparison across methods.
        alternatives_considered: >
          Step-aligned comparison conflates training speed with structural quality.
          FLOPs-aligned comparison requires hardware-specific compute tracking.
      - decision: "Bootstrap CI for statistical testing (10,000 samples)"
        rationale: >
          Bootstrap CI makes no parametric assumptions about the distribution
          of structural efficiency differentials, appropriate for a metric with
          unknown distribution properties.
        alternatives_considered: >
          t-test assumes normality. Mann-Whitney is appropriate for paired
          comparisons but requires sufficient unique checkpoints — a requirement
          we document as a methodological constraint.
    intuition_building: |
      Use Figure 6 (ast_node_heatmap.png) to illustrate FA-AST taxonomy visually.
      Walk through a concrete example: given two Python functions f_grpo and f_dpo
      that are equally distant from the base in KL terms, show how semantic edit
      distance differs between them.

  experiments:
    narrative_purpose: "Describe controlled setup + honest reporting of what ran vs. what was planned"
    experimental_questions:
      - question: "RQ1: Is the measurement framework functionally correct?"
        experiment: >
          End-to-end execution on DeepSeek-Coder-7B-instruct-v1.5: AST decomposition,
          KL matching, bootstrap CI, SEP computation. Verify on known synthetic
          data with ground-truth structural properties.
        expected_outcome: >
          Framework executes without errors; SEP values in [0,1]; CI correctly
          excludes zero for data where GRPO has guaranteed higher edit distance.
      - question: "RQ2: Do GRPO and DPO exhibit different Semantic Edit Proportions?"
        experiment: >
          KL-matched checkpoint pairs from GRPO and DPO training runs on
          HumanEval+/MBPP+. Mann-Whitney U test on SEP distributions.
          Note: preliminary analysis only (underpowered due to checkpoint aliasing).
        expected_outcome: >
          If hypothesis holds: SEP_GRPO > SEP_DPO with p < 0.05.
          Actual result: p = 0.4248, near-equal SEP (preliminary, confounded).
      - question: "RQ3: What are the confounds in checkpoint-comparison studies?"
        experiment: >
          Document and characterize checkpoint aliasing: measuring effective n
          from a nominally 27-pair analysis that collapsed to n_effective≈2.
        expected_outcome: >
          Identify aliasing, quantify its effect on statistical power, and
          propose a checkpoint diversity pre-flight check.
    baseline_rationale: >
      DPO is the natural comparison for execution-RL because it represents the
      most widely used alternative post-training objective (preference learning
      without online rollouts). Both trained on identical base model
      (DeepSeek-Coder-7B-instruct-v1.5), identical training data
      (CodeAlpaca/OSS-Instruct subset), and identical compute budget.
    dataset_rationale: >
      HumanEval+ (164 problems) and MBPP+ (378 problems) via evalplus provide
      the standard function-level code generation benchmark, consistent with
      all referenced baselines. Their structured nature makes AST analysis
      well-defined (Python functions with clear input/output contracts).
    metric_rationale: >
      Structural efficiency (semantic-edit-per-KL) is our primary contribution.
      SEP (Semantic Edit Proportion) measures the fraction of edits targeting
      semantic nodes. Both are reported for transparency. Pass@1 is not the
      primary metric here — it is used only to confirm training progressed.

  results:
    narrative_purpose: "Report framework validation, preliminary SEP finding, aliasing confound"
    main_result_highlight: >
      The measurement framework executes correctly end-to-end. The preliminary
      SEP analysis (n_effective≈2 due to checkpoint aliasing) shows GRPO and DPO
      have nearly identical semantic edit proportions (≈0.237), while GRPO shows
      higher raw semantic edit distance (+250% on proof-of-concept data).
    result_presentation_order:
      - result: "Framework validation (h-e1 PoC)"
        purpose: >
          Establish that the infrastructure works before reporting any comparative result.
          Figure 1 (edit_per_kl_comparison.png), Figure 2 (bootstrap_ci_differential.png),
          Figure 3 (ast_edit_distances.png) support this.
      - result: "Preliminary SEP comparison (h-m1)"
        purpose: >
          Report the actual SEP numbers honestly. Figure 4 (gate_sep_comparison.png)
          is the key figure. Acknowledge n_effective≈2 immediately.
      - result: "Checkpoint aliasing characterization"
        purpose: >
          Figure 8 (sep_vs_kl_trajectory.png) and Figure 5 (ast_edit_distribution.png)
          illustrate the aliasing. This is a positive contribution, not a failure to hide.
      - result: "Raw edit distance vs SEP dissociation"
        purpose: >
          The divergence between h-e1 (raw edit distance: GRPO +250%) and h-m1
          (SEP: near-equal) is itself a finding worth highlighting.
    surprising_result_handling: >
      The SEP near-equality is reported as a genuine preliminary finding, not
      as a failure. The three competing interpretations (mechanism false, aliasing
      masking real difference, scale equilibration) are all presented.

  discussion:
    narrative_purpose: "Interpret findings, document confound, recommend corrected protocol"
    key_findings_interpretation: >
      The measurement framework is validated. The SEP hypothesis is unresolved
      but the preliminary null finding and the raw/proportion dissociation are
      themselves scientifically informative. Checkpoint aliasing is a previously
      undocumented confound that affects any RL fine-tuning analysis.
    honest_limitations:
      - limitation: >
          H-E1 gate passed on synthetic (hand-crafted) code with guaranteed
          GRPO advantage. No real-training validation of GRPO raw edit distance
          advantage exists.
        why_acceptable: >
          The paper's main contribution is the framework, not the empirical comparison.
          The PoC demonstrates infrastructure correctness, not hypothesis truth.
        future_mitigation: >
          FW-1: Real training run with ≥10 GRPO checkpoints and execution-oracle DPO.
      - limitation: >
          H-M1 analysis is underpowered (n_effective≈2 due to checkpoint aliasing).
          Mann-Whitney and Spearman tests are invalid with this effective sample size.
        why_acceptable: >
          We report this openly, characterize the aliasing mechanism, and treat
          the result as preliminary only. The infrastructure (AST decomposition,
          SEP pipeline) is still validated.
        future_mitigation: >
          FW-2: Pre-flight checkpoint diversity check (assert unique checkpoints ≥ N)
          before running multi-pair analysis.
      - limitation: >
          Single base model (DeepSeek-Coder-7B-instruct-v1.5) and single dataset
          (HumanEval+/MBPP+). Results may not generalize to other scales or
          programming languages.
        why_acceptable: >
          Framework design is model-agnostic and language-agnostic (requires
          only AST-parseable code). The 7B scale is a natural starting point.
        future_mitigation: >
          FW-5: Scale sensitivity study (1.3B, 13B); extend to Java, TypeScript.
    broader_impact_statement: >
      This work provides measurement infrastructure for understanding how alignment
      methods change model behavior in code generation. Positive impact: enables
      more principled comparison of post-training methods, potentially reducing
      benchmark-chasing. Potential risk: the structural efficiency metric could
      be gamed if used as a training objective (reward shaping toward high SEP
      without improving functional correctness). We recommend the metric be used
      for analysis, not as a reward signal, until its relationship to functional
      correctness is better understood.

  conclusion:
    narrative_purpose: "Callback to opening puzzle + summarize contributions + future vision"
    callback_to_hook: >
      "We opened by asking whether execution-RL teaches models to think differently
      about code structure. Our preliminary answer is more nuanced than expected:
      GRPO does appear to make more aggressive structural changes (higher raw edit
      distance), but whether it specifically concentrates those changes in
      semantically relevant nodes (SEP) remains an open question — one that our
      framework is now equipped to answer with a corrected experimental run."
    memorable_ending: >
      "The measurement infrastructure is ready. The experiment awaits proper execution."
    future_work_vision: >
      Frame as three steps: (1) validate framework with real training (immediate),
      (2) extend to mechanism chain H-M1→M2→M3→M4 (near-term),
      (3) use structural efficiency as a lens for interpretability of any
      code-generating model (long-term).

