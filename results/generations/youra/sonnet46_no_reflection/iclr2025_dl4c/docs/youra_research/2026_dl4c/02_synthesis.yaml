measurement_plan:
  data_collection:
    - source: "Training checkpoints saved every 10-50 steps (dense checkpoint saving for KL curve)"
    - source: "evalplus pass@k evaluation at each checkpoint"
    - source: "Offline instrumented execution (sys.settrace) on base model for partial correctness density annotation"
    - source: "AST parse of model outputs at each checkpoint for structural edit distance computation"
  procedure:
    - step: "1. Pre-process: Run offline base model instrumented execution on HumanEval+/MBPP+ to annotate partial correctness density and Jaccard stability scores"
    - step: "2. Train: 5 conditions × identical training setup using TRL (GRPOTrainer / DPOTrainer)"
    - step: "3. Evaluate: evalplus pass@k at each checkpoint; compute per-checkpoint KL (Monte Carlo, fixed held-out prompt set)"
    - step: "4. Match checkpoints: Identify KL-matched checkpoints (±5% tolerance) across methods"
    - step: "5. Compute: AST semantic edit distance (zss library, control-flow + data-flow nodes) for matched checkpoints"
    - step: "6. Analyze: Mixed-effects regression (P2), Spearman ρ calibration analysis (P3), granularity × stability interaction (P4), LiveCodeBench R² regression (P5)"
  success_criteria:
    - "P1: Bootstrap 95% CI for efficiency differential excludes zero and magnitude ≥20%"
    - "P2: Mixed-effects coefficient on semantic-edit/KL significant at p < 0.05 after KL/entropy controls"
    - "P3: Spearman ρ ≤ −0.3 between structural efficiency and ECE under entropy matching"
    - "P4: Fine-grained reward ≥5pp over binary only in high-stability tertile (not low-stability)"
    - "P5: R² ≥ 0.25 for LiveCodeBench pass@1 predicted by in-distribution structural efficiency"

validation:
  internal_validity:
    - "KL matching (±5% tolerance) across conditions eliminates optimization-budget confound"
    - "Two equalization regimes (equal prompts vs equal tokens) as robustness check"
    - "Entropy matching before ECE analysis prevents calibration artifacts from distribution sharpening"
    - "Pre-validated AST classifier on 50 held-out problems before main analysis"
    - "DPO preference pair construction specified explicitly (execution oracle) to prevent data confound"
  external_validity:
    - "LiveCodeBench OOD transfer test (contamination-free recent problems)"
    - "Spearman rank correlation alongside R² to guard against distribution shift artifacts"
    - "Test perturbation robustness check (Jaccard stability) to distinguish structural scaffolding from reward hacking"

