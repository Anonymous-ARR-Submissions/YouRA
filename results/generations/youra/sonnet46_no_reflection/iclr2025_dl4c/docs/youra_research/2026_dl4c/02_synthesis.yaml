hypothesis_draft:
  title: "Structural Efficiency of Policy Movement: Execution-Grounded Reward vs Preference-Based Alignment for Code Generation"
  hypothesis_id: "H-StructuralEfficiency-v1"
  core_claim: |
    Under controlled post-training conditions (identical base model, data, compute),
    execution-feedback RL (GRPO) achieves higher structural efficiency of policy movement
    than DPO — measured as greater semantically-relevant AST edit distance per unit KL
    divergence from the base model — and this structural efficiency mediates improvements
    in functional correctness (pass@1), calibration preservation (ECE), reward-granularity
    sensitivity, and OOD transfer (LiveCodeBench).
  mechanism: |
    Execution reward directly penalizes functional incorrectness at the program level,
    forcing probability mass reallocation toward control-flow and data-flow AST
    transformations. DPO optimizes log-probability ratios between preference pairs,
    which may increase model confidence in stylistically plausible but functionally
    incorrect outputs — creating a "preference calibration gap" where model confidence
    tracks stylistic plausibility more than functional correctness. The structural
    efficiency difference is the proximal cause of correctness and transfer advantages.
  predictions:
    - P1: "Execution-RL ≥20% higher semantic-edit-per-KL than DPO at KL-matched checkpoints (bootstrap 95% CI excludes zero)"
    - P2: "Semantic-edit-per-KL significantly mediates pass@1 in mixed-effects regression after controlling for KL and entropy"
    - P3: "Problem-level structural efficiency negatively correlates with ECE (ρ ≤ −0.3) under entropy-matched conditions"

variables_summary:
  independent: "Alignment method (SFT-only / SFT+DPO / SFT+GRPO-binary / SFT+GRPO-error-type / SFT+GRPO-variable-level)"
  dependent_primary: "pass@1 on HumanEval+/MBPP+ (evalplus); semantic-edit-per-KL at matched checkpoints"
  controlled: "Base model (DeepSeek-Coder-7B), training prompts, total training tokens, evaluation harness (evalplus)"

null_hypothesis:
  h0_statement: |
    There is no significant difference in structural efficiency of policy movement
    (semantic AST edit distance per unit KL) between execution-RL and DPO at matched
    KL budgets; any pass@1 differences are fully explained by total KL or entropy
    differences alone.
  statistical_test: "Bootstrap confidence intervals for efficiency differential; mixed-effects regression with KL/entropy controls"
  significance_level: 0.05

