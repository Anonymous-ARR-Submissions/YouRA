      - load_grpo_dataset returns Dataset with 'prompt' column
      - load_kl_prompts returns exactly 100 strings
      - load_humaneval_plus returns dict with 164 keys
    reference_files:
      architecture: "03_architecture.md#DataModule"
      logic: "03_logic.md#E-1-Data-Pipeline"
      config: "03_config.md#ExperimentConfig"

  - id: "task-004"
    epic: "E-2: Reward Functions + AST Metric"
    title: "Implement rewards.py and ast_metric.py"
    description: |
      Implement execution reward functions (rewards.py):
        - run_evalplus_tests(task_id, completion) → {passed: bool, error_type: str|None}
        - execution_reward_binary(completions, prompts, task_ids, **kwargs) → list[float]
        - execution_reward_error_type(completions, prompts, task_ids, **kwargs) → list[float]
      Implement AST semantic edit distance (ast_metric.py):
        - SEMANTIC_NODE_TYPES = frozenset of CF+DF node names
        - ZSSNode wrapper class for ast.AST → zss interface
        - extract_semantic_ast(code: str) → ZSSNode (raises ValueError on syntax error)
        - compute_ast_semantic_edit_distance(code_a, code_b) → float
        - batch_ast_edit_distances(reference_codes, candidate_codes) → dict[str, float]
      Output files: h-e1/code/rewards.py, h-e1/code/ast_metric.py
    feature_tag: "model"
    priority: 90
    source_document: "03_architecture.md"
    complexity: 12
    test_requirements: |
      - execution_reward_binary returns list of floats in {0.0, 1.0}
      - extract_semantic_ast parses simple Python function without error
      - compute_ast_semantic_edit_distance(code, code) == 0.0
      - batch_ast_edit_distances returns dict with task_id keys
    reference_files:
      architecture: "03_architecture.md#RewardFunctions"
      logic: "03_logic.md#E-2-Rewards-AST"
      config: null

  - id: "task-005"
    epic: "E-5: KL Metric + Checkpoint Matching"
    title: "Implement kl_metric.py"
    description: |
      Implement KL divergence computation and checkpoint matching (kl_metric.py):
        - compute_kl_divergence(model, ref_model, prompts, tokenizer, n_samples=100) → float
          Monte Carlo estimation: per-prompt, no batching (7B OOM risk)
          KL = mean over prompts of: sum_v p_theta(v|ctx) * [log p_theta - log p_ref]
        - load_checkpoint_kl_log(checkpoint_dir: str) → dict[int, float]
          Parse kl_log.json from checkpoint dirs
        - match_checkpoints(kl_logs, tolerance=0.05) → list[dict[str, int]]
          Greedy matching across conditions within ±tolerance absolute KL
      Output file: h-e1/code/kl_metric.py
    feature_tag: "evaluation"
    priority: 87
    source_document: "03_architecture.md"
    complexity: 12
    test_requirements: |
      - compute_kl_divergence returns non-negative float
      - match_checkpoints returns list of dicts with condition keys
      - load_checkpoint_kl_log returns {step: kl} dict
    reference_files:
      architecture: "03_architecture.md#KLMetric"
      logic: "03_logic.md#E-5-KL-Metric"
      config: "03_config.md#ExperimentConfig"

  - id: "task-006"
    epic: "E-3: GRPO Training"
    title: "Implement train_grpo.py"
    description: |
      Implement GRPO training script (train_grpo.py):
        - train_grpo(cfg, reward_variant: str, output_dir: str) → str
          reward_variant in {"binary", "error_type"}
          Initialize GRPOTrainer with reward_funcs=[selected_fn]
          Add KL logging callback that writes kl_log.json at each checkpoint
          Save checkpoints every cfg.grpo_save_steps steps
          Returns path to final checkpoint directory
        - CLI: python train_grpo.py --variant binary|error_type
      Output file: h-e1/code/train_grpo.py
    feature_tag: "training"
    priority: 84
    source_document: "03_architecture.md"
    complexity: 13
    test_requirements: |
      - GRPOConfig created with correct fields from ExperimentConfig
      - reward_funcs wired correctly by variant name
      - kl_log.json written to checkpoint dir
    reference_files:
      architecture: "03_architecture.md#TrainGRPO"
      logic: "03_logic.md#E-3-GRPO-Training"
      config: "03_config.md#GRPOConfig-Mapping"

  - id: "task-007"
    epic: "E-4: DPO Training"
    title: "Implement train_dpo.py"
    description: |
      Implement DPO training script (train_dpo.py):
        - train_dpo(cfg, output_dir: str) → str
          Call generate_dpo_pairs() if cache not found (dpo_pairs_cache.json)
          Dataset columns: {prompt, chosen, rejected}
          Load frozen ref_model separately
          Initialize DPOTrainer with DPOConfig
          Save checkpoints every cfg.dpo_save_steps steps
          Returns path to final checkpoint directory
        - CLI: python train_dpo.py
      Output file: h-e1/code/train_dpo.py
    feature_tag: "training"
    priority: 81
    source_document: "03_architecture.md"
    complexity: 11
    test_requirements: |
