        - run_all_conditions(cfg) → dict
          Sequential: SFT-only → SFT+DPO → SFT+GRPO-binary → SFT+GRPO-error-type
        - save_results(results, output_dir) → None
          Save results.json to output_dir
        - CLI: python run_experiment.py
      Implement figure generation (visualize.py):
        - plot_gate_metric_comparison(results, cfg) → str [MANDATORY figure]
          Bar chart: semantic-edit-per-KL for all 4 conditions + 95% CI error bars
          Saved to cfg.figures_dir/gate_metric_comparison.png
        - plot_kl_trajectories(kl_logs, cfg) → str
        - plot_ast_vs_kl_scatter(results, cfg) → str
        - plot_pass1_curves(results, cfg) → str
        - generate_all_figures(results, kl_logs, cfg) → list[str]
      Output files: h-e1/code/run_experiment.py, h-e1/code/visualize.py
    feature_tag: "experiment"
    priority: 75
    source_document: "03_architecture.md"
    complexity: 10
    test_requirements: |
      - run_all_conditions returns dict with all 4 condition keys
      - generate_all_figures returns list of 4 file paths
      - All figure files saved to correct paths
    reference_files:
      architecture: "03_architecture.md#RunExperiment"
      logic: "03_logic.md#E-7-Orchestrator"
      config: "03_config.md#ExperimentConfig"

  # ─── FAILSAFE (priority 1) ─────────────────────────────────────────────────
  - id: "task-010"
    epic: "Pipeline Continuation"
    title: "Failsafe: Verify gate condition and update verification_state.yaml"
    description: |
      After all experiment conditions complete and bootstrap CI is computed:
        1. Read bootstrap_ci result from results.json
        2. Check gate: ci_lower > 0 AND point_estimate >= 0.20
        3. Update verification_state.yaml:
           - h-e1.validation.status = COMPLETED
           - h-e1.gate.satisfied = true/false
           - h-e1.validation.key_findings = [bootstrap CI result summary]
        4. If gate fails: set h-e1.status = FAILED, stop pipeline
        5. If gate passes: set h-e1.status = COMPLETED
      This task must run LAST regardless of previous task outcomes.
    feature_tag: "pipeline-continue"
    priority: 1
    source_document: "03_prd.md"
    complexity: null
    test_requirements: |
      - verification_state.yaml updated correctly after gate evaluation
      - Gate result stored with CI bounds and point estimate
    reference_files:
      architecture: null
      logic: null
      config: null

