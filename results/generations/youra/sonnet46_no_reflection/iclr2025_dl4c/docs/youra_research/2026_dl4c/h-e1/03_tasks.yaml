      logic: "03_logic.md#E-4-DPO-Training"
      config: "03_config.md#DPOConfig-Mapping"

  - id: "task-008"
    epic: "E-6: Evaluation + Bootstrap CI"
    title: "Implement evaluate.py"
    description: |
      Implement full evaluation pipeline (evaluate.py):
        - generate_solutions(model_path, problems, tokenizer_id, cfg) → dict[str, str]
          Greedy decode (do_sample=False) for deterministic pass@1
        - run_evalplus_evaluation(solutions_path, dataset) → dict[str, float]
          Call evalplus CLI for HumanEval+ and MBPP+
        - compute_semantic_edit_per_kl(ast_distances, kl_value) → float
          Mean AST edit distance / KL value
        - bootstrap_ci(grpo_efficiencies, dpo_efficiencies, n_samples=10000, ci=0.95) → dict
          Returns {point_estimate, ci_lower, ci_upper, gate_pass: bool}
          Gate passes if ci_lower > 0.20 (both bounds above magnitude threshold)
        - run_full_evaluation(condition_checkpoints, cfg) → dict
          Iterate KL-matched pairs, accumulate per-condition efficiency arrays
      Output file: h-e1/code/evaluate.py
    feature_tag: "evaluation"
    priority: 78
    source_document: "03_architecture.md"
    complexity: 14
    test_requirements: |
      - bootstrap_ci gate_pass=True when differential clearly > 0.20
      - bootstrap_ci gate_pass=False when differential near 0
      - compute_semantic_edit_per_kl handles kl_value=0 gracefully
    reference_files:
      architecture: "03_architecture.md#Evaluate"
      logic: "03_logic.md#E-6-Evaluation-Bootstrap"
      config: "03_config.md#ExperimentConfig"

  - id: "task-009"
    epic: "E-7: Orchestrator + Visualization"
    title: "Implement run_experiment.py and visualize.py"
    description: |
