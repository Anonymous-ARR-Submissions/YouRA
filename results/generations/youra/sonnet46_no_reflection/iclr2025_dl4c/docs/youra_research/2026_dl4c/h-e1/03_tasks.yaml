  # ─── EPIC IMPLEMENTATION TASKS (priority 93-50) ───────────────────────────
  - id: "task-003"
    epic: "E-1: Setup + Data Pipeline"
    title: "Implement config.py and data.py"
    description: |
      Implement ExperimentConfig dataclass (config.py) and all data loading
      functions (data.py):
        - ExperimentConfig with all fields and defaults per 03_config.md
        - get_config() factory function
        - load_grpo_dataset(cfg) → Dataset (CodeAlpaca-20K with DeepSeek chat template)
        - load_kl_prompts(cfg) → list[str] (fixed 100-prompt held-out set, seed=42)
        - generate_dpo_pairs(cfg, model_id) → Dataset (execution-oracle preference pairs)
        - load_humaneval_plus() → dict (164 problems)
        - load_mbpp_plus() → dict (378 problems)
      Output files: h-e1/code/config.py, h-e1/code/data.py
    feature_tag: "data-pipeline"
    priority: 93
    source_document: "03_architecture.md"
    complexity: 10
    test_requirements: |
