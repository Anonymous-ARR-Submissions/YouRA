gap_description: |
  No single study systematically compares RLHF, DPO, and execution-feedback RL under
  identical conditions (same base model, same dataset, same benchmarks). A controlled
  ablation study is needed holding base model (DeepSeek-Coder-7B), training data, and
  evaluation benchmarks (HumanEval+, MBPP+, LiveCodeBench) constant while varying ONLY
  the alignment method: SFT-only, SFT+DPO, SFT+RLHF, SFT+binary-execution-RL,
  SFT+granular-execution-RL.

