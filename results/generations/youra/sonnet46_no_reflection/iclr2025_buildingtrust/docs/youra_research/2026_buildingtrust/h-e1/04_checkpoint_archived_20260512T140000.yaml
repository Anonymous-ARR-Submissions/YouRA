  actual_data_source: Hard-coded PUBLISHED_MODEL_DATA constant with 32 manually specified
    rows of benchmark scores in data_assembly.py
  checked_at: '2026-05-12T12:09:20.952683'
  confidence: HIGH
  expected_dataset: TrustLLM benchmark dataset (robustness section) + lm-evaluation-harness
    public results
  method: external_llm_verification
  reasoning: The code defines a hard-coded PUBLISHED_MODEL_DATA list with all 32 models'
    advglue_drop, capability scores, and mean_confidence values pre-filled as literals.
    When TrustLLM HuggingFace and local JSON files are unavailable (the expected default
    path since no data directory is provided), the code falls back unconditionally
    to this static table — meaning the experiment always runs on these hand-crafted
    numbers. Because the advglue_drop values in the table (range ~0.089–0.334, SD
    ≈ 0.065) and capability scores are chosen to guarantee SD > 0.05 and R² < 0.80,
    the gate conditions are structurally pre-determined by the hard-coded data itself.
  status: FAILED
  violations:
  - data_assembly.py:33-73 — PUBLISHED_MODEL_DATA is a 32-row hard-coded table with
    all benchmark scores (advglue_drop, mmlu, gsm8k, bbh, hellaswag, winogrande, mean_confidence)
    manually specified as literals, not loaded from TrustLLM or lm-evaluation-harness
  - data_assembly.py:143-144 — Fallback unconditionally returns the hard-coded table
    as real data when TrustLLM HF and local JSON are unavailable, which is always
    the case in a fresh environment
  - data_assembly.py:179-181 — load_lmeval_scores() also falls back to the same PUBLISHED_MODEL_DATA
    table for capability columns, so both data sources collapse to the same hand-crafted
    constant
  - data_assembly.py:36-72 — advglue_drop values are pre-selected (range 0.089–0.334)
    to guarantee SD > 0.05 gate threshold, making the gate result tautologically determined
    by the hard-coded values
