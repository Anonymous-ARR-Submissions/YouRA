main_hypothesis:
  id: H-ResidualInstability-v1
  title: Residual Instability as an Orthogonal Trust-Failure Predictor in LLMs
  statement: 'Under a diverse set of ≥30 LLMs spanning ≥3 families, ≥2 scales, and ≥2 training

    regimes, if adversarial robustness fragility (AdvGLUE accuracy drop) is residualized

    against a composite capability index (PC1 of MMLU/GSM8K/BBH/HellaSwag/WinoGrande)

    and mean model confidence to produce a Residual Instability score (RI), then RI

    will significantly predict calibration error (ECE), hallucination rate (HaluEval),

    and out-of-sample safety failure (HarmBench) — because adversarial fragility reflects

    a domain-general structural property of the model''s decision surface that is orthogonal

    to capability and causes coupled failure across trust dimensions.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: TrustLLM + lm-evaluation-harness multi-benchmark matrix
    model: ≥30 LLMs spanning LLaMA-series, Mistral-series, GPT-series
    optimizer: null
    hyperparameters:
      capability_benchmarks:
      - MMLU
      - GSM8K
      - BBH
      - HellaSwag
      - WinoGrande
      adversarial_benchmark: AdvGLUE
      trust_benchmarks:
      - ECE
      - HaluEval
      - HarmBench
      ovi_temperature: 0.7
      ovi_samples: 20
      min_models: 30
      lofo_folds: 3
