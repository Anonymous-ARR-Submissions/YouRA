# Narrative Blueprint for Phase 6 Paper
# Research: Residual Instability as an Orthogonal Trust-Failure Predictor in LLMs
# Generated: 2026-05-12T15:50:00
# Version: 2.0 (Story Group Architecture)

metadata:
  hypothesis_id: "H-ResidualInstability-v1"
  synthesis_verdict: "PARTIALLY_REFUTED"
  narrative_approach: "counterintuitive_finding"
  primary_contribution: "RI construct + inverted RI-ECE anticorrelation as novel empirical finding"

# ============================================================================
# HOOK DESIGN
# ============================================================================

hook:
  opening_statement:
    content: >
      Models that crumble under adversarial attack are, paradoxically, better calibrated than their
      robust counterparts — at least when capability is held constant. Across 30 large language models
      spanning 9 families, we find that adversarial fragility and calibration error are significantly
      anticorrelated (ρ = −0.535, p = 0.0034) after controlling for general capability, directly
      contradicting the intuitive prediction that brittle models should also be overconfident.
    strategy: "counterintuitive_finding"
    why_it_works: >
      Opens with a concrete, surprising empirical result stated as a paradox. Gives the exact
      numbers upfront. Forces the reader to ask: why would this be? Sets up the calibration-robustness
      trade-off framing immediately.

  why_reader_should_care:
    main_reason: >
      Researchers and practitioners routinely assume that adversarially fragile models are
      comprehensively untrustworthy — that robustness failures signal broader calibration,
      hallucination, and safety problems. This assumption underlies much of the LLM evaluation
      community's effort to link benchmark scores across trust dimensions.
    concrete_example: >
      DecodingTrust and TrustLLM — the two leading multi-dimension trustworthiness suites — report
      dimension scores independently precisely because the cross-dimension coupling is assumed but
      unverified. If adversarial fragility actually anticorrelates with calibration, these evaluation
      frameworks may be measuring orthogonal failure modes whose interaction is opposite to expected.
    stakes: >
      If the coupled failure cascade hypothesis is wrong, interventions that improve adversarial
      robustness may actually worsen calibration (and vice versa), creating a genuine engineering
      trade-off that current evaluation frameworks do not capture.

# ============================================================================
# PROBLEM FRAMING (Three Levels)
# ============================================================================

problem_framing:
  surface_problem:
    description: >
      Large language models fail in multiple trust dimensions — they can be adversarially fragile,
      miscalibrated, prone to hallucination, and unsafe — and these failures are costly in deployment.
    common_understanding: >
      The field has produced dedicated benchmarks for each dimension (AdvGLUE, ECE, HaluEval,
      HarmBench) and multi-dimension suites (DecodingTrust, TrustLLM), but evaluates dimensions
      independently.

  deeper_problem:
    description: >
      No systematic study has tested whether adversarial robustness fragility — after controlling
      for general capability — *predicts* other trust failures. The implicit assumption of a coupled
      failure cascade (fragile → miscalibrated → hallucinates → unsafe) has never been empirically
      validated or refuted at scale.
    why_overlooked: >
      Capability confounding: larger models are simultaneously more robust AND better calibrated,
      making raw correlations uninformative. Residualizing adversarial fragility against capability
      to isolate a pure instability signal requires a construct-engineering step that prior work
      has not taken.
    our_perspective: >
      We operationalize Residual Instability (RI) — the OLS residual of AdvGLUE accuracy drop
      after regressing out capability-PC1 and mean confidence — as a capability-orthogonal
      instability measure, then test its predictive relationship with ECE across 30 diverse LLMs.

  gap_in_existing_work:
    description: >
      No prior work computes partial correlations between residualized adversarial fragility and
      calibration error across a diverse multi-family LLM set while controlling for capability.
    why_gap_exists: >
      The construct engineering required (PCA capability index + OLS residualization) is
      non-trivial, and the necessary data (multi-benchmark matrix across 30+ models) only
      recently became accessible via Open LLM Leaderboard v2 and TrustLLM ICML 2024 data.
    why_gap_matters: >
      If the coupling direction is inverted — fragile models are *better* calibrated — then the
      coupled failure cascade model is wrong and the trade-off structure of LLM trust requires
      fundamental reconceptualization.

# ============================================================================
# KEY INSIGHT
# ============================================================================

key_insight:
  aha_moment:
    one_sentence: >
      Adversarial fragility and calibration on reasoning tasks are anticorrelated after capability
      control, consistent with a calibration–robustness trade-off driven by RLHF/instruction tuning
      rather than a coupled failure cascade.
    expanded_explanation: >
      RLHF and instruction tuning simultaneously improve in-distribution calibration (models better
      match confidence to accuracy on reasoning tasks) and create specific adversarial vulnerabilities
      (jailbreaks, boundary sharpening at distribution edges). This produces a negative partial
      correlation: instruction-tuned models have lower RI (more robust on AdvGLUE after capability
      control) AND lower ECE (better calibrated). Pretrained-only models show the inverse. The
      coupled failure cascade hypothesis — which predicts that sharp boundaries cause overconfidence —
      does not account for this training-regime confound that survives capability-PC1 control.

  why_others_missed_it:
    common_assumptions: >
      Prior work assumes adversarial fragility and miscalibration are manifestations of the same
      underlying weakness (poor representation quality or training), predicting they should correlate
      positively. DecodingTrust and TrustLLM report dimensions independently, never testing this.
    our_different_view: >
      By residualizing adversarial fragility against capability (constructing RI), we isolate a
      signal that is orthogonal to the capability dimension where the trade-off lives. This reveals
      the inverted relationship that is masked when raw correlations (confounded by capability) are
      examined.
    enabling_factor: >
      Access to Open LLM Leaderboard v2 per-model probability outputs enabled ECE computation from
      arc_challenge log-likelihoods for all 30 models — previously unavailable at this scale.

  what_makes_it_work:
    intuitive_explanation: >
      Think of a perfectly instruction-tuned model: it has been trained to be confident when right
      and uncertain when wrong (good calibration), but this very training sharpens its decision
      boundaries at the edges of its training distribution, making it vulnerable to adversarial
      perturbations. The model is NOT comprehensively untrustworthy — it is well-calibrated but
      adversarially brittle.
    key_mechanism: >
      RLHF/instruction tuning creates a trade-off: it improves in-distribution reliability
      (calibration, truthfulness) while simultaneously sharpening boundary regions to adversarial
      attacks. PC1 captures raw capability scale effects, but the training-regime confound
      (pretrained vs. instruction-tuned) generates the inverted RI–ECE partial correlation.

# ============================================================================
# EVIDENCE NARRATIVE
# ============================================================================

evidence_narrative:
  main_claim:
    statement: >
      The RI construct is non-degenerate and measurable (H-E1 PASS), and the RI–ECE partial
      correlation is significantly negative (ρ=−0.535, p=0.0034, n=30), refuting the predicted
      positive coupling and revealing a calibration–robustness trade-off.
    measurable_criteria:
      h_e1: "SD(AdvGLUE_drop)=0.1212 > 0.05; R²_residualization=0.5285 < 0.80"
      h_m1: "ρ(RI, ECE|PC1, mean_conf)=−0.535, p=0.0034, 95% CI=[−0.782, −0.101]"

  supporting_evidence:
    - id: "evidence_1"
      what: "RI construct validity (H-E1): SD=0.1212, R²=0.5285, VIF=1.000"
      so_what: >
        RI is a non-degenerate, non-redundant instability signal — capability explains only 53% of
        adversarial fragility variance, confirming substantial model-specific instability orthogonal
        to general ability.
      how_it_supports_claim: >
        Establishes that the RI signal being analyzed in H-M1 is real and not a capability artifact.

    - id: "evidence_2"
      what: "Overall anticorrelation: ρ(RI, ECE|PC1)=−0.535, p=0.0034, 95% CI=[−0.782, −0.101]"
      so_what: >
        The relationship is statistically robust (p=0.0034, well below α=0.05) and the CI excludes
        zero by a wide margin — this is not a marginal or noise-driven result.
      how_it_supports_claim: "Primary evidence for the calibration–robustness trade-off hypothesis."

    - id: "evidence_3"
      what: "Family heterogeneity: LLaMA ρ=−0.244, Mistral ρ=−0.827, Qwen ρ=+0.364 (n.s.)"
      so_what: >
        The trade-off is not universal — Qwen shows the opposite sign, suggesting family-specific
        training regimes or data compositions modulate the relationship. Mistral shows the strongest
        anticorrelation, consistent with heavy RLHF application in Mistral-Instruct variants.
      how_it_supports_claim: >
        Supports the RLHF-mechanism interpretation: families with more instruction-tuned variants
        show stronger negative RI–ECE correlations.

    - id: "evidence_4"
      what: "Baseline comparison: ρ(PC1, ECE)=−0.511, ρ(RI, ECE|PC1)=−0.535"
      so_what: >
        RI adds minimal unique predictive signal over capability-PC1 for ECE. The anticorrelation
        is largely capability-mediated, suggesting the trade-off is primarily a function of the
        instruction-tuning confound rather than a purely structural boundary property.
      how_it_supports_claim: >
        Motivates the residual scale confounding interpretation as an alternative to the RLHF
        trade-off, strengthening the paper's intellectual honesty.

  surprising_findings:
    - finding: >
        The predicted positive RI–ECE correlation was not just absent — it was significantly inverted
        (ρ=−0.535 vs. predicted ρ≥+0.4). This is a sign reversal, not a null result.
      why_surprising: >
        Sharp decision boundary → overconfidence is a theoretically motivated prediction supported
        by control-theory analogies and alignment theory. Finding the exact opposite suggests a
        mechanism the hypothesis did not anticipate.
      our_interpretation: >
        RLHF/instruction tuning creates a calibration–robustness trade-off: the same training
        process that improves calibration sharpens adversarial vulnerability. Alternatively,
        residual capability confounding beyond PC1 (the 1.5% below 70% variance threshold) may
        be driving the inverted relationship.

# ============================================================================
# BROADER IMPACT
# ============================================================================

takeaway:
  main_contribution:
    one_sentence: >
      We introduce Residual Instability (RI), a capability-controlled adversarial fragility
      construct, and demonstrate its significant anticorrelation with calibration error across
      30 LLMs — a counterintuitive finding that challenges the coupled failure cascade assumption
      and reveals a calibration–robustness trade-off in current LLMs.
    why_significant: >
      This is the first systematic empirical test of the cross-dimension predictive coupling
      between adversarial robustness and calibration using a capability-residualized construct
      across a diverse multi-family model set.

  implications:
    for_field: >
      Multi-dimension trustworthiness evaluation frameworks (DecodingTrust, TrustLLM) should not
      assume coupled failure cascades. Cross-dimension partial correlations, with proper capability
      control, may reveal orthogonal or inversely-related failure modes that require independent
      mitigation strategies.
    for_practice: >
      Practitioners who improve adversarial robustness of their LLMs should not assume downstream
      calibration improvements — they may face a trade-off. The RI construct provides a reusable
      tool for measuring this trade-off in deployed model populations.

  future_possibilities:
    immediate_extensions: >
      Replicate RI–ECE anticorrelation across ≥3 benchmarks (TruthfulQA, BoolQ, MMLU) to confirm
      benchmark independence. Stratify 30-model set by training regime to directly test the
      RLHF-mechanism hypothesis. Execute redesigned H-M2/M3/M4 with revised directional predictions.
    longer_term_vision: >
      The calibration–robustness trade-off, if confirmed across trust dimensions, motivates a new
      generation of multi-objective alignment methods that jointly optimize calibration and
      adversarial robustness rather than treating them as independent objectives.

# ============================================================================
# SECTION-LEVEL GOALS
# ============================================================================

section_goals:
  abstract:
    narrative_purpose: >
      Compress full story into ~150 words: problem (coupled failure assumption unverified),
      method (RI construct + partial correlation), surprise (inverted result), significance
      (trade-off hypothesis). Lead with the paradox.
    key_message: >
      Adversarial fragility and calibration are anticorrelated after capability control — the
      coupled failure cascade assumption is empirically refuted; a trade-off is revealed.

  introduction:
    narrative_purpose: "Hook (paradox) → Problem (coupled assumption unverified) → Insight (trade-off) → Contributions"
    hook_strategy: "counterintuitive_finding — open with ρ=−0.535 paradox"
    transition_to_related: >
      From contributions, transition: 'To situate RI within the existing evaluation landscape,
      we review multi-dimension trustworthiness benchmarks and calibration literature...'

  related_work:
    narrative_purpose: >
      Show that existing multi-dimension evaluation work (DecodingTrust, TrustLLM) never tests
      cross-dimension predictive correlations, and calibration literature never controls for
      capability in cross-model comparisons — justifying our approach.
    positioning_strategy: >
      'Prior work covers the terrain but leaves the predictive coupling question unanswered.
      We fill this gap with a construct-engineering approach (RI) that isolates the instability
      signal from capability confounding.'
    key_comparison_points:
      - "Multi-dimension evaluation suites (DecodingTrust, TrustLLM): comprehensive but non-predictive"
      - "Adversarial robustness benchmarks (AdvGLUE, ANLI): well-validated but not correlated with other dims"
      - "Calibration literature (Guo 2017, Minderer 2021): identifies scale effects but not robustness link"
      - "LLM benchmark correlation work (ctlllll): capability focus only, no trust dimensions"

  methodology:
    narrative_purpose: >
      Show WHY the RI construct design solves the capability confounding problem, and how the
      statistical pipeline (PCA + OLS residualization + Spearman partial correlation) tests
      the causal mechanism.
    connection_to_insight: >
      'Our key observation is that raw correlations between adversarial fragility and calibration
      are confounded by model scale and capability. By residualizing AdvGLUE drop against
      capability-PC1, we construct RI — a signal orthogonal to capability by design.'
    key_design_decisions:
      - "PCA for capability index: captures 68.5% of variance across 6 leaderboard benchmarks"
      - "OLS residualization: produces RI orthogonal to PC1 (VIF=1.000 confirmed)"
      - "Spearman partial correlation: non-parametric, robust to ECE distribution shape"
      - "30-model diverse set: 9 families, 3 scales, 2 training regimes"
      - "Bootstrap CIs (10K samples): uncertainty quantification for gate evaluation"

  experiments:
    narrative_purpose: >
      Design: We answer RQ1 (Is RI non-degenerate? H-E1) and RQ2 (Does RI predict ECE? H-M1).
      Justify dataset choice (Open LLM Leaderboard v2) and model diversity requirements.
    experimental_questions:
      - "RQ1: Is Residual Instability (RI) a non-degenerate, measurable construct orthogonal to capability?"
      - "RQ2: Does RI significantly predict Expected Calibration Error (ECE) after capability control?"

  results:
    narrative_purpose: >
      Present evidence in order: first establish RI validity (H-E1 PASS), then present the
      inverted correlation (H-M1 surprising result), then per-family analysis showing heterogeneity.
    main_result_highlight: >
      ρ(RI, ECE|PC1, mean_conf)=−0.535, p=0.0034 — significant but inverted direction, refuting
      the coupled failure cascade and revealing the calibration–robustness anticorrelation.

  discussion:
    narrative_purpose: >
      Interpret the three competing explanations (RLHF trade-off, residual scale confounding,
      benchmark specificity). Acknowledge honest limitations (OLS-estimated AdvGLUE, single-benchmark
      ECE, H-M2/M3/M4 not executed). Connect to broader implications.
    honest_limitations:
      - "73% of AdvGLUE scores OLS-estimated from 11 anchors (L1 — high impact)"
      - "Single-benchmark ECE from arc_challenge only (L2 — medium impact)"
      - "PC1 at 68.5%, marginally below 70% threshold (L3 — low-medium impact)"
      - "H-M2/M3/M4 not executed — scope is limited to RI–ECE dimension (L5 — critical)"

  conclusion:
    narrative_purpose: >
      Return to the opening paradox: 'We set out to test whether adversarially fragile models
      are comprehensively untrustworthy. Instead, we found the opposite...' Summarize contributions.
      Open future directions rooted in the three competing mechanistic explanations.
    callback_to_hook: >
      'We began by observing that adversarially fragile models are, paradoxically, better calibrated.
      Our experiments confirm this anticorrelation is statistically robust (ρ=−0.535, p=0.0034)
      and survives capability control — but its mechanism remains an open question that motivates
      the calibration–robustness trade-off hypothesis as a productive direction for the field.'

