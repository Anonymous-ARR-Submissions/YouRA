# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-ResidualInstability-v1"
  confidence_level: 0.72
  core_hypothesis_statement: |
    Under a diverse set of ≥30 LLMs spanning ≥3 families, ≥2 scales, and ≥2 training
    regimes, if adversarial robustness fragility (AdvGLUE accuracy drop) is residualized
    against a composite capability index (PC1 of MMLU/GSM8K/BBH/HellaSwag/WinoGrande)
    and mean model confidence to produce a Residual Instability score (RI), then RI
    will significantly predict calibration error (ECE), hallucination rate (HaluEval),
    and out-of-sample safety failure (HarmBench) — because adversarial fragility reflects
    a domain-general structural property of the model's decision surface that is orthogonal
    to capability and causes coupled failure across trust dimensions.
  alternative_hypothesis_h0: |
    There is no significant partial correlation between RI and trust failure metrics
    (ECE, HaluEval rate, HarmBench failure rate) after controlling for capability-PC1
    and mean confidence; any observed correlation is fully explained by general capability.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Residual Instability (RI)"
      type: "continuous"
      operationalization: "OLS residual of AdvGLUE accuracy drop after regressing on capability-PC1 and mean_confidence; higher RI = more fragile after capability control"
    - name: "AdvGLUE accuracy drop (raw)"
      type: "continuous"
      operationalization: "Benign accuracy minus adversarial accuracy on AdvGLUE benchmark tasks; from TrustLLM or direct evaluation via lm-evaluation-harness"
    - name: "Capability-PC1"
      type: "continuous"
      operationalization: "First principal component of [MMLU, GSM8K, BBH, HellaSwag, WinoGrande] scores via PCA; explains ≥70% of capability variance"
    - name: "Training regime"
      type: "categorical"
      operationalization: "Pretrained-only vs. RLHF/instruction-tuned; used as design variable for within-cell analyses"
      levels: ["pretrained", "rlhf_instruction_tuned"]
    - name: "Model family"
      type: "categorical"
      operationalization: "LLaMA-series, Mistral-series, GPT-series (or equivalent); used for LOFO-CV and within-family partial correlations"
      levels: ["llama_series", "mistral_series", "gpt_series"]
  dependent:
    - name: "Expected Calibration Error (ECE)"
      type: "continuous"
      operationalization: "ECE computed via p-lambda/verified_calibration library on QA benchmarks; range [0,1], lower=better calibrated; primary DV"
      primary: true
    - name: "Hallucination rate (HaluEval)"
      type: "continuous"
      operationalization: "Fraction of hallucinated responses on HaluEval QA/dialogue/summarization tasks; from RUCAIBox/HaluEval evaluation scripts"
      primary: false
    - name: "Safety failure rate (HarmBench)"
      type: "continuous"
      operationalization: "Attack success rate or refusal failure rate on HarmBench; used as held-out forward prediction target in LOFO-CV"
      primary: false
    - name: "Output Variance Index (OVI)"
      type: "continuous"
      operationalization: "Normalized entropy over final numeric answers on GSM8K under 20 samples at T=0.7, top-p=1.0; mechanistic probe for domain-general instability"
      primary: false
  controlled:
    - name: "Capability-PC1"
      operationalization: "Partialed out via OLS residualization before RI computation"
    - name: "Mean model confidence"
      operationalization: "Average softmax confidence on QA tasks; partialed out in RI computation"
    - name: "Model family"
      operationalization: "Controlled via family fixed effects and LOFO-CV; within-family partial correlations reported separately"
    - name: "Log parameter count"
      operationalization: "Reported as supplementary control; capability-PC1 preferred as primary control"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Model exhibits high adversarial sensitivity (large AdvGLUE accuracy drop) due to sharp or anisotropic decision boundaries in representation space"
      evidence: "AdvGLUE [Wang et al. 2021]: 14 attack methods produce consistent 20-30% drops; PromptAttack shows even emoji-level perturbations mislead GPT-3.5 [Xu et al. 2023]"
      falsifier: "If models with similar AdvGLUE drop show uncorrelated representation geometry metrics (e.g., gradient norms), the boundary-sharpness mechanism is unsupported"
    - step: 2
      description: "Sharp decision boundaries cause overconfident predictions in brittle regions, producing calibration error (ECE) — the model assigns high probability to predictions it cannot maintain under slight input variation"
      evidence: "Control theory analogy: systems near instability exhibit coupled error amplification [Exchange 1]; RLHF alignment may tighten response regions, increasing local confidence gradients [Exchange 7]"
      falsifier: "If RI does not predict ECE after controlling for capability-PC1 (partial ρ < 0.2), the boundary-confidence link is broken"
    - step: 3
      description: "The same sharp-boundary instability causes hallucination under distribution shift — the model overcommits to a plausible-sounding but incorrect response when the input moves away from training distribution"
      evidence: "HaluEval [Li et al. 2023]: ChatGPT hallucinates 19.5% of responses; Know Thy Judge [Eiras et al. 2025]: style shifts cause +0.24 FNR — distribution shift exploits same fragility"
      falsifier: "If RI predicts ECE but not HaluEval rate, calibration and hallucination are independent failure modes not linked by shared instability"
    - step: 4
      description: "Domain-general instability extends beyond NLP tasks: high-RI models also exhibit elevated output variance (OVI) on GSM8K arithmetic reasoning, confirming the structural (not task-specific) nature of instability"
      evidence: "Proposed cross-domain test [Exchange 16]: RI → OVI under controlled temperature sampling; if ρ ≥ 0.4, instability is structural not lexical"
      falsifier: "If RI does not predict OVI (ρ < 0.2), the instability signal is confined to adversarial text perturbations and does not reflect domain-general structural fragility"
  key_tension: "The TruthfulQA inverse scaling finding (larger models less truthful) suggests robustness and truthfulness may be negatively correlated at scale — requiring capability-PC1 control before any cross-dimension correlation claim"
  evidence_summary: |
    Adversarial fragility (AdvGLUE) → overconfident brittle predictions (ECE) → hallucination
    under distribution shift (HaluEval) → domain-general instability (OVI on GSM8K).
    The causal direction is structural: sharp decision boundaries cause all downstream failures.
    Alternative: all correlations mediated by capability (general weakness story) — ruled out by
    partialing capability-PC1 and testing within narrow MMLU ±3% strata.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "The TrustLLM/lm-evaluation-harness model set (≥30 models spanning ≥3 families) is sufficiently diverse to detect cross-family correlations"
    supporting_evidence: "TrustLLM benchmarks 16 LLMs; lm-evaluation-harness supports 40+ additional open-source models; combined provides adequate family and scale coverage"
    consequence_if_violated: "Correlations may reflect family-specific lineage artifacts rather than structural instability; LOFO-CV would detect this (negative ΔR² in cross-family folds)"
  - id: "A2"
    assumption: "Benchmark contamination does not systematically bias AdvGLUE scores in a way that inflates or reverses correlations with ECE/HaluEval"
    supporting_evidence: "AdvGLUE uses algorithmically generated adversarial examples (14 attack methods), reducing verbatim memorization risk vs. static QA benchmarks; contamination sensitivity analysis stratified by benchmark release date"
    consequence_if_violated: "Inflated correlations for highly contaminated models (e.g., GPT-4); detected by comparing correlation strength across contamination-risk strata"
  - id: "A3"
    assumption: "Capability-PC1 (MMLU/GSM8K/BBH/HellaSwag/WinoGrande) adequately captures general model capability as a confounder"
    supporting_evidence: "Prior work shows 5-6 standard benchmarks explain 97.4% of capability variance via PCA; PC1 used in literature as capability proxy"
    consequence_if_violated: "Residual confounding from pretraining data volume or architecture type; addressed by supplementary log(param_count) control and interaction testing"
  - id: "A4"
    assumption: "The residual instability (RI) operationalization (OLS residual of AdvGLUE_drop on PC1 + mean_confidence) linearly separates instability from capability"
    supporting_evidence: "OLS is standard; split-sample Fisher z-test for interactions (high vs. low PC1 halves) checks linearity assumption"
    consequence_if_violated: "RI may wash out nonlinear instability effects; addressed by testing interaction terms and reporting nonlinear model fits"
  - id: "A5"
    assumption: "LOFO-CV with 3 family folds provides sufficient statistical power to detect ΔR² ≥ 0.1 in forward prediction"
    supporting_evidence: "With ≥30 models and ≥10 per training-regime cell, each fold has ≥10 test models; power analysis at ρ=0.4 with n=10 gives ~0.61 power — reported as exploratory"
    consequence_if_violated: "Forward prediction results may be underpowered; framed as exploratory with bootstrap CIs; would not support strong construct claim but descriptive correlation paper remains publishable"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Text-only LLMs evaluated on standard NLP benchmarks
    - Models accessible via TrustLLM toolkit, lm-evaluation-harness, or public APIs
    - Models spanning ≥3 families (LLaMA, Mistral, GPT-series or equivalent)
    - Models ranging from 7B to 175B+ parameters
    - Both pretrained-only and RLHF/instruction-tuned regimes
    - Robustness benchmarks: AdvGLUE, ANLI
    - Trust failure benchmarks: TruthfulQA, HaluEval, ECE on QA, HarmBench, WinoBias/BBQ
  does_not_apply_to: |
    - Multimodal LLMs (vision-language models) — separate domain; MultiTrust covers this
    - Task-specific fine-tuned models (e.g., code-only, medical-only)
    - Models evaluated only on in-house proprietary benchmarks without public reproducibility
    - Long-context or RAG-augmented evaluation settings (separate distribution shift context)
    - Geometric/internal representation analysis requiring model weight access (future work)
  known_limitations: |
    - Closed API models (GPT-4, GPT-3.5) cannot participate in OVI mechanistic probe (temperature sampling constraints)
    - Within-cell power is exploratory (~0.61) due to model count constraints
    - Contamination cannot be fully ruled out for older benchmarks (TruthfulQA 2021, AdvGLUE 2021)
    - Inter-session leaderboard variance as external validity is exploratory (confounded by evaluation infrastructure changes)
    - Causal direction cannot be established from cross-sectional cross-model data

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "Residual Instability (RI) is a statistically significant positive predictor of Expected Calibration Error (ECE) after partial correlation controlling for capability-PC1 and mean confidence, across ≥30 diverse LLMs"
    test_method: "Spearman partial correlation ρ(RI, ECE | PC1, mean_confidence) across full model set; split-sample Fisher z-test for capability interaction"
    success_criterion: "Partial ρ ≥ 0.4, Holm-corrected p < 0.05; consistent sign across family subgroups"
    falsification: "Partial ρ < 0.2 or sign reversal in >1 family subgroup; or significant PC1 interaction combined with weak main effect (ρ_low < 0.2)"
  - id: "P2"
    primary: false
    statement: "RI significantly predicts hallucination rate (HaluEval) after the same partial correlation controls, with ρ_partial ≥ 0.4"
    test_method: "Spearman partial correlation ρ(RI, HaluEval_rate | PC1, mean_confidence); within-family partial correlations reported"
    success_criterion: "Partial ρ ≥ 0.4, Holm-corrected p < 0.05; within-family ρ ≥ 0.2 in ≥2 of 3 families"
    falsification: "Partial ρ < 0.2 or within-family ρ < 0.2 in all families"
  - id: "P3"
    primary: false
    statement: "RI adds out-of-sample predictive power for HarmBench safety failure rate beyond capability-PC1, demonstrated via leave-one-family-out cross-validation"
    test_method: "Regression [RI + PC1] vs. [PC1 only] for HarmBench prediction; LOFO-CV with 3 family folds; ΔR² per fold with consistent direction test"
    success_criterion: "ΔR² ≥ 0.1 in ≥2 of 3 LOFO folds; consistent positive direction across all folds; permutation test p < 0.05"
    falsification: "ΔR² < 0.1 in ≥2 folds, or negative ΔR² in any fold, or permutation p ≥ 0.05"
  - id: "P4"
    primary: false
    statement: "RI predicts GSM8K Output Variance Index (OVI) with ρ ≥ 0.4 under controlled temperature sampling (T=0.7, 20 samples), establishing domain-general instability beyond NLP tasks"
    test_method: "Spearman correlation between RI and OVI (normalized entropy over 20 sampled final answers) for open-source model subset; Holm-corrected p < 0.05"
    success_criterion: "ρ(RI, OVI) ≥ 0.4, p < 0.05 Holm-corrected"
    falsification: "ρ < 0.2 or non-significant after correction — suggests instability is NLP-specific, not domain-general"

