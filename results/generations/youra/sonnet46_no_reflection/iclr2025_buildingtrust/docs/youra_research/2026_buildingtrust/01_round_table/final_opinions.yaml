final_opinions:
  perspective_novelty:
    agent: "Dr. Nova"
    icon: "🔭"
    verdict: "STRONG"
    assessment: |
      The Residual Instability (RI) construct — adversarial fragility residualized against
      capability and confidence — is a genuinely novel operationalization. The cross-domain
      prediction (RI → GSM8K reasoning variance → deployment instability) elevates this
      beyond benchmark correlation to a potential domain-general structural property. The
      inter-session leaderboard variance angle as external validation adds further novelty.
      No prior work has proposed RI as an orthogonal evaluation axis with this level of
      cross-domain scope. The paradigm-shift potential: reframing AdvGLUE from a niche
      stress test into a domain-general instability diagnostic.
    key_points:
      - "RI operationalization is novel — capability-controlled adversarial fragility as orthogonal trust axis"
      - "Cross-domain OVI prediction (GSM8K arithmetic) is the most paradigm-shifting claim"
      - "Inter-session leaderboard variance provides external validity via existing public data"

  perspective_falsifiability:
    agent: "Prof. Vera"
    icon: "🔬"
    verdict: "STRONG"
    assessment: |
      The protocol is now fully pre-registered in form with explicit success/failure thresholds.
      P1 (RI → ECE, ρ ≥ 0.4, Holm p < 0.05), P2 (RI → HaluEval, same criteria),
      P3 (LOFO-CV ΔR² ≥ 0.1 in ≥2/3 folds), P4 (RI → OVI ρ ≥ 0.4). Explicit falsification
      criteria include withdrawal of construct claim if LOFO-CV fails in ≥2 folds or
      within-family ρ < 0.2 universally. The conjunctive success standard with pre-committed
      withdrawal thresholds meets rigorous scientific standards. Split-sample Fisher z-tests
      for interaction terms guard against linear residualization artifacts.
    key_points:
      - "Four pre-registered predictions (P1-P4) with exact thresholds and Holm correction"
      - "Conjunctive falsification: construct claim withdrawn if any two of P1-P3 fail"
      - "Split-sample Fisher z-test interaction check guards against linear mis-specification"

  perspective_significance:
    agent: "Dr. Sage"
    icon: "🎯"
    verdict: "STRONG"
    assessment: |
      If the RI axis survives the full protocol, this reframes adversarial robustness benchmarks
      from niche stress tests into policy-relevant early-warning instruments for multi-dimensional
      trust failure. The finding that instability is orthogonal to capability challenges the
      dominant narrative that scaling resolves reliability — a significant contribution. The
      within-MMLU-band test (±3%) will reveal whether RLHF increases or decreases instability
      at equal capability, opening new optimization targets. The forward-prediction requirement
      (ΔR² ≥ 0.1 vs. capability-only baseline on HarmBench) establishes practical utility
      for deployment triage.
    key_points:
      - "Challenges scaling-solves-reliability narrative: RI is orthogonal to capability-PC1"
      - "Policy-relevant: AdvGLUE as deployment triage instrument if P3 forward prediction holds"
      - "Opens new research direction: training objectives explicitly targeting instability reduction"

  perspective_plausibility:
    agent: "Prof. Pax"
    icon: "⚙️"
    verdict: "STRONG"
    assessment: |
      The full protocol is technically executable using only existing benchmarks and tools:
      TrustLLM scores, lm-evaluation-harness (AdvGLUE, ECE via verified_calibration, HaluEval,
      GSM8K with temperature sampling), and public leaderboard data. The split-sample Fisher
      z-test for interactions avoids OLS overfitting with n≈25. The LOFO-CV with 3 families
      is well-specified. Collapsing to 2-cell stratification (pretrained vs. RLHF) with ≥30
      models achieves ~0.61 power per cell (reported as exploratory). The OVI mechanistic
      probe is limited to open-source models (temperature sampling requires model access) —
      this constraint is known and should be reported as a limitation for closed-API models.
    key_points:
      - "All tools available: TrustLLM, lm-evaluation-harness, verified_calibration, HaluEval, HarmBench"
      - "No new benchmarks, no human annotation, no synthetic data — fully constraint-compliant"
      - "OVI limited to open-source models; closed-API limitation acknowledged"

  refiner_advocate:
    agent: "Dr. Ally"
    icon: "🛡️"
    verdict: "STRONG"
    assessment: |
      The discussion converged on a pre-registered, falsifiable hypothesis around Residual
      Instability (RI). The two-stage design (Stage 1: descriptive correlation matrix;
      Stage 2: RI computation and predictive validation) separates what can be confirmed
      descriptively from what requires structural proof. Contamination stratification by
      benchmark release year turns a methodological threat into a replication strength
      demonstration. Making training regime a design variable (pretrained vs. RLHF ×
      scale) enables isolation of alignment-specific instability effects. The refined
      hypothesis is specific, falsifiable, uses only existing data, and has clear success
      criteria with pre-committed withdrawal conditions.
    key_points:
      - "Two-stage design enables partial success even if forward prediction fails"
      - "Contamination stratification by release year as replication strength test"
      - "Complete refined hypothesis: RI predicts ECE + HaluEval + HarmBench OOS across ≥30 diverse LLMs"

  refiner_critic:
    agent: "Prof. Rex"
    icon: "🔍"
    verdict: "MODERATE"
    assessment: |
      The hypothesis is now the strongest it can be given existing data constraints, but
      several residual risks remain. Within-cell power is exploratory (~0.61 per cell with
      n≈10) — subgroup results should not be over-interpreted. Single-outlier sensitivity
      must be reported via Cook's distance or jackknife. The OVI mechanistic test is limited
      to open-source models, creating an API vs. open-source evidence split. Contamination
      stratification is a necessary sensitivity analysis but cannot fully address
      within-model differential contamination rates. The causal framing (RI "causes" trust
      failure) must be avoided — this is cross-sectional cross-model data; all claims should
      use associative language.
    key_points:
      - "Within-cell power is exploratory; pre-register as such; report Cook's distance for outlier sensitivity"
      - "OVI limited to open-source models; GPT-series excluded from mechanistic probe"
      - "Causal language prohibited; all claims must use associative/predictive framing"
    remaining_concerns:
      - "Single-outlier sensitivity in small subgroup cells (n≈5-10)"
      - "Closed-model API limitations for OVI mechanistic probe"
      - "Contamination cannot be fully controlled; treat as sensitivity analysis"
      - "Causal direction cannot be established from cross-sectional cross-model data"
    mitigation_strategy: |
      Pre-register full protocol on OSF before data collection, including fallback from
      construct claim to descriptive correlation paper. Report all sensitivity analyses
      (contamination strata, jackknife, VIF, bootstrap CIs) in supplementary methods.
      Exclude closed-model API from OVI test or report separately as limitation.
      Frame all claims as structural associations, not causal mechanisms.

