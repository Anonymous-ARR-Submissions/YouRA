    - "Raw AdvGLUE drop (no capability control) → ECE"
    - "Log(parameter count) control (supplementary)"

measurement_plan:
  data_collection:
    - source: "TrustLLM toolkit (HowieHwong/TrustLLM) — pre-computed scores for 16 frontier LLMs across 8 trust dimensions"
    - source: "EleutherAI/lm-evaluation-harness — AdvGLUE, MMLU, GSM8K, BBH, HellaSwag, WinoGrande for open-source models"
    - source: "RUCAIBox/HaluEval — hallucination evaluation scripts and datasets"
    - source: "p-lambda/verified_calibration — ECE computation with bootstrap CIs"
    - source: "centerforaisafety/HarmBench — safety failure rates"
    - source: "GSM8K temperature sampling — 20 samples per question at T=0.7, top-p=1.0 (open-source via lm-evaluation-harness)"
  procedure:
    - step: "Collect benchmark scores for ≥30 models across AdvGLUE, MMLU, GSM8K, BBH, HellaSwag, WinoGrande, HaluEval, ECE, HarmBench"
    - step: "Compute capability-PC1 via PCA on [MMLU, GSM8K, BBH, HellaSwag, WinoGrande] scores; verify PC1 explains ≥70% variance"
    - step: "Compute mean_confidence per model from ECE computation outputs"
    - step: "Compute RI = OLS residual of AdvGLUE_drop ~ PC1 + mean_confidence; report R²_residualization"
    - step: "Stage 1: Compute full Spearman correlation matrix across all trust dimensions (raw, uncontrolled)"
    - step: "Stage 2: Compute partial Spearman correlations ρ(RI, ECE|PC1,conf), ρ(RI, HaluEval|PC1,conf) with Holm correction"
    - step: "Split-sample interaction test: divide by median PC1; compute ρ_high and ρ_low; Fisher z-test"
    - step: "LOFO-CV: train [RI+PC1]→HarmBench on 2 families, test on 3rd; rotate 3 folds; compute ΔR² per fold"
    - step: "Within-family partial correlations: ρ(RI, ECE) within LLaMA, Mistral, GPT subsets separately"
    - step: "OVI mechanistic probe: compute OVI for open-source models from GSM8K temperature sampling; correlate with RI"
    - step: "Sensitivity analyses: contamination strata (by benchmark release year), jackknife, VIF reporting, bootstrap CIs"
  success_criteria:
    - "P1: Partial ρ(RI, ECE) ≥ 0.4, Holm p < 0.05"
    - "P2: Partial ρ(RI, HaluEval) ≥ 0.4, within-family ρ ≥ 0.2 in ≥2 families"
    - "P3: LOFO-CV ΔR² ≥ 0.1 in ≥2/3 folds, permutation p < 0.05"
    - "P4: ρ(RI, OVI) ≥ 0.4, Holm p < 0.05"

validation:
  internal_validity:
    - "Capability-PC1 partial correlation controls for general weakness confound (rules out 'RI = residual capability' alternative)"
    - "Split-sample Fisher z-test detects capability interaction (rules out late-scale-only instability)"
    - "Family fixed effects and within-family partial correlations rule out lineage confound"
    - "Bootstrap CIs (10,000 resamples) and VIF < 5 guard against statistical fragility"
    - "Pre-committed falsification criteria: if P1 and P2 both fail (|ρ| < 0.2), withdraw construct claim"
  external_validity:
    - "LOFO-CV with 3 family folds tests cross-family transportability of RI predictive signal"
    - "OVI cross-domain probe rules out NLP-specific artifact — if RI predicts math reasoning variance, instability is structural"
    - "Contamination sensitivity analysis across benchmark release year strata tests robustness to data leakage"
    - "Inter-session leaderboard score variance as exploratory external validity (Open LLM Leaderboard public data)"

discussion_synthesis:
  key_insights:
    - "The TruthfulQA inverse scaling finding is a critical confound — it requires capability-PC1 control before any cross-dimension correlation claim is credible"
    - "Residualizing AdvGLUE_drop against capability is the key methodological move that transforms a raw correlation study into a construct discovery attempt"
    - "LOFO-CV is the appropriate validation design for transportability claims with small model sets — family-level folds are more informative than random splits"
    - "OVI on GSM8K is the most novel prediction — cross-domain instability signal would rule out task-specific linguistic confounds entirely"
    - "Benchmark contamination stratification by release year turns a methodological threat into a replication strength test"
  breakthrough_moments:
