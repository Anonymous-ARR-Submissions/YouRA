hypothesis_draft:
  title: "Residual Instability as an Orthogonal Trust-Failure Predictor in LLMs"
  hypothesis_id: "H-ResidualInstability-v1"
  core_claim: |
    Adversarial robustness fragility (AdvGLUE accuracy drop), after residualizing against a
    composite capability index (PC1 of MMLU/GSM8K/BBH/HellaSwag/WinoGrande) and mean model
    confidence, constitutes a distinct Residual Instability (RI) dimension that significantly
    predicts calibration error (ECE), hallucination rate (HaluEval), and out-of-sample safety
    failure (HarmBench) across a diverse set of ≥30 LLMs spanning ≥3 families, ≥2 scales,
    and ≥2 training regimes — using only existing benchmarks.
  mechanism: |
    RI reflects sharp or anisotropic decision boundaries in model representation space.
    Models with high adversarial fragility overcommit with high confidence to brittle
    predictions (→ ECE), fail under distribution shift by fabricating plausible outputs
    (→ hallucination), and misclassify safety-relevant inputs under style perturbations
    (→ HarmBench failure). Domain-generality is confirmed if RI also predicts output
    variance (OVI) on GSM8K arithmetic reasoning under controlled temperature sampling,
    ruling out task-specific linguistic confounds.
  predictions:
    - P1: "Partial ρ(RI, ECE | PC1, mean_confidence) ≥ 0.4, Holm p < 0.05 across ≥30 diverse LLMs"
    - P2: "Partial ρ(RI, HaluEval_rate | PC1, mean_confidence) ≥ 0.4, within-family ρ ≥ 0.2 in ≥2 families"
    - P3: "LOFO-CV ΔR²(RI+PC1 vs PC1-only → HarmBench) ≥ 0.1 in ≥2/3 family folds, permutation p < 0.05"
    - P4: "ρ(RI, OVI_GSM8K) ≥ 0.4, Holm p < 0.05 (open-source model subset)"

variables_summary:
  independent: "Residual Instability (RI) = OLS residual of AdvGLUE_drop regressed on capability-PC1 + mean_confidence"
  dependent_primary: "Expected Calibration Error (ECE) via p-lambda/verified_calibration on QA benchmarks"
  controlled: "Capability-PC1 (MMLU/GSM8K/BBH/HellaSwag/WinoGrande), mean model confidence, model family (via LOFO-CV and within-family partial correlations)"

null_hypothesis:
  h0_statement: |
    There is no significant partial correlation between RI and trust failure metrics
    (ECE, HaluEval rate, HarmBench failure rate) after controlling for capability-PC1
    and mean confidence; any observed raw correlation between AdvGLUE drop and trust
    failures is fully explained by general capability.
  statistical_test: "Spearman partial correlation with Holm-Bonferroni correction; Fisher z-test for interaction; LOFO-CV ΔR² with permutation test"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "Residual Instability (RI) operationalization — capability-controlled adversarial fragility as orthogonal trust-failure predictor; validated cross-domain via GSM8K OVI mechanistic probe"
  differentiation_summary: |
    DecodingTrust and TrustLLM evaluate trust dimensions independently without inter-dimension
    predictive correlations or capability residualization. Cross-benchmark correlation studies
    (ctlllll) target general capability, not trust/failure-mode prediction. This study is the
    first to (1) residualize adversarial fragility against capability to produce RI, (2) test
    RI as a forward predictor of held-out trust metrics via LOFO-CV, and (3) validate
    domain-generality via cross-domain OVI mechanistic probe.

