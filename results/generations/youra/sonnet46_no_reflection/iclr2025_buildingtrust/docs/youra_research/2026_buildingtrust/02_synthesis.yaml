    - "LLaMA-2-7B, LLaMA-2-13B, LLaMA-2-70B (pretrained and chat variants)"
    - "Mistral-7B-v0.1, Mistral-7B-Instruct, Mixtral-8x7B"
    - "GPT-3.5-turbo, GPT-4 (via TrustLLM scores)"
    - "Additional open-source models from lm-evaluation-harness public results to reach ≥30 total"
  datasets:
    - "AdvGLUE (AI-secure/adversarial-glue) — adversarial robustness"
    - "MMLU, GSM8K, BBH, HellaSwag, WinoGrande — capability-PC1 computation"
    - "HaluEval (RUCAIBox/HaluEval) — hallucination rate"
    - "HarmBench (centerforaisafety/harmbench) — safety failure (held-out for LOFO-CV)"
    - "TruthfulQA — truthfulness (supplementary dimension)"
    - "WinoBias, BBQ — fairness (supplementary dimension)"
    - "ECE on QA tasks via p-lambda/verified_calibration"
    - "GSM8K with temperature sampling — OVI mechanistic probe (open-source only)"
  baselines:
