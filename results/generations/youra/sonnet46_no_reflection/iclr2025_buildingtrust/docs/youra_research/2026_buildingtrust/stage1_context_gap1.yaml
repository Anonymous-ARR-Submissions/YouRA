gap_id: "gap1"
gap_title: "No Systematic Cross-Benchmark Predictive Correlation Study for LLM Failure Modes"
gap_description: |
  No existing study computes whether robustness fragility (AdvGLUE/ANLI scores) statistically
  predicts failure mode severity (ECE, hallucination rate, safety failure rate) across a common
  model set. DecodingTrust covers 8 dimensions independently but does not compute predictive
  correlations between them. TrustLLM benchmarks multiple dimensions but reports scores
  independently. A unified analysis that collects existing benchmark scores, computes
  pairwise Spearman/Pearson correlations between dimensions, and tests whether robustness
  fragility scores are statistically predictive of failure mode severity is entirely missing.
