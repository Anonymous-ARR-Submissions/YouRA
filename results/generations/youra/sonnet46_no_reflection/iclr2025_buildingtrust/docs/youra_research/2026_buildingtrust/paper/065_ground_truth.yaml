# LIMITATIONS SUMMARY (for adversarial review focus)
# ============================================================

critical_limitations:
  L1_ols_estimated_advglue:
    impact: "HIGH"
    description: "73% AdvGLUE values OLS-estimated — compresses variance, may bias ρ direction/magnitude"
    mitigation: "Direct lm-evaluation-harness measurement on all 30 models"

  L2_single_benchmark_ece:
    impact: "MEDIUM"
    description: "ECE from arc_challenge only — may not generalize to other calibration benchmarks"
    mitigation: "Multi-benchmark ECE replication (TruthfulQA, BoolQ, MMLU)"

  L3_pc1_below_threshold:
    impact: "LOW-MEDIUM"
    description: "PC1 explains 68.5% variance (target: 70%) — potential residual capability confounding"
    mitigation: "Supplementary log(parameter count) control"

  L4_underpowered_family:
    impact: "MEDIUM"
    description: "Per-family n=6-9, power≈0.61 — family-level results exploratory only"
    mitigation: "Expand to N≥60 with ≥15 models per family"

  L5_hm2_m3_m4_not_executed:
    impact: "CRITICAL — SCOPE"
    description: "H-M2/M3/M4 (hallucination, safety, OVI) not executed — coupled failure cascade not fully tested"
    mitigation: "Execute redesigned H-M2/M3/M4 with revised directional predictions"

  L6_cross_sectional:
    impact: "FUNDAMENTAL"
    description: "Observational study — correlation ≠ causation"
    mitigation: "Longitudinal/interventional designs (pre/post-RLHF model comparisons)"

