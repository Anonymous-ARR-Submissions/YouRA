# ============================================================
# METHODOLOGY
# ============================================================

methodology:
  algorithm_name: "Residual Instability (RI)"
  algorithm_description: >
    OLS residual of AdvGLUE accuracy drop after regressing out PC1 (first principal
    component of Open LLM Leaderboard v2 benchmarks) and mean_confidence. Captures
    adversarial fragility orthogonal to general capability.
  formula: "AdvGLUE_drop ~ PC1 + mean_confidence (OLS); RI = residuals"
  key_hyperparameters:
    pc1_n_components: 1
    pc1_benchmarks: ["BBH", "ARC-Challenge", "MMLU-Pro", "MATH", "GPQA", "MuSR"]
    bootstrap_samples: 10000
    random_seed: 42
    holm_correction: true
    outlier_threshold: "3 SD"
  model_set:
    n_models: 30
    n_families: 9
    families: ["LLaMA", "Mistral", "Qwen", "Falcon", "Phi", "Gemma", "Yi", "DeepSeek", "GPT"]
    n_scales: 3
    n_training_regimes: 2
  data_sources:
    advglue:
      source: "TrustLLM ICML 2024 Table 2 (11 anchor models direct; 22/30 OLS-estimated)"
      limitation: "73% estimated — HIGH IMPACT limitation"
    ece:
      source: "arc_challenge calibration via lm-evaluation-harness"
      benchmark: "ARC-Challenge (4-choice reasoning)"
    capability_benchmarks:
      source: "Open LLM Leaderboard v2"
      benchmarks: ["BBH", "ARC-Challenge", "MMLU-Pro", "MATH", "GPQA", "MuSR"]
  software:
    python: "3.10"
    scikit_learn: "1.4.2"
    pingouin: "0.6.1"
    scipy: "1.13.0"
    numpy: "1.26.4"

