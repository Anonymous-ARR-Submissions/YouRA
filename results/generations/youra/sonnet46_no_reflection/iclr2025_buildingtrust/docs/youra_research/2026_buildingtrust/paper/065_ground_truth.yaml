# ============================================================
# CONTRIBUTIONS
# ============================================================

contributions:
  - id: "K1"
    title: "Residual Instability (RI) Construct"
    description: >
      Capability-controlled operationalization of adversarial fragility via OLS
      residualization. Non-degenerate (R²=0.529, SD=0.121, VIF=1.000).
    evidence: "h-e1/04_validation.md"
    reusability: "HIGH — applicable to any cross-dimension trust analysis"

  - id: "K2"
    title: "Inverted RI–ECE Anticorrelation"
    description: >
      Empirical finding: ρ=−0.535 (95% CI=[−0.782,−0.101], p=0.0034, n=30).
      Refutes coupled failure cascade prediction. Adversarially fragile models
      are better calibrated after capability control.
    evidence: "h-m1/04_validation.md"
    reusability: "HIGH — empirical benchmark for future trust studies"

  - id: "K3"
    title: "Calibration–Robustness Trade-off Hypothesis"
    description: >
      Mechanistic explanation grounded in RLHF literature: instruction tuning
      simultaneously improves in-distribution calibration and creates adversarial
      vulnerabilities. Testable prediction: training-regime stratification should
      eliminate between-group correlation.
    evidence: "paper/sections/06_discussion.md"
    reusability: "HIGH — motivates future training-regime experiments"

