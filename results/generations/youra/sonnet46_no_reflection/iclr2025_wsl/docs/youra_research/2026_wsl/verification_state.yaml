main_hypothesis:
  id: H-OrbitPE-v1
  title: 'Orbit-PE: Cross-Architecture Weight Space Learning via Permutation-Orbit Positional Encodings'
  statement: 'Under weight space learning for neural network model property prediction, if sequential positional encodings
    in SANE''s weight tokenizer are replaced with orbit-based positional encodings (orbit-PE) derived from the input/output
    channel permutation group (architecture-agnostic linear-operator symmetry), then cross-architecture zero-shot tau_retention
    in CNN->Transformer model property prediction will reach >=70% (vs <50% for vanilla SANE), because permutation-orbit structure
    is the dominant transferable symmetry component across neural architecture families.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: Small CNN Zoo + Small Transformer Zoo
    model: SANE backbone (HSG-AIML/SANE)
    optimizer: reconstruction + contrastive loss (unchanged from SANE)
    hyperparameters:
      seeds: 5
      training_data: Small CNN Zoo only
      eval_data: Small Transformer Zoo (zero-shot)
      architecture_identifiers: removed
      parameter_count_matching: enforced
