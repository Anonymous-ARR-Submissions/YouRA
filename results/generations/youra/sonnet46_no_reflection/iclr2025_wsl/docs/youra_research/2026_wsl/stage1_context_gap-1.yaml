gap_id: "gap-1"
gap_title: "Incomplete Symmetry Coverage Across Diverse Neural Network Architectures"
gap_description: |
  No unified equivariant framework handles permutation+scaling+sign-flip symmetries for MLP+CNN+Transformer simultaneously.
  NFNs handle permutation (MLP/CNN). Monomial-NFN adds scaling/sign-flip (still MLP/CNN).
  Transformer-NFN handles MHA separately. No unified cross-architecture framework exists.
