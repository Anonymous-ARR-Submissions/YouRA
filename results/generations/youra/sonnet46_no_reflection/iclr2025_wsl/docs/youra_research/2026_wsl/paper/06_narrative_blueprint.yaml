# 06_narrative_blueprint.yaml
# Phase 6 Narrative Design — Orbit-PE: Weight Space Symmetry Analysis
# Generated: 2026-05-21T06:05:00Z | Mode: UNATTENDED

project:
  hypothesis_id: "H-OrbitPE-v1"
  title: "Orbit-PE: Cross-Architecture Weight Space Learning via Permutation-Orbit Positional Encodings"
  paper_framing: "productive_failure_with_novel_empirical_finding"

# ============================================================================
# HOOK DESIGN
# ============================================================================

hook:
  strategy: "Counterintuitive Finding + Puzzle"

  opening_statement:
    content: >
      Permutation equivariant networks achieve τ > 0.93 on convolutional model zoo benchmarks,
      yet transfer zero-shot to transformer architectures falls below 0.50 — a 43-point gap
      that persists across all current weight space learning methods. We ask why, and find
      an answer in the geometry of weight space itself.
    rationale: >
      Opens with a concrete performance paradox (high within-arch, low cross-arch) that
      immediately motivates the research. Avoids generic framing. Ends with a question that
      draws the reader in.

  why_reader_should_care:
    main_reason: >
      Weight space learning promises a unified representation of neural network weights across
      architectures — but achieving this requires understanding what structural properties of
      weights actually transfer. Our findings reveal a fundamental layer-type stratification
      in weight space geometry that has direct implications for cross-architecture design.
    concrete_example: >
      A practitioner building a model zoo analytics system must choose how to encode
      positional information about weights. Using permutation-only orbit encodings works
      for convolutional layers (Var_perm ratio=0.637) but catastrophically fails for
      linear/attention layers (ratio=0.133) — a 4.8x difference not anticipated by
      existing theory.
    stakes: >
      Without understanding which symmetry groups dominate weight space variation for
      each layer type, cross-architecture weight representations remain stuck below
      50% τ_retention — insufficient for practical zero-shot property prediction.

# ============================================================================
# PROBLEM FRAMING (Three Levels)
# ============================================================================

problem_framing:
  surface_problem:
    description: >
      Neural network weight space learning methods lack cross-architecture generalization.
      NFNs (NFN, Transformer-NFN) achieve τ > 0.93 within architecture families but
      cannot transfer across CNN and Transformer boundaries.
    common_understanding: >
      The field treats CNNs and Transformers with separate equivariant frameworks
      (NFN for CNNs, Transformer-NFN for Transformers), accepting architectural
      specialization as a necessary cost of equivariance.

  deeper_problem:
    description: >
      The root cause of cross-architecture failure is unexplored: we do not know
      which symmetry groups capture the dominant structural variation in weight spaces
      across layer types. Existing methods either use architecture-specific symmetries
      (NFN family) or abandon equivariance entirely (SANE tokenization).
    why_overlooked: >
      Prior work focused on maximizing within-architecture performance. The question
      of *which* symmetry group dominates weight space variation across layer types
      was never empirically measured — it was assumed (permutation dominance) based
      on within-CNN results.
    our_perspective: >
      We treat the symmetry group selection as an empirical question: measure the
      actual variance decomposition (Var_perm vs. Var_GL) separately for each layer
      type across a large model zoo, rather than assuming uniformity.

  gap_in_existing_work:
    description: >
      No prior work measures the relative weight-space variance explained by permutation
      orbits vs. GL orbits, stratified by layer type (Conv2d vs. Linear/attention),
      across a model zoo at scale.
    why_gap_exists: >
      The tools for measuring this (orbit projectors, variance decomposition at zoo scale)
      were not previously assembled. The assumption of permutation dominance (from NFN's
      success on CNN Zoo, τ > 0.93) was never tested for linear/attention layers.
    why_gap_matters: >
      If permutation variance dominates (>60% of variation), pure orbit-PE suffices.
      If GL variance dominates (as we find for Linear layers: ratio=0.133), hybrid
      encoding is required — fundamentally changing the design of cross-architecture
      positional encodings.

# ============================================================================
# KEY INSIGHT
# ============================================================================

key_insight:
  type: "observation_based"

  aha_moment:
    one_sentence: >
      Weight space symmetry is layer-type dependent: permutation orbits dominate
      convolutional weight geometry (ratio=0.637) but GL orbits dominate linear/attention
      weight geometry (ratio=0.133), revealing a 4.8x stratification not predicted by theory.
    expanded_explanation: >
      NFN's success on CNN Zoo (τ > 0.93) is explained by Conv2d layers having permutation-
      dominant weight geometry (ratio=0.637 > 0.60 threshold). However, Linear/attention layers
      show the opposite: GL orbit variance is 6.6x larger than permutation orbit variance
      (ratio=0.133). This bimodal stratification means that any cross-architecture method
      must use layer-type-specific positional encodings. The training trajectory further
      reveals that this stratification increases during training (ratio decreasing from ~0.49
      to ~0.28 over 50 epochs), suggesting optimizers progressively exploit GL-type
      reparameterizations.

  why_others_missed_it:
    common_assumptions: >
      The field assumed that permutation equivariance, which works for CNNs (τ > 0.93),
      would be sufficient for cross-architecture representations. Transformer-NFN extended
      permutation symmetry to attention weights without measuring whether permutation
      variance actually dominates transformer weight geometry.
    our_different_view: >
      We treat symmetry group selection as empirical, not theoretical — measuring actual
      variance decomposition at scale (n=1000 models × 50 epochs = 50,000 checkpoints)
      rather than deriving from first principles.
    enabling_factor: >
      The orbit projector infrastructure (SVD-based orbit basis + polar decomposition
      for GL projection) enabled zoo-scale variance decomposition that was previously
      infeasible.

  what_makes_it_work:
    intuitive_explanation: >
      Think of weight space as a high-dimensional landscape. Permutation symmetry creates
      "equivalent valleys" for Conv2d layers — shuffling input/output channels gives the
      same function, so the landscape has many equivalent positions. For Linear/attention
      layers, GL symmetry creates a much larger family of equivalent points (any invertible
      linear transformation), dominating the landscape geometry.
    key_mechanism: >
      The input/output channel permutation group S_{c_in} × S_{c_out} is a discrete
      subgroup of GL(c_in) × GL(c_out). For Conv2d, the H×W spatial kernel structure
      constrains the active GL directions, amplifying the relative contribution of
      permutation orbits. For Linear/attention, no such structural constraint exists —
      the full GL group acts freely, producing the 6.6x variance imbalance.

# ============================================================================
# EVIDENCE NARRATIVE
# ============================================================================

evidence_narrative:
  main_claim:
    statement: >
      Channel permutation is a functionally exact architecture-agnostic symmetry for all
      linear operator types (H-E1), orbit-PE is computable with 1.17x overhead (H-M1),
      but permutation orbit variance is insufficient as the sole encoding signal: Conv2d
      layers are permutation-dominant (ratio=0.637) while Linear/attention layers are
      GL-dominant (ratio=0.133).
    measurable_criteria:
      - "H-E1: |Δacc| = 0.000 across 4,500 permutation runs (CNN + Transformer)"
      - "H-M1: computability_rate=1.0 across 200 checkpoints, overhead=1.167x (≤1.2x)"
      - "H-M2: Var_perm/(Var_perm+Var_GL) = 0.3479 ± 0.0536 (n=1000; Conv2d=0.637, Linear=0.133)"

  supporting_evidence:
    - id: "evidence_1_exact_symmetry"
      what: "H-E1: |Δacc| = 0.000000 across 4,500 canonical channel permutation runs"
      so_what: >
        Permutation is a provably exact symmetry — not an approximation. This is stronger
        than the theoretical threshold (<0.1% change) by several orders of magnitude.
      how_it_supports_claim: >
        Establishes the validity of the orbit construction: orbit-PE is built on a
        sound mathematical foundation for all layer types (Conv2d, Linear, MHA).
      figure: "fig_6 (delta_acc_distribution)"

    - id: "evidence_2_computability"
      what: "H-M1: orbit-PE computable for all 200 checkpoints at 1.167x overhead"
      so_what: >
        Orbit-PE is practically deployable — within SANE's stated efficiency envelope.
        A unified codebase (HAS_ARCH_BRANCHES=False) handles all layer types.
      how_it_supports_claim: >
        Rules out infeasibility as a barrier to orbit-PE adoption; establishes
        practical viability of the proposed encoding.
      figure: "fig_7 (overhead_per_layer_type)"

    - id: "evidence_3_variance_overall"
      what: "H-M2: Overall Var_perm/(Var_perm+Var_GL) = 0.3479 (n=1000 models × 50 epochs)"
      so_what: >
        Pure orbit-PE fails the 0.60 threshold — permutation orbit is NOT the
        dominant symmetry in weight space at the aggregate level.
      how_it_supports_claim: >
        This is the key refutation of the main assumption. At scale (1000 models,
        50K checkpoints), the evidence is statistically robust (std=0.0536).
      figure: "fig_3 (gate_bar_chart)"

    - id: "evidence_4_layer_breakdown"
      what: "Layer-type stratification: Conv2d ratio=0.637 (PASS), Linear ratio=0.133 (FAIL)"
      so_what: >
        The aggregate failure masks a fundamental layer-type asymmetry: orbit-PE
        works for Conv2d but not for Linear/attention. This 4.8x difference is the
        key novel empirical finding.
      how_it_supports_claim: >
        Explains *why* NFN succeeds on CNN Zoo (Conv2d dominant) while cross-arch
        fails (Linear/attention dominant in Transformers). Motivates hybrid encoding.
      figure: "fig_1 (layer_breakdown)"

    - id: "evidence_5_trajectory"
      what: "Variance ratio decreases from ~0.49 (epoch 0) to ~0.28 (epoch 50) during training"
      so_what: >
        Training dynamics progressively exploit GL-type reparameterizations, making
        the permutation variance deficit worse as training proceeds.
      how_it_supports_claim: >
        Explains *why* the deficit is particularly severe for well-trained model zoos.
        This was not anticipated in the hypothesis design — genuinely unexpected.
      figure: "fig_2 (ratio_vs_epoch)"

  surprising_findings:
    - finding: "The Conv2d/Linear stratification is 4.8x (ratio 0.637 vs 0.133)"
      why_surprising: >
        The hypothesis predicted an overall ratio >0.60, assuming rough uniformity
        across layer types based on NFN's CNN Zoo success. The bimodal split (passing
        for Conv2d, catastrophically failing for Linear) was not anticipated.
      our_interpretation: >
        Conv2d weight tensors have explicit spatial structure (H×W kernel) where
        permutation equivalences are "local" and dominate. Linear/attention tensors
        are fully dense with more global GL-type variation. This is consistent with
        the loss landscape literature on flat directions along symmetry orbits.

    - finding: "Permutation variance ratio decreases monotonically during training"
      why_surprising: >
        Training was expected to amplify functional structure, not reduce the
        permutation orbit contribution. The trajectory shows optimizers actively
        exploit GL-type reparameterizations.
      our_interpretation: >
        Consistent with loss landscape flat-direction literature: at initialization,
        weight space has higher permutation orbit density; trained models exploit
        GL-type directions that provide better generalization.

# ============================================================================
# BROADER IMPACT
# ============================================================================

takeaway:
  main_contribution:
    one_sentence: >
      We provide the first large-scale empirical measurement of weight space symmetry
      stratification by layer type, revealing that permutation orbit variance dominates
      Conv2d layers (ratio=0.637) but GL orbits dominate Linear/attention layers
      (ratio=0.133) — a 4.8x gap that fundamentally constrains pure orbit-PE approaches
      and motivates hybrid encoding for cross-architecture weight representations.
    why_significant: >
      This is independently publishable as an analysis of weight space geometry. It
      explains a previously unexplained phenomenon (why permutation methods succeed
      within CNN Zoo but fail cross-architecture) and provides empirical grounding for
      the hybrid encoding design required for H-OrbitPE-v2.

  implications:
    for_field: >
      Weight space learning methods should use layer-type-specific symmetry groups
      rather than a single universal group. The Conv2d/Linear stratification provides
      a principled basis for designing the next generation of cross-architecture
      weight representations.
    for_practice: >
      Practitioners building model zoo analytics systems should not assume permutation
      orbit encodings generalize to linear/attention layers. The hybrid encoding design
      (orbit-PE for Conv2d + GL trace features for Linear/attention) is now empirically
      motivated rather than theoretically motivated.

  future_possibilities:
    immediate_extensions:
      - "H-OrbitPE-v2: hybrid orbit-PE + GL trace features (pre-registered pivot)"
      - "Variance decomposition on Transformer Zoo checkpoints"
      - "Layer-type ablation: Conv2d-only orbit-PE as intermediate step"
    longer_term_vision: >
      A theory of weight space geometry stratification by layer type, connecting
      tensor rank, symmetry group order, and expected variance decomposition.
      Training-stage-aware positional encodings exploiting the trajectory finding.

