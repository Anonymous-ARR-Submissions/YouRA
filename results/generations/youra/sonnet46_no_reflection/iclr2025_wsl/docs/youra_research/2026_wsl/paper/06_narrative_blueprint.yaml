# ============================================================================
# PAPER STYLE CONSTRAINTS
# ============================================================================

paper_constraints:
  format: "ICML2025"
  max_main_pages: 8
  figures_for_paper: ["fig_1", "fig_2", "fig_6", "fig_7", "fig_3"]  # 5 primary
  citation_style: "natbib"

  do_not_claim:
    - "τ_retention ≥ 0.70 achievable with orbit-PE alone (H-M3 never run)"
    - "OVR_perm < 0.05 on trained model (H-C1 never run)"
    - "Hybrid encoding achieves τ_retention ≥ 0.65 (not tested)"

  must_claim:
    - "Channel permutation is exact symmetry for Conv2d, Linear, MHA (H-E1)"
    - "Orbit-PE computable at 1.167x overhead with unified codebase (H-M1)"
    - "Permutation orbit variance does NOT dominate overall (0.3479 < 0.60) (H-M2)"
    - "Layer-type stratification: Conv2d=0.637, Linear=0.133 (H-M2 novel finding)"
    - "Training trajectory shows declining permutation variance (H-M2 unexpected finding)"
