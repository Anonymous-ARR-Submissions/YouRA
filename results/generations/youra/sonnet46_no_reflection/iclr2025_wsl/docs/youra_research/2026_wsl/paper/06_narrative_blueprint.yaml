# SECTION-LEVEL NARRATIVE GOALS
# ============================================================================

section_goals:
  abstract:
    narrative_purpose: "Compress full story: symmetry question → measurement → finding → implication"
    key_message: >
      Channel permutation is an exact symmetry for all layer types, but permutation
      orbit variance only dominates Conv2d (0.637) not Linear/attention (0.133) —
      requiring hybrid encoding for cross-architecture weight representations.
    quantitative_anchors:
      - "4,500 permutation runs, |Δacc|=0.000"
      - "1,000 models × 50 epochs, ratio=0.3479"
      - "Conv2d ratio=0.637, Linear ratio=0.133"
      - "1.167x computational overhead"

  introduction:
    narrative_purpose: "Hook (paradox) → Problem (3 levels) → Insight (layer-type stratification) → Preview"
    hook_strategy: "Counterintuitive finding: high within-arch, low cross-arch despite permutation symmetry"
    opening_hook: >
      "Permutation equivariant networks achieve τ > 0.93 on CNN generalization benchmarks,
      yet fall below 0.50 when applied cross-architecture to transformers — not because
      the symmetry is wrong, but because a different symmetry dominates."
    contribution_framing: "three empirical contributions (H-E1, H-M1, H-M2) + design implication"
    transition_to_related: >
      "Understanding why cross-architecture transfer fails requires examining what prior
      methods assume about weight space geometry — assumptions that we now empirically test."

  related_work:
    narrative_purpose: "Survey weight space learning → identify symmetry assumption gap → motivate our measurement"
    positioning_strategy: >
      Position our work as the first to empirically measure symmetry dominance at zoo scale,
      rather than deriving it theoretically. Show that NFN (CNN-only), Transformer-NFN
      (Transformer-only), and SANE (no equivariance) each implicitly assume what we measure.
    key_comparison_points:
      - "NFN/Transformer-NFN: architecture-specific equivariance, no cross-arch measurement"
      - "SANE: abandons equivariance for scalability; our orbit-PE adds symmetry back"
      - "Monomial-NFN: proves theoretical bound but doesn't measure empirical dominance"
      - "arXiv:2410.04207 (GL features): motivated by theory, aligns with our Linear finding"
    clusters:
      - "Permutation equivariant methods (NFN, Monomial-NFN, Transformer-NFN)"
      - "Token-based weight representations (SANE, ProbeGen)"
      - "Weight space geometry (loss landscape, GL orbit features)"

  methodology:
    narrative_purpose: "WHY these designs: orbit-PE construction → computability proof → variance measurement"
    connection_to_insight: >
      Three sub-hypotheses test three necessary conditions: (H-E1) is the symmetry valid?
      (H-M1) is it practical? (H-M2) does it capture dominant variation? This structure
      reflects the scientific rigor of testing preconditions before the main claim.
    key_design_decisions:
      - "Orbit-PE construction: input/output channel permutation group as linear-operator symmetry"
      - "Overhead measurement: compare orbit-PE vs. sequential-PE wall time"
      - "Variance decomposition: SVD orbit basis + polar decomposition GL projection"
      - "Zoo scale: n=1000 models × 50 epochs for statistical robustness"
    figures_in_section:
      - "fig_7 (overhead_per_layer_type): Shows practical feasibility"

  experiments:
    narrative_purpose: "Three experiments test three claims in order of increasing specificity"
    experimental_questions:
      - "Q1 (H-E1): Is channel permutation an exact functional symmetry for all layer types?"
      - "Q2 (H-M1): Is orbit-PE computable with practical overhead (≤1.2x)?"
      - "Q3 (H-M2): Does permutation orbit variance dominate over GL variance (>60%)?"
    datasets_rationale: >
      Small CNN Zoo (CIFAR-10-GS, 1000+ models) is the standard benchmark for weight
      space learning research. Transformer Zoo (125K checkpoints) is used for H-E1
      cross-architecture symmetry validation.
    gate_structure: "MUST_WORK for H-E1, H-M1, H-M2 — correct cascade blocking demonstrates methodology integrity"

  results:
    narrative_purpose: "H-E1 (exact symmetry) → H-M1 (practical) → H-M2 (key finding: layer stratification)"
    main_result_highlight: "Conv2d ratio=0.637 vs. Linear ratio=0.133 — 4.8x stratification"
    result_ordering:
      - "Table: H-E1 summary (|Δacc|=0.000, success_rate=1.0)"
      - "Table: H-M1 summary (overhead by layer type)"
      - "Figure 1 (layer_breakdown): THE key result"
