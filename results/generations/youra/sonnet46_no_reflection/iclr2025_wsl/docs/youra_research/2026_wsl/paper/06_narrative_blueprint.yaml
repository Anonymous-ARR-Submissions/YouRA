      - "L3: Transformer Zoo variance decomposition not performed"
      - "L4: H-M1 OrbitPEComputer path issue — SVD fallback used for H-M2"
    key_interpretation: >
      The layer stratification aligns with GL symmetry literature (arXiv:2410.04207)
      and explains NFN's CNN-only success. The training trajectory finding connects
      to loss landscape flat-direction research.
    bridge_to_future: >
      H-OrbitPE-v2 (hybrid encoding) is the data-driven design decision emerging
      from this work — not speculation but a pre-registered pivot.

  conclusion:
    narrative_purpose: "Callback to hook (cross-arch paradox explained) → contributions → hybrid encoding future"
    callback_to_hook: >
      The cross-architecture performance gap is explained by weight space geometry:
      permutation orbits dominate Conv2d but GL orbits dominate Linear/attention.
      Cross-architecture representations require layer-type-specific encoding.
    contributions_summary:
      - "Exact symmetry validation for orbit-PE across all layer types (H-E1)"
      - "Practical orbit-PE with 1.167x overhead and unified codebase (H-M1)"
      - "First zoo-scale measurement of permutation vs. GL variance stratification by layer type (H-M2)"
    future_vision: >
      H-OrbitPE-v2 with hybrid encoding (orbit-PE for Conv2d + GL trace features for
      Linear/attention) is the immediate next step, enabled by all infrastructure
