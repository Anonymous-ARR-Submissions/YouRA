# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-OrbitPE-v1"
  confidence_level: 0.72
  core_hypothesis_statement: |
    Under weight space learning for neural network model property prediction,
    if sequential positional encodings in SANE's weight tokenizer are replaced with
    orbit-based positional encodings (orbit-PE) derived from the input/output channel
    permutation group (architecture-agnostic linear-operator symmetry),
    then cross-architecture zero-shot τ_retention in CNN→Transformer model property
    prediction will reach ≥70% (vs <50% for vanilla SANE),
    because permutation-orbit structure is the dominant transferable symmetry component
    across neural architecture families — more than 60% of checkpoint variation in weight
    space lies along permutation orbits rather than GL-type reparameterization orbits.
  alternative_hypothesis_h0: |
    There is no significant difference in cross-architecture τ_retention between
    SANE with orbit-based positional encodings and vanilla SANE with sequential
    positional encodings when evaluated zero-shot on the Small Transformer Zoo
    after training on the Small CNN Zoo.

