    name: "Small CNN Zoo + Small Transformer Zoo"
    type: "standard"
    source: "Small CNN Zoo from NFN paper [Zhou et al., NeurIPS 2023]; Small Transformer Zoo from Transformer-NFN [Tran-Viet et al., ICLR 2025, 125K checkpoints on MNIST+AGNews]"
    path: "Available from AllanYangZhou/nfn and MathematicalAI-NUS/Transformer-NFN repositories"
    hypothesis_fit: "These two datasets represent the cross-architecture transfer task exactly: CNN Zoo provides training data (MLP/CNN weight space with permutation symmetry), Transformer Zoo provides zero-shot evaluation data. Both have ground-truth accuracy labels enabling Kendall's τ evaluation."
  model:
    name: "SANE+orbit-PE (SANE with orbit-based positional encodings)"
    type: "Transformer-backbone autoencoder with reconstruction+contrastive loss"
    source: "Built on HSG-AIML/SANE (open source, ICML 2024) with orbit-PE modification using AllanYangZhou/nfn primitives for permutation orbit computation"
    hypothesis_fit: "SANE provides the scalable cross-architecture tokenization backbone; orbit-PE replaces sequential positional encodings with permutation-orbit membership vectors, enabling architecture-agnostic weight tokens."
  baselines:
    - name: "Vanilla SANE"
      method: "Sequential positional encoding on layer-wise weight tokens; trained identically on CNN Zoo; evaluated zero-shot on Transformer Zoo"
    - name: "Transformer-NFN (within-architecture reference)"
      method: "In-architecture evaluation only (cannot do cross-architecture zero-shot by design); provides τ ≈ 0.905–0.910 upper bound within Transformer Zoo"
    - name: "SANE + random-PE (ablation)"
      method: "Random positional encoding of identical dimensionality to orbit-PE; controls for dimensionality increase rather than symmetry information"

