variables:
  independent:
    - name: "Positional Encoding Type"
      type: "categorical"
      operationalization: "Type of positional encoding used in SANE's weight tokenizer"
      levels:
        - "sequential-PE (vanilla SANE baseline)"
        - "orbit-PE (input/output channel permutation orbits)"
        - "random-PE (ablation control)"
  dependent:
    - name: "Cross-Architecture τ_retention"
      type: "continuous"
      operationalization: "τ_retention = τ_{CNN→Transformer} / τ_{CNN→CNN} using Kendall's τ on model property prediction (generalization accuracy, training epoch)"
      primary: true
    - name: "OVR_perm (Orbit Variance Ratio, permutation subgroup)"
      type: "continuous"
      operationalization: "OVR_perm = E_g ||f(g·W) - f(W)||_2 / E_{W'≠W} ||f(W') - f(W)||_2 for g ∈ S_h × neuron permutations"
      primary: false
    - name: "OVR_GL (Orbit Variance Ratio, GL subgroup)"
      type: "continuous"
      operationalization: "OVR_GL = E_g ||f(g·W) - f(W)||_2 / E_{W'≠W} ||f(W') - f(W)||_2 for g ∈ GL_{Dk}^h × GL_{Dv}^h"
      primary: false
    - name: "Var_perm / (Var_perm + Var_GL)"
      type: "continuous"
      operationalization: "Fraction of weight-space variance attributable to permutation orbits vs GL orbits, computed over Small CNN Zoo checkpoint trajectories"
      primary: false
  controlled:
    - name: "SANE backbone architecture"
      operationalization: "Identical transformer backbone, loss function (reconstruction+contrastive), training epochs, learning rate for all conditions"
    - name: "Training dataset"
      operationalization: "All models trained on Small CNN Zoo only; Transformer Zoo used for zero-shot evaluation only"
    - name: "Architecture identifier"
      operationalization: "Removed at test time to prevent architecture-conditioned predictions"
    - name: "Parameter count distribution"
      operationalization: "Subsampled to match marginal parameter count distributions between CNN Zoo and Transformer Zoo"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 3
  steps:
    - step: 1
      description: "Input/output channel permutation group is architecture-agnostic and computable for any linear operator"
      evidence: "Monomial-NFN [Tran, Vo et al., 2024] proves that the monomial matrix group (including permutations) contains the maximal symmetry group of MLP/CNN layers. The Transformer-NFN framework [Tran-Viet et al., 2025] shows that head permutation S_h is a component of the full G_U group. Both collapse to (input-channel perm × output-channel perm) at the linear-operator level."
      falsifier: "If applying canonical channel permutations to CNN or Transformer checkpoints changes validation accuracy by >0.1%, the assumed symmetry group is incorrect or incomplete for that architecture."
    - step: 2
      description: "Permutation-orbit structure accounts for >60% of checkpoint variation in weight space, making it the dominant transferable structural component"
      evidence: "Inferred from NFN's success (τ>0.93) using only permutation equivariance on CNN Zoo; SANE's ability to learn functional similarities via contrastive training implicitly suggests orbit-level clustering. Requires empirical validation via Var_perm/(Var_perm+Var_GL) > 0.60."
      falsifier: "If Var_perm/(Var_perm+Var_GL) < 0.60 on Small CNN Zoo checkpoint trajectories, permutation orbits do not dominate — the GL component is equally or more important, capping orbit-PE's theoretical benefit."
    - step: 3
      description: "Encoding permutation-orbit membership in weight token positional encodings enables the SANE backbone to learn architecture-agnostic representations that transfer zero-shot across architecture families"
      evidence: "SANE [Schürholt et al., ICML 2024] already achieves within-architecture transfer via contrastive training (τ_retention within CNN family ≈ high). The hypothesis is that replacing architecture-specific sequential positional encodings with architecture-agnostic orbit-PE removes the primary barrier to CNN→Transformer transfer."
      falsifier: "If orbit-PE τ_retention < 0.60 in CNN→Transformer zero-shot transfer (vs pre-registered ≥0.70 success criterion), the mechanism fails — permutation-orbit encoding alone is insufficient for cross-architecture generalization."
  key_tension: "The dominant question is whether permutation symmetry accounts for >60% of weight-space variation (Var_perm dominance) or whether GL-type reparameterization symmetries are comparably important. If GL variance > 40%, the hypothesis has a hard ceiling and a hybrid approach (orbit-PE + low-degree invariant polynomial traces like tr(W^Q W^{K,T})) may be needed."
  evidence_summary: |
    NFN establishes that permutation equivariance alone produces state-of-the-art within-architecture
    property prediction for MLP/CNN. Transformer-NFN establishes that extending to G_U covers
    Transformers within-architecture. SANE establishes that tokenization-based approaches enable
    cross-architecture-family representations without equivariance but with lower fidelity.
    Monomial-NFN establishes the canonical symmetry group structure for linear layers.
    The gap: no method has combined equivariant positional structure with tokenization-based
    cross-architecture scalability for zero-shot transfer.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Input/output channel permutation is functionally equivalent for MLP, CNN, and Transformer linear operators (validation accuracy change <0.1% under canonical permutations)"
    supporting_evidence: "NFN proves permutation symmetry for MLP/CNN. Transformer-NFN proves S_h symmetry for attention heads. Both are instances of the general (input-channel perm × output-channel perm) group action on linear operators."
    consequence_if_violated: "Orbit-PE encodes spurious symmetries; predictions become inconsistent across architecture families; cross-architecture transfer degrades."
  - id: "A2"
    assumption: "Permutation variance dominates GL variance in real model zoo checkpoint geometry (Var_perm / (Var_perm + Var_GL) > 0.60)"
    supporting_evidence: "NFN's τ>0.93 using only permutation equivariance suggests most predictive signal is captured by permutation structure. SANE's contrastive training implicitly clusters by functional equivalence."
    consequence_if_violated: "Orbit-PE ceiling is hard; τ_retention cannot reach ≥0.70; hybrid approach with GL trace features required."
  - id: "A3"
    assumption: "SANE's contrastive training learns to cluster checkpoints by functional similarity, which is compatible with orbit-PE positional encodings"
    supporting_evidence: "SANE achieves linear probe accuracy ≥0.978 with contrastive loss, indicating functional clustering. Orbit-PE changes only the positional encoding — the training objective is unchanged."
    consequence_if_violated: "Orbit-PE positional encodings create positional conflicts with SANE's sequential assumptions, degrading even within-architecture performance."
  - id: "A4"
    assumption: "The Small CNN Zoo and Small Transformer Zoo datasets are representative of the cross-architecture property prediction task (no severe distribution shift beyond architecture type)"
    supporting_evidence: "Both datasets contain models trained to convergence on standard benchmarks (CIFAR-10/SVHN for CNN; MNIST/AGNews for Transformer) with ground-truth accuracy labels. Used as reference benchmarks in NFN and Transformer-NFN papers."
    consequence_if_violated: "Cross-architecture τ_retention reflects dataset distribution shift rather than symmetry-transfer — confounds experimental conclusions."
  - id: "A5"
    assumption: "Architecture identifiers can be removed without collapsing all predictive signal (the remaining weight structure is informative)"
    supporting_evidence: "Transformer-NFN achieves τ ≈ 0.902 from block structure alone (ablation) — indicating structural weight information is the dominant signal, not architectural metadata."
    consequence_if_violated: "Without architecture labels, τ collapses for both SANE and orbit-PE — the cross-architecture zero-shot task is fundamentally ambiguous."

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    Weight-based model property prediction tasks (generalization accuracy, training epoch, generalization gap)
    using existing model zoo datasets (Small CNN Zoo: CIFAR-10, SVHN classifiers; Small Transformer Zoo:
    125K checkpoints, MNIST+AGNews tasks). Architectures: MLPs, CNNs with standard convolutional layers,
    Transformer encoders with multi-head attention. Property prediction evaluated with Kendall's τ.
  does_not_apply_to: |
    Weight generation tasks (HyperDiffusion-style synthesis). Model merging or task arithmetic.
    Architectures with non-standard symmetries (e.g., GNNs, state-space models, mixture-of-experts).
    Models with billion-parameter scale (scalability to large models is a separate research question — Gap 2).
    Implicit neural representations (separate task from model zoo property prediction).
  known_limitations: |
    Orbit-PE handles only the permutation subgroup of G_U, not the full GL_{Dk} × GL_{Dv} component.
    This is a known theoretical ceiling: OVR_GL > 0.15 is expected even with orbit-PE.
    Cross-architecture transfer requires parameter count distribution matching to avoid confounds.
    The hypothesis assumes permutation variance dominance (A2), which must be validated as a gating experiment.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "SANE+orbit-PE achieves τ_retention ≥ 0.70 in CNN→Transformer zero-shot model property prediction, compared to τ_retention < 0.50 for vanilla SANE"
    test_method: "Train both models on Small CNN Zoo only. Evaluate zero-shot on Small Transformer Zoo. τ_retention = τ_{CNN→Transformer} / τ_{CNN→CNN}. Remove architecture identifiers. Match parameter count distributions between CNN Zoo and Transformer Zoo subsets."
    success_criterion: "orbit-PE τ_retention ≥ 0.70; vanilla SANE τ_retention < 0.50; absolute improvement ≥ 0.10"
    falsification: "If orbit-PE τ_retention < 0.60 or absolute improvement over vanilla SANE < 0.10, the hypothesis fails."
  - id: "P2"
    primary: false
    statement: "Orbit-PE achieves OVR_perm < 0.05 (permutation invariance) and OVR_GL > 0.15 (not accidentally GL-invariant)"
    test_method: "For sampled checkpoints from Small Transformer Zoo, apply random g ∈ S_h × neuron permutations (OVR_perm) and random g ∈ GL_{Dk}^h synthetic transforms (OVR_GL). Compute embedding-level OVR = E_g ||f(g·W) - f(W)||_2 / E_{W'≠W} ||f(W') - f(W)||_2 for each subgroup."
    success_criterion: "OVR_perm < 0.05 AND OVR_GL > 0.15 for orbit-PE. Vanilla SANE expected OVR_perm > 0.10."
    falsification: "If OVR_perm ≥ 0.05 for orbit-PE, permutation invariance is not encoded. If OVR_GL ≤ 0.10, orbit-PE accidentally approximates GL invariance — mechanism claim is false."
  - id: "P3"
    primary: false
    statement: "Permutation variance accounts for >60% of checkpoint variation: Var_perm / (Var_perm + Var_GL) > 0.60 on Small CNN Zoo checkpoint trajectories"
    test_method: "For CNN Zoo checkpoints, project each checkpoint's weight vector onto permutation orbit directions and GL orbit directions. Compute Var_perm = E_t ||W_t - Π_{O_perm}(W_t)||^2 and Var_GL analogously. Verify function preservation: <0.1% validation accuracy change under canonical channel permutations."
    success_criterion: "Var_perm / (Var_perm + Var_GL) > 0.60; function preservation <0.1% accuracy change"
    falsification: "If Var_perm fraction < 0.60, permutation variance does not dominate — orbit-PE theoretical ceiling is limited; if function preservation > 0.1% accuracy change, assumed symmetry is invalid."

