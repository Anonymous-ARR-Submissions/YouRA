      difference: "Architecture-specific equivariant layers; cannot transfer across MLP/CNN/Transformer boundaries by design. Orbit-PE enables cross-architecture zero-shot transfer."
    - prior_work: "SANE [Schürholt et al., ICML 2024]"
      difference: "Sequential positional encodings are architecture-conditioned (layer index); orbit-PE replaces with architecture-agnostic orbit membership. SANE's cross-architecture experiments stay within architecture families."
