    title: "Implement orbit-PE computability checker"
    description: |
      Implement h-e1/code/orbit_pe.py:
      - SUPPORTED_LAYER_TYPES = ["Linear", "Conv2d", "MultiheadAttention"]
      - _compute_orbit_vector_linear(weight, layer_idx): returns [3] tensor [layer_idx, c_out*c_in, pos_flat]
      - _compute_orbit_vector_conv2d(weight, layer_idx): treats (c_out,c_in) as orbit axes; H*W as position
      - _compute_orbit_vector_mha(weight, layer_idx, n_heads): [layer_idx, n_heads*head_dim, pos_flat]
      - get_layer_type_map(model): maps param name -> layer type string for all supported layers
      - compute_orbit_pe(state_dict, layer_type_map):
          * Dispatch to _compute_orbit_vector_{type}() without arch-specific branching
          * Log: "Orbit-PE computed for {name} ({type}): shape {shape}"
          * Return (orbit_vectors, success_flags) per weight name
      - compute_orbit_pe_success_rate(success_flags): fraction of layer types with all-True flags
      See 03_logic.md L-4-1 for pseudo-code.
      Complexity: 12 (Medium)
    feature_tag: "model"
    priority: 75
    source_document: "03_architecture.md"
    complexity: 12
    test_requirements: |
      - Assert compute_orbit_pe returns success_flags[name]=True for all 3 layer types
      - Assert orbit vectors have shape [3]
      - Assert compute_orbit_pe_success_rate == 1.0 for a model with all 3 layer types
      - Assert no architecture-specific if/else branches triggered per layer type
    reference_files:
