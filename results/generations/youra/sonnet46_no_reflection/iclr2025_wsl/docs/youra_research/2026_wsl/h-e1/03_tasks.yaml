  - id: "task-006"
    epic: "A-3: Permutation"
    title: "Implement canonical channel permutation for CNN checkpoints"
    description: |
      Implement h-e1/code/permutation.py — CNN/Linear permutation functions:
      - _make_perm(size, seed): returns torch.randperm(size) with given seed
      - _permute_linear(weight, bias, pi_out, pi_in): weight[pi_out][:, pi_in]
      - _permute_conv2d(weight, bias, pi_out, pi_in): weight[pi_out][:, pi_in] for [c_out,c_in,H,W]
      - _permute_batchnorm(state_dict, bn_prefix, pi_out): permutes running_mean, running_var, weight, bias
      - apply_canonical_channel_permutation(state_dict, perm_seed):
          * Parse layer order from state_dict keys
          * For each layer i: pi_in=pi_out[i-1], pi_out=_make_perm(c_out, seed+i)
          * Apply permutation; propagate BN by pi_out of preceding layer
          * Return new state_dict (no in-place modification)
      See 03_logic.md L-3-1, L-3-3 for detailed pseudo-code.
      Complexity: 15 (High)
    feature_tag: "model"
    priority: 80
    source_document: "03_architecture.md"
    complexity: 15
    test_requirements: |
      - Assert permuted state_dict has identical shapes to original
      - Load simple CNN, apply permutation, assert model outputs unchanged (allclose)
      - Assert BN running_mean permuted consistently with preceding conv layer
      - Assert 10 different seeds produce 10 different permutations
    reference_files:
      architecture: "03_architecture.md#Permutation"
      logic: "03_logic.md#A-3-Permutation"
      config: null

  - id: "task-007"
    epic: "A-3: Permutation"
    title: "Implement Transformer head permutation (S_h group)"
    description: |
      Extend h-e1/code/permutation.py — Transformer head permutation:
      - _permute_layernorm(state_dict, ln_prefix, pi): permutes weight[d] and bias[d] by pi
      - apply_transformer_head_permutation(state_dict, perm_seed, n_heads, head_dim):
          * pi_heads = _make_perm(n_heads, seed)
          * For in_proj_weight [3*d_model, d_model]:
              - Split Q, K, V blocks; reshape to [n_heads, head_dim, d_model]
              - Apply pi_heads; concatenate back to [3*d_model, d_model]
          * For out_proj weight [d_model, d_model]:
              - Reshape to [d_model, n_heads, head_dim]; permute head dim; reshape back
          * Fallback: handle separate Q/K/V projections (q_proj, k_proj, v_proj)
          * Propagate LayerNorm after attention (identity permutation on d_model)
      See 03_logic.md L-3-2, L-3-4 for detailed pseudo-code.
      Complexity: 15 (High — part of A-3)
    feature_tag: "model"
    priority: 78
    source_document: "03_architecture.md"
    complexity: 15
    test_requirements: |
      - Load small Transformer checkpoint, apply head permutation, assert outputs unchanged (allclose)
      - Assert in_proj_weight shape preserved after permutation
      - Assert LN weight/bias handled correctly
      - Test both fused in_proj and separate Q/K/V code paths
    reference_files:
      architecture: "03_architecture.md#Permutation"
      logic: "03_logic.md#A-3-Permutation"
      config: null

  - id: "task-008"
