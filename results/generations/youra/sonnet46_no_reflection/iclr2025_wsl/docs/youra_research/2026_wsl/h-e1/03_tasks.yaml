  - id: "task-011"
    epic: "A-3: Permutation"
    title: "L-3-3: Implement BatchNorm propagation in CNN permutation"
    description: |
      Subtask for apply_canonical_channel_permutation (A-3).
      _permute_batchnorm(state_dict, bn_prefix, pi_out):
        - Permute: {bn_prefix}.running_mean[pi_out]
        - Permute: {bn_prefix}.running_var[pi_out]
        - Permute: {bn_prefix}.weight[pi_out]
        - Permute: {bn_prefix}.bias[pi_out]
        All 4 tensors have shape [c], same c as c_out of preceding conv layer.
      Must be called with pi_out of the PRECEDING conv layer, not the current layer.
      Integration with apply_canonical_channel_permutation: detect BN by key pattern
      (e.g., key contains 'bn' or 'batch_norm') following a conv weight key.
    feature_tag: "model"
    priority: 45
