      _permute_layernorm(state_dict, ln_prefix, pi):
        - Permute: {ln_prefix}.weight[pi]   shape [d]
        - Permute: {ln_prefix}.bias[pi]     shape [d]
      Note: for Transformer head permutation, the LayerNorm at the attention output
      boundary uses identity permutation on d_model (head permutation preserves d_model
      channel order at LN boundary). Only LN associated with MLP projection uses
