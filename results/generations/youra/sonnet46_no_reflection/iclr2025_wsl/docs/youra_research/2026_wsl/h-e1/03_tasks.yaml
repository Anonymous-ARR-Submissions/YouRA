  - id: "task-009"
    epic: "A-5: Evaluation Loop"
    title: "Implement accuracy evaluation and delta-acc measurement"
    description: |
      Implement h-e1/code/evaluate.py:
      - evaluate_accuracy(model, val_loader, device): top-1 accuracy in [0,1]; model.eval()+no_grad
      - measure_delta_acc(model, original_sd, permuted_sd, val_loader, device):
          * Load original_sd → evaluate → acc_before
          * Load permuted_sd → evaluate → acc_after
          * Return (acc_before, acc_after, abs(acc_before - acc_after))
      - run_cnn_evaluation(checkpoints, perm_seeds, device):
          * For each checkpoint × seed: apply_canonical_channel_permutation → measure_delta_acc
          * Log: "Permutation {seed} applied to checkpoint {j}: Δacc = {val:.6f}"
          * Return list of {checkpoint_id, seed, acc_before, acc_after, delta_acc}
      - run_transformer_evaluation(checkpoints, perm_seeds, device): same for Transformers
      Total evaluations: 500 CNN × 10 seeds + 500 Transformer × 10 seeds = 10,000 runs
      Batch size: 256 for all evaluations.
      Complexity: 11 (Medium)
    feature_tag: "evaluation"
    priority: 70
    source_document: "03_architecture.md"
    complexity: 11
    test_requirements: |
