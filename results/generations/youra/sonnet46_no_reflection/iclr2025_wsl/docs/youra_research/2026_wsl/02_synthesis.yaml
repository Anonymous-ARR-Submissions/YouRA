hypothesis_draft:
  title: "Orbit-PE: Cross-Architecture Weight Space Learning via Permutation-Orbit Positional Encodings"
  hypothesis_id: "H-OrbitPE-v1"
  core_claim: |
    Replacing SANE's sequential positional encodings with orbit-based positional encodings (orbit-PE)
    derived from the input/output channel permutation group achieves ≥70% τ_retention in
    CNN→Transformer cross-architecture zero-shot model property prediction, compared to <50% for
    vanilla SANE, because permutation-orbit structure is the dominant transferable symmetry
    component across neural architecture families.
  mechanism: |
    SANE tokenizes neural network weights layer-by-layer and processes them with a transformer
    backbone + reconstruction/contrastive loss. Its sequential positional encodings assign position
    by layer index — making representations architecture-specific. Orbit-PE replaces these with
    orbit-membership vectors: for each weight token (one per layer), encode which permutation orbit
    under (input-channel perm × output-channel perm) each neuron/filter/head belongs to. This orbit
    structure is architecture-agnostic — computable for MLP, CNN, and Transformer linear operators
    using the same canonical group action. The model's positional information thereby becomes
    architecture-independent, enabling zero-shot cross-architecture transfer without retraining.
  predictions:
    - P1: "SANE+orbit-PE achieves τ_retention ≥ 0.70 in CNN→Transformer zero-shot transfer (vs <0.50 for vanilla SANE)"
    - P2: "OVR_perm < 0.05 and OVR_GL > 0.15 — permutation invariance without accidental GL invariance"
    - P3: "Var_perm / (Var_perm + Var_GL) > 0.60 — permutation variance dominates in model zoo checkpoint geometry"

variables_summary:
  independent: "Positional encoding type: sequential-PE (vanilla SANE) vs orbit-PE (permutation-orbit embeddings) vs random-PE (ablation)"
  dependent_primary: "Cross-architecture τ_retention = τ_{CNN→Transformer} / τ_{CNN→CNN} using Kendall's τ on model property prediction"
  controlled: "SANE backbone, training dataset (CNN Zoo), architecture identifiers removed, parameter count distributions matched"

