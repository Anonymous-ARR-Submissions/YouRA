novelty_assessment:
  status: "VERIFIED"
  key_innovation: "Orbit-PE: orbit-based positional encodings for weight tokenization enabling cross-architecture zero-shot weight-based property prediction — first such demonstration"
  differentiation_summary: |
    NFN/Transformer-NFN: architecture-specific equivariant layers, cannot transfer. SANE: cross-architecture
    within families but sequential PE is architecture-conditioned. Orbit-PE bridges both: SANE's scalable
    tokenization + permutation-orbit positional structure for cross-architecture generalization. The OVR
    decomposition methodology is additionally a reusable diagnostic tool for WSL symmetry analysis.

