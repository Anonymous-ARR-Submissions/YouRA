measurement_plan:
  data_collection:
    - source: "Small CNN Zoo checkpoints with ground-truth accuracy/generalization gap labels (from AllanYangZhou/nfn repository)"
    - source: "Small Transformer Zoo 125K checkpoints with MNIST and AGNews performance labels (from MathematicalAI-NUS/Transformer-NFN repository)"
    - source: "Synthetic orbit-permuted checkpoints for OVR measurement (generated from zoo checkpoints via random S_h and synthetic GL transforms)"
  procedure:
    - step: "P3 gating experiment: Compute Var_perm and Var_GL on Small CNN Zoo checkpoint trajectories. If Var_perm / (Var_perm + Var_GL) < 0.60, pivot to hybrid orbit-PE + trace features before proceeding."
    - step: "Implement orbit-PE: compute input/output channel permutation orbits for CNN Zoo and Transformer Zoo layers using nfn library; embed as fixed-size orbit-membership vectors replacing sequential positional encodings in SANE."
    - step: "Train SANE+orbit-PE, vanilla SANE, and random-PE ablation on Small CNN Zoo only (5 seeds each)."
    - step: "Zero-shot evaluate on Small Transformer Zoo: remove architecture identifiers, match parameter count distributions, compute Kendall's τ for generalization accuracy prediction."
    - step: "Compute τ_retention = τ_{CNN→Transformer} / τ_{CNN→CNN} for each model."
    - step: "P2 OVR measurement: compute OVR_perm and OVR_GL for orbit-PE model using sampled Transformer Zoo checkpoints under S_h permutations and synthetic GL transforms."
    - step: "Label-permutation sanity check: shuffle target accuracies in Transformer Zoo — τ should collapse to ≈0."
  success_criteria:
    - "orbit-PE τ_retention ≥ 0.70 (primary)"
    - "vanilla SANE τ_retention < 0.50 (baseline confirmation)"
    - "OVR_perm < 0.05 and OVR_GL > 0.15 (P2 mechanism validation)"
    - "Var_perm fraction > 0.60 (P3 dominance condition)"
    - "Training+evaluation wall-clock ≤ 1.2× vanilla SANE"

