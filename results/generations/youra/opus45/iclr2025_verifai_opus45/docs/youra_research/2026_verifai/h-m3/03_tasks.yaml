  - id: L-5-1
    title: TOST z-test Implementation
    description: Implement run_tost_equivalence with two one-sided z-tests and SE computation
    type: subtask
    priority: 49
    status: todo
    parent_epic: A-5
    reference_files:
      - file: 03_logic.md
        section: "### Pseudo-code: run_tost_equivalence"
    implementation_notes: |
      z_lower = (diff - (-margin)) / se
      z_upper = (diff - margin) / se
      p_lower = 1 - norm.cdf(z_lower)
      p_upper = norm.cdf(z_upper)
      equivalent = (p_lower < alpha) AND (p_upper < alpha)
    acceptance_criteria:
      - Both z-scores computed correctly
      - Both p-values computed
      - Equivalence flag correct

