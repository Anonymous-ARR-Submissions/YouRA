hypothesis_draft:
  title: "Error Localization Granularity for LLM Code Repair: Testing the Attention Window Hypothesis"
  hypothesis_id: "H-GranularityOptimal-v1"
  core_claim: |
    Providing error feedback at intermediate granularity (G3: error type + line number)
    achieves higher LLM code repair success rates than both minimal feedback (G0-G2)
    and maximal feedback (G4: full stack trace + variable states).
  mechanism: |
    The Attention Window Hypothesis: LLMs have limited effective attention for repair tasks.
    G3 provides a precise "pointer" to the error location without overwhelming the model
    with irrelevant stack frames and variable dumps. This focuses attention on the
    relevant code region, enabling more accurate repair generation.
  predictions:
    - P1: "ANOVA across G0-G4 shows significant effect (p < 0.05)"
    - P2: "G3 outperforms G0 by ≥10 percentage points"
    - P3: "G4 does not outperform G3 (non-monotonic pattern)"

variables_summary:
  independent: "Error feedback granularity (G0-G4, 5 categorical levels)"
  dependent_primary: "Repair success rate (0-100%, continuous)"
  controlled: "Model (CodeLlama-7B), temperature (0), prompt template (Self-Debug), timeout (10s)"

null_hypothesis:
  h0_statement: |
    There is no significant difference in repair success rate across granularity levels G0-G4.
    The amount of error information provided has no effect on LLM repair performance.
  statistical_test: "One-way ANOVA with planned contrasts"
  significance_level: 0.05

novelty_assessment:
