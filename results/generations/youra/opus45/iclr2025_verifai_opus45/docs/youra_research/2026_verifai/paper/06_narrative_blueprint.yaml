# Phase 6: Narrative Blueprint for ICML Paper
# Generated: 2026-03-30
# Research: Error Localization Granularity for LLM Code Repair
# Version: 2.0 (Story Group Architecture)

metadata:
  hypothesis_id: "H-GranularityOptimal-v1"
  paper_type: "Empirical Study with Surprising Negative Result"
  target_venue: "ICML 2025"
  narrative_strategy: "Counterintuitive Finding"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 1: THE HOOK
# ═══════════════════════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: "When LLM-generated code fails, conventional wisdom suggests providing detailed error information should help the model fix it. We find the opposite: for CodeLlama-7B, telling it simply 'the test failed' yields 41% repair success, while providing the exact error line and message drops success to 17%."
    strategy: "counterintuitive_finding"

  why_reader_should_care:
    main_reason: "The 'more information is better' assumption underlies most LLM debugging tools, but may be fundamentally wrong at smaller model scales"
    concrete_example: "A 25 percentage point performance gap suggests current debugging assistants may be actively hurting repair rates by providing too much detail"
    stakes: "Deployed LLM coding assistants may need to adapt their feedback strategies based on model scale"

  anti_patterns_avoided:
    - "NOT starting with 'LLMs have achieved remarkable success...'"
    - "NOT using generic 'X is important' framing"
    - "NOT burying the counterintuitive finding"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 2: PROBLEM FRAMING (THREE LEVELS)
# ═══════════════════════════════════════════════════════════════════════════════

problem_framing:
  surface_problem:
    description: "LLM-generated code often fails tests, requiring repair"
    common_understanding: "Providing error feedback helps LLMs fix code (Self-Debug, TraceFixer)"
    what_papers_say: "Execution feedback improves repair rates by 10-20%"

  deeper_problem:
    description: "The optimal GRANULARITY of error feedback is unknown"
    why_overlooked: "Prior work used fixed feedback levels (usually detailed traces) without ablation"
    our_perspective: "Granularity is a design choice with significant impact, not an implementation detail"

  gap_in_existing_work:
    description: "No controlled comparison of error feedback granularity levels (G0-G4)"
    why_gap_exists: "Implicit assumption that 'more is better' discouraged exploration of simpler feedback"
    why_gap_matters: "Suboptimal feedback strategies may waste model capacity and hurt repair rates"

  research_question: "What is the optimal granularity of error feedback for LLM code repair?"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 3: KEY INSIGHT (THE "AHA!" MOMENT)
# ═══════════════════════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: "Detailed error feedback may cause cognitive interference rather than helpful localization at smaller model scales."
    expanded_explanation: |
      We hypothesized that intermediate granularity (error + line number) would be optimal—
      providing a 'pointer' to the bug without overwhelming context. Instead, we found
      a threshold effect: ANY detailed feedback (G2+) degrades performance compared to
      minimal pass/fail signals. The model appears to work better when it reasons about
      correctness globally rather than anchoring on specific error details.

  why_others_missed_it:
    common_assumptions: "More information enables better reasoning"
    our_different_view: "Information must be processable to be useful; excess detail may distract"
    enabling_factor: "First controlled ablation across 5 granularity levels with same model/benchmark"

  what_makes_it_work:
    intuitive_explanation: "Like a novice programmer who gets confused by detailed stack traces but can fix code when told 'it just doesn't work'"
    key_mechanism: "Prompt length and complexity inversely correlate with repair success at 7B scale"

  original_hypothesis_falsified: true
  falsification_narrative: |
    We originally hypothesized the "Attention Window Hypothesis": that G3 (error+line) would
    provide optimal attention focus. This was WRONG. The data shows an inverse relationship—
    simpler is better. This negative result is scientifically valuable because it challenges
    the field's implicit assumptions.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 4: EVIDENCE NARRATIVE
# ═══════════════════════════════════════════════════════════════════════════════

evidence_narrative:
  main_claim:
    statement: "Error feedback granularity significantly affects LLM repair success, but simpler feedback outperforms detailed feedback"
    measurable_criteria: "ANOVA p < 0.05 across G0-G4; G0/G1 >> G2/G3/G4"

  supporting_evidence:
    - id: "evidence_foundation"
      what: "Runtime errors prevalent (60.8% of failures)"
      so_what: "Validates that granularity comparison is meaningful—plenty of errors to study"
      how_it_supports_claim: "Foundation hypothesis (H-E1) PASSED"
      figure: "fig_1 (prevalence_ci)"

    - id: "evidence_main_effect"
      what: "ANOVA F=23.89, p=3.5×10⁻¹⁹, η²=0.059"
      so_what: "Granularity has a statistically significant, medium-sized effect on repair success"
      how_it_supports_claim: "Mechanism hypothesis (H-M1) PASSED—effect exists"
      figure: "fig_5 (anova_summary)"

    - id: "evidence_direction"
      what: "G0 (41.8%) vs G3 (16.8%) — 25pp difference in OPPOSITE direction"
      so_what: "Detailed feedback actively HURTS repair, not helps"
      how_it_supports_claim: "Directional prediction (H-M2) FAILED—but failure is informative"
      figure: "fig_7 (g0_vs_g3_comparison)"

    - id: "evidence_clusters"
      what: "Two distinct clusters: {G0,G1} ~41% vs {G2,G3,G4} ~17-23%"
      so_what: "Threshold effect at G1→G2 boundary (~20pp drop when adding error message)"
      how_it_supports_claim: "Not gradual decline but sharp transition"
      figure: "fig_6 (posthoc_heatmap)"

    - id: "evidence_partial_recovery"
      what: "G4 (22.7%) > G3 (16.8%) by 6pp"
      so_what: "Full traces slightly better than partial—if giving detail, give all of it"
      how_it_supports_claim: "Non-monotonicity prediction (H-M3) FAILED"
      figure: "fig_9 (contingency_heatmap)"

  surprising_findings:
    finding: "Simpler feedback dramatically outperforms detailed feedback—opposite of hypothesis"
    why_surprising: "Contradicts intuition that more information helps reasoning"
    our_interpretation: |
      Three competing explanations:
      1. Prompt length effect: G4 prompts can be 10-50× longer, diluting attention to code
      2. Cognitive interference: Error details may cause model to 'anchor' on wrong fix
      3. Model capacity: 7B may lack capacity to leverage detailed feedback (scaling hypothesis)

  negative_result_framing:
    is_negative_result: true
    scientific_value: |
      Negative results are valuable when they:
      1. Challenge widely-held assumptions (✓ "more info is better")
      2. Have strong statistical support (✓ p < 10⁻¹⁸)
      3. Suggest actionable implications (✓ simplify feedback for smaller models)
      4. Open new research directions (✓ scaling studies, template ablation)

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 5: BROADER IMPACT & TAKEAWAY
# ═══════════════════════════════════════════════════════════════════════════════

takeaway:
  main_contribution:
    one_sentence: "First controlled study showing that simpler error feedback yields better LLM code repair at the 7B scale"
    why_significant: "Challenges the implicit 'more information is better' assumption in LLM debugging tools"

  contributions_list:
    - "First systematic granularity comparison (G0-G4) for LLM code repair"
    - "Evidence that detailed feedback can actively harm repair at smaller scales"
    - "Discovery of two-cluster pattern with threshold at G1→G2"
    - "Methodological framework for granularity comparison experiments"

  implications:
    for_field: "Reconsider feedback strategies in LLM debugging—optimal granularity may be scale-dependent"
    for_practice: "LLM coding assistants should consider adaptive feedback based on model size"

  future_possibilities:
    immediate_extensions:
      - "Scale study: Does optimal granularity shift with model size (13B, 34B, 70B)?"
      - "Template ablation: Do alternative prompts change the pattern?"
      - "Error type stratification: Does optimal granularity vary by error type?"
    longer_term_vision: "Adaptive feedback systems that match granularity to model capacity"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 6: SECTION-LEVEL NARRATIVE GOALS
# ═══════════════════════════════════════════════════════════════════════════════

section_goals:
  abstract:
    narrative_purpose: "Compress the counterintuitive finding into ~150 words"
    key_message: "Simpler error feedback yields better LLM repair at 7B scale"
    must_include:
      - "The counterintuitive result (41% vs 17%)"
      - "Statistical strength (p < 10⁻¹⁸)"
      - "Practical implication (reconsider feedback strategies)"
    tone: "Confident about findings, honest about scope (single model)"

  introduction:
    narrative_purpose: "Hook → Problem → Insight → Preview"
    hook_strategy: "counterintuitive_finding"
    problem_framing: "three_level"
    transition_to_related: "Natural bridge: 'Prior work has explored execution feedback...'"
    contributions_presentation: "As narrative, not bulleted list"
    word_target: "800-1000"

  related_work:
    narrative_purpose: "Show existing work uses fixed granularity → justify our ablation study"
    positioning_strategy: "respectful_differentiation"
    key_comparison_points:
      - "Self-Debug (Chen et al., 2023): G2-level, no ablation"
      - "TraceFixer (Bouzenia et al., 2023): G4-level, no simpler comparisons"
      - "DynaFix (Huang et al., 2025): G4+, assumes more is better"
      - "Haque et al. (2025): Found traces help less than expected—closest to our finding"
    narrative_thread: "Prior work assumed granularity doesn't matter; we show it matters greatly"
    word_target: "600-800"

  methodology:
    narrative_purpose: "Show WHY this experimental design answers our question"
    connection_to_insight: "Controlled comparison requires isolating granularity as only variable"
    key_design_decisions:
      - decision: "Five granularity levels (G0-G4)"
        rationale: "Covers full spectrum from minimal to maximal feedback"
      - decision: "Same 304 runtime error cases across all levels"
        rationale: "Within-subject design eliminates case-difficulty confounds"
      - decision: "CodeLlama-7B-Instruct"
        rationale: "Representative instruction-tuned model at feasible scale"
      - decision: "Self-Debug prompt template"
        rationale: "Established baseline, only error section varies"
    figures_needed: []  # No architecture diagram—experimental methodology
    word_target: "1000-1200"

  experiments:
    narrative_purpose: "Design tests that verify our specific claims"
    experimental_questions:
      - "Q1: Are runtime errors prevalent enough? (H-E1 foundation)"
      - "Q2: Does granularity affect repair success? (H-M1 mechanism)"
      - "Q3: Is G3 better than G0? (H-M2 directional)"
      - "Q4: Is G3 ≥ G4? (H-M3 non-monotonicity)"
    datasets_rationale: "MBPP standard benchmark, 500 problems, used in Self-Debug"
    baselines_rationale: "G0 (naive retry) and Self-Debug (G2-level)"
    metrics_rationale: "Binary repair success, aggregated to rate per granularity"
    word_target: "800-1000"

  results:
    narrative_purpose: "Present evidence supporting claims—but claims are OPPOSITE to predictions"
    main_result_highlight: "G0 (41.8%) dramatically outperforms G3 (16.8%)"
    presentation_order:
      - "Foundation (H-E1): Runtime errors prevalent—PASS"
      - "Main effect (H-M1): Granularity matters—PASS"
      - "Direction (H-M2): G3 > G0—FAIL (opposite)"
      - "Non-monotonicity (H-M3): G3 ≥ G4—FAIL"
      - "Cluster analysis: Two-cluster pattern discovery"
    figure_placement:
      - "fig_3 (success_rate_bar): Main result"
      - "fig_5 (anova_summary): Statistical significance"
      - "fig_6 (posthoc_heatmap): Cluster pattern"
    word_target: "1000-1200"

  discussion:
    narrative_purpose: "Interpret the surprising results, acknowledge limitations"
    interpretation_focus:
      - "Why might simpler be better? (prompt length, cognitive interference, capacity)"
      - "Why did our hypothesis fail? (attention window mechanism not supported)"
      - "What does this mean for the field?"
    honest_limitations:
      - "L1: Single model (CodeLlama-7B-Instruct)"
      - "L2: MBPP benchmark simplicity"
      - "L3: Single prompt template"
      - "L4: Single repair attempt"
      - "L5: Deterministic generation (T=0)"
    broader_impact: "Feedback design for LLM tools may need to be scale-aware"
    word_target: "400-600"

  conclusion:
    narrative_purpose: "Reinforce the counterintuitive message, open future directions"
    callback_to_hook: "Return to the opening paradox—detailed feedback hurts repair"
    key_takeaway: "Less is more for LLM code repair feedback at 7B scale"
    future_vision: "Adaptive feedback systems that match granularity to model capacity"
    word_target: "300-400"

# ═══════════════════════════════════════════════════════════════════════════════
