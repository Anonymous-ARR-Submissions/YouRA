# SECTION 10: WRITING STYLE GUIDELINES
# ═══════════════════════════════════════════════════════════════════════════════

writing_style:
  tone: "Confident about findings, humble about scope"
  voice: "Active, direct"

  principles:
    - "Lead with findings, not methodology"
    - "Quantify claims (percentages, p-values)"
    - "Acknowledge limitations proactively"
    - "Frame negative result as contribution"

  avoid:
    - "Hedging when evidence is strong ('may suggest')"
    - "Burying the counterintuitive result"
    - "Overselling (this is one model, one benchmark)"
    - "Generic opening sentences"
