# =============================================================================
# QUANTITATIVE CLAIMS (Must be exact)
# =============================================================================

quantitative_claims:
  # Main result metrics
  main_results:
    - claim_id: "Q1"
      statement: "G0 achieves 41.8% repair success rate"
      value: 41.8
      unit: "percent"
      confidence_interval: "[36.3%, 47.4%]"
      sample_size: 304
      source: "H-M1 experiment results"
      verifiable: true

    - claim_id: "Q2"
      statement: "G3 achieves 16.8% repair success rate"
      value: 16.8
      unit: "percent"
      confidence_interval: "[12.9%, 21.4%]"
      sample_size: 304
      source: "H-M1 experiment results"
      verifiable: true

    - claim_id: "Q3"
      statement: "G0 outperforms G3 by 25 percentage points"
      value: 25.0
      unit: "percentage_points"
      direction: "G0 > G3"
      source: "H-M2 comparison"
      verifiable: true

    - claim_id: "Q4"
      statement: "Runtime errors constitute 60.8% of failures"
      value: 60.8
      unit: "percent"
      confidence_interval: "[56.5%, 65.0%]"
      raw_count: "304/500"
      source: "H-E1 foundation test"
      verifiable: true

  # Statistical test results
  statistical_tests:
    - claim_id: "S1"
      test: "One-way ANOVA"
      statistic: "F"
      value: 23.89
      p_value: "3.5e-19"
      effect_size:
        metric: "eta_squared"
        value: 0.059
        interpretation: "medium"
      source: "H-M1 mechanism test"
      verifiable: true

    - claim_id: "S2"
      test: "McNemar (G0 vs G3)"
      statistic: "chi_squared"
      value: 77
      p_value: "5.23e-22"
      source: "H-M2 directional test"
      verifiable: true

    - claim_id: "S3"
      test: "McNemar (G3 vs G4)"
      statistic: "chi_squared"
      value: 19
      p_value: "4.0e-05"
      source: "H-M3 non-monotonicity test"
      verifiable: true

  # All granularity level results
  granularity_results:
    G0:
      successes: 127
      total: 304
      rate: 41.8
      ci_95: "[36.3%, 47.4%]"
      cluster: "high"
    G1:
      successes: 124
      total: 304
      rate: 40.8
      ci_95: "[35.4%, 46.4%]"
      cluster: "high"
    G2:
      successes: 56
      total: 304
      rate: 18.4
      ci_95: "[14.4%, 23.2%]"
      cluster: "low"
    G3:
      successes: 51
      total: 304
      rate: 16.8
      ci_95: "[12.9%, 21.4%]"
      cluster: "low"
    G4:
      successes: 69
      total: 304
      rate: 22.7
      ci_95: "[18.3%, 27.8%]"
      cluster: "low"

# =============================================================================
# QUALITATIVE CLAIMS (Interpretation-based)
# =============================================================================

qualitative_claims:
  - claim_id: "C1"
    statement: "Simpler feedback dramatically outperforms detailed feedback at the 7B scale"
    evidence_basis: "Q1, Q2, Q3, S1"
    confidence: "high"
    scope: "CodeLlama-7B-Instruct on MBPP"

  - claim_id: "C2"
    statement: "Two-cluster pattern emerges with threshold at G1→G2 boundary"
    evidence_basis: "Tukey HSD post-hoc analysis"
    confidence: "high"
    scope: "Within experimental conditions"

  - claim_id: "C3"
    statement: "The 'attention window hypothesis' is not supported"
    evidence_basis: "H-M2 and H-M3 failures"
    confidence: "high"
    scope: "Original theoretical prediction falsified"

  - claim_id: "C4"
    statement: "Detailed error feedback may cause cognitive interference"
    evidence_basis: "Interpretation of inverse relationship"
    confidence: "medium"
    scope: "Proposed explanation, not directly tested"

  - claim_id: "C5"
    statement: "Prompt length effect is the most likely explanation"
    evidence_basis: "Correlation between feedback length and performance drop"
    confidence: "medium"
    scope: "Proposed mechanism, requires attention analysis to confirm"

# =============================================================================
# HYPOTHESIS OUTCOMES
# =============================================================================

hypothesis_outcomes:
  H-E1:
    name: "Foundation - Runtime Error Prevalence"
    type: "EXISTENCE"
    gate: "MUST_WORK"
    prediction: "Runtime errors ≥ 30%"
    actual: "60.8%"
    status: "PASS"

  H-M1:
    name: "Mechanism - Granularity Effect"
    type: "MECHANISM"
    gate: "MUST_WORK"
    prediction: "ANOVA p < 0.05"
    actual: "p = 3.5e-19"
    status: "PASS"

  H-M2:
    name: "Direction - G3 > G0"
    type: "MECHANISM"
    gate: "SHOULD_WORK"
    prediction: "G3 ≥ G0 + 10pp"
    actual: "-25.0pp (G0 >> G3)"
    status: "FAIL"
    scientific_value: "Falsifies 'more is better' assumption"

  H-M3:
    name: "Non-monotonicity - G3 ≥ G4"
    type: "MECHANISM"
    gate: "SHOULD_WORK"
    prediction: "G4 ≤ G3 + 2%"
    actual: "+5.92% (G4 > G3)"
    status: "FAIL"
    scientific_value: "Shows partial recovery with full context"

