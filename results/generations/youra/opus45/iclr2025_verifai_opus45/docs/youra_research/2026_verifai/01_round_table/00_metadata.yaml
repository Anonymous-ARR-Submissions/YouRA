priority: "CRITICAL"

connection_to_research_question:
  blocks_answering: true
  relates_to_detailed_question: "What is the optimal granularity of execution feedback?"

description: |
  Most existing work uses either coarse feedback (pass/fail in Self-Debug) or full traces
  (TraceFixer, DynaFix). No controlled ablation comparing: (1) pass/fail only, (2) error
  message only, (3) error line number, (4) error line + context, (5) full stack trace +
  variable states.

missing_piece: |
  Systematic comparison of localization granularity levels on same benchmark/model to
  determine which information is most valuable for repair.

potential_impact: "HIGH"

