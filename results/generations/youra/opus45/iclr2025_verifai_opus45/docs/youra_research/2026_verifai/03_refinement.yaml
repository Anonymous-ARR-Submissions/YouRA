# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - LLM-generated code that fails with runtime errors producing stack traces
    - Single-function Python problems (MBPP/HumanEval style)
    - Instruction-tuned code LLMs (7B parameter scale)
    - Single-turn repair attempts
  does_not_apply_to: |
    - Silent logic errors (wrong output, no exception) - different localization challenge
    - Multi-file/complex codebase repairs
    - Non-Python languages (though mechanism may transfer)
    - Models without instruction tuning
  known_limitations: |
    - Single model tested (CodeLlama-7B-Instruct)
    - Relatively simple MBPP problems
    - G3 definition (error + line) is one variant among possible G3-level options
    - Results may not scale to larger models that can process more context

