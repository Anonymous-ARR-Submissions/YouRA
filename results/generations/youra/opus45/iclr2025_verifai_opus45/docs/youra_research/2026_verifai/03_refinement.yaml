causal_mechanism:
  causal_chain_count: 3
  steps:
    - step: 1
      description: "Error feedback granularity affects LLM attention allocation"
      evidence: "Haque et al. (2025) showed prompting strategy matters for trace effectiveness"
      falsifier: "If attention distribution is identical across G0-G4 (measurable via attention weights)"
    - step: 2
      description: "G3 provides optimal 'pointer' signal - sufficient localization without overload"
      evidence: "Analogous to human debugging - line number is sufficient for experienced programmers"
      falsifier: "If G4 consistently outperforms G3, the 'overload' mechanism is wrong"
    - step: 3
      description: "Focused attention on error location enables more accurate repair generation"
      evidence: "Self-Debug shows error-aware repair outperforms blind retry"
      falsifier: "If repair accuracy is uncorrelated with attention focus on error region"
  key_tension: "The exact optimal granularity (G3 specifically) is a specific prediction that may be wrong by ±1 level"
  evidence_summary: |
    The Attention Window Hypothesis synthesizes findings from Self-Debug (execution feedback helps),
    Haque et al. (prompt presentation matters), and cognitive load theory (too much info hurts).
    The specific G3 prediction is a bold but testable claim derived from this mechanism.

