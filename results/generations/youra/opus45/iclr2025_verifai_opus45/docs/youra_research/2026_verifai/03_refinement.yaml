variables:
  independent:
    - name: "error_feedback_granularity"
      type: "categorical"
      operationalization: "Five discrete levels of error information provided to LLM"
      levels:
        - "G0: Pass/Fail Only ('Test failed')"
        - "G1: Error Type ('Test failed: IndexError')"
        - "G2: Error + Message ('IndexError: list index out of range')"
        - "G3: Error + Line ('IndexError at line 7: list index out of range')"
        - "G4: Full Context (Stack trace + variable values at error point)"
  dependent:
    - name: "repair_success_rate"
      type: "continuous"
      operationalization: "Proportion of failed test cases successfully repaired after one LLM repair attempt (0-100%)"
      primary: true
