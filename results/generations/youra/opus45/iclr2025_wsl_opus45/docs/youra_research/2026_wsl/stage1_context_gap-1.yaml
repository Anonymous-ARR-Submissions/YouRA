gap_id: "gap-1"
gap_title: "Absence of Controlled LoRA Adapter Dataset with Verified Provenance"
gap_description: |
  No existing dataset provides LoRA adapters with:
  1. Verified identical base model checkpoint (SHA-256 hash)
  2. Fixed training hyperparameters (only task/data varies)
  3. Logged random seeds for reproducibility
  4. Minimum 17 adapters per task category for statistical power

  This gap directly caused all three previous experimental failures.

