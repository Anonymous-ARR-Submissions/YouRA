measurement_plan:
  data_collection:
    - source: "Generate 200 LoRA adapters in-house (20 per task × 8 tasks + 5 seed variants per task)"
    - source: "Extract B matrices from all LoRA-adapted layers per adapter"
    - source: "Compute pairwise Grassmann geodesic distances"
  procedure:
    - step: "Phase 1: Generate controlled adapter population with verified provenance"
    - step: "Phase 2: Extract B matrices, compute orthonormal bases via QR decomposition"
    - step: "Phase 3: Compute pairwise Grassmann distances using scipy.linalg.subspace_angles"
    - step: "Phase 4: Statistical testing (Mann-Whitney U, Spearman correlation)"
    - step: "Phase 5: Layer-wise analysis to identify strongest clustering layers"
  success_criteria:
    - "P1: p < 0.05 AND Cohen's d > 0.5 for within vs between cluster comparison"
    - "P2: Spearman ρ > 0.3 with FLAN task taxonomy"
    - "P3: within-task distance < 0.5 × within-cluster distance"

