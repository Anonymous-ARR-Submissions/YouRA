hypothesis_draft:
  title: "LoRA Adapter Geometric Signatures for Task Similarity Detection"
  hypothesis_id: "H-LoRAGeo-v1"
  core_claim: |
    Under controlled experimental conditions (single verified base model, identical LoRA
    hyperparameters, deterministic training), LoRA adapters trained on semantically similar
    tasks exhibit significantly smaller pairwise Grassmann distances in their B matrix
    column spaces compared to adapters on dissimilar tasks.
  mechanism: |
    1. Fine-tuning induces task-specific weight updates
    2. LoRA constrains updates to B matrix column space (low-rank subspace)
    3. Similar tasks require similar functional transformations → similar B column spaces
    4. Similar subspaces → smaller Grassmann geodesic distance
  predictions:
    - P1: "Within-cluster Grassmann distance < between-cluster distance (p < 0.05, d > 0.5)"
    - P2: "Grassmann distance correlates with FLAN task taxonomy (ρ > 0.3)"
    - P3: "Within-task variance << within-cluster variance (controls for training stochasticity)"

variables_summary:
  independent: "Task semantic similarity (same-cluster vs different-cluster per FLAN taxonomy)"
  dependent_primary: "Grassmann geodesic distance between B matrix column spaces"
  controlled: "Base model (SHA-256 verified), LoRA config (r=32, alpha=64), training hyperparameters, random seed"

null_hypothesis:
  h0_statement: |
    There is no significant difference in Grassmann distances between LoRA adapter
    B matrix column spaces for adapters trained on semantically similar vs. dissimilar
    tasks. Any observed differences are due to training stochasticity or measurement noise.
  statistical_test: "Mann-Whitney U (non-parametric)"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First controlled validation of LoRA geometric signature hypothesis with adequate statistical power using Model Zoo methodology adapted for LoRA adapters"
  differentiation_summary: |
    Unlike prior work (StelLA, FL-TAC, Model Zoos), this research combines:
    1. Controlled provenance (identical base model, fixed hyperparameters)
    2. Adequate statistical power (n ≥ 17 per category)
    3. LoRA-specific analysis (B matrix column spaces)
    4. Multi-tier validation (clustering + correlation + control)

clarity:
