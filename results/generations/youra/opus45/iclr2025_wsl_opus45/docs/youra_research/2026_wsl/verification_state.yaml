main_hypothesis:
  id: H-LoRAGeo-v1
  title: LoRA Adapter Geometric Signatures for Task Similarity Detection
  statement: 'Under controlled experimental conditions (single verified base model, identical LoRA

    hyperparameters, deterministic training), if we train LoRA adapters on semantically

    similar tasks and compute Grassmann distances between their B matrix column spaces,

    then within-category distances will be significantly smaller than between-category

    distances (p < 0.05, Cohen''s d > 0.5), because fine-tuning induces task-specific

    geometric modifications to weight spaces that are constrained by LoRA''s low-rank structure.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: LoRA Zoo (In-House Generated)
    model: Llama-3.2-1B (initial) / Llama-2-7B (replication)
    optimizer: AdamW
    hyperparameters:
      lora_r: 32
      lora_alpha: 64
      lora_dropout: 0.05
      learning_rate: 2e-4
      batch_size: 8
      epochs: 3
      seed: 42
