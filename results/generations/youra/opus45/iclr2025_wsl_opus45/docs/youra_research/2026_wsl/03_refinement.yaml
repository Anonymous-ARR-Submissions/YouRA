# ═══════════════════════════════════════════════════════════════
# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "Grassmann distance is a valid metric for comparing subspaces"
      status: "BUILD_ON"
      evidence: "Mathematical foundation well-established; scipy.linalg.subspace_angles provides robust implementation"
    - claim: "LoRA constrains weight updates to low-rank subspaces (B matrix column space)"
      status: "BUILD_ON"
      evidence: "Original LoRA paper [Hu et al., 2021]; fundamental design property"
    - claim: "Previous experiments show effect direction is correct (within < between)"
      status: "BUILD_ON"
      evidence: "Run 3 showed Cohen's d = 0.91, 95% CI excludes zero"
    - claim: "Statistical power requires n ≥ 17 per group for d = 0.9"
      status: "BUILD_ON"
      evidence: "Standard power analysis; G*Power methodology"
    - claim: "Controlled provenance (identical base model) eliminates confounding"
      status: "PROVE_NEW"
      evidence: "Model Zoo methodology [Schürholt 2022] demonstrates this for full models; must validate for LoRA adapters"
    - claim: "Geometric distance reflects task semantics, not artifacts"
      status: "PROVE_NEW"
      evidence: "Requires correlation with FLAN task taxonomy to validate"
  scope_reduction_percentage: 40
  phase2b_4_instructions: |
    BUILD_ON claims can be referenced without re-verification.
    PROVE_NEW claims require experimental validation in Phase 4.
    The primary PROVE_NEW claim is the controlled provenance effect.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-LoRAGeo-v1"
  confidence_level: 0.80
  core_hypothesis_statement: |
    Under controlled experimental conditions (single verified base model, identical LoRA
    hyperparameters, deterministic training), if we train LoRA adapters on semantically
    similar tasks and compute Grassmann distances between their B matrix column spaces,
    then within-category distances will be significantly smaller than between-category
    distances (p < 0.05, Cohen's d > 0.5), because fine-tuning induces task-specific
    geometric modifications to weight spaces that are constrained by LoRA's low-rank structure.
  alternative_hypothesis_h0: |
    There is no significant difference in Grassmann distances between LoRA adapter
    B matrix column spaces for adapters trained on semantically similar vs. dissimilar
    tasks, even under controlled experimental conditions. Any observed differences are
    due to training stochasticity or measurement noise.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Task Semantic Similarity"
      type: "categorical"
      operationalization: "Same-cluster vs different-cluster assignment based on FLAN task taxonomy"
      levels:
        - "within-cluster (same task category)"
        - "between-cluster (different task category)"
    - name: "Task Category"
      type: "categorical"
      operationalization: "Classification of training task by cognitive/linguistic function"
      levels:
        - "Reasoning (GSM8K, ARC-C, LogiQA, StrategyQA)"
        - "NLU (MNLI, QQP, SST-2, MRPC)"
  dependent:
    - name: "Grassmann Geodesic Distance"
      type: "continuous"
      operationalization: "sqrt(sum of squared principal angles) between B matrix column spaces; range [0, π√r] where r is LoRA rank"
      primary: true
    - name: "Layer-wise Clustering Strength"
      type: "continuous"
      operationalization: "Effect size (Cohen's d) per layer type; identifies which layers show strongest task similarity signal"
      primary: false
  controlled:
    - name: "Base Model"
      operationalization: "Single checkpoint with SHA-256 hash verification (Llama-3.2-1B or Llama-2-7B)"
    - name: "LoRA Configuration"
      operationalization: "r=32, alpha=64, dropout=0.05, target_modules=[q_proj, k_proj, v_proj, o_proj, up_proj, down_proj, gate_proj]"
    - name: "Training Hyperparameters"
      operationalization: "lr=2e-4, batch_size=8, epochs=3, optimizer=AdamW, warmup_ratio=0.1"
    - name: "Random Seed"
      operationalization: "seed=42 for LoRA initialization; CUDA deterministic mode enabled"
    - name: "Data Preprocessing"
      operationalization: "Identical tokenizer, max_length=512, padding='max_length'"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Fine-tuning on a specific task induces weight updates that encode task-relevant transformations"
      evidence: "Established in fine-tuning literature; task performance improvement requires functional weight changes"
      falsifier: "If fine-tuning produces random weight perturbations unrelated to task, no systematic geometric structure would emerge"
    - step: 2
      description: "LoRA constrains these updates to a low-rank subspace defined by the B matrix column space"
      evidence: "LoRA design: ΔW = BA where B ∈ R^{d×r}, A ∈ R^{r×k}; updates lie in column space of B"
      falsifier: "If LoRA updates were not constrained to B column space (implementation bug), geometry would be meaningless"
    - step: 3
      description: "Semantically similar tasks require similar functional transformations, leading to similar B column spaces"
      evidence: "Transfer learning success between similar tasks [FLAN, T0]; shared functional requirements"
      falsifier: "If similar tasks required orthogonal transformations, their B column spaces would be maximally distant"
    - step: 4
      description: "Similar B column spaces manifest as smaller Grassmann distances"
      evidence: "Mathematical property: Grassmann distance measures subspace angle; aligned subspaces have small distance"
      falsifier: "This step is definitional (mathematical); cannot be falsified"
  key_tension: "Step 3 assumes 'similar tasks require similar transformations' - this is the core empirical claim to validate"
  evidence_summary: |
    The causal chain is grounded in LoRA's mathematical structure (Steps 1-2, 4) and the empirical
    observation that transfer learning works between similar tasks (Step 3). Previous experiments
    showed the correct effect direction (Cohen's d = 0.91) but lacked statistical power due to
    uncontrolled provenance. This hypothesis tests Step 3 under controlled conditions.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Task semantic similarity is well-defined and can be operationalized via FLAN task taxonomy"
    supporting_evidence: "FLAN task clustering validated in multi-task learning literature; tasks grouped by similar instructions transfer better"
    consequence_if_violated: "If task similarity is ill-defined, the IV (same-cluster vs different-cluster) is meaningless"
  - id: "A2"
    assumption: "Grassmann distance captures functionally relevant subspace differences"
    supporting_evidence: "Principal angles measure alignment; used in manifold learning, subspace clustering"
    consequence_if_violated: "If Grassmann distance ignores functionally relevant structure, it's the wrong metric"
  - id: "A3"
    assumption: "B matrix column space (not A matrix or BA product) is the appropriate representation"
    supporting_evidence: "B projects into the output dimension; A projects from input. Task-specific output transformations are encoded in B"
    consequence_if_violated: "If A matrix or BA product contains the signal, B-only analysis would miss it"
  - id: "A4"
    assumption: "Training stochasticity does not dominate the task-specific signal"
    supporting_evidence: "Control condition P3 tests this directly; different seeds on same task should show small within-task variance"
    consequence_if_violated: "If training noise >> task signal, geometric distances would be uninformative"
  - id: "A5"
    assumption: "Results on tested base models generalize to other transformer LLMs with LoRA"
    supporting_evidence: "LoRA mechanism is architecture-agnostic; same low-rank constraint applies across models"
    consequence_if_violated: "Results would be base-model-specific, limiting generalizability (acceptable scope limitation)"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Transformer-based large language models with LoRA adaptation
    - Task-specific fine-tuning on classification or generation benchmarks
    - LoRA ranks in range r ∈ {16, 32, 64}
    - English language tasks from established benchmarks
  does_not_apply_to: |
    - Full fine-tuning (no LoRA constraint)
    - Other PEFT methods (prefix tuning, adapters, IA3)
    - Non-transformer architectures (CNNs, RNNs)
    - Multi-task or continual learning settings (single task per adapter)
    - Languages other than English (not tested)
  known_limitations: |
    - Initial validation limited to Llama model family
    - Task selection (8 tasks) is a sample from broader task space
    - Effect may vary with LoRA rank (to be tested via ablation)
    - Does not explain WHY certain layers cluster better (mechanism for layer differences unknown)

