predictions:
  - id: "P1"
    primary: true
    statement: "Within-cluster Grassmann distances are smaller than between-cluster distances"
    test_method: "Mann-Whitney U test comparing within-cluster vs between-cluster distance distributions"
    success_criterion: "p < 0.05 AND Cohen's d > 0.5"
    falsification: "p > 0.10 OR Cohen's d < 0.3 with adequate sample size (n ≥ 17 per cluster)"
  - id: "P2"
    primary: false
    statement: "Grassmann distance correlates with FLAN task taxonomy distance"
    test_method: "Spearman rank correlation between pairwise Grassmann distances and task taxonomy distances"
    success_criterion: "ρ > 0.3, p < 0.05"
    falsification: "ρ < 0.1 OR p > 0.10"
  - id: "P3"
    primary: false
    statement: "Within-task variance (different seeds) is much smaller than within-cluster variance"
    test_method: "Compare mean within-task distance vs mean within-cluster distance"
    success_criterion: "within-task distance < 0.5 × within-cluster distance"
    falsification: "within-task distance ≥ within-cluster distance (training noise dominates)"

