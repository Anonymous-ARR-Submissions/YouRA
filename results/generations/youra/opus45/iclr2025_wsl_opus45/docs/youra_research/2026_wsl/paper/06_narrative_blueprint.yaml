# ═══════════════════════════════════════════════════════════════════════════════
# PART 1: HOOK & MOTIVATION
# ═══════════════════════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: |
      As parameter-efficient fine-tuning proliferates, practitioners accumulate hundreds of LoRA
      adapters with no principled way to understand their relationships. When facing a new task,
      which existing adapter should serve as initialization? Which adapters encode similar
      functional transformations? Current practice relies on metadata tags and manual curation—
      but the adapters themselves contain geometric structure that reveals task similarity.
    strategy: "practical_failure"
    # Alternative hooks considered:
    # - Surprising statistic: "40 LoRA adapters, 780 pairwise comparisons, one geometric signal"
    # - Counterintuitive: "Adapters for unrelated tasks share more structure than adapters for the same task trained with different seeds"

  why_reader_should_care:
    main_reason: |
      LoRA adapter collections (model zoos) are growing rapidly, but we lack tools to
      understand or leverage their internal structure. Task similarity detection from
      adapter geometry could enable intelligent adapter selection, transfer learning,
      and adapter merging without requiring additional inference.
    concrete_example: |
      A practitioner with 100 domain-specific LoRA adapters wants to fine-tune for a new
      reasoning task. Currently, they must either try multiple adapters experimentally or
      rely on sparse documentation. Geometric signatures could automatically identify the
      most similar existing adapters.
    stakes: |
      Without geometric understanding, adapter collections become black-box repositories
      where selection is guesswork. This limits the potential of parameter-efficient
      fine-tuning as a modular paradigm for LLM customization.

  real_world_impact:
    application_domain: "LLM customization and adapter management"
    potential_beneficiaries: |
      - ML practitioners managing adapter collections
      - Researchers studying transfer learning in LLMs
      - Organizations deploying domain-specific LLM variants
    scale_of_impact: |
      With LoRA becoming the dominant PEFT method (17,000+ citations), geometric
      understanding of adapters has broad applicability across the LLM ecosystem.

# ─────────────────────────────────────────────────────────────────────────────
# PROBLEM FRAMING
# ─────────────────────────────────────────────────────────────────────────────

problem_framing:
  surface_problem:
    description: |
      LoRA adapters are treated as opaque artifacts—we know what task they were trained
      on, but not how their learned transformations relate to each other.
    common_understanding: |
      Prior work focuses on improving LoRA training (DoRA, QLoRA) or merging adapters
      (task arithmetic), but not on understanding adapter geometry as a representation
      of task structure.

  deeper_problem:
    description: |
      The B matrix in LoRA (ΔW = BA) defines a low-rank subspace in weight space.
      If semantically similar tasks require similar functional transformations, their
      B matrices should span similar subspaces—but this geometric hypothesis has
      never been rigorously validated under controlled conditions.
    why_overlooked: |
      Previous attempts used public HuggingFace adapters with mixed provenance (different
      base models, hyperparameters, training procedures), confounding task similarity
      with experimental artifacts. Effect sizes were promising (d = 0.91) but statistically
      underpowered (p = 0.127 with only 8 adapters).
    our_perspective: |
      We treat LoRA adapter geometry as a first-class research object, applying Model Zoo
      methodology (Schürholt et al., 2022) to generate controlled adapter populations
      where only the training task varies.

  gap_in_existing_work:
    description: |
      No prior work has validated LoRA geometric signatures under controlled experimental
      conditions with adequate statistical power. Existing approaches either lack
      provenance control or insufficient sample sizes.
    why_gap_exists: |
      Generating controlled adapter populations requires substantial compute, and most
      work focuses on improving adapters rather than understanding them. Weight-space
      learning research has focused on full models, not parameter-efficient adapters.
    why_gap_matters: |
      Without validated geometric foundations, we cannot build reliable tools for
      adapter retrieval, similarity detection, or principled adapter selection.

# ═══════════════════════════════════════════════════════════════════════════════
# PART 2: THE INSIGHT
# ═══════════════════════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: |
      LoRA adapter B matrix column spaces encode task-specific geometric signatures
      that cluster by semantic similarity, detectable via Grassmann distance with
      large effect size (d = 0.77) under controlled conditions.
    expanded_explanation: |
      By training 40 LoRA adapters under identical conditions (same base model,
      hyperparameters, and training procedure) varying only the task, we isolate
      task-specific geometric structure. The Grassmann distance between B matrix
      column spaces reveals that within-category adapters (e.g., reasoning tasks)
      are significantly closer than between-category adapters (reasoning vs NLU),
      with the effect distributed uniformly across all transformer layer types.

  why_others_missed_it:
    common_assumptions: |
      - Public adapter collections are "good enough" for comparative studies
      - Small sample sizes (8-10 adapters) provide sufficient power
      - Layer-specific effects should dominate if geometry encodes task structure
    our_different_view: |
      - Controlled provenance is essential—base model mismatch confounds everything
      - Effect sizes require n ≥ 17 per group for 80% power at d = 0.9
      - Task geometry may be a global property distributed across layers
    enabling_factor: |
      Applying Model Zoo methodology to LoRA adapters—generating controlled populations
      where only the training task varies—enabled us to isolate the geometric signal
      from experimental artifacts.

  what_makes_it_work:
    intuitive_explanation: |
      Similar tasks require similar functional transformations. LoRA constrains these
      transformations to a low-rank subspace (the B matrix column space). If two tasks
      need similar output transformations, their B matrices should span similar subspaces—
      and Grassmann distance measures exactly this subspace alignment.
    key_mechanism: |
      Grassmann distance computes principal angles between subspaces. Smaller angles
      mean more aligned subspaces. Within-category tasks (e.g., both reasoning) produce
      adapters with more aligned B column spaces than between-category tasks.
    analogy: |
      Like how documents about similar topics cluster in embedding space, LoRA adapters
      for similar tasks cluster in Grassmann geometry—but the "embedding" is the
      learned transformation subspace, not activation patterns.

# ═══════════════════════════════════════════════════════════════════════════════
# PART 3: EVIDENCE STORY
# ═══════════════════════════════════════════════════════════════════════════════

evidence_narrative:
  main_claim:
    statement: |
      LoRA adapter B matrix column spaces encode detectable task-specific geometric
      signatures that correlate with semantic task similarity.
    measurable_criteria: |
      - Within-category Grassmann distances < between-category (p < 0.05)
      - Effect size Cohen's d > 0.5 (medium-to-large)
      - Correlation with FLAN taxonomy (Spearman ρ > 0.3)

  supporting_evidence:
    - id: "evidence_1"
      what: |
        H-E1 (Existence): Within-cluster mean = 7.61, between-cluster mean = 7.80,
        p = 8.63e-28, Cohen's d = 0.7652, 95% CI [0.1553, 0.2263]
      so_what: |
        The clustering phenomenon exists with high statistical confidence and
        practically significant effect size—not an artifact of noise or small samples.
      how_it_supports_claim: |
        Establishes that task-category clustering in Grassmann geometry is real,
        reproducible, and statistically robust (N = 780 pairwise comparisons).

    - id: "evidence_2"
      what: |
        H-M3 (Mechanism): Spearman ρ = 0.389 (p = 1.29e-29) between Grassmann
        distance and FLAN taxonomy distance, 95% CI [0.328, 0.450]
      so_what: |
        Geometric similarity correlates with semantic similarity—the clustering
        is not arbitrary but reflects meaningful task relationships.
      how_it_supports_claim: |
        Validates the causal mechanism: similar tasks → similar transformations →
        similar B column spaces → smaller Grassmann distances.

    - id: "evidence_3"
      what: |
        H-M4 (Layer Analysis): All 7 layer types show similar clustering strength
        (d = 0.745-0.783), no significant attention vs MLP difference.
      so_what: |
        Task-category signal is distributed uniformly across the network, not
        concentrated in specific layers—a global property of adapter geometry.
      how_it_supports_claim: |
        Refines understanding: geometric signatures are network-wide, suggesting
        holistic representation rather than layer-specialized encoding.

  surprising_findings:
    finding: |
      Training stochasticity contributes substantially more variance than expected:
      within-task variance ratio = 0.89 (expected < 0.5). The P3 control failed,
      indicating that same-task adapters trained with different seeds are nearly
      as different as different-task adapters within a category.
    why_surprising: |
      We expected deterministic training to produce highly similar adapters for
      the same task. Instead, initialization and optimization trajectory strongly
      influence final geometry.
    our_interpretation: |
      The task signal is detectable above the stochasticity floor, but adapter
      geometry captures both task structure AND training dynamics. This limits
      applications requiring fine-grained similarity but doesn't invalidate
      coarse-grained task-category detection.

  what_results_mean:
    synthesis: |
      LoRA adapters encode geometric signatures of their training tasks, detectable
      via Grassmann distance with d = 0.77. The effect correlates with semantic
      similarity (ρ = 0.39) and is distributed uniformly across layers. However,
      training stochasticity is a significant factor, and the FLAN taxonomy provides
      only coarse-grained similarity signal.
    confidence_level: "0.75 (reduced from 0.80 due to P3 control failure)"
    caveats: |
      - Single model family tested (TinyLlama-1.1B)
      - Binary taxonomy (same/different category) is coarse-grained
      - 3 training epochs may be insufficient for convergence
      - Within-task variance higher than expected

# ═══════════════════════════════════════════════════════════════════════════════
# PART 4: BROADER IMPACT
# ═══════════════════════════════════════════════════════════════════════════════

takeaway:
  main_contribution:
    one_sentence: |
      First controlled empirical validation that LoRA adapter B matrix column spaces
      encode task-specific geometric signatures detectable via Grassmann distance.
    why_significant: |
      Establishes geometric foundations for adapter understanding, enabling future
      work on adapter retrieval, transfer prediction, and principled selection.

  implications:
    for_field: |
      Opens a new research direction: weight-space learning applied to parameter-efficient
      adapters. Connects LoRA research with Riemannian geometry and model zoo analysis.
    for_practice: |
      Provides a principled metric (Grassmann distance) for comparing LoRA adapters
      without requiring inference. Could enable adapter search/retrieval systems.
    conceptual_contribution: |
      Demonstrates that PEFT adapters, not just full models, have interpretable
      geometric structure that reflects training objectives.

  future_possibilities:
    immediate_extensions: |
      - Robustness study with longer training (5-10 epochs)
      - Generalization to 7B+ models (Llama-2-7B, Mistral)
      - Refined similarity metrics (SBERT embeddings vs binary taxonomy)
    longer_term_vision: |
      Geometric adapter retrieval systems: given a new task, automatically identify
      the most similar existing adapter for initialization or transfer.
    open_questions: |
      - Does the effect scale with model size?
      - Can geometric similarity predict transfer performance?
      - What is the optimal LoRA rank for geometric detectability?

