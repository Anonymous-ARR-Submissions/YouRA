# PART 5: SECTION-LEVEL NARRATIVE GOALS
# ═══════════════════════════════════════════════════════════════════════════════

section_goals:

  abstract:
    narrative_purpose: "Compress the entire story into ~150 words"
    key_message: |
      LoRA adapters encode detectable geometric signatures of task similarity
      (d = 0.77, ρ = 0.39), enabling principled adapter comparison.
    structure_notes: |
      - Sentence 1-2: Problem (adapter proliferation, no similarity metrics)
      - Sentence 3: Approach (controlled adapter generation, Grassmann distance)
      - Sentence 4-5: Results (d = 0.77, ρ = 0.39, uniform across layers)
      - Sentence 6: Significance (foundations for adapter retrieval)
    avoid:
      - "Citations in abstract"
      - "Vague claims without numbers"
      - "Undefined acronyms (define LoRA on first use)"

  introduction:
    narrative_purpose: "Hook → Problem → Insight → Solution preview"
    hook_strategy: "practical_failure"
    problem_escalation: |
      1. Surface: Adapters are opaque artifacts (known to all)
      2. Deeper: B matrix geometry may encode task structure (our framing)
      3. Gap: No controlled validation exists (our opportunity)
    insight_preview: |
      "We hypothesize that similar tasks induce similar B column spaces,
      testable via Grassmann distance under controlled conditions."
    contributions_framing: |
      Three contributions as natural outcomes:
      (1) Existence proof: clustering phenomenon validated
      (2) Mechanism: correlation with semantic similarity confirmed
      (3) Negative finding: layer uniformity rather than specialization
    transition_to_related_work: |
      "Before presenting our methodology, we situate this work within
      LoRA research, weight-space learning, and subspace analysis."

  related_work:
    narrative_purpose: "Show why existing work is insufficient → justify our approach"
    positioning_strategy: |
      Three areas: (1) LoRA improvements don't study geometry, (2) weight-space
      learning focuses on full models, (3) adapter comparison lacks controlled
      experiments. We bridge all three.
    key_comparison_points:
      - area: "LoRA Research (DoRA, StelLA)"
        limitation_to_highlight: "Focus on improving training, not understanding geometry"
        how_we_differ: "We analyze adapter geometry as a representation of task structure"
      - area: "Weight Space Learning (Model Zoos, SANE)"
        limitation_to_highlight: "Focus on full models, not parameter-efficient adapters"
        how_we_differ: "We adapt Model Zoo methodology specifically for LoRA adapters"
      - area: "Adapter Comparison (FL-TAC, Task Similarity)"
        limitation_to_highlight: "Lack controlled experiments, small sample sizes"
        how_we_differ: "We generate controlled adapter populations with verified provenance"
    papers_to_discuss:
      - "Hu et al., 2021 (LoRA foundational)"
      - "Schürholt et al., 2022 (Model Zoos)"
      - "Liu et al., 2024 (DoRA)"
      - "Li et al., 2025 (StelLA)"
      - "Ping et al., 2024 (FL-TAC)"
    avoid:
      - "Just listing papers without critique"
      - "Being unfair to prior work"
      - "Missing obvious related work"

  methodology:
    narrative_purpose: "Explain WHY this design solves the problem"
    connection_to_insight: |
      "To test whether similar tasks produce similar B column spaces, we need:
      (1) controlled adapter generation isolating task as the only variable,
      (2) geometric comparison via Grassmann distance on B matrices."
    key_design_decisions:
      - decision: "Generate adapters in-house rather than using public collections"
        rationale: "Public adapters have uncontrolled provenance (different base models, hyperparameters)"
        alternatives_considered: "HuggingFace Hub adapters (rejected: provenance issues)"
      - decision: "Use Grassmann distance on B matrix column spaces"
        rationale: "Grassmann distance measures subspace alignment; B encodes output transformations"
        alternatives_considered: "Projection Frobenius, CKA, direct weight comparison"
      - decision: "FLAN taxonomy for task similarity ground truth"
        rationale: "Established clustering validated in multi-task learning"
        alternatives_considered: "SBERT embeddings, manual annotation"
    intuition_building: |
      - Figure: Architecture diagram showing B matrix → column space → Grassmann comparison
      - Equation: Grassmann distance as sqrt(sum of squared principal angles)
    technical_depth_balance: |
      Main text: intuition and key equations
      Appendix: implementation details, hyperparameters, compute setup

  experiments:
    narrative_purpose: "Design experiments that test our specific claims"
    experimental_questions:
      - question: "Do within-category adapters cluster geometrically?"
        experiment: "H-E1: Mann-Whitney U test, within vs between distances"
        expected_outcome: "p < 0.05, d > 0.5"
      - question: "Does geometric similarity correlate with semantic similarity?"
        experiment: "H-M3: Spearman correlation with FLAN taxonomy"
        expected_outcome: "ρ > 0.3"
      - question: "Do specific layers show stronger clustering?"
        experiment: "H-M4: Per-layer Cohen's d analysis"
        expected_outcome: "At least one layer d > 0.8"
    baseline_rationale: |
      - Within-task seed variance (P3 control): tests if task signal > training noise
      - Random orthonormal matrices: expected distance baseline
    dataset_rationale: |
      8 tasks (4 reasoning: GSM8K, ARC-C, LogiQA, StrategyQA; 4 NLU: MNLI, QQP, SST-2, MRPC)
      chosen for clear FLAN category separation and established benchmarks.
    metric_rationale: |
      Cohen's d for effect size (interpretable), Mann-Whitney U for non-parametric
      significance, Spearman ρ for monotonic correlation.
    fairness_considerations: |
      - Same hyperparameters across all adapters
      - Same base model checkpoint (SHA-256 verified)
      - Same training epochs, batch size, learning rate

  results:
    narrative_purpose: "Present evidence that supports our claims"
    main_result_highlight: |
      H-E1: Cohen's d = 0.7652 (p = 8.63e-28) — task-category clustering exists
      with large effect size and overwhelming statistical significance.
    result_presentation_order:
      - result: "H-E1 existence proof (primary finding)"
        purpose: "Establish that the phenomenon is real"
      - result: "H-M3 mechanism correlation"
        purpose: "Show semantic similarity drives geometric similarity"
      - result: "H-M4 layer uniformity (negative finding)"
        purpose: "Refine understanding—effect is global, not layer-specific"
      - result: "P3 control failure"
        purpose: "Honest limitation—training stochasticity is significant"
    surprising_result_handling: |
      Present P3 failure and H-M4 negative finding as scientifically interesting:
      "Contrary to expectation, task geometry is distributed uniformly..."
    avoid:
      - "Table 1 shows X, Table 2 shows Y (no interpretation)"
      - "Cherry-picking favorable results"
      - "Hiding the P3 control failure"

  discussion:
    narrative_purpose: "Interpret results, acknowledge limits, show significance"
    key_findings_interpretation: |
      The validated effect (d = 0.77) is practically significant for coarse-grained
      task-category detection. The moderate correlation (ρ = 0.39) suggests FLAN
      taxonomy is a useful but imperfect proxy for "semantic similarity."
    honest_limitations:
      - limitation: "Single model family (TinyLlama-1.1B)"
        why_acceptable: "Demonstrates feasibility; generalization is future work"
        future_mitigation: "Replicate on Llama-2-7B, Mistral-7B"
      - limitation: "Training stochasticity (P3 ratio = 0.89)"
        why_acceptable: "Task signal still detectable above noise floor"
        future_mitigation: "Longer training, seed ensembles"
      - limitation: "Binary FLAN taxonomy is coarse-grained"
        why_acceptable: "Establishes existence; refined metrics are future work"
        future_mitigation: "SBERT task embeddings for continuous similarity"
    broader_impact_statement: |
      This work has no direct negative societal impacts. Potential positive impact:
      improved adapter management could reduce redundant fine-tuning, saving compute.

  conclusion:
    narrative_purpose: "Reinforce key message + open future directions"
    callback_to_hook: |
      "We began by noting that practitioners lack principled tools to understand
      adapter relationships. Our findings establish that LoRA geometry provides
      such a tool—Grassmann distance reveals task-category structure with d = 0.77."
    memorable_ending: |
      "LoRA adapters are not opaque artifacts. Their B matrix column spaces carry
      geometric fingerprints of their training tasks, detectable without inference."
    future_work_vision: |
      "Beyond detection, geometric signatures could enable adapter retrieval systems:
      given a new task, automatically identify the most similar existing adapter
      for transfer or initialization—turning adapter collections into searchable
      knowledge bases."

