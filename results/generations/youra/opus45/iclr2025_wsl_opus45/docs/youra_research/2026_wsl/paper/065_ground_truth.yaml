      - "ARC-Challenge"
      - "ARC-Easy"
      - "LogiQA"
      - "PIQA"
    nlu:
      - "BoolQ"
      - "RTE"
      - "WiC"
      - "CB"

# ============================================================================
# H-E1: MAIN EFFECT GROUND TRUTH
# ============================================================================

h_e1_results:
  description: "Task-category clustering in Grassmann geometry"
  gate_status: "VALIDATED"

  primary_metrics:
    cohens_d: 0.7652
    cohens_d_threshold: 0.50
    p_value: 8.63e-28
    p_value_threshold: 0.001

  distance_statistics:
    within_category_mean: 0.6841
    within_category_std: 0.1523
    between_category_mean: 0.7892
    between_category_std: 0.1287

  sample_sizes:
    within_category_pairs: 320
    between_category_pairs: 480
    total_comparisons: 800

# ============================================================================
# H-M3: SEMANTIC CORRELATION GROUND TRUTH
# ============================================================================

h_m3_results:
  description: "Geometric similarity correlates with FLAN taxonomy"
  gate_status: "VALIDATED"

  primary_metrics:
    spearman_rho: 0.389
    spearman_rho_threshold: 0.30
    spearman_p_value: 1.24e-29
    spearman_p_threshold: 0.001

  correlation_details:
    method: "Spearman rank correlation"
    n_pairs: 780
    interpretation: "Moderate positive correlation"

# ============================================================================
# H-M4: LAYER-TYPE ANALYSIS GROUND TRUTH
# ============================================================================

h_m4_results:
  description: "Layer-type contribution to task-category clustering"
  gate_status: "VALIDATED_WITH_QUALIFICATION"

  primary_finding: "Uniform distribution across layer types"
  unexpected_result: true

  layer_type_cohens_d:
    q_proj: 0.721
    k_proj: 0.698
    v_proj: 0.745
    o_proj: 0.712
    gate_proj: 0.756
    up_proj: 0.768
    down_proj: 0.783

  best_layer_type:
    name: "down_proj"
    cohens_d: 0.783

  worst_layer_type:
    name: "k_proj"
    cohens_d: 0.698

  uniformity_evidence:
    range: 0.085  # 0.783 - 0.698
    all_above_threshold: true
    threshold: 0.50

# ============================================================================
# P3 CONTROL: WITHIN-TASK VARIANCE
# ============================================================================

p3_control:
  description: "Within-task geometric stability across random seeds"
  gate_status: "FAILED"

  metrics:
    within_task_variance_ratio: 0.89
    threshold: 0.50
    expected: "< 0.50 (within << between)"
    actual: "0.89 (within ≈ between)"

  interpretation: "Training stochasticity significantly affects adapter geometry"
  implication: "Fine-grained task discrimination limited by seed variance"

