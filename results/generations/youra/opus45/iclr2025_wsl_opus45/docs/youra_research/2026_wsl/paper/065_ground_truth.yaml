# ============================================================================
# EXPERIMENTAL SETUP GROUND TRUTH
# ============================================================================

experimental_setup:
  base_model: "TinyLlama-1.1B-intermediate-step-1431k-3T"
  lora_rank: 32
  lora_alpha: 64
  total_adapters: 40
  tasks_count: 8
  seeds_per_task: 5
  training_epochs: 3
  batch_size: 4
  learning_rate: 2.0e-4

  task_categories:
