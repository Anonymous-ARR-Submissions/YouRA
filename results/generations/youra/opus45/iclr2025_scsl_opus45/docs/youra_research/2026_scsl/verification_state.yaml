main_hypothesis:
  id: H-LossTraj-v1
  title: Loss Trajectory Divergence Analysis for Spurious Correlation Detection
  statement: 'Under standard ERM training on spurious correlation benchmarks (Waterbirds),

    if we track per-sample loss trajectories across epochs,

    then minority group samples will exhibit statistically distinguishable trajectory patterns

    (AUROC > 0.75) with delayed curvature stabilization (≥3 epochs later than majority),

    because the model experiences prolonged optimization conflict when spurious background

    features contradict learned shortcuts.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: Waterbirds
    model: ResNet-50 (pretrained on ImageNet)
    optimizer: SGD
    hyperparameters:
      learning_rate: 0.001
      batch_size: 64
      epochs: 20
      seeds: 10+
