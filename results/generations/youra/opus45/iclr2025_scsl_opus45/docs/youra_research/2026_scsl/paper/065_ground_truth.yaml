# ============================================================================
# DATASET AND EXPERIMENTAL SETUP
# ============================================================================

experimental_setup:
  dataset:
    name: "Waterbirds"
    total_samples: 4795
    minority_proportion: "~5%"
    spurious_correlation: "Background (water/land) vs bird type (waterbird/landbird)"
    source: "Sagawa et al. 2020"

  model:
    architecture: "ResNet-50"
    pretrained: true
    pretrained_source: "ImageNet"

  training:
    optimizer: "SGD"
    learning_rate: 0.001
    epochs: 50
    batch_size: 64

  trajectory_features:
    recorded_epochs: 50
    features_per_sample: 142
    feature_types:
      - "Per-epoch loss values (L1-L50)"
      - "Gradient norms"
      - "Loss curvature estimates"
      - "Forgetting events"

# ============================================================================
# KEY CLAIMS AND SUPPORTING EVIDENCE
# ============================================================================

claims:
  claim_1:
    statement: "Loss trajectory features predict minority group membership with AUROC = 0.9452"
    type: "primary_finding"
    evidence:
      - metric: "auroc_trajectory_features"
        value: 0.9452
      - experiment: "H-E1"
        result: "PASS"
    falsifiable_by: "AUROC < 0.75 on replication"

  claim_2:
    statement: "Initial loss alone (L1) achieves AUROC = 0.9473, enabling single-epoch screening"
    type: "efficiency_finding"
    evidence:
      - metric: "auroc_l1_alone"
        value: 0.9473
      - observation: "L1 dominates over temporal features in ablation"
    falsifiable_by: "L1 AUROC significantly lower than full trajectory AUROC"

  claim_3:
    statement: "Trajectory signal is spurious-specific: 29% attenuation under GroupDRO vs 1% under random reweighting"
    type: "mechanism_finding"
    evidence:
      - metric: "groupdro_attenuation"
        value: 0.2923
      - metric: "random_reweighting_attenuation"
        value: 0.0100
      - experiment: "H-M2"
        result: "PASS"
    falsifiable_by: "Random reweighting attenuation similar to GroupDRO attenuation"

  claim_4:
    statement: "Timing gap between majority and minority convergence is minimal (0.20 epochs)"
    type: "negative_finding"
    evidence:
      - metric: "epoch_gap"
        value: 0.20
      - experiment: "H-M1"
        result: "FAIL"
    interpretation: "Temporal dynamics hypothesis not supported; signal present from epoch 1"

