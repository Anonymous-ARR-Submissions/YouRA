hypothesis_draft:
  title: "Loss Trajectory Divergence Analysis for Spurious Correlation Detection"
  hypothesis_id: "H-LossTraj-v1"
  core_claim: |
    Per-sample loss trajectories exhibit statistically significant divergence between minority
    and majority groups in spurious correlation settings. This divergence:
    (a) is measurable with AUROC > 0.75 using simple trajectory features
    (b) reflects spurious-feature conflict (attenuates under GroupDRO)
    (c) shows distinctive temporal signatures in curvature dynamics
    (d) predicts future worst-group accuracy disparities across training runs
  mechanism: |
    The model learns spurious correlations early in training. Majority samples (aligned with
    spurious cues) experience fast loss descent and early curvature stabilization. Minority
    samples (conflicting background) experience prolonged optimization conflict, resulting
    in slower descent and delayed curvature stabilization. This creates measurable trajectory
    divergence that precedes and predicts downstream accuracy gaps.
  predictions:
    - P1: "Trajectory features achieve AUROC > 0.75 for minority prediction"
    - P2: "Curvature timing gap ≥ 3 epochs between majority and minority"
    - P3: "AUROC attenuates >0.10 under GroupDRO, <0.05 under random reweighting"
    - P4: "Early divergence predicts final WGA with R² > 0.5 across seeds"

variables_summary:
  independent: "Group membership (minority vs majority); Training regime (ERM/GroupDRO/Random)"
  dependent_primary: "Trajectory-based AUROC for minority prediction"
  controlled: "ResNet-50, Waterbirds dataset, standard ERM training, normalized loss"

null_hypothesis:
  h0_statement: |
    There is no significant difference in loss trajectory characteristics between minority
    and majority samples. Trajectory-based features predict group membership at chance level
    (AUROC ≈ 0.5, p > 0.05). Curvature timing is indistinguishable between groups.
  statistical_test: "Permutation test for AUROC significance; t-test for curvature timing gap"
  significance_level: 0.05

