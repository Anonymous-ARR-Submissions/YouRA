# ═══════════════════════════════════════════════════════════════════════════════
# PART 1: HOOK & MOTIVATION
# ═══════════════════════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: |
      A deep learning model achieving 97% overall accuracy can simultaneously fail on
      specific subgroups at rates exceeding 40%—and standard training provides no
      warning that this silent failure mode exists.
    strategy: "practical_failure"

    # Supporting data:
    # - Waterbirds: ~97% overall accuracy, ~60% worst-group accuracy under ERM
    # - Silent failure: No training signal indicates the minority group problem

  why_reader_should_care:
    main_reason: |
      Spurious correlations create model failures that are invisible during training
      and only surface when deployed to real-world distributions where the shortcut
      no longer holds.
    concrete_example: |
      A model trained on medical images where 95% of pneumonia cases happen to have
      chest drains could learn "chest drain → pneumonia" instead of actual pathology.
      This achieves high training accuracy but fails catastrophically on the 5% of
      pneumonia cases without drains—the very cases where accurate diagnosis matters most.
    stakes: |
      Without detection methods, practitioners deploy models with hidden failure modes.
      The model appears to work until it encounters the minority distribution—at which
      point it fails on precisely the samples it needed to get right.

  real_world_impact:
    application_domain: "High-stakes ML deployment (healthcare, autonomous systems, fairness-critical applications)"
    potential_beneficiaries: "ML practitioners deploying models to production; affected minority groups"
    scale_of_impact: "Any model trained on data with spurious correlations (ubiquitous in real-world datasets)"

# ─────────────────────────────────────────────────────────────────────────────
# PROBLEM FRAMING
# ─────────────────────────────────────────────────────────────────────────────

problem_framing:
  surface_problem:
    description: |
      Deep learning models exploit spurious correlations, leading to poor worst-group
      accuracy when test distributions differ from training.
    common_understanding: |
      The field recognizes this problem. Methods like GroupDRO address it, but require
      group labels during training—an expensive annotation burden.

  deeper_problem:
    description: |
      Existing detection methods for spurious correlation reliance are either
      post-hoc (requiring deployment to discover failures) or require expensive
      group annotations. There is no training-time diagnostic that reveals which
      samples are affected by spurious correlation learning.
    why_overlooked: |
      Prior work on training dynamics (forgetting events, memorization) focused on
      general sample difficulty, not the specific signature of spurious correlation
      conflict. The temporal dimension of how spurious correlations form was unexplored.
    our_perspective: |
      We hypothesize that the process of learning spurious correlations leaves a
      distinctive temporal signature in per-sample loss trajectories—one that can
      identify affected samples without requiring group labels.

  gap_in_existing_work:
    description: |
      No existing method extracts training-time signals that specifically identify
      samples affected by spurious correlation learning. Prior trajectory analysis
      focused on forgetting events (binary), not continuous loss curves; prior
      spurious correlation work focused on intervention, not diagnosis.
    why_gap_exists: |
      The connection between training dynamics research and spurious correlation
      robustness research has not been made. These are separate research communities
      with different objectives.
    why_gap_matters: |
      Without training-time diagnosis, spurious correlation failures remain hidden
      until deployment. Early detection could enable targeted intervention before
      model release.

# ═══════════════════════════════════════════════════════════════════════════════
# PART 2: THE INSIGHT
# ═══════════════════════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: |
      Per-sample loss trajectories during standard ERM training encode a spurious-
      feature-specific signal that distinguishes minority from majority samples
      with high accuracy (AUROC = 0.9452), detectable from the very first epoch.
    expanded_explanation: |
      When a model learns spurious correlations, majority samples (where spurious
      features align with labels) experience rapid loss descent. Minority samples
      (where spurious features conflict with labels) start with higher loss and
      maintain distinctive trajectory patterns. This divergence is not generic
      "sample hardness"—it specifically reflects spurious feature conflict, as
      demonstrated by its attenuation under GroupDRO (which targets spurious
      correlations) but not under variance-matched random reweighting (which only
      smooths gradients generically).

  why_others_missed_it:
    common_assumptions: |
      Prior work assumed per-sample training dynamics reflect general difficulty or
      memorization tendency. The spurious correlation community focused on accuracy
      metrics, not trajectory signatures.
    our_different_view: |
      We asked: does the process of learning spurious correlations leave a unique
      temporal fingerprint? Instead of looking at what the model predicts, we
      examined how the model learns each sample over time.
    enabling_factor: |
      The combination of per-sample loss tracking (from training dynamics literature)
      with spurious correlation benchmarks (from robustness literature) enabled this
      investigation. Neither community had connected these tools.

  what_makes_it_work:
    intuitive_explanation: |
      Imagine teaching a classifier with biased data where 95% of waterbirds appear
      on water backgrounds. The model learns "water background → waterbird" as a
      shortcut. For the 95% majority (aligned samples), this shortcut works perfectly,
      so their loss drops quickly. For the 5% minority (waterbirds on land), the
      shortcut gives wrong information, creating gradient conflict—their loss stays
      higher longer. This conflict manifests as a distinctive loss trajectory.
    key_mechanism: |
      Initial loss (L₁) captures the immediate spurious feature conflict. Minority
      samples start training with higher loss because the spurious shortcut already
      encoded in early layers gives incorrect signal. This signal is spurious-specific:
      it attenuates by 29% under GroupDRO (which reduces spurious reliance) but only
      1% under random reweighting (which just smooths gradients).
    analogy: |
      Like a student who learned a wrong rule—they struggle with problems that violate
      the rule, while others breeze through. The struggle pattern (trajectory) reveals
      they learned the wrong rule, even before you see their final answers.

# ═══════════════════════════════════════════════════════════════════════════════
# PART 3: EVIDENCE STORY
# ═══════════════════════════════════════════════════════════════════════════════

evidence_narrative:
  main_claim:
    statement: |
      Loss trajectory features extracted during ERM training can identify spurious
      correlation-affected samples with high accuracy, and this signal specifically
      reflects spurious feature conflict rather than generic sample difficulty.
    measurable_criteria: |
      (1) AUROC > 0.75 for minority prediction using trajectory features
      (2) Signal attenuates under spurious-targeting intervention (GroupDRO)
      (3) Signal persists under generic intervention (random reweighting)

  supporting_evidence:
    - id: "evidence_1_existence"
      what: "AUROC = 0.9452 ± 0.0072 for minority group prediction using trajectory features"
      so_what: |
        Trajectory features are highly discriminative—26% above the 0.75 threshold.
        This is not marginal success; it's a strong signal.
      how_it_supports_claim: |
        Demonstrates existence: loss trajectories DO diverge between groups and
        CAN predict minority membership.

    - id: "evidence_2_feature_analysis"
      what: "Initial loss (L₁) alone achieves AUROC = 0.9473, higher than combined features"
      so_what: |
        The signal is present from epoch 1—no extended training needed for detection.
        This is surprising: we expected temporal features to matter most, but
        magnitude dominates.
      how_it_supports_claim: |
        Reveals the mechanism is loss magnitude (immediate spurious conflict), not
        temporal dynamics. Enables efficient detection from single epoch.

    - id: "evidence_3_specificity"
      what: |
        GroupDRO attenuates AUROC by 0.2923 (0.94 → 0.65)
        Random reweighting attenuates by only 0.0100 (0.94 → 0.93)
      so_what: |
        The 29× difference proves the signal is spurious-specific. If it were generic
        sample hardness, both interventions would attenuate similarly (or neither would).
      how_it_supports_claim: |
        Validates specificity: trajectory divergence reflects spurious correlation
        conflict specifically, not generic difficulty.

    - id: "evidence_4_negative_result"
      what: "Curvature timing gap = 0.20 ± 0.40 epochs (target was ≥3 epochs)"
      so_what: |
        The proposed curvature timing mechanism is NOT supported. Curvature stabilizes
        at epoch 2-3 for ALL samples, not delayed for minority.
      how_it_supports_claim: |
        Honest negative result that refines our understanding: the signal is magnitude-
        based (L₁), not curvature-timing-based. This is a refined, not failed, hypothesis.

  surprising_findings:
    finding: |
      Initial loss (L₁) is more discriminative than temporal features (slope, variance,
      convergence time). Minority samples are identifiable from epoch 1.
    why_surprising: |
      We hypothesized temporal dynamics (curvature, timing) would be the key signal.
      Instead, the instantaneous magnitude at epoch 1 is most informative.
    our_interpretation: |
      With pretrained models, spurious features are already encoded in early layers.
      Minority samples immediately experience conflict because the pretrained shortcut
      gives wrong signal from the start. The conflict is visible instantly, not just
      over time.

  what_results_mean:
    synthesis: |
      Loss trajectory analysis provides a training-time diagnostic for spurious
      correlation vulnerability. The signal is strong (AUROC > 0.94), early (epoch 1),
      and specifically tied to spurious feature conflict (not generic hardness). The
      refined understanding is that loss magnitude, not curvature timing, drives
      discrimination.
    confidence_level: |
      High confidence in existence and specificity claims (H-E1 PASS, H-M2 PASS).
      Moderate confidence in mechanism (refined from curvature to magnitude).
    caveats: |
      - Single dataset (Waterbirds) limits generalization claims
      - Observational design; causal language limited to "consistent with"
      - Detection success does not guarantee intervention success

# ═══════════════════════════════════════════════════════════════════════════════
# PART 4: BROADER IMPACT
# ═══════════════════════════════════════════════════════════════════════════════

takeaway:
  main_contribution:
    one_sentence: |
      We demonstrate that per-sample loss trajectories during ERM training provide
      a spurious-correlation-specific diagnostic signal, enabling identification of
      affected samples from the first training epoch.
    why_significant: |
      This is the first temporal characterization of spurious correlation formation
      dynamics. It provides a training-integrated diagnostic that requires no group
      labels and works from epoch 1, potentially enabling early intervention before
      model deployment.

  implications:
    for_field: |
      Opens a new research direction connecting training dynamics analysis with
      spurious correlation robustness. Suggests trajectory-based features as a
      principled approach to sample selection for debiasing methods.
    for_practice: |
      Practitioners can monitor loss trajectories during training to identify
      potential spurious correlation vulnerability. High initial loss variance or
      specific trajectory patterns could flag datasets requiring robustness intervention.
    conceptual_contribution: |
      Demonstrates that the process of learning spurious correlations has a distinctive
      developmental signature—spurious reliance is not just an outcome but a visible
      process with diagnostic patterns.

  future_possibilities:
    immediate_extensions: |
      - Cross-dataset validation (CelebA, ColoredMNIST)
      - L₁-only efficient detection (single-epoch screening)
      - Trajectory-guided sample selection for GroupDRO
    longer_term_vision: |
      Trajectory-based early warning systems for spurious correlation vulnerability,
      integrated into standard training pipelines. Automatic detection and intervention
      without manual annotation.
    open_questions: |
      - Can trajectory features enable successful intervention (not just detection)?
      - Does the signal generalize to non-vision domains?
      - What is the minimum compute needed for reliable detection?

