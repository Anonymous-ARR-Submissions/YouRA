# PART 5: SECTION-LEVEL NARRATIVE GOALS
# ═══════════════════════════════════════════════════════════════════════════════

section_goals:

  abstract:
    narrative_purpose: "Compress the entire story into ~150 words"
    key_message: |
      Loss trajectory features predict spurious correlation-affected samples with
      AUROC = 0.9452, and this signal is spurious-specific (attenuates under GroupDRO
      but not random reweighting).
    structure_notes: |
      1. Problem: Spurious correlations cause silent model failures
      2. Gap: No training-time diagnostic exists
      3. Method: Loss trajectory analysis during ERM training
      4. Results: AUROC = 0.9452; spurious-specific (GroupDRO attenuation = 0.29)
      5. Significance: First temporal characterization of spurious correlation formation
    quantitative_highlights:
      - "AUROC = 0.9452 ± 0.0072"
      - "GroupDRO attenuation = 0.2923"
      - "Random reweighting attenuation = 0.0100"
      - "Detection possible from epoch 1"

  introduction:
    narrative_purpose: "Hook → Problem → Insight → Preview"
    hook_strategy: |
      Open with the silent failure paradox: high accuracy models with hidden
      catastrophic subgroup failure. Use specific numbers (97% overall, 40%+ subgroup
      failure) to make concrete.
    problem_escalation: |
      1. Surface: Spurious correlations hurt worst-group accuracy (known)
      2. Deeper: Detection methods are post-hoc or require expensive labels
      3. Gap: No training-time diagnostic that reveals affected samples
    insight_preview: |
      "We hypothesize that the process of learning spurious correlations leaves
      distinctive signatures in per-sample loss trajectories..."
    contributions_framing: |
      Building on this insight, we: (1) demonstrate trajectory features predict
      minority membership with AUROC = 0.9452, (2) show this signal is spurious-
      specific through a controlled attenuation experiment, (3) reveal that initial
      loss alone suffices for detection, enabling single-epoch screening.
    transition_to_related_work: |
      "Our approach builds on two research threads: training dynamics analysis and
      spurious correlation robustness. We now review each and highlight the gap at
      their intersection."

  related_work:
    narrative_purpose: "Show why existing work is insufficient → justify our approach"
    positioning_strategy: |
      Position at intersection of two communities: (1) training dynamics (Toneva, Li)
      focused on general difficulty, not spurious correlations; (2) spurious correlation
      methods (GroupDRO, JTT) focused on intervention, not training-time diagnosis.
    key_comparison_points:
      - area: "Training Dynamics Analysis"
        limitation_to_highlight: |
          Toneva et al. (2018) tracks forgetting events; Li et al. (2025) extracts
          142-D features. Neither targets spurious correlation specifically.
        how_we_differ: |
          We analyze trajectory divergence between spurious correlation groups
          specifically, not general sample difficulty.
      - area: "Spurious Correlation Methods"
        limitation_to_highlight: |
          GroupDRO requires group labels; JTT uses error-based detection at fixed
          epoch. No method uses trajectory-based diagnosis.
        how_we_differ: |
          We extract training-time diagnostic from trajectories, potentially enabling
          label-free detection.
      - area: "Gradient-Based Detection"
        limitation_to_highlight: |
          Gradient norm achieves AUC = 0.914 but is single-epoch snapshot; our prior
          work showed detection ≠ intervention success.
        how_we_differ: |
          Trajectory features capture temporal integration; we test spurious-specificity
          (not just detection power).
    papers_to_discuss:
      - "Toneva et al. (2018) - Example Forgetting"
      - "Li et al. (2025) - Training Dynamics Features"
      - "Sagawa et al. (2020) - GroupDRO"
      - "Liu et al. (2021) - JTT"
      - "Nam et al. (2022) - SSA"

  methodology:
    narrative_purpose: "Explain WHY this design solves the problem"
    connection_to_insight: |
      If spurious correlations create optimization conflict for minority samples,
      this conflict should manifest in loss trajectories. We extract trajectory
      features and test whether they predict minority membership.
    key_design_decisions:
      - decision: "Extract 4 trajectory features: L₁, slope, variance, convergence time"
        rationale: |
          These capture different aspects of the hypothesized conflict: magnitude
          (L₁), learning speed (slope), instability (variance), final state (convergence).
        alternatives_considered: |
          Higher-dimensional features (142-D à la Li); kept simple for interpretability.
      - decision: "Use epochs 1-5 for feature extraction"
        rationale: |
          Focus on early training where spurious learning happens; later epochs
          dominated by fine-tuning dynamics.
        alternatives_considered: |
          Full training (20 epochs); early window is sufficient and enables early detection.
      - decision: "Control experiment with variance-matched random reweighting"
        rationale: |
          Tests whether attenuation is spurious-specific (GroupDRO) vs. generic
          gradient smoothing. Critical for mechanism claim.
        alternatives_considered: |
          Multiple intervention baselines; chose minimal sufficient control.
    intuition_building: |
      Figure 1: Loss trajectory comparison showing minority (red) vs. majority (blue)
      patterns. Visual intuition before formal analysis.
    technical_depth_balance: |
      Main text: Feature definitions, experimental design, key equations.
      Appendix: Loss normalization details, smoothing parameters, additional seeds.

  experiments:
    narrative_purpose: "Design experiments that test our specific claims"
    experimental_questions:
      - question: "Do trajectory features predict minority membership?"
        experiment: "H-E1: Logistic regression on 4 features, 5-fold CV"
        expected_outcome: "AUROC > 0.75"
      - question: "Is the signal spurious-specific or generic hardness?"
        experiment: "H-M2: Compare AUROC under ERM, GroupDRO, random reweighting"
        expected_outcome: "GroupDRO attenuates >> random reweighting attenuates"
      - question: "Which features are most informative?"
        experiment: "Per-feature AUROC analysis"
        expected_outcome: "Temporal features (slope, variance) most important"
        actual_outcome: "SURPRISING: L₁ (magnitude) most important"
    baseline_rationale: |
      Gradient norm detection (AUC = 0.914) as established baseline from prior work.
      Random baseline (AUROC = 0.5) for statistical significance.
    dataset_rationale: |
      Waterbirds: Standard spurious correlation benchmark with known 95%/5% correlation.
      Provides group labels for evaluation. Used in 100+ papers.
    metric_rationale: |
      AUROC: Standard for binary prediction, robust to class imbalance (5% minority).
      Threshold-independent evaluation.

  results:
    narrative_purpose: "Present evidence that supports our claims"
    main_result_highlight: |
      AUROC = 0.9452 ± 0.0072—trajectory features predict minority membership with
      high accuracy, 26% above the 0.75 threshold.
    result_presentation_order:
      - result: "Overall AUROC = 0.9452"
        purpose: "Establish existence—trajectories ARE discriminative"
      - result: "Per-feature analysis: L₁ = 0.9473, slope = 0.8970, variance = 0.7242"
        purpose: "Reveal mechanism—magnitude dominates temporal features"
      - result: "GroupDRO attenuation = 0.2923, random = 0.0100"
        purpose: "Validate specificity—signal is spurious-specific"
      - result: "Curvature timing gap = 0.20 epochs (FAIL)"
        purpose: "Honest negative result—refines mechanism understanding"
    surprising_result_handling: |
      L₁ dominance is surprising—address explicitly. Interpretation: pretrained
      features create immediate conflict; signal is instantaneous, not developmental.
    figures:
      - "fig_1: Loss trajectories (minority vs. majority) - visual evidence"
      - "fig_2: ROC curve with AUROC annotation - main result"
      - "fig_4: Per-feature AUROC - mechanism insight"
      - "fig_9: AUROC comparison across regimes - specificity evidence"
      - "fig_10: Trajectory panels under ERM/GroupDRO/Random - visual comparison"

  discussion:
    narrative_purpose: "Interpret results, acknowledge limits, show significance"
    key_findings_interpretation: |
      The combination of strong existence (AUROC = 0.9452) and validated specificity
      (GroupDRO >> random attenuation) establishes loss trajectories as a principled
      diagnostic. The L₁ dominance finding refines but doesn't invalidate the insight—
      the signal is magnitude-based, not curvature-based.
    honest_limitations:
      - limitation: "Single dataset (Waterbirds)"
        why_acceptable: "Standard benchmark; demonstrates feasibility"
        future_mitigation: "Validate on CelebA, ColoredMNIST"
      - limitation: "Curvature mechanism refuted"
        why_acceptable: "Refined to magnitude mechanism; core insight preserved"
        future_mitigation: "Investigate alternative temporal signatures"
      - limitation: "Detection ≠ intervention"
        why_acceptable: "Diagnostic is valuable even without guaranteed intervention"
        future_mitigation: "Future work on trajectory-guided intervention"
    broader_impact_statement: |
      This work provides tools for identifying spurious correlation vulnerability.
      Positive impact: enables practitioners to catch failure modes before deployment.
      No direct negative applications identified; standard ML diagnostic tool.

  conclusion:
    narrative_purpose: "Reinforce key message + open future directions"
    callback_to_hook: |
      "The silent failure mode—high accuracy with hidden subgroup catastrophe—need
      not remain invisible. Loss trajectory analysis provides an early warning signal,
      detectable from the first training epoch."
    memorable_ending: |
      "Spurious correlations are not just outcomes to be corrected post-hoc; they
      are processes with distinctive developmental signatures. By watching how
      models learn, we can identify what they fail to learn."
    future_work_vision: |
      Trajectory-based early warning systems integrated into standard training
      pipelines; automatic detection and intervention without manual annotation;
      extension to domains beyond vision.

