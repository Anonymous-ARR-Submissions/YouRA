    - name: "Loss Normalization"
      operationalization: "Per-sample normalized loss Lₜ/L₁ with 3-point moving average smoothing"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Early training learns spurious correlations as dominant features (e.g., 'water background → waterbird')"
      evidence: "Established in spurious correlation literature; model exploits statistically dominant patterns"
      falsifier: "If model does not learn spurious correlations under ERM (no WGA gap), premise invalid"
    - step: 2
      description: "Majority samples (aligned background) experience fast loss descent due to shortcut alignment"
      evidence: "Spectral bias theory predicts faster convergence for aligned features"
      falsifier: "If majority samples show slow/variable descent similar to minority, mechanism invalid"
    - step: 3
      description: "Minority samples (conflicting background) experience prolonged optimization conflict"
      evidence: "Gradient conflict between spurious cue and actual class features delays convergence"
      falsifier: "If minority trajectory patterns are indistinguishable from majority after normalization"
    - step: 4
      description: "Trajectory divergence manifests as measurable curvature timing differences and predicts final WGA"
      evidence: "Early curvature stabilization for majority (epoch ≤5) vs delayed for minority (epoch ≥8)"
      falsifier: "If curvature timing gap < 2 epochs or no cross-seed predictive power"
  key_tension: "Whether trajectory divergence reflects spurious-feature conflict specifically, or generic sample hardness"
  evidence_summary: |
    The mechanism is supported by: (1) spectral bias theory predicting differential convergence rates,
    (2) prior work showing per-sample dynamics are informative (Toneva et al., Li et al.),
    (3) the attribution similarity finding (IoU=0.6477) ruling out WHERE-based explanations.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Per-sample loss can be reliably tracked without stochastic noise dominating the signal"
    supporting_evidence: "Use deterministic evaluation passes (no augmentation), 3-point smoothing"
    consequence_if_violated: "Trajectory features will be noisy; AUROC may collapse to chance"
  - id: "A2"
    assumption: "Curvature differences reflect optimization dynamics, not just loss scale"
    supporting_evidence: "Normalized loss (Lₜ/L₁) removes magnitude effects"
    consequence_if_violated: "Curvature timing gap is artifact of scale; mechanism claim invalid"
  - id: "A3"
    assumption: "GroupDRO specifically attenuates spurious reliance, not just gradient variance"
    supporting_evidence: "Variance-matched control condition tests this explicitly"
    consequence_if_violated: "Attenuation is generic smoothing effect; spurious-specific claim fails"
  - id: "A4"
    assumption: "Between-seed WGA variance is sufficient (≥3%) for predictive analysis"
    supporting_evidence: "Pilot runs should verify σ_WGA > 3%"
    consequence_if_violated: "H-M3 underpowered; cross-seed prediction test may be inconclusive"
  - id: "A5"
    assumption: "Waterbirds benchmark is representative of spurious correlation phenomenon"
    supporting_evidence: "Standard benchmark used in 100+ papers; CelebA provides secondary validation"
    consequence_if_violated: "Results may not generalize to other spurious correlation settings"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Spurious correlation settings with identifiable group labels
    - Standard ERM training on image classification tasks
    - Settings where WGA gap emerges during training
    - Waterbirds and CelebA benchmarks specifically
  does_not_apply_to: |
    - Settings without spurious attribute labels (cannot compute group-stratified metrics)
    - Non-vision domains (NLP, tabular) without additional validation
    - Intervention design (this hypothesis tests detection only, not remediation)
    - Models trained with debiasing from start (no ERM baseline to compare)
  known_limitations: |
    - Causal attribution limited to "consistent with" spurious-conflict interpretation
    - Cannot mathematically prove features are "spurious" vs "structured hardness"
    - Detection success does not guarantee intervention success (per failure history)

