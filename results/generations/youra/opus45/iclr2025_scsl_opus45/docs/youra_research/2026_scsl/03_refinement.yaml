    falsification: "Gap < 2 epochs in ≥70% of seeds"
  - id: "P3"
    primary: false
    statement: "AUROC attenuates by >0.10 under GroupDRO but <0.05 under variance-matched random reweighting"
    test_method: "Compare AUROC_ERM vs AUROC_GroupDRO vs AUROC_RandomReweight"
    success_criterion: "AUROC_ERM - AUROC_GroupDRO > 0.10 AND AUROC_ERM - AUROC_Random < 0.05"
    falsification: "Both methods attenuate similarly (Δ within 0.03 of each other)"
  - id: "P4"
    primary: false
    statement: "Early divergence (epoch 3) predicts final WGA with R² > 0.5 and effect size ≥3% per SD"
    test_method: "Regress WGA_epoch20 on W1-distance_epoch3 across 10+ seeds; nested cross-validation"
    success_criterion: "R² > 0.5, β ≥ 0.5·σ_WGA, held-out RMSE beats mean baseline by ≥30%"
    falsification: "R² < 0.3 or effect size < 2% absolute per SD"

