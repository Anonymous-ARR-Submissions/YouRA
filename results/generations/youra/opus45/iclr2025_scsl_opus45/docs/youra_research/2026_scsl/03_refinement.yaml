# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-LossTraj-v1"
  confidence_level: 0.75
  core_hypothesis_statement: |
    Under standard ERM training on spurious correlation benchmarks (Waterbirds),
    if we track per-sample loss trajectories across epochs,
    then minority group samples will exhibit statistically distinguishable trajectory patterns
    (AUROC > 0.75) with delayed curvature stabilization (≥3 epochs later than majority),
    because the model experiences prolonged optimization conflict when spurious background
    features contradict learned shortcuts.
  alternative_hypothesis_h0: |
    There is no significant difference in loss trajectory characteristics between minority
    and majority samples; trajectory-based features predict group membership at chance level
    (AUROC ≈ 0.5, p > 0.05).

