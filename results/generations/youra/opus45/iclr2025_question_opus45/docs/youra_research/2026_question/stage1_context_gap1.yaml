gap_id: "gap1"
gap_title: "Single-Pass SE Proxy Without Multi-Sample Generation"
gap_description: |
  Current semantic entropy (SE) requires generating N=10-20 responses per query,
  creating 5-10x computational overhead. This gap seeks methods that can predict
  SE-level uncertainty in a single forward pass, avoiding the pitfalls of previous
  failed approaches (embeddings, lexical metrics, token entropy).

