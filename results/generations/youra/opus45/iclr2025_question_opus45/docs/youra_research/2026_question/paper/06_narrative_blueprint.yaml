# ═══════════════════════════════════════════════════════════════════════════════
# PART 1: HOOK & MOTIVATION
# ═══════════════════════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: "Semantic Entropy Probes promise single-pass hallucination detection by distilling multi-sample uncertainty into hidden state predictions. We attempted to extend this approach with similarity-augmented training for cross-model transfer—and discovered that the straightforward application achieves correlation indistinguishable from random guessing."
    strategy: "counterintuitive_finding"

  why_reader_should_care:
    main_reason: "The gap between published SEP results (AUROC ~0.85) and our replication (AUROC ~0.52) reveals hidden configuration sensitivity that practitioners must understand before deploying uncertainty probes"
    concrete_example: "A production system using SEPs without careful layer/token configuration could perform no better than random, despite published benchmarks suggesting otherwise"
    stakes: "Without understanding these configuration sensitivities, practitioners may deploy ineffective uncertainty quantification systems, leading to undetected hallucinations in critical applications"

  real_world_impact:
    application_domain: "LLM deployment in high-stakes domains (medical, legal, financial)"
    potential_beneficiaries: "ML practitioners deploying uncertainty-aware LLM systems"
    scale_of_impact: "Any organization deploying LLMs with uncertainty quantification needs"

problem_framing:
  surface_problem:
    description: "Semantic entropy provides gold-standard hallucination detection but requires expensive multi-sample generation (10-20x compute overhead)"
    common_understanding: "Prior work shows probes can distill SE from hidden states, enabling single-pass inference"

  deeper_problem:
    description: "The success of hidden state probes depends critically on configuration choices (layer, token position, probe architecture) that are often underspecified in published work"
    why_overlooked: "Published papers report best configurations; replication attempts may use different settings without realizing their importance"
    our_perspective: "Configuration sensitivity should be a first-class research concern, not an implementation detail"

  gap_in_existing_work:
    description: "No systematic study of why seemingly straightforward SEP configurations fail, nor guidance on detecting such failures before deployment"
    why_gap_exists: "Negative results are underreported; focus on novel methods overshadows replication challenges"
    why_gap_matters: "Practitioners cannot distinguish robust configurations from brittle ones without understanding failure modes"

# ═══════════════════════════════════════════════════════════════════════════════
# PART 2: THE INSIGHT
# ═══════════════════════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: "Layer 25 hidden states at the TBG token position in Llama-3-8B-Instruct do not encode semantic entropy information that linear probes can extract—contradicting the assumption that any reasonable configuration should work."
    expanded_explanation: "Our experiments show Spearman rho=0.0843 (p=0.283, not significant) between probe predictions and true SE, with AUROC=0.52 (random baseline=0.50). This fundamental failure at a single configuration point suggests the SE signal in hidden states may be highly localized and configuration-dependent, not broadly distributed as implicitly assumed."

  why_others_missed_it:
    common_assumptions: "Hidden states broadly encode uncertainty; any middle-to-late layer should suffice"
    our_different_view: "SE information may be concentrated in specific layers/positions that require systematic ablation to identify"
    enabling_factor: "We tested a single, reasonable configuration following published guidance—and it failed completely"

  what_makes_it_work:
    intuitive_explanation: "Think of SE information as a signal buried in high-dimensional noise. The signal-to-noise ratio varies dramatically across layers and token positions. Without systematic search, you may land on a configuration where noise dominates."
    key_mechanism: "Hidden state geometry at different layers encodes different types of information; SE-relevant features may emerge only at specific processing stages"
    analogy: "Like tuning a radio—being on the wrong frequency yields static, not the signal, even if the signal exists elsewhere"

# ═══════════════════════════════════════════════════════════════════════════════
# PART 3: EVIDENCE STORY
# ═══════════════════════════════════════════════════════════════════════════════

evidence_narrative:
  main_claim:
    statement: "The tested configuration (layer 25, TBG token, logistic regression probe on Llama-3-8B) does not encode SE information accessible to linear probes"
    measurable_criteria: "Spearman rho ≥ 0.3 required for MUST_WORK gate; achieved rho = 0.0843"

  supporting_evidence:
    - id: "evidence_1"
      what: "Spearman correlation rho = 0.0843 (p = 0.283) between SEDP predictions and true SE"
      so_what: "Correlation is not statistically significant—probe predictions are essentially uncorrelated with ground truth"
      how_it_supports_claim: "Directly demonstrates failure to extract SE signal from hidden states"

    - id: "evidence_2"
      what: "AUROC = 0.5219 for hallucination detection (random baseline = 0.50)"
      so_what: "Both SEP and SEDP perform no better than random guessing on the binary classification task"
      how_it_supports_claim: "Confirms the correlation failure translates to practical task failure"

    - id: "evidence_3"
      what: "SEDP vs SEP delta = +0.0009 rho (negligible improvement from similarity augmentation)"
      so_what: "Adding similarity features provides no meaningful benefit when base hidden states lack SE signal"
      how_it_supports_claim: "The problem is fundamental (no SE signal) not ameliorable by auxiliary features"

  surprising_findings:
    finding: "Published SEP results report AUROC ~0.85 on TruthfulQA; our baseline achieves 0.52—a 39% gap"
    why_surprising: "We followed published guidance (layer 25, TBG position, logistic regression) but achieved dramatically worse results"
    our_interpretation: "The gap suggests either (1) critical configuration details are underspecified, (2) implementation differences matter more than recognized, or (3) TruthfulQA subset differences affect results"

  what_results_mean:
    synthesis: "SE probe effectiveness depends critically on configuration choices that are not yet well understood. The approach is not plug-and-play."
    confidence_level: "HIGH for the specific configuration tested; MEDIUM for generalizing to all configurations"
    caveats: "We tested a single configuration; the SE signal may exist at other layers/positions we did not explore"

# ═══════════════════════════════════════════════════════════════════════════════
# PART 4: BROADER IMPACT
# ═══════════════════════════════════════════════════════════════════════════════

takeaway:
  main_contribution:
    one_sentence: "We document a complete failure of SE probing under a reasonable configuration, revealing configuration sensitivity that demands systematic ablation before deployment"
    why_significant: "Prevents practitioners from deploying ineffective uncertainty systems; motivates research into robust SE probing"

  implications:
    for_field: "Negative results are valuable—understanding where methods fail is as important as where they succeed"
    for_practice: "Practitioners must validate SE probes on their specific model/layer/token configuration before trusting predictions"
    conceptual_contribution: "SE information in hidden states may be more localized than previously assumed"

  future_possibilities:
    immediate_extensions: "Systematic layer ablation (layers 20-31), token position comparison (TBG vs SLT vs pooling), SE label quality validation"
    longer_term_vision: "Develop configuration-agnostic SE probing methods, or automated configuration search protocols"
    open_questions: "Where exactly in the hidden state trajectory does SE information emerge? Why do some configurations work and others fail completely?"

