# PART 5: SECTION-LEVEL NARRATIVE GOALS
# ═══════════════════════════════════════════════════════════════════════════════

section_goals:
  abstract:
    narrative_purpose: "Compress the negative result story: promising approach, surprising failure, important implications"
    key_message: "SE probing requires careful configuration validation—a reasonable setup can fail completely"
    structure_notes: |
      - Problem: SE computation is expensive; probes promise single-pass detection
      - Approach: We tested SEDP (SE-Distilled Probes with similarity augmentation)
      - Result: rho=0.08 (near random), contradicting published AUROC ~0.85
      - Implication: Configuration sensitivity demands systematic validation
    avoid:
      - "Citations in abstract"
      - "Vague claims without numbers"
      - "Hiding the negative result"

  introduction:
    narrative_purpose: "Hook with surprising failure → Reveal the problem → Show implications"
    hook_strategy: "Lead with the contradiction: published success vs our failure"
    problem_escalation: |
      1. SE is gold-standard but expensive
      2. Probes promise cheap single-pass SE
      3. BUT: configuration sensitivity makes probes unreliable without validation
    insight_preview: "Our failure reveals hidden complexity in SE probing that practitioners must understand"
    contributions_framing: |
      1. Document complete failure of a reasonable SE probe configuration
      2. Identify 39% AUROC gap between our results and published benchmarks
      3. Propose systematic ablation requirements for SE probe deployment
    transition_to_related_work: "To understand why this failure matters, we review prior work on SE and probing methods"

  related_work:
    narrative_purpose: "Show SE probing landscape → Highlight what's claimed → Set up our contribution (revealing failure)"
    positioning_strategy: "We are not proposing a better method; we are documenting failure that others should know about"
    key_comparison_points:
      - area: "Semantic Entropy"
        limitation_to_highlight: "Requires 10-20x compute overhead"
        how_we_differ: "We tested whether probes can efficiently approximate SE"
      - area: "Semantic Entropy Probes (SEPs)"
        limitation_to_highlight: "Published results may be configuration-sensitive"
        how_we_differ: "We document a configuration where SEPs fail completely"
      - area: "Uncertainty Quantification via Probing"
        limitation_to_highlight: "Configuration details are often underspecified"
        how_we_differ: "We expose the consequences of configuration mismatch"
    papers_to_discuss:
      - "Farquhar et al. 2024 (Nature) - Semantic Entropy"
      - "Kossen et al. 2024 - Semantic Entropy Probes"
      - "Nikitin et al. 2024 - Kernel Language Entropy"

  methodology:
    narrative_purpose: "Show we followed reasonable practices—the failure is not due to obvious mistakes"
    connection_to_insight: "We designed SEDP to extend SEPs with similarity augmentation for transfer"
    key_design_decisions:
      - decision: "Layer 25 of 32 for hidden state extraction"
        rationale: "Middle-to-late layers recommended by SEP paper (Kossen et al.)"
        alternatives_considered: "Could have tested all layers; budget limited to single configuration"
      - decision: "TBG (Token Before Generation) position"
        rationale: "Standard choice from SEP paper"
        alternatives_considered: "SLT, pooling over multiple positions"
      - decision: "Logistic regression probe"
        rationale: "Simplest architecture; matches SEP baseline"
        alternatives_considered: "MLP probes could capture nonlinear patterns"
    intuition_building: |
      SEDP concatenates hidden states (4096-dim) with similarity features (4-dim)
      and trains logistic regression to predict SE labels
    technical_depth_balance: |
      Focus on design rationale in main text; implementation details in appendix

  experiments:
    narrative_purpose: "Show systematic evaluation—the failure is robust, not a fluke"
    experimental_questions:
      - question: "Does SEDP achieve meaningful SE correlation (rho ≥ 0.3)?"
        experiment: "Train/test on TruthfulQA with Llama-3-8B"
        expected_outcome: "rho ≥ 0.7 (original hypothesis target)"
      - question: "Does SEDP outperform SEP baseline?"
        experiment: "Compare SEDP (hidden + similarity) vs SEP (hidden only)"
        expected_outcome: "SEDP > SEP (effect direction)"
    baseline_rationale: "SEP represents the state-of-the-art single-pass SE approximation"
    dataset_rationale: "TruthfulQA is standard benchmark for hallucination detection, used in SEP paper"
    metric_rationale: "Spearman rho measures rank correlation with true SE; AUROC measures binary detection"
    fairness_considerations: |
      - Same train/test split for both methods
      - Same hyperparameters (C=1.0, max_iter=1000)
      - Fixed random seed (42)

  results:
    narrative_purpose: "Present the failure clearly—no hiding, no excuses, just evidence"
    main_result_highlight: "SEDP rho = 0.0843, failing MUST_WORK gate (threshold = 0.3) by 72%"
    result_presentation_order:
      - result: "Gate failure: rho = 0.0843 << 0.3"
        purpose: "Lead with the main negative finding"
      - result: "AUROC = 0.52 (near random)"
        purpose: "Show practical consequence of correlation failure"
      - result: "SEDP vs SEP delta = +0.0009 (negligible)"
        purpose: "Show similarity augmentation doesn't help when base signal absent"
    surprising_result_handling: "Present 39% gap vs published results as key finding, not excuse"
    avoid:
      - "Hiding negative results"
      - "Over-explaining or making excuses"
      - "Blaming the method rather than documenting the failure"

  discussion:
    narrative_purpose: "Interpret failure → Identify root causes → Chart path forward"
    key_findings_interpretation: "Layer 25 TBG position does not encode SE information accessible to linear probes"
    honest_limitations:
      - limitation: "Single layer/position tested"
        why_acceptable: "PoC validation; failure motivates systematic ablation"
        future_mitigation: "Layer ablation study (20-31), token position comparison"
      - limitation: "Single dataset (TruthfulQA)"
        why_acceptable: "Standard benchmark; matches prior work"
        future_mitigation: "Validate on TriviaQA, SQuAD"
      - limitation: "SE label quality not validated"
        why_acceptable: "Used standard DeBERTa NLI clustering"
        future_mitigation: "Manual inspection of cluster assignments"
    broader_impact_statement: "This work prevents deployment of ineffective uncertainty systems; negative results serve the community by revealing failure modes"

  conclusion:
    narrative_purpose: "Close the loop → Key message → Future vision"
    callback_to_hook: "We set out to create efficient SE proxies; instead, we discovered configuration sensitivity that demands attention"
    memorable_ending: "Understanding where methods fail is as important as celebrating where they succeed. Our failure charts the path toward robust SE probing."
    future_work_vision: "Systematic configuration search, architecture exploration, multi-dataset validation"

