hypothesis_draft:
  title: "SE-Distilled Probes with Similarity Augmentation (SEDPs)"
  hypothesis_id: "H-SEDP-v1"
  core_claim: |
    A probe trained to predict semantic entropy using hidden states with semantic
    similarity structure as auxiliary training signal achieves single-pass SE
    estimation AND transfers across different LLM architectures.
  mechanism: |
    1. Generate SE ground truth (N=20 samples) during training phase
    2. Compute NLI-based semantic similarity structure for response sets
    3. Train probe on hidden states with similarity as auxiliary input
    4. At inference: probe predicts SE using only hidden states (single-pass)
    5. Similarity augmentation encourages model-agnostic feature learning
  predictions:
    - P1: "Same-model SE correlation rho ≥ 0.7"
    - P2: "Cross-model transfer rho ≥ 0.5 (train Llama → test Mistral)"
    - P3: "Inference speedup ≥ 10x vs full SE"

variables_summary:
  independent: "Probe input config (hidden/similarity/combined), training model, test model"
  dependent_primary: "Spearman correlation with true SE"
  controlled: "TruthfulQA dataset, N=20 SE computation, DeBERTa-v3 NLI, 2-layer MLP probe"

null_hypothesis:
  h0_statement: |
    There is no significant difference in cross-model transfer performance between
    similarity-augmented probes (SEDP) and hidden-state-only probes (SEP).
    The Spearman correlation achieved by SEDP on cross-model evaluation is not
    significantly greater than that achieved by SEP baseline.
  statistical_test: "Independent samples t-test on Fisher z-transformed correlation coefficients"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "Cross-model transfer via similarity-augmented training"
  differentiation_summary: |
    Unlike SEPs (hidden-only) and SSD (full student model), SEDP combines:
    (1) Lightweight probe architecture for efficiency
    (2) Similarity auxiliary signal for model-agnostic learning
    (3) Explicit focus on cross-model transfer (untested in prior work)

clarity:
