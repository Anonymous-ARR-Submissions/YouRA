discussion_synthesis:
  key_insights:
    - "Failed approaches (embeddings, lexical, token-level) didn't learn from SE signal"
    - "Successful approaches (SEPs, SSD) all train on SE ground truth"
    - "Cross-model transfer is the underexplored high-impact direction"
    - "Similarity structure is model-agnostic by construction (computed on outputs)"
  breakthrough_moments:
    - "Exchange 5: Dr. Ally synthesized SEP + SSD + KLE insights into SEDP proposal"
    - "Exchange 8: Prof. Vera formalized testable predictions with clear thresholds"
    - "Exchange 9: Prof. Pax confirmed all components are feasible (<10 GPU-hours)"
  resolved_tensions:
    - "N=3-5 vs N=20: Resolved by using full N=20 for training only, single-pass inference"
    - "Embedding similarity concern: Resolved by using NLI-based similarity, not embeddings"
    - "Architecture-agnostic features: Resolved by similarity on outputs, not internal states"
