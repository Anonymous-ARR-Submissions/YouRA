measurement_plan:
  data_collection:
    - source: "TruthfulQA HuggingFace dataset"
      method: "80/20 train/test split with fixed seed"
    - source: "LLM responses"
      method: "Generate N=20 samples per question at temperature=0.7"
    - source: "SE labels"
      method: "NLI-based clustering with DeBERTa-v3-large"
    - source: "Hidden states"
      method: "Extract final layer hidden states from last token position"
  procedure:
    - step: "1. Generate training data: responses + SE labels + similarity matrices"
    - step: "2. Train three probe variants: hidden-only, similarity-only, combined"
    - step: "3. Evaluate same-model performance on test split"
    - step: "4. Evaluate cross-model transfer (train on Llama, test on Mistral)"
    - step: "5. Measure inference speedup"
  success_criteria:
    - "P1: Same-model rho ≥ 0.7 with p < 0.001"
    - "P2: Cross-model rho ≥ 0.5 with p < 0.01"
    - "P3: Speedup ≥ 10x (measured as wall-clock ratio)"
    - "Combined probe outperforms hidden-only on cross-model transfer"

validation:
