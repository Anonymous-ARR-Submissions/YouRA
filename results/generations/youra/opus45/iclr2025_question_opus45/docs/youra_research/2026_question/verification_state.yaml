main_hypothesis:
  id: H-SEDP-v1
  title: SE-Distilled Probes with Similarity Augmentation
  statement: Under the condition of transformer-based LLMs performing question-answering tasks, if we train a probe to predict
    semantic entropy (SE) using hidden state features with semantic similarity structure as an auxiliary training signal,
    then the probe will achieve (1) single-pass SE prediction with Spearman rho >= 0.7 versus true SE, AND (2) cross-model
    transfer with rho >= 0.5, because the similarity structure provides model-agnostic regularization that prevents overfitting
    to model-specific hidden state patterns.
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: TruthfulQA
    model: Llama-3-8B-Instruct / Mistral-7B-Instruct-v0.2
    optimizer: Adam
    hyperparameters:
      n_samples: 20
      temperature: 0.7
      probe_architecture: 2-layer MLP (256 units)
      seed: 42
