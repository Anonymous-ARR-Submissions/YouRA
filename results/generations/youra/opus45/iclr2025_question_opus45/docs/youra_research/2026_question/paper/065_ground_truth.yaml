# ═══════════════════════════════════════════════════════════════════════════════
# METHODOLOGY - From Phase 2C/3 experiment design
# ═══════════════════════════════════════════════════════════════════════════════

methodology:
  algorithm_name: "SE-Distilled Probes (SEDP)"

  model_configuration:
    llm:
      name: "Llama-3-8B-Instruct"
      pretrained: "meta-llama/Meta-Llama-3-8B-Instruct"
      layers: 32
      hidden_dim: 4096
      dtype: "float16"

    entailment_model:
      name: "DeBERTa-v3-large-MNLI"
      threshold: 0.5

    similarity_model:
      name: "all-MiniLM-L6-v2"
      output_dim: 384

  key_hyperparameters:
    - name: "layer_idx"
      value: 25
      rationale: "Middle-to-late range per SEP paper recommendation"

    - name: "token_position"
      value: "TBG (Token Before Generation)"
      rationale: "Standard choice from SEP paper"

    - name: "n_responses"
      value: 20
      rationale: "Standard for SE computation"

    - name: "temperature"
      value: 0.7
      rationale: "Standard for diverse response generation"

  probe_architecture:
    type: "LogisticRegression"
    input_dim_sep: 4096
    input_dim_sedp: 4100  # 4096 hidden + 4 similarity features
    regularization: "L2"
    C: 1.0
    optimizer: "LBFGS"
    max_iter: 1000

  similarity_features:
    dimensions: 4
    features: ["mean", "std", "min", "max"]
    source: "Pairwise cosine similarity of response embeddings"

  training_details:
    dataset: "TruthfulQA"
    total_questions: 817
    train_split: 653
    test_split: 164
    split_ratio: "80/20"
    random_seed: 42

