# ═══════════════════════════════════════════════════════════════
# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "Semantic entropy (SE) is the gold standard for hallucination detection"
      status: "BUILD_ON"
      evidence: "Farquhar et al. 2024, Nature publication, 1027 citations, AUROC 0.76-0.97"
    - claim: "SE requires N=10-20 samples, creating 5-10x computational overhead"
      status: "BUILD_ON"
      evidence: "Original SE paper computational analysis; practical deployment barrier"
    - claim: "Semantic Entropy Probes (SEPs) achieve single-pass SE estimation from hidden states"
      status: "BUILD_ON"
      evidence: "Kossen et al. 2024, OATML implementation with 54 stars"
    - claim: "Embedding dispersion (PD-3) fails as SE proxy (rho ≈ 0)"
      status: "BUILD_ON"
      evidence: "ROUTE_TO_0 failure record: phase4_h-e1_pd3_se_correlation_run1"
    - claim: "Lexical diversity (MTLD) is inversely correlated with SE (rho = -0.25)"
      status: "BUILD_ON"
      evidence: "ROUTE_TO_0 failure record: phase4_h-e1_mtld_se_negative_correlation"
    - claim: "Cross-model transfer of SE probes is achievable"
      status: "PROVE_NEW"
      evidence: "No existing evidence; key novel contribution of this hypothesis"
    - claim: "Similarity augmentation improves cross-model transfer"
      status: "PROVE_NEW"
      evidence: "Hypothesis to be tested; inspired by KLE's model-agnostic similarity approach"
  scope_reduction_percentage: 45
  phase2b_4_instructions: |
    Focus verification on PROVE_NEW claims (cross-model transfer, similarity augmentation).
    BUILD_ON claims about SE effectiveness and SEP feasibility are established.
    ROUTE_TO_0 failures confirm what approaches to AVOID.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-SEDP-v1"
  confidence_level: 0.75
  core_hypothesis_statement: |
    Under the condition of transformer-based LLMs performing question-answering tasks,
    if we train a probe to predict semantic entropy (SE) using hidden state features
    with semantic similarity structure as an auxiliary training signal,
    then the probe will achieve (1) single-pass SE prediction with Spearman rho ≥ 0.7
    versus true SE, AND (2) cross-model transfer with rho ≥ 0.5,
    because the similarity structure provides model-agnostic regularization that
    prevents overfitting to model-specific hidden state patterns.
  alternative_hypothesis_h0: |
    There is no significant difference in cross-model transfer performance between
    similarity-augmented probes and hidden-state-only probes. Specifically, the
    Spearman correlation between SEDP predictions and true SE on cross-model test
    is not significantly greater than that of vanilla SEPs (hidden-only probes).

