    - name: "probe_architecture"
      operationalization: "2-layer MLP with 256 hidden units, ReLU activation, trained with MSE loss"
    - name: "random_seed"
      operationalization: "Fixed seed=42 for reproducibility across all experiments"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 5
  steps:
    - step: 1
      description: "SE Label Generation: Generate N=20 diverse responses per question using temperature sampling, then compute true SE using NLI-based semantic clustering"
      evidence: "Established SE computation method (Farquhar et al. 2024); jlko/semantic_uncertainty provides reference implementation"
      falsifier: "If NLI clustering produces degenerate results (all same cluster or all different), SE labels are invalid"
    - step: 2
      description: "Similarity Structure Extraction: Compute pairwise semantic similarity matrix for each question's response set using DeBERTa-v3 NLI entailment scores"
      evidence: "NLI-based similarity used in original SE; Kernel Language Entropy paper shows similarity structure contains uncertainty information"
      falsifier: "If similarity matrix is uninformative (all 1s or random), auxiliary signal provides no value"
    - step: 3
      description: "Probe Training with Similarity Augmentation: Train MLP probe to predict SE from hidden states, using similarity structure features as auxiliary input during training only"
      evidence: "SEPs demonstrate hidden states suffice for SE prediction; SSD shows distillation approach works"
      falsifier: "If probe training loss doesn't converge below baseline, the learning signal is insufficient"
    - step: 4
      description: "Knowledge Distillation: Probe learns to predict SE from single-pass hidden states by distilling knowledge from multi-sample SE computation"
      evidence: "Semantic Self-Distillation paper (Phillips et al. 2026) demonstrates this paradigm"
      falsifier: "If single-pass predictions don't correlate with multi-sample SE (rho < 0.3), distillation failed"
    - step: 5
      description: "Transfer via Model-Agnostic Features: Similarity-augmented training encourages probe to learn features that generalize across models, as similarity structure is computed on text outputs not internal representations"
      evidence: "Similarity is model-agnostic by construction; KLE uses similar output-space approach"
      falsifier: "If cross-model rho equals hidden-only probe rho, similarity provides no transfer benefit"
  key_tension: "Whether similarity augmentation ACTUALLY improves cross-model transfer versus just improving same-model performance"
  evidence_summary: |
    The causal chain builds on three established foundations:
    (1) SE can be predicted from hidden states (SEPs paper)
    (2) Distillation from multi-sample to single-pass works (SSD paper)
    (3) Output-space similarity is model-agnostic (KLE paper)
    The novel contribution is combining these into similarity-augmented training for transfer.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Hidden states contain sufficient information to predict SE"
    supporting_evidence: "SEPs (Kossen et al. 2024) achieve AUROC close to full SE using only hidden states"
    consequence_if_violated: "No single-pass SE proxy is possible from internal representations"
  - id: "A2"
    assumption: "Semantic similarity structure computed on generated text is model-agnostic"
    supporting_evidence: "True by construction: similarity is computed on output tokens, not internal activations"
    consequence_if_violated: "Would require model-specific similarity computation, defeating transfer purpose"
  - id: "A3"
    assumption: "Similarity-augmented training improves generalization to new models"
    supporting_evidence: "Inspired by KLE's model-agnostic approach; to be empirically validated"
    consequence_if_violated: "SEDP reduces to vanilla SEP with no transfer benefit; still valuable for speedup"
  - id: "A4"
    assumption: "TruthfulQA is representative of broader QA uncertainty patterns"
    supporting_evidence: "Standard benchmark for hallucination; diverse question types"
    consequence_if_violated: "Results may not generalize to other QA domains; need additional benchmarks"
  - id: "A5"
    assumption: "DeBERTa-v3 NLI adequately captures semantic equivalence for clustering"
    supporting_evidence: "Used in original SE paper; state-of-the-art NLI model"
    consequence_if_violated: "SE labels themselves would be noisy, affecting all downstream results"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Transformer-based decoder-only LLMs (GPT-style architecture)
    - Question-answering tasks with factual ground truth
    - English language text generation
    - Models with accessible hidden state representations (open-weight models)
  does_not_apply_to: |
    - Encoder-only models (BERT-style) - different hidden state semantics
    - Non-transformer architectures (SSMs, RNNs)
    - Open-ended creative generation without correct/incorrect distinction
    - Non-English languages (DeBERTa NLI limitation)
    - Closed API models without hidden state access (GPT-4, Claude)
  known_limitations: |
    - Initial validation on TruthfulQA only; generalization to other benchmarks unproven
    - Transfer tested only between Llama and Mistral; other model families untested
    - Probe trained on specific hidden layer; optimal layer selection not explored
    - Long-form generation (beyond single-answer QA) not addressed

