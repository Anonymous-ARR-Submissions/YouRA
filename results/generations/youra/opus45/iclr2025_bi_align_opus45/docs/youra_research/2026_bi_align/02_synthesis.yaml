hypothesis_draft:
  title: "Structural Enumeration Preference in RLHF-Trained Reward Models"
  hypothesis_id: "H-EnumPref-v1"
  core_claim: |
    RLHF-trained reward models exhibit a robust, replicable preference for responses
    that enumerate options (vs. single recommendations), and this preference persists
    after controlling for correctness, completeness, and response length, demonstrating
    that option enumeration is an independently encoded structural feature in reward
    model representations.
  mechanism: |
    During RLHF training, human raters systematically prefer responses that present
    multiple options because such responses reduce cognitive load, make trade-offs
    explicit, and signal epistemic navigability. Reward models learn this preference
    through gradient descent, potentially amplified by the high-detectability of
    structural markers (numbered lists, bullet points) that provide stable training
    signals across noisy semantic variance.
  predictions:
    - P1: "Enumerated responses receive higher reward scores (d >= 0.3) in ≥2 distinct RMs"
    - P2: "≥75% of tested RMs show same-sign (positive) enumeration effects"
    - P3: "Spurious enumeration shows <30% of true enumeration's effect"
    - P4: "Numeric enumeration without deliberative language still produces d >= 0.2"

variables_summary:
  independent: "Response structure (enumerated vs. synthesized), Correctness, Completeness"
  dependent_primary: "Reward model score (normalized 0-1)"
  controlled: "Response length (±2%), lexical diversity, sentiment polarity, prompt domain"

null_hypothesis:
  h0_statement: |
    Under strict controls for correctness, completeness, and response length, there is
    no significant difference in reward model scores between enumerated and synthesized
    responses (pooled |d| < 0.1 across ≥3 architecturally distinct RMs).
  statistical_test: "Mixed-effects regression with RM as random effect, structure as fixed effect"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: |
    First rigorous behavioral probe for structural (non-content) preferences in reward
    models. Bridges RM interpretability and human agency literatures.
  differentiation_summary: |
    Unlike MRMBench (content dimensions) or HumanAgencyBench (LLM outputs), this work
    probes structural formatting preferences directly in reward models. The methodology
    (2×2×2 factorial, spurious enumeration control, structure-vs-semantics dissociation)
    enables isolating formatting priors from competence signals.

