# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-EnumPref-v1"
  confidence_level: 0.78
  core_hypothesis_statement: |
    Under conditions where RLHF-trained reward models (Bradley-Terry, scalar regression, or
    MoE objectives) are evaluated on response pairs that differ only in structural presentation,
    if responses enumerate multiple options (vs. synthesize into single recommendation),
    then reward scores will be significantly higher for enumerated responses (Cohen's d >= 0.3),
    because RLHF training encodes human raters' implicit preference for option enumeration
    as a high-detectability structural feature that signals epistemic navigability.
  alternative_hypothesis_h0: |
    Under strict controls for correctness, completeness, and response length, there is no
    significant difference in reward model scores between enumerated and synthesized responses
    (pooled |d| < 0.1 across ≥3 architecturally distinct RMs).

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "response_structure"
      type: "categorical"
      operationalization: |
        Pre-registered regex classifier:
        ENUMERATED = TRUE iff response contains:
        (a) ≥2 line-initial markers matching ^[\s]*(\d+[.\):]|\-|\*|•)
        OR (b) ≥2 explicit ordinal tokens: "First,", "Second,", "1.", "2.", "Option A/B"
      levels:
        - "enumerated"
        - "synthesized"
    - name: "correctness"
      type: "categorical"
      operationalization: "Human-verified factual accuracy: fully correct vs. contains one factual error"
      levels:
        - "correct"
        - "partially_incorrect"
    - name: "completeness"
      type: "categorical"
      operationalization: "Option coverage: exhaustive (3+ options) vs. partial (2 options), holding content quality constant"
      levels:
        - "exhaustive"
        - "partial"
  dependent:
    - name: "reward_model_score"
      type: "continuous"
      operationalization: "Raw score output from reward model (normalized to 0-1 range where applicable)"
      primary: true
    - name: "effect_size_cohens_d"
      type: "continuous"
      operationalization: "Standardized mean difference between enumerated and synthesized conditions"
      primary: false
  controlled:
    - name: "response_length"
      operationalization: "Token-matched within ±2% (±5 tokens for typical 250-token responses)"
    - name: "lexical_diversity"
      operationalization: "Type-token ratio balanced across conditions"
    - name: "sentiment_polarity"
      operationalization: "Neutral or matched across conditions"
    - name: "prompt_domain"
      operationalization: "Stratified by high-autonomy (career, lifestyle) vs. low-autonomy (medical, technical)"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Human raters in RLHF preference data systematically prefer responses that enumerate options"
      evidence: "To be verified via log-odds analysis of enumeration in chosen vs. rejected pairs"
      falsifier: "If enumeration log-odds in training data is neutral (≈0), distributional pathway is unsupported"
    - step: 2
      description: "Reward models learn enumeration preference through gradient descent on preference data"
      evidence: "Standard RLHF training dynamics; high-detectability features provide stable gradients"
      falsifier: "If effect disappears in models trained on enumeration-balanced data"
    - step: 3
      description: "Enumeration acts as a 'beacon feature' amplified by Bradley-Terry training"
      evidence: "Testable via cross-architecture comparison (Bradley-Terry vs. scalar vs. DPO)"
      falsifier: "If DPO models show equal or stronger enumeration preference than Bradley-Terry"
    - step: 4
      description: "Learned preference manifests as higher reward scores for enumerated responses at inference"
      evidence: "Prior observation d=0.634 in ArmoRM; to be replicated across 4 RMs"
      falsifier: "If d < 0.1 under strict controls across ≥3 RMs"
  key_tension: "Whether enumeration preference reflects genuine structural encoding vs. competence proxy"
  evidence_summary: |
    The mechanism proposes that RLHF encodes human raters' implicit preference for option
    enumeration as a structural feature. This is testable through: (1) training data analysis
    showing enumeration overrepresentation in chosen responses, (2) cross-architecture
    replication showing convergent effects, (3) spurious enumeration controls distinguishing
    structural coherence from token bias.

