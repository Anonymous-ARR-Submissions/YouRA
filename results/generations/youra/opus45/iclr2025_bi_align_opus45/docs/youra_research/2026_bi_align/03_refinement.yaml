    primary: true
    statement: "Enumerated responses will receive significantly higher reward scores than synthesized responses"
    test_method: "2×2×2 factorial (Structure × Correctness × Completeness) across 4 RMs"
    success_criterion: "Cohen's d >= 0.3 for main effect of structure in ≥2 architecturally distinct RMs"
    falsification: "Pooled |d| < 0.1 across ≥3 RMs under strict controls"
  - id: "P2"
    primary: false
    statement: "≥75% of tested RMs will show same-sign (positive) enumeration effects"
    test_method: "Direction consistency analysis across 4 RMs"
    success_criterion: "3 of 4 RMs show d > 0 for enumeration"
    falsification: "2+ RMs show negative enumeration effects (d < 0)"
  - id: "P3"
    primary: false
    statement: "Spurious enumeration (markers without structural decomposition) will show attenuated effects"
    test_method: "Compare true enumeration vs. spurious enumeration vs. prose baseline"
    success_criterion: "Spurious enumeration retains <30% of true enumeration's effect size relative to prose"
    falsification: "Spurious enumeration retains ≥70% of effect (superficial token bias)"
  - id: "P4"
    primary: false
    statement: "Numeric enumeration without deliberative language will produce significant reward boost"
    test_method: "Structure-vs-semantics dissociation: numeric lists vs. deliberative prose"
    success_criterion: "Numeric-only enumeration shows d >= 0.2 vs. prose baseline"
    falsification: "Effect disappears when deliberative language is removed from enumeration"

