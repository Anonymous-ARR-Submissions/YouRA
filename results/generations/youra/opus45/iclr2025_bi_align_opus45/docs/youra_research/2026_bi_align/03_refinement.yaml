# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Enumeration can be reliably operationalized via deterministic regex classifier"
    supporting_evidence: "Standard NLP pattern matching; will validate with >95% human agreement"
    consequence_if_violated: "Effect could be artifact of inconsistent enumeration detection"
  - id: "A2"
    assumption: "Human raters' enumeration preference transferred to reward models during training"
    supporting_evidence: "Standard RLHF learning dynamics; high-signal features are amplified"
    consequence_if_violated: "Would require alternative explanation for observed d=0.634"
  - id: "A3"
    assumption: "Correctness and completeness manipulations are orthogonal (do not cross-contaminate)"
    supporting_evidence: "Will validate via pre-RM human ratings with |d| < 0.2 cross-contamination"
    consequence_if_violated: "Interaction effects would be uninterpretable"
  - id: "A4"
    assumption: "Publicly available RMs (ArmoRM, UltraRM, Starling, PairRM) are representative of RLHF training"
    supporting_evidence: "All trained on human preference data with standard objectives"
    consequence_if_violated: "Results may not generalize to proprietary models"
  - id: "A5"
    assumption: "Training data statistics (enumeration log-odds) are accessible for at least 2/4 models"
    supporting_evidence: "HelpSteer and UltraFeedback datasets are public"
    consequence_if_violated: "Imprinting analysis limited; mechanism pathway weakened"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - RLHF-trained reward models with pairwise (Bradley-Terry) or scalar regression objectives
    - Open-weight models accessible via HuggingFace (ArmoRM, UltraRM, Starling-RM, PairRM)
    - English-language preference data and evaluation
    - Response-level structural preferences (not token-level or attention-level analysis)
  does_not_apply_to: |
    - DPO-trained models (exploratory only, not primary validation)
    - Closed-source reward models without inference access
    - Non-English language models or multilingual preference data
    - Representation-level probing (token masking is exploratory follow-up)
  known_limitations: |
    - Training data analysis limited to 2/4 models (HelpSteer, UltraFeedback)
    - Token-masking mechanistic probing relegated to exploratory follow-up (ArmoRM only)
    - Domain moderation (high-autonomy vs. low-autonomy) is exploratory, not primary hypothesis

