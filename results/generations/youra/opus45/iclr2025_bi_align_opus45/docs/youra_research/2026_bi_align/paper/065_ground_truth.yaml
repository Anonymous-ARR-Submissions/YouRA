# Ground Truth for Phase 6.5 Adversarial Review
# Extracted from Phase 0-5 artifacts and validated paper
# Used by Adversary Agent to verify paper accuracy

version: "1.0"
extracted_at: "2026-03-25T01:00:00Z"

# ============================================================================
# CORE HYPOTHESIS
# ============================================================================

hypothesis:
  id: "H-EnumPref-v1"
  title: "Structural Enumeration Preference in RLHF-Trained Reward Models"
  claim: "Decoder-based RLHF reward models exhibit significant enumeration preference (d>=0.3) under controlled conditions"
  gate_result: "PASS"

# ============================================================================
# METRICS (From Phase 4 Validation)
# ============================================================================

metrics:
  main_metric:
    name: "Cohen's d (enumeration effect size)"
    pooled_value: 0.696
    pooled_ci_lower: 0.471
    pooled_ci_upper: 0.921
    threshold: 0.3
    threshold_type: "minimum_required"

  per_model_metrics:
    - model: "ArmoRM"
      cohens_d: 1.446
      ci_lower: 1.267
      ci_upper: 1.626
      t_statistic: 17.81
      p_value: 6.89e-49
      n: 300
      exceeds_threshold: true

    - model: "UltraRM"
      cohens_d: 0.881
      ci_lower: 0.714
      ci_upper: 1.049
      t_statistic: 10.36
      p_value: 1.06e-21
      n: 300
      exceeds_threshold: true

    - model: "Starling-RM"
      cohens_d: 0.378
      ci_lower: 0.216
      ci_upper: 0.539
      t_statistic: 4.83
      p_value: 2.22e-6
      n: 300
      exceeds_threshold: true

    - model: "PairRM"
      cohens_d: 0.077
      ci_lower: -0.083
      ci_upper: 0.237
      t_statistic: 0.94
      p_value: 0.346
      n: 300
      exceeds_threshold: false

  heterogeneity:
    i_squared: 99.1
    cochrans_q: 332.4
    q_p_value: "<0.001"

# ============================================================================
# GATE CONDITION EVALUATION
# ============================================================================

gate_evaluation:
  primary_gate:
    condition: "Cohen's d >= 0.3 in at least 2 architecturally distinct reward models"
    models_passing: 3
    models_required: 2
    result: "PASS"

  secondary_criterion:
    condition: ">=75% (3/4) of tested models show positive enumeration effect (d > 0)"
    models_positive: 4
    percentage: 100.0
    result: "PASS"

# ============================================================================
# METHODOLOGY (From Phase 2C/3)
# ============================================================================

methodology:
  stimulus_design:
    name: "Controlled Agency-Structure Stimulus Set"
    total_prompts: 75
    domains: ["General knowledge", "Advice", "Technical"]
    prompts_per_domain: 25
    variants_per_prompt: 8
    total_stimulus_pairs: 300
    length_matching: "±2% token count"

  factorial_design:
    factors:
      - name: "Structure"
        levels: ["Enumerated", "Synthesized"]
        role: "Primary IV"
      - name: "Correctness"
        levels: ["High", "Low"]
        role: "Control"
      - name: "Completeness"
        levels: ["Complete", "Partial"]
        role: "Control"

  enumeration_classifier:
    type: "Deterministic regex"
    pattern_a: ">=2 line-initial markers (^\\s*(\\d+[.\\):]|\\-|\\*|•))"
    pattern_b: ">=2 ordinal tokens (First, Second, 1., 2.)"
    human_agreement: ">95%"

# ============================================================================
# REWARD MODELS EVALUATED
# ============================================================================

reward_models:
  - name: "ArmoRM"
    parameters: "8B"
    architecture: "Llama-3 + MoE"
    architecture_type: "decoder-only"
    training_objective: "Multi-objective Bradley-Terry"
    training_data: "HelpSteer"

  - name: "UltraRM"
    parameters: "13B"
    architecture: "Llama + scalar head"
    architecture_type: "decoder-only"
    training_objective: "Regression"
    training_data: "UltraFeedback"

  - name: "Starling-RM"
    parameters: "7B"
    architecture: "Mistral"
    architecture_type: "decoder-only"
    training_objective: "K-wise Bradley-Terry"
    training_data: "Nectar"

  - name: "PairRM"
    parameters: "0.4B"
    architecture: "DeBERTa-v3-large"
    architecture_type: "encoder-only"
    training_objective: "Pairwise comparison"
    training_data: "LLM-Blender"

# ============================================================================
# KEY CLAIMS IN PAPER
# ============================================================================

claims:
  - claim: "Decoder-based RLHF reward models exhibit significant enumeration preference (d=0.38-1.45)"
    location: "Abstract, Results Section 5.1"
    supporting_evidence: "Table 1: ArmoRM d=1.446, UltraRM d=0.881, Starling-RM d=0.378"
    verified: true

  - claim: "Pooled effect size is d=0.70 (medium-to-large)"
    location: "Abstract, Results Section 5.4"
    supporting_evidence: "Random-effects meta-analysis: d=0.696, 95% CI [0.471, 0.921]"
    verified: true

  - claim: "Three of four models exceed the d=0.3 threshold"
    location: "Results Section 5.3"
    supporting_evidence: "Gate evaluation table shows ArmoRM, UltraRM, Starling-RM pass"
    verified: true

  - claim: "Encoder-only PairRM shows no significant effect (d=0.08, p=0.35)"
    location: "Results Section 5.5"
    supporting_evidence: "Table 1: PairRM d=0.077, 95% CI [-0.083, 0.237], p=0.346"
    verified: true

  - claim: "Effect is architecture-conditional (decoder vs encoder)"
    location: "Introduction, Discussion Section 6.1.2"
    supporting_evidence: "Decoder models show significant effect; encoder PairRM shows null"
    verified: true

  - claim: "Enumeration preference is orthogonal to correctness/completeness"
    location: "Results Section 5.6"
    supporting_evidence: "Factorial interaction analysis shows no significant interaction"
    verified: true

# ============================================================================
# CONTRIBUTIONS VERIFICATION
# ============================================================================

contributions:
  - contribution: "First systematic structural probe for reward models"
    evidence_in_paper: "Methodology Section 3, claims novel behavioral probing approach"
    novelty_basis: "No prior work probed structural/formatting preferences in RMs"

  - contribution: "Multi-architecture analysis (4 distinct RMs)"
    evidence_in_paper: "Section 4.2, Results Section 5"
    specifics: "ArmoRM, UltraRM, Starling-RM, PairRM spanning decoder/encoder"

  - contribution: "Architecture-conditional effect discovery"
    evidence_in_paper: "Results Section 5.5, Discussion Section 6.1.2"
    finding: "PairRM (encoder) shows no effect while decoders show significant effect"

