main_hypothesis:
  id: H-EnumPref-v1
  title: Structural Enumeration Preference in RLHF-Trained Reward Models
  statement: 'Under conditions where RLHF-trained reward models are evaluated on response pairs

    that differ only in structural presentation, if responses enumerate multiple options

    (vs. synthesize into single recommendation), then reward scores will be significantly

    higher for enumerated responses (Cohen''s d >= 0.3), because RLHF training encodes

    human raters'' implicit preference for option enumeration as a high-detectability

    structural feature.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: Custom Agency-Structure Stimulus Set v2
    model: Multi-RM Evaluation Suite (ArmoRM, UltraRM, Starling-RM, PairRM)
    optimizer: null
