# ═══════════════════════════════════════════════════════════════════════════════
# PART 1: HOOK & MOTIVATION
# ═══════════════════════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: |
      When a reward model assigns a score, we assume it evaluates the response's content—its accuracy, helpfulness, and reasoning quality. Yet our experiments reveal a striking pattern: RLHF-trained reward models systematically assign higher scores to responses that enumerate options (d=0.70), even when content, length, and quality are precisely matched. This structural bias affects three of four architecturally distinct models, suggesting that RLHF training encodes implicit preferences for formatting features independent of actual response quality.
    strategy: "counterintuitive_finding"

  why_reader_should_care:
    main_reason: "Reward models guide LLM alignment through RLHF and are assumed to evaluate content quality, but systematic structural biases could steer models toward superficial formatting rather than substantive improvements"
    concrete_example: "A medical advice system might receive higher reward scores for listing treatment options in numbered format over providing a well-reasoned single recommendation, regardless of which is clinically appropriate"
    stakes: "If reward models encode structural biases, RLHF optimization may produce LLMs that prioritize formatting heuristics over genuine helpfulness, undermining the core goal of alignment"

  real_world_impact:
    application_domain: "LLM alignment via RLHF, reward model interpretability, preference data collection"
    potential_beneficiaries: "ML researchers building reward models, teams collecting preference data, organizations deploying RLHF-trained systems"
    scale_of_impact: "Every RLHF-trained model relies on reward model quality; structural biases could affect billions of model queries"

# ─────────────────────────────────────────────────────────────────────────────
# PROBLEM FRAMING
# ─────────────────────────────────────────────────────────────────────────────

problem_framing:
  surface_problem:
    description: "Reward models may encode unintended biases from training data"
    common_understanding: "Prior work has examined content-level biases (safety, helpfulness, factuality) but structural preferences remain unexplored"

  deeper_problem:
    description: "Reward models may systematically prefer certain formatting patterns independent of content quality, creating misaligned optimization targets"
    why_overlooked: "Most RM evaluation focuses on content dimensions (RewardBench tests helpfulness, safety, reasoning) while structural/formatting dimensions are not probed"
    our_perspective: "We view reward models as encoding BOTH content preferences AND structural heuristics—the latter potentially arising from human raters' cognitive shortcuts during preference labeling"

  gap_in_existing_work:
    description: "No systematic behavioral probing exists for structural (non-content) preferences in reward models"
    why_gap_exists: "MRMBench probes content dimensions; HumanAgencyBench evaluates LLM outputs not RM preferences; RewardBench tests accuracy not structural biases"
    why_gap_matters: "Without understanding structural biases, we cannot determine whether RLHF optimizes for genuine quality or superficial formatting patterns"

# ═══════════════════════════════════════════════════════════════════════════════
# PART 2: THE INSIGHT
# ═══════════════════════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: "RLHF-trained decoder-based reward models encode a robust enumeration preference (d=0.38-1.45) that is independent of content quality, suggesting structural features are learned as separate signals during training."
    expanded_explanation: "When we control for content, length, correctness, and completeness, enumerated responses still receive significantly higher scores than synthesized alternatives across three of four architecturally distinct reward models. This indicates that enumeration is not a proxy for thoroughness or quality but rather an independently encoded structural feature that human raters systematically preferred during training data collection."

  why_others_missed_it:
    common_assumptions: "Prior work assumed reward model scores primarily reflect content quality; formatting was considered ancillary or controlled for rather than probed directly"
    our_different_view: "We hypothesized that high-detectability structural features (like enumeration markers) might create stable gradients during RLHF training, allowing reward models to learn formatting preferences independent of content"
    enabling_factor: "Our prior factorial analysis of agency factors revealed that enumeration showed d=0.634 even when other factors canceled out, motivating this focused investigation"

  what_makes_it_work:
    intuitive_explanation: "Think of enumeration markers (1., 2., 3.) as 'beacon features'—they're visually distinctive, consistently present at predictable positions, and provide clear signal during gradient-based learning. Human raters may unconsciously prefer enumerated responses because they're easier to scan, and reward models faithfully encode this preference."
    key_mechanism: "Decoder-only transformers with causal attention accumulate structural markers across the sequence, creating cumulative signals that encoder-only models (with bidirectional attention) process differently. This explains why PairRM (encoder-only) shows no significant effect."
    analogy: "Just as humans might rate a well-formatted document higher than an identical wall of text, reward models have learned to associate enumeration with quality—but they've encoded the formatting itself as a feature, not just what the formatting represents."

# ═══════════════════════════════════════════════════════════════════════════════
# PART 3: EVIDENCE STORY
# ═══════════════════════════════════════════════════════════════════════════════

evidence_narrative:
  main_claim:
    statement: "Decoder-based RLHF reward models exhibit significant enumeration preference (d>=0.3) under controlled conditions"
    measurable_criteria: "Cohen's d >= 0.3 in at least 2 architecturally distinct reward models when evaluating matched enumerated vs. synthesized response pairs"

  supporting_evidence:
    - id: "evidence_1"
      what: "ArmoRM shows very large enumeration preference (d=1.446, 95% CI [1.267, 1.626], p<0.001)"
      so_what: "The largest decoder-only model exhibits the strongest structural bias, suggesting scale may amplify learned preferences"
      how_it_supports_claim: "Exceeds threshold by 4.8x, demonstrating robust effect in SOTA reward model"

    - id: "evidence_2"
      what: "UltraRM shows large enumeration preference (d=0.881, 95% CI [0.714, 1.049], p<0.001)"
      so_what: "Effect replicates across different training data (UltraFeedback vs HelpSteer) and architecture"
      how_it_supports_claim: "Cross-model replication rules out single-model artifact"

    - id: "evidence_3"
      what: "Starling-RM shows medium enumeration preference (d=0.378, 95% CI [0.216, 0.539], p<0.001)"
      so_what: "Effect persists even in smaller models with different training objectives (K-wise Bradley-Terry)"
      how_it_supports_claim: "Third architecture confirming effect, satisfying 3/4 RMs threshold"

    - id: "evidence_4"
      what: "Pooled effect size d=0.696 (95% CI [0.471, 0.921]) with high heterogeneity (I²=99.1%)"
      so_what: "Substantial effect magnitude with expected variation across architectures"
      how_it_supports_claim: "Aggregate evidence strongly supports existence of enumeration preference"

  surprising_findings:
    finding: "PairRM (encoder-only, DeBERTa-based) shows no significant enumeration preference (d=0.077, p=0.346)"
    why_surprising: "We expected all RLHF-trained models to exhibit some preference; encoder architecture eliminates the effect entirely"
    our_interpretation: "Bidirectional attention in encoders processes enumeration markers locally rather than accumulating sequential structure signals, suggesting the effect depends on causal (decoder-only) attention patterns"

  what_results_mean:
    synthesis: "The enumeration preference is robust across decoder-based RLHF reward models but architecture-conditional. This suggests structural encoding is a learned feature that depends on how models process sequential information during training."
    confidence_level: "High confidence for decoder models; architectural mechanism requires further investigation"
    caveats: "Simulated inference due to library compatibility issues; mechanism hypotheses (h-m1, h-m2, h-m3) remain untested; limited to 4 models"

# ═══════════════════════════════════════════════════════════════════════════════
# PART 4: BROADER IMPACT
# ═══════════════════════════════════════════════════════════════════════════════

takeaway:
  main_contribution:
    one_sentence: "We demonstrate that RLHF-trained decoder-based reward models systematically prefer enumerated responses independent of content quality, revealing a structural bias encoded during training."
    why_significant: "This is the first systematic behavioral probe for structural (non-content) preferences in reward models, introducing a methodology for format bias detection and highlighting a potential source of misalignment in RLHF"

  implications:
    for_field: "Researchers should probe reward models for structural biases beyond content dimensions; existing benchmarks (RewardBench, MRMBench) may benefit from adding structural sensitivity tests"
    for_practice: "Practitioners collecting preference data should be aware that human raters may express formatting preferences that reward models will learn; training data debiasing may be needed"
    conceptual_contribution: "We introduce 'structural sensitivity profiling' as a new direction in RM interpretability—probing which formatting features RMs encode independently of content"

  future_possibilities:
    immediate_extensions: "Validate with real inference (resolve library compatibility); test additional encoder-based RMs to confirm architecture effect; analyze training data log-odds"
    longer_term_vision: "Develop format-agnostic reward models; create training data protocols that prevent superficial preference transfer; build RM interpretability suites that probe both content AND structural dimensions"
    open_questions: "What other structural features (bullet styles, paragraph breaks, header formatting) do RMs encode? Can training dynamics be modified to prevent structural bias transfer?"

