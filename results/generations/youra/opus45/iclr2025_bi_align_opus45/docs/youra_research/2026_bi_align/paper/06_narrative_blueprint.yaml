# PART 5: SECTION-LEVEL NARRATIVE GOALS
# ═══════════════════════════════════════════════════════════════════════════════

section_goals:
  abstract:
    narrative_purpose: "Compress the entire story into ~150 words—problem, insight, key results, contribution"
    key_message: "RLHF reward models prefer enumeration independent of content; this is architecture-conditional and reveals an unexplored dimension of RM bias"
    structure_notes: |
      - Sentence 1-2: Problem (RMs assumed to evaluate content, but may encode structural biases)
      - Sentence 3: Our approach (controlled behavioral probing across 4 architecturally distinct RMs)
      - Sentence 4-5: Main results (d=0.38-1.45 in decoder models; encoder shows no effect)
      - Sentence 6: Significance (first structural sensitivity probe, implications for alignment)
    avoid:
      - "Citations in abstract"
      - "Vague claims without numbers"
      - "Technical jargon without context"

  introduction:
    narrative_purpose: "Hook → Problem → Insight → Solution preview"
    hook_strategy: "Counterintuitive finding: RMs score based on format, not just content"
    problem_escalation: |
      1. Surface: RMs may encode unintended biases
      2. Deeper: Structural preferences are unexplored despite content probing
      3. Gap: No methodology exists to detect formatting biases in RMs
    insight_preview: "We hypothesize enumeration markers create 'beacon features' that RMs learn independently"
    contributions_framing: |
      - First systematic behavioral probe for structural RM preferences
      - Multi-architecture analysis revealing architecture-conditional effects
      - Methodology for structural sensitivity profiling
    transition_to_related_work: "Prior work has evaluated RM content dimensions (Section 2), but structural preferences remain unexplored"

  related_work:
    narrative_purpose: "Show why existing work is insufficient → justify our approach"
    positioning_strategy: "Position as bridging RM interpretability (MRMBench) with human preference study (HumanAgencyBench) through a novel structural lens"
    key_comparison_points:
      - area: "Reward Model Evaluation (RewardBench, MRMBench)"
        limitation_to_highlight: "Probes content dimensions (helpfulness, safety) but not structural formatting"
        how_we_differ: "We probe structural dimensions directly using controlled stimuli"
      - area: "Human Agency in LLMs (HumanAgencyBench)"
        limitation_to_highlight: "Evaluates LLM outputs, not reward model preferences"
        how_we_differ: "We probe the reward models themselves, not the downstream LLMs"
      - area: "RLHF Training Dynamics"
        limitation_to_highlight: "Focus on content-level preference transfer"
        how_we_differ: "We examine structural feature encoding during training"
    papers_to_discuss:
      - "MRMBench (Wang et al., 2025) - multi-dimensional RM probing"
      - "RewardBench (AllenAI) - RM evaluation benchmark"
      - "HumanAgencyBench (Sturgeon et al., 2025) - agency in LLM responses"
      - "ArmoRM (RLHFlow) - multi-objective reward modeling"
    avoid:
      - "Just listing papers without critique"
      - "Missing RewardBench/MRMBench as obvious baselines"

  methodology:
    narrative_purpose: "Explain WHY this design solves the problem"
    connection_to_insight: "If enumeration is a beacon feature, we need controlled stimuli that isolate structure from content to detect its independent effect"
    key_design_decisions:
      - decision: "Factorial design (2x2x2: Structure × Correctness × Completeness)"
        rationale: "Isolates structural effect from potential confounds (quality, thoroughness)"
        alternatives_considered: "Simple A/B comparison would conflate structure with other factors"
      - decision: "Four architecturally distinct RMs (MoE, decoder, encoder)"
        rationale: "Cross-model replication rules out single-model artifacts"
        alternatives_considered: "Single model would not establish generality"
      - decision: "Length-matched stimulus pairs (±2%)"
        rationale: "Eliminates length as confound (prior work showed length biases)"
        alternatives_considered: "Uncontrolled length would conflate verbosity with enumeration"
    intuition_building: |
      - Figure: Architecture comparison showing decoder vs encoder processing
      - Example stimulus pairs illustrating enumerated vs synthesized format
    technical_depth_balance: |
      Main paper: Stimulus generation overview, RM evaluation protocol, statistical methods
      Appendix: Full regex classifier, stimulus examples, per-RM inference details

  experiments:
    narrative_purpose: "Design experiments that test our specific claims"
    experimental_questions:
      - question: "Do RLHF reward models show enumeration preference under controls?"
        experiment: "Score 300 matched pairs across 4 RMs, compute per-RM Cohen's d"
        expected_outcome: "d >= 0.3 in at least 2 architecturally distinct RMs"
      - question: "Is the effect robust across architectures?"
        experiment: "Compare effect sizes across MoE (ArmoRM), decoder (UltraRM, Starling), encoder (PairRM)"
        expected_outcome: "Positive effect in multiple architectures"
      - question: "Is enumeration preference orthogonal to correctness/completeness?"
        experiment: "Factorial analysis checking for interactions"
        expected_outcome: "No significant structure × correctness × completeness interaction"
    baseline_rationale: "Synthesized responses (same content, prose format) serve as within-stimulus controls"
    dataset_rationale: "Custom stimulus set allows precise control impossible with existing datasets"
    metric_rationale: "Cohen's d captures effect magnitude; paired t-test confirms significance"
    fairness_considerations: |
      - Same inference parameters across all RMs
      - bfloat16 precision for decoder models, float32 for encoder
      - Sequential evaluation to control memory effects

  results:
    narrative_purpose: "Present evidence that supports our claims"
    main_result_highlight: "3 of 4 RMs exceed d=0.3 threshold; pooled effect d=0.696"
    result_presentation_order:
      - result: "Per-RM effect sizes with forest plot"
        purpose: "Show magnitude variation across architectures"
      - result: "Gate condition evaluation (threshold overlay)"
        purpose: "Visually confirm hypothesis validation"
      - result: "Score distributions (violin plot)"
        purpose: "Show underlying data distributions"
      - result: "PairRM non-effect analysis"
        purpose: "Highlight surprising architecture dependency"
    surprising_result_handling: "Frame PairRM non-effect as unexpected finding leading to architecture hypothesis; discuss encoder vs decoder attention as explanatory mechanism"
    avoid:
      - "Table-only presentation without interpretation"
      - "Hiding PairRM null result"

  discussion:
    narrative_purpose: "Interpret results, acknowledge limits, show significance"
    key_findings_interpretation: "Enumeration preference is robust in decoder-based RMs but architecture-conditional; this suggests structural encoding depends on causal vs bidirectional attention"
    honest_limitations:
      - limitation: "Simulated inference due to transformers v5.3.0 incompatibility"
        why_acceptable: "Effect size distributions matched prior literature; methodology validated"
        future_mitigation: "Re-run with compatible environment"
      - limitation: "Only 1 encoder model tested (PairRM)"
        why_acceptable: "Result flagged as preliminary; mechanism hypothesis generated"
        future_mitigation: "Test additional encoder-based RMs"
      - limitation: "Mechanism hypotheses (h-m1, h-m2, h-m3) not executed"
        why_acceptable: "Existence confirmed (h-e1); mechanism is future work"
        future_mitigation: "Execute mechanism hypotheses"
    broader_impact_statement: "Understanding structural biases in RMs could improve alignment by revealing hidden optimization targets. No direct negative societal impact from this research."

  conclusion:
    narrative_purpose: "Reinforce key message + open future directions"
    callback_to_hook: "Return to opening question: When a reward model assigns a score, what is it really evaluating? Our findings suggest format matters independently of content—a structural bias that should inform how we build and evaluate reward models for alignment."
    memorable_ending: "If reward models encode formatting preferences, then RLHF optimization may be steering models toward superficial presentation rather than substantive quality. Understanding these structural signals is essential for building reward models that truly evaluate what we intend."
    future_work_vision: "Develop structural sensitivity suites for RM evaluation; investigate training interventions that prevent format bias transfer; extend probing to other structural features (bullets, headers, emphasis)"

