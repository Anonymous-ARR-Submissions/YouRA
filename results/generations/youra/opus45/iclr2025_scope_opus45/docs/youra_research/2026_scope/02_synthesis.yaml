hypothesis_draft:
  title: "Memory Horizon Separation in SSM Adaptation: Spectral Surgery vs Eigenmode Utilization"
  hypothesis_id: "H-MHSH-EUH-v1"
  core_claim: |
    SSM adaptation via projection-only LoRA operates through eigenmode utilization (redistributing
    state energy toward slow modes) for tasks within the spectral horizon H_spec, but requires
    spectral surgery (modifying eigenvalues via discretization parameters) for tasks beyond H_spec.
    The boundary is determined by the model's dominant eigenvalue: H_spec = -1/log|λ_max|.
  mechanism: |
    1. SSM state dynamics governed by Ā = exp(ΔA) with input-independent eigenvalues
    2. Projection-only LoRA preserves eigenvalues but can redistribute modal energy
    3. Tasks within H_spec succeed via eigenmode utilization (ΔE > 0, Δλ ≈ 0)
    4. Tasks beyond H_spec require spectral surgery (Δλ > 0, ΔH_spec > 50%)
    5. Surgical A-matrix scaling experiment discriminates between mechanisms
  predictions:
    - P1: "Within-horizon (L ≤ H_spec): projection-only matches SSM-core (Δ ≤ 1%)"
    - P2: "Beyond-horizon (L = 4H_spec): either failure with Δλ ≈ 0, or success with ΔE >> 0"
    - P3: "SSM-core success at L = 4H_spec requires ΔH_spec > 50%"

variables_summary:
  independent: "Adaptation method (projection-only vs SSM-core vs hybrid) × Task dependency length (L/H_spec ratios)"
  dependent_primary: "Task accuracy on MQAR"
