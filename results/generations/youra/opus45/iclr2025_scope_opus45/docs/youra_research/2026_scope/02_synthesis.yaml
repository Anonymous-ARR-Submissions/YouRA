novelty_assessment:
  status: "VERIFIED"
  key_innovation: |
    First principled framework connecting SSM spectral dynamics to PEFT method selection.
    Introduces H_spec as a measurable boundary for adaptation strategy.
    Provides mutually exclusive predictions for MHSH vs EUH mechanisms.
  differentiation_summary: |
    Unlike SSM-PEFT (ICML 2025) which proposes SDT empirically, and MambaPEFT (ICLR 2025)
    which catalogs methods without selection criteria, this work provides a theoretical
    foundation: H_spec determines when projection-only is sufficient vs when SSM-core is required.

