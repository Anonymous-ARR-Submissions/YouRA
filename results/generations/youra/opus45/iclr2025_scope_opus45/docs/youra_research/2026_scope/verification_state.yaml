main_hypothesis:
  id: H-MHSH-EUH-v1
  title: Memory Horizon Separation in SSM Adaptation
  statement: Under SSM-based language models (Mamba architecture), if we apply parameter-efficient fine-tuning via projection-only
    LoRA, then task adaptation success depends on whether task information dependencies fall within the model's spectral memory
    horizon H_spec, because projection-only LoRA can redistribute state energy across existing eigenmodes (Eigenmode Utilization)
    but cannot extend the spectral horizon without modifying the discretization parameters that determine eigenvalue magnitudes
    (Spectral Surgery).
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: Multi-Query Associative Recall (MQAR)
    model: Mamba-1.4B
    optimizer: AdamW
    hyperparameters:
      learning_rate: 1e-4
      batch_size: TBD
      epochs: 5
      seeds: 5
