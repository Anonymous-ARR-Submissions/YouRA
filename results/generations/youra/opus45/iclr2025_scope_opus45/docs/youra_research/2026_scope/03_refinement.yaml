    primary: true
    statement: "For MQAR tasks with dependency L ≤ H_spec, projection-only LoRA achieves accuracy within 1% of SSM-core LoRA"
    test_method: "Compare accuracy at L = H_spec across adaptation methods with matched parameters"
    success_criterion: "|Acc_projection - Acc_core| ≤ 1% absolute"
    falsification: "If projection-only LoRA underperforms SSM-core by >5% at L ≤ H_spec"
  - id: "P2"
    primary: false
    statement: "For MQAR tasks with L = 4×H_spec, either (a) projection-only LoRA fails AND ΔH_spec < 10%, or (b) projection-only LoRA succeeds with ΔE > 0.1 nats"
    test_method: "Measure accuracy, ΔH_spec, and ΔE at L = 4×H_spec for projection-only LoRA"
    success_criterion: "(Acc < 50% AND ΔH_spec < 10%) XOR (Acc > 70% AND ΔE > 0.1)"
    falsification: "If both conditions hold simultaneously, or neither holds"
  - id: "P3"
    primary: false
    statement: "SSM-core LoRA (modifying discretization parameters) increases ΔH_spec > 50% when successful on beyond-horizon tasks"
    test_method: "Compare H_spec before and after SSM-core adaptation for L = 4×H_spec success"
    success_criterion: "ΔH_spec > 50% when beyond-horizon accuracy > 70%"
    falsification: "If SSM-core achieves beyond-horizon success without significant H_spec extension"

