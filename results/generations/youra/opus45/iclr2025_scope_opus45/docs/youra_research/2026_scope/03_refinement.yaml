# ═══════════════════════════════════════════════════════════════
# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "Standard LoRA targets linear projections but cannot directly modify SSM core modules (A, B, C, D)"
      status: "BUILD_ON"
      evidence: "SSM-PEFT (ICML 2025), MambaPEFT (ICLR 2025) - both show LoRA effective on projections, fails on SSM modules"
    - claim: "SSM state dynamics are governed by structured discretization parameters, not free weight matrices"
      status: "BUILD_ON"
      evidence: "Mamba paper (Gu & Dao, 2023) - A matrix is discretized via exp(ΔA)"
    - claim: "Projection-only LoRA achieves competitive performance on many tasks"
      status: "BUILD_ON"
      evidence: "MambaPEFT finds PEFT more effective for Mamba than Transformers"
    - claim: "The relationship between LoRA adaptation locus and task memory requirements is unexplored"
      status: "PROVE_NEW"
      evidence: "No prior work correlates SSM spectral properties with PEFT method selection"
    - claim: "Eigenmode energy redistribution can extend effective memory without changing eigenvalues"
      status: "PROVE_NEW"
      evidence: "Novel hypothesis from discussion - requires empirical validation"
  scope_reduction_percentage: 60
  phase2b_4_instructions: |
    BUILD_ON claims provide foundation context - no need to re-verify.
    Focus verification on PROVE_NEW claims:
    1. Spectral horizon (H_spec) determines PEFT method boundary
    2. Eigenmode utilization vs spectral surgery distinction

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-MHSH-EUH-v1"
  confidence_level: 0.80
  core_hypothesis_statement: |
    Under SSM-based language models (Mamba architecture), if we apply parameter-efficient
    fine-tuning via projection-only LoRA, then task adaptation success depends on whether
    task information dependencies fall within the model's spectral memory horizon H_spec,
    because projection-only LoRA can redistribute state energy across existing eigenmodes
    (Eigenmode Utilization) but cannot extend the spectral horizon without modifying the
    discretization parameters that determine eigenvalue magnitudes (Spectral Surgery).
  alternative_hypothesis_h0: |
    There is no significant relationship between SSM spectral properties (eigenvalue magnitudes,
    eigenmode energy distribution) and the relative effectiveness of projection-only LoRA versus
    SSM-core adaptation across tasks with varying dependency lengths.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Adaptation Method"
      type: "categorical"
      operationalization: "PEFT method applied to Mamba model"
      levels:
        - "projection-only-lora"
        - "ssm-core-lora"
        - "state-offset-tuning"
        - "hybrid-lora-offset"
    - name: "Task Dependency Length (L)"
      type: "continuous"
      operationalization: "Number of tokens between relevant information and query point"
      levels:
        - "L = H_spec (within horizon)"
        - "L = 2×H_spec"
        - "L = 4×H_spec"
        - "L = 8×H_spec (beyond horizon)"
  dependent:
    - name: "Task Accuracy"
      type: "continuous"
      operationalization: "Accuracy on MQAR task (0-100%)"
      primary: true
    - name: "Spectral Horizon Change (ΔH_spec)"
      type: "continuous"
      operationalization: "Percentage change in H_spec = -1/log|λ_max| after adaptation"
      primary: false
    - name: "Modal Energy Redistribution (ΔE)"
      type: "continuous"
      operationalization: "KL divergence of eigenmode energy distribution before/after adaptation (nats)"
      primary: false
  controlled:
    - name: "Parameter Count"
      operationalization: "Total trainable parameters matched across all adaptation methods"
    - name: "Model Architecture"
      operationalization: "Fixed to Mamba-1.4B (primary) or Mamba-370M (validation)"
    - name: "Training Protocol"
      operationalization: "Same optimizer, learning rate, batch size, epochs across conditions"
    - name: "Task Format"
      operationalization: "MQAR with N associations > state dimension to prevent compression"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "SSM state dynamics are governed by discretized transition matrix Ā = exp(ΔA) with eigenvalues determining decay rates"
      evidence: "Mamba paper architecture description; A matrix is input-independent diagonal"
      falsifier: "If Ā eigenvalues vary significantly across tokens (CV > 0.3), the spectral horizon is ill-defined"
    - step: 2
      description: "Projection-only LoRA modifies input/output mappings but does not change Ā eigenvalues, preserving spectral horizon H_spec"
      evidence: "LoRA operates on linear projections; discretization parameters unchanged"
      falsifier: "If empirical system identification shows pole drift under projection-only LoRA"
    - step: 3
      description: "Projection-only LoRA can redistribute state energy toward slow eigenmodes, effectively utilizing latent memory capacity"
      evidence: "Theoretical analysis: input reweighting can preferentially excite slow modes"
      falsifier: "If modal energy analysis (ΔE) shows no significant redistribution under projection-only LoRA"
    - step: 4
      description: "Tasks requiring information beyond H_spec fail under projection-only LoRA unless slow modes exist to exploit; SSM-core adaptation can extend H_spec"
      evidence: "Separation hypothesis: MHSH predicts failure, EUH predicts success via mode utilization"
      falsifier: "If beyond-horizon success occurs with both Δλ ≈ 0 AND ΔE ≈ 0"
  key_tension: "Whether projection-only LoRA succeeds on beyond-horizon tasks via eigenmode utilization (EUH) or fails requiring spectral surgery (MHSH)"
  evidence_summary: |
    The causal chain predicts that SSM adaptation mechanisms can be cleanly separated by measuring
    eigenvalue shifts (Δλ) and modal energy redistribution (ΔE). Either mechanism alone explains
    beyond-horizon success, but their signatures are mutually exclusive. The surgical A-matrix
    scaling experiment provides the definitive test.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "The local Jacobian ∂h_{t+1}/∂h_t is stable across tokens (CV < 0.3)"
    supporting_evidence: "Mamba A matrix is input-independent; only Δ varies"
    consequence_if_violated: "H_spec becomes a distribution, not a point; separation boundary is ill-defined"
  - id: "A2"
    assumption: "Eigenvalue clamping/scaling can isolate memory effects without representational damage"
    supporting_evidence: "A-matrix scaling preserves eigenvectors; rotation control validates isolation"
    consequence_if_violated: "Surgical experiments are confounded; cannot distinguish memory from representation"
  - id: "A3"
    assumption: "MQAR with N > state_dim prevents low-dimensional compression"
    supporting_evidence: "Multiple simultaneous associations require distributed high-dimensional state"
    consequence_if_violated: "EUH wins by construction via trivial 1D summary mode"
  - id: "A4"
    assumption: "H_spec scales predictably with model size"
    supporting_evidence: "Depth/width should monotonically affect spectral properties"
    consequence_if_violated: "Results are checkpoint-specific, not a structural principle"
  - id: "A5"
    assumption: "Pretrained Mamba can learn MQAR with fine-tuning on short contexts"
    supporting_evidence: "h-m2 failure was due to lack of fine-tuning, not fundamental incapability"
    consequence_if_violated: "Extrapolation test is invalid if within-horizon performance not established"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Mamba-family SSM architectures (Mamba, Mamba-2)
    - Tasks with well-defined information dependency lengths
    - PEFT methods targeting either projections or SSM core parameters
  does_not_apply_to: |
    - RWKV architecture (implicit dynamics, harder eigenanalysis)
    - Hybrid Transformer-SSM architectures
    - Tasks without clear temporal dependency structure
  known_limitations: |
    - Eigenanalysis requires linearization which may not capture nonlinear effects
    - MQAR is synthetic; generalization to natural language tasks is exploratory
    - Cross-scale validation limited to available Mamba checkpoints

