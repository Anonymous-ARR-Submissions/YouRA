  # ---------------------------------------------------------------------------
  experiments:
    narrative_purpose: "Design experiments that test our specific claims"
    experimental_questions:
      - question: "Is H_spec a stable, input-independent property?"
        experiment: "H-E1: Measure H_spec across 1000 random sequences"
