      MQAR: deferred due to scope (would enable discriminative H-M4 test).
    metric_rationale: |
      CV for stability, perplexity for memory utilization, eigenvalue
      correlation for preservation, slow mode fraction for energy analysis.
    fairness_considerations: |
      All experiments use same model checkpoint, same hardware, same
      random seeds for reproducibility.

  # ---------------------------------------------------------------------------
