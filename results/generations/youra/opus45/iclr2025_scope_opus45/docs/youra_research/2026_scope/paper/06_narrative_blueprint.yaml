        figure: "fig_1"
      - result: "H-M1: Perplexity degradation (ratio = 3.03)"
        purpose: "Show eigenvalues have empirical relevance"
        figure: "fig_5"
      - result: "H-M2: Eigenvalue preservation (delta = 0.0%)"
        purpose: "Confirm LoRA cannot modify spectral horizon"
        figure: "fig_8"
      - result: "H-M3: Energy redistribution failure (delta_E << threshold)"
        purpose: "Eliminate EUH, confirm MHSH"
        figure: "fig_12"
    surprising_result_handling: |
      The zero energy redistribution is highlighted as a key finding, not
      downplayed. Explain why the slow mode capacity is so limited (only
      2/48 layers) and what this means for Mamba architecture understanding.

  # ---------------------------------------------------------------------------
  # DISCUSSION
  # ---------------------------------------------------------------------------
  discussion:
    narrative_purpose: "Interpret results, acknowledge limits, show significance"
    key_findings_interpretation: |
      The negative result (EUH elimination) is scientifically valuable: it
      narrows the hypothesis space and redirects future work toward eigenvalue
      modification ("Spectral Surgery") rather than projection optimization.
    honest_limitations:
      - limitation: "WikiText-103 proxy instead of controlled MQAR task"
        why_acceptable: "Perplexity provides meaningful mechanistic validation"
        future_mitigation: "H-M4 task failure test remains for future work"
      - limitation: "Single model family (Mamba-1.4B)"
        why_acceptable: "Proof-of-concept for spectral framework"
        future_mitigation: "Cross-architecture validation (RWKV, Mamba-2)"
      - limitation: "H-M4 discriminative test not executed"
        why_acceptable: "H-M3 negative result sufficient for EUH elimination"
        future_mitigation: "MQAR task evaluation for MHSH validation"
    broader_impact_statement: |
      This work provides principled guidance for SSM adaptation, potentially
      reducing wasted compute on doomed fine-tuning attempts. No direct
      negative societal impacts identified; standard LLM dual-use considerations
      apply.

  # ---------------------------------------------------------------------------
  # CONCLUSION
  # ---------------------------------------------------------------------------
  conclusion:
    narrative_purpose: "Reinforce key message + open future directions"
    callback_to_hook: |
      Return to the opening puzzle: "Why does LoRA work for Mamba on some
      tasks but not others?" Now we have the answer: the spectral horizon
      H_spec determines the boundary, and projection-only LoRA cannot
      extend it.
    memorable_ending: |
      "The next frontier in SSM adaptation is not better projections, but
      Spectral Surgery: methods that can reshape the eigenvalue landscape
      while preserving the efficiency that makes SSMs attractive."
    future_work_vision: |
      - SSM-core LoRA targeting discretization parameters
      - Adaptive H_spec extension for long-context deployment
      - Cross-architecture spectral analysis (RWKV, RetNet, Mamba-2)

