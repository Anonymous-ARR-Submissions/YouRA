# ===============================================================================
# PART 1: HOOK & MOTIVATION
# ===============================================================================

hook:
  # ---------------------------------------------------------------------------
  # Opening Statement - MUST grab attention immediately
  # ---------------------------------------------------------------------------
  opening_statement:
    content: |
      Why does LoRA work for Mamba on some tasks but fail on others?
      We discover that projection-only LoRA is bounded by a measurable
      spectral horizon -- and contrary to theoretical expectation, it
      cannot extend this boundary by redistributing energy to slow eigenmodes.
    strategy: "counterintuitive_finding"

    # Alternative hooks considered:
    # - "Despite achieving competitive performance on short-context tasks,
    #    projection-only LoRA fails dramatically when information dependencies
    #    exceed 256 tokens in Mamba models."
    # - "Parameter-efficient fine-tuning methods that work for Transformers
    #    face unexpected limitations in SSM architectures."

  # ---------------------------------------------------------------------------
  # Why Reader Should Care
  # ---------------------------------------------------------------------------
  why_reader_should_care:
    main_reason: |
      As SSM-based models (Mamba, RWKV) gain adoption for their linear-time
      inference, practitioners need principled guidance on when PEFT methods
      work. Our spectral horizon framework provides the first measurable
      criterion for predicting LoRA effectiveness.
    concrete_example: |
      A practitioner fine-tuning Mamba-1.4B with LoRA for a task requiring
      512-token context dependencies may invest significant compute only to
      discover the model cannot learn the task -- because the spectral
      horizon H_spec = 256 tokens cannot be extended by projection-only LoRA.
    stakes: |
      Without understanding these boundaries, the SSM community will continue
      trial-and-error adaptation, wasting compute and potentially abandoning
      viable architectures due to misattributed failures.

  # ---------------------------------------------------------------------------
  # Real-World Impact
  # ---------------------------------------------------------------------------
  real_world_impact:
    application_domain: "Parameter-efficient adaptation of SSM language models"
    potential_beneficiaries: |
      - ML practitioners deploying Mamba/RWKV in production
      - Researchers designing PEFT methods for non-Transformer architectures
      - Hardware teams optimizing for SSM inference with adaptation
    scale_of_impact: |
      SSM models are increasingly adopted for long-context and low-latency
      applications. Mamba variants have been downloaded millions of times.
      Principled PEFT guidance affects a growing segment of the LLM ecosystem.

# -----------------------------------------------------------------------------
# PROBLEM FRAMING
# -----------------------------------------------------------------------------

problem_framing:
  # Level 1: What everyone knows
  surface_problem:
    description: |
      Standard LoRA targets linear projections but cannot directly modify
      SSM core modules (A, B, C, D matrices). This architectural mismatch
      limits PEFT effectiveness for SSM adaptation.
    common_understanding: |
      Prior work (SSM-PEFT, MambaPEFT) has cataloged this limitation and
      proposed alternatives like Sparse Dimension Tuning and State-offset
      Tuning. The consensus is that projection-only LoRA is "sometimes
      effective, sometimes not."

  # Level 2: What we discovered
  deeper_problem:
    description: |
      The deeper issue is not that LoRA *cannot* reach SSM parameters, but
      that even when projection adaptation succeeds, it operates under an
      invisible constraint: the spectral memory horizon H_spec.
    why_overlooked: |
      Prior work focused on empirical performance comparisons without
      investigating the spectral dynamics underlying SSM state evolution.
      The connection between eigenvalue structure and task suitability
      was never explicitly modeled.
    our_perspective: |
      We frame SSM adaptation as a boundary problem: projection-only LoRA
      can redistribute what enters and exits the state, but cannot change
      how information decays within the state. This decay rate is governed
      by eigenvalues of the discretized transition matrix.

  # Level 3: The gap that creates opportunity
  gap_in_existing_work:
    description: |
      No prior work provides a measurable criterion for predicting when
      projection-only LoRA will succeed vs. fail on SSM architectures.
    why_gap_exists: |
      Bridging this gap requires combining: (1) eigenvalue analysis of SSM
      dynamics, (2) controlled experiments on adaptation scope, and (3)
      energy distribution analysis. No prior work connected these pieces.
    why_gap_matters: |
      Without this framework, practitioners cannot make informed decisions
      about PEFT method selection. The gap between theory (eigenvalue
      dynamics) and practice (PEFT effectiveness) remains unbridged.

# ===============================================================================
# PART 2: THE INSIGHT
# ===============================================================================

key_insight:
  # ---------------------------------------------------------------------------
  # The Core "Aha!" Moment
  # ---------------------------------------------------------------------------
  aha_moment:
    one_sentence: |
      Projection-only LoRA preserves the spectral memory horizon perfectly
      (delta_H_spec = 0.0%) because eigenvalues are structurally isolated
      from projection parameters, and energy redistribution toward slow
      eigenmodes does NOT occur -- eliminating the Eigenmode Utilization
      Hypothesis and confirming that task adaptation is bounded by the
      intrinsic spectral horizon.
    expanded_explanation: |
      We operationalized the spectral memory horizon as H_spec = -1/log|lambda_max|,
      a measurable quantity derived from the pretrained A matrix. Our experiments
      show that H_spec is input-independent (CV = 2.22e-16) and that projection-only
      LoRA leaves eigenvalues completely untouched (correlation = 1.0). Crucially,
      we tested whether LoRA could extend effective memory by redirecting state
      energy to slow-decaying eigenmodes (the EUH mechanism) -- but energy
      redistribution is negligible (delta_E = 5.93e-07 nats). This eliminates
      EUH and confirms the Memory Horizon Separation Hypothesis (MHSH).

  # ---------------------------------------------------------------------------
  # Why Others Missed It
  # ---------------------------------------------------------------------------
  why_others_missed_it:
    common_assumptions: |
      Prior work assumed that if projection-only LoRA failed, the solution
      was simply to target different parameters (e.g., SDT, state-offset).
      They did not ask: "What is the theoretical limit of projection-only
      adaptation, and can we predict it?"
    our_different_view: |
      We asked: What CAN projection-only LoRA achieve, given that it cannot
      modify eigenvalues? Two hypotheses emerged: (1) MHSH - it's bounded by
      H_spec, or (2) EUH - it can utilize latent slow-mode capacity. Our
      experiments discriminated between these.
    enabling_factor: |
      The key enabler was operationalizing H_spec from model weights. Once
      we could measure the spectral horizon, we could design experiments to
      test whether LoRA could extend or utilize it.

  # ---------------------------------------------------------------------------
  # Why It Works (Mechanism)
  # ---------------------------------------------------------------------------
  what_makes_it_work:
    intuitive_explanation: |
      Think of SSM state as a bank of leaky buckets with different drain rates
      (eigenvalues). LoRA can change what water goes INTO each bucket and how
      you READ the water level, but cannot change the drain rates themselves.
      If your task needs water to persist for 500 timesteps but the slowest
      bucket drains in 256, LoRA cannot help.
    key_mechanism: |
      SSM state dynamics: h_t = A_bar * h_{t-1} + B_bar * x_t
      Eigenvalues of A_bar determine decay rates. H_spec = -1/log|lambda_max|
      gives the longest-persisting mode. Projection-only LoRA modifies B_bar
      and C matrices (input/output) but not A_bar eigenvalues.
    analogy: |
      Like adjusting the focus and zoom on a camera with a fixed shutter speed:
      you can change what you capture and how you present it, but you cannot
      change how long the sensor integrates light.

# ===============================================================================
# PART 3: EVIDENCE STORY
# ===============================================================================

evidence_narrative:
  # ---------------------------------------------------------------------------
  # Main Claim
  # ---------------------------------------------------------------------------
  main_claim:
    statement: |
      Projection-only LoRA is bounded by the spectral memory horizon H_spec,
      which is a stable, measurable property of pretrained Mamba models that
      cannot be extended through projection adaptation.
    measurable_criteria: |
      (1) H_spec is stable: CV < 0.3 across inputs (H-E1)
      (2) Eigenvalues govern memory: perplexity degrades when context < H_spec (H-M1)
      (3) LoRA preserves eigenvalues: |delta_H_spec| < 10% (H-M2)
      (4) Energy redistribution fails: delta_E < 0.1 nats (H-M3)

  # ---------------------------------------------------------------------------
  # Supporting Evidence (Each with "So What")
  # ---------------------------------------------------------------------------
  supporting_evidence:
    - id: "evidence_1"
      hypothesis: "H-E1"
      what: |
        CV(H_spec) = 2.22e-16 across 1000 random input sequences.
        H_spec = 256.18 tokens for Mamba-1.4B.
      so_what: |
        H_spec is not sequence-dependent noise -- it's an intrinsic model
        property determined solely by pretrained weights. This validates
        H_spec as a meaningful task boundary.
      how_it_supports_claim: |
        Establishes that the spectral horizon is well-defined and measurable,
        the foundation for all subsequent mechanism claims.
      figure: "fig_1 (hspec_distribution.png)"

    - id: "evidence_2"
      hypothesis: "H-M1"
      what: |
        Perplexity degradation ratio = 3.03 when context < H_spec.
        PPL at 25 tokens: 83.26; at 256 tokens: 17.89; at 1024 tokens: 12.22.
      so_what: |
        The eigenvalue-derived H_spec actually predicts model behavior on real
        text. This is not just a theoretical quantity -- it has empirical bite.
      how_it_supports_claim: |
        Validates that eigenvalues govern information decay, connecting
        spectral analysis to observable performance.
      figure: "fig_5 (ppl_vs_context_length.png)"

    - id: "evidence_3"
      hypothesis: "H-M2"
      what: |
        |delta_H_spec| = 0.0000% after projection-only LoRA training.
        Eigenvalue correlation = 1.0. A_log parameters completely frozen.
      so_what: |
        Projection-only LoRA achieves PERFECT eigenvalue preservation.
        The isolation is architectural, not incidental.
      how_it_supports_claim: |
        Confirms that LoRA cannot modify the spectral horizon even indirectly.
        Whatever adaptation occurs is bounded by the original H_spec.
      figure: "fig_8 (eigenvalue_scatter.png)"

    - id: "evidence_4"
      hypothesis: "H-M3"
      what: |
        delta_E = 5.93e-07 nats (vs. 0.1 threshold). Only 2/48 layers have
        any slow mode capacity. Slow mode fraction unchanged after training.
      so_what: |
        The EUH mechanism is definitively eliminated. Projection-only LoRA
        cannot extend effective memory by utilizing latent slow modes.
      how_it_supports_claim: |
        This negative result is the discriminating evidence. With EUH ruled
        out, MHSH is the only remaining explanation for LoRA's limitations.
      figure: "fig_12 (energy_distribution.png)"

  # ---------------------------------------------------------------------------
  # Surprising Findings
  # ---------------------------------------------------------------------------
  surprising_findings:
    finding: |
      Energy redistribution is essentially ZERO (6 orders of magnitude below
      threshold), not just "below threshold." Also: only 2/48 layers in
      Mamba-1.4B have any slow eigenmodes at all.
    why_surprising: |
      Theory suggested that projection reweighting could preferentially
      excite slow modes. In practice, the slow mode capacity is so limited
      (0.002% of total energy) that redistribution is structurally impossible.
    our_interpretation: |
      The A matrix architecture heavily favors fast-decaying modes. Pretrained
      Mamba optimizes for short-term pattern matching, not long-term memory.
      This is an architectural choice, not a training artifact.

  # ---------------------------------------------------------------------------
  # What Results Mean
  # ---------------------------------------------------------------------------
  what_results_mean:
    synthesis: |
      For projection-only LoRA on Mamba: task success = (task_dependency_length <= H_spec).
      Extending memory requires "Spectral Surgery" -- modifying A matrix eigenvalues.
    confidence_level: "High for the negative result (EUH elimination); Medium for MHSH positive claim (needs H-M4 task failure confirmation)"
    caveats: |
      WikiText-103 perplexity was used as proxy; MQAR task evaluation not
      completed. Results specific to Mamba-1.4B; cross-architecture
      generalization not tested.

# ===============================================================================
# PART 4: BROADER IMPACT
# ===============================================================================

takeaway:
  # ---------------------------------------------------------------------------
  # Main Contribution
  # ---------------------------------------------------------------------------
  main_contribution:
    one_sentence: |
      We provide the first measurable criterion (H_spec) for predicting when
      projection-only LoRA will succeed on SSM architectures, and empirically
      eliminate the energy redistribution mechanism as a viable pathway for
      extending effective memory.
    why_significant: |
      This transforms SSM adaptation from trial-and-error to principled
      selection. Practitioners can compute H_spec from weights and compare
      to task requirements before investing in fine-tuning.

  # ---------------------------------------------------------------------------
  # Broader Implications
  # ---------------------------------------------------------------------------
  implications:
    for_field: |
      Narrows the hypothesis space for SSM adaptation theory. Future work
      on extending SSM memory should focus on eigenvalue modification
      ("Spectral Surgery") rather than projection optimization.
    for_practice: |
      Provides a checklist: (1) Compute H_spec, (2) Estimate task dependency
      length, (3) If task_L > H_spec, use SSM-core adaptation methods.
    conceptual_contribution: |
      Operationalizes the connection between SSM spectral dynamics and PEFT
      effectiveness. Introduces H_spec as a transferable concept for
      analyzing other recurrent architectures (RWKV, RetNet).

  # ---------------------------------------------------------------------------
  # Future Possibilities
  # ---------------------------------------------------------------------------
  future_possibilities:
    immediate_extensions: |
      - Validate MHSH with task failure experiments (H-M4 / MQAR)
      - Implement SSM-core LoRA targeting delta/A_log parameters
      - Cross-architecture validation (Mamba-2, RWKV)
    longer_term_vision: |
      Spectral Surgery methods: new PEFT variants that modify eigenvalues
      in a parameter-efficient way. Adaptive H_spec extension for long-context
      SSM deployment.
    open_questions: |
      - Why does Mamba-370M have H_spec >> Mamba-1.4B? (non-monotonic scaling)
      - Can layer-selective adaptation target the 2 layers with slow modes?
      - How does H_spec relate to natural language dependency structures?

