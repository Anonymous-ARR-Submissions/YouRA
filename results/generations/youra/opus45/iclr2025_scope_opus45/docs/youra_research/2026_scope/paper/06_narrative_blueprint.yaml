  # ---------------------------------------------------------------------------
  results:
    narrative_purpose: "Present evidence that supports our claims"
    main_result_highlight: |
      Energy redistribution is ZERO: delta_E = 5.93e-07 nats, 6 orders of
      magnitude below threshold. EUH is definitively eliminated.
    result_presentation_order:
