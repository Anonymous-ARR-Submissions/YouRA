    key_design_decisions:
      - decision: "Operationalize H_spec from A_log parameters"
        rationale: "Makes spectral horizon measurable from weights alone"
        alternatives_considered: "Empirical probing (expensive, input-dependent)"
      - decision: "Use WikiText-103 perplexity as memory probe"
        rationale: "Perplexity at varying context lengths tests memory utilization"
        alternatives_considered: "MQAR (more controlled but requires training)"
      - decision: "Measure eigenmode energy redistribution via slow mode fraction"
        rationale: "Directly tests EUH mechanism"
        alternatives_considered: "Full KL divergence (sensitive to numerical issues)"
    intuition_building: |
      Figure 1 (or architecture diagram): Show SSM state flow with A matrix
      eigenvalues controlling decay. Highlight what LoRA CAN vs CANNOT modify.
    technical_depth_balance: |
