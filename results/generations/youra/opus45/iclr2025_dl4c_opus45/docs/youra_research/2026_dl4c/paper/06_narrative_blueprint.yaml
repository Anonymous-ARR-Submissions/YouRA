# Narrative Blueprint for Academic Paper
# Phase 6 Step 02: Narrative Design
# Generated: 2026-03-24
# Schema Version: 2.0 (Story Group Architecture)

metadata:
  paper_title: "Alignment Signatures in Failure Modes: How Training Objectives Shape Error Type Distributions in Code Generation"
  hypothesis_id: "H-ErrorTypeDivergence-v1"
  target_venue: "ICML 2026 / NeurIPS 2026"
  word_target: "~6000 (8 pages ICML format)"
  generated_at: "2026-03-24T16:00:00+00:00"

# ═══════════════════════════════════════════════════════════════════════════
# SECTION 1: THE HOOK
# ═══════════════════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: "When code generation models fail, the nature of their failure reveals more about their training than their architecture—a model aligned with execution-based RL fails fundamentally differently than one aligned with preference-based DPO."
    strategy: "counterintuitive_finding"

  why_reader_should_care:
    main_reason: "Understanding failure modes is essential for debugging, improving, and safely deploying code generation systems"
    concrete_example: "A developer debugging an RL-aligned model should expect assertion errors (code runs but produces wrong output), while debugging a DPO-aligned model means expecting syntax crashes—requiring fundamentally different remediation strategies"
    stakes: "Without understanding alignment-specific failure modes, practitioners misattribute errors and apply ineffective fixes; researchers design evaluation metrics that mask true model capabilities"

  anti_patterns_avoided:
    - "Did NOT start with 'Code generation has achieved remarkable success...'"
    - "Did NOT use generic 'X is important in Y...'"
    - "Used specific, testable claim as opening"

# ═══════════════════════════════════════════════════════════════════════════
# SECTION 2: PROBLEM FRAMING
# ═══════════════════════════════════════════════════════════════════════════

problem_framing:
  surface_problem:
    description: "Code generation models fail on significant portions of benchmarks"
    common_understanding: "Papers report pass rates (pass@k) but rarely examine failure composition"

  deeper_problem:
    description: "Alignment methods (RL vs DPO) create different optimization pressures that should manifest as different failure patterns"
    why_overlooked: "Focus on aggregate metrics (pass rate) obscures error type analysis; error taxonomies exist but are not stratified by alignment method"
    our_perspective: "Failure modes are not random—they are signatures of the training objective's inductive bias over the error geometry"

  gap_in_existing_work:
    description: "No prior study examines how alignment method choice affects conditional error type distribution P(error_type | failure)"
    why_gap_exists: "RL and DPO communities focus on pass rate improvements, not failure mode characterization"
    why_gap_matters: "Missing this analysis prevents understanding WHY methods differ, designing complementary approaches, and engineering targeted failure mitigation"

# ═══════════════════════════════════════════════════════════════════════════
# SECTION 3: KEY INSIGHT
# ═══════════════════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: "Binary execution reward creates a 'zero-reward basin' that forces RL models to achieve syntactic validity before semantic correctness, concentrating remaining failures in assertion errors."
    expanded_explanation: |
      RL with binary pass/fail reward treats all non-executing code identically (zero reward),
      regardless of semantic proximity to correctness. This creates optimization pressure to first
      escape the zero-reward basin by producing executable code, then optimize for semantic correctness.
      The result: RL failures occur deeper in execution (code runs 326x further before failing)
      and concentrate in assertion errors. DPO, without execution feedback, optimizes surface
      plausibility, producing failures concentrated in syntax errors (99.8% in one category).

  why_others_missed_it:
    common_assumptions: "Researchers assumed alignment method differences were purely about pass rate magnitude, not failure mode geometry"
    our_different_view: "We treated alignment objectives as inductive biases that shape WHERE in the execution space models fail, not just HOW OFTEN"
    enabling_factor: "The h-e1 finding that RL and DPO gradients are anti-correlated across all 48 layers suggested fundamentally different optimization targets—we tested whether this manifests behaviorally"

  what_makes_it_work:
    intuitive_explanation: "Think of RL as 'no credit for almost working'—models learn to pass the compiler gate first. DPO is 'sound like a good programmer'—models learn to write readable code that may not execute."
    key_mechanism: "Zero-reward basin topology vs preference surface optimization"

# ═══════════════════════════════════════════════════════════════════════════
# SECTION 4: EVIDENCE STORY
# ═══════════════════════════════════════════════════════════════════════════

evidence_narrative:
  main_claim:
    statement: "Alignment method choice creates predictable, measurable differences in error type distributions among failures"
    measurable_criteria: "Chi-square test significance (p < 0.05), Cramér's V effect size (> 0.05), directional prediction confirmation"

  supporting_evidence:
    - id: "evidence_1"
      hypothesis: "H-E1"
      what: "Error distributions differ significantly between RL and DPO (chi-square = 35.27, p = 2.19e-08)"
      so_what: "This establishes the existence of alignment-induced error divergence—not a null result"
      how_it_supports_claim: "Foundation: before examining mechanisms, we confirm the phenomenon exists"
      key_statistics:
        chi_square: 35.27
        p_value: 2.19e-08
        cramers_v: 0.2147

    - id: "evidence_2"
      hypothesis: "H-M1"
      what: "RL shows 2.12% assertion errors vs 0% for DPO (Fisher's exact p = 0.0027)"
      so_what: "The zero-reward basin theory predicts RL pushes failures toward assertion errors—confirmed"
      how_it_supports_claim: "Mechanism: RL's binary reward creates the predicted concentration pattern"
      key_statistics:
        rl_assertion_rate: 2.12%
        dpo_assertion_rate: 0.00%
        fishers_p: 0.0027

    - id: "evidence_3"
      hypothesis: "H-M2"
      what: "RL failures execute 326x deeper before failing (mean depth 29.4% vs 0.09%)"
      so_what: "This quantifies the 'syntactic validity pressure'—RL code gets further before breaking"
      how_it_supports_claim: "Mechanism: confirms RL models first achieve execution, then fail semantically"
      key_statistics:
        depth_ratio: 326
        rl_mean_depth: 0.2941
        dpo_mean_depth: 0.0009
        cohens_d: 1.691

    - id: "evidence_4"
      hypothesis: "H-M3"
      what: "Effect amplifies at fine-grained taxonomy (Cramér's V: 0.21 → 0.82)"
      so_what: "This is a discovery: we expected persistence, observed amplification"
      how_it_supports_claim: "Robustness: the effect is not a coarse-grained artifact—it strengthens with detail"
      key_statistics:
        coarse_v: 0.2097
        fine_v: 0.8234
        amplification_factor: 4

  surprising_findings:
    - finding: "Effect amplification at fine-grained taxonomy (4x increase in Cramér's V)"
      why_surprising: "Expected effect to persist or slightly dilute at finer granularity due to noise"
      our_interpretation: "DPO's extreme concentration (99.8% in syntax_error) vs RL's distributed pattern creates larger V at fine-grained level"
      implication: "The alignment signature is more pronounced, not less, when examined in detail"

# ═══════════════════════════════════════════════════════════════════════════
# SECTION 5: LIMITATIONS & HONEST ACKNOWLEDGMENTS
# ═══════════════════════════════════════════════════════════════════════════

limitations:
  must_acknowledge:
    - limitation: "Model confounds: CodeRL (770M, encoder-decoder) vs CodeLlama (7B, decoder-only) differ in architecture and scale"
      severity: "High"
      mitigation: "Stage 2 controlled training from same base planned; current results are conservative test"
      what_we_cannot_claim: "Cannot claim alignment method is sole cause—architecture/scale may contribute"

    - limitation: "DPO model not code-specialized: CodeLlama-Instruct is general instruction-tuned, not dedicated code-DPO"
      severity: "Medium"
      mitigation: "This is a conservative test—dedicated code-DPO might show weaker effect"
      what_we_cannot_claim: "Cannot claim all DPO implementations produce these patterns"

    - limitation: "Single language: Python-only benchmarks (HumanEval+, MBPP+)"
      severity: "Medium"
      mitigation: "Python is dominant in code generation research; multi-language extension is future work"
      what_we_cannot_claim: "Cannot generalize to other programming languages"

  threats_to_validity:
    - type: "Internal"
      threat: "Model architecture confounds"
      mitigation: "Acknowledged; Stage 2 controlled training planned"
    - type: "External"
      threat: "Single benchmark family"
      mitigation: "Used two benchmarks (HumanEval+, MBPP+)"
    - type: "Construct"
      threat: "Error classification accuracy"
      mitigation: "Used established ICSE 2025 + LlmFix taxonomies"

