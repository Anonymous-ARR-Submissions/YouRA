        prior_work: "'Is DPO Superior to PPO?' (2024)"
        gap: "Compared aggregate performance; we compare conditional error distributions"
      - category: "Error taxonomy"
        prior_work: "ICSE 2025 (Wang et al.), LlmFix (arXiv 2409)"
        gap: "Categorized errors without stratifying by alignment method"
      - category: "RL for code"
        prior_work: "CodeRL (NeurIPS 2022), StepCoder (2024)"
        gap: "Focused on pass rate improvement, not failure mode analysis"
    word_target: "~600-800"

  methodology:
    narrative_purpose: "Show WHY this design solves the problem"
    connection_to_insight: "Zero-reward basin theory predicts specific behavioral outcomes—we design experiments to test each prediction"
    structure:
      - subsection: "Experimental Design Overview"
        content: "Hierarchical verification: Existence (H-E1) → Mechanism (H-M1, H-M2, H-M3)"
      - subsection: "Models and Datasets"
        content: "CodeRL-770M (RL) vs CodeLlama-7B-Instruct (DPO); HumanEval+, MBPP+"
      - subsection: "Error Classification"
        content: "ICSE 2025 taxonomy (3-tier: syntax, runtime, assertion) + LlmFix (19-cause)"
      - subsection: "Statistical Framework"
        content: "Chi-square for distribution comparison, Fisher's exact for mechanism, t-test for depth, Cramér's V for effect size"
    key_design_decisions:
      - decision: "Use existing models rather than controlled training"
        rationale: "Conservative test—if effect exists with confounds, it is real"
      - decision: "Hierarchical hypothesis structure"
        rationale: "Existence must precede mechanism analysis; dependencies ensure logical validity"
    word_target: "~1000-1200"

  experiments:
    narrative_purpose: "Design tests that verify our specific claims"
    experimental_questions:
      - question: "Do error distributions differ? (H-E1)"
        method: "Chi-square test on 2×3 contingency table"
      - question: "Does RL concentrate in assertion errors? (H-M1)"
        method: "Fisher's exact test on assertion/non-assertion"
      - question: "Does RL execute deeper before failure? (H-M2)"
        method: "Welch's t-test on execution depth with sys.settrace()"
      - question: "Does effect persist at fine-grained taxonomy? (H-M3)"
        method: "Cramér's V at coarse (3) vs fine (19) granularity"
    structure:
      - subsection: "Experimental Questions"
      - subsection: "Datasets and Benchmarks"
      - subsection: "Model Selection"
      - subsection: "Evaluation Metrics"
    word_target: "~800-1000"

  results:
    narrative_purpose: "Present evidence supporting claims—tell the story with data"
    main_result_highlight: "All four sub-hypotheses pass: existence confirmed (p < 0.001), mechanisms verified, effect amplifies at fine-grained level"
    structure:
      - subsection: "H-E1: Error Distribution Divergence"
        lead_with: "Chi-square = 35.27 (p = 2.19e-08); Cramér's V = 0.21"
        figure: "fig_1 or fig_2"
