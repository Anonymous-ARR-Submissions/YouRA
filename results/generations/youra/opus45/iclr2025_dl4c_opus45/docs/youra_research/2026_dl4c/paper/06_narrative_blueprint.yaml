    key_message: "Alignment method shapes failure geometry: RL produces deeper execution failures, DPO produces early syntax failures"
    must_include:
      - "The counterintuitive hook (failures reveal training)"
      - "Key statistics (326x depth difference, V=0.82 amplification)"
      - "Novel framing (alignment as failure-mode engineering)"
    word_target: "~150"

  introduction:
