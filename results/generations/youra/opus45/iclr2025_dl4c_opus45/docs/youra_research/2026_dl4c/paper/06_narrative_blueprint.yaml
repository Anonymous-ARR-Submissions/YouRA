    hook_strategy: "counterintuitive_finding"
    structure:
      - subsection: "Opening hook"
        content: "Failure nature reveals training—RL and DPO fail differently"
      - subsection: "Problem framing"
        content: "Surface (models fail) → Deeper (alignment affects failure modes) → Gap (no systematic study)"
      - subsection: "Key insight preview"
