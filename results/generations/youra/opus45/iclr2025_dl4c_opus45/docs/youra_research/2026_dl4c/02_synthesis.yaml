hypothesis_draft:
  title: "Alignment-Induced Error Type Divergence in Code Generation"
  hypothesis_id: "H-ErrorTypeDivergence-v1"
  core_claim: |
    Execution-based RL and preference-based DPO alignment methods induce systematically
    different error type distributions among failed code generations. RL concentrates
    failures in semantic assertion errors (code executes but wrong output) while DPO
    concentrates failures in execution errors (syntax or runtime).
  mechanism: |
    RL's binary execution reward creates a flat zero-reward basin over all non-executable
    programs, creating optimization pressure toward syntactic validity first. DPO's
    preference signal from human rankings can implicitly favor "almost correct but crashes"
    over "completely wrong but runs," emphasizing surface plausibility without explicit
    execution feedback.
  predictions:
    - P1: "P(syntax+runtime | failure, RL) < P(syntax+runtime | failure, DPO) with Cramér's V > 0.05"
    - P2: "RL failures have higher execution depth (more code executes before failure)"
    - P3: "Effect persists at finer taxonomy granularities (V > 0.03 at LlmFix 19-cause level)"

variables_summary:
  independent: "Alignment method (RL_execution vs DPO_preference)"
  dependent_primary: "Error type distribution P(error_type | failure)"
  controlled: "Base model, benchmark, sampling parameters, error taxonomy"

null_hypothesis:
  h0_statement: |
    There is no significant difference in conditional error type distribution
    P(error_type | failure) between RL-aligned and DPO-aligned models.
  statistical_test: "Chi-square test on error type contingency table"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First study to examine alignment effect on error TYPE distribution rather than pass rate"
  differentiation_summary: |
    Prior work compared aggregate performance (pass@k) between alignment methods. We propose
    analyzing the COMPOSITION of failures - what types of errors each method produces when
    it fails. This reframes alignment from "which is better" to "which failure modes do you
    accept," transforming alignment into a failure-mode engineering tool.

clarity:
  overall_level: "HIGH"
  clarity_verified: true
  improvements_needed: []

experimental_scope:
  models:
