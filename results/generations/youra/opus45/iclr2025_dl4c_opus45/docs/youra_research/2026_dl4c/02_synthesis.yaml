measurement_plan:
  data_collection:
    - source: "EvalPlus evaluation framework"
      method: "Execute n=10 samples per problem at temperature=0.8"
      output: "Full error traces with error messages and execution logs"
  procedure:
    - step: "1. Generate 10 samples per problem using each aligned model"
    - step: "2. Execute all samples using EvalPlus harness"
    - step: "3. Classify failures using ICSE 2025 taxonomy via error message parsing"
    - step: "4. Compute conditional error type proportions P(type | failure, method)"
    - step: "5. Compute execution depth for each failure (lines executed / total)"
    - step: "6. Run chi-square test and t-tests with multiple comparison correction"
  success_criteria:
    - "Chi-square p < 0.05 for error type × alignment method contingency table"
    - "Cramér's V > 0.05 for error type association"
    - "t-test p < 0.05 for execution depth difference"
    - "Effects persist at finer taxonomy granularity (V > 0.03)"

validation:
