key_assumptions:
  - id: "A1"
    assumption: "RL training with execution reward does NOT pre-filter candidates by error type"
    supporting_evidence: "CodeRL training procedure uses all generated candidates regardless of error type"
    consequence_if_violated: "Error type distribution may reflect data curation rather than optimization dynamics"
  - id: "A2"
    assumption: "DPO preference pairs are NOT constructed with execution-based filtering"
    supporting_evidence: "Need to verify dataset construction for specific DPO-aligned models used"
    consequence_if_violated: "DPO may have implicit execution feedback, reducing expected divergence"
  - id: "A3"
    assumption: "Error taxonomy (ICSE 2025) can be reliably automated via error message parsing"
    supporting_evidence: "Error categories (syntax, runtime, assertion) produce distinct error messages"
    consequence_if_violated: "Manual annotation would be required, violating feasibility constraints"
  - id: "A4"
    assumption: "Alignment objective effects are detectable above pipeline artifact noise"
    supporting_evidence: "Staged experimental design: Stage 1 tests existence; Stage 2 isolates causality"
    consequence_if_violated: "Stage 2 controlled training would be essential; Stage 1 alone insufficient"
  - id: "A5"
    assumption: "Effect persists across taxonomy granularities (coarse to fine-grained)"
    supporting_evidence: "Real mechanistic effects should manifest at multiple levels, not just 3-bin"
    consequence_if_violated: "Effect is taxonomically shallow and not a genuine inductive bias"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Code generation tasks on standard benchmarks (HumanEval+, MBPP+)
    - Models in the 770M-7B parameter range (CodeT5, CodeLlama families)
    - Alignment methods with clear objective distinction (execution RL vs preference DPO)
    - Evaluation with execution-based error categorization
  does_not_apply_to: |
    - Natural language generation tasks (no execution feedback available)
    - Models > 13B parameters (may have different optimization dynamics)
    - Sequential training effects (RL→DPO vs DPO→RL) - deferred to future work
    - Correlation structure analysis across problem features - deferred to future work
    - Attractor/loss landscape analysis - deferred to future work
  known_limitations: |
    - Stage 1 uses existing models with unknown pipeline differences
    - Existing models may have hybrid training procedures
    - Effect size may be small if DPO datasets already incorporate execution filtering
    - Sample size ~325 failures per model per benchmark may limit power for fine-grained taxonomy

