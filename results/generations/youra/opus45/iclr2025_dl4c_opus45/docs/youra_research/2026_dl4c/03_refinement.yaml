# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 3
  steps:
    - step: 1
      description: "RL binary execution reward collapses all non-executable programs (syntax errors, runtime crashes) into a flat zero-reward basin"
      evidence: "Reward topology analysis - PPO with execution feedback treats all execution failures equally regardless of semantic proximity"
      falsifier: "If RL-aligned models show equal or higher proportion of syntax/runtime errors among failures"
    - step: 2
      description: "This creates optimization pressure toward syntactic validity and execution robustness first, pushing remaining failures into semantic assertion errors (code runs but produces wrong output)"
      evidence: "Mechanism derived from reward structure - models learn to avoid crashes before learning correct semantics"
      falsifier: "If RL failures do not have higher test coverage (more assertions reached before failure)"
    - step: 3
      description: "DPO optimizes pairwise preference logits without explicit execution feedback, creating pressure toward human-readable, stylistically preferred code that may contain execution bugs humans wouldn't write"
      evidence: "DPO's preference signal comes from human rankings which can prefer 'almost correct but crashes' over 'completely wrong but runs'"
      falsifier: "If DPO failures are not closer in execution trace similarity to correct solutions"
  key_tension: "Modern DPO pipelines may pre-filter candidates by execution success, potentially neutralizing the expected divergence"
  evidence_summary: |
    The mechanism is supported by reward topology analysis: RL's binary signal creates equal
    negative pressure on all execution failures, while DPO's preference signal can implicitly
    favor semantically similar but non-executing code. The h-e1 finding that RL and DPO
    gradients are anti-correlated suggests they optimize fundamentally different objectives,
    which should manifest as different failure mode distributions.

