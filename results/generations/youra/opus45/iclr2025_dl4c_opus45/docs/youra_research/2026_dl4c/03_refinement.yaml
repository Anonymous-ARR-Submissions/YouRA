# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-ErrorTypeDivergence-v1"
  confidence_level: 0.80
  core_hypothesis_statement: |
    Under code generation on standard benchmarks (HumanEval+, MBPP+), if a model is aligned with
    execution-based RL (binary pass/fail reward) vs preference-based DPO (pairwise preference logits),
    then the conditional error type distribution P(error_type | failure) will differ systematically,
    because RL's reward topology creates optimization pressure toward syntactic validity and execution
    robustness (concentrating failures in semantic assertion errors), while DPO's preference signal
    emphasizes surface plausibility without explicit execution feedback (concentrating failures in
    execution errors like syntax and runtime failures).
  alternative_hypothesis_h0: |
    There is no significant difference in conditional error type distribution P(error_type | failure)
    between RL-aligned and DPO-aligned code generation models. The alignment method does not
    systematically affect the composition of failure types.

