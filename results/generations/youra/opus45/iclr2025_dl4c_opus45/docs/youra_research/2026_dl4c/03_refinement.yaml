# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "alignment_method"
      type: "categorical"
      operationalization: "Training objective used for model alignment"
      levels:
        - "RL_execution: Binary execution reward (pass=1, fail=0)"
        - "DPO_preference: Pairwise preference optimization from human rankings"
  dependent:
    - name: "error_type_distribution"
      type: "categorical_proportion"
      operationalization: "P(syntax+runtime | failure) vs P(assertion | failure), measured via ICSE 2025 taxonomy"
      primary: true
