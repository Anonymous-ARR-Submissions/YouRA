        section: "### Analyzer"
      - file: 03_logic.md
        section: "## A-4: Error Classification & Statistics"
      - file: 03_config.md
        section: "## Thresholds"
    acceptance_criteria:
      - classify_error() correctly categorizes errors
      - Chi-square test returns p-value and Cramér's V
      - gate_pass computed based on thresholds (p<0.05, V>0.05)

  - id: A-5
    title: "Visualization & Gate Check"
    description: |
      Generate all 4 figures, save metrics JSON, print pass/fail gate summary.
      - figures/gate_metrics.png: Target vs actual metrics bar chart
      - figures/error_distribution.png: P(type|failure) grouped bar chart
      - figures/contingency_heatmap.png: 2x3 heatmap
      - figures/sample_sizes.png: Failure counts per model
      - outputs/metrics.json: Full results with gate_pass boolean
    type: epic
    priority: 89
    status: todo
    complexity: 7
    complexity_breakdown: "2+1+2+2"
    target_files:
