  # ============================================
  # EPIC IMPLEMENTATION TASKS (Priority 93-50)
  # ============================================

  - id: A-1
    title: "Environment & Data Setup"
    description: |
      Install evalplus/transformers, load HumanEval+ and MBPP+ (542 problems), verify dataset format.
      - Load 164 HumanEval+ problems via get_human_eval_plus()
      - Load 378 MBPP+ problems via get_mbpp_plus()
      - Combine into unified dataset with 542 problems
      - Verify each problem has: task_id, prompt, test, entry_point
    type: epic
    priority: 93
    status: todo
    complexity: 6
    complexity_breakdown: "2+1+1+2"
    target_files:
      - code/config.py
      - code/data_loader.py
    reference_files:
