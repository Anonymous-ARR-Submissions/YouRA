        section: "### Visualizer"
      - file: 03_logic.md
        section: "## A-5: Visualization & Gate Check"
    acceptance_criteria:
      - All 4 figures generated in figures/ directory
      - metrics.json contains gate_pass boolean
      - Console output shows PASS/FAIL summary

