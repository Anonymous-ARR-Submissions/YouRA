        section: "### DataLoader"
      - file: 03_logic.md
        section: "## A-1: Environment & Data Setup"
      - file: 03_config.md
        section: "## ExperimentConfig"
    acceptance_criteria:
      - load_combined_dataset() returns 542 problems
      - Each problem has required fields
      - Config dataclass with correct defaults

  - id: A-2
    title: "Model Loading & Generation"
    description: |
      Load CodeRL-770M (T5) and CodeLlama-7B, generate 10 samples per problem per model (10,840 total), save JSONL.
      - Load Salesforce/codet5-large-ntp-py (T5ForConditionalGeneration, 770M params)
      - Load codellama/CodeLlama-7b-Instruct-hf (AutoModelForCausalLM, 7B params)
      - Generate with T=0.8, top_p=0.95, max_tokens=512, n=10
      - Save to outputs/samples_rl.jsonl and outputs/samples_dpo.jsonl
    type: epic
    priority: 92
    status: todo
    complexity: 14
    complexity_breakdown: "3+3+4+4"
    target_files:
      - code/generate.py
    reference_files:
      - file: 03_architecture.md
        section: "### Generator"
      - file: 03_logic.md
        section: "## A-2: Model Loading & Generation"
      - file: 03_config.md
        section: "## ExperimentConfig"
    acceptance_criteria:
      - Both models load successfully
      - 5,420 samples generated per model
      - JSONL files contain {task_id, model, sample_idx, completion}
    subtasks:
      - id: L-2-1
        title: "Load RL Model"
        description: "T5ForConditionalGeneration from HF, set eval(), cuda"
      - id: L-2-2
        title: "Load DPO Model"
        description: "AutoModelForCausalLM, handle 8-bit quantization fallback"
      - id: L-2-3
        title: "Generate and Save"
        description: "Loop over problems, generate n_samples, save JSONL"

  - id: A-3
    title: "Execution & Error Capture"
    description: |
      Run EvalPlus sandbox on all samples, capture error traces, handle timeouts, save execution results.
      - Execute each generated sample against test cases
      - Capture full error traces (exception type + message + traceback)
      - Handle timeouts (5 second default)
      - Save to outputs/execution_results.json
    type: epic
    priority: 91
    status: todo
    complexity: 12
    complexity_breakdown: "3+2+4+3"
    target_files:
      - code/execute.py
    reference_files:
      - file: 03_architecture.md
        section: "### Executor"
      - file: 03_logic.md
        section: "## A-3: Execution & Error Capture"
    acceptance_criteria:
      - All 10,840 samples executed
      - Error traces captured for failed samples
      - Results saved with status (pass/fail) and error_trace

  - id: A-4
    title: "Error Classification & Statistics"
    description: |
      Implement ICSE 2025 taxonomy classifier, build 2x3 contingency table, chi-square + Cramér's V, direction check.
      - Classify errors: syntax, runtime, assertion, other
      - Build contingency table (2 models x 3 error types)
      - Run chi-square test via scipy.stats.chi2_contingency
      - Compute Cramér's V effect size
      - Check effect direction: RL_prop < DPO_prop for syntax+runtime
    type: epic
    priority: 90
    status: todo
    complexity: 10
    complexity_breakdown: "3+2+3+2"
    target_files:
      - code/analyze.py
    reference_files:
