hypothesis_draft:
  title: "RLHF-Induced Discriminative Degradation of Confidence Signals in LLMs"
  hypothesis_id: "H-CalibrationGeometry-v1"
  core_claim: |
    RLHF instruction tuning systematically degrades the discriminative quality of LLM
    confidence signals, measurable as reduced AUROC for logit-margin-based correctness
    prediction and weakened margin-accuracy monotonicity under percentile normalization.
    This effect is consistent across model families and reveals a fundamental tradeoff
    between behavioral alignment and epistemic calibration.
  mechanism: |
    The Bradley-Terry preference model underlying RLHF rewards decisive, confident-sounding
    responses, creating selection pressure that inflates logit margins uniformly - including
    for incorrect predictions. This decouples the confidence-correctness relationship that
    exists in base models. The margin inflation is geometric (affects the shape of the
    probability landscape) rather than merely scalar (temperature-like rescaling), evidenced
    by AUROC degradation and percentile-normalized slope attenuation.
  predictions:
    - P1: "AUROC_instruct < AUROC_base with non-overlapping 95% CIs across 3 families; I² < 50%"
    - P2: "β_percentile_instruct < β_percentile_base survives 2×2 prompt controls (p < 0.05)"
    - P3: "E[margin | incorrect]_instruct > E[margin | incorrect]_base (permutation p < 0.05)"
    - P4: "Domain coefficients in T_opt regression remain significant after lexical controls"
    - P5: "Domain-conditioned scaling achieves Pareto improvement in risk-coverage curves"

variables_summary:
  independent: "Model type (base vs. instruct), Model family (Qwen/Llama/Mistral), Prompt format (zero/few-shot), Domain (MMLU categories)"
  dependent_primary: "AUROC(margin → correctness)"
  controlled: "Difficulty (base model accuracy bin), Entropy, Lexical features, Decoding temperature (T=0)"

null_hypothesis:
  h0_statement: |
    RLHF instruction tuning does not degrade discriminative confidence quality;
    AUROC(margin → correctness) is unchanged between base and instruct models,
    and any ECE differences are attributable to scalar rescaling (equivalent to
    temperature shift) rather than geometric distortion of the confidence-accuracy
    relationship.
  statistical_test: "Bootstrap confidence intervals for AUROC difference; random-effects meta-analysis"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First systematic test of discriminative degradation (AUROC-based) under RLHF with percentile-normalized geometry analysis"
  differentiation_summary: |
    Prior calibration work (Guo 2017, Tian 2023, DACA 2025) focuses on ECE metrics and
    post-hoc correction methods. This hypothesis tests whether RLHF fundamentally
    corrupts the discriminative information content of confidence signals - a geometric
    claim that goes beyond calibration metrics to probe the probability landscape itself.
    The cross-family generalization test and mechanistic margin analysis are novel.

