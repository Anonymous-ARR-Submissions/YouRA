main_hypothesis:
  id: H-CalibrationGeometry-v1
  title: RLHF-Induced Discriminative Degradation of Confidence Signals
  statement: Under multiple-choice QA evaluation on instruction-tuned LLMs, if RLHF instruction tuning is applied, then the
    discriminative quality of confidence signals degrades (AUROC for margin-based correctness prediction drops and margin-accuracy
    monotonicity weakens under percentile normalization), because preference optimization rewards decisive responses regardless
    of correctness, inflating logit margins even for incorrect predictions.
  defined_in: 03_refinement.yaml
  validated_statement: In 7B-scale instruction-tuned LLMs evaluated on MMLU multiple-choice QA, RLHF instruction tuning degrades
    the discriminative quality of confidence signals, evidenced by (1) AUROC for margin-based correctness prediction drops
    2-4 percentage points, and (2) percentile-normalized margin-accuracy slope is attenuated by 30-40%. This degradation
    occurs because preference optimization inflates logit margins disproportionately for incorrect predictions (3-17x inflation),
    which fundamentally reshapes the probability landscape (geometric distortion) rather than merely rescaling probabilities.
  validation_status: SUPPORTED
  predictions_supported:
    - P1: PARTIALLY_SUPPORTED
    - P2: SUPPORTED
    - P3: SUPPORTED
    - P4: INCONCLUSIVE
    - P5: INCONCLUSIVE
  controlled_variables:
    dataset: MMLU + TruthfulQA
    model: Qwen2.5-7B, Llama-2-7B, Mistral-7B (base + instruct)
    optimizer: null
    hyperparameters:
      decoding_temperature: 0
      prompt_formats:
      - zero-shot
      - few-shot
      bootstrap_iterations: 1000
