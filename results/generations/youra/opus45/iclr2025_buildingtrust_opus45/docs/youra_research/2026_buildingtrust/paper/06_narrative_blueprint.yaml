# ═══════════════════════════════════════════════════════════════════════════════
# PART 1: HOOK & MOTIVATION
# ═══════════════════════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: |
      Models that achieve state-of-the-art accuracy on benchmarks can produce confidence
      scores that are fundamentally unreliable—not because they are poorly calibrated,
      but because RLHF instruction tuning corrupts the discriminative relationship between
      confidence and correctness. We show that this corruption is geometric, not merely scalar.
    strategy: "counterintuitive_finding"
    # Key insight: The problem isn't calibration (ECE) but discrimination (AUROC).
    # Temperature scaling can fix scalar shifts but not geometric distortions.

  why_reader_should_care:
    main_reason: |
      Reliable confidence signals are essential for safe AI deployment—selective prediction,
      human-AI collaboration, and uncertainty-aware decision making all depend on confidence
      signals that actually reflect probability of correctness.
    concrete_example: |
      A medical diagnosis system using an RLHF-tuned LLM might express high confidence
      in incorrect diagnoses at rates 3-17x higher than its base model counterpart,
      making standard confidence-based decision rules unreliable.
    stakes: |
      If practitioners assume temperature scaling can repair RLHF-induced miscalibration,
      they may deploy systems with fundamentally broken confidence signals—confident
      not because they're correct, but because RLHF rewards decisiveness.

  real_world_impact:
    application_domain: "High-stakes AI decision support (medical, legal, financial)"
    potential_beneficiaries: "ML practitioners deploying instruction-tuned LLMs; safety researchers"
    scale_of_impact: "Every major LLM deployment uses RLHF variants; billions of daily queries"

# ─────────────────────────────────────────────────────────────────────────────
# PROBLEM FRAMING
# ─────────────────────────────────────────────────────────────────────────────

problem_framing:
  surface_problem:
    description: "RLHF-tuned LLMs are overconfident compared to base models"
    common_understanding: |
      Prior work (Tian et al. 2023) established that RLHF induces overconfidence.
      The standard remedy is post-hoc temperature scaling (Guo et al. 2017),
      which can reduce Expected Calibration Error (ECE) by 15-55%.

  deeper_problem:
    description: |
      Overconfidence is a symptom, not the disease. The real problem is that RLHF
      degrades the *discriminative quality* of confidence signals—the ability to
      distinguish correct from incorrect predictions based on confidence.
    why_overlooked: |
      The calibration literature focuses on ECE (calibration error) rather than
      AUROC (discriminative ability). ECE can be improved by temperature scaling
      even when discrimination degrades, masking the underlying problem.
    our_perspective: |
      We measure discrimination via AUROC(margin → correctness) and show it degrades
      2-4 percentage points after RLHF. More critically, we show this degradation
      persists even under percentile normalization, proving it's geometric not scalar.

  gap_in_existing_work:
    description: |
      No systematic study of discriminative degradation (AUROC-based) under RLHF.
      Existing work on calibration uses ECE metrics that can be repaired by
      temperature scaling, but AUROC degradation cannot be fixed post-hoc.
    why_gap_exists: |
      Calibration metrics (ECE) are more intuitive than discrimination metrics (AUROC).
      Temperature scaling is a known fix for miscalibration, so the community
      assumed it would also repair RLHF-induced overconfidence.
    why_gap_matters: |
      Temperature scaling cannot repair geometric distortion. Practitioners who
      apply temperature scaling to RLHF models may have well-calibrated but
      non-discriminative confidence signals—a dangerous false sense of reliability.

# ═══════════════════════════════════════════════════════════════════════════════
# PART 2: THE INSIGHT
# ═══════════════════════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: |
      RLHF preference optimization inflates logit margins disproportionately for
      incorrect predictions, creating geometric distortion that degrades discrimination
      even when calibration metrics look acceptable.
    expanded_explanation: |
      The Bradley-Terry preference model underlying RLHF rewards decisive responses
      regardless of correctness. This creates selection pressure that inflates margins
      uniformly—including for incorrect predictions. The result is that confidence
      scores become less informative about correctness: high confidence no longer
      reliably indicates high probability of being right.

  why_others_missed_it:
    common_assumptions: |
      Prior work assumed RLHF-induced overconfidence was a scalar shift (like
      temperature miscalibration) that could be repaired by temperature scaling.
    our_different_view: |
      We hypothesized that RLHF causes geometric distortion—it changes the shape
      of the confidence-correctness relationship, not just its scale.
    enabling_factor: |
      Using percentile-normalized monotonicity (β_percentile) as a metric that is
      scale-invariant allowed us to detect geometric effects that persist after
      removing scale differences.

  what_makes_it_work:
    intuitive_explanation: |
      Imagine a model's confidence scores as a ruler measuring likelihood of correctness.
      Temperature scaling changes how long the ruler is (scalar). RLHF bends the ruler
      (geometric)—and you can't straighten a bent ruler by making it longer or shorter.
    key_mechanism: |
      RLHF inflates E[margin|incorrect] by 3-17x across model families while
      E[margin|correct] sees smaller inflation. This differential inflation
      destroys the margin-correctness correlation that AUROC measures.
    analogy: |
      Like a broken speedometer that reads 60 mph whether you're going 20 or 80—
      recalibrating the needle position (temperature) can't fix the underlying
      mechanism that makes speed information unreliable.

# ═══════════════════════════════════════════════════════════════════════════════
# PART 3: EVIDENCE STORY
# ═══════════════════════════════════════════════════════════════════════════════

evidence_narrative:
  main_claim:
    statement: |
      RLHF instruction tuning induces geometric (not scalar) distortion of confidence
      signals, degrading discriminative quality (AUROC) by 2-4 percentage points
      across model families.
    measurable_criteria: |
      (1) AUROC(margin → correctness) drops significantly in instruct vs base models
      (2) β_percentile attenuates 30-40% showing geometric not scalar distortion
      (3) Brier refinement component degrades, confirming probability landscape reshaping

  supporting_evidence:
    - id: "evidence_1_existence"
      what: "AUROC degradation: Qwen +0.0222, Mistral +0.0385 (mean +0.0303)"
      so_what: "Proves discriminative degradation exists and is statistically significant"
      how_it_supports_claim: |
        H-E1 (MUST_WORK gate: PASS) establishes that the effect is real—not
        measurement noise or dataset-specific artifact. Cross-family consistency
        (both Qwen and Mistral) suggests RLHF is the cause, not vendor-specific training.

    - id: "evidence_2_mechanism"
      what: "Margin inflation for incorrect: Qwen 3.06x, Mistral 16.79x (mean 9.92x)"
      so_what: "Identifies the mechanism—RLHF inflates margins especially for errors"
      how_it_supports_claim: |
        H-M1 (MUST_WORK gate: PASS) explains WHY AUROC degrades: when incorrect
        predictions have inflated margins, the confidence-correctness boundary
        becomes blurred. Cohen's d = 1.01-1.85 shows this is a large effect.

    - id: "evidence_3_geometry"
      what: "β_percentile attenuation: Qwen Δ=0.76, Mistral Δ=0.63 (30-40% reduction)"
      so_what: "Proves distortion is geometric, not scalar"
      how_it_supports_claim: |
        H-M2 (MUST_WORK gate: PASS) is the key methodological contribution.
        Percentile normalization removes scale effects—if attenuation persists,
        the distortion must be in the shape of the probability landscape.

    - id: "evidence_4_brier"
      what: "Refinement degradation: Qwen Δ=+0.0216, Mistral Δ=+0.0487"
      so_what: "Murphy decomposition confirms geometric interpretation"
      how_it_supports_claim: |
        H-M3 (SHOULD_WORK gate: PASS) provides independent confirmation via
        Brier score decomposition. Refinement measures discrimination independent
        of calibration—its degradation proves the effect isn't just rescaling.

  surprising_findings:
    finding: |
      Mistral shows 16.79x margin inflation vs Qwen's 3.06x—a 5x difference in
      effect magnitude despite both showing the same qualitative pattern.
    why_surprising: |
      We expected similar effect sizes across families if RLHF is the cause.
      The magnitude difference suggests RLHF training procedures vary substantially
      across model providers.
    our_interpretation: |
      Mistral's more aggressive RLHF (larger effect) vs Qwen's more conservative
      tuning. This implies RLHF strength is a tunable knob for discrimination-
      capability tradeoffs that model providers make differently.

  what_results_mean:
    synthesis: |
      RLHF fundamentally reshapes the probability landscape of LLMs, not just
      the scale. This has critical implications: temperature scaling (scalar fix)
      cannot repair geometric distortion. New calibration approaches targeting
      discrimination preservation during RLHF training are needed.
    confidence_level: "HIGH for 7B-scale Qwen and Mistral; moderate for generalization"
    caveats: |
      Llama family not tested (HuggingFace gating). Scale generalization unknown.
      MMLU dataset specific—other benchmarks may show different magnitudes.

# ═══════════════════════════════════════════════════════════════════════════════
# PART 4: BROADER IMPACT
# ═══════════════════════════════════════════════════════════════════════════════

takeaway:
  main_contribution:
    one_sentence: |
      First systematic demonstration that RLHF induces geometric (not scalar)
      distortion of confidence signals, explaining why temperature scaling
      cannot fully repair RLHF-tuned model reliability.
    why_significant: |
      Changes how the community should think about RLHF-induced miscalibration:
      from "post-hoc fixable" to "training-time preventable."

  implications:
    for_field: |
      Opens new research direction: calibration-aware RLHF training that
      preserves discrimination while achieving preference alignment.
    for_practice: |
      Practitioners should not assume temperature scaling repairs RLHF models.
      When discrimination matters (selective prediction, uncertainty quantification),
      base models or discrimination-preserving training may be necessary.
    conceptual_contribution: |
      Introduces geometric vs scalar distortion framework for analyzing
      post-hoc calibration limitations.

  future_possibilities:
    immediate_extensions: |
      (1) Cross-scale study (1B, 13B, 70B), (2) Calibration-aware RLHF loss,
      (3) Domain-specific temperature as partial mitigation
    longer_term_vision: |
      RLHF that jointly optimizes helpfulness and confidence discrimination—
      not just "sound confident" but "be confident when right."
    open_questions: |
      (1) Can DPO avoid geometric distortion? (2) What RLHF reward shaping
      preserves discrimination? (3) Is distortion reversible via fine-tuning?

# ═══════════════════════════════════════════════════════════════════════════════
# PART 5: SECTION-LEVEL NARRATIVE GOALS
# ═══════════════════════════════════════════════════════════════════════════════

section_goals:
  abstract:
    narrative_purpose: "Compress the entire story into ~150 words"
    key_message: |
      RLHF causes geometric (not scalar) distortion of confidence signals—
      temperature scaling cannot repair it; new training approaches needed.
    structure_notes: |
      - S1-2: RLHF models appear reliable but confidence-correctness is broken
      - S3: We identify margin inflation mechanism
      - S4-5: 2-4pp AUROC degradation, 30-40% β attenuation, 3-17x inflation
      - S6: Temperature scaling insufficient; need calibration-aware RLHF
    avoid:
      - "Citations in abstract"
      - "Vague claims without numbers"
      - "Undefined acronyms"

  introduction:
    narrative_purpose: "Hook → Problem → Insight → Solution preview"
    hook_strategy: "counterintuitive_finding"
    problem_escalation: |
      1. Surface: RLHF causes overconfidence (Tian et al. 2023)
      2. Deeper: Overconfidence degrades discrimination, not just calibration
      3. Gap: No systematic study of geometric vs scalar distortion
    insight_preview: |
      "Building on the observation that RLHF rewards decisiveness regardless
      of correctness, we hypothesize that margin inflation occurs disproportionately
      for incorrect predictions, creating geometric distortion."
    contributions_framing: |
      Our contributions emerge naturally from this insight:
      (1) Novel AUROC-based discriminative degradation metric
      (2) Mechanism identification (margin inflation)
      (3) Geometric distortion characterization (β_percentile, Brier refinement)
      (4) Cross-family validation (Qwen, Mistral)
    transition_to_related_work: |
      "To situate our contribution, we review prior work on LLM calibration,
      RLHF training dynamics, and post-hoc calibration methods."

  related_work:
    narrative_purpose: "Show why existing work is insufficient → justify our approach"
    positioning_strategy: |
      Organize by limitation addressed: (1) ECE-focused work misses discrimination,
      (2) Temperature scaling assumes scalar distortion, (3) RLHF analysis ignores
      confidence consequences.
    key_comparison_points:
      - area: "LLM Calibration (Guo 2017, DACA 2025, CCPS 2025)"
        limitation_to_highlight: "Focus on ECE; don't measure AUROC discrimination"
        how_we_differ: "Use AUROC to measure discriminative quality directly"
      - area: "RLHF Analysis (Tian 2023, InstructGPT)"
        limitation_to_highlight: "Document overconfidence but don't characterize distortion type"
        how_we_differ: "Characterize as geometric vs scalar via percentile normalization"
      - area: "Post-hoc Calibration (Temperature Scaling)"
        limitation_to_highlight: "Assumes scalar miscalibration"
        how_we_differ: "Show geometric distortion persists after normalization"
    papers_to_discuss:
      - "Guo et al. 2017 (On Calibration of Modern Neural Networks)"
      - "Tian et al. 2023 (Just Ask for Calibration)"
      - "DACA 2025 (Disagreement-Aware Calibration)"
      - "CCPS 2025 (55% ECE reduction)"
      - "Murphy 1973 (Brier decomposition)"
    avoid:
      - "Just listing papers without critique"
      - "Being unfair to prior work"
      - "Missing obvious related work"

  methodology:
    narrative_purpose: "Explain WHY this design solves the problem"
    connection_to_insight: |
      If RLHF causes geometric distortion, we need metrics that:
      (1) Measure discrimination (AUROC), not just calibration (ECE)
      (2) Separate scale from shape (percentile normalization)
      (3) Decompose prediction quality (Brier Murphy)
    key_design_decisions:
      - decision: "Use logit margin as confidence proxy"
        rationale: "Standard in calibration literature; enables AUROC calculation"
        alternatives_considered: "Verbalized confidence—requires generation; softmax top-1—loses margin info"
      - decision: "Percentile-normalized logistic regression"
        rationale: "Removes scale differences to isolate geometric effects"
        alternatives_considered: "Raw slopes—confounded by scale; rank correlation—loses magnitude info"
      - decision: "Murphy (1973) Brier decomposition"
        rationale: "Refinement component measures discrimination independent of calibration"
        alternatives_considered: "ECE—conflates calibration and discrimination"
    intuition_building: |
      Figure showing margin distributions before/after RLHF with annotation
      explaining how inflation affects AUROC.
    technical_depth_balance: |
      Main text: intuition + key equations. Appendix: full statistical procedures,
      bootstrap methodology, Brier decomposition derivation.

  experiments:
    narrative_purpose: "Design experiments that test our specific claims"
    experimental_questions:
      - question: "Does discriminative degradation exist (H-E1)?"
        experiment: "AUROC comparison base vs instruct across families"
        expected_outcome: "AUROC_instruct < AUROC_base with non-overlapping CIs"
      - question: "Is margin inflation the mechanism (H-M1)?"
        experiment: "Conditional margin distributions"
        expected_outcome: "E[margin|incorrect]_instruct >> E[margin|incorrect]_base"
      - question: "Is distortion geometric or scalar (H-M2)?"
        experiment: "Percentile-normalized logistic regression"
        expected_outcome: "β_percentile attenuated even after normalization"
      - question: "Does Brier decomposition confirm (H-M3)?"
        experiment: "Murphy refinement comparison"
        expected_outcome: "Refinement degrades, not just reliability"
    baseline_rationale: |
      Base model counterparts (Qwen2.5-7B, Mistral-7B) as control—same architecture,
      different training objective allows isolating RLHF effect.
    dataset_rationale: |
      MMLU (14,042 samples): standard MCQ benchmark; 57 subjects; established in
      calibration literature (DACA, CCPS use MMLU).
    metric_rationale: |
      AUROC: discrimination metric. β_percentile: scale-invariant slope.
      Brier refinement: decomposed discrimination component.
    fairness_considerations: |
      Same inference settings (T=0 greedy). Same questions. Bootstrap CIs for
      statistical rigor. Effect sizes (Cohen's d) for practical significance.

  results:
    narrative_purpose: "Present evidence that supports our claims"
    main_result_highlight: |
      All four hypotheses PASS their gates. Mean AUROC degradation 3.03pp,
      mean margin inflation 9.92x, mean β attenuation 0.69, mean refinement Δ +0.035.
    result_presentation_order:
      - result: "H-E1 AUROC degradation"
        purpose: "Establish existence first—everything else builds on this"
      - result: "H-M1 Margin inflation"
        purpose: "Explain WHY—the mechanism underlying the effect"
      - result: "H-M2 β_percentile attenuation"
        purpose: "Characterize HOW—geometric not scalar"
      - result: "H-M3 Brier refinement"
        purpose: "Independent confirmation—triangulation of evidence"
    surprising_result_handling: |
      Discuss Mistral's 5x larger effect than Qwen. Present competing explanations
      (training procedure, base model quality). Acknowledge this as interesting
      variance, not threat to conclusions.
    avoid:
      - "Table 1 shows X, Table 2 shows Y (no interpretation)"
      - "Cherry-picking favorable results"
      - "Hiding negative results"

  discussion:
    narrative_purpose: "Interpret results, acknowledge limits, show significance"
    key_findings_interpretation: |
      RLHF induces geometric distortion because preference optimization rewards
      decisiveness regardless of correctness. Temperature scaling (scalar fix)
      cannot repair this. New approaches needed at training time.
    honest_limitations:
      - limitation: "Llama family not tested"
        why_acceptable: "HuggingFace gating; 2 families still show consistent effect"
        future_mitigation: "Future work with Llama access"
      - limitation: "7B scale only"
        why_acceptable: "GPU constraints; effect direction likely consistent, magnitude may vary"
        future_mitigation: "Scale study: 1B, 13B, 70B"
      - limitation: "MMLU dataset specific"
        why_acceptable: "Standard benchmark; domain structure provides internal validation"
        future_mitigation: "TruthfulQA, ARC, CommonsenseQA"
    broader_impact_statement: |
      This work reveals a limitation of current RLHF practices relevant to
      AI safety. We identify a failure mode but do not enable new harms.
      Our findings should improve awareness of confidence signal reliability.

  conclusion:
    narrative_purpose: "Reinforce key message + open future directions"
    callback_to_hook: |
      "We began by noting that benchmark accuracy alone doesn't guarantee reliable
      confidence signals. Our results show why: RLHF's geometric distortion means
      high confidence reflects training incentives, not correctness probability."
    memorable_ending: |
      "Temperature scaling cannot straighten a bent ruler. For applications where
      discrimination matters, we need RLHF that optimizes confidence quality
      alongside response helpfulness."
    future_work_vision: |
      "Beyond immediate extensions, we envision RLHF that jointly optimizes
      preference alignment and confidence discrimination—helpful responses
      that are confident when correct, uncertain when unsure."

