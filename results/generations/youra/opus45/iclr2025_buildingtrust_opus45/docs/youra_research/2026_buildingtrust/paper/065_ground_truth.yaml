# Ground Truth Values for Phase 6.5 Adversarial Review
# Extracted from validated Phase 4 results
# Paper: Geometric Distortion of Confidence Signals in RLHF-Tuned Language Models

metadata:
  hypothesis_id: "H-CalibrationGeometry-v1"
  paper_file: "06_paper.md"
  extraction_date: "2026-03-24"
  phase: "6"

# ============================================================
# EXPERIMENTAL SETUP GROUND TRUTH
# ============================================================
experimental_setup:
  models:
    qwen:
      base: "Qwen2.5-7B"
      instruct: "Qwen2.5-7B-Instruct"
      parameters: "7B"
    mistral:
      base: "Mistral-7B-v0.1"
      instruct: "Mistral-7B-Instruct-v0.2"
      parameters: "7B"

  dataset:
    name: "MMLU"
    test_samples: 14042
    subjects: 57

  inference:
    temperature: 0
    decoding: "greedy"

# ============================================================
# H-E1: DISCRIMINATIVE DEGRADATION (AUROC)
# ============================================================
h_e1_auroc:
  description: "AUROC for margin-based correctness prediction"
  gate_threshold: "Δ AUROC > 0.01"
  gate_result: "PASS"

  qwen:
    base_auroc: 0.8298
    instruct_auroc: 0.8076
    delta_auroc: 0.0222
    confidence_interval_95: [0.0074, 0.0370]

  mistral:
    base_auroc: 0.7797
    instruct_auroc: 0.7413
    delta_auroc: 0.0385
    confidence_interval_95: [0.0238, 0.0531]

  aggregate:
    mean_delta_auroc: 0.0303
    statistical_significance: true
    note: "Both CIs exclude zero"

# ============================================================
# H-M1: MARGIN INFLATION MECHANISM
# ============================================================
h_m1_margin_inflation:
  description: "Conditional margin statistics for incorrect predictions"
  gate_threshold: "Inflation ratio > 2x"
  gate_result: "PASS"

  qwen:
    expected_margin_incorrect_base: 0.960
    expected_margin_incorrect_instruct: 2.933
    inflation_ratio: 3.06
    cohens_d: 1.01
    p_value: "<0.001"

  mistral:
    expected_margin_incorrect_base: 0.468
    expected_margin_incorrect_instruct: 7.861
    inflation_ratio: 16.79
    cohens_d: 1.85
    p_value: "<0.001"

  aggregate:
    mean_inflation_ratio: 9.92
    interpretation: "Margins inflate disproportionately for incorrect predictions"

# ============================================================
# H-M2: PERCENTILE-NORMALIZED MONOTONICITY (β ATTENUATION)
# ============================================================
h_m2_beta_attenuation:
  description: "Logistic regression slope after percentile normalization"
  gate_threshold: "Δβ > 0.3"
  gate_result: "PASS"

  qwen:
    beta_base: 2.222
    beta_instruct: 1.466
    delta_beta: 0.756
    effect_size: 15.3
    attenuation_percent: 34.0

  mistral:
    beta_base: 1.558
    beta_instruct: 0.931
    delta_beta: 0.627
    effect_size: 17.0
    attenuation_percent: 40.2

  aggregate:
    mean_delta_beta: 0.69
    mean_attenuation_percent: 37.1
    interpretation: "Slope attenuation persists after percentile normalization, proving geometric distortion"

# ============================================================
# H-M3: BRIER SCORE DECOMPOSITION (REFINEMENT)
# ============================================================
h_m3_brier_refinement:
  description: "Murphy's Brier decomposition - refinement component"
  gate_threshold: "Δ Refinement > 0.01"
  gate_result: "PASS"

  qwen:
    base_refinement: 0.0559
    instruct_refinement: 0.0343
    delta_refinement: 0.0216

  mistral:
    base_refinement: 0.0580
    instruct_refinement: 0.0093
    delta_refinement: 0.0487

  aggregate:
    mean_delta_refinement: 0.035
    interpretation: "Refinement (discrimination) degrades significantly, confirming geometric interpretation"

# ============================================================
# SUMMARY TABLE (All Experiments)
# ============================================================
summary:
  total_hypotheses: 4
  passed: 4
  failed: 0

  results:
    - rq: "RQ1"
      metric: "Δ AUROC"
      value: "+0.0303 mean"
      gate: "PASS"

    - rq: "RQ2"
      metric: "Inflation Ratio"
      value: "9.92x mean"
      gate: "PASS"

    - rq: "RQ3"
      metric: "Δβ"
      value: "0.69 mean"
      gate: "PASS"

    - rq: "RQ4"
      metric: "Δ Refinement"
      value: "+0.035 mean"
      gate: "PASS"

# ============================================================
# KEY CLAIMS FOR ADVERSARIAL REVIEW
# ============================================================
claims:
  primary_claim: "RLHF instruction tuning causes geometric distortion of confidence signals"

  supporting_evidence:
    - claim: "AUROC drops 2-4 percentage points"
      evidence: "Table 1: Qwen +0.0222, Mistral +0.0385"

    - claim: "Margin inflation 3-17x for errors"
      evidence: "Table 2: Qwen 3.06x, Mistral 16.79x"

    - claim: "β attenuation 30-40% after normalization"
      evidence: "Table 3: Qwen 34%, Mistral 40.2%"

    - claim: "Refinement component degrades"
      evidence: "Table 4: Qwen +0.0216, Mistral +0.0487"

  implication: "Temperature scaling is necessary but insufficient for RLHF models"

# ============================================================
# LIMITATIONS ACKNOWLEDGED
# ============================================================
limitations:
  - id: "L1"
    description: "Llama family not tested (HuggingFace gating)"

  - id: "L2"
    description: "7B scale only (effect magnitude may vary with scale)"

  - id: "L3"
    description: "MMLU specific (generalization to other benchmarks untested)"
