established_facts:
  claims:
    - claim: "Temperature scaling effectively reduces ECE in neural networks"
      status: "BUILD_ON"
      evidence: "Guo et al. 2017 (7,452 citations) - foundational work on post-hoc calibration"
    - claim: "RLHF induces overconfidence in LLMs"
      status: "BUILD_ON"
      evidence: "Tian et al. 2023 (598 citations) - verbalized confidence outperforms token probs for RLHF models"
    - claim: "Post-hoc calibration methods achieve 15-55% ECE reduction on LLMs"
      status: "BUILD_ON"
      evidence: "DACA 2025 (15%), CCPS 2025 (55%) on MMLU"
    - claim: "RLHF degrades discriminative quality of confidence (AUROC drops)"
      status: "PROVE_NEW"
      evidence: "Novel claim - requires cross-family experimental validation"
    - claim: "Miscalibration exhibits domain structure revealing representational anisotropy"
      status: "PROVE_NEW"
      evidence: "Novel claim - requires multivariate regression with lexical controls"
  scope_reduction_percentage: 50
  phase2b_4_instructions: |
    BUILD_ON claims provide theoretical grounding and baseline methods.
    PROVE_NEW claims require experimental validation through hypothesis hierarchy.
    Focus verification efforts on H-E, H-M1, H-M2 (core discriminative degradation claims).

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-CalibrationGeometry-v1"
  confidence_level: 0.75
  core_hypothesis_statement: |
    Under multiple-choice QA evaluation on instruction-tuned LLMs, if RLHF instruction tuning
    is applied, then the discriminative quality of confidence signals degrades (AUROC for
    margin-based correctness prediction drops and margin-accuracy monotonicity weakens under
    percentile normalization), because preference optimization rewards decisive responses
    regardless of correctness, inflating logit margins even for incorrect predictions.
  alternative_hypothesis_h0: |
    RLHF instruction tuning does not degrade discriminative confidence quality; AUROC(margin →
    correctness) is unchanged between base and instruct models, and any ECE differences are
    attributable to scalar rescaling (equivalent to temperature shift) rather than geometric
    distortion of the confidence-accuracy relationship.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Model Type"
      type: "categorical"
      operationalization: "Base vs. Instruct version within same family"
      levels: ["base", "instruct"]
    - name: "Model Family"
      type: "categorical"
      operationalization: "Different LLM families for cross-family generalization"
      levels: ["Qwen", "Llama", "Mistral"]
    - name: "Prompt Format"
      type: "categorical"
      operationalization: "Zero-shot vs. Few-shot prompting (2×2 design control)"
      levels: ["zero-shot", "few-shot"]
    - name: "Domain"
      type: "categorical"
      operationalization: "MMLU subject categories"
      levels: ["STEM", "humanities", "social_science", "other"]
  dependent:
    - name: "AUROC(margin → correctness)"
      type: "continuous"
      operationalization: "Area under ROC curve for logit margin predicting correctness"
      primary: true
    - name: "β_percentile"
      type: "continuous"
      operationalization: "Slope of Pr(correct) = σ(α + β·z-score(margin))"
      primary: false
    - name: "ECE"
      type: "continuous"
      operationalization: "Expected Calibration Error with 15 bins"
      primary: false
    - name: "Brier Score Components"
      type: "continuous"
      operationalization: "Murphy decomposition: Reliability, Refinement, Uncertainty"
      primary: false
    - name: "T_opt"
      type: "continuous"
      operationalization: "Optimal temperature per domain via NLL minimization"
      primary: false
    - name: "AURC"
      type: "continuous"
      operationalization: "Area Under Risk-Coverage curve for selective prediction"
      primary: false
  controlled:
    - name: "Difficulty"
      operationalization: "Base model accuracy bin (0-30%, 30-60%, 60-90%, 90-100%)"
    - name: "Entropy"
      operationalization: "Empirical entropy of answer distribution per question"
    - name: "Lexical Features"
      operationalization: "Mean token length, entropy of answer options"
    - name: "Decoding Temperature"
      operationalization: "Fixed at T=0 (greedy decoding) during inference"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "RLHF preference optimization rewards decisive, confident-sounding responses via Bradley-Terry model"
      evidence: "Tian et al. 2023 documented RLHF-induced overconfidence; Bradley-Terry penalizes hedging"
      falsifier: "If RLHF models show equal or lower confidence variance than base models"
    - step: 2
      description: "This creates selection pressure that inflates logit margins uniformly - including for incorrect predictions"
      evidence: "Novel claim requiring E[margin | incorrect]_instruct > E[margin | incorrect]_base"
      falsifier: "If conditional margin distributions are identical between base and instruct"
    - step: 3
      description: "Margin inflation decouples the confidence-correctness relationship, degrading discriminative signal"
      evidence: "Measured via AUROC drop and β_percentile attenuation"
      falsifier: "If AUROC and β_percentile remain unchanged under prompt controls"
    - step: 4
      description: "This distortion is geometric (affects probability landscape shape) rather than scalar (temperature-like rescaling)"
      evidence: "Percentile-normalized slope comparison distinguishes geometry from scale"
      falsifier: "If normalized comparisons eliminate the effect"
  key_tension: "Whether domain-specific miscalibration reflects representational anisotropy or is merely a proxy for difficulty/lexical features"
  evidence_summary: |
    Prior work establishes that RLHF induces overconfidence (Tian 2023) and that temperature
    scaling can partially repair calibration (Guo 2017). This hypothesis extends by testing
    whether RLHF fundamentally corrupts discriminative signal rather than just shifting scale,
    using AUROC and percentile-normalized monotonicity as key metrics.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Logit margin is a valid operationalization of model confidence for MCQ tasks"
    supporting_evidence: "Standard practice in calibration literature; probability = softmax(margin)"
    consequence_if_violated: "Need alternative confidence definition (e.g., verbalized confidence)"
  - id: "A2"
    assumption: "Base models represent a meaningful epistemic baseline for comparison"
    supporting_evidence: "Base models are trained on next-token likelihood without preference shaping"
    consequence_if_violated: "Cannot attribute calibration differences to RLHF specifically"
  - id: "A3"
    assumption: "Cross-family comparison is valid despite different training details"
    supporting_evidence: "All families use similar RLHF paradigm (SFT + preference optimization)"
    consequence_if_violated: "Findings may be vendor-specific rather than RLHF-general"
  - id: "A4"
    assumption: "MMLU domain labels correspond to semantically distinct representational subspaces"
    supporting_evidence: "MMLU subjects cover distinct knowledge domains"
    consequence_if_violated: "Domain structure findings would be meaningless"
  - id: "A5"
    assumption: "Discriminative degradation is not fully explained by accuracy differences"
    supporting_evidence: "AUROC measures rank-ordering independent of accuracy level"
    consequence_if_violated: "Effect would be trivial consequence of accuracy drop"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Multiple-choice QA benchmarks with ground-truth correctness labels (MMLU, TruthfulQA)
    - 7B-scale instruction-tuned LLMs with available base model checkpoints
    - Post-hoc temperature scaling as calibration method
    - Selective prediction as downstream application
  does_not_apply_to: |
    - Free-form generation tasks (no ground-truth correctness labels)
    - Calibration-aware training interventions (this studies post-hoc methods only)
    - Multi-turn dialogue calibration
    - Domain shift beyond MMLU categories
    - API-only models without logit access
  known_limitations: |
    - Base vs. instruct comparison has prompting format confounds (mitigated by 2×2 design)
    - MMLU domains may correlate with difficulty (controlled via stratification)
    - 7B scale may not generalize to larger/smaller models (addressed in scope)
    - Results may be dataset-specific (multiple benchmarks used)

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "AUROC(margin → correctness) is significantly lower for instruct models than base models across Qwen, Llama, and Mistral families"
    test_method: "Bootstrap 95% CIs for AUROC difference; random-effects meta-analysis for heterogeneity"
    success_criterion: "AUROC_instruct < AUROC_base with non-overlapping 95% CIs; I² < 50% (low heterogeneity)"
    falsification: "If AUROC_instruct >= AUROC_base for any family, or I² > 75% (high heterogeneity)"
  - id: "P2"
    primary: false
    statement: "Percentile-normalized margin-accuracy slope (β_percentile) is attenuated in instruct vs. base models under 2×2 prompt controls"
    test_method: "Logistic regression Pr(correct) = σ(α + β·z-score(margin)); compare β across conditions"
    success_criterion: "β_percentile_instruct < β_percentile_base with p < 0.05 across prompt formats"
    falsification: "If β_percentile difference vanishes under prompt controls or normalization"
  - id: "P3"
    primary: false
    statement: "Mean logit margin conditional on incorrect answers is higher for instruct models"
    test_method: "Permutation test on E[margin | incorrect] between model types"
    success_criterion: "E[margin | incorrect]_instruct > E[margin | incorrect]_base with permutation p < 0.05"
    falsification: "If conditional margin distributions are statistically indistinguishable"
  - id: "P4"
    primary: false
    statement: "Optimal temperature varies by MMLU domain beyond difficulty and lexical features"
    test_method: "Multivariate regression T_opt ~ Domain + Difficulty + Entropy + Lexical; F-test for domain"
    success_criterion: "Domain coefficients significant (p < 0.05) after controlling for difficulty, entropy, lexical features"
    falsification: "If domain loses significance after adding lexical covariates"
  - id: "P5"
    primary: false
    statement: "Domain-conditioned temperature scaling improves selective prediction with Pareto improvement"
    test_method: "Compare AURC and risk-at-fixed-coverage between global and domain-conditioned scaling"
    success_criterion: "AURC_domain < AURC_global; worst-case domain risk also reduced (Pareto improvement)"
    falsification: "If domain scaling helps average AURC but harms any single domain (no Pareto improvement)"

