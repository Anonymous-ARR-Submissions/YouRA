main_hypothesis:
  id: "H-CalibrationGeometry-v1"
  title: "RLHF-Induced Discriminative Degradation of Confidence Signals"
  gate_result: "PASS"
  validated_statement: |
    In 7B-scale instruction-tuned LLMs evaluated on MMLU multiple-choice QA, RLHF instruction
    tuning degrades the discriminative quality of confidence signals, evidenced by:
    (1) AUROC for margin-based correctness prediction drops 2-4 percentage points, and
    (2) percentile-normalized margin-accuracy slope is attenuated by 30-40%.
    This degradation occurs because preference optimization inflates logit margins
    disproportionately for incorrect predictions (3-17x inflation), which fundamentally
    reshapes the probability landscape (geometric distortion) rather than merely
    rescaling probabilities (scalar distortion).

