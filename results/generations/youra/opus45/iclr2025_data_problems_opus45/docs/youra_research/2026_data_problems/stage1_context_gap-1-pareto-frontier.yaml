gap_id: "gap-1-pareto-frontier"
gap_title: "Systematic Pareto Frontier Characterization Across Methods"
gap_description: |
  No unified benchmark exists comparing ALL major data attribution methods (TRAK, TracIn,
  IF, FastIF, DataShapley, DataInf, LoRIF) under identical conditions with varying
  computation budgets. Each paper shows their method is "better" but direct comparison
  across all methods is impossible due to different evaluation protocols, datasets, and
  accuracy metrics.

