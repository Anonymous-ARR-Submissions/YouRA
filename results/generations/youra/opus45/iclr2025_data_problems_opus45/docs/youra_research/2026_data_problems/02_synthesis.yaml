hypothesis_draft:
  title: "Multi-Objective Pareto Trade-offs in Finite-Compute Data Attribution"
  hypothesis_id: "H-AttributionPareto-v1"
  core_claim: |
    In the finite-compute regime (<=100 gradient-equivalent operations), data attribution
    methods exhibit non-degenerate Pareto trade-offs across three quality dimensions:
    rank preservation (rho_r), magnitude fidelity (rho_m), and normalized stability (S).
    These trade-offs arise from structural properties of non-convex deep learning geometry
    rather than mere differences in approximation quality.
  mechanism: |
    1. In convex settings, all metrics collapse to a single approximation error axis
    2. In non-convex deep networks, loss landscape geometry creates multiple optimization paths
    3. Different method designs (random projection vs HVP) inherently prioritize different quality dimensions
    4. This creates irreducible trade-offs that persist even as compute increases
  predictions:
    - P1: "Convex coupling: cross-metric correlations >= 0.95 in logistic regression"
    - P2: "Deep non-dominance: at least one method pair with CI-separated metric crossings"
    - P3: "R^2 drop: regression R^2 from ~1.0 (convex) to <0.8 (deep)"
    - P4: "Decision impact: top-k disagreement >30% with significant downstream differences"

variables_summary:
  independent: "Attribution method (TRAK, TracIn, IF, FastIF), compute budget (10-100 gradient-equivalents), model regime (convex/deep)"
  dependent_primary: "Rank preservation (Spearman correlation with LOO influence)"
