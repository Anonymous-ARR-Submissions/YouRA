null_hypothesis:
  h0_statement: |
    All three attribution quality metrics (rank correlation, magnitude correlation,
    normalized stability) are monotone functions of a single approximation error norm
    ||phi_hat - phi||_2, and any observed trade-offs are finite-sample artifacts that
    disappear as compute increases.
  statistical_test: "Linear regression R^2 comparison between convex and deep regimes"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First rigorous multi-objective Pareto characterization connecting method design to downstream use cases"
  differentiation_summary: |
    Prior work (TRAK, DataInf, IF papers) each report single-metric comparisons using
    different evaluation protocols. No unified framework exists to compare all methods
    under identical conditions with multiple quality dimensions. Our contribution:
    (1) unified measurement framework, (2) multi-objective Pareto characterization,
    (3) mechanistic explanation (convex coupling vs deep decoupling).

