qualitative_claims:
  - id: "qc1"
    claim: "Trade-offs are structural, not artifactual"
    evidence: "H-M1 shows coupling in convex, H-M2 shows decoupling in non-convex"
    verified: true

  - id: "qc2"
    claim: "Trade-offs arise from non-convex geometry"
    evidence: "84% R² drop from convex to deep settings"
    verified: true

  - id: "qc3"
    claim: "Different methods identify different influential examples"
    evidence: "Jaccard < 1% across all method pairs"
    verified: true

  - id: "qc4"
    claim: "Same-paradigm methods can disagree as much as cross-paradigm"
    evidence: "TracIn/FastIF (both gradient-based) showed lowest Jaccard"
    verified: true

# ═══════════════════════════════════════════════════════════════
# EXPERIMENTAL SETUP (for reproducibility verification)
# ═══════════════════════════════════════════════════════════════

experimental_setup:
  dataset:
    name: "CIFAR-10"
    training_samples: 5000
    test_samples: 100

  model:
    non_convex: "ResNet-18 (modified for CIFAR-10)"
    convex: "Logistic Regression on ResNet-18 features"

  methods:
    - "TRAK"
    - "TracIn"
    - "IF"
    - "FastIF"

  compute_budgets: [10, 25, 50, 75, 100]

  seeds:
    method_seeds: 3
    loo_seeds: 10
    bootstrap_resamples: 1000

  training:
    epochs: 200
    optimizer: "SGD"
    learning_rate: 0.1
    momentum: 0.9
    weight_decay: 0.0005

