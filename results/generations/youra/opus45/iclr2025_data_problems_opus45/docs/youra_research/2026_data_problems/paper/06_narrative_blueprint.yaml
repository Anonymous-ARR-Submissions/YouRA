    narrative_purpose: "Compress full story: problem (disagreement), insight (geometry), evidence (4 validated hypotheses), impact (method selection)"
    key_message: "Attribution trade-offs are structural, not artifactual - practitioners should select methods based on use case, not 'accuracy'"
    word_target: "~150"
    must_include:
      - "Quantitative result: < 1% top-k overlap"
      - "Mechanism: convex coupling vs non-convex decoupling"
      - "Practical implication for method selection"

  introduction:
    narrative_purpose: "Hook -> Problem -> Insight -> Preview"
    hook_strategy: "counterintuitive_finding"
    key_elements:
      - "Open with 1% agreement statistic"
      - "Frame as practitioners' dilemma"
      - "Introduce convex/non-convex geometry lens"
      - "Preview 4-hypothesis validation structure"
    transition_to_related: "After establishing our geometry-based framing, discuss how prior work evaluated single metrics"
    word_target: "~800-1000"

  related_work:
