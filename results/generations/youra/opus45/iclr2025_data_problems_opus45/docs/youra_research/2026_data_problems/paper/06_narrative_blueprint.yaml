    positioning_strategy: "BUILD_ON not COMPETE - acknowledge strong baselines, highlight complementary contribution"
    key_comparison_points:
      - "TRAK (Park et al., 2023): Single-metric evaluation; we add multi-metric Pareto analysis"
      - "IF Fragility (Basu et al., 2020): When methods fail; we characterize trade-offs when they work"
      - "DataInf (Kwon et al., 2023): LoRA efficiency; our compute-normalized comparison is complementary"
      - "TracIn (Pruthi et al., 2020): Different evaluation protocol prevents direct comparison in prior work"
    word_target: "~600-800"

  methodology:
    narrative_purpose: "Show WHY this design tests our specific claims"
    connection_to_insight: "Our unified compute-normalized framework enables the first rigorous Pareto characterization"
    key_design_decisions:
      - decision: "Gradient-equivalent operations as compute unit"
        rationale: "Enables fair cross-method comparison at matched computational cost"
      - decision: "Convex baseline (logistic regression)"
        rationale: "Control condition to isolate non-convex geometry effects"
      - decision: "Three quality dimensions (rank, magnitude, stability)"
        rationale: "Map to different downstream applications"
    subsections:
      - "Quality Metrics Definition (rho_r, rho_m, S)"
      - "Compute Normalization Framework"
      - "Experimental Design Overview"
    word_target: "~1000-1200"

  experiments:
    narrative_purpose: "Design tests that verify our specific claims"
    experimental_questions:
      - "Q1 (H-E1): Do metric crossings exist in deep networks?"
      - "Q2 (H-M1): Are metrics coupled in convex settings?"
      - "Q3 (H-M2): Does coupling break in non-convex settings?"
      - "Q4 (H-M3): Do methods identify different influential examples?"
    subsections:
      - "Datasets and Models (CIFAR-10, ResNet-18)"
      - "Attribution Methods (TRAK, TracIn, IF, FastIF)"
      - "Evaluation Protocol and Ground Truth"
      - "Statistical Analysis (bootstrap CIs, R² regression)"
    word_target: "~800-1000"

  results:
    narrative_purpose: "Present evidence supporting each claim in logical order"
    main_result_highlight: "5 metric crossings demonstrating Pareto trade-offs (H-E1), corroborated by geometry mechanism (H-M1/M2)"
    structure:
      - "H-E1 Results: Pareto trade-off existence"
      - "H-M1 Results: Convex coupling baseline"
      - "H-M2 Results: Deep network decoupling"
      - "H-M3 Results: Method disagreement analysis"
    key_figures:
      - "pareto_fronts.png (main result)"
      - "gate_r2_comparison.png (mechanism)"
      - "jaccard_heatmap.png (practical impact)"
    word_target: "~1000-1200"

  discussion:
    narrative_purpose: "Interpret results, acknowledge limits, broader implications"
    key_findings_interpretation:
      - "Why same-paradigm methods disagreed most"
      - "Practical guidance for method selection"
      - "Implications for attribution benchmark design"
    honest_limitations:
      - "Ground truth via gradient proxies, not true LOO retraining"
      - "Single architecture (ResNet-18); Transformers not validated"
      - "CIFAR-10 scale; foundation model generalization unknown"
      - "Stability metric (S) not extensively validated"
    broader_impact:
      - "Shifts attribution from single-metric to multi-objective framing"
      - "Questions viability of 'universal best' method search"
    word_target: "~400-600"

  conclusion:
    narrative_purpose: "Reinforce message, callback to hook, open future"
    callback_to_hook: "When practitioners now ask 'which attribution method?', they should first ask 'which quality dimension matters for my application?'"
    summary_points:
      - "Trade-offs are structural (geometry), not artifactual (approximation)"
      - "Method selection should be use-case driven"
      - "Multi-metric benchmarks are essential"
    future_work_vision:
      - "Transformer validation"
      - "Hybrid methods extending Pareto frontier"
      - "Application-specific method selection guidelines"
    word_target: "~300-400"

