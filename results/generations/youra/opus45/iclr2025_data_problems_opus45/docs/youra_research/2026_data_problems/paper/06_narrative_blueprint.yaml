# Phase 6 Narrative Blueprint (v2.0)
# Paper: Multi-Objective Pareto Trade-offs in Finite-Compute Data Attribution
# Generated: 2026-03-26

metadata:
  hypothesis_id: "H-AttributionPareto-v1"
  paper_title: "Structural Pareto Trade-offs in Finite-Compute Data Attribution: Evidence from Non-Convex Geometry"
  target_venue: "ICML 2025"
  version: "2.0"
  generated_at: "2026-03-26T11:30:00+00:00"

# ═══════════════════════════════════════════════════════════════
# SECTION 1: THE HOOK
# ═══════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: "When practitioners ask 'which training examples most influenced this prediction?', different attribution methods give answers that agree on less than 1% of the identified examples."
    strategy: "counterintuitive_finding"
    source: "H-M3 validation: Jaccard = 0.0024 << 0.70"

  why_reader_should_care:
    main_reason: "Data attribution is critical for model debugging, data valuation, and ML safety auditing - but practitioners have no principled way to choose among competing methods."
    concrete_example: "A data scientist debugging a model's gender bias could identify completely different problematic training examples depending on whether they use TRAK, TracIn, or Influence Functions - potentially fixing the wrong data."
    stakes: "Without understanding the structural reasons behind method disagreement, practitioners cannot make informed decisions about which attribution method fits their use case."

  supporting_evidence:
    - "TRAK achieves 0.7-0.9 rank correlation with LOO retraining (Park et al., 2023)"
    - "Influence functions are fragile in deep networks (Basu et al., 2020)"
    - "No unified multi-metric benchmark exists (Phase 1 literature review)"

# ═══════════════════════════════════════════════════════════════
# SECTION 2: PROBLEM FRAMING (Three Levels)
# ═══════════════════════════════════════════════════════════════

problem_framing:
  surface_problem:
    description: "Data attribution methods produce different influence rankings"
    common_understanding: "Different approximations have different accuracy; compute more for better results"
    what_papers_typically_say: "Method X achieves Y% correlation with ground truth at Z computational cost"

  deeper_problem:
    description: "Methods optimize fundamentally different quality dimensions - rank preservation vs magnitude fidelity - creating irreducible trade-offs"
    why_overlooked: "Papers typically report single metrics (rank correlation); multi-objective evaluation is rare"
    our_perspective: "Attribution is not a single well-posed problem but a family of related problems with different optimal solutions"
    evidence: "IF achieves higher rank preservation (rho_r), FastIF achieves higher magnitude fidelity (rho_m) - they cannot both be 'correct'"

  gap_in_existing_work:
    description: "No rigorous characterization of whether attribution trade-offs are structural or merely finite-sample artifacts"
    why_gap_exists: "Would require systematic multi-metric evaluation across convex and non-convex settings with controlled compute"
    why_gap_matters: "Without this understanding, practitioners cannot make principled method selection decisions"
    our_contribution: "First rigorous Pareto characterization proving trade-offs arise from non-convex geometry, not approximation quality"

# ═══════════════════════════════════════════════════════════════
# SECTION 3: KEY INSIGHT
# ═══════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: "Attribution metric trade-offs are structural properties of non-convex optimization landscapes, not artifacts of approximation quality - in convex settings, all metrics remain perfectly coupled."
    expanded_explanation: |
      In convex settings (logistic regression), we prove that all attribution quality metrics
      (rank preservation, magnitude fidelity) are monotone functions of a single approximation
      error norm - they are perfectly coupled (correlation >= 0.99). But in non-convex deep
      networks, this coupling completely breaks down (R² = 0.034), revealing that different
      methods explore fundamentally different regions of the loss landscape.

  why_others_missed_it:
    common_assumptions: "Better approximation → better attribution on all metrics"
    our_different_view: "Non-convex geometry creates multiple valid notions of 'influence' that cannot be simultaneously optimized"
    enabling_factor: "Systematic convex vs non-convex comparison with unified compute normalization across methods"

  what_makes_it_work:
    intuitive_explanation: "In a convex bowl, there's one path to the bottom. In a non-convex landscape, different methods take different paths, each 'seeing' different influential training examples."
    key_mechanism: "Non-convex Hessian structure creates multiple local optima; different approximation methods (random projection vs HVP iteration vs gradient similarity) have different inductive biases for navigating this landscape"

# ═══════════════════════════════════════════════════════════════
# SECTION 4: EVIDENCE NARRATIVE
# ═══════════════════════════════════════════════════════════════

evidence_narrative:
  main_claim:
    statement: "Finite-compute data attribution exhibits structural Pareto trade-offs rooted in non-convex deep learning geometry"
    measurable_criteria:
      - "Metric crossings at >= 2 compute levels (observed: 5)"
      - "Convex coupling >= 0.95 (observed: 0.99)"
      - "Deep R² < 0.80 (observed: 0.034)"
      - "Top-k Jaccard < 0.70 (observed: 0.0024)"

  supporting_evidence:
    - id: "evidence_1"
      what: "IF vs FastIF shows metric crossings at all 5 tested compute budgets"
      so_what: "Demonstrates true Pareto trade-off - you cannot have both high rank preservation AND high magnitude fidelity"
      how_it_supports_claim: "Existence proof of irreducible multi-objective trade-offs"
      source: "H-E1 validation"
      figures: ["pareto_fronts.png", "crossing_heatmap.png"]

    - id: "evidence_2"
      what: "In convex logistic regression, cross-metric correlation >= 0.99 at all budgets"
      so_what: "Establishes baseline - convex geometry DOES allow all metrics to be optimized together"
      how_it_supports_claim: "Control condition showing decoupling is not universal but geometry-dependent"
      source: "H-M1 validation"
      figures: ["gate_partial_correlation.png", "scatter_metrics.png"]

    - id: "evidence_3"
      what: "In deep ResNet-18, R² drops 84% (from 0.21 to 0.034) compared to convex"
      so_what: "Approximation error norm no longer predicts metric quality in non-convex settings"
      how_it_supports_claim: "Proves decoupling is structural (non-convex geometry) not artifactual (approximation quality)"
      source: "H-M2 validation"
      figures: ["gate_r2_comparison.png", "delta_r2.png"]

    - id: "evidence_4"
      what: "Methods share < 1% of top-50 influential examples (Jaccard = 0.0024)"
      so_what: "Extreme practical consequence - method selection fundamentally changes which data you would remove/modify"
      how_it_supports_claim: "Demonstrates practical impact of Pareto trade-offs"
      source: "H-M3 validation"
      figures: ["jaccard_heatmap.png", "topk_overlap.png"]

  surprising_findings:
    - finding: "Same-paradigm methods (TracIn/FastIF) showed lowest agreement (Jaccard = 0.0024)"
      why_surprising: "Expected cross-paradigm (projection vs iteration) to disagree more than within-paradigm"
      our_interpretation: "Implementation details matter as much as design philosophy; 'gradient-based' is not a cohesive category"

    - finding: "Cross-metric correlations in deep networks range from -0.45 to +0.99 across budgets"
      why_surprising: "Expected some decoupling, not this instability"
      our_interpretation: "Budget allocation dramatically affects which metrics benefit; no single 'optimal' compute level"

# ═══════════════════════════════════════════════════════════════
# SECTION 5: BROADER IMPACT
# ═══════════════════════════════════════════════════════════════

takeaway:
  main_contribution:
    one_sentence: "We prove that data attribution trade-offs are structural properties of non-convex geometry, fundamentally changing how practitioners should approach method selection."
    why_significant: "Shifts the question from 'which method is best?' to 'which quality dimension matters for my use case?'"

  implications:
    for_field: |
      - Attribution should be framed as multi-objective optimization, not single-metric maximization
      - Future benchmarks should report Pareto fronts, not single numbers
      - The search for a 'universally best' attribution method may be fundamentally misguided
    for_practice: |
      - Data debugging (finding mislabeled examples): prioritize rank preservation
      - Data valuation (pricing contributions): prioritize magnitude fidelity
      - Curriculum learning: consider stability metrics
      - Method selection should be application-driven, not accuracy-driven

  future_possibilities:
    immediate_extensions:
      - "Validate Pareto structure on Transformers (BERT, GPT-2)"
      - "Design hybrid methods that extend the Pareto frontier"
      - "Develop method selection guidelines for common use cases"
    longer_term_vision: |
      Understanding Pareto structure could enable:
      - Adaptive attribution that switches methods based on downstream task
      - Foundation model scale attribution with principled compute allocation
      - New attribution methods designed for specific Pareto regions

