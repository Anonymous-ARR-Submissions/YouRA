    supporting_evidence: "TRAK achieves 0.7-0.9 correlation, suggesting signal exceeds noise"
    consequence_if_violated: "Cannot distinguish method performance from target stochasticity"
  - id: "A3"
    assumption: "The three metrics (rank, magnitude, stability) capture genuinely different aspects of attribution quality"
    supporting_evidence: "Used in different downstream applications (debugging, valuation, auditing)"
    consequence_if_violated: "Multi-objective framing collapses to single-objective"
  - id: "A4"
