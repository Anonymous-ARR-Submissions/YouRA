# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Compute regime: <=100 gradient-equivalent operations (practitioner-relevant range)
    - Model scale: Small-to-medium models (ResNet-18, BERT-base) where LOO ground truth is feasible
    - Method scope: Gradient-based attribution methods (TRAK, TracIn, IF, FastIF)
    - Benchmarks: Standard datasets (CIFAR-10, MNLI) with established attribution evaluation protocols
  does_not_apply_to: |
    - Foundation model scale (7B+ parameters) where LOO retraining is infeasible
    - Data Shapley and game-theoretic valuation methods (different computational paradigm)
    - Non-gradient-based attribution methods
    - Settings where fewer than 500 training examples are available for sigma_LOO estimation
  known_limitations: |
    - Ground truth estimation requires 1000 examples x 10 retrains = 10,000 training runs
    - Results may not transfer to FM scale where ground truth estimation is infeasible
    - LoRA fine-tuning (Track B) may show different patterns due to low-rank parameterization

