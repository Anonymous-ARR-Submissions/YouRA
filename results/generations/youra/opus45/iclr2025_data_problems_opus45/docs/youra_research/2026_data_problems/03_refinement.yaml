# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "In convex settings (logistic regression), cross-metric partial correlations (rho_r, rho_m | b) >= 0.95 at all compute levels, establishing baseline coupling."
    test_method: "Train logistic regression on CIFAR-10 features; compute exact LOO; measure correlations under compute-throttled approximations"
    success_criterion: "corr(rho_r, rho_m | b) >= 0.95 across all budgets b in [10, 25, 50, 75, 100]"
    falsification: "If correlation < 0.90 in convex settings, metrics are definitionally inconsistent"
  - id: "P2"
    primary: false
    statement: "In deep networks, at least one method pair shows statistically significant metric crossings (Method A > B on rho_r but A < B on rho_m) with non-overlapping 95% bootstrap CIs."
    test_method: "Compare TRAK vs IF on ResNet-18/CIFAR-10 and BERT-base/MNLI at fixed compute budgets"
    success_criterion: ">=1 method pair with CI-separated metric crossings at >=2 compute levels"
    falsification: "If all methods show parallel curves (no crossings) or universal dominance, no trade-off exists"
  - id: "P3"
    primary: false
    statement: "R^2 from regressing metrics on ||phi_hat - phi||_2 drops from ~1.0 in convex to <0.8 in deep settings, proving structural decoupling."
    test_method: "Fit linear regression of each metric on approximation error norm; compare R^2 across regimes"
    success_criterion: "R^2_convex >= 0.95; R^2_deep < 0.80 for at least one metric"
    falsification: "If R^2 remains >= 0.95 in deep networks, single-error-axis model holds"
  - id: "P4"
    primary: false
    statement: "Top-k disagreement between methods exceeds 30%, and retraining-without-top-k produces statistically distinguishable accuracy changes."
    test_method: "Compute Jaccard similarity of top-k sets; perform retraining experiments with different methods' top-k removed"
    success_criterion: "Jaccard < 0.70 (disagreement > 30%); t-test p < 0.05 on downstream accuracy differences"
    falsification: "If Jaccard >= 0.90 or downstream differences insignificant, practical heterogeneity claim fails"

