# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-AttributionPareto-v1"
  confidence_level: 0.75
  core_hypothesis_statement: |
    Under finite-compute constraints (<=100 gradient-equivalent operations), if we compare
    multiple data attribution methods (TRAK, TracIn, IF, FastIF) across standardized quality
    dimensions, then non-degenerate Pareto trade-offs emerge across rank preservation,
    magnitude fidelity, and normalized stability, because non-convex deep learning geometry
    creates structural metric decoupling that does not exist in convex settings.
  alternative_hypothesis_h0: |
    All three attribution quality metrics (rank correlation, magnitude correlation, normalized
    stability) are monotone functions of a single approximation error norm ||phi_hat - phi||_2,
    and any observed trade-offs are finite-sample artifacts that disappear as compute increases.

