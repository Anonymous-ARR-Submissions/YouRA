# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 3
  steps:
    - step: 1
      description: "In convex settings, all attribution metrics are monotone functions of a single approximation error norm - the distance to the closed-form LOO influence."
      evidence: "Standard statistical theory; LOO has closed-form solution in convex settings (Koh & Liang 2017)"
      falsifier: "Cross-metric correlations < 0.95 in logistic regression would disprove convex coupling"
    - step: 2
      description: "In non-convex deep networks, the loss landscape geometry creates multiple paths to approximate influence, each optimizing different quality dimensions."
      evidence: "Basu et al. (2020) showed IF accuracy varies non-monotonically with network properties"
      falsifier: "If metrics remain coupled (corr >= 0.95) in deep networks, mechanism is disproven"
    - step: 3
      description: "Different method designs (random projection vs HVP iteration vs gradient similarity) inherently prioritize different quality dimensions, creating irreducible trade-offs."
      evidence: "TRAK's random projections preserve rank order but may inflate variance; HVP methods have lower variance but higher computational cost per accuracy unit"
      falsifier: "If single method dominates all metrics at all compute levels, trade-offs are not structural"
  key_tension: "Whether observed trade-offs reflect fundamental method design constraints or merely finite-sample convergence rate differences"
  evidence_summary: |
    The mechanism proposes that metric decoupling is a structural property of non-convex
    optimization landscapes, not an artifact of approximation quality. Evidence: (1) convex
    settings have provably coupled metrics, (2) deep networks show fragility patterns
    inconsistent with single-error-axis theory, (3) different methods have demonstrably
    different bias-variance profiles.

