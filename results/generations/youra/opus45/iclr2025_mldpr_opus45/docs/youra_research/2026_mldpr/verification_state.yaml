main_hypothesis:
  id: H-DatasetLifecycleTaxonomy-v1
  title: Hierarchical Lifecycle Taxonomy of HuggingFace Dataset Adoption Patterns
  statement: 'Under the HuggingFace dataset ecosystem (datasets created 2020-2024 with >=12 months of

    download history), if we apply a two-level hierarchical lifecycle analysis (Level 1: PELT

    changepoint detection for phase identification; Level 2: DTW clustering on phase-normalized

    trajectories), then datasets will partition into 3-8 distinct trajectory archetypes with

    silhouette score >0.25 and bootstrap stability >0.65, because download dynamics reflect

    underlying adoption mechanisms that generate recurring temporal signatures.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: HuggingFace Dataset Download Statistics
    model: Two-Level Hierarchical Lifecycle Analysis
    optimizer: null
    hyperparameters:
      min_history_months: 12
      min_downloads: 100
      k_range:
      - 3
      - 8
      silhouette_threshold: 0.25
      jaccard_threshold: 0.65
      bootstrap_iterations: 100
