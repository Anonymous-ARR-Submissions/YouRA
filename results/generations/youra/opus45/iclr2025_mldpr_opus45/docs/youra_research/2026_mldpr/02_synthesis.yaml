  baselines:
    - "Single-level DTW clustering (no phase separation)"
    - "Random cluster assignment (null baseline)"
    - "K-means on summary statistics"

# Measurement plan
measurement_plan:
  data_collection:
    - source: "HuggingFace Hub API via huggingface_hub Python library"
    - query: "All datasets created 2020-01-01 to 2024-06-30"
    - aggregation: "Monthly download counts"
    - filters: ">=12 months history, <10% missing months, >100 total downloads"
  procedure:
    - step: "1. Query API for qualifying datasets, target >=500"
    - step: "2. Validate data: monotonic cumulative, outlier detection"
    - step: "3. Preprocess: log-transform, z-score normalize"
    - step: "4. Level 1: Apply PELT with CROPS penalty to each series"
    - step: "5. Level 2: Apply TimeSeriesKMeans with DTW for k in [2,10]"
    - step: "6. Select optimal k via silhouette score"
    - step: "7. Bootstrap 100x for stability (Jaccard similarity)"
    - step: "8. Map clusters to archetypes via shape descriptors"
  success_criteria:
    - ">=500 datasets pass validation filters"
    - ">50% of datasets have >=1 changepoint"
    - "Optimal k in [3,8] with silhouette >0.25"
    - "Bootstrap Jaccard stability >0.65"
    - ">=3 of 5 archetypes recoverable"

# Validation strategy
validation:
  internal_validity:
    - "Bootstrap resampling (100x) ensures cluster stability"
    - "Multiple k values tested to avoid arbitrary cluster count"
    - "Shape descriptor matching provides objective archetype assignment"
    - "CROPS penalty selection avoids arbitrary changepoint thresholds"
  external_validity:
    - "Focus on HuggingFace limits generalization to other platforms"
    - "2020-2024 time window captures post-transformer era dynamics"
    - "Minimum 12-month history ensures sufficient trajectory observation"
    - "Sensitivity analysis with outlier removal addresses noise concerns"

