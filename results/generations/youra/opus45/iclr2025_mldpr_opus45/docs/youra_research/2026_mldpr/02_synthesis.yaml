# Core hypothesis summary
hypothesis_draft:
  title: "Hierarchical Lifecycle Taxonomy of HuggingFace Dataset Adoption Patterns"
  hypothesis_id: "H-DatasetLifecycleTaxonomy-v1"
  core_claim: |
    HuggingFace ML datasets exhibit distinct lifecycle trajectory archetypes that can be
    discovered through a two-level hierarchical analysis: Level 1 (PELT changepoint detection)
    identifies discrete adoption phases, while Level 2 (DTW clustering) reveals trajectory
    archetypes. This approach addresses the fundamental challenge that dataset age confounds
    current-state observation, separating "where is this dataset now" from "what trajectory
    is this dataset following."
  mechanism: |
    The mechanism operates through five steps:
    1. Download accumulation creates temporal signatures for each dataset
    2. PELT changepoint detection identifies phase boundaries (launch/growth/maturity/decline)
    3. Different adoption drivers (benchmark status, publication cycles, trends) create
       distinct trajectory shapes
    4. DTW captures shape similarity invariant to scale and timing differences
    5. Clustering reveals natural groupings mapping to interpretable archetypes

    The key insight is that trajectory shape (how downloads evolve) is separable from
    trajectory phase (where the dataset currently is in its lifecycle).
  predictions:
    - P1: "DTW clustering identifies 3-8 clusters with silhouette >0.25 and Jaccard stability >0.65"
    - P2: "At least 3 of 5 proposed archetypes recovered: Sustained Growth, Flash-in-the-Pan, Plateau, Slow Burn, Revival"
    - P3: "More than 50% of qualifying datasets exhibit at least 1 PELT-detected changepoint"

# Variable summary
variables_summary:
  independent: "Dataset trajectory shape (DTW distance in normalized trajectory space)"
  dependent_primary: "Cluster membership (k in [3,8] trajectory archetype classes)"
  controlled: "Dataset age (>=12 months), data quality (<10% missing), normalization (log + z-score)"

# Null hypothesis
null_hypothesis:
  h0_statement: |
    There is no significant clustering structure in HuggingFace dataset download trajectories.
    Download patterns are either (a) too similar to differentiate (silhouette <=0.25), (b) too
    heterogeneous to cluster meaningfully (optimal k>8), or (c) trivially binary (optimal k=2,
    just growing vs declining). The proposed 5-archetype taxonomy does not reflect natural
    groupings in the data.
  statistical_test: "Silhouette score analysis with bootstrap stability validation"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: |
    First hierarchical lifecycle analysis of ML dataset ecosystems. The two-level structure
    (phase detection + trajectory clustering) is a methodological innovation that elegantly
    addresses the age-confounding problem inherent in lifecycle analysis.
  differentiation_summary: |
    Prior work (npm package studies by Mujahid et al., 2021) used single-level trajectory
    analysis without separating phase from shape. General time series clustering reviews
    (Aghabozorgi et al., 2015) established methodology but did not apply it to ML dataset
    ecosystems. This work combines hierarchical structure with ML-specific considerations
    (benchmark effects, publication cycles).

clarity:
  overall_level: "HIGH"
  clarity_verified: true
  improvements_needed: []

experimental_scope:
  models:
