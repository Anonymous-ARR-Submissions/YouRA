# Section 0: Established Facts & Claim Scope
established_facts:
  claims:
    - claim: "DTW effectively clusters time series into meaningful groups"
      status: "BUILD_ON"
      evidence: "Aghabozorgi et al. (2015) comprehensive review demonstrates DTW clustering success across domains"
    - claim: "PELT algorithm detects changepoints in time series data"
      status: "BUILD_ON"
      evidence: "Killick et al. (2012) established PELT with O(n) computational cost"
    - claim: "HuggingFace Hub API provides download statistics"
      status: "BUILD_ON"
      evidence: "Platform documentation confirms API access to download counts"
    - claim: "ML dataset download trajectories form distinct lifecycle archetypes"
      status: "PROVE_NEW"
      evidence: "No prior work has characterized HuggingFace dataset lifecycles"
    - claim: "Two-level hierarchical analysis separates phase from trajectory"
      status: "PROVE_NEW"
      evidence: "Novel methodological contribution; npm studies used single-level only"
  scope_reduction_percentage: 60
  phase2b_4_instructions: |
    Focus verification on PROVE_NEW claims. BUILD_ON claims can be cited without re-validation.
    Key verification targets: (1) clustering structure existence, (2) archetype recoverability,
    (3) two-level separation effectiveness.

# Section 1.1: Core Statement
core_statement:
  hypothesis_id: "H-DatasetLifecycleTaxonomy-v1"
  confidence_level: 0.80
  core_hypothesis_statement: |
    Under the HuggingFace dataset ecosystem (datasets created 2020-2024 with >=12 months of
    download history), if we apply a two-level hierarchical lifecycle analysis (Level 1: PELT
    changepoint detection for phase identification; Level 2: DTW clustering on phase-normalized
    trajectories), then datasets will partition into 3-8 distinct trajectory archetypes with
    silhouette score >0.25 and bootstrap stability >0.65, because download dynamics reflect
    underlying adoption mechanisms (benchmark effects, paper publication cycles, community trends)
    that generate recurring temporal signatures.
  alternative_hypothesis_h0: |
    There is no significant clustering structure in HuggingFace dataset download trajectories.
    Silhouette score will be <=0.25 and/or optimal k will be 2 (trivial split) or >8 (fragmented),
    indicating that trajectory shapes do not partition into distinct, interpretable archetypes.

# Section 1.2: Variables Table
variables:
  independent:
    - name: "Dataset trajectory shape"
      type: "continuous"
      operationalization: "DTW distance in trajectory space after log-transform and z-score normalization"
      levels: null
  dependent:
    - name: "Cluster membership"
      type: "categorical"
      operationalization: "Assigned cluster ID from TimeSeriesKMeans (k in [3,8])"
      primary: true
    - name: "Silhouette score"
      type: "continuous"
      operationalization: "Cluster quality metric, range [-1, 1], threshold >0.25"
      primary: false
    - name: "Archetype alignment"
      type: "categorical"
      operationalization: "Best-matching archetype from 5-class taxonomy based on shape descriptors"
      primary: false
  controlled:
    - name: "Dataset age"
      operationalization: "Minimum 12 months of download history required"
    - name: "Data quality"
      operationalization: "Monotonic cumulative downloads, <10% missing months"
    - name: "Normalization"
      operationalization: "Log-transform then z-score standardization"

# Section 1.3: Causal Mechanism (DYNAMIC)
causal_mechanism:
  causal_chain_count: 5
  steps:
    - step: 1
      description: "HuggingFace datasets accumulate downloads over time, creating temporal signatures"
      evidence: "HuggingFace Hub API documentation confirms download counting mechanism"
      falsifier: "If download counts are not reliably recorded or have systematic biases"
    - step: 2
      description: "Adoption follows discrete phases (launch, growth, maturity, decline) detectable via changepoints"
      evidence: "PELT algorithm validated for phase detection in time series (Killick et al., 2012)"
      falsifier: "If <50% of datasets show any significant changepoints"
    - step: 3
      description: "Different adoption mechanisms (benchmark designation, paper citations, trend following) create distinct trajectory shapes"
      evidence: "npm package studies show trajectory differentiation by package type (Mujahid et al., 2021)"
      falsifier: "If all datasets show identical trajectory shapes regardless of characteristics"
    - step: 4
      description: "DTW captures shape similarity across different scales and speeds of adoption"
      evidence: "DTW is scale-invariant and handles temporal warping (Aghabozorgi et al., 2015)"
      falsifier: "If DTW distances do not correlate with perceived trajectory similarity"
    - step: 5
      description: "Clustering reveals natural groupings that map to interpretable archetypes"
      evidence: "TimeSeriesKMeans with DTW produces interpretable clusters in other domains"
      falsifier: "If silhouette <0.25 or clusters lack interpretable shape signatures"
  key_tension: "Whether download counts accurately reflect research adoption vs. noise from automated pipelines or classroom usage"
  evidence_summary: |
    The causal chain builds on established time series methodology (PELT, DTW) and transfers
    validated approaches from software package ecosystem studies to the ML dataset domain.
    Each step has clear falsification criteria enabling rigorous hypothesis testing.

# Section 1.4: Key Assumptions (A1-A5)
key_assumptions:
  - id: "A1"
    assumption: "Download counts are a valid proxy for research adoption"
    supporting_evidence: "Downloads are the primary accessibility metric; high downloads correlate with dataset mentions in papers"
    consequence_if_violated: "Trajectory clusters would reflect noise patterns rather than adoption dynamics"
  - id: "A2"
    assumption: "HuggingFace API data is consistently collected over time"
    supporting_evidence: "Platform has stable infrastructure since 2020; no documented collection methodology changes"
    consequence_if_violated: "Changepoints might reflect data collection artifacts rather than adoption shifts"
  - id: "A3"
    assumption: "Trajectory archetypes are stable over the analysis period"
    supporting_evidence: "Technology adoption patterns show consistent shapes across domains (Rogers diffusion theory)"
    consequence_if_violated: "Archetypes discovered may not generalize to future datasets"
  - id: "A4"
    assumption: "DTW appropriately captures trajectory similarity for download time series"
    supporting_evidence: "DTW handles variable-length series and temporal warping; validated in similar domains"
    consequence_if_violated: "Cluster assignments would be unreliable; silhouette scores would be low"
  - id: "A5"
    assumption: "PELT with CROPS penalty selection finds meaningful changepoints"
    supporting_evidence: "CROPS provides data-driven penalty selection; BIC penalty works for count data"
    consequence_if_violated: "Phase detection would be unreliable; Level 1 analysis would fail"

# Section 1.5: Scope & Boundaries
scope:
  applies_to: |
    HuggingFace datasets created between 2020-01-01 and 2024-06-30 with at least 12 months
    of download history and sufficient download volume (>100 total downloads). Primary focus
    on datasets with complete monthly download records (<10% missing data).
  does_not_apply_to: |
    - Very recent datasets (<12 months history) - insufficient data for trajectory analysis
    - Datasets with sparse downloads (<100 total) - noise dominates signal
    - Non-HuggingFace platforms (Kaggle, UCI, etc.) without separate validation
    - Private or restricted-access datasets not captured in public API
  known_limitations: |
    - Download counts may include automated/non-research traffic (CI pipelines, tutorials)
    - HuggingFace-specific dynamics may not generalize to other platforms
    - Right-censoring: recent datasets may be misclassified if trajectory is incomplete
    - Benchmark designation is not always explicitly labeled in metadata

# Section 1.6: Testable Predictions
predictions:
  - id: "P1"
    primary: true
    statement: "DTW clustering will identify k in [3,8] clusters with silhouette >0.25 and bootstrap Jaccard stability >0.65"
    test_method: "Apply TimeSeriesKMeans with DTW distance for k in [2,10], select optimal k via silhouette, bootstrap 100x for stability"
    success_criterion: "Optimal k in [3,8], silhouette >0.25, mean Jaccard similarity >0.65 across bootstrap samples"
    falsification: "Optimal k=2 or k>8, OR silhouette <=0.25, OR Jaccard <0.65"
  - id: "P2"
    primary: false
    statement: "At least 3 of 5 proposed archetypes (Sustained Growth, Flash-in-the-Pan, Plateau, Slow Burn, Revival) will be recovered as distinct clusters"
    test_method: "Compute shape descriptors for cluster centroids (derivative sign, changepoint count, peak timing); match to archetype definitions"
    success_criterion: ">=3 clusters have shape descriptor profiles matching distinct archetypes with >70% feature alignment"
    falsification: "<3 archetypes recoverable from cluster centroids"
  - id: "P3"
    primary: false
    statement: "More than 50% of qualifying datasets will exhibit at least 1 statistically significant changepoint via PELT"
    test_method: "Apply PELT with CROPS penalty selection to each time series; count datasets with >=1 detected changepoint"
    success_criterion: ">50% of datasets have >=1 changepoint at selected penalty"
    falsification: "<=50% of datasets show any changepoints"

