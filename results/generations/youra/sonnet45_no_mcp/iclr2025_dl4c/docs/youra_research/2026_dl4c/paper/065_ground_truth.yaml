# HYPERPARAMETERS AND EXPERIMENTAL SETUP
# ═══════════════════════════════════════════════════════════════════════════════

experimental_setup:
  # Models evaluated
  models:
    - "CodeGen-2B-Multi"
    - "Codex (code-davinci-002)"
    - "StarCoder-15B"
    - "GPT-3.5-Turbo"
    - "GPT-4"
    - "CodeLlama-7B"
    - "InstructCodeLlama-7B"
    - "WizardCoder-15B"

  # Benchmarks
  benchmarks:
    humaneval:
      problems: 164
      focus: "Algorithmic clarity"
    mbpp:
      problems: 974
      focus: "Practical patterns"
    apps:
      status: "unavailable"

  # Feature extraction
  features_per_pair: 9
  feature_categories:
    - "Correctness: pass@1, pass@10, pass@100"
    - "Efficiency: runtime_q25, runtime_q50, runtime_q75"
    - "Failure modes: error_syntax, error_runtime, error_timeout"

  # Statistical analysis
  correlation_method: "Spearman rank correlation"
  divergence_method: "KL divergence with 20-bin histogram"
  significance_test: "Permutation test (10,000 permutations)"
  alpha: 0.05

  # Gate conditions
  he1_gate: "≥95% completeness"
  hm1_gate: "(ρ < 0.8) AND (KL > 0.1)"

