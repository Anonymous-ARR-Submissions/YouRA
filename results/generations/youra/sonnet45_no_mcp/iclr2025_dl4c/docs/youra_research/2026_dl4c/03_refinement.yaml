established_facts:
  claims:
  - claim: Existing execution-based benchmarks (HumanEval, MBPP, APPS) use binary
      pass/fail metrics
    status: BUILD_ON
    evidence: Documented in benchmark papers and Phase 1 research
  - claim: Benchmarks have heterogeneous test suite structures and execution environments
    status: BUILD_ON
    evidence: Phase 1 gap analysis identified this as current state
  - claim: Cross-benchmark comparison currently lacks standardized framework
    status: PROVE_NEW
    evidence: This is the research gap we're addressing
  scope_reduction_percentage: 33
  phase2b_4_instructions: Build on established facts about benchmark heterogeneity.
    Focus proof effort on demonstrating latent dimension discovery and cross-benchmark
    generalization.
core_statement:
  hypothesis_id: H-LatentEvalDim-v1
  confidence_level: 0.8
  core_hypothesis_statement: Under execution-based code benchmarks (HumanEval, MBPP,
    APPS), if we apply factor analysis to standardized execution trace features (pass@k,
    runtime quartiles, error distributions) across 20+ models, then we will discover
    2-6 latent evaluation dimensions explaining >60% of cross-benchmark performance
    variance, because each benchmark's test design implicitly prioritizes certain
    competencies creating distinctive evaluation signatures that reveal shared dimensional
    structure when analyzed collectively.
  alternative_hypothesis_h0: There is no latent dimensional structure in execution-based
    benchmark performance. Factor analysis will produce no clear factors (all eigenvalues
    <1 or no factor explains >20% variance), or discovered dimensions will not generalize
    to predict held-out benchmark performance (R² <0.3).
variables:
  independent:
  - name: Benchmark Selection
    type: categorical
    operationalization: 'Training set: HumanEval + MBPP, Held-out test: APPS'
    levels:
    - HumanEval
    - MBPP
    - APPS
  - name: Model Population
    type: categorical
    operationalization: 20+ code generation models with varying architectures and
      training
    levels:
    - diverse_model_set
  dependent:
  - name: Variance Explained
    type: continuous
    operationalization: Percentage of total variance explained by discovered factors
      (eigenvalue-based), range 0-100%
    primary: true
  - name: Cross-Benchmark Prediction Accuracy
    type: continuous
    operationalization: R-squared for predicting APPS performance from HumanEval+MBPP
      factors, range 0-1
    primary: true
  - name: Intervention Effect Size
    type: continuous
    operationalization: Cohen's d for dimension-specific shift after targeted fine-tuning,
      in standard deviations
    primary: false
  controlled:
  - name: Feature Extraction Method
    operationalization: 'Standardized pipeline: pass@k (k=1,10,100), runtime quartiles
      for passing solutions, error mode categorization (syntax/logic/resource)'
  - name: Statistical Method
    operationalization: Factor analysis with varimax rotation, eigenvalue threshold
      >1
causal_mechanism:
  causal_chain_count: 4
  steps:
  - step: 1
    description: 'Each benchmark''s test suite design implicitly prioritizes certain
      code competencies (e.g., HumanEval: algorithmic clarity, MBPP: practical patterns,
      APPS: competitive programming)'
    evidence: Benchmark design papers describe different evaluation philosophies and
      task selection criteria
    falsifier: If benchmark test suites show no systematic design differences in task
      types or evaluation criteria, this step fails
  - step: 2
    description: These design priorities create distinctive 'evaluation signatures'
      in execution traces - patterns of which models succeed/fail and how solutions
      perform (runtime, error types)
    evidence: 'Empirical observation: models show different rank orderings across
      benchmarks, suggesting benchmarks measure different things'
    falsifier: If all models maintain identical relative rankings across all benchmarks,
      no distinctive signatures exist
  - step: 3
    description: When execution trace features are analyzed across a model population,
      the collective variance patterns reveal latent dimensional structure representing
      shared evaluation constructs measured in different proportions
    evidence: 'Factor analysis principle: correlated variance across observations
      reveals underlying factors'
    falsifier: If factor analysis produces no clear structure (all eigenvalues similar,
      random loadings), no latent dimensions exist
  - step: 4
    description: Discovered dimensions generalize beyond training benchmarks because
      they capture fundamental evaluation constructs (correctness, efficiency, robustness)
      rather than benchmark-specific artifacts
    evidence: 'Cross-validation principle: true patterns generalize to held-out data'
    falsifier: If dimensions fail to predict held-out benchmark performance better
      than baseline, they're artifacts not constructs
  key_tension: Dimension interpretability vs. statistical optimality - factor analysis
    optimizes mathematical properties, not semantic meaningfulness
  evidence_summary: Mechanism relies on (1) documented benchmark design differences,
    (2) empirical performance variation across benchmarks, (3) factor analysis theory,
    (4) cross-validation for generalization test
key_assumptions:
- id: A1
  assumption: Execution trace features (pass@k, runtime, errors) contain sufficient
    signal about model competencies to reveal dimensional structure
  supporting_evidence: These features directly measure correctness and efficiency,
    two fundamental evaluation dimensions
  consequence_if_violated: Factor analysis will produce noise/artifacts instead of
    interpretable dimensions. Dimensionality reduction will fail to explain variance
    meaningfully.
- id: A2
  assumption: Cross-benchmark performance variance is primarily due to competency
    differences rather than task difficulty confounds
  supporting_evidence: Discussion proposed controlling for difficulty via task metadata
    or difficulty covariates in analysis
  consequence_if_violated: Discovered dimensions will capture difficulty variance
    instead of competency types. Framework won't distinguish evaluation philosophies.
- id: A3
  assumption: Factor analysis assumptions (multivariate normality, linear relationships)
    hold for transformed execution features
  supporting_evidence: Log-transformation of runtime, percentage-transformation of
    pass rates typically normalize distributions
  consequence_if_violated: Factor loadings will be unreliable. May need robust PCA
    or non-linear dimensionality reduction (UMAP).
- id: A4
  assumption: 20+ model sample size is sufficient for stable factor discovery
  supporting_evidence: 'Factor analysis rule-of-thumb: 5-10 observations per variable.
    With ~9 features (3 pass@k + 3 quartiles + 3 error modes), 20 models meets minimum'
  consequence_if_violated: Factor structure will be unstable, not generalizable. Need
    larger model sample or reduce feature dimensionality.
- id: A5
  assumption: Benchmark test suites are representative of their intended evaluation
    philosophy
  supporting_evidence: Benchmarks are curated by domain experts with documented design
    criteria
  consequence_if_violated: Evaluation signatures won't reflect intended competencies.
    Discovered dimensions will be meaningless.
scope:
  applies_to: Execution-based code generation benchmarks with programmatic test suites
    (HumanEval, MBPP, APPS, LiveCodeBench, similar). Models evaluated on 20+ shared
    code generation tasks. Analysis requires access to execution traces (pass/fail,
    runtime, error types).
  does_not_apply_to: Code understanding tasks (CodeXGLUE comprehension), code repair
    benchmarks (Defects4J), code translation (TransCoder), or benchmarks without execution
    evaluation. Also excludes benchmarks with <20 problems or those requiring human
    evaluation.
  known_limitations: Framework discovers dimensions from available benchmarks - cannot
    reveal evaluation constructs not represented in training set. Dimension interpretability
    requires human judgment. Does not prescribe what dimensions 'should' exist, only
    reveals what patterns emerge from data.
predictions:
- id: P1
  primary: true
  statement: Factor analysis on execution features from 20+ models across HumanEval+MBPP
    will produce 2-6 factors with eigenvalues >1, collectively explaining >60% of
    performance variance
  test_method: Extract features (pass@k, runtime quartiles, error distributions),
    apply factor analysis with varimax rotation, compute eigenvalues and cumulative
    variance explained
  success_criterion: At least 2 factors with eigenvalue >1, cumulative variance explained
    >60%, interpretable factor loadings (each feature loads >0.4 on at most 2 factors)
  falsification: All eigenvalues <1, OR no factor explains >20% variance, OR cumulative
    variance <40%
- id: P2
  primary: true
  statement: Factors discovered from HumanEval+MBPP will predict APPS performance
    with R² >0.5 using linear regression
  test_method: Compute factor scores for models on HumanEval+MBPP, train linear regression
    to predict APPS scores, evaluate on held-out test set
  success_criterion: R² >0.5 on test set, significantly better than baseline (mean
    prediction) with p<0.05
  falsification: R² <0.3, OR not significantly better than baseline (p>0.05)
- id: P3
  primary: false
  statement: Models fine-tuned on fast-passing solutions (efficiency intervention)
    will show >0.5 SD shift on runtime-loading factor while maintaining <0.2 SD shift
    on other factors
  test_method: Fine-tune model on subset of training data filtered for fastest passing
    solutions, re-evaluate on all benchmarks, compute factor scores before/after,
    measure Cohen's d for each factor
  success_criterion: Cohen's d >0.5 for runtime factor, Cohen's d <0.2 for non-runtime
    factors, difference is statistically significant (paired t-test p<0.05)
  falsification: All factors shift equally (Cohen's d differences <0.2), OR runtime
    factor doesn't respond (d<0.3)
experimental_setup:
  dataset:
    name: HumanEval + MBPP (training), APPS (held-out validation)
    type: standard
    source: 'HumanEval: https://github.com/openai/human-eval, MBPP: https://github.com/google-research/google-research/tree/master/mbpp,
      APPS: https://github.com/hendrycks/apps'
    path: Publicly available repositories
    hypothesis_fit: These benchmarks represent diverse execution-based evaluation
      philosophies (algorithmic, practical, competitive) and have sufficient model
      evaluation data available
  model:
    name: 20+ diverse code generation models
    type: Population of publicly available models (CodeLlama, StarCoder, GPT-3.5/4,
      etc.)
    source: Publicly released models with documented benchmark performance
    hypothesis_fit: Requires diverse model population to reveal latent variance structure.
      Public models ensure reproducibility.
  baselines:
  - name: Mean performance baseline
    method: Predict held-out benchmark performance using overall mean across training
      benchmarks
  - name: Single-benchmark baseline
    method: Predict APPS performance from HumanEval alone or MBPP alone (best single-benchmark
      predictor)
novelty:
  preserved_novelty: Treating benchmarks as a population revealing latent evaluation
    constructs through collective behavior rather than imposing standardization top-down
  key_innovation: 'Discovery-based approach to evaluation dimensions: let data reveal
    natural structure instead of prescribing metrics'
  differentiation:
  - prior_work: Benchmark comparison papers (e.g., 'Evaluating Large Language Models
      Trained on Code')
    difference: Prior work reports independent scores per benchmark. This work discovers
      shared dimensional structure explaining cross-benchmark relationships.
  - prior_work: Multi-metric evaluation frameworks (e.g., CodeBLEU)
    difference: Prior frameworks prescribe metrics (BLEU, syntax, dataflow). This
      work discovers metrics from execution data without prescriptive design.
  - prior_work: Meta-analysis of benchmark papers
    difference: Meta-analyses aggregate findings qualitatively. This work uses quantitative
      dimensionality reduction to reveal latent structure.
related_work:
  baselines:
  - method: Independent benchmark reporting (HumanEval pass@1, MBPP pass@1, etc.)
    performance: Provides separate scores but no unified understanding
    dataset: All execution-based benchmarks
    why_insufficient: Cannot explain why models perform differently across benchmarks
      or how benchmarks relate to each other
  - method: Aggregate scoring (averaging across benchmarks)
    performance: Simple mean or weighted average of benchmark scores
    dataset: Multiple benchmarks
    why_insufficient: Loses information about competency profiles. Treats all benchmarks
      as measuring same construct.
  best_baseline_performance: Single-benchmark predictors likely achieve R² 0.2-0.4
    for cross-benchmark prediction based on typical benchmark correlation patterns
phase2b_readiness:
  status: READY
  sh1_existence: Execution trace features (pass@k, runtime, error modes) must exist
    for 20+ models across HumanEval, MBPP, APPS benchmarks
  sh2_mechanism: Test whether factor analysis reveals clear dimensional structure
    (eigenvalues >1, >60% variance explained) and whether discovered dimensions generalize
    to predict held-out benchmark performance
  sh3_comparison: Compare latent dimension prediction (R²) against baseline predictors
    (mean performance, single-benchmark) to validate added value
  open_questions:
  - What is the optimal feature set for revealing evaluation dimensions - should we
    add code complexity metrics?
  - How stable are discovered dimensions across different time periods as models evolve?
  - Can dimension discovery guide design of new benchmarks to fill gaps in evaluation
    space?
