    acceptance_criteria:
      - Calculates per-user acceptance rates
      - Computes median acceptance
      - Aggregates helpfulness ratings
      - Performs stratified analysis
      - Determines PoC success (>=70% acceptance, >=3.5 helpfulness)

    estimated_effort: medium
    dependencies:
