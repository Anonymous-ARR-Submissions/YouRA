    complexity: 12
    epic: true
    description: |
      Integrate copilot with HuggingFace upload workflow for pilot deployment.

      Features:
      - Web UI components (suggestion display, action buttons)
      - Real-time suggestion generation
      - Session management
      - Post-session survey collection (5-point Likert)

