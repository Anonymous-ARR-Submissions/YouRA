  # ================================================================
  - id: E-1
    title: Corpus Curation System
    priority: 100
    type: data-pipeline
    complexity: 6
    epic: true
    description: |
      Curate 500+ high-quality HuggingFace dataset cards for few-shot examples.

      Distribution:
      - Vision: 200 cards
      - NLP: 200 cards
      - Tabular: 100 cards

      Quality filter: Completeness score >85%

      Store in structured format:
      - data/corpus/vision/
      - data/corpus/nlp/
      - data/corpus/tabular/

    reference_files:
      - file: 03_prd.md
        sections:
          - "FR-3: High-Quality Example Corpus"
          - "4.1 Input Data"
      - file: 03_architecture.md
        sections:
          - "Epic E-1: Corpus Curation System"
      - file: 03_config.md
        sections:
          - "3.2 Corpus Configuration"

    acceptance_criteria:
      - 500+ dataset cards collected
      - Quality filter applied (completeness >85%)
      - Distribution: 200 vision, 200 NLP, 100 tabular
      - Stored in Markdown format

    estimated_effort: medium
    dependencies:
      - E-6

  # ================================================================
  # PRIORITY 3: Core Implementation (95-80)
  # ================================================================
  - id: E-2
    title: Suggestion Generation Engine
    priority: 95
    type: model
    complexity: 14
    epic: true
    description: |
      Implement LLM-based suggestion generator with few-shot prompting.

      Core components:
      - Dataset property extraction
      - Example selection (3 most relevant from corpus)
      - Prompt construction
      - LLM inference (Llama-3-8B, temp=0.7, max_len=500)

      Performance requirement: <2 seconds per suggestion

    reference_files:
      - file: 03_prd.md
        sections:
          - "FR-1: LLM-Based Suggestion Generation System"
      - file: 03_architecture.md
        sections:
          - "Epic E-2: Suggestion Generation Engine"
      - file: 03_logic.md
        sections:
          - "2.1 Core Classes - SuggestionGenerator"
          - "3.1 Example Selection Algorithm"

    acceptance_criteria:
      - Extracts dataset properties from files
      - Selects 3 relevant examples by dataset type
      - Generates suggestions in <2 seconds
      - Temperature=0.7, max_length=500

    estimated_effort: high
    dependencies:
      - E-6
      - E-1

    subtasks:
      - E-2-1
      - E-2-2
      - E-2-3
      - E-2-4

  - id: E-2-1
    title: Dataset Property Extraction
    priority: 94
    type: implementation
    complexity: 3
    parent_epic: E-2
    description: |
      Implement PropertyExtractor to analyze uploaded dataset files.

      Extract:
      - File formats from extensions
      - Dataset type (vision/NLP/tabular) from content
      - Features and distributions (for tabular data)
      - Sample count

    reference_files:
      - file: 03_logic.md
        sections:
          - "2.1 Core Classes - PropertyExtractor"
          - "5. Subtask Specifications - E-2-1"

    acceptance_criteria:
      - Detects file formats correctly
      - Infers dataset type with >90% accuracy
      - Extracts features for CSV files
      - Returns DatasetProperties object

    estimated_effort: low
    dependencies:
      - E-6

  - id: E-2-2
    title: Example Selection Algorithm
    priority: 93
    type: implementation
    complexity: 2
    parent_epic: E-2
    description: |
      Implement example selection from corpus.

      Algorithm:
      1. Filter by dataset_type
      2. Filter by section availability
      3. Rank by quality score
      4. Return top 3

    reference_files:
      - file: 03_logic.md
        sections:
          - "3.1 Example Selection Algorithm"
          - "5. Subtask Specifications - E-2-2"

    acceptance_criteria:
      - Filters by dataset type correctly
      - Returns exactly 3 examples
      - Examples ranked by quality (completeness >85%)

    estimated_effort: low
    dependencies:
      - E-1

  - id: E-2-3
    title: Prompt Construction
    priority: 92
    type: implementation
    complexity: 2
    parent_epic: E-2
    description: |
      Build few-shot prompt with dataset properties and examples.

      Prompt structure:
      - Instruction
      - Dataset properties (type, formats, features)
      - 3 examples (truncated to 300 chars each)
      - Task specification

    reference_files:
      - file: 03_logic.md
        sections:
          - "2.1 Core Classes - SuggestionGenerator._build_prompt"
          - "5. Subtask Specifications - E-2-3"

    acceptance_criteria:
      - Prompt includes all required sections
      - Examples truncated to 300 chars
      - Total prompt length within model limits

    estimated_effort: low
    dependencies:
      - E-2-1
      - E-2-2

  - id: E-2-4
    title: LLM Inference Integration
    priority: 91
    type: implementation
    complexity: 7
    parent_epic: E-2
    description: |
      Integrate transformers pipeline for LLM inference.

      Implementation:
      - Load Llama-3-8B-Instruct model
      - Configure GPU (device=0)
      - Run inference with temperature=0.7, max_length=500
      - Handle errors gracefully (fallback on failure)

    reference_files:
