hypothesis_draft:
  title: Geometric Structure of Alignment Failures in RLHF Preference Data
  hypothesis_id: H-GeomAlign-v1
  core_claim: The HH-RLHF harmless-preference subset encodes a multi-dimensional,
    encoder-robust geometric manifold of alignment failures where Euclidean distance
    reflects violation severity and principal component directions reflect violation
    types, generalizing across model families.
  mechanism: Human annotators making 160K+ pairwise harmlessness judgments consistently
    detect implicit alignment violations beyond surface patterns. These aggregated
    judgments induce stable geometric structure in embedding space where rejected
    responses cluster along interpretable failure axes.
  predictions:
    P1: Spearman ρ ≥ 0.65 between manifold distance and human severity judgments
    P2: ≥3 orthogonal PCs with Cohen's d ≥ 0.5, no single axis >80% variance
    P3: Cross-encoder PC cosine similarity ≥ 0.70 for top-3 components
variables_summary:
  independent: Dataset source (HH-RLHF, WebGPT, Summarization), Encoder model (RoBERTa,
    DeBERTa, SentenceTransformer), Violation type (toxicity, misinformation, instruction-following)
  dependent_primary: Classification F1 score (continuous, 0-1), AUROC after lexical
    ablation (0.5-1.0), Spearman ρ severity-distance correlation
  controlled: Train/test split (80/20 stratified), Random seeds (42, 123, 456), Embedding
    extraction (CLS token pooling)
null_hypothesis:
  h0_statement: There is no statistically significant geometric structure in rejected
    vs. chosen responses beyond what is explained by surface lexical patterns, model-specific
    stylistic artifacts, or a single dominant toxicity axis.
  statistical_test: MANOVA for multi-axis separability, Spearman correlation for severity-distance,
    cosine similarity for encoder robustness
  significance_level: 0.05
novelty_assessment:
  status: VERIFIED
  key_innovation: First work to discover and validate geometric structure in RLHF
    preference data, enabling interpretable alignment maps (distance = severity, direction
    = violation type) and cross-model safety evaluation without new annotation
  differentiation_summary: Transitions from black-box reward modeling to interpretable
    geometric alignment structure. Unlike prior RLHF work that consumes preference
    data for training, this treats it as persistent alignment benchmark infrastructure
    with reusable geometric properties.
clarity:
  overall_level: HIGH
  clarity_verified: true
  improvements_needed: []
experimental_scope:
  models:
  - RoBERTa-base
  - DeBERTa-v3-base
  - SentenceTransformer-mpnet
  datasets:
  - HH-RLHF harmless subset
  - WebGPT
  - Summarization from Feedback
  baselines:
  - TF-IDF Logistic Regression
  - Bradley-Terry Reward Model
  - Random Classifier
measurement_plan:
  data_collection:
  - source: HH-RLHF harmless subset chosen/rejected pairs from Anthropic
  - source: WebGPT preference data from OpenAI
  - source: Summarization from Feedback dataset
  procedure:
  - step: 'Experiment 0: Base-rate audit (n=500 rejected samples, blinded annotation
      for violation proportion)'
  - step: 'Experiments 1-2: Train surface baseline and semantic detector on HH-RLHF'
  - step: 'Experiments 3-4: Cross-dataset transfer and error analysis'
  - step: 'Experiments 5-7: Lexical ablation, per-violation transfer, paraphrastic
      invariance'
  - step: 'Experiments 8-9: Geometric separability (MANOVA) and graceful degradation'
  - step: 'Experiments 10-12: Continuous structure, reward model comparison, encoder
      robustness'
  success_criteria:
  - 'Tier 1 (Detection): Exp 0-4 pass'
  - 'Tier 2 (Semantic): Exp 5-7 pass'
  - 'Tier 3 (Transfer): Exp 8-9 pass'
  - 'Tier 4 (Geometry): Exp 10-12 pass → paradigm shift'
validation:
  internal_validity:
  - 'Multi-seed reproducibility (3 seeds: 42, 123, 456)'
  - Stratified train/test split by violation type
  - Blinded base-rate audit with κ ≥ 0.75 inter-annotator agreement
  - Pre-registered falsification thresholds for all experiments
  external_validity:
  - Cross-dataset transfer (HH-RLHF → WebGPT, Summarization)
  - Cross-encoder validation (RoBERTa, DeBERTa, SentenceTransformer)
  - Bidirectional transfer test (symmetry validation)
  - Graceful degradation under distribution shift
discussion_synthesis:
  key_insights:
  - Geometric manifold framing elevates RLHF data from consumable training fuel to
    persistent alignment infrastructure
  - Base-rate audit (p ≥ 0.40) is crucial gate experiment - failure requires pivot
    to narrower preference prediction framing
  - Separability ≠ manifold structure - must prove continuous geometry with severity-distance
    correlation
  - Encoder robustness (PC alignment ≥0.70 across models) distinguishes intrinsic
    from artifact structure
  - Four-tier success framework ensures contribution at multiple levels from incremental
    to transformative
  breakthrough_moments:
  - 'Exchange 5: Prof. Pax''s question "is it plausible that pairwise preferences
    induce a model-agnostic alignment manifold?" shifted discussion from detection
    to geometry'
  - 'Exchange 11: Dr. Nova''s reframing as "reverse-engineering human alignment intuition
    from preference data" - archaeology metaphor'
  - 'Exchange 13: Dr. Ally''s synthesis of complete 12-experiment design with 4-tier
    success criteria'
  - 'Exchange 14-15: Prof. Rex and Dr. Sage''s separation of separability from manifold
    structure via continuous severity tests'
  resolved_tensions:
  - Rejected = misaligned debate → resolved by narrowing to harmless subset + base-rate
    validation
  - Novelty vs. reward model redundancy → resolved by head-to-head comparison (Exp
    11)
  - Surface patterns vs. semantic structure → resolved by lexical ablation tests (Exp
    5, 7)
  - Model-specific vs. universal structure → resolved by cross-encoder PC alignment
    (Exp 12)
