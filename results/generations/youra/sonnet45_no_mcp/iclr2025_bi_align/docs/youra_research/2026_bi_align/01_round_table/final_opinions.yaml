      9 to disentangle content from style. Mitigation strategy: run base-rate with
      multiple thresholds, make Exp 11 non-negotiable for publication, add perturbation
      baselines. If any Tier 4 experiment fails, downgrade claims rather than overstate.'
    key_points:
    - Base-rate dependency (p ≥ 0.40) with sensitivity analysis needed
    - Reward model comparison (Exp 11) non-negotiable for novelty claim
    - Style vs. content disentanglement requires perturbation controls
    - Clear downgrade path if experiments fail - no overstating of claims
