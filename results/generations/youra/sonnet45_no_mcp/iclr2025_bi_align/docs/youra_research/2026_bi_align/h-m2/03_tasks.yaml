- id: task-008
  epic: MANOVA Statistical Analysis
  title: Implement MANOVA effect size calculation (Cohen's d)
  description: |
    Calculate Cohen's d effect size for group separation between chosen and rejected embeddings.

    Acceptance Criteria:
    - Compute mean difference between group centroids
    - Calculate pooled standard deviation
    - Cohen's d = mean_diff / pooled_std
    - Confidence intervals for effect size
    - Statistical significance test (p-value < 0.05)
  feature_tag: evaluation
  priority: 93
  source_document: 03_architecture.md
