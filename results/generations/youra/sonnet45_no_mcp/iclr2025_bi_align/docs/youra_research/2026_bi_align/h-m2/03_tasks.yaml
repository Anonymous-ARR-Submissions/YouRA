- id: task-003
  epic: RoBERTa Embedding Extraction
  title: Implement RoBERTa CLS token embedding extractor
  description: |
    Extract 768-dimensional CLS token embeddings from RoBERTa-base for all chosen/rejected responses.

    Acceptance Criteria:
    - Load pretrained RoBERTa-base model
    - Batch processing (batch_size=32) for memory efficiency
    - CLS token pooling (first token of last hidden state)
    - GPU acceleration support
    - Save embeddings to disk (chosen_embeddings.npy, rejected_embeddings.npy)
    - Progress reporting for 160K+ samples
    - Estimated runtime: 2-3 hours
  feature_tag: model
