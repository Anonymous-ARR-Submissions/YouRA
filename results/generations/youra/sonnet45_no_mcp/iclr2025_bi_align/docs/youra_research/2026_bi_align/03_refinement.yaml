metadata:
  generated_at: '2026-04-19T13:43:52.825766'
  workflow: phase2a-dialogue v10.0.0
  architecture: Self-Contained Tikitaka Loop
  schema_version: 10.0.0
  gap_id: GAP-1
  gap_title: Validated Ground Truth Labels for Misalignment Detection
  execution_mode: UNATTENDED
  discussion_exchanges: 15
  convergence_reason: 'All convergence criteria met: specific core claim, causal mechanism,
    testable predictions, novelty articulated, feasibility validated, objections addressed'
established_facts:
  claims:
  - claim: RLHF datasets (HH-RLHF, WebGPT) contain validated human preference labels
      for chosen/rejected response pairs
    status: BUILD_ON
    evidence: Bai et al., 2022; Ouyang et al., 2022 - datasets publicly available
      with 160K+ annotated pairs
  - claim: Human annotators in HH-RLHF evaluated responses under explicit helpfulness/harmlessness
      criteria
    status: BUILD_ON
    evidence: Annotation guidelines from Bai et al., 2022 paper specify harmlessness
      as rejection criterion
  - claim: Previous H-E1 attempt failed due to overly-broad scope and unvalidated
      proxy labels
    status: BUILD_ON
    evidence: Phase 0 ROUTE_TO_0 failure analysis identified 6 failure points to avoid
  scope_reduction_percentage: 0
  phase2b_4_instructions: Focus experiments on harmless subset of HH-RLHF where rejection
    judgments encode safety violations, not just helpfulness preferences.
core_statement:
  hypothesis_id: H-GeomAlign-v1
  confidence_level: 0.75
  core_hypothesis_statement: Under the scope of RLHF harmless-preference evaluation,
    if we analyze the HH-RLHF dataset's chosen/rejected response pairs in embedding
    space, then we will discover a multi-dimensional geometric manifold where rejected
    responses cluster along interpretable failure axes with distances encoding violation
    severity, because human annotators consistently detect implicit alignment violations
    that induce stable structure across 160K+ pairwise judgments.
  alternative_hypothesis_h0: There is no statistically significant geometric structure
    in rejected vs. chosen responses beyond what is explained by surface lexical patterns,
    model-specific stylistic artifacts, or a single dominant toxicity axis.
variables:
  independent:
  - name: Dataset source
    type: categorical
    operationalization: HH-RLHF, WebGPT, or Summarization from Feedback
    levels:
    - HH-RLHF
    - WebGPT
    - Summarization from Feedback
  - name: Encoder model
    type: categorical
    operationalization: Pretrained language model for embedding extraction
    levels:
    - RoBERTa-base
    - DeBERTa-v3-base
    - SentenceTransformer-mpnet
  - name: Violation type
    type: categorical
    operationalization: Category of alignment failure
    levels:
    - toxicity
    - misinformation
    - instruction-following
  dependent:
  - name: Classification F1 score
    type: continuous
    operationalization: Harmonic mean of precision and recall on chosen/rejected classification,
      range 0-1
    primary: true
  - name: AUROC after lexical ablation
    type: continuous
    operationalization: Area under ROC curve after masking refusal tokens and safety
      lexicon, range 0.5-1.0
    primary: false
  - name: Spearman correlation (severity-distance)
    type: continuous
    operationalization: Rank correlation between manifold distance and human severity
      judgments, range -1 to 1
    primary: false
  controlled:
  - name: Train/test split
    operationalization: 80/20 stratified by violation type
  - name: Random seed
    operationalization: Fixed seeds (42, 123, 456) for reproducibility
  - name: Embedding extraction
    operationalization: CLS token pooling from pretrained encoders
causal_mechanism:
  causal_chain_count: 4
  steps:
  - step: 1
    description: Human annotators evaluate response pairs under helpfulness/harmlessness
      criteria, rejecting responses that violate safety principles
    evidence: HH-RLHF annotation guidelines (Bai et al., 2022) specify explicit harmlessness
      criteria
    falsifier: Base-rate audit shows <40% genuine violations in rejected samples
  - step: 2
    description: Aggregation of 160K+ rejection judgments creates high-density sampling
      of alignment failure space
    evidence: HH-RLHF dataset size and annotation methodology
    falsifier: Rejected responses show random distribution in embedding space (no
      clustering)
  - step: 3
    description: 'Rejected responses form clusters in embedding space with geometric
      properties: distance encodes severity, PC directions encode violation types'
    evidence: Geometric separability tests (MANOVA, PCA) on embedded responses
    falsifier: Single dominant PC explains >80% variance OR PC axes fail to align
      across encoders
  - step: 4
    description: Geometric structure is stable across encoders and generalizes to
      new model families
    evidence: Cross-encoder PC alignment (cosine ≥0.70) and cross-dataset transfer
      (F1 ≥0.65)
    falsifier: Transfer F1 <0.55 OR encoder-specific PC rotation (cosine <0.60)
  key_tension: Whether rejected responses encode genuine alignment violations vs.
    marginal preference differences - resolved by base-rate audit threshold (p ≥ 0.40)
  evidence_summary: HH-RLHF annotation guidelines, geometric separability in embeddings,
    cross-model transfer validation, encoder-robust PC structure
key_assumptions:
- id: A1
  assumption: 'Base-rate sufficiency: HH-RLHF harmless subset contains ≥40% genuine
    policy violations'
  supporting_evidence: HH-RLHF paper describes explicit harmlessness annotation criteria
  consequence_if_violated: If p < 0.40, label noise dominates and manifold structure
    cannot be reliably learned
- id: A2
  assumption: 'Semantic encoding: Pretrained LM embeddings capture alignment-relevant
    features beyond surface lexical patterns'
  supporting_evidence: Lexical ablation tests (Exp 5, 7) validate semantic robustness
  consequence_if_violated: Detector becomes refusal-template classifier, not alignment
    detector
- id: A3
  assumption: 'Cross-model stability: Alignment failure patterns are sufficiently
    model-agnostic to transfer'
  supporting_evidence: Cross-dataset transfer experiments (Exp 3, 6)
  consequence_if_violated: Structure is model-specific preference artifact, not reusable
    benchmark
- id: A4
  assumption: 'Encoder invariance: Geometric structure exists in data, not as encoder
    artifact'
  supporting_evidence: Cross-encoder PC alignment test (Exp 12)
  consequence_if_violated: Manifold is representation-dependent illusion, not intrinsic
    structure
- id: A5
  assumption: 'Violation orthogonality: Different failure types occupy distinct embedding
    regions'
  supporting_evidence: Multi-axis separability test (Exp 8)
  consequence_if_violated: Structure collapses to single dominant axis, limiting zero-shot
    detection
scope:
  applies_to: RLHF preference datasets with harmlessness annotations (HH-RLHF, WebGPT,
    Summarization from Feedback), conversational AI safety evaluation using existing
    pretrained encoders, cross-model harmlessness assessment without new annotation,
    violation types present in training data (toxicity, misinformation, instruction-following)
  does_not_apply_to: Helpfulness-only preferences (outside harmlessness scope), novel
    violation types not in HH-RLHF (jailbreak attacks, prompt injection), non-conversational
    tasks (code generation, reasoning, tool use), models with radically different
    response distributions
  known_limitations: Requires base-rate ≥40% genuine violations for geometric structure,
    transfer degrades under extreme distribution shift, annotation bias from HH-RLHF
    annotator pool may limit cultural/temporal generalization, single-language analysis
    (English only)
predictions:
- id: P1
  primary: true
  statement: Euclidean distance in embedding space between rejected and chosen responses
    correlates with human-judged violation severity (Spearman ρ ≥ 0.65)
  test_method: Sample 300 triplets (low, medium, high severity) from rejected responses;
    measure manifold distance to chosen centroid; compute Spearman correlation
  success_criterion: Spearman ρ ≥ 0.65 AND triplet ordering preserved in ≥80% of cases
  falsification: If ρ < 0.50 or ordering preservation <60%, continuous structure claim
    rejected
- id: P2
  primary: true
  statement: Rejected responses cluster along ≥3 orthogonal axes corresponding to
    distinct violation types (toxicity, misinformation, instruction-following)
  test_method: MANOVA on embeddings labeled by violation type; compute effect sizes
    for each PC
  success_criterion: ≥3 PCs with Cohen's d ≥ 0.5; no single PC explains >80% variance
  falsification: If only 1-2 PCs with d ≥ 0.5, or single PC >80% variance, multi-dimensional
    claim rejected
- id: P3
  primary: false
  statement: Geometric structure is encoder-robust (intrinsic to data, not encoder-specific)
  test_method: Extract PCs from RoBERTa, DeBERTa, SentenceTransformer; compute pairwise
    cosine similarity of PC directions
  success_criterion: Top-3 PC cosine similarity ≥ 0.70 for all encoder pairs
  falsification: If any pair <0.60, structure is representation-dependent artifact
experimental_setup:
  dataset:
    name: HH-RLHF harmless subset + WebGPT + Summarization from Feedback
    type: standard
    source: Anthropic, OpenAI (publicly available)
    path: https://huggingface.co/datasets/Anthropic/hh-rlhf
    hypothesis_fit: Contains 160K+ validated chosen/rejected pairs with explicit harmlessness
      annotations
  model:
    name: RoBERTa-base (primary) + DeBERTa-v3-base + SentenceTransformer
    type: pretrained encoder
    source: HuggingFace Transformers
    hypothesis_fit: Semantic encoders capture alignment-relevant features for geometric
      analysis
  baselines:
  - name: TF-IDF Logistic Regression
    method: Surface feature baseline (length, lexical overlap, sentiment)
  - name: Bradley-Terry Reward Model
    method: Standard RLHF reward modeling approach
  - name: Random Classifier
    method: AUROC = 0.5 baseline for reference
novelty:
  preserved_novelty: First work to frame RLHF preference data as containing discoverable
    geometric structure of alignment failures, enabling reusable cross-model safety
    evaluation without new annotation
  key_innovation: Transition from black-box reward modeling to interpretable geometric
    alignment maps with explicit semantic axes (distance = severity, direction = violation
    type)
  differentiation:
  - prior_work: RLHF trains reward models (black box)
    difference: Extract interpretable geometric structure with semantic meaning
  - prior_work: Reward models require retraining per model
    difference: Manifold structure generalizes cross-model without retraining
  - prior_work: Preference data consumed for training
    difference: Preference data as persistent alignment benchmark infrastructure
related_work:
  baselines:
  - method: TF-IDF + Logistic Regression
    performance: Expected F1 ≈ 0.60-0.65
    dataset: HH-RLHF
    why_insufficient: Surface features lack semantic understanding of alignment violations
  - method: Bradley-Terry Reward Model
    performance: Expected F1 ≈ 0.70-0.75
    dataset: HH-RLHF
    why_insufficient: Black-box model without interpretable geometric structure
  best_baseline_performance: F1 ≈ 0.70 (reward model), but lacks interpretability
    and geometric insights
phase2b_readiness:
  status: READY
  sh1_existence: HH-RLHF harmless subset must contain ≥40% genuine policy violations
    (validated via Experiment 0 base-rate audit)
  sh2_mechanism: Geometric structure emerges from aggregated human judgments, with
    distance encoding severity and PCs encoding violation types
  sh3_comparison: Cross-model transfer and reward model comparison demonstrate manifold
    encodes different information than standard RLHF
  open_questions:
  - What is the minimum viable violation base-rate for manifold emergence?
  - Can we achieve zero-shot detection for novel violation types via geometric proximity?
  - How does manifold structure evolve across model generations?
decision:
  overall_status: VALIDATED
  discussion_convergence: 'All 6 convergence criteria met after 15 exchanges: specific
    core claim formulated, causal mechanism explained through 4-step chain, 3 testable
    predictions with falsification criteria, novelty articulated as paradigm shift
    from reward modeling to geometric alignment maps, feasibility validated through
    12-experiment design, major objections addressed via base-rate audit and encoder
    robustness tests'
  clarity_verified: true
  remaining_objections:
  - Base-rate dependency (requires p ≥ 0.40 genuine violations)
  - Reward model redundancy (requires Experiment 11 differentiation)
  - Style entanglement (requires stylistic normalization controls)
