    notes: PRIMARY success criterion - Cohen's kappa is core validation
  h-m4:
    type: MECHANISM
    statement: Under the scope of the taxonomy validated on TruthfulQA (H-M3), if
      we apply the same taxonomy to 100 sampled MMLU items with the same expert protocol,
      then we achieve Cohen's kappa ≥0.6, because the taxonomy captures fundamental
      LLM error modes not TruthfulQA-specific artifacts (cross-benchmark transfer
      validates systematic patterns).
    status: NOT_STARTED
