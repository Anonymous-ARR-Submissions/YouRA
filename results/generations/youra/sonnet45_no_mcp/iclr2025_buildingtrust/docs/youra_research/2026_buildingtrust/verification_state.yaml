  h-m1:
    type: MECHANISM
    statement: Under the scope of TruthfulQA questions with extracted metadata features
      (question type, topic, answer format, complexity, linguistic patterns), if we
      compute correlation with category-level error rates, then we observe significant
      positive correlation (Spearman ρ ≥0.4) between metadata features and errors,
      because metadata captures intrinsic difficulty that transcends individual model
      implementations (supported by Item Response Theory).
    status: NOT_STARTED
    gate:
      type: MUST_WORK
      satisfied: null
      condition: ≥2 features show ρ ≥0.4 with p < 0.05
    prerequisites:
    - h-e1
    success_criteria:
      primary: ≥2 features show ρ ≥0.4 with p < 0.05
      secondary: Cross-model consistency (same features correlate across all 3 families)
    experiment_design:
      status: NOT_STARTED
      file: null
    implementation_planning:
      status: NOT_STARTED
      tasks_file: null
    validation:
      status: NOT_STARTED
      result: null
      metrics: {}
    version: 1
    completed: false
    source_section: Phase 2A Causal Step 1
  h-m2:
    type: MECHANISM
    statement: Under the scope of TruthfulQA items with correlated metadata features,
      if we apply weak supervision clustering using category-level error rates as
      noisy labels, then we achieve within-category variance <50% of between-category
      variance, because category-level rates propagate via shared features enabling
      item-level clustering despite coarse supervision.
    status: NOT_STARTED
    gate:
      type: SHOULD_WORK
      satisfied: null
      condition: Variance ratio <0.5
    prerequisites:
    - h-m1
    success_criteria:
      primary: Variance ratio <0.5 (clusters more distinct than random)
      secondary: Cluster stability >0.7 (consistent across bootstrap samples)
    experiment_design:
      status: NOT_STARTED
      file: null
    implementation_planning:
      status: NOT_STARTED
      tasks_file: null
    validation:
      status: NOT_STARTED
      result: null
      metrics: {}
    version: 1
    completed: false
    source_section: Phase 2A Causal Step 2
  h-m3:
    type: MECHANISM
    statement: Under the scope of clustered error patterns from H-M2, if we recruit
      3 NLP/LLM experts with standardized annotation instructions to categorize 100
      TruthfulQA items independently, then we achieve Cohen's kappa ≥0.7 between expert
      categories and taxonomy categories, because experts recognize interpretable
      systematic patterns (validated by inter-rater reliability IRR ≥0.6).
    status: NOT_STARTED
    gate:
      type: SHOULD_WORK
      satisfied: null
      condition: Cohen's kappa ≥0.7 AND expert IRR ≥0.6
    prerequisites:
    - h-m2
    success_criteria:
      primary: Cohen's kappa ≥0.7 AND expert IRR ≥0.6
      secondary: ≥80% of top-3 features per category rated interpretable by majority
    experiment_design:
