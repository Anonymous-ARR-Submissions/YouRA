# ADVERSARIAL REVIEW TARGETS (PHASE 6.5 FOCUS AREAS)
# ============================================================================

adversarial_targets:
  target_1_overclaim:
    area: "Abstract and Conclusion"
    risk: "Claiming taxonomy generation feasibility when only data availability validated"
    check: "Does paper distinguish between 'data exists' vs 'taxonomy works'?"
    ground_truth: "Paper explicitly states 'taxonomy generation mechanism remains untested' (07_conclusion.md)"
    verdict: "SAFE (properly scoped)"

  target_2_completeness_artifact:
    area: "Results section (100% completeness claim)"
    risk: "Presenting curated extraction result as if automated parsing succeeded"
    check: "Does paper disclose manual extraction method?"
    ground_truth: "Disclosed in Results Table 2 and Discussion Section 'Curated extraction method'"
    verdict: "SAFE (limitation disclosed)"

  target_3_hypothesis_chain:
    area: "Discussion limitations"
    risk: "Downplaying that 4/5 hypotheses untested (h-m1 through h-m4)"
    check: "Does paper acknowledge verification gap?"
    ground_truth: "Discussion explicitly states 'mechanism (h-m1 through h-m4) remains completely untested'"
    verdict: "SAFE (gap acknowledged)"

  target_4_generalization:
    area: "Conclusion future directions"
    risk: "Implying findings generalize beyond 3 frontier labs"
    check: "Does paper scope limitations appropriately?"
    ground_truth: "Discussion Section 'Scope limited to frontier labs' acknowledges limited coverage"
    verdict: "SAFE (scope acknowledged)"

  target_5_temporal_analysis:
    area: "Prediction P4 (temporal improvement)"
    risk: "Claiming temporal improvement patterns without performing analysis"
    check: "Does paper claim temporal results?"
    ground_truth: "Results extract data for both timepoints but do not claim improvement analysis"
    verdict: "SAFE (data extraction only, no analysis claims)"

