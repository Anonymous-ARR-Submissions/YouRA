scope:
  applies_to: |
    LLM benchmarks with published category-level results, rich metadata, 
    sufficient sample size, knowledge/reasoning focus. Models: autoregressive LLMs.
  does_not_apply_to: |
    Internal evaluations, benchmarks without metadata, non-knowledge tasks,
    multimodal models, very small benchmarks (<100 items).
  known_limitations: |
    Category-level supervision is coarse. Expert validation requires budget.
    Temporal analysis limited to 2 timepoints. Cross-benchmark tested only once.

