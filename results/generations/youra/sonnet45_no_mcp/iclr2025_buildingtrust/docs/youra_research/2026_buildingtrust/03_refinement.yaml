      levels: ["question_type", "topic", "answer_format", "complexity", "linguistic_patterns"]
    - name: "Model Generation"
      type: "categorical"
      operationalization: "Baseline (GPT-3.5, Claude-2, Llama-2) vs Current (GPT-4, Claude-3, Llama-3)"
      levels: ["baseline", "current"]
  dependent:
    - name: "Expert-Taxonomy Agreement"
      type: "continuous"
      operationalization: "Cohen's kappa coefficient, range -1.0 to 1.0, success ≥0.7"
