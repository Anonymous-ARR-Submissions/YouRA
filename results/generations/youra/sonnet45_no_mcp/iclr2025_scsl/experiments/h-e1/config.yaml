experiment:
  name: "h-e1-eigenvalue-ordered-learning"
  hypothesis_id: "h-e1"
  hypothesis_type: "EXISTENCE"
  seed: 42
  device: "cuda"

data:
  dataset: "california_housing"
  source: "sklearn"
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  standardize: true

model:
  type: "EigenspectrumLinearRegression"
  n_features: 8
  bias: true

training:
  optimizer: "SGD"
  learning_rate: 0.01
  momentum: 0.0
  weight_decay: 0.0
  batch_size: "full"
  max_epochs: 6000
  learning_rate_constraint: 0.2

hitting_time:
  epsilon: 0.1
  method: "relative"

evaluation:
  metrics:
    - "spearman_correlation"
    - "r2_score"
  thresholds:
    spearman_min: 0.9
    r2_min: 0.9

visualization:
  generate: true
  formats: ["png"]
  dpi: 300
  figures:
    - "eigenvalue_spectrum"
    - "hitting_time_scatter"
    - "convergence_trajectories"
    - "predicted_vs_observed"
    - "training_loss"

output:
  results_file: "experiments/h-e1/results.yaml"
  figures_dir: "experiments/h-e1/figures"
  checkpoint_dir: "experiments/h-e1/checkpoints"
  log_level: "INFO"
