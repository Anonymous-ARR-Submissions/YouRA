# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-GeometricRobustness-v1"
  confidence_level: 0.80
  core_hypothesis_statement: |
    Under standard ERM training on datasets with spurious correlations (Waterbirds, CelebA),
    if we measure curvature subspace orientation via Marchenko-Pastur-defined Hessian outlier eigenvectors,
    then solutions with high minority-gradient alignment to this subspace will exhibit poor worst-group accuracy,
    because SGD dynamics preferentially flow along locally flat directions away from sharp, spurious-feature-aligned curvature concentrations.
  alternative_hypothesis_h0: |
    There is no systematic relationship between Marchenko-Pastur subspace alignment A(w) and worst-group accuracy.
    Geometric curvature orientation does not predict or explain robustness to distribution shift.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Training Method"
      type: "categorical"
      operationalization: "ERM vs group-DRO (manipulated via loss function)"
      levels: ["ERM", "group-DRO", "FGE-sampled"]
  dependent:
    - name: "Curvature Subspace Alignment A(w)"
      type: "continuous"
      operationalization: "||P_S_out g_minority||² / ||g_minority||², where S_out = eigenvectors above Marchenko-Pastur bulk edge"
      primary: true
    - name: "Worst-Group Accuracy"
      type: "continuous"
      operationalization: "Min accuracy across subgroups, range [0,100]%, measured on test set"
      primary: true
    - name: "Top Eigenvalue λ_max"
      type: "continuous"
      operationalization: "Largest Hessian eigenvalue via power iteration"
      primary: false
  controlled:
    - name: "Batch Size"
      operationalization: "Fixed at {32, 128, 512} across experiments to verify orientation stability"
    - name: "Architecture"
      operationalization: "ResNet-50 across all experiments for consistency"
    - name: "Random Seed"
      operationalization: "20 independent seeds per condition for statistical power"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Spurious features create sharp curvature concentrated in specific Hessian eigenspace subspaces"
      evidence: "Sagun et al. show Hessian outliers align with data structure via Gauss-Newton decomposition"
      falsifier: "If spurious and core solutions show indistinguishable eigenvalue spectra"
    - step: 2
      description: "These sharp directions align with minority-group gradient directions (high A(w))"
      evidence: "Minority groups expose spurious correlations; gradients on minority samples point toward spurious-feature directions"
      falsifier: "If minority gradients project equally onto top eigenspaces in ERM and DRO solutions"
    - step: 3
      description: "SGD dynamics preferentially follow locally flat directions to minimize curvature-induced gradient variance"
      evidence: "Well-known SGD implicit bias toward flat minima; Garipov shows abundance of low-loss flat directions"
      falsifier: "If SGD trajectories show no directional bias or early A(w) doesn't predict final robustness"
    - step: 4
      description: "Solutions converge to regions with lower A(w) exhibit better worst-group robustness"
      evidence: "Functional coupling between geometry and phenotype within mode-connected manifolds"
      falsifier: "If FGE samples show geometric variation without phenotype variation, or linear interpolation shows no monotonic coupling"
  key_tension: "Mode connectivity (Garipov) vs geometric distinction—resolved via 'distinct regions within connected manifold' framework"
  evidence_summary: |
    Chain links Gauss-Newton structure (Sagun) → minority gradient alignment → SGD implicit flatness bias → robustness outcomes.
    Each step independently testable and falsifiable.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Marchenko-Pastur bulk edge accurately identifies signal vs noise eigenvalue threshold"
    supporting_evidence: "Random matrix theory for large over-parameterized networks; validated in Sagun et al."
    consequence_if_violated: "Subspace definition becomes arbitrary, alignment metric unstable"
  - id: "A2"
    assumption: "Minority-group gradients reliably indicate spurious-vs-core feature directions"
    supporting_evidence: "Group-DRO theory: minority groups expose shortcuts; worst-group accuracy measures spurious reliance"
    consequence_if_violated: "Alignment metric overfits subgroup sampling noise rather than structural geometry"
  - id: "A3"
    assumption: "Curvature orientation is more stable than magnitude across batch sizes and parameterizations"
    supporting_evidence: "Sagun shows magnitude depends on batch size; orientation reflects data structure"
    consequence_if_violated: "Geometric signature collapses under hyperparameter variation"
  - id: "A4"
    assumption: "SGD implicit bias toward flat directions creates directional flow in optimization dynamics"
    supporting_evidence: "Extensive literature on flatness-generalization link; SAM (Foret 2020) exploits this"
    consequence_if_violated: "No mechanism linking local geometry to trajectory preference"
  - id: "A5"
    assumption: "Mode connectivity doesn't preclude functional variation within connected components"
    supporting_evidence: "Garipov shows connectivity; Sagun shows geometric variation within basins"
    consequence_if_violated: "FGE test would show geometric variation without phenotype shifts"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Supervised learning on classification tasks with spurious correlations
    - Deep neural networks with sufficient over-parameterization (M≥N regime)
    - Benchmarks with ground-truth subgroup labels (Waterbirds, CelebA, Colored MNIST)
    - Standard SGD-based optimization (including variants like Adam, momentum)
  does_not_apply_to: |
    - Under-parameterized models (M<<N) where Marchenko-Pastur assumptions break
    - Unsupervised or self-supervised learning (no labels → no minority gradients)
    - Tasks without distribution shift structure (no spurious correlations to detect)
    - Non-gradient-based optimization (evolutionary algorithms, MCMC)
  known_limitations: |
    - Requires group labels for validation (though not for training)
    - Hessian computation scales as O(N·M) per eigenvalue; tractable but not trivial
    - Marchenko-Pastur edge estimation requires statistical fitting; sensitive to tail behavior
    - Parameterization invariance not guaranteed; requires explicit symmetry controls

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "ERM solutions exhibit significantly higher MP-subspace alignment A(w) than group-DRO solutions"
    test_method: "Train 20 seeds each ERM/DRO on Waterbirds; compute A(w) at convergence; two-sample t-test"
    success_criterion: "p<0.01, Cohen's d>0.8, stable across 3 batch sizes (32,128,512)"
    falsification: "If distributions overlap (d<0.5) or effect disappears under batch variation"
  - id: "P2"
    primary: true
    statement: "Along FGE-sampled paths, curvature alignment and worst-group accuracy covary"
    test_method: "FGE training with M=20 checkpoints; compute Spearman ρ(A(w), WGA)"
    success_criterion: "ρ>0.6, p<0.01"
    falsification: "If ρ<0.3 or p>0.05 (geometry doesn't functionally encode robustness)"
  - id: "P3"
    primary: true
    statement: "Early-epoch alignment A(w) predicts final worst-group accuracy beyond scalar flatness"
    test_method: "At 10% training, measure A(w) and λ_max; regress final WGA on both; test incremental R²"
    success_criterion: "A(w) significant (p<0.01), incremental R²>10% beyond λ_max+loss"
    falsification: "If A(w) becomes non-significant when λ_max is controlled"
  - id: "P4"
    primary: false
    statement: "Geometry-robustness correlation survives 10% minority label noise"
    test_method: "Repeat E1 with random 10% label flips in minority group"
    success_criterion: "Effect size >50% of clean-data effect"
    falsification: "If correlation collapses to near-zero"
  - id: "P5"
    primary: false
    statement: "Linear interpolation shows monotonic A(w)-WGA coupling without path optimization"
    test_method: "Sample θ(t)=(1-t)θ_ERM + tθ_DRO, t∈[0,1]; compute Spearman ρ(A(θ(t)), WGA(θ(t)))"
    success_criterion: "ρ>0.7"
    falsification: "If non-monotonic or ρ<0.4"

