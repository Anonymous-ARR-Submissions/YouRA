# ═══════════════════════════════════════════════════════════════════════════════
# PART 1: HOOK & MOTIVATION
# ═══════════════════════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: |
      Deep neural networks routinely achieve over 90% average accuracy on benchmark datasets, yet fail on 25-40% of minority subgroups when spurious correlations are present—a pattern observed across medical diagnosis systems, facial recognition, and natural language understanding.
    strategy: "practical_failure_with_statistics"

  why_reader_should_care:
    main_reason: "Spurious correlation exploitation is a fundamental barrier to deploying ML systems in high-stakes domains where worst-group performance determines safety and fairness"
    concrete_example: "On the Waterbirds benchmark, standard ERM training achieves 89% average accuracy but only 72% on minority groups (landbirds on water backgrounds), while a model trained with robust optimization achieves 88% worst-group accuracy"
    stakes: "Without understanding WHY models exploit shortcuts, we cannot design principled interventions beyond expensive group-labeled training or post-hoc patching"

  real_world_impact:
    application_domain: "Medical diagnosis (subgroup bias), facial recognition (demographic fairness), autonomous systems (distribution shift robustness)"
    potential_beneficiaries: "ML practitioners deploying models in production, researchers studying model generalization, policymakers regulating AI systems"
    scale_of_impact: "Affects millions of deployed ML systems across healthcare, finance, and public services where worst-case performance determines deployment viability"

# ─────────────────────────────────────────────────────────────────────────────
# PROBLEM FRAMING
# ─────────────────────────────────────────────────────────────────────────────

problem_framing:
  surface_problem:
    description: "Deep learning models exploit spurious correlations (dataset biases) instead of learning core features, leading to poor worst-group accuracy under distribution shift"
    common_understanding: "Community knows this happens (Waterbirds, CelebA benchmarks), existing solutions like Group-DRO require expensive group labels during training"

  deeper_problem:
    description: "We lack a geometric understanding of WHY gradient-descent optimization preferentially converges to spurious-correlation solutions rather than core-feature solutions"
    why_overlooked: "Prior work focused on designing robustification methods (Group-DRO, IRM, SAM) rather than analyzing the optimization dynamics that cause the problem"
    our_perspective: "Loss landscape geometry—specifically curvature subspace orientation—reveals the mechanism: SGD flows toward locally flat directions, and spurious features create sharp curvature that guides this flow"

  gap_in_existing_work:
    description: "No diagnostic framework exists to detect spurious correlation exploitation from loss landscape geometry without requiring group labels or intervention during training"
    why_gap_exists: "Technical: Hessian analysis is computationally expensive and requires principled noise/signal separation (Marchenko-Pastur theory). Conceptual: Community assumed solutions (methods) not foundations (mechanisms)"
    why_gap_matters: "Cannot predict which models will fail under distribution shift, cannot design optimization-informed interventions, cannot understand when/why robustification works"

# ═══════════════════════════════════════════════════════════════════════════════
# PART 2: THE INSIGHT
# ═══════════════════════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: "Spurious correlations create sharp curvature concentrations in specific Hessian eigenspace subspaces, and SGD's implicit bias toward flat minima causes it to flow away from these sharp directions—but minority-group gradients point directly into them."
    expanded_explanation: |
      When ERM training exploits spurious correlations, the loss landscape develops concentrated sharp curvature (outlier eigenvalues) aligned with spurious features. Group-DRO solutions, which learn core features, exhibit flatter curvature distributed across the bulk eigenvalue spectrum. This geometric signature is measurable via Marchenko-Pastur-defined alignment: the fraction of minority-group gradient variance explained by sharp curvature subspaces.

  why_others_missed_it:
    common_assumptions: "Prior work assumed intrinsic feature properties (complexity, separability) determine learning order, or focused on scalar flatness (sharpness-aware methods like SAM) without analyzing orientation"
    our_different_view: "We analyzed curvature ORIENTATION relative to subgroup gradients, not just magnitude. This reveals that spurious vs. core features occupy geometrically distinct regions defined by Hessian subspace structure"
    enabling_factor: "Three previous hypothesis failures (ROUTE_TO_0 recovery) showed that task-alignment dominates intrinsic properties—this failure pattern redirected us from feature properties to optimization dynamics"

  what_makes_it_work:
    intuitive_explanation: "Think of the loss landscape as a valley with different regions having different surface textures. Spurious features create 'spiky' terrain (sharp curvature), while core features create 'smooth' terrain (flat curvature). SGD naturally walks toward smooth regions, but minority samples point toward the spikes—revealing where spurious correlations concentrate"
    key_mechanism: "Marchenko-Pastur random matrix theory separates signal (outlier eigenvalues) from noise (bulk spectrum), enabling intrinsic definition of sharp vs. flat subspaces. Minority-gradient alignment to outlier subspace quantifies spurious correlation exploitation"
    analogy: "Like a metal detector distinguishing signal from background noise—MP bulk edge is the threshold, outliers are the 'signal', and alignment measures how strongly minority gradients point toward that signal"

# ═══════════════════════════════════════════════════════════════════════════════
# PART 3: EVIDENCE STORY
# ═══════════════════════════════════════════════════════════════════════════════

evidence_narrative:
  main_claim:
    statement: "ERM solutions exhibit significantly higher curvature subspace alignment than Group-DRO solutions, explained by sharp curvature concentration and SGD directional bias"
    measurable_criteria: "Alignment difference Δ > 0.3, Cohen's d > 0.8, statistical significance p < 0.01, validated across mechanism components"

  supporting_evidence:
    - id: "evidence_1"
      what: "ERM alignment A(w) = 72.3% vs DRO alignment 31.6% (Δ = 40.8 pp, d = 1.87, p = 0.0023)"
      so_what: "Establishes that geometric signature exists and is large enough to be diagnostic—this is not a subtle effect but a fundamental distinction"
      how_it_supports_claim: "Directly validates existence hypothesis (H-E1): solutions occupying different geometric regions can be reliably distinguished"

    - id: "evidence_2"
      what: "ERM exhibits 23 outlier eigenvalues vs DRO's 15 outliers (+53.3%, max eigenvalue ratio 1.43)"
      so_what: "Shows mechanism step 1: sharp curvature CONCENTRATES in discrete subspaces (not diffusely distributed), validating Marchenko-Pastur signal/noise separation"
      how_it_supports_claim: "Explains WHY alignment differs: ERM has more concentrated sharp curvature for minority gradients to align with"

    - id: "evidence_3"
      what: "SGD trajectory shows directional bias of 0.15 toward bulk (flat) directions over outlier (sharp) directions (p = 0.023)"
      so_what: "Confirms mechanism step 3: optimization dynamics have measurable preference for flat regions, not just final solutions"
      how_it_supports_claim: "Links geometry to optimization process: high ERM alignment emerges from SGD avoiding sharp curvature that spurious features create"

    - id: "evidence_4"
      what: "Minority gradient alignment hypothesis (H-M2) untested due to random basis limitation; geometry-phenotype coupling (H-M4) refuted (ρ = 0.045, p = 0.85)"
      so_what: "Honest limitations: mechanism chain incomplete, predictive coupling not validated—shifts contribution from 'complete theory' to 'diagnostic framework + partial mechanism'"
      how_it_supports_claim: "Defines scope: validated components (geometric signature, curvature concentration, SGD bias) support diagnostic value without overclaiming predictive power"

  surprising_findings:
    finding: "No correlation between geometric alignment and worst-group accuracy along interpolation paths (ρ = 0.045), contradicting prediction P2"
    why_surprising: "Expected geometry to functionally encode robustness (mode connectivity theory suggests connected solutions share properties), but interpolation paths showed geometric variation without phenotype coupling"
    our_interpretation: "Coupling may require convergence (not intermediate checkpoints) or specific path optimization (FGE with full training). Alternatively, geometry is diagnostic of training regime (ERM vs DRO) but not predictive within a regime"

  what_results_mean:
    synthesis: |
      We have established a geometric diagnostic framework: Marchenko-Pastur alignment reliably distinguishes ERM from robust training (d=1.87), explained by curvature concentration (53% more outliers) and SGD directional bias (0.15 toward flatness). However, the mechanism chain is incomplete—minority gradient alignment requires real Hessian eigenvectors (not random basis), and functional coupling between geometry and worst-group accuracy is not validated. The contribution is a diagnostic tool with partial mechanistic understanding, not a complete causal theory.
    confidence_level: "High confidence (0.85) in validated components (H-E1, H-M1, H-M3); low confidence (0.30) in invalidated components (H-M2, H-M4)"
    caveats: "Single dataset (Waterbirds), single architecture (ResNet-50), PoC training (1 seed for H-E1, 5 epochs for H-M2/M4), random basis limitation (H-M2)"

