# PART 4: BROADER IMPACT
# ═══════════════════════════════════════════════════════════════════════════════

takeaway:
  main_contribution:
    one_sentence: "First geometric diagnostic framework for spurious correlation detection using Marchenko-Pastur-defined curvature subspace alignment, with partial mechanistic validation of why SGD exploits shortcuts"
    why_significant: "Shifts focus from 'how to fix' (robustification methods) to 'why it breaks' (optimization foundations), enabling principled intervention design and label-free spurious correlation detection"

  implications:
    for_field: |
      - Establishes loss landscape geometry as a lens for understanding spurious correlation exploitation
      - Provides falsifiable mechanism decomposition (5-step chain with per-step validation)
      - Demonstrates that Marchenko-Pastur theory from random matrix analysis applies to deep learning robustness
      - Opens research direction: geometry-informed optimization (early stopping, curvature regularization)
    for_practice: |
      - Diagnostic tool: Compute A(w) post-training to detect likely spurious correlation exploitation without group labels
      - Training monitoring: Track alignment during optimization to trigger intervention before spurious lock-in
      - Model selection: Use geometric signature as tie-breaker when worst-group accuracy unknown
    conceptual_contribution: |
      - Reframes spurious correlations from 'feature property problem' to 'optimization dynamics problem'
      - Shows that curvature ORIENTATION (not just magnitude/flatness) reveals robustness structure
      - Demonstrates value of null-hypothesis-driven validation: H-M2/M4 failures define scope honestly

  future_possibilities:
    immediate_extensions: |
      - Complete H-M2 with real Hessian eigenvectors (4-6 hours)
      - Extend H-M4 with full training protocol (100 epochs, FGE with cyclical LR)
      - Cross-validate on CelebA, Colored MNIST (3 weeks)
      - Test architecture invariance: ViT, WRN, ShallowCNN (4 weeks)
    longer_term_vision: |
      - Interventional geometry modification: SAM-inspired flatness, curvature regularization, alignment-guided early stopping
      - Deploy as practical diagnostic tool: 10-dataset benchmark, training monitoring system
      - Extend to self-supervised learning (where minority gradients ill-defined)
      - Theoretical: Prove conditions under which geometry-phenotype coupling holds
    open_questions: |
      - Why does geometry-phenotype coupling fail along interpolation paths but succeed at endpoints?
      - How does parameterization invariance affect alignment stability across layer types?
      - Can we design optimization that explicitly minimizes alignment during training?

