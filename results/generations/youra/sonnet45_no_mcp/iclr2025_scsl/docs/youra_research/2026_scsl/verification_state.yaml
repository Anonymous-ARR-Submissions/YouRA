main_hypothesis:
  id: H-GeometricRobustness-v1
  title: Loss Landscape Geometry and Spurious Correlation Robustness
  statement: Under standard ERM training on datasets with spurious correlations (Waterbirds, CelebA), if we measure curvature
    subspace orientation via Marchenko-Pastur-defined Hessian outlier eigenvectors, then solutions with high minority-gradient
    alignment to this subspace will exhibit poor worst-group accuracy, because SGD dynamics preferentially flow along locally
    flat directions away from sharp, spurious-feature-aligned curvature concentrations.
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: Waterbirds (primary), CelebA + Colored MNIST (cross-validation)
    model: ResNet-50
    optimizer: SGD
    hyperparameters:
      batch_sizes:
      - 32
      - 128
      - 512
      seeds: 20
      architecture: ResNet-50
