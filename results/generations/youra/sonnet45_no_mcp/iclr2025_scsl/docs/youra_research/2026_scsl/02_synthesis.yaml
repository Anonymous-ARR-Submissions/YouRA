# ═══════════════════════════════════════════════════════════════
# Hypothesis Draft Summary
# ═══════════════════════════════════════════════════════════════

hypothesis_draft:
  hypothesis_id: "H-GeometricRobustness-v1"
  one_sentence_summary: "Curvature subspace orientation relative to minority gradients (measured via Marchenko-Pastur-defined Hessian outlier alignment) predicts worst-group robustness because SGD preferentially flows along flat directions away from sharp, spurious-feature-aligned concentrations."
  core_claim: "Solutions with high minority-gradient alignment to Marchenko-Pastur outlier subspaces exhibit poor worst-group accuracy under standard ERM training."
  confidence_level: 0.80
  novelty: "First mechanistic explanation linking loss landscape geometry (curvature orientation) to spurious correlation robustness via intrinsic, distribution-shift-aware subspace definitions."

# ═══════════════════════════════════════════════════════════════
# Variables Summary
# ═══════════════════════════════════════════════════════════════

variables_summary:
  independent_variables:
    - name: "Training Method"
      type: "categorical"
      levels: ["ERM", "group-DRO", "FGE-sampled"]
      manipulation: "Modified via loss function (standard cross-entropy vs robust reweighting vs cyclic learning rate)"
  dependent_variables:
    - name: "Curvature Subspace Alignment A(w)"
      type: "continuous"
      measurement: "||P_S_out g_minority||² / ||g_minority||², where S_out = eigenvectors above Marchenko-Pastur bulk edge"
      role: "Geometric signature (predictor)"
    - name: "Worst-Group Accuracy"
      type: "continuous"
      measurement: "Min accuracy across subgroups on test set, range [0,100]%"
      role: "Robustness phenotype (outcome)"
    - name: "Top Eigenvalue λ_max"
      type: "continuous"
      measurement: "Largest Hessian eigenvalue via power iteration"
      role: "Baseline scalar flatness (control)"
  controlled_variables:
    - "Batch size (32, 128, 512)"
    - "Architecture (ResNet-50)"
    - "Random seed (20 independent runs per condition)"

# ═══════════════════════════════════════════════════════════════
# Null Hypothesis
# ═══════════════════════════════════════════════════════════════

null_hypothesis:
  statement: "There is no systematic relationship between Marchenko-Pastur subspace alignment A(w) and worst-group accuracy. Geometric curvature orientation does not predict or explain robustness to distribution shift."
  falsification_criteria:
    - "ERM and DRO solutions show overlapping A(w) distributions (Cohen's d < 0.5)"
    - "Early-epoch A(w) fails to predict final robustness when controlling for scalar flatness (p > 0.05)"
    - "FGE samples show geometric variation without phenotype variation (ρ < 0.3)"
    - "Linear interpolation shows non-monotonic or weak coupling (ρ < 0.4)"
    - "Effect collapses under minor perturbations (10% label noise, batch size variation)"

# ═══════════════════════════════════════════════════════════════
# Novelty Assessment
# ═══════════════════════════════════════════════════════════════

novelty_assessment:
  primary_contribution: "First mechanistic framework linking loss landscape curvature ORIENTATION to spurious correlation robustness via distribution-shift-aware subspace alignment."
  differentiation_from_prior_work:
    - comparison: "SAM (Foret 2020) - seeks flat minima for generalization"
      distinction: "SAM targets scalar flatness (feature-agnostic). We target curvature orientation relative to subgroup gradients (distribution-shift-aware). SAM is optimization technique; we provide diagnostic + explanation."
    - comparison: "Group-DRO (Sagawa 2020) - robust optimization requiring group labels"
      distinction: "Group-DRO is a solution that fixes the problem. We explain WHY ERM fails via geometric mechanism and enable label-free early diagnostics via A(w) monitoring."
    - comparison: "Loss landscape analysis (Sagun 2017, Li 2018, Garipov 2018)"
      distinction: "They study architecture/optimization effects on landscapes. We apply their tools to spurious correlation domain—novel synthesis rather than novel methods."
  builds_on_established:
    - "Marchenko-Pastur theory for signal/noise separation (Sagun et al. 2017)"
    - "Filter normalization for visualization (Li et al. 2018)"
    - "Mode connectivity and FGE sampling (Garipov et al. 2018)"
    - "Group-DRO benchmarks with ground-truth labels (Sagawa et al. 2020)"

