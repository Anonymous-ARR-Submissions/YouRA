    - "Group-DRO (robust reweighting)"
    - "Fast Geometric Ensembling (FGE, cyclical learning rate)"
  computational_requirements:
    - "Hessian-vector products: O(N·M) per eigenvalue via power iteration"
    - "20 seeds × 3 batch sizes × 3 methods = 180 training runs"
    - "Estimated: ~50 GPU-hours per dataset (ResNet-50 on V100)"

# ═══════════════════════════════════════════════════════════════
# Measurement Plan
# ═══════════════════════════════════════════════════════════════

measurement_plan:
  primary_metrics:
    - metric: "Curvature Subspace Alignment A(w)"
      computation: |
        1. Compute Hessian eigendecomposition via power iteration + deflation
        2. Fit Marchenko-Pastur distribution to bulk eigenvalues
        3. Identify outlier subspace S_out (eigenvalues > bulk edge)
        4. Project minority-group gradient: A(w) = ||P_S_out g_minority||² / ||g_minority||²
      tools: "pytorch-hessian-eigenthings library, scipy.stats for MP fitting"
    - metric: "Worst-Group Accuracy"
      computation: "min_{g ∈ groups} accuracy_g on held-out test set"
      tools: "Standard PyTorch evaluation loop with group annotations"
  secondary_metrics:
    - "Top eigenvalue λ_max (scalar flatness baseline)"
    - "Average test accuracy"
    - "Training loss"
  statistical_analysis:
    - "Two-sample t-tests with Bonferroni correction (α=0.01)"
    - "Cohen's d for effect size quantification"
    - "Spearman rank correlation for geometric-phenotype coupling"
    - "Multiple regression with incremental R² tests"

