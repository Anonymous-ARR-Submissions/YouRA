persona_verdicts:
  dr_nova:
    role: "Novelty Assessment"
    verdict: "STRONG"
    assessment: |
      This hypothesis represents a genuine paradigm synthesis—applying loss landscape analysis tools
      (developed for architecture/optimization studies) to spurious correlation research (currently
      disconnected literature). The Marchenko-Pastur subspace orientation mechanism is novel, the five
      experimental tests are unprecedented, and the potential to link architecture→geometry→robustness
      in one framework is transformative. The creative insight that spurious reliance might parallel
      ResNet-without-skip (sharp, chaotic geometry) demonstrates exactly the kind of cross-domain
      thinking that produces breakthroughs.
    key_contributions:
      - "First application of MP-defined curvature subspace orientation to spurious correlations"
      - "Novel synthesis bridging loss landscape and distribution shift literatures"
      - "Architecture→geometry→robustness unified framework"

  prof_vera:
    role: "Falsifiability Assessment"
    verdict: "STRONG"
    assessment: |
      The hypothesis has achieved the precision required for rigorous empirical testing. The
      Marchenko-Pastur bulk-edge definition eliminates arbitrary hyperparameters, the five experiments
      each provide independent falsification opportunities, and the statistical criteria (p<0.01, effect
      sizes, R² thresholds) are explicit. The controls for batch size, noise perturbation, and early
      prediction ensure we distinguish mechanism from artifact. This meets my standards for scientific
      testability—clear success criteria, clear failure modes, and acknowledgment that null results
      would rule out geometric explanations.
    key_strengths:
      - "Intrinsic MP-based subspace definition (no arbitrary thresholds)"
      - "Five independent falsification opportunities"
      - "Explicit statistical criteria (p-values, effect sizes, R² thresholds)"
      - "Null results are scientifically valuable"

  dr_sage:
    role: "Significance Assessment"
    verdict: "STRONG"
    assessment: |
      This addresses a documented research gap (no mechanistic explanation for task-alignment dominance)
      with immediate field impact. If successful, it enables label-free robustness diagnostics via
      geometric monitoring—a practical tool. If unsuccessful, it rules out a plausible mechanism and
      redirects research toward alternatives. The ROUTE_TO_0 narrative (learning from three failed
      attempts) demonstrates scientific maturity. Strong ICLR 2025 SCSL workshop alignment (foundations
      track via mechanism, solutions track via geometry-aware optimization). The synthesis of Sagun, Li,
      and Garipov into a unified framework is exactly the kind of cross-literature integration that
      advances understanding.
    impact_areas:
      - "Label-free robustness diagnostics via A(w) monitoring"
      - "Geometry-aware optimization strategies"
      - "Mechanistic explanation for ROUTE_TO_0 observation"
      - "Cross-literature synthesis (loss landscapes + spurious correlations)"
    workshop_alignment: "ICLR 2025 SCSL (foundations + solutions tracks)"

  prof_pax:
    role: "Feasibility Assessment"
    verdict: "STRONG"
    assessment: |
      All proposed experiments are technically sound and computationally feasible. Hessian-vector
      products scale to modern networks, Marchenko-Pastur estimation is standard in random matrix theory,
      FGE and linear interpolation are established techniques, and Waterbirds/CelebA provide ground-truth
      spurious labels for validation. The critical feasibility achievement is shifting from magnitude
      (batch-dependent) to orientation (more stable)—this addresses the fundamental identifiability
      concern. The experiments require careful implementation but present no mathematical or computational
      barriers. The five-experiment structure allows progressive validation: if E1 fails, we learn
      immediately without running E2-E5.
    technical_validation:
      - "Hessian-vector products: O(N·M) scalable via power iteration"
      - "MP estimation: standard random matrix theory methods"
      - "FGE/linear interpolation: established techniques (Garipov 2018)"
      - "Datasets: existing benchmarks with ground-truth labels"
    critical_achievement: "Orientation (stable) instead of magnitude (batch-dependent)"
    progressive_validation: "E1 failure enables early exit before E2-E5"

  dr_ally:
    role: "Synthesis"
    consensus_hypothesis:
      core_mechanism: |
        Spurious correlation dominance in deep learning arises from loss landscape geometric structure.
        Specifically, solutions that rely on spurious features exhibit systematically different curvature
        subspace orientation compared to robust solutions. This geometric distinction is characterized by
        the alignment between minority-group gradients and the Hessian outlier subspace (defined via
        Marchenko-Pastur bulk edge), not merely by scalar curvature magnitude.
      sgd_explanation: |
        Standard SGD dynamics naturally flow along locally flat directions in the loss landscape. When
        spurious features create sharp, concentrated curvature in specific subspaces (measurable via high
        alignment A(w)), SGD experiences directional bias away from these sharp regions toward flatter
        regions that happen to align with core, task-relevant features. This explains the ROUTE_TO_0
        observation that task-alignment dominates intrinsic feature properties—it's not about feature
        complexity or separability, but about the geometric accessibility of different regions within a
        connected landscape manifold.
      experimental_approach: |
        All experiments use existing benchmarks (Waterbirds, CelebA) with ground-truth spurious labels,
        existing tools (pytorch-hessian-eigenthings for spectra, group_DRO for training), and established
        techniques (Gauss-Newton decomposition from Sagun et al., filter normalization from Li et al.,
        mode connectivity from Garipov et al.). No new data collection, no new benchmarks, no human
        annotation required—immediately executable.
      impact_statement: |
        Success enables geometry-aware robustification without group labels (monitor A(w) during training,
        design optimizers that penalize high alignment). Failure rules out geometric explanations and
        redirects research. Either outcome advances understanding.

  prof_rex:
    role: "Critical Review"
    remaining_concerns:
      - concern: "Marchenko-Pastur Sensitivity"
        description: "The bulk-edge estimation requires careful statistical fitting. If the MP assumption doesn't hold perfectly (e.g., due to non-Gaussian initialization or heavy-tailed activations), the subspace definition becomes unstable."
        mitigation: "Test multiple edge-detection methods (MP fit, spectral gap, fixed percentile) and verify consistency."
      - concern: "Parameterization Invariance"
        description: "Neural networks have weight-scaling symmetries that can alter Hessian eigenvectors without changing function. If alignment A(w) shifts under reparameterization while worst-group accuracy doesn't, we're measuring coordinates not mechanism."
        mitigation: "Include permutation/scaling robustness tests in E1-E2."
      - concern: "Retrospective Interpretation Risk"
        description: "Early prediction (E3) is prospective, but endpoint comparison (E1) could still be retrofitted. If we find the effect only on Waterbirds but not CelebA or Colored MNIST, we may be overfitting one dataset's geometric idiosyncrasies."
        mitigation: "Pre-register analysis plan, test on all three benchmarks, require consistency across datasets for Strong claim (allow Moderate claim if 2/3 succeed with effect size >0.5)."
    overall_assessment: "The hypothesis is now rigorous, falsifiable, and feasible. Execute the five experiments with the specified controls, and we'll have a definitive answer about whether loss landscape geometry explains spurious correlation dominance."

