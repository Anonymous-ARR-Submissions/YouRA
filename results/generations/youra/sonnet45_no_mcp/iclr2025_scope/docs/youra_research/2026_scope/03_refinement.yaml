established_facts:
  claims:
  - claim: LoRA adapters with different ranks have fundamentally different expressiveness-efficiency
      profiles (O(d·r) parameters)
    status: BUILD_ON
    evidence: Well-established parameter efficiency scaling in adapter literature
  - claim: Multi-domain benchmarks (GLUE, XTREME) exhibit heterogeneous task characteristics
    status: BUILD_ON
    evidence: Existing benchmark diversity in language, domain, complexity
  - claim: Foundation model deployment currently requires choosing single fixed configuration
      at design time
    status: BUILD_ON
    evidence: 'Current practice: separate checkpoints for edge vs cloud vs specialized
      deployments'
  scope_reduction_percentage: 0
  phase2b_4_instructions: Focus experimental validation on the novel routing mechanism,
    not on re-proving adapter efficiency or benchmark diversity.
core_statement:
  hypothesis_id: H-POAR-v1
  confidence_level: 0.8
  core_hypothesis_statement: Under persistent-task deployment regimes with batch amortization,
    if a meta-learned routing policy selects from pre-trained multi-rank adapter pathways
    based on task meta-features, then expected hypervolume on the performance-efficiency
    frontier improves by ≥60% of the oracle gap relative to best fixed-rank adapter,
    because routing exploits non-convex structure in task-conditional trade-off space
    that fixed configurations cannot navigate.
  alternative_hypothesis_h0: There is no significant difference in expected hypervolume
    between POAR routing and the best single fixed-rank adapter configuration across
    heterogeneous task distributions.
variables:
  independent:
  - name: Adapter Configuration
    type: categorical
    operationalization: LoRA rank selection from {4, 8, 16, 32}
    levels:
    - rank-4
    - rank-8
    - rank-16
    - rank-32
  - name: Task Meta-Features
    type: continuous
    operationalization: Task embedding (768-dim from frozen SBERT), few-shot probe
      accuracy, domain shift estimate (embedding distance)
  - name: Routing Policy
    type: categorical
    operationalization: POAR meta-learned vs best fixed-rank baseline vs per-task
      oracle (upper bound)
    levels:
    - POAR
    - fixed-best
    - oracle
  dependent:
  - name: Hypervolume Indicator
    type: continuous
    operationalization: Hypervolume under (task performance, inference compute) Pareto
      front with reference point at (0 accuracy, max FLOPs)
    primary: true
  - name: Throughput
    type: continuous
    operationalization: Tokens/second under controlled load (Poisson arrival)
    primary: false
  - name: P99 Latency
    type: continuous
    operationalization: 99th percentile inference latency (milliseconds) under batch
      serving
    primary: false
  controlled:
  - name: Base Model
    operationalization: Fixed LLaMA-2-7B foundation model across all conditions
  - name: Training Procedure
    operationalization: Standardized LoRA fine-tuning protocol (learning rate, epochs,
      batch size)
  - name: Hardware
    operationalization: 8×A100 80GB GPUs with identical CUDA/PyTorch versions
  - name: Task Distribution
    operationalization: Fixed multi-domain benchmark suite (GLUE + XTREME + domain
      adaptation)
causal_mechanism:
  causal_chain_count: 4
  steps:
  - step: 1
    description: 'Meta-training learns diverse adapter pathways: K adapters with varying
      ranks are trained simultaneously on source tasks, creating discrete points on
      performance-efficiency Pareto front'
    evidence: LoRA parameter scaling O(d·r) creates non-linear capacity-cost trade-offs
    falsifier: If all adapters achieve similar performance-cost profiles, pathway
      diversity is insufficient
  - step: 2
    description: 'Routing policy learns task-to-adapter mapping: lightweight classifier
      (2-layer MLP) maps task meta-features to optimal adapter selection using meta-training
      tasks'
    evidence: Task embeddings and few-shot probes provide separable features for classification
    falsifier: If routing classification accuracy <70%, meta-features lack discriminative
      power
  - step: 3
    description: 'Inference-time navigation: at deployment, routing policy selects
      adapter per task with O(1) overhead, exploiting non-convex structure in task-conditional
      Pareto space'
    evidence: Tasks with different domain shifts and resource constraints have heterogeneous
      optimal adapters
    falsifier: If task heterogeneity H < H_crit, routing cannot outperform fixed baseline
  - step: 4
    description: 'Hypervolume improvement: dynamic routing achieves better expected
      trade-offs than any single fixed configuration by matching adapters to task
      characteristics'
    evidence: Oracle gain G_o exists when task heterogeneity is sufficient; routing
      recovers fraction α of G_o
    falsifier: If 95% CI of hypervolume difference overlaps zero, statistical benefit
      is absent
  key_tension: Routing introduces overhead (meta-feature computation, classifier inference,
    potential batching disruption) that must be offset by adapter selection gains.
    System-level throughput under load is critical validation.
  evidence_summary: 'Mechanism validated through: (1) heterogeneity pilot confirming
    G_o ≥10%, (2) routing accuracy ≥70%, (3) overhead ≤10%, (4) statistical hypervolume
    improvement with CI excluding zero.'
key_assumptions:
- id: A1
  assumption: Task heterogeneity in optimal adapter configuration is statistically
    significant (H ≥ H_crit)
  supporting_evidence: Multi-domain benchmarks exhibit diverse domain shifts, dataset
    sizes, and task complexities
  consequence_if_violated: If H < H_crit, oracle gap G_o is negligible and routing
    cannot provide meaningful benefit
- id: A2
  assumption: Task meta-features (embeddings, few-shot scores, domain shift) provide
    sufficient signal for routing classification
  supporting_evidence: Sentence embeddings capture semantic content; few-shot performance
    correlates with task difficulty
  consequence_if_violated: If routing accuracy <70%, regret R dominates oracle gain
    G_o, yielding negative net benefit
- id: A3
  assumption: Routing overhead (meta-feature computation + classifier inference) is
    negligible (<10%) relative to adapter inference cost
  supporting_evidence: 2-layer MLP routing (~1M FLOPs) vs rank-4 adapter (~100M FLOPs
    per token) is 1:100 ratio
  consequence_if_violated: If overhead >10%, efficiency gains are eroded especially
    in low-compute regime
- id: A4
  assumption: Adapter-specific batching can maintain throughput efficiency under dynamic
    routing
  supporting_evidence: Existing serving frameworks (vLLM, TensorRT-LLM) support dynamic
    batching with queueing
  consequence_if_violated: If batching efficiency loss >30% at P99, deployment throughput
    degrades despite hypervolume gains
- id: A5
  assumption: Deployment tasks lie within interpolation regime of training task meta-feature
    space (≤2σ Mahalanobis distance)
  supporting_evidence: Foundation models typically deploy on tasks similar to training
    distribution
  consequence_if_violated: If extrapolation distance >2σ, routing may degrade catastrophically
    due to meta-overfitting
scope:
  applies_to: '- Persistent-task deployment regimes where tasks persist long enough
    to amortize one-time routing overhead (SaaS platforms, domain-specific services,
    enterprise ML applications)

    - Heterogeneous task distributions with sufficient variance in optimal adapter
    configuration (H ≥ H_crit, estimated ~0.25-0.30)

    - Batch-serving infrastructure supporting dynamic adapter switching (vLLM, TensorRT-LLM
    or equivalent)

    - Foundation models with adapter-based fine-tuning (LoRA, prefix tuning, adapter
    layers)'
  does_not_apply_to: '- Ephemeral single-query scenarios (one-shot chatbot interactions,
    isolated API calls) where amortization fails

    - Task distributions with low heterogeneity (H < H_crit) where all tasks prefer
    similar adapter configurations

    - Zero-shot deployment on tasks outside training meta-feature convex hull (>2σ
    Mahalanobis distance)

    - Scenarios requiring strict latency SLAs that cannot tolerate even 10-30% P99
    degradation'
  known_limitations: '- Effectiveness depends on sufficient task heterogeneity (gatekeeper
    criterion H ≥ H_crit)

    - Generalization limited to interpolation regime; extrapolation may fail

    - Systems-level benefits assume infrastructure supporting efficient dynamic batching

    - Current formulation focuses on LoRA rank selection; generalization to multi-axis
    configuration spaces (rank × placement × sparsity) requires hierarchical routing'
predictions:
- id: P1
  primary: true
  statement: POAR recovers ≥60% of empirically measured oracle hypervolume gap G_o
    across multi-domain benchmarks (GLUE, XTREME, domain adaptation) with 95% CI excluding
    zero
  test_method: 'Pilot study measures G_o = HV(Oracle) - max_r HV(Fixed_r). Main experiment
    compares POAR vs best fixed baseline. Heterogeneity gatekeeper: proceed only if
    G_o ≥10%'
  success_criterion: 95% CI of (HV(POAR) - max_r HV(Fixed_r)) / G_o includes or exceeds
    0.60, with lower bound >0
  falsification: If 95% CI lower bound ≤0 or if pilot finds G_o <10%, practical significance
    fails
- id: P2
  primary: true
  statement: Oracle gain G_o increases monotonically with task heterogeneity H, while
    routing regret R grows sublinearly, yielding positive net gain G_o - R over heterogeneity
    range H ≥ H_crit
  test_method: 'Construct synthetic task mixtures with controlled heterogeneity variance.
    Measure G_o and R separately. Test monotonicity via regression with CI. Permutation
    test: randomize adapter identities to destroy geometric structure'
  success_criterion: 'G_o monotonically increasing (p<0.05), R sublinear (slope <1
    with CI), net gain positive over H ≥ H_crit. Permutation test: regret scaling
    shifts from sublinear to linear'
  falsification: If net gain non-monotonic, flat, or negative; or if permutation test
    shows no structural effect
- id: P3
  primary: false
  statement: POAR maintains positive worst-case hypervolume improvement over Wasserstein
    uncertainty ball (ε=0.2) and exhibits Lipschitz-bounded degradation under embedding-space
    drift within 2σ Mahalanobis distance
  test_method: Compute worst-case hypervolume under adversarial task reweighting within
    Wasserstein ball radius 0.2. Measure hypervolume as function of Mahalanobis distance
    from training centroid using cross-lingual transfer tasks
  success_criterion: Worst-case hypervolume difference >0 with 95% CI. Degradation
    ≤20% at 2σ distance
  falsification: If worst-case CI includes zero at ε=0.2, or if performance cliff
    occurs within 1σ distance
experimental_setup:
  dataset:
    name: Multi-Domain Benchmark Suite
    type: standard
    source: GLUE (9 tasks), XTREME (40 languages × tasks), Domain Adaptation (DomainNet/Office-31
      adapted)
    path: 'HuggingFace datasets: glue, xtreme, custom domain adaptation splits'
    hypothesis_fit: Provides heterogeneous task distribution with diverse domains,
      languages, and complexity levels needed to test heterogeneity-dependent routing
  model:
    name: LLaMA-2-7B
    type: decoder-only transformer
    source: meta-llama/Llama-2-7b-hf
    hypothesis_fit: Standard foundation model with well-studied adapter behavior,
      sufficient capacity for multi-domain fine-tuning
  baselines:
  - name: Fixed-Rank Baselines
    method: Single LoRA rank {4,8,16,32} applied to all tasks. Report best performing
      rank as primary baseline
  - name: Per-Task Oracle
    method: 'Upper bound: select optimal adapter per task with perfect hindsight.
      Defines oracle gap G_o'
  - name: Random Routing
    method: 'Ablation: uniform random adapter selection. Tests whether routing adds
      value beyond random selection'
novelty:
  preserved_novelty: Task-conditioned inference-time routing over pre-trained adapter
    pathways
  key_innovation: Shifts from static adapter selection (fixed at design time) to meta-learned
    navigation of efficiency-adaptability trade-off space, enabling unified deployment
    across operating points
  differentiation:
  - prior_work: Static adapter selection (LoRA, prefix tuning)
    difference: Fixed configuration for all tasks vs dynamic routing per task
  - prior_work: Per-task neural architecture search (NAS)
    difference: Expensive search per task vs amortized meta-learned routing policy
  - prior_work: Multi-objective optimization in training
    difference: Optimize fixed model vs optimize routing policy over multiple pre-trained
      pathways
related_work:
  baselines:
  - method: LoRA (Hu et al., 2021)
    performance: Efficient fine-tuning with rank-dependent capacity
    dataset: Various NLP tasks
    why_insufficient: Fixed rank configuration cannot adapt to heterogeneous task
      requirements at deployment
  - method: Mixture of Experts (MoE)
    performance: Learned routing but within single forward pass
    dataset: Language modeling
    why_insufficient: Routing during training, not inference-time adaptation across
      deployment scenarios
  - method: Neural Architecture Search (NAS)
    performance: Per-task optimal architectures
    dataset: Vision and NLP
    why_insufficient: High per-task search cost (hours to days) prevents practical
      deployment-time adaptation
  best_baseline_performance: Best fixed LoRA rank achieves max_r HV(Fixed_r); oracle
    per-task selection defines upper bound HV(Oracle)
phase2b_readiness:
  status: READY
  sh1_existence: Task heterogeneity (H ≥ H_crit) must exist in deployment distribution;
    pilot study verifies oracle gap G_o ≥10%
  sh2_mechanism: Routing policy must achieve ≥70% classification accuracy and <10%
    overhead for mechanism to be viable
  sh3_comparison: Compare POAR vs best fixed-rank baseline (primary) and per-task
    oracle (upper bound); defer production deployment comparison to Phase 5
  open_questions:
  - What is the empirically determined H_crit threshold for representative benchmarks?
  - How does routing performance scale to hierarchical multi-axis configuration spaces
    (rank × placement × sparsity)?
  - Can routing policies transfer across different foundation model families (encoder-only
    vs decoder-only)?
