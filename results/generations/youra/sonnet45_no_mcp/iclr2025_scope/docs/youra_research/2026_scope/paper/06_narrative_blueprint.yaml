# PART 4: BROADER IMPACT
# ═══════════════════════════════════════════════════════════════════════════════

takeaway:
  main_contribution:
    one_sentence: "First quantitative measurement of oracle gap (15.09%) from task-specific LoRA adapter rank selection on multi-domain benchmarks, establishing the foundation for task-aware adapter routing research"
    why_significant: "Validates assumption that task heterogeneity creates real optimization opportunities (not negligible edge case); informs practitioners on rank selection upper bounds (rank >16 requires careful regularization); provides empirical grounding for adaptive adapter configuration research direction"

  implications:
    for_field: "Shifts adapter configuration from fixed design-time choice to potential deployment-time optimization. Quantifies cost of one-size-fits-all hyperparameters in multi-domain settings. Establishes oracle gap measurement methodology for future parameter-efficient fine-tuning research"
    for_practice: "Practitioners deploying multi-task systems: consider per-task rank selection over global configuration. Avoid rank >16 without careful regularization (rank-32 collapse on small datasets). Multi-domain benchmarks (GLUE + XTREME) span sufficient diversity to require adaptive strategies"
    conceptual_contribution: "Frames adapter rank selection as task-conditional optimization rather than global hyperparameter tuning. Introduces oracle gap as key metric for evaluating benefit of adaptive configuration strategies"

  future_possibilities:
    immediate_extensions: "Complete mechanism hypotheses (h-m1→h-m4): meta-learned routing policy, hypervolume-based oracle, statistical significance testing. Rank-specific hyperparameter tuning to resolve rank-32 performance ambiguity. Multi-objective Pareto oracle considering (accuracy, FLOPs, latency)"
    longer_term_vision: "Cross-modal oracle gap measurement (vision, audio). Continuous rank selection beyond discrete {4,8,16,32}. Hierarchical multi-axis configuration (rank × placement × sparsity). Transfer learning across foundation model families"
    open_questions: "What is empirical H_crit threshold for representative benchmarks? Can routing policies generalize across model families (encoder-only vs decoder-only)? Does oracle gap pattern hold for other PEFT methods (prefix tuning, adapters)?"

