# PART 5: SECTION-LEVEL NARRATIVE GOALS
# ═══════════════════════════════════════════════════════════════════════════════

section_goals:

  abstract:
    narrative_purpose: "Compress the entire story into ~150 words"
    key_message: "Task heterogeneity in multi-domain NLP creates 15% oracle gap that validates need for task-aware adapter configuration"
    structure_notes: |
      - Sentence 1-2: Problem (fixed adapter config cannot serve all tasks optimally)
      - Sentence 3: Our approach (measure oracle gap across GLUE + XTREME)
      - Sentence 4-5: Main results (15.09% gap, distributed oracle selections 5/4/4/4)
      - Sentence 6: Significance (establishes foundation for task-aware routing research)
    avoid:
      - "Citations in abstract"
      - "Vague claims without numbers"
      - "Undefined acronyms (spell out LoRA, GLUE, XTREME)"

  introduction:
    narrative_purpose: "Hook → Problem → Insight → Solution preview"
    hook_strategy: "counterintuitive_finding - open with the 15% gap statistic and uniform distribution (5/4/4/4) that defies 'one rank fits all' assumption"
    problem_escalation: |
      1. Surface: LoRA enables parameter-efficient fine-tuning but requires choosing rank globally
      2. Deeper: Multi-domain deployments serve heterogeneous tasks with different capacity needs
      3. Gap: No systematic measurement of oracle gap from per-task rank selection exists
    insight_preview: "We hypothesize that multi-domain benchmarks exhibit sufficient task heterogeneity to create measurable oracle gap. Systematic evaluation across 17 tasks × 4 ranks reveals 15.09% gap with uniform oracle distribution"
    contributions_framing: |
      Building on oracle gap measurement, we make three contributions:
      1. First quantitative oracle gap measurement (15.09%) for task-specific adapter selection
      2. Demonstration that oracle selections distribute evenly across ranks (no single rank dominates)
      3. Empirical evidence for rank 4-16 sweet spot and rank-32 overfitting on small datasets
    transition_to_related_work: "Our work builds on parameter-efficient fine-tuning literature (LoRA, adapters) but shifts focus from fixed global configuration to measuring task-specific optimization opportunities"

  related_work:
    narrative_purpose: "Show why existing work is insufficient → justify our approach"
    positioning_strategy: "Position as measuring foundation for future adaptive routing work; existing PEFT methods treat rank as fixed hyperparameter, we quantify cost of that assumption"
    key_comparison_points:
      - area: "Parameter-Efficient Fine-Tuning (LoRA, Prefix Tuning, Adapters)"
        limitation_to_highlight: "Fixed rank configuration cannot adapt to heterogeneous task requirements at deployment"
        how_we_differ: "We measure oracle gap from per-task rank selection, quantifying cost of fixed configuration"
      - area: "Multi-Task Learning and Meta-Learning"
        limitation_to_highlight: "Focuses on shared representations or task-specific heads, not adapter capacity heterogeneity"
        how_we_differ: "We demonstrate that even within adapter-based methods, task-specific capacity selection creates measurable oracle gap"
      - area: "Neural Architecture Search (NAS)"
        limitation_to_highlight: "High per-task search cost (hours to days) prevents deployment-time adaptation"
        how_we_differ: "Oracle gap measurement establishes whether NAS-like per-task configuration is worth pursuing for adapter selection"
    papers_to_discuss:
      - "Hu et al. 2021 - LoRA (establishes rank-capacity trade-off)"
      - "Wang et al. 2018 - GLUE (benchmark diversity)"
      - "Hu et al. 2020 - XTREME (cross-lingual diversity)"
      - "Pfeiffer et al. 2020 - AdapterHub (task-specific adapter effectiveness)"
    avoid:
      - "Just listing papers without critique"
      - "Being unfair to prior work"
      - "Missing LoRA original paper (foundational)"

  methodology:
    narrative_purpose: "Explain WHY this design solves the problem"
    connection_to_insight: "To measure oracle gap, we need systematic training of all rank-task configurations (exhaustive oracle measurement). Multi-domain benchmarks provide task diversity; multi-rank training provides capacity diversity"
    key_design_decisions:
      - decision: "Use GLUE + XTREME subset (17 tasks total) for multi-domain coverage"
        rationale: "Span diverse domains (sentiment, NLI, paraphrase, cross-lingual) and dataset sizes (8.5K to 393K samples) to test heterogeneity hypothesis"
        alternatives_considered: "Single benchmark (insufficient diversity), full XTREME (prohibitive compute for PoC)"
      - decision: "Test ranks {4, 8, 16, 32} as discrete capacity levels"
        rationale: "Cover literature-recommended range (4-16) plus high-capacity rank-32 to test overfitting hypothesis"
        alternatives_considered: "Continuous rank search (no clear stopping criterion), restricted to {8,16} (misses overfitting pattern)"
      - decision: "Use accuracy-based oracle (not multi-objective Pareto)"
        rationale: "Simplified for EXISTENCE PoC—hypervolume oracle deferred to mechanism hypotheses (h-m4)"
        alternatives_considered: "Multi-objective from start (added complexity without validating existence first)"
    intuition_building: |
      Oracle gap measurement intuition: Train all rank configurations on each task → measure per-task best (oracle) → compare to best single fixed rank across all tasks. Gap quantifies cost of fixed configuration.
      Figure: Heatmap showing task-rank performance matrix, highlighting oracle selections.
    technical_depth_balance: |
      Main paper: Oracle gap definition, experimental setup, simplified evaluation protocol
      Appendix: Hyperparameter details, per-task training curves, full result tables

  experiments:
    narrative_purpose: "Design experiments that test our specific claims"
    experimental_questions:
      - question: "Does oracle gap G_o ≥ 10% exist across multi-domain benchmarks?"
        experiment: "Train 68 configurations (17 tasks × 4 ranks), measure oracle vs best fixed-rank baseline"
        expected_outcome: "Oracle gap exceeds 10% threshold (MUST_WORK gate)"
      - question: "Do different tasks genuinely prefer different ranks, or does one rank dominate?"
        experiment: "Analyze distribution of oracle selections across ranks"
        expected_outcome: "Distributed selections (not clustered on single rank) indicate heterogeneity"
      - question: "Does rank-32 overfit on small datasets?"
        experiment: "Compare rank-32 performance on small (CoLA 8.5K) vs large (MNLI 393K) datasets"
        expected_outcome: "Performance collapse on small datasets, acceptable on large datasets"
    baseline_rationale: "Fixed-rank baselines: evaluate rank-4, rank-8, rank-16, rank-32 applied uniformly across all tasks. Best performing fixed rank serves as primary baseline for oracle gap calculation"
    dataset_rationale: "GLUE (9 tasks): standard NLP diversity. XTREME subset (8 tasks, 4 languages): cross-lingual diversity. Combined 17 tasks span sufficient heterogeneity for oracle gap measurement"
    metric_rationale: "Task accuracy: standard evaluation metric for NLP classification/regression tasks. Oracle gap percentage: (Oracle - Best Fixed) / Best Fixed × 100%"
    fairness_considerations: |
      - Uniform training protocol across all configurations (lr=3e-4, AdamW, cosine schedule)
      - Same model (LLaMA-2-7B) and hardware (single GPU) for all experiments
      - Standard evaluation protocol for GLUE/XTREME benchmarks

  results:
    narrative_purpose: "Present evidence that supports our claims"
    main_result_highlight: "Oracle gap of 15.09% (exceeds 10% target by 5.09 pp), with oracle selections distributed evenly (5/4/4/4) across ranks"
    result_presentation_order:
      - result: "Gate metrics validation (Figure 1 MANDATORY)"
        purpose: "Lead with primary claim—oracle gap exceeds threshold"
      - result: "Oracle vs fixed-rank comparison (Figure 2)"
        purpose: "Show magnitude of gap (88.58% oracle vs 76.97% best fixed)"
      - result: "Oracle selection distribution (Figure 3)"
        purpose: "Prove heterogeneity (uniform distribution, not clustered)"
      - result: "Rank-32 overfitting analysis"
        purpose: "Explain surprising finding (worst average despite highest capacity)"
      - result: "Language-specific patterns (heatmap)"
        purpose: "Show systematic structure (Chinese→rank-4, German→rank-32)"
    surprising_result_handling: "Rank-32 collapse (50% on CoLA) explained through overfitting hypothesis: excessive capacity (262K params) overwhelms small dataset (8.5K samples), causing memorization failure. Validates need for task-adaptive configuration"
    avoid:
      - "Table 1 shows X, Table 2 shows Y (provide interpretation)"
      - "Cherry-picking favorable results (report rank-32 failure honestly)"
      - "Hiding limitations (single-seed directional validation stated clearly)"

  discussion:
    narrative_purpose: "Interpret results, acknowledge limits, show significance"
    key_findings_interpretation: "Oracle gap (15.09%) and distributed selections (5/4/4/4) validate hypothesis that multi-domain benchmarks exhibit sufficient task heterogeneity (H ≥ H_crit) to create measurable optimization opportunities. Rank-32 overfitting demonstrates capacity-data mismatch, supporting need for task-adaptive configuration"
    honest_limitations:
      - limitation: "Routing mechanism unvalidated—only oracle gap existence proven"
        why_acceptable: "EXISTENCE hypothesis designed as foundation; mechanism validation is next phase (h-m1→h-m4), not failure of current work"
        future_mitigation: "Complete hypothesis loop with routing policy training, hypervolume evaluation, statistical testing"
      - limitation: "Single-seed directional validation (no statistical significance testing)"
        why_acceptable: "EXISTENCE PoC prioritizes direction over statistical rigor; 15.09% gap magnitude (>5 standard errors if baseline variance ~3%) suggests robustness"
        future_mitigation: "Multi-seed validation with 95% confidence intervals in mechanism hypotheses"
      - limitation: "Accuracy-based oracle (not multi-objective Pareto)"
        why_acceptable: "Conservative proxy—hypervolume oracle likely shows larger gap (more optimization dimensions)"
        future_mitigation: "Hypervolume-based oracle in h-m4 with (accuracy, FLOPs, latency) trade-offs"
      - limitation: "Scope limited to NLP tasks on LLaMA-2-7B"
        why_acceptable: "17 tasks span sufficient NLP diversity for existence proof; cross-modal extension is future work, not limitation of core contribution"
        future_mitigation: "Vision (ImageNet variants) and audio (speech recognition) oracle gap measurement"
    broader_impact_statement: "Task-aware adapter configuration enables more efficient deployment of foundation models across heterogeneous task distributions. Potential benefits: reduced computational waste (avoid over-parameterization for simple tasks), improved performance (match capacity to task complexity). Potential risks: increased system complexity, routing errors could degrade performance below fixed baselines. Mitigation: oracle gap measurement quantifies maximum benefit (upper bound), informs cost-benefit analysis before deployment"

  conclusion:
    narrative_purpose: "Reinforce key message + open future directions"
    callback_to_hook: "We opened by questioning whether a single adapter configuration can serve all tasks optimally. Measuring a 15.09% oracle gap with uniformly distributed optimal ranks (5/4/4/4) across multi-domain benchmarks, we now have quantitative evidence: task heterogeneity creates real optimization opportunities that fixed configurations cannot capture"
    memorable_ending: "The era of one-size-fits-all hyperparameters for multi-domain deployment may be ending. As foundation models serve increasingly diverse task distributions, task-aware configuration strategies—from adapter routing to dynamic capacity selection—become not just theoretical possibilities but practical necessities backed by measurable oracle gaps"
    future_work_vision: "Beyond measuring the oracle gap, the path forward requires validating routing mechanisms that can exploit this gap: meta-learned policies for task-to-rank mapping, multi-objective Pareto optimization for (accuracy, efficiency) trade-offs, and cross-modal generalization to vision and audio domains. The 15.09% gap is not just a number—it's an invitation to rethink how we deploy foundation models in heterogeneous real-world environments"

