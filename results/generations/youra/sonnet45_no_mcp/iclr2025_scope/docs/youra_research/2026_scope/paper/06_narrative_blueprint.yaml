# ═══════════════════════════════════════════════════════════════════════════════
# PART 1: HOOK & MOTIVATION
# ═══════════════════════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: "A single adapter configuration cannot serve all tasks optimally. Across multi-domain NLP benchmarks, we measure a 15% performance gap between per-task oracle adapter selection and the best fixed-rank baseline—revealing that different tasks require fundamentally different capacity-efficiency trade-offs."
    strategy: "counterintuitive_finding"

  why_reader_should_care:
    main_reason: "Foundation model deployment currently requires choosing a single fixed adapter configuration at design time, forcing practitioners to sacrifice either performance or efficiency across heterogeneous task distributions"
    concrete_example: "A production system serving sentiment analysis, cross-lingual NLI, and paraphrase detection must choose one LoRA rank for all tasks—yet our experiments show that optimal ranks distribute evenly across {4, 8, 16, 32}, with no single configuration dominating"
    stakes: "Without task-aware adapter selection, deployed systems leave 15% performance improvement on the table, or alternatively, waste computational resources on over-parameterized adapters for simple tasks"

  real_world_impact:
    application_domain: "Multi-task foundation model deployment (SaaS platforms, enterprise ML services, domain-specific assistants)"
    potential_beneficiaries: "Practitioners deploying foundation models across heterogeneous task distributions; researchers studying parameter-efficient fine-tuning"
    scale_of_impact: "Any system serving multiple tasks with different complexity levels (e.g., Hugging Face Inference API, OpenAI fine-tuning service, enterprise chatbots)"

# ─────────────────────────────────────────────────────────────────────────────
# PROBLEM FRAMING
# ─────────────────────────────────────────────────────────────────────────────

problem_framing:
  surface_problem:
    description: "Parameter-efficient fine-tuning methods like LoRA enable adapting large language models at a fraction of the cost, but require choosing adapter rank as a global hyperparameter"
    common_understanding: "LoRA rank controls capacity-efficiency trade-off; common practice uses rank 8-16 universally across all tasks"

  deeper_problem:
    description: "Multi-domain task distributions exhibit heterogeneous optimal adapter configurations—no single rank can serve all tasks optimally, creating a fundamental tension between fixed configuration and task diversity"
    why_overlooked: "Prior work treats adapter rank as a hyperparameter to tune once and apply everywhere; the cost of per-task configuration exploration (task heterogeneity measurement) has been prohibitive"
    our_perspective: "We frame this as an oracle gap quantification problem: measure how much performance is lost by forcing a one-size-fits-all configuration across heterogeneous tasks, establishing the foundation for task-aware routing research"

  gap_in_existing_work:
    description: "No systematic measurement of oracle gap from task-specific adapter rank selection across multi-domain benchmarks; existing work either fixes rank globally or tunes per-task in isolation without quantifying the aggregated benefit"
    why_gap_exists: "Conceptual: adapter configuration treated as pre-deployment design choice rather than deployment-time optimization opportunity. Technical: measuring oracle gap requires training all rank configurations across all tasks (17 tasks × 4 ranks = 68 experiments)"
    why_gap_matters: "Without oracle gap quantification, we cannot determine whether task-aware adapter routing is worth pursuing—gap could be negligible (wasted effort) or substantial (high-value research direction)"

# ═══════════════════════════════════════════════════════════════════════════════
# PART 2: THE INSIGHT
# ═══════════════════════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: "Task-specific adapter optimization creates a measurable oracle gap that no fixed configuration can close, validating the hypothesis that multi-domain deployment regimes require adaptive configuration strategies rather than one-size-fits-all hyperparameters."
    expanded_explanation: "Multi-rank LoRA adapter training creates discrete capacity-efficiency trade-off points on the Pareto front. When oracle selections distribute evenly across ranks {4, 8, 16, 32} with a 15.09% gap over best fixed rank-8, it proves that task heterogeneity in multi-domain benchmarks creates genuine optimization opportunities. The uniform distribution (5/4/4/4 oracle selections) demonstrates no single rank dominates—different task properties (dataset size, linguistic complexity, domain shift) interact with adapter capacity in complex non-linear ways."

  why_others_missed_it:
    common_assumptions: "Literature consensus: rank 4-16 is sufficient for most tasks; practitioners typically fix rank globally (e.g., rank-8 for all downstream tasks); per-task rank tuning seen as unnecessary overhead"
    our_different_view: "We hypothesized that multi-domain benchmarks (GLUE + XTREME) span sufficient task diversity to create heterogeneous capacity requirements. Instead of assuming one rank works well enough, we measured the cost of that assumption through systematic oracle gap quantification"
    enabling_factor: "GLUE and XTREME benchmarks designed explicitly for task diversity (9 linguistic phenomena + 4 cross-lingual languages); systematic training of all rank-task configurations enabled direct oracle measurement rather than anecdotal per-task tuning"

  what_makes_it_work:
    intuitive_explanation: "Just as different ML problems require different model architectures (CNNs for vision, transformers for language), different NLP tasks within the same domain require different adapter capacities. Simple tasks (sentiment classification) achieve optimal performance with low-rank adapters (rank-4), while complex tasks (cross-lingual paraphrase) require higher-rank adapters (rank-16 or rank-32). Forcing all tasks to use the same rank is like forcing all problems to use the same architecture—technically possible but suboptimal."
    key_mechanism: "LoRA parameter scaling follows O(d·r) where d=model dimension (4096 for LLaMA-2-7B) and r=rank. This creates four distinct adapter profiles: rank-4 (32K params, ~900M FLOPs), rank-8 (65K params, ~2.1B FLOPs), rank-16 (131K params, ~3.6B FLOPs), rank-32 (262K params, ~7.5B FLOPs). Different task characteristics (data size, pattern complexity, domain shift) interact with these capacity levels to determine optimal configurations. Small datasets + simple patterns → rank-4 avoids overfitting. Large datasets + complex patterns → rank-16/32 captures richer representations."
    analogy: "Choosing adapter rank is like choosing font size for different documents: children's books need large fonts (low capacity), academic papers need smaller fonts (high capacity), and technical manuals need dense layouts (very high capacity). Using the same font size for all documents is inefficient—some become unreadable while others waste space."

# ═══════════════════════════════════════════════════════════════════════════════
# PART 3: EVIDENCE STORY
# ═══════════════════════════════════════════════════════════════════════════════

evidence_narrative:
  main_claim:
    statement: "Oracle gap of 15.09% exists between per-task optimal LoRA adapter rank selection and best fixed-rank baseline (rank-8) across 17 multi-domain NLP tasks"
    measurable_criteria: "Oracle average accuracy (88.58%) vs. best fixed-rank accuracy (76.97%) yields absolute gap of 11.62 percentage points, representing 15.09% relative improvement over baseline"

  supporting_evidence:
    - id: "evidence_1"
      what: "Oracle selections distribute evenly across ranks: rank-4 (5 tasks), rank-8 (4 tasks), rank-16 (4 tasks), rank-32 (4 tasks)"
      so_what: "Uniform distribution proves no single rank dominates—task heterogeneity is real, not artifact of benchmark design"
      how_it_supports_claim: "Demonstrates that different tasks genuinely prefer different capacity levels; if one rank were universally optimal, we'd see clustering rather than even distribution"

    - id: "evidence_2"
      what: "Fixed-rank performance varies substantially: rank-4 (73.66%), rank-8 (76.97%), rank-16 (75.37%), rank-32 (62.95%)"
      so_what: "Even best fixed rank (rank-8 at 76.97%) significantly underperforms oracle (88.58%), and highest-capacity rank-32 performs worst due to overfitting"
      how_it_supports_claim: "Quantifies the cost of fixed configuration (11.62 pp gap) and demonstrates capacity-data mismatch (rank-32 collapses to 50% on CoLA's 8.5K samples)"

    - id: "evidence_3"
      what: "Language-specific patterns emerge: Chinese tasks (XNLI-zh, PAWS-X-zh) both optimal at rank-4; German tasks (XNLI-de, PAWS-X-de) both optimal at rank-32"
      so_what: "Task meta-features (language, domain, complexity) correlate with optimal rank—not random variation but systematic structure"
      how_it_supports_claim: "Provides evidence that future task-aware routing could learn these patterns from meta-features; heterogeneity has exploitable structure, not just noise"

  surprising_findings:
    finding: "Rank-32 performs worst on average (62.95%) despite having highest capacity, collapsing to random baseline (50%) on small datasets like CoLA"
    why_surprising: "Conventional wisdom: more parameters → better performance (or at worst, saturation). Literature typically shows monotonic improvement or diminishing returns with rank, not degradation"
    our_interpretation: "Severe overfitting: rank-32 has 8× more parameters than rank-4 (262K vs 32K), creating excessive capacity for smaller tasks. CoLA's 8.5K samples insufficient to regularize rank-32, causing memorization failure. Validates need for task-adaptive configuration—'bigger is better' heuristic fails when capacity exceeds data complexity"

  what_results_mean:
    synthesis: "Multi-domain NLP benchmarks exhibit sufficient task heterogeneity (H ≥ H_crit) to create measurable optimization opportunities through task-specific adapter configuration. The 15.09% oracle gap establishes the theoretical foundation for task-aware adapter routing research: there exists substantial performance improvement to capture if routing mechanisms can match adapters to task characteristics"
    confidence_level: "HIGH for existence claim (oracle gap ≥ 10% target exceeded by 5.09 pp). MEDIUM for generalization (single model LLaMA-2-7B, NLP tasks only, directional validation without statistical significance testing)"
    caveats: "Results limited to EXISTENCE validation (h-e1 only)—routing mechanism unvalidated (requires h-m1→h-m4). Oracle based on accuracy only (not multi-objective Pareto). Single-seed directional validation (not statistical significance). Scope: NLP tasks on decoder-only transformers, cross-modal generalization unverified"

