hypothesis_draft:
  title: Learned Compute Allocation for Neural Theorem Proving via Confidence Geometry
  hypothesis_id: H-ConfidenceGeometry-v1
  core_claim: LLM confidence trajectories encode proof space manifold geometry. By
    combining confidence derivatives (std dev of softmax entropy) with symbolic divergence
    signals (state hash collisions, proof state growth) and search tree metrics (backtrack
    frequency, branching factor) in a portfolio allocation framework, we can improve
    neural theorem proving success rate by >15% per unit compute compared to fixed-timeout
    baselines.
  mechanism: 'The allocator treats proof search as a portfolio allocation problem
    under uncertainty. Confidence instability (high variance in entropy) indicates
    the search is entering unfamiliar proof space regions that don''t resemble successful
    proof patterns from the training distribution. This correlates with probable non-termination
    even though the LLM was never trained on diverging proofs—the model detects distribution
    shift, similar to perplexity in language models. Symbolic features (cycles, exponential
    growth) provide complementary signals. Instead of binary termination decisions,
    the allocator dynamically adjusts compute budgets: high-risk searches get reduced
    allocation but aren''t abandoned completely, allowing recovery if progress emerges.'
  predictions:
    P1: '>15% success rate improvement per unit compute vs. fixed timeout (p<0.05)'
    P2: Confidence derivative correlates with timeout outcomes (r > 0.3 in Phase 1
      validation)
    P3: Hybrid three-signal model outperforms single-signal ablations
variables_summary:
  independent: Compute allocation strategy (Learned vs. Fixed timeout vs. Uniform
    vs. Depth-first)
  dependent_primary: Proof success rate per unit compute (theorems proven / GPU-seconds)
  controlled: Base LLM model (ReProver), dataset split (60/20/20), total compute budget
    (1000 GPU-sec)
null_hypothesis:
  h0_statement: There is no significant difference in proof success rate per unit
    compute between the learned allocator and fixed-timeout baseline (improvement
    <5% or allocator underperforms).
  statistical_test: Two-tailed t-test
  significance_level: 0.05
novelty_assessment:
  status: VERIFIED
  key_innovation: 'First work treating proof search resource allocation as meta-learning
    problem using LLM confidence geometry. Theoretical contribution: confidence trajectories
    encode proof space manifold structure—generalizes beyond theorem proving to any
    neural reasoning system.'
  differentiation_summary: LeanDojo (tactic prediction) vs. our work (resource allocation)—orthogonal
    and combinable. Fixed timeout strategies (non-adaptive) vs. our work (content-aware
    via confidence geometry). Symbolic divergence detection (misses semantic similarity)
    vs. hybrid approach (LLM adds semantic signal).
clarity:
  overall_level: HIGH
  clarity_verified: true
  improvements_needed: []
experimental_scope:
  models:
  - LeanDojo ReProver (retrieval-augmented LLM)
  datasets:
  - LeanDojo Benchmark (98,734 theorems from Lean math library)
  baselines:
  - Fixed 30-step timeout
  - Uniform random allocation
  - Depth-first search
measurement_plan:
  data_collection:
  - Extract confidence trajectories (softmax entropy) from LeanDojo ReProver via get_tactics()
    method
  - 'Track symbolic features: state hash collisions, proof state size, tactic repetition'
  - 'Measure search tree metrics: backtrack frequency, branching factor, depth'
  - Label theorems via extended-timeout experiments (100× normal = 300s) for ground
    truth
  procedure:
  - 'Phase 1 (8 GPU-hours): 100 extended-timeout experiments, measure confidence-timeout
    correlation'
  - 'Phase 2 (42 GPU-hours): Train allocator on 60% LeanDojo, validate on 20%, test
    on 20%'
  - 'Phase 3 (20 GPU-hours): Ablation studies (each signal alone vs. combined), sensitivity
    analysis'
  success_criteria:
  - 'Phase 1: Correlation coefficient > 0.3 (Pearson r OR Spearman ρ)'
  - 'Phase 2: >15% success rate improvement vs. best baseline, p<0.05'
  - 'Phase 3: Combined model outperforms single-signal ablations'
validation:
  internal_validity:
  - 'Controlled experiment: fix total compute budget across conditions'
  - Randomized dataset split (60/20/20) to prevent overfitting
  - Include meta-reasoning overhead in compute accounting (15% = 450ms per 3-second
    proof)
  - Multiple baselines to ensure robust comparison
  external_validity:
  - 'Scope limitation: Lean + LeanDojo only (not Coq, Isabelle, HOL)'
  - GPT-style models only (not T5, BERT-based provers)
  - Extended-timeout ground truth approximates but doesn't prove undecidability
  - Future work required for cross-system generalization
