# Execution order: Priority descending (100 → 1)
execution_notes: |
  1. Start with T-01, T-02 (environment setup)
  2. Core implementation: T-03 → T-07 (tree tracking, classification, analysis)
  3. Visualization: T-09 → T-13 (mandatory bar chart first)
  4. Integration: T-14 → T-16 (orchestration with h-m1 reuse)
  5. Config + Docs: T-17 → T-20
  6. Testing: T-04, T-06, T-08, T-21 (throughout)
  7. Failsafe: T-FAILSAFE (final verification)

  Key optimization: Reuse h-m1 variance values + re-run ONLY timeout group
  (~30-40 experiments) for tree tracking. Saves ~2 hours vs full re-run.

  Divergence detection: Hash-based collision detection + backtrack counting
  from search tree structure. Thresholds: collision > 2 OR backtrack > 5.
