      - "03_prd.md#fr-5-visualization"
    acceptance_criteria:
      - "Inherits from h-e1.ExperimentVisualizer"
      - "Output directory created"
      - "Figure saving mechanism works"
    estimated_effort: "15 minutes"

  - id: "T-09"
    title: "Implement variance comparison bar chart (MANDATORY)"
    type: "visualization"
    priority: 79
    status: "todo"
    epic: "E4"
    parent_task: "T-08"
    description: |
      Create plot_variance_comparison_bar() for gate metric visualization.
      Bar chart comparing mean variance (successful vs timeout).
    reference_files:
      - "03_architecture.md#plot_variance_comparison_bar"
