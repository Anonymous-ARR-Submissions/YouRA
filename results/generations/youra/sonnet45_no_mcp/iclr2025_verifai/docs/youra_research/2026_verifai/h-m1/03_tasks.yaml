# Budget Summary
budget_summary:
  total: 20
  by_type:
    setup: 5
    model: 1
    analysis: 2
    visualization: 5
    integration: 3
    documentation: 2
    test: 3
    milestone: 1
  by_epic:
    E1: 5  # Environment Setup + Config
    E2: 2  # Confidence Extraction
    E3: 3  # Group Analysis
    E4: 5  # Visualization
    E5: 3  # Main Script
    E6: 2  # Documentation
  within_budget: true
  tier: "FULL"
  max_budget: 30

# Execution order: Priority descending (100 → 1)
execution_notes: |
  1. Start with T-01, T-02 (environment setup)
  2. Core implementation: T-03 → T-05 (model + analysis)
  3. Visualization: T-08 → T-12 (mandatory bar chart first)
  4. Integration: T-13 → T-15 (orchestration)
  5. Config + Docs: T-16 → T-19
  6. Testing: T-04, T-06, T-20 (throughout)
  7. Failsafe: T-FAILSAFE (final verification)

  Key optimization: If h-e1 results available, skip experiment execution
  (saves ~3 hours, reduces to post-processing only).
