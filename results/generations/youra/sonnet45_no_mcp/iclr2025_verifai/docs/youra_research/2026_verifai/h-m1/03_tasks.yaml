    acceptance_criteria:
      - "Bar chart shows two bars (success, timeout)"
      - "Y-axis: mean variance"
      - "Colors: green (success), red (timeout)"
      - "Saved to h-m1/figures/variance_comparison_bar.png"
    estimated_effort: "30 minutes"
    complexity: 11

  - id: "T-10"
    title: "Implement variance distribution histogram"
    type: "visualization"
    priority: 78
    status: "todo"
    epic: "E4"
    parent_task: "T-08"
    description: |
