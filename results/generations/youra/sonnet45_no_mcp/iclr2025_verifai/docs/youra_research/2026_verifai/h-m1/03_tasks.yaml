# Implementation Tasks for h-m1
# Generated: 2026-04-20
# Hypothesis: h-m1 (MECHANISM)
# Base: h-e1 (COMPLETED, PASSED)

version: "1.1"

metadata:
  hypothesis_id: "h-m1"
  hypothesis_type: "MECHANISM"
  tier: "FULL"
  total_budget: 30
  base_hypothesis: "h-e1"
  experiment_type: "PoC"

tasks:
  # PRIORITY 1: Environment Setup
  - id: "T-01"
    title: "Create h-m1 directory structure"
    type: "setup"
    priority: 100
    status: "todo"
    epic: "E1"
    description: |
      Create h-m1 folder structure mirroring h-e1 organization.
      Directories: code/{models,analysis,visualization}, results/, figures/
    reference_files:
      - "03_architecture.md#file-organization"
      - "03_prd.md#output-data"
    acceptance_criteria:
      - "h-m1/code/ directory exists"
      - "h-m1/results/ directory exists"
      - "h-m1/figures/ directory exists"
      - "All subdirectories created (models, analysis, visualization)"
    estimated_effort: "5 minutes"

  - id: "T-02"
    title: "Configure Python path for h-e1 imports"
    type: "setup"
    priority: 99
    status: "todo"
    epic: "E1"
    description: |
      Set up import mechanism to access h-e1 modules.
      Add sys.path.append('../h-e1') to enable imports.
      Verify h-e1 modules are accessible.
    reference_files:
      - "03_architecture.md#external-dependencies"
      - "03_logic.md#external-dependencies-api"
    acceptance_criteria:
      - "Can import h_e1.code.data.loader"
      - "Can import h_e1.code.experiment.runner"
      - "Can import h_e1.code.models.confidence_extractor"
      - "Import test script runs successfully"
    estimated_effort: "10 minutes"

  # PRIORITY 2: Core Implementation (Epic E2)
  - id: "T-03"
    title: "Implement VarianceAnalyzer class"
    type: "model"
    priority: 90
    status: "todo"
    epic: "E2"
    description: |
      Create VarianceAnalyzer extending h-e1's ConfidenceTrajectoryExtractor.
      Implement compute_variance() method (std dev of entropy trajectory).
      Add extract_variance() wrapper method.
    reference_files:
      - "03_logic.md#epic-e2-extend-confidence-extraction"
      - "03_architecture.md#4-confidenceextractor"
      - "03_prd.md#fr-3-extend-confidence-analysis"
    acceptance_criteria:
      - "VarianceAnalyzer inherits from h-e1.ConfidenceTrajectoryExtractor"
      - "compute_variance(entropies) returns np.std(entropies)"
      - "extract_variance() returns (variance, entropies) tuple"
      - "Edge case: returns 0.0 for len(entropies) < 2"
    estimated_effort: "30 minutes"
    complexity: 8

  - id: "T-04"
    title: "Unit tests for VarianceAnalyzer"
    type: "test"
    priority: 89
    status: "todo"
    epic: "E2"
    parent_task: "T-03"
    description: |
      Test variance calculation correctness and edge cases.
      Verify inheritance from h-e1 works correctly.
    reference_files:
      - "03_logic.md#unit-test-requirements"
    acceptance_criteria:
      - "test_variance_calculation() passes"
      - "test_edge_case_single_step() passes"
      - "Variance matches np.std(entropies) exactly"
    estimated_effort: "15 minutes"

  # PRIORITY 3: Group Analysis (Epic E3)
  - id: "T-05"
    title: "Implement VarianceGroupAnalyzer class"
    type: "analysis"
    priority: 85
    status: "todo"
    epic: "E3"
    description: |
      Create GroupAnalyzer for variance comparison between outcome groups.
      Implement separate_by_outcome(), analyze_by_outcome(), evaluate_gate().
    reference_files:
      - "03_logic.md#epic-e3-implement-group-analysis"
      - "03_architecture.md#5-groupanalyzer"
      - "03_prd.md#fr-4-group-comparison-analysis"
    acceptance_criteria:
      - "separate_by_outcome() correctly splits results by outcome"
      - "analyze_by_outcome() returns dict with group statistics"
      - "evaluate_gate() returns True if mean_success < mean_timeout"
      - "Handles edge cases (empty groups)"
    estimated_effort: "45 minutes"
    complexity: 12

  - id: "T-06"
    title: "Unit tests for VarianceGroupAnalyzer"
    type: "test"
    priority: 84
    status: "todo"
    epic: "E3"
    parent_task: "T-05"
    description: |
      Test group separation and statistical calculations.
      Verify gate evaluation logic.
    reference_files:
      - "03_logic.md#e3-tests"
    acceptance_criteria:
      - "test_group_separation() passes"
      - "test_gate_evaluation() passes"
      - "Mean calculations verified against numpy"
    estimated_effort: "20 minutes"

  - id: "T-07"
    title: "Implement result format conversion"
    type: "data-pipeline"
    priority: 83
    status: "todo"
    epic: "E3"
    description: |
      Create utility to convert h-e1 results to h-m1 format.
      Calculate variance from h-e1 saved entropy trajectories.
    reference_files:
      - "03_logic.md#convert_h_e1_to_h_m1_results"
      - "03_prd.md#optimization-opportunities"
    acceptance_criteria:
      - "Loads h-e1 results pickle file"
      - "Calculates variance for each experiment"
      - "Returns h-m1 format results list"
      - "Preserves entropies for visualization"
    estimated_effort: "25 minutes"

  # PRIORITY 4: Visualization (Epic E4)
  - id: "T-08"
    title: "Implement GroupComparisonVisualizer base"
    type: "visualization"
    priority: 80
    status: "todo"
    epic: "E4"
    description: |
      Create GroupComparisonVisualizer extending h-e1's ExperimentVisualizer.
