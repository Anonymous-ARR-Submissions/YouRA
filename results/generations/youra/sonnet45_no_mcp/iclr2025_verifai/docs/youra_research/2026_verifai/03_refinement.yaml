      via DojoCritic interface
  baselines:
  - name: Fixed 30-step timeout
    method: LeanDojo default configuration
  - name: Uniform random allocation
    method: Random budget assignment across theorems
  - name: Depth-first search
    method: Fixed budget with depth-first prioritization
novelty:
  preserved_novelty: First work to treat proof search resource allocation as meta-learning
    problem using LLM confidence geometry. Establishes confidence trajectories as
    encoding proof space manifold structure—general principle for neural reasoning
    systems.
  key_innovation: 'Portfolio allocation framework for proof search combining learned
    (confidence geometry) and symbolic (hash collisions, state growth) signals. Theoretical
    insight: neural models encode geometric properties of successful reasoning trajectories.'
  differentiation:
  - prior_work: LeanDojo [Yang et al., 2023] - retrieval-augmented theorem proving
    difference: LeanDojo focuses on tactic prediction (what to try), we focus on resource
      allocation (when to quit). Orthogonal and combinable.
  - prior_work: Fixed timeout strategies in Z3, SMT solvers
    difference: Adaptive, learned termination heuristics vs. fixed resource limits.
      Content-aware via LLM confidence.
  - prior_work: Symbolic divergence detection (cyclic state detection)
    difference: 'Hybrid approach: LLM adds semantic similarity detection that symbolic
      methods miss.'
