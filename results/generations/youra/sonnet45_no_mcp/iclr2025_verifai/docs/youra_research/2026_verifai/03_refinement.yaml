core_statement:
  hypothesis_id: H-ConfidenceGeometry-v1
  confidence_level: 0.8
  core_hypothesis_statement: 'Under neural theorem proving with LLM-based tactic suggestion
    (e.g., LeanDojo),

    if we deploy a learned compute allocator using LLM confidence geometry (softmax
    entropy trajectory std dev) combined with symbolic divergence signals (state hash
    collisions, proof state growth) and search tree metrics (backtrack frequency,
    branching factor),

    then proof success rate per unit compute improves by >15% compared to fixed-timeout
    baselines,

    because LLM confidence trajectories encode the manifold structure of successful
    proof spaces, and divergence from this manifold (detected via confidence instability)
    correlates with probable non-termination.'
  alternative_hypothesis_h0: There is no significant difference in proof success rate
    per unit compute between the learned allocator and fixed-timeout baseline (improvement
    <5% or allocator underperforms).
variables:
  independent:
  - name: Compute Allocation Strategy
    type: categorical
    operationalization: Method for deciding when to terminate proof search
    levels:
    - Learned Allocator (3-signal)
    - Fixed Timeout (30 steps)
    - Uniform Random
    - Depth-First Search
  dependent:
  - name: Proof Success Rate per Unit Compute
    type: continuous
    operationalization: Number of theorems proven successfully / total GPU-seconds
      consumed (including overhead)
    primary: true
  - name: False Positive Rate
    type: continuous
    operationalization: Proportion of terminated searches that would have succeeded
      with extended timeout
    primary: false
  controlled:
  - name: Base LLM Model
    operationalization: LeanDojo ReProver model fixed across all conditions
  - name: Dataset Split
    operationalization: 60/20/20 train/val/test split from LeanDojo benchmark
  - name: Total Compute Budget
    operationalization: Fixed at 1000 GPU-seconds across all test theorems
causal_mechanism:
  causal_chain_count: 4
  steps:
  - step: 1
    description: LLM confidence (softmax entropy) reflects familiarity with proof
      state patterns from training distribution
    evidence: Exchange 13 - confidence as geometric proxy for proof space manifold
      structure
    falsifier: If confidence shows no correlation with proof space geometry (random
      patterns across successful/failed searches)
  - step: 2
    description: When proof search diverges into non-terminating regions, proof states
      become unfamiliar to LLM, causing confidence instability (high variance in entropy)
    evidence: Exchange 13 - analogy to language model perplexity detecting distribution
      shift
    falsifier: If diverging searches show stable confidence patterns identical to
      successful proofs
  - step: 3
    description: Confidence instability (std dev of entropy > threshold) combined
      with symbolic signals (state hash collisions, exponential growth) and search
      tree metrics (high backtrack frequency) triggers budget reduction
    evidence: Exchange 11 - three-signal hybrid architecture
    falsifier: If signals show no predictive power for eventual timeout (correlation
      < 0.3 in Phase 1 validation)
  - step: 4
    description: Portfolio allocation reallocates saved compute to alternative proof
      strategies, improving overall success rate per unit compute
    evidence: Exchange 7 - portfolio allocation framework, Exchange 10 - 15% overhead
      calculation
    falsifier: If overhead (15%) exceeds gains from avoiding futile searches, resulting
      in net negative efficiency
  key_tension: LLMs trained only on successful proofs must generalize to detect non-termination
    patterns never seen during training (OOD problem)
  evidence_summary: 'Confidence geometry as manifold proxy addresses OOD concern:
    model detects unfamiliarity rather than explicitly recognizing non-termination.
    Validated via Phase 1 signal correlation study (Exchange 14).'
key_assumptions:
- id: A1
  assumption: LLM confidence trajectories encode proof space geometric structure
  supporting_evidence: 'Theoretical: confidence reflects training distribution manifold
    (Exchange 13). Empirical validation planned via Phase 1 correlation study.'
  consequence_if_violated: Confidence derivative signal has no predictive power (correlation
    < 0.3), hypothesis fails Phase 1 gate
- id: A2
  assumption: Extended-timeout experiments (100× normal budget) approximate true non-termination
  supporting_evidence: Exchange 7 - ground truth generation strategy. Some theorems
    may succeed with 1000× compute, but 100× is practical proxy.
  consequence_if_violated: Ground truth labels are noisy, reducing signal correlation
    and allocator performance
- id: A3
  assumption: Portfolio allocation mitigates false positive risk on unconventional
    proofs
  supporting_evidence: Exchange 7 - reduce budget rather than abort. Exchange 6 -
    Prof. Rex stress test addressed.
  consequence_if_violated: High false positive rate (>20%) on valid but unconventional
    proofs, reducing net benefit
- id: A4
  assumption: 15% computational overhead from meta-reasoning is acceptable
  supporting_evidence: 'Exchange 10 - Prof. Pax calculation: 450ms overhead per 3-second
    proof = 15%'
  consequence_if_violated: If overhead > 20%, efficiency gains are marginal or negative
- id: A5
  assumption: LeanDojo DojoCritic plugin interface provides sufficient observability
  supporting_evidence: Exchange 10 - architectural analysis confirms get_tactics()
    exposes softmax probabilities
  consequence_if_violated: Cannot extract confidence signals without forking LeanDojo
    codebase, reducing adoption
scope:
  applies_to: '- Neural theorem proving using LLM-based tactic suggestion

    - Proof assistants with incremental search (Lean, potentially Coq/Isabelle)

    - GPT-style transformer LLMs with softmax probability outputs

    - Compute-constrained environments where efficiency matters'
  does_not_apply_to: '- Purely symbolic theorem provers without learned components

    - Non-GPT architectures (T5, BERT-based provers) - cross-architecture generalization
    unknown

    - Proof assistants other than Lean (Coq, Isabelle, HOL) - requires validation

    - Scenarios where compute is unlimited (no need for allocation)'
  known_limitations: '- Validated only on Lean + LeanDojo with GPT-based models (Exchange
    18)

    - Ground truth approximation via extended timeouts, not true undecidability proofs
    (Exchange 18)

    - May have false positives on unconventional proof paths (Exchange 6)'
predictions:
- id: P1
  primary: true
  statement: Learned allocator achieves >15% higher proof success rate per unit compute
    compared to fixed 30-step timeout baseline on LeanDojo test set
  test_method: 'Controlled experiment: Fix total compute budget (1000 GPU-seconds),
    measure number of theorems proven by each allocation strategy'
  success_criterion: Statistical significance p<0.05 via two-tailed t-test, improvement
    >15%
  falsification: If improvement <5% or allocator underperforms any baseline
- id: P2
  primary: false
  statement: Confidence derivative (std dev of softmax entropy) correlates with eventual
    timeout outcome (correlation coefficient >0.3) in Phase 1 validation
  test_method: 100 extended-timeout experiments, extract confidence derivatives from
    first 15 steps, measure Pearson r and Spearman ρ with success/timeout labels
  success_criterion: r > 0.3 OR ρ > 0.3
  falsification: If both r < 0.3 AND ρ < 0.3, signal is too weak
- id: P3
  primary: false
  statement: Three-signal hybrid (confidence + symbolic + search tree) outperforms
    single-signal ablations
  test_method: 'Ablation study: Test confidence-only, symbolic-only, search-tree-only
    vs. combined model'
  success_criterion: Combined model achieves highest success rate
  falsification: If any single signal matches or exceeds combined performance
