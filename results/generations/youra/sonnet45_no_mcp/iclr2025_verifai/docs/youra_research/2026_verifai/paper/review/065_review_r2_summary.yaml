issues_found:
  fatal: 3
  major: 3
  minor: 3

fatal_issues:
  - id: FATAL-R2-1
    category: variance_inconsistency
    description: Paper uses two different variance value sets (0.0948 vs 0.2944 from h-m1, AND 0.199 vs 0.502 from h-e1)
    paper_claims:
      - "Section 5.2: mean 0.0948 (successful) vs 0.2944 (timeout)"
      - "Section 5.1: mean 0.199 (successful) vs 0.502 (timeout)"
    ground_truth:
      h-e1: "0.1991571... vs 0.5017146..."
      h-m1: "0.09480415... vs 0.2944172..."
    impact: Inconsistent reporting undermines credibility
    required_fix: Use h-e1 values consistently OR explain why h-m1 differs

  - id: FATAL-R2-2
    category: performance_fabrication
    description: Paper claims F1=0.97 for pairwise detector, but Phase 4 shows F1=0.806
    paper_claim: "F1=0.97, precision=1.0, recall=0.94"
    ground_truth: "F1=0.8064516, precision=1.0, recall=0.6756756"
    discrepancy_magnitude: 0.164 (16.4% overstatement)
    impact: Main contribution claim "near-perfect discrimination" is NOT supported
    required_fix: Update all h-m3 numbers to actual Phase 4 results

  - id: FATAL-R2-3
    category: hybrid_performance_mismatch
    description: Paper claims F1=0.80 for hybrid, but Phase 4 shows F1=0.279
    paper_claim: "F1=0.80"
    ground_truth: "F1=0.27906976"
    discrepancy_magnitude: 0.521 (65% overstatement)
    impact: Negative result less dramatic than claimed
    required_fix: Update hybrid numbers throughout paper

major_issues:
  - id: MAJOR-R2-1
    category: sample_split_unexplained
    description: H-M1 has 60/40 split while h-e1/h-m3 have 63/37 split
    impact: Unexplained sample inconsistency undermines reproducibility
    required_fix: Add footnote explaining difference

  - id: MAJOR-R2-2
    category: t_statistic_mismatch
    description: Paper reports t=9.79, actual is t=-8.18
    discrepancy: Different magnitude (9.79 vs 8.18) and sign
    impact: Statistical calculation appears incorrect
    required_fix: Update to correct value

  - id: MAJOR-R2-3
    category: rounding_inconsistency
    description: Inconsistent precision across reported values
    impact: Minor credibility issue
    required_fix: Standardize to 3-4 significant figures

