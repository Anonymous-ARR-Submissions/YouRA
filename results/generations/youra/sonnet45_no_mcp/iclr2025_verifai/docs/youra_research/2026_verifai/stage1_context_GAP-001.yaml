gap_description: 'LLM guidance for theorem provers requires handling infinite search
  spaces and non-halting proofs, but existing work (LeanDojo) focuses on finite proof
  search. Missing: Dynamic search budget allocation and non-termination detection
  mechanisms that leverage LLM confidence scores to decide when to abandon proof attempts.
  Need heuristics for identifying likely non-halting proof obligations before exhausting
  computational resources.'
