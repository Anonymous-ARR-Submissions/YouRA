# Ground Truth for Phase 6.5 Adversarial Review
# Extracted from Phase 4/5 validation results and paper claims
# Purpose: Enable fact-checking of paper claims against actual experimental results

version: "1.0"
created_at: "2026-04-22T00:00:00Z"
source_paper: "docs/youra_research/20260421_question/paper/06_paper.md"
source_validation: "docs/youra_research/20260421_question/045_validated_hypothesis.md"

# ============================================================================
# QUANTITATIVE CLAIMS
# ============================================================================

quantitative_claims:
  # Main Results
  - claim_id: "Q1"
    paper_claim: "Semantic entropy achieves 0.78 AUROC vs 0.69 ensemble baseline"
    actual_value:
      semantic_entropy_auroc: 0.78
      ensemble_baseline_auroc: 0.69
      difference: 0.09
    source: "h-e1/04_validation.md"
    verification_status: "VERIFIED"

  - claim_id: "Q2"
    paper_claim: "9-point AUROC improvement, 13% relative gain"
    actual_value:
      absolute_improvement: 0.09
      relative_improvement: 0.1304  # (0.78-0.69)/0.69 = 13.04%
    source: "h-e1/04_validation.md"
    verification_status: "VERIFIED"

  - claim_id: "Q3"
    paper_claim: "Maximum pairwise correlation 0.21"
    actual_value:
      max_correlation_excluding_bug: 0.208
      reported_as: 0.21  # Rounded
    source: "h-m1/04_validation.md"
    verification_status: "VERIFIED"
    note: "Excludes 1.0 correlation from implementation bug (self-consistency × token variance)"

  - claim_id: "Q4"
    paper_claim: "Error-type diversity difference p=0.158, not significant"
    actual_value:
      nq_diversity_mean: 0.975
      tqa_diversity_mean: 1.077
      p_value: 0.158
      direction: "wrong"  # TQA > NQ, opposite prediction
    source: "h-m2/04_validation.md"
    verification_status: "VERIFIED"

  # Sample Sizes
  - claim_id: "Q5"
    paper_claim: "100 samples per dataset"
    actual_value:
      naturalquestions: 100
      truthfulqa: 100
    source: "02b_verification_plan.md, h-*/04_validation.md"
    verification_status: "VERIFIED"

  - claim_id: "Q6"
    paper_claim: "K=10 samples for ablation"
    actual_value:
      semantic_entropy_k: 10
      ensemble_baseline_k: 10
    source: "h-e1/02c_experiment_brief.md"
    verification_status: "VERIFIED"

  # Model Configuration
  - claim_id: "Q7"
    paper_claim: "Mistral-7B-v0.1, temperature 0.7"
    actual_value:
      model: "Mistral-7B-v0.1"
      temperature: 0.7
      seed: 42
    source: "h-e1/02c_experiment_brief.md, h-m1/02c_experiment_brief.md"
    verification_status: "VERIFIED"

# ============================================================================
# HYPOTHESIS VALIDATION STATUS
# ============================================================================

hypothesis_status:
  - hypothesis_id: "h-e1"
    paper_claim: "Semantic clustering adds value (MUST_WORK gate)"
    gate_type: "MUST_WORK"
    actual_status: "PASS"
    evidence:
      auroc_threshold: 0.70
      auroc_actual: 0.78
      difference_threshold: 0.07
      difference_actual: 0.09
    source: "h-e1/04_validation.md"
    verification_status: "VERIFIED"

  - hypothesis_id: "h-m1"
    paper_claim: "Methods measure orthogonal dimensions (SHOULD_WORK gate)"
    gate_type: "SHOULD_WORK"
    actual_status: "PASS"
    evidence:
      correlation_threshold: 0.7
      max_correlation_actual: 0.208  # Excluding bug
    source: "h-m1/04_validation.md"
    verification_status: "VERIFIED"
    note: "Implementation bug caused self-consistency × token variance = 1.0"

  - hypothesis_id: "h-m2"
    paper_claim: "Error types show distinct signatures (SHOULD_WORK gate)"
    gate_type: "SHOULD_WORK"
    actual_status: "FAIL"
    evidence:
      significance_threshold: 0.05
      p_value_actual: 0.158
      direction: "wrong"  # Opposite predicted
    source: "h-m2/04_validation.md"
    verification_status: "VERIFIED"

# ============================================================================
# METHOD IMPLEMENTATION DETAILS
# ============================================================================

method_implementations:
  semantic_entropy:
    embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
    clustering_algorithm: "Agglomerative"
    distance_threshold: 0.5
    distance_metric: "cosine"
    source: "h-e1/02c_experiment_brief.md"

  ensemble_baseline:
    method: "Majority voting with exact string match"
    samples_k: 10
    metric: "Disagreement rate (1 - max_vote_fraction)"
    source: "h-e1/02c_experiment_brief.md"

  self_consistency:
    method: "Majority voting"
    samples_k: 10
    metric: "Agreement fraction"
    source: "h-m1/02c_experiment_brief.md"

  verbalized_confidence:
    prompt_suffix: "Provide your answer and confidence (0-100%)"
    extraction: "Regex pattern matching"
    fallback: 0.5
    samples_k: 2
    source: "h-m1/02c_experiment_brief.md"

  token_variance:
    status: "IMPLEMENTATION_BUG"
    issue: "Collapsed with self-consistency (correlation 1.0)"
    intended_method: "Variance of token probabilities"
    actual_implementation: "Same as self-consistency"
    source: "h-m1/04_validation.md"

# ============================================================================
# DATASET DETAILS
# ============================================================================

datasets:
  naturalquestions:
    source: "HuggingFace datasets library"
    subset: "unanswerable questions"
    sample_size: 100
    split: "validation"
    error_type_label: "knowledge gaps"

  truthfulqa:
    source: "HuggingFace datasets library"
    format: "generation format"
    sample_size: 100
    domains: ["health", "law", "politics"]
    error_type_label: "confident misconceptions"

# ============================================================================
# FIGURES AND VISUALIZATIONS
# ============================================================================

figures:
  - figure_id: "fig_1"
    paper_reference: "Figure 1"
    description: "AUROC comparison between semantic entropy and ensemble baseline"
    actual_file: "figures/auroc_comparison.png"
    source: "h-e1/figures/auroc_comparison.png"
    shows: "Bar chart with semantic entropy 0.78, ensemble baseline 0.69"

  - figure_id: "fig_2"
    paper_reference: "Figure 2"
    description: "ROC curves for semantic entropy vs ensemble baseline"
    actual_file: "figures/roc_curves.png"
    source: "h-e1/figures/roc_curves.png"
    shows: "ROC curves showing semantic entropy above baseline across all thresholds"

  - figure_id: "fig_3"
    paper_reference: "Figure 3"
    description: "Correlation heatmap across uncertainty methods"
    actual_file: "figures/correlation_heatmap.png"
    source: "h-m1/figures/correlation_heatmap.png"
    shows: "Low correlations except self-consistency × token variance = 1.0"

  - figure_id: "fig_4"
    paper_reference: "Figure 4"
    description: "Diversity distribution box plots"
    actual_file: "figures/diversity_distribution.png"
    source: "h-m2/code/figures/diversity_distribution.png"
    shows: "NQ mean 0.975, TQA mean 1.077, overlapping distributions"

  - figure_id: "fig_5"
    paper_reference: "Figure 5"
    description: "2D error signature space (diversity × agreement)"
    actual_file: "figures/signature_space_2d.png"
    source: "h-m2/code/figures/signature_space_2d.png"
    shows: "No clear separation between datasets"

# ============================================================================
# LIMITATIONS ACKNOWLEDGEMENTS
# ============================================================================

limitations:
  - limitation_id: "L1"
    paper_claim: "Pilot scale (100 samples per dataset)"
    actual_status: "ACKNOWLEDGED"
    mitigation: "Sufficient for proof-of-concept, noted in limitations"

  - limitation_id: "L2"
    paper_claim: "Single model (Mistral-7B)"
    actual_status: "ACKNOWLEDGED"
    mitigation: "Generalization unclear, noted in limitations"

  - limitation_id: "L3"
    paper_claim: "Implementation bug (token variance)"
    actual_status: "ACKNOWLEDGED"
    impact: "Prevents full 4-method comparison, 3 methods still show independence"

  - limitation_id: "L4"
    paper_claim: "Dataset-level partitioning insufficient"
    actual_status: "ACKNOWLEDGED"
    honest_negative_result: true

  - limitation_id: "L5"
    paper_claim: "No calibration analysis"
    actual_status: "ACKNOWLEDGED"
    scope: "Focus on discrimination (AUROC) rather than calibration (ECE)"

# ============================================================================
# VERIFICATION CHECKLIST
# ============================================================================

verification_checklist:
  - check: "All quantitative claims match validation results"
    status: "PASS"

  - check: "Hypothesis gate statuses correctly reported"
    status: "PASS"

  - check: "Implementation details match experiment briefs"
    status: "PASS"

  - check: "Figures reference correct source files"
    status: "PASS"

  - check: "Limitations honestly acknowledged"
    status: "PASS"

  - check: "No overclaims beyond validated results"
    status: "PASS"

  - check: "Negative result (h-m2) presented honestly"
    status: "PASS"

# ============================================================================
# NOTES FOR PHASE 6.5 ADVERSARIAL REVIEW
# ============================================================================

notes_for_review:
  strengths:
    - "Controlled ablation with matched K=10 isolates clustering contribution"
    - "Honest negative result on error-type signatures"
    - "Quantitative claims all verified against actual results"
    - "Implementation bug acknowledged and impact assessed"

  potential_concerns:
    - "Pilot scale limits generalizability (acknowledged in limitations)"
    - "Single model (Mistral-7B) - multi-model validation needed"
    - "Token variance bug prevents full 4-method comparison"
    - "Error-type hypothesis failed - dataset labels insufficient"

  overall_assessment:
    - "Paper claims match experimental evidence"
    - "Limitations honestly acknowledged"
    - "Negative results presented as contributions to knowledge"
    - "No detected overclaims or misrepresentation"
