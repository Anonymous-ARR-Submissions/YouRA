# SECTION 2: Experimental Setup Selection
# ═══════════════════════════════════════════════════════════════

experimental_setup:
  dataset:
    name: "NaturalQuestions (100 examples) + TruthfulQA (100 examples)"
    type: "standard"
    source: "Public benchmarks - NaturalQuestions from Google, TruthfulQA from Lin et al. 2022"
    path: "Loaded via HuggingFace datasets library"
    hypothesis_fit: "NaturalQuestions provides knowledge-gap errors with 'unanswerable' category, TruthfulQA provides confident-misconception errors (memorized falsehoods), enabling error-type comparison per H-ERROR-TYPE"
  model:
    name: "Mistral-7B-v0.1"
    type: "Open-source decoder-only transformer LLM"
    source: "HuggingFace model hub, fully open weights"
    hypothesis_fit: "7B scale achieves >50% accuracy on factual QA (avoiding h-e1 failure where GPT-2 had 0.9%), open-source enables replication, output-based methods work across architectures"
  baselines:
    - name: "Token Probability Variance (K=1)"
      method: "Compute variance of token probability distribution for generated answer, single forward pass"
    - name: "Ensemble Baseline (K=10)"
      method: "Sample K=10 answers at T=0.7, use majority vote, no semantic clustering - isolates sampling effect from clustering"
    - name: "Semantic Entropy (Kuhn 2023)"
      method: "Sample K=10 answers, embed using sentence transformer, cluster semantically equivalent answers, compute entropy over clusters"
    - name: "Self-Consistency (Wang 2022)"
      method: "Sample K=10 answers, measure agreement fraction for most common answer"
    - name: "Verbalized Confidence (Kadavath 2022)"
      method: "Prompt model to self-report confidence 0-100%, extract numeric confidence, K=2 forward passes (answer + confidence)"

