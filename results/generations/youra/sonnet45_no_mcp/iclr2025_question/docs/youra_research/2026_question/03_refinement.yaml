# ═══════════════════════════════════════════════════════════════
# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "Four established uncertainty methods exist: semantic entropy (Kuhn 2023), self-consistency (Wang 2022), verbalized confidence (Kadavath 2022), and token probability variance"
      status: "BUILD_ON"
      evidence: "Reference papers from Phase 0, published and validated independently"
    - claim: "Each method has been validated independently on different benchmarks with different experimental setups"
      status: "BUILD_ON"
      evidence: "Literature review in Phase 1 identified no systematic cross-method comparison"
    - claim: "Previous attempt (h-e1 cross-layer dispersion) failed due to model-internal architecture-specific approach"
      status: "BUILD_ON"
      evidence: "ROUTE_TO_0 failure context - AUROC 0.340, wrong direction, GPT-2 0.9% accuracy on TruthfulQA"
    - claim: "Systematic comparison of methods on same benchmarks using consistent protocols is missing"
      status: "PROVE_NEW"
      evidence: "Gap-1 identified in Phase 1 - this is the core research gap to address"
  scope_reduction_percentage: 25
  phase2b_4_instructions: |
    Build on established method definitions and benchmark availability.
    Focus validation on proving method-benchmark interactions and mechanistic differences.
    Do NOT re-validate that individual methods work (already established).
    DO validate that methods differ across error types (new claim).

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-UncertaintyMechanisms-v1"
  confidence_level: 0.80
  core_hypothesis_statement: |
    Under systematic empirical evaluation on factual QA benchmarks (NaturalQuestions, TruthfulQA),
    if we compare four uncertainty estimation methods (semantic entropy, self-consistency, token variance, verbalized confidence)
    with matched sample sizes and controlled experimental conditions,
    then method performance rankings will differ significantly across error types (knowledge gaps vs confident misconceptions),
    because each method captures a distinct uncertainty dimension (semantic diversity, sampling agreement, distributional sharpness, introspective calibration)
    that responds differently to different error signatures.
  alternative_hypothesis_h0: |
    There is no significant difference in uncertainty method performance rankings across error types.
    All methods measure the same underlying uncertainty signal with equivalent effectiveness,
    and observed performance differences are solely attributable to computational budget (number of samples) rather than method-specific mechanisms.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Uncertainty Method"
      type: "categorical"
      operationalization: "Five methods tested: (1) Token probability variance K=1, (2) Ensemble baseline K=10, (3) Semantic entropy K=10, (4) Self-consistency K=10, (5) Verbalized confidence K=2"
      levels: ["token_variance", "ensemble_baseline", "semantic_entropy", "self_consistency", "verbalized_confidence"]
    - name: "Error Type"
      type: "categorical"
      operationalization: "Two error categories: (1) Knowledge gaps - model uncertain, generates diverse wrong answers (NaturalQuestions unanswerable); (2) Confident misconceptions - model confident, generates consistent wrong answer (TruthfulQA)"
      levels: ["knowledge_gaps", "confident_misconceptions"]
  dependent:
    - name: "AUROC (Area Under ROC Curve)"
      type: "continuous"
      operationalization: "Discrimination metric measuring method's ability to separate correct from incorrect answers, range [0,1], computed per method-benchmark combination"
      primary: true
    - name: "ECE (Expected Calibration Error)"
      type: "continuous"
      operationalization: "Calibration metric measuring alignment between predicted confidence and actual accuracy, range [0,1], lower is better, computed for verbalized confidence method"
      primary: false
  controlled:
    - name: "Model"
      operationalization: "Fixed to Mistral-7B for pilot study, same checkpoint used across all methods and benchmarks"
    - name: "Sample Size (K)"
      operationalization: "Fixed to K=10 for fair comparison across sampling methods (semantic entropy, self-consistency, ensemble), K=1 for token variance baseline, K=2 for verbalized confidence"
    - name: "Temperature"
      operationalization: "Fixed to T=0.7 for all sampling methods to enable diversity while maintaining quality"
    - name: "Prompt Template"
      operationalization: "Same base prompt across methods, with additional confidence elicitation prompt for verbalized confidence method"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 3
  steps:
    - step: 1
      description: "Different uncertainty methods probe orthogonal dimensions of model uncertainty: semantic entropy measures diversity of meaning in outputs (clusters semantically equivalent answers), self-consistency measures agreement across samples, token variance measures distributional sharpness, verbalized confidence measures introspective calibration"
      evidence: "Reference papers define distinct mechanisms - Kuhn 2023 (semantic clustering), Wang 2022 (sampling agreement), token probabilities (distribution analysis), Kadavath 2022 (prompted self-assessment)"
      falsifier: "If ablation study shows semantic entropy performs identically to ensemble baseline (no clustering), then semantic diversity dimension does not exist separately from sampling dimension"
    - step: 2
      description: "Different error types generate distinct uncertainty signatures: knowledge gaps produce high semantic diversity (model generates varied wrong answers) and low sampling agreement, while confident misconceptions produce low semantic diversity (model consistently generates same wrong answer) and high sampling agreement on incorrect answer"
      evidence: "Discussed in Exchange 2 (Prof. Vera), Exchange 7 (Dr. Nova mechanistic decomposition) - error type determines which uncertainty dimension activates"
      falsifier: "If method performance rankings remain identical across error types (rank correlation ≥ 0.9), then error types do not have distinct signatures"
    - step: 3
      description: "Method-error type matching determines detection effectiveness: semantic entropy excels when semantic diversity is high (knowledge gaps), fails when diversity is low (confident misconceptions); self-consistency shows opposite pattern; token variance provides stable baseline; verbalized confidence depends on training signal presence"
      evidence: "Predictions P1-P3 operationalize this mechanism - semantic entropy AUROC 0.70 on knowledge gaps vs 0.55 on misconceptions, self-consistency fails (<0.55) on misconceptions"
      falsifier: "If all methods achieve similar AUROC (within 0.05) on both error types, then method-error matching does not determine effectiveness"
  key_tension: "Whether semantic clustering adds value beyond multiple sampling (H-MECHANISM) vs whether advantage comes purely from computational budget"
  evidence_summary: |
    Causal mechanism supported by: (1) distinct method definitions from reference papers showing orthogonal approaches,
    (2) error type analysis from discussion identifying different failure modes (diverse guessing vs consistent hallucination),
    (3) ablation design isolating clustering contribution by comparing semantic entropy to ensemble baseline with matched K=10.
    Tension acknowledged and addressed through explicit ablation study.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Error types can be objectively partitioned using model's verbalized confidence scores: >80% confident but wrong = confident misconception, <50% confident and wrong = knowledge gap"
    supporting_evidence: "Prof. Rex raised partitioning concern in Exchange 12, mitigation proposed using model's own confidence as objective criterion"
    consequence_if_violated: "If partition is subjective or unreliable, error-type comparisons become confounded and H-ERROR-TYPE cannot be properly tested"
  - id: "A2"
    assumption: "Semantic entropy implementation (embedding model, clustering algorithm, similarity threshold) matches Kuhn 2023 methodology sufficiently to reproduce their findings"
    supporting_evidence: "Kuhn 2023 provides implementation details, code availability mentioned in Phase 1"
    consequence_if_violated: "If clustering implementation differs significantly, semantic entropy results may not be comparable to published baselines, requiring sensitivity analysis across configurations"
  - id: "A3"
    assumption: "K=10 samples is sufficient for semantic entropy to demonstrate clustering advantage and for self-consistency to show agreement patterns, while not being excessive"
    supporting_evidence: "Wang 2022 used K=5-40 for self-consistency, discussion chose K=10 as middle ground, Prof. Rex requested K-sensitivity analysis"
    consequence_if_violated: "If K=10 is too small or too large, method comparisons become unfair, requiring K-sensitivity analysis across {5, 10, 20}"
  - id: "A4"
    assumption: "Mistral-7B achieves >50% accuracy on NaturalQuestions and >20% on TruthfulQA, providing sufficient correct/incorrect examples for AUROC calculation"
    supporting_evidence: "Prof. Pax cited ~65% accuracy on NaturalQuestions in Exchange 9, avoiding previous failure where GPT-2 had 0.9% on TruthfulQA"
    consequence_if_violated: "If model accuracy too low, insufficient positive examples make AUROC unreliable, requiring model substitution or dataset change"
  - id: "A5"
    assumption: "Verbalized confidence calibration depends on presence of metacognitive training signals (e.g., 'unanswerable' category in NaturalQuestions) rather than model size or architecture"
    supporting_evidence: "Dr. Nova's mechanistic analysis in Exchange 7 - NaturalQuestions trains models to say 'I don't know', TruthfulQA does not"
    consequence_if_violated: "If calibration differences arise from other factors (model size, architecture, dataset difficulty), H-CALIBRATION attribution becomes uncertain"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Factual question-answering tasks where ground truth exists
    - Open-source LLMs (7B parameter scale, specifically Mistral-7B in pilot)
    - Two error types: knowledge gaps (uncertain, diverse outputs) and confident misconceptions (certain, consistent outputs)
    - Output-based uncertainty methods (no architecture-specific internal probing)
    - Pilot scope: 200 examples (100 NaturalQuestions, 100 TruthfulQA)
    - Evaluation metrics: AUROC for discrimination, ECE for calibration
  does_not_apply_to: |
    - Reasoning tasks with chain-of-thought (mentioned but not tested due to lack of benchmark specification)
    - Generation tasks without ground truth (open-ended creative writing)
    - Multimodal models (vision-language) - mentioned as future extension but out of scope for pilot
    - Model scales outside 7B range in pilot (1B and 13B mentioned for Phase 2 scaling but not initial validation)
    - Novel uncertainty metrics (explicitly avoided based on h-e1 failure lessons)
    - Human evaluation or subjective quality assessment (violates feasibility constraints)
  known_limitations: |
    - Pilot uses single model (Mistral-7B), generalization across architectures requires Phase 2 validation
    - Error type partitioning relies on model's verbalized confidence, which may itself be miscalibrated
    - Semantic entropy results depend on clustering algorithm implementation choices
    - Fixed K=10 may not be optimal for all methods, requires sensitivity analysis
    - TruthfulQA focuses on memorized misconceptions, may not generalize to all factual errors
    - No reasoning task evaluation due to lack of specified benchmark in reference materials

