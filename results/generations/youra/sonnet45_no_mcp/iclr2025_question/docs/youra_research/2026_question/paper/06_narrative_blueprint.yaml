# ═══════════════════════════════════════════════════════════════════════════════
# PART 1: HOOK & MOTIVATION
# ═══════════════════════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: "Uncertainty estimation methods for language models have proliferated—semantic entropy, self-consistency, verbalized confidence—yet no systematic comparison exists to answer a basic question: which method should practitioners actually use?"
    strategy: "practical_gap"

  why_reader_should_care:
    main_reason: "Without understanding which uncertainty methods work for which error types, practitioners deploy the wrong tool, researchers duplicate effort, and the field lacks principled method selection criteria."
    concrete_example: "A production system using self-consistency to detect knowledge gaps may achieve 0.55 AUROC while semantic entropy on the same task reaches 0.78—a 13% relative improvement from simply choosing the right method."
    stakes: "As LLMs move into high-stakes applications (medical, legal, financial), principled uncertainty estimation becomes critical for safe deployment."

  real_world_impact:
    application_domain: "Safe AI deployment, factual question answering, hallucination detection"
    potential_beneficiaries: "ML practitioners deploying LLMs, researchers developing uncertainty methods, organizations requiring calibrated confidence estimates"
    scale_of_impact: "Affects all LLM applications requiring reliability guarantees—millions of production queries daily across industries"

# ─────────────────────────────────────────────────────────────────────────────
# PROBLEM FRAMING
# ─────────────────────────────────────────────────────────────────────────────

problem_framing:
  surface_problem:
    description: "Multiple uncertainty estimation methods exist for detecting LLM errors (semantic entropy, self-consistency, token variance, verbalized confidence), each validated independently on different benchmarks."
    common_understanding: "Papers typically claim 'our method works' without systematic comparison to alternatives or characterization of when methods succeed or fail."

  deeper_problem:
    description: "Methods measure fundamentally different uncertainty dimensions (semantic diversity, sampling agreement, distributional sharpness, introspective calibration), yet we lack understanding of how these dimensions relate to different error types."
    why_overlooked: "Each method paper focuses on validation within a single experimental setup rather than cross-method, cross-benchmark characterization."
    our_perspective: "The question isn't 'which method is best' but 'which mechanism works for which error signature'—method selection should match the computational properties of the error type."

  gap_in_existing_work:
    description: "No controlled ablation study isolates the contribution of semantic clustering from computational budget (multiple sampling), and no work characterizes whether methods capture orthogonal vs. redundant uncertainty signals."
    why_gap_exists: "Prior work validates methods in isolation rather than designing experiments that reveal mechanistic differences."
    why_gap_matters: "Without mechanistic understanding, practitioners cannot predict when methods will succeed, researchers cannot identify true gaps vs. redundant efforts, and the field cannot build on solid foundations."

# ═══════════════════════════════════════════════════════════════════════════════
# PART 2: THE INSIGHT
# ═══════════════════════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: "Semantic clustering contributes measurably beyond multiple sampling (9 AUROC points), and uncertainty methods capture orthogonal dimensions (max correlation 0.21), but error types defined by benchmark choice do not exhibit distinct signatures."
    expanded_explanation: "By comparing semantic entropy to an ensemble baseline with matched K=10 samples, we isolate the clustering contribution from the sampling effect. Correlation analysis reveals methods measure independent dimensions, but dataset-level partitioning (NaturalQuestions vs TruthfulQA) proves insufficient to reveal error-type specificity."

  why_others_missed_it:
    common_assumptions: "Prior work assumed (1) semantic entropy's advantage comes from multiple sampling rather than clustering specifically, (2) methods measure the same general uncertainty with different computations, (3) benchmark choice cleanly separates error types."
    our_different_view: "We designed an ablation to isolate clustering, measured method independence explicitly, and discovered that error-type signatures require instance-level features rather than dataset labels."
    enabling_factor: "Controlled experimental design with matched computational budgets and systematic correlation analysis across methods."

  what_makes_it_work:
    intuitive_explanation: "Think of uncertainty methods as measuring different aspects of a model's confusion—one measures answer diversity (semantic entropy), another measures sampling agreement (self-consistency), another measures introspection (verbalized confidence). They're like different instruments measuring related but distinct phenomena."
    key_mechanism: "Semantic clustering groups semantically equivalent answers before computing entropy, capturing meaning-level diversity rather than string-level variation. This orthogonal measurement reveals uncertainty dimensions missed by simple voting."
    analogy: "Like measuring a patient with multiple instruments (thermometer, blood pressure, heart rate)—each reveals a different dimension of health, and combining them gives a fuller picture than any single measurement."

# ═══════════════════════════════════════════════════════════════════════════════
# PART 3: EVIDENCE STORY
# ═══════════════════════════════════════════════════════════════════════════════

evidence_narrative:
  main_claim:
    statement: "Semantic entropy with clustering outperforms ensemble baselines for uncertainty estimation (9 AUROC points improvement), and multiple uncertainty methods measure orthogonal dimensions (max correlation 0.21), but error-type specificity requires instance-level partitioning beyond dataset choice."
    measurable_criteria: "AUROC improvement ≥0.07, pairwise correlation <0.7, statistical significance p<0.05 for error-type differences"

  supporting_evidence:
    - id: "evidence_1_clustering_contribution"
      what: "Semantic entropy (AUROC 0.78) outperforms ensemble baseline (AUROC 0.69) by 0.09 on NaturalQuestions unanswerable questions, exceeding the 0.07 threshold."
      so_what: "Proves semantic clustering adds measurable value beyond computational budget—the advantage comes from grouping equivalent answers, not just sampling more."
      how_it_supports_claim: "Directly validates the clustering mechanism through controlled ablation with matched K=10 samples."

    - id: "evidence_2_method_independence"
      what: "Pairwise correlations between uncertainty methods range from -0.17 to 0.02 (excluding implementation bug causing 1.0 correlation), with max 0.21 << 0.7 threshold."
      so_what: "Demonstrates methods capture orthogonal uncertainty dimensions rather than redundant signals—each method reveals different aspects of model uncertainty."
      how_it_supports_claim: "Validates that methods measure distinct computational properties (semantic diversity, sampling agreement, introspection), justifying multi-method approaches."

    - id: "evidence_3_error_type_finding"
      what: "No significant diversity difference between NaturalQuestions (mean 0.98) and TruthfulQA (mean 1.08), p=0.158 > 0.05, opposite predicted direction."
      so_what: "Reveals that dataset-level partitioning is insufficient for error-type characterization—knowledge gaps and misconceptions both produce high diversity in practice."
      how_it_supports_claim: "Honest negative result that refines our understanding—error types are instance properties, not dataset properties."

  surprising_findings:
    finding: "TruthfulQA showed higher diversity (1.08) than NaturalQuestions (0.98), opposite the prediction that confident misconceptions would produce lower diversity."
    why_surprising: "Expected confident misconceptions to generate consistent wrong answers (low diversity), but observed the opposite pattern."
    our_interpretation: "TruthfulQA questions likely trigger multiple competing misconceptions rather than single confident errors, or dataset partitioning doesn't cleanly separate error types. Future work should use model's verbalized confidence for instance-level partitioning."

  what_results_mean:
    synthesis: "Semantic clustering provides a robust, measurable improvement for uncertainty estimation. Methods measure orthogonal dimensions, suggesting ensemble approaches could leverage complementary signals. However, characterizing error types requires moving beyond dataset labels to instance-level features."
    confidence_level: "High confidence in clustering contribution and method independence (strong statistical evidence). Medium confidence on error-type interpretation (null result, multiple competing explanations)."
    caveats: "Pilot scale (100 samples), single model (Mistral-7B), implementation issues (token variance bug). Results demonstrate proof-of-concept but require scaling for production claims."

# ═══════════════════════════════════════════════════════════════════════════════
# PART 4: BROADER IMPACT
# ═══════════════════════════════════════════════════════════════════════════════

takeaway:
  main_contribution:
    one_sentence: "First systematic ablation showing semantic clustering's isolated contribution to uncertainty estimation and first correlation analysis demonstrating method independence across four uncertainty approaches."
    why_significant: "Moves the field from 'which method wins' comparisons to mechanistic understanding of what uncertainty dimensions each method captures, enabling principled method selection."

  implications:
    for_field: "Researchers can build on validated mechanistic understanding rather than proposing redundant methods. Future work should focus on instance-level error characterization and hybrid approaches leveraging orthogonal signals."
    for_practice: "Practitioners should use semantic entropy for factual QA uncertainty estimation (13% relative improvement) and can combine orthogonal methods for robust uncertainty quantification in high-stakes applications."
    conceptual_contribution: "Introduces 'uncertainty fingerprinting' concept—each error type should have characteristic multi-method signature. Null result on error-type signatures points toward instance-level features as next frontier."

  future_possibilities:
    immediate_extensions: "Multi-model validation (GPT, LLaMA, Gemini), full-scale evaluation (full test sets), instance-level error partitioning using verbalized confidence thresholds."
    longer_term_vision: "Adaptive uncertainty estimation that selects methods based on detected error signatures, hybrid methods combining orthogonal signals, extension to reasoning tasks and multimodal models."
    open_questions: "What determines optimal K for semantic entropy? How do results generalize across model families? Can we predict method effectiveness from instance features?"

# ═══════════════════════════════════════════════════════════════════════════════
# PART 5: SECTION-LEVEL NARRATIVE GOALS
# ═══════════════════════════════════════════════════════════════════════════════

section_goals:

  abstract:
    narrative_purpose: "Compress the entire story into ~150 words"
    key_message: "Semantic clustering improves uncertainty estimation by 9 AUROC points, methods measure orthogonal dimensions, but error-type signatures require instance-level features."
    structure_notes: |
      - Sentence 1: Uncertainty methods proliferate without systematic comparison
      - Sentence 2-3: We conduct controlled ablation and correlation analysis
      - Sentence 4: Semantic entropy outperforms by 0.09 AUROC (13% relative)
      - Sentence 5: Methods show low correlation (max 0.21), confirming independence
      - Sentence 6: Error-type signatures not found at dataset level (honest limitation)
      - Sentence 7: Implications for practitioners (use semantic clustering) and researchers (instance-level partitioning)
    avoid:
      - "Citations in abstract"
      - "Vague claims without numbers"
      - "Undefined acronyms (spell out AUROC first use)"

  introduction:
    narrative_purpose: "Hook → Problem → Insight → Solution preview"
    hook_strategy: "Practical gap—methods exist but no principled selection criteria"
    problem_escalation: |
      1. Surface: Multiple uncertainty methods exist, each validated independently
      2. Deeper: Methods measure different dimensions but we don't know which or why
      3. Gap: No ablation isolating mechanisms, no characterization of method independence
    insight_preview: "Through controlled ablation with matched computational budgets and systematic correlation analysis, we reveal that semantic clustering contributes beyond sampling and methods capture orthogonal signals."
    contributions_framing: |
      Our contributions emerge naturally from this mechanistic approach:
      • First ablation isolating semantic clustering from sampling (9-point AUROC improvement)
      • First correlation analysis across four methods (max 0.21, confirming orthogonality)
      • Honest negative result on error-type signatures (dataset labels insufficient)
      • Actionable insights for practitioners and researchers
    transition_to_related_work: "To contextualize these contributions, we review existing uncertainty methods and their validation approaches."

  related_work:
    narrative_purpose: "Show why existing work is insufficient → justify our approach"
    positioning_strategy: "Acknowledge strengths of individual method papers, highlight gap in comparative/mechanistic analysis"
    key_comparison_points:
      - area: "Semantic Entropy (Kuhn et al. 2023)"
        limitation_to_highlight: "Validated on single benchmark, no ablation vs. simple ensemble baseline with matched K"
        how_we_differ: "We design ablation with matched K=10 to isolate clustering contribution"
      - area: "Self-Consistency (Wang et al. 2022)"
        limitation_to_highlight: "Focused on reasoning tasks, no analysis of orthogonality vs. other methods"
        how_we_differ: "We measure correlation across methods to quantify independence"
      - area: "Verbalized Confidence (Kadavath et al. 2022)"
        limitation_to_highlight: "No comparison to output-based methods or characterization of when each works"
        how_we_differ: "We test all methods on same data to enable direct comparison"
    papers_to_discuss:
      - "Kuhn et al. 2023 - Semantic Uncertainty"
      - "Wang et al. 2022 - Self-Consistency"
      - "Kadavath et al. 2022 - Language Models Know What They Know"
      - "Baseline: token probability variance methods"
    avoid:
      - "Dismissing prior work unfairly"
      - "Missing obvious related work in uncertainty estimation"
      - "Listing papers without building argument"

  methodology:
    narrative_purpose: "Explain WHY this design solves the problem"
    connection_to_insight: "To isolate mechanisms and measure independence, we need controlled comparisons with matched computational budgets and correlation analysis across methods."
    key_design_decisions:
      - decision: "Ablation baseline: ensemble voting with matched K=10"
        rationale: "Isolates clustering contribution from sampling effect—both methods use same number of samples, only difference is semantic clustering"
        alternatives_considered: "Could compare K=10 semantic entropy vs K=1 baseline, but this confounds clustering with computational budget"
      - decision: "Correlation analysis across methods on same samples"
        rationale: "Measuring correlation quantifies whether methods capture orthogonal vs. redundant signals"
        alternatives_considered: "Could analyze methods separately, but this doesn't reveal independence structure"
      - decision: "Dataset-level error partitioning (NQ vs TQA)"
        rationale: "Initial hypothesis that benchmarks separate knowledge gaps vs misconceptions"
        alternatives_considered: "Instance-level partitioning using verbalized confidence (future work direction from negative result)"
    intuition_building: |
      Key intuition: Think of semantic entropy as two-stage process:
      1. Cluster semantically equivalent answers ("Paris", "paris", "The capital is Paris")
      2. Compute entropy over clusters, not raw strings

      The ablation tests whether stage 1 adds value beyond just stage 2 with more samples.
    technical_depth_balance: |
      Main paper: Experimental design, rationale, high-level method descriptions
      Appendix: Full implementation details, hyperparameter sensitivity, additional ablations

  experiments:
    narrative_purpose: "Design experiments that test our specific claims"
    experimental_questions:
      - question: "Does semantic clustering add value beyond multiple sampling?"
        experiment: "h-e1 ablation: semantic entropy vs ensemble baseline, both K=10"
        expected_outcome: "AUROC difference ≥0.07 (MUST_WORK gate)"
      - question: "Do methods capture orthogonal uncertainty dimensions?"
        experiment: "h-m1 correlation analysis: pairwise correlations across 4 methods"
        expected_outcome: "Max correlation <0.7 (SHOULD_WORK gate)"
      - question: "Do error types have distinct uncertainty signatures?"
        experiment: "h-m2 dataset comparison: diversity analysis NQ vs TQA"
        expected_outcome: "Significant diversity difference p<0.05 (SHOULD_WORK gate)"
    baseline_rationale: "Ensemble baseline controls for computational budget—same K=10, only differs in clustering mechanism"
    dataset_rationale: "NaturalQuestions (unanswerable) for knowledge gaps, TruthfulQA for confident misconceptions, both standard benchmarks with ground truth"
    metric_rationale: "AUROC measures discrimination (method ranks errors correctly), correlation measures independence, diversity/agreement capture error signatures"
    fairness_considerations: |
      - Same model (Mistral-7B) across all experiments
      - Same samples across method comparisons
      - Fixed hyperparameters (K, temperature) for reproducibility
      - Matched computational budget in ablation study

  results:
    narrative_purpose: "Present evidence that supports our claims"
    main_result_highlight: "Semantic entropy achieves 0.78 AUROC vs 0.69 ensemble baseline—9-point improvement (13% relative) from clustering alone"
    result_presentation_order:
      - result: "h-e1 ablation results (AUROC comparison)"
        purpose: "Establish core contribution first—clustering adds measurable value"
      - result: "h-m1 correlation matrix"
        purpose: "Show methods are independent—builds case for multi-method approaches"
      - result: "h-m2 diversity analysis (negative result)"
        purpose: "Honest limitation—error-type signatures require different approach"
    surprising_result_handling: "TruthfulQA diversity exceeded NaturalQuestions (opposite prediction)—discuss competing explanations: (1) misconceptions trigger multiple competing errors, (2) dataset labels don't map to error types, (3) model-specific behavior. Most plausible: dataset-level partitioning too coarse."
    avoid:
      - "Cherry-picking only positive results"
      - "Hiding negative findings"
      - "Tables without interpretation"

  discussion:
    narrative_purpose: "Interpret results, acknowledge limits, show significance"
    key_findings_interpretation: "Semantic clustering contributes beyond sampling (validated), methods measure orthogonal dimensions (validated), error-type signatures require instance-level features (refined understanding from null result)."
    honest_limitations:
      - limitation: "Pilot scale (100 samples per dataset)"
        why_acceptable: "Sufficient statistical power to detect 9-point AUROC difference, validates proof-of-concept"
        future_mitigation: "Scale to full test sets (NQ: 3610, TQA: 817) for production claims"
      - limitation: "Single model (Mistral-7B)"
        why_acceptable: "Demonstrates feasibility on accessible open-source model"
        future_mitigation: "Multi-model validation across GPT, LLaMA, Gemini families"
      - limitation: "Implementation issues (token variance bug)"
        why_acceptable: "Remaining methods (3 of 4) show independence; bug identified and documented"
        future_mitigation: "Reimplement with logit-level analysis, add unit tests"
      - limitation: "Dataset-level error partitioning"
        why_acceptable: "Initial hypothesis failed but revealed need for instance-level approach"
        future_mitigation: "Use model's verbalized confidence for partitioning (>80% = misconception, <50% = gap)"
    broader_impact_statement: |
      Positive impacts: Improved uncertainty estimation enables safer LLM deployment in high-stakes domains (medical, legal).
      Potential risks: Uncertainty methods can give false confidence if miscalibrated—practitioners must validate on their specific use case.
      Ethical considerations: Better uncertainty quantification could reduce harms from overconfident AI systems but doesn't eliminate need for human oversight.

  conclusion:
    narrative_purpose: "Reinforce key message + open future directions"
    callback_to_hook: "We opened by asking which uncertainty method practitioners should use. Our answer: semantic entropy for factual QA (13% improvement), but more fundamentally, match method mechanism to error signature—a principle requiring instance-level characterization."
    memorable_ending: "The field's next frontier isn't inventing more methods but understanding when and why existing ones work—from 'which wins' to 'what works where.'"
    future_work_vision: "Near-term: multi-model validation, full-scale evaluation, instance-level partitioning. Long-term: adaptive method selection, hybrid approaches, extension to reasoning and multimodal tasks. The mechanistic framework established here provides foundation for principled uncertainty estimation."

