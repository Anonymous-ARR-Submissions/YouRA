hypothesis_draft:
  title: "Mechanistic Decomposition of Uncertainty Method Performance Across Error Types"
  hypothesis_id: "H-UncertaintyMechanisms-v1"
  core_claim: |
    Uncertainty estimation methods capture distinct uncertainty dimensions (semantic diversity,
    sampling agreement, distributional sharpness, introspective calibration), creating
    characteristic performance patterns across error types (knowledge gaps vs confident misconceptions)
    that enable principled method selection for hallucination detection in LLMs.
  mechanism: |
    Different error types generate distinct uncertainty signatures: knowledge gaps produce high
    semantic diversity (varied wrong answers) detected by semantic entropy, while confident
    misconceptions produce low diversity (consistent wrong answers) where semantic entropy fails
    but token variance provides stable baseline. Self-consistency fails on confident misconceptions
    (high agreement on wrong answer) but succeeds on genuine uncertainty. Verbalized confidence
    calibration depends on metacognitive training signal presence.
  predictions:
    - "P1: Semantic entropy outperforms ensemble baseline by ≥0.07 AUROC on knowledge gaps (demonstrates clustering value beyond sampling)"
    - "P2: Method rankings differ across error types with rank correlation < 0.7 (demonstrates error-type specificity)"
    - "P3: Verbalized confidence ECE < 0.15 on NaturalQuestions but > 0.25 on TruthfulQA (demonstrates calibration sensitivity to training)"

variables_summary:
  independent: "Uncertainty Method (5 levels: token variance, ensemble baseline, semantic entropy, self-consistency, verbalized confidence) × Error Type (2 levels: knowledge gaps, confident misconceptions)"
  dependent_primary: "AUROC (discrimination metric, range 0-1), ECE (calibration metric, range 0-1, lower better)"
  controlled: "Model (Mistral-7B), Sample Size (K=10 for fair comparison, K=1 for token variance, K=2 for verbalized confidence), Temperature (T=0.7), Prompt Template"

null_hypothesis:
  h0_statement: |
    All uncertainty methods measure the same underlying uncertainty signal with equivalent effectiveness.
    Performance differences are solely attributable to computational budget (number of samples) rather
    than method-specific mechanisms. Method rankings remain constant across error types.
  statistical_test: "Spearman rank correlation for method ranking consistency across error types, Mann-Whitney U test for AUROC comparisons"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "Mechanistic decomposition transforming method comparison from 'which wins' to 'what mechanisms explain performance when'. Ablation design isolating clustering vs sampling. Error-type partitioning enabling specificity analysis."
  differentiation_summary: |
    Previous work validated individual methods in isolation. This research provides systematic
    cross-method comparison with mechanistic understanding through ablations (semantic entropy vs
    ensemble baseline) and error-type analysis (knowledge gaps vs confident misconceptions).
    Avoids h-e1 failure by using output-based established methods, not architecture-specific novel metrics.

