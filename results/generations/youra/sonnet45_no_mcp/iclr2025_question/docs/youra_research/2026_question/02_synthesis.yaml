  clarity_verified: true
  improvements_needed: []

experimental_scope:
  models: ["Mistral-7B-v0.1 (pilot)", "Potential Phase 2: Llama-3.1-8B, Phi-3-medium"]
  datasets: ["NaturalQuestions (100 examples)", "TruthfulQA (100 examples)", "Potential Phase 2: HaluEval, full dataset scale-up"]
  baselines: ["Token probability variance K=1", "Ensemble baseline K=10", "Semantic entropy K=10", "Self-consistency K=10", "Verbalized confidence K=2"]

measurement_plan:
  data_collection:
    - source: "NaturalQuestions via HuggingFace datasets - sample 100 examples including answerable and unanswerable"
    - source: "TruthfulQA via HuggingFace datasets - sample 100 examples focusing on common misconceptions"
    - source: "Model outputs: For each example, generate K samples at T=0.7, extract token probabilities, collect verbalized confidence"
  procedure:
    - step: "Load Mistral-7B model and benchmark datasets"
    - step: "For each method-benchmark combination, run inference: Token variance (1 pass), Verbalized confidence (2 passes), Others (10 passes)"
    - step: "Compute uncertainty scores per method: Semantic entropy (cluster + entropy), Self-consistency (agreement fraction), Token variance (distribution variance), Verbalized confidence (extracted numeric confidence)"
    - step: "Partition examples by error type using model's verbalized confidence: >80% confident but wrong = confident misconception, <50% confident and wrong = knowledge gap"
    - step: "Compute AUROC for each method-error-type combination using sklearn.metrics.roc_auc_score"
    - step: "Compute ECE for verbalized confidence using calibration binning (10 bins)"
    - step: "Compare semantic entropy vs ensemble baseline (ablation) on knowledge gaps subset"
    - step: "Compute rank correlation of method performance across error types using scipy.stats.spearmanr"
  success_criteria:
    - "P1: AUROC_semantic - AUROC_ensemble ≥ 0.07 on knowledge gaps, semantic AUROC ≥ 0.70"
    - "P2: Spearman rank correlation < 0.7 across error types, self-consistency AUROC < 0.55 on TruthfulQA"
    - "P3: ECE_NaturalQuestions < 0.15 AND ECE_TruthfulQA > 0.25, difference ≥ 0.10"
    - "Minimum success: At least ONE prediction confirmed = publishable finding"

validation:
  internal_validity:
    - "Controlled confounds: Same model checkpoint, same prompts (except verbalized confidence elicitation), same temperature, same sample size K=10 for fair comparison"
    - "Ablation study: Semantic entropy vs ensemble baseline isolates clustering contribution from sampling effect"
    - "Objective partitioning: Use model's own verbalized confidence for error-type classification (>80% = confident, <50% = uncertain)"
    - "Multiple metrics: AUROC for discrimination, ECE for calibration, rank correlation for consistency"
  external_validity:
    - "Generalization concerns: Single model (Mistral-7B) in pilot, requires Phase 2 scaling to 1B/13B and other architectures"
    - "Benchmark representativeness: NaturalQuestions and TruthfulQA selected for error-type diversity, but may not cover all factual error types"
    - "Clustering sensitivity: Semantic entropy results depend on implementation (embedding model, clustering algorithm), requires robustness check across 2-3 configurations"
    - "Sample size sensitivity: K=10 may not be optimal for all methods, K-sensitivity analysis needed across {5, 10, 20}"

