hypothesis_draft:
  title: Weight-Based Binary Classification of CNN Architectural Depth
  hypothesis_id: H-WeightDepthClassifier-v1
  core_claim: Pretrained CNN architectures exhibit weight distribution signatures
    that enable binary classification (shallow ≤34 layers vs. deep ≥50 layers) with
    >70% accuracy using simple aggregated statistics (mean/std of layer-wise Frobenius
    norms).
  mechanism: Deep networks develop distinctive weight norm patterns through (1) accumulated
    gradient transformations across 50+ layers, (2) architectural constraints from
    residual/dense connections, and (3) differential batch normalization effects.
  predictions:
    P1: Binary logistic regression on weight norm statistics achieves ≥70% test accuracy
    P2: Within-family validation (ResNet-only, VGG-only) maintains ≥65% accuracy
    P3: Random label shuffle produces ≤55% accuracy (validates signal over noise)
variables_summary:
  independent: 'Network depth category (binary: shallow ≤34 layers vs deep ≥50 layers)'
  dependent_primary: Classification accuracy (%) on held-out test set
  controlled: Training dataset (ImageNet 1K via PyTorch torchvision), feature extraction
    method (layer-wise Frobenius norms)
null_hypothesis:
  h0_statement: There is no significant difference in weight distribution statistics
    between shallow and deep pretrained CNNs sufficient for >70% binary classification
    accuracy.
  statistical_test: 'Classification accuracy comparison: test accuracy vs. 70% threshold
    and 50% random baseline'
  significance_level: 0.05
novelty_assessment:
  status: VERIFIED
  key_innovation: First demonstration of weight-statistics-only architectural depth
    classification, extending weight analysis beyond compression/transfer learning
    to property inference
  differentiation_summary: Methodological pivot from Run 3 correlation analysis (|ρ|
    = 0.859) to binary classification for larger effect size. Decision boundary discovery
    for practical use cases (model zoo navigation) vs. correlation measurement for
    theoretical understanding.
clarity:
  overall_level: HIGH
  clarity_verified: true
  improvements_needed: []
experimental_scope:
  models:
  - 'PyTorch torchvision pretrained CNNs: ResNet-18/34/50/101/152, VGG-11/13/16/19,
    DenseNet-121/169/201, AlexNet, SqueezeNet, MobileNet-v2, ShuffleNet, Wide-ResNet,
    ResNeXt'
  datasets:
  - ImageNet 1K (pretrained models)
  baselines:
  - Random classifier (50% accuracy)
  - Run 3 correlation (|ρ| = 0.859)
measurement_plan:
  data_collection:
  - Load 20 pretrained models from torchvision.models
  - Extract layer-wise Frobenius norms for all convolutional and linear layers
  - 'Compute aggregated statistics: mean, std, min, max (4 features total)'
  procedure:
  - Split 20 models into train (16) and test (4) sets, stratified by depth category
  - Train sklearn LogisticRegression on training set features
  - Evaluate on test set, measure accuracy
  - Repeat for within-family subsets (P2) and random label shuffle (P3)
  success_criteria:
  - 'P1: Test accuracy ≥ 70% (primary validation)'
  - 'P2: Within-family accuracy ≥ 65% (robustness check)'
  - 'P3: Random label accuracy ≤ 55% (null control)'
validation:
  internal_validity:
  - Stratified train/test split ensures balanced depth categories
  - Multi-family sampling (ResNet, VGG, DenseNet) tests depth signal across architectures
  - Random label shuffle (P3) validates signal over overfitting
  external_validity:
  - Limited to PyTorch torchvision models (standardized ImageNet training)
  - Generalization to unseen families (EfficientNet, ConvNeXt) untested
  - Scope explicitly limited to pretrained ImageNet CNNs
discussion_synthesis:
  key_insights:
  - Binary classification amplifies signal vs. Run 3 correlation approach
  - Confound acknowledgment (depth-correlated patterns) is scientifically honest and
    appropriate for EXISTENCE-tier
  - Simple features (mean/std) preferred over complex features (SVD) for stronger
    contribution
  - Three-tier validation (P1/P2/P3) provides comprehensive evidence framework
  breakthrough_moments:
  - Dr. Nova introduced weight space geometry perspective and spectral fingerprinting
  - Prof. Vera grounded creative ideas with testable prediction hierarchy
  - Dr. Ally synthesized confound mitigation strategy (multi-family sampling)
  - Prof. Rex challenged assumptions, leading to explicit scope boundaries and null
    result plan
  resolved_tensions:
  - 'Novelty vs. feasibility: Spectral features deferred to post-EXISTENCE tier'
  - 'Pure depth causality vs. depth-correlated patterns: Accepted latter for EXISTENCE
    scope'
  - 'Feature complexity vs. sample size: Chose simple features to maximize statistical
    power'
  - 'Null result handling: Committed upfront to publish negative findings or route
    to Phase 0'
