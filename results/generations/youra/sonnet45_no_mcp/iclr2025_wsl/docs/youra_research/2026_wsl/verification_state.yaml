main_hypothesis:
  id: H-WeightDepthClassifier-v1
  null_hypothesis: There is no significant difference in weight distribution statistics between shallow (≤34 layers) and deep
    (≥50 layers) pretrained CNNs sufficient for >70% binary classification accuracy.
  statement: Under the scope of pretrained ImageNet CNNs (ResNet, VGG, DenseNet families), if we extract layer-wise weight
    norm statistics (mean, std, min, max of Frobenius norms) and train a logistic regression classifier on 16 models (8 shallow
    ≤34 layers, 8 deep ≥50 layers), then test accuracy on 4 held-out models will exceed 70%, because deeper networks develop
    distinctive weight distribution patterns due to accumulated gradient transformations and architectural constraints.
