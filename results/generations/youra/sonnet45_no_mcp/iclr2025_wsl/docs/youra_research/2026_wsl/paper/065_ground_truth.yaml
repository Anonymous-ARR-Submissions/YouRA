# ═══════════════════════════════════════════════════════════════════════════════
# DATASET SPECIFICATION
# ═══════════════════════════════════════════════════════════════════════════════

dataset:
  total_models: 20
  shallow_models: 10  # ≤34 layers
  deep_models: 10  # ≥50 layers
  architecture_families:
    resnet: {total: 9, shallow: 2, deep: 7}
    vgg: {total: 4, shallow: 4, deep: 0}
    densenet: {total: 4, shallow: 1, deep: 3}
    other: {total: 3, shallow: 3, deep: 0}  # alexnet, squeezenet, mobilenet

  train_test_split:
    train_size: 16
    test_size: 4
    stratified: true
    random_seed: 42

  test_models_detail:
    - {name: "alexnet", layers: 8, family: "other", label: "shallow"}
    - {name: "vgg13", layers: 13, family: "vgg", label: "shallow"}
    - {name: "resnet152", layers: 152, family: "resnet", label: "deep"}
    - {name: "wide_resnet50_2", layers: 50, family: "resnet", label: "deep"}

  pretrained_source: "torchvision ImageNet-1K pretrained models"

# ═══════════════════════════════════════════════════════════════════════════════
# METHODOLOGY DETAILS
# ═══════════════════════════════════════════════════════════════════════════════

methodology:
  classifier: "LogisticRegression"
  classifier_params:
    C: 1.0
    solver: "lbfgs"
    max_iter: 1000
    random_state: 42
  normalization: "StandardScaler"

  validation_protocols:
    - name: "train_test_split"
      description: "80/20 stratified split, fixed seed 42"
    - name: "random_initialization_test"
      description: "Compare pretrained vs random (pretrained=False) models"
    - name: "within_family_validation"
      description: "Separate classifiers for ResNet-only and DenseNet-only"

  success_criteria:
    primary_threshold: 0.70  # ≥70% test accuracy
    secondary_threshold: 0.65  # ≥65% within-family accuracy
    baseline: 0.50  # 50% random guessing for binary classification

# ═══════════════════════════════════════════════════════════════════════════════
# LIMITATIONS (Critical for Adversarial Review)
# ═══════════════════════════════════════════════════════════════════════════════

limitations:

  statistical:
    - id: "small_test_set"
      description: "Only 4 test models limit statistical confidence"
      severity: "high"
      mitigation: "Within-family validation provides additional independent test sets"
      residual_risk: "Accuracy may not generalize to larger model pools"

    - id: "single_random_seed"
      description: "Train-test split uses single random seed (42)"
      severity: "medium"
      mitigation: "Within-family validation provides independent splits"
      residual_risk: "Specific test models may be easier/harder than average"

  methodological:
    - id: "confounding_variables"
      description: "Depth, width, architecture family inherently confounded"
      severity: "medium"
      mitigation: "Within-family validation controls for architecture type"
      residual_risk: "Cannot isolate pure depth effect independent of all design choices"

    - id: "vgg_family_imbalance"
      description: "All VGG models are shallow (no deep variants in torchvision)"
      severity: "low"
      mitigation: "ResNet and DenseNet families provide within-family validation"
      residual_risk: "VGG-specific patterns untested"

  generalization:
    - id: "limited_architecture_families"
      description: "Only ResNet, VGG, DenseNet tested (2015-2017 era CNNs)"
      severity: "high"
      mitigation: "None - out of scope for current study"
      future_work: "Expand to Vision Transformers, EfficientNet, ConvNeXt"

    - id: "imagenet_pretraining_only"
      description: "All models pretrained on ImageNet-1K"
      severity: "medium"
      mitigation: "Random initialization tests suggest architectural independence from training dataset"
      future_work: "Test on models trained on CIFAR, COCO, custom datasets"

    - id: "binary_classification_only"
      description: "Shallow ≤34 vs deep ≥50, not continuous depth regression"
      severity: "medium"
      mitigation: "Binary classification is existence proof"
      future_work: "Continuous regression predicting exact layer count"

# ═══════════════════════════════════════════════════════════════════════════════
# THEORETICAL FRAMEWORK
# ═══════════════════════════════════════════════════════════════════════════════

theoretical_framework:
  name: "Architectural Determinism Hypothesis"

  core_hypothesis:
    statement: "For a given network architecture family, all structural properties (layer count, connection patterns, module types) are deterministic from the architecture definition and create a unique architectural fingerprint that is detectable from weight statistics, independent of training dynamics, and redundant across multiple representations"

  key_principles:
    - "Discriminative features exist in network definition (architecture code)"
    - "Training does not add depth-specific signals (for tested feature sets)"
    - "Multiple feature representations achieve equivalent performance (redundant encoding)"
    - "Within-family signals exist independent of architecture type"

  formalization: |
    Let A = architecture definition (layer types, counts, connections)
    Let W_random = randomly initialized weights from A
    Let W_trained = trained weights from A
    Let f = feature extraction function (e.g., layer count, bottleneck ratio)

    Architectural Determinism: f(W_random) ≈ f(W_trained)
    Depth Classification: classifier(f(W)) perfectly separates shallow vs deep architectures

  empirical_support:
    - "H-M1: gradient-flow features → 100% accuracy on W_random"
    - "H-M2: architectural features → 100% accuracy on W_random"
    - "H-M3: BN features → 75% accuracy on W_random"
    - "Zero performance gap across all tests"

  boundary_conditions:
    applies_to:
      - "Standard CNN architectures (ResNet, VGG, DenseNet)"
      - "Discrete depth categories (shallow vs deep)"
      - "Modern deep learning conventions (BN after conv, residual shortcuts, bottlenecks)"
    may_fail_for:
      - "Stochastic depth architectures (DropPath, stochastic layers)"
      - "Networks with training-modified structure (differentiable NAS, pruning during training)"
      - "Non-CNN architectures (Transformers, RNNs, GNNs) - untested"

# ═══════════════════════════════════════════════════════════════════════════════
# ADVERSARIAL REVIEW TARGETS (Phase 6.5 Focus Areas)
# ═══════════════════════════════════════════════════════════════════════════════

adversarial_review_targets:

  statistical_validity:
    - "Test small sample size (n=4): Can 100% accuracy be trusted?"
    - "Confidence intervals: What is 95% CI for true accuracy?"
    - "Multiple testing correction: Should significance threshold adjust for 4 hypotheses?"
    - "Overfitting risk: 16 train samples for 4-8 features per hypothesis"

  mechanism_validation:
    - "Random initialization protocol: Is pretrained=False a valid test of training-induced features?"
    - "Alternative mechanisms: Could training add signals not captured by tested features?"
    - "Feature design bias: Did feature engineering inadvertently encode architectural properties?"

  generalization_claims:
    - "Beyond tested architectures: Will findings hold for ViT, EfficientNet, ConvNeXt?"
    - "Beyond ImageNet: Will dataset-specific training patterns emerge on CIFAR/COCO?"
    - "Beyond binary classification: Can continuous depth be predicted?"

  confounding_analysis:
    - "Depth vs width: Can we isolate pure depth effect?"
    - "Architecture family effects: How much signal is family-specific vs depth-specific?"
    - "VGG zero-BN confound: Does H-M3 measure BN presence or depth?"

  methodological_rigor:
    - "Baseline comparisons: Should we test against metadata parsing or forward-pass methods?"
    - "Feature redundancy: Are different feature sets truly independent tests?"
    - "Within-family validation: Are sample sizes adequate (ResNet n=9, DenseNet n=4)?"

  claims_vs_evidence:
    - "Perfect classification claim: Is 4/4 sufficient evidence?"
    - "Architectural determinism: Does zero random gap prove training adds nothing?"
    - "Practical applicability: Will methods work on user-uploaded models with different conventions?"

# ═══════════════════════════════════════════════════════════════════════════════
# FUTURE WORK DIRECTIONS
# ═══════════════════════════════════════════════════════════════════════════════

future_work:
  immediate_extensions:
    - "Continuous depth regression (predict exact layer count 18, 34, 50, 101, 152)"
    - "Expand to modern architectures (Vision Transformers, EfficientNet, ConvNeXt)"
    - "Cross-dataset validation (CIFAR-10, COCO, Places365 pretrained models)"
    - "Multi-property inference (simultaneous depth, width, family classification)"

  methodological_refinements:
    - "Larger test sets (50-100 models for robust confidence intervals)"
    - "Multiple random seeds for train-test split variance estimation"
    - "Ablation studies (minimal sufficient feature sets)"
    - "Feature redundancy analysis (correlation matrices, PCA)"

  mechanism_exploration:
    - "Search for training-induced signals via delta features (trained - random)"
    - "Gradient flow analysis during training (not just final weights)"
    - "Training dataset effects (compare ImageNet vs CIFAR vs COCO pretraining)"

  applications:
    - "Model provenance tracking at scale (millions of repository models)"
    - "Architecture-aware compression (preserve discriminative features)"
    - "Training-free model verification pipelines"
    - "Security applications (model authenticity, adversarial architecture detection)"

