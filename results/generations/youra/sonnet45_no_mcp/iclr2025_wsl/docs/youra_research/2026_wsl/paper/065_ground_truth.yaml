    train_accuracy_pretrained: 0.938  # 93.8%
    test_accuracy_random: 1.00  # 100%
    train_accuracy_random: 0.938  # 93.8%
    performance_gap: 0.0  # No gap
    mechanism_conclusion: "CONFIRMED - features are architectural as expected"
    gate_threshold: 0.50
    gate_result: "PASS"
    within_family_resnet_accuracy: 1.00  # 100%
    within_family_densenet_accuracy: 1.00  # 100%
    within_family_threshold: 0.65
    within_family_result: "PASS"
    feature_count: 8
    features: ["residual_blocks", "dense_connections", "bottleneck_ratio", "layer_count", "skip_connections", "residual_norm", "transition_layers", "architecture_family"]
    top_features:
      - {feature: "bottleneck_ratio", coefficient: 0.956, interpretation: "deep models have more 1x1 convs"}
      - {feature: "layer_count", coefficient: 0.932, interpretation: "direct depth indicator"}
      - {feature: "residual_blocks", coefficient: 0.606, interpretation: "deep ResNets have more blocks"}

  h_m3_batch_norm_mechanism:
    test_accuracy_pretrained: 0.75  # 75% (3/4)
    train_accuracy_pretrained: 0.812  # 81.2%
    test_accuracy_random: 0.75  # 75%
    train_accuracy_random: 0.812  # 81.2%
    performance_gap: 0.0  # No gap
    mechanism_conclusion: "PARTIAL - BN layer count (architectural) dominates, not learned gamma/beta"
    gate_threshold: 0.50
    gate_result: "PASS"
    within_family_resnet_accuracy: 1.00  # 100%
    within_family_densenet_accuracy: 1.00  # 100%
