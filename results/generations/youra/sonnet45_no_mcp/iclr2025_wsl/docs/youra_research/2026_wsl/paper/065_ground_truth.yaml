    train_accuracy: 0.938  # 93.8% (15/16)
    gate_threshold: 0.70
    gate_result: "PASS"
    test_models:
      - {name: "alexnet", true_label: "shallow", predicted: "shallow", correct: true}
      - {name: "vgg13", true_label: "shallow", predicted: "shallow", correct: true}
      - {name: "resnet152", true_label: "deep", predicted: "deep", correct: true}
      - {name: "wide_resnet50_2", true_label: "deep", predicted: "deep", correct: true}
    feature_count: 4
    features: ["mean_norm", "std_norm", "min_norm", "max_norm"]

  h_m1_gradient_mechanism:
    test_accuracy_pretrained: 1.00  # 100%
    train_accuracy_pretrained: 0.813  # 81.3%
    test_accuracy_random: 1.00  # 100%
    train_accuracy_random: 0.813  # 81.3%
    performance_gap: 0.0  # No gap
    mechanism_conclusion: "REJECTED - features are architectural, not gradient-induced"
    gate_threshold: 0.50
