# ═══════════════════════════════════════════════════════════════════════════════
# CORE CLAIMS (Primary Targets for Adversarial Review)
# ═══════════════════════════════════════════════════════════════════════════════

core_claims:

  claim_1_existence:
    statement: "Weight statistics from pretrained CNNs enable perfect binary depth classification (100% test accuracy on 4 held-out models)"
    strength: "strong"
    evidence_source: "H-E1 validation results"
    quantitative_support:
      - "Test accuracy: 100% (4/4 correct)"
      - "Train accuracy: 93.8% (15/16 correct)"
      - "Feature set: 4 global statistics (mean, std, min, max of layer-wise norms)"
      - "Test models: alexnet (shallow), vgg13 (shallow), resnet152 (deep), wide_resnet50_2 (deep)"
    limitations:
      - "Small test set (n=4) limits statistical confidence"
      - "Binary classification only (shallow ≤34 vs deep ≥50)"
    attack_vectors:
      - "Overfitting to small test set"
      - "Spurious correlations with confounding variables"
      - "Lack of statistical significance testing"

  claim_2_mechanism:
    statement: "Discriminative features are architectural (independent of training), not training-induced (emergent from gradient flow)"
    strength: "strong"
    evidence_source: "Random initialization tests (H-M1, H-M2, H-M3)"
    quantitative_support:
      - "H-M1 random accuracy: 100% (equal to pretrained 100%)"
      - "H-M2 random accuracy: 100% (equal to pretrained 100%)"
      - "H-M3 random accuracy: 75% (equal to pretrained 75%)"
      - "Zero performance gap between pretrained and random models"
    limitations:
      - "Random initialization test may not capture all training-induced patterns"
      - "Feature sets tested may not represent all possible weight features"
    attack_vectors:
      - "Alternative training-induced features not tested"
      - "Random initialization protocol validity"
      - "Generalization to other initialization schemes"

  claim_3_robustness:
    statement: "Depth signal is detectable within architecture families (ResNet: 100%, DenseNet: 100%)"
    strength: "strong"
    evidence_source: "Within-family validation (H-M2, H-M3)"
    quantitative_support:
      - "ResNet-only accuracy: 100% (9 models, 2 shallow / 7 deep)"
      - "DenseNet-only accuracy: 100% (4 models, 1 shallow / 3 deep)"
      - "Threshold: ≥65% required, achieved +35% margin"
    limitations:
      - "VGG family excluded (all shallow, no depth variation)"
      - "Small within-family sample sizes (ResNet n=9, DenseNet n=4)"
    attack_vectors:
      - "Within-family confounding (depth + width + design patterns)"
      - "Sample size adequacy for family-specific validation"
      - "VGG exclusion may hide family-specific failures"

  claim_4_feature_importance:
    statement: "Bottleneck ratio (+0.956), layer count (+0.932), and residual blocks (+0.606) are primary discriminators"
    strength: "moderate"
    evidence_source: "H-M2 logistic regression coefficients"
    quantitative_support:
      - "Bottleneck ratio coefficient: +0.956 (highest)"
      - "Layer count coefficient: +0.932 (second highest)"
      - "Residual blocks coefficient: +0.606 (third highest)"
    limitations:
      - "Coefficients from single classifier type (logistic regression)"
      - "Multicollinearity between features not fully analyzed"
      - "Feature importance may not generalize to other model types"
    attack_vectors:
      - "Coefficient instability with different train-test splits"
      - "Feature redundancy inflating apparent importance"
      - "Alternative feature importance methods may disagree"

# ═══════════════════════════════════════════════════════════════════════════════
# EXPERIMENTAL RESULTS (Ground Truth Data)
