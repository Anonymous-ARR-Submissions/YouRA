  - id: epic-e-2
    title: Gradient Flow Feature Extractor
    description: |
      Implement GradientFlowFeatureExtractor class to compute 6 gradient-flow features
      from pretrained CNN weights. This is the core mechanism being tested.
    type: implementation
    priority: 95
    complexity: 16
    complexity_breakdown:
      module_size: 4
      dependencies: 2
      algorithm: 8
      integration: 2
    estimated_duration_minutes: 90
    reference_files:
      - file: 03_prd.md
        sections:
          - "#fr-1-gradient-flow-feature-extractor"
      - file: 03_architecture.md
        sections:
          - "#epic-e-2-gradient-flow-feature-extractor"
      - file: 03_logic.md
        sections:
          - "#4-core-module-gradientflowfeatureextractor"
          - "#41-class-definition"
          - "#42-main-api-extract_features"
      - file: 02c_experiment_brief.md
        sections:
          - "#core-mechanism-implementation"
    dependencies:
      - setup-1
    acceptance_criteria:
      - "GradientFlowFeatureExtractor class implemented"
      - "extract_features() method returns (6,) numpy array"
      - "Feature 1: Norm progression slope (linear fit)"
      - "Feature 2: Norm variance (gradient stability)"
      - "Feature 3: Input-layer norm"
      - "Feature 4: Output-layer norm"
      - "Feature 5: Depth-weighted norm (position × magnitude)"
      - "Feature 6: Layer count"
      - "Processing time: <5 seconds for 20 models"
      - "Unit tests pass (shape, range, shallow vs deep)"
    implementation_notes: |
      # File: feature_extractor.py

      Key Algorithm:
      1. Iterate model.parameters() with position tracking
      2. Extract Frobenius norm per layer: torch.linalg.norm(param.data, ord='fro')
      3. Compute 6 features:
         - slope via np.polyfit(positions, norms, deg=1)
         - variance via np.var(norms)
         - input/output norms: norms[0], norms[-1]
         - depth-weighted: np.sum(norms * positions)
         - layer count: len(norms)

      Edge Cases:
      - Single-layer models: slope = 0.0
      - No trainable layers: return np.zeros(6)

