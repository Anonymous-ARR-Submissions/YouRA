# ============================================
# Phase 4 Implementation Notes
# ============================================

implementation_guidance:
  approach: |
    H-M1 builds on H-E1's proven infrastructure with minimal modifications.
    Focus on implementing GradientFlowFeatureExtractor correctly - all other
    components reuse H-E1 code.

  critical_path:
    - "setup-1: Verify H-E1 accessibility"
    - "epic-e-2: Core mechanism (gradient-flow features)"
    - "epic-e-3: Integration (main pipeline)"
    - "epic-e-4: Validation (random test)"

  testing_strategy: |
    1. Unit test GradientFlowFeatureExtractor (shape, range, shallow vs deep)
    2. Integration test main pipeline (end-to-end execution)
    3. Validation: Random test confirms training-induced patterns
    4. Gate check: Test accuracy > 50%

  h_e1_reuse:
    - "model_loader.py: Import directly from h-e1/code/"
    - "classifier.py: Reuse train_classifier function"
    - "evaluate.py: Reuse compute_metrics function"
    - "Configuration: Use H-E1 optimal hyperparameters (C=1.0, solver='lbfgs')"

  expected_outcomes:
    - "Test accuracy: 70-100% (gradient mechanism contribution)"
    - "Random test accuracy: <55% (confirming training-induced patterns)"
    - "Runtime: <60 seconds (feature extraction dominates)"

# ============================================
# Gate Criteria (Phase 4.5 Validation)
# ============================================

gate_criteria:
  primary:
    metric: test_accuracy
    threshold: 0.50
    comparison: greater_than
    rationale: "Gradient-flow features must enable better-than-random classification"

  validation:
    metric: random_test_accuracy
    threshold: 0.55
    comparison: less_than
    rationale: "Random models should fail to classify (architectural vs gradient-induced)"

  secondary:
    comparison_with_h_e1:
      h_e1_accuracy: 1.0
      expected_h_m1_range: [0.70, 1.0]
      interpretation: |
        - H-M1 ≥ H-E1 (100%): Gradient flow is sufficient mechanism
        - H-M1 70-99%: Gradient flow is strong contributor
        - H-M1 50-69%: Gradient flow is partial contributor
        - H-M1 < 50%: Gradient flow not a mechanism (FAIL)
