  status: READY
  sh1_existence: Weight distribution signatures must exist and be discriminative enough
    for 70% classification accuracy
  sh2_mechanism: 'Test which mechanism dominates: gradient accumulation, architectural
    constraints, or normalization effects'
  sh3_comparison: Compare against random baseline (50%) and Run 3 correlation approach
    (deferred to Phase 5 if needed)
  open_questions:
  - Which mechanism (gradient/architecture/normalization) contributes most to classification?
  - Does classification generalize to unseen architecture families (EfficientNet,
    ConvNeXt)?
  - Can spectral features (SVD) improve accuracy beyond simple norms?
