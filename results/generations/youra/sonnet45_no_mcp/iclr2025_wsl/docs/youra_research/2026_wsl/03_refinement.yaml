established_facts:
  claims:
  - claim: Run 3 demonstrated correlation between weight norms and depth (|ρ| = 0.859)
    status: BUILD_ON
    evidence: Prior experiment result - correlation exists but below rigid threshold
  - claim: Binary classification has larger effect size than continuous correlation
    status: BUILD_ON
    evidence: Statistical methodology - extreme group comparison amplifies signal
  - claim: Pretrained models from PyTorch torchvision have standardized ImageNet training
    status: BUILD_ON
    evidence: Known dataset and training protocol
  scope_reduction_percentage: 0
  phase2b_4_instructions: Build on established correlation finding from Run 3. Focus
    on transforming correlation into actionable classification.
core_statement:
  hypothesis_id: H-WeightDepthClassifier-v1
  confidence_level: 0.75
  core_hypothesis_statement: Under the scope of pretrained ImageNet CNNs (ResNet,
    VGG, DenseNet families), if we extract layer-wise weight norm statistics (mean,
    std, min, max of Frobenius norms) and train a logistic regression classifier on
    16 models (8 shallow ≤34 layers, 8 deep ≥50 layers), then test accuracy on 4 held-out
    models will exceed 70%, because deeper networks develop distinctive weight distribution
    patterns due to accumulated gradient transformations and architectural constraints
    (residual connections, batch normalization).
  alternative_hypothesis_h0: There is no significant difference in weight distribution
    statistics between shallow (≤34 layers) and deep (≥50 layers) pretrained CNNs
    sufficient for >70% binary classification accuracy.
variables:
  independent:
  - name: Network Depth Category
    type: categorical
    operationalization: 'Binary classification: shallow (≤34 layers) vs deep (≥50
      layers)'
    levels:
    - shallow
    - deep
  dependent:
  - name: Classification Accuracy
    type: continuous
    operationalization: Test set accuracy (%), sklearn LogisticRegression on held-out
      models
    primary: true
  controlled:
  - name: Training Dataset
    operationalization: All models pretrained on ImageNet 1K from PyTorch torchvision
  - name: Feature Extraction Method
    operationalization: Layer-wise Frobenius norms computed via torch.norm() for all
      conv/linear layers
causal_mechanism:
  causal_chain_count: 3
  steps:
  - step: 1
    description: 'Gradient accumulation: Deeper networks (≥50 layers) experience more
      gradient transformation steps during backpropagation, leading to characteristic
      weight magnitude patterns that differ from shallow networks (<34 layers).'
    evidence: Theoretical - gradient flow through 50+ layers vs <34 layers creates
      differential weight update histories
    falsifier: If randomly initialized networks (no training) show same classification
      accuracy, gradient accumulation is not the mechanism
  - step: 2
    description: 'Architectural constraints: Residual connections (ResNet), dense
      connections (DenseNet), and bottleneck layers in deep networks create depth-specific
      weight structure patterns that shallow networks lack.'
    evidence: Structural analysis - residual/dense connections are architecture-specific
      features present in deep models
    falsifier: If VGG models (no residual connections) fail to classify correctly,
      architectural constraints dominate over depth
  - step: 3
    description: 'Normalization effects: Batch normalization statistics accumulate
      differently across 50+ layers versus <34 layers, creating distinctive weight
      distribution signatures.'
    evidence: Batch norm layers in deep networks create layer-specific normalization
      effects
    falsifier: If models without batch norm (e.g., AlexNet) show higher accuracy,
      normalization is not the key mechanism
  key_tension: Depth-correlated patterns vs. pure depth causality - classification
    may succeed due to confounded variables (width, training recipe) rather than depth
    alone.
  evidence_summary: Theoretical mechanisms supported by architectural analysis. Empirical
    validation required to confirm which mechanism dominates.
key_assumptions:
- id: A1
  assumption: Pretrained models retain architectural signatures from training process
  supporting_evidence: Weight statistics reflect training history - gradient flow
    patterns persist in final weights
  consequence_if_violated: If weights are re-initialized or heavily fine-tuned post-pretraining,
    architectural signatures may be erased, causing classification failure
- id: A2
  assumption: Depth signal is stronger than confounding variables (width, training
    recipe, architecture family)
  supporting_evidence: Run 3 showed correlation |ρ| = 0.859, suggesting depth signal
    exists despite confounds
  consequence_if_violated: Classifier may learn width/training patterns instead of
    depth, leading to spurious accuracy
- id: A3
  assumption: Simple aggregated features (mean/std/min/max) capture sufficient information
    for classification
  supporting_evidence: Statistical theory - distribution moments encode shape information
  consequence_if_violated: May require complex features (SVD spectra, cross-layer
    correlations) to achieve 70% threshold, weakening contribution
- id: A4
  assumption: 20 models provide adequate sample size for robust accuracy estimation
  supporting_evidence: Sample size increased from Run 3 (n=5) to Run 4 (n=20) for
    statistical power
  consequence_if_violated: Accuracy estimate may have high variance, limiting generalization
    confidence
- id: A5
  assumption: PyTorch torchvision models have standardized training recipes (ImageNet,
    similar preprocessing)
  supporting_evidence: Common source reduces training recipe variance
  consequence_if_violated: Training hyperparameter variance could dominate depth signal,
    causing spurious classification
scope:
  applies_to: Pretrained CNNs from standard ImageNet training recipes (ResNet, VGG,
    DenseNet families) available in PyTorch torchvision. Binary classification of
    shallow (≤34 layers) vs deep (≥50 layers) architectures.
  does_not_apply_to: Randomly initialized models, models trained on non-ImageNet datasets,
    architectures with fundamentally different paradigms (Transformers, RNNs, Graph
    Neural Networks), models with custom training recipes outside standard ImageNet
    protocols.
  known_limitations: Classification success may be influenced by correlated factors
    (width, training epochs, architecture family). We test for depth-correlated patterns,
    not pure depth causality. Generalization to unseen architecture families (EfficientNet,
    ConvNeXt, Vision Transformers) is untested.
predictions:
- id: P1
  primary: true
  statement: Binary logistic regression trained on aggregated weight statistics (mean,
    std, min, max of layer-wise Frobenius norms) from 16 pretrained models achieves
    ≥70% test accuracy on 4 held-out models
  test_method: Extract features from 20 PyTorch models, 80/20 train/test split, sklearn
    LogisticRegression
  success_criterion: Test accuracy ≥ 70%
  falsification: Test accuracy ≤ 60% indicates weight norms alone are insufficient
    for depth classification
- id: P2
  primary: false
  statement: Classification accuracy on within-family subsets (ResNet-only, VGG-only)
    remains ≥65%
  test_method: Train and test separately on ResNet subset, then VGG subset
  success_criterion: Accuracy ≥ 65% for each family
  falsification: Accuracy drops below 60% indicates depth signal is confounded with
    architecture family rather than depth itself
- id: P3
  primary: false
  statement: Random label shuffle (assign shallow/deep labels randomly to same 20
    models) produces accuracy ≤55% (near chance)
  test_method: Randomly permute depth labels, retrain classifier, measure test accuracy
  success_criterion: Accuracy ≤ 55% (close to 50% random baseline)
  falsification: Accuracy > 60% with random labels indicates overfitting to model-specific
    artifacts rather than learning depth signal
experimental_setup:
  dataset:
    name: PyTorch Torchvision Pretrained Models
    type: standard
    source: torchvision.models (PyTorch official)
    path: torchvision.models API (no file downloads)
    hypothesis_fit: Provides 20+ pretrained ImageNet CNNs with standardized training,
      covering shallow and deep architectures across multiple families
  model:
    name: sklearn LogisticRegression
    type: Binary classifier
    source: scikit-learn (built-in)
    hypothesis_fit: Simple linear classifier appropriate for EXISTENCE-tier validation,
      interpretable coefficients, no custom algorithms required
  baselines:
  - name: Random Classifier
    method: 50% accuracy (random guessing)
  - name: Run 3 Correlation
    method: Correlation-based approach achieved |ρ| = 0.859 but failed p < 0.05 due
      to n=5
novelty:
  preserved_novelty: First demonstration that architectural depth can be inferred
    from weight statistics alone without forward passes, activation analysis, or metadata
    parsing. Extends weight analysis beyond compression/transfer learning to architectural
    property inference.
  key_innovation: Methodological pivot from correlation analysis (Run 3) to binary
    classification for larger effect size and clearer validation. Weight distribution
    signatures as compressed representations of learned computational capacity.
  differentiation:
  - prior_work: Weight-based model compression (magnitude pruning, quantization)
    difference: Prior work uses weights to reduce model size; we use weights to infer
      architectural properties
  - prior_work: Transfer learning via weight similarity
    difference: Prior work measures weight similarity for task relatedness; we classify
      architectural categories
  - prior_work: Run 3 correlation analysis
    difference: Run 3 measured correlation strength (|ρ| = 0.859); we classify depth
      categories with decision boundaries
related_work:
  baselines:
  - method: Run 3 Weight Norm Correlation
    performance: '|ρ| = 0.859, p = 0.067 (failed significance)'
    dataset: 5 ResNet models
    why_insufficient: Small sample size (n=5), rigorous threshold (ρ ≥ 0.90), continuous
      correlation instead of classification
  best_baseline_performance: No prior work on weight-based architectural depth classification
    - this is first attempt
