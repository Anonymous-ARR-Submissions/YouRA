hypothesis_draft:
  title: "Gradient-Geometric Data Scheduling for Foundation Models"
  hypothesis_id: "H-GradGeomSchedule-v1"
  core_claim: |
    Temporal ordering of training domains from high to low diversity (measured via
    corpus statistics) shapes early gradient covariance geometry through path-dependent
    optimization, producing measurable performance, robustness, and continual learning
    benefits predictable from diversity metrics alone.
  mechanism: |
    Early high-diversity exposure establishes broader representational subspaces (higher
    gradient covariance rank) that persist through path-dependent SGD dynamics, constraining
    later specialization while enabling stable adaptation. This manifests as: (1) higher
    participation ratio at 25% training, (2) persistent CKA similarity between early and
    final checkpoints, (3) reduced catastrophic forgetting with higher Fisher overlap,
    and (4) improved OOD robustness.
  predictions:
    - "P1: 2% absolute improvement at 1B, 0.5%+ at 7B on multi-domain benchmarks"
    - "P2: ≥15% higher participation ratio, ≥10% higher CKA persistence vs reversed schedules"
    - "P3: ≤50% catastrophic forgetting reduction coupled with ≥10% higher Fisher overlap"
    - "P4: Diversity metrics correlate with early PR at Spearman ρ ≥ 0.7 across domains"
    - "P5: Effects robust to taxonomy changes (Kendall τ ≥ 0.6) and cumulative matching"

variables_summary:
  independent: "Domain ordering schedule (static, diversity-ranked, reversed, shuffled, parametric α-interpolation)"
  dependent_primary: "Composite benchmark performance (MMLU + Big-Bench + domain-specific), gradient covariance rank, CKA persistence, continual learning forgetting"
  controlled: "Total per-domain tokens, learning rate schedule, model architecture/size, optimizer hyperparameters, batch diversity"

null_hypothesis:
  h0_statement: |
    No statistically significant difference in final performance, gradient geometry, or
    continual learning robustness between diversity-ranked and static mixture schedules
    when total per-domain tokens are matched (within ±0.5% performance, <5% geometric metrics).
  statistical_test: "Multi-condition comparison with Bonferroni correction, power analysis at 7B (n=5)"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First optimization-theoretic framework for temporal data composition with predictive power from corpus statistics, validated across six experimental phases"
  differentiation_summary: |
    Curriculum learning exists for task difficulty, not systematic domain source ordering.
    Static mixing research ignores temporal dynamics. Multi-phase training lacks principled
    schedules and geometric validation. This work establishes data scheduling as first-class
    design principle with measurable gradient geometry consequences and predictive framework.

