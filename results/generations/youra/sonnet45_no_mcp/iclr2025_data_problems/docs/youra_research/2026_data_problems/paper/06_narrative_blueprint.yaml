# WRITING GUIDELINES
# ═══════════════════════════════════════════════════════════════

tone_and_style:
  technical_level: "ICML audience (ML researchers)"
  clarity_priority: "HIGH - PoC limitations must be crystal clear"
  honesty: "CRITICAL - never overclaim beyond PoC scope"

  language_rules:
    - "Use 'we propose' not 'we show' for unverified claims"
    - "Use 'pending validation' for Phase 5 performance claims"
    - "Use 'hypothesized mechanism' for gradient geometry"
    - "Use past tense for PoC validation ('we implemented', 'tests passed')"
    - "Use future tense for planned experiments ('we will train', 'we plan to measure')"

  forbidden_phrases:
    - "We demonstrate performance improvements" (Phase 5 pending)
    - "Our method achieves X%" (smoke test only)
    - "Statistical significance" (n=1, no power)
    - "We prove the mechanism" (unverified)

figure_strategy:
  priority_figures:
    - "Curriculum schedule visualization (domain weights vs training progress)"
    - "Diversity score ranking (6 Pile domains)"
    - "Experimental conditions comparison (4 schedules)"
    - "Architecture diagram (GPT-2 style with curriculum loader)"

  deferred_to_phase5:
    - "Performance comparison bar chart (no converged results yet)"
    - "Training curves (smoke test too brief)"
    - "Participation Ratio evolution (not measured)"
    - "CKA similarity heatmap (not measured)"

