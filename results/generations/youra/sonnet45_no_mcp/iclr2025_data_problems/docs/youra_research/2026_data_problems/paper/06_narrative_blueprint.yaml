# ═══════════════════════════════════════════════════════════════
# NARRATIVE STRATEGY
# ═══════════════════════════════════════════════════════════════

hook_strategy:
  primary_hook: "Path-dependent puzzle"
  opening_sentence: |
    Foundation model pretraining uses static domain mixing ratios (e.g., 60% web text, 20% code,
    20% books) determined through expensive hyperparameter sweeps, but optimization is path-dependent—
    early gradient updates shape representational geometry for all subsequent learning. Does the
    temporal order in which we present domains matter as much as their proportions?

  hook_type: "puzzle + practical_failure"
  why_works: |
    - Immediate practical relevance (every foundation model researcher faces domain mixing)
    - Establishes tension: static mixing (current practice) vs temporal dynamics (unexplored)
    - Theoretical grounding: path dependence established, temporal ordering is novel
    - Natural question setup without overclaiming

  alternative_hooks:
    - performance_claim: "Only use if Phase 5 confirms ≥2.0% improvement"
    - efficiency_claim: "Avoids hyperparameter search - but needs validation"

problem_framing:
  level_1_surface: "How to mix training data from multiple domains?"
  level_2_deeper: "Does temporal ordering of domains affect final model performance?"
  level_3_root: "Can corpus statistics predict optimal domain schedules via gradient geometry?"

  gap_statement: |
    Existing work optimizes static domain mixing ratios (DoReMi) or uses ad-hoc two-phase training,
    but ignores temporal dynamics and lacks optimization-theoretic grounding for schedule design.
    Path-dependent SGD optimization suggests early training phases may have disproportionate influence
    on final representational geometry, yet no prior work systematically explores temporal domain
    ordering with mechanistic validation.

key_insight:
  main_insight: |
    Temporal domain ordering enables systematic curriculum scheduling as an alternative to static
    mixture hyperparameter search, with smooth Gaussian transitions enabling controlled domain-ordering
    experiments. Proof-of-concept validation confirms implementability; performance improvement claims
    and gradient geometry mechanisms require full-scale validation (Phase 5).

  evidence_anchor: "h-e1 PoC validation: 22/22 tests pass, 4 curriculum conditions operational"

  confidence_qualifier: |
    CRITICAL: This is a PoC validation paper, not a full results paper. Performance claims (≥2.0%
    improvement) are HYPOTHESES pending Phase 5, not validated findings. Mechanism explanation
    (gradient geometry) is PROPOSED, not verified.

novelty_statement:
  primary: "First systematic framework for diversity-ranked domain scheduling with predictive corpus statistics"
  secondary:
    - "Methodological: Temporal composition as first-class design principle"
    - "Theoretical: Connection between corpus diversity and gradient geometry (proposed, not verified)"
    - "Empirical: Performance improvement through temporal data composition (pending Phase 5)"

  differentiation:
    vs_curriculum_learning: "Domain sources with geometric mechanism, not example difficulty"
    vs_doremi: "Temporal dynamics with path-dependent geometry, not static ratio tuning"
    vs_multiphase: "Smooth parametric schedules with mechanistic validation"
    vs_continual_learning: "Pretraining-time intervention, not post-hoc regularization"

