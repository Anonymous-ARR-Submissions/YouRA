result_presentation_strategy:
  primary_result: "PoC validation success (implementation feasibility)"
  secondary_results:
    - "Diversity score rankings for 6 Pile domains"
    - "Curriculum scheduler correctness (weights sum to 1.0, Gaussian transitions)"
    - "Model architecture validation (760M parameters, GPT-2 style)"

  what_not_to_claim:
    - "Performance improvements (smoke test only, not converged)"
    - "Statistical significance (n=1, no power)"
    - "Gradient geometry effects (not measured)"
    - "Continual learning benefits (not tested)"

  honest_limitations:
    - "PoC scope: feasibility check, not performance validation"
    - "Smoke test: 10 steps, not full training (100K+ steps)"
    - "Single run: no statistical inference possible"
    - "Mock data fix: initial implementation used synthetic data (corrected)"
    - "Mechanism unverified: all causal steps pending measurement"

