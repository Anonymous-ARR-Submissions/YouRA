# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Path dependence primacy: early gradient updates have disproportionate influence on final representational geometry"
    supporting_evidence: "Established optimization theory for SGD in deep networks, non-convex loss landscapes"
    consequence_if_violated: "If early-late gradient contributions are symmetric, temporal ordering effects vanish"
  - id: "A2"
    assumption: "Diversity-covariance coupling: corpus diversity metrics correlate with gradient covariance rank during early training"
    supporting_evidence: "To be validated in Phase 1 cross-domain analysis (Spearman ρ ≥ 0.7 required)"
    consequence_if_violated: "If ρ < 0.5, corpus statistics cannot predict optimal schedules—predictive law claim fails"
  - id: "A3"
    assumption: "Geometric persistence: early-established gradient covariance structure persists through later training phases"
    supporting_evidence: "To be measured via CKA persistence (≥10% higher similarity for diversity-ranked vs reversed)"
    consequence_if_violated: "If CKA similarity between early and final ≤ reversed schedules, path dependence claim weakens"
  - id: "A4"
    assumption: "Subspace orthogonality benefits: broader early subspaces reduce gradient interference during specialization/adaptation"
    supporting_evidence: "To be measured via Fisher overlap (≥10% higher, coupled with ≥50% forgetting reduction)"
    consequence_if_violated: "If forgetting reduction occurs without Fisher overlap changes, geometric stability claim falsified"
  - id: "A5"
    assumption: "Scaling persistence: path-dependent effects remain non-zero (though potentially reduced) as model capacity increases"
    supporting_evidence: "To be validated at 7B scale with n=5 power analysis (≥0.5% effect size required)"
    consequence_if_violated: "If effects vanish entirely at 7B, contribution narrows to small-model regularization only"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    Foundation model pretraining with mixed-domain corpora (web, code, scientific papers, books),
    model scales from 1B to 13B parameters (validated at 1B and 7B), transformer architectures
    trained with SGD-family optimizers, multi-domain benchmark evaluation settings (MMLU,
    Big-Bench, domain-specific tasks).
  does_not_apply_to: |
    Single-domain training (no ordering to optimize), model scales < 100M parameters
    (insufficient capacity for domain-specific subspaces), non-transformer architectures
    without clear gradient-based representation formation, tasks requiring human evaluation
    or subjective scoring (outside feasibility constraints).
  known_limitations: |
    Diversity metrics require validation (Phase 1 correlation test). Effects may be
    taxonomy-dependent unless robustness validated (Phase 3). Scaling beyond 13B uncertain
    (extrapolation limit of validation). Computational cost (~45K GPU-hours) limits
    accessibility to well-resourced labs.

