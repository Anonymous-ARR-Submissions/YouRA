# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-GradGeomSchedule-v1"
  confidence_level: 0.80
  core_hypothesis_statement: |
    Under foundation model pretraining with mixed-domain corpora, if training domains are
    ordered from high to low diversity (measured by corpus statistics: vocabulary entropy,
    syntactic complexity, semantic spread), then final model performance, continual learning
    robustness, and out-of-distribution generalization improve significantly, because early
    high-diversity data establishes broader gradient covariance geometry through path-dependent
    optimization that persists throughout training.
  alternative_hypothesis_h0: |
    There is no statistically significant difference in final model performance, gradient
    covariance geometry, or continual learning robustness between diversity-ranked domain
    orderings and static mixture schedules when total per-domain token counts are matched.
    Any observed differences are within stochastic variance bounds (±0.5% performance,
    <5% geometric metrics).

