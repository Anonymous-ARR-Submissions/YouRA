# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Domain Ordering Schedule"
      type: "categorical"
      operationalization: "Temporal sampling probabilities for each domain (web, code, scientific, books) at each training step"
      levels:
        - "static_mixture (best grid-searched)"
        - "diversity_ranked (high→low)"
        - "reversed (low→high)"
        - "shuffled (matched per-step proportions, randomized order)"
        - "parametric_interpolation (α ∈ {0, 0.25, 0.5, 0.75, 1.0})"
  dependent:
    - name: "Multi-Domain Benchmark Performance"
      type: "continuous"
      operationalization: "Composite score averaging MMLU, Big-Bench, domain-specific evaluations, range 0-100%"
      primary: true
    - name: "Gradient Covariance Rank (Participation Ratio)"
      type: "continuous"
      operationalization: "Effective rank at 10%/25%/50%/100% training checkpoints, dimensionless"
      primary: false
    - name: "Representation Persistence (CKA Similarity)"
      type: "continuous"
      operationalization: "Layer-wise CKA similarity between 25% and 100% checkpoints, range 0-1"
      primary: false
    - name: "Continual Learning Forgetting"
      type: "continuous"
      operationalization: "Δ accuracy on original benchmarks after new domain injection, percentage points"
      primary: false
  controlled:
