      operationalization: "Matched exactly across all schedule conditions"
    - name: "Learning Rate Schedule"
      operationalization: "Identical cosine decay across all conditions"
    - name: "Model Architecture and Size"
      operationalization: "1B and 7B parameter transformer decoders"
    - name: "Optimizer Hyperparameters"
      operationalization: "Adam with fixed β₁, β₂, ε across runs"
    - name: "Batch Construction Diversity"
      operationalization: "Monitored via within-batch entropy, controlled for confounds"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Early high-diversity data shapes gradient covariance geometry"
      evidence: "High-diversity domains (web text: broad vocabulary, varied syntax, distributed semantics) induce higher-rank gradient covariance matrices measurable via participation ratio"
      falsifier: "If diversity metrics don't correlate with early PR (ρ < 0.5), diversity-covariance coupling fails"
    - step: 2
      description: "Path-dependent optimization crystallizes representational subspaces"
      evidence: "Early gradient covariance constrains subspace for subsequent learning due to non-convex SGD basin selection, manifesting as persistent CKA similarity"
      falsifier: "If CKA persistence is ≤ reversed schedules, early geometry doesn't persist"
    - step: 3
      description: "Later specialization operates within established broad subspace"
      evidence: "Low-diversity domain-specific training (code, scientific papers) refines without collapsing geometry, preserving gradient subspace orthogonality"
      falsifier: "If cumulative-matched controls show identical effects, ordering doesn't matter—only total exposure"
    - step: 4
      description: "Broader geometry enables robust downstream adaptation"
      evidence: "Higher gradient subspace orthogonality reduces catastrophic forgetting (Fisher overlap) and improves OOD robustness"
      falsifier: "If forgetting reduction occurs without Fisher overlap changes, geometric stability narrative collapses"
  key_tension: "Gradient primacy vs curriculum coherence—shuffled control disambiguates whether monotonic structure matters or only early-domain weighting"
  evidence_summary: |
    Mechanism grounded in non-convex optimization theory (path dependence established),
    measurable via participation ratio, CKA, Fisher overlap. Six-phase validation includes
    diversity-PR correlation (Phase 1), taxonomy robustness (Phase 3), cumulative matching
    (Phase 4), and variance explanation (Phase 5).

