# TASKS
# All implementation tasks in priority order (highest first)
# ═══════════════════════════════════════════════════════════════════════════════
tasks:
  - id: "task-001"
    epic: "Data Preparation"
    title: "Download and prepare The Pile dataset subset"
    description: |
      Download The Pile dataset and filter to 6 target domains:
      - Pile-CC (web text)
      - StackExchange (technical Q&A)
      - Wikipedia (en)
      - ArXiv (scientific papers)
      - Github (code)
      - PubMed Central (biomedical)

      Apply GPT-2 BPE tokenization (50,257 vocab size)
      Create train/validation splits: 95B/5B tokens
      Apply MinHash deduplication and perplexity-based quality filtering
      Store tokenized sequences of 2048 tokens

      Place in: ./data/pile/
    feature_tag: "data-preparation"
    priority: 100
    source_document: "03_prd.md"
    complexity: 12
    test_requirements: |
      - Verify 6 domains downloaded successfully
      - Validate tokenization matches GPT-2 BPE vocab
      - Confirm train/val split ratio (95%/5%)
      - Check sequence length = 2048 tokens
    reference_files:
      architecture: "03_architecture.md#E-1-Data-Preparation"
      logic: "03_logic.md#data-preparation"
      config: "03_config.md#domain-diversity-scores"

  - id: "task-002"
    epic: "Data Preparation"
    title: "Compute domain diversity scores"
    description: |
      Precompute diversity scores for each domain using:
      - Vocabulary entropy (token frequency distribution)
      - Syntactic complexity (parse tree depth variance)
      - Semantic spread (embedding space coverage via k-means)

      Hardcoded expected scores:
      - Pile-CC: 0.92 (high)
      - StackExchange: 0.88 (high)
      - Wikipedia: 0.75 (medium-high)
      - ArXiv: 0.58 (medium)
      - Github: 0.42 (medium-low)
      - PubMed Central: 0.35 (low)

      Store in config.py for curriculum scheduler
    feature_tag: "data-preparation"
    priority: 99
    source_document: "03_prd.md"
    complexity: 12
    test_requirements: |
      - Verify diversity scores computed for all 6 domains
      - Validate scores are in [0, 1] range
      - Confirm ranking: Pile-CC > StackExchange > ... > PubMed
    reference_files:
      architecture: "03_architecture.md#E-1-Data-Preparation"
      logic: "03_logic.md#diversity-computation"
      config: "03_config.md#domain-diversity-scores"

  - id: "task-003"
    epic: "Environment Setup"
    title: "Install Python dependencies"
    description: |
      Install required Python packages:
      - PyTorch (≥2.0)
      - Transformers (≥4.30)
      - Datasets (Hugging Face)
      - lm-evaluation-harness
      - scipy, numpy, matplotlib, pandas

      Create requirements.txt or use pip install commands
      Verify GPU availability with nvidia-smi
    feature_tag: "setup"
    priority: 94
    source_document: "03_prd.md"
    complexity: null
    test_requirements: |
      - Verify all packages installed successfully
      - Check PyTorch CUDA availability
      - Validate transformers version ≥4.30
    reference_files:
      architecture: null
      logic: null
      config: null

  - id: "task-004"
    epic: "Curriculum Loader"
    title: "Implement curriculum data loader with 4 conditions"
    description: |
      Implement CurriculumDataLoader class supporting 4 conditions:
      - static: Uniform 16.67% sampling per domain
      - diversity_ranked: High→Low diversity with Gaussian transitions
      - reversed: Low→High diversity (inverted Gaussian)
      - shuffled: Random domain order per epoch

      Gaussian parameters: width=0.3, minimum weight=5%
      Ensure total token exposure = 16.7B per domain across all conditions
      Integrate with PyTorch DataLoader for batch sampling
    feature_tag: "data-pipeline"
    priority: 93
    source_document: "03_architecture.md"
    complexity: 14
    test_requirements: |
      - Create tests/test_curriculum_loader.py
      - Test all 4 conditions with mock data
      - Verify token exposure matches 16.7B per domain
      - Validate Gaussian weight computation
      - Test smooth transitions (width=0.3)
    reference_files:
      architecture: "03_architecture.md#E-2-Curriculum-Loader"
      logic: "03_logic.md#CurriculumDataLoader"
      config: "03_config.md#curriculum-scheduling"

  - id: "task-005"
    epic: "Model + Training"
    title: "Implement GPT-2 model architecture for 1B and 7B scales"
    description: |
      Implement GPT2Model class with two scale configurations:
      - 1B: 24 layers, 1536 hidden dim, 16 attention heads, 2048 context
      - 7B: 32 layers, 4096 hidden dim, 32 attention heads, 2048 context

      Use standard transformer decoder-only architecture
      Enable BFloat16 mixed precision training
      Apply gradient checkpointing for 7B to save memory
    feature_tag: "model"
    priority: 92
    source_document: "03_architecture.md"
    complexity: 16
    test_requirements: |
      - Create tests/test_model.py
      - Test forward pass for both scales
      - Validate model parameter counts (~1B and ~7B)
      - Test gradient checkpointing for 7B
      - Verify BFloat16 compatibility
    reference_files:
      architecture: "03_architecture.md#E-3-Model-Training"
      logic: "03_logic.md#GPT2Model"
      config: "03_config.md#model-scales"

  - id: "task-006"
    epic: "Model + Training"
    title: "Implement training loop with checkpointing"
    description: |
      Implement main training loop with:
      - AdamW optimizer with cosine learning rate decay
      - Warmup steps: 2000
      - Gradient clipping: 1.0
      - BFloat16 mixed precision
      - Checkpoint saving at [10%, 25%, 50%, 75%, 100%] progress
      - Validation perplexity logging every 1000 steps

      Training steps:
      - 1B scale: 100K steps
      - 7B scale: 150K steps

      Batch sizes:
      - 1B: 512
      - 7B: 1024

      Learning rates:
      - 1B: 3e-4
      - 7B: 1.5e-4
    feature_tag: "training"
    priority: 91
    source_document: "03_architecture.md"
    complexity: 16
    test_requirements: |
      - Create tests/test_training.py
      - Test training loop with small model/data
      - Verify checkpoint saving at correct steps
      - Test optimizer state persistence
      - Validate learning rate schedule
    reference_files:
      architecture: "03_architecture.md#E-3-Model-Training"
      logic: "03_logic.md#train-function"
      config: "03_config.md#training-hyperparameters"

  - id: "task-007"
    epic: "Evaluation Harness"
    title: "Integrate lm-evaluation-harness for benchmarks"
    description: |
      Integrate lm-evaluation-harness for standardized evaluation on:
      - MMLU (57 tasks)
      - Big-Bench Hard (23 tasks)
      - Domain-specific: HumanEval, MBPP (code)
      - ScienceQA (scientific)
      - HellaSwag, WinoGrande (general)

      Use 5-shot prompting for consistency
      Compute composite benchmark score as primary metric
      Run evaluation at each checkpoint (10%, 25%, 50%, 75%, 100%)
    feature_tag: "evaluation"
    priority: 90
    source_document: "03_architecture.md"
    complexity: 15
    test_requirements: |
      - Create tests/test_evaluation.py
      - Test evaluation on small model
      - Verify all benchmark tasks run successfully
      - Test composite score computation
      - Validate 5-shot prompting
    reference_files:
      architecture: "03_architecture.md#E-4-Evaluation-Harness"
      logic: "03_logic.md#evaluate_benchmarks"
      config: "03_config.md#evaluation-tasks"

  - id: "task-008"
    epic: "Evaluation Harness"
    title: "Implement Participation Ratio computation"
    description: |
      Implement gradient geometry analysis:
      - Compute gradient covariance on fixed probe dataset (10K tokens per domain)
      - Calculate eigenvalues of gradient covariance matrix
      - Compute PR = (Σλ)² / Σ(λ²)
      - Measure at checkpoints: 10%, 25%, 50%, 75%, 100%
      - Store PR values for downstream analysis

      This is secondary analysis for mechanism understanding
    feature_tag: "evaluation"
    priority: 89
    source_document: "03_prd.md"
    complexity: 15
    test_requirements: |
      - Create tests/test_geometry.py
      - Test PR computation with synthetic gradients
      - Verify eigenvalue computation correctness
      - Test probe dataset sampling
    reference_files:
      architecture: "03_architecture.md#E-4-Evaluation-Harness"
      logic: "03_logic.md#compute_participation_ratio"
      config: null

  - id: "task-009"
    epic: "Evaluation Harness"
    title: "Implement CKA similarity measurement"
    description: |
      Implement layer-wise CKA (Centered Kernel Alignment) between checkpoints:
      - Compare 25% and 100% checkpoints
      - Compute CKA for each layer
      - Generate CKA heatmap visualization

      This measures representational subspace persistence
    feature_tag: "evaluation"
    priority: 88
    source_document: "03_architecture.md"
    complexity: 15
    test_requirements: |
      - Create tests/test_cka.py
      - Test CKA computation with synthetic activations
      - Verify CKA values in [0, 1] range
      - Test layer-wise computation
    reference_files:
      architecture: "03_architecture.md#E-4-Evaluation-Harness"
      logic: "03_logic.md#compute_cka_similarity"
      config: null

  - id: "task-010"
    epic: "Evaluation Harness"
    title: "Implement statistical testing with Bonferroni correction"
    description: |
      Implement statistical validation:
      - Paired t-tests for diversity-ranked vs static at both scales
      - Apply Bonferroni correction for 4 pairwise comparisons
      - Generate 95% confidence intervals
      - Validate p<0.05 for effect sizes ≥2.0% (1B) and ≥0.5% (7B)

      This determines gate success/failure
    feature_tag: "evaluation"
    priority: 87
    source_document: "03_prd.md"
    complexity: 15
    test_requirements: |
      - Create tests/test_statistics.py
      - Test t-test computation with synthetic data
      - Verify Bonferroni correction (α=0.05/4)
      - Test confidence interval computation
    reference_files:
      architecture: "03_architecture.md#E-4-Evaluation-Harness"
      logic: "03_logic.md#statistical_test"
      config: null

  - id: "task-011"
    epic: "Experiment Orchestration"
    title: "Implement experiment matrix launcher"
    description: |
      Implement orchestration for full experiment matrix:
      - 4 conditions (static, diversity_ranked, reversed, shuffled)
      - 2 scales (1B, 7B)
      - 5 seeds (42, 43, 44, 45, 46)
      - Total: 40 runs

      Sequential execution with GPU assignment
      Setup CUDA_VISIBLE_DEVICES management
      Track completion status for all runs
    feature_tag: "experiment"
    priority: 86
    source_document: "03_architecture.md"
    complexity: 11
    test_requirements: |
      - Create tests/test_orchestration.py
      - Test experiment matrix generation
      - Verify 40 unique configurations
      - Test GPU assignment logic
    reference_files:
      architecture: "03_architecture.md#E-5-Experiment-Orchestration"
      logic: "03_logic.md#run_all_experiments"
      config: "03_config.md#experiment-matrix"

  - id: "task-012"
    epic: "Experiment Orchestration"
    title: "Aggregate results and generate visualizations"
    description: |
      Aggregate results across all runs and generate required visualizations:
      - Mandatory: Performance comparison bar chart (4 conditions × 2 scales with error bars)
      - Domain sampling schedule line plot
      - Training curves (validation perplexity vs steps)
      - Participation Ratio evolution over checkpoints
      - CKA similarity heatmap

      Save all figures to {hypothesis_folder}/figures/
    feature_tag: "experiment"
    priority: 85
