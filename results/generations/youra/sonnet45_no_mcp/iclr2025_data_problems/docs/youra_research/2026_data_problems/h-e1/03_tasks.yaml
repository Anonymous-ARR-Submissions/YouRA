  - id: "task-013"
    epic: "Configuration"
    title: "Create configuration module with hardcoded hyperparameters"
    description: |
      Create config.py with all experiment hyperparameters:
      - Domain diversity scores
      - Model scale configurations (1B/7B)
      - Training hyperparameters (LR, batch size, steps)
      - Curriculum parameters (Gaussian width, min weight)
      - Evaluation tasks and checkpoint schedules
      - Experiment matrix (conditions, scales, seeds)

      This is LIGHT tier (minimal config management)
    feature_tag: "setup"
    priority: 93
    source_document: "03_config.md"
    complexity: null
