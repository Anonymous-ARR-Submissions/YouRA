  - id: "task-014"
    epic: "Utilities"
    title: "Implement logging and checkpoint utilities"
    description: |
      Implement utility functions:
      - CSV logging for training metrics
      - Checkpoint save/load with metadata
      - Deterministic seed setting for reproducibility
      - GPU memory tracking

      These support observability and reproducibility requirements
    feature_tag: "experiment"
