# ─────────────────────────────────────────────────────────────────────────────
# REGRESSION RESULTS (OLS: avg_score ~ log(params) + log(tokens) + doc_score + C(arch_family))
# ─────────────────────────────────────────────────────────────────────────────

regression:
  model_type: "OLS (statsmodels)"
  outcome_variable: "avg_score (Open LLM Leaderboard V2)"
  benchmarks_v2:
    - "IFEval"
    - "BBH"
    - "MATH Lvl 5"
    - "GPQA"
    - "MUSR"
    - "MMLU-PRO"

  baseline_model:
    predictors: ["log(params)", "log(tokens)", "C(arch_family)"]
    r_squared: 0.4247
    r_squared_label: "R²_baseline = 0.4247"
    interpretation: "Scale + architecture explains 42% of V2 benchmark variance"

  proposed_model:
    predictors: ["log(params)", "log(tokens)", "doc_score", "C(arch_family)"]
    r_squared: 0.4289  # baseline + delta
    delta_r_squared: 0.0042
    doc_score_coefficient:
      beta: -3.45
      p_value: 1.1e-8
      direction: "negative"
      significant: true
      interpretation: "Negative coefficient — counterintuitive, traced to size-vintage confound"

  confound_analysis:
    confound_type: "size-vintage confound"
    mechanism: |
      Well-documented models are predominantly older, smaller-parameter base models
      (LLaMA-7B, Pythia, OLMo). High-scoring V2 models tend to be newer, larger,
      or fine-tuned derivatives that inherit curation practices from undocumented
      base checkpoints. OLS naive β_docs absorbs this confound.
    competing_explanations:
      - "E1: Older models → more documentation time → more cards → smaller params → lower V2"
      - "E2: Fine-tuned models inherit base docs but score higher (documentation credit problem)"
      - "E3: V2 harder benchmarks introduced after most documented models were released"
    recommended_fix: "Propensity-matched regression controlling log(params), log(tokens), release_year"

