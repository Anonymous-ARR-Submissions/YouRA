gap_id: "gap-1"
gap_title: "No Observational Study Linking Documented LLM Curation Choices to Benchmark Variance"
gap_description: |
  No study has systematically extracted and coded model card curation features (deduplication rate,
  perplexity filtering ratio, domain composition, decontamination flags) against published benchmark
  scores across deployed LLMs. Thrush et al. (2024) established perplexity-benchmark correlations for
  data selection but did not characterize deployed models' documented curation choices. The missing piece
  is a curated tabular dataset linking (a) documented curation parameters from model cards with (b)
  benchmark scores on MMLU, ARC, HellaSwag, TruthfulQA, WinoGrande, and (c) model parameter counts
  as a control variable — enabling partial correlation analysis across curation dimensions.
