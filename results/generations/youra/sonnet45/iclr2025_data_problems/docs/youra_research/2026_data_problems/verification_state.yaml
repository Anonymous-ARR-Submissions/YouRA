main_hypothesis:
  id: H-DocCuration-v1
  title: Curation Documentation as Benchmark Performance Predictor
  statement: 'Under the set of open-weight LLMs listed on the Open LLM Leaderboard v1 snapshot with

    publicly accessible model cards, if models have documented pretraining data curation

    practices (binary indicators: deduplication, perplexity-based filtering, domain composition

    reporting, decontamination), then those models exhibit ≥0.5 percentage points higher

    benchmark performance on knowledge-recall benchmarks (MMLU, ARC) relative to a

    scale-and-architecture baseline (controlling for log(N), log(D), and architecture family

    fixed effects), because documented curation practices serve as a proxy for higher effective

    data quality Q in the Subramanyam et al. (2025) scaling framework.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: Open LLM Leaderboard v1 Snapshot + Hugging Face Model Cards
    model: N/A (OLS regression — statsmodels/scipy/pandas)
    optimizer: N/A
    hyperparameters:
      significance_level: 0.05
      permutation_samples: 1000
      power_target: 0.8
