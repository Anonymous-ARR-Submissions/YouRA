# ═══════════════════════════════════════════════════════════════
# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "LLM losses on pretraining texts correlate with downstream benchmark performance"
      status: "BUILD_ON"
      evidence: "Thrush et al. (2024) demonstrated this across 90 Open LLM Leaderboard models using perplexity-benchmark rank correlations (γ_j statistic), achieving avg rank 1.375 vs DSIR's 4.500"
    - claim: "Data quality can be formalized as dimensionless scalar Q affecting loss as L(N,D,Q) = A/N^α + B/(D^β Q^γ) + E"
      status: "BUILD_ON"
      evidence: "Subramanyam et al. (2025) established quality-aware scaling law with γ_CLM ≈ 0.39, γ_NMT ≈ 0.17 under controlled noise injection experiments"
    - claim: "Domain composition and text register differentially affect benchmark scores across benchmark types"
      status: "BUILD_ON"
      evidence: "Myntti et al. (2025): Opinion register improves, News harms; Nemotron-CLIMB: domain mix optimization yields 5% target-domain improvement"
    - claim: "Benchmark contamination inflates evaluation scores measurably (MMLU ~19%)"
      status: "BUILD_ON"
      evidence: "Zhu et al. (2024) inference-time decontamination showing ~19% MMLU inflation from contamination"
    - claim: "No systematic observational study linking documented curation features to benchmark variance exists"
      status: "PROVE_NEW"
      evidence: "Gap 1 from Phase 1 research confirms absence of this study in literature"
    - claim: "Differential benchmark sensitivity to documented curation dimensions is uncharacterized"
      status: "PROVE_NEW"
      evidence: "Gap 2 from Phase 1 — benchmark-type × curation-dimension interaction is the novel claim"
  scope_reduction_percentage: 40
  phase2b_4_instructions: |
    Established facts (BUILD_ON) provide theoretical foundation and do not require re-verification.
    Phase 2B should focus verification effort on PROVE_NEW claims:
    (1) Documentation features predict above-scale-expected benchmark variance
    (2) Effect is concentrated in knowledge-recall benchmarks (MMLU, ARC) vs. reasoning (HellaSwag, WinoGrande)
    Both PROVE_NEW claims require empirical analysis on Open LLM Leaderboard data.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-DocCuration-v1"
  confidence_level: 0.72
  core_hypothesis_statement: |
    Under the set of open-weight LLMs listed on the Open LLM Leaderboard v1 snapshot with publicly
    accessible model cards, if models have documented pretraining data curation practices (binary
    indicators: deduplication, perplexity-based filtering, domain composition reporting, decontamination),
    then those models exhibit ≥0.5 percentage points higher benchmark performance on knowledge-recall
    benchmarks (MMLU, ARC) relative to a scale-and-architecture baseline (controlling for log(N),
    log(D), and architecture family fixed effects), because documented curation practices serve as a
    proxy for higher effective data quality Q in the Subramanyam et al. (2025) scaling framework —
    labs that document curation rigorously are more likely to have implemented it rigorously, and
    higher Q reduces effective data corruption, shifting L(N,D,Q) toward lower loss on
    knowledge-intensive tasks.
  alternative_hypothesis_h0: |
    There is no significant difference in benchmark performance on MMLU or ARC between models with
    documented curation practices and models without, after controlling for log(parameter count),
    log(training tokens), and architecture family fixed effects (β_docs = 0).

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "dedup_documented"
      type: "categorical"
      operationalization: "Binary: 1 if model card mentions deduplication procedure with any specificity (exact-dedup, near-dedup, MinHash, etc.), 0 otherwise"
      levels: [0, 1]
    - name: "perplexity_filter_documented"
      type: "categorical"
      operationalization: "Binary: 1 if model card mentions perplexity-based filtering or quality filtering via language model scoring, 0 otherwise"
      levels: [0, 1]
    - name: "domain_percentages_reported"
      type: "categorical"
      operationalization: "Binary: 1 if model card reports quantitative domain composition (e.g., 'X% web crawl, Y% GitHub'), 0 otherwise"
      levels: [0, 1]
    - name: "decontamination_documented"
      type: "categorical"
      operationalization: "Binary: 1 if model card explicitly mentions benchmark decontamination or n-gram overlap removal, 0 otherwise"
      levels: [0, 1]
    - name: "doc_score"
      type: "continuous"
      operationalization: "Sum of 4 binary features (0-4 scale); used as continuous predictor in secondary analysis"
  dependent:
    - name: "mmlu_score"
      type: "continuous"
      operationalization: "Accuracy on MMLU (5-shot) from Open LLM Leaderboard v1; range 0-1; primary outcome"
      primary: true
    - name: "arc_score"
      type: "continuous"
      operationalization: "Accuracy on ARC Challenge (25-shot) from Open LLM Leaderboard v1; range 0-1"
      primary: false
    - name: "hellaswag_score"
      type: "continuous"
      operationalization: "Accuracy on HellaSwag (10-shot); range 0-1; serves as comparison benchmark (reasoning)"
      primary: false
    - name: "truthfulqa_score"
      type: "continuous"
      operationalization: "MC accuracy on TruthfulQA (0-shot); range 0-1; contamination-sensitive"
      primary: false
    - name: "winogrande_score"
      type: "continuous"
      operationalization: "Accuracy on WinoGrande (5-shot); range 0-1; commonsense reasoning"
      primary: false
  controlled:
    - name: "log_parameter_count"
      operationalization: "log10 of model parameter count (from model card or Hugging Face model info)"
    - name: "log_training_tokens"
      operationalization: "log10 of total pretraining tokens (from model card; N/A models excluded or imputed)"
    - name: "architecture_family"
      operationalization: "Categorical fixed effect: LLaMA-derived, Falcon-derived, MPT-derived, GPT-NeoX-derived, Other"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 3
  steps:
    - step: 1
      description: "Labs that document curation practices (binary features = 1) have also implemented those curation practices with higher rigor — documentation reflects actual filtering discipline"
      evidence: "Djuhera et al. (2025): systematic quality annotation reveals that operationally-defined curation metrics predict benchmark outcomes; documentation presence correlates with implementation (bridge validation test)"
      falsifier: "If documented deduplication does NOT predict lower 13-gram duplication rates in accessible training corpora (bridge validation fails), this step collapses"
    - step: 2
      description: "Implemented curation practices (deduplication, perplexity filtering, domain balancing, decontamination) increase effective data quality Q in the Subramanyam et al. (2025) framework — reducing corruption rate CR and/or deficiency Δ"
      evidence: "Subramanyam et al. (2025): Q = 1-CR (corruption proxy) and Q = e^{-Δ} (deficiency proxy); higher Q reduces loss as D^β × Q^γ with γ_CLM ≈ 0.39; sublinear but measurable"
      falsifier: "If documentation features predict benchmark variance even after controlling for direct Q-proxies (bridge measures), Step 2 is mediation; if not, full mechanism fails"
    - step: 3
      description: "Higher effective Q preferentially reduces loss on knowledge-recall benchmarks (MMLU, ARC) more than reasoning benchmarks (HellaSwag, WinoGrande), because knowledge-recall is more sensitive to training data quality and less to structural reasoning ability"
      evidence: "Myntti et al. (2025): domain composition differentially affects benchmarks; Zhu et al. (2024): contamination inflates MMLU more than reasoning tasks"
      falsifier: "If documentation coefficient is equal or larger for HellaSwag than MMLU in the heterogeneity analysis, differential benchmark sensitivity does not hold"
  key_tension: "Organizational competence confound: labs that document carefully may also have better hyperparameter tuning, more training runs, and stronger eval hygiene — all loading into architectural residual E, not Q. Cannot be fully controlled with observational data alone."
  evidence_summary: |
    The causal chain is theoretically motivated by the Subramanyam et al. (2025) quality-aware scaling
    law (L(N,D,Q)), empirically grounded by Thrush et al. (2024)'s successful use of leaderboard data
    for similar correlational analysis, and made conditional on bridge validation to prevent rhetorical
    overreach. The mechanism is plausible but not proven — the study is designed to provide the first
    observational test, not to establish causality.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Documentation presence in model cards reflects actual implementation of those curation practices — model cards are not purely aspirational theater"
    supporting_evidence: "Bridge validation test (secondary analysis) is designed specifically to test this assumption; Djuhera et al. (2025) annotations suggest quality descriptions track actual dataset properties"
    consequence_if_violated: "If documentation doesn't reflect actual Q, any observed correlation reflects organizational competence only — still interesting, but changes the interpretation and mechanism"
  - id: "A2"
    assumption: "The Open LLM Leaderboard v1 benchmark scores are comparable across models (same evaluation protocol, no systematic inflation)"
    supporting_evidence: "Lunardi et al. (2025): benchmark rankings are stable, absolute scores vary — validates rank-based analysis; Open LLM Leaderboard uses fixed evaluation harness (LM-Evaluation-Harness)"
    consequence_if_violated: "Score incomparability would inflate variance, attenuating regression coefficients; would not create false positives unless scoring errors correlate with documentation"
  - id: "A3"
    assumption: "Model parameter counts (N) and training token counts (D) are available or recoverable for a sufficient fraction of leaderboard models (~500+)"
    supporting_evidence: "Most major open-weight model cards (LLaMA-2, Mistral, Falcon, Pythia) report N and D explicitly; HuggingFace model pages provide parameter counts"
    consequence_if_violated: "Missing D data would reduce sample size and statistical power; sensitivity analysis using N-only controls would serve as fallback"
  - id: "A4"
    assumption: "Architecture family fixed effects adequately control for systematic differences in benchmark performance across model families"
    supporting_evidence: "Prof. Pax analysis: architecture FE is standard econometric panel design and doesn't require structural scaling curve fitting; leave-one-family-out stability test validates this"
    consequence_if_violated: "If within-family variation is too small, fixed effects absorb real signal; addressed by leaving dominant families out iteratively"
  - id: "A5"
    assumption: "The effect of documented curation on benchmark performance is detectable at n ≈ 500-2000 models with the expected magnitude (0.3-1.2 pp)"
    supporting_evidence: "Power analysis: at n=500, Cohen's f² ≈ 0.02, α=0.05 → power ≈ 0.80 for the documentation block; expected magnitude (γ≈0.39, 10% Q shift → ~4.5% effective data increase) is within detectable range"
    consequence_if_violated: "If true effect is <0.2 pp (below practical significance threshold) or n < 200 with documentation data, study will be underpowered — accept null as negligible effect"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    Open-weight LLMs listed on the Open LLM Leaderboard v1 snapshot with publicly accessible
    model cards on Hugging Face. Models must have non-missing benchmark scores for at least
    4 of 6 benchmarks (ARC, HellaSwag, MMLU, TruthfulQA, WinoGrande, GSM8K) and reportable
    parameter count. Architecture families include LLaMA-derived, Falcon-derived, MPT-derived,
    GPT-NeoX-derived, and Other.
  does_not_apply_to: |
    - Closed-source/proprietary models (GPT-4, Claude, Gemini) — no model card access
    - Post-training (RLHF, instruction tuning) quality practices — study focuses on pretraining curation only
    - Models with undisclosed training data (no model card) — excluded from analysis
    - Open LLM Leaderboard v2 or newer snapshots — temporal drift in evaluation standards
    - Multimodal models — different benchmark structure
  known_limitations: |
    - Organizational competence confound cannot be fully controlled without natural experiment
    - Bridge validation limited to models with accessible training corpora (<50% of leaderboard)
    - Missing training token counts (D) for many smaller models reduces regression sample
    - Cross-benchmark comparisons assume evaluation protocol consistency (Lunardi et al. 2025 validates this assumption)
    - Binary feature extraction may miss nuanced documentation (e.g., "we performed extensive deduplication" coded same as "we removed 23.4% via MinHash θ=0.8")

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "Models with ≥3 of 4 documentation features documented score ≥0.5 percentage points higher on MMLU than matched models (0-1 features) within the same architecture family and parameter scale band"
    test_method: "OLS regression with architecture FE and log-scale controls; within-bin permutation test (1,000 shuffles within architecture × ±50% parameter band); compare adjusted means between high-doc (≥3) and low-doc (0-1) groups"
    success_criterion: "Adjusted mean difference ≥0.5 pp AND permutation p < 0.01 within bins"
    falsification: "Adjusted mean difference < 0.2 pp OR permutation p ≥ 0.05 within bins"
  - id: "P2"
    primary: false
    statement: "The documentation coefficient (β_docs) is larger for MMLU and ARC than for HellaSwag and WinoGrande in the primary regression — knowledge-recall benchmarks are more sensitive to curation documentation than reasoning benchmarks"
    test_method: "Separate OLS regressions per benchmark; compare β_docs coefficients across benchmark types; test whether MMLU/ARC coefficients are significantly larger than HellaSwag/WinoGrande"
    success_criterion: "β_docs(MMLU) > β_docs(HellaSwag) and β_docs(ARC) > β_docs(WinoGrande) with significance p < 0.05 in F-test of coefficient difference"
    falsification: "β_docs coefficients are statistically indistinguishable across benchmark types, or reasoning benchmarks show larger effects than knowledge benchmarks"
  - id: "P3"
    primary: false
    statement: "The documentation block (4 binary features) explains ≥3% of residual benchmark score variance on MMLU after accounting for log(N), log(D), and architecture FE (partial R² ≥ 0.03)"
    test_method: "Nested model comparison: full model (scale+arch+docs) vs. reduced model (scale+arch only); compute partial R² for documentation block; verify with bootstrap confidence interval"
    success_criterion: "Partial R² ≥ 0.03 AND lower bound of 95% bootstrap CI > 0.01"
    falsification: "Partial R² < 0.01 (practical negligibility threshold)"

