hypothesis_draft:
  title: "Curation Documentation as Benchmark Performance Predictor: An Observational Study"
  hypothesis_id: "H-DocCuration-v1"
  core_claim: |
    Among open-weight LLMs on the Open LLM Leaderboard v1, models with documented pretraining
    data curation practices (binary indicators for deduplication, perplexity filtering, domain
    composition, and decontamination) score ≥0.5 percentage points higher on knowledge-recall
    benchmarks (MMLU, ARC) after controlling for model scale and architecture family, consistent
    with documented curation serving as a proxy for higher effective data quality Q.
  mechanism: |
    Step 1: Documentation reflects implementation — labs that document curation have also implemented it.
    Step 2: Implemented curation increases effective data quality Q (Subramanyam et al. 2025 framework).
    Step 3: Higher Q preferentially reduces loss on knowledge-intensive tasks vs. reasoning tasks.
    Conditional: if bridge validation fails (documentation doesn't predict hygiene artifacts),
    reinterpret as "organizational competence proxy" rather than Q mechanism.
  predictions:
    - P1: "≥0.5 pp MMLU improvement for fully-documented models within matched architecture-scale bands (permutation p < 0.01)"
    - P2: "Documentation coefficient larger for MMLU/ARC than HellaSwag/WinoGrande (knowledge > reasoning sensitivity)"
    - P3: "Documentation block explains ≥3% of residual MMLU variance after scale + architecture FE controls"

variables_summary:
  independent: "4 binary curation documentation features from model cards (dedup, perplexity_filter, domain_percentages, decontamination); secondary: continuous sum score (0-4)"
  dependent_primary: "MMLU accuracy from Open LLM Leaderboard v1 (5-shot); secondary: ARC, HellaSwag, TruthfulQA, WinoGrande, GSM8K"
  controlled: "log(parameter count), log(training tokens), architecture family fixed effects (LLaMA-derived, Falcon-derived, MPT-derived, GPT-NeoX-derived, Other)"

null_hypothesis:
  h0_statement: |
    There is no significant difference in MMLU benchmark performance between models with documented
    pretraining data curation practices and models without documentation, after controlling for
    log(parameter count), log(training tokens), and architecture family fixed effects (β_docs = 0).
  statistical_test: "Two-tailed t-test on β_docs in OLS; permutation test within architecture × size bins"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First observational study systematically linking documented pretraining curation practices to benchmark variance across deployed open-weight LLMs — creates LLM Documentation-Benchmark Registry as reusable research artifact"
  differentiation_summary: |
    Prior work (Thrush et al. 2024) uses computed perplexity-benchmark correlations for prospective
    data selection. This study uses human-written documentation as a proxy for retrospective
    characterization of deployed models. Prior work (Subramanyam et al. 2025) establishes controlled
    experimental Q effects. This study provides the first observational test of whether natural
    documentation variation proxies for Q in real-world deployment. No prior study has merged
    model card curation features with leaderboard benchmark data at scale.

