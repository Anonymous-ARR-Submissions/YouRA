measurement_plan:
  data_collection:
    - source: "Open LLM Leaderboard v1 snapshot — download benchmark scores for all evaluated models"
    - source: "HuggingFace Hub model cards — scrape and parse for 4 curation documentation binary indicators"
    - source: "Model technical reports (LLaMA-2, Mistral, Falcon, GPT-NeoX, Pythia) — extract N and D"
  procedure:
    - step: "Download/scrape Open LLM Leaderboard v1 evaluation results into tabular format"
    - step: "For each model, retrieve model card from HuggingFace Hub"
    - step: "Apply pre-registered extraction rules: code 4 binary features (dedup, perplexity_filter, domain_pct, decontam)"
    - step: "Extract parameter count and training token count from model card or technical report"
    - step: "Assign architecture family label (LLaMA-derived, Falcon-derived, MPT-derived, GPT-NeoX, Other)"
    - step: "Compute bridge validation metrics for subset with accessible training corpora (13-gram dedup rate, reference model cross-entropy)"
    - step: "Fit OLS regressions: scale-only baseline, scale+arch FE baseline, full model with documentation features"
    - step: "Run within-bin permutation tests (1,000 shuffles)"
    - step: "Run leave-one-architecture-family-out stability analysis"
    - step: "Run verbosity placebo comparison"
  success_criteria:
    - "P1: β_docs ≥ 0.5 pp for MMLU AND permutation p < 0.01 within bins"
    - "P2: β_docs(MMLU) > β_docs(HellaSwag) with p < 0.05"
    - "P3: Partial R² ≥ 0.03 for documentation block on MMLU"
    - "Stability: β_docs retains sign and ≥50% magnitude in leave-one-family-out"
    - "Placebo: documentation block ΔR² ≥ 2× verbosity placebo ΔR²"

validation:
