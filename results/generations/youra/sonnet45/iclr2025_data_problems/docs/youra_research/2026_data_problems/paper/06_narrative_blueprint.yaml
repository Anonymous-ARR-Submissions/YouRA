# PART 5: SECTION-LEVEL NARRATIVE GOALS
# ═══════════════════════════════════════════════════════════════════════════════

section_goals:

  abstract:
    narrative_purpose: "Compress the entire story into ~150 words"
    key_message: >
      First registry linking model card curation documentation to LLM
      benchmarks reveals confounded negative documentation effect that
      motivates size-controlled future analysis.
    structure_notes: |
      - Sentence 1-2: Problem (data quality hard to measure; model cards
        are untested as quality proxies) and importance.
      - Sentence 3: Our approach (LLM Documentation-Benchmark Registry,
        n=4,493, targeted family sampling, OLS regression).
      - Sentence 4-5: Key results (n=4,493, R²=0.4247, β_docs=-3.45,
        size confound identified).
      - Sentence 6: Contribution (first registry, methodology insights,
        propensity-matching path forward).
    avoid:
      - "Citations in abstract"
      - "Vague claims without numbers"
      - "Claiming causal effect when confound is present"

  introduction:
    narrative_purpose: "Hook → Problem → Insight → Solution preview"
    hook_strategy: >
      Open with the counterintuitive finding: 96.5% of 4,493 LLM model
      cards document zero curation practices, and those that do score
      lower on benchmarks — a finding that raises more questions than it
      answers and motivates the registry-building methodology.
    problem_escalation: |
      1. Surface: Data quality matters for LLMs, but measuring it is hard
         (no corpus access for most models).
      2. Deeper: Model cards describe curation in structured ways never
         systematically linked to performance.
      3. Gap: No registry exists. Without it, transparency frameworks for
         AI governance cannot be empirically grounded.
    insight_preview: >
      Preview the registry methodology (systematic model card mining +
      targeted family sampling) and hint that the negative finding itself
      is illuminating — it reveals the size confound that more naive
      analyses would miss.
    contributions_framing: |
      Frame as three contributions from the registry:
      (1) The registry dataset itself (n=4,493, publicly available)
      (2) The methodology (targeted family sampling for variance)
      (3) The empirical finding (confounded negative β + interpretation)
    transition_to_related_work: >
      "Understanding where this work fits requires examining three bodies
      of prior research: scaling laws, model card analysis, and benchmark
      evaluation methodology."

  related_work:
    narrative_purpose: "Show why existing work is insufficient → justify our approach"
    positioning_strategy: >
      Acknowledge the strength of existing scaling law and model card
      literatures, then show the gap is at their intersection:
      nobody has connected the two at registry scale.

    key_comparison_points:
      - area: "Quality-aware scaling laws"
        limitation_to_highlight: >
          Subramanyam et al. (2025) establishes L(N,D,Q) framework but
          requires controlled noise injection experiments — not applicable
          to observational study at population scale.
        how_we_differ: >
          We operationalize Q through observable documentation proxies
          at scale without corpus access.

      - area: "Perplexity-based quality analysis"
        limitation_to_highlight: >
          Thrush et al. (2024) uses LLM-computed perplexity as quality
          proxy across 90 models — requires inference access.
        how_we_differ: >
          Documentation-based proxy requires only model card scraping —
          scales to 4,493 models with no inference compute.

      - area: "Benchmark contamination studies"
        limitation_to_highlight: >
          Zhu et al. (2024) and others study contamination effects but
          focus on benchmark data quality, not training data documentation.
        how_we_differ: >
          We study training data documentation as predictor, with
          benchmark performance as outcome.

      - area: "Model card analysis"
        limitation_to_highlight: >
          Prior model card studies (documentation completeness, bias
          reporting) are qualitative and small-scale.
        how_we_differ: >
          First quantitative analysis linking model card features to
          independently measured benchmark performance at scale.

    papers_to_discuss:
      - "Subramanyam et al. (2025) — quality-aware scaling laws"
      - "Thrush et al. (2024) — perplexity-benchmark correlations"
      - "Zhu et al. (2024) — benchmark contamination"
      - "Myntti et al. (2025) — domain composition effects"
      - "Mitchell et al. (2019) — model cards for model reporting"
      - "Gebru et al. (2018) — datasheets for datasets"
      - "Bender et al. (2021) / Bommasani et al. (2021) — model documentation norms"

    avoid:
      - "Just listing papers without critique"
      - "Being unfair to prior work"
      - "Missing obvious related work on model cards"

  methodology:
    narrative_purpose: "Explain WHY this design solves the problem"
    connection_to_insight: >
      The registry methodology directly addresses the gap: we need
      systematic documentation extraction + benchmark joining at scale.
      Targeted family sampling is the key innovation — it solves the
      variance problem (alphabetical retrieval fails) by prioritizing
      families known to document practices.

    key_design_decisions:
      - decision: "Use Open LLM Leaderboard v2 (contents) not v1 (results)"
        rationale: >
          V2 contains avg_score, params_b, and all 6 benchmark scores
          in a single dataset — V1 schema is incompatible.
        alternatives_considered: >
          V1 was attempted first (H-E1) but schema was incompatible;
          V2 is the only viable option.

      - decision: "Targeted family sampling: prioritize LLaMA, Mistral, Qwen, Falcon, Pythia, OLMo"
        rationale: >
          Alphabetical retrieval (H-E1) yielded only 177 cards from
          0-A range, missing all major documented families. Targeted
          sampling ensures 3/4 features have non-zero variance.
        alternatives_considered: >
          Random sampling would work but is less efficient; random
          order was tried first (H-E1) and failed the variance gate.

      - decision: "Binary regex features for 4 curation practices"
        rationale: >
          Binary indicators are robust to card length and writing style
          variation; regex patterns validated against known cards.
        alternatives_considered: >
          Continuous scores (word counts, semantic similarity) are more
          expressive but require NLP infrastructure not needed for
          existence validation.

      - decision: "OLS with log(params) + log(tokens) + architecture family FE"
        rationale: >
          Standard approach in empirical scaling law literature;
          interpretable coefficients; no distributional assumptions
          violated given n=4,493.
        alternatives_considered: >
          Propensity score matching (planned for H-M2) requires
          balanced matched groups not available at existence stage.

    intuition_building: |
      Use Figure 2 (dropout funnel) to show data pipeline stages.
      Walk through the registry construction step-by-step:
      (1) Load leaderboard → 4,497 rows
      (2) Deduplicate + filter benchmark coverage → 4,493 models
      (3) Sort by family for targeted card retrieval → 3,749 cards
      (4) Extract binary features → 4 documentation indicators
      (5) Build registry → join leaderboard + card features
      (6) OLS regression → estimate documentation coefficient

  experiments:
    narrative_purpose: "Design experiments that test our specific claims"

    experimental_questions:
      - question: "Can a registry of ≥200 models with ≥3 non-zero variance curation features be assembled?"
        experiment: "H-E1: alphabetical retrieval; H-E1-v2: targeted family sampling"
        expected_outcome: "n=4,493, 3/4 features with variance — demonstrates registry feasibility"

      - question: "What fraction of models document curation practices?"
        experiment: "Descriptive statistics on doc_score distribution in the registry"
        expected_outcome: "Very low documentation rate (~3.5%), concentrated in specific families"

      - question: "Does documentation predict benchmark performance after scale controls?"
        experiment: "OLS: avg_score ~ log(params) + log(tokens) + doc_score + C(arch_family)"
        expected_outcome: "Statistically significant coefficient — direction to be interpreted in context of confounds"

    baseline_rationale: >
      Baseline model: avg_score ~ log(params) + log(tokens) + C(arch_family).
      This replicates the standard scaling law regression without documentation,
      establishing how much variance scale explains before testing documentation.
    dataset_rationale: >
      Open LLM Leaderboard v2 is the most comprehensive standardized benchmark
      dataset for open-weight models. HuggingFace model cards are the primary
      documentation source for this population.
    metric_rationale: >
      avg_score (composite of 6 V2 benchmarks: IFEval, BBH, MATH Lvl 5,
      GPQA, MUSR, MMLU-PRO) provides a single performance measure while
      capturing diverse capability dimensions. R² and β_docs coefficient
      are the primary analysis metrics.

  results:
    narrative_purpose: "Present evidence that supports our claims"
    main_result_highlight: >
      Registry successfully assembled (n=4,493, H-E1-v2 PASS) with R²_baseline=0.4247
      — lower than expected, leaving 58% unexplained variance. β_docs=-3.45
      (p=1.1e-8) is statistically significant but confounded by model size/age.
      Perplexity filtering is absent from all 3,749 model cards.

    result_presentation_order:
      - result: "Data collection: 4,493 models, 3,749 cards retrieved via targeted sampling"
        purpose: "Establish that the registry exists and has appropriate scale"
      - result: "Documentation distribution: 96.5% of models have doc_score=0; targeted families account for 2.5%"
        purpose: "Characterize the ecosystem — establishes context for interpretation"
      - result: "Scale baseline: R²=0.4247 — substantially lower than 0.60-0.75 expected"
        purpose: "Establish unexplained variance — validates the research question"
      - result: "β_docs = -3.45, p=1.1e-8 — significant negative documentation coefficient"
        purpose: "Present the counterintuitive main finding"
      - result: "Confound interpretation: documented models are older/smaller; propensity matching needed"
        purpose: "Provide honest interpretation and path forward"
      - result: "Perplexity filtering = 0 across all cards — terminology mismatch"
        purpose: "Practical finding about documentation standards"

    surprising_result_handling: >
      Address β_docs < 0 head-on in the results, not buried in discussion.
      Frame it as: "This finding is surprising but interpretable — we identify
      the size confound and show it explains the negative direction."
      This demonstrates methodological sophistication rather than hiding
      an inconvenient result.

    avoid:
      - "Hiding the negative β_docs direction"
      - "Claiming registry validates the causal hypothesis (it does not)"
      - "Treating the confound as a limitation rather than a finding"

  discussion:
    narrative_purpose: "Interpret results, acknowledge limits, show significance"

    key_findings_interpretation: >
      The registry contribution stands independent of β_docs direction:
      we have assembled the infrastructure for studying documentation-quality
      relationships. The negative coefficient is itself informative — it
      reveals selection biases in the open-weight ecosystem and quantifies
      the confound that future propensity-matched analysis must address.
      The low scale baseline R² validates V2 benchmarks as a target for
      documentation quality analysis.

    honest_limitations:
      - limitation: "Documentation-to-implementation validity untested (H-M1 not completed)"
        why_acceptable: >
          The paper's contribution is the registry and methodology, not
          the causal chain. The existence stage validates the infrastructure.
        future_mitigation: "H-M1 bridge validation using Pythia/OLMo corpora"

      - limitation: "96.5% feature sparsity may limit subgroup analyses"
        why_acceptable: >
          Sufficient for existence validation; H-M2 propensity matching
          will use the non-zero subset for causal analysis.
        future_mitigation: "Propensity score matching within doc_score≥1 group"

      - limitation: "V2 benchmarks differ from original V1 hypothesis targets"
        why_acceptable: >
          V2 benchmarks are harder and more comprehensive — actually a stronger
          test of the documentation-quality relationship.
        future_mitigation: "H-M3 will reformulate benchmark-type differential for V2"

      - limitation: "Observational design cannot establish causality"
        why_acceptable: >
          Explicitly framed as observational; causal claims reserved
          for future propensity-matched analysis.
        future_mitigation: "Propensity matching + sensitivity analysis in H-M2"

    broader_impact_statement: >
      This work contributes to AI transparency infrastructure by providing
      empirical evidence about the relationship (or lack thereof) between
      model card documentation and benchmark performance. The finding that
      documentation presence does not naively predict quality motivates
      more nuanced AI governance frameworks that go beyond documentation
      checklist compliance.

  conclusion:
    narrative_purpose: "Reinforce key message + open future directions"
    callback_to_hook: >
      Open by returning to the counterintuitive finding: those 3.5% of
      models that document their curation practices score lower — not because
      documentation hurts, but because the correlation structure in the
      open-weight ecosystem confounds documentation with model vintage and
      size. We now have the registry to disentangle these effects.
    memorable_ending: >
      The LLM Documentation-Benchmark Registry is infrastructure.
      Whether model cards contain genuine signals about training data quality
      remains an open question — but it is now an answerable one.
    future_work_vision: >
      The registry enables a systematic research agenda: bridge validation
      of documented vs. actual curation (H-M1), propensity-matched regression
      isolating documentation effects (H-M2), and benchmark-type differential
      sensitivity analysis (H-M3). Beyond these immediate extensions, the
      registry methodology — systematic model card mining joined to
      standardized benchmarks — provides a template for future work on
      AI transparency and documentation standards.

