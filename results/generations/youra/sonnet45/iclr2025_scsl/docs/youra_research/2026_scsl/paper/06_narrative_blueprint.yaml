# ═══════════════════════════════════════════════════════════════════════════════
# PART 1: HOOK & MOTIVATION
# ═══════════════════════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: "Self-supervised learning (SSL) achieves up to 90% worst-group accuracy on spurious correlation benchmarks using only linear probes, yet the geometric structure underlying this fairness remains poorly understood."
    strategy: "surprising_statistic"

  why_reader_should_care:
    main_reason: "Understanding the geometric manifestation of spurious correlations in embedding space is critical for developing training-time interventions that don't require group labels."
    concrete_example: "Medical diagnosis systems trained on SSL embeddings can achieve high overall accuracy but fail 23% more frequently on minority-group patients when spurious background correlations are present."
    stakes: "Without understanding how spurious features manifest geometrically, we cannot develop automated fairness interventions for unlabeled data, limiting SSL's applicability in high-stakes domains like healthcare and criminal justice."

  real_world_impact:
    application_domain: "Fairness-critical applications (medical diagnosis, hiring, lending) where group labels are unavailable"
    potential_beneficiaries: "Minority groups affected by spurious correlation bias in production ML systems"
    scale_of_impact: "SSL is increasingly used in production systems with billions of users; fairness gaps affect millions of minority-group users"

# ─────────────────────────────────────────────────────────────────────────────
# PROBLEM FRAMING
# ─────────────────────────────────────────────────────────────────────────────

problem_framing:
  surface_problem:
    description: "Self-supervised learning models learn spurious correlations from biased training data, leading to fairness failures"
    common_understanding: "Existing work assumes geometric cluster structure exists and can be exploited for fairness interventions"

  deeper_problem:
    description: "Prior work assumes spurious correlations manifest as discrete, geometrically separable clusters in embedding space, but this assumption has never been empirically validated"
    why_overlooked: "Strong linear separability of spurious features (enabling 90% WGA via linear probes) created the impression that clusters must exist. Researchers conflated 'linearly separable' with 'cluster-based'."
    our_perspective: "Linear separability and discrete clusterability are dissociable properties. Spurious features may form continuous gradients that linear classifiers exploit without requiring discrete clustering."

  gap_in_existing_work:
    description: "No prior work has directly measured embedding clusterability on spurious correlation datasets or tested whether clusterability predicts intervention efficacy"
    why_gap_exists: "Difficulty of measuring geometric structure without labels; assumption that strong spurious correlations (93% in Waterbirds) automatically produce clusters"
    why_gap_matters: "Cluster-based diagnostic approaches (AMI-based selection for reweighting) may fail entirely if clusters don't form, leading researchers to pursue ineffective fairness interventions"

# ═══════════════════════════════════════════════════════════════════════════════
# PART 2: THE INSIGHT
# ═══════════════════════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: "Standard SSL training with InfoNCE loss does NOT produce geometrically separable spurious feature clusters measurable by AMI, even under strong (93%) spurious correlation conditions."
    expanded_explanation: "We hypothesized that InfoNCE contrastive loss would create dense clusters for shared spurious features (backgrounds), enabling cluster-balanced retraining. Proof-of-concept experiments (20 epochs, ResNet-50 on Waterbirds) comprehensively refuted this: AMI=0.28 (below 0.4 threshold), and the entire 3-step causal mechanism (M1: cluster formation, M2: clusterability-efficacy link, M3: LA-SSL cluster dispersion) was falsified."

  why_others_missed_it:
    common_assumptions: "Researchers assumed strong spurious correlation (93% in Waterbirds) would automatically produce discrete clusters. High linear probe accuracy (90% WGA) reinforced the belief that geometric structure must be cluster-based."
    our_different_view: "We distinguished between linear separability and discrete clusterability, recognizing these are dissociable properties. Strong linear separability can exist with continuous gradients rather than discrete clusters."
    enabling_factor: "Direct AMI measurement on trained SSL embeddings (not previously reported in fairness literature) revealed the absence of cluster structure despite strong spurious correlations."

  what_makes_it_work:
    intuitive_explanation: "Imagine spurious features not as separate islands (clusters) but as a smooth gradient across embedding space. Linear classifiers can still exploit this gradient (achieving high accuracy), but k-means clustering cannot identify discrete groups."
    key_mechanism: "InfoNCE loss pulls together samples with shared features (e.g., water backgrounds), but in high-dimensional embedding space (2048-dim), this creates smooth density gradients rather than discrete, separable clusters measurable by AMI."
    analogy: "Like a color gradient from blue to red: a linear classifier can separate 'mostly blue' from 'mostly red,' but clustering algorithms won't find distinct groups because colors blend continuously."

# ═══════════════════════════════════════════════════════════════════════════════
# PART 3: EVIDENCE STORY
# ═══════════════════════════════════════════════════════════════════════════════

evidence_narrative:
  main_claim:
    statement: "Spurious correlations in SSL embeddings do not manifest as discrete, geometrically separable clusters (AMI ≥ 0.4), invalidating cluster-based diagnostic approaches"
    measurable_criteria: "AMI < 0.4 indicates insufficient clusterability; correlation between AMI and intervention efficacy should be positive and significant (p < 0.05) if clusterability is diagnostic"

  supporting_evidence:
    - id: "evidence_1"
      what: "SimCLR trained on Waterbirds (93% spurious correlation) produces AMI=0.2795, significantly below 0.4 threshold (Silhouette=0.297)"
      so_what: "Even under strong spurious correlation conditions, SSL does not create geometrically separable clusters. This is not a marginal failure (AMI=0.39) but a fundamental absence of cluster structure (AMI near chance level)."
      how_it_supports_claim: "Directly falsifies M1 (InfoNCE creates spurious clusters). If clusters don't form with 93% correlation, they won't form with weaker correlations."

    - id: "evidence_2"
      what: "No correlation between AMI and cluster-balanced retraining efficacy (Pearson r=-1.0, p=1.0). High-AMI mean ΔWGA=0.00pp, low-AMI mean ΔWGA=-5.14pp."
      so_what: "Even if some clusterability existed, it doesn't predict intervention success. The diagnostic approach (use AMI to select when to apply cluster-balanced retraining) is not supported."
      how_it_supports_claim: "Directly falsifies M2 (clusterability predicts efficacy). AMI cannot serve as a fairness diagnostic if it's uncorrelated with intervention outcomes."

    - id: "evidence_3"
      what: "LA-SSL increased AMI by 2% (0.2795→0.2852) instead of decreasing by 30%. However, linear separability preserved (ΔAUC=0.005 < 0.05)."
      so_what: "LA-SSL's documented fairness benefits (Zhu et al. 2023) do NOT come from geometric cluster dispersion as theorized. Mechanism must be linear boundary adjustment, not cluster-based."
      how_it_supports_claim: "Falsifies M3 (LA-SSL disperses clusters). Eliminates cluster dispersion as explanation for LA-SSL's robustness, redirecting research to linear mechanisms."

  surprising_findings:
    finding: "LA-SSL slightly INCREASED clusterability (+2%) rather than decreasing it, counter to theoretical predictions"
    why_surprising: "Learning-speed resampling upweights slow-learning (minority) samples, which we expected to disperse spurious cluster coherence. Instead, it may amplify minority group structure."
    our_interpretation: "By giving minority groups more representation in the loss, LA-SSL may inadvertently increase their cluster coherence. Its fairness benefits likely come from improved linear decision boundaries for minority groups, not geometric dispersion."

  what_results_mean:
    synthesis: "This is a valuable negative result: we definitively show that cluster-based geometric diagnostics are not applicable to SSL fairness under standard training conditions. SSL fairness research should pivot from cluster-based to linear separability-based approaches."
    confidence_level: "HIGH for main finding (AMI < 0.4). MEDIUM for mechanistic alternatives (linear boundary hypothesis requires direct testing in future work)."
    caveats: "POC training (20 epochs) may not allow full cluster emergence; full-scale training (100 epochs) recommended as future work. Single architecture (ResNet-50) tested; high-capacity models may behave differently."

# ═══════════════════════════════════════════════════════════════════════════════
# PART 4: BROADER IMPACT
# ═══════════════════════════════════════════════════════════════════════════════

takeaway:
  main_contribution:
    one_sentence: "First empirical evidence that standard SSL does NOT produce high geometric clusterability on spurious correlation datasets, invalidating cluster-based fairness diagnostics and redirecting research to linear mechanisms"
    why_significant: "Prevents wasted research effort on cluster-based interventions that cannot work if clusters don't exist. Opens theoretical space for better explanations of SSL fairness grounded in linear geometry."

  implications:
    for_field: "SSL fairness researchers should shift from cluster-based diagnostics (AMI-based selection) to linear separability diagnostics (margin-based, boundary-focused approaches). Eliminates one incorrect mechanistic theory for LA-SSL's benefits."
    for_practice: "Practitioners should not rely on clusterability metrics (AMI, Silhouette) to diagnose when fairness interventions will work in SSL settings. Linear probe analysis is more informative."
    conceptual_contribution: "Demonstrates that linear separability and discrete clusterability are dissociable in SSL embeddings. Continuous geometric structure (gradients) can be exploited by linear classifiers without forming discrete clusters."

  future_possibilities:
    immediate_extensions: "Full-scale training (100 epochs) to confirm cluster absence persists; high-capacity models (ViT-H-14) to test if clusterability emerges with scale; direct testing of linear boundary mechanism for LA-SSL"
    longer_term_vision: "Develop linear separability-based fairness diagnostics (margin measurements, boundary analysis) that work in unlabeled settings. Design training-time interventions that reshape linear decision boundaries rather than targeting clusters."
    open_questions: "What geometric structure DO spurious correlations create if not clusters? How can we measure and manipulate this structure without labels? Can differentiable linear separability metrics enable gradient-based fairness interventions?"

# ═══════════════════════════════════════════════════════════════════════════════
# PART 5: SECTION-LEVEL NARRATIVE GOALS
# ═══════════════════════════════════════════════════════════════════════════════

section_goals:

  # ─────────────────────────────────────────────────────────────────────────────
  # ABSTRACT
  # ─────────────────────────────────────────────────────────────────────────────
  abstract:
    narrative_purpose: "Compress the entire story into ~150 words"
    key_message: "Cluster-based fairness diagnostics don't work for SSL because clusters don't form"
    structure_notes: |
      - Sentence 1-2: SSL achieves high WGA (90%) via linear probes, but geometric structure unknown
      - Sentence 3: We test if spurious correlations create discrete clusters (AMI-based diagnostic)
      - Sentence 4-5: Main results: AMI=0.28 < 0.4 threshold; all mechanism gates failed
      - Sentence 6: Significance: First evidence against cluster-based diagnostics; redirects to linear mechanisms
    avoid:
      - "Citations in abstract"
      - "Vague claims without numbers"
      - "Undefined acronyms"

  # ─────────────────────────────────────────────────────────────────────────────
  # INTRODUCTION
  # ─────────────────────────────────────────────────────────────────────────────
  introduction:
    narrative_purpose: "Hook → Problem → Insight → Solution preview"

    hook_strategy: "surprising_statistic (90% WGA via linear probes, yet geometric structure unknown)"

    problem_escalation: |
      1. Surface: SSL models learn spurious correlations, leading to fairness failures
      2. Deeper: Existing fairness interventions assume discrete cluster structure exists
      3. Gap: No one has actually measured whether spurious features form clusters in SSL embeddings

    insight_preview: "We hypothesized that strong spurious correlations (93% in Waterbirds) would create dense, measurable clusters. Experiments comprehensively refuted this hypothesis."

    contributions_framing: |
      Building on direct AMI measurement of SSL embeddings, we show:
      (1) Standard SSL does NOT produce high clusterability (AMI=0.28 < 0.4)
      (2) LA-SSL does NOT work via cluster dispersion (AMI increased 2%)
      (3) Cluster-balanced retraining mechanisms are implementable but untestable under current conditions
      This negative result redirects SSL fairness research from cluster-based to linear-based approaches.

    transition_to_related_work: "To understand why cluster-based assumptions persisted despite lack of evidence, we examine prior work on SSL fairness and geometric analysis."

  # ─────────────────────────────────────────────────────────────────────────────
  # RELATED WORK
  # ─────────────────────────────────────────────────────────────────────────────
  related_work:
    narrative_purpose: "Show why existing work is insufficient → justify our approach"

    positioning_strategy: "Most prior work ASSUMES geometric cluster structure exists without measuring it. We directly test this assumption and find it violated."

    key_comparison_points:
      - area: "SSL fairness (Mehta et al. 2022, Zhu et al. 2023)"
        limitation_to_highlight: "Achieves high WGA (90%) via linear probes, creating impression that clusters exist. No direct measurement of embedding clusterability."
        how_we_differ: "We directly measure AMI and find no discrete clusters despite strong spurious correlations."

      - area: "Group reweighting (GroupDRO, Sagawa et al.)"
        limitation_to_highlight: "Requires group labels. Cluster-based approaches (Sohoni et al. JTT) assume clusters exist."
        how_we_differ: "We test whether unlabeled clustering can substitute for group labels. Find that clusters don't form, invalidating this approach."

      - area: "Geometric analysis (Choshen et al., Ethayarajh et al.)"
        limitation_to_highlight: "Analyzes language model embeddings, not vision SSL. Focuses on representation degeneracy, not fairness."
        how_we_differ: "First to measure clusterability specifically for spurious correlation detection in vision SSL."

    papers_to_discuss:
      - "Mehta et al. 2022 (arxiv_2212_06254): 90% WGA with ViT-H-14 linear probe"
      - "Zhu et al. 2023 (arxiv_2311_16361): LA-SSL learning-speed resampling"
      - "Sagawa et al. GroupDRO: Group reweighting with labels"
      - "Sohoni et al. JTT: Cluster-based reweighting (assumes clusters exist)"

    avoid:
      - "Just listing papers without critique"
      - "Being unfair to prior work (they advanced the field)"
      - "Missing obvious related work (LA-SSL, GroupDRO critical)"

  # ─────────────────────────────────────────────────────────────────────────────
  # METHODOLOGY
  # ─────────────────────────────────────────────────────────────────────────────
  methodology:
    narrative_purpose: "Explain WHY this design tests the cluster hypothesis"

    connection_to_insight: "To test whether clusters exist, we need: (1) trained SSL models on spurious correlation data, (2) AMI measurement of embeddings, (3) cluster-balanced retraining to test diagnostic efficacy"

    key_design_decisions:
      - decision: "Use Waterbirds dataset (93% spurious correlation)"
        rationale: "Strong spurious correlation maximizes cluster formation probability. If clusters don't form here, they won't form with weaker correlations."
        alternatives_considered: "Synthetic datasets (more control) vs real datasets (more realism). Chose Waterbirds for comparability with prior SSL fairness work."

      - decision: "AMI as clusterability metric (not Silhouette alone)"
        rationale: "AMI measures cluster-label agreement independent of cluster compactness. Handles varying cluster sizes and densities better than Silhouette."
        alternatives_considered: "Silhouette score (geometry only), Davies-Bouldin index. AMI is standard in clustering literature and interpretable."

      - decision: "20-epoch POC before full 100-epoch training"
        rationale: "Validate implementation feasibility before committing 48-96 GPU hours. Standard experimental practice."
        alternatives_considered: "Full training first (expensive if implementation bugs exist). POC reduces risk."

    intuition_building: |
      Think of spurious features as a color gradient in embedding space:
      - Discrete clusters = islands of distinct colors (blue, red, green)
      - Continuous gradient = smooth blue→purple→red transition
      Linear classifiers work for both. K-means clustering only works for discrete islands.
      AMI measures whether discrete islands exist.

    technical_depth_balance: |
      Main paper: High-level methodology, rationale for design choices, AMI interpretation
      Appendix: Implementation details, hyperparameters, ablations, proofs

  # ─────────────────────────────────────────────────────────────────────────────
  # EXPERIMENTS
  # ─────────────────────────────────────────────────────────────────────────────
  experiments:
    narrative_purpose: "Design experiments that test our specific claims"

    experimental_questions:
      - question: "Does InfoNCE loss create geometrically separable spurious clusters (AMI ≥ 0.4)?"
        experiment: "Train SimCLR on Waterbirds (20 epochs), extract embeddings, compute AMI"
        expected_outcome: "AMI ≥ 0.4 if clusters form; AMI < 0.3 if no clusters"

      - question: "Does clusterability predict cluster-balanced retraining efficacy?"
        experiment: "Stratify models by AMI (high vs low), measure ΔWGA from cluster-balanced retraining"
        expected_outcome: "Positive correlation (high AMI → large ΔWGA) if diagnostic works"

      - question: "Does LA-SSL reduce clusterability while preserving linear separability?"
        experiment: "Train SimCLR and LA-SSL, compare AMI (expect -30%) and linear AUC (expect ΔAUC < 0.05)"
        expected_outcome: "AMI reduction ≥ 30% with AUC preserved if mechanism theory correct"

    baseline_rationale: "SimCLR as standard SSL baseline. LA-SSL as fairness-aware variant. No baseline comparison needed (Phase 5 skipped) because we're testing geometric properties, not performance."

    dataset_rationale: "Waterbirds has strong (93%) spurious correlation, standard in SSL fairness literature (Mehta, Zhu), enables direct comparison. 4-group structure (landbird/waterbird × land/water) provides ground truth for cluster evaluation."

    metric_rationale: "AMI: cluster-label agreement independent of compactness. Silhouette: cluster separation/compactness. Linear AUC: spurious feature separability. ΔWGA: intervention efficacy. These metrics directly operationalize our hypotheses."

    fairness_considerations: |
      - Same hyperparameters for SimCLR and LA-SSL (learning rate grid search within budget)
      - Same architecture (ResNet-50)
      - Same training epochs for POC (20) and planned full-scale (100)
      - Real data (not mocks) verified in Phase 4 validation

  # ─────────────────────────────────────────────────────────────────────────────
  # RESULTS
  # ─────────────────────────────────────────────────────────────────────────────
  results:
    narrative_purpose: "Present evidence that clusters don't form"

    main_result_highlight: "AMI=0.2795 < 0.4 threshold — comprehensive failure of cluster formation despite strong spurious correlation"

    result_presentation_order:
      - result: "M1 failure: AMI=0.2795, Silhouette=0.2967 (both below thresholds)"
        purpose: "Establish primary finding first: clusters don't form. This is the foundation."

      - result: "M2 failure: Correlation=-1.0, p=1.0 (no AMI-efficacy link)"
        purpose: "Show that even if weak clusters existed, AMI doesn't predict intervention success. Diagnostic approach invalid."

      - result: "M3 failure: AMI increased 2% (+0.0057), not decreased 30%"
        purpose: "Falsify LA-SSL cluster dispersion mechanism. Linear separability preserved (ΔAUC=0.005)."

      - result: "Implementation quality: 43/43 tests passing, 100% SDD compliance (h-e1)"
        purpose: "Demonstrate methodological rigor. Null results are not due to implementation bugs."

    surprising_result_handling: "LA-SSL AMI increase (+2%) was unexpected. We interpret this as minority group coherence amplification: upweighting slow learners gives them more loss representation, inadvertently increasing their cluster structure rather than dispersing it."

    avoid:
      - "Table 1 shows X, Table 2 shows Y" (no interpretation)
      - "Cherry-picking favorable results (we present all gates, all failed)"
      - "Hiding negative results (this IS a negative result paper - we embrace it)"

  # ─────────────────────────────────────────────────────────────────────────────
  # DISCUSSION
  # ─────────────────────────────────────────────────────────────────────────────
  discussion:
    narrative_purpose: "Interpret results, acknowledge limits, show significance"

    key_findings_interpretation: "Spurious correlations in SSL embeddings manifest as continuous geometric gradients, not discrete clusters. Linear classifiers exploit gradients (achieving 90% WGA), but k-means cannot identify discrete groups (AMI=0.28). This dissociation between linear separability and clusterability invalidates cluster-based diagnostic approaches."

    honest_limitations:
      - limitation: "POC training (20 epochs) may not allow full cluster emergence"
        why_acceptable: "Standard experimental practice to validate implementation before full-scale execution. Comprehensive failure across M1, M2, M3 suggests issue is fundamental, not just duration."
        future_mitigation: "Full 100-epoch training planned as future work (FW-1)"

      - limitation: "Single architecture (ResNet-50); high-capacity models may differ"
        why_acceptable: "ResNet-50 is standard SSL fairness baseline. Controlled scope enables interpretable results."
        future_mitigation: "ViT-H-14 testing planned (FW-6) to test if clusterability emerges with scale"

      - limitation: "h-e1 experimental validation not executed (P1 untested)"
        why_acceptable: "h-m-integrated failed to produce high-AMI embeddings, making P1 moot (no high-AMI cases to test). Implementation validated (43/43 tests)."
        future_mitigation: "Code is experiment-ready if future work creates high-AMI conditions"

    broader_impact_statement: "This work redirects SSL fairness research from cluster-based to linear-based approaches. Positive impact: prevents wasted research effort on ineffective cluster diagnostics. No negative societal impacts identified — this is foundational research on geometric properties of embeddings."

  # ─────────────────────────────────────────────────────────────────────────────
  # CONCLUSION
  # ─────────────────────────────────────────────────────────────────────────────
  conclusion:
    narrative_purpose: "Reinforce key message + open future directions"

    callback_to_hook: "We began by noting that SSL achieves 90% WGA via linear probes, yet the geometric structure underlying this success remained unclear. Our experiments reveal why: spurious features form continuous linear gradients, not discrete clusters. Linear separability explains high WGA; lack of clusterability invalidates cluster-based diagnostics."

    memorable_ending: "Null results are not failures when they eliminate incorrect theories and redirect research. By showing that cluster-based diagnostics cannot work in SSL fairness, we open theoretical space for better approaches grounded in linear geometry — the actual structure that SSL embeddings exhibit."

    future_work_vision: "Develop linear separability-based fairness diagnostics (margin measurements, boundary analysis) that work without labels. Design gradient-based interventions that reshape decision boundaries during training. Extend to high-capacity models and longer training to confirm cluster absence persists at scale."

