# ============================================================================
# ADVERSARIAL REVIEW GUIDANCE
# ============================================================================

adversarial_review_focus:
  high_risk_claims:
    - "Check that AMI values exactly match mechanism_metrics.json"
    - "Verify percentage calculations (e.g., 2% AMI increase)"
    - "Confirm no overstatement of statistical significance (n=2 limits power)"
    - "Ensure limitations are prominently stated (POC 20 epochs, single architecture)"

  prohibited_claims:
    - "Do NOT claim clusters were found (they weren't: AMI=0.28 < 0.4)"
    - "Do NOT claim LA-SSL disperses clusters (it increased AMI by 2%)"
    - "Do NOT claim AMI predicts efficacy (correlation was negative)"
    - "Do NOT claim full 100-epoch training was completed (only 20-epoch POC)"

  required_acknowledgments:
    - "Negative result / null result must be framed as valuable"
    - "All three mechanism gates failed (comprehensive failure)"
    - "POC training duration (20 vs 100 epochs) is a limitation"
    - "h-e1 experiment not run (P1 untested)"

