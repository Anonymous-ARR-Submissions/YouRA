metadata:
  generated_at: '2026-03-19T21:59:34.892993'
  workflow: phase2a-dialogue v10.0.0
  architecture: Self-Contained Tikitaka Loop
  schema_version: 10.0.0
  gap_id: gap-1
  gap_title: SSL Embeddings for Spurious Correlation Structure Discovery
  execution_mode: UNATTENDED
  discussion_exchanges: 13
  convergence_reason: 'All convergence criteria met: SPECIFIC (3-tier hypothesis), MECHANISM (clusterability as geometric
    manifestation), PREDICTIONS (quantitative thresholds), NOVELTY (geometric fairness SSL), FEASIBILITY (Tiers 1-2 executable),
    OBJECTIONS (addressed with controls)'
established_facts:
  claims:
  - claim: Frozen ViT-H-14 embeddings + linear ERM achieves 90.13% WGA on Waterbirds without subgroup labels (Mehta et al.,
      2022)
    status: BUILD_ON
    evidence: Verified by arxiv_2212_06254. Discussion established this as baseline to explain, not beat.
  - claim: LA-SSL learning-speed resampling improves SSL robustness to spurious correlations
    status: BUILD_ON
    evidence: Verified by arxiv_2311_16361 (Zhu et al., 2023). Discussion bridges this to geometry.
  - claim: GroupDRO achieves +10.9pp WGA but requires group labels
    status: BUILD_ON
    evidence: From Phase 0 validated infrastructure. Our hypothesis targets label-free alternative.
  scope_reduction_percentage: 0
  phase2b_4_instructions: All claims are BUILD_ON - Phase 2B should verify new mechanistic links (dynamics→geometry, clusterability→intervention
    efficacy), not re-prove established baselines.
core_statement:
  hypothesis_id: H-ClusterableSSL-v1
  confidence_level: 0.85
  core_hypothesis_statement: Under self-supervised learning on spurious correlation datasets (Waterbirds), if embedding geometry
    exhibits high subgroup clusterability (AMI ≥0.4), then cluster-balanced retraining improves worst-group accuracy by ≥2pp,
    because spurious features manifest as geometrically separable density modes that can be identified and reweighted without
    labels.
  alternative_hypothesis_h0: There is no significant difference in WGA improvement between models with AMI ≥0.4 vs AMI <0.3
    after cluster-balanced retraining (both yield <0.5pp gain).
variables:
  independent:
  - name: Embedding Clusterability (AMI)
    type: continuous
    operationalization: Adjusted Mutual Information between k-means clusters (k=4) on frozen SSL embeddings and true subgroup
      labels, measured post-hoc
    levels: null
  - name: SSL Training Method
    type: categorical
    operationalization: Standard SSL vs LA-SSL (learning-speed resampling)
    levels:
    - standard_ssl
    - la_ssl
  - name: Clusterability Penalty Strength (λ)
    type: continuous
    operationalization: 'Weight of AMI penalty term in SSL loss: L_SSL + λ * AMI(soft_clusters, background_proxy)'
    levels: null
  dependent:
  - name: Worst-Group Accuracy (WGA)
    type: continuous
    operationalization: Minimum accuracy across 4 Waterbirds subgroups (landbird/waterbird × land/water background), range
      [0, 100]%
    primary: true
  - name: WGA Improvement from Cluster-Balanced Retraining
    type: continuous
    operationalization: ΔWGA = WGA_after_cluster_retraining - WGA_baseline, measured in percentage points
    primary: false
  - name: Subgroup Linear Separability
    type: continuous
    operationalization: AUC of linear probe predicting subgroup labels from frozen embeddings
    primary: false
  controlled:
  - name: Model Architecture
    operationalization: 'Fixed per tier: ResNet-50, ViT-H-14. Test across architectures to isolate capacity confound.'
  - name: ERM Training Protocol
    operationalization: Grid search over LR [0.01, 0.001, 0.0001], weight decay [0.0001, 0.00001, 0.000001], 20 epochs, batch
      size 32 (per Mehta et al.)
  - name: Random Seed
    operationalization: ≥5 seeds per experiment, report 95% CI on all metrics
causal_mechanism:
  causal_chain_count: 3
  steps:
  - step: 1
    description: Standard SSL training with InfoNCE optimizes instance discrimination. Spurious features (backgrounds) create
      dense similarity structure because they are globally shared across samples, leading to high cluster coherence along
      spurious dimensions.
    evidence: InfoNCE loss pulls together augmentations of the same image while pushing apart different images. Shared backgrounds
      create persistent similarity signals. Discussed in Ex 12 (Prof. Pax).
    falsifier: If AMI between k-means clusters and subgroups is near zero (≈chance) in standard SSL embeddings, spurious features
      do not form geometric clusters.
  - step: 2
    description: High clusterability (AMI ≥0.4) indicates that minority groups occupy distinct density modes in embedding
      space. Linear ERM can exploit these for high WGA via boundary placement, but explicit cluster-based reweighting further
      improves minority representation.
    evidence: Mehta et al. achieve 90% WGA with linear ERM, but discussion (Ex 5, Prof. Pax) notes clusterability is stronger
      than linear separability. Tier 1 tests if high-AMI models gain ≥2pp from reweighting.
    falsifier: If cluster-balanced retraining yields no WGA gain beyond linear ERM baseline for high-AMI models, clusterability
      is diagnostic only, not causally useful.
  - step: 3
    description: LA-SSL's learning-speed resampling alters the empirical distribution of contrastive pairs, dispersing spurious
      density structure while preserving linear separability. This geometric reshaping explains LA-SSL's robustness gains.
    evidence: LA-SSL modifies sampling probabilities ∝h(s_i) where s_i = learning speed (Ex 12). InfoNCE stationary points
      are distribution-dependent, so geometry must change. Tier 2 tests AMI reduction.
    falsifier: If LA-SSL reduces AMI and subgroup linear separability equally, it suppresses spurious signal entirely rather
      than geometrically dispersing it.
  key_tension: 'Linear separability vs clusterability dissociation: Mehta et al. prove high-capacity embeddings are linearly
    separable (90% WGA), but clusterability (AMI) may be independent. If high-capacity models have low AMI despite high WGA,
    geometric clustering is not necessary—only linear boundaries matter.'
  evidence_summary: Tier 1 (diagnostic) validates AMI predicts retraining efficacy. Tier 2 (mechanistic) links LA-SSL to geometry.
    Tier 3 (interventional) tests explicit clusterability control.
key_assumptions:
- id: A1
  assumption: Spurious features (backgrounds) manifest as geometrically separable clusters in SSL embedding space
  supporting_evidence: Standard SSL trained with InfoNCE should create dense similarity regions for shared spurious features.
    Testable via AMI measurement.
  consequence_if_violated: If spurious features are entangled as smooth continuum (not discrete clusters), k-means will fail
    and AMI ≈0. Hypothesis predicts AMI >0.4 for standard SSL.
- id: A2
  assumption: Clusterability (AMI) is dissociable from linear separability—i.e., a model can have low AMI but high subgroup
    linear probe accuracy
  supporting_evidence: High-capacity models (ViT-H-14) may disperse spurious features across dimensions while maintaining
    linear decision boundaries. Tier 1 controls test this.
  consequence_if_violated: If AMI and linear separability are perfectly correlated, clusterability adds no independent information
    beyond what linear probe reveals.
- id: A3
  assumption: Differentiable AMI surrogate (soft clustering + MI estimator) approximates true k-means AMI sufficiently for
    gradient-based training
  supporting_evidence: Sinkhorn-Knopp (SwAV) and soft assignments are established techniques. Prof. Pax verified mathematical
    feasibility (Ex 12).
  consequence_if_violated: Tier 3's explicit clusterability penalty may fail if soft clustering misses sharp density boundaries
    that k-means captures.
- id: A4
  assumption: Core features (bird type) and spurious features (background) occupy partially orthogonal subspaces in embedding
    space
  supporting_evidence: If fully entangled, no geometric penalty can separate them. LA-SSL's success suggests separability
    exists. Tier 3 monitors core task accuracy.
  consequence_if_violated: Geometric fairness penalty may degrade core performance alongside spurious suppression. Detectable
    via λ sweep monitoring.
- id: A5
  assumption: Waterbirds' 4-group structure (2 bird types × 2 backgrounds) is representative of spurious correlation geometry
    in other domains
  supporting_evidence: Waterbirds is standard benchmark. Discussion notes CelebA, CivilComments as future tests (Ex 1, Dr.
    Nova).
  consequence_if_violated: Findings may not generalize to datasets with more complex or hierarchical spurious structure. Phase
    2B should plan multi-dataset validation.
scope:
  applies_to: 'Self-supervised learning on vision datasets with known spurious correlations (Waterbirds, CelebA). Models:
    ResNet-50, ViT-H-14, other SimCLR/MoCo-compatible architectures. Evaluation: worst-group accuracy metrics.'
  does_not_apply_to: Language models (different embedding geometry), supervised learning (labels change training dynamics),
    datasets without clear minority groups (clustering assumption fails).
  known_limitations: Tier 1-2 are post-hoc diagnostics (not training interventions). Tier 3's differentiable AMI may approximate
    poorly. Cross-domain generalization (vision → NLP) not addressed. High-capacity models may already be at WGA ceiling (90%+),
    limiting intervention headroom.
predictions:
- id: P1
  primary: true
  statement: For models with AMI ≥0.4, cluster-balanced retraining improves WGA by ≥2pp. For AMI <0.3, improvement is <0.5pp.
  test_method: Train frozen SSL embeddings + linear ERM baseline. Cluster embeddings (k=4), reweight training to balance cluster
    membership. Measure ΔWGA.
  success_criterion: ≥5 seeds, 95% CI excludes zero for AMI ≥0.4 group. AMI diagnostic AUROC >0.80 vs simpler baselines (loss
    variance, skewness).
  falsification: If even one AMI <0.3 model gains ≥2pp, or one AMI ≥0.4 model gains <0.5pp, threshold is invalid.
- id: P2
  primary: false
  statement: LA-SSL reduces AMI by ≥30% compared to standard SSL while maintaining subgroup linear separability (ΔAUC <0.05).
  test_method: Train standard SSL and LA-SSL encoders. Freeze both. Train identical linear classifiers (Mehta et al. protocol).
    Measure AMI and subgroup linear probe AUC.
  success_criterion: AMI(standard) - AMI(LA-SSL) ≥ 30% of AMI(standard). Linear separability AUC differs by <0.05. Proves
    geometry change without signal loss.
  falsification: If AMI and linear AUC both drop ≥30%, LA-SSL suppresses signal entirely. If neither drops, robustness is
    downstream, not geometric.
- id: P3
  primary: false
  statement: SSL trained with clusterability penalty (λ>0) achieves ResNet-50 WGA ≥90% by suppressing spurious clusterability.
  test_method: Train SSL with L_SSL + λ * AMI(soft_clusters, background_proxy). Sweep λ ∈ [-0.5, 0, 0.1, 0.5, 1.0, 2.0]. Measure
    resulting AMI and WGA.
  success_criterion: At some λ*>0, ResNet-50 reaches WGA ≥90% (matching ViT-H-14 baseline). Reversed penalty (λ<0) degrades
    WGA, confirming causality.
  falsification: If no λ yields WGA >88.5% (baseline), or λ<0 doesn't degrade WGA, clusterability penalty is ineffective.
experimental_setup:
  dataset:
    name: Waterbirds
    type: standard
    source: GroupDRO benchmark (4,795 train, 1,199 val, 5,794 test images)
    path: From validated Phase 0 infrastructure
    hypothesis_fit: 4-group structure (landbird/waterbird × land/water background) provides ground truth for AMI evaluation.
      Standard spurious correlation benchmark with known minority groups.
  model:
    name: SimCLR (ResNet-50 backbone), LA-SSL (ResNet-50)
    type: Self-supervised contrastive learning
    source: sthalles/SimCLR (2480 stars) + LA-SSL implementation from arxiv_2311_16361
    hypothesis_fit: SimCLR tested in Mehta et al., enabling direct comparison. LA-SSL provides learning-speed intervention
      for Tier 2 geometry test.
  baselines:
  - name: Frozen ViT-H-14 + Linear ERM
    method: 'Mehta et al. protocol: extract embeddings, train linear head with grid search, 20 epochs. Target: 90.13% WGA.'
  - name: GroupDRO
    method: 'Validated from Phase 0: +10.9pp WGA with group labels. Upper bound for label-free methods.'
  - name: Simple Diagnostics (loss variance, skewness)
    method: Compute per-class training loss variance and skewness after 5 epochs. Compare AUROC against AMI for predicting
      retraining gains.
novelty:
  preserved_novelty: First work to (1) dissociate linear separability from geometric clusterability in SSL embeddings, (2)
    link LA-SSL's learning-speed intervention to geometric topology changes, (3) propose explicit clusterability penalty as
    SSL training objective.
  key_innovation: Clusterability (AMI) as both diagnostic tool (predicts fairness intervention efficacy) and training objective
    (controllable via λ penalty). Bridges dynamics (LA-SSL) to static geometry (clustering).
  differentiation:
  - prior_work: 'Mehta et al. (2022): 90% WGA via frozen embeddings + linear ERM'
    difference: We explain WHY this works (dissociate linear vs cluster geometry) and provide diagnostic to predict when interventions
      help.
  - prior_work: 'LA-SSL (Zhu et al., 2023): Learning-speed resampling improves robustness'
    difference: We test if LA-SSL reshapes embedding geometry (AMI reduction) and propose explicit geometric alternative (λ
      penalty).
  - prior_work: 'JTT, LfF, SSA: Two-stage methods for minority discovery'
    difference: We use geometric clustering on frozen embeddings (no retraining needed for discovery), and validate when clustering-based
      interventions outperform baselines.
feasibility:
  technical_barriers:
  - barrier: AMI depends on k-means (non-differentiable hard assignments)
    mitigation: 'Use differentiable surrogate: soft clustering (Sinkhorn-Knopp from SwAV) + mutual information neural estimator.
      Prof. Pax validated mathematical feasibility (Ex 12).'
  - barrier: High-capacity models may already be at WGA ceiling (90%+), limiting intervention headroom
    mitigation: Tier 1 tests mid-capacity models (ResNet-50 at 88.5% baseline) where improvement space exists. Tier 3 targets
      ResNet-50 → 90% via λ penalty.
  - barrier: Core and spurious features may be intrinsically entangled in same subspace
    mitigation: Tier 3 monitors core task accuracy throughout λ sweep. If core performance degrades, entanglement detected
      early.
  infrastructure_readiness: 'Phase 0 validated: WaterbirdsDataset, ResNet-50, GroupDRO baseline (+10.9pp), evaluation framework
    (compute_wga, statistical testing). SimCLR implementation available (sthalles/SimCLR 2480 stars).'
  resource_requirements: GPU training for SSL (standard), k-means clustering (CPU, fast), linear ERM (minimal). No multi-week
    protocols or human annotation required.
  timeline_estimate: 'Tier 1 (diagnostic): 1-2 weeks. Tier 2 (LA-SSL geometry): 2-3 weeks. Tier 3 (interventional): 3-4 weeks.
    Total: 6-9 weeks assuming single GPU.'
risks:
- risk_id: R1
  description: Differentiable AMI surrogate may not approximate k-means AMI sufficiently
  probability: Medium
  impact: High for Tier 3 only
  mitigation: 'Validate soft clustering AMI vs k-means AMI correlation on Waterbirds embeddings before full Tier 3 training.
    Fallback: Tier 1-2 remain valid.'
- risk_id: R2
  description: High-AMI models may not improve from cluster-balanced retraining (P1 falsified)
  probability: Medium
  impact: Medium (invalidates diagnostic, but mechanistic insights remain)
  mitigation: Tier 1 designed to fail gracefully—negative result is publishable (clustering ornamental). Tier 2 still links
    LA-SSL to geometry.
- risk_id: R3
  description: LA-SSL may reduce both AMI and linear separability equally (P2 falsified)
  probability: Low
  impact: Low (still scientifically interesting—LA-SSL suppresses signal vs disperses geometry)
  mitigation: 'Outcome space covers 3 scenarios: geometry changes (supports hypothesis), signal suppresses (alternative theory),
    neither (robustness downstream). All informative.'
