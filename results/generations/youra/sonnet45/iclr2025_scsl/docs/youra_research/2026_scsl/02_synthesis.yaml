synthesis_statement:
  title: Clusterability as a Geometric Fairness Diagnostic and Training Objective for Self-Supervised Learning
  one_sentence_summary: Spurious correlations in SSL embeddings manifest as measurable geometric clusterability (AMI), which
    diagnoses fairness intervention efficacy and can be explicitly controlled during training to improve robustness without
    group labels.
  detailed_synthesis: 'The discussion converged on a three-tier hypothesis bridging geometric structure, learning dynamics,
    and fairness in self-supervised learning:


    **Tier 1 (Diagnostic):** Frozen SSL embeddings encode spurious correlations as geometric clusters. Measuring clusterability
    via Adjusted Mutual Information (AMI) between k-means clusters and true subgroups predicts which models benefit from cluster-balanced
    retraining. Models with AMI ≥0.4 improve WGA by ≥2pp, while AMI <0.3 yields <0.5pp gain. This provides label-free diagnostic
    for fairness intervention selection.


    **Tier 2 (Mechanistic):** LA-SSL''s learning-speed resampling reshapes embedding geometry—reducing AMI by ≥30% while maintaining
    subgroup linear separability. This links optimization dynamics (learning speed) to static representation topology, explaining
    why sampling interventions improve robustness.


    **Tier 3 (Interventional):** Explicit clusterability penalty during SSL training (L_SSL + λ * AMI) enables controllable
    spurious structure suppression. Target: ResNet-50 achieves 90%+ WGA (matching ViT-H-14 baseline) via geometric fairness
    objective, with reversed penalty (λ<0) degrading WGA to establish causality.


    The hypothesis dissociates linear separability (Mehta et al.''s 90% WGA via linear ERM) from geometric clusterability—showing
    these are independent axes. It explains established phenomena (LA-SSL, frozen embeddings) while proposing novel training
    objective (first SSL with explicit geometric fairness penalty).'
key_mechanisms:
- mechanism_id: M1
  name: Spurious Feature Clustering in Standard SSL
  description: InfoNCE contrastive loss pulls together augmentations of same image while pushing apart different images. Shared
    spurious features (backgrounds) create persistent similarity signals, leading to dense cluster structure along spurious
    dimensions (high AMI).
  supporting_personas:
  - Prof. Pax (Ex 12)
  - Dr. Ally (Ex 6)
- mechanism_id: M2
  name: Clusterability as Intervention Efficacy Predictor
  description: High AMI indicates minority groups occupy distinct density modes. Linear ERM can exploit these via boundary
    placement (Mehta et al. 90% WGA), but explicit cluster-based reweighting further improves minority representation by redistributing
    training emphasis.
  supporting_personas:
  - Prof. Vera (Ex 2, 8)
  - Dr. Ally (Ex 6)
- mechanism_id: M3
  name: LA-SSL Geometric Topology Reshaping
  description: Learning-speed resampling (π_i ∝ h(s_i)) alters empirical distribution of contrastive pairs. Since InfoNCE
    stationary points are distribution-dependent, sampling changes disperse spurious density structure while preserving linear
    separability—reducing AMI without eliminating discriminative information.
  supporting_personas:
  - Dr. Sage (Ex 4)
  - Prof. Pax (Ex 12)
research_gap_addressed:
  gap_id: gap-1
  gap_title: SSL Embeddings for Spurious Correlation Structure Discovery
  how_addressed: Directly tests whether frozen SSL embeddings form geometric clusters aligned with spurious groups (Gap 1
    primary question). Integrates SSL embeddings with two-stage training via clustering-guided rebalancing (Gap 2). Provides
    clusterability evaluation framework (AMI diagnostic) for fairness context (Gap 3).
convergence_justification:
  specific: Three-tier hypothesis with quantitative thresholds (AMI ≥0.4 → ≥2pp WGA, 30% AMI reduction, λ sweep range)
  mechanism: 'Causal chain: standard SSL creates spurious clusters → high AMI predicts retraining efficacy → LA-SSL disperses
    geometry → explicit λ penalty controls clusterability'
  predictions: P1 (AMI diagnostic), P2 (LA-SSL geometry), P3 (explicit penalty efficacy) all falsifiable with pre-registered
    criteria
  novelty: First dissociation of linear separability from clusterability, first LA-SSL→geometry link, first SSL with geometric
    fairness objective
  feasibility: Tiers 1-2 executable with validated infrastructure. Tier 3 requires differentiable AMI surrogate (soft clustering
    + MI estimator) - mathematically sound per Prof. Pax
  objections: 'All major concerns addressed: capacity confounds controlled (match WGA, test both AMI and linear separability),
    baselines included (loss variance), fallback strategies (Tier 1-2 valid even if Tier 3 fails)'
