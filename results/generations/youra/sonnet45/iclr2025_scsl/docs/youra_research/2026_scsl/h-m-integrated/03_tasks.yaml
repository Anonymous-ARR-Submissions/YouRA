    description: Find optimal (lr, wd, seed) on validation WGA
    priority: 63
    estimated_duration: 1 hour
  - id: M-6-3
    title: Cluster Weight Computation
    description: Compute inverse cluster frequency weights
    priority: 62
    estimated_duration: 1 hour
  - id: M-6-4
    title: Cluster-Balanced Retraining
    description: Retrain linear classifier with cluster-weighted loss
    priority: 61
    estimated_duration: 1 hour
  - id: M-6-5
    title: ΔWGA Computation
    description: Calculate improvement WGA_cluster - WGA_baseline
    priority: 60
    estimated_duration: 1 hour
  - id: M-6-6
    title: Cross-Checkpoint Analysis
    description: Apply linear probe + retraining to all 10 SimCLR checkpoints
    priority: 59
    estimated_duration: 1 hour
