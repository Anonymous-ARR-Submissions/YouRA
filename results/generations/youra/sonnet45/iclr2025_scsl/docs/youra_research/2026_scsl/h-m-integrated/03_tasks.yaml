epic_tasks:
- id: M-1
  title: LA-SSL Sampler Implementation
  description: Implement learning-speed aware sampler for LA-SSL training
  type: epic
  priority: 90
  complexity: 11
  complexity_breakdown:
    module_size: 3
    dependencies: 1
    algorithm: 4
    integration: 3
  estimated_duration: 6 hours
  dependencies:
  - E-1
  acceptance_criteria:
  - LASSLSampler class extends torch.utils.data.Sampler
  - Loss history tracked with rolling window (size=10 epochs)
  - Sampling probabilities computed inversely proportional to learning speed
  - Unit tests pass for probability computation
  deliverables:
  - code/models/__init__.py
  - code/models/lassl_sampler.py
  subtasks:
  - id: M-1-1
    title: LASSLSampler Class Skeleton
    description: Implement torch.utils.data.Sampler with per-sample loss tracking
    priority: 89
    estimated_duration: 2 hours
  - id: M-1-2
    title: Loss History Tracking
    description: Maintain rolling window of losses, compute learning speed delta
    priority: 88
    estimated_duration: 2 hours
  - id: M-1-3
    title: Probability Computation
    description: Inverse weighting p_i ∝ (learning_speed_i)^(-alpha)
    priority: 87
    estimated_duration: 2 hours
- id: M-2
  title: LA-SSL Training Infrastructure
  description: Extend h-e1 SSLTrainer with sampler integration
  type: epic
  priority: 85
  complexity: 9
  complexity_breakdown:
    module_size: 2
    dependencies: 2
    algorithm: 2
    integration: 3
  estimated_duration: 6 hours
  dependencies:
  - M-1
  acceptance_criteria:
  - LASSLTrainer class integrates LASSLSampler
  - Per-batch loss callback updates sampler
  - Checkpoints saved every 10 epochs (aligned with SimCLR)
  - Training loop compatible with h-e1 SimCLR model
  deliverables:
  - code/training/__init__.py
  - code/training/lassl_trainer.py
  subtasks:
  - id: M-2-1
    title: LASSLTrainer Class
    description: Extend/wrap h-e1 SSLTrainer with sampler integration
    priority: 84
    estimated_duration: 2 hours
  - id: M-2-2
