- id: M-6
  title: Linear Probe & Cluster Retraining
  description: Grid search baseline and cluster-balanced retraining
  type: epic
  priority: 65
  complexity: 12
  complexity_breakdown:
    module_size: 3
    dependencies: 2
    algorithm: 4
    integration: 3
  estimated_duration: 6 hours
  dependencies:
  - M-5
  acceptance_criteria:
  - Linear probe grid search (LR × WD × seed)
  - Baseline WGA computed for all 4 groups
  - Cluster-balanced weights computed from k-means assignments
  - Retraining with cluster-weighted loss
  - ΔWGA = (intervention WGA - baseline WGA) computed
  - Applied to all checkpoints (SimCLR and LA-SSL)
