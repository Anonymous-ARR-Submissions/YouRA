  - Cross-architecture consensus idea for robust minority discovery
  - 'Tier 3 interventional angle: clusterability as controllable training hyperparameter'
- icon: 🔬
  name: Prof. Vera
  title: Rigorous Validation Architect
  verdict: STRONG
  assessment: All three tiers have pre-registered quantitative thresholds (AMI ≥0.4 → ≥2pp WGA, 30% AMI reduction, AUROC >0.80),
    seed-averaged 95% CIs, and baseline comparisons. The protocol isolates confounds (geometry vs boundary, capacity vs clusterability)
    through controlled experiments. Every prediction can be falsified.
  key_contributions:
  - Formalized H1/H2 with explicit AMI thresholds and falsification criteria
  - 'Demanded controls: subgroup linear separability, simple baseline comparisons, seed averaging'
