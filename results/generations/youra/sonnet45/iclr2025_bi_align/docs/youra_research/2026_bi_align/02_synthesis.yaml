hypothesis_draft:
  title: "Linguistic Agency Markers as Computational Proxies for Bidirectional Alignment Evaluation"
  hypothesis_id: "H-AgencyRLHF-v1"
  core_claim: |
    RLHF-chosen responses will exhibit systematically lower frequencies of linguistic agency markers
    (modal verbs, hedging, alternative-framing) compared to rejected responses, providing first
    computational operationalization of human agency preservation in alignment evaluation.
  mechanism: |
    RLHF optimizes for efficient task resolution → annotators prefer directness → directness minimizes
    option presentation → fewer options manifest as reduced modal verbs, hedging, and alternative-framing
    linguistic markers in chosen responses.
  predictions:
    - "P1: Modal verb frequency: chosen < rejected, d ≥ 0.15, p < 0.05"
    - "P2: Internal consistency across markers: Cronbach's α > 0.7"
    - "P3: Cross-split replication in 2/3 HH-RLHF splits"

variables_summary:
  independent: "RLHF preference status (chosen vs rejected, categorical binary)"
  dependent_primary: "Modal verb frequency per 100 words (continuous)"
  controlled: "Response length, conversation turn, topic category (HH-RLHF split)"

null_hypothesis:
  h0_statement: |
    No systematic difference in linguistic agency marker frequencies between RLHF-chosen and
    RLHF-rejected responses when controlling for length, turn, and topic.
  statistical_test: "Paired t-test with partial correlation controls"
  significance_level: 0.05

