# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════
core_statement:
  hypothesis_id: "H-AgencyRLHF-v1"
  confidence_level: 0.75
  core_hypothesis_statement: |
    Under RLHF evaluation conditions (HH-RLHF dataset with 161K human preference pairs),
    if computational linguistic markers operationalizing human agency preservation (modal verbs,
    hedging language, alternative-framing phrases) are extracted from chosen vs rejected responses,
    then these markers will demonstrate (1) sufficient distributional variance (CV > 0.3),
    (2) systematic directional association with RLHF preference status (paired t-test p < 0.05,
    Cohen's d ≥ 0.15), (3) internal consistency as a construct (Cronbach's α > 0.7), and
    (4) cross-dataset replication across at least 2 of 3 HH-RLHF splits, because RLHF optimization
    prioritizes efficient task resolution over option presentation, reducing autonomy-preserving
    linguistic features in chosen responses.
  alternative_hypothesis_h0: |
    There is no systematic difference in linguistic agency marker frequencies (modal verbs,
    hedging, alternative-framing) between RLHF-chosen and RLHF-rejected responses when controlling
    for response length, conversation turn, and topic category.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════
variables:
  independent:
    - name: "RLHF_preference_status"
      type: "categorical"
      operationalization: "Binary indicator (chosen=1, rejected=0) from HH-RLHF preference annotations"
      levels: ["chosen", "rejected"]
  dependent:
    - name: "modal_verb_frequency"
      type: "continuous"
      operationalization: "Count of modal verbs (could, might, should, may, would) per 100 words, extracted via spaCy POS tagging"
      primary: true
    - name: "hedging_marker_frequency"
      type: "continuous"
      operationalization: "Count of hedging phrases (appears, seems, possibly, perhaps, might, likely) per 100 words, NLTK lexicon matching"
      primary: false
    - name: "alternative_framing_frequency"
      type: "continuous"
      operationalization: "Count of alternative-presenting phrases ('on the other hand', 'alternatively', 'another option', 'you could also') per 100 words, regex pattern matching"
      primary: false
  controlled:
    - name: "response_length"
      operationalization: "Total word count per response, control via length normalization (per 100 words) and partial correlation"
    - name: "conversation_turn"
      operationalization: "Turn index in conversation (1 to N), control via partial correlation"
    - name: "topic_category"
      operationalization: "HH-RLHF data split (helpful-base, helpful-online, helpful-rejection-sampled), control via stratified analysis"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════
causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "RLHF optimizes AI responses for human annotator preferences via reward model trained on chosen vs rejected comparisons"
      evidence: "Standard RLHF methodology (Anthropic 2022), reward model learns preference function from pairwise comparisons"
      falsifier: "If RLHF preference annotations are random or inconsistent, mechanism breaks down"
    - step: 2
      description: "Human annotators prefer responses that resolve queries efficiently and directly (task completion priority)"
      evidence: "Implicit in HH-RLHF annotation guidelines (helpfulness criterion), behavioral economics literature on cognitive economy (Kahneman 2011)"
      falsifier: "If annotators systematically prefer responses with more uncertainty/alternatives, direction reverses"
    - step: 3
      description: "Efficient task resolution prioritizes directness over option presentation, minimizing uncertainty expressions and alternative framings"
      evidence: "Shapira et al. 2026 sycophancy mechanism (RLHF → reduced disagreement/alternatives), choice architecture literature (Thaler & Sunstein)"
      falsifier: "If efficiency and option-presentation are uncorrelated, this step fails"
    - step: 4
      description: "Reduced option presentation manifests linguistically as fewer modal verbs (fewer 'could' options), less hedging (fewer 'might' qualifiers), fewer alternative-framing phrases"
      evidence: "Juanchich 2017 (modal verbs indicate autonomy), Biber et al. 1999 (hedging marks epistemic stance), HCI literature on user control (Norman)"
      falsifier: "If linguistic markers don't correspond to option presentation, proxy validity fails"
  key_tension: "Step 4 (linguistic markers → agency) rests on proxy validity assumption - this is what construct validation tests empirically"
  evidence_summary: |
    Causal chain integrates: (1) RLHF optimization theory, (2) cognitive economy from behavioral economics,
    (3) sycophancy mechanism from recent alignment research, (4) linguistic marker validity from psychology/HCI.
    Each step grounded in prior literature, but full chain application to RLHF evaluation is novel.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════
key_assumptions:
  - id: "A1"
    assumption: "Linguistic markers in AI responses correlate with human agency preservation (proxy validity)"
    supporting_evidence: "Juanchich 2017 (modal verbs/pronouns indicate autonomy attribution), Biber et al. 1999 (hedging marks epistemic stance), behavioral economics choice architecture literature"
    consequence_if_violated: "Markers measure something else (e.g., response quality, politeness) - construct validation checks test this"
  - id: "A2"
    assumption: "HH-RLHF annotations reflect genuine human preferences, not annotation artifacts"
    supporting_evidence: "Anthropic 2022 dataset paper, peer-reviewed methodology, widely used in RLHF research"
    consequence_if_violated: "Results don't generalize beyond HH-RLHF dataset - acknowledged limitation"
  - id: "A3"
    assumption: "Preference pair structure controls for content (matched-pair design validity)"
    supporting_evidence: "Same conversation context, only differ in chosen/rejected status - standard experimental design"
    consequence_if_violated: "Confounds from topic/context differences - mitigated by within-pair comparison"
  - id: "A4"
    assumption: "Statistical power sufficient for small effects (N=161K ensures power > 0.99 for d=0.15)"
    supporting_evidence: "Power analysis: N=161K pairs, paired design, effect size d=0.15, α=0.05 → power > 0.99"
    consequence_if_violated: "False negatives unlikely given massive sample size"
  - id: "A5"
    assumption: "English linguistic patterns generalize across HH-RLHF conversation types (helpful-base, online, RS)"
    supporting_evidence: "All three splits use same language (English), same domain (helpfulness), same annotation protocol"
    consequence_if_violated: "Results limited to specific RLHF training procedure - cross-validation tests this"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════
scope:
  applies_to: |
    - English conversational AI systems trained via RLHF
    - Preference datasets with paired chosen/rejected responses
    - Helpfulness-oriented alignment objectives
    - Text-based interactions (not multimodal)
  does_not_apply_to: |
    - Multilingual settings (linguistic patterns language-specific)
    - Non-conversational tasks (e.g., summarization, translation)
    - Non-RLHF alignment methods (DPO, RLAIF, Constitutional AI - separate studies needed)
    - Real-time deployment interactions (HH-RLHF is retrospective annotation)
  known_limitations: |
    1. Proxy validity assumption (markers → agency) inferred, not directly tested with user studies
    2. HH-RLHF-specific (generalization to other datasets unknown)
    3. English-only (cross-lingual generalization untested)
    4. No user-level metadata (can't test individual difference moderators)
    5. Retrospective annotations (may differ from real deployment preferences)

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════
predictions:
  - id: "P1"
    primary: true
    statement: "Modal verb frequency (could/might/should per 100 words) will be lower in RLHF-chosen responses compared to rejected responses"
    test_method: "Paired t-test on 161K preference pairs, length-normalized modal counts"
    success_criterion: "p < 0.05, Cohen's d ≥ 0.15 (small effect size), direction: chosen < rejected"
    falsification: "If p > 0.05 OR d < 0.15 OR direction reversed (chosen > rejected), P1 fails"
  - id: "P2"
    primary: false
    statement: "All three marker types (modal verbs, hedging, alternative-framing) show consistent directional pattern (internal consistency as construct)"
    test_method: "Cronbach's alpha across three marker frequencies"
    success_criterion: "α > 0.7 (acceptable internal consistency), all markers negatively correlated with chosen status"
    falsification: "If α < 0.7 OR markers show inconsistent directions, construct validity questionable"
  - id: "P3"
    primary: false
    statement: "P1 effect (modal verb reduction) replicates across at least 2 of 3 HH-RLHF data splits"
    test_method: "Separate paired t-tests for helpful-base, helpful-online, helpful-rejection-sampled"
    success_criterion: "p < 0.05 and d ≥ 0.15 in at least 2 of 3 splits"
    falsification: "If effect holds in only 1 split or 0 splits, generalization fails"

