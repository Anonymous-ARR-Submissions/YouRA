# Subtasks (from 03_logic.md and 03_config.md)
subtasks:
  - id: L-1-1
    parent_epic: A-1
    title: Load HH-RLHF Splits
    description: HuggingFace load_dataset for 3 splits (helpful-base, helpful-online, helpful-RS)
    type: subtask
    complexity_contribution: 2
    priority: 1
    dependencies: []
    reference_files:
      - 03_logic.md
      - 03_config.md
    implementation_notes: |
      from datasets import load_dataset
      dataset_base = load_dataset("Anthropic/hh-rlhf", split="train")
      dataset_online = load_dataset("Anthropic/hh-rlhf", split="test")

  - id: L-1-2
    parent_epic: A-1
    title: Text Preprocessing
    description: Remove special tokens (Human:, Assistant:), compute word counts
    type: subtask
    complexity_contribution: 1
    priority: 2
    dependencies:
      - L-1-1
    reference_files:
      - 03_logic.md
    implementation_notes: |
      def preprocess_text(text: str) -> str:
          # Remove "Human:" and "Assistant:" tokens
          return text.replace("Human:", "").replace("Assistant:", "")

  - id: L-2-1
    parent_epic: A-2
    title: spaCy Integration & Modal Verb Extraction
    description: Load spaCy model, implement POS tagging for modal verbs (MD tag)
    type: subtask
    complexity_contribution: 3
    priority: 3
    dependencies:
      - L-1-2
    reference_files:
      - 03_logic.md
      - 03_config.md
    implementation_notes: |
      import spacy
      nlp = spacy.load("en_core_web_sm")
      modal_verbs = [token for token in doc if token.tag_ == 'MD']

  - id: L-2-2
    parent_epic: A-2
    title: Hedging & Alternative-Framing Extraction
    description: Define hedging marker lexicon (15+ terms) and regex patterns (5+ patterns)
    type: subtask
    complexity_contribution: 2
    priority: 4
    dependencies:
      - L-1-2
    reference_files:
      - 03_logic.md
      - 03_config.md
    implementation_notes: |
      HEDGING_MARKERS = {'perhaps', 'maybe', 'might', 'could', 'possibly', ...}
      ALT_PATTERNS = [r'\byou (could|might|may)\b', ...]

  - id: C-3-1
    parent_epic: A-3
    title: CV Computation & Gate Evaluation
    description: Compute mean, SD, CV for all markers; evaluate gate condition (CV > 0.3)
    type: subtask
    complexity_contribution: 2
    priority: 5
    dependencies:
      - L-2-1
      - L-2-2
    reference_files:
      - 03_logic.md
      - 03_config.md
    implementation_notes: |
      cv = np.std(features) / np.mean(features)
      gate_passed = cv > 0.3

  - id: C-3-2
    parent_epic: A-3
    title: Cross-Split Validation
    description: Compute statistics separately for each of 3 splits, verify consistency
    type: subtask
    complexity_contribution: 2
    priority: 6
    dependencies:
      - C-3-1
    reference_files:
      - 03_logic.md
    implementation_notes: |
      for split_name, split_data in splits.items():
          stats = compute_statistics(split_data)

