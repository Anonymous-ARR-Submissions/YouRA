acknowledged_limitations:
  - limitation_id: "L1"
    statement: "Results limited to HH-RLHF dataset (English, helpfulness-oriented, single alignment method)"
    source_section: "Discussion - Limitations"
    mitigation: "Replication with diverse RLHF datasets, multilingual, alternative methods (DPO, Constitutional AI)"
    acceptability: "HH-RLHF is standard benchmark; negative result prevents wasted effort even if dataset-specific"

  - limitation_id: "L2"
    statement: "Tested three marker types only (modal verbs, hedging, alternatives); alternative features untested"
    source_section: "Discussion - Proxy Selection"
    mitigation: "Alternative linguistic proxies (active/passive voice, parse tree depth) require same validation protocol"
    acceptability: "Tested theory-grounded markers first (strongest foundation); negative result establishes validation necessity"

  - limitation_id: "L3"
    statement: "Aggregate response-level analysis may mask context-dependent patterns"
    source_section: "Discussion - Aggregate Analysis"
    mitigation: "Stratified analysis by conversation type, turn number, topic domain"
    acceptability: "Maximized statistical power (N=169K) for high-powered refutation; context-stratification would reduce power"

  - limitation_id: "L4"
    statement: "Indirect mechanism testing (end-to-end) without measuring intermediate causal steps"
    source_section: "Discussion - Indirect Mechanism Testing"
    mitigation: "Stepwise validation studies measuring annotator efficiency preferences, directness ratings independently"
    acceptability: "End-to-end test provides practical guidance (don't deploy markers) without prerequisite stepwise studies"

