methodological_claims:
  - claim_id: "M1"
    statement: "Two-stage validation (H-E1 feasibility → H-M construct validity) separates measurement from construct failure"
    source_section: "Methodology - Validation Design Rationale"
    justification: "Prevents confounding extraction failure with proxy invalidity"
    confidence: "HIGH"

  - claim_id: "M2"
    statement: "Effect size threshold (d≥0.15) required because massive sample (N=169K) makes p-values uninformative"
    source_section: "Methodology - Why Thresholds Beyond p-values"
    justification: "Statistical power paradox - trivial effects achieve p<0.001 with N>100K"
    confidence: "HIGH"

  - claim_id: "M3"
    statement: "Matched-pair design controls content confounds (same conversation context, only preference status differs)"
    source_section: "Methodology - Dataset HH-RLHF"
    justification: "Paired comparison eliminates topic/context confounds"
    confidence: "HIGH"

  - claim_id: "M4"
    statement: "Length normalization (per 100 words) controls for response length confound"
    source_section: "Methodology - Linguistic Marker Operationalization"
    justification: "Longer responses mechanically contain more modals"
    confidence: "HIGH"

