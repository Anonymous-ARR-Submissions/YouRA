# POTENTIAL ATTACK VECTORS (For Phase 6.5 Adversarial Review)
# ═══════════════════════════════════════════════════════════════════════════════

potential_vulnerabilities:
  - vector: "Threshold Selection Justification"
    question: "Why d≥0.15 threshold? Is it arbitrary or grounded?"
    defense: "Cohen (1988) small-to-medium effect, practical significance for deployment decisions; preregistered threshold"

  - vector: "Alternative Marker Selection"
    question: "Why not test other linguistic features (active/passive voice, sentence complexity) in same study?"
    defense: "Tested theory-grounded markers first (Juanchich 2017); negative result establishes validation necessity for ANY markers"

  - vector: "HH-RLHF Dataset Generalization"
    question: "Results may be dataset-specific, not generalizable to other RLHF contexts"
    defense: "Acknowledged limitation; HH-RLHF is standard benchmark; negative result valuable even if dataset-specific"

  - vector: "User Study Ground Truth Absence"
    question: "Without direct agency ratings from users, how do we know markers SHOULD correlate?"
    defense: "This is precisely the contribution - demonstrating assumption failure requires empirical validation via user studies"

  - vector: "Statistical Power Excess"
    question: "With N=169K, even d=0.01 detectable - did you over-power the study?"
    defense: "Massive power is the point - demonstrates p-value uninformativeness; effect size thresholds essential"

