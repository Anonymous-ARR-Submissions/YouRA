# Validation Criteria
validation:
  gate_type: MUST_WORK
  primary_criteria:
    - metric: Cohen's d
      threshold: 0.15
      operator: ">="
      description: Effect size >= 0.15 (small-to-medium)
    - metric: p_value
      threshold: 0.05
      operator: "<"
      description: Statistical significance p < 0.05
    - metric: direction
      value: negative
      description: chosen < rejected (Cohen's d < 0)
  secondary_criteria:
    - metric: Cronbach's alpha
      threshold: 0.7
      operator: ">"
      description: Internal consistency α > 0.7
  tertiary_criteria:
    - metric: replication_count
      threshold: 2
      operator: ">="
      description: At least 2 of 3 splits pass primary criteria

# Implementation Notes
implementation_notes:
  - Reuse h-e1 validated extraction pipeline (100% precision, CV=0.781)
  - Use scipy.stats.ttest_rel for paired t-test
  - Cohen's d formula for paired samples: mean(diff) / std(diff)
  - Cronbach's alpha on difference scores (chosen - rejected)
  - Generate all 5 figures (gate_metrics.png MANDATORY)
  - Expected runtime: 2-3 hours for 161K pairs
  - CPU-only processing, no GPU required
