# PART 5: SECTION-LEVEL NARRATIVE GOALS
# ═══════════════════════════════════════════════════════════════════════════════

section_goals:
  abstract:
    narrative_purpose: "Compress the entire story into ~150 words—prioritize storytelling over numerical detail"
    key_message: "Linguistic agency markers from human psychology fail to measure agency in RLHF responses despite statistical significance—proxy validation essential."
    structure_notes: |
      Sentence 1-2: RLHF lacks agency metrics; we tested linguistic proxies from psychology
      Sentence 3: Hypothesis - modal verbs/hedging/alternatives measure agency preservation
      Sentence 4-5: Results - extraction feasible (CV=0.781) but proxy invalid (d=-0.018, α=0.42, no replication)
      Sentence 6: Contribution - first validation study, establishes proxy testing precedent, prevents invalid deployment
    avoid:
      - "Generic opening ('AI alignment is important')"
      - "Over-emphasizing null result negativity (frame as methodological contribution)"
      - "Too many numbers (save for Results section)"

  introduction:
    narrative_purpose: "Hook → Problem → Insight → Solution preview"
    hook_strategy: "practical_failure - RLHF optimizes AI→Human but lacks metrics for Human→AI (agency preservation) dimension"
    problem_escalation: |
      Level 1 (surface): RLHF evaluation focuses on helpfulness/harmlessness, ignoring user agency
      Level 2 (deeper): Shen 2024 identified bidirectional alignment gap, but no computational operationalization
      Level 3 (our gap): Linguistic markers exist (Juanchich 2017) but cross-domain validity to AI text untested
    insight_preview: "Proxy validity requires empirical validation—we test whether psychology-validated markers transfer to RLHF responses"
    contributions_framing: |
      Building on this insight, we make three contributions:
      (1) First systematic proxy validation study for RLHF agency measurement
      (2) Comprehensive refutation demonstrating cross-domain generalization failure
      (3) Methodological precedent establishing empirical validation requirements for alignment proxies
    transition_to_related_work: "Understanding why these markers fail requires examining both RLHF alignment mechanisms and linguistic psychology foundations..."

  related_work:
    narrative_purpose: "Show why existing work is insufficient → justify our approach"
    positioning_strategy: "Bridge two established domains (RLHF evaluation + linguistic psychology) in novel integration; emphasize missing validation step"
    key_comparison_points:
      - area: "RLHF Alignment Research"
        limitation_to_highlight: "Evaluation metrics focus on AI-side properties (helpfulness, harmlessness) with zero coverage of human-side effects (agency preservation)"
        how_we_differ: "First work to operationalize Human→AI alignment dimension via computational linguistic proxies"
      - area: "Linguistic Markers in Psychology"
        limitation_to_highlight: "Markers validated in human corpora (Juanchich 2017 modal verbs, Biber 1999 hedging) without testing transfer to AI-generated text"
        how_we_differ: "First empirical test of cross-domain validity (human language → AI language) for agency markers"
      - area: "Proxy Validation in NLP"
        limitation_to_highlight: "Sentiment analysis, quality metrics assume domain transfer; systematic validation rare"
        how_we_differ: "Comprehensive construct validation (effect size, internal consistency, replication) not just correlation testing"
    papers_to_discuss:
      - "Shapira et al. 2026 (RLHF sycophancy mechanism)"
      - "Shen et al. 2024 (bidirectional alignment framework)"
      - "Anthropic 2022 (HH-RLHF dataset)"
      - "Juanchich 2017 (modal verbs → autonomy attribution)"
      - "Biber 1999 (hedging → epistemic stance)"
      - "Ouyang 2022 (InstructGPT/RLHF methodology)"
    avoid:
      - "Unfair critique of prior work (Juanchich/Biber valid in their domain)"
      - "Missing obvious RLHF papers (Constitutional AI, DPO)"
      - "Not acknowledging Shen 2024 gap identification"

  methodology:
    narrative_purpose: "Explain WHY this design tests proxy validity claims"
    connection_to_insight: >
      To test whether psychology-validated markers transfer to RLHF contexts, we need:
      (1) marker extraction validation (H-E1), (2) construct validation (internal consistency),
      (3) effect size testing (practical significance), (4) replication (robustness).
    key_design_decisions:
      - decision: "Two-stage hypothesis structure (H-E1 existence → H-M-integrated mechanism)"
        rationale: "Separate measurement feasibility from proxy validity; H-E1 failure would invalidate H-M before testing mechanism"
        alternatives_considered: "Single-stage design risks confounding extraction failure with proxy invalidity"
      - decision: "Paired t-test with effect size thresholds (Cohen's d≥0.15), not just p-values"
        rationale: "Massive sample (N=169K) makes p<0.05 trivial; effect size ensures practical significance"
        alternatives_considered: "p-value only approach would mislead (observed: p<0.001 with d=-0.018)"
      - decision: "Cronbach's α for construct validation (α>0.7 threshold)"
        rationale: "Three markers should correlate if measuring unified agency construct; internal consistency test validates construct"
        alternatives_considered: "Factor analysis (more complex, same conclusion for construct unity)"
    intuition_building: |
      Think of this as validating a thermometer for measuring humidity:
      Stage 1 (H-E1): Does the tool produce readings? (Yes - CV=0.781, reliable extraction)
      Stage 2 (H-M): Do readings correlate with target construct? (No - d=-0.018, α=0.42, measuring wrong thing)
    technical_depth_balance: |
      Main paper: Effect sizes, Cronbach's α interpretation, replication analysis
      Appendix: Extraction algorithm details, statistical power analysis, sensitivity tests

  experiments:
    narrative_purpose: "Design experiments that test proxy validity via multiple convergent criteria"
    experimental_questions:
      - question: "Q1: Can linguistic markers be reliably extracted from RLHF data with sufficient variance?"
        experiment: "H-E1 - Extract modal verbs via spaCy POS tagging, compute CV, validate precision on 100-sample subset"
        expected_outcome: "CV>0.3, precision>90% (enables correlation testing in H-M)"
      - question: "Q2: Do linguistic markers systematically differ between chosen/rejected responses with meaningful effect?"
        experiment: "H-M - Paired t-test on 169K pairs, Cohen's d calculation, effect size vs threshold comparison"
        expected_outcome: "d≥0.15, p<0.05 if markers valid proxies"
      - question: "Q3: Do markers form unified agency construct?"
        experiment: "H-M - Cronbach's α across three marker types, inter-item correlation matrix"
        expected_outcome: "α>0.7 if markers measure same underlying construct"
      - question: "Q4: Does effect replicate across data splits?"
        experiment: "H-M - Separate paired t-tests for train/test splits, effect size comparison"
        expected_outcome: "≥2/2 splits pass d≥0.15 threshold if robust effect"
    baseline_rationale: "N/A (measurement validation study, not model comparison)"
    dataset_rationale: "HH-RLHF selected for (1) large sample (161K pairs, power>0.99 for d=0.15), (2) matched-pair structure (controls content confounds), (3) established validity (Anthropic 2022)"
    metric_rationale: "Effect size (Cohen's d) chosen over p-values due to massive sample; α>0.7 standard for construct validity (Cronbach 1951)"
    fairness_considerations: |
      Matched-pair design controls content confounds (same conversation, only differ in preference status).
      Length normalization (per 100 words) controls for response length confound.
      Cross-split validation tests robustness to data sampling variation.

  results:
    narrative_purpose: "Present evidence that comprehensively refutes proxy validity hypothesis"
    main_result_highlight: "H-M mechanism refuted: Cohen's d=-0.018 (88% below threshold) despite p<0.001—statistical vs practical significance divergence"
    result_presentation_order:
      - result: "H-E1 extraction validation (CV=0.781, precision=100%)"
        purpose: "Establish measurement feasibility BEFORE testing proxy validity—separates extraction success from construct failure"
      - result: "H-M effect size (d=-0.018 vs threshold 0.15)"
        purpose: "Show magnitude failure despite statistical significance—demonstrate power paradox"
      - result: "H-M internal consistency (α=0.42 vs threshold 0.7)"
        purpose: "Provide convergent evidence of construct invalidity—markers don't measure unified agency"
      - result: "H-M replication (0/2 splits passed)"
        purpose: "Show effect doesn't replicate—train split significance is sample size artifact"
    surprising_result_handling: "Correct direction (chosen < rejected) despite negligible magnitude suggests weak mechanism OR confounds; discuss competing explanations in Discussion"
    avoid:
      - "Hiding construct validity failure (α=0.42)"
      - "Over-emphasizing p<0.001 without effect size context"
      - "Not showing forest plot of split-level effects"

  discussion:
    narrative_purpose: "Interpret results, acknowledge limits, establish methodological contribution"
    key_findings_interpretation: >
      Comprehensive proxy invalidity: All four validation criteria failed (effect size, internal
      consistency, replication, practical significance). Markers extractable (H-E1 pass) but don't
      measure agency (H-M fail)—measurement vs construct separation critical. Statistical power
      paradox demonstrated: p<0.001 coexists with d=-0.018 at N=169K.
    honest_limitations:
      - limitation: "HH-RLHF dataset specificity (English, helpfulness-oriented, single alignment method)"
        why_acceptable: "Established dataset with peer-reviewed methodology; negative result prevents wasted effort even if HH-RLHF specific"
        future_mitigation: "Replication with diverse RLHF datasets (harmlessness, multilingual), alternative alignment methods (DPO, Constitutional AI)"
      - limitation: "Proxy validity assumption untested (Juanchich 2017 findings assumed to transfer)"
        why_acceptable: "This limitation IS the research contribution—demonstrating assumption failure establishes validation precedent"
        future_mitigation: "Direct user studies correlating linguistic markers with human-annotated agency perception"
      - limitation: "Aggregate analysis (response-level) may mask context-dependent patterns"
        why_acceptable: "Response-level analysis maximizes sample size (N=338K responses) for high-powered small-effect detection"
        future_mitigation: "Stratified analysis by conversation type (advisory vs factual), turn number, topic domain"
    broader_impact_statement: >
      Positive: Prevents deployment of invalid agency monitoring tools, establishes validation
      standards for alignment metrics, negative result saves research community effort.
      Negative: None identified (pure measurement validation study, no model deployment).

  conclusion:
    narrative_purpose: "Reinforce methodological contribution + open validated proxy development path"
    callback_to_hook: >
      We opened by noting RLHF lacks computational metrics for agency preservation (Human→AI
      alignment dimension). Our comprehensive validation study demonstrates that linguistic proxies
      from human psychology do not fill this gap without empirical validation—measurement feasibility
      (H-E1: markers extractable) does not guarantee construct validity (H-M: markers don't measure
      agency).
    memorable_ending: >
      Statistical significance is not proxy validity. As AI alignment research develops computational
      metrics for bidirectional alignment, our study establishes the precedent: cross-domain transfer
      requires empirical validation, not theoretical assumption.
    future_work_vision: >
      Direct path: User studies validating agency perception correlations with linguistic/behavioral
      features. Alternative proxies: Active/passive voice, sentence complexity, pragmatic markers
      beyond modal verbs. Broader validation: Replicate across alignment methods (DPO, Constitutional
      AI), languages, domains. Ultimate goal: Validated computational metrics enabling scalable
      monitoring of agency preservation in deployed RLHF systems.

