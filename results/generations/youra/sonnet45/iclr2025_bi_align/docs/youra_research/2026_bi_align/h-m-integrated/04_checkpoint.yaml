# Failure Analysis
failure_summary: |
  The hypothesis comprehensively failed ALL THREE gates:

  1. PRIMARY GATE FAILURE: Effect size negligible (d=-0.0181, only 12% of required threshold)
     - While statistically significant (p<0.001), the difference is practically meaningless
     - Only 1.2% difference in modal verb frequency between chosen and rejected

  2. SECONDARY GATE FAILURE: Poor internal consistency (α=0.42 << 0.7)
     - The three linguistic markers do not measure a cohesive construct
     - Low inter-item correlations suggest markers tap different dimensions

  3. TERTIARY GATE FAILURE: Zero replication across splits (0/2 splits passed)
     - Train split: d=-0.0187, p<0.001 (significant but tiny effect)
     - Test split: d=-0.0067, p=0.536 (not even statistically significant)

  Conclusion: The theorized 4-step causal chain does not operate with detectable strength.
  Linguistic agency markers (modal verbs, hedging, alternatives) are not valid proxies
  for agency differences in RLHF chosen vs rejected responses.

recommended_actions:
  - PIVOT: Try alternative linguistic markers (active/passive voice, sentence complexity, pronoun usage)
  - EXPLORE: Direct user studies for agency perception with human annotations
  - ABANDON: Computational proxy approach if no viable alternatives can be identified

