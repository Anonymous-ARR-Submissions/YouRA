main_hypothesis:
  id: H-ClassicalVarianceBaseline-v1
  title: Classical Variance Baseline for Neural Network Training Stochasticity
  statement: Under deterministic neural network training with controlled randomness (PyTorch seed control), replicating training
    N=30 times with independent random seeds on simple MLPs across dual datasets yields test accuracy variance that is statistically
    non-zero, measurably stable via bootstrap resampling, and practically detectable.
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: MNIST + Fashion-MNIST (Dual-Dataset Design)
    model: 'Simple MLPs (1-layer: 784→128→10, 2-layer: 784→256→128→10)'
    optimizer: SGD (lr=0.01, momentum=0.9)
    hyperparameters:
      epochs: 10
      batch_size: 64
      n_seeds: 30
      seed_range: 0-29
