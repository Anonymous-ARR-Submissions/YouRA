# → Core hypothesis summary (consistent with 03_refinement.yaml)
hypothesis_draft:
  title: "Classical Variance Baseline for Neural Network Training Stochasticity"
  hypothesis_id: "H-ClassicalVarianceBaseline-v1"
  core_claim: |
    Under deterministic neural network training with controlled randomness (PyTorch seed control),
    replicating training N=30 times with independent random seeds on simple MLPs across dual datasets
    (MNIST and Fashion-MNIST) yields test accuracy variance that is (1) statistically non-zero,
    (2) measurably stable via bootstrap resampling, and (3) practically detectable, because variance
    arises solely from stochastic weight initialization and N=30 provides sufficient sample size for
    stable classical statistical estimation.
  mechanism: |
    Three-step causal chain: (1) Random seed initialization creates stochastic weight configurations,
    (2) Different initialization points lead to different optimization trajectories through the loss
    landscape under deterministic SGD, (3) Different local minima yield measurably different test
    accuracy values, with variance σ² reflecting the distribution of minima quality across N=30
    initialization samples.
  predictions:
    - P1: "Test accuracy variance σ² > 0 with statistical significance (p < 0.05) across all 4 conditions (2 architectures × 2 datasets)"
    - P2: "Bootstrap 95% CI width ≤ 50% of variance point estimate (Rajput 2023 stability criterion)"
    - P3: "Coefficient of Variation CV ≥ 0.1% for at least 2/4 conditions (practical detectability threshold)"

# → Variable summary (mirrors 03_refinement.yaml Section 1.2)
variables_summary:
  independent: "Random Seed (30 levels: 0-29), Architecture Depth (2 levels: 1-layer, 2-layer MLP), Dataset (2 levels: MNIST, Fashion-MNIST)"
  dependent_primary: "Test Accuracy (percentage correct on held-out test set after 10 epochs)"
  controlled: "Training Epochs (10), Optimizer (SGD lr=0.01, momentum=0.9, batch=64), Determinism (PyTorch seed control + deterministic algorithms), Dataset Split (same train/test split per dataset), Model Initialization (seed-controlled)"

# → Null hypothesis (mirrors 03_refinement.yaml Section 1.1)
null_hypothesis:
  h0_statement: |
    There is no significant test accuracy variance across 30 independent training runs (σ² = 0),
    OR bootstrap estimation is unstable (CI width > 50%), OR variance is below practical
    detectability threshold (CV < 0.1%).
  statistical_test: "One-sample variance test (chi-squared distribution), Bootstrap resampling (B=1000), Coefficient of Variation ratio"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First validated classical variance baseline for neural network training stochasticity using dual-dataset, dual-architecture design with statistical triangulation (bootstrap + permutation + Bayesian)"
  differentiation_summary: |
    Unlike Picard 2021 (10^4 seeds, CIFAR-10 ResNet-18), we establish computationally feasible
    protocol (N=30) with stability validation. Unlike Rajput 2023 (theoretical N≥30 validation),
    we empirically test bootstrap CI width ≤ 50% for neural networks specifically. Unlike complex
    UQ methods, we provide the null hypothesis baseline they should compare against.

clarity:
  overall_level: "HIGH"
  clarity_verified: true
  improvements_needed: []

experimental_scope:
  models: ["1-layer MLP (784→128→10)", "2-layer MLP (784→256→128→10)"]
  datasets: ["MNIST", "Fashion-MNIST"]
  baselines: ["Monte Carlo Dropout (proof-of-concept)", "Picard 2021 seed variance reference"]

# → Measurement plan derived from experimental discussion
measurement_plan:
  data_collection:
    - source: "torchvision.datasets.MNIST and FashionMNIST (automatic download)"
    - source: "30 independent training runs per condition (seeds 0-29)"
    - source: "Test accuracy recorded after 10 epochs per run"
  procedure:
    - step: "Set PyTorch seed: torch.manual_seed(seed), cudnn.deterministic=True, use_deterministic_algorithms(True)"
    - step: "Initialize MLP with seed-controlled random weights"
    - step: "Train for 10 epochs using SGD (lr=0.01, momentum=0.9, batch_size=64)"
    - step: "Evaluate test accuracy on held-out test set"
    - step: "Repeat for all 30 seeds, collect test_accuracies array"
    - step: "Compute σ² = Var(test_accuracies)"
    - step: "Bootstrap resample (B=1000) to estimate 95% CI on σ²"
    - step: "Compute CI width = (CI_upper - CI_lower) / σ² × 100%"
    - step: "Compute CV = (std_dev / mean) × 100%"
    - step: "Run permutation test and Bayesian variance estimation for robustness"
  success_criteria:
    - "P1: p < 0.05 for one-sample variance test (σ² > 0)"
    - "P2: Bootstrap CI width ≤ 50%"
    - "P3: CV ≥ 0.1% for ≥2 conditions"
    - "Runtime < 25 minutes on single H100 GPU"

# → Validation strategy
validation:
  internal_validity:
    - "Full determinism ensures variance arises only from seed initialization (no confounding stochasticity)"
    - "Fixed hyperparameters (epochs, lr, momentum, batch_size) across all runs eliminate optimizer variance"
    - "Same train/test split per dataset prevents data sampling variance"
    - "Statistical triangulation (bootstrap + permutation + Bayesian) validates estimation method robustness"
  external_validity:
    - "Dual-dataset design (MNIST + Fashion-MNIST isomorphism) tests task difficulty sensitivity"
    - "Dual-architecture design (1-layer + 2-layer) tests depth sensitivity"
    - "Results generalize to: simple MLPs, deterministic training, short training regimes, classical variance measurement"
    - "Does NOT generalize to: CNNs, Transformers, stochastic regularization, large-scale datasets (acknowledged limitations)"

# → Key insights from the discussion itself
discussion_synthesis:
  key_insights:
    - "Radical simplicity as contribution: After 7 complex-framework failures (IB-EDL, UQ meta-learning, CLT convergence), measurement infrastructure becomes the innovation"
    - "Measurement-first paradigm: Validate baseline variance exists before inventing epistemic uncertainty frameworks"
    - "Low variance is valid result: If σ² is small (Scenario B), that's publishable negative information about MNIST MLP stability, not a failure"
    - "Statistical triangulation reveals assumptions: Bootstrap, permutation, Bayesian agreement validates i.i.d. assumption; disagreement identifies methodological gaps as publishable findings"
    - "Dual-dataset isomorphism: MNIST + Fashion-MNIST share structure (28×28, 10 classes) but differ in task difficulty, enabling clean task sensitivity test"
  breakthrough_moments:
    - "Exchange 5 (Dr. Ally): Reframed 'low variance problem' as valid negative result - MNIST MLP stability is publishable information, not pyrrhic victory"
    - "Exchange 7 (Dr. Nova): Transformed Prof. Rex's critiques into opportunities - MNIST limitation → dual-dataset design; bootstrap assumption → statistical triangulation; sample size concern → N sensitivity analysis"
    - "Exchange 4 (Prof. Pax): Feasibility validation (<10min is EASILY achievable, conservative 25min estimate) eliminated computational risk from Run 2-style failures"
  resolved_tensions:
    - "Novelty vs Simplicity: Resolved by positioning measurement infrastructure as contribution (Dr. Nova Exchange 1, Dr. Sage Exchange 3)"
    - "Sample Size Adequacy: Resolved via pre-registered power analysis (N=30 gives 85% power for σ=0.1%) and N sensitivity analysis (Prof. Vera Exchange 2, Dr. Ally Exchange 5)"
    - "Practical Significance: Resolved via CV ≥ 0.1% criterion ensuring detectability + dual-scenario interpretation (Prof. Pax Exchange 4, Dr. Ally Exchange 5)"
    - "Generalizability vs Scope: Resolved by explicit positioning as 'Phase 1 baseline' with acknowledged limitations + future work roadmap (Prof. Rex Exchange 6, Dr. Nova Exchange 7)"
