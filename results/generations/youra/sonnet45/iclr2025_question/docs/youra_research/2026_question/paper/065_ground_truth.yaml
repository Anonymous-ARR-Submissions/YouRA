# HYPERPARAMETERS & EXPERIMENTAL SETUP
# ═══════════════════════════════════════════════════════════════════════════════

experimental_setup:
  training:
    optimizer: "SGD"
    learning_rate: 0.01
    momentum: 0.9
    epochs: 10
    batch_size: 64
    n_seeds: 30
    seed_range: "0-29"

  architectures:
    1layer_mlp:
      structure: "784→128→10"
      parameters: 101770
      activation: "ReLU"

    2layer_mlp:
      structure: "784→256→128→10"
      parameters: 235146
      activation: "ReLU"

  datasets:
    mnist:
      train_size: 60000
      test_size: 10000
      baseline_accuracy: "~98%"

    fashion_mnist:
      train_size: 60000
      test_size: 10000
      baseline_accuracy: "~88%"

  determinism_controls:
    pytorch_seed: "torch.manual_seed(seed)"
    cudnn_deterministic: true
    fixed_batch_order: true

