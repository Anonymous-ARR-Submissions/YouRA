# ═══════════════════════════════════════════════════════════════════════════════
# ADVERSARIAL REVIEW TARGETS
# ═══════════════════════════════════════════════════════════════════════════════

adversarial_review_focus:
  # Areas where paper is most vulnerable
  potential_weaknesses:
    - area: "Sample size justification"
      question: "Why N=30 when your own results show it's insufficient for precision?"
      defense: "We distinguish detection (N=30 sufficient) from precision (N>50 required) - this is a scientific finding, not a flaw"

    - area: "Limited scope (simple MLPs)"
      question: "How generalizable are results to production architectures (ResNets, Transformers)?"
      defense: "Simplest case first - establish foundation before complex architectures. Extension path clearly identified."

    - area: "No baseline comparison"
      question: "How do we know this variance matters compared to other sources?"
      defense: "We ARE the baseline - first measurement of seed-only variance. This enables future method comparisons."

    - area: "MNIST ceiling effect"
      question: "2/4 conditions failed variance threshold - is this a negative result?"
      defense: "Task-dependency is the finding, not a failure. Successfully identified boundary condition (~95% accuracy)."

  # Strengths to emphasize
  defensive_strengths:
    - "Complete mechanism validation (all 4 hypotheses tested)"
    - "Overwhelming statistical evidence (p < 10⁻⁶)"
    - "Honest limitations section (4 limitations with mitigation paths)"
    - "Refines existing theory (Rajput 2023) with empirical evidence"
    - "Enables future work (MC Dropout calibration, variance atlas)"

