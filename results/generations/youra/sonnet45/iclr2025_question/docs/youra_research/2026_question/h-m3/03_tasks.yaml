# Implementation Tasks for h-m3: Bootstrap CI Stability
# Generated: 2026-03-21
# Schema Version: 1.1 (with reference_files)
# Total Tasks: 10 (1 setup + 8 epic + 1 failsafe)
# Budget: 10/30 (FULL tier)

version: "1.1"
hypothesis_id: "h-m3"
hypothesis_type: "MECHANISM"
total_tasks: 10
budget_tier: "FULL"
budget_max: 30

tasks:
  # ============================================
  # SETUP TASKS (Priority 94)
  # ============================================

  - id: "T-SETUP-01"
    title: "Environment Setup - Python Packages"
    type: "setup"
    priority: 94
    complexity: 2
    description: |
      Install required Python packages for bootstrap variance analysis.
      Dependencies: numpy (bootstrap resampling), scipy (optional stats.bootstrap),
      matplotlib (visualization), pandas (data loading from CSV).
    acceptance_criteria:
      - "All required packages installed: numpy>=1.20, scipy>=1.7.0, matplotlib>=3.3.0"
      - "Optional: pandas for CSV loading"
      - "Virtual environment activated (if used)"
      - "Package versions verified with pip list"
    dependencies: []
    reference_files:
      - "03_prd.md#Library-Dependencies"
    estimated_hours: 0.25

  # ============================================
  # EPIC IMPLEMENTATION TASKS (Priority 93-50)
  # ============================================

  - id: "T-EPIC-01"
    title: "A-1: Configuration Setup"
    type: "implementation"
    priority: 93
    complexity: 4
    epic_id: "A-1"
    description: |
      Create config.py with BootstrapConfig dataclass for bootstrap parameters,
      data loading paths, and output directories.

      Key parameters:
      - n_resamples: 1000 (bootstrap iterations)
      - confidence_level: 0.95 (95% CI)
      - ci_width_threshold_pct: 50.0 (gate threshold)
      - random_seed: 42 (reproducibility)
      - h_e1_results_path: path to h-e1 CSV
    acceptance_criteria:
      - "config.py created with BootstrapConfig dataclass"
      - "All bootstrap parameters defined (n_resamples=1000, CI=95%, threshold=50%)"
      - "Data loading path points to h-e1 results CSV"
      - "Output directories (results/, figures/) auto-created in __post_init__"
      - "Visualization settings included (DPI=300, figure sizes)"
    dependencies:
      - "T-SETUP-01"
    reference_files:
      - "03_prd.md#FR-1-Data-Loading"
      - "03_architecture.md#Epic-Tasks (A-1)"
      - "03_config.md#A-1-Configuration-Setup"
    estimated_hours: 1.0

  - id: "T-EPIC-02"
    title: "A-2: Data Loading from h-e1"
    type: "implementation"
    priority: 92
    complexity: 8
    epic_id: "A-2"
    description: |
      Implement data_loader.py to load test accuracy data from h-e1 experiment CSV.
      Parse experiment_logs.csv and extract 4 conditions × 30 samples = 120 data points.

      Conditions:
      - 1layer_mnist
      - 1layer_fashion_mnist
      - 2layer_mnist
      - 2layer_fashion_mnist
    acceptance_criteria:
      - "data_loader.py created with load_test_accuracies() function"
      - "Successfully loads h-e1/code/results/experiment_logs.csv"
      - "Extracts exactly 30 samples per condition (4 conditions total)"
      - "Returns dict mapping condition names to numpy arrays (shape: (30,))"
      - "Validates: no NaN/Inf values, range [0, 100], count=30"
      - "Graceful error handling for missing file"
    dependencies:
      - "T-EPIC-01"
    reference_files:
      - "03_prd.md#FR-1-Data-Loading"
      - "03_architecture.md#Epic-Tasks (A-2)"
      - "03_logic.md#A-2-Data-Loading"
    estimated_hours: 2.0

  - id: "T-EPIC-03"
    title: "A-3: Bootstrap Core Algorithm"
    type: "implementation"
    priority: 91
    complexity: 12
    epic_id: "A-3"
    description: |
      Implement bootstrap_analysis.py with core bootstrap variance estimation algorithm.

      Algorithm:
      1. For each of B=1000 iterations:
         a. Resample with replacement (np.random.choice)
         b. Compute variance (np.var with ddof=1)
      2. Compute percentile CI [2.5, 97.5]
      3. Calculate CI width percentage

      Key function: bootstrap_variance_ci(data, n_resamples=1000, confidence_level=0.95)
    acceptance_criteria:
      - "bootstrap_analysis.py created with bootstrap_variance_ci() function"
      - "Implements bootstrap resampling with replacement (B=1000)"
      - "Computes sample variance with Bessel's correction (ddof=1)"
      - "Calculates percentile CI bounds [2.5, 97.5]"
      - "Returns tuple: (variance_point, ci_lower, ci_upper, ci_width_pct)"
      - "Fixed random seed for reproducibility"
      - "Unit tests validate against known distributions"
    dependencies:
      - "T-EPIC-02"
    reference_files:
      - "03_prd.md#FR-2-Bootstrap-Resampling"
      - "03_prd.md#FR-3-Confidence-Interval"
      - "03_architecture.md#Epic-Tasks (A-3)"
      - "03_logic.md#A-3-Bootstrap-Core"
    estimated_hours: 3.0

  - id: "T-EPIC-04"
    title: "A-4: Multi-Condition Analysis"
    type: "implementation"
    priority: 90
    complexity: 9
    epic_id: "A-4"
    description: |
      Implement multi-condition orchestration to run bootstrap analysis for all 4 conditions.
      Process conditions sequentially with progress logging.
      Aggregate results into structured format.
    acceptance_criteria:
      - "Function run_multi_condition_bootstrap() created"
      - "Processes all 4 conditions: 1layer_mnist, 1layer_fashion_mnist, 2layer_mnist, 2layer_fashion_mnist"
      - "Progress logging for each condition (print or logging module)"
      - "Returns dict mapping condition → bootstrap results"
      - "Handles per-condition errors gracefully (continue with other conditions)"
    dependencies:
      - "T-EPIC-03"
    reference_files:
      - "03_prd.md#FR-4-Multi-Condition-Analysis"
      - "03_architecture.md#Epic-Tasks (A-4)"
      - "03_logic.md#A-4-Multi-Condition"
    estimated_hours: 2.0

  - id: "T-EPIC-05"
    title: "A-5: Gate Validation Logic"
    type: "implementation"
    priority: 89
    complexity: 7
    epic_id: "A-5"
    description: |
      Implement gate_validator.py to check MUST_WORK gate condition.

      Gate condition: CI width ≤ 50% for ALL 4 conditions.
      Generate gate report with pass/fail status and per-condition details.
    acceptance_criteria:
      - "gate_validator.py created with validate_gate() function"
      - "Checks ci_width_pct ≤ 50.0 for all 4 conditions"
      - "Returns gate_result: PASS (all pass) or FAIL (any fail)"
      - "Generates structured gate report dict"
      - "Saves gate_result.json to results/ directory"
    dependencies:
      - "T-EPIC-04"
    reference_files:
      - "03_prd.md#FR-5-Gate-Validation"
      - "03_architecture.md#Epic-Tasks (A-5)"
      - "03_logic.md#A-5-Gate-Validation"
    estimated_hours: 1.5

  - id: "T-EPIC-06"
    title: "A-6: Visualization"
    type: "implementation"
    priority: 88
    complexity: 11
    epic_id: "A-6"
    description: |
      Implement visualize.py to create 3 diagnostic figures:
      1. Bootstrap distribution histograms (4 subplots)
      2. CI width comparison bar chart
      3. Variance vs CI width scatter plot

      All figures saved to figures/ directory at 300 DPI (publication quality).
    acceptance_criteria:
      - "visualize.py created with plotting functions"
      - "Figure 1: 4 subplots showing bootstrap distributions with CI bounds and threshold"
      - "Figure 2: Bar chart of CI width % for 4 conditions vs 50% threshold line"
      - "Figure 3: Scatter plot of variance vs CI width"
      - "All figures saved as PNG at 300 DPI"
      - "Color coding: green (pass) / red (fail) for gate threshold"
    dependencies:
      - "T-EPIC-04"
    reference_files:
      - "03_prd.md#FR-7-Visualization"
      - "03_architecture.md#Epic-Tasks (A-6)"
      - "03_config.md#A-3-Algorithm-Config (visualization settings)"
    estimated_hours: 2.5

  - id: "T-EPIC-07"
    title: "A-7: Results Output"
    type: "implementation"
    priority: 87
    complexity: 5
    epic_id: "A-7"
    description: |
      Implement results saving functionality.
      Save bootstrap results to JSON and generate validation markdown report.

      Outputs:
      - results/bootstrap_results.json (per-condition metrics)
      - 04_validation.md (gate result and summary)
    acceptance_criteria:
      - "Function save_results() created"
      - "bootstrap_results.json saved with all 4 conditions"
      - "04_validation.md generated with gate result, per-condition summary, key findings"
      - "JSON is properly formatted and readable"
      - "Markdown follows validation report template"
    dependencies:
      - "T-EPIC-05"
    reference_files:
      - "03_prd.md#FR-6-Results-Logging"
      - "03_architecture.md#Epic-Tasks (A-7)"
    estimated_hours: 1.0

  - id: "T-EPIC-08"
    title: "A-8: Orchestration"
    type: "implementation"
    priority: 86
    complexity: 6
    epic_id: "A-8"
    description: |
      Implement run_analysis.py as main orchestration script.
      Execute complete pipeline: config → load → bootstrap → validate → visualize → save.

      Pipeline: config → data_loader → bootstrap_analysis → gate_validator → visualize → save_results
    acceptance_criteria:
      - "run_analysis.py created with main() function"
      - "Orchestrates full pipeline in correct order"
      - "Handles errors with clear messages"
      - "Logs progress to console and experiment.log"
      - "Runtime < 30 seconds (4 conditions × 1000 resamples)"
      - "Can be run via: python run_analysis.py"
    dependencies:
      - "T-EPIC-07"
      - "T-EPIC-06"
    reference_files:
      - "03_architecture.md#Epic-Tasks (A-8)"
      - "03_logic.md#A-8-Orchestration"
    estimated_hours: 1.5

  # ============================================
  # FAILSAFE TASK (Priority 1)
  # ============================================

  - id: "T-FAILSAFE-01"
    title: "Pipeline Continuation Checkpoint"
    type: "failsafe"
    priority: 1
    complexity: 1
    description: |
      Failsafe checkpoint to ensure Phase 4 completes even if all implementation tasks fail.
      If reached, this task triggers Phase 4 validation with partial results.

      This is NOT a real implementation task - it serves as a workflow safety net.
    acceptance_criteria:
      - "Checkpoint marker created indicating Phase 4 attempted"
      - "Partial results documented (what succeeded/failed)"
      - "Allows Phase 4 to transition to validation even with incomplete implementation"
    dependencies: []
    reference_files: []
    estimated_hours: 0.1

