# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════
scope:
  applies_to: |
    - Simple feedforward MLPs (1-2 hidden layers, <500K parameters)
    - Fully deterministic training (no dropout, no batch norm, no data augmentation)
    - Standard supervised classification on small-scale image datasets (28×28 resolution, grayscale)
    - Short training regimes (10 epochs, convergence within minutes)
    - Classical statistical variance measurement (no Bayesian neural networks, no ensemble methods)
  does_not_apply_to: |
    - Deep convolutional networks (ResNets, EfficientNets) - architecture sensitivity unknown
    - Transformer models or attention-based architectures - different variance sources
    - Stochastic regularization (dropout, mixup, cutout) - introduces non-seed variance
    - Large-scale datasets (ImageNet, COCO) - computational constraints violated
    - Long training regimes (>100 epochs) - variance may change with training duration
    - UQ method comparison (this is baseline infrastructure, not comparative study)
  known_limitations: |
    - **Sample size limitation (Prof. Rex Critique 1):** N=30 is 300× smaller than Picard's 10^4-seed scan.
      Rare outlier seeds (<0.03% occurrence) may be undetected. Acknowledged but computationally unavoidable.

    - **Architecture scope (Prof. Rex Critique 2):** MLPs only, no CNNs/Transformers. Fashion-MNIST
      tests task difficulty sensitivity but not architectural diversity. Positioned as "Phase 1 baseline"
      with CIFAR-10 CNN baseline proposed as future work.

    - **Bootstrap assumption (Prof. Rex Critique 3):** i.i.d. violation (shared dataset/optimizer).
      Addressed via permutation test + Bayesian robustness checks in Section 1.4:A1.

    - **Picard comparison gap (Prof. Rex Critique 4):** Cannot replicate their 10^4-seed CIFAR-10 setup.
      We validate key finding (variance exists despite determinism) on different dataset/architecture.
      Computational limitation stated explicitly.

    - **Application protocol missing (Prof. Rex Critique 5):** Baseline usage demonstrated via MC Dropout
      proof-of-concept (Exchange 7), but full UQ method survey is future work scope.

