# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════
key_assumptions:
  - id: "A1"
    assumption: "Bootstrap resampling with B=1000 provides valid confidence intervals for variance estimation on neural network test accuracies"
    supporting_evidence: "Bootstrap assumes i.i.d. samples. Our 30 training runs share dataset/optimizer but differ only in seed initialization. Prof. Rex raised i.i.d. violation concern - we address via permutation test robustness check."
    consequence_if_violated: "CI width estimates could be biased. Mitigation: Run permutation test + Bayesian variance estimation in parallel - if all three methods (bootstrap, permutation, Bayesian) agree, assumption violation is negligible."
  - id: "A2"
    assumption: "N=30 seeds provides sufficient sample size for stable variance estimation (power ≥ 80% to detect σ=0.1%)"
    supporting_evidence: "Rajput 2023 empirically validated N≥30 across 15 ML benchmark datasets with effect size ≥0.5. Power analysis: For one-sample variance test with N=30, α=0.05, σ_true=0.1%, power ≈ 0.85 (chi-squared distribution)."
    consequence_if_violated: "Underpowered experiment may fail to detect real but small variance. Mitigation: Pre-register minimum detectable effect σ_min=0.1%, document power=85% upfront, add N sensitivity analysis (retroactive plot CI width vs N ∈ [10,20,30]) to guide future work."
  - id: "A3"
    assumption: "MNIST and Fashion-MNIST are representative enough to demonstrate generalizable variance measurement methodology"
    supporting_evidence: "Both datasets are 28×28 grayscale, 10 classes, 60K train - isomorphic structure with different task difficulty (MNIST ~98% vs Fashion-MNIST ~90% accuracy). Prof. Rex critique: MNIST alone too narrow; Exchange 7 resolution: dual-dataset design tests task difficulty sensitivity."
    consequence_if_violated: "Findings may not generalize to CNNs, Transformers, or higher-dimensional datasets. Mitigation: Explicitly position as 'simple architecture baseline' in intro, acknowledge limitation, propose CIFAR-10 CNN baseline as future work in Discussion."
  - id: "A4"
    assumption: "Variance magnitude is practically significant (CV ≥ 0.1%) rather than numerically trivial"
    supporting_evidence: "Prof. Pax's critique: σ²=0.0001 would be 'who cares?' result. Dr. Ally's defense: Low variance is valid negative information (MNIST MLP is remarkably stable). CV ≥ 0.1% criterion ensures detectability relative to mean."
    consequence_if_violated: "Hypothesis technically passes (σ² > 0, CI < 50%) but lacks practical impact. Mitigation: Report BOTH outcomes as valid - Scenario A (high variance σ≥0.3%): UQ methods address real problem; Scenario B (low variance σ≤0.1%): simple MLPs inherently stable, UQ must demonstrate value on complex architectures."
  - id: "A5"
    assumption: "The experimental protocol completes in <25 minutes on single H100 GPU"
    supporting_evidence: "Prof. Pax's feasibility analysis: MNIST MLP (784→128→10) = ~196K params, 10 epochs = 5-10 sec/seed on H100. 30 seeds × 2 architectures × 2 datasets × 6min = ~24 minutes (conservative estimate)."
    consequence_if_violated: "Computational infeasibility (>1 hour) risks Run 2-style failure (code ready but never executed). Mitigation: Computational feasibility already validated in discussion - no risk unless GPU availability changes."

