    - name: "Dataset Split"
      operationalization: "Same train/test split used for all seeds within each dataset"
    - name: "Model Initialization"
      operationalization: "Default PyTorch initialization (controlled by seed)"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════
causal_mechanism:
  causal_chain_count: 3
  steps:
    - step: 1
      description: "Random seed initialization creates stochastic weight configurations. Under full determinism (PyTorch seed control), the ONLY source of variance across training runs is the initial random weight draw controlled by torch.manual_seed(seed). Different seeds → different initialization points in weight space."
      evidence: "PyTorch documentation on reproducibility, Picard 2021 demonstrated seed-dependent outcomes on CIFAR-10 despite deterministic training"
      falsifier: "If training runs with different seeds produce identical test accuracies (σ² = 0), the mechanism fails - would suggest initialization variance is negligible"
    - step: 2
      description: "Different initialization points lead to different optimization trajectories. Even with deterministic SGD (fixed learning rate, momentum, batch order), distinct initial weights cause the optimizer to traverse different paths through loss landscape, converging to different local minima."
      evidence: "Standard SGD theory - non-convex optimization has multiple local minima, initialization determines which basin of attraction the optimizer enters"
      falsifier: "If all initializations converge to identical minima (variance after Step 1 disappears by Step 2), the mechanism fails - would suggest MNIST MLP has single dominant attractor"
    - step: 3
      description: "Different local minima yield measurably different test accuracy values. The variance in final test accuracy σ² reflects the distribution of minima quality across the N=30 initialization samples. Bootstrap resampling (B=1000) estimates confidence intervals on this variance to assess stability."
      evidence: "Ghasemzadeh 2023 nested k-fold reduces N by 50% for variance estimation, suggesting N=30 is in feasible range; Rajput 2023 validates N≥30 for stable estimation in ML contexts"
      falsifier: "If bootstrap CI width > 50% of point estimate, variance estimation is unstable despite N=30 - would invalidate Rajput's criterion for neural networks or reveal MNIST MLP has insufficient variance for reliable estimation"
  key_tension: "Prof. Pax raised concern about variance being TOO SMALL (σ² < 0.0001) leading to pyrrhic technical victory - we address this with CV ≥ 0.1% criterion ensuring practical detectability"
  evidence_summary: |
    The causal chain is grounded in established theory (PyTorch determinism docs, non-convex optimization,
    classical statistics) combined with empirical demonstrations (Picard 2021 seed variance on CIFAR-10,
    Rajput 2023 N≥30 validation, Ghasemzadeh 2023 sample size reduction). The mechanism is SIMPLE by design -
    no novel uncertainty frameworks, no complex regularization - just classical variance measurement of
    the natural stochasticity from weight initialization.

