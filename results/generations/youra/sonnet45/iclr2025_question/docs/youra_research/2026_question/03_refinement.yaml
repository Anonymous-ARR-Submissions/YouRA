# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════
core_statement:
  hypothesis_id: "H-ClassicalVarianceBaseline-v1"
  confidence_level: 0.85  # All 4 persona verdicts STRONG
  core_hypothesis_statement: |
    Under deterministic neural network training with controlled randomness (PyTorch seed control,
    deterministic algorithms), if we replicate training N=30 times with independent random seeds
    on simple MLPs (1-layer and 2-layer) across dual datasets (MNIST and Fashion-MNIST), then
    test accuracy variance σ² will be (1) statistically non-zero (p < 0.05), (2) measurably stable
    via bootstrap resampling (CI width ≤ 50%), and (3) practically detectable (CV ≥ 0.1%),
    because variance arises solely from stochastic weight initialization under full determinism,
    and N=30 provides sufficient sample size for stable classical statistical estimation per
    Rajput 2023's validated criterion.
  alternative_hypothesis_h0: |
    There is no significant test accuracy variance across 30 independent training runs (σ² = 0),
    OR bootstrap estimation is unstable (CI width > 50%), OR variance is below practical
    detectability threshold (CV < 0.1%).

