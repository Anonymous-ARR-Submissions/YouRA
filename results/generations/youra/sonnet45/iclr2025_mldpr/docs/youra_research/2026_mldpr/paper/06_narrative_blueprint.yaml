notes:
  creation_notes: |
    Narrative design focuses on the supervised-unsupervised distinction as the central intellectual contribution.
    This framing reframes the "negative result" (clustering fails) as a principled boundary discovery rather than a weakness.

    Key narrative choices:
    1. Hook emphasizes practical failure (cross-repository silos) rather than technical curiosity
    2. Insight is the asymmetry (probe succeeds, clustering fails)—not just "clustering fails"
    3. Evidence order builds confidence (signal exists) before presenting failure (clustering fails)
    4. Discussion interprets failure as algorithmic mismatch (class imbalance), not fundamental signal absence
    5. Conclusion reframes as boundary condition: "what can't be done unsupervised" clarifies "what must be done supervised"

    This structure turns a hypothesis falsification into a positive contribution: establishing the supervised requirement
    for automated metadata mapping and scoping the feasibility landscape for deployment.

