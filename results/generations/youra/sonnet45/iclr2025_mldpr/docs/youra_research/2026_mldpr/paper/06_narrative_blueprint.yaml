# PART 5: SECTION-LEVEL NARRATIVE GOALS
# ═══════════════════════════════════════════════════════════════════════════════

section_goals:

  abstract:
    narrative_purpose: "Compress the entire story into ~150 words—emphasize the surprising finding (probe succeeds, clustering fails) and the deployment shift"
    key_message: "Lifecycle metadata is supervised, not unsupervised—automated mapping is feasible but requires labels"
    structure_notes: |
      - Sentence 1-2: Cross-repository metadata heterogeneity blocks automated analysis; lifecycle stages (General vs. RAI) could enable semantic mapping
      - Sentence 3: We test unsupervised clustering on 300 metadata fields from HuggingFace, OpenML, UCI
      - Sentence 4-5: Linear probes achieve 97-100% accuracy (κ=0.645), but K-means NMI=0.02 (96% below threshold) due to 8.3% class imbalance
      - Sentence 6: Results establish supervised/semi-supervised approaches as necessary, shifting deployment to few-shot label propagation
    avoid:
      - "Vague 'we propose a method'—be concrete about supervised vs. unsupervised distinction"
      - "Hiding the negative result—clustering failure is the key finding"
      - "Undefined acronyms like NMI without context"

  introduction:
    narrative_purpose: "Hook (metadata silos) → Problem (no automated mapping) → Insight (supervised signal exists) → Preview (our findings + deployment shift)"

    hook_strategy: "practical_failure: Metadata schema heterogeneity blocks cross-repository analysis despite growing need for meta-analyses and reproducibility infrastructure"

    problem_escalation: |
      1. Surface: Repositories use different field names (known to all)
      2. Deeper: Semantic lifecycle stages (motivation, collection, RAI) can't be recovered automatically—no evidence distributional patterns exist
      3. Gap: Existing tools work within single repositories (Roman et al. Open Datasheets) or require manual cross-repository mapping (F-UJI, FAIRshake)

    insight_preview: "We hypothesized that lifecycle stages would manifest as unsupervised clusters due to distributional regularities. Instead, we found an asymmetry: embeddings encode lifecycle with near-perfect supervised accuracy (97-100% linear probe) but clustering recovers almost no structure (NMI=0.02). This reveals lifecycle separability as a supervised signal carrier, not an unsupervised emergent property."

    contributions_framing: |
      Building on this supervised-unsupervised distinction, our contributions are:
      1. Empirical validation that lifecycle stages exhibit operational stability (κ=0.645) and linear separability (86.7% probe accuracy) across heterogeneous repositories
      2. Demonstration that unsupervised clustering fails catastrophically (NMI=0.02) despite strong supervised signals, falsifying the unsupervised discovery hypothesis
      3. Mechanistic attribution to severe class imbalance (8.3% RAI) and identification of repository-specific performance variance (UCI NMI=0.39 vs. HF NMI=0.03)
      4. Deployment paradigm shift: from unsupervised discovery to semi-supervised label propagation for scalable cross-repository metadata mapping

    transition_to_related_work: "These findings position our work relative to prior documentation frameworks and semantic metadata analysis—areas we review next to contextualize the supervised-unsupervised gap."

  related_work:
    narrative_purpose: "Show why existing work is insufficient for automated cross-repository lifecycle detection → justify testing unsupervised clustering hypothesis → position supervised signal finding as novel"

    positioning_strategy: "Contrast template-driven single-repository approaches (Roman et al.) with our multi-repository discovery approach; show semantic metadata work hasn't addressed lifecycle-stage detection; position supervised-unsupervised gap as new empirical insight"

    key_comparison_points:
      - area: "Documentation Frameworks (Datasheets, Model Cards, Open Datasheets)"
        limitation_to_highlight: "Designed for within-repository structured documentation; assume templates are filled out manually or via wizards. Don't address cross-repository semantic mapping of unstructured/differently-structured metadata."
        how_we_differ: "We test whether lifecycle structure can be discovered across heterogeneous schemas without templates, finding it requires supervision. This inverts Roman et al.'s approach: instead of 'build structure top-down', we ask 'can structure be discovered bottom-up?'"

      - area: "Semantic Metadata Analysis (FAIR tools: F-UJI, FAIRshake)"
        limitation_to_highlight: "Assess metadata quality within single repositories using repository-specific rules. Cross-repository comparison requires manual field mapping. No automated semantic equivalence detection."
        how_we_differ: "We propose semantic embeddings as a path to automated mapping but find unsupervised clustering insufficient—supervised methods needed. Our negative result scopes the feasibility boundary for semantic approaches."

      - area: "Clustering for Document Organization (topic models, semantic clustering)"
        limitation_to_highlight: "Successful in domains with balanced cluster sizes and naturally separable topics (news articles, scientific abstracts). Assume cluster structure emerges from semantic similarity."
        how_we_differ: "We encounter extreme class imbalance (11:1 ratio) where semantic similarity exists (high probe accuracy) but clustering fails. This identifies a boundary condition for semantic clustering: supervised signal ≠ unsupervised cluster structure."

    papers_to_discuss:
      - "Gebru et al. 2018 - Datasheets for Datasets (lifecycle framework origin)"
      - "Roman et al. 2023 - Open Datasheets (2-tier structure, template-driven)"
      - "F-UJI, FAIRshake - FAIR metadata assessment tools"
      - "Sentence-BERT (Reimers & Gurevych 2019) - semantic embedding baseline"

    avoid:
      - "Claiming prior work 'failed'—be precise: they solved different problems (single-repo structure vs. multi-repo discovery)"
      - "Ignoring the success of template-driven approaches—acknowledge their value, contrast with discovery setting"
      - "Missing obvious ML clustering literature (K-means properties, class imbalance effects)"

  methodology:
    narrative_purpose: "Explain WHY we designed experiments to test supervised vs. unsupervised separability—two-stage validation strategy to isolate failure modes"

    connection_to_insight: "To distinguish 'signal absent' from 'clustering fails', we validate signal existence first (H-E1: inter-annotator agreement, linear probes) before testing unsupervised recovery (H-M-integrated: K-means clustering, baseline comparisons). This two-stage design isolates the supervised-unsupervised gap."

    key_design_decisions:
      - decision: "Test 2-tier lifecycle granularity (General vs. RAI) rather than full 7-stage Datasheets taxonomy"
        rationale: "Roman et al. 2023 validated 2-tier structure behaviorally; finer granularity would compound class imbalance issues. Scoping to 2-tier maximizes signal-to-noise ratio for proof-of-concept."
        alternatives_considered: "Full 7-stage taxonomy (rejected: insufficient samples per class); binary existence test only (rejected: doesn't test mechanism)"

      - decision: "Use frozen sentence-transformers (all-MiniLM-L6-v2) without fine-tuning"
        rationale: "Frozen embeddings isolate distributional signal from metadata text without task-specific adaptation. Fine-tuning would conflate 'signal exists in metadata' with 'signal exists after task-specific training.'"
        alternatives_considered: "Fine-tuned BERT (rejected: introduces training artifacts); TF-IDF (rejected: loses semantic similarity); GPT-4 embeddings (rejected: cost/reproducibility)"

      - decision: "Stratified sampling: 300 fields (150 HF [75 scaffolded, 75 unscaffolded], 100 OpenML, 50 UCI)"
        rationale: "Balance repository representation while oversampling UCI (underrepresented but critical for generalization). Scaffolded vs. unscaffolded split tests interface amplification hypothesis."
        alternatives_considered: "Uniform sampling (rejected: would undersample UCI); focus on single repo (rejected: misses cross-repo generalization test)"

    intuition_building: |
      Think of the experimental design as a funnel:
      1. H-E1 (Existence): "Does lifecycle signal exist at all?" → Test human agreement + linear separability
      2. H-M-integrated (Mechanism): "Can unsupervised methods find it?" → Test clustering + baselines + controls
      3. Failure mode isolation: If H-E1 passes but H-M fails → supervised signal exists but clustering insufficient

      Figures:
      - Inter-annotator agreement heatmap (H-E1 validation)
      - Linear probe confusion matrix (signal detectability)
      - K-means NMI comparison to baselines (clustering failure visualization)
      - Repository stratification bar chart (UCI vs. HF performance gap)

    technical_depth_balance: |
      Main paper: Experimental protocol, key metrics (κ, NMI, probe accuracy), result interpretation
      Appendix: Annotation guidelines, embedding hyperparameters, statistical tests, additional ablations

  experiments:
    narrative_purpose: "Design experiments that test the supervised-unsupervised separability distinction through three questions"

    experimental_questions:
      - question: "Do lifecycle categories exhibit operational stability across repositories?"
        experiment: "H-E1: Three annotators label 300 fields blind to repository source; compute inter-annotator agreement κ"
        expected_outcome: "κ ≥ 0.60 would validate lifecycle constructs as reliable measurement tools"

      - question: "Are lifecycle signals linearly detectable in semantic embeddings?"
        experiment: "H-E1: Train logistic regression probe on scaffolded HF embeddings, test on held-out data"
        expected_outcome: "Probe accuracy ≥ 0.75 would prove distributional signatures exist and are geometrically accessible"

      - question: "Can unsupervised clustering recover lifecycle structure?"
        experiment: "H-M-integrated: K-means (k=2) on embeddings; compare NMI to permutation/LDA/lexical baselines"
        expected_outcome: "NMI > 0.60 AND baseline gap ≥ 0.15 would validate unsupervised discovery hypothesis"

    baseline_rationale: "Permutation baseline establishes chance performance; LDA tests topic modeling approach (standard in document clustering); lexical heuristic tests whether simple keyword matching suffices (avoiding need for embeddings)"

    dataset_rationale: "Cross-repository sample tests generalization beyond single-repository template-driven success (Roman et al.). HuggingFace/OpenML/UCI chosen for ecosystem importance, API accessibility, and schema heterogeneity."

    metric_rationale: "NMI measures cluster-label agreement (standard in clustering evaluation, bounded [0,1]); inter-annotator κ measures construct reliability (standard in annotation studies); probe accuracy measures linear separability (standard in representation learning)"

    fairness_considerations: |
      - Same frozen embeddings for all methods (no per-method fine-tuning)
      - Baselines use same preprocessing (text cleaning, length filtering)
      - K-means with multiple random seeds (report mean ± std over 10 runs)
      - No cherry-picking: report all planned metrics regardless of outcome

  results:
    narrative_purpose: "Present evidence in order: signal exists (H-E1) → clustering fails (H-M-integrated) → mechanism identified (class imbalance, repository variance)"

    main_result_highlight: "The supervised-unsupervised gap: Linear probes achieve 97-100% accuracy while K-means achieves 2% NMI—a 95-98 percentage point difference that reveals lifecycle separability as a supervised signal carrier, not unsupervised cluster structure."

    result_presentation_order:
      - result: "H-E1 validation: κ=0.645 (all DTS sections > 0.60 threshold), probe accuracy 86.7%"
        purpose: "Establish that signal exists and is detectable—this validates the hypothesis is testable and distributional signatures are present. Builds confidence before presenting clustering failure."

      - result: "H-M-integrated clustering failure: K-means NMI=0.0229, baseline gap 0.0129 (both ~90% below thresholds)"
        purpose: "The key negative result: unsupervised recovery fails despite strong supervised signals. This is the paper's central empirical finding, directly falsifying the unsupervised clustering hypothesis."

      - result: "Class imbalance severity: 8.3% RAI vs. 91.7% General Information (11:1 ratio)"
        purpose: "Mechanistic explanation: K-means assumes balanced clusters; extreme imbalance causes geometric compression of minority class. This identifies the algorithmic mismatch."

      - result: "Repository stratification: UCI NMI=0.39 vs. HuggingFace NMI=0.03 (29x difference)"
        purpose: "Boundary condition: unsupervised recovery is highly context-dependent, working only under favorable conditions. Scopes the failure as repository-specific rather than universal."

      - result: "Lexical baseline zero recall: 0% RAI keyword matches despite standard terminology"
        purpose: "Surprising finding: shows extreme schema heterogeneity, strengthens case for semantic approaches while explaining why unsupervised clustering struggles without vocabulary normalization."

    surprising_result_handling: "Lexical baseline zero recall was unexpected—we anticipated at least partial overlap with Datasheets terminology. We interpret this as evidence of severe repository-specific vocabulary variation, which motivates semantic embedding approaches but also explains why unsupervised clustering without preprocessing struggles. This result is honest: it shows the problem is harder than expected, not that our method is uniquely challenged."

    avoid:
      - "Hiding the clustering failure—it's the central finding, not a weakness to downplay"
      - "Overinterpreting UCI success (NMI=0.39) as 'clustering works'—still below 0.60 threshold and repository-specific"
      - "Claiming class imbalance is proven cause without acknowledging correlational evidence"

  discussion:
    narrative_purpose: "Interpret the supervised-unsupervised gap as a principled boundary, acknowledge limitations honestly, position for future semi-supervised work"

    key_findings_interpretation: "Our results establish that lifecycle documentation stages are encoded as linearly separable supervised signals but not as unsupervised cluster structure. This is not a failure of the lifecycle construct (high inter-annotator agreement validates reliability) nor of semantic embeddings (high probe accuracy validates signal detectability), but rather a mismatch between the clustering assumption (natural groupings emerge from similarity) and the geometric reality (severe class imbalance compresses minority class). The deployment implication is clear: automated cross-repository metadata mapping is feasible but requires supervised/semi-supervised approaches—label propagation via probe-based classifiers, few-shot learning, or active learning—rather than unsupervised discovery."

    honest_limitations:
      - limitation: "2-tier granularity only (General vs. RAI)—fine-grained 7-stage Datasheets categorization not tested"
        why_acceptable: "2-tier structure is empirically validated by Roman et al. 2023 and maximizes sample size per class for proof-of-concept. Fine-grained taxonomy would compound class imbalance issues."
        future_mitigation: "Hierarchical classification: first predict 2-tier, then refine within each tier. Requires larger-scale data collection (1000+ fields) to support 7 balanced classes."

      - limitation: "Class imbalance explanation is correlational—didn't run controlled rebalancing experiments"
        why_acceptable: "Repository stratification analysis (UCI vs. HF performance difference) provides triangulating evidence. Synthetic rebalancing would alter data distribution, potentially introducing artifacts."
        future_mitigation: "Weighted K-means, SMOTE-style synthetic minority oversampling, or density-based clustering (DBSCAN) to test algorithmic robustness to imbalance."

      - limitation: "Three repositories only (HF, OpenML, UCI)—generalization to Kaggle, Zenodo, Papers With Code untested"
        why_acceptable: "Selected repositories span spectrum of metadata structure: HF has Open Datasheets (structured), UCI lacks templates (unstructured), OpenML is intermediate. Covers major use cases."
        future_mitigation: "Extend to Papers With Code (code-first documentation), Zenodo (research data), Kaggle (competition datasets) to test schema diversity limits."

    broader_impact_statement: "Automated cross-repository metadata mapping could improve dataset discoverability and documentation quality assessment at scale, benefiting the research community. However, imperfect classification could mislabel responsible AI fields (false negatives), causing practitioners to overlook important ethical considerations. Deployment should include human review for high-stakes decisions (e.g., flagging datasets for policy compliance). Positive impact: enables systematic tracking of responsible AI documentation adoption across repositories; identifies datasets lacking accountability information. Risk mitigation: semi-supervised approaches with confidence thresholds; human-in-the-loop for borderline cases."

  conclusion:
    narrative_purpose: "Reinforce the supervised-unsupervised distinction as a principled boundary, callback to cross-repository silos problem, open vision for few-shot deployment"

    callback_to_hook: "We opened by noting that cross-repository metadata heterogeneity blocks automated analysis despite the growing need for systematic reviews and reproducibility infrastructure. Our results establish that automated lifecycle detection is feasible—but requires supervised, not unsupervised, approaches. The path forward is not unsupervised discovery but efficient label propagation: few-shot learning with ≤10 examples per repository, active learning to prioritize high-uncertainty fields, or semi-supervised methods that bootstrap from small labeled sets."

    memorable_ending: "The supervised-unsupervised gap we identify is not a failure but a boundary condition: it clarifies what semantic embeddings can and cannot achieve for documentation metadata. Lifecycle structure exists (97-100% probe accuracy proves it), but it manifests as a supervised signal requiring task-specific amplification—not a natural clustering waiting to be discovered. This distinction reshapes the feasibility landscape for automated metadata mapping: the question is no longer 'can it be done?' but 'how many labels suffice?'"

    future_work_vision: "Beyond proof-of-concept, we envision an ecosystem-wide metadata quality dashboard: semi-supervised lifecycle detectors deployed across repositories, tracking documentation completeness longitudinally, automatically flagging datasets lacking responsible AI fields, enabling cross-repository meta-analyses that were previously infeasible. The supervised signal we've validated is the foundation; the next step is minimizing the annotation budget—how few labels enable reliable cross-repository propagation? Early experiments suggest 10-20 examples per repository may suffice; at that scale, systematic metadata improvement becomes tractable."

