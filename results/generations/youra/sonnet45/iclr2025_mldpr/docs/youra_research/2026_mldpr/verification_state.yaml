main_hypothesis:
  id: H-LifecycleSep-v1
  title: Lifecycle-Stage Functional Separability in Cross-Repository Metadata
  statement: "Under cross-repository metadata field conditions (HuggingFace, OpenML,\
    \ UCI), if metadata fields are embedded using semantic representations (field\
    \ names + example values), then unsupervised clustering will recover lifecycle-stage\
    \ functional separability at 2-tier granularity (General Information vs. Responsible\
    \ AI per Roman et al. 2023) that exceeds strong baselines by \u22650.15 NMI, because\
    \ lifecycle categories reflect cognitively natural documentation partitions that\
    \ manifest as distributional regularities (lexical, normative, value-structural)\
    \ in metadata text when documentation is sufficiently structured."
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: Cross-Repository Metadata Sample (custom)
    model: Sentence Transformers (all-MiniLM-L6-v2)
    optimizer: null
    hyperparameters:
      sample_size: 300
      repositories:
      - HuggingFace
      - OpenML
      - UCI
      scaffolded_ratio: 0.5
