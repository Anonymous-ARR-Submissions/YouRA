  - K-means assumes balanced clusters
  - Keyword mismatch suggests schema vs content labeling
  - Repository-specific effects (UCI outlier)
  recommended_actions:
  - Re-sample dataset with balanced RAI/General ratio
  - Replace K-means with density-based clustering (HDBSCAN)
  - Test domain-specific embeddings (SciBERT)
