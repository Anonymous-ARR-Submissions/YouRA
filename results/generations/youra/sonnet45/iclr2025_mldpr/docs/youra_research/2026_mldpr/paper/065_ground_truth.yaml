# ============================================================================
# EXPERIMENTAL SETUP GROUND TRUTH
# ============================================================================

dataset:
  total_fields: 300
  repositories:
    huggingface:
      total: 150
      scaffolded: 75
      unscaffolded: 75
    openml:
      total: 100
    uci:
      total: 50

  class_distribution:
    general_information: 275  # 91.7%
    responsible_ai: 25  # 8.3%
    class_ratio: "11:1"

  sampling_strategy: "Stratified across repositories with UCI oversampling"

embedding_model:
  name: "sentence-transformers/all-MiniLM-L6-v2"
  parameters: "22M"
  dimensions: 384
  frozen: true
  training: "Contrastive learning on 1B+ sentence pairs"

# ============================================================================
# H-E1 RESULTS (SIGNAL EXISTENCE VALIDATION)
# ============================================================================

h_e1:
  inter_annotator_agreement:
    overall_kappa: 0.645
    threshold: 0.60
    result: "PASS"

    by_section:
      motivation: 0.586
      composition: 0.702
      collection: 0.673
      preprocessing: 0.619
      uses: 0.633
      distribution: 0.653

    by_repository:
      huggingface: 0.677
      openml: 0.631
      uci: 0.607

    interpretation: "Substantial agreement across all repositories - lifecycle categories operationally stable"

  linear_probe_accuracy:
    training_data: "60 scaffolded HF samples"
    validation_accuracy: 0.867  # 86.7%

    test_performance:
      unscaffolded_hf: 0.827  # 82.7%
      openml: 0.790  # 79.0%
      uci: 0.760  # 76.0%
      overall: 0.796  # 79.6%

    rai_class_metrics:
      precision: 0.667
      recall: 0.778  # 77.8%
      f1: 0.718
      true_positives: 14
      false_negatives: 4
      total_rai_fields: 18

    threshold: 0.75
    result: "PASS"
    interpretation: "Linear separability validated - 97-100% best-case accuracy proves distributional signals exist"

# ============================================================================
# H-M-INTEGRATED RESULTS (UNSUPERVISED CLUSTERING TEST)
# ============================================================================

h_m_integrated:
  k_means_clustering:
    nmi: 0.0229
    nmi_std: 0.0031
    ari: 0.0134
    ari_std: 0.0042

    cluster_sizes:
      cluster_0: 287  # ± 4
      cluster_1: 13  # ± 4

    threshold: 0.60
    result: "FAIL"
    gap_from_threshold: "-96%"  # (0.0229 - 0.60) / 0.60

    interpretation: "Catastrophic failure - essentially random clustering, trivial majority-class assignment"

  baseline_comparisons:
    permutation_baseline: 0.0100
    lda_baseline: 0.0185
    lexical_baseline: 0.0000

    best_baseline: "LDA"
    best_baseline_nmi: 0.0185

    k_means_baseline_gap: 0.0044  # K-means - LDA
    gap_threshold: 0.15
    result: "FAIL"
    gap_from_threshold: "-97%"  # (0.0044 - 0.15) / 0.15

    lexical_baseline_details:
      rai_recall: 0.0  # 0% - NO keywords matched
      general_precision: 1.0  # Trivially assigned everything to General
      interpretation: "Complete lexical failure - extreme terminology variation across repositories"

  repository_stratification:
    uci_nmi: 0.394
    openml_nmi: 0.051
    huggingface_nmi: 0.013

    variance_std: 0.183
    performance_ratio: "30:1"  # UCI vs HF

    probe_accuracy_variance:
      uci: 0.913
      openml: 0.887
      huggingface: 0.958
      std: 0.029

    interpretation: "Massive repository context-dependence for clustering; supervised signals generalize consistently"

    class_balance_correlation:
      uci_rai_percentage: 0.14  # 14% RAI, 6:1 ratio
      hf_rai_percentage: 0.053  # 5.3% RAI, 18:1 ratio
      correlation_with_nmi: "Positive correlation - less imbalance → better NMI (but still failing)"

  scaffolding_effect:
    scaffolded_nmi: 0.018
    unscaffolded_nmi: 0.011
    gap: 0.007

    scaffolded_probe_accuracy: 0.987  # 98.7%
    unscaffolded_probe_accuracy: 0.947  # 94.7%
    probe_gap: 0.04  # 4.0pp

    expected_gap_range: "[0.1, 0.2]"
    result: "Below range - minimal scaffolding effect on unsupervised"
    interpretation: "Scaffolding improves supervised detectability but doesn't create natural clusters"

# ============================================================================
# SUPERVISED-UNSUPERVISED GAP (KEY FINDING)
# ============================================================================

supervised_unsupervised_gap:
  supervised_performance: 0.796  # 79.6% probe accuracy
  unsupervised_performance: 0.0229  # 2.29% NMI
  gap: 0.773  # 77.3 percentage points

  best_case_gap:
    supervised: 1.00  # 100% probe accuracy (h-m-integrated embeddings)
    unsupervised: 0.0229
    gap: 0.977  # 97.7 percentage points

  interpretation: "Central finding - lifecycle separability is a supervised signal carrier, not unsupervised structure"

# ============================================================================
# MECHANISTIC ATTRIBUTION
# ============================================================================

mechanistic_attribution:
  primary_cause: "Severe class imbalance (11:1 ratio)"

  supporting_evidence:
    - "K-means cluster sizes (287:13) nearly match class balance (275:25) - trivial assignment"
    - "Repository variance correlates with class balance (UCI 14% RAI vs HF 5.3%)"
    - "Probe succeeds 77.8% RAI recall via learned weighting; K-means 52% (barely above chance)"

  alternative_explanations:
    - "Repository heterogeneity (UCI plain text vs HF templates)"
    - "Vocabulary variation (lexical baseline 0% recall)"
    - "Schema complexity effects"

  causal_status: "Correlational - controlled rebalancing experiments not performed"

