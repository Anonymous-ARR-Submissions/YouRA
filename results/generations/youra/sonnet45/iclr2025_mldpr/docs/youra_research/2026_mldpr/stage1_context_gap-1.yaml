gap_id: gap-1
gap_title: Cross-Repository Metadata Field Mapping
gap_description: Map metadata fields across HuggingFace, OpenML, and UCI to identify
  common fields for DQI construction. Each repository uses different metadata schemas
  - HuggingFace uses dataset cards with YAML frontmatter, OpenML uses RESTful API
  with quality metrics, UCI has heterogeneous web pages without standardized schema.
  This gap blocks DQI construction because we cannot build a Documentation Quality
  Index without knowing which metadata fields are common across repositories and how
  to map heterogeneous schemas.
