# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "Semantic clustering of unscaffolded metadata fields will achieve NMI > 0.6 for 2-tier lifecycle separation, exceeding strong baselines (permutation, topic model, lexical heuristic) by ≥0.15"
    test_method: "Unsupervised clustering on embeddings; compare NMI to 3 baseline methods on same unscaffolded dataset sample"
    success_criterion: "NMI(unsupervised) ≥ 0.6 AND [NMI(unsupervised) - max(NMI(baselines))] ≥ 0.15"
    falsification: "If NMI < 0.6 or improvement over baselines < 0.15, intrinsic signal claim fails"
  - id: "P2"
    primary: false
    statement: "Interface scaffolding amplifies but does not create lifecycle separability: 0.1 ≤ NMI(scaffolded) - NMI(unscaffolded) ≤ 0.2 after length/modality normalization"
    test_method: "Compare NMI for HF datasets WITH vs. WITHOUT Open Datasheet markup using length-normalized and modality-filtered embeddings"
    success_criterion: "Scaffolded-unscaffolded gap in range [0.1, 0.2] after normalization controls"
    falsification: "If gap > 0.2, separability is interface-induced; if gap < 0.05, scaffolding adds no value"
  - id: "P3"
    primary: false
    statement: "Lifecycle clustering improves cross-repository comparability: between-repository DQI variance decreases (p < 0.05) while within-repository dynamic range preserved (±10%)"
    test_method: "Identify analogous datasets across repos; compute DQI variance before/after clustering; correlate with external quality proxies"
    success_criterion: "σ²_between decreases significantly (p < 0.05), σ²_within stable (±10%), mapped DQI correlates with citation/update frequency"
    falsification: "If variance reduction occurs but external correlation fails, clustering compresses signal without improving construct validity"

