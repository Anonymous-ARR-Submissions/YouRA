# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "Datasheets for Datasets lifecycle categories (motivation, composition, collection, preprocessing, uses, distribution, maintenance) emerged from iterative pilot refinements at Microsoft, Google, IBM"
      status: "BUILD_ON"
      evidence: "Gebru et al. 2018 Methodology and Experiments sections document iterative feedback process"
    - claim: "Roman et al. 2023 Open Datasheets framework uses 2-tier structure (General Information vs. Responsible AI) validated through formative evaluations with dataset producers"
      status: "BUILD_ON"
      evidence: "Roman et al. 2023 Methodology describes multistage process with user feedback confirming functional tier separability"
    - claim: "HuggingFace Hub, OpenML, and UCI have heterogeneous metadata schemas without standardized cross-repository mapping"
      status: "BUILD_ON"
      evidence: "Phase 1 research established schema heterogeneity as primary gap"
    - claim: "Semantic embeddings can capture distributional signatures when documentation is structured"
      status: "PROVE_NEW"
      evidence: "Hypothesized mechanism requiring validation through linear separability probe and baseline comparisons"
  scope_reduction_percentage: 60
  phase2b_4_instructions: |
    Datasheets lifecycle structure and Roman's 2-tier validation are established empirical findings (BUILD_ON).
    Core validation focuses on proving embeddings capture intrinsic semantic structure (PROVE_NEW).
    Early falsification gates (baseline tests, linear probe) determine if distributional signatures exist.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-LifecycleSep-v1"
  confidence_level: 0.80
  core_hypothesis_statement: |
    Under cross-repository metadata field conditions (HuggingFace, OpenML, UCI),
    if metadata fields are embedded using semantic representations (field names + example values),
    then unsupervised clustering will recover lifecycle-stage functional separability at 2-tier granularity
    (General Information vs. Responsible AI per Roman et al. 2023) that exceeds strong baselines by ≥0.15 NMI,
    because lifecycle categories reflect cognitively natural documentation partitions that manifest as
    distributional regularities (lexical, normative, value-structural) in metadata text when documentation
    is sufficiently structured.
  alternative_hypothesis_h0: |
    There is no significant difference in Normalized Mutual Information (NMI) between semantic clustering
    and baseline methods (permutation, topic model, lexical heuristic) for recovering 2-tier lifecycle structure,
    or NMI on unscaffolded datasets does not exceed 0.6, indicating lifecycle separability is interface-induced
    rather than intrinsic to metadata semantics.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Embedding Method"
      type: "categorical"
      operationalization: "Field representation strategy"
      levels: ["names_only", "values_only", "combined", "combined_plus_structural"]
    - name: "Repository Scaffolding"
      type: "categorical"
      operationalization: "Presence of Open Datasheets structured interface"
      levels: ["scaffolded", "unscaffolded"]
    - name: "Repository Type"
      type: "categorical"
      operationalization: "Dataset source repository"
      levels: ["HuggingFace", "OpenML", "UCI"]
  dependent:
    - name: "Normalized Mutual Information (NMI)"
      type: "continuous"
      operationalization: "NMI between discovered clusters and lifecycle tier labels (General vs. RAI), range [0,1], higher = better separability"
      primary: true
    - name: "Adjusted Rand Index (ARI)"
      type: "continuous"
      operationalization: "Cluster stability under lexical perturbations, range [-1,1], higher = more robust"
      primary: false
    - name: "Cross-Repository DQI Variance Ratio"
      type: "continuous"
      operationalization: "Between-repository variance reduction for analogous datasets, ratio < 1 = improvement"
      primary: false
  controlled:
    - name: "Text Length"
      operationalization: "Length-normalized embeddings to control for verbosity artifacts"
    - name: "Modality Density"
      operationalization: "Modality-filtered embeddings to control for deontic language ('must', 'should')"
    - name: "Sample Size"
      operationalization: "Stratified sampling N=300 fields (150 HF [75 scaffolded, 75 unscaffolded], 100 OpenML, 50 UCI)"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 3
  steps:
    - step: 1
      description: "Lifecycle categories (Gebru's 7 stages mapped to Roman's 2 tiers) reflect cognitively natural partitions in documentation tasks, as evidenced by iterative pilot validations showing consistent user categorization behavior"
      evidence: "Gebru et al. 2018 pilot feedback led to enhanced question clarity; Roman et al. 2023 usability testing confirmed 2-tier structure works across diverse dataset producers"
      falsifier: "If inter-annotator agreement κ < 0.6 across repositories, lifecycle constructs lack operational stability"
    - step: 2
      description: "When documentation is sufficiently structured, lifecycle roles manifest as distributional signatures: lexical co-occurrence (procedural verbs for Collection, licensing terms for Distribution), normative modality (deontic language for RAI), and value-structural patterns (temporal markers for Maintenance)"
      evidence: "Roman's methodology shows RAI fields systematically encode normative constraints; Gebru's structured questions elicit specific information types"
      falsifier: "If linear probe accuracy < 0.75 on scaffolded data, distributional signatures are not linearly encoded"
    - step: 3
      description: "Semantic embeddings (sentence transformers) capture these distributional signatures as geometric structure, enabling unsupervised clustering to recover lifecycle tiers without explicit supervision"
      evidence: "Computational linguistics stance detection literature shows modal patterns emerge in embeddings"
      falsifier: "If NMI(embeddings) - NMI(baselines) < 0.15, embeddings do not improve over simple lexical/topic heuristics"
  key_tension: "Signal amplification vs. interface artifact: scaffolding may enhance intrinsic structure or induce stylistic homogenization"
  evidence_summary: |
    Mechanism grounded in empirical evidence from Gebru's organizational pilots (lifecycle categories emerged through refinement)
    and Roman's user validation (2-tier structure behaviorally discovered). Causal chain testable through three-tier falsification:
    Tier 1 (baseline comparisons), Tier 2 (stylistic controls + repository stratification), Tier 3 (external validity anchors).

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Lifecycle categories transfer across repositories despite contextual adaptation requirements noted by Gebru"
    supporting_evidence: "Roman's 2-tier structure worked across diverse dataset producers; hypothesis scope-limited to 2-tier (not full 7-stage granularity)"
    consequence_if_violated: "If κ_across < 0.6 but κ_within ≥ 0.7, lifecycle constructs are repository-specific → pivot to scoped claims for structured repos only"
  - id: "A2"
    assumption: "Distributional signatures exist in unscaffolded metadata (not solely interface-induced)"
    supporting_evidence: "Gebru's pilots refined questions that elicited consistent responses → suggests latent structure pre-exists scaffolding"
    consequence_if_violated: "If NMI(S) - NMI(U) > 0.2, separability is interface-dependent → signal amplification interpretation applies but intrinsic claim weakens"
  - id: "A3"
    assumption: "Semantic embeddings encode lifecycle role linearly (accessible to simple probes)"
    supporting_evidence: "Computational linguistics literature shows stance/modality features emerge in frozen embeddings"
    consequence_if_violated: "If linear probe < 0.75, pivot to normative geometry hypothesis (nonlinear encoding) or acknowledge embeddings insufficient"
  - id: "A4"
    assumption: "Length/modality normalization controls for stylistic artifacts without destroying semantic signal"
    supporting_evidence: "NLP literature shows length normalization preserves semantic content while removing surface biases"
    consequence_if_violated: "If normalized NMI collapses, amplification is stylistic not semantic → mechanism revision required"
  - id: "A5"
    assumption: "Cross-repository DQI variance reduction reflects improved comparability (not signal compression)"
    supporting_evidence: "External validity anchor (correlation with citation/update frequency) validates construct validity"
    consequence_if_violated: "If mapped DQI doesn't correlate with external proxies while within-repo variance decreases, clustering compresses signal → failed practical utility"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Metadata fields from repositories with some level of documentation structure (HuggingFace, OpenML)
    - 2-tier lifecycle granularity (General Information vs. Responsible AI) validated by Roman et al.
    - English-language metadata fields
    - Datasets with example values available for embedding
    - Proof-of-concept validation scope: N=300 stratified sample
  does_not_apply_to: |
    - Completely unstructured repositories lacking any metadata conventions (excluded from claims)
    - Fine-grained 7-stage Datasheet categorization (requires separate validation)
    - Non-English metadata (multilingual extension is future work)
    - Fields without example values (names-only ablation tests this boundary)
  known_limitations: |
    - 6-week proof-of-concept timeline limits sample size and repository coverage
    - Expert annotation (κ measurement) requires human effort (Week 3 bottleneck)
    - Causality in DQI-citation correlation is ambiguous (longitudinal design needed for directionality)
    - Repository stratification may reveal context-dependence (transforms into boundary condition discovery)

