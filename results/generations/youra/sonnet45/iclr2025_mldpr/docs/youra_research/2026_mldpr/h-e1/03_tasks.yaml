# Phase 3 Task Breakdown: H-E1
# Generated: 2026-03-18
# Hypothesis: Repository Heterogeneity in Documentation Completeness
# Type: EXISTENCE (Proof of Concept)
# Budget: LIGHT tier (15 tasks total: 8 logic + 7 config)

hypothesis_id: h-e1
phase: Phase 3
total_tasks: 15
epic_count: 7
logic_tasks: 8
config_tasks: 7

# Task Structure:
# - task_id: Unique identifier
# - epic_id: Epic task reference (A-1 through A-7)
# - type: logic | config
# - title: Brief task description
# - description: Detailed implementation guidance
# - dependencies: List of prerequisite task_ids
# - complexity: 1-5 (estimated effort)
# - acceptance_criteria: Completion validation

tasks:
  # ===== EPIC A-1: Setup & Dependencies (Complexity: 6) =====
  - task_id: L-1-1
    epic_id: A-1
    type: logic
    title: "Multi-repo collection logic"
    description: "Implement HuggingFace/OpenML/UCI API integration with stratified sampling logic"
    dependencies: []
    complexity: 3
    acceptance_criteria:
      - "DataCollector class with collect_huggingface(), collect_openml(), collect_uci() methods"
      - "Stratification logic balances modalities across repositories"
      - "Returns pd.DataFrame with [30, 4] schema"

  - task_id: C-1-1
    epic_id: A-1
    type: config
    title: "Directory structure and environment setup"
    description: "Create h-e1/ folder structure, install dependencies, configure API keys"
    dependencies: []
    complexity: 1
    acceptance_criteria:
      - "All 6 subdirectories created (data, results, figures, logs, cache, code)"
      - "requirements.txt with 11 packages installed"
      - "OPENAI_API_KEY environment variable configured"
      - "__init__.py created for Python package"

  # ===== EPIC A-2: Data Collection Pipeline (Complexity: 14) =====
  - task_id: C-2-1
    epic_id: A-2
    type: config
    title: "Data collection configuration"
    description: "Configure DataCollectionConfig dataclass with API settings and sample sizes"
    dependencies: [C-1-1]
    complexity: 2
    acceptance_criteria:
      - "DataCollectionConfig with n_huggingface=400, n_openml=400, n_uci=200"
      - "Modality distribution targets configured"
      - "API timeout, retry, and rate limit settings"
      - "random_seed=42 for reproducibility"

  # ===== EPIC A-3: MVR-BCS Scoring System (Complexity: 16) =====
  - task_id: L-3-1
    epic_id: A-3
    type: logic
    title: "CSV annotation workflow and validation"
    description: "Implement AnnotationProtocol with template generation, validation, and alignment"
    dependencies: [L-1-1]
    complexity: 3
    acceptance_criteria:
      - "generate_annotation_template() creates [30, 7] CSV"
      - "load_annotations() reads two coder files"
      - "validate_annotations() checks completeness"
      - "align_annotations() merges into [30, 13] format"

  - task_id: C-3-1
    epic_id: A-3
    type: config
    title: "MVR-BCS scoring configuration"
    description: "Configure MVRBCSConfig with weights, LLM settings, and field definitions"
    dependencies: [C-2-1]
    complexity: 2
    acceptance_criteria:
      - "structural_weight=0.6, semantic_weight=0.4"
      - "Required fields list configured (8 fields)"
      - "LLM model=gpt-4-turbo, temperature=0.0"
      - "Batch size and parallel request limits set"

  # ===== EPIC A-4: ICC Modeling (Complexity: 18) =====
  - task_id: L-4-1
    epic_id: A-4
    type: logic
    title: "Cohen's kappa bootstrap CI"
    description: "Implement bootstrap_confidence_interval() with 1000 iterations for kappa"
    dependencies: [L-3-1]
    complexity: 4
    acceptance_criteria:
      - "bootstrap_confidence_interval() returns (ci_lower, ci_upper)"
      - "1000 bootstrap iterations with resampling"
      - "Percentile-based 95% CI calculation"
      - "Uses random_seed=42 for reproducibility"

  - task_id: L-4-2
    epic_id: A-4
    type: logic
    title: "ICC mixed-effects modeling"
    description: "Implement fit_mixed_model() with statsmodels MixedLM for repository random effects"
    dependencies: [C-3-1]
    complexity: 5
    acceptance_criteria:
      - "MixedLM formula: mvr_bcs_score ~ 1 + C(modality)"
      - "Repository as random effect"
      - "REML estimation with convergence check"
      - "Extract variance components for ICC calculation"

  - task_id: C-4-1
    epic_id: A-4
    type: config
    title: "ICC statistical configuration"
    description: "Configure ICCConfig with model formula, thresholds, and bootstrap settings"
    dependencies: [C-3-1]
    complexity: 2
    acceptance_criteria:
      - "icc_threshold=0.10, ci_lower_threshold=0.05"
      - "bootstrap_iterations=1000, confidence_level=0.95"
      - "variance_ratio_threshold=1.0"
      - "Output paths for results and variance decomposition"

  # ===== EPIC A-5: LLM Validation Suite (Complexity: 12) =====
  - task_id: L-5-1
    epic_id: A-5
    type: logic
    title: "Gate evaluation and reporting"
    description: "Implement threshold checking, gate evaluation, and report formatting"
    dependencies: [L-4-1]
    complexity: 3
    acceptance_criteria:
      - "check_section_pass() validates kappa >= 0.60"
      - "evaluate_gate() counts passing sections (>= 5 required)"
      - "format_gate_report() generates human-readable PASS/FAIL"
      - "Identifies failing sections with kappa values"

  - task_id: C-5-1
    epic_id: A-5
    type: config
    title: "LLM validation configuration"
    description: "Configure LLMValidationConfig with F1 thresholds and validation set parameters"
    dependencies: [C-4-1]
    complexity: 2
    acceptance_criteria:
      - "n_samples_per_modality=100, test_split=0.1"
      - "f1_threshold=0.75, cross_modality_range_threshold=0.10"
      - "cv_folds=5 for cross-validation"
      - "Output paths for ground truth and results"

  # ===== EPIC A-6: Gate Logic & Orchestration (Complexity: 11) =====
  - task_id: L-6-1
    epic_id: A-6
    type: logic
    title: "ExperimentRunner orchestration"
    description: "Implement ExperimentRunner.run_full_pipeline() with checkpoint save/resume"
    dependencies: [L-4-2, L-5-1]
    complexity: 4
    acceptance_criteria:
      - "run_full_pipeline() sequences collection → scoring → ICC → validation → gate"
      - "Checkpoint saver stores intermediate results"
      - "Checkpoint loader resumes from last successful step"
      - "Error handler provides informative failure messages"

  - task_id: C-6-1
    epic_id: A-6
    type: config
    title: "Gate validation configuration"
    description: "Configure GateConfig with primary/secondary thresholds and failure modes"
    dependencies: [C-5-1]
    complexity: 2
    acceptance_criteria:
      - "Primary gate: icc_threshold=0.10, icc_ci_lower_threshold=0.05, variance_ratio_threshold=1.0"
      - "Secondary gate: llm_f1_threshold=0.75, llm_cross_modality_range=0.10"
      - "Failure modes: icc_abandon_threshold=0.05, modality_variance_pivot=0.40"
      - "Output path for gate_evaluation.json"

  # ===== EPIC A-7: Visualization & Reporting (Complexity: 9) =====
  - task_id: L-7-1
    epic_id: A-7
    type: logic
    title: "Kappa visualization suite"
    description: "Implement 4 figures: gate metrics, confusion matrices, agreement heatmap, baserate vs kappa"
    dependencies: [L-6-1]
    complexity: 3
    acceptance_criteria:
      - "Figure 1: Bar chart of kappa per section with threshold line"
      - "Figure 2: 6 confusion matrices in 2x3 grid"
      - "Figure 3: 30x6 heatmap of agreement (green=agree, red=disagree)"
      - "Figure 4: Scatter plot with trendline"

  - task_id: L-7-2
    epic_id: A-7
    type: logic
    title: "ICC visualization suite"
    description: "Implement 5 figures for validation report: gate metrics, variance decomposition, distributions, LLM performance"
    dependencies: [L-6-1]
    complexity: 3
    acceptance_criteria:
      - "Figure 1: Gate metrics bar chart (ICC, CI, variance ratio vs thresholds)"
      - "Figure 2: Variance decomposition pie chart (repository/modality/residual)"
      - "Figure 3: Repository distribution box plot"
      - "Figure 4: Modality distribution box plot"
      - "Figure 5: LLM F1/precision/recall grouped bar chart"

  - task_id: C-7-1
    epic_id: A-7
    type: config
    title: "Visualization configuration"
    description: "Configure VisualizationConfig with figure styling, colors, and output paths"
    dependencies: [C-6-1]
    complexity: 1
    acceptance_criteria:
      - "dpi=300, figure_format=png"
      - "Color scheme: gate_pass=green, gate_fail=red, observed=blue, target=red"
      - "Figure sizes configured (gate: 10x6, distribution: 12x6, variance: 8x8)"
      - "Output directory: h-e1/figures/"

# ===== Task Metadata Summary =====
metadata:
  total_complexity: 47
  average_complexity: 3.1
  high_complexity_tasks: ["L-4-2 (ICC modeling)", "L-6-1 (Orchestration)"]
  critical_path: ["C-1-1", "L-1-1", "C-2-1", "L-3-1", "C-3-1", "L-4-2", "L-6-1", "L-7-2"]
  parallelizable_groups:
    - ["L-4-1", "L-4-2"]  # Can run in parallel after L-3-1 and C-3-1
    - ["C-4-1", "C-5-1"]  # Config tasks can run in parallel
    - ["L-7-1", "L-7-2"]  # Visualization tasks can run in parallel

# ===== Archon Task Creation Order =====
archon_creation_order:
  - C-1-1  # Setup first
  - L-1-1  # Data collection logic
  - C-2-1  # Collection config
  - L-3-1  # Annotation protocol
  - C-3-1  # Scoring config
  - L-4-1  # Kappa bootstrap
  - L-4-2  # ICC modeling
  - C-4-1  # ICC config
  - L-5-1  # Gate evaluation
  - C-5-1  # LLM validation config
  - L-6-1  # Orchestration
  - C-6-1  # Gate config
  - L-7-1  # Kappa visualizations
  - L-7-2  # ICC visualizations
  - C-7-1  # Viz config
