  independent: "Embedding method (4 levels), Repository scaffolding (2 levels), Repository type (3 levels)"
  dependent_primary: "Normalized Mutual Information (NMI) for 2-tier lifecycle separation"
  controlled: "Text length, modality density, sample size"

