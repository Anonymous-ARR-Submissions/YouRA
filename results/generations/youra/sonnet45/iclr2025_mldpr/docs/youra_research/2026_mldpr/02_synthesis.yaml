hypothesis_draft:
  title: "Lifecycle-Stage Functional Separability in Cross-Repository Metadata"
  hypothesis_id: "H-LifecycleSep-v1"
  core_claim: |
    Unsupervised semantic clustering recovers lifecycle-stage functional separability at 2-tier granularity
    (General vs. RAI) across heterogeneous metadata repositories, exceeding baselines by ≥0.15 NMI,
    demonstrating lifecycle categories manifest as intrinsic distributional regularities.
  mechanism: |
    Lifecycle categories reflect cognitively natural partitions validated through Gebru's pilots and
    Roman's user testing. These partitions manifest as distributional signatures (lexical, normative,
    value-structural) that semantic embeddings capture geometrically, enabling unsupervised recovery.
  predictions:
    - P1: "NMI(unscaffolded) > 0.6 AND improvement over baselines ≥ 0.15"
    - P2: "0.1 ≤ NMI(scaffolded) - NMI(unscaffolded) ≤ 0.2 after normalization (signal amplification)"
    - P3: "σ²_between decreases (p<0.05), σ²_within stable (±10%), external correlation validated"

