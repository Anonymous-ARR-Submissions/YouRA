# ──────────────────────────────────────────────────────────────────────────────
# CRITICAL LIMITATIONS (Must be acknowledged in paper)
# ──────────────────────────────────────────────────────────────────────────────

critical_limitations:
  poc_simulation:
    description: "H-E1 validation used simulated performance data, not real model inference"
    impact: "Limits generalizability - Cohen's d=7.835 validates methodology works but not that real models exhibit this effect size"
    mitigation: "Requires full real-model inference (164 tasks × 30 samples × 4 models = 6,000 generations)"
    acknowledged_in: "Section 4 (Experiments), Section 6 (Discussion)"
    severity: "HIGH"
    fatal_flaw: false
    reason_acceptable: "POC validates methodology feasibility; real inference is planned future work"

  model_scale_confound:
    description: "Execution model (phi-2: 2.7B) vs preference model (codegen-350M: 350M) conflates alignment with capacity"
    impact: "M2 result (preference mechanism) is uninterpretable - cannot distinguish alignment effects from scale effects"
    mitigation: "Requires matched-scale comparisons (2B preference vs 2B execution)"
    acknowledged_in: "Section 6 (Discussion, Limitations)"
    severity: "HIGH"
    fatal_flaw: false
    reason_acceptable: "Execution mechanism (M1) validated independently; preference mechanism requires future validation"

  small_sample_size:
    description: "Only 3-4 models tested per alignment category (vs planned 6-8)"
    impact: "Reduced statistical power, wide confidence intervals"
    mitigation: "Scale to 10+ models per category in future work"
    acknowledged_in: "Section 6 (Discussion)"
    severity: "MEDIUM"
    fatal_flaw: false
    reason_acceptable: "Cohen's d=7.835 is large enough that even 50% reductions would exceed threshold"

  single_benchmark:
    description: "Only tested on HumanEval+ (function-level), not MBPP+ or BigCodeBench"
    impact: "Signature generalization across benchmarks unknown; P3 prediction untested"
    mitigation: "Extend to multiple benchmarks to test signature stability"
    acknowledged_in: "Section 6 (Discussion)"
    severity: "MEDIUM"
    fatal_flaw: false
    reason_acceptable: "HumanEval+ is standardized benchmark for controlled validation; cross-benchmark study is future work"

# ──────────────────────────────────────────────────────────────────────────────
# EXPERIMENTAL DESIGN DECISIONS
# ──────────────────────────────────────────────────────────────────────────────

design_decisions:
  three_dimensions:
    decision: "Measure correctness, complexity, and efficiency (3D space)"
    rationale: "Orthogonal quality aspects; objective measurement without human annotation; practitioner-relevant dimensions"
    alternatives_considered: "Could include readability/maintainability but requires subjective annotation"
    source: "Section 3 (Methodology)"

  cohens_d_threshold:
    decision: "Pre-registered threshold: Cohen's d > 1.5σ"
    rationale: "Conservative threshold ensuring detected signatures are robust, not marginal artifacts; 80%+ non-overlap between distributions"
    alternatives_considered: "Lower thresholds (d > 0.5) would detect weaker signatures but risk false positives"
    source: "Section 3 (Methodology)"

  humaneval_plus:
    decision: "Evaluate on HumanEval+ (164 function-level tasks)"
    rationale: "Standardization (widely used for alignment evaluation), extended test suites (80+ tests/task), function-level scope controls complexity confounds"
    alternatives_considered: "MBPP+, BigCodeBench, LiveCodeBench (cross-benchmark sensitivity is future work)"
    source: "Section 4 (Experiments)"

  temperature_sampling:
    decision: "Generate k=30 samples at temperature T=0.8"
    rationale: "Encourages diversity for clustering while maintaining syntactic validity; reduced from planned 60-80 for POC feasibility"
    alternatives_considered: "Lower temp (T<0.5) produces deterministic outputs reducing signature detectability; higher temp (T>1.0) increases errors"
    source: "Section 4 (Experiments)"

