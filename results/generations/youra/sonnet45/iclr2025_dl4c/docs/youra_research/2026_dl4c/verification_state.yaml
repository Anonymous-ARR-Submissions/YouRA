main_hypothesis:
  id: H-AlignmentSignatures-v1
  title: Alignment Method Objective Function Signatures
  statement: Under code generation evaluation conditions (Python function-level tasks,
    HumanEval+/MBPP+/BigCodeBench benchmarks, post-alignment models), if we measure
    model outputs across correctness, complexity, and efficiency dimensions, then
    models aligned with different feedback signal types (execution-based vs preference-based)
    will exhibit statistically distinguishable performance profiles ('objective function
    signatures') with intercluster distance > 1.5σ, because feedback signals during
    alignment act as implicit objective functions that shape output distributions
    toward optimizing whatever the feedback measures.
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: HumanEval+
    model: 6-8 Python code generation models
