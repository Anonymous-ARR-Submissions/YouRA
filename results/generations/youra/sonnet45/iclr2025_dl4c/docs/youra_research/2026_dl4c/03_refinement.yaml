      evidence: "SelfCodeAlign (Wei et al., 2024, arXiv:2410.24198) - documented performance differences exist"

    - claim: "Current benchmarks have measurement issues (contamination in LiveCodeBench, real-world mismatch in NaturalCodeBench)"
      status: "BUILD_ON"
      evidence: "LiveCodeBench (Jain et al., 2024, 1200 cit) and NaturalCodeBench (Zhang et al., 2024, arXiv:2405.04520)"

    - claim: "Alignment methods have statistically detectable objective function signatures in multi-dimensional space"
      status: "PROVE_NEW"
