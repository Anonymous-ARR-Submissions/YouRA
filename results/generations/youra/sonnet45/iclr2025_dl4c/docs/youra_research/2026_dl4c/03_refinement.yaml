    name: "HumanEval+"
    type: "standard"
    source: "EvalPlus (open-source benchmark suite)"
    path: "https://github.com/evalplus/evalplus"
    hypothesis_fit: "HumanEval+ provides 164 function-level Python programming tasks with test suites, enabling controlled pass@k measurement. Extended test suite (HumanEval+) reduces test case variance compared to original HumanEval. Task distribution suitable for clustering analysis with 60-80 samples per model."

  model:
    name: "6-8 Python code generation models"
    type: "Open-source LLMs accessible via HuggingFace"
    source: "HuggingFace Model Hub"
    hypothesis_fit: |
      Model selection criteria:
      - Execution-focused (2-3 models): SelfCodeAlign-7B, StepCoder, CodeLlama-Python-7B-Instruct
      - Preference-focused (2-3 models): Models trained with DPO/RLAIF (if publicly available)
      - Baselines (1-2 models): CodeLlama-7B-Base, StarCoder-Base
      All models share Python language, varying alignment methods. Llama-3-8B family preferred for base model consistency when available.

  baselines:
    - name: "CodeLlama-7B-Base"
      method: "Unaligned base model (no post-training alignment)"
      performance: "~30% pass@1 on HumanEval (from literature)"
      why_comparison: "Establishes lower bound for unaligned performance, tests whether alignment (any type) improves over baseline"

    - name: "SelfCodeAlign-7B"
      method: "Execution-focused RLHF (test pass/fail signals)"
      performance: "67.1% pass@1 on HumanEval+ (published)"
      why_comparison: "Exemplar of execution-based alignment, should dominate correctness dimension if P2 holds"

    - name: "PrefGen-style DPO (if available)"
      method: "Preference-based DPO (multi-objective)"
      performance: "Balanced across Pass@k + Gas@k + Secure@k (smart contracts)"
      why_comparison: "Exemplar of preference-based alignment, should show balanced performance if P2 holds"

