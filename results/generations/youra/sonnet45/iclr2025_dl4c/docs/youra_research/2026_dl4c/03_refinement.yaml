# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-AlignmentSignatures-v1"
  confidence_level: 0.80
  core_hypothesis_statement: |
    Under code generation evaluation conditions (Python function-level tasks, HumanEval+/MBPP+/BigCodeBench benchmarks,
    post-alignment models), if we measure model outputs across correctness, complexity, and efficiency dimensions,
    then models aligned with different feedback signal types (execution-based vs preference-based) will exhibit
    statistically distinguishable performance profiles ("objective function signatures") with intercluster distance > 1.5σ,
    because feedback signals during alignment act as implicit objective functions that shape output distributions
    toward optimizing whatever the feedback measures.

  alternative_hypothesis_h0: |
    There is no significant difference in multi-dimensional performance profiles (correctness, complexity, efficiency)
    between models aligned with execution-based methods, preference-based methods, and unaligned baselines.
    All models produce statistically indistinguishable output distributions (intercluster distance < 1.5σ).

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Alignment Method Type"
      type: "categorical"
      operationalization: "Classification based on training feedback signal type documented in model papers"
      levels:
        - "execution-based (test pass/fail signals: SelfCodeAlign, StepCoder)"
        - "preference-based (human/AI preference pairs: PrefGen-style DPO)"
        - "unaligned baseline (no specialized alignment: CodeLlama-Base, StarCoder-Base)"

    - name: "Feedback Signal Structure"
      type: "categorical"
      operationalization: "Type of feedback used during alignment training"
      levels:
        - "binary (pass/fail)"
        - "scalar (reward value)"
        - "comparative (preference pairs)"
        - "rubric-based (multi-criteria AI evaluation)"

  dependent:
    - name: "Correctness Signature"
      type: "continuous"
      operationalization: "pass@k score on HumanEval+ test suite (k=1,10,100), range [0,1], unit: proportion"
      primary: true

    - name: "Complexity Signature"
      type: "continuous"
      operationalization: "Cyclomatic complexity (McCabe metric via radon tool), AST depth (lizard tool), token count, normalized per model"
      primary: false

    - name: "Efficiency Signature"
      type: "continuous"
      operationalization: "Runtime (seconds via cProfile), peak memory (MB via memory_profiler), normalized per task"
      primary: false

    - name: "Intercluster Distance"
      type: "continuous"
      operationalization: "Euclidean distance between alignment method group centroids in [correctness, complexity, efficiency] 3D space, normalized by intracluster variance (Cohen's d)"
      primary: true

  controlled:
    - name: "Programming Language"
      operationalization: "Python only - eliminates language-specific complexity confounds"

    - name: "Task Distribution"
      operationalization: "HumanEval+ task set (164 function-level problems) for all measurements"

    - name: "Sample Size Per Model"
      operationalization: "60-80 code samples per model (temperature 0.8 sampling) for adequate statistical power"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 3
  steps:
    - step: 1
      description: "Feedback signal selection during alignment defines implicit objective function - execution-based methods (test pass/fail) implicitly optimize for correctness; preference-based methods (human/AI comparisons) implicitly optimize for balanced quality matching preference criteria"
      evidence: "SelfCodeAlign uses execution RLHF (67.1 pass@1 HumanEval+), PrefGen uses preference DPO (balanced Pass@k + Gas@k + Secure@k). Feedback signal theory: model learns to optimize whatever feedback measures (Exchange 9)"
      falsifier: "If execution-focused models do not show correctness dominance (fail to rank top 15% on pass@k), feedback signal theory fails"

    - step: 2
      description: "Repeated exposure to feedback signal during training (thousands of steps) shapes model's learned distribution - execution feedback reinforces correct outputs, preference feedback reinforces preferred outputs, creating divergent optimization paths"
      evidence: "SelfCodeAlign paper documents iterative RLHF training. PrefGen shows DPO converges to preference distribution. Training dynamics create learned biases (Exchange 7 - implicit bias theory)"
      falsifier: "If models trained with same feedback signal type do not cluster together (intracluster variance > intercluster distance), training does not consistently shape distributions"

    - step: 3
      description: "Divergent learned distributions manifest as statistically detectable performance profiles ('objective function signatures') when measured across multiple dimensions - execution-optimized models cluster in high-correctness region, preference-optimized models cluster in balanced-performance region"
      evidence: "PCA clustering analysis on [correctness, complexity, efficiency] vectors. Exchange 8 - Prof. Vera's Prediction 1 specifies distance > 1.5-2.5σ as detectable clustering"
      falsifier: "If clustering analysis shows distance < 1.5σ OR language confounds dominate alignment method grouping, signatures are not detectable or are artifacts of other factors"

  key_tension: "Causality vs correlation challenge - with public data only, we cannot perfectly control training data and checkpoint confounds. We observe clustering and infer causal mechanism from feedback signal theory, but alternative explanations (data differences) remain possible without controlled experiments"

  evidence_summary: |
    Mechanistic evidence combines theoretical grounding (feedback signals as implicit objectives, Exchange 9),
    empirical precedent (SelfCodeAlign execution focus, PrefGen multi-objective balance, Exchange 2-3),
    and statistical validation plan (clustering with Cohen's d effect size, Exchange 14).
    The three-step causal chain links alignment method choice → training dynamics → observable output signatures.
    Falsification criteria specified for each step ensure rigor.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Proxy validity: Code complexity metrics (cyclomatic complexity, AST depth) and efficiency metrics (runtime, memory) correlate sufficiently with 'code quality' to serve as objective dimensions"
    supporting_evidence: "Complexity metrics established in software engineering for human code (Halstead, McCabe). Efficiency metrics directly measurable. Exchange 5 - Dr. Ally proposes objective proxies instead of subjective rubrics"
    consequence_if_violated: "Quality dimension collapses to noise, clustering may only reflect correctness vs efficiency (2D not 3D). Mitigation: Validate proxies on small human-annotated sample (50-100 samples)"

  - id: "A2"
    assumption: "Feedback signal theory: Models learn to optimize whatever their training feedback measures, creating persistent biases in output distributions"
    supporting_evidence: "Implicit bias theory in ML optimization (SGD, Adam have inductive biases). Exchange 9 - Dr. Sage mechanistic link: feedback signals define objectives. SelfCodeAlign/PrefGen demonstrate feedback-dependent outcomes"
    consequence_if_violated: "Clustering could be due to base model differences or data confounds rather than alignment method. Causal claims weakened to correlational. Mitigation: Between-method variance >> within-model variance comparison"

  - id: "A3"
    assumption: "Public benchmark data provides sufficient signal: Leaderboard scores + targeted model inference (60-80 samples per model) capture alignment method signatures without access to full training data"
    supporting_evidence: "Phase 1 estimates 64-85 GPU hours feasible. Exchange 10 - Prof. Pax validates resource requirements. Literature shows pass@k differences detectable with N=50-100 samples (HumanEval+ papers)"
    consequence_if_violated: "Insufficient statistical power, clustering not detectable. Mitigation: Phase 1 (leaderboard analysis) verifies benchmark overlap before GPU commitment"

  - id: "A4"
    assumption: "Within-language controls eliminate confounds: Restricting to Python-only models removes language-specific complexity patterns that could dominate alignment method effects"
    supporting_evidence: "Exchange 12 - Prof. Rex requires within-language comparison. PrefGen (Solidity) vs StepCoder (Python) language difference could confound clustering"
    consequence_if_violated: "Language patterns dominate alignment signals, clusters reflect Python vs Solidity not execution vs preference. Mitigation: Require 3+ Python models per alignment method group"

  - id: "A5"
    assumption: "Benchmark sensitivity differences exist: HumanEval/MBPP emphasize similar objectives (function-level correctness), BigCodeBench emphasizes different objectives (repository-level complexity)"
    supporting_evidence: "NaturalCodeBench paper shows 80% HumanEval → 20% real-world mismatch. Exchange 15 - benchmarks vary in what they measure. Task characteristics differ (function vs repo-level)"
    consequence_if_violated: "All benchmarks measure identical objectives (uniform high correlation r > 0.85), no differential sensitivity exists. Hypothesis H3 fails but H1-H2 can still succeed"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Python code generation models (function-level tasks)
    - Post-alignment evaluation (not training-time analysis)
    - Models accessible via HuggingFace (SelfCodeAlign, CodeLlama, StarCoder families)
    - Standard benchmarks: HumanEval+, MBPP+, BigCodeBench
    - Three objective dimensions: correctness (pass@k), complexity (cyclomatic/AST), efficiency (runtime/memory)
    - Alignment methods with documented feedback signals (execution-based, preference-based, unaligned baselines)

  does_not_apply_to: |
    - Non-Python languages (Solidity, Java, C++ - language confounds uncontrolled)
    - Training-time dynamics (gradient analysis, loss curves - requires training data access)
    - Subjective quality dimensions (code elegance, style preferences - requires human annotation)
    - Repository-level tasks (focus on function-level for controlled comparison)
    - Proprietary/closed models (GPT-4, Claude - no public access for measurement)
    - Alignment methods without documented feedback types (unknown optimization objectives)

  known_limitations: |
    - Causality limited by public data constraints: Cannot perfectly control training data, checkpoint selection, or hyperparameters. Causal claims supported by theory + correlation, not controlled experiments.
    - Proxy validity assumptions: Complexity/efficiency metrics are proxies for quality, not direct measurements. Validation on human-annotated sample recommended but not required.
    - Sample size constraints: 60-80 samples per model balances statistical power (0.80 for Cohen's d=0.5) with GPU budget (64-85 hours). Larger samples would increase power but exceed resources.
    - Benchmark overlap dependency: Prediction 3 (benchmark sensitivity) requires 15+ models with overlapping leaderboard data. If overlap insufficient, H3 cannot be tested (H1-H2 remain valid).
    - Language restriction: Python-only analysis limits generalizability to other languages. Future work needed for cross-language validation.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "Alignment Method Clustering: Models cluster in [correctness, complexity, efficiency] 3D space according to alignment method type, with intercluster distance exceeding intracluster variance"
    test_method: "PCA on signature vectors (N=480-640 samples across 6-8 models), k-means clustering with k=3 (execution/preference/baseline), compute Cohen's d effect size for intercluster vs intracluster distance"
    success_criterion: "Strong success: Cohen's d > 2.5σ (intercluster distance > 2.5× intracluster SD). Moderate success: 1.5σ < d < 2.5σ. Null/Fail: d < 1.5σ"
    falsification: "If d < 1.5σ OR if language confounds dominate (Python vs Solidity clustering stronger than alignment method clustering), hypothesis rejected - alignment methods do not produce detectable signatures"

  - id: "P2"
    primary: false
    statement: "Objective-Specific Dominance: Execution-focused models (SelfCodeAlign, StepCoder) rank top 15% for correctness, preference-focused models rank top 30% across all dimensions (balanced), baselines below 50th percentile for correctness"
    test_method: "Rank all models independently on each dimension (correctness, complexity, efficiency). Compute percentile rankings per alignment method group. Statistical test: Mann-Whitney U for group differences"
    success_criterion: "Execution models: mean correctness rank ≤ 15th percentile. Preference models: mean rank ≤ 30th percentile across all three dimensions. Baselines: mean correctness rank ≥ 50th percentile"
    falsification: "If execution models do not show correctness dominance (rank > 20th percentile) OR preference models show imbalanced performance (one dimension > 50th percentile), objective-specific optimization not evident"

  - id: "P3"
    primary: false
    statement: "Differential Benchmark Sensitivity: HumanEval-MBPP correlation significantly higher than HumanEval-BigCodeBench correlation, indicating benchmarks measure different objective dimensions"
    test_method: "Collect 15-20 models with overlapping leaderboard data. Compute Spearman rank correlation: r_HM = corr(HumanEval, MBPP), r_HB = corr(HumanEval, BigCodeBench). Test difference: r_HM - r_HB"
    success_criterion: "Strong: r_HM - r_HB > 0.20 AND r_HB < 0.70 (moderate decorrelation). Weak: 0.15 < difference < 0.20. Null/Fail: difference < 0.15 OR all correlations > 0.85 (uniform measurement)"
    falsification: "If all benchmark pairs show r > 0.85 (uniform high correlation), benchmarks measure identical objectives - no differential sensitivity exists"

