# SECTION 3: Novelty & Innovation
# ═══════════════════════════════════════════════════════════════

novelty:
  preserved_novelty: "Reverse-engineering implicit objectives from model outputs - first systematic characterization of alignment method 'objective function signatures' via post-hoc analysis"

  key_innovation: |
    Three-fold innovation:
    1. Objective inference direction: Prior work demonstrates multi-objective TRAINING (forward: objective → model).
       We demonstrate objective INFERENCE (reverse: model outputs → inferred objective).
    2. Evaluation ontology framework: Systematic three-way mapping between alignment methods, objective dimensions,
       and benchmark sensitivities - positions work as foundational infrastructure.
    3. Benchmark diagnostic methodology: Validation framework for which benchmarks measure which objectives,
       addressing evaluation crisis identified by NaturalCodeBench and LiveCodeBench.

  differentiation:
    - prior_work: "PrefGen, SIPO - Multi-objective optimization during training"
      difference: "We focus on multi-dimensional evaluation AFTER training. Complementary: they show how to train for multiple objectives, we show how to infer which objectives were optimized post-hoc"

    - prior_work: "NaturalCodeBench, LiveCodeBench - Benchmark criticism (identify problems)"
      difference: "We provide diagnostic framework (characterize what benchmarks measure). They identify evaluation is broken, we provide tools to validate benchmark sensitivity"

    - prior_work: "RL Techniques Survey - Catalog alignment methods"
      difference: "We empirically characterize implicit objectives of methods. They document method existence, we reveal what methods actually optimize for through output analysis"

    - prior_work: "Implicit bias theory in optimization (SGD, Adam)"
      difference: "We extend implicit bias concept to alignment methods - feedback signals as implicit objectives. First application of implicit bias framework to post-training alignment"

