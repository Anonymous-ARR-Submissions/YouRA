measurement_plan:
  data_collection:
    - source: "Public leaderboards (HumanEval+, MBPP+, BigCodeBench) for 15-20 models with overlap"
    - source: "Model inference on HuggingFace: 60-80 code samples per model (6-8 models), temperature 0.8"
    - source: "Static analysis tools: radon (cyclomatic complexity), lizard (AST depth), wc (token count)"
    - source: "Profiling tools: memory_profiler (peak memory MB), cProfile (runtime seconds)"

  procedure:
    - step: "Phase 1 (Leaderboard Analysis, 0 GPU hrs): Collect rankings, compute Spearman correlations, verify 15+ model overlap"
    - step: "Phase 2 (Targeted Inference, 64-85 GPU hrs): Generate code (60-80 samples/model), measure pass@k + complexity + efficiency"
    - step: "Phase 3 (Statistical Analysis, 0 GPU hrs): PCA clustering, k-means (k=3), Cohen's d computation, ranking analysis"

  success_criteria:
    - "Strong success: P1 Cohen's d > 2.5σ + P2 dominance patterns + P3 correlation difference > 0.20 → Top-tier venue"
    - "Moderate success: P1 Cohen's d 1.5-2.5σ + partial P2 + P3 holds → Second-tier venue with caveats"
    - "Failure: P1 d < 1.5σ OR P2 dominance absent OR P3 uniform r > 0.85 → Hypothesis rejected"

validation:
  internal_validity:
    - "Within-language controls (Python only) eliminate language confounds"
    - "Between-method variance >> within-model variance comparison controls for sampling diversity"
    - "Statistical power: N=480-640 samples, power=0.80 for Cohen's d=0.5"
    - "Effect size thresholds specified: strong (2.5σ), moderate (1.5-2.5σ), null (<1.5σ)"

  external_validity:
    - "HumanEval+ task distribution represents function-level programming (limited to this scope)"
    - "Python-only analysis limits generalizability to other languages (acknowledged scope restriction)"
    - "Public models only (no proprietary GPT-4/Claude evaluation)"
    - "Function-level tasks only (repository-level tasks out of scope)"

