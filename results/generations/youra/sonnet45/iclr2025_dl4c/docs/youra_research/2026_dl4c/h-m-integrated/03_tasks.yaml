    title: "Implement Percentile Ranking Analyzer"
    description: |
      Implement PercentileRankingAnalyzer to compute percentile ranks for all dimensions.

      Key functionality:
      - Compute percentile rank for each model in each dimension
      - Use scipy.stats.percentileofscore
      - Output format: {model: {correctness: rank, cyclomatic: rank, ...}}
      - Handle edge cases (tied scores, single model)
    feature_tag: "evaluation"
    priority: 98
