    title: "Implement Variance Analyzer"
    description: |
      Implement VarianceAnalyzer to compute intra/inter variance by alignment method.

      Key functionality:
      - Group models by alignment method (execution, preference, baseline)
      - Compute within-group variance (intracluster)
      - Compute between-group variance (intercluster)
      - Statistical comparison (Mann-Whitney U test)
    feature_tag: "evaluation"
    priority: 97
