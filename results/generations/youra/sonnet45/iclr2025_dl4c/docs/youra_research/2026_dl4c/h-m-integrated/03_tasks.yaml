  - id: "task-005"
    epic: "Statistical Tests"
    title: "Implement M1, M2, M3 Hypothesis Tests"
    description: |
      Implement MechanismTester for all three mechanism hypotheses.

      M1: Execution models dominate correctness (top 15% rank)
      - Test: mean(execution_correctness_ranks) ≤ 15.0

      M2: Preference models show balanced performance (top 30% across all)
      - Test: mean(preference_all_dimension_ranks) ≤ 30.0

      M3: Training dynamics create consistent within-method clustering
      - Test: mannwhitneyu(execution_scores, baseline_scores) → p < 0.05

      Use scipy.stats for all statistical operations.
    feature_tag: "evaluation"
    priority: 96
    source_document: "03_architecture.md"
    complexity: 13
    test_requirements: |
