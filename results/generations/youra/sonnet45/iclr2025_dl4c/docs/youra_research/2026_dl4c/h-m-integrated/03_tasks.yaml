    description: |
      Implement H_E1_ResultsLoader to load and parse H-E1 signatures.csv.

      Key functionality:
      - Load signatures.csv from h-e1/results/
      - Parse alignment types (execution, preference, baseline)
      - Validate data schema (4 models × 5 dimensions)
      - Return structured data dictionary

      Data format:
      {model: str, alignment_type: str, correctness: float, cyclomatic: int,
       ast_depth: int, runtime_ms: float, memory_kb: float}
    feature_tag: "data-pipeline"
