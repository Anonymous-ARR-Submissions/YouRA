# LIMITATIONS — MUST BE HONESTLY DISCLOSED
# ============================================================================

required_limitations:
  L1:
    id: PPO_UNAVAILABLE
    description: "PPO model pairs unavailable — comparison is DPO vs SFT, not DPO vs PPO as originally designed"
    root_cause: "tulu-2-ppo-7b returned HTTP 404 from HuggingFace; reciprocate/ppo_hh_pythia-1B tokenizer incompatibility"
    impact: "P2 and P3 predictions cannot be tested; all method comparisons use DPO vs SFT"
    must_appear_in_paper: true
    acceptable_framing: "Due to limited availability of publicly released PPO-aligned model variants, we compare DPO to SFT-aligned models"

  L2:
    id: H_M2_NULL_RESULT
    description: "DPO does not show higher mean logit delta variance in low-confidence regions (Q1) compared to SFT — direction reversed"
    root_cause: "DPO's log-ratio gradient highest where log-probability differences are large (high-margin items), not low-margin items"
    impact: "Step 3 of causal mechanism (DPO amplifies low-margin) not supported in predicted direction"
    must_appear_in_paper: true
    acceptable_framing: "Contrary to our initial prediction, DPO does not concentrate perturbations in low-confidence regions; instead, we discover confidence-dependent amplification"

  L3:
    id: H_M3_H_M4_NOT_EXECUTED
    description: "H-M3 (margin×method interaction β₃) and H-M4 (cosine projection) were not executed"
    impact: "P2 β₃ interaction term and P3 cosine projection remain inconclusive"
    must_appear_in_paper: true

  L4:
    id: SINGLE_STRONG_PAIR
    description: "Primary evidence (AUROC=0.867–0.909) from one model pair (tulu-2-7b DPO); SFT pair shows weaker signal (AUROC=0.609)"
    impact: "Scale range 1.4B–7B not fully supported; only 7B DPO confirmed at AUROC≥0.75"
    must_appear_in_paper: true

  L5:
    id: MCQ_ONLY
    description: "All experiments on 4-option MCQ benchmarks; free-form generation not tested"
    impact: "Generalization to free-form generation requires empirical validation"
    must_appear_in_paper: true

