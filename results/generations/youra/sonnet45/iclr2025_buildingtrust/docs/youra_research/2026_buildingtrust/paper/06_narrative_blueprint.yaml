# SECTION-LEVEL NARRATIVE GOALS
# ============================================================================

section_goals:
  abstract:
    narrative_purpose: "Compress full story: surprising predictor + geometric mechanism + honest null result"
    key_message: "Base model margin predicts post-alignment argmax flip AUROC=0.91 cross-benchmark"
    must_include:
      - "AUROC numbers (0.867-0.909)"
      - "Non-isotropy finding (2.9-4.6×)"
      - "DPO confidence-dependent amplification (novel)"
      - "Scope limitation (DPO/SFT, 7B, MCQ)"

  introduction:
    narrative_purpose: "Hook (surprising predictor) → Problem (alignment unpredictable) → Insight (geometry encodes vulnerability) → Preview (3 findings)"
    hook_strategy: "surprising_statistic: AUROC=0.91 before alignment even runs"
    opening_paragraph: >
      Lead with the surprising capability, not with 'alignment is important'. Frame as:
      'You can already see which questions will change their answer — before alignment runs.'
    transitions:
      to_related_work: >
        'While prior work studies what alignment does in aggregate, we ask what the base
        model's geometry already predicts about per-item alignment vulnerability.'
    contributions_framing: >
      Present contributions as a story: (1) existence proof (margin predicts flip),
      (2) mechanistic support (non-isotropy explains why), (3) novel behavioral finding
      (DPO confidence-dependent pattern). NOT as a bullet list of technical claims.

  related_work:
    narrative_purpose: >
      Position gap: existing work measures alignment effects post-hoc; we predict
      alignment vulnerability pre-alignment from base model geometry.
    positioning_strategy: "extend (not compete) with Plaut et al., Fan et al., Li et al."
    key_sections:
      - "LLM calibration and alignment effects (Li et al. 2024, Xu et al. 2024)"
      - "Pre-alignment predictors of post-alignment behavior (Fan et al. 2026, Plaut et al. 2024)"
      - "Geometric analysis of alignment (connect to but go beyond Li et al. axis-specific findings)"
    closing_sentence: >
      'Despite this progress, no work has studied whether the base model's confidence geometry
      predicts per-item alignment instability — our contribution fills this gap.'

  methodology:
    narrative_purpose: >
      WHY this design tests the specific claim: margin as geometric distance to decision boundary.
      Show the causal chain: base model logit extraction → margin computation → logistic regression → cross-benchmark AUROC.
    connection_to_insight: >
      The methodology follows directly from the geometric insight: if margin = distance to boundary,
      then logistic regression with margin as sole predictor should show strong negative coefficient
      and high AUROC. Cross-benchmark evaluation without retraining tests domain-generality of the geometric signal.
    key_design_decisions:
      - "z-scoring margin within model (not raw log-probability) — why: controls for model-specific scale"
      - "mixed-effects logistic regression — why: accounts for benchmark heterogeneity"
      - "AUROC as primary metric — why: threshold-free evaluation of discrimination"
      - "η² effect size — why: magnitude beyond statistical significance"
      - "Eigendecomposition of logit delta covariance — why: quantifies geometric structure without assuming shape"
      - "Quintile stratification for DPO vs SFT comparison — why: reveals confidence-dependent patterns"

  experiments:
    narrative_purpose: >
      Design that tests the SPECIFIC claims, not just 'we evaluated on benchmarks'. Show
      that each experimental design decision follows from the hypothesis.
    experimental_questions:
      - "Q1 (H-E1): Does margin predict argmax flip? (logistic regression + AUROC)"
      - "Q2 (H-M1): Are alignment perturbations non-isotropic? (eigendecomposition)"
      - "Q3 (H-M2): Does DPO concentrate perturbations in low-margin regions? (quintile analysis)"
    datasets_with_rationale: >
      MMLU (14K items, broad domain coverage for training the predictor), TruthfulQA (safety-focused,
      tests domain transfer), ARC-Challenge (reasoning-focused, tests domain transfer). Three
      benchmarks allow cross-benchmark generalization analysis — key to ruling out benchmark artifacts.
    baselines_with_rationale: >
      Isotropic Gaussian control (ratio≈1.13) for H-M1 to confirm non-isotropy test is valid;
      SFT-aligned model as method comparison for H-M2 (DPO vs SFT behavioral asymmetry).

  results:
    narrative_purpose: >
      Tell the evidence story in three acts: (1) strong existence proof, (2) mechanistic
      support, (3) unexpected but interpretable behavioral finding. Present numbers as
      story beats, not tables of statistics.
    main_result_highlight: >
      'Margin trained on MMLU predicts alignment-induced argmax flip on ARC-Challenge
      with AUROC=0.909 — without any domain adaptation.'
    results_story_structure:
      act1: "Existence confirmed (H-E1): β₁=-4.33, AUROC=0.867-0.909, η²=0.289"
      act2: "Mechanism confirmed (H-M1): anisotropy 2.9-4.6×, isotropic control=1.13"
      act3: "Unexpected finding (H-M2): DPO amplifies high-confidence items, not low — novel behavioral signature"
    honest_null_result: >
      Present H-M2 direction reversal as a genuine finding, not a failure. The DPO
      quintile trend IS the result — it reframes the mechanism while leaving P1 intact.

  discussion:
    narrative_purpose: "Interpret the three results together, acknowledge scope, connect to implications"
    key_findings_interpretation: >
      (1) Why does margin work as a predictor? — geometric distance to boundary argument
      (2) What does non-isotropy mean for alignment theory? — alignment is structured, not random
      (3) What does DPO high-confidence amplification mean? — DPO reinforces confident decisions,
      not borderline ones; implication for DPO alignment dynamics
    honest_limitations:
      - "PPO models unavailable — DPO vs SFT comparison only"
      - "Primary evidence from one model pair (tulu-2-7b DPO) — scale generalization open"
      - "H-M3/H-M4 not executed — interaction term and cosine projection untested"
      - "MCQ-specific — generalization to free-form generation unknown"
    framing_guidance: >
      Present limitations as principled scope conditions, not failures. Each limitation
      identifies a specific future experiment with low execution cost (especially H-M4).

  conclusion:
    narrative_purpose: "Callback to hook, future vision, key message reinforce"
    callback_to_hook: >
      Return to the opening: 'The answer to the question we posed at the outset is yes —
      before alignment runs, the base model already encodes which questions will be
      geometrically vulnerable to boundary restructuring.'
    future_work_vision: >
      The near-term vision: a pre-deployment alignment audit tool that flags low-margin
      items as alignment-fragile, enabling responsible deployment of RLHF-aligned models.
    key_messages_to_reinforce:
      - "AUROC=0.909 cross-benchmark without retraining"
      - "Alignment perturbations are geometrically structured"
      - "Base model geometry informs post-alignment reliability"

