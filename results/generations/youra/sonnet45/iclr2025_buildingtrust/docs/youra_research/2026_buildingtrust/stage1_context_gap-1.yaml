gap_id: "gap-1"
gap_title: "No Systematic Study of H2 Boundary-Shift Severity as Predictable Function of Pre-Alignment Model Properties"
gap_description: |
  H2 existence established (h-m3): boundary shift / answer-switching dominates (8/9 model pairs).
  No study predicts H2 severity from pre-alignment model properties (entropy, near-boundary confidence).
  Missing: systematic measurement of H2 magnitude correlated with pre-alignment entropy statistics,
  across multiple base+aligned model pairs at scales 1.4B/6.9B/13B, on MMLU/TruthfulQA/ARC.
