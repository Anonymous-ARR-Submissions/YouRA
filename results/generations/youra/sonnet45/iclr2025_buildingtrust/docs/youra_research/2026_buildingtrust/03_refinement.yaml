  dataset:
    name: "MMLU (primary) + TruthfulQA + ARC-Challenge (cross-benchmark validation)"
    type: "standard"
    source: "HuggingFace datasets: cais/mmlu, truthful_qa, allenai/ai2_arc"
    path: "Loaded via lm-evaluation-harness --tasks mmlu,truthfulqa_mc1,arc_challenge"
    hypothesis_fit: "MMLU provides 57 subject categories with ~14K items enabling category-level analysis; TruthfulQA tests alignment-sensitive (truthfulness) knowledge; ARC tests factual MCQ. Together they cover factual, reasoning, and safety-relevant MCQ types."
  model:
    name: "Pythia-1.4B/6.9B base + aligned variants; Llama-7B base + aligned variants"
    type: "decoder-only transformer"
    source: "EleutherAI/pythia-{1.4b,6.9b} on HuggingFace Hub; allenai/tulu-2-base + tulu-2-dpo-7b + tulu-2-ppo-7b; meta-llama/Llama-2-7b-hf + its aligned variants"
    hypothesis_fit: "Matched base→aligned pairs with documented alignment method (PPO vs DPO). Pythia family provides scale variation. Tulu-2 provides matched PPO/DPO pair from same base. Li et al. used same Pythia models."
  baselines:
    - name: "SFT-only (no RLHF)"
      method: "Compare margin-flip relationship in SFT-only models to RLHF-aligned models to confirm RLHF-specific geometric effect"
    - name: "Random flip baseline"
      method: "Permutation test: shuffle flip indicators to verify AUROC > 0.75 is not chance"
    - name: "Entropy-only model"
      method: "Replace margin with token entropy as predictor to confirm margin is uniquely informative vs general uncertainty"

