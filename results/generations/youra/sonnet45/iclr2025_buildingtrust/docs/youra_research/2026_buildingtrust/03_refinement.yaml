# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-MarginFlip-v1"
  confidence_level: 0.78
  core_hypothesis_statement: |
    Under standard RLHF alignment (PPO and DPO) on LLMs of scale 1.4B–7B,
    if pre-alignment confidence margin (top-1 minus top-2 log-probability on base model MCQ items)
    is low, then post-alignment argmax inversion probability is higher,
    because DPO's log-odds optimization objective amplifies existing option-probability differences
    more directly than PPO's KL-penalized gradient, creating method-specific geometric fingerprints
    in how alignment restructures decision boundaries — fingerprints detectable from the base model alone.
  alternative_hypothesis_h0: |
    There is no significant difference in argmax inversion probability between low-margin
    and high-margin MCQ items after controlling for KL divergence between base and aligned models.
    Equivalently: the Margin × Method interaction term is not significantly different from zero,
    meaning PPO and DPO do not differ in how they relate pre-alignment margin to argmax stability.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Pre-alignment confidence margin"
      type: "continuous"
      operationalization: "log-prob(top-1 answer) minus log-prob(top-2 answer) on base model, computed via lm-evaluation-harness renormalized option-token log-probabilities; z-scored within model"
    - name: "Alignment method"
      type: "categorical"
      operationalization: "PPO vs DPO vs SFT-only; using matched base→aligned model pairs from HuggingFace Hub"
      levels: ["PPO", "DPO", "SFT"]
    - name: "Model scale"
      type: "categorical"
      operationalization: "Parameter count: 1.4B, 6.9B, 7B (using Pythia family + Llama-7B variants)"
      levels: ["1.4B", "6.9B", "7B"]
  dependent:
    - name: "Argmax flip indicator"
      type: "binary"
      operationalization: "flip=1 if argmax(aligned_log_probs) != argmax(base_log_probs) for same MCQ item; flip=0 otherwise"
      primary: true
    - name: "Flip probability (continuous)"
      type: "continuous"
      operationalization: "Flip rate per margin quintile per model pair; used for P(flip|margin) curve visualization"
      primary: false
    - name: "Cross-benchmark diagnostic AUROC"
      type: "continuous"
      operationalization: "AUROC of pre-alignment margin predicting flip indicator, evaluated on held-out benchmark"
      primary: false
  controlled:
    - name: "KL divergence (update magnitude)"
      operationalization: "KL(base || aligned) computed over MCQ answer distribution; included as covariate in regression"
    - name: "Within-model margin standardization"
      operationalization: "Z-score margin within each model to control for overconfidence scaling differences"
    - name: "Answer-position bias"
      operationalization: "Include answer position (A/B/C/D) as fixed effect; robustness check with randomized positions"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Pre-alignment base model logit geometry encodes epistemic uncertainty: low-margin items have small top-1/top-2 log-prob gaps, representing decisions near the decision boundary."
      evidence: "Plaut et al. [2024]: MSP predicts correctness with R²=0.94 for high-capability models, confirming confidence geometry encodes reliability signal."
      falsifier: "If MSP-correctness correlation is zero on base models, the confidence geometry claim is wrong."
    - step: 2
      description: "RLHF alignment injects a structured logit perturbation (Delta_logit = aligned_logits - base_logits) that is determined by the optimization objective's relationship to the reference model."
      evidence: "Li et al. [2024]: RLHF induces heterogeneous, axis-specific trustworthiness changes (not isotropic) — confirming structured, not random, perturbations."
      falsifier: "If alignment-induced logit deltas are isotropic noise (no structure), the perturbation-structure claim is wrong."
    - step: 3
      description: "DPO's log-odds objective (L_DPO ∝ log sigma(beta * log(pi_theta(y_w)/pi_ref(y_w)) - beta * log(pi_theta(y_l)/pi_ref(y_l)))) amplifies option-probability differences more directly than PPO's KL-penalized gradient, producing higher-variance logit perturbations near low-margin regions."
      evidence: "Xu et al. [2024]: DPO suffers from distribution shift (directly amplifies log-odds differences); PPO's KL term explicitly constrains distributional drift from reference model."
      falsifier: "If DPO and PPO produce identical variance in logit deltas at low margin (after KL control), the mechanism is wrong."
    - step: 4
      description: "When alignment-induced logit delta exceeds the pre-alignment margin (Delta > pre-margin), argmax inversion occurs. Low-margin items have lower threshold for inversion, creating monotonic P(flip|margin) relationship."
      evidence: "Derived mechanistically: flip occurs when Delta_align > pre_margin. Combined with steps 2-3, DPO should produce more flips near margin=0."
      falsifier: "Non-monotonic P(flip|margin) curve OR no Margin × Method interaction in predicted direction."
  key_tension: "Global KL (update magnitude) confound: DPO may simply produce larger policy shifts than PPO on average, rather than geometrically structured ones. Addressed by KL covariate control in regression."
  evidence_summary: |
    The causal chain is supported by: (1) Plaut et al.'s confidence geometry evidence,
    (2) Li et al.'s heterogeneous alignment effects proving structured perturbations,
    (3) Xu et al.'s DPO distribution-shift sensitivity providing mechanism for higher-variance
    DPO perturbations. The chain from base geometry → alignment perturbation → differential
    flip probability is mechanistically complete and falsifiable at each step.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Pre-alignment base model log-probs are accessible and meaningful (not degenerate) for MCQ items on MMLU/TruthfulQA/ARC"
    supporting_evidence: "Plaut et al. [2024] successfully extract meaningful MSPs from 15 fine-tuned LLMs on the same benchmark suite"
    consequence_if_violated: "Margin cannot be computed — experiment is infeasible"
  - id: "A2"
    assumption: "Publicly available base→aligned model pairs exist with documented alignment method (PPO vs DPO) and matching base checkpoints"
    supporting_evidence: "HuggingFace Hub has multiple matched pairs: allenai/tulu-2-base vs tulu-2-dpo-7b vs tulu-2-ppo-7b; Pythia base with TRL-aligned variants"
    consequence_if_violated: "Must run fresh alignment — increases scope significantly"
  - id: "A3"
    assumption: "Alignment-induced logit perturbations on MCQ are systematic enough to detect statistically across N~14K MMLU items"
    supporting_evidence: "h-m3 results: 99.7% argmax shift for PPO at 1.4B confirms large effect size exists for at least one model"
    consequence_if_violated: "Effect sizes below detectable threshold — experiment inconclusive"
  - id: "A4"
    assumption: "DPO and PPO produce distinguishably different variance structures in logit deltas, not just different magnitudes"
    supporting_evidence: "Xu et al. [2024] theoretical analysis: DPO suffers distribution shift, PPO has KL constraint — mechanistically distinct behavior expected"
    consequence_if_violated: "Interaction term is zero — hypothesis is falsified but cleanly"
  - id: "A5"
    assumption: "Pre-alignment base model confidence geometry is sufficiently stable (not randomly initialized) to encode structural information"
    supporting_evidence: "Fan et al. [2026]: accuracy rankings transfer from pretraining to SFT with benchmark-dependent but non-zero correlation — confirms pre-training geometry is meaningful"
    consequence_if_violated: "Margin is noise at pre-alignment stage — entire predictive framework collapses"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - LLMs of scale 1.4B–7B parameters (Pythia family, Llama-7B variants)
    - Standard RLHF alignment methods: PPO (KL-penalized), DPO (log-ratio preference)
    - Multiple-choice question benchmarks: MMLU (4-option), TruthfulQA (MCQ format), ARC-Challenge
    - Base→aligned model pairs where base model has been instruction-tuned via SFT before RLHF
    - Items where renormalized option-token log-probabilities are extractable via lm-evaluation-harness
  does_not_apply_to: |
    - Free-form generation tasks (not MCQ format)
    - Models >70B parameters (insufficient publicly available aligned pairs)
    - SFT-only alignment without RLHF stage
    - Benchmarks requiring longer-form response generation
    - Alignment methods beyond PPO and DPO (e.g., RLAIF, Constitutional AI — out of scope for this study)
  known_limitations: |
    - PPO hyperparameter sensitivity (batch size, advantage normalization) means PPO results
      are conditioned on specific hyperparameter configurations used in available model checkpoints
    - DPO distribution shift effects may vary with training data quality
    - Benchmark contamination cannot be fully ruled out for models trained after benchmark publication
    - Cosine projection test may have low power at small model counts (N=3-4 model pairs per method)
    - Capability threshold claim requires segmented regression; may not achieve sufficient power
      to distinguish threshold from smooth scaling with available model families

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "Pre-alignment confidence margin (base model top-1 minus top-2 log-prob, z-scored within model) significantly predicts post-alignment argmax flip probability in a monotonically negative direction: items with lower margin flip more frequently."
    test_method: "Mixed-effects logistic regression: logit P(flip) = β₀ + β₁·margin + β₂·method + β₃·(margin×method) + β₄·KL + β₅·(margin×KL) + random intercepts (dataset, model_size). Apply to matched base→aligned pairs on MMLU, TruthfulQA, ARC-Challenge."
    success_criterion: "β₁ < 0, p < 0.005 (Bonferroni-corrected), partial η² >= 0.06; cross-benchmark flip prediction AUROC >= 0.75 using margin-only logistic model trained on MMLU, evaluated on TruthfulQA and ARC."
    falsification: "β₁ >= 0 OR p >= 0.005 OR AUROC < 0.65 on cross-benchmark evaluation. Non-monotonic P(flip|margin quintile) curve also constitutes falsification."
  - id: "P2"
    primary: false
    statement: "DPO-aligned models exhibit higher argmax flip rates in low-margin regions (bottom quintile) than PPO-aligned models, even after controlling for KL divergence. The Margin × Method interaction (β₃) is in the predicted direction: DPO shows steeper flip-rate increase as margin decreases."
    test_method: "From the primary regression: inspect β₃ coefficient and its interaction direction. Additionally, plot P(flip|margin quintile) separately for PPO and DPO and test for significantly different slopes via interaction F-test."
    success_criterion: "β₃ in predicted direction (PPO more stable at low margin) at p < 0.05, consistent across >= 3 model families; Odds Ratio for 1-SD margin decrease >= 1.8 for DPO models."
    falsification: "β₃ not in predicted direction OR interaction disappears after KL control (β₃ becomes non-significant when β₄ included in model)."
  - id: "P3"
    primary: false
    statement: "The cosine similarity between alignment-induced logit delta and the base model's decision axis (top1-logit minus top2-logit direction, normalized) is higher for DPO than PPO in low-margin regions, confirming DPO amplifies along the existing boundary direction while PPO diffuses globally."
    test_method: "For each MCQ item: compute cosine(delta_logit, base_decision_axis) where delta_logit = aligned_4D_logits - base_4D_logits, base_decision_axis = unit vector in direction of (top1_logit - top2_logit). Compare mean cosine by method × margin quintile."
    success_criterion: "DPO items in bottom margin quintile show significantly higher cosine alignment than PPO items at same quintile (Welch's t-test, p < 0.05); effect consistent across >= 2 benchmarks."
    falsification: "No significant cosine alignment difference between DPO and PPO conditional on KL; or cosine alignment is equally high/low for both methods."

