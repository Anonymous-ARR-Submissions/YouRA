main_hypothesis:
  id: H-MarginFlip-v1
  title: 'Geometric Fingerprints of Alignment: Pre-Alignment Confidence Margin Predicts Alignment-Induced Argmax Instability
    with Method-Specific Signatures'
  statement: 'Under standard RLHF alignment (PPO and DPO) on LLMs of scale 1.4B–7B,

    if pre-alignment confidence margin (top-1 minus top-2 log-probability on base model MCQ items)

    is low, then post-alignment argmax inversion probability is higher,

    because DPO''s log-odds optimization objective amplifies existing option-probability differences

    more directly than PPO''s KL-penalized gradient, creating method-specific geometric fingerprints

    in how alignment restructures decision boundaries — fingerprints detectable from the base model alone.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: MMLU (primary) + TruthfulQA + ARC-Challenge
    model: Pythia-1.4B/6.9B + Tulu-2-7B (base and aligned variants)
    optimizer: PPO (KL-penalized) vs DPO (log-ratio preference)
    hyperparameters:
      significance_threshold: 0.005
      auroc_threshold: 0.75
      effect_size_min: 0.06
      model_scale_range: 1.4B-7B
