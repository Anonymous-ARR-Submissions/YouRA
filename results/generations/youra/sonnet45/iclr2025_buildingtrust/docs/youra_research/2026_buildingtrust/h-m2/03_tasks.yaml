    epic: "Quintile Stratification"
    title: "L-3-1: np.digitize stratification + min-N check"
    description: |
      Core stratification in compute_quintile_labels:
        boundaries = np.percentile(margin, np.linspace(0, 100, n_quintiles + 1))  # (6,)
        quintile_labels = np.digitize(margin, boundaries[1:-1])  # (N,) in [0..4]
        for q in range(n_quintiles):
            count = np.sum(quintile_labels == q)
            if count < MIN_QUINTILE_N:
                logger.warning(f"Q{q} has only {count} items — variance estimate may be unstable")
        Log INFO: "Quintile stratification: Q1 has N={Q1_count} items (expected ~2800)"
