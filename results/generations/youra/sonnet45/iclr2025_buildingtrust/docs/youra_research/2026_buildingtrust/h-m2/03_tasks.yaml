  - id: "task-019"
    epic: "KL-Residualized Variance"
    title: "L-4-2: OLS residualization loop"
    description: |
      Per-quintile KL residualization in compute_variance_by_quintile:
        for q in range(n_quintiles):
            mask = (quintile_labels == q)
            delta_var_q, kl_q = delta_var[mask], kl_div[mask]
            if kl_control and len(delta_var_q) >= 10:
                slope, intercept = np.polyfit(kl_q, delta_var_q, 1)
                residuals = delta_var_q - (slope * kl_q + intercept)
                quintile_variances[q] = np.var(residuals)
            else:
                residuals = delta_var_q
                quintile_variances[q] = np.var(delta_var_q)
            if q == 0: q1_residuals = residuals
    feature_tag: "evaluation"
