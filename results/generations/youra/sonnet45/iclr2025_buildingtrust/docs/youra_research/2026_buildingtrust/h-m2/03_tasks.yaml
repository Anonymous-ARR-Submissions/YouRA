    title: "L-5-3: Bootstrap CI (5000 replicates)"
    description: |
      Implement bootstrap confidence interval in test_method_quintile_interaction:
        np.random.seed(seed)
        bootstrap_ratios = []
        for _ in range(n_bootstrap):
            dpo_boot = np.random.choice(dpo_q1_residuals, size=len(dpo_q1_residuals), replace=True)
            sft_boot = np.random.choice(sft_q1_residuals, size=len(sft_q1_residuals), replace=True)
            bootstrap_ratios.append(var(dpo_boot) / var(sft_boot))
        bootstrap_ci = (np.percentile(bootstrap_ratios, 2.5), np.percentile(bootstrap_ratios, 97.5))
