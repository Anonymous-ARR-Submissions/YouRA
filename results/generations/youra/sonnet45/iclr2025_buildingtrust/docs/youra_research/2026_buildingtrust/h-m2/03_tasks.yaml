    title: "A-5: Statistical Testing (Welch's t + Bootstrap CI)"
    description: |
      Implement test_method_quintile_interaction in analysis_variance.py:
        test_method_quintile_interaction(dpo_q1_residuals(n,), sft_q1_residuals(n,),
                                         n_bootstrap=5000, seed=1) -> dict
          1. t_stat, p_two = scipy.stats.ttest_ind(dpo, sft, equal_var=False)
          2. p_one_tailed = p_two / 2  (directional: DPO > SFT)
          3. pooled_std = sqrt((var(dpo) + var(sft)) / 2)
          4. cohens_d = (mean(dpo) - mean(sft)) / pooled_std
          5. q1_variance_ratio = var(dpo) / var(sft)
          6. Bootstrap CI: np.random.seed(seed); resample both arrays 5000×;
             compute var ratio each iteration; CI = (2.5th, 97.5th percentile)
          Returns: {t_stat, p_one_tailed, cohens_d, q1_variance_ratio, bootstrap_ci(2,)}
    feature_tag: "evaluation"
    priority: 89
