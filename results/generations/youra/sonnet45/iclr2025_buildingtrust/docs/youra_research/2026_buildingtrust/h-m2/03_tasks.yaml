    title: "A-4: KL-Residualized Variance Computation"
    description: |
      Implement compute_variance_by_quintile in analysis_variance.py:
        compute_variance_by_quintile(base_logprobs(N,4), aligned_logprobs(N,4),
                                     margin(N,), kl_div(N,), n_quintiles=5, kl_control=True) -> dict
          1. delta = compute_logit_delta(base_logprobs, aligned_logprobs)  # (N, 4)
          2. delta_var = np.var(delta, axis=1)                              # (N,)
          3. quintile_labels, boundaries = compute_quintile_labels(margin)
          4. For each quintile q: extract delta_var_q and kl_q
             If kl_control and len >= 10: OLS residualize (np.polyfit degree 1)
             Else: use raw delta_var_q
             quintile_variances[q] = np.var(residuals)
             Store q1_residuals for Q1
          Returns: {quintile_variances(5,), quintile_counts(5,), q1_residuals(n_q1,),
                    kl_residualization_applied(bool), boundaries(6,)}
    feature_tag: "evaluation"
    priority: 90
    source_document: "03_architecture.md"
    complexity: 13
