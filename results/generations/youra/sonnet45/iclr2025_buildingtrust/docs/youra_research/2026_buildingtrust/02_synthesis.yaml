hypothesis_draft:
  title: "Geometric Fingerprints of Alignment: Pre-Alignment Confidence Margin Predicts Alignment-Induced Argmax Instability with Method-Specific Signatures"
  hypothesis_id: "H-MarginFlip-v1"
  core_claim: |
    Pre-alignment confidence margin (top-1 minus top-2 log-probability on the base model)
    monotonically predicts post-alignment argmax inversion probability on MCQ benchmarks.
    This relationship is method-specific: DPO's log-odds objective amplifies option-probability
    differences more directly than PPO's KL-penalized gradient, producing higher flip rates
    in low-margin regions — a geometric fingerprint detectable from the base model alone,
    surviving control for overall KL divergence between base and aligned models.
  mechanism: |
    Four-step causal chain:
    1. Base model logit geometry encodes epistemic uncertainty — low margin = near-boundary decision
    2. Alignment injects structured logit perturbation (axis-specific, not isotropic noise)
    3. DPO's log-odds objective amplifies existing option-prob differences → higher variance
       perturbations near margin=0; PPO's KL term globally constrains distributional drift
    4. When perturbation exceeds pre-margin, argmax inverts — DPO produces more inversions at low margin
  predictions:
    - P1: "Margin predicts flip: β₁ < 0, p < 0.005, AUROC >= 0.75 cross-benchmark"
    - P2: "Method-specific interaction: DPO steeper flip-rate at low margin (Margin × Method β₃ in predicted direction, KL-controlled)"
    - P3: "Geometric confirmation: DPO logit deltas more cosine-aligned with base decision axis at low margin than PPO"

variables_summary:
  independent: "Pre-alignment confidence margin (continuous, z-scored) and alignment method (PPO vs DPO, categorical)"
  dependent_primary: "Argmax flip indicator (binary: 1 if post-alignment argmax differs from pre-alignment argmax)"
  controlled: "KL divergence (update magnitude), entropy, answer position, model scale"

null_hypothesis:
  h0_statement: |
    There is no significant difference in argmax inversion probability between low-margin
    and high-margin MCQ items after controlling for KL divergence between base and aligned models.
    The Margin × Method interaction term is zero: PPO and DPO do not differ in how they
    relate pre-alignment margin to post-alignment argmax stability.
  statistical_test: "Mixed-effects logistic regression with interaction term; AUROC on held-out benchmark"
  significance_level: 0.005  # Bonferroni-corrected for 3 benchmarks

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First pre-alignment diagnostic for alignment-induced argmax instability with mechanistically grounded method-specific predictions. Extends Fan et al. pretraining→SFT to pretraining→RLHF."
  differentiation_summary: |
    Li et al. [2024]: characterizes post-RLHF trustworthiness changes (what changes).
    This work: predicts which items will change, from base model alone (when/where).
    Fan et al. [2026]: pretraining→SFT accuracy ranking persistence.
    This work: pretraining→RLHF margin-flip persistence with method-specific signatures.
    Plaut et al. [2024]: MSP predicts correctness.
    This work: margin predicts alignment-induced change in correctness — harder task.

