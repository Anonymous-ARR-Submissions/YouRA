measurement_plan:
  data_collection:
    - source: "lm-evaluation-harness: extract log-probs for 4-option MCQ (--output_path for logit logging)"
    - source: "HuggingFace Hub: download base and aligned model pairs"
    - source: "HuggingFace datasets: mmlu, truthful_qa, ai2_arc (existing benchmarks only)"
  procedure:
    - step: "Extract base model log-probs on MMLU/TruthfulQA/ARC via lm-evaluation-harness"
    - step: "Compute confidence margin = log-prob(top-1) - log-prob(top-2), z-score within model"
    - step: "Extract aligned model log-probs (PPO variants and DPO variants) on same items"
    - step: "Compute flip indicator: 1 if argmax(aligned) != argmax(base)"
    - step: "Compute KL(base || aligned) over MCQ answer distribution per model pair"
    - step: "Fit mixed-effects logistic regression with interaction terms"
    - step: "Compute cross-benchmark AUROC for margin-only predictor"
    - step: "Compute cosine similarity between logit deltas and base decision axis"
  success_criteria:
    - "β₁ < 0, p < 0.005, partial η² >= 0.06 for margin main effect"
    - "Margin × Method interaction in predicted direction (p < 0.05)"
    - "Cross-benchmark AUROC >= 0.75 on held-out benchmark"
    - "DPO logit deltas: higher cosine alignment with base decision axis at low margin quintile (p < 0.05)"

validation:
