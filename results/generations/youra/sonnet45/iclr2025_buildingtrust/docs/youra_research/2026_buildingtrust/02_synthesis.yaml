discussion_synthesis:
  key_insights:
    - "DPO's log-odds objective structurally amplifies option differences more directly than PPO's KL-constrained gradient — mechanism derived from first principles of the optimization objectives"
    - "Pre-alignment confidence geometry is a diagnostic fingerprint: low-margin items are both epistemically fragile (Plaut et al.) and optimization-fragile (this work)"
    - "Fan et al.'s benchmark-dependent transfer reliability implies diagnostic validity varies across benchmarks — this is a feature to characterize, not a bug to eliminate"
    - "The h-m3 PPO catastrophe at 1.4B (rho=-0.3241) may reflect below-capability-threshold chaotic logit geometry rather than typical PPO behavior"
  breakthrough_moments:
    - "Prof. Rex's KL confound identification forced the regression design to include KL covariate — this made the hypothesis genuinely falsifiable rather than merely correlational"
    - "Prof. Vera's pre-registration design (β₁ < 0, p < 0.005, AUROC >= 0.75) provided the quantitative bar that resolved the falsifiability concern"
    - "Dr. Ally's derivation of the mechanism directly from PPO/DPO loss function forms elevated the prediction from empirical guess to mechanistically grounded hypothesis"
  resolved_tensions:
    - "Correlation vs mechanism: resolved by KL control and cosine projection test"
    - "PPO=stable vs PPO=catastrophic: resolved by scale moderation — 1.4B may be below capability threshold"
    - "Method comparison confound: resolved by matched base→aligned pairs with documented hyperparameters"
