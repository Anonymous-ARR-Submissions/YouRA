    - "Fixed seeds control stochastic variance"
    - "Token budget caps prevent verbosity asymmetry"
    - "HumanEval+ augmented tests decouple evaluation from classification oracle"
  external_validity:
    - "HumanEval/MBPP benchmarks standard but may not represent real-world complexity"
    - "CodeLlama-7B results may not generalize to larger models (GPT-4, Claude)"
    - "Python-mypy findings language-specific; other tool pairs require separate validation"

