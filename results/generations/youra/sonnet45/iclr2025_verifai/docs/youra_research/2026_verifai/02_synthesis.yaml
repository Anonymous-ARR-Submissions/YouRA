hypothesis_draft:
  title: "Sequential Single-Source Feedback Routing for LLM Code Generation"
  hypothesis_id: "H-SeqRouting-v1"
  core_claim: |
    Sequential single-source feedback routing (cascade: static→execution, one source per iteration)
    reduces iterations-to-solution relative to simultaneous aggregation on dual-sensitive programming tasks.
  mechanism: |
    Staged verification through (1) mypy instant compositional type checking, (2) pytest execution only if
    static clean, (3) single-source attention economy reducing cognitive load. Conditional gating skips
    expensive execution when static errors exist.
  predictions:
    - P1: "Paired mean iteration reduction with CI excluding zero AND d > 0.3 (plus Wilcoxon robustness)"
    - P2: "Gating Index G_cascade < G_aggregation (execution appears after static convergence)"
    - P3: "Tokens-per-successful-task ≤ aggregation + 15% (no verbosity trade-off)"

variables_summary:
  independent: "Feedback Routing Policy: cascade (sequential mypy→pytest) vs. aggregation (both concatenated)"
  dependent_primary: "Iterations-to-Solution (count until HumanEval+ pass AND mypy clean, max 5)"
  controlled: "Dual-sensitive tasks (N=20, pre-classified), temperature/seed fixed, token budget capped (1000 per source)"

null_hypothesis:
  h0_statement: |
    No significant difference in mean iterations-to-solution between cascade and aggregation on dual-sensitive tasks.
  statistical_test: "Paired t-test + Wilcoxon signed-rank (robustness)"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First empirical routing causality test via cascade-aggregation ablation. Gating Index quantitative mechanism probe."
  differentiation_summary: |
    Prior work uses single sources (LLMDebugger execution-only, Blyth static-only) or simultaneous aggregation
    (LLMLOOP). Our cascade vs. aggregation comparison isolates routing policy as independent variable.

clarity:
  overall_level: "HIGH"
  clarity_verified: true
  improvements_needed: []

experimental_scope:
  models: ["CodeLlama-7B"]
  datasets: ["HumanEval with HumanEval+ augmented tests"]
  baselines: ["Naive Aggregation (both-source concat)", "Execution-Only (PerfCodeGen methodology)"]

measurement_plan:
  data_collection:
    - source: "Pilot N=5 tasks for variance estimation (SD of paired differences)"
    - source: "Main N=20 dual-sensitive tasks (pre-classified using K=20 baseline samples)"
    - source: "Per-task logs: iterations, tokens (static/execution/model), success (HumanEval+ pass), G index"
  procedure:
    - step: "Generate K=20 baseline solutions per HumanEval task for dual-sensitive classification"
    - step: "Freeze N=20 task list before evaluation"
    - step: "Run pilot N=5 under aggregation-only, 2 seeds, estimate paired SD"
    - step: "If SD > 1.0, downgrade to underpowered exploratory"
    - step: "Run main N=20 paired comparison (cascade vs. aggregation), 2 seeds, max 5 iterations"
    - step: "Compute paired t-test, Wilcoxon, Cohen's d, gating index, tokens breakdown"
  success_criteria:
    - "CI excludes zero AND lower bound d > 0.3 AND Wilcoxon p < 0.05 (P1 success)"
    - "G_cascade < G_aggregation with median G_cascade ≤ 0.2 (P2 mechanism support)"
    - "Tokens-per-successful-task_cascade ≤ aggregation × 1.15 (P3 efficiency)"

validation:
