  h-m3:
    type: MECHANISM
    statement: Under cascade routing conditions (N=20 from H-E1), if pytest execution
      is conditionally gated (run only when mypy clean) instead of always running
      (aggregation), then tokens-per-successful-task remains within 15% of aggregation
      baseline, because conditional gating skips expensive 5-10 second test execution
      when static errors exist without excessive verbosity trade-off.
    status: COMPLETED
