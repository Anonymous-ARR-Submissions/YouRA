  h-m2:
    type: MECHANISM
    statement: Under dual-sensitive task conditions with cascade routing (N=20 from
      H-E1), if LLM receives single-source feedback per iteration (mypy-only or pytest-only)
      instead of simultaneous aggregation (both concatenated), then mean iterations-to-solution
      decreases, because sequential presentation enforces attention economy reducing
      cognitive load on error type disambiguation.
    status: COMPLETED
    gate:
      type: SHOULD_WORK
      satisfied: false
      failure_action: EXPLORE - LLMs internally normalize feedback regardless of presentation
      limitation_recorded: true
