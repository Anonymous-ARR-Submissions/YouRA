# ═══════════════════════════════════════════════════════════════
# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "Individual feedback mechanisms (test-driven, execution feedback, static analysis) demonstrate 60-80% improvement over single-shot LLM code generation"
      status: "BUILD_ON"
      evidence: "Phase 1 research: 22 directly relevant sources (4 papers + 3 repos for TDD, 8 papers + 3 repos for execution feedback, 2 repos for static analysis)"
    - claim: "Static analysis tools (mypy, pylint) provide compositional type safety guarantees without SMT solvers"
      status: "BUILD_ON"
      evidence: "Established tooling with structured output modes (mypy --json-output, pytest --json-report)"
    - claim: "HumanEval and MBPP benchmarks are standard for LLM code generation evaluation"
      status: "BUILD_ON"
      evidence: "LiveCodeBench (1200 citations), PythonSaga (18 citations), foundational evaluation literature"
    - claim: "No prior work demonstrates systematic orchestration of multiple feedback sources for LLM code generation"
      status: "PROVE_NEW"
      evidence: "Gap 1 from Phase 1: All 22 sources use single feedback type only, no multi-source integration tested"
  scope_reduction_percentage: 25  # 3 BUILD_ON / 4 total = 75% established
  phase2b_4_instructions: |
    BUILD_ON claims do not require re-validation in Phase 4. Focus verification on PROVE_NEW claim:
    testing whether feedback routing policy causally improves iteration efficiency beyond naive aggregation.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-SeqRouting-v1"
  confidence_level: 0.80
  core_hypothesis_statement: |
    Under programming tasks requiring compositional verification (type safety + logical correctness validation),
    if LLM code generation uses sequential single-source feedback routing (static analysis → execution, one
    source per iteration), then iteration-to-solution count decreases relative to simultaneous multi-source
    aggregation (both sources concatenated each iteration), because staged verification enforces attention
    economy (single-source focus) and computational efficiency (skip execution if static analysis fails).
  alternative_hypothesis_h0: |
    There is no significant difference in mean iterations-to-solution between sequential routing and
    simultaneous aggregation conditions on dual-sensitive programming tasks.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Feedback Routing Policy"
      type: "categorical"
      operationalization: "Cascade (mypy first, pytest only if clean, single-source per iteration) vs. Aggregation (mypy + pytest concatenated each iteration)"
      levels: ["cascade", "aggregation"]
  dependent:
    - name: "Iterations-to-Solution"
      type: "continuous"
      operationalization: "Count of LLM generation calls until solution passes HumanEval+ full augmented tests AND mypy --strict. Max 5 iterations. Primary metric: paired mean difference."
      primary: true
    - name: "Gating Index"
      type: "continuous"
      operationalization: "G = (# iterations with execution feedback before static convergence) / (total iterations). Range [0,1]. Mechanism probe: G_cascade < G_aggregation predicted."
      primary: false
    - name: "Tokens-per-Successful-Task"
      type: "continuous"
      operationalization: "Sum of (static-analysis tokens + execution-feedback tokens + model-response tokens) for tasks passing HumanEval+. Efficiency check: cascade ≤ aggregation + 15%."
      primary: false
  controlled:
    - name: "Task Dual-Sensitivity"
      operationalization: "Pre-classified using K=20 baseline samples: ≥1 fails mypy but passes visible tests, AND ≥1 passes mypy but fails visible tests (frozen classification, N=20)"
    - name: "Model Temperature and Seed"
      operationalization: "Fixed seed per task-condition pair, identical temperature (0.8), max 5 iterations"
    - name: "Token Budget"
      operationalization: "Max 1000 tokens per feedback source per iteration (prevents verbosity asymmetry)"
    - name: "Success Criterion"
      operationalization: "Pass HumanEval+ full augmented test suite (decoupled from classification visible tests)"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 3
  steps:
    - step: 1
      description: "Static analysis (mypy --strict) provides instant compositional type safety checking (type errors, null safety, signature mismatches) catching ~30-40% of bugs with zero execution cost"
      evidence: "Mypy provides structured JSON output (--json-output) with specific error types. Prior work (Blyth et al., 2025) shows static analysis reduces security issues 40%→13% through iterative refinement."
      falsifier: "If static analysis catches <20% of errors in dual-sensitive tasks, or if execution-first cascade performs equivalently, this step's causal role is invalidated."
    - step: 2
      description: "Sequential single-source presentation (one feedback source per iteration) reduces cognitive load through attention economy, allowing LLM to focus on fixing one error type at a time"
      evidence: "Human debugging patterns follow staged verification (static → dynamic). LLMs may benefit from similar decomposition. Token budget equality ensures this isn't merely more information."
      falsifier: "If aggregation performs equally well, or if Gating Index G shows execution feedback appears regardless of static state under cascade, attention economy hypothesis fails."
    - step: 3
      description: "Conditional execution gating (run pytest only if mypy clean) skips expensive test execution when static errors exist, improving computational efficiency"
      evidence: "Execution feedback costs 5-10 seconds per task (test running time), while mypy is instant (<0.1 sec). Skipping unnecessary execution saves iteration time and tokens."
      falsifier: "If tokens-per-successful-task under cascade ≥ aggregation + 15%, or if G_cascade ≈ G_aggregation (execution runs regardless), conditional gating provides no efficiency gain."
  key_tension: "Mechanism attribution is ambiguous without staged-aggregation control (third arm). Cannot definitively separate conditional gating from mere serialization effects. Transcript qualitative analysis provides exploratory mechanism evidence only."
  evidence_summary: |
    Step 1 has strongest evidence (static analysis tools validated in prior work, compositional guarantees established).
    Steps 2-3 are hypothesized based on attention economy and computational efficiency reasoning, but require
    empirical validation. Without staged-aggregation control, causality is limited to "sequential presentation
    outperforms aggregation" not "conditional gating drives benefit."

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Dual-sensitive task classification using K=20 baseline samples with visible tests correlates with genuine dual-signal requirements under HumanEval+ augmented tests"
    supporting_evidence: "HumanEval+ provides 80+ additional robustness tests per task beyond visible tests, ensuring classification-evaluation decoupling"
    consequence_if_violated: "If >30% of classified dual-sensitive tasks fail HumanEval+ even under correct visible test solutions, task pool is systematically shallow. Hypothesis scope narrows to 'visible-test-brittle tasks only.'"
  - id: "A2"
    assumption: "Within-task paired variance (SD of iteration differences across 2 seeds) ≤ 1.0, providing adequate power for N=20 paired design to detect d ≥ 0.3 effects"
    supporting_evidence: "PerfCodeGen paper reports σ ≈ 1.0 for execution feedback iterations. Pilot N=5 will empirically validate this assumption."
    consequence_if_violated: "If pilot SD > 1.0, power collapses. H1 downgrades to 'underpowered exploratory,' effect size interpretation shifts to wider confidence intervals, claims tempered to 'preliminary evidence.'"
  - id: "A3"
    assumption: "LLMs internally normalize feedback differently when presented sequentially vs. simultaneously, making routing policy causally relevant"
    supporting_evidence: "Hypothesis assumes sequential presentation changes LLM processing (attention focus). This is untested but plausible given context-window constraints."
    consequence_if_violated: "If LLMs internally prioritize feedback signals regardless of presentation order (implicit weighting), external routing adds no value. Null result (aggregation = cascade) would confirm this, publishable as negative finding."
  - id: "A4"
    assumption: "Mypy --strict mode errors are sufficiently informative to guide LLM corrections in 1-2 iterations without execution context"
    supporting_evidence: "Mypy provides specific error messages with type mismatches, function signature issues, null safety violations. Discussion noted potential verbosity (cascading errors)."
    consequence_if_violated: "If mypy errors cascade (one root error → five downstream errors), LLMs may struggle to identify root cause. Aggregation might help by providing execution context for disambiguation. Would manifest as cascade showing no iteration advantage or increased token verbosity."
  - id: "A5"
    assumption: "Token budget caps (1000 tokens per source per iteration) do not systematically favor one condition over the other"
    supporting_evidence: "Cap prevents verbosity asymmetry where one condition uses 2× tokens simply due to longer error messages. Equality enforced in protocol."
    consequence_if_violated: "If mypy traces systematically exceed 1000 tokens while pytest output stays under, cascade gets artificially truncated feedback. Would detect via granular token breakdown analysis (static vs. execution tokens)."

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Programming tasks requiring compositional verification (type safety guarantees + logical correctness validation)
    - Python codebases where static analysis tools (mypy) provide meaningful type-level error detection
    - Small-to-medium functions (<200 LOC) typical of HumanEval/MBPP benchmarks
    - Dual-sensitive error distributions where both type errors and logic errors co-occur
    - LLM code generation scenarios with iterative refinement budgets (multi-turn correction)
    - Proof-of-concept validation with N=20 tasks (exploratory effect size estimation)
  does_not_apply_to: |
    - Dynamically typed languages without static analysis tooling (JavaScript without TypeScript, shell scripts)
    - Tasks with only one error type (pure logic errors where types are trivial, or pure syntax errors)
    - Production code generation requiring >5 iterations to converge (hypothesis capped at 5 iterations)
    - Large-scale systems (>1K LOC) where mypy errors cascade extensively (assumption A4 may break)
    - Scenarios where execution feedback is unavailable (no test suites, pure synthesis tasks)
    - Definitive causal claims about conditional gating mechanism (requires staged-aggregation control)
  known_limitations: |
    - Mechanism ambiguity: Without third-arm control, cannot isolate conditional gating from serialization effects
    - Statistical power: N=20 powered for d ≥ 0.3 only if pilot SD ≤ 1.0; underpowered for smaller effects
    - Generalization: HumanEval/MBPP benchmarks may not represent real-world debugging complexity
    - Single model: Protocol tests CodeLlama-7B only; larger models may internally normalize feedback differently
    - Language-specific: Python-mypy findings may not transfer to other language-tool pairs (Java-Checkstyle, C++-Clang-Tidy)

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "On N=20 pre-registered dual-sensitive HumanEval tasks, cascade routing reduces mean iterations-to-solution relative to aggregation, with paired mean difference confidence interval excluding zero and lower bound Cohen's d > 0.3"
    test_method: "Paired t-test (parametric) and Wilcoxon signed-rank test (nonparametric robustness check). Pre-specified interpretation: if CI excludes zero AND d > 0.3 → meaningful effect; if d ∈ [0.2, 0.3) → small effect, interpret cautiously; if CI includes zero OR |d| < 0.2 → no evidence."
    success_criterion: "CI excludes zero AND lower bound d > 0.3 AND Wilcoxon test agrees (p < 0.05)"
    falsification: "If CI includes zero, OR d < 0.3, OR parametric and nonparametric tests disagree (ceiling effects at 5 iterations), routing causality is not supported."
  - id: "P2"
    primary: false
    statement: "Gating Index G (proportion of iterations with execution feedback before static convergence) satisfies G_cascade < G_aggregation, ideally G_cascade ≈ 0, indicating conditional execution gating operates as hypothesized"
    test_method: "Compute G per condition across all task-iterations. Descriptive comparison with visual inspection of distributions. Qualitative transcript analysis for 5 representative tasks."
    success_criterion: "G_cascade significantly lower than G_aggregation (paired comparison), with cascade median G ≤ 0.2"
    falsification: "If G_cascade ≈ G_aggregation (execution runs regardless of static state), conditional gating mechanism is unsupported. Improvement (if observed) must be attributed to serialization/presentation format, not routing policy."
  - id: "P3"
    primary: false
    statement: "Tokens-per-successful-task under cascade ≤ aggregation + 15%, demonstrating iteration efficiency without excessive verbosity trade-off"
    test_method: "Granular token accounting: (static-analysis tokens, execution-feedback tokens, model-response tokens). Compute mean tokens-per-successful-task (conditional on HumanEval+ pass). Report separately for success and failure cases."
    success_criterion: "Mean tokens-per-successful-task_cascade ≤ mean_aggregation × 1.15"
    falsification: "If cascade increases tokens-per-success by >15%, or if cascade has lower success rate with equal tokens, iteration reduction is offset by verbosity/failure. Efficiency claim fails."

