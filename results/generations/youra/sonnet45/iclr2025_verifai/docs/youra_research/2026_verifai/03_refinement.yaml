experimental_setup:
  dataset:
    name: "HumanEval with HumanEval+ augmented tests"
    type: "standard"
    source: "evalplus Python package (pip install evalplus)"
    path: "pip install evalplus; use built-in task loader"
    hypothesis_fit: "HumanEval provides 164 programming tasks covering diverse problem types (algorithms, data structures, string manipulation). HumanEval+ augments each task with 80+ additional robustness tests beyond visible tests, enabling classification-evaluation decoupling (use visible for dual-sensitive classification, HumanEval+ full for success criterion). Well-established in LLM code generation literature (LiveCodeBench baseline)."
  model:
    name: "CodeLlama-7B"
    type: "Base code generation model (7B parameters)"
    source: "HuggingFace: codellama/CodeLlama-7b-hf"
    hypothesis_fit: "Widely used baseline for code generation studies (comparable to models in PerfCodeGen, LLMDebugger papers). 7B size fits <30min inference budget (200 calls @ ~10 sec each). Base model (not instruction-tuned) ensures feedback routing is tested on general code generation capability, not pre-aligned instruction-following."
  baselines:
    - name: "Naive Aggregation (Both-Source Concatenation)"
      method: "Run mypy --strict + pytest each iteration, concatenate both outputs as single feedback string, present to LLM. Control for token budget (cap each source at 1000 tokens, truncate if needed)."
    - name: "Single-Source Execution-Only (Literature Baseline)"
      method: "Execution feedback only (pytest), matching PerfCodeGen methodology. Included for comparison to prior work claiming execution-only achieves strong results. Not primary comparison (main is cascade vs. aggregation)."

