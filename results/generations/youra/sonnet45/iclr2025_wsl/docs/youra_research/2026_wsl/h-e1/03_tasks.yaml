# Task Priority Order: Data Prep (100+) → Environment (90+) → Implementation (decreasing by complexity)
# feature_tag: data-preparation | setup | data-pipeline | model | training | evaluation | visualization

tasks:
  # ========================================
  # ENVIRONMENT SETUP (Priority: 99)
  # ========================================
  - id: task-001
    epic: Environment Setup
    title: Setup development environment and dependencies
    description: |
      Install required Python packages:
      - PyTorch >= 2.0
      - nfn (Neural Functional Transformer library)
      - timm (ViT model zoo)
      - torchvision (CNN model zoo)
      - scipy (Spearman correlation)
      - numpy, pandas
      - matplotlib, seaborn (visualization)
      - scikit-learn (t-SNE)

      Create requirements.txt with all dependencies.
      Verify nfn library installation: pip install nfn

      External reference: github.com/AllanYangZhou/nfn (NeurIPS 2023)
    feature_tag: setup
    priority: 99
    source_document: 03_prd.md
    complexity: null
    test_requirements: "Environment setup does not require tests."
    reference_files:
      architecture: null
      logic: null
      config: null

  # ========================================
  # IMPLEMENTATION TASKS (Priority: by complexity, highest first)
  # ========================================

  # Epic A-4: CAWE Model Integration (Complexity: 14 - HIGHEST)
  - id: task-002
    epic: A-4
    title: Implement CAWE model with tokenizers + NFT backbone + regression head
    description: |
      Implement compositional CAWE architecture:
      1. CAWE class with forward(weights, arch_family) method
      2. Architecture-specific tokenizer dispatch (CNN/Transformer/MLP)
      3. Shared NFT backbone processing using nfn library
      4. Global average pooling over token sequences
      5. Regression head: Linear(128, 64) → ReLU → Dropout(0.1) → Linear(64, 1)

      Output: Generalization gap prediction (continuous value)
      Implementation: cawe/models/cawe.py
    feature_tag: model
    priority: 50
    source_document: 03_architecture.md
    complexity: 14
    test_requirements: |
      ## Test Requirements (MANDATORY)
      - Create `tests/test_cawe.py` for this task
      - Minimum 3 test methods with REAL assertions
      - Test forward pass with all 3 architecture families
      - Test output shape validation
      - Test tokenizer dispatch correctness
      - NO placeholder tests (pass, ..., assert True)
      - Tests must be runnable with `pytest`
    reference_files:
      architecture: "03_architecture.md#cawe-model"
      logic: "03_logic.md#cawe-api"
      config: "03_config.md#model-config"

  # Epic A-3: Tokenizer Implementation (Complexity: 12)
  - id: task-003
    epic: A-3
    title: Implement 3 architecture-specific tokenizers
    description: |
      Implement tokenizers to project architecture-specific weights to D=128 tokens:
      1. CNNTokenizer: Extract conv kernels → flatten → project to D=128
      2. TransformerTokenizer: Extract Q/K/V matrices → project to D=128
      3. MLPTokenizer: Extract weight matrices → project to D=128

      All tokenizers output (num_layers, D) token sequences.
      Implementation: cawe/tokenizers/tokenizers.py
    feature_tag: model
    priority: 49
    source_document: 03_architecture.md
    complexity: 12
    test_requirements: |
      ## Test Requirements (MANDATORY)
      - Create `tests/test_tokenizers.py` for this task
      - Minimum 3 test methods with REAL assertions
      - Test each tokenizer with sample weights
      - Test output shape (num_layers, 128)
      - Test projection layer dimensions
      - NO placeholder tests
      - Tests must be runnable with `pytest`
    reference_files:
      architecture: "03_architecture.md#tokenizers"
      logic: "03_logic.md#tokenizer-apis"
      config: "03_config.md#token-dim"

  # Epic A-1: Dataset Assembly (Complexity: 11)
  - id: task-004
    epic: A-1
    title: Assemble heterogeneous model zoo dataset
    description: |
      Download/generate 750 models with generalization gap metadata:
      1. ViT models (250): From HuggingFace timm library
      2. CNN models (250): From torchvision.models (ResNet, VGG, etc.)
      3. MLP models (250): From Zenodo 5645138 or generate MNIST MLPs

      Each model includes: weights (.pt/.pth), generalization gap (train_acc - test_acc)
      Stratified train/test split: 600 train (200/200/200), 150 test (50/50/50)

      Output: data/model_zoo/ with subdirs vit/, cnn/, mlp/
      Format: PyTorch state_dict (.pt) + metadata JSON
    feature_tag: data-preparation
    priority: 48
    source_document: 03_prd.md
    complexity: 11
    test_requirements: |
      ## Test Requirements (MANDATORY)
      - Create `tests/test_dataset.py` for this task
      - Minimum 3 test methods with REAL assertions
      - Test dataset loading and splits
      - Test metadata format validation
      - Test stratification (200/200/200 train split)
      - NO placeholder tests
      - Tests must be runnable with `pytest`
    reference_files:
      architecture: "03_architecture.md#dataloader"
      logic: "03_logic.md#dataset-api"
      config: "03_config.md#dataset-config"

  # Epic A-5: Training Pipeline (Complexity: 10)
  - id: task-005
    epic: A-5
    title: Implement training loop with early stopping
    description: |
      Implement training pipeline:
      1. AdamW optimizer (lr=1e-4, weight_decay=1e-2)
      2. MSE loss (generalization gap regression)
      3. Batch size: 32
      4. Epochs: 100 with early stopping (patience=10 on validation Spearman ρ)
      5. Training data: 600 models (stratified 200/200/200)
      6. Validation monitoring: Compute Spearman ρ every epoch

      Implementation: scripts/train.py
      Save best model checkpoint based on validation Spearman ρ
    feature_tag: training
    priority: 47
    source_document: 03_architecture.md
    complexity: 10
    test_requirements: |
      ## Test Requirements (MANDATORY)
      - Create `tests/test_training.py` for this task
      - Minimum 3 test methods with REAL assertions
      - Test training loop execution (single epoch)
      - Test early stopping logic
      - Test checkpoint saving
      - NO placeholder tests
      - Tests must be runnable with `pytest`
    reference_files:
      architecture: "03_architecture.md#training-script"
      logic: "03_logic.md#training-loop"
      config: "03_config.md#training-config"

  # Epic A-6: Evaluation Pipeline (Complexity: 9)
  - id: task-006
    epic: A-6
    title: Implement evaluation with Spearman ρ and bootstrap CI
    description: |
      Implement evaluation pipeline:
      1. Primary Metric: Spearman ρ with bootstrap 95% CI (1000 resamples)
         - Success: ρ > 0.7 AND 95% CI lower bound > 0.7
      2. Secondary Metric: Per-architecture Spearman ρ (CNN, Transformer, MLP subsets)
         - Success: All three ρ > 0.65
      3. Baseline Comparison: Δρ = ρ_CAWE - ρ_baseline
         - Success: Δρ > 0.15

      Test data: 150 models (50/50/50 per family)
      Implementation: scripts/evaluate.py using scipy.stats.spearmanr
      Save metrics to results/h-e1_metrics.csv
    feature_tag: evaluation
    priority: 46
    source_document: 03_prd.md
    complexity: 9
    test_requirements: |
      ## Test Requirements (MANDATORY)
      - Create `tests/test_evaluation.py` for this task
      - Minimum 3 test methods with REAL assertions
      - Test Spearman correlation computation
      - Test bootstrap CI calculation
      - Test per-architecture metric calculation
      - NO placeholder tests
      - Tests must be runnable with `pytest`
    reference_files:
      architecture: "03_architecture.md#evaluation-script"
      logic: "03_logic.md#evaluation-metrics"
      config: "03_config.md#eval-config"

  # Epic A-7: Visualization Generation (Complexity: 8)
  - id: task-007
    epic: A-7
    title: Generate required figures for validation report
    description: |
      Generate 4 required figures:
      1. Mandatory: Spearman ρ comparison (CAWE vs Baseline) with 95% CI error bars
      2. Per-architecture performance bar chart (ρ for CNN/Transformer/MLP)
      3. Prediction scatter plot (predicted vs actual gap, 150 test models)
      4. Architecture clustering t-SNE (CAWE embeddings colored by family)

      All figures saved to {hypothesis_folder}/figures/
      Implementation: scripts/visualize.py using matplotlib/seaborn
    feature_tag: visualization
    priority: 45
    source_document: 03_prd.md
    complexity: 8
    test_requirements: |
      ## Test Requirements (MANDATORY)
      - Create `tests/test_visualize.py` for this task
      - Minimum 3 test methods with REAL assertions
      - Test figure generation (mocked data)
      - Test file saving to figures/
      - Test all 4 figure types created
      - NO placeholder tests
      - Tests must be runnable with `pytest`
    reference_files:
      architecture: "03_architecture.md#visualization-script"
      logic: null
      config: null

  # Epic A-2: Baseline Implementation (Complexity: 6)
  - id: task-008
    epic: A-2
    title: Implement Flat-Weight MLP baseline model
    description: |
      Implement naive baseline for Δρ comparison:
      1. Input: Flattened weight vector (concatenate all model weights)
      2. Architecture:
         - Linear(input_dim, 512) → ReLU → Dropout(0.2)
         - Linear(512, 256) → ReLU → Dropout(0.2)
         - Linear(256, 128) → ReLU
         - Linear(128, 1)
      3. No tokenization, no architectural awareness

      Used for baseline comparison (Δρ = ρ_CAWE - ρ_baseline > 0.15)
      Implementation: cawe/baselines/flat_mlp.py
    feature_tag: model
    priority: 44
    source_document: 03_prd.md
    complexity: 6
    test_requirements: |
      ## Test Requirements (MANDATORY)
      - Create `tests/test_baseline.py` for this task
      - Minimum 3 test methods with REAL assertions
      - Test forward pass with flattened weights
      - Test output shape validation
      - Test dropout behavior (train vs eval mode)
      - NO placeholder tests
      - Tests must be runnable with `pytest`
    reference_files:
      architecture: "03_architecture.md#baseline-model"
      logic: "03_logic.md#baseline-api"
      config: null

  # ========================================
  # SUBTASKS (from Logic Agent - 6 subtasks allocated)
  # ========================================

  # Subtask for A-4 (CAWE Integration - Highest complexity)
  - id: task-009
    epic: A-4
    title: "[Subtask] Implement NFT backbone integration"
    description: |
      Integrate NFT backbone using nfn library:
      1. Install nfn: pip install nfn
      2. Use NPLinear layers for permutation-equivariant processing
      3. Architecture: NPLinear(128, 64) → ReLU → NPLinear(64, 128) → ReLU → NPLinear(128, 128)
      4. Process tokenized weights (num_layers, 128) from tokenizers
      5. Maintain permutation-equivariance across all architectures

      Reference: github.com/AllanYangZhou/nfn (NeurIPS 2023)
      Key classes: NPLinear, TupleOp, state_dict_to_tensors, network_spec_from_wsfeat
    feature_tag: model
    priority: 43
    source_document: 03_logic.md
    complexity: null
    test_requirements: "Subtasks inherit parent task test requirements."
    reference_files:
      architecture: "03_architecture.md#nft-backbone"
      logic: "03_logic.md#nft-integration"
      config: null

  # Subtask for A-3 (Tokenizers - Medium-high complexity)
  - id: task-010
    epic: A-3
    title: "[Subtask] Implement weight extraction logic for heterogeneous architectures"
    description: |
      Implement architecture-specific weight extraction:
      1. CNN: Extract conv layer weights from state_dict['layer*.conv*.weight']
         - Flatten kernel tensors: [out_ch, in_ch, kh, kw] → [out_ch, in_ch*kh*kw]
      2. Transformer: Extract Q/K/V matrices from state_dict['*attn.qkv.weight']
      3. MLP: Extract FC layer weights from state_dict['fc*.weight']

      Handle variable layer counts and dimension sizes across different models.
      Ensure robustness to missing/unexpected layer names.
    feature_tag: model
    priority: 42
    source_document: 03_logic.md
    complexity: null
    test_requirements: "Subtasks inherit parent task test requirements."
    reference_files:
      architecture: "03_architecture.md#tokenization-strategy"
      logic: "03_logic.md#weight-extraction"
      config: null

