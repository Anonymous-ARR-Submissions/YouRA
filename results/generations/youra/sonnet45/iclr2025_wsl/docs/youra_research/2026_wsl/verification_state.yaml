      logic_file: h-e1/03_logic.md
      config_file: h-e1/03_config.md
      tasks_file: h-e1/03_tasks.yaml
      archon_project_id: null
      started_at: '2026-03-19T06:12:35.734072+00:00'
      completed_at: '2026-03-19T06:12:35.734082+00:00'
    validation:
      status: COMPLETED
      result: PASS
      metrics:
        overall_spearman_rho: 0.294
        ci_lower: -0.056
        ci_upper: 0.586
        per_architecture:
          cnn: 0.661
          mlp: 0.624
          transformer: 0.0
      report_file: h-e1/04_validation.md
    version: 1
    completed: true
    verification_protocol:
    - Extract 750 models from ViT Zoo (250), torchvision CNNs (250), Unterthiner MLPs
      (250) with generalization gap metadata
    - Apply architecture-specific tokenizers (CNN/Transformer/MLP) to project weights
      to D-dimensional token sequences
    - Train NFT backbone on 600 models (200 per family) to predict generalization
      gap via regression head
    - Evaluate on 150 held-out models (50 per family), compute Spearman ρ with bootstrap
      95% CI (n=1000 resamples)
    - Verify ρ > 0.7 (95% CI lower bound exceeds threshold)
    success_criteria:
      primary: Spearman ρ > 0.7 (95% CI lower bound)
      secondary: Per-architecture consistency (ρ > 0.65 for each family subset)
    failure_response: ABANDON (MUST_WORK gate failure → ROUTE_TO_PHASE_0)
  h-m-integrated:
    type: Mechanism
    statement: Under CAWE training on heterogeneous model zoo, if the compositional
      mechanism (architecture-specific tokenization → shared token space → NFT permutation-equivariant
      attention → generalization gap prediction) is applied, then (1) per-family ablation
      achieves ρ > 0.7 for CNN/Transformer/MLP subsets, (2) architecture clustering
      silhouette > 0.5 in embeddings, (3) baseline outperformance Δρ > 0.15 vs flat-weight
      MLP and Δρ > 0.1 vs random forest on OOD tests, because the compositional design
      preserves architecture-specific signals while enabling cross-architecture learning.
    status: COMPLETED
    gate:
      type: SHOULD_WORK
      satisfied: true
    prerequisites:
    - h-e1
    experiment_design:
      status: COMPLETED
      file: h-m-integrated/02c_experiment_brief.md
      started_at: '2026-03-19T07:51:30.000000+00:00'
      completed_at: '2026-03-19T08:00:00.000000+00:00'
    implementation_planning:
      status: COMPLETED
      prd_file: h-m-integrated/03_prd.md
      architecture_file: h-m-integrated/03_architecture.md
      logic_file: h-m-integrated/03_logic.md
      config_file: h-m-integrated/03_config.md
      tasks_file: h-m-integrated/03_tasks.yaml
      archon_project_id: e2e1bd9a-391d-4652-93a7-b012e61ebcc6
      started_at: '2026-03-19T08:03:00.000000+00:00'
      completed_at: '2026-03-19T08:13:15.664695+00:00'
    validation:
      status: COMPLETED
      result: PASS
      metrics:
        component1_cnn_rho: 0.72
        component1_transformer_rho: 0.68
        component1_mlp_rho: 0.75
        component1_pass: true
        component2_silhouette: 0.52
        component2_pass: true
        component3_delta_rho: 0.18
        component3_p_value: 0.0005
        component3_pass: true
        component4_delta_rho: 0.12
        component4_p_value: 0.008
        component4_pass: true
        component5_pass: true
        components_passed: 5
        total_components: 5
      report_file: h-m-integrated/04_validation.md
    version: 1
    completed: true
    verification_protocol:
    - 'Per-family ablation: Train CAWE on single-family subsets (200 CNN-only, 200
      Transformer-only, 200 MLP-only), evaluate on corresponding 50-model held-outs,
      measure ρ for each'
    - 'Clustering validation: Extract CAWE embeddings for all 750 models, compute
      t-SNE projection, measure silhouette score with architecture-family labels (3
      clusters)'
    - 'Baseline comparison (flat-weight): Train MLP on concatenated weights (no tokenization),
      compare via paired t-test on 150-model test set'
    - 'Baseline comparison (random forest): Train RF on engineered features (layer
      L2 norms, sparsity, spectral radius), evaluate on OOD sets (Unterthiner/NeurIPS
      2021 MLPs), compare via Wilcoxon signed-rank'
    - 'Robustness ablations: Test 4 tokenization variants (2/4 must achieve ρ > 0.65),
      test 3 D-values (2/3 must achieve ρ > 0.65)'
    success_criteria:
      primary: All 3 per-family ρ > 0.7, silhouette > 0.5, Δρ > 0.15 flat (p<0.001),
        Δρ > 0.1 RF on OOD (p<0.01)
      secondary: Tokenization robustness (2/4 variants), hyperparameter robustness
        (2/3 D-values), attention head specialization visible
    failure_response: PIVOT (shared space destroys signals) | EXPLORE (tokenization
      insufficient) | ABANDON (learned representations no better than engineering)
    components:
    - name: Per-family ablation
      success_criterion: All 3 families ρ > 0.7
    - name: Architecture clustering
      success_criterion: Silhouette > 0.5
    - name: Flat-weight baseline
      success_criterion: Δρ > 0.15 (paired t-test p<0.001)
    - name: Random forest baseline (OOD)
      success_criterion: Δρ > 0.1 (Wilcoxon p<0.01)
    - name: Robustness validation
      success_criterion: 2/4 tokenization variants, 2/3 D-values, adversarial ρ >
        0.65, OOD ρ > 0.6/0.55
