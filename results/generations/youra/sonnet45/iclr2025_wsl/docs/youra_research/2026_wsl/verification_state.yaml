sub_hypotheses:
  h-e1:
    type: Existence
    statement: Under training on a heterogeneous 750-model zoo (CNNs, Transformers,
      MLPs), if a Compositional Architecture-Agnostic Weight Encoder (CAWE) is trained
      to predict generalization gap, then it achieves Spearman ρ > 0.7 (95% CI lower
      bound) on a 150-model held-out test set because the shared NFT backbone learns
      architecture-independent weight relationships from tokenized representations.
    status: COMPLETED
    gate:
      type: MUST_WORK
      satisfied: true
    prerequisites: []
    experiment_design:
      status: COMPLETED
      file: h-e1/02c_experiment_brief.md
      started_at: '2026-03-19T05:53:55.444832+00:00'
