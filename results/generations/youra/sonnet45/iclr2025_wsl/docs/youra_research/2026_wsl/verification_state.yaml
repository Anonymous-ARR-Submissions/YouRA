main_hypothesis:
  id: H-CAWE-v1
  title: Compositional Architecture-Agnostic Weight Encoder
  statement: Under training on a 750-model heterogeneous zoo (250 CNNs from torchvision,
    250 Vision Transformers from ViT Model Zoo, 250 FC-MLPs from Unterthiner MNIST),
    if a Compositional Architecture-Agnostic Weight Encoder (CAWE) combining architecture-specific
    tokenizers with a shared Neural Functional Transformer (NFT) backbone is trained
    to predict generalization gap, then the encoder achieves Spearman ρ > 0.7 on cross-architecture
    generalization gap prediction while preserving architecture-family structure (silhouette
    > 0.5) and outperforming flat-weight baselines (Δρ > 0.15), because the NFT's
    permutation-equivariant attention mechanism learns cross-layer weight relationships
    from shared token representations that are architecture-independent after tokenization.
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: Heterogeneous Model Zoo (ViT Model Zoo 250, torchvision CNNs 250, Unterthiner
      MLPs 250)
    model: CAWE (NFT backbone + architecture-specific tokenizers)
    optimizer: AdamW
    hyperparameters:
      learning_rate: 1e-4
      batch_size: 32
      epochs: 100
      split: 80/20 stratified
      seed: 42
  baseline_comparison:
