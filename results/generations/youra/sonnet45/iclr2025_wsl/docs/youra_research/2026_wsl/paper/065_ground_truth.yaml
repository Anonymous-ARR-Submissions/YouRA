    verification: "HONEST_LIMITATION"

  - limitation_id: "L2"
    paper_location: "Section 5.3, Section 6"
    claim_text: "Transformer tokenization gap (ρ=0.68 vs CNN/MLP 0.72/0.75)"
    ground_truth:
      transformer_rho: 0.68
      cnn_rho: 0.72
      mlp_rho: 0.75
      identified_causes:
