# COMPETING EXPLANATIONS
# ═══════════════════════════════════════════════════════════════════════════════

competing_explanations:
  - phenomenon: "Transformer performance gap"
    paper_explanation: "Q/K/V extraction may not fully capture attention weight structure"
    alternative_explanations:
      - "Transformer weight geometry fundamentally different from CNN/MLP"
      - "Domain shift - ImageNet pretrained ViTs evaluated on CIFAR-10"
      - "Insufficient transformer-specific inductive biases in current tokenizer"
    source: "045_validated_hypothesis.md - Section 5.2 Finding 1"
    paper_treatment: "Presented with 3 competing explanations, recommended Transformer-NFN as future work"

  - phenomenon: "Scale-dependent performance"
    paper_explanation: "PoC scale (150 vs 750 models) impacts performance"
    alternative_explanations:
      - "Small test set high variance (30 vs 150 samples)"
      - "NFT attention requires larger populations for cross-architecture learning"
      - "Early stopping at epoch 7 prevented full convergence"
    source: "045_validated_hypothesis.md - Section 4.2"
    paper_treatment: "Acknowledged all three factors, recommended full-scale validation"

