hypothesis_draft:
  title: "Compositional Architecture-Agnostic Weight Encoder (CAWE)"
  hypothesis_id: "H-CAWE-v1"
  core_claim: |
    A compositional architecture-agnostic weight encoder combining architecture-specific tokenizers with a shared NFT backbone achieves cross-architecture generalization gap prediction (Spearman ρ > 0.7) on a heterogeneous 750-model zoo (CNNs, Transformers, MLPs) while preserving architecture-family structure (silhouette > 0.5) and outperforming flat-weight baselines (Δρ > 0.15).
  mechanism: |
    Stage 1: Architecture-specific tokenization projects diverse weight types into shared D-dimensional token space.
    Stage 2: NFT processes tokens with permutation-equivariant attention, learning cross-layer relationships architecture-independently.
    Stage 3: Regression head maps NFT embeddings to generalization gap predictions, enabling cross-architecture ranking.
  predictions:
    - P1: "In-distribution ρ > 0.7 (95% CI) on 150 held-out models"
    - P2: "Per-family ρ > 0.7 for CNN, Transformer, MLP subsets"
    - P3: "Architecture clustering silhouette > 0.5"
    - P4: "Δρ > 0.15 vs flat-weight baseline"
    - P5: "Δρ > 0.1 vs random forest on OOD tests"
    - P6: "Adversarial robustness ρ > 0.65"
    - P7: "Tokenization robustness: 2/4 variants work"
    - P8: "Hyperparameter robustness: 2/3 D-values work"
    - P9: "OOD architecture ρ > 0.6"
    - P10: "OOD dataset+arch ρ > 0.55"

variables_summary:
  independent: "Architecture family (CNN/Transformer/MLP), model size, tokenization strategy, token dimension D"
  dependent_primary: "Generalization gap prediction accuracy (Spearman ρ)"
  controlled: "Dataset split (80/20, seed=42), NFT hyperparameters, training procedure (AdamW, lr=1e-4, batch=32, 100 epochs)"

