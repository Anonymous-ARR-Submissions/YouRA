experimental_setup:
  dataset:
    name: "Heterogeneous Model Zoo (750 models)"
    type: "standard"
    source: "ViT Model Zoo (250), torchvision CNNs (250), Unterthiner MNIST MLPs (250)"
    path: "github.com/ModelZoos/ViTModelZoo + torchvision.models + Zenodo 5645138"
    hypothesis_fit: "Provides 3-family heterogeneous validation (CNN, Transformer, MLP) at manageable scale (750 models). All datasets publicly available. ViT Zoo designed for model population research [Falk et al., 2025]. Unterthiner MNIST MLPs are standard weight-space learning benchmark."
  model:
    name: "Compositional Architecture-Agnostic Weight Encoder (CAWE)"
    type: "Neural Functional Transformer with Architecture-Specific Tokenizers"
    source: "nfn library (PyPI: pip install nfn) for NFT backbone + custom tokenizers"
    hypothesis_fit: "NFT proven on MNIST MLPs [Zhou et al., 2023]. Architecture-specific tokenizers (CNN, Transformer, MLP) project to shared token space. NFT processes tokens with permutation-equivariant attention. Hybrid approach: arch-specific preprocessing + arch-agnostic processing."
  baselines:
    - name: "Flat-Weight MLP"
      method: "Concatenate all model weights into single vector → MLP regression head (no tokenization). Tests whether tokenization provides value."
    - name: "Random Forest on Engineered Features"
      method: "Hand-crafted weight statistics (layer-wise L2 norms, sparsity, spectral radius, gradient norms) → scikit-learn RandomForestRegressor. Tests whether learned representations beat feature engineering."

# ═══════════════════════════════════════════════════════════════
# SECTION 3: Novelty & Innovation
# ═══════════════════════════════════════════════════════════════

novelty:
  preserved_novelty: "First empirical validation of architecture-agnostic weight encoders on a truly heterogeneous multi-family model zoo (prior NFT work: homogeneous MNIST MLPs; Universal NFNs: theoretical claims without large-scale heterogeneous validation). Compositional hybrid approach (arch-specific tokenization + arch-agnostic processing) avoids DWSNets library lock-in and Universal NFN impracticality."
  key_innovation: "Compositional architecture-agnostic processing: architecture-specific tokenizers project diverse weight types (CNN kernels, Transformer Q/K/V, MLP matrices) into shared D-dimensional token space, then unified NFT backbone processes tokens with permutation-equivariant attention, learning cross-layer relationships architecture-independently. Enables weight-space analysis across CNNs, Transformers, MLPs without library-specific dependencies."
  differentiation:
    - prior_work: "DWSNets [failed in ROUTE_TO_0]"
      difference: "DWSNets assumes CNN-specific weight shapes, runtime failure on FC-MLP weights. CAWE uses architecture-specific tokenizers to handle diverse weight types, avoiding library lock-in."
    - prior_work: "Neural Functional Transformers [Zhou et al., 2023, arXiv:2305.13546]"
      difference: "NFT demonstrated on homogeneous single-architecture dataset (MNIST MLPs). CAWE extends to heterogeneous 3-family zoo (CNNs+Transformers+MLPs) with cross-architecture validation."
    - prior_work: "Universal Neural Functionals [Zhou et al., 2024, arXiv:2402.05232]"
      difference: "Universal NFNs provide theoretical automatic construction for any architecture but lack empirical large-scale heterogeneous validation (750 models). CAWE validates at scale with concrete tokenization strategies."
    - prior_work: "GNN approach [Kofinas et al., 2024, arXiv:2403.12143]"
      difference: "GNN requires explicit computational graph structure. CAWE uses attention-based implicit relationship learning (no manual graph construction required)."

