    - name: "Training Procedure"
      operationalization: "AdamW optimizer, lr=1e-4, batch size=32, 100 epochs, cross-entropy loss for generalization gap regression"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 3
  steps:
    - step: 1
      description: "Architecture-specific tokenization projects diverse weight types (CNN kernels, Transformer Q/K/V matrices, MLP layer weights) into a shared D-dimensional token representation space through architecture-tailored preprocessing (e.g., per-head statistics for Transformers, spatial pooling for CNNs, layer-wise vectors for MLPs)."
      evidence: "SANE tokenization pattern [Schürholt et al., 2024] demonstrates sequential weight chunking with transformers. Prof. Pax's feasibility analysis confirmed tokenization strategies (statistics-based: mean/std/Frobenius norm, spectral-based: top SVs/eigenvalues, learned projection, SANE-style sampling)."
      falsifier: "If tokenization destroys architecture-specific quality signals, per-family ablation would show ρ < 0.7 for at least one architecture family (CNN, Transformer, or MLP) when trained and evaluated on that family alone."
    - step: 2
      description: "The Neural Functional Transformer (NFT) backbone processes token sequences with permutation-equivariant self-attention, learning cross-layer weight relationships independent of source architecture. Different attention heads may specialize in different architecture families emergently (not hard-coded)."
      evidence: "NFT paper [Zhou et al., 2023] demonstrated +17% improvement on INR classification using attention over weight tokens. Universal NFNs [Zhou et al., 2024] provide theoretical basis for automatic equivariant model construction for any architecture."
      falsifier: "If NFT attention does not learn architecture-aware processing, attention pattern analysis would show uniform head activation across all architecture families (no specialization). Additionally, CAWE would not outperform flat-weight baseline by Δρ > 0.15."
    - step: 3
      description: "The NFT embedding is mapped to generalization gap prediction via a regression head. Models with similar weight patterns (indicating similar generalization behavior) cluster in the embedding space regardless of architecture family, enabling cross-architecture ranking."
      evidence: "Generalization gap (test - train accuracy) is a standard model quality metric. Spearman ρ measures rank correlation, appropriate for relative model ranking across architectures."
      falsifier: "If cross-architecture generalization fails, out-of-distribution tests would show ρ < 0.6 on unseen architecture families (Unterthiner MLPs) or ρ < 0.55 on unseen dataset+architecture combo (NeurIPS 2021 MLPs)."
  key_tension: "Shared token space assumption vs. architecture-specific information preservation. Prof. Rex raised concern that forcing CNN kernels and Transformer attention matrices into the same D-dimensional space might destroy family-specific quality signals. Mitigation: per-family ablation (Prediction 2) validates signal preservation."
  evidence_summary: |
    The causal chain is supported by (1) proven NFT effectiveness on homogeneous MLPs [Zhou et al., 2023], (2) SANE's demonstration of tokenization scalability [Schürholt et al., 2024], (3) theoretical basis for architecture-agnostic equivariant processing [Zhou et al., 2024 Universal NFNs], and (4) availability of publicly accessible heterogeneous model zoos (ViT Zoo, torchvision CNNs, Unterthiner MLPs). The hypothesis extends existing single-architecture NFT results to heterogeneous multi-family zoos, which is empirically unproven but theoretically grounded.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Shared token space preserves architecture-specific quality signals after tokenization (permutation equivariance is sufficient, not just necessary)."
    supporting_evidence: "NFT paper shows attention can discover structure from token sequences. Theoretical basis from Universal NFNs for automatic construction."
    consequence_if_violated: "Per-family performance would degrade (ρ < 0.7 for at least one family). CAWE would not preserve architecture clustering (silhouette < 0.5)."
  - id: "A2"
    assumption: "Generalization gap (test - train accuracy) is a meaningful model quality metric across diverse architectures (CNNs, Transformers, MLPs)."
    supporting_evidence: "Standard ML evaluation metric used across all model families. Captures training dynamics and overfitting tendency regardless of architecture."
    consequence_if_violated: "Spearman ρ correlations would be low even for architecture-specific baselines. Cross-architecture ranking would be meaningless."
  - id: "A3"
    assumption: "750-model zoo (ViT Zoo 250, torchvision CNNs 250, Unterthiner MLPs 250) is representative of broader model zoo diversity for proof-of-concept validation."
    supporting_evidence: "ViT Zoo designed for model population research [Falk et al., 2025]. Torchvision CNNs include diverse architectures (ResNet, EfficientNet, DenseNet). Unterthiner MNIST MLPs are standard weight-space learning benchmark."
    consequence_if_violated: "Out-of-distribution generalization to unseen datasets (NeurIPS 2021 MLPs) would fail (ρ < 0.55), indicating dataset memorization rather than true weight-space learning."
  - id: "A4"
    assumption: "NFT's permutation-equivariant attention is sufficient for cross-layer relationship learning without explicit architectural inductive biases (vs. GNN approach requiring explicit computational graph structure)."
    supporting_evidence: "NFT paper demonstrates this for MLPs. Attention mechanisms discover relationships from data without hard-coded structure."
    consequence_if_violated: "CAWE would not beat random forest baseline (which uses hand-crafted features encoding architectural structure) by Δρ > 0.1 on out-of-distribution tests."
  - id: "A5"
    assumption: "Tokenization strategy is not critically sensitive to hyperparameter choices (statistics vs. spectral vs. learned projection approaches are roughly equivalent)."
    supporting_evidence: "Multiple successful weight embedding approaches exist in literature (SANE, NFT, GNN-based). Prof. Pax identified 4 plausible strategies."
    consequence_if_violated: "Fewer than 2 out of 4 tokenization variants would achieve ρ > 0.65, indicating method is fragile and sensitive to arbitrary design choices."

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Supervised image classification models (CNNs, Vision Transformers, FC-MLPs)
    - Models trained to reasonable convergence (not purely random initialization)
    - Standard computer vision architectures (ResNet, EfficientNet, DenseNet, ViT variants, multi-layer perceptrons)
    - Generalization gap as target model property (test - train accuracy)
    - 750-model scale constrained proof-of-concept validation
    - Publicly available model zoos (ViT Model Zoo, torchvision, Unterthiner/NeurIPS 2021 MNIST MLPs)
  does_not_apply_to: |
    - Unsupervised/self-supervised models (CLIP, MAE, SimCLR, BYOL) - excluded from scope
    - Reinforcement learning policies, diffusion models, generative models (GANs, VAEs) - future work
    - NLP transformers (BERT, GPT variants) - different weight structures, future extension
    - Other model properties beyond generalization gap (robustness, fairness, calibration, interpretability)
    - Full HuggingFace Hub scale (1M+ models) - constrained to 750-model PoC
    - Real-time deployment or production inference systems - research validation only
    - Truly novel hybrid architectures not in training set (e.g., CvT Convolutional Vision Transformer) - tested in adversarial set but may require tokenizer extension
  known_limitations: |
    - Requires architecture metadata (CNN vs Transformer vs MLP) for tokenizer selection - not fully architecture-blind
    - Requires white-box access to model weights (not just API access or black-box models)
    - Tokenization preprocessing is architecture-specific (hybrid approach, not fully automatic like Universal NFNs claim)
    - Validated on image classification only - generalization to other domains (NLP, RL, multimodal) is future work
    - Performance may degrade on out-of-distribution architectures (ρ drops from 0.7 → 0.6 → 0.55 with increasing distribution shift)
    - Adversarial stress tests use non-standard layer types (depthwise separable, grouped convolutions, SE blocks) but not truly novel paradigms

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "On 150 held-out models (50 per family: CNN, Transformer, MLP), CAWE achieves Spearman ρ > 0.7 (95% CI lower bound) for generalization gap prediction."
    test_method: "Train CAWE on 600 models (200 per family), evaluate on 150 held-out models. Compute Spearman rank correlation between predicted and actual generalization gap. Bootstrap 95% CI (n=1000 resamples)."
    success_criterion: "ρ > 0.7 (95% CI lower bound must exceed 0.7)"
    falsification: "ρ ≤ 0.7 (CI lower bound) → Hypothesis FAILS (MUST_WORK gate)"
  - id: "P2"
    primary: false
    statement: "Per-family ablation: When trained and evaluated on each architecture family separately, CAWE achieves ρ > 0.7 for CNN-subset, Transformer-subset, and MLP-subset, validating that shared token space preserves family-specific quality signals."
    test_method: "Train CAWE on single-family subsets (200 CNNs, 200 Transformers, 200 MLPs separately). Evaluate on corresponding held-out sets (50 each). Measure per-family Spearman ρ. Additionally, visualize attention patterns to check for head specialization."
    success_criterion: "All 3 families achieve ρ > 0.7. Attention pattern analysis reveals head specialization (some heads activate more for certain families)."
    falsification: "Any family ρ < 0.7 → Shared space destroys family-specific signals (A1 violated) → Hypothesis FAILS"
  - id: "P3"
    primary: false
    statement: "t-SNE visualization of CAWE embeddings shows CNN/Transformer/MLP clusters with silhouette score > 0.5, confirming architecture-family distinctions are maintained."
    test_method: "Extract CAWE embeddings for all 750 models. Compute t-SNE projection (2D). Compute silhouette score with architecture-family labels (3 clusters: CNN, Transformer, MLP)."
    success_criterion: "Silhouette score > 0.5"
    falsification: "Silhouette ≤ 0.5 → Architecture families not distinguishable in embedding space → Prediction 3 FAILS"
  - id: "P4"
    primary: false
    statement: "CAWE outperforms flat-weight MLP baseline by Δρ > 0.15 (paired t-test, p < 0.001)."
    test_method: "Train flat-weight MLP baseline (concatenate all weights → MLP regression head, no tokenization). Compare per-model errors on 150-model test set. Paired t-test on absolute errors."
    success_criterion: "Δρ = ρ_CAWE - ρ_flat > 0.15, paired t-test p < 0.001"
    falsification: "Δρ ≤ 0.15 → Tokenization provides insufficient benefit → Hypothesis FAILS"
  - id: "P5"
    primary: false
    statement: "CAWE outperforms random forest baseline on hand-crafted features by Δρ > 0.1 on out-of-distribution tests (Wilcoxon signed-rank, p < 0.01)."
    test_method: "Train random forest regressor on engineered weight features (layer-wise L2 norms, sparsity, spectral radius). Evaluate on OOD tests (Unterthiner MLPs, NeurIPS 2021 MLPs). Compare to CAWE using Wilcoxon signed-rank test (non-parametric)."
    success_criterion: "Δρ = ρ_CAWE - ρ_RF > 0.1 on OOD tests, Wilcoxon p < 0.01"
    falsification: "Δρ ≤ 0.1 → Learned representations no better than engineered features → Hypothesis FAILS"
  - id: "P6"
    primary: false
    statement: "Adversarial robustness: On 50 adversarial models (10 random init, 10 mid-training, 10 non-standard layers, 10 broken final-layer weights, 10 alternative training paradigms), CAWE achieves ρ > 0.65."
    test_method: "Create adversarial test set with 5 stress-test categories. Evaluate CAWE on this set separately. Measure Spearman ρ."
    success_criterion: "ρ > 0.65 on adversarial set"
    falsification: "ρ ≤ 0.65 → Method fails on non-ideal conditions → Prediction 6 FAILS (robustness concern)"
  - id: "P7"
    primary: false
    statement: "Tokenization robustness: At least 2 out of 4 tokenization strategies (statistics-based, spectral-based, learned projection, SANE-style) achieve ρ > 0.65 on in-distribution test set."
    test_method: "Train CAWE with 4 different tokenization variants. Evaluate each on 150-model test set. Count how many achieve ρ > 0.65. Statistical test: Friedman test across 4 conditions (p < 0.05 indicates significant difference)."
    success_criterion: "At least 2/4 variants achieve ρ > 0.65"
    falsification: "Fewer than 2/4 achieve ρ > 0.65 → Method critically sensitive to tokenization choice (A5 violated) → Hypothesis FAILS"
  - id: "P8"
    primary: false
    statement: "Hyperparameter robustness: At least 2 out of 3 token dimension values (D ∈ {64, 128, 256}) achieve in-distribution ρ > 0.65."
    test_method: "Train CAWE with D=64, D=128, D=256. Evaluate each on 150-model test set. Count successes."
    success_criterion: "At least 2/3 D-values achieve ρ > 0.65"
    falsification: "Fewer than 2/3 achieve ρ > 0.65 → Method critically sensitive to D hyperparameter → Robustness concern"
  - id: "P9"
    primary: false
    statement: "Out-of-distribution architecture: CAWE achieves ρ > 0.6 on Unterthiner MLPs (unseen architecture family, trained on ViT+CNN only)."
    test_method: "Train CAWE on ViT (200) + CNN (200) only (400 models, 2 families). Evaluate on Unterthiner MLPs (50 held-out). Measure Spearman ρ."
    success_criterion: "ρ > 0.6 on Unterthiner MLPs"
    falsification: "ρ ≤ 0.55 → OOD architecture generalization fails → Hypothesis FAILS (see P1 H0 criterion)"
  - id: "P10"
    primary: false
    statement: "Out-of-distribution dataset+architecture: CAWE achieves ρ > 0.55 on NeurIPS 2021 MLPs (unseen dataset + unseen architecture combo)."
    test_method: "Train CAWE on ViT+CNN (same as P9). Evaluate on NeurIPS 2021 MLPs (100 models, different dataset from Unterthiner). Measure Spearman ρ."
    success_criterion: "ρ > 0.55 on NeurIPS 2021 MLPs"
    falsification: "ρ ≤ 0.55 → Dataset memorization, not true weight-space learning (A3 violated)"

