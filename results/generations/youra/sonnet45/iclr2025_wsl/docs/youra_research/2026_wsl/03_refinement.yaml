# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-CAWE-v1"
  confidence_level: 0.85  # All 4 perspective personas STRONG verdicts
  core_hypothesis_statement: |
    Under training on a 750-model heterogeneous zoo (250 CNNs from torchvision, 250 Vision Transformers from ViT Model Zoo, 250 FC-MLPs from Unterthiner MNIST), if a Compositional Architecture-Agnostic Weight Encoder (CAWE) combining architecture-specific tokenizers with a shared Neural Functional Transformer (NFT) backbone is trained to predict generalization gap, then the encoder achieves Spearman ρ > 0.7 on cross-architecture generalization gap prediction while preserving architecture-family structure (silhouette > 0.5) and outperforming flat-weight baselines (Δρ > 0.15), because the NFT's permutation-equivariant attention mechanism learns cross-layer weight relationships from shared token representations that are architecture-independent after tokenization, enabling discovery of architecture-specific processing patterns emergently through attention head specialization.
  alternative_hypothesis_h0: |
    A compositional architecture-agnostic weight encoder (CAWE) does NOT achieve superior cross-architecture generalization gap prediction (Spearman ρ ≤ 0.7 on heterogeneous test set) compared to architecture-agnostic baselines (flat-weight MLP) or architecture-specific baselines (family-specific encoders), OR the improvement over flat-weight baseline is Δρ ≤ 0.15, OR CAWE fails to beat random forest baseline on out-of-distribution tests by Δρ > 0.1.

