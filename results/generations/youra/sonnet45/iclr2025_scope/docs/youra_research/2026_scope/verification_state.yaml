main_hypothesis:
  id: H-SSMConv-v1
  title: Post-Hoc Hybrid SSM-Attention Conversion
  statement: Under LLaMA-7B/13B inference on long-context benchmarks (8K-128K tokens),
    if deeper Transformer layers (L ≥ 20 in 32-layer models) are converted to hybrid
    selective SSM–SWA blocks via adapter-based knowledge distillation on ≤5% original
    pretraining tokens, then the converted model achieves ≥2.5× wall-clock throughput
    at 128K context with <5% perplexity degradation, because deep layers exhibit operator-level
    low-rank structure (effective rank r_eff < 256, state size N ≤ 1024) with input-conditioned
    dynamics compressible into selective SSM recurrence while local dependencies are
    preserved via SWA windows.
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: The Pile (calibration), LongBench (evaluation)
    model: LLaMA-7B / LLaMA-13B
    optimizer: null
