hypothesis_draft:
  title: "Post-Hoc Hybrid SSM-Attention Conversion for Pre-Trained Transformers"
  hypothesis_id: "H-SSMConv-v1"
  core_claim: |
    Deeper Transformer layers in pre-trained models exhibit operator-level low-rank structure enabling post-hoc conversion to hybrid selective SSM-SWA blocks via lightweight adapter-based distillation, achieving sub-quadratic inference efficiency (≥2.5× throughput at 128K context) with minimal performance degradation (<5% perplexity) after calibration on ≤5% original pretraining tokens.
  mechanism: |
    The conversion mechanism operates via four causal steps:
    (1) Deep layers (L≥20) compress semantic information into low-rank attention operators (r_eff<256) with decreasing operator entropy,
    (2) Adapter matrices (W_adapt) distill Q/K/V weights into selective SSM parameters A(x), B(x), C(x), Δ(x) preserving Jacobian geometry,
    (3) Lightweight calibration (≤5% tokens) adapts SSM parameters because deep layers encode compressed representations not raw patterns,
    (4) Hybrid SSM+SWA architecture achieves linear complexity O(L) while SWA window (2048 tokens) preserves local precision.
  predictions:
    - P1: "≥2.5× wall-clock throughput at 128K context with linear latency scaling (R²>0.98)"
    - P2: "<5% perplexity degradation on The Pile compared to vanilla Transformer"
    - P3: "Phase 0 exponential distillation error decay with Jacobian alignment (W2<0.05) and cross-domain stability (<3% error delta)"

