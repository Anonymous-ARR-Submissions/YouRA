# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Deep Transformer layers (L≥20) exhibit low effective attention rank (r_eff < 256) due to semantic compression in late layers, with monotonically decreasing operator entropy across depth"
      evidence: "Predicted by hypothesis, requires Phase 1 empirical validation via SVD analysis and entropy measurement"
      falsifier: "If effective rank scales linearly with sequence length OR operator entropy increases with depth, the bounded-state assumption is violated"
    - step: 2
      description: "Selective SSM with input-conditioned parameters Δ(x) = Softplus(W_Δ[Q,K,V]) can compress low-rank attention operators via adapter-based distillation while preserving Jacobian geometry (Wasserstein-2 eigenvalue distance < 0.05)"
      evidence: "Builds on Mamba's selective mechanism (Gu & Dao 2023) and Samba's hybrid design (Ren et al. 2024), requires Phase 0 pilot validation"
      falsifier: "If distillation error does not decay exponentially in N OR Jacobian alignment fails, operator families are incompatible with SSM factorization"
    - step: 3
      description: "Lightweight calibration on ≤5% original pretraining tokens suffices to adapt SSM parameters because deep layers already encode compressed representations, not raw positional patterns"
      evidence: "Hypothesis prediction based on representation transfer assumption, validated by rapid saturation in calibration scaling curves"
      falsifier: "If perplexity improvement between 1B→10B tokens exceeds 20% of 10M→1B gain, calibration does not plateau (effectively retraining)"
    - step: 4
      description: "Hybrid SSM+SWA blocks achieve linear-time complexity O(L) with bounded memory while preserving local precision via windowed attention (2048 tokens), enabling ≥2.5× throughput at long context"
      evidence: "Samba demonstrates 3.73× throughput at 128K (Ren et al. 2024), adapter overhead <20% FLOPs maintains efficiency"
      falsifier: "If wall-clock latency exhibits quadratic curvature (linear model R²<0.98) OR adapter FLOPs >20%, efficiency claim collapses"
  key_tension: "Conversion imposes SSM structure post-hoc on Q/K/V matrices trained for attention kernels (not recurrent dynamics) - Jacobian alignment test determines if operator geometry is preserved or merely output-matched"
  evidence_summary: |
    Mamba establishes selective SSMs match Transformers when trained from scratch (6115 cit.). Samba validates hybrid SSM-SWA at scale (133 cit.). The novel claim is that pre-trained attention weights can be adapted (not retrained) to SSM dynamics while preserving operator-level equivalence.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Deep Transformer layers (L≥20) have learned compressed semantic representations with effective attention rank r_eff << sequence_length"
    supporting_evidence: "Late layers perform semantic abstraction not positional encoding (common in NLP literature), requires empirical validation"
    consequence_if_violated: "If deep layers maintain high-rank attention (r_eff scales with L), SSM state size N must scale proportionally, defeating linear efficiency"
  - id: "A2"
    assumption: "Selective SSM input-conditioning via Δ(x) can capture attention's data-dependent kernel behavior within bounded state N≤1024"
    supporting_evidence: "Mamba ablations show Δ selectivity is critical for long-context handling (Gu & Dao 2023)"
    consequence_if_violated: "If selective SSM requires N>1024 or fails Jacobian alignment, we're reconstructing attention in disguise (not compressing)"
  - id: "A3"
    assumption: "Adapter-based distillation (W_adapt: Q/K/V → A/B/C/Δ) preserves operator geometry not just output matching"
    supporting_evidence: "Requires Phase 0 Jacobian eigenvalue alignment validation (Wasserstein-2 < 0.05)"
    consequence_if_violated: "If output MSE is low but Jacobian misaligned, conversion creates brittle surrogate vulnerable to distribution shift"
  - id: "A4"
    assumption: "Pre-trained representations are sufficiently architecture-agnostic to transfer from attention to SSM with lightweight calibration (≤5% tokens)"
    supporting_evidence: "Hypothesis core assumption - knowledge transfer across architectural paradigms"
    consequence_if_violated: "If calibration requires >30% tokens, conversion is impractical vs training native hybrid (Samba-style)"
  - id: "A5"
    assumption: "SWA window (2048 tokens) suffices for local precision after SSM compression, maintaining hybrid architecture balance"
    supporting_evidence: "Samba uses window=2048 successfully (Ren et al. 2024), requires window sensitivity test"
    consequence_if_violated: "If performance degrades >10% when window varies 512→4096, global dependencies incorrectly shifted to recurrence"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Pre-trained decoder-only Transformer language models (LLaMA family, Mistral, similar architectures)
    - Models with 32-layer depth enabling meaningful deep-layer subset selection (L≥20)
    - Long-context scenarios (8K-128K tokens) where quadratic attention cost is prohibitive
    - Deployment scenarios prioritizing efficiency over absolute performance (<5% degradation acceptable)
  does_not_apply_to: |
    - Encoder-only or encoder-decoder architectures (BERT, T5) with different attention patterns
    - Small models (<1B parameters) where efficiency gains don't offset conversion overhead
    - Short-context tasks (<4K tokens) where quadratic attention is already efficient
    - Safety-critical applications requiring zero performance degradation
    - Vision Transformers or multi-modal models (extension requires separate validation)
  known_limitations: |
    - Conversion tested only on LLaMA-7B/13B (scaling to 70B+ models requires validation)
    - Single-GPU inference focus (distributed inference may have different bottlenecks)
    - English language benchmarks (multilingual generalization unknown)
    - Adapter overhead may scale unfavorably with hidden dimension in larger models

