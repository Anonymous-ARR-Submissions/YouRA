    statement: "Calibration saturates rapidly: perplexity improvement 1B→10B tokens <20% of 10M→1B gain"
    test_method: "Train adapters on calibration schedule {10M, 100M, 1B, 10B tokens}, measure perplexity at each checkpoint"
    success_criterion: "Improvement slope threshold met"
