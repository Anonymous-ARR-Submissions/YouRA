main_hypothesis:
  id: H-CalibDiff-v1
  title: Difficulty-Stratified Calibration Fingerprint of LLM Code Verifiers via P(True)
  statement: 'Under k=5 self-contained difficulty stratification on HumanEval+/MBPP+ (542 problems),

    if LLMs predict code correctness via P(True) logprob elicitation stratified by

    difficulty tiers bootstrapped from their own pass@1 distribution (hard = pass@1 = 0.0,

    easy = pass@1 >= 0.6), then Expected Calibration Error differs systematically between

    difficulty tiers (DELTA_ECE = ECE(hard) - ECE(easy) != 0, primary prediction DELTA_ECE > 0),

    because LLM confidence signals derived from pre-training distributions do not adequately

    reflect task-specific difficulty structure.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: HumanEval+ (164) + MBPP+ (378) via EvalPlus
    model: Llama3-8B, CodeLlama-7B, DeepSeek-Coder-6.7B
    optimizer: null
    hyperparameters:
      k_solutions: 5
      ece_bins: 15
      bootstrap_samples: 1000
      temperature_scaling_holdout: 0.2
      hard_tier_threshold: 0.0
      easy_tier_threshold: 0.6
