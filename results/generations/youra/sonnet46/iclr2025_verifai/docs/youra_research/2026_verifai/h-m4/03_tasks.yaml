  - id: "task-003"
    epic: "A-2: Data Loader"
    title: "Implement data_loader.py — load confidence, tiers, correctness, align, holdout split"
    description: |
      Implement all functions in src/data_loader.py per 03_architecture.md#DataLoader:
        1. load_confidence_scores(hm3_results_dir) → {model_short: {task_id: [c_values]}}
           Load ptrue_confidence_scores.json; fail early with explicit error if missing.
        2. load_tier_assignments(hm2_results_dir) → DataFrame[task_id, model_short, tier]
           Load tier_assignments.csv (wide format from h-m2); filter to hard/easy only.
        3. load_correctness(he1_results_dir, model_short) → {task_id: binary_label}
           Load correctness_{model_short}.json; compute y = mean(solutions) > 0.
        4. align_model_data(confidence, tier_df, correctness, model_short) → {c_hard, y_hard, c_easy, y_easy, n_hard, n_easy}
           Validate n_hard>=20 AND n_easy>=20; raise ValueError if not met.
           Note: CodeLlama may have n_easy=0 on HumanEval — use MBPP or combined; warn, do not fail.
        5. make_holdout_split(c_hard, y_hard, c_easy, y_easy, holdout_frac=0.2, seed=42)
           → (eval_data, holdout_data) stratified 80/20 split.
      Complexity: 11
    feature_tag: "data-loading"
    priority: 90
    source_document: "03_architecture.md"
    complexity: 11
    test_requirements: |
      - test_data_loader.py: load and align with mock JSON/CSV fixtures
