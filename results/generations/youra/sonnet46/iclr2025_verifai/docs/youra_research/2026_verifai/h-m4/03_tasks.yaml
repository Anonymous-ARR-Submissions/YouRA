  - id: "task-004"
    epic: "A-3: ECE Core"
    title: "Implement evaluate.py — compute_ece, compute_tier_ece, compute_delta_ece_bootstrap"
    description: |
      Implement ECE computation functions per 03_architecture.md#Evaluate and FR-2/FR-3:
        1. compute_ece(confidences, labels, M=15) → float
           Guo et al. 2017: ECE = sum_m (n_m/n)|acc_m - conf_m|
           M equal-width bins over [0,1]; skip empty bins; return NaN if all bins empty.
        2. compute_tier_ece(c_hard, y_hard, c_easy, y_easy, M=15) → {ece_hard, ece_easy, delta_ece}
        3. compute_delta_ece_bootstrap(c_hard, y_hard, c_easy, y_easy, n_boot=1000, M=15, seed=42)
           → (delta_ece_obs, ci_lower, ci_upper, p_value)
           Bootstrap resampling independently on hard and easy; ci = percentile [2.5, 97.5];
           p_value = fraction of boot samples <= 0.
      All random operations use np.random.default_rng(seed=42).
      Complexity: 13
    feature_tag: "evaluation"
    priority: 87
    source_document: "03_architecture.md"
    complexity: 13
    test_requirements: |
      - test_ece.py: unit test compute_ece with known inputs
      - test_bootstrap.py: seed reproducibility (1000 samples, same result across runs)
      - Verify NaN handling for degenerate bins
    reference_files:
      architecture: "03_architecture.md#Evaluate"
      logic: "03_logic.md"
      config: "03_config.md"

  - id: "task-005"
    epic: "A-4: Null Baseline"
    title: "Implement null baseline computation and P2 gate in evaluate.py"
    description: |
      Add null baseline functions to evaluate.py per FR-4:
        1. compute_null_baseline(c_hard, y_hard, c_easy, y_easy, M=15) → dict
           null_conf_hard = mean accuracy of hard tier (~0.0)
           null_conf_easy = mean accuracy of easy tier (~0.6+)
           Compute ECE_null for each tier (constant confidence = null_conf)
           Return: {null_conf_hard, null_conf_easy, ece_null_hard, ece_null_easy,
                    excess_ece_hard, excess_ece_easy}
           excess_ECE = ECE(tier) - ECE_null(tier)
        2. P2 secondary gate: excess_ECE_hard > excess_ECE_easy in >= 2/3 models (informational)
      Complexity: 9
    feature_tag: "evaluation"
    priority: 84
    source_document: "03_architecture.md"
    complexity: 9
    test_requirements: |
      - Verify null baseline ECE approaches 0 for perfect null calibrator
      - Verify excess_ece computed correctly
    reference_files:
      architecture: "03_architecture.md#Evaluate"
      logic: "03_logic.md"
      config: "03_config.md"

