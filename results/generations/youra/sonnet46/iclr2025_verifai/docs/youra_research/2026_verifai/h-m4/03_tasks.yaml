      logic: "03_logic.md"
      config: "03_config.md"

  - id: "task-007"
    epic: "A-6: Temperature Scaling"
    title: "Implement temperature_scaling.py — fit T*, apply, post-T ECE metrics"
    description: |
      Implement temperature_scaling.py per 03_architecture.md#TemperatureScaling and FR-5:
        1. fit_temperature(c_holdout, y_holdout, bounds=(0.01, 10.0)) → float (T*)
           Minimize NLL(c/T, y_holdout) via scipy.optimize.minimize_scalar method='bounded'.
        2. apply_temperature(confidences, T) → np.ndarray
           scaled_c = clip(c / T, 0, 1)
        3. compute_post_T_metrics(eval_data, holdout_data, M=15, n_boot=1000, seed=42) → dict
           Fit T on holdout; apply to eval_data; recompute all ECE metrics.
           Return: {T_star, post_T_ece_hard, post_T_ece_easy, post_T_delta_ece,
                    post_T_ci_lower, post_T_ci_upper, post_T_p_value, gate_p3}
        4. Warn on T-fitting divergence; mark P3 as INCONCLUSIVE for that model.
      Complexity: 12
    feature_tag: "temperature-scaling"
    priority: 78
    source_document: "03_architecture.md"
    complexity: 12
    test_requirements: |
      - test_temperature.py: fit T on synthetic data with known optimal T
      - Verify apply_temperature clips correctly to [0,1]
      - Verify post-T metrics recomputed correctly
    reference_files:
      architecture: "03_architecture.md#TemperatureScaling"
      logic: "03_logic.md"
      config: "03_config.md"

