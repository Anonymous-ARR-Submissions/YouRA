    epic: "A-5: M-Sensitivity"
    title: "Implement M-sensitivity analysis in evaluate.py"
    description: |
      Add M-sensitivity function to evaluate.py per FR-2.3:
        1. compute_m_sensitivity(c_hard, y_hard, c_easy, y_easy, m_values=[10, 15, 20])
           → {M: delta_ece} for each M in m_values
        2. Report DELTA_ECE stability across M values (informational, not gated)
        3. Primary gate uses M=15 only
      Complexity: 7
    feature_tag: "evaluation"
    priority: 81
