gap_id: "gap-1"
gap_title: "LLM Code Verifier Calibration Stratified by Self-Contained Difficulty Has Not Been Measured"
gap_description: |
  No existing work applies P(True) calibration to code correctness verification tasks
  stratified by difficulty tier — especially not using a self-contained bootstrap definition.
  The primary gap: empirical measurement of ΔECE = ECE(hard) − ECE(easy) using P(True) logprob
  elicitation on HumanEval+/MBPP+ problems, where difficulty tiers are bootstrapped from the
  LLM's own k=5 pass@1 data. This self-contained definition avoids all external CSV/leaderboard
  dependencies (the critical fix from Run 3 failure).

