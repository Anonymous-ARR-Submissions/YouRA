# Narrative Blueprint for Phase 6 Paper
# Research: H-CalibDiff-v1 — Difficulty-Stratified Calibration Fingerprint of LLM Code Verifiers via P(True)
# Generated: 2026-03-23
# Strategy: Surprising reversal — hypothesis designed to confirm positive ΔECE discovers architecture-dependent direction

metadata:
  hypothesis_id: "H-CalibDiff-v1"
  paper_title: "Architecture Determines Calibration Direction: Difficulty-Stratified P(True) Fingerprinting for LLM Code Verifiers"
  research_folder: "20260316_verifia/_archive/20260318T120129_routing_recovery"

# ============================================================================
# HOOK DESIGN
# ============================================================================

hook:
  opening_statement:
    content: |
      When a language model fails to write correct code, should you trust its confidence?
      We designed an experiment to confirm that the answer is no — and discovered something
      more nuanced: the direction of miscalibration under difficulty depends fundamentally
      on what the model was trained to do.
    strategy: "Counterintuitive finding / surprising reversal of expectation"
    anti_pattern_check: "NOT 'calibration is important' — opens with a concrete question about a practical scenario"

  why_reader_should_care:
    main_reason: |
      LLMs are increasingly deployed as code verifiers (test generators, static analyzers,
      automated reviewers). Their P(True) confidence signals are used to filter outputs.
      If calibration depends on architecture in non-obvious ways, practitioners cannot
      assume positive ΔECE behavior and must characterize their specific model's calibration fingerprint.
    concrete_example: |
      A practitioner deploys DeepSeek-Coder as a code verifier — it should use higher
      confidence thresholds for hard problems. A practitioner using CodeLlama should do the
      opposite: easy problems are more miscalibrated. Same confidence value, opposite trust direction.
    stakes: |
      Using a single confidence threshold regardless of difficulty tier will systematically
      misidentify hard/easy code problems for code-specialized vs. code-adapted models.

# ============================================================================
# PROBLEM FRAMING (Three Levels)
# ============================================================================

problem_framing:
  surface_problem:
    description: |
      LLM confidence signals are poorly calibrated overall, causing unreliable self-assessment
      in automated code verification pipelines.
    common_understanding: |
      Papers typically note that modern neural networks are overconfident (Guo et al. 2017),
      and that LLMs exhibit similar overconfidence patterns (Kadavath et al. 2022).

  deeper_problem:
    description: |
      Prior work measures calibration globally, ignoring whether calibration quality varies
      systematically with problem difficulty. If harder problems have worse calibration
      (higher ECE), a single global threshold fails to separate reliable from unreliable signals.
    why_overlooked: |
      P(True) calibration studies (Kadavath 2022) focus on capability scaling (larger models
      better calibrated), not on difficulty stratification. Code evaluation benchmarks
      (EvalPlus) report pass@k but do not analyze calibration quality per difficulty tier.
    our_perspective: |
      Difficulty itself — as measured self-containedly from pass@1 bootstrap — provides a
      natural stratification axis that reveals whether P(True) signals are uniformly unreliable
      or systematically worse on the problems a model cannot solve.

  gap_in_existing_work:
    description: |
      No existing work applies P(True) calibration to code verification tasks stratified
      by self-contained difficulty tiers derived from the experiment's own pass@1 distribution.
    why_gap_exists: |
      Two communities study related topics independently: LLM calibration research ignores
      code-specific difficulty; code generation benchmarks ignore calibration quality.
      The self-contained bootstrap design (difficulty from k=5 own solutions) further
      requires a novel experimental design that doesn't appear in either community.
    why_gap_matters: |
      Without difficulty-stratified calibration analysis, we cannot know whether P(True)
      provides reliable difficulty-conditional signals or whether its miscalibration is uniform.
      This matters for threshold design in automated code review systems.

# ============================================================================
# KEY INSIGHT
# ============================================================================

key_insight:
  aha_moment:
    one_sentence: |
      P(True) calibration-difficulty alignment is architecture-dependent: code-specialized
      training produces positive ΔECE (as expected), code-adapted training inverts it, and
      general-purpose training produces near-zero ΔECE — making calibration direction a
      model fingerprint, not a universal property.
    expanded_explanation: |
      The infrastructure chain (k=5 solution generation → tier stratification → P(True) extraction →
      ECE computation) works correctly and reliably for all three models. The architecture-dependent
      ΔECE pattern reveals that what determines calibration direction is not just calibration
      quality in general, but training data composition specifically. DeepSeek-Coder's code-specialized
      pre-training creates genuine uncertainty discrimination between hard and easy code problems.
      CodeLlama's code fine-tuning creates a pattern-matching overconfidence on easy code utilities
      that inverts the expected direction. Llama3's general-purpose training produces calibration
      insensitivity to code difficulty entirely.
    insight_type: "Observation-based: noticed something others missed by combining two disconnected fields"

  why_others_missed_it:
    common_assumptions: |
      Prior work assumes calibration behavior (good or bad) generalizes across model families
      with the same prompting methodology. Kadavath 2022 shows P(True) scales with capability
      but doesn't study code difficulty stratification or architecture-specific direction.
    our_different_view: |
      We treat model architecture as a variable, not a constant. By testing three architectures
      (general / code-adapted / code-specialized) with the same methodology, we reveal that
      architecture category determines ΔECE sign, not just magnitude.
    enabling_factor: |
      The self-contained difficulty design (tiers from own pass@1) allows each model to
      reveal its own calibration fingerprint without external difficulty labels that would
      conflate model capability with problem difficulty.

  what_makes_it_work:
    intuitive_explanation: |
      Code-specialized models (DeepSeek-Coder) have seen so much code during pre-training
      that they genuinely "know what they don't know" — hard problems trigger real uncertainty
      in P(True), easy problems trigger confidence. Code-adapted models (CodeLlama) have been
      fine-tuned on common utility functions that look exactly like MBPP easy problems,
      creating systematic overconfidence on the easy tier specifically.
    key_mechanism: |
      Training data composition modulates how P(True) logprob responds to difficulty.
      Code-specialized pre-training aligns P(True) with difficulty; code fine-tuning on
      common patterns creates distribution-specific overconfidence that inverts the alignment.

# ============================================================================
# EVIDENCE NARRATIVE
# ============================================================================

evidence_narrative:
  main_claim:
    statement: |
      P(True) calibration direction under difficulty stratification is architecture-dependent:
      code-specialized LLMs show positive ΔECE, code-adapted LLMs show inverted (negative) ΔECE,
      and general-purpose LLMs show near-zero ΔECE.
    measurable_criteria: |
      ΔECE = ECE(hard) − ECE(easy) with bootstrap 95% CI, across 3 model families on
      EvalPlus (542 problems), using M=15 ECE bins and k=5 self-contained tier stratification.

  supporting_evidence:
    - id: "infrastructure_chain"
      what: "k=5 generation achieves perfect coverage (1.0000) for all 3 models × 542 problems; tier stratification yields n≥20 for all viable pairs; P(True) non-degenerate (std 0.062–0.078)"
      so_what: "The methodology works correctly end-to-end; the ΔECE findings are not artifacts of methodology failure"
      how_it_supports_claim: "Validates the causal chain through Steps 1-3 before the architecture-dependent finding at Step 4"

    - id: "deepseek_positive_delta_ece"
      what: "DeepSeek-Coder-6.7B: ΔECE=+0.298, CI=[0.285, 0.312]; ECE(hard)=0.657 vs ECE(easy)=0.359"
      so_what: "Code-specialized models show the expected effect at substantial magnitude — hard problems are more miscalibrated"
      how_it_supports_claim: "Confirms ΔECE > 0 direction for code-specialized architecture; strong effect size"

    - id: "codellama_inverted"
      what: "CodeLlama-7B: ΔECE=−0.249, CI=[−0.259, −0.239]; ECE(easy)=0.615 > ECE(hard)=0.366; T*=3.95"
      so_what: "Code-adapted fine-tuning inverts calibration direction — easy problems are MORE miscalibrated than hard"
      how_it_supports_claim: "Shows that architecture category determines sign, not just magnitude; T*=3.95 indicates pathological overconfidence on easy patterns"

    - id: "llama3_near_zero"
      what: "Llama3-8B: ΔECE=+0.003, CI includes 0; ECE(hard)≈ECE(easy)≈0.49; p=0.256"
      so_what: "General-purpose LLMs show calibration insensitivity to code difficulty — uniform miscalibration"
      how_it_supports_claim: "Completes the three-way architecture differentiation; insensitivity is also an informative property"

    - id: "cross_architecture_difficulty"
      what: "Jaccard 0.456–0.546 for all 3 model pairs; 133/542 (24.5%) problems universally hard"
      so_what: "Difficulty is partially architecture-independent — there is a structural 'iron core' of hard problems"
      how_it_supports_claim: "Validates that within-model ΔECE differences are not driven by completely different problem sets across models"

    - id: "temperature_scaling_failure"
      what: "Global T* = 1.16–3.95; post-scaling ΔECE: DeepSeek 0.073 (persists), CodeLlama −0.810 (worsens), Llama3 −0.137 (inverts)"
      so_what: "Architecture-dependent calibration direction cannot be corrected by global temperature scaling"
      how_it_supports_claim: "Architecture-specific intervention is needed; global calibration post-processing is insufficient"

  surprising_findings:
    - finding: "CodeLlama inversion (ΔECE=−0.249) — easy problems more miscalibrated than hard"
      why_surprising: "The hypothesis assumed hard problems (where model fails) would have worse calibration. CodeLlama shows the opposite."
      our_interpretation: "Code fine-tuning on common utility patterns creates overconfidence (high P(True) for 'easy'-looking code) even when those solutions are actually wrong"

    - finding: "CodeLlama T*=3.95 (vs 1.16–1.21 for other models)"
      why_surprising: "T* values >3 are far outside the typical range of calibration corrections; indicates pathological confidence magnitude"
      our_interpretation: "Code fine-tuning amplified confidence magnitude without corresponding correctness improvements"

    - finding: "DeepSeek ECE(hard)=0.657 is very high despite confirming the hypothesis"
      why_surprising: "A model confirming our hypothesis (ΔECE>0) is still poorly calibrated in absolute terms on hard problems"
      our_interpretation: "P(True) captures relative difficulty ordering correctly but is not well-calibrated in absolute terms"

  what_results_mean: |
    Collectively, the results show that P(True) calibration is not a monolithic property
    that models either have or lack. Architecture category determines the relationship between
    difficulty and confidence. This has direct implications: practitioners cannot assume
    P(True) degrades on hard problems without characterizing their specific model architecture.

# ============================================================================
# BROADER IMPACT
# ============================================================================

takeaway:
  main_contribution:
    one_sentence: |
      We provide the first architecture-stratified difficulty-calibration fingerprint for
      LLM code verifiers, showing that P(True) calibration direction is architecture-dependent
      rather than universal.
    why_significant: |
      Establishes that LLM calibration under difficulty stratification requires per-architecture
      characterization, not universal claims; provides validated reusable infrastructure
      for future calibration studies on EvalPlus.

  implications:
    for_field: |
      LLM calibration research should treat model architecture category as a variable, not
      a nuisance. The self-contained difficulty bootstrap methodology is a validated approach
      for difficulty-stratified calibration analysis applicable beyond code verification.
    for_practice: |
      Practitioners deploying LLMs as code verifiers should characterize their model's
      calibration fingerprint (ΔECE direction and magnitude) before setting confidence thresholds.
      Code-specialized models should use lower thresholds for hard problems; code-adapted models
      may need higher thresholds for easy-looking problems.

  future_possibilities:
    immediate_extensions: |
      (1) Verify training data composition hypothesis for CodeLlama inversion by analyzing
      P(True) on problems matching vs. not-matching CodeLlama training corpus patterns.
      (2) Re-run with k≥20 to confirm CodeLlama inversion direction with larger easy-tier sample.
      (3) Test tier-specific temperature scaling (T_hard ≠ T_easy) as architecture-specific correction.
    longer_term_vision: |
      Difficulty-conditioned confidence thresholds for practical code review systems;
      architecture-agnostic calibration methods that work across code-specialized,
      code-adapted, and general-purpose architectures; extension to larger models (13B, 70B+)
      to test whether calibration behavior changes with scale within architecture categories.

