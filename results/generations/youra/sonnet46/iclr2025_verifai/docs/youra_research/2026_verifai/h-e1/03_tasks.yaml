      compute_pass_at_1(correctness: dict[str, list[bool]], k=5) -> dict[str, float]
        return {tid: sum(r)/k for tid, r in correctness.items()}

      assign_tiers(pass_at_1, hard_thresh=0.0, easy_thresh=0.6) -> dict[str, str]
