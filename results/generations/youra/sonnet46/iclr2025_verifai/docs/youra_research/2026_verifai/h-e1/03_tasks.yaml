      torch.manual_seed(seed)
      inputs = tokenizer(format_prompt(problem), return_tensors="pt").to(model.device)
      outputs = model.generate(
          **inputs, do_sample=True, temperature=0.8, top_p=0.95,
          max_new_tokens=512, num_return_sequences=k
      )
      solutions = [tokenizer.decode(o[inputs["input_ids"].shape[1]:], skip_special_tokens=True) for o in outputs]

