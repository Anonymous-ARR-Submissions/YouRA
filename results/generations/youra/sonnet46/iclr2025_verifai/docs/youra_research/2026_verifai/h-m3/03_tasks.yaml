    title: "Implement extract_ptrue_confidence — logprob extraction and normalization"
    description: |
      Implement extract_ptrue_confidence in src/h_m3/ptrue_extractor.py:
        def extract_ptrue_confidence(model, tokenizer, problem_prompt, solution_code,
                                     device, true_id, false_id, prompt_template) -> float:
        1. Format prompt from template
        2. Tokenize: inputs = tokenizer(prompt, return_tensors="pt").to(device)
        3. Generate: out = model.generate(**inputs, max_new_tokens=1,
                                          return_dict_in_generate=True, output_logits=True,
                                          do_sample=False)
        4. Assert len(out.logits) == 1 (edge case guard)
        5. Extract: logits = out.logits[0][0]  # shape: [vocab_size]
        6. log_probs = F.log_softmax(logits, dim=-1)
        7. pair = torch.tensor([log_probs[true_id].item(), log_probs[false_id].item()])
        8. c = torch.softmax(pair, dim=0)[0].item()
        9. Assert 0.0 <= c <= 1.0
        10. Return c
    feature_tag: "model"
    priority: 80
    source_document: "03_architecture.md"
    complexity: 14
