        def run_ptrue_inference_for_model(model_id, pairs, device, checkpoint_path,
                                          prompt_template, checkpoint_interval=100) -> dict:
        1. Resume: if checkpoint_path.exists(): load results, done_keys = set(results.keys())
        2. Load model + tokenizer, get true_id/false_id
        3. Iterate pairs with tqdm:
           key = f"{pair['task_id']}__sol{pair['sol_idx']}"
           if key in done_keys: continue
           c = extract_ptrue_confidence(...)
           results.setdefault(pair['task_id'], {tier, pass_at_1, confidence_scores:[], correctness_labels:[]})
           append c to confidence_scores, correctness to correctness_labels
           if (i+1) % checkpoint_interval == 0: save checkpoint
        4. Final save + del model + torch.cuda.empty_cache()
        5. Return results dict
    feature_tag: "experiment"
