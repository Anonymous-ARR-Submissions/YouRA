experimental_setup:
  dataset:
    name: "HumanEval+ and MBPP+ (EvalPlus)"
    type: "standard"
    source: "Liu et al. 2023 (EvalPlus); https://github.com/evalplus/evalplus"
    path: "evalplus Python package (install via pip)"
    hypothesis_fit: "Augmented test suite (~760 tests/problem) provides reliable correctness oracle. 542 problems total (164 + 378) provides sufficient n for ECE per tier. Already validated in Run 3."
  model:
    name: "Llama3-8B, CodeLlama-7B, DeepSeek-Coder-6.7B"
    type: "HuggingFace decoder-only LLMs"
    source: "NousResearch/Meta-Llama-3-8B (non-gated mirror), codellama/CodeLlama-7b-hf, deepseek-ai/deepseek-coder-6.7b-base"
    hypothesis_fit: "Three families span general-purpose to code-specialized spectrum. Previously validated in Run 3 with successful P(True) elicitation."
  baselines:
    - name: "ECE null baseline (constant confidence = tier accuracy)"
      method: "For each tier, assume model outputs confidence = empirical accuracy of that tier. Compute ECE under this null."
    - name: "ECE_overall (pooled, no difficulty stratification)"
      method: "Compute ECE over all problems without difficulty stratification; compare to tier-stratified ECEs"
    - name: "Temperature-scaled ECE"
      method: "Global T fitted on validation holdout; tier-stratified ECE recomputed post-scaling"

