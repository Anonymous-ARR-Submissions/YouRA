# ═══════════════════════════════════════════════════════════════
# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "P(True) logprob elicitation yields valid calibration signals for LLMs (values 0.57-0.91)"
      status: "BUILD_ON"
      evidence: "Run 3 (h-e1 run2) validated P(True) mechanism — ECE_overall computed successfully"
    - claim: "EvalPlus augmented tests provide reliable correctness oracle (HumanEval+ 164 + MBPP+ 378 problems)"
      status: "BUILD_ON"
      evidence: "Liu et al. 2023 EvalPlus; Run 3 validated EvalPlus Python API (check_correctness)"
    - claim: "ECE is the canonical calibration metric for neural networks"
      status: "BUILD_ON"
      evidence: "Guo et al. 2017: ECE = Σ (|B_m|/n) × |acc(B_m) − conf(B_m)|; 7416 citations"
    - claim: "Modern neural networks (and LLMs) are poorly calibrated overall"
      status: "BUILD_ON"
      evidence: "Guo et al. 2017: models overconfident; Kadavath 2022: calibration scales with model size"
    - claim: "No existing work measures ECE stratified by difficulty for code verification"
      status: "PROVE_NEW"
      evidence: "Gap confirmed via Semantic Scholar citation network analysis; 11 papers reviewed"
    - claim: "ΔECE = ECE(hard) - ECE(easy) as a function of self-contained pass@1 bootstrap is novel"
      status: "PROVE_NEW"
      evidence: "No paper in citation network uses pass@k from own experiment for difficulty stratification in calibration"
    - claim: "Global vs. tier-specific temperature scaling test for difficulty-conditioned miscalibration is novel"
      status: "PROVE_NEW"
      evidence: "Guo et al. 2017 uses global temperature scaling; tier-stratified comparison not studied"
  scope_reduction_percentage: 50
  phase2b_4_instructions: |
    For established claims (BUILD_ON): do not re-verify. Use as background and motivation.
    For new claims (PROVE_NEW): these are the core experimental targets:
    1. ΔECE measurement: requires Phase 4 experiment with EvalPlus + P(True) + k=5 bootstrap
    2. Calibration-difficulty fingerprint: requires 6-point curve per model with bootstrap CIs
    3. Temperature scaling probe: requires global T fit and tier-stratified ECE recomputation

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-CalibDiff-v1"
  confidence_level: 0.80
  core_hypothesis_statement: |
    Under k=5 self-contained difficulty stratification on HumanEval+/MBPP+ (542 problems),
    if LLMs predict code correctness via P(True) logprob elicitation stratified by
    difficulty tiers bootstrapped from their own pass@1 distribution (hard = pass@1 = 0.0,
    easy = pass@1 ≥ 0.6),
    then Expected Calibration Error differs systematically between difficulty tiers
    (ΔECE = ECE(hard) - ECE(easy) ≠ 0, with primary prediction ΔECE > 0),
    because LLM confidence signals derived from pre-training distributions do not
    adequately reflect task-specific difficulty structure, leading to greater calibration
    failure on problems where the model rarely generates correct solutions.
  alternative_hypothesis_h0: |
    There is no significant difference in Expected Calibration Error between hard-tier and
    easy-tier problems (ΔECE ≤ 0 or |ΔECE| < 0.03 across ≥2/3 model families after
    controlling for base-rate accuracy differences), indicating that LLM P(True) calibration
    is uniform across difficulty levels or that apparent differences are fully explained by
    base-rate accuracy coupling.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Difficulty Tier"
      type: "categorical"
      operationalization: "Pass@1 from k=5 solutions: hard = 0/5 pass (0.0), easy = ≥3/5 pass (≥0.6)"
      levels: ["hard (pass@1=0.0)", "medium (pass@1=0.2,0.4)", "easy (pass@1≥0.6)"]
    - name: "Model Family"
      type: "categorical"
      operationalization: "Three LLM families: Llama3-8B (general), CodeLlama-7B (code-adapted), DeepSeek-Coder-6.7B (code-specialized)"
      levels: ["Llama3-8B", "CodeLlama-7B", "DeepSeek-Coder-6.7B"]
    - name: "Benchmark"
      type: "categorical"
      operationalization: "HumanEval+ (164 problems) vs. MBPP+ (378 problems) via EvalPlus"
      levels: ["HumanEval+", "MBPP+"]
  dependent:
    - name: "Expected Calibration Error (ECE)"
      type: "continuous"
      operationalization: "ECE = Σ (|B_m|/n) × |acc(B_m) − conf(B_m)| with M=15 equal-width bins, 0-1 range"
      primary: true
    - name: "ΔECE"
      type: "continuous"
      operationalization: "ΔECE = ECE(hard) - ECE(easy); positive = harder problems worse calibrated"
      primary: true
    - name: "Maximum Calibration Error (MCE)"
      type: "continuous"
      operationalization: "MCE = max_m |acc(B_m) - conf(B_m)|; sensitivity check alongside ECE"
      primary: false
    - name: "Excess ECE above null baseline"
      type: "continuous"
      operationalization: "ECE_observed - ECE_null, where ECE_null uses constant confidence = tier accuracy"
      primary: false
  controlled:
    - name: "Correctness Oracle"
      operationalization: "Always use EvalPlus augmented test suite (not vanilla MBPP/HumanEval)"
    - name: "ECE Bin Count"
      operationalization: "M=15 fixed; sensitivity analysis over M∈{10,15,20} reported separately"
    - name: "P(True) Prompt Format"
      operationalization: "Zero-shot format: append 'Is this code correct? True/False' to problem+solution; logprob(True)/(logprob(True)+logprob(False))"
    - name: "Temperature Scaling"
      operationalization: "Global T fitted on 20% holdout (minimize NLL); tier-stratified ECE recomputed post-scaling"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "LLM generates k=5 code solutions for each problem using temperature sampling; pass@1 computed from EvalPlus oracle"
      evidence: "Run 3 validated: solution generation complete for 542 problems × 3 models × k=5"
      falsifier: "If solution generation fails for >20% of problems, tier sample sizes fall below n=20 minimum"
    - step: 2
      description: "Problems are stratified into difficulty tiers based on model-specific pass@1: hard (0/5 pass), easy (≥3/5 pass), medium excluded from primary analysis"
      evidence: "Self-contained bootstrap avoids external CSV dependency (critical fix from Run 3 failure); each model has own tier assignments"
      falsifier: "If hard tier has n<20 or easy tier has n<20 per benchmark per model, ECE computation is unreliable"
    - step: 3
      description: "P(True) logprob elicitated for each (problem, solution) pair: append 'Is this code correct? True/False', extract logprob(True)/(logprob(True)+logprob(False))"
      evidence: "Kadavath et al. 2022 established P(True) methodology; Run 3 confirmed values 0.57-0.91 for all 3 models"
      falsifier: "If P(True) values degenerate (all ≈0.5 or all ≈1.0), the mechanism fails to extract meaningful confidence"
    - step: 4
      description: "ECE computed per difficulty tier using M=15 bins; ΔECE = ECE(hard) - ECE(easy); compared to tier-specific null baseline (constant confidence = tier accuracy)"
      evidence: "Guo et al. 2017 ECE formulation; temperature scaling as mechanistic probe (global T vs. tier-specific T)"
      falsifier: "If ΔECE ≤ 0 in ≥2/3 model families OR ΔECE vanishes after global temperature scaling, primary hypothesis fails"
  key_tension: "Whether ΔECE reflects genuine difficulty-conditioned miscalibration (structural) vs. base-rate accuracy coupling (mechanical) — resolved by null-baseline comparison and temperature scaling probe"
  evidence_summary: |
    The causal chain is validated in parts: Steps 1 and 3 were confirmed working in Run 3.
    Step 2 is the critical fix (self-contained bootstrap replaces failed external CSV).
    Step 4 is the novel measurement contribution. The main uncertainty is the direction and
    magnitude of ΔECE — which is the research question.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "k=5 solutions provide sufficient pass@1 estimate for tier stratification despite high binomial variance"
    supporting_evidence: "With 542 problems and 3 models, hard tier expected ~100-150 problems per model (pass@1=0.0 threshold); sufficient for ECE with n≥20"
    consequence_if_violated: "Tier membership dominated by sampling noise; ΔECE unreliable. Mitigation: explicitly label as pilot methodology, use 6-point curve instead of binary tiers"
  - id: "A2"
    assumption: "EvalPlus augmented tests provide reliable ground-truth correctness labels"
    supporting_evidence: "Liu et al. 2023: ~760 tests per problem via mutation+differential testing; Run 3 validated EvalPlus API"
    consequence_if_violated: "ECE biased upward due to label noise, especially in hard tiers. Mitigation: compare under standard vs. augmented tests"
  - id: "A3"
    assumption: "P(True) logprob captures genuine confidence, not surface features (solution length, complexity)"
    supporting_evidence: "Kadavath et al. 2022 showed P(True) correlates with correctness in factual Q&A"
    consequence_if_violated: "ΔECE confounds calibration quality with prompt sensitivity. Mitigation: partial correlation control for solution length"
  - id: "A4"
    assumption: "Self-contained difficulty (model-specific pass@1) is a meaningful proxy for intrinsic problem hardness"
    supporting_evidence: "Model-specific difficulty captures the model's own experience; consistent across k trials"
    consequence_if_violated: "Difficulty tiers measure model calibration consistency, not intrinsic difficulty. This remains a valid measurement but reframes the contribution"
  - id: "A5"
    assumption: "Three-model comparison provides architectural signal (general vs. code-adapted vs. code-specialized)"
    supporting_evidence: "DeepSeek-Coder trained specifically on code; CodeLlama fine-tuned from Llama; Llama3 general-purpose"
    consequence_if_violated: "Architecture differences (training data, scale, RLHF) confound code-specialization claim. Mitigation: label as exploratory, not confirmatory"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Python code generation tasks (HumanEval+, MBPP+)
    - 7-8B parameter LLMs (Llama3-8B, CodeLlama-7B, DeepSeek-Coder-6.7B)
    - P(True) logprob elicitation as confidence mechanism
    - k=5 solution bootstrap difficulty stratification (pilot setting)
    - EvalPlus augmented test oracle for ground truth
  does_not_apply_to: |
    - Other programming languages (non-Python)
    - Very large models (>70B parameters) — extrapolation not supported
    - External leaderboard-based difficulty definitions (explicitly excluded by design)
    - Human evaluation of code quality
    - Synthetic or mock code generation data
  known_limitations: |
    - k=5 produces only 6 discrete pass@1 values; difficulty stratification is coarse
    - Three-model comparison is exploratory (N=1 per architecture category)
    - Self-contained difficulty is model-specific, not universal
    - Paper preparation step converts PDFs to markdown; some formulas may not render correctly

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "ΔECE = ECE(hard) - ECE(easy) > 0 in ≥2/3 model families (Llama3-8B, CodeLlama-7B, DeepSeek-Coder-6.7B) on HumanEval+/MBPP+ combined"
    test_method: "Compute ECE with M=15 bins per tier per model; bootstrap 95% CI; count families with ΔECE > 0 excluding zero from CI"
    success_criterion: "ΔECE ≥ 0.03 (3pp) in ≥2/3 model families with 95% CI excluding zero"
    falsification: "ΔECE ≤ 0 in ≥2/3 model families, OR ΔECE < 0.03 everywhere, OR CI includes zero in all families"
  - id: "P2"
    primary: false
    statement: "Excess ECE above null baseline (ECE_observed - ECE_null) is larger in hard tiers than easy tiers, indicating structural miscalibration beyond accuracy coupling"
    test_method: "Compute tier-specific null ECE using constant confidence = tier accuracy; paired bootstrap test on (ECE_hard - ECE_null_hard) vs. (ECE_easy - ECE_null_easy)"
    success_criterion: "Excess ECE in hard tier significantly exceeds excess ECE in easy tier (p < 0.05, bootstrap)"
    falsification: "Excess ECE is statistically indistinguishable between tiers — calibration degradation is fully mediated by accuracy"
  - id: "P3"
    primary: false
    statement: "ΔECE persists after global temperature scaling (global T fitted on 20% holdout), indicating difficulty-conditioned rather than globally correctable miscalibration"
    test_method: "Fit single T minimizing NLL on held-out 20% of problems; recompute tier-stratified ECE post-scaling; compare ΔECE before and after"
    success_criterion: "ΔECE remains ≥ 0.03 in ≥2/3 families after temperature scaling"
    falsification: "Global T collapses ΔECE to within bootstrap noise of zero — miscalibration is globally correctable (also publishable as negative result)"
  - id: "P4"
    primary: false
    statement: "Code-specialized model (DeepSeek-Coder-6.7B) shows lower ECE_overall compared to general-purpose Llama3-8B — exploratory architectural comparison"
    test_method: "Compare ECE_overall (pooled across tiers) between the three models"
    success_criterion: "DeepSeek-Coder ECE_overall < Llama3-8B ECE_overall (exploratory, no significance threshold)"
    falsification: "DeepSeek-Coder ECE_overall ≥ Llama3-8B ECE_overall (exploratory result only, does not affect primary hypothesis)"

