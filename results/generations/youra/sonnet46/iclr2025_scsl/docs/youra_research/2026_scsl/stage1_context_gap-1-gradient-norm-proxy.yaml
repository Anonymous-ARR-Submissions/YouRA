gap_id: "gap-1-gradient-norm-proxy"
gap_title: "Unexplored Use of Per-Sample Gradient Norm Magnitude as Label-Free Minority Group Proxy"
gap_description: |
  No existing method explicitly uses per-sample gradient norm magnitude as a minority proxy
  signal for two-stage reweighting. Loss-based (LfF, LFR, EVaLS) and error-based (JTT)
  proxies exist, but gradient norm magnitude—confirmed at 6–14x minority/majority ratio
  during ERM training—has not been evaluated as a standalone reweighting signal.
  This gap directly addresses whether the confirmed empirical phenomenon can be exploited
  for practical label-free robustification competitive with JTT (+21pp WGA on Waterbirds).
