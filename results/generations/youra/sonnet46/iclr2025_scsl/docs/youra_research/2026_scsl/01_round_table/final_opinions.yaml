final_opinions:
  perspective_novelty:
    agent: "Dr. Nova"
    icon: "🔭"
    assessment: |
      STRONG novelty. GNR-LLR is genuinely novel: no published work uses per-sample gradient norm magnitude
      as the signal for pseudo-group-balanced subset construction in DFR-style last-layer retraining without
      group labels. The continuous signal innovation (vs. JTT's binary), principled T_id selection from temporal
      norm dynamics (vs. JTT's heuristic), and NHT-grounded mechanism all represent new contributions.
      The "label-free DFR" framing is a compelling and unexplored contribution to the group robustness literature.
    key_points:
      - "First method using gradient norm magnitude for pseudo-group-balanced subset construction"
      - "Continuous signal (g_tilde_i) is richer than JTT's binary misclassification"
      - "Principled T_id selection from temporal norm dynamics is a novel mechanism contribution"
      - "NHT framework (2026) provides theoretical grounding JTT lacks"

  perspective_falsifiability:
    agent: "Prof. Vera"
    icon: "🔬"
    assessment: |
      STRONG falsifiability. The hypothesis has pre-registered quantitative falsification criteria on all key claims:
      (1) WGA ≥ 88% on Waterbirds (5+ seeds, p<0.05 vs JTT); (2) AUC(g_tilde) > AUC(misclassification) DeLong test;
      (3) normalized norm ratio ≥ 3x at T_id=5 and ≥ 1.2x post shortcut norm peak; (4) induced contingency table
      balance ≤ 10% deviation within class. Clear comparison baselines: JTT (86.7%), DFR (92.9%), LfF (84.24%).
      All tests use existing benchmarks and infrastructure with 5-seed statistical rigor.
    key_points:
      - "WGA threshold pre-registered: ≥ 88% Waterbirds (vs JTT 86.7%), ≥ 82% CelebA (vs LfF 84.24%)"
      - "AUC test: gradient norm must provide independent minority signal beyond misclassification"
      - "Temporal persistence test: ratio ≥ 1.2x post shortcut norm peak"
      - "Contingency table balance test: ≤ 10% within-class deviation from uniform"

  perspective_significance:
    agent: "Dr. Sage"
    icon: "🎯"
    assessment: |
      STRONG significance. GNR-LLR closes the last annotation gap in the DFR family (DFR requires group-balanced
      validation set; GNR-LLR uses no group supervision at any stage). Secondary contributions: efficiency advantage
      over LfF (one network vs. two), principled T_id selection (vs. JTT heuristic), NHT-theoretic mechanism grounding.
      Active research frontier: JTT (666 citations), DFR (440 citations), LfF (172 citations) — a label-free method
      approaching DFR accuracy would be a NeurIPS/ICML-level contribution.
    key_points:
      - "Closes DFR annotation gap: first method approaching DFR accuracy (92.9%) without group labels"
      - "Efficiency: single-network (one ERM pass) vs. LfF (two-network simultaneous training)"
      - "Target venues: NeurIPS/ICML — active field with cited baselines (JTT: 666c, DFR: 440c)"
      - "Impact narrative: label-free spurious correlation robustification at DFR-level performance"

  perspective_plausibility:
    agent: "Prof. Pax"
    icon: "⚙️"
    assessment: |
      STRONG plausibility. Completely feasible with confirmed infrastructure: h-e1/code gradient norm hooks (6–14x ratio
      already measured), ResNet-50 + WaterbirdsDataset + evaluate.py (all working), conda youra-h-e1, H100 GPU.
      Feature-norm normalization is one additional line of code. Last-layer retraining follows DFR protocol (well-established).
      The mechanistic concern (NHT temporal alignment, feature-norm normalization) are addressable experimental sub-tests,
      not fundamental implementation barriers. Estimated runtime: ~3–5 GPU hours for primary experiment on Waterbirds
      (5 seeds × 20 epochs + 5 seeds × 100 epochs last-layer).
    key_points:
      - "Confirmed infrastructure: gradient_analysis.py, WaterbirdsDataset, ResNet-50, evaluate.py all working"
      - "Feature-norm normalization: one additional hook in existing code"
      - "Last-layer retraining: DFR protocol (well-established, <100 epochs)"
      - "Estimated runtime: ~3–5 GPU hours on H100 NVL for primary Waterbirds experiment"

  refiner_advocate:
    agent: "Dr. Ally"
    icon: "🛡️"
    assessment: |
      The hypothesis is in its strongest form after the full discussion. All stress-test concerns have been incorporated
      as experimental sub-tests rather than hypothesis invalidators: temporal alignment (E1), feature-norm normalization
      (control analysis), contingency table verification (E2), CelebA generalization (E3). The three-independence proof
      (independent from misclassification, from feature scale, from NHT shortcut inflation) is achievable with existing
      infrastructure. The label-free DFR framing is the right impact narrative. The final unified hypothesis with
      WGA ≥ 88% Waterbirds / ≥ 82% CelebA without group labels is publishable if confirmed.
    key_points:
      - "All stress-test concerns become sub-experiments (E1: temporal, E2: balance, E3: CelebA)"
      - "Per-epoch increasing trend (E1:6.10 → E4:14.73) already supports resistance over inflation"
      - "Feature-norm normalization requires one additional hook — straightforward implementation"
      - "Final target: WGA ≥ 88% Waterbirds / ≥ 82% CelebA without group labels at single-ERM-run cost"

  refiner_critic:
    agent: "Prof. Rex"
    icon: "🔍"
    assessment: |
      Three remaining empirical uncertainties that must be resolved in Phase 2B: (1) whether pseudo-group-balanced subset
      quality actually achieves ≤10% within-class deviation from balance — this is critical for DFR comparison claim;
      (2) whether normalized gradient norm ratio ≥ 1.2x post shortcut norm peak (temporal persistence) — epoch 5 data is
      promising but epochs 10–20 data is required; (3) CelebA generalization — Waterbirds-only result is insufficient for
      a "general applicability" claim. These are empirical uncertainties, not theoretical invalidators.
    key_points:
      - "Contingency table (y,g) balance must be empirically verified — no theoretical guarantee from univariate norm selection"
      - "Temporal alignment test at epochs 10–20 is required to confirm post-peak persistence"
      - "CelebA validation required for generalization claim"
      - "Mitigation: all three concerns become Phase 2B sub-hypotheses H-E (existence) and H-M (mechanism) tests"

