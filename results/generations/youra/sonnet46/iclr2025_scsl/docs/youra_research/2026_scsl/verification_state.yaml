main_hypothesis:
  id: H-GNR-LLR-v1
  title: 'GNR-LLR: Gradient-Norm-Informed Last-Layer Retraining for Spurious Correlation Robustness'
  statement: 'Under ERM+SGD training on spuriously correlated image classification benchmarks (Waterbirds

    primary, CelebA secondary), if per-sample last-layer gradient norms normalized by feature

    magnitude (g_tilde_i = ||∇_W ℓ_i|| / ||h(x_i)||) are computed at early training epochs

    (T_id ∈ {3, 5}) and used to construct a pseudo-group-balanced subset (top-k% high-norm as

    pseudo-minority, bottom-k% low-norm as pseudo-majority) for ERM feature extractor freezing +

    last-layer retraining (GNR-LLR), then worst-group accuracy (WGA) on Waterbirds will be ≥ 88%

    and on CelebA ≥ 82%, because minority-group samples that cannot be fit by the spurious-feature

    shortcut solution produce persistently elevated gradient norms (6–14x majority) reflecting

    structured-feature resistance under NHT norm-hierarchy dynamics.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: Waterbirds (primary), CelebA (secondary)
    model: ResNet-50 (ImageNet pretrained)
    optimizer: 'SGD (Stage 1: lr=0.001, momentum=0.9; Stage 2: lr=0.01)'
    hyperparameters:
      batch_size: 128
      stage1_epochs: 20
      stage2_epochs: 100
      seeds: 5
      k: 0.25
      T_id: 5
