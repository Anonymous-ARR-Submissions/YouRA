hypothesis_draft:
  title: "Gradient-Norm-Informed Last-Layer Retraining (GNR-LLR) for Label-Free Spurious Correlation Robustification"
  hypothesis_id: "H-GNR-LLR-v1"
  core_claim: |
    Per-sample normalized gradient norms (g_tilde_i = ||∇_W ℓ_i|| / ||h(x_i)||) computed during early ERM training
    (epochs 1–5) reliably identify minority-group samples (those resisting the spurious feature shortcut) with
    minority/majority ratio ≥ 3x, and using top-k% high-norm samples as pseudo-minority + bottom-k% as pseudo-majority
    for DFR-style last-layer retraining achieves WGA ≥ 88% on Waterbirds without group label supervision.
  mechanism: |
    During early ERM training on spuriously correlated data, majority-group samples are fitted by the spurious shortcut
    solution (e.g., background → bird class), producing low loss and low gradient norms. Minority-group samples lack
    the spurious cue and cannot be fit by this shortcut — they produce persistently elevated gradient norms (resistance
    to M_sc under NHT norm-hierarchy dynamics). Normalized gradient norm (g_tilde_i) isolates prediction error from
    feature scale effects. Selecting top-k% high-norm samples as pseudo-minority and bottom-k% as pseudo-majority
    produces a pseudo-group-balanced subset. Freezing the ERM feature extractor (which already encodes core features,
    per DFR) and retraining only the classification head on this pseudo-balanced subset corrects the spurious classifier
    weighting, achieving high WGA.
  predictions:
    - P1: "WGA ≥ 88% on Waterbirds test set (5794 samples) at T_id=5, k=25%, last-layer retraining, λ=1e-4, 5 seeds"
    - P2: "AUC(normalized g_tilde → minority group membership) > AUC(misclassification → minority group) at T_id=5"
    - P3: "Normalized norm ratio ≥ 3x at T_id=5; ≥ 1.2x at T_id=10 (post-shortcut-norm-peak)"

variables_summary:
  independent: "Proxy signal type (gradient_norm_normalized vs. misclassification vs. loss_magnitude); T_id ∈ {3,5,10}; k ∈ {10%,20%,30%}; retraining mode (full vs. last-layer-only); λ ∈ {0, 1e-4, 5e-4}"
  dependent_primary: "Worst-Group Accuracy (WGA) on Waterbirds test set; success threshold ≥ 88% (vs JTT 86.7%)"
  controlled: "ResNet-50 (ImageNet pretrained), Waterbirds dataset (confirmed cached), lr=0.001, momentum=0.9, batch_size=128, 5 seeds"

