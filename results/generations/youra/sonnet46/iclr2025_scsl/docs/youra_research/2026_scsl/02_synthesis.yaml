    - "NHT framework (Khanh & Hoa, 2026) provides first principled mechanistic explanation for why minority samples have elevated gradient norms during early ERM training"
    - "DFR's success principle (ERM features sufficient, head correction needed) can be replicated label-free via gradient-norm pseudo-balanced subset — closes the DFR annotation gap"
    - "Feature-norm normalization (g_tilde) is mechanistically important: isolates prediction error from feature scale effects"
    - "T_id selection can be made principled from temporal norm dynamics (select at epoch where minority/majority disparity peaks) — new contribution vs. JTT's heuristic T selection"
  breakthrough_moments:
