    backbone (ResNet-50), and two-stage training protocol.
  statistical_test: "Paired t-test (one-sided) across 5 seeds per condition; Bonferroni correction for multiple comparisons (4 conditions)"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First method to use normalized per-sample gradient norm for pseudo-group-balanced subset construction in DFR-style last-layer retraining without group labels"
  differentiation_summary: |
    vs. JTT: continuous signal vs. binary; captures borderline minority samples; principled T_id selection via temporal norm dynamics; NHT-grounded mechanism
    vs. DFR: eliminates group-annotated validation set requirement; same two-stage structure but label-free
    vs. LfF: single-network vs. two-network; half the compute; gradient norm vs. relative loss
    vs. LFR: normalized gradient norm vs. raw loss magnitude; additionally captures feature activation differences

