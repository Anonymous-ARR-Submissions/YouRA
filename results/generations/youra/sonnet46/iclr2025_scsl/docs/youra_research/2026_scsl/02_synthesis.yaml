measurement_plan:
  data_collection:
    - source: "Per-sample gradient norms at epochs {1, 3, 5, 10, 20} using backward hooks in existing gradient_analysis.py"
    - source: "Per-sample feature magnitudes ||h(x_i)|| at same epochs using forward hooks"
    - source: "Per-sample misclassification binary indicator at T_id (for AUC comparison)"
    - source: "Post-hoc group membership labels from Waterbirds metadata.csv (for evaluation only)"
    - source: "Layer-wise weight norms at all epochs (for shortcut norm peak identification)"
  procedure:
    - step: "Stage 1: Train ResNet-50 ERM for 20 epochs on Waterbirds, logging per-sample gradient norms and feature magnitudes at epochs {1,3,5,10,20}"
    - step: "Compute normalized gradient norms g_tilde_i = ||∇_W ℓ_i|| / ||h(x_i)|| at T_id = 5"
    - step: "Select top-k% by g_tilde as pseudo-minority, bottom-k% as pseudo-majority (k = 25% primary)"
    - step: "Compute contingency table (y, g) for selected subset using post-hoc group labels"
    - step: "Freeze ERM feature extractor; retrain last linear layer for 100 epochs on pseudo-balanced subset"
    - step: "Evaluate WGA on Waterbirds test set (n=5794) using existing evaluate.py"
    - step: "Repeat for 5 seeds; statistical test vs. JTT baseline"
  success_criteria:
    - "WGA ≥ 88% on Waterbirds (5+ seeds), p < 0.05 vs. JTT"
    - "AUC(g_tilde → minority) > AUC(misclassification → minority), DeLong test p < 0.05"
    - "Normalized norm ratio ≥ 3x at T_id=5; ≥ 1.2x post-shortcut-norm-peak"
    - "Average accuracy drop ≤ 5pp vs. ERM baseline"

validation:
  internal_validity:
    - "Sweep T_id ∈ {1,3,5,10} to identify optimal identification epoch and verify temporal profile"
    - "Sweep k ∈ {10%, 20%, 30%} to verify subset size robustness"
    - "Sweep λ ∈ {0, 1e-4, 5e-4} to verify weight-decay robustness per NHT prediction"
    - "Correlation analysis: Spearman(g_tilde, misclassification) — if < 0.9, signals are genuinely independent"
  external_validity:
    - "CelebA secondary replication: confirm gradient norm ratio and WGA ≥ 82%"
    - "Compare to published JTT (86.7%), DFR (92.9%), LfF (84.24%) baselines on same benchmarks"

discussion_synthesis:
