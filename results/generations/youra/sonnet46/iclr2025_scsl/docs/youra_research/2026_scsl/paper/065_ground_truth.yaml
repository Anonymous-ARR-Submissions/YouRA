# METHODOLOGY GROUND TRUTH
# ============================================================

methodology:
  algorithm_name: "GNR-LLR: Gradient-Norm-Informed Last-Layer Retraining"
  core_mechanism: "g̃ᵢ = ‖∇_W ℓᵢ‖_F / ‖h(xᵢ)‖ = ‖pᵢ − yᵢ_onehot‖ (outer-product decomposition)"
  key_hyperparameters:
    - name: "T_id (primary identification epoch)"
      value: 5
      source: "h-e1/03_architecture.md — PRIMARY_EPOCH constant"
    - name: "k (top/bottom fraction)"
      value: 0.25
      source: "h-e1/03_architecture.md — TOP_K_FRACTION constant"
    - name: "learning_rate_stage1"
      value: 0.001
      source: "h-e1/03_architecture.md"
    - name: "momentum"
      value: 0.9
    - name: "weight_decay"
      value: 1.0e-4
    - name: "batch_size"
      value: 128
    - name: "stage1_total_epochs"
      value: 10
    - name: "collection_epochs"
      value: [1, 3, 5, 10]

  training_details:
    model: "ResNet-50 (ResNet50_Weights.IMAGENET1K_V1)"
    dataset: "Waterbirds v1.0"
    train_samples: 4795
    optimizer: "SGD"
    seed: 42
    hardware: "NVIDIA H100 NVL"
    framework: "PyTorch 2.10+cu128"

