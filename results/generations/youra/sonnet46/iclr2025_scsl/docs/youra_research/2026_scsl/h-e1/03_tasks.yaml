      ## Test Requirements (MANDATORY)
      Create tests/test_integration.py with minimum 3 test methods:
      - test_smoke_test_passes(): run with --smoke-test flag, assert exit code 0
      - test_results_json_schema(): run 1 epoch, check results.json has required keys
      - test_csv_log_created(): assert train_log.csv exists and has correct columns

  # ─── SUBTASKS (priorities 92–85) ────────────────────────────────────────────
  - id: task-009
    epic: A-2 Model + Analyzer
    title: "S-A-2-1: GradientNormAnalyzer hook + outer-product decomposition"
    description: |
      Subtask for A-2. Implement the core gradient norm computation:

      _register_hooks():
        def hook_fn(module, input, output):
            self.features['fc_input'] = input[0].detach().cpu()  # (B, 2048)
        model.fc.register_forward_hook(hook_fn)

      compute_batch_norms() outer-product decomposition:
        with torch.no_grad():
            logits = model(images)                    # (B, 2)
            h = self.features['fc_input']             # (B, 2048)
            p = F.softmax(logits, dim=1)              # (B, 2)
            y_oh = F.one_hot(labels, num_classes=2).float().to(logits.device)  # (B, 2)
            residual = p - y_oh                       # (B, 2)
            g_tilde = residual.norm(dim=1)            # (B,) — on device
            h_norm = h.norm(dim=1)                    # (B,) — on CPU (hook detached)
            g_raw = g_tilde.cpu() * h_norm            # (B,)
        return g_raw, g_tilde.cpu(), h_norm

      Critical: hook stores features on CPU to avoid GPU memory accumulation.
    feature_tag: model
    priority: 92
    source_document: 03_logic.md
    complexity: null
    reference_files:
      logic: "03_logic.md#A-2-Model--Analyzer-Complexity-12-Budget-2-subtasks"
      architecture: "03_architecture.md#GradientNormAnalyzer"
      config: null
    test_requirements: "Covered by task-004 tests."

  - id: task-010
    epic: A-2 Model + Analyzer
    title: "S-A-2-2: get_model() and BatchNorm mode management"
    description: |
      Subtask for A-2. ResNet-50 initialization and BN mode:

      get_model(device):
        model = torchvision.models.resnet50(weights=ResNet50_Weights.IMAGENET1K_V1)
        model.fc = nn.Linear(2048, 2)
        model = model.to(device)
        return model

      BatchNorm mode policy:
        - During train_epoch(): model.train() → BN in training mode (update running stats)
        - During collect_gradnorms(): model.eval() → BN uses running stats (no update)
        - After collect_gradnorms(): model.train() restored

      This ensures gradient norm collection uses stable BN statistics (post-training state),
      consistent with the BatchNorm equalization hypothesis.
    feature_tag: model
    priority: 91
    source_document: 03_logic.md
    complexity: null
    reference_files:
      logic: "03_logic.md#A-2-Model--Analyzer-Complexity-12-Budget-2-subtasks"
      architecture: "03_architecture.md#GradientNormAnalyzer"
      config: null
    test_requirements: "Covered by task-004 tests."

  - id: task-011
    epic: A-3 Training Loop
    title: "S-A-3-1: train_epoch() with ERM loss and CSV logging"
    description: |
      Subtask for A-3. ERM training loop with per-epoch CSV row:

      train_epoch() implementation:
        model.train()
        total_loss, correct, total = 0.0, 0, 0
        for images, y, place in loader:
            images, y = images.to(device), y.to(device)
            optimizer.zero_grad()
            logits = model(images)                   # (B, 2)
            loss = F.cross_entropy(logits, y)        # scalar
            loss.backward()
            optimizer.step()
            total_loss += loss.item() * len(y)
            correct += (logits.argmax(1) == y).sum().item()
            total += len(y)
        avg_loss = total_loss / total
        acc = correct / total

      CSV logging (append row):
        columns: epoch, loss, acc, ratio, auc, balance_deviation
        ratio/auc/balance_deviation filled after collect_gradnorms() in main loop
        Use '' for fields not yet computed at train time
    feature_tag: training
    priority: 90
    source_document: 03_logic.md
    complexity: null
    reference_files:
      logic: "03_logic.md#A-3-Training-Loop-Complexity-11-Budget-2-subtasks"
      architecture: "03_architecture.md#Training"
      config: null
    test_requirements: "Covered by task-005 tests."

  - id: task-012
    epic: A-3 Training Loop
    title: "S-A-3-2: collect_gradnorms() eval-mode pass with .npz saving"
    description: |
      Subtask for A-3. Full 4795-sample collection pass:

      collect_gradnorms() implementation:
        model.eval()
        buffers = {k: [] for k in ['g_raw','g_tilde','h_norm','idx','group','class']}
        for batch_idx, (images, y, place) in enumerate(loader):  # shuffle=False
            images, y = images.to(device), y.to(device)
            g_raw_b, g_tilde_b, h_norm_b = analyzer.compute_batch_norms(images, y)
            analyzer.clear()
            group_b = (y * 2 + place).cpu()
            start_idx = batch_idx * loader.batch_size
            idx_b = torch.arange(start_idx, start_idx + len(y))
            buffers['g_raw'].append(g_raw_b);   buffers['g_tilde'].append(g_tilde_b)
            buffers['h_norm'].append(h_norm_b); buffers['idx'].append(idx_b)
            buffers['group'].append(group_b);   buffers['class'].append(y.cpu())
        arrays = {k: torch.cat(v).numpy() for k, v in buffers.items()}
        # rename keys for .npz
        result = {
            'g_raw': arrays['g_raw'], 'g_tilde': arrays['g_tilde'],
            'h_norm': arrays['h_norm'], 'sample_indices': arrays['idx'],
            'group_labels': arrays['group'], 'class_labels': arrays['class']
        }
        os.makedirs(output_dir, exist_ok=True)
        np.savez(f"{output_dir}/gradnorm_epoch_{epoch}.npz", **result)
        model.train()
        return result
    feature_tag: training
    priority: 89
    source_document: 03_logic.md
    complexity: null
    reference_files:
      logic: "03_logic.md#A-3-Training-Loop-Complexity-11-Budget-2-subtasks"
      architecture: "03_architecture.md#Training"
      config: null
    test_requirements: "Covered by task-005 tests."

  - id: task-013
    epic: A-4 Evaluation + Gate
    title: "S-A-4-1: compute_metrics() — ratio, AUC, balance_deviation"
    description: |
      Subtask for A-4. Three gate metrics + secondary:

      minority_mask = (group_labels == 1) | (group_labels == 2)   # G1+G2

      # Gate metric 1: ratio
      ratio = g_tilde[minority_mask].mean() / g_tilde[~minority_mask].mean()

      # Gate metric 2: AUC
      from sklearn.metrics import roc_auc_score
      auc = roc_auc_score(minority_mask.astype(int), g_tilde)

      # Gate metric 3: balance deviation
      N = len(g_tilde)
      top_k = int(0.25 * N)           # 1199 samples
      top_k_idx = np.argsort(g_tilde)[-top_k:]
      selected_y = class_labels[top_k_idx]
      selected_g = group_labels[top_k_idx]
      deviations = []
      for y_val in [0, 1]:
          mask = (selected_y == y_val)
          if mask.sum() > 0:
              place_bits = selected_g[mask] % 2       # place within class
              counts = np.bincount(place_bits, minlength=2)
              p_place = counts / counts.sum()
              deviations.append(float(np.max(np.abs(p_place - 0.5))))
      balance_deviation = max(deviations)

      # Secondary: per-group means
      per_group_g_tilde = {g: float(g_tilde[group_labels==g].mean()) for g in range(4)}
      per_group_h_norm  = {g: float(h_norm[group_labels==g].mean()) for g in range(4)}
    feature_tag: evaluation
    priority: 88
    source_document: 03_logic.md
    complexity: null
    reference_files:
      logic: "03_logic.md#A-4-Evaluation--Gate-Complexity-9-Budget-2-subtasks"
      architecture: "03_architecture.md#Evaluation"
      config: "03_config.md#Gate-Thresholds"
    test_requirements: "Covered by task-006 tests."

  - id: task-014
    epic: A-4 Evaluation + Gate
    title: "S-A-4-2: gate_check() and save_results() JSON"
    description: |
      Subtask for A-4.

      gate_check(metrics) -> (bool, dict):
        criteria = {
            'ratio_pass':   metrics['ratio'] >= 3.0,
            'auc_pass':     metrics['auc'] > 0.70,
            'balance_pass': metrics['balance_deviation'] <= 0.10,
        }
        return all(criteria.values()), criteria

      verify_mechanism_activated(epoch_results) -> (bool, dict):
        indicators = {
            'hook_fired':            epoch_results.get('features_captured', 0) > 0,
            'ratio_above_chance':    epoch_results['ratio'] > 1.5,
            'auc_above_random':      epoch_results['auc'] > 0.55,
            'feature_norms_equalized': epoch_results.get('h_norm_std_ratio', 1.0) < 0.5,
        }
        return all(indicators.values()), indicators

      save_results(per_epoch_metrics, gate_results, secondary_metrics, output_path):
        result = {
            'hypothesis_id': 'H-E1',
            'gate_results': {
                'ratio_epoch5':           per_epoch_metrics[5]['ratio'],
