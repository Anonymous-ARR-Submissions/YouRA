           for y in [0,1]: compute max |P(place|y,selected) - 0.5|
           balance_deviation = max over classes
         Secondary: per-group mean g_tilde, g_raw, h_norm for G0-G3
         Returns full metrics dict

      2. gate_check(metrics) -> (bool, dict):
         ratio >= 3.0 AND auc > 0.70 AND balance_deviation <= 0.10

      3. verify_mechanism_activated(epoch_results) -> (bool, dict):
         hook_fired, ratio_above_chance>1.5, auc_above_random>0.55, h_norm_std_ratio<0.5

      4. save_results(per_epoch_metrics, gate_results, secondary_metrics, output_path):
