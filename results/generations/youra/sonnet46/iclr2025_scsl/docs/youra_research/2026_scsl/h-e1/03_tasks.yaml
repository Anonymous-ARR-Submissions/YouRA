  - id: task-006
    epic: A-4 Evaluation + Gate
    title: Implement compute_metrics(), gate_check(), and save_results()
    description: |
      Implement src/evaluate.py with:

      1. compute_metrics(g_tilde, g_raw, h_norm, group_labels, class_labels) -> dict:
         minority_mask = (group_labels==1) | (group_labels==2)
         ratio = g_tilde[minority_mask].mean() / g_tilde[~minority_mask].mean()
         auc = roc_auc_score(minority_mask.astype(int), g_tilde)
