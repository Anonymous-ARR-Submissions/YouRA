  - id: task-004
    epic: A-2 Model + Analyzer
    title: Implement get_model() and GradientNormAnalyzer
    description: |
      Implement src/model.py with:

      1. get_model(device) -> nn.Module:
         - torchvision.models.resnet50(pretrained=True)
         - Replace model.fc with nn.Linear(2048, 2)
         - Move to device; return model

      2. GradientNormAnalyzer:
         - __init__(model): registers forward hook on model.fc
           Hook captures input[0] (FC input h(x_i)) in self.features['fc_input']
         - compute_batch_norms(images, labels) -> (g_raw, g_tilde, h_norm):
           Uses outer-product decomposition (torch.no_grad, no backward pass):
             logits = model(images)                # (B, 2)
             h = self.features['fc_input']         # (B, 2048) from hook
             p = F.softmax(logits, dim=1)          # (B, 2)
             y_oh = F.one_hot(labels, 2).float()   # (B, 2)
             residual = p - y_oh                   # (B, 2)
             g_tilde = residual.norm(dim=1)        # (B,)
             h_norm = h.norm(dim=1)                # (B,)
             g_raw = g_tilde * h_norm              # (B,)
           Returns all as CPU float32 tensors
         - clear(): clears self.features dict

      See 03_logic.md for full tensor shapes and pseudo-code.
    feature_tag: model
    priority: 97
    source_document: 03_architecture.md
    complexity: 12
    reference_files:
