      - test_plot_gate_metrics_creates_file(): assert PNG file exists after call
      - test_plot_trajectory_creates_file(): assert PNG file exists after call
      - test_plot_distribution_creates_file(): assert PNG file exists after call

  - id: task-008
    epic: A-6 Main Script + Integration
    title: Implement run_experiment.py end-to-end
    description: |
      Implement run_experiment.py as the main CLI entry point:

      argparse args (see 03_config.md):
        --data-root    str  default='.data_cache/datasets/waterbirds/'
        --output-dir   str  default='outputs/h-e1/'
        --seed         int  default=1
        --smoke-test   flag (10 batches, verify hook, exit)
        --device       str  default='cuda' (auto-detect)
        --num-workers  int  default=4

      main() orchestration:
        1. set_seed(args.seed)
        2. get_dataloaders() → loaders
        3. get_model(device) → model; GradientNormAnalyzer(model) → analyzer
        4. SGD optimizer: lr=0.001, momentum=0.9, weight_decay=1e-4
        5. Training loop epochs 1-10:
           a. train_epoch(model, loaders['train_shuffle'], optimizer, device, epoch, csv_path)
           b. if epoch in {1,3,5,10}:
              - collect_gradnorms(...) → gradnorm_data
              - compute_metrics(gradnorm_data) → metrics
              - gate_check(metrics) → (pass, details)
