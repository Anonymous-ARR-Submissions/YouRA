         Restore model.train() after collection
         Return dict: {g_raw, g_tilde, h_norm, sample_indices, group_labels, class_labels}

      See 03_logic.md for full pseudo-code including batch index tracking.
    feature_tag: training
    priority: 96
    source_document: 03_architecture.md
    complexity: 11
    reference_files:
