# SECTION 3: Novelty & Innovation
# ═══════════════════════════════════════════════════════════════

novelty:
  preserved_novelty: "First published method using per-sample gradient norm magnitude as the signal for pseudo-group-balanced subset construction in DFR-style last-layer retraining, without group label supervision"
  key_innovation: "GNR-LLR: Gradient-Norm-Informed Last-Layer Retraining — uses normalized gradient norms (g_tilde_i) to identify a pseudo-group-balanced subset, replacing DFR's requirement for group-annotated validation set, and JTT's binary misclassification threshold with a continuous magnitude signal grounded in NHT norm-hierarchy theory"
  differentiation:
    - prior_work: "JTT (Liu et al., 2021)"
      difference: "JTT uses binary misclassification at epoch T_id. GNR-LLR uses continuous normalized gradient norm, captures 'barely-correct' minority samples JTT misses, provides principled T_id selection from temporal norm dynamics, and targets last-layer retraining rather than full-model retraining."
    - prior_work: "DFR (Kirichenko et al., 2023)"
      difference: "DFR requires group-annotated validation set for group-balanced retraining. GNR-LLR constructs pseudo-balanced subset from gradient norms — no group labels at any stage. Potentially matches DFR accuracy at fraction of annotation cost."
    - prior_work: "LfF (Nam et al., 2020)"
      difference: "LfF requires two networks trained simultaneously (2x compute). GNR-LLR requires one ERM training pass + gradient norm hooks + last-layer retraining. Same single-pass efficiency as JTT but with more principled mechanism."
    - prior_work: "LFR (Ghaznavi et al., 2023)"
      difference: "LFR uses loss magnitude (high-loss/low-loss split) as proxy. GNR-LLR uses gradient norm (normalized by feature magnitude) — a more fine-grained signal encoding both prediction error AND feature activation. Gradient norm captures 'barely-correct' high-activation samples that LFR's loss split misses."

