# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "GNR-LLR achieves WGA ≥ 88% on Waterbirds test set (5794 samples) without group label supervision, using T_id = 5 and k = 25%, averaged over 5 seeds"
    test_method: "Train ResNet-50 ERM for 5 epochs on Waterbirds, compute normalized last-layer gradient norms, select top/bottom 25%, retrain last layer for 100 epochs, evaluate with existing evaluate.py (confirmed working)"
    success_criterion: "Mean WGA ≥ 88% across 5 seeds; p < 0.05 vs JTT (one-sided paired t-test)"
    falsification: "Mean WGA ≤ 85% or WGA indistinguishable from JTT (p > 0.05)"
  - id: "P2"
    primary: false
    statement: "Normalized gradient norm (g_tilde_i) is a better predictor of minority group membership than binary misclassification: AUC(g_tilde → minority group) > AUC(misclassification → minority group) on Waterbirds at T_id = 5"
    test_method: "Compute AUC using post-hoc group annotations (available in Waterbirds metadata.csv) for both signals. Compare AUCs with DeLong test."
    success_criterion: "AUC(g_tilde) > AUC(misclassification) with p < 0.05"
    falsification: "AUC(g_tilde) ≤ AUC(misclassification) — gradient norm does not provide independent minority proxy information"
  - id: "P3"
    primary: false
    statement: "Normalized gradient norm disparity (minority/majority ratio ≥ 3x) persists after feature-norm normalization, and remains ≥ 1.2x after shortcut norm peaks (T > T_peak_sc, estimated epoch 5–10 on Waterbirds)"
    test_method: "Compute raw and normalized gradient norms per group at epochs 1, 3, 5, 10, 20. Track layer-wise weight norms to identify T_peak_sc. Report ratio at each epoch."
    success_criterion: "Normalized ratio ≥ 3x at T_id = 5; ratio ≥ 1.2x at T_id = 10 (post-peak)"
    falsification: "Normalized ratio < 1.5x at T_id = 5 (mechanism is feature scale); or ratio < 1.2x at T_id = 10 (mechanism is phase-locked)"

