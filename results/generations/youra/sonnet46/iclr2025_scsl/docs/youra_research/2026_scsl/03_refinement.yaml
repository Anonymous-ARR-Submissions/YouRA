established_facts:
  claims:
    - claim: "Per-sample gradient norm ratio (minority/majority) is 6.37x–14.73x during ERM training on Waterbirds at epochs 1–5"
      status: "BUILD_ON"
      evidence: "Confirmed in prior runs h-e1 and h-e1-v2 with per-sample gradient norm hooks on ResNet-50"
    - claim: "ERM features already encode non-spurious (core) information; the problem is in the classifier head weighting"
      status: "BUILD_ON"
      evidence: "DFR (Kirichenko et al., ICLR 2023): last-layer retraining on group-balanced subset achieves 92.9% WGA on Waterbirds"
    - claim: "Two-stage reweighting (train → identify minority proxies → retrain) improves WGA on Waterbirds/CelebA without group labels"
      status: "BUILD_ON"
      evidence: "JTT (Liu et al., 2021): +21pp WGA on Waterbirds using misclassification proxy; LfF: +22pp CelebA using loss proxy"
    - claim: "Shortcut representations are norm-accessible first; structured representations require lower-norm but delayed traversal"
      status: "BUILD_ON"
      evidence: "NHT framework (Khanh & Hoa, 2026): Theorem on transition delay T = Θ(1/γ_eff × log(V_sc/V_st)), validated on Waterbirds and CelebA"
    - claim: "GroupDRO achieves +10.9pp WGA on Waterbirds using group labels"
      status: "BUILD_ON"
      evidence: "Confirmed from prior runs; Sagawa et al. 2019"
    - claim: "Per-sample gradient norm as standalone minority proxy signal has not been previously published"
      status: "PROVE_NEW"
      evidence: "Phase 1 literature review: JTT uses misclassification, LfF uses relative loss, LFR uses loss magnitude, GEORGE uses representation clustering — none use gradient norm magnitude"
    - claim: "Gradient-norm-based pseudo-group-balanced subset construction can match DFR-level WGA without group annotations"
