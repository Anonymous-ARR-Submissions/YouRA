# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-GNR-LLR-v1"
  confidence_level: 0.78
  core_hypothesis_statement: |
    Under ERM+SGD training on spuriously correlated image classification benchmarks (Waterbirds primary, CelebA secondary),
    if per-sample last-layer gradient norms normalized by feature magnitude (g_tilde_i = ||∇_W ℓ_i|| / ||h(x_i)||) are
    computed at early training epochs (T_id ∈ {3, 5}) and used to construct a pseudo-group-balanced subset (top-k%
    high-norm as pseudo-minority, bottom-k% low-norm as pseudo-majority) for ERM feature extractor freezing + last-layer
    retraining (GNR-LLR), then worst-group accuracy (WGA) on Waterbirds will be ≥ 88% and on CelebA ≥ 82%, because
    minority-group samples that cannot be fit by the spurious-feature shortcut solution produce persistently elevated
    gradient norms (6–14x majority) reflecting structured-feature resistance under NHT norm-hierarchy dynamics.
  alternative_hypothesis_h0: |
    There is no significant difference in worst-group accuracy (WGA) between GNR-LLR and JTT (Just Train Twice)
    on Waterbirds or CelebA when using the same identification epoch T_id, backbone (ResNet-50), and training protocol.
    That is: per-sample gradient norm provides no additional actionable information for minority group identification
    beyond JTT's binary misclassification signal.

