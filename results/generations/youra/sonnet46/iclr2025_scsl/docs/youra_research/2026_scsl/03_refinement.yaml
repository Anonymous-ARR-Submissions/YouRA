experimental_setup:
  dataset:
    name: "Waterbirds"
    type: "standard"
    source: "Sagawa et al. 2019 (GroupDRO)"
    path: ".data_cache/datasets/waterbirds/"
    hypothesis_fit: "Confirmed spuriously correlated benchmark with 4 groups (y ∈ {landbird, waterbird} × place ∈ {land, water}). Minority groups: G1(landbird/water)=184 train, G2(waterbird/land)=56 train. Gradient norm ratio confirmed 6–14x from prior runs. Full test set n=5794 for WGA evaluation."
  model:
    name: "ResNet-50 (ImageNet pretrained)"
    type: "CNN"
    source: "torchvision.models.resnet50(pretrained=True)"
    hypothesis_fit: "Confirmed working from prior runs. BatchNorm layers normalize feature magnitudes. Last layer: FC(2048 → 2). Feature extractor freezable for last-layer retraining."
  baselines:
    - name: "ERM+SGD baseline"
      method: "Standard ERM training, no group supervision; WGA ~72-76% on Waterbirds (confirmed from prior runs)"
    - name: "JTT (Liu et al., 2021)"
      method: "Two-stage: ERM identification → misclassification upweighting; WGA ~86.7% Waterbirds; primary comparison"
    - name: "DFR (Kirichenko et al., 2023)"
      method: "Freeze ERM features, retrain last layer on group-balanced subset (requires group annotations); WGA 92.9% Waterbirds; upper-bound comparison"
    - name: "LfF (Nam et al., 2020)"
      method: "Two-network loss-based upweighting; WGA ~84.24% CelebA; secondary comparison"
    - name: "GroupDRO (Sagawa et al., 2019)"
      method: "Group-aware DRO with group labels; WGA 91.4% Waterbirds (DFR paper); group-supervised upper bound"

