    (1) Minority/majority normalized norm ratio ≥ 3x at T_id = 5 on Waterbirds
    (2) Top-k% high-norm subset must be enriched for minority group samples (AUC > 0.7 vs random)
    (3) Induced contingency table must approximate group balance (≤ 10% deviation within class)
  sh2_mechanism: |
    The mechanism to test: gradient norm disparity → pseudo-group-balanced subset → last-layer retraining → WGA improvement.
    Key test: Does GNR-LLR WGA (≥88%) significantly exceed JTT (86.7%) on Waterbirds?
    Secondary test: Does normalized gradient norm (g_tilde) provide higher minority AUC than raw misclassification?
  sh3_comparison: "Compare GNR-LLR vs. JTT vs. DFR vs. LfF on Waterbirds and CelebA WGA. DFR is deferred to Phase 5 (requires group labels for comparison setup); JTT and LfF are Phase 4 direct comparisons."
  open_questions:
    - "Does normalized gradient norm disparity persist after shortcut norm peaks (temporal alignment test)?"
    - "Does top-k% norm selection induce near-balance in (y, g) contingency table on Waterbirds?"
    - "Is the computational overhead of per-sample gradient norm computation acceptable in practice (compare to JTT's O(N) forward pass)?"
    - "Does gradient norm signal generalize to CelebA with comparable ratio and WGA improvement?"

