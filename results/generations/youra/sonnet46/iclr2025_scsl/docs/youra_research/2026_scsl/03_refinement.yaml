# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "During early ERM training (epochs 1–T_id), the model learns the spurious correlation (background → bird class on Waterbirds), fitting majority samples easily with low gradient norms. Minority samples cannot be fit by this shortcut and produce persistently elevated per-sample gradient norms (6–14x majority)."
      evidence: "Confirmed from prior runs: G0=6.90 vs G1=56.98, G2=70.72, G3=19.79 (epoch 5). NHT framework [Khanh & Hoa, 2026]: minority samples resist the high-norm shortcut basin M_sc, maintaining elevated residual |p_i - y_i|."
      falsifier: "If normalized gradient norm ratio (g_tilde minority/majority) falls below 1.2 after feature-norm normalization, mechanism is representational scale rather than prediction residual."
    - step: 2
      description: "Normalized gradient norm (g_tilde_i = ||∇_W ℓ_i|| / ||h(x_i)||) isolates the prediction-error component from feature-scale effects, providing a proxy for per-sample 'shortcut resistance' that is independent of feature magnitude differences."
      evidence: "Decomposition ||∇_W ℓ_i|| ∝ ||h(x_i)|| × ||p_i - y_i|| (last layer). If 6–14x ratio persists after normalization (ratio ≥ 3x), the signal reflects prediction residual not feature scale."
      falsifier: "If disparity collapses to ≤ 1.5x after normalization, Step 2 fails and GNPR is a feature-scale proxy rather than shortcut-resistance proxy."
    - step: 3
      description: "Selecting top-k% high-norm samples (pseudo-minority) and bottom-k% low-norm samples (pseudo-majority) constructs a pseudo-group-balanced subset approximately satisfying the DFR balance requirement P(g|y) ≈ uniform."
      evidence: "Given 6–14x norm disparity, high-norm top-k% should be enriched for minority group samples. Contingency table (label, group) in selected subset should deviate ≤ 10% from within-class uniformity."
      falsifier: "If induced contingency table shows > 30% deviation from balance within class, Step 3 fails and DFR-style last-layer retraining cannot exploit the subset."
    - step: 4
      description: "Freezing the ERM feature extractor and retraining only the classification head on the pseudo-balanced subset corrects the spurious classifier weighting, achieving high worst-group accuracy (DFR principle)."
      evidence: "DFR [Kirichenko et al., 2023]: ERM features already encode core features; problem is in head. Last-layer retraining on balanced subset achieves 92.9% WGA on Waterbirds. GNR-LLR applies same principle with gradient-norm-derived pseudo-balanced subset."
      falsifier: "If WGA on Waterbirds does not reach ≥ 88% across 5 seeds with λ = 1e-4, mechanism fails to achieve DFR-level performance without group labels."
  key_tension: "Whether normalized gradient norm disparity persists after shortcut-layer norms peak (NHT temporal alignment) — if gradient norm collapses synchronously with shortcut norm peak, the proxy signal is phase-locked to shortcut acquisition rather than structured resistance."
  evidence_summary: |
    The causal chain is grounded in: (1) confirmed empirical foundation from prior runs (6–14x ratio, per-group measurements);
    (2) DFR's theoretical principle (ERM features sufficient, head correction via balanced retraining);
    (3) NHT framework providing mechanistic interpretation of why minority samples have elevated gradient norms;
    (4) LfF's independent confirmation that "hard sample" identification at early epochs improves debiasing.
    The chain has one critical empirical uncertainty (Step 3: induced subset balance) that must be verified
    before assuming DFR-level performance is achievable.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Normalized gradient norm disparity (minority/majority ratio ≥ 3x) persists after feature-norm normalization g_tilde_i = ||∇_W ℓ_i|| / ||h(x_i)||"
    supporting_evidence: "Raw ratio is 6–14x from prior runs. For normalization to collapse this, minority features would need to be 6–14x larger than majority features — unlikely given BatchNorm in ResNet-50 which equalizes feature norms. LfF: minority samples are 'harder' (higher relative loss) independently of feature scale."
    consequence_if_violated: "GNPR is a feature-scale proxy, not a shortcut-resistance proxy. Mechanism is incorrect but method may still work as a heuristic (harder to publish mechanistic claim)."
  - id: "A2"
    assumption: "Top-k% selection by normalized gradient norm induces approximate group-balance in the selected subset (P(g|y) within-class deviation ≤ 10% from uniform)"
    supporting_evidence: "Given 6–14x norm disparity, minority samples dominate high-norm tails. For Waterbirds 4-group structure: if top-25% by norm is enriched >80% for G1+G2 (minority), subset balance is achievable."
    consequence_if_violated: "DFR-style last-layer retraining cannot achieve high WGA because the pseudo-balanced subset still reflects the spurious skew. Method may still improve WGA via upweighting but not at DFR level."
  - id: "A3"
    assumption: "Temporal persistence: normalized gradient norm disparity remains ≥ 1.2x after shortcut-layer norms peak (t > T_peak_sc)"
    supporting_evidence: "Per-epoch data shows increasing ratio E1=6.10 → E4=14.73 → E5=12.20 — no collapse observed in epochs 1–5. NHT: minority samples continue resisting M_sc even after shortcut phase dominates."
    consequence_if_violated: "Gradient norm is phase-locked to shortcut acquisition (not resistance). Using T_id = 5 still works practically (disparity is maximal at epoch 4–5), but temporal mechanism claim fails."
  - id: "A4"
    assumption: "ERM feature representations (frozen during Stage 2) encode sufficient non-spurious information to achieve high WGA when the classifier head is corrected"
    supporting_evidence: "DFR [Kirichenko et al., 2023] explicitly proves this on Waterbirds and CelebA: ERM features are sufficient; 92.9% WGA with correct head. Confirmed independent of training algorithm."
    consequence_if_violated: "GNR-LLR fails entirely because feature extractor does not separate spurious from core features. Would require full-model retraining instead (DFR with full training, less efficient)."
  - id: "A5"
    assumption: "The gradient norm signal generalizes from Waterbirds to CelebA: minority-majority gradient norm disparity exists at similar ratio and provides effective pseudo-balanced subset for CelebA"
    supporting_evidence: "LfF achieves debiasing on CelebA (84.24% vs 62.00% baseline) using the same early-training hard-sample mechanism. JTT also works on CelebA. Both use the same early-training dynamics our method exploits."
    consequence_if_violated: "Waterbirds result doesn't generalize to CelebA. Single-dataset result is weaker but still publishable. CelebA may require different T_id or k value."

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - ERM-trained classification models (ResNet-50 and similar architectures with BatchNorm)
    - Spuriously correlated image classification benchmarks (Waterbirds, CelebA)
    - Settings where minority group fraction is 10–30% of training data
    - Standard training regime: ImageNet pretrained backbone, fine-tuning with SGD, lr=0.001, wd=1e-4
    - Settings where the spurious correlation is sufficiently strong to produce gradient norm disparity (ratio ≥ 3x between groups)
    - Batch-normalized models (feature norms are normalized, ensuring normalization step is meaningful)
  does_not_apply_to: |
    - Text/NLP benchmarks (MultiNLI, CivilComments) — generalization not tested in primary experiments
    - Self-supervised / contrastive learning settings (no standard supervised gradient)
    - Settings where minority fraction is very small (< 5%) — subset may not have enough high-norm samples for balanced retraining
    - Foundation models (CLIP, BERT) — gradient norms may not follow the same early-training dynamics
    - Any method requiring new benchmark creation, synthetic data generation, or human annotation
  known_limitations: |
    - Temporal window: gradient norm signal requires selecting T_id during the shortcut phase (epochs 1–10); later epochs may lose signal
    - Weight decay sensitivity: NHT predicts λ changes T_transition — λ = 0 may extend shortcut phase artificially
    - Computational overhead: per-sample gradient norms require backward pass per sample — O(N × P) vs O(N) for JTT's forward pass. Mitigated by last-layer-only computation O(N × d_head).
    - DFR gap: DFR achieves 92.9% WGA using true group annotations; GNR-LLR targets ≥88% — there remains ~5pp gap attributable to pseudo-balance approximation error

