main_hypothesis:
  id: "H-LLAE-MultiAxis-v1"
  title: "LLAE: Length-Normalized Late-Layer Attention Entropy as a Training-Free Multi-Axis Hallucination Uncertainty Signal"
  statement: |
    Under open-domain QA settings with access-controlled decoder-only LLMs (LLaMA-3-8B, Mistral-7B),
    if we compute length-normalized late-layer attention entropy (LLAE = mean H_c / log(N_context),
    final L/3 layers, context tokens only) alongside logit entropy (LE), sequence log-probability (SLP),
    and semantic entropy (SE, QA-only), then we will observe statistically significant signal-task
    dissociation (Wilcoxon p < 0.05) in AUROC and cross-task rank stability (Spearman rho), with LLAE
    capturing attentional routing instability and SE capturing output-level semantic dispersion.
  defined_in: "03_refinement.yaml"

  controlled_variables:
    dataset: "TriviaQA (primary), NQ-Open (primary), HaluEval-QA (secondary), TruthfulQA (mediation)"
    model: "meta-llama/Meta-Llama-3-8B, mistralai/Mistral-7B-v0.1"
    optimizer: null
    hyperparameters:
      n_samples_se: 10
      max_new_tokens: 50
      layer_window: "final_L/3"
      min_examples: 500
      bootstrap_resamples: 1000

