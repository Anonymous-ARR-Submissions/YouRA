hypothesis_draft:
  title: "Extrospective NLI as Grounding-Conditioned Hallucination Detection on HaluEval"
  hypothesis_id: "H-ExtrospectiveNLI-v1"
  core_claim: |
    Under the post-hoc, generation-free evaluation setting (no LLM generation at experiment time),
    cross-encoder/nli-deberta-v3-large applied to HaluEval (context, response) pairs with
    net-contradiction framing and sentence-level max aggregation achieves AUROC >= 0.65 on
    HaluEval-Summarization and HaluEval-QA, because MNLI-trained NLI models encode graded
    support sensitivity sufficient to detect factual inconsistency without generative inference.
  mechanism: |
    DeBERTa-v3-large-mnli produces P(contradiction), P(neutral), P(entailment) for each
    (context, response) pair. Net-contradiction = P(contradiction) - P(entailment) captures
    both explicit contradictions and unsupported-but-non-entailed content. Sentence-level max
    aggregation isolates the most contradictory response sentence, preventing dilution by
    non-hallucinated sentences. The structural ceiling (AUROC_max = p + 0.5*(1-p)) bounds the
    theoretical achievable AUROC given the proportion p of context-contradictory hallucinations.
  predictions:
    - P1: "AUROC >= 0.65 on HaluEval-Summarization and HaluEval-QA simultaneously (primary)"
    - P2: "Net-contradiction framing outperforms raw contradiction by DELTA >= 0.02 on >= 2/3 tasks"
    - P3: "Empirical AUROC >= 70% of structural ceiling on Summarization and QA (near-ceiling for in-scope hallucination types)"

variables_summary:
  independent: "NLI framing (3 levels) × Aggregation granularity (3 levels) × Premise window (3 levels) × HaluEval task (3 tasks)"
  dependent_primary: "AUROC (binary hallucination classification, range [0,1])"
  controlled: "Model (frozen DeBERTa-v3-large-mnli), dataset split (HaluEval test sets as-released), tokenizer (max_length=512)"

null_hypothesis:
  h0_statement: |
    No NLI framing achieves AUROC >= 0.65 on both HaluEval-Summarization and HaluEval-QA
    simultaneously when applied zero-shot without any task-specific training.
  statistical_test: "DeLong test for AUROC comparison; bootstrap 95% CIs for framing effect sizes"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "Extrospective NLI paradigm (external grounding) + structural ceiling analysis (hallucination type characterization) as dual contributions"
  differentiation_summary: |
    Prior NLI work (SummaC, TRUE) evaluates on summarization benchmarks, not HaluEval, without
    framing ablations or AUROC. SelfCheckGPT uses self-consistency (orthogonal signal). HaluEval
    paper evaluates generative LLMs, not discriminative NLI. Our work is the first zero-shot AUROC
    measurement for NLI-based hallucination detection on HaluEval multi-task, with self-diagnostic
    framing ablation and structural ceiling analysis.

