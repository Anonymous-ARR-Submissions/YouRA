main_hypothesis:
  id: H-ExtrospectiveNLI-v1
  title: Extrospective NLI as Grounding-Conditioned Hallucination Detection on HaluEval
  statement: 'Under the post-hoc, generation-free evaluation setting where only existing (context, response,

    label) triples from HaluEval are used (no LLM generation at experiment time), if

    cross-encoder/nli-deberta-v3-large is applied with (a) net-contradiction framing

    (P(contradiction) - P(entailment)) as the primary configuration, (b) sentence-level max

    aggregation for dialogue and QA, (c) full-document response-level for summarization, and

    (d) last-3-turn windowed premise for dialogue, then AUROC >= 0.65 will be achieved on

    HaluEval-Summarization and HaluEval-QA (primary), and AUROC >= 0.60 on HaluEval-Dialogue

    (exploratory), because DeBERTa''s MNLI training encodes graded support sensitivity sufficient

    to detect factual inconsistency between grounding context and generated response without any

    LLM generation.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: HaluEval (pminervini/HaluEval)
    model: cross-encoder/nli-deberta-v3-large (frozen)
    optimizer: null
    hyperparameters:
      batch_size: 32
      max_length: 512
      truncation: true
      inference_mode: torch.inference_mode()
