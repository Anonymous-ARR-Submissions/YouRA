narrative_blueprint:
  version: "2.0"
  created_at: "2026-03-16"
  paper_title: "Generation-Free Hallucination Detection via NLI Contradiction Scoring: Existence, Mechanism, and the Commission-Omission Boundary"
  short_title: "ExtrospectiveNLI: Post-Hoc Hallucination Detection without Generation"

  # ============================================================
  # HOOK STRATEGY
  # ============================================================
  hook:
    strategy: "Counterintuitive_Finding"
    insight_teaser: |
      Detecting hallucinations in language model outputs conventionally requires the model
      itself — sampling multiple generations, checking consistency, running expensive inference.
      But what if a frozen, off-the-shelf NLI classifier already encodes exactly the signal
      you need, achieving AUROC 0.71 on dialogue hallucination detection without a single
      token of LLM generation?
    opening_statement: |
      Hallucination detection has become synonymous with generation overhead: SelfCheckGPT
      samples multiple outputs; chain-of-thought verification prompts the LLM itself.
      We ask the opposite question — does the information needed to detect hallucinations
      already exist in a single forward pass of a pre-trained NLI model?
    tension: "The dominant paradigm requires LLM generation at inference time. We show it doesn't have to."
    why_compelling: "Eliminates the generation bottleneck entirely — practical for low-latency, high-throughput deployments"

  # ============================================================
  # PROBLEM FRAMING (3 LEVELS)
  # ============================================================
  problem_framing:
    surface_problem: |
      Large language models hallucinate — generating plausible-sounding but factually
      incorrect or unsupported content. Reliable hallucination detection is critical
      for safe deployment in downstream applications.
    deeper_problem: |
      Existing detection methods incur significant inference overhead by requiring
      additional LLM calls (SelfCheckGPT, chain-of-thought verification) or access
      to internal model states (probing classifiers, uncertainty estimation). This
      creates a practical tension: the systems most vulnerable to hallucination
      (deployed LLMs) are the hardest and most expensive to monitor.
    the_gap: |
      Post-hoc, generation-free approaches — using only the (context, response) pair
      and an independent classifier — have been explored for factual consistency
      (SummaC, TRUE) but not systematically characterized for hallucination detection
      across diverse task types. Critically, no prior work has: (1) established
      AUROC baselines for NLI-based detection across all three HaluEval task types,
      (2) determined the optimal framing strategy (net-contradiction vs. raw score),
      or (3) identified why the approach succeeds for some hallucination types but not others.

  # ============================================================
  # KEY INSIGHT
  # ============================================================
  key_insight:
    statement: |
      NLI models trained to detect textual contradiction are, by design, detectors
      of commission-type hallucinations — fabricated facts that directly contradict
      the grounding context. This alignment is architecturally deep: it holds for
      dialogue and QA hallucinations (AUROC 0.709, 0.644) but breaks structurally
      for summarization (AUROC 0.530) where hallucinations are primarily omissions,
      not contradictions.
    aha_moment: "Commission vs. omission hallucination types map directly onto NLI's detection capability."
    why_others_missed: |
      Prior work (SummaC, TRUE) observed task-level variation without articulating
      the commission/omission boundary as a fundamental architectural constraint.
      The insight requires characterizing *what kind* of hallucination each task
      type exhibits — not just measuring detection performance.
    what_makes_it_work: |
      DeBERTa-v3-large trained on MNLI encodes graded support sensitivity:
      it does not just classify contradiction as binary, but assigns graded
      P(contradiction) scores that monotonically track hallucination probability
      for commission-type failures. This is confirmed by Wilcoxon rank-sum tests
      (p ≈ 0 on dialogue, p = 1.52e-271 on QA) and Cohen's d (0.714, 0.779).

  # ============================================================
  # EVIDENCE NARRATIVE
  # ============================================================
  evidence_narrative:
    main_claim: |
      Generation-free, post-hoc NLI contradiction scoring achieves competitive
      hallucination detection (AUROC ≥ 0.64) on commission-type hallucination tasks
      while outperforming generation-based SelfCheckGPT-NLI, with the structural
      limit being omission-type hallucinations in abstractive summarization.
    evidence_structure:
      - claim: "NLI signal exists for hallucination detection"
        evidence: "H-E1 PASS: AUROC 0.709 (dialogue), 0.644 (QA), 2/3 tasks > 0.55 threshold"
        figure: "fig_roc_curves"

      - claim: "Mechanism: graded support sensitivity, not noise"
        evidence: "H-M1: Wilcoxon p ≈ 0 on all 3 tasks; Cohen's d = 0.714 (dialogue), 0.779 (QA)"
        figure: "fig_score_distributions_violin"

      - claim: "Generation-free approach outperforms generation-based baseline"
        evidence: "Dialogue: 0.709 vs. SelfCheckGPT-NLI 0.48 (+0.229); QA: 0.644 vs. 0.53 (+0.114)"
        figure: "fig_gate_metrics_comparison"

      - claim: "Structural limit: commission/omission boundary explains summarization failure"
        evidence: "AUROC 0.530 (near chance); structural ceiling analysis confirms omission-type mismatch"
        figure: "fig_structural_ceiling"

    surprising_findings:
      - "QA achieves highest Cohen's d (0.779) but lowest KL divergence (0.035) — score compression paradox"
      - "Summarization Wilcoxon p = 2.07e-13 but Cohen's d = 0.220 — mechanism present but effect size insufficient"
      - "Generation-free outperforms generation-based by +0.229 AUROC on dialogue"

  # ============================================================
  # BROADER IMPACT
  # ============================================================
  broader_impact:
    primary_contribution: |
      First systematic characterization of generation-free NLI-based hallucination detection
      across diverse HaluEval task types with mechanistic explanation.
    secondary_contribution: |
      Commission/omission boundary as a theoretical framework for understanding
      when and why NLI-based detection works — providing guidance for future method design.
    practical_implication: |
      Low-latency, zero-cost hallucination monitoring for dialogue and QA systems
      using only a frozen NLI classifier — no LLM generation required at inference.
    future_directions:
      - "Omission-aware detection via coverage-based methods (BERTScore recall, entailment coverage)"
      - "Task-specific KL threshold calibration for mechanism verification"
      - "Cross-model generalization study across NLI architectures"

  # ============================================================
  # SECTION-LEVEL NARRATIVE GOALS
  # ============================================================
  section_goals:
    abstract:
      goal: "Compress the entire story: problem → approach → key results → boundary finding"
      key_elements:
        - "Generation-free post-hoc NLI contradiction scoring"
        - "AUROC 0.709/0.644 on dialogue/QA"
        - "Outperforms SelfCheckGPT-NLI"
        - "Commission/omission boundary as structural insight"
      word_target: "~150 words"
      tone: "Dense but accessible — colleague over coffee"

    introduction:
      goal: "Hook readers with the counterintuitive question; escalate problem; preview insight"
      narrative_arc: "Hook → Generation overhead problem → Gap in post-hoc approaches → Key insight preview → Contributions"
      opening_hook: "Use the counterintuitive_finding strategy: detection without generation"
      key_tension: "Every existing method requires generation overhead; we don't"
      contributions_frame: "Three contributions told as a story, not a list"

    related_work:
      goal: "Show existing work is insufficient → justify our approach"
      themes:
        - theme: "Generation-based detection methods (SelfCheckGPT, CoT verification)"
          positioning: "Effective but expensive — require LLM calls at inference time"
        - theme: "NLI-based factual consistency (SummaC, TRUE, Q²)"
          positioning: "Relevant signal exists but not characterized for hallucination detection specifically"
        - theme: "Hallucination benchmarks (HaluEval, TruthfulQA, FactScore)"
          positioning: "HaluEval provides the multi-task evaluation framework we leverage"
      gap_statement: "No prior work establishes AUROC baselines for frozen NLI on HaluEval or explains why task variation occurs"

    methodology:
      goal: "WHY this design solves the problem — connection from insight to method"
      narrative_arc: "Key insight → Design choices → Why each choice follows from insight"
      key_why_statements:
        - "Why cross-encoder over bi-encoder: fine-grained token interaction captures subtle contradiction"
        - "Why net-contradiction (P_contra - P_entail): excludes neutral cases, amplifies commission signal"
        - "Why sentence-level max aggregation: hallucination is often a single sentence; max captures peak signal"
        - "Why last-3-turn window for dialogue: recent context is most relevant grounding"

    experiments:
      goal: "Design tests that directly answer the research questions from our insight"
      research_questions:
        - "RQ1: Does P(contradiction) score achieve AUROC > chance on commission-type tasks?"
        - "RQ2: Is the signal mechanistic (graded sensitivity) or artifactual noise?"
        - "RQ3: Does generation-free approach match or exceed generation-based baselines?"
        - "RQ4: What is the structural limit — which task types fail and why?"
      dataset_rationale: "HaluEval is the standard multi-task benchmark with balanced labels and diverse hallucination types"
      baseline_rationale: "SelfCheckGPT-NLI is the most comparable generation-based approach using NLI signals"

    results:
      goal: "Present evidence as an argument — every number serves the narrative"
      narrative_structure:
        - "Lead with the positive finding: AUROC 0.709, 0.644 — the approach works"
        - "Show the mechanism: Wilcoxon + KL + Cohen's d confirm signal is structural"
        - "Show the comparison: outperforms SelfCheckGPT-NLI"
        - "Show the boundary: summarization failure with mechanistic explanation"
      numbers_as_argument: true
      avoid: "Spreadsheet-style data dump without interpretation"

    discussion:
      goal: "Interpret findings, establish the theoretical framework, acknowledge limits honestly"
      key_frameworks:
        - "Commission/omission boundary as central theoretical contribution"
        - "QA KL compression paradox: why high effect size + low KL coexist"
        - "What this means for future method design"
      limitations_approach: "Honest about L1/L2/L3, frame each with 'why acceptable' and 'what comes next'"

    conclusion:
      goal: "Full circle callback to hook; open the future"
      callback: "Return to the counterintuitive question from the hook — answer it"
      future_vision: "Omission-aware detection, cross-model study, production deployment"
      memorable_ending: "The commission/omission boundary is not just a limitation — it's a map"

  # ============================================================
  # NARRATIVE COHERENCE VERIFICATION
  # ============================================================
  coherence_checks:
    hook_to_conclusion_arc: true
    problem_evidence_alignment: true
    insight_methodology_connection: true
    claim_evidence_pairing: true
    surprising_findings_highlighted: true
    honest_limitations_included: true
    future_work_grounded_in_results: true

  # ============================================================
  # KEY NUMBERS (authoritative, from Phase 4.5)
  # ============================================================
  authoritative_numbers:
    auroc:
      dialogue: 0.7094
      qa: 0.6437
      summarization: 0.5300
    cohen_d:
      dialogue: 0.714
      qa: 0.779
      summarization: 0.220
    kl_divergence:
      dialogue: 0.279
      qa: 0.035
      summarization: 0.310
    wilcoxon_pvalue:
      dialogue: "approx 0"
      qa: "1.52e-271"
      summarization: "2.07e-13"
    delong_pvalue:
      dialogue: "approx 0"
      qa: "1.29e-282"
      summarization: "2.02e-13"
    sample_size: 20000  # per task
    total_pairs: 60000
    selfcheckgpt_comparison:
      dialogue_ours: 0.709
      dialogue_selfcheck: 0.48
      dialogue_delta: "+0.229"
      qa_ours: 0.644
      qa_selfcheck: 0.53
      qa_delta: "+0.114"
    gate_results:
      h_e1: "PASS (2/3 tasks > 0.55, DeLong p < 0.05)"
      h_m1: "FAIL/SELF_MODIFY (KL gate too strict for QA)"
