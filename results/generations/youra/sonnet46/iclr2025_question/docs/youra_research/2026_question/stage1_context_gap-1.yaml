gap_title: "No AUROC Baseline for Generation-Free Post-Hoc NLI on Multi-Task HaluEval"
gap_description: |
  No prior work reports AUROC for DeBERTa-v3-large-mnli applied as a zero-shot hallucination
  detector directly on HaluEval-Dialogue, HaluEval-Summarization, and HaluEval-QA without
  any LLM generation. Integrated with Gap 2 (optimal NLI framing: contradiction vs 1-entailment
  vs net-contradiction) and Gap 3 (sentence-level vs response-level aggregation).

