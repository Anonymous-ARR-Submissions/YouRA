    description: "Dataset is CNN zoo adapted to FC-MLP format, not native FC-MLP weights"
    why_acceptable: "Permutation structure preserved by construction; per-neuron token representation is architecture-agnostic"
    future_work: "Validate on native FC-MLP zoo or custom-trained FC-MLP zoo"
    severity: "MEDIUM"

  - id: "L2"
    description: "Cross-pipeline transfer (MNIST→CIFAR) not experimentally validated"
    why_acceptable: "Within-distribution contribution (P1 and P3) independently publishable"
    future_work: "Execute h-m3/h-m4 with existing checkpoints"
    severity: "MEDIUM"

  - id: "L3"
    description: "Only L2 canonicalization tested; stronger approaches (Hungarian, sort-by-magnitude) unexplored"
    why_acceptable: "Oracle upper bound establishes that perfect canonicalization is theoretically possible; NFT matches oracle without oracle access"
    future_work: "Implement Hungarian alignment canonicalization"
    severity: "LOW"

  - id: "L4"
    description: "Augmentation analysis based on only 3 seeds with high variance"
    why_acceptable: "Even best augmentation seed (Δρ=0.096) substantially above NFT Δρ≈4.7×10⁻⁷"
    future_work: "Run 20+ seeds to characterize Δρ distribution"
    severity: "LOW"

