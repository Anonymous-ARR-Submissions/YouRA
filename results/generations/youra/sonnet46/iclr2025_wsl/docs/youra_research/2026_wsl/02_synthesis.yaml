  overall_level: "HIGH"
  clarity_verified: true
  improvements_needed: []

experimental_scope:
  models:
    - "Flat-MLP (raw concatenation baseline)"
    - "Flat-MLP + permutation augmentation"
    - "Flat-MLP + ℓ2-norm canonicalization"
    - "Flat-MLP + oracle Hungarian canonicalization (multiple alignment objectives)"
    - "Permutation-invariant statistics regressor (ceiling check)"
    - "NFT (Neural Functional Transformer, github.com/AllanYangZhou/nfn)"
    - "NFT ablated (within-layer only, no cross-layer attention)"
  datasets:
    - "Unterthiner MNIST FC-MLP model zoo"
    - "Unterthiner CIFAR-10 FC-MLP model zoo"
  baselines:
    - "Flat-MLP (Unterthiner 2020)"
    - "Flat-MLP + perm-aug (Schürholt 2021 approach)"
    - "Multiple canonicalization variants"

measurement_plan:
  data_collection:
    - source: "Unterthiner model zoo — download MNIST and CIFAR FC-MLP model checkpoints with metadata (generalization gap, test accuracy, training loss ground truth)"
    - source: "Compute per-model structural metrics: Gini coefficient of row norms per layer, spectral decay ratio (σ₁/Σσᵢ), inter-layer principal angle alignment"
    - source: "Compute pairwise neuron alignment (Hungarian + cosine + CKA) for alignment diagnostic"
  procedure:
    - step: "Alignment diagnostic: compute pairwise alignment statistics across 1000 model pairs; report permutation entropy"
    - step: "Ceiling check: train permutation-invariant statistics regressor; confirm R² ≥ 0.40 before proceeding"
    - step: "Main comparison: train all encoder variants on MNIST zoo (80/20 split); evaluate Spearman ρ for generalization gap and accuracy"
    - step: "Permutation stress test: apply permutation severity s ∈ {0, 0.25, 0.5, 1.0} at test time; plot ρ(s) degradation curves with bootstrap CIs"
    - step: "Canonicalization ablation: compare all canonicalization variants; apply Holm correction for multiple comparisons"
    - step: "Cross-layer ablation: compare full NFT vs. NFT without cross-layer attention on both in-distribution and cross-pipeline splits"
    - step: "Cross-pipeline transfer: partition zoo by regularization regime (confirm KS test p < 0.01); measure Δ_transfer for all encoders"
    - step: "Mechanism mediation: hierarchical regression with concentration metrics as first block and encoder embeddings as second; report ΔR² for NFT vs. flat-MLP"
    - step: "Replicate key experiments on CIFAR zoo for generalizability"
  success_criteria:
    - "P1: NFT Δρ(s=1.0) < 0.02 with CI including zero; flat-MLP Δρ > 0.02 with CI excluding zero"
    - "P2: NFT Δ_transfer < 0.05; flat baselines Δ_transfer > 0.10 (Holm-corrected)"
    - "P3: Concentration metrics R² ≥ 0.40; NFT ΔR² ≥ 0.10 and significantly > flat-MLP ΔR²"

validation:
  internal_validity:
    - "Pre-registered quantitative thresholds for all three predictions before seeing results"
    - "All experiments use the same zoo splits for all encoder comparisons"
    - "Holm correction for multiple comparisons across encoder conditions"
    - "Bootstrap CIs (n=10000) for all reported Spearman ρ values"
    - "Cross-layer ablation ensures NFT advantage is attributed correctly"
    - "Canonicalization with multiple objectives prevents 'mis-specification' objection"
  external_validity:
    - "Replicate on both MNIST and CIFAR zoo subsets"
    - "Cross-pipeline transfer test provides distributional robustness evidence"
    - "Scope explicitly bounded to FC-MLP zoo setting with fixed architecture dimensions"
    - "Neuron non-identifiability acknowledged as limit on canonicalization conclusions"

discussion_synthesis:
  key_insights:
    - "The comparison should be framed as a scientific probe of weight-space structure, not just a benchmark. Whether NFT wins or loses tells us something fundamental about what generalization gap encodes in weight space."
    - "Neuron non-identifiability (overparameterized MLPs) may make any canonicalization theoretically underpowered — architectural equivariance processes the quotient space directly, which is the correct mathematical level."
    - "The three-tier comparison structure (invariant statistics → augmentation → architectural equivariance) creates publishable findings at each tier."
    - "The permutation entropy diagnostic is essential pre-modeling — if the zoo has near-random alignment, flat-MLP's good performance implies permutation-invariant statistics, not alignment artifacts."
  breakthrough_moments:
    - "Exchange 4 (Prof. Rex): Introduced the alignment diagnostic requirement — this became a mandatory pre-experiment step that prevents false interpretation of results."
    - "Exchange 8 (Prof. Rex): Identified the cross-layer attention ablation as non-negotiable — this became Experiment 5 in the final suite."
    - "Exchange 13 (Prof. Pax): Pointed out neuron non-identifiability as a theoretical scope condition — this reframed the canonicalization comparison as theoretically incomplete by design, not just practically limited."
    - "Exchange 14 (Dr. Nova): Reframed the neuron non-identifiability point as a STRENGTH of architectural equivariance — equivariant architectures are theoretically correct precisely because they don't need bijective neuron alignment."
  resolved_tensions:
    - "Tension: Does equivariance help or is augmentation sufficient? — Resolved by designing the ρ(s) degradation curve + cross-pipeline transfer split that definitively distinguishes structural vs. augmentation-based invariance."
    - "Tension: Is NFT's advantage cross-layer or within-layer? — Resolved by the cross-layer attention ablation (NFT vs. NFT-ablated)."
    - "Tension: Is the accidental alignment hypothesis valid? — Resolved by the pre-modeling alignment diagnostic, which makes the interpretation robust to either outcome."
