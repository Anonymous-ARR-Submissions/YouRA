hypothesis_draft:
  title: "NFT vs. Flat-MLP for FC-MLP Model Zoo Generalization Gap Prediction: Structural Equivariance as a Necessary Inductive Bias"
  hypothesis_id: "H-NFT-GenGap-v1"
  core_claim: |
    Neural Functional Transformers (NFT; Zhou et al. 2023) provide a representational
    advantage over flat-MLP baselines for generalization gap prediction in FC-MLP model
    zoos: NFT's within-layer permutation equivariance and cross-layer attention capture
    neuron influence concentration signals that are (1) structurally grounded beyond
    augmentation, (2) robust to permutation transformations, and (3) mechanistically
    linked to overfitting-relevant weight statistics.
  mechanism: |
    FC-MLP weight spaces have permutation symmetry (any neuron permutation yields
    equivalent function). Flat-MLP breaks this symmetry by treating neuron positions
    as meaningful, making its performance partially dependent on neuron ordering
    regularities in the zoo. NFT processes weight matrices with equivariant attention
    over neuron rows, aggregating neuron influence concentration statistics (high Gini
    coefficient = few dominant neurons = overfitting indicator) that are invariant to
    neuron ordering. Cross-layer attention further captures inter-layer co-adaptation.
    Under distribution shift (different training pipelines), NFT's structural invariance
    preserves predictive fidelity while flat-MLP representations degrade.
  predictions:
    - P1: "NFT achieves permutation robustness (Δρ < 0.02, CI includes zero) while flat-MLP shows significant degradation under random neuron permutation (Δρ > 0.02, CI excludes zero)"
    - P2: "NFT's transfer degradation under cross-pipeline shift (Δ_transfer < 0.05) is significantly smaller than flat-MLP's (Δ_transfer > 0.10)"
    - P3: "NFT embeddings add ΔR² ≥ 0.10 beyond pre-specified structural concentration metrics, exceeding flat-MLP's ΔR²"

variables_summary:
  independent: "Weight-space encoder architecture (flat-MLP, flat-MLP+aug, canonicalization variants, NFT, NFT ablated) and permutation severity s ∈ {0, 0.25, 0.5, 1.0}"
  dependent_primary: "Spearman ρ for generalization gap prediction (with permutation degradation slope Δρ as primary falsification metric)"
  controlled: "FC-MLP architecture (fixed width/depth per Unterthiner spec), evaluation protocol (identical Spearman ρ and MSE computation)"

null_hypothesis:
  h0_statement: |
    There is no significant difference in generalization gap prediction performance
    between NFT and flat-MLP baselines on the Unterthiner FC-MLP model zoo.
    Any observed differences are attributable to augmentation or post-hoc
    canonicalization achieving equivalent invariance (Δρ indistinguishable from zero
    for both, and oracle canonicalization closes any remaining gap).
  statistical_test: "Paired bootstrap test (n=10000), Holm-corrected p-values for multiple comparisons"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First controlled comparison of NFT vs flat-MLP for property prediction on the Unterthiner FC-MLP zoo — bridging a confirmed literature gap between two disparate bodies of work (NFT evaluated only on INR tasks; Unterthiner predates NFT)."
  differentiation_summary: |
    Three key differentiations from prior work:
    1. Zhou et al. (2023) evaluated NFT on INR classification, never on model zoo property regression.
    2. Unterthiner et al. (2020) used flat-MLP, predates NFT, no equivariant comparison.
    3. Schürholt et al. (2021) used augmentation-based invariance (not architectural), on a different benchmark.
    The contribution is novel by construction: no bridging study exists.

