main_hypothesis:
  id: H-NFT-GenGap-v1
  title: 'NFT vs. Flat-MLP for FC-MLP Model Zoo Generalization Gap Prediction: Structural Equivariance as a Necessary Inductive
    Bias'
  statement: Under conditions where FC-MLP model zoos exhibit permutation symmetry, NFT encoders show improved permutation
    robustness (Delta_rho < 0.02 vs. flat-MLP Delta_rho > 0.10) and cross-pipeline transfer (Delta < 0.05 vs. > 0.10) for
    generalization gap prediction on the Unterthiner FC-MLP zoo, because NFT equivariant attention captures neuron concentration
    invariantly under permutation.
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: Unterthiner FC-MLP zoo (MNIST 2-4 layer, CIFAR 2-4 layer)
    model: NFT (Neural Functional Transformer) + flat-MLP encoder variants (6 levels)
    optimizer: Adam (standard for NFT training)
    hyperparameters:
      permutation_severity:
      - 0
      - 0.25
      - 0.5
      - 1.0
      bootstrap_n: 10000
      alpha: 0.05
      correction: Holm
      min_models_per_condition: 500
