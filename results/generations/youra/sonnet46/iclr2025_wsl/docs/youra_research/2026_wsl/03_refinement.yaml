# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-NFT-GenGap-v1"
  confidence_level: 0.75
  core_hypothesis_statement: |
    Under FC-MLP model zoo conditions (Unterthiner benchmark, 2-4 layer networks, MNIST/CIFAR),
    if Neural Functional Transformers (NFT; Zhou et al. 2023) are used as weight-space encoders
    instead of flat-MLP baselines,
    then generalization gap prediction will show improved robustness to neuron permutation
    (flat degradation curve) and superior cross-pipeline transfer,
    because NFT's within-layer permutation equivariance combined with cross-layer attention
    aggregates neuron influence concentration signals that are functionally meaningful
    and invariant to the permutation symmetry group of FC-MLP weight spaces.
  alternative_hypothesis_h0: |
    There is no significant difference in generalization gap prediction performance
    between NFT encoders and flat-MLP baselines on the Unterthiner FC-MLP model zoo,
    and any observed performance differences are attributable to post-hoc canonicalization
    or permutation augmentation achieving equivalent invariance.

