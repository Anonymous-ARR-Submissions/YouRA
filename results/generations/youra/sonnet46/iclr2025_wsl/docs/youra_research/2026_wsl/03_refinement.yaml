established_facts:
  claims:
    - claim: "FC-MLP model weights are predictive of generalization gap and accuracy (R² > 0.98 achievable with flat-MLP on Unterthiner zoo)"
      status: "BUILD_ON"
      evidence: "Unterthiner et al. (2020), arXiv:2002.11448 — flat MLP achieves R² > 0.98 on 120K model zoo"
    - claim: "Neural Functional Transformers (NFT) are permutation-equivariant for FC-MLP weight spaces"
      status: "BUILD_ON"
      evidence: "Zhou et al. (2023), arXiv:2305.13546 — equivariance proven in Theorem 1; FC-MLP native, PyTorch implementation at github.com/AllanYangZhou/nfn"
    - claim: "DWSNets are incompatible with FC-MLP weight shapes at runtime"
      status: "BUILD_ON"
      evidence: "H-M1 failure — shape mismatch at weight_to_weight.py:832; confirmed by ROUTE_TO_0 context"
    - claim: "Permutation augmentation (Schürholt et al. 2021) improves weight-space representation learning"
      status: "BUILD_ON"
      evidence: "Schürholt et al. (2021), arXiv:2110.15288 — SSL + permutation augmentation outperforms prior work on model zoo tasks"
    - claim: "No controlled comparison of NFT vs flat-MLP on Unterthiner FC-MLP zoo exists in the literature"
      status: "PROVE_NEW"
      evidence: "Literature gap confirmed — NFT evaluated only on INR tasks; Unterthiner predates NFT; no bridging study"
  scope_reduction_percentage: 20
  phase2b_4_instructions: |
    The following claims are established (BUILD_ON) and do not require re-verification:
    - Flat-MLP achieves high predictive performance on model zoo property prediction
    - NFT equivariance for FC-MLP weight spaces is mathematically guaranteed (Theorem 1, Zhou et al.)
    - DWSNets MUST NOT be used (FC-MLP runtime incompatibility confirmed)
    Phase 2B should focus experimental verification on the PROVE_NEW claim:
    whether NFT provides measurable, structurally grounded advantages over flat-MLP
    for generalization gap prediction on the Unterthiner FC-MLP zoo.

