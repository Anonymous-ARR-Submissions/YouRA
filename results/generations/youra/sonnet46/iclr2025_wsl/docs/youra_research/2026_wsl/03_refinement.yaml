# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "NFT achieves statistically significantly higher Spearman ρ for generalization gap prediction than unaugmented flat-MLP on the Unterthiner FC-MLP zoo, and exhibits permutation robustness (Δρ(s=1.0) < 0.02, 95% CI includes zero)"
    test_method: "Train all five encoders on Unterthiner MNIST FC-MLP zoo. Measure Spearman ρ at s ∈ {0, 0.25, 0.5, 1.0} permutation severity. Compute Δρ with bootstrap CIs."
    success_criterion: "NFT: Δρ < 0.02 with CI including zero. Flat-MLP: Δρ > 0.02 with CI excluding zero. Paired bootstrap test shows NFT ρ(s=0) ≥ flat-MLP ρ(s=0)."
    falsification: "NFT shows Δρ > 0.02 (permutation sensitivity), or flat-MLP shows Δρ < 0.02 (permutation robustness without equivariance), or there is no statistically significant difference in ρ(s=0) between NFT and flat-MLP."
  - id: "P2"
    primary: false
    statement: "NFT's permutation degradation advantage (near-zero Δρ) persists under cross-pipeline distribution shift (different regularization regime), while flat-MLP and flat-MLP+perm-aug show significantly larger transfer degradation (Δ_transfer)"
    test_method: "Partition Unterthiner zoo by regularization regime (confirm spectral decay separation via KS test). Train on one regime, evaluate on another. Compute Δ_transfer = ρ_in - ρ_cross for all encoders."
    success_criterion: "NFT: Δ_transfer < 0.05. Flat-MLP and flat-MLP+perm-aug: Δ_transfer > 0.10. Paired bootstrap shows significant difference between NFT and flat-MLP+perm-aug transfer robustness."
    falsification: "NFT and flat-MLP+perm-aug show statistically indistinguishable Δ_transfer; or neither model degrades (insufficient pipeline shift)."
  - id: "P3"
    primary: false
    statement: "NFT embeddings show stronger mediation through pre-specified neuron influence concentration metrics (Gini coefficient of row norms, spectral decay ratio σ₁/Σσᵢ) for generalization gap prediction than flat-MLP embeddings (ΔR² ≥ 0.10 in hierarchical regression)"
    test_method: "Pre-compute structural metrics for all zoo models. Linear probe R² for gap prediction from (a) concentration metrics alone, (b) flat-MLP embeddings, (c) NFT embeddings. Hierarchical regression: concentration metrics → encoder embeddings. Compare ΔR² for NFT vs. flat-MLP."
    success_criterion: "Concentration metrics alone achieve R² ≥ 0.40. NFT embeddings add ΔR² ≥ 0.10 beyond concentration metrics. NFT ΔR² significantly exceeds flat-MLP ΔR² (paired bootstrap)."
    falsification: "NFT ΔR² < 0.05, or NFT ΔR² is not significantly greater than flat-MLP ΔR². This would falsify the neuron concentration mechanism claim."

