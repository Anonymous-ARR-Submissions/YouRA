# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "FC-MLP model zoo contains weight matrices with permutation symmetry: for any trained model, any neuron permutation (consistent across incoming/outgoing weights) yields an equivalent function. This creates an equivalence class structure over the raw weight space."
      evidence: "Established by permutation symmetry theory for FC-MLPs; any two weight tensors related by neuron permutation compute the same function"
      falsifier: "If randomly permuted weight matrices of the same model produce different forward pass outputs, the symmetry premise is violated"
    - step: 2
      description: "Flat-MLP encoders, which treat concatenated weights as a fixed-dimensional vector, implicitly break permutation symmetry by treating neuron position as meaningful. Their predictive performance therefore depends partially on statistical regularities in neuron ordering (e.g., from consistent initialization/training pipelines)."
      evidence: "The 'permutation entropy' of the zoo — measured via pairwise Hungarian alignment similarity — determines how much flat-MLP can exploit ordering artifacts. High entropy (near-random alignment) implies flat-MLP relies on permutation-invariant statistics, not ordering artifacts."
      falsifier: "If flat-MLP shows no degradation under random neuron permutation at test time (Δρ ≈ 0), it is not exploiting ordering artifacts"
    - step: 3
      description: "NFT's within-layer permutation-equivariant attention aggregates neuron-level statistics (influence concentration, co-activation patterns) that are invariant to neuron ordering. These statistics encode overfitting-relevant structure: high concentration of functional influence in few neurons correlates with overfitting (higher generalization gap). NFT captures this via per-neuron attention over weight rows, producing equivariant embeddings."
      evidence: "Zhou et al. (2023) Theorem 1 proves equivariance; neuron influence concentration as an overfitting signal is consistent with implicit regularization literature (weight decay reduces concentration)"
      falsifier: "If NFT embeddings do not show stronger mediation through neuron concentration metrics (Gini, spectral decay) than flat-MLP embeddings (ΔR² < 0.05 in hierarchical regression), mechanism is unsupported"
    - step: 4
      description: "Cross-layer attention in NFT (attending over layer embeddings after within-layer processing) models inter-layer co-adaptation structure that flat-MLP implicitly encodes via positional concatenation. Under distribution shift (different regularization regimes), NFT's structural equivariance preserves predictive fidelity while flat-MLP representations become misaligned."
      evidence: "NFT architecture includes network-level attention; cross-pipeline generalization depends on architecture-intrinsic (not training-pipeline-specific) features; equivariance guarantees this for all permutations including unseen ones"
      falsifier: "If NFT ablated (without cross-layer attention) achieves same cross-pipeline transfer as full NFT, cross-layer structure is unnecessary; if NFT transfer degrades similarly to flat-MLP under structural pipeline shift, invariance is not buying robustness"
  key_tension: "The critical unresolved tension is whether architectural equivariance provides an advantage beyond the best-possible post-hoc canonicalization (oracle Hungarian alignment with multiple similarity metrics). Neuron non-identifiability in overparameterized networks means any alignment may be theoretically underpowered, but this also means equivariant architectures may be the only theoretically sound solution."
  evidence_summary: |
    The causal chain rests on: (1) mathematical symmetry of FC-MLP weight space (established),
    (2) flat-MLP's implicit symmetry-breaking (empirically testable via degradation curves),
    (3) NFT's equivariant attention capturing neuron concentration signals (mechanistically testable via mediation),
    (4) NFT's structural robustness under distribution shift (testable via cross-pipeline transfer).
    Evidence for steps 1-2 is strong. Evidence for steps 3-4 is the hypothesis claim to be verified.

