    assumption: "Generalization gap has a stable structural footprint in FC-MLP weight space — i.e., it is predictable from weights with sufficient signal (R² ceiling > 0.4 for any permutation-invariant regressor)"
    supporting_evidence: "Unterthiner et al. (2020) demonstrate high predictability of accuracy from weights; generalization gap is expected to show similar structural signal"
    consequence_if_violated: "No encoder architecture (including NFT) will improve over flat-MLP meaningfully; the entire comparison is noise-limited"
  - id: "A2"
    assumption: "NFT's implementation (github.com/AllanYangZhou/nfn) is compatible with FC-MLP weight shapes from the Unterthiner zoo without requiring DWSNets or custom modifications"
    supporting_evidence: "Zhou et al. (2023) report FC-MLP compatibility; Python/PyTorch implementation confirmed; Phase 1 research identified this as the primary DWSNets-free alternative"
    consequence_if_violated: "NFT cannot be run on Unterthiner zoo data; hypothesis is experimentally blocked (ROUTE_TO_0 would recur)"
  - id: "A3"
    assumption: "The Unterthiner FC-MLP zoo (MNIST and CIFAR subsets) has sufficient diversity in generalization gap values to support Spearman rank correlation analysis (non-degenerate target distribution)"
    supporting_evidence: "Unterthiner et al. (2020) use this zoo for accuracy and gap prediction; 120K models provides sufficient diversity"
    consequence_if_violated: "Spearman ρ is undefined or near-zero for all methods; evaluation protocol must be changed"
  - id: "A4"
    assumption: "A 'structural pipeline shift' can be constructed within the existing zoo by partitioning on regularization regime, and the resulting subsets differ significantly in spectral decay statistics (KS test p < 0.01)"
    supporting_evidence: "Regularization (L2/weight decay) is known to affect spectral properties of weight matrices; Unterthiner zoo includes models trained with various hyperparameter configurations"
    consequence_if_violated: "Cross-pipeline transfer test lacks sufficient distributional shift; this experiment must be dropped from the suite or a different partitioning criterion used"
  - id: "A5"
    assumption: "NFT processes layers with within-layer equivariant attention AND includes a cross-layer aggregation mechanism (network-level attention or equivalent) as claimed in Zhou et al. (2023)"
    supporting_evidence: "Prof. Rex noted in Exchange 8 that the NFT architecture likely includes cross-layer components; this requires explicit confirmation from the paper/implementation"
    consequence_if_violated: "Cross-layer ablation is not possible; the compositional co-adaptation mechanism claim must be dropped, and the hypothesis reduces to within-layer equivariance only (still testable)"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    FC-MLP model zoos with fixed-width, fixed-depth architectures (2-4 layers).
    Specifically: Unterthiner et al. (2020) MNIST FC-MLP zoo and CIFAR-10 FC-MLP zoo.
    Property prediction tasks: generalization gap (train_loss - test_loss), test accuracy, training loss.
    Evaluation metrics: Spearman rank correlation (ρ) and MSE.
    Encoder architectures compatible with fixed-dimensional FC-MLP weight inputs.
  does_not_apply_to: |
    CNN zoos (different weight geometry; DWSNets may be appropriate there).
    Variable-architecture zoos (heterogeneous hidden widths or depths between models).
    Large language models or transformer-based model zoos (architecturally different weight space).
    Weight generation/synthesis tasks (this research is prediction only, not generative).
    Behavioral property prediction requiring inference (this research uses weights only).
  known_limitations: |
    The hypothesis is strictly bounded to the Unterthiner FC-MLP zoo setting.
    Extension to heterogeneous model hubs (HuggingFace, etc.) requires separate validation.
    Neuron non-identifiability limits the theoretical completeness of canonicalization baselines.
    Within-layer equivariance claim may be sufficient for shallow FC-MLPs but insufficient
    for deep networks where cross-layer composition dominates.
    If the prediction ceiling (verified by invariant-statistics regressor) is low (<0.4 R²),
    architectural differences are noise-limited and the hypothesis is not testable in this zoo.

