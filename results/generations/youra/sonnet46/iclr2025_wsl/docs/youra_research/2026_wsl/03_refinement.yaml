experimental_setup:
  dataset:
    name: "Unterthiner FC-MLP Model Zoo (MNIST + CIFAR-10 subsets)"
    type: "standard"
    source: "Unterthiner et al. (2020), arXiv:2002.11448"
    path: "Publicly available — standard benchmark for weight-space property prediction"
    hypothesis_fit: "The definitive benchmark for FC-MLP property prediction from weights. Contains 120K models with generalization gap, test accuracy, and training loss ground truth labels. FC-MLP architecture matches NFT's compatibility requirements exactly."
  model:
    name: "Neural Functional Transformer (NFT)"
    type: "Permutation-equivariant attention network for FC-MLP weight spaces"
    source: "Zhou et al. (2023), arXiv:2305.13546, github.com/AllanYangZhou/nfn"
    hypothesis_fit: "NFT is designed for FC-MLP weight spaces with mathematical permutation equivariance guarantee. PyTorch-native, no DWSNets dependency. Directly addresses the ROUTE_TO_0 constraint."
  baselines:
    - name: "Flat-MLP (raw)"
      method: "Concatenate all FC-MLP weight matrices into a flat vector, train MLP regressor"
    - name: "Flat-MLP + permutation augmentation"
      method: "Augment training data by applying random neuron permutations; otherwise identical to flat-MLP"
    - name: "Flat-MLP + ℓ2-norm canonicalization"
      method: "Sort neurons by ℓ2 norm before concatenation; no augmentation"
    - name: "Flat-MLP + oracle Hungarian canonicalization"
      method: "Align each model to a reference model via Hungarian assignment before concatenation; test multiple alignment objectives (Frobenius, cosine, spectral)"
    - name: "Permutation-invariant statistics regressor"
      method: "Feature engineering: Gini coefficient, spectral decay ratio, spectral norm per layer; train MLP on these features. Serves as ceiling check."
    - name: "NFT ablated (within-layer only)"
      method: "NFT without cross-layer attention module; tests contribution of cross-layer aggregation"

