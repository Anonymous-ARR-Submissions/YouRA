# PART 4: BROADER IMPACT
# ═══════════════════════════════════════════════════════════════════════════════

takeaway:
  main_contribution:
    one_sentence: |
      We provide the first controlled empirical comparison showing that Neural Functional
      Transformers achieve near-zero permutation sensitivity (Δρ ≈ 4.7×10⁻⁷) with 40× fewer
      parameters and higher baseline performance than flat-MLP on generalization gap prediction,
      with the mechanism confirmed via mediation analysis (ΔR² = 0.228).
    why_significant: |
      This fills a concrete gap: NFT (Zhou et al. 2023) was designed for equivariance but
      never tested on model zoo property prediction. Unterthiner et al. (2020) established
      the benchmark but predates equivariant architectures. We bridge these literatures with
      controlled experiments, multiple baselines, statistical testing, and mechanistic analysis.
      The result recommends a practical architecture change with compounding benefits.

  implications:
    for_field: |
      Weight-space analysis research should adopt equivariant architectures (NFT or similar)
      as the default encoder for FC-MLP model zoo tasks. The permutation sensitivity of
      flat-MLP is not a minor concern — it is a fundamental brittleness that equivariant
      architectures eliminate by design. The parameter efficiency finding suggests that
      architectural symmetry alignment is a stronger signal than scale for this task class.
    for_practice: |
      Practitioners using weight-space encoders for model selection, hyperparameter ranking,
      or generalization prediction should switch from flat-MLP to NFT-based encoders.
      NFT's smaller parameter count (75K vs. 3.04M) makes this change computationally
      attractive, not just theoretically motivated.
    conceptual_contribution: |
      Mediation analysis (ΔR² = 0.228) as a tool for verifying architectural inductive bias
      in weight-space representation learning. Beyond showing a method works, we can now
      ask "does it work for the right reason?" — and give a quantitative answer.

  future_possibilities:
    immediate_extensions: |
      1. Execute h-m3/h-m4: test graceful degradation curves and MNIST→CIFAR cross-pipeline
         transfer (tools and checkpoints ready from h-m1).
      2. Validate on native Unterthiner FC-MLP zoo (if URL becomes accessible) or custom
         FC-MLP zoo.
      3. Test alternative canonicalization strategies (Hungarian alignment, sort-by-magnitude).
      4. Matched-parameter-count comparison (75K flat-MLP vs. 75K NFT) to disentangle
         scale from architectural effects.
    longer_term_vision: |
      Equivariant weight-space encoders for universal model zoo analysis: a single
      permutation-equivariant encoder that generalizes across architectures (CNN, MLP, Transformer)
      and tasks (generalization gap, accuracy, robustness, fairness). The mediation analysis
      framework could guide architecture design — optimize for invariant capture of the
      task-relevant structural signals.
    open_questions: |
      1. Does the NFT advantage generalize to non-homogeneous (variable-width) FC-MLP zoos?
      2. What is the cross-pipeline transfer performance (h-m3/h-m4)?
      3. Is the parameter efficiency advantage a structural or scale effect?
      4. Can augmentation with 10+ seeds reduce variance to match NFT reliability?

