section_goals:

  abstract:
    narrative_purpose: "Compress full story into ~150 words — problem + insight + key numbers + contribution"
    key_message: |
      Equivariant architecture (NFT) achieves near-zero permutation sensitivity and outperforms
      standard flat-MLP on generalization gap prediction with 40× fewer parameters.
    structure_notes: |
      - Sentence 1: Hook — flat-MLP loses 89% correlation under permutation
      - Sentence 2: The problem — flat-MLP ignores FC-MLP permutation symmetry
      - Sentence 3: Our approach — controlled comparison of NFT vs. flat-MLP with 6 baselines
      - Sentence 4: Main result — NFT Δρ ≈ 4.7×10⁻⁷ vs. flat-MLP Δρ = 0.16–0.64
      - Sentence 5: Mechanism — ΔR² = 0.228 mediation confirming equivariant attention
      - Sentence 6: Bonus finding — 40× fewer parameters, higher baseline ρ
    avoid:
      - "Citations in abstract"
      - "Undefined acronyms (NFT, FC-MLP defined in first use)"
      - "Cross-pipeline claims (h-m3/h-m4 not executed)"

  introduction:
    narrative_purpose: "Hook → Problem → Insight → Contributions (as story, not list)"
    hook_strategy: |
      Open with the counterintuitive finding: a predictor that loses 89% correlation when
      its target's neurons are randomly shuffled reveals that it learned to rely on an
      arbitrary artifact (neuron ordering) rather than functional structure.
    problem_escalation: |
      1. Surface: Weight-space analysis for model zoos is established and performant
      2. Deeper: Flat-MLP encoders exploit neuron ordering artifacts — permanent sensitivity
         to a provably irrelevant variation
      3. Gap: NFT was designed to be equivariant but never tested on model zoo property
         prediction; no controlled comparison exists
    insight_preview: |
      "We show that aligning the encoder with the symmetry group of the task — using NFT's
      permutation-equivariant attention — eliminates this brittleness entirely (Δρ ≈ 4.7×10⁻⁷)
      while simultaneously improving baseline performance with 40× fewer parameters."
    contributions_framing: |
      Frame contributions as natural outcomes of the insight:
      "Building on this structural alignment principle, we: (1) conduct the first controlled
      comparison of NFT vs. flat-MLP under permutation stress; (2) confirm the mechanism via
      mediation analysis (ΔR² = 0.228); (3) demonstrate that L2 canonicalization is
      categorically non-viable; (4) show NFT's parameter efficiency advantage."
    transition_to_related_work: |
      "To contextualize this finding, we survey work on weight-space representation learning,
      permutation-equivariant architectures, and model zoo analysis — showing how our
      comparison fills a gap between these literatures."

  related_work:
    narrative_purpose: "Show how existing literatures are complementary but separate — our work bridges them"
    positioning_strategy: |
      Three clusters: (1) Model zoo analysis / weight-space property prediction (Unterthiner,
      etc.): excellent in-distribution performance but no equivariance consideration;
      (2) Equivariant weight-space networks (NFT, DWSNets, etc.): equivariance proven but
      tested only on INR tasks; (3) Permutation augmentation approaches (Schürholt et al.):
      augmentation helps but doesn't guarantee invariance. We sit at the intersection.
    key_comparison_points:
      - area: "Weight-space property prediction (Unterthiner et al. 2020)"
        limitation_to_highlight: |
          Flat-MLP achieves high R² on same-zoo evaluation but is not tested under
          permutation stress. No equivariant baseline evaluated.
        how_we_differ: |
          We use the same Unterthiner benchmark but add controlled permutation stress
          and equivariant comparison, revealing the hidden brittleness.
      - area: "Neural Functional Transformers (Zhou et al. 2023)"
        limitation_to_highlight: |
          NFT evaluated only on INR classification (StyleGAN latent space, NeRF);
          no application to model zoo property regression (generalization gap prediction).
        how_we_differ: |
          First empirical test of NFT on model zoo property prediction with quantitative
          comparison against flat-MLP under controlled permutation stress.
      - area: "DWSNets (Navon et al. 2023)"
        limitation_to_highlight: |
          Equivariant for CNN-specific weight space (cross-channel symmetry); runtime
          incompatible with FC-MLP weight shapes. Not a viable alternative for our task.
        how_we_differ: |
          We use NFT, which is natively compatible with FC-MLP weight shapes as
          per-neuron token sequences.
      - area: "Permutation augmentation (Schürholt et al. 2021)"
        limitation_to_highlight: |
          Augmentation reduces sensitivity but is not architecturally equivariant;
          we show it provides partial (67% reduction) but highly variable robustness
          (seed variance range: 0.096–0.317).
        how_we_differ: |
          NFT achieves near-zero sensitivity (near-oracle) without augmentation,
          with near-zero variance across seeds.
    papers_to_discuss:
      - "Unterthiner et al. (2020) — Predicting Neural Network Accuracy"
      - "Zhou et al. (2023) — Neural Functional Transformers"
      - "Navon et al. (2023) — Equivariant Architectures for Learning in Deep Weight Spaces (DWSNets)"
      - "Schürholt et al. (2021) — Self-Supervised Representation Learning for Neural Network Weights"
      - "Baron & Kenny (1986) — Mediator variable framework (for methodological justification)"
      - "Eilertsen et al. (2020) — Classifying the Classifier (related weight-space work)"
    avoid:
      - "Being unfair to flat-MLP (it achieves excellent in-distribution performance)"
      - "Missing DWSNets comparison (even though incompatible — explain why)"
      - "Overclaiming novelty: NFT equivariance proven by Zhou et al.; we test empirically"

  methodology:
    narrative_purpose: "Explain the experimental design as a consequence of the structural insight"
    connection_to_insight: |
      "Given that FC-MLP model zoos exhibit permutation symmetry (the insight), the natural
      experimental question is: do encoders that respect this symmetry perform better under
      symmetry-preserving perturbations? We answer this by constructing a controlled comparison
      with quantitative permutation stress and a mediation analysis to verify the mechanism."
    key_design_decisions:
      - decision: "Six encoder variants (flat-MLP, +aug, +canon, NFT-base, NFT+aug, oracle-canon)"
        rationale: |
          The ablation spectrum from no-equivariance to oracle-equivariance tests all
          plausible alternatives systematically. Oracle canonicalization provides the
          theoretical upper bound for post-hoc approaches.
        alternatives_considered: |
          Could have tested only NFT vs. flat-MLP; but ablation spectrum reveals the
          mechanism (augmentation partial, canonicalization broken, NFT matches oracle).
      - decision: "Permutation stress at severity s ∈ {0, 0.25, 0.5, 1.0}"
        rationale: |
          Discrete levels enable clean comparison of degradation curves. s=0 is baseline;
          s=1.0 is full random permutation. The intermediate levels reveal degradation shape.
        alternatives_considered: |
          Continuous severity sweep; chose discrete levels for cleaner statistical analysis
          and direct comparison to theoretical predictions.
      - decision: "Bootstrap statistical testing with Holm correction (n=10,000)"
        rationale: |
          Δρ is a difference of Spearman correlations — non-normal distribution; bootstrap
          is appropriate. Holm correction controls family-wise error rate across 4 severity
          levels × 2 models.
        alternatives_considered: |
          Parametric tests (Fisher r-to-z transform); chose bootstrap for robustness to
          non-normality and to match the pre-registered analysis plan.
      - decision: "Mediation analysis (hierarchical regression, ΔR²)"
        rationale: |
          To test the mechanism, not just the correlation. ΔR² measures how much additional
          variance in generalization gap prediction is explained by NFT's equivariant
          attention specifically through neuron concentration metrics.
        alternatives_considered: |
          Path analysis (LISREL); chose hierarchical regression for interpretability and
          direct connection to the theoretical prediction (ΔR² ≥ 0.10 threshold).
    intuition_building: |
      Include: (1) diagram of NFT per-neuron token construction from weight matrices;
      (2) illustration of permutation stress — same network, neurons shuffled, prediction changes;
      (3) mediation path diagram showing: permutation symmetry → equivariant attention →
      concentration metrics → robust prediction.
    technical_depth_balance: |
      Main paper: high-level architecture (token construction, equivariant attention),
      experimental design, evaluation protocol. Appendix: NFT architecture details,
      full hyperparameter tables, additional ablations.

  experiments:
    narrative_purpose: "Design tests that directly verify the structural insight and its mechanism"
    experimental_questions:
      - question: "Does flat-MLP degrade under permutation stress, while NFT does not?"
        experiment: "h-e1: single-model comparison (NFT-base vs. flat-MLP) across s∈{0,0.25,0.5,1.0}"
        expected_outcome: "Flat-MLP Δρ > 0.10, NFT Δρ < 0.02 — large differential confirmed"
      - question: "Is NFT's robustness mediated by equivariant attention capturing concentration signals?"
        experiment: "h-m1: 6-encoder ablation with mediation analysis (ΔR² computation)"
        expected_outcome: "ΔR² ≥ 0.10; mechanism_verified = True; 6-encoder hierarchy confirmed"
      - question: "Can augmentation or canonicalization substitute for architectural equivariance?"
        experiment: "h-m2: reuse h-m1 checkpoints for aug/canon evaluation; three-way ranking test"
        expected_outcome: "Aug partial (SHOULD_WORK), canon partial (SHOULD_WORK); both < NFT"
    baseline_rationale: |
      Six baselines cover the full spectrum of approaches: (1) flat-MLP: standard approach
      in prior work; (2) +aug: standard technique for improving weight-space robustness;
      (3) +canon (L2): post-hoc symmetry breaking approach; (4) NFT-base: architectural
      equivariance; (5) NFT+aug: combination; (6) Oracle-canon: theoretical upper bound.
    dataset_rationale: |
      Unterthiner MNIST zoo (29,997 models): established benchmark, sufficiently large for
      statistical analysis, compatible with NFT token format. CNN zoo weights adapted to
      FC-MLP format preserves permutation structure. Note dataset limitation honestly.
    metric_rationale: |
      Spearman ρ: rank correlation is interpretable and robust to outliers in property
      prediction. Δρ = ρ(s=0) - ρ(s=1.0): direct measure of permutation sensitivity.
      Bootstrap + Holm: rigorous null hypothesis testing with multiple-comparison correction.
      ΔR²: mechanistic test of mediation through concentration metrics.
    fairness_considerations: |
      All encoders trained with same optimizer (Adam), same learning rate schedule
      (CosineAnnealingLR), same number of epochs (100 for h-m1), same dataset splits,
      3 seeds per encoder. NFT checkpoints from h-m1 reused in h-m2 evaluation.

  results:
    narrative_purpose: "Build evidence narrative: first show the phenomenon, then the mechanism, then the ablation"
    main_result_highlight: |
      "NFT achieves Δρ ≈ 4.7×10⁻⁷ (40,000× below the 0.02 threshold) while flat-MLP
      degrades by 64% (Δρ = 0.64) under full permutation stress — and this difference
      is mechanistically explained by equivariant attention mediation (ΔR² = 0.228)."
    result_presentation_order:
      - result: "Primary robustness finding (h-e1 Table): NFT vs. flat-MLP Δρ at 4 severity levels"
        purpose: "Establish the phenomenon cleanly with the simplest comparison"
      - result: "Robustness curves figure (rho_vs_severity.png): flat line vs. declining line"
        purpose: "Visual impact — the exact flatness of NFT across all levels is immediately striking"
      - result: "6-encoder ablation hierarchy (h-m1 fig1_delta_rho_bar.png)"
        purpose: "Show the full spectrum: from oracle to flat-MLP, positioning NFT correctly"
      - result: "Mediation analysis (h-m1 fig3_mediation_r2_bar.png): ΔR² = 0.228"
        purpose: "Upgrade from phenomenon to mechanism — this is what reviewers need to see"
      - result: "Parameter efficiency table: 75K vs. 3.04M, ρ comparison"
        purpose: "Surprising bonus: NFT is not just more robust but more efficient and better"
      - result: "L2 canonicalization failure (h-m2 gate_metrics_comparison.png)"
        purpose: "Negative result with clear mechanistic explanation — closes the alternatives"
      - result: "Aug high variance (h-m2): seed spread 0.096–0.317"
        purpose: "Distinguish NFT robustness (architectural, deterministic) from aug (statistical, unreliable)"
    surprising_result_handling: |
      For NFT baseline performance advantage (ρ=0.489 vs. 0.303): present as primary finding,
      not footnote. Discuss competing explanations (structural inductive bias vs. scale effect)
      and recommend future experiment (matched-parameter-count comparison) to resolve.
      For L2 canonicalization collapse: explain the magnitude-destruction mechanism clearly;
      frame as informative negative finding rather than implementation error.

  discussion:
    narrative_purpose: "Synthesize findings into implications, honestly acknowledge scope, connect to future"
    key_findings_interpretation: |
      The results establish a clear message: architectural equivariance is the correct
      inductive bias for weight-space property prediction on FC-MLP model zoos.
      The mediation analysis (ΔR² = 0.228) distinguishes structural from incidental
      advantage — NFT works because it captures the right signal, not because it has
      more capacity or better training dynamics.
    honest_limitations:
      - limitation: "CNN zoo adapted to FC-MLP format (not native FC-MLP weights)"
        why_acceptable: |
          Permutation structure is preserved in per-neuron token representation.
          NFT equivariance operates on token structure, which is identical regardless
          of original architecture.
        future_mitigation: |
          Validate on actual FC-MLP zoo (when URL accessible) or custom-trained FC-MLP zoo.
      - limitation: "Cross-pipeline transfer (h-m3/h-m4) not tested"
        why_acceptable: |
          Within-distribution robustness contribution is independently publishable.
          P1 and P3 (the core claims) are both fully validated.
        future_mitigation: "Execute h-m3/h-m4 using existing checkpoints and framework."
      - limitation: "Only L2 canonicalization tested (stronger alternatives unexplored)"
        why_acceptable: |
          Oracle canonicalization (Δρ=0) shows theoretical upper bound is achievable.
          L2 failure is informative (magnitude-destruction mechanism identified).
        future_mitigation: |
          Test Hungarian alignment canonicalization; compare to oracle upper bound.
      - limitation: "Augmentation results based on 3 seeds (high variance observed)"
        why_acceptable: |
          High variance itself is a scientific finding: augmentation provides stochastic,
          not deterministic, robustness. NFT's deterministic invariance is the comparison.
        future_mitigation: |
          Run 20+ seeds; test bimodal distribution hypothesis; test curriculum augmentation.
    broader_impact_statement: |
      This work recommends a concrete architecture change (NFT over flat-MLP) for weight-space
      analysis that reduces brittleness to a provably irrelevant variation (neuron permutation).
      The practical benefit is improved reproducibility and reliability of weight-space analysis
      tools across training runs and deployment contexts.

  conclusion:
    narrative_purpose: "Close the narrative loop from the opening hook; open the future"
    callback_to_hook: |
      "The 89% correlation loss we opened with is not a flaw in the data, nor a limitation
      of the benchmark — it is a structural misalignment between the encoder's inductive bias
      and the symmetry structure of what it is encoding. An equivariant architecture
      eliminates this misalignment entirely, not approximately."
    memorable_ending: |
      "For FC-MLP model zoo analysis, knowing which neuron is which is not just unnecessary —
      it is a liability. Architectures that treat all orderings as equivalent are not just
      more robust; they are more efficient, more accurate, and structurally correct."
    future_work_vision: |
      The success of architectural equivariance for generalization gap prediction motivates
      a broader question: can a single permutation-equivariant encoder generalize across
      architectures (CNN, Transformer) and zoo tasks? The mediation analysis framework
      developed here provides a tool for answering such questions quantitatively — by testing
      not just whether an architecture works, but whether it works for the right structural reason.

