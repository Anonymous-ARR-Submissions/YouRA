# PART 1: HOOK & MOTIVATION
# ═══════════════════════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: |
      "A neural network trained to predict how well another network generalizes loses 89% of its
      predictive correlation when the target network's neurons are randomly shuffled — yet an
      equivariant architecture is completely unaffected by the same perturbation."
    strategy: "counterintuitive_finding"
    rationale: |
      This hook works because:
      1. The number "89% correlation loss" (flat-MLP Δρ = 0.64 on ρ = 0.70 baseline in h-m1) is
         concrete and striking — it reveals a fragility in the standard approach the reader may not
         have considered.
      2. The immediate contrast (equivariant architecture unaffected) reveals the fix exists.
      3. It reframes the problem: not "can we predict generalization?" (well-established) but
         "do our predictors respect the symmetry structure of what they're analyzing?"
      4. From 045_validated_hypothesis.md Section 8.1: confirmed as the recommended hook strategy.

  why_reader_should_care:
    main_reason: |
      Model zoo analysis — predicting generalization, ranking trained models, extracting
      hyperparameter sensitivity — is a growing field with direct applications to neural
      architecture search, automated ML, and foundation model evaluation. All current
      approaches use flat-MLP encoders that treat neuron ordering as meaningful signal,
      making them fundamentally brittle to the permutation symmetry that is mathematically
      inherent to fully-connected networks.
    concrete_example: |
      A practitioner using weight-space analysis to rank model candidates will get different
      rankings depending on which random seed was used during target model training — not
      because the models differ functionally, but because their neurons happen to be in
      different orders. NFT eliminates this symmetry artifact entirely.
    stakes: |
      Without addressing permutation symmetry, weight-space analysis tools remain fragile
      to a provably irrelevant variation (neuron permutation), making results non-reproducible
      across training runs and non-transferable across weight-spaces with different training
      histories. As model zoos grow in scale and importance, this artifact becomes
      increasingly costly.

  real_world_impact:
    application_domain: |
      Neural architecture search, automated ML pipelines, model zoo analysis,
      foundation model evaluation, hyperparameter sensitivity analysis
    potential_beneficiaries: |
      ML researchers using model zoos for meta-learning; AutoML practitioners;
      organizations maintaining large model repositories; NAS researchers
    scale_of_impact: |
      The Unterthiner zoo benchmark (~30K models) is widely used. The NFT architecture
      is open-source (Zhou et al. 2023, github.com/AllanYangZhou/nfn). The parameter
      efficiency finding (40× fewer params, higher accuracy) is immediately actionable.

# ─────────────────────────────────────────────────────────────────────────────
# PROBLEM FRAMING
# ─────────────────────────────────────────────────────────────────────────────

problem_framing:
  surface_problem:
    description: |
      Predicting generalization gap from neural network weights is established and
      achievable (Unterthiner et al. 2020: R² > 0.98 with flat-MLP on CNN zoo).
    common_understanding: |
      Weight-space analysis can extract meaningful information about trained model quality.
      Flat-MLP encoders concatenate weight matrices and feed into standard regression heads.

  deeper_problem:
    description: |
      Fully-connected networks exhibit permutation symmetry: any permutation of neurons
      within a layer yields a functionally identical network. Flat-MLP encoders treat
      neuron position as meaningful signal, creating a representation that depends on
      the arbitrary labeling of neurons during training — not on the model's actual function.
    why_overlooked: |
      The Unterthiner benchmark evaluates in-distribution performance on a single zoo
      trained with fixed seeds. Within this setting, neuron ordering is consistent and
      the flat-MLP works well. The permutation sensitivity only becomes apparent when
      (a) comparing models from different training runs, (b) evaluating under distribution
      shift, or (c) explicitly stress-testing with permuted weights.
    our_perspective: |
      The question is not "how well can we predict generalization?" but "do our weight-space
      encoders respect the symmetry structure of the objects they encode?" Flat-MLP provides
      good in-distribution performance by exploiting ordering artifacts; NFT achieves better
      performance by encoding structure that is meaningful under the actual symmetry group.

  gap_in_existing_work:
    description: |
      No controlled, direct comparison of NFT (equivariant) vs. flat-MLP (non-equivariant)
      encoders under permutation stress exists. NFT (Zhou et al. 2023) was evaluated only
      on implicit neural representation (INR) classification tasks; the Unterthiner benchmark
      predates NFT. No study bridges these two lines of work.
    why_gap_exists: |
      Technical: NFT requires weight matrices shaped as per-neuron tokens, requiring non-trivial
      adaptation to the Unterthiner zoo format. Conceptual: the permutation sensitivity of
      flat-MLP was not recognized as a fundamental issue in the original benchmark setup.
      Resource: controlled comparison requires running 21+ training runs across 6 encoder variants.
    why_gap_matters: |
      Without this comparison, practitioners have no empirical evidence for choosing equivariant
      over standard encoders for weight-space property prediction. The field has implicitly
      assumed flat-MLP sufficient because it performs well in the original in-distribution setup.

# ═══════════════════════════════════════════════════════════════════════════════
# PART 2: THE INSIGHT
# ═══════════════════════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: |
      NFT's permutation-equivariant attention does not merely provide a different encoding —
      it specifically captures the neuron influence concentration signals that encode
      generalization gap, invariantly under the actual symmetry group of the task.
    expanded_explanation: |
      The mediation analysis (ΔR² = 0.228 via hierarchical regression, h-m1) reveals the
      mechanism: NFT equivariant attention mediates robustness specifically through neuron
      influence concentration metrics (Gini coefficient, spectral decay ratio) that
      flat-MLP+augmentation fails to capture invariantly. This is not just "NFT is better"
      — it is "NFT works because it aligns with the task's structural symmetry, and we
      can measure that alignment via mediation analysis." The near-zero Δρ (4.7×10⁻⁷)
      across all permutation severity levels (0 to 1.0) confirms this is an architectural
      property, not a training artifact.

  why_others_missed_it:
    common_assumptions: |
      1. Flat-MLP achieves excellent performance (R² > 0.98) on the Unterthiner benchmark
         → assumed sufficient; no motivation to change.
      2. Permutation symmetry is a theoretical property of networks but assumed not to
         matter in practice for in-distribution evaluation.
      3. NFT was positioned as a tool for implicit neural representations (INRs), not
         for model zoo property prediction.
    our_different_view: |
      We ask: what happens to performance under the symmetry transformations that are
      provably irrelevant to the network's function? This reveals that flat-MLP's
      performance is built on an artifact (neuron ordering) rather than on functional
      structure. We then bridge the NFT literature (Zhou et al.) with the model zoo
      analysis literature (Unterthiner et al.) to provide the first empirical test.
    enabling_factor: |
      The explicit connection between permutation symmetry theory (provable for FC-MLP
      from Zhou et al. Theorem 1) and the practical question of weight-space encoder
      robustness, combined with the Unterthiner zoo as a concrete benchmark where
      the comparison can be made controlled and quantitative.

  what_makes_it_work:
    intuitive_explanation: |
      Think of neurons as employees whose job titles matter, but whose name tags are
      assigned randomly. Flat-MLP reads the name tags. NFT reads the job titles.
      When you randomly shuffle the name tags (permutation stress), flat-MLP loses
      track of who does what; NFT is unaffected because it never relied on the name tags.
      The generalization gap is determined by what the neurons *do* (their functional
      concentration of influence), not by which position they happen to occupy.
    key_mechanism: |
      NFT applies within-layer permutation-equivariant multi-head attention over
      per-neuron token sequences. This attention is equivariant under the symmetric
      group S_n acting on neurons: permuting neurons permutes attention outputs
      correspondingly, but the aggregated per-layer embedding is invariant.
      The mediation path: neuron influence concentration metrics (Gini, spectral decay)
      → invariantly captured by equivariant attention → permutation-robust embeddings
      → stable generalization gap prediction. Verified via ΔR² = 0.228 in h-m1.
    analogy: |
      Equivariant architecture for weight-space analysis is analogous to using
      graph neural networks for molecular property prediction instead of fixed-size
      feature vectors: the symmetry-aware architecture naturally handles the
      equivalence class of representations that correspond to the same object.

