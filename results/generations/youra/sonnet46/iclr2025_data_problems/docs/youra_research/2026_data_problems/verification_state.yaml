main_hypothesis:
  id: H-PCFH-v1
  title: Path-Dependent Curation Fairness Hypothesis (PCFH)
  statement: 'Under controlled pretraining conditions (Pythia-1B, fixed DCLM recipe: decoder-only

    Transformer, LR 2e-5, batch size 256, cross-entropy loss, fixed 100B token budget),

    if different data curation paths (fastText quality percentile filtering vs. DoReMi-style

    domain reweighting) are applied to the same base corpus (Dolma/DCLM-POOL) and achieve

    matched downstream capability (MMLU ±1%, HellaSwag ±1%, perplexity ±0.1, ECE ≤0.5%

    via Mahalanobis distance), then these models will produce statistically distinguishable

    fairness outcomes (BBQ accuracy gap ≥0.05 Cohen''s d, WinoBias consistency ratio

    divergence) that survive benchmark decontamination and are abolished in a

    shuffled-demographic negative control corpus, because different curation paths create

    differential conditional demographic association density H(occupation|demographic) in

    training corpora, which internalizes into differential model logit structures around

    demographic-occupation co-occurrences.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: Dolma v1.7 / DCLM-POOL
    model: Pythia-1B (primary); Pythia-160M (secondary slope-consistency)
    optimizer: AdamW
    hyperparameters:
      lr: 2.0e-05
      batch_size: 256
      loss: cross-entropy
      token_budget: 100B tokens
      evaluation_shots:
        mmlu: 5
        bbq: 0
        winobias: 0
        stereoset: 0
