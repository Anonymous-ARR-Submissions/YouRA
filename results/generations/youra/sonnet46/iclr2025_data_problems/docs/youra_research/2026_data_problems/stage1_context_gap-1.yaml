gap_id: "gap-1"
gap_title: "Absence of Controlled Joint Analysis of Curation Hyperparameters on Both Performance and Fairness"
gap_description: |
  Individual studies ablate filtering thresholds and domain mix ratios for performance (DCLM,
  FineWeb, DoReMi) OR study fairness in LLM outputs (Stochastic Parrots, BBQ), but no work uses
  the same curation configurations to measure both performance AND fairness effects simultaneously
  on the same model checkpoints. The missing piece is a controlled experiment varying curation
  hyperparameters (filtering thresholds, deduplication aggressiveness, domain mix ratios) across
  the same base model family (e.g., Pythia suite) and measuring outputs on both performance
  benchmarks (MMLU, HellaSwag) and fairness benchmarks (BBQ, WinoBias, StereoSet) from identical
  checkpoints.
