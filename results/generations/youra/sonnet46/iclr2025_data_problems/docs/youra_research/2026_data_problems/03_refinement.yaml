# SECTION 2: Experimental Setup Selection
# ═══════════════════════════════════════════════════════════════

experimental_setup:
  dataset:
    name: "Dolma / DCLM-POOL"
    type: "standard"
    source: "HuggingFace / https://datacomp.ai/dclm"
    path: "dolma-v1.7 (3T tokens), DCLM-POOL (240T tokens, Common Crawl)"
    hypothesis_fit: "Dolma provides modular, componentized subcorpora supporting controlled ablations; DCLM-POOL provides the full Common Crawl pool used in DCLM filtering experiments, enabling exact replication and extension of the filtering interventions"
  model:
    name: "Pythia Suite (primary: 1B; secondary: 160M)"
    type: "decoder-only Transformer"
    source: "EleutherAI/pythia on HuggingFace"
    hypothesis_fit: "Pythia is designed for controlled pretraining experiments with documented training procedures; consistent architecture across scales enables slope-consistency validation between 160M and 1B; 1B scale is tractable for ~10-12 runs"
  baselines:
    - name: "Unfiltered corpus baseline"
      method: "Pythia-1B trained on unfiltered Dolma (all documents, no quality filtering)"
    - name: "DCLM-BASELINE filtering"
      method: "Replication of DCLM top-10% fastText filtering on DCLM-POOL subset"
    - name: "DoReMi domain reweighting"
      method: "DoReMi-style proxy model reweighting to achieve MMLU-matched domain proportions"
    - name: "Shuffled-demographic negative control"
      method: "Pythia-1B trained on corpus with randomly permuted demographic tokens within documents (preserves entropy, destroys conditional associations)"

