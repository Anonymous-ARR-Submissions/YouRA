novelty:
  preserved_novelty: "First controlled experiment jointly measuring pretraining data curation effects on both performance and fairness benchmarks from identical model checkpoints under matched capability conditions"
  key_innovation: "Path-Dependent Curation Fairness Hypothesis — the causal identification framework that isolates curation path effects on fairness independent of capability level, using multivariate matching and conditional entropy mediation analysis"
  differentiation:
    - prior_work: "DCLM (Li et al. 2024)"
      difference: "DCLM ablates curation for performance only (MMLU, CORE scores); our work adds the fairness axis (BBQ, WinoBias, StereoSet) and introduces causal identification via matched-capability comparison"
    - prior_work: "DoReMi (Xie et al. 2023)"
      difference: "DoReMi optimizes domain weights for performance; our work uses DoReMi-style reweighting as a comparison curation path to isolate path-dependent fairness effects"
    - prior_work: "Stochastic Parrots / fairness in LLMs (Bender et al. 2021)"
      difference: "Prior fairness work analyzes outputs qualitatively or measures a single model; our work provides quantitative causal measurement of curation hyperparameter → fairness relationships at pretraining stage"

