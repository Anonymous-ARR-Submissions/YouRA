# ═══════════════════════════════════════════════════════════════
# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "Model-based fastText filtering in DCLM achieves 64% MMLU at 7B scale with 2.6T tokens"
      status: "BUILD_ON"
      evidence: "Li et al. 2024, DCLM (arXiv:2406.11794), Experiments & Results section"
    - claim: "Domain reweighting via DoReMi improves downstream accuracy by 6.5% and achieves baseline in 2.6x fewer steps"
      status: "BUILD_ON"
      evidence: "Xie et al. 2023, DoReMi (arXiv:2305.10429), Experiments & Results section"
    - claim: "FineWeb achieves competitive performance on MMLU/ARC via web-scale filtering and deduplication"
      status: "BUILD_ON"
      evidence: "Penedo et al. 2024, FineWeb (arXiv:2406.17557)"
    - claim: "Dolma provides modular filtering infrastructure (language detection, quality filtering, PII removal, Bloom filter dedup)"
      status: "BUILD_ON"
      evidence: "Soldaini et al. 2024, Dolma (arXiv:2402.00159)"
    - claim: "No prior work has jointly measured performance AND fairness effects from the same curation hyperparameter configurations on identical model checkpoints"
      status: "PROVE_NEW"
      evidence: "Phase 1 gap analysis; confirmed by absence of such measurement in all four reference papers"
    - claim: "Different curation paths achieving matched MMLU produce statistically distinguishable fairness outcomes mediated by conditional demographic association density"
      status: "PROVE_NEW"
      evidence: "Hypothesis of PCFH; not empirically established in prior literature"
  scope_reduction_percentage: 33
  phase2b_4_instructions: |
    Section 0 established facts (BUILD_ON) should be taken as verified background and used to
    contextualize hypothesis testing — do not re-verify DCLM/DoReMi/FineWeb/Dolma performance
    results. Focus verification effort on the two PROVE_NEW claims: (1) path-dependent fairness
    divergence under matched capability, and (2) mediation by conditional demographic association
    density H(occupation|demographic).

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-PCFH-v1"
  confidence_level: 0.72
  core_hypothesis_statement: |
    Under controlled pretraining conditions (Pythia-1B, fixed DCLM recipe: decoder-only Transformer,
    LR 2e-5, batch size 256, cross-entropy loss, fixed token budget), if different data curation
    paths (fastText quality percentile filtering vs. DoReMi-style domain reweighting) are applied
    to the same base corpus (Dolma/DCLM-POOL) and achieve matched downstream capability (MMLU
    ±1%, HellaSwag ±1%, perplexity ±0.1, ECE ≤0.5% difference via Mahalanobis distance criterion),
    then these models will produce statistically distinguishable fairness outcomes (BBQ accuracy
    gap ≥0.05 effect size, WinoBias consistency ratio divergence) that survive benchmark
    decontamination and are abolished in a shuffled-demographic negative control corpus, because
    different curation paths create differential conditional demographic association density
    H(occupation|demographic) in training corpora, which internalizes into differential model
    logit structures around demographic-occupation co-occurrences.
  alternative_hypothesis_h0: |
    After multivariate capability matching (MMLU, HellaSwag, perplexity, ECE via Mahalanobis
    distance), models trained via different curation paths on the same base corpus show no
    statistically distinguishable fairness outcomes (BBQ accuracy gap ≤0.01, WinoBias consistency
    ratio difference ≤0.01), indicating that fairness in foundation model outputs is determined
    by capability level alone, not by the data curation path.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Data Curation Path"
      type: "categorical"
      operationalization: "Categorical variable: (A) fastText percentile filtering at cutoffs 10%, 30%, 50%, 70%, 90% vs. (B) DoReMi-style domain reweighting to matched MMLU targets"
      levels: ["fastText-10pct", "fastText-30pct", "fastText-50pct", "fastText-70pct", "fastText-90pct", "DoReMi-matched"]
    - name: "Quality Percentile Cutoff"
      type: "continuous"
      operationalization: "For filtering path: fastText classifier score percentile threshold (5-95%), determines fraction of DCLM-POOL retained"
  dependent:
    - name: "BBQ Accuracy Gap"
      type: "continuous"
      operationalization: "Difference in BBQ benchmark accuracy between ambiguous and disambiguated contexts, measuring social bias (scale: 0-1, higher gap = more bias)"
      primary: true
    - name: "WinoBias Consistency Ratio"
      type: "continuous"
      operationalization: "Ratio of coreference pronoun resolution consistency across gender-stereotypical vs. counter-stereotypical sentences (scale: 0-1)"
      primary: false
    - name: "StereoSet Preference Score"
      type: "continuous"
      operationalization: "Model preference score for stereotyped vs. anti-stereotyped completions across intrasentence and intersentence contexts"
      primary: false
    - name: "Demographic Logit Margin"
      type: "continuous"
      operationalization: "Mean logit difference between demographic-congruent and demographic-incongruent occupation completions on probe templates"
      primary: false
  controlled:
    - name: "Model Architecture"
      operationalization: "Pythia-1B decoder-only Transformer, fixed hyperparameters (LR 2e-5, batch 256, cross-entropy loss)"
    - name: "Token Budget"
      operationalization: "Fixed token budget (100B tokens) across all training runs"
    - name: "Base Corpus"
      operationalization: "Dolma subcorpora / DCLM-POOL as the common data pool before curation interventions"
    - name: "Evaluation Protocol"
      operationalization: "Fixed evaluation prompts, 5-shot for MMLU, 0-shot for BBQ/WinoBias/StereoSet; decontamination applied uniformly"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 3
  steps:
    - step: 1
      description: "Curation path (filtering or reweighting) alters conditional demographic association density in training corpus — specifically H(occupation|demographic) and log-odds of demographic-occupation co-occurrences"
      evidence: "Filtering via fastText (Wikipedia-style quality proxy) selectively removes/retains text with different demographic register distributions [Li et al. 2024]; DoReMi reweighting changes domain proportions [Xie et al. 2023], and domains have known demographic distribution differences [Soldaini et al. 2024]"
      falsifier: "Null: fastText scores are uncorrelated with demographic token frequency and conditional association density (R² ≈ 0 in regression diagnostic)"
    - step: 2
      description: "Training on corpora with different H(occupation|demographic) internalizes differential conditional probability structures — measurable as differential model logit margins on demographic probe prompts — with a log-linear functional relationship (Spearman ρ > 0, p < 0.01)"
      evidence: "Cross-entropy minimization drives model to approximate empirical conditional distributions; information geometry predicts log-linear relationship between corpus log-odds and model logit margins"
      falsifier: "Null: shuffled-demographic negative control (same entropy, destroyed conditional associations) produces same logit margins as filtered corpus — indicating conditional structure is not the mechanism"
    - step: 3
      description: "Differential logit structures produce differential fairness benchmark outcomes (BBQ accuracy gap ≥0.05 effect size) that persist after multi-metric capability matching and benchmark decontamination"
      evidence: "BBQ, WinoBias, StereoSet probe exactly the conditional demographic-occupation distributions captured in the logit margin measure; decontamination removes benchmark artifact explanations [analogous to DCLM's MMLU decontamination, Li et al. 2024]"
      falsifier: "Null: fairness divergence ≤0.01 after multivariate capability matching (Mahalanobis distance ≤ε across MMLU, HellaSwag, perplexity, ECE), or disappears after benchmark decontamination"
  key_tension: "The fastText classifier may encode latent demographic priors (Wikipedia-style bias), making it a domain-demographic selector rather than a neutral quality filter — this must be explicitly diagnosed via fastText score regression before interpreting results"
  evidence_summary: |
    The causal chain is grounded in three established results: (1) DCLM demonstrates that quality
    filtering produces large MMLU shifts under controlled training [Li et al. 2024], (2) DoReMi
    demonstrates domain composition drives downstream capability [Xie et al. 2023], and (3) Dolma
    provides modular infrastructure for controlled curation experiments [Soldaini et al. 2024].
    The novel claim is that these same mechanisms also propagate to fairness outcomes through
    conditional demographic association structures — not yet empirically tested.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Pythia-1B at 100B token budget has sufficient capacity to internalize conditional demographic-occupation associations from training data in a measurable way"
    supporting_evidence: "DCLM shows clear performance differences at 412M-7B scales with 2.6T tokens; fairness effects at smaller scale/budget are expected directionally if not quantitatively equivalent"
    consequence_if_violated: "Experiments would need to be run at larger scale (Pythia-7B or comparable) — increases compute requirements but does not invalidate the hypothesis design"
  - id: "A2"
    assumption: "BBQ, WinoBias, and StereoSet are sensitive to differential conditional demographic-occupation distributions in pretraining data (not purely artifacts of instruction tuning or RLHF)"
    supporting_evidence: "These benchmarks were designed to probe base model biases; multiple studies show variation across base LLMs trained on different corpora"
    consequence_if_violated: "Fairness measurement instrument is invalid for base models; would need to shift evaluation to probing logit margins directly rather than task benchmarks"
  - id: "A3"
    assumption: "Multivariate capability matching (MMLU, HellaSwag, perplexity, ECE) adequately closes the backdoor path from capability to fairness benchmark performance"
    supporting_evidence: "These metrics span reasoning accuracy, common-sense knowledge, language modeling quality, and calibration — broadly covering the capability dimensions relevant to benchmark performance"
    consequence_if_violated: "Residual capability confounds could explain fairness differences; would need to expand matching criteria or use propensity score matching over a richer capability vector"
  - id: "A4"
    assumption: "The Dolma corpus and DCLM-POOL contain sufficient demographic diversity to produce measurable variation in H(occupation|demographic) across curation configurations"
    supporting_evidence: "Dolma is 3T tokens from diverse sources (web, books, Wikipedia, code); Soldaini et al. 2024 document demographic limitations (primarily English, Western-centric) but sufficient variation is expected within this scope"
    consequence_if_violated: "Insufficient variance in the mediator would produce null results; would need to use a more demographically diverse corpus or focus on specific demographic axes with clearest variation"
  - id: "A5"
    assumption: "The fastText quality classifier used in DCLM does not perfectly sort documents by demographic register (R² of fastText score regressed on demographic tokens is meaningful but not 1.0)"
    supporting_evidence: "fastText is a surface-level classifier trained on OpenWebText + Wikipedia; it encodes quality proxies not specifically demographic proxies, though correlation is expected"
    consequence_if_violated: "If R² ≈ 1.0, the filtering intervention is purely a demographic selector — this is a publishable finding in itself and reframes the hypothesis as 'quality filters are demographic filters'"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    Base language models (decoder-only Transformers in the Pythia family, 1B-7B parameters)
    pretrained on English-language web corpora (Dolma, DCLM-POOL) from scratch under controlled
    training recipes. Curation axes include: fastText quality percentile filtering, domain
    reweighting via DoReMi-style methods, and deduplication aggressiveness. Fairness axes include
    gender (WinoBias), social bias (BBQ: race/gender/religion), and stereotype endorsement
    (StereoSet). Results expected to generalize to similar quality-filtering paradigms on web-scale
    English corpora.
  does_not_apply_to: |
    - Instruction-tuned or RLHF-finetuned models (post-training can override pretraining data effects)
    - Non-English corpora (Dolma's English-language limitation)
    - Multimodal models (vision-language)
    - Models pretrained on non-web corpora (e.g., purely scientific text)
    - Tasks requiring demographic discrimination beyond what BBQ/WinoBias/StereoSet measure
  known_limitations: |
    - Pythia-1B scale may not be sufficient to observe fairness effects clearly; scale-consistency
      check with Pythia-160M for directional validation is included as a secondary analysis
    - English-only corpus limits generalizability to multilingual fairness
    - BBQ/WinoBias/StereoSet capture US-centric demographic categories (race, gender, religion)
    - The 3-link causal chain requires the shuffled-demographic negative control to validate
      mechanism specificity; if negative control is not computationally feasible, this weakens
      causal claims

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "Models trained via fastText quality filtering (varying percentile cutoffs 10%-90%) and models trained via DoReMi domain reweighting achieving matched MMLU (±1%) will show statistically distinguishable BBQ accuracy gaps with effect size ≥0.05 (Cohen's d)"
    test_method: "Train ~10-12 Pythia-1B models on filtered/reweighted Dolma corpora; apply multivariate Mahalanobis matching on (MMLU, HellaSwag, perplexity, ECE); measure BBQ accuracy gap on matched pairs; apply benchmark decontamination; test significance with paired t-test (α=0.05)"
    success_criterion: "At least one matched pair shows BBQ accuracy gap difference ≥0.05 (Cohen's d), surviving decontamination, with p < 0.05"
    falsification: "All matched pairs show BBQ accuracy gap difference ≤0.01 after decontamination; or effect disappears after matching on all four capability metrics"
  - id: "P2"
    primary: false
    statement: "Conditional entropy H(occupation|demographic) in filtered vs. unfiltered Dolma corpora will differ significantly (≥5% relative change), and this entropy difference will be positively correlated with model logit margins on demographic probe prompts (Spearman ρ > 0, p < 0.01)"
    test_method: "Compute corpus-level H(occupation|demographic) on filtered and unfiltered Dolma subsets; measure model logit margins on demographic-occupation probe templates; test Spearman correlation across configurations"
    success_criterion: "Spearman ρ > 0 with p < 0.01; entropy shift ≥5% relative between extreme filter configurations"
    falsification: "Spearman ρ ≈ 0 (p > 0.05), or shuffled-demographic control produces same logit margins as filtered corpus"
  - id: "P3"
    primary: false
    statement: "fastText quality scores are significantly correlated with demographic token frequency and conditional association density in DCLM-POOL, with R² > 0.05 in regression of fastText score on demographic features"
    test_method: "Sample 10M documents from DCLM-POOL; compute fastText quality scores and demographic token features (gendered pronoun frequency, named entity demographic inference, demographic-occupation co-occurrence); run OLS regression"
    success_criterion: "R² > 0.05 (practically meaningful correlation), with statistically significant (p < 0.01) coefficients on at least one demographic feature"
    falsification: "R² ≈ 0 — fastText classifier does not encode demographic priors (this would actually simplify the causal interpretation of filtering effects)"

