# ============================================================================
# METHODOLOGY GROUND TRUTH
# ============================================================================

methodology:
  corpus_audit_pipeline:
    components:
      - "CorpusFilter (fastText/DoReMi filtering)"
      - "EntropyMeasure (H(occ|demo) computation)"
      - "LogOddsComputer (log-odds matrix, Laplace smoothing)"
      - "StatisticalTests (Spearman + Bootstrap CI)"

  key_hyperparameters:
    entropy_window_size: 10
    laplace_alpha: 0.5
    n_bootstrap: 1000
    quick_run_docs_per_config: 50000

  fasttext_model: "fasttext-oh-eli5 (openhermes_reddit_eli5_vs_rw_v2_bigram_200k_train.bin)"
  corpus: "mlfoundations/dclm-baseline-1.0 (DCLM-POOL, streaming)"
  demographic_lexicon: "WinoBias 20-occupation pairs + gender-indicating tokens"
  co_occurrence_pairs: 1800

  corpus_configs:
    total: 8
    names: ["C0 (unfiltered)", "C1 (fastText 10%)", "C2 (fastText 30%)", "C3 (fastText 50%)", "C4 (fastText 70%)", "C5 (fastText 90%)", "C6 (DoReMi)", "C7 (shuffled-demographic negative control)"]

  model_training:
    model: "Pythia-1B"
    architecture: "GPT-NeoX, decoder-only"
    parameters: "~1.3B"
    lr: 2.0e-05
    batch_size: 256
    loss: "cross-entropy"
    train_steps: 95368
    token_budget_approx: "50B (quick-run; 100B planned)"

