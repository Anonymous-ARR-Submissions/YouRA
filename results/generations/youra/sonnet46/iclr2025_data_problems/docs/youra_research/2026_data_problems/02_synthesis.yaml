    - "DCLM-POOL subset (Common Crawl, fastText filtering target)"
  baselines:
    - "Unfiltered Dolma baseline"
    - "DCLM-BASELINE filtering (top-10% fastText)"
    - "DoReMi domain reweighting (MMLU-matched)"
    - "Shuffled-demographic negative control"

measurement_plan:
  data_collection:
    - source: "Dolma corpus audit: compute H(occupation|demographic) and fastText bias diagnostic on 10M-document sample"
    - source: "~10-12 Pythia-1B training runs on filtered/reweighted Dolma at fixed 100B token budget"
    - source: "Evaluation on MMLU, HellaSwag, perplexity, ECE (capability matching); BBQ, WinoBias, StereoSet (fairness); demographic logit margin probes"
  procedure:
    - step: "Phase A (Corpus Audit): compute fastText score regression on demographic features; compute H(occupation|demographic) across filtering intensities"
    - step: "Phase B (Training): run ~10-12 Pythia-1B training runs covering 5 filtering percentiles + 2 DoReMi variants + 1 shuffled-demographic control + 1 unfiltered baseline"
    - step: "Phase C (Matching): construct matched-capability pairs via Mahalanobis distance on (MMLU, HellaSwag, perplexity, ECE)"
    - step: "Phase D (Evaluation): measure BBQ/WinoBias/StereoSet on matched pairs; apply decontamination; test fairness divergence significance"
    - step: "Phase E (Mediation): regress fairness metrics on corpus conditional entropy shifts, controlling for capability covariates; estimate proportion of variance explained"
  success_criteria:
    - "P1: ≥1 matched pair with BBQ gap Cohen's d ≥ 0.05, p < 0.05, surviving decontamination"
    - "P2: Spearman ρ > 0, p < 0.01 between corpus H(occupation|demographic) and model logit margins"
    - "P3: R² > 0.05 in fastText-on-demographics regression (diagnostic, not pass/fail)"
    - "Negative control: shuffled-demographic corpus produces ≤0.01 BBQ gap difference vs. matched-capability standard model"

validation:
  internal_validity:
    - "Multivariate Mahalanobis matching on (MMLU, HellaSwag, perplexity, ECE) to close capability backdoor"
    - "Benchmark decontamination (template-matching + fuzzy overlap for BBQ/WinoBias/StereoSet) to eliminate artifact explanations"
    - "Shuffled-demographic negative control to isolate conditional association structure as mechanism"
    - "fastText bias diagnostic to characterize classifier demographic priors explicitly"
  external_validity:
    - "Pythia-160M slope-consistency check validates generalizability of directional findings"
    - "Multiple fairness benchmarks (BBQ, WinoBias, StereoSet) spanning different demographic axes (gender, race, religion, occupational stereotypes)"
    - "Results from Dolma/DCLM-POOL expected to generalize to similar Common Crawl-derived English web corpora"

discussion_synthesis:
  key_insights:
    - "Quality filtering and domain reweighting are not fairness-neutral operations — they are implicit demographic selectors that reshape conditional probability structures"
    - "The DCLM benchmark infrastructure provides an unusually clean controlled experiment environment for extending performance-only ablations to joint performance+fairness measurement"
    - "Conditional entropy H(occupation|demographic) is the theoretically motivated mediator linking curation operations to fairness benchmark outcomes"
    - "The shuffled-demographic negative control is a critical design element that distinguishes the mechanism (conditional structure) from mere distributional shift"
  breakthrough_moments:
    - "Exchange 3-4: Prof. Rex and Prof. Pax's identification that MMLU alone is insufficient for capability matching and that domain-level mediation is too coarse — pivoted hypothesis from tradeoff curve to causal identification problem"
    - "Exchange 8-9: Prof. Rex's entropy compression mechanism + Dr. Nova's entropy-fairness trilemma reframing introduced conditional entropy as the precise mediator"
    - "Exchange 12: Prof. Vera's shuffled-demographic negative control formalized the experimental design to isolate conditional associative structure as causal mechanism"
  resolved_tensions:
    - "MMLU sufficiency concern → resolved by multivariate capability matching (MMLU, HellaSwag, perplexity, ECE, Mahalanobis distance)"
    - "Domain-level mediation granularity → resolved by measuring H(occupation|demographic) at conditional level, not just domain proportions"
    - "Benchmark artifact concern → resolved by decontamination protocol analogous to DCLM's MMLU decontamination"
    - "Nonlinear learning dynamics → addressed by pre-specifying log-linear functional form and testing empirically via shuffled-demographic control"
