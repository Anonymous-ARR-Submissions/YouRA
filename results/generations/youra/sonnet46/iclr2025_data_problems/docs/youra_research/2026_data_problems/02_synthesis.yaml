hypothesis_draft:
  title: "Path-Dependent Curation Fairness Hypothesis (PCFH)"
  hypothesis_id: "H-PCFH-v1"
  core_claim: |
    Under controlled pretraining, different data curation paths (fastText quality filtering vs.
    domain reweighting) that achieve matched downstream capability (MMLU, HellaSwag, perplexity,
    ECE) produce statistically distinguishable fairness outcomes (BBQ accuracy gap ≥0.05 effect
    size), mediated by differential conditional demographic association density H(occupation|
    demographic) in training corpora, because quality filtering operates as an implicit domain-
    demographic selector that reshapes conditional probability structures internalized by the model.
  mechanism: |
    Three-link causal chain: (1) Curation path alters H(occupation|demographic) in training
    corpus — fastText filtering removes non-Wikipedia-register text systematically; domain
    reweighting shifts domain proportions with known demographic distributions. (2) Cross-entropy
    training internalizes these conditional structures into model logit margins, with a log-linear
    functional relationship (Spearman ρ > 0, p < 0.01). (3) Differential logit structures produce
    measurable fairness benchmark divergence that persists after capability matching, benchmark
    decontamination, and is abolished in a shuffled-demographic negative control corpus.
  predictions:
    - P1: "Matched-capability models from different curation paths show BBQ accuracy gap ≥0.05 Cohen's d, surviving decontamination"
    - P2: "Corpus H(occupation|demographic) shifts ≥5% correlate with model logit margins (Spearman ρ > 0, p < 0.01)"
    - P3: "fastText scores are correlated with demographic features (R² > 0.05) — classifier encodes latent demographic priors"

variables_summary:
  independent: "Data curation path (filtering percentile cutoff 10%-90% vs. DoReMi domain reweighting) on Dolma/DCLM-POOL"
  dependent_primary: "BBQ accuracy gap (Cohen's d ≥ 0.05 effect size on matched-capability pairs)"
  controlled: "Architecture (Pythia-1B), optimizer (AdamW), loss (cross-entropy), token budget (100B), base corpus (Dolma)"

null_hypothesis:
  h0_statement: |
    After multivariate capability matching (Mahalanobis distance ≤ε across MMLU, HellaSwag,
    perplexity, ECE), models trained via different curation paths show no statistically
    distinguishable fairness outcomes (BBQ accuracy gap ≤0.01, WinoBias ≤0.01 difference),
    indicating fairness is capability-determined, not path-determined.
  statistical_test: "Paired t-test on matched model pairs; mediation analysis via regression with capability covariates"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First causal identification of pretraining data curation path effects on fairness benchmarks using matched-capability comparison and conditional entropy mediation analysis"
  differentiation_summary: |
    DCLM (Li et al. 2024), FineWeb (Penedo et al. 2024), and DoReMi (Xie et al. 2023) all optimize
    for single-axis performance signals and explicitly acknowledge fairness/safety as out-of-scope.
    No prior work uses the controlled pretraining infrastructure to jointly measure the
    (performance, fairness) response surface of curation decisions, nor applies causal
    identification via matched-capability path comparison with conditional entropy mediation.

