      logic: "03_logic.md#A-3-Entropy-Measurement-Module"
      config: null

  - id: "task-015-subtask"
    epic: "Entropy Measurement"
    title: "L-3-3: Entropy driver (compute_conditional_entropy + compute_all_entropies)"
    description: |
      Implement EntropyMeasure.compute_conditional_entropy() and compute_all_entropies().

      compute_conditional_entropy(docs):
        joint_counts = self.compute_joint_counts(docs)
        X_arr, Y_arr = self.joint_counts_to_arrays(joint_counts)
        if len(X_arr) == 0: return 0.0  # empty corpus edge case
        return float(drv.entropy_conditional(Y_arr, X_arr))  # H(occupation|demographic)

      compute_all_entropies(corpora):
        entropies = {}
        for config_id, docs in corpora.items():
            H = self.compute_conditional_entropy(docs)
            entropies[config_id] = H
            print(f"  {config_id}: H={H:.4f} bits")
        return entropies  # dict[str, float], 7 entries

      Store joint_counts per config for use by StatisticalTests (pass as separate dict).
    feature_tag: "evaluation"
    priority: 31
    source_document: "03_logic.md"
    complexity: null
    test_requirements: |
      - Test compute_conditional_entropy with 10 synthetic docs with known pattern
      - Verify H > 0 for non-trivial corpus
      - Test compute_all_entropies: verify exactly 7 keys (C0-C6)
    reference_files:
      architecture: "03_architecture.md#EntropyMeasure"
      logic: "03_logic.md#A-3-Entropy-Measurement-Module"
      config: null

