      - For each doc['text']: model.predict(text.replace("\n", " "))
      - Parse label: if label[0] == '__label__hq' → score = prob[0], else score = 1.0 - prob[0]
      - Return list[float] of length len(docs)
      - Use tqdm for progress

      apply_fasttext_filter(docs, scores, percentile):
      - threshold = np.percentile(scores, percentile)
