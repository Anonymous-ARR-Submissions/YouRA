    description: |
      Implement h-e1/code/statistical_tests.py with StatisticalTests class.

      Core methods:
      - relative_entropy_change(h_c1, h_c5): (h_c5 - h_c1) / h_c1 * 100.0
      - bootstrap_ci(entropy_samples_a, entropy_samples_b, confidence=0.95):
          Use scipy.stats.bootstrap with method='BCa', n_resamples=10000
          statistic = lambda a, b: np.mean(a) - np.mean(b)
          Returns: (ci_low, ci_high)
      - spearman_correlation(percentiles, entropy_values):
          scipy.stats.spearmanr(percentiles, entropy_values)
          Returns: (rho, p_value)
      - ols_regression(fasttext_scores, demo_densities):
          statsmodels OLS: demo_densities ~ fasttext_scores
          Returns: {'r_squared': ..., 'coef': ..., 'p_value': ...}
      - run_all_tests(entropies, joint_counts_per_config):
          Orchestrate all tests, return comprehensive stats dict including gate result

      Gate check in run_all_tests:
          gate_passed = (relative_entropy_change >= 5.0) and (ci_low > 0 or ci_high < 0)
    feature_tag: "evaluation"
    priority: 84
    source_document: "03_architecture.md"
    complexity: 13
    test_requirements: |
