      1. Extract domain labels from docs using doc[domain_key] (default: 'source')
      2. Count domain frequencies across all docs
      3. Load DoReMi domain weights from sangmichaelxie/doremi or compute approximate weights
         - If doremi repo unavailable: use inverse frequency reweighting as proxy
         - domain_weight[d] = 1.0 / freq[d] normalized to sum=1
      4. Map each doc to its domain weight
      5. Resample: np.random.choice(len(docs), size=target_size, p=weights, replace=True)
         - target_size: ~5M effective docs (CONFIG-specified)
      6. Return resampled list[dict]
    feature_tag: "data-pipeline"
    priority: 43
