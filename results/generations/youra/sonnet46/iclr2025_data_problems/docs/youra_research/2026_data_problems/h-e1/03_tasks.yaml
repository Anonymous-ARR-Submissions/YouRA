      config: null

  - id: "task-013"
    epic: "Entropy Measurement"
    title: "L-3-1: Co-occurrence window scanner"
    description: |
      Implement EntropyMeasure.compute_joint_counts() in entropy_measure.py.

      Algorithm (from 03_logic.md pseudo-code):
        For each doc in docs:
            tokens = doc['text'].lower().split()
            For i, token in enumerate(tokens):
                If token in demo_lexicon (frozenset O(1)):
                    window = tokens[max(0, i-window_size) : i+window_size+1]
                    For w in window (skip w == token):
                        If w in occ_lexicon (frozenset O(1)):
                            joint_counts[token][w] += 1

      Use collections.defaultdict(lambda: defaultdict(int)) for joint_counts.
      Return dict[str, dict[str, int]].
    feature_tag: "data-pipeline"
    priority: 37
    source_document: "03_logic.md"
    complexity: null
    test_requirements: |
      - Test with 1 doc "she is a nurse and he is a doctor": verify joint_counts['she']['nurse']=1
      - Test window boundary: token at position 0 only sees right window
      - Test case insensitivity: "SHE" counted same as "she"
    reference_files:
      architecture: "03_architecture.md#EntropyMeasure"
      logic: "03_logic.md#A-3-Entropy-Measurement-Module"
      config: null

  - id: "task-014"
    epic: "Entropy Measurement"
    title: "L-3-2: Joint counts to array converter"
    description: |
      Implement EntropyMeasure.joint_counts_to_arrays() in entropy_measure.py.

      Steps:
      1. Build vocab: demo_vocab = sorted(joint_counts.keys()), occ_vocab = sorted all occ keys
      2. Create integer index maps: demo_idx, occ_idx
      3. Expand counts: for demo, occ_dict in joint_counts.items():
             for occ, count in occ_dict.items():
                 X_array.extend([demo_idx[demo]] * count)
                 Y_array.extend([occ_idx[occ]] * count)
      4. Return (X_array, Y_array) as lists of int
         (pyitlib expects categorical integer arrays)
    feature_tag: "data-pipeline"
    priority: 34
    source_document: "03_logic.md"
    complexity: null
