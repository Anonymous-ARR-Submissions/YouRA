# ============================================================================
# METHODOLOGY GROUND TRUTH
# ============================================================================

methodology:
  model:
    specified: "meta-llama/Meta-Llama-3-8B"
    actual_used: "meta-llama/Llama-3.1-8B"
    deviation: "minor — LLaMA-3.1 used due to cache availability; same architecture family"
    source: "h-e1/04_validation.md"

  gpu: "NVIDIA H100 NVL (100 GB VRAM)"
  vram_used_gb: 18.4

  measurement:
    hook_target: "gate_proj layer of each MLP block"
    n_layers: 32
    calibration_samples: 512
    max_length_tokens: 512
    batch_size: 8
    primary_epsilon: 0.01
    epsilon_values: [0.001, 0.01, 0.05, 0.1]

  calibration_datasets:
    alpaca: "tatsu-lab/alpaca (first 512 samples)"
    wikitext: "wikitext-103-raw-v1 (test split, first 512 chunks)"
    sst2: "SetFit/sst2 (validation set, 512 samples)"
    mnli: "nyu-mll/multi_nli (validation_matched, first 512 samples)"

  statistics:
    icc_library: "pingouin 0.6.1, type ICC(C,k), column CI95"
    kendall_tau_library: "scipy.stats.kendalltau, variant='b' (tie correction)"
    python_version: "3.10"

