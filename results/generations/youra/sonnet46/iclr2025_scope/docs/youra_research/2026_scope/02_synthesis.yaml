hypothesis_draft:
  title: "SparsityLoRA: Activation Sparsity as a Pre-Training Structural Prior for LoRA Rank Allocation"
  hypothesis_id: "H-SparsityLoRA-v1"
  core_claim: |
    Under LLaMA-3-8B, layer-wise MLP activation sparsity (measured once via forward hooks on a
    512-sample calibration set before fine-tuning) negatively predicts per-layer LoRA rank
    sensitivity, and inverse-sparsity-proportional rank allocation under a 60% parameter budget
    achieves >=95% of oracle joint allocation performance on GLUE SST-2 and MNLI, because
    pre-training drives MLP layers toward low-dimensional activation attractors that require
    correspondingly lower LoRA rank to redirect effectively.
  mechanism: |
    Pre-training optimizes MLP layers to operate in increasingly sparse activation regimes
    (Lazy Neuron Phenomenon). Layers with high sparsity (many near-zero activations) operate
    in a compressed representational subspace — they have low effective intrinsic dimension
    [Aghajanyan et al. 2021] and therefore require low LoRA rank to achieve quality fine-tuning.
    Layers with low sparsity (dense activations) operate in higher-dimensional spaces and require
    higher LoRA rank. The sparsity profile, measured in one calibration forward pass, approximates
    the layer-wise intrinsic dimension profile, which is the theoretical basis for AdaLoRA's
    training-time rank allocation. Therefore, sparsity provides a zero-cost structural prior for
    rank allocation that approximates what AdaLoRA learns through gradient-based importance scoring.
  predictions:
    - P1: "CV > 0.3 for layer-wise sparsity variation + Kendall's tau_calibration >= 0.6 (stability)"
    - P2: "Pearson r <= -0.4 between sparsity and joint rank sensitivity on sensitive layers; Kendall's tau >= 0.4 vs. AdaLoRA; >=20% unique variance in ΔW spectral decay beyond gradient norm"
    - P3: "SparsityLoRA >= 95% oracle performance at 60% parameter budget, p < 0.05 vs. uniform/random on SST-2 and MNLI"

variables_summary:
  independent: "Rank allocation strategy (SparsityLoRA, uniform r=16, budget-matched uniform, random, AdaLoRA) + epsilon threshold (sensitivity sweep)"
  dependent_primary: "GLUE aggregate performance as % of oracle allocation under 60% parameter budget"
  controlled: "LLaMA-3-8B base model, fine-tuning hyperparameters (lr=2e-4, bs=16, epochs=3), total parameter budget (60% of uniform r=16)"

null_hypothesis:
  h0_statement: |
    There is no statistically significant difference in GLUE performance between sparsity-guided
    rank allocation and uniform LoRA at equivalent parameter count (p >= 0.05 over 5 seeds).
    Activation sparsity does not predict per-layer LoRA rank sensitivity (|Pearson r| < 0.2).
    Sparsity ranking does not correlate with AdaLoRA's learned allocation (|Kendall's tau| < 0.2).
  statistical_test: "t-test or Mann-Whitney U (performance comparison); Pearson/Spearman/Kendall correlation (rank sensitivity); multiple regression (unique variance)"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First zero-gradient pre-training structural prior for LoRA rank allocation — static activation sparsity measured in one forward pass substitutes for training-time adaptive rank methods"
  differentiation_summary: |
    All prior adaptive rank methods (AdaLoRA, ARD-LoRA, DyLoRA, Sensitivity-LoRA, La-LoRA) require
    training-time signals (SVD importance, Hessian, learnable scaling factors, or concurrent rank training).
    Act-LoRA uses forward-pass activations for BINARY layer selection only (not rank magnitude).
    SparsityLoRA is the first to use static activation sparsity for CONTINUOUS rank magnitude allocation
    before fine-tuning begins. The "sparsity as free AdaLoRA approximation" framing is novel and directly
    falsifiable against AdaLoRA's learned per-layer allocation.

