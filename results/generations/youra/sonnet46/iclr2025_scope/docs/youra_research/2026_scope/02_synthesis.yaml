    - "Reframing from 'exact correlation' to 'ranking proxy' (Kendall's tau >= 0.4) made the hypothesis more robust and practically useful"
    - "The 'sparsity as free AdaLoRA approximation' framing is the cleanest novelty statement and most directly falsifiable"
    - "Joint budget allocation is essential for meaningful rank sensitivity measurement (not marginal)"
    - "Mechanistic validation via ΔW spectral decay addresses the gradient norm confound identified by Prof. Rex"
  breakthrough_moments:
    - "Exchange 9 (Dr. Nova): shift from correlation-based to ranking-based claim (Kendall's tau) — made hypothesis more robust to absolute value precision"
    - "Exchange 15 (Dr. Ally): 'sparsity as free approximation to AdaLoRA's learned allocation' — cleanest novelty framing emerged"
    - "Exchange 11 (Prof. Pax): identified ΔW spectral decay via torch.linalg.svd as tractable mechanistic validation"
  resolved_tensions:
    - "Tension: activation sparsity (first-order) vs. required LoRA rank (parameter-space direction count). Resolution: frame as ranking proxy, not exact predictor; validate against AdaLoRA's ground truth"
    - "Tension: task-agnostic calibration vs. task-conditioned rank sensitivity. Resolution: test stability across two tasks; if one fails, narrow scope rather than discard hypothesis"
    - "Tension: marginal vs. joint rank sensitivity. Resolution: define joint sensitivity protocol explicitly (fix total budget, redistribute when perturbing); measure marginal as approximation"
