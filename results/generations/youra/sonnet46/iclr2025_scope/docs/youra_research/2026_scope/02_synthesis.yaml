experimental_scope:
  models:
    - "LLaMA-3-8B (meta-llama/Meta-Llama-3-8B)"
  datasets:
    - "GLUE SST-2 (sentiment, binary classification)"
    - "GLUE MNLI (NLI, 3-class)"
    - "Alpaca (calibration, 512 samples)"
    - "WikiText-103 (calibration stability check, 512 samples)"
  baselines:
    - "Uniform LoRA r=16 (full budget reference)"
    - "Uniform LoRA budget-matched r=~10 (60% budget)"
    - "Random allocation (10-seed average, 60% budget)"
    - "AdaLoRA at matched budget (60% of uniform r=16)"

measurement_plan:
  data_collection:
    - source: "LLaMA-3-8B forward hooks on MLP gate layers (sparsity measurement)"
    - source: "GLUE SST-2/MNLI validation accuracy (performance measurement)"
    - source: "LoRA ΔW matrices post-training (spectral analysis)"
    - source: "AdaLoRA final per-layer rank allocation (correlation benchmark)"
    - source: "Per-layer gradient Frobenius norms during baseline training (confound control)"
  procedure:
    - step: "1. Measure layer-wise activation sparsity on Alpaca (512 samples) and WikiText (512 samples) via forward hooks on LLaMA-3-8B MLP layers. Compute CV and Kendall's tau_calibration."
    - step: "2. Compute joint rank sensitivity per layer: for each layer, reduce its rank by Δr while redistributing budget to other layers; measure accuracy drop on SST-2 and MNLI. Identify sensitive layers (>=0.5% drop)."
    - step: "3. Compute Pearson r between sparsity and joint rank sensitivity on sensitive layers (SST-2 and MNLI separately)."
    - step: "4. Run AdaLoRA at 60% budget on SST-2 and MNLI; extract final per-layer rank allocation; compute Kendall's tau vs. sparsity ranking."
    - step: "5. Fine-tune with 5 allocation strategies under 60% budget: SparsityLoRA, uniform r=~10, random (10 seeds), AdaLoRA, full uniform r=16. Record SST-2 and MNLI accuracy."
    - step: "6. Compute oracle allocation as best of 20 random rank allocations under 60% budget. Measure SparsityLoRA % of oracle."
    - step: "7. Post-training: compute SVD of each layer's ΔW (=B×A), extract top-4 singular values / Frobenius norm ratio. Run multiple regression with sparsity, gradient norm, and parameter count predicting ΔW ratio."
    - step: "8. Sensitivity analysis: sweep epsilon in {0.001, 0.01, 0.05, 0.1}; report Kendall's tau stability of sparsity rankings."
  success_criteria:
    - "P1: CV > 0.3 AND Kendall's tau_calibration >= 0.6"
    - "P2: Pearson r <= -0.4 on sensitive layers, both tasks; Kendall's tau >= 0.4 vs. AdaLoRA; >=20% unique variance in ΔW spectral decay"
    - "P3: SparsityLoRA achieves >=95% oracle on BOTH SST-2 and MNLI; p < 0.05 vs. uniform and random"

validation:
  internal_validity:
    - "Control for gradient norm confound in multiple regression (sparsity vs. gradient norm + parameter count as predictors of ΔW spectral decay)"
    - "5-seed repetition of all fine-tuning experiments to estimate variance"
    - "Pre-registration of success/failure thresholds before running experiments"
    - "Identical fine-tuning hyperparameters across all allocation strategies"
  external_validity:
    - "Two GLUE tasks with different supervision signals (sentiment vs. NLI) for cross-task transfer test"
    - "Two calibration datasets (Alpaca vs. WikiText) for distribution stability test"
    - "Input length variation (128 vs. 512 tokens) for calibration invariance test"
    - "AdaLoRA comparison provides external validity benchmark against state-of-the-art method"

