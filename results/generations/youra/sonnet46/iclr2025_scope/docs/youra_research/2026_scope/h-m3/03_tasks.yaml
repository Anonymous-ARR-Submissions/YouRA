    title: "L-A3-1: Implement build_joint_rank_pattern with integer budget redistribution"
    description: |
      Detailed implementation of budget-neutral rank redistribution:
        freed_rank_per_module = delta_r
        freed_total = len(target_modules) * delta_r  (7 * 2 = 14 units freed)
        extra_per_layer = freed_total // (n_other * len(target_modules))
        remainder = freed_total % (n_other * len(target_modules))
        Distribute remainder as bonus=1 to first `remainder` layer-module pairs
        Minimum rank for perturbed layer = max(1, r_base - delta_r)
      Reference: 03_logic.md L-A3-1 pseudo-code
    feature_tag: "experiment"
