  - id: "task-017"
    epic: "A-5: Delta-W Spectral Analysis (Stream 3)"
    title: "L-A5-1: Implement compute_spectral_decay_ratio (covariance-based SVD)"
    description: |
      Input: delta_w tensor (d_out, d_in), top_k=4
      Algorithm:
        dw = delta_w.float()
        if d_out >= d_in: gram = dw.T @ dw  # (d_in, d_in)
        else: gram = dw @ dw.T              # (d_out, d_out)
        eigenvalues = torch.linalg.eigvalsh(gram).clamp(min=0.0)
        singular_values = eigenvalues.sqrt()  # ascending order
        ratio = singular_values[-top_k:].sum() / torch.norm(dw, 'fro')
        Handle degenerate: if frob_norm < 1e-10, return 0.0
      Reference: 03_logic.md L-A5-1 pseudo-code
    feature_tag: "experiment"
