# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Pre-training drives MLP layers toward sparse activation patterns (low-dimensional attractors)"
      evidence: "Li et al. 2022 (Lazy Neuron): T5-Base has 3% nonzero entries; activation sparsity increases with model size and training; Szatkowski et al. 2025: universal across LLM families"
      falsifier: "If LLaMA-3-8B shows no layer-wise sparsity variation (CV ≤ 0.1) on calibration data, this step fails"
    - step: 2
      description: "Layer-wise sparsity variation is significant (CV > 0.3) and stable across calibration datasets and input lengths"
      evidence: "Indirect: ProSparse shows strong layer heterogeneity; TEAL shows stable sparsity across inputs; expected for LLaMA-3 SiLU activations"
      falsifier: "If CV ≤ 0.3 on Alpaca/FLAN calibration, or if Kendall's tau < 0.6 between Alpaca and WikiText rankings, this step fails"
    - step: 3
      description: "Layers with higher activation sparsity require lower LoRA rank to achieve equivalent fine-tuning quality"
      evidence: "Theoretical: [Aghajanyan et al. 2021] SAID shows layer-wise intrinsic dimension is real and layer-structure-dependent; sparse layers operate in lower-dimensional subspaces → lower rank suffices"
      falsifier: "If Pearson r > -0.2 between sparsity and per-layer joint rank sensitivity on sensitive layers on either SST-2 or MNLI, this step fails"
    - step: 4
      description: "Sparsity-guided rank allocation under 60% budget achieves ≥95% of oracle joint allocation, outperforms uniform and random baselines, and approximates AdaLoRA's learned allocation"
      evidence: "Infrastructure: HF PEFT rank_pattern directly supports per-layer rank; DyLoRA and AdaLoRA GLUE tables provide baselines for comparison"
      falsifier: "If sparsity-guided allocation fails to achieve ≥95% oracle on either SST-2 or MNLI, or does not significantly outperform uniform/random (p ≥ 0.05), or Kendall's tau < 0.4 vs. AdaLoRA allocation, this step fails"
  key_tension: "Rank sensitivity is task-conditioned (DyLoRA: SST-2 is rank-insensitive, CoLA is more sensitive). Whether a task-agnostic calibration sparsity signal can approximate a task-conditioned AdaLoRA allocation is the central unresolved empirical question."
  evidence_summary: |
    The causal chain connects pre-training geometry (activation sparsity) to fine-tuning efficiency
    (LoRA rank requirements) via the theoretical bridge of intrinsic dimensionality [Aghajanyan et al. 2021].
    Empirical support exists for steps 1-2 (from activation sparsity literature) and step 4 (from PEFT
    infrastructure and DyLoRA/AdaLoRA GLUE baselines). Step 3 (the correlation direction) is the core
    novel empirical claim with no prior evidence.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Activation sparsity measured on a general calibration set (Alpaca) transfers to task-specific fine-tuning distributions (GLUE SST-2, MNLI)"
    supporting_evidence: "TEAL paper shows activation sparsity is stable across diverse inputs; PowerInfer demonstrates stable sparsity patterns across input distributions in LLaMA"
    consequence_if_violated: "If violated: sparsity-guided allocation must be task-specific (reduces practical utility but does not kill the hypothesis — narrows scope)"
  - id: "A2"
    assumption: "SiLU near-zero activations (|a| < epsilon) correctly identify low-activation subspaces; threshold epsilon=0.01 provides consistent sparsity estimates"
    supporting_evidence: "TEAL uses magnitude-based thresholding at 40-50% model-wide sparsity; PyTorch hook-based measurement is well-established"
    consequence_if_violated: "If violated: sparsity estimates are noisy; need to sweep epsilon and report sensitivity; may require post-hoc calibration"
  - id: "A3"
    assumption: "Layer-wise activation sparsity is a sufficient proxy for the effective intrinsic dimensionality of the layer's representations (the attractor subspace dimensionality)"
    supporting_evidence: "Aghajanyan et al. 2021: intrinsic dimension is low for pre-trained models; layer structure matters (SAID >> DID); theoretical argument: sparse activations → compressed subspace"
    consequence_if_violated: "If violated: sparsity is an insufficient statistic; covariance-effective-rank or Jacobian spectral analysis is needed as a richer proxy"
  - id: "A4"
    assumption: "Marginal rank sensitivity (per-layer rank reduction while others fixed) correlates sufficiently with joint rank sensitivity (under shared budget constraint) to use marginal estimates in correlation analysis"
    supporting_evidence: "Computational necessity: full joint sensitivity requires 2^32 allocation evaluations; marginal is tractable; correlation between marginal and joint is common assumption in LoRA literature"
    consequence_if_violated: "If violated: marginal sensitivity measurements do not predict joint optimum; need DyLoRA-style training across rank range to estimate joint sensitivity"
  - id: "A5"
    assumption: "The learned ΔW low-rank structure (fast spectral decay) reflects the intrinsic rank requirement of the layer, not merely the rank constraint imposed by LoRA"
    supporting_evidence: "Hu et al. 2021: rank r=1 often sufficient; AdaLoRA finds low intrinsic rank in many layers; training with r=16 allows the model to express the naturally needed rank"
    consequence_if_violated: "If violated: ΔW spectral decay is an artifact of training dynamics, not layer intrinsic dimension; mechanistic claim collapses"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - LLaMA-3-8B (decoder-only, 32 MLP layers with SiLU gating)
    - GLUE benchmarks: SST-2 (binary sentiment) and MNLI (3-class NLI)
    - LoRA applied to all linear projection layers (attention + MLP)
    - Calibration set: Alpaca or FLAN-mini instruction data, 128-512 token sequences
    - Parameter budget: 60% of uniform r=16 total LoRA parameters
    - Single-GPU fine-tuning with HuggingFace PEFT
  does_not_apply_to: |
    - Cross-architecture generalization (Mistral, Gemma, Phi) — not tested in this experiment (save for follow-up)
    - Long-context tasks (>1024 tokens) — prior failures showed degenerate behavior at long context
    - Multi-task simultaneous fine-tuning (single-task fine-tuning only)
    - QLoRA / quantized base models — activation sparsity under quantization not characterized
    - Continual learning / sequential task settings
  known_limitations: |
    - SiLU activation is soft-sparse (not hard ReLU) — threshold selection affects results
    - Rank sensitivity is task-conditioned — correlation may vary across tasks (mitigated by testing 2 tasks)
    - Marginal rank sensitivity used as proxy for joint rank sensitivity (computational approximation)
    - LLaMA-3-8B only — generalization unverified

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: false
    statement: "Layer-wise MLP activation sparsity in LLaMA-3-8B varies significantly across layers (CV > 0.3) on Alpaca calibration set (512 samples), and this ranking is stable across Alpaca vs. WikiText (Kendall's tau_calibration >= 0.6) and input lengths 128 vs. 512 tokens"
    test_method: "Register forward hooks on all MLP gate layers; measure fraction |a| < 0.01 per layer across calibration samples; compute CV of mean sparsity across 32 layers; compute Kendall's tau between Alpaca and WikiText rankings"
    success_criterion: "CV > 0.3 AND Kendall's tau_calibration >= 0.6"
    falsification: "CV <= 0.3 (sparsity uniform — not a discriminating signal) OR Kendall's tau < 0.6 (distribution-sensitive — not intrinsic architectural property)"
  - id: "P2"
    primary: true
    statement: "Per-layer activation sparsity negatively predicts joint LoRA rank sensitivity (Pearson r <= -0.4 on layers with >=0.5% accuracy sensitivity); sparsity ranking correlates with AdaLoRA's learned allocation (Kendall's tau >= 0.4); and sparsity explains >=20% unique variance in ΔW spectral decay (top-4 SVs / Frobenius norm) beyond gradient norm"
    test_method: "Compute joint rank sensitivity per layer (holding total budget fixed, reducing one layer's rank by Δr, measuring accuracy drop). For ΔW spectral analysis: train with r=16, compute torch.linalg.svd on each ΔW per layer. For AdaLoRA comparison: run AdaLoRA at matched budget and extract final per-layer rank allocation. Multiple regression: sparsity + gradient norm + parameter count predicting ΔW ratio."
    success_criterion: "Pearson r <= -0.4 on sensitive layers on SST-2 AND MNLI; Kendall's tau >= 0.4 vs. AdaLoRA; sparsity beta significant (p < 0.05) with >=20% unique variance"
    falsification: "Pearson r > -0.2 on either task (no meaningful correlation); Kendall's tau < 0.2 vs. AdaLoRA (no relationship to learned allocation); sparsity loses significance when gradient norm added"
  - id: "P3"
    primary: false
    statement: "Sparsity-guided rank allocation under 60% parameter budget achieves >=95% of oracle joint allocation performance on both SST-2 and MNLI, and significantly outperforms uniform (budget-matched) and random allocation (p < 0.05 over 5 seeds)"
    test_method: "Fine-tune with 5 allocation strategies under identical 60% budget: (A) sparsity-guided, (B) uniform r=~10, (C) random (10 seeds), (D) AdaLoRA (matched budget), (E) full uniform r=16 baseline. Measure SST-2 accuracy and MNLI accuracy. Oracle defined as best of 20 random allocations. Compute % of oracle achieved. t-test or Mann-Whitney between SparsityLoRA and uniform/random."
    success_criterion: "SparsityLoRA achieves >=95% of oracle on BOTH SST-2 AND MNLI; p < 0.05 vs. uniform and random on at least one metric"
    falsification: "SparsityLoRA < 95% oracle on either task, or fails to significantly outperform uniform and random baselines under equal budget"

