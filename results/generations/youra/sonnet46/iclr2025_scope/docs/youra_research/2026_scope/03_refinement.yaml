# ═══════════════════════════════════════════════════════════════
# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "LoRA applies low-rank decomposition (rank r) to weight updates in pre-trained transformers"
      status: "BUILD_ON"
      evidence: "Hu et al. 2021 — 18,759 citations; HF PEFT production implementation"
    - claim: "Pre-trained LLMs have low intrinsic dimension for fine-tuning (≥90% full performance achievable in d << D parameter subspace)"
      status: "BUILD_ON"
      evidence: "Aghajanyan et al. 2021 — MRPC: d=207 (SAID) vs. full parameter count; layer structure matters (SAID >> DID)"
    - claim: "MLP activation sparsity varies significantly across transformer layers (layer-discriminating signal)"
      status: "BUILD_ON"
      evidence: "Li et al. 2022 (Lazy Neuron); Szatkowski et al. 2025 (Universal Properties); ReLU Strikes Back (Mirzadeh et al. 2023)"
    - claim: "All existing adaptive rank methods (AdaLoRA, DyLoRA, ARD-LoRA, La-LoRA, Sensitivity-LoRA) require training-time signals"
      status: "BUILD_ON"
      evidence: "Literature review — AdaLoRA uses SVD importance during training; DyLoRA trains across rank range; Sensitivity-LoRA uses Hessian"
    - claim: "Static activation sparsity as PRE-TRAINING predictor of LoRA rank has not been demonstrated"
      status: "PROVE_NEW"
      evidence: "Gap confirmed — Act-LoRA (MDPI 2025) is closest but uses L2-norm for BINARY layer selection, not rank magnitude"
    - claim: "Sparsity-guided rank allocation achieves >=95% GLUE quality at <=60% LoRA parameters"
      status: "PROVE_NEW"
      evidence: "No prior work — this is the core empirical contribution"
  scope_reduction_percentage: 67
  phase2b_4_instructions: |
    BUILD_ON claims (4/6) can be treated as established background. The two PROVE_NEW claims
    (static sparsity as rank predictor; 95%/60% efficiency threshold) are the core experimental
    targets. Phase 2B should design sub-hypotheses directly around these two gaps.
    Do NOT re-verify the BUILD_ON claims — use them as given theoretical grounding.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-SparsityLoRA-v1"
  confidence_level: 0.72
  core_hypothesis_statement: |
    Under LLaMA-3-8B inference on GLUE (SST-2 and MNLI), if layer-wise MLP activation sparsity
    (fraction of |activations| < 0.01, measured via forward hooks on 512 Alpaca calibration samples)
    is used to inversely allocate per-layer LoRA ranks under a fixed total parameter budget equal
    to 60% of uniform-r=16, then the sparsity-guided rank allocation achieves ≥95% of oracle
    joint allocation performance on both SST-2 and MNLI, because pre-training drives MLP layers
    toward low-dimensional activation attractors whose dimensionality is proxied by activation
    sparsity and determines the rank needed for quality fine-tuning.
  alternative_hypothesis_h0: |
    There is no significant difference in GLUE performance between sparsity-guided adaptive rank
    allocation and uniform LoRA rank at equivalent parameter count. Activation sparsity does not
    predict per-layer LoRA rank sensitivity (Pearson r > -0.2) and does not correlate with
    AdaLoRA's learned per-layer allocation (Kendall's tau < 0.2).

