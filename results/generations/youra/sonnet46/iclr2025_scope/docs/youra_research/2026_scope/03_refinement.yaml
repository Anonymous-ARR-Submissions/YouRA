# SECTION 3: Novelty & Innovation
# ═══════════════════════════════════════════════════════════════

novelty:
  preserved_novelty: "Zero-gradient pre-training structural prior for LoRA rank allocation — first work to use static activation sparsity measured in a single forward pass before fine-tuning begins"
  key_innovation: "Sparsity as a free approximation to AdaLoRA's learned per-layer rank allocation: if Kendall's tau >= 0.4 between sparsity-based ranking and AdaLoRA's learned allocation, we demonstrate that pre-training geometry encodes sufficient information for rank decisions without any training computation"
  differentiation:
    - prior_work: "AdaLoRA (Zhang et al. 2023)"
      difference: "AdaLoRA uses SVD-based importance scoring during training (training-time, gradient-required). SparsityLoRA uses activation sparsity measured in one pre-training forward pass (zero training overhead)."
    - prior_work: "DyLoRA (Valipour et al. 2022)"
      difference: "DyLoRA trains across a rank range simultaneously (still requires full training). SparsityLoRA predicts rank BEFORE training — no rank search needed."
    - prior_work: "Act-LoRA (MDPI 2025)"
      difference: "Act-LoRA uses L2-norm of activations for BINARY layer selection (which layers get LoRA). SparsityLoRA uses sparsity FRACTION for CONTINUOUS rank magnitude allocation (how much rank each layer gets)."
    - prior_work: "Sensitivity-LoRA (Zhang et al. 2025)"
      difference: "Sensitivity-LoRA uses second-order Hessian approximation (gradient-based). SparsityLoRA uses zero-order forward-pass statistics only."

