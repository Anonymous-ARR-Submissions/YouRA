gap_id: "gap_1"
gap_title: "No Static Pre-Fine-Tuning Signal for Per-Layer LoRA Rank Allocation"
gap_description: |
  All adaptive rank allocation methods (AdaLoRA, ARD-LoRA, La-LoRA, DyLoRA, Sensitivity-LoRA)
  use TRAINING-TIME signals. No prior work demonstrates that a static, single forward-pass
  measurement (activation sparsity) predicts optimal per-layer rank allocation BEFORE fine-tuning.
  Act-LoRA (closest prior work) uses activation L2-norm for BINARY layer selection, not rank magnitude.

