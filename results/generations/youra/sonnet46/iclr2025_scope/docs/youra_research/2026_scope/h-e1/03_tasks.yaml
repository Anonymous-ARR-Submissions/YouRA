  # ─── Epic E4: Metrics Computation (priority 90) ──────────────────────────────
  - id: "task-008"
    epic: "E4"
    title: "Implement metrics computation (CV, Kendall tau)"
    description: |
      Implement h-e1/code/compute_metrics.py.

      Functions to implement:
      1. compute_cv(layer_sparsity: np.ndarray) -> float
         - Returns sparsity.std() / sparsity.mean()
         - Guard against mean == 0 (return 0.0)

      2. compute_kendall_tau(sparsity_a, sparsity_b) -> tuple[float, float]
         - Returns (tau_statistic, p_value) from scipy.stats.kendalltau

      3. compute_all_metrics(condition_results, cfg) -> dict
         - Loop over 4 epsilons, compute CV + 2 taus (calibration + length) per epsilon
         - Promote primary_epsilon values to top-level keys: cv_primary, tau_calibration, tau_length
         - See 03_logic.md L-E4-1 for complete return dict schema

      4. check_gate_conditions(metrics, cfg) -> tuple[bool, dict]
         - Check cv_primary > cfg.cv_threshold AND tau_calibration >= cfg.tau_threshold
         - Return (passed, {cv_pass, tau_pass, cv_value, tau_value})

      Files to create:
        h-e1/code/compute_metrics.py
    feature_tag: "evaluation"
