  # ─── Epic E3: Sparsity Measurement Engine (priority 91) ─────────────────────
  - id: "task-004"
    epic: "E3"
    title: "Implement sparsity measurement engine with forward hooks"
    description: |
      Implement h-e1/code/measure_sparsity.py — the core measurement module.

      Functions to implement:
      1. register_hooks(model, epsilon, layer_counts) -> List[RemovableHook]
         - Register forward hook on model.model.layers[i].mlp.gate_proj for i in range(32)
         - Hook captures: (output.abs() < epsilon).float().mean().item() per batch
         - Use make_hook(layer_idx) closure factory (NOT lambda i: ...)
         - Return list of 32 RemovableHook handles

      2. measure_layer_sparsity(model, dataloader, epsilon, cfg) -> np.ndarray shape (32,)
         - Call register_hooks(), run forward passes under torch.no_grad()
         - Use try/finally to guarantee hook removal on exception
         - Return np.array([np.mean(layer_counts[i]) for i in range(32)])

      3. run_all_conditions(model, alpaca_short, alpaca_long, wikitext_long, cfg) -> dict
         - Sweep 3 dataloaders × 4 epsilons = 12 calls to measure_layer_sparsity()
         - Return dict keyed by (dataset_name, epsilon, length): np.ndarray(32,)

      4. verify_mechanism(layer_sparsity, cfg) -> tuple[bool, dict]
         - Check: len == 32, mean > 0, std > 0.01
         - Return (all_passed, indicators_dict)

      Files to create:
        h-e1/code/measure_sparsity.py
    feature_tag: "experiment"
    priority: 91
    source_document: "03_architecture.md"
    complexity: 14
    test_requirements: |
      Create tests/test_measure_sparsity.py:
      - test_hook_closure_captures_correct_layer(): verify each hook captures its own layer_idx
      - test_hook_cleanup_on_exception(): verify hooks removed even when forward pass raises
      - test_run_all_conditions_key_count(): verify dict has exactly 12 entries (3×4)
    reference_files:
