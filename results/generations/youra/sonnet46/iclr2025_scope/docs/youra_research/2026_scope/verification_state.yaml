main_hypothesis:
  id: H-SparsityLoRA-v1
  title: 'SparsityLoRA: Activation Sparsity as a Pre-Training Structural Prior for LoRA Rank Allocation'
  statement: 'Under LLaMA-3-8B inference on GLUE (SST-2 and MNLI), if layer-wise MLP activation sparsity

    (fraction of |activations| < 0.01, measured via forward hooks on 512 Alpaca calibration samples)

    is used to inversely allocate per-layer LoRA ranks under a fixed total parameter budget equal

    to 60% of uniform-r=16, then the sparsity-guided rank allocation achieves >=95% of oracle

    joint allocation performance on both SST-2 and MNLI, because pre-training drives MLP layers

    toward low-dimensional activation attractors whose dimensionality is proxied by activation

    sparsity and determines the rank needed for quality fine-tuning.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: GLUE (SST-2 + MNLI)
    model: LLaMA-3-8B (meta-llama/Meta-Llama-3-8B)
    optimizer: AdamW
    hyperparameters:
      learning_rate: 0.0002
      batch_size: 16
      epochs: 3
      warmup_ratio: 0.03
      seeds:
      - 42
      - 43
      - 44
      - 45
      - 46
      lora_target_modules:
      - q_proj
      - v_proj
      - k_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
      parameter_budget: 60% of uniform r=16
