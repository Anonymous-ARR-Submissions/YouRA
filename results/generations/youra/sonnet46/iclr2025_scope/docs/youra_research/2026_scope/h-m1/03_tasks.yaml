  - id: task-007
    epic: E6 - Pairwise Kendall's Tau
    title: '[E6] Extend compute_metrics.py with pairwise tau and gate evaluation'
    description: |
      File: h-m1/code/compute_metrics.py
      Copy h-e1/code/compute_metrics.py as base, then add:

      NEW: compute_pairwise_tau(sparsity_profiles: Dict[str, np.ndarray]) -> Dict[str, Dict[str, float]]
        - dists = list(sparsity_profiles.keys())  # 4 distributions
        - For each pair (d1, d2) in itertools.combinations(dists, 2):
            tau, pval = scipy.stats.kendalltau(sparsity_profiles[d1], sparsity_profiles[d2])
            results[f"{d1}_vs_{d2}"] = {"tau": float(tau), "pval": float(pval)}
        - Returns dict with 6 entries

      NEW: compute_tau_min(tau_results) -> float
        - return min(v["tau"] for v in tau_results.values())

      NEW: evaluate_gate(icc3k: float, tau_results: Dict, cfg) -> Dict[str, Any]
        - tau_min = compute_tau_min(tau_results)
        - icc_passed = icc3k > cfg.icc_threshold
        - tau_passed = tau_min >= cfg.tau_threshold
        - gate_result = "PASS" if (icc_passed and tau_passed) else "FAIL"
        - failed = []
        - if not icc_passed: failed.append(f"ICC3k={icc3k:.4f} <= {cfg.icc_threshold}")
        - if not tau_passed: failed.append(f"tau_min={tau_min:.4f} < {cfg.tau_threshold}")
        - return {"gate_result": gate_result, "icc3k": icc3k, "tau_min": tau_min,
                  "icc_passed": icc_passed, "tau_passed": tau_passed,
                  "failed_conditions": failed, "tau_results": tau_results}
    feature_tag: experiment
    priority: 88
    source_document: 03_architecture.md
    complexity: 9
    test_requirements: |
      ## Test Requirements (MANDATORY)
      - Create tests/test_compute_metrics.py
      - Test: compute_pairwise_tau produces 6 pairs from 4 distributions
      - Test: evaluate_gate PASS when icc3k=0.8 and tau_min=0.7
      - Test: evaluate_gate FAIL when icc3k=0.7 (below threshold)
    reference_files:
      architecture: 03_architecture.md#computemetrics-h-m1codecompute_metricspy
      logic: 03_logic.md#compute_metricspy-extended-from-h-e1

