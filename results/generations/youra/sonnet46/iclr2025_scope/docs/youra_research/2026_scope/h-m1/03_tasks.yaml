  - id: task-010
    epic: E9 - Main Runner Integration
    title: '[E9] Implement run_experiment.py main orchestrator'
    description: |
      File: h-m1/code/run_experiment.py (NEW)

      setup_environment(cfg):
        - np.random.seed(cfg.seed), torch.manual_seed(cfg.seed)
        - os.makedirs(cfg.figures_dir, exist_ok=True)

      load_model_and_tokenizer(cfg) -> (model, tokenizer):
        - model = AutoModelForCausalLM.from_pretrained(cfg.model_name,
              torch_dtype=torch.float16, device_map="auto")
        - model.eval()
        - tokenizer = AutoTokenizer.from_pretrained(cfg.model_name)
        - if tokenizer.pad_token is None: tokenizer.pad_token = tokenizer.eos_token
        - return model, tokenizer

      run_sparsity_measurement(model, dataloaders, cfg) -> Dict[float, Dict[str, np.ndarray]]:
        - sparsity_by_epsilon = {}
        - for eps in cfg.epsilons:
            sparsity_by_epsilon[eps] = measure_all_distributions(model, dataloaders, eps, cfg)
        - return sparsity_by_epsilon

      run_statistical_analysis(sparsity_by_epsilon, cfg) -> Dict:
        - primary = sparsity_by_epsilon[cfg.primary_epsilon]
        - icc_result = compute_icc3k(primary)
        - tau_results = compute_pairwise_tau(primary)
        - gate = evaluate_gate(icc_result["icc3k"], tau_results, cfg)
        - icc_sensitivity = compute_icc_sensitivity(sparsity_by_epsilon)
        - tau_sensitivity = compute_tau_sensitivity(sparsity_by_epsilon)
        - return {"gate": gate, "icc": icc_result, "tau": tau_results,
                  "icc_sensitivity": icc_sensitivity, "tau_sensitivity": tau_sensitivity,
                  "sparsity_profiles": {str(k): {dk: dv.tolist() for dk,dv in v.items()}
                                         for k,v in sparsity_by_epsilon.items()}}

      main():
        - cfg = ExperimentConfig()
        - setup_environment(cfg)
        - model, tokenizer = load_model_and_tokenizer(cfg)
        - dataloaders = load_all_dataloaders(tokenizer, cfg)
        - sparsity_by_epsilon = run_sparsity_measurement(model, dataloaders, cfg)
        - results = run_statistical_analysis(sparsity_by_epsilon, cfg)
        - primary_profiles = sparsity_by_epsilon[cfg.primary_epsilon]
        - figs = generate_all_figures(primary_profiles, results["icc"],
                    results["tau"], results["gate"],
                    results["icc_sensitivity"], results["tau_sensitivity"],
                    cfg.figures_dir)
        - results["figures_generated"] = figs
        - save_results(results, cfg.results_path)
        - (print gate summary)
    feature_tag: experiment
    priority: 85
    source_document: 03_architecture.md
    complexity: 14
    test_requirements: |
