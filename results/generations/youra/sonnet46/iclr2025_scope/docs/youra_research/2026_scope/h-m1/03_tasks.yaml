  - id: task-006
    epic: E5 - ICC(3,k) Computation
    title: '[E5] Implement compute_icc.py with pingouin ICC(3,k)'
    description: |
      File: h-m1/code/compute_icc.py (NEW)

      build_icc_dataframe(sparsity_profiles: Dict[str, np.ndarray]) -> pd.DataFrame
        - Input: {dist_name: array(32,)} for 4 distributions
        - Output: long-format DF, columns=[layer, distribution, sparsity], 128 rows
        - rows.append({"layer": layer_idx, "distribution": dist_name, "sparsity": val})
        - return pd.DataFrame(rows)

      compute_icc3k(sparsity_profiles: Dict[str, np.ndarray]) -> Dict[str, float]
        - df = build_icc_dataframe(sparsity_profiles)
        - icc_results = pg.intraclass_corr(data=df, targets="layer", raters="distribution", ratings="sparsity")
        - row = icc_results[icc_results["Type"] == "ICC3k"].iloc[0]
        - return {"icc3k": float(row["ICC"]), "ci_lower": row["CI95%"][0], "ci_upper": row["CI95%"][1]}

      compute_icc_sensitivity(sparsity_by_epsilon: Dict[float, Dict[str, np.ndarray]]) -> Dict[float, Dict]
        - return {eps: compute_icc3k(profiles) for eps, profiles in sparsity_by_epsilon.items()}
    feature_tag: experiment
    priority: 89
    source_document: 03_architecture.md
    complexity: 11
