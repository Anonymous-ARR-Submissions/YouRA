      - Test: compute_cross_epsilon_tau returns exactly 6 pairs
      - Test: identical sparsity vectors → tau ≈ 1.0 (or -1.0 for reverse)
      - Test: count_cv_pass correctly counts threshold crossings
      - Use synthetic 32-dim arrays (no model needed)
    reference_files:
