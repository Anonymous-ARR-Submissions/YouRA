  - id: task-008
    epic: A-7 - Gate Evaluation
    title: '[A-7] Implement evaluate_gate and verify_mechanism_activated'
    description: |
      In h-m2/code/compute_metrics.py (add to module):

      ADJACENT_PAIRS = [(0.001, 0.01), (0.01, 0.05), (0.05, 0.1)]

      evaluate_gate(cv_per_epsilon, tau_matrix, cfg) -> Tuple[bool, Dict]:
        cv_pass_count, cv_pass_dict = count_cv_pass(cv_per_epsilon, cfg.cv_threshold)
        cv_gate_passed = cv_pass_count >= cfg.cv_pass_min_count  # >= 3

        adjacent_tau = {}
        for (e1, e2) in ADJACENT_PAIRS:
          adjacent_tau[f"{e1}_vs_{e2}"] = tau_matrix[f"{e1}_vs_{e2}"]["tau"]
        max_adjacent_tau = max(adjacent_tau.values())
        tau_gate_passed = max_adjacent_tau >= cfg.cross_epsilon_tau_threshold  # >= 0.7

        gate_pass = cv_gate_passed and tau_gate_passed
        failed_conditions = []
        if not cv_gate_passed:
          failed_conditions.append(f"CV pass count={cv_pass_count} < {cfg.cv_pass_min_count}")
        if not tau_gate_passed:
          failed_conditions.append(f"max adjacent tau={max_adjacent_tau:.4f} < {cfg.cross_epsilon_tau_threshold}")

        return gate_pass, {
          "gate_result": "PASS" if gate_pass else "FAIL",
          "cv_pass_count": cv_pass_count, "cv_pass_dict": cv_pass_dict,
          "max_adjacent_tau": max_adjacent_tau, "adjacent_pair_results": adjacent_tau,
          "failed_conditions": failed_conditions, "all_tau_pairs": tau_matrix,
        }

      verify_mechanism_activated(sparsity_dict, tau_matrix, epsilons) -> Tuple[bool, Dict]:
        data_complete = all(len(sparsity_dict[eps]) == 32 for eps in epsilons)
        tau_complete = len(tau_matrix) == 6
        values_valid = all(0.0 < float(sparsity_dict[eps].mean()) < 1.0 for eps in epsilons)
        indicators = {"data_complete": data_complete, "tau_complete": tau_complete, "values_valid": values_valid}
        return all(indicators.values()), indicators
    feature_tag: experiment
    priority: 87
    source_document: 03_architecture.md
    complexity: 10
    test_requirements: |
