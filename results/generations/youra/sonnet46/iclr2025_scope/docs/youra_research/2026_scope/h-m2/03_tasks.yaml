  - id: task-006
    epic: A-5 - Cross-Epsilon Tau Computation
    title: '[A-5] Implement compute_metrics.py — CV per epsilon + 6 pairwise cross-epsilon tau'
    description: |
      File: h-m2/code/compute_metrics.py (NEW — primary new module)

      compute_cv_per_epsilon(sparsity_dict, epsilons) -> Dict[float, float]:
        from scipy.stats import variation
        result = {}
        for eps in epsilons:
          result[eps] = float(variation(sparsity_dict[eps]))  # std/mean
        return result

      count_cv_pass(cv_per_epsilon, threshold=0.3) -> Tuple[int, Dict[float, bool]]:
        passed = {eps: (cv > threshold) for eps, cv in cv_per_epsilon.items()}
        return sum(passed.values()), passed

      ADJACENT_PAIRS = [(0.001, 0.01), (0.01, 0.05), (0.05, 0.1)]

      compute_cross_epsilon_tau(sparsity_dict, epsilons) -> Dict[str, Dict[str, float]]:
        from itertools import combinations
        from scipy.stats import kendalltau
        results = {}
        for e1, e2 in combinations(epsilons, 2):   # 6 pairs
          key = f"{e1}_vs_{e2}"
          tau, p_value = kendalltau(sparsity_dict[e1], sparsity_dict[e2], variant='b')
          results[key] = {"tau": float(tau), "p_value": float(p_value)}
        return results
        # Keys: "0.001_vs_0.01", "0.001_vs_0.05", "0.001_vs_0.1",
        #       "0.01_vs_0.05", "0.01_vs_0.1", "0.05_vs_0.1"
    feature_tag: experiment
    priority: 89
    source_document: 03_architecture.md
    complexity: 12
    test_requirements: |
