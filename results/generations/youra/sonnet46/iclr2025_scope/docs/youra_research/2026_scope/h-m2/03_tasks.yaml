      In visualize.py:
      plot_gate_metrics(cv_per_epsilon, tau_matrix, cfg, save_path):
        fig, (ax1, ax2) = plt.subplots(1, 2, figsize=(12, 5))
        # Left: CV per epsilon bars
        ax1.bar([str(e) for e in epsilons], [cv_per_epsilon[e] for e in epsilons])
        ax1.axhline(cfg.cv_threshold, linestyle='--', label='threshold=0.3')
        # Right: adjacent pair tau bars
        adj_keys = [f"{e1}_vs_{e2}" for e1,e2 in ADJACENT_PAIRS]
        ax2.bar(adj_keys, [tau_matrix[k]["tau"] for k in adj_keys])
        ax2.axhline(cfg.cross_epsilon_tau_threshold, linestyle='--', label='threshold=0.7')
        plt.savefig(save_path, dpi=150, bbox_inches='tight'); plt.close()

      plot_cross_epsilon_tau_heatmap(tau_matrix, epsilons, save_path):
        mat = np.eye(4)  # diagonal = 1.0
        eps_list = list(epsilons)
        for i,e1 in enumerate(eps_list):
          for j,e2 in enumerate(eps_list):
            if i < j:
              key = f"{e1}_vs_{e2}"; val = tau_matrix[key]["tau"]
              mat[i,j] = mat[j,i] = val
        labels = [str(e) for e in eps_list]
        sns.heatmap(mat, annot=True, xticklabels=labels, yticklabels=labels,
                    vmin=0, vmax=1, fmt=".2f", cmap="YlOrRd")
        plt.savefig(save_path, dpi=150, bbox_inches='tight'); plt.close()
    feature_tag: experiment
    priority: 42
