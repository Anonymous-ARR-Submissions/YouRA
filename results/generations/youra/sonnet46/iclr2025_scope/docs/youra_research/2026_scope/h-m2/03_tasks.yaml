      plot_sparsity_profiles_overlay(sparsity_dict, epsilons, save_path):
        colors = ['blue', 'orange', 'green', 'red']
        for i, eps in enumerate(epsilons):
          plt.plot(range(32), sparsity_dict[eps], color=colors[i], label=f"ε={eps}")
        plt.xlabel("Layer Index"); plt.ylabel("Sparsity Fraction")
        plt.legend(); plt.savefig(save_path, dpi=150, bbox_inches='tight'); plt.close()

      plot_cv_per_epsilon(cv_per_epsilon, cfg, save_path):
        colors = ['green' if cv > cfg.cv_threshold else 'red' for cv in cv_per_epsilon.values()]
        plt.bar([str(e) for e in cv_per_epsilon], list(cv_per_epsilon.values()), color=colors)
        plt.axhline(cfg.cv_threshold, linestyle='--', color='black', label='threshold=0.3')
        plt.savefig(save_path, dpi=150, bbox_inches='tight'); plt.close()

      generate_all_figures(sparsity_dict, cv_per_epsilon, tau_matrix, cfg):
        os.makedirs(cfg.figures_dir, exist_ok=True)
        figs_dir = cfg.figures_dir
        epsilons = cfg.epsilons
        plot_gate_metrics(cv_per_epsilon, tau_matrix, cfg, f"{figs_dir}/gate_metrics.png")
        plot_cross_epsilon_tau_heatmap(tau_matrix, epsilons, f"{figs_dir}/cross_epsilon_tau_heatmap.png")
        plot_sparsity_profiles_overlay(sparsity_dict, epsilons, f"{figs_dir}/sparsity_profiles_overlay.png")
        plot_cv_per_epsilon(cv_per_epsilon, cfg, f"{figs_dir}/cv_per_epsilon.png")
