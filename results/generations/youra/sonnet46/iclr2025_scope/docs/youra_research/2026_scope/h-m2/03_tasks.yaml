  - id: task-010
    epic: A-9 - Main Runner Integration
    title: '[A-9] Implement run_experiment.py main orchestrator'
    description: |
      File: h-m2/code/run_experiment.py (NEW)

      load_model_and_tokenizer(cfg) -> (model, tokenizer):
        model = AutoModelForCausalLM.from_pretrained(
          cfg.model_name,  # "meta-llama/Meta-Llama-3-8B"
          torch_dtype=torch.float16, device_map="auto")
        model.eval()
        tokenizer = AutoTokenizer.from_pretrained(cfg.model_name)
        if tokenizer.pad_token is None: tokenizer.pad_token = tokenizer.eos_token
        return model, tokenizer

      save_results(cv_per_epsilon, tau_matrix, cross_dist_tau, gate_result, gate_details, alpaca_sparsity, cfg):
        output = {
          "hypothesis": "h-m2", "gate_result": gate_details["gate_result"],
          "cv_per_epsilon": {str(k): v for k,v in cv_per_epsilon.items()},
          "cv_pass_count": gate_details["cv_pass_count"],
          "max_adjacent_tau": gate_details["max_adjacent_tau"],
          "tau_matrix": tau_matrix, "cross_dist_tau": {str(k): v for k,v in cross_dist_tau.items()},
          "failed_conditions": gate_details["failed_conditions"],
          "sparsity_profiles": {str(eps): sv.tolist() for eps,sv in alpaca_sparsity.items()},
        }
        with open(cfg.results_path, "w") as f: json.dump(output, f, indent=2)

      main():
        cfg = ExperimentConfig()
        np.random.seed(cfg.seed); torch.manual_seed(cfg.seed)
        os.makedirs(cfg.figures_dir, exist_ok=True)
        model, tokenizer = load_model_and_tokenizer(cfg)
        alpaca_dl = load_alpaca_dataloader(tokenizer, cfg, cfg.max_length)
        wikitext_dl = load_wikitext_dataloader(tokenizer, cfg, cfg.max_length)
        alpaca_sparsity, wikitext_sparsity = measure_all_epsilons(model, alpaca_dl, wikitext_dl, cfg)
        mechanism_ok, indicators = verify_mechanism_activated(alpaca_sparsity, {}, cfg.epsilons)
        assert mechanism_ok, f"Mechanism not activated: {indicators}"
        cv_per_epsilon = compute_cv_per_epsilon(alpaca_sparsity, cfg.epsilons)
        tau_matrix = compute_cross_epsilon_tau(alpaca_sparsity, cfg.epsilons)
        cross_dist_tau = compute_cross_dist_tau(alpaca_sparsity, wikitext_sparsity, cfg.epsilons)
        gate_pass, gate_details = evaluate_gate(cv_per_epsilon, tau_matrix, cfg)
        generate_all_figures(alpaca_sparsity, cv_per_epsilon, tau_matrix, cfg)
        save_results(cv_per_epsilon, tau_matrix, cross_dist_tau, gate_pass, gate_details, alpaca_sparsity, cfg)
        # Print gate summary to stdout
        print(f"\n=== GATE: {gate_details['gate_result']} ===")
        print(f"CV robustness: {gate_details['cv_pass_count']}/4 epsilons pass CV > 0.3")
        for eps, cv in cv_per_epsilon.items():
          print(f"  epsilon={eps}: CV={cv:.4f}")
        print(f"Max adjacent tau: {gate_details['max_adjacent_tau']:.4f} (threshold >= 0.7)")
    feature_tag: experiment
    priority: 85
    source_document: 03_architecture.md
    complexity: 10
    test_requirements: |
      ## Test Requirements (MANDATORY)
      - Create tests/test_run_experiment.py
      - Test: save_results writes valid JSON with gate_result key
      - Test: main() with mock components runs without error
      - Test: setup (seeds, dirs) works correctly
    reference_files:
      architecture: 03_architecture.md#runexperiment-h-m2coderun_experimentpy
