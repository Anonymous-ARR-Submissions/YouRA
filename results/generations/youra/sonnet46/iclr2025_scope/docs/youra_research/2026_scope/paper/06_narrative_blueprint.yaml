  abstract:
    narrative_purpose: "Compress full story: problem → fingerprint existence → robustness evidence → implication"
    key_message: >
      LLaMA-3.1-8B has a robust, threshold-invariant activation sparsity fingerprint (ICC=0.9846,
      cross-ε tau>0.96) that provides a zero-cost structural prior for LoRA rank allocation.
    tone: "Confident about P1; appropriately bounded about P2/P3 as future work"
    word_target: "~150 words"

  introduction:
    narrative_purpose: "Hook → Problem gap → Key insight preview → Contribution summary"
    hook_strategy: "counterintuitive_finding — pre-training already encodes allocation signal"
    opening: "Lead with the measurement discovery, not the allocation application"
    transition_to_related: >
      'Our finding raises the question: why has this signal been overlooked? We review existing
      adaptive rank methods and show they all operate post-hoc, missing the pre-training prior.'
    contributions_framing: "As a story (discovery → characterization → foundation) not a bulleted list"
    word_target: "~800-1000 words"

  related_work:
    narrative_purpose: "Show three streams insufficient → create space for our approach"
    positioning_strategy: >
      Three comparison streams: (1) Adaptive rank methods [training-time, expensive],
      (2) Activation sparsity literature [observational, not applied to rank allocation],
      (3) LoRA rank analysis [fixed rank, no structural signal]. Our work bridges streams 2→1.
    key_comparison_points:
      - "AdaLoRA, DyLoRA, ARD-LoRA: training-time signals, circular dependency"
      - "TEAL, ReLU Strikes Back, Lazy Neuron: observational sparsity, not applied to PEFT"
      - "Act-LoRA: L2-norm for binary selection only, not continuous rank allocation"
      - "SAID/Aghajanyan 2021: intrinsic dimension theory — our empirical grounding"
    word_target: "~600-800 words"

  methodology:
    narrative_purpose: "WHY this measurement design answers the right question"
    connection_to_insight: >
      If sparsity is architecture-determined (not input-driven), we need: multi-distribution
      measurement, multi-threshold measurement, and appropriate stability statistics (ICC, tau) —
      not just a single-condition sparsity measurement.
    key_design_decisions:
      - "ICC(3,k) for cross-distribution stability (not just pairwise correlation)"
      - "4 epsilon values to test threshold-invariance explicitly"
      - "4 calibration distributions including in-domain and out-of-domain"
      - "512 samples as calibration size (validated by tau_length stability)"
    methodology_flow: "Sparsity measurement (H-E1) → Cross-distribution stability (H-M1) → Threshold invariance (H-M2)"
    word_target: "~1000-1200 words"

  experiments:
    narrative_purpose: "Three focused experiments, each testing one facet of the fingerprint claim"
    experimental_questions:
      - "EQ1: Does LLaMA-3.1-8B exhibit significant layer-wise sparsity variation? (H-E1)"
      - "EQ2: Is the sparsity profile stable across calibration distributions? (H-M1)"
      - "EQ3: Is the layer ranking invariant to epsilon threshold? (H-M2)"
    structure: "Question → Design → Metrics → Gate threshold"
    figure_placements: ["sparsity_profile.png (EQ1)", "sparsity_heatmap.png (EQ2)", "cross_epsilon_tau_heatmap.png (EQ3)"]
    word_target: "~800-1000 words"

  results:
    narrative_purpose: "Three results cascade: existence → stability → invariance — each building on the last"
    main_result_highlight: "ICC=0.9846 (cross-distribution stability) — the most surprising and strongest result"
    result_ordering:
      - "§5.1 Sparsity variation (CV=0.544, H-E1) — establishes the signal exists"
      - "§5.2 Cross-distribution stability (ICC=0.9846, H-M1) — most surprising result, main finding"
      - "§5.3 Threshold invariance (cross-ε tau>0.96, H-M2) — practical robustness"
      - "§5.4 Depth gradient analysis — unexpected emergent finding across all conditions"
    so_what_emphasis: "Each result: number → what it means → why it matters for the contribution claim"
    word_target: "~1000-1200 words"

  discussion:
    narrative_purpose: "Interpret the fingerprint's meaning; honest scope; future enablement"
    interpretation_focus: >
      Architecture determinism as the primary explanation for ICC=0.9846; compare with
      domain-invariance alternative. Acknowledge that mechanism (A3: sparsity proxies intrinsic
      dimension) is unverified — future work.
    honest_limitations:
      - "H-M3 and H-M4 not executed: rank-predictive utility and end-to-end performance INCONCLUSIVE"
      - "Single architecture (LLaMA-3.1-8B) — generalization motivated but untested"
      - "SiLU soft-sparsity: ranking validated, functional sparsity interpretation open"
    broader_impact: >
      Opens static pre-training structural priors as a new paradigm for PEFT decisions, complementary
      to training-time adaptive methods.
    word_target: "~400-600 words"

  conclusion:
    narrative_purpose: "Close the loop on the hook; restate the fingerprint discovery; open future"
    callback_to_hook: >
      Echo the opening: 'Before fine-tuning begins, the model already tells you something about
      its layers. We have characterized that signal — what happens when you act on it is the
      natural next experiment.'
    summary_structure: "What we found → What it means → What comes next"
    future_work_call: "H-M3 and H-M4 as immediate priorities; cross-architecture universality as medium-term"
    word_target: "~300-400 words"

