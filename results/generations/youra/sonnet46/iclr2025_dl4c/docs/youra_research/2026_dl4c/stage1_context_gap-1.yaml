gap_id: "gap-1"
gap_title: "Ratio vs Binary Reward Comparison Under Partial-Tractability GRPO Training"
gap_description: |
  No published work empirically compares R_ratio = k_pass/k_total vs R_binary under partial-tractability
  conditions using standardized ZRF/SNR measurements in early GRPO training. The missing piece is a
  controlled empirical comparison of R_ratio vs R_binary on identical GRPO training runs with matched
  hyperparameters, measuring ZRF and gradient SNR over the first 25% of training steps on a prescreened
  subset of APPS introductory problems (S_term ∈ [0.3, 0.55]).
gap_priority: "HIGH+PRIMARY"
gap_relevance: "CRITICAL"

