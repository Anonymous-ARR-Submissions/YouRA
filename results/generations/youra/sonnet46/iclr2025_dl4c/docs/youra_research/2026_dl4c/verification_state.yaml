main_hypothesis:
  id: H-RatioReward-v1
  title: 'Prescreening-Gated R_ratio vs R_binary: Within-Group Variance Amplification in GRPO for APPS Introductory Problems'
  statement: 'Under GRPO-based RLEF training on APPS introductory problems (difficulty=0) prescreened to S_term in [0.3, 0.55]
    with Qwen2.5-Coder-7B-Instruct + SFT checkpoint, R_ratio will produce earlier ZRF escape (ZRF_ratio(t*) < 0.8 x ZRF_binary(t*),
    log-rank p<0.05) and gradient SNR >=1.5x that under R_binary in the first 25% of training, because R_ratio preserves within-group
    reward heterogeneity enabling informative graded policy gradients.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: APPS Introductory Split (difficulty=0, prescreened S_term in [0.3, 0.55])
    model: Qwen2.5-Coder-7B-Instruct + SFT checkpoint (h-e1/code/sft_checkpoint/)
    optimizer: AdamW (GRPO via TRL v0.29.0 GRPOTrainer)
    hyperparameters:
      kl_beta: identical across conditions
      learning_rate: identical AdamW schedule across conditions
      batch_size: G=8 rollouts per prompt
      max_new_tokens: 1024
      temperature: 0.8
      seeds:
      - 42
      - 1337
      - 2024
