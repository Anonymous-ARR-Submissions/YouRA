    type: EXISTENCE
    statement: 'Pass@8 prescreening on APPS introductory problems (difficulty=0) filtered to S_term in [0.3, 0.55] with Qwen2.5-Coder-7B-Instruct
      + SFT will confirm: (a) fraction(k_pass>=1) >= 10% across problem groups, and (b) E[Var(r_ratio within group)] / E[Var(r_binary
      within group)] >= 1.5x across >=80% of groups, because Binomial(T,q) model analytically predicts E[Var(r_ratio)]=q(1-q)
      >> E[Var(r_binary)]=q^T(1-q^T) for T>1.

