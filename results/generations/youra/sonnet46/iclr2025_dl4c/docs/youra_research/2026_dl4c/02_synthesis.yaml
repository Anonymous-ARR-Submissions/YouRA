hypothesis_draft:
  title: "Prescreening-Gated R_ratio vs R_binary: Within-Group Variance Amplification in GRPO for APPS Introductory Problems"
  hypothesis_id: "H-RatioReward-v1"
  core_claim: |
    Under GRPO-based RLEF training on APPS introductory problems prescreened to S_term ∈ [0.3, 0.55]
    with Qwen2.5-Coder-7B-Instruct, ratio reward (R_ratio = per-rollout test-case pass fraction)
    outperforms binary reward (R_binary = 1 iff all tests pass) on ZRF trajectory and gradient SNR
    in the first 25% of training steps, because R_ratio preserves within-group reward heterogeneity
    that GRPO's group-relative advantage normalization can exploit for graded policy learning.
  mechanism: |
    The causal mechanism has 4 steps: (1) Prescreening confirms S_term ∈ [0.3, 0.55] subset has
    non-degenerate within-group variance under R_ratio (analytically guaranteed by Binomial(T, q)
    model for T > 1 test cases); (2) R_ratio produces graded normalized advantages A_i within each
    GRPO group of G=8 rollouts; (3) Graded advantages provide higher gradient covariance with policy
    log-probability gradients; (4) Earlier policy differentiation toward partial solutions increases
    ZRF escape hazard rate and measurable gradient SNR advantage.
  predictions:
    - P1: "Prescreening confirms E[Var(r_ratio)] / E[Var(r_binary)] ≥ 1.5× on prescreened APPS introductory subset"
    - P2: "GRPO training with R_ratio shows earlier ZRF escape (log-rank test p < 0.05) vs R_binary"
    - P3: "Mean gradient SNR over first 25% of training ≥ 1.5× under R_ratio vs R_binary"

variables_summary:
  independent: "Reward function: R_ratio (per-rollout test-case pass fraction [0,1]) vs R_binary (binary {0,1} all-pass indicator)"
  dependent_primary: "ZRF (zero-reward fraction per training step) and gradient SNR (|E[A_i]|/std(A_i) per step)"
  controlled: "Model (Qwen2.5-Coder-7B + SFT checkpoint), KL penalty, learning rate, batch size G=8, token budget max_new_tokens=1024, problem set (identical prescreened APPS introductory subset)"

null_hypothesis:
  h0_statement: |
    There is no significant difference in ZRF trajectory (log-rank test p ≥ 0.05) or mean
    gradient SNR (ratio < 1.5×) between R_ratio and R_binary under GRPO on the prescreened
    APPS introductory subset (S_term ∈ [0.3, 0.55]) with identical hyperparameters. Any
    observed differences reduce to step-size scaling effects rather than informational content
    differences between the two reward functions.
  statistical_test: "Log-rank test for survival curves; two-sided t-test for gradient SNR ratio"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First empirical comparison of R_ratio vs R_binary under GRPO with prescreening gate on APPS, framed via within-group reward variance amplification mechanism"
  differentiation_summary: |
    Distinguished from GHPO (oracle hints required), DRIVE (curriculum scheduling during training),
    PRLCoder (per-statement reward model needed), and PPOCoder (PPO not GRPO; structural signals).
    R_ratio is the minimal-overhead intervention: no guidance model, no reward model, no curriculum —
    only reward function redefinition using existing test case infrastructure.

