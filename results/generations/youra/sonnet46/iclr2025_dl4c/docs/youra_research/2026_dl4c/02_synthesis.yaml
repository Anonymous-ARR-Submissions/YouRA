  overall_level: "HIGH"
  clarity_verified: true
  improvements_needed: []

experimental_scope:
  models:
    - "Qwen2.5-Coder-7B-Instruct + SFT checkpoint (h-e1/code/sft_checkpoint/)"
  datasets:
    - "APPS introductory (difficulty=0), prescreened to S_term ∈ [0.3, 0.55]"
  baselines:
    - "R_binary GRPO (primary experimental baseline)"
    - "PPOCoder [Shojaee et al., 2023] as external field reference (17.77% pass rate on APPS)"

measurement_plan:
  data_collection:
    - source: "Pass@8 prescreening inference: (tests_passed_i, total_tests_i) per rollout per problem — generates R_ratio and R_binary values simultaneously"
    - source: "GRPO training logs: per-step ZRF, advantage distribution stats, KL divergence, gradient norm — all from standard TRL GRPOTrainer callbacks"
  procedure:
    - step: "Phase 1 (Prescreening): Run pass@8 inference (k=8, temp=0.8, max_new_tokens=1024) on APPS introductory problems; compute S_term = fraction(k_pass ≥ 1 per problem); filter to S_term ∈ [0.3, 0.55]; validate gate: fraction(k_pass ≥ 1) ≥ 10% of filtered set"
    - step: "Phase 2 (Variance Check): Compute E[Var(r_ratio within group)] and E[Var(r_binary within group)] from prescreening rollouts; confirm E[Var(r_ratio)] / E[Var(r_binary)] ≥ 1.5×"
    - step: "Phase 3 (GRPO Training): 3 seeds × 2 conditions = 6 training runs; log per-step ZRF, gradient SNR, KL divergence; run for ≥25% of planned total steps"
    - step: "Phase 4 (Analysis): Log-rank test on ZRF escape survival curves; compute mean gradient SNR ratio; stratify survival curves by initial tractability bin"
  success_criteria:
    - "Prescreening gate: fraction(k_pass ≥ 1) ≥ 10% of prescreened problem set"
    - "Variance gate: E[Var(r_ratio)] / E[Var(r_binary)] ≥ 1.5×"
    - "ZRF escape: Log-rank test p < 0.05; ZRF_ratio(t*) < 0.8 × ZRF_binary(t*) for some t* in first 25% of steps"
    - "Gradient SNR: Mean SNR(R_ratio) / Mean SNR(R_binary) ≥ 1.5× over first 25% of training"

validation:
  internal_validity:
    - "Identical model initialization (same SFT checkpoint) for both conditions"
    - "3 seeds per condition to confirm consistency (2 of 3 seeds must show consistent direction)"
    - "KL penalty logged and matched to detect step-size confounds"
    - "Pre-registered exclusion: problems with within-group std(r_ratio) < 0.05 excluded from causal analysis"
  external_validity:
    - "APPS introductory subset is a standard public benchmark — results generalizable to other practitioners using APPS"
    - "TRL GRPOTrainer is the standard implementation — results reproducible by other researchers"
    - "SFT checkpoint from h-e1 is model-specific; generalizability to other 7B models not claimed"

discussion_synthesis:
  key_insights:
    - "R_ratio's advantage is information-theoretic: within-group reward heterogeneity under GRPO, not merely 'non-zero gradients'"
    - "Binomial(T, q) model proves E[Var(r_ratio)] > E[Var(r_binary)] analytically for all T>1 and 0<q<1 — sign is always positive"
    - "ZRF reduction is a dynamical effect (policy learns to produce more partial solutions), not an instantaneous reward property"
    - "The prescreening gate serves dual purposes: tractability confirmation AND variance condition validation"
    - "Gradient SNR can be approximated by reward variance ratio for practical purposes; full covariance requires backward passes"
  breakthrough_moments:
    - "Exchange 3 (Prof. Rex): Identified that k_pass in GRPO = rollouts passing ALL tests (not test-case fraction) — forcing clarification of R_ratio definition to per-rollout test-case fraction"
    - "Exchange 7 (Dr. Ally): Synthesized the R_ratio redefinition at rollout level as test-case fraction — the key structural clarification"
    - "Exchange 10 (Prof. Pax): Derived the gradient SNR as Var(r_ratio)/Var(r_binary) ratio — operationalizing the metric"
    - "Exchange 15 (Prof. Pax): Derived Binomial(T, q) closed-form model confirming E[Var(r_ratio)] > E[Var(r_binary)] analytically"
  resolved_tensions:
    - "ZRF reduction mechanism: resolved as dynamical (training dynamics), not instantaneous (reward property)"
    - "Gradient SNR definition: resolved as per-step |E[A_i]|/std(A_i) with Var-ratio as prescreening proxy"
    - "R_ratio definition: resolved as per-rollout test-case fraction (not rollout-level full-pass count)"
    - "Prescreening role: resolved as validating BOTH tractability gate AND variance condition"
