budget_summary:
  data_preparation: 0   # APPS + model are auto-download (HuggingFace)
  environment_setup: 1  # task-001: pip install requirements
  epic_tasks: 7         # task-002 through task-008
  subtasks: 6           # task-009 through task-014
  failsafe: 1           # task-015
  total: 15             # == total_budget (LIGHT tier) ✅
