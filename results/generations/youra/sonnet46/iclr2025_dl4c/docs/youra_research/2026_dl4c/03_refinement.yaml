    - claim: "Binary execution reward (R_binary) is the universal baseline in GRPO-for-code literature (PPOCoder, DRIVE, G2RPO-A)"
      status: "BUILD_ON"
      evidence: "PPOCoder [Shojaee et al., 2023]; DRIVE [Zhu et al., 2025]; G2RPO-A [Guo et al., 2025]"
