# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-RatioReward-v1"
  confidence_level: 0.72
  core_hypothesis_statement: |
    Under GRPO-based RLEF training on APPS introductory problems (difficulty=0)
    prescreened to S_term ∈ [0.3, 0.55] with Qwen2.5-Coder-7B-Instruct + SFT checkpoint
    (max_new_tokens=1024, temperature=0.8, G=8 rollouts per prompt),
    if R_ratio is defined as per-rollout fraction of test cases passed
    (r_i = tests_passed_i / total_tests_i),
    then R_ratio will produce: (a) earlier ZRF escape (ZRF_ratio(t*) < 0.8 × ZRF_binary(t*)
    for some t* in first 25% of training) with log-rank p < 0.05,
    and (b) gradient SNR under R_ratio ≥ 1.5× that under R_binary in the first 25% of training,
    because R_ratio preserves within-group reward heterogeneity that R_binary clips to {0,1},
    enabling GRPO's group-relative advantage normalization to produce informative graded policy
    gradients at steps where all rollouts have partial (but not full) test-case success.
  alternative_hypothesis_h0: |
    There is no significant difference in ZRF trajectory (log-rank p ≥ 0.05) or gradient SNR
    (ratio < 1.5×) between R_ratio and R_binary on the prescreened APPS introductory subset
    under identical GRPO hyperparameters (same initialization, KL penalty, learning rate,
    batch size G=8, token budget).

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Reward Function"
      type: "categorical"
      operationalization: "R_ratio = tests_passed_i / total_tests_i per rollout (continuous [0,1]) vs R_binary = 1 iff all tests pass (binary {0,1})"
      levels: ["R_ratio", "R_binary"]
  dependent:
    - name: "Zero-Reward Fraction (ZRF)"
      type: "continuous"
      operationalization: "Fraction of training steps where mean group reward = 0.0; measured per training step over first 25% of total steps; range [0,1]"
      primary: true
    - name: "Gradient SNR"
      type: "continuous"
      operationalization: "|E[A_i]| / std(A_i) per training step, where A_i = (r_i - mean(r)) / std(r) is GRPO normalized advantage; or empirically Cov(r_i, ||∇θ log π(o_i)||) ratio between conditions"
      primary: true
    - name: "ZRF Escape Hazard Rate"
      type: "continuous"
      operationalization: "Time-to-first-full-pass per problem (step at which policy first generates rollout with pass fraction = 1.0); compared via log-rank test"
      primary: false
    - name: "Within-Group Reward Variance Ratio"
      type: "continuous"
      operationalization: "E[Var(r_ratio within group G=8)] / E[Var(r_binary within group G=8)]; measured from prescreening data before training"
      primary: false
  controlled:
    - name: "Model"
      operationalization: "Qwen2.5-Coder-7B-Instruct + SFT checkpoint from h-e1/code/sft_checkpoint/ — identical for both conditions"
    - name: "KL Penalty"
      operationalization: "kl_beta — identical across both conditions; logged per step"
    - name: "Learning Rate Schedule"
      operationalization: "Identical AdamW schedule for both conditions"
    - name: "Batch Size"
      operationalization: "G=8 rollouts per prompt; per_device_train_batch_size=8; identical for both conditions"
    - name: "Token Budget"
      operationalization: "max_new_tokens=1024 for both conditions"
    - name: "Problem Set"
      operationalization: "Identical prescreened APPS introductory subset (S_term ∈ [0.3, 0.55]) for both conditions"
    - name: "Random Seeds"
      operationalization: "3 seeds × 2 conditions (6 training runs total); seeds 42, 1337, 2024"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Prescreening confirms S_term ∈ [0.3, 0.55] subset has within-group test-case pass fraction variance E[Var(r_ratio)] > 0 and E[Var(r_ratio)] / E[Var(r_binary)] ≥ 1.5×"
      evidence: "Binomial(T, q) model: E[Var(r_ratio)] = q(1-q); E[Var(r_binary)] = q^T(1-q^T). For T=10, q=0.5: ratio=0.25 >> binary≈0. Analytically confirmed (Exchange 15)."
      falsifier: "Prescreening shows E[Var(r_ratio)]/E[Var(r_binary)] < 1.5× (degenerate distribution where rollouts are all-pass or all-fail)"
    - step: 2
      description: "Under GRPO, R_ratio produces graded normalized advantages A_i across rollouts within each group, while R_binary produces near-binary {−, +} advantages"
      evidence: "GRPO formulation [DeepSeekMath, 2024]: A_i = (r_i - mean(r)) / std(r). With R_ratio and T=10 test cases, partial solutions produce 9 distinct advantage levels vs 2 under R_binary."
      falsifier: "Advantage distribution under R_ratio collapses to near-binary due to near-homogeneous within-group pass fractions"
    - step: 3
      description: "Graded advantages provide higher gradient covariance (Cov(r_i, ||∇θ log π(o_i)||)) under R_ratio than R_binary, enabling policy to learn solution styles that partially satisfy test cases earlier"
      evidence: "Supported by PRLCoder [Ye et al., 2025] showing process supervision (+5.1%) over binary outcome — similar granularity principle. Cov computation feasible from prescreening backward passes."
      falsifier: "Cov(r, ||∇logπ||) is not significantly higher under R_ratio than R_binary at prescreening time"
    - step: 4
      description: "Earlier policy differentiation toward partial solutions increases probability of achieving full-pass solutions faster — producing ZRF escape and measurable hazard-rate advantage"
      evidence: "PPOCoder [Shojaee et al., 2023] showed binary reward WITH PPO still produced 17.77% pass rate on APPS — binary reward bootstraps from rare full-pass events. R_ratio should bootstrap from more frequent partial events."
      falsifier: "Log-rank test on time-to-first-full-pass survival curves: p ≥ 0.05 (curves statistically indistinguishable)"
  key_tension: "Advantage normalization (z-scoring within group) may partially erase the variance advantage of R_ratio at intermediate pass rates (p ≈ 0.5). This is the main unresolved theoretical concern."
  evidence_summary: |
    Converged evidence from 15 exchanges: (1) Binomial analytic model proves E[Var(r_ratio)] > E[Var(r_binary)]
    for all T>1 and 0<q<1; (2) GHPO [Liu et al., 2025] confirms sparse reward / ZRF problem is real in GRPO;
    (3) Process-RL Code [Ye et al., 2025] confirms reward granularity improves over binary (+5.1%);
    (4) PPOCoder [Shojaee et al., 2023] confirms binary execution reward does produce learning on APPS
    (establishing our baseline); (5) 5 prior failures confirm S_term > 0.85 is wrong regime — S_term ∈ [0.3, 0.55]
    correct.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "APPS introductory problems have T > 1 test cases per problem (necessary for R_ratio to differ from R_binary)"
    supporting_evidence: "APPS benchmark [Hendrycks et al., 2021] — 131,777 test cases for 10k problems, avg ~13 test cases per problem"
    consequence_if_violated: "R_ratio = R_binary at T=1; no variance advantage possible. Verify T distribution from APPS data."
  - id: "A2"
    assumption: "Within-group pass fraction distribution for prescreened problems is non-degenerate — rollouts vary in per-test-case pass fractions"
    supporting_evidence: "GPT-Neo ~15% test case average (not all-or-nothing) on introductory APPS problems [Hendrycks et al., 2021]; Qwen2.5-Coder-7B is stronger but same structure"
    consequence_if_violated: "If all rollouts either pass all tests or fail all tests, R_ratio ≡ R_binary; experiment becomes uninformative. Prescreening checks this."
  - id: "A3"
    assumption: "Per-test-case pass fraction is monotonically related to solution quality (passing more tests = semantically closer to correct solution)"
    supporting_evidence: "PRLCoder [Ye et al., 2025] shows per-statement signals are informative; APPS test cases are designed as progressive difficulty checks"
    consequence_if_violated: "R_ratio provides misleading gradient signals if test cases are non-monotone (passing test 3 doesn't imply closer to passing test 4); check empirically from prescreening data"
  - id: "A4"
    assumption: "The Qwen2.5-Coder-7B SFT checkpoint (h-e1/code/sft_checkpoint/) operates in partial-tractability regime on prescreened S_term ∈ [0.3, 0.55] APPS introductory problems"
    supporting_evidence: "5 prior failures confirm S_term > 0.85 is intractable; phase0 analysis estimates introductory problems are tractable for 7B models; new design targets empirically-calibrated tractability"
    consequence_if_violated: "If SFT checkpoint achieves k_pass=0 on prescreened subset, GRPO training remains degenerate. Prescreening gate with fraction(k_pass ≥ 1) ≥ 10% threshold catches this."
  - id: "A5"
    assumption: "APPS test cases for a single problem are approximately independent (not strictly sequential dependencies)"
    supporting_evidence: "APPS [Hendrycks et al., 2021] reports test cases as separate input/output pairs without stated dependencies"
    consequence_if_violated: "Correlated test cases reduce effective T, shrinking variance advantage of R_ratio. Should be validated by checking if pass-fraction distribution is sub-binomial."

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - GRPO-based RLEF training specifically (group-relative advantage normalization without critic)
    - APPS introductory problems (difficulty=0) prescreened to S_term ∈ [0.3, 0.55] via pass@8 inference
    - Qwen2.5-Coder-7B-Instruct + SFT checkpoint in partial-tractability regime
    - First 25% of GRPO training steps (early training dynamics)
    - Execution-based rewards (R_ratio and R_binary both derived from automated test execution)
  does_not_apply_to: |
    - PPO-based RL (requires critic; different advantage computation)
    - S_term > 0.85 regime (completely intractable — proven by 5 prior failures)
    - S_term < 0.20 regime (trivially solvable — binary and ratio rewards both give reward=1)
    - Non-code tasks (math reasoning, natural language) where test cases are binary anyway
    - APPS interview/competition problems with Qwen2.5-Coder-7B (wrong tractability regime)
    - Later training phases (gradient SNR and ZRF claims explicitly scoped to first 25% of steps)
  known_limitations: |
    - Binomial(T, q) independence assumption for test cases may not hold for all APPS problems
    - Claims are scoped to first 25% of training; later dynamics (when policy shifts S_term distribution) are out of scope
    - Single model (Qwen2.5-Coder-7B) — generalizability to other models not claimed
    - H100 NVL infrastructure assumed; results may vary on different hardware due to numerical precision

# ═══════════════════════════════════════════════════════════════
