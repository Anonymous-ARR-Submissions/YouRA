# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "Prescreening will show E[Var(r_ratio within group)] / E[Var(r_binary within group)] ≥ 1.5× on APPS introductory problems at S_term ∈ [0.3, 0.55]"
    test_method: "Pass@8 inference (k=8, temperature=0.8, max_new_tokens=1024) on prescreened problem set; compute per-group variance ratio from rollout outputs"
    success_criterion: "E[Var(r_ratio)] / E[Var(r_binary)] ≥ 1.5× across ≥80% of problem groups"
    falsification: "E[Var(r_ratio)] / E[Var(r_binary)] < 1.5× — implies degenerate distribution; R_ratio cannot provide informational advantage"
  - id: "P2"
    primary: true
    statement: "GRPO training with R_ratio will show ZRF escape earlier than R_binary: there exists step t* in first 25% of training where ZRF_ratio(t*) < 0.8 × ZRF_binary(t*)"
    test_method: "3 seeds × 2 conditions (R_ratio vs R_binary), identical GRPO hyperparameters; log ZRF per step; log-rank test on time-to-ZRF-escape survival curves"
    success_criterion: "Log-rank test p < 0.05; ZRF_ratio(t*) < 0.8 × ZRF_binary(t*) for some t* in first 25% of training steps; 2 of 3 seeds show consistent direction"
    falsification: "Log-rank test p ≥ 0.05 (survival curves statistically indistinguishable); ZRF_ratio ≥ ZRF_binary throughout first 25% of training"
  - id: "P3"
    primary: false
    statement: "Gradient SNR under R_ratio will be ≥1.5× that under R_binary in the first 25% of training steps"
    test_method: "Compute per-step gradient SNR = |E[A_i]| / std(A_i) from GRPO training logs; compare mean gradient SNR over first 25% of steps between conditions"
    success_criterion: "Mean gradient SNR (R_ratio) ≥ 1.5 × Mean gradient SNR (R_binary) over first 25% of training steps"
    falsification: "Mean gradient SNR ratio < 1.5×; implies advantage normalization erases the within-group variance benefit"

