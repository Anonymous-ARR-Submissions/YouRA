  id: H-AlignCalib-v1
  statement: "Under conditions where instruction-tuned LLMs (SFT, PPO, DPO) are compared\
    \ to their pretrained base counterparts using forced-choice evaluation (lm-eval\
    \ log-probability continuation on MMLU, TruthfulQA MC1, HellaSwag), if alignment\
    \ training increases with reward-optimization pressure (SFT < DPO < PPO), then\
    \ the Brier reliability component of Expected Calibration Error will increase\
    \ monotonically in the same order (PPO >= DPO > SFT), because alignment objectives\
    \ systematically perturb logit distributions \u2014 either via monotonic scale\
    \ inflation (H1), decision-boundary restructuring (H2), or framing-susceptibility\
    \ induction (H3) \u2014 and these mechanisms are empirically discriminable via\
    \ pre-specified logit-space tests.\n"
  title: RLHF Alignment Monotonically Increases Brier Reliability via Logit Perturbation
