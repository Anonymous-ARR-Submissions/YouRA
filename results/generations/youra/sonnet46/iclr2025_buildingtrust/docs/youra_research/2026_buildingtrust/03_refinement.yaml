# ═══════════════════════════════════════════════════════════════
# SECTION 5: Phase 2B Readiness
# ═══════════════════════════════════════════════════════════════

phase2b_readiness:
  status: "READY"
  sh1_existence: >
    Alignment training (SFT → DPO/PPO) must increase Brier reliability component of ECE on MMLU,
    measurable from lm-eval log-prob outputs. Primary existence test: ΔECE > 0 with bootstrap CI
    lower > 0 for at least one alignment method (PPO or DPO) in at least 2/3 model sizes.
  sh2_mechanism: >
    Core mechanism to test: Which of three logit perturbation mechanisms dominates — (H1) scale
    distortion (ρ >= 0.9, margin inflation), (H2) boundary shift (ρ < 0.85, changed-prediction
    reliability degradation), or (H3) framing susceptibility (Alignment x Distractor x Reliability
    interaction)? All three are testable from the same lm-eval experiment.
  sh3_comparison: >
    Cross-family generalization: does the Pythia causal chain result (PPO >= DPO > SFT in ΔReliability)
    hold directionally for LLaMA-2 (PPO) and Mistral/Falcon (SFT-only)? ATS comparison deferred to Phase 5.
  open_questions:
    - "Do Mistral-7B-Instruct and Falcon-7B-Instruct (SFT-only) show comparable ΔECE magnitude to Pythia-PPO, or significantly less?"
    - "Does the distractor-augmented calibration test (H3 framing susceptibility) require standard prompts or modified lm-eval harness?"
    - "Is Falcon-7B-Instruct training data heterogeneity severe enough to exclude it from the primary analysis?"
    - "What pre-softmax margin threshold distinguishes 'logit scale inflation' from 'natural accuracy improvement' cases?"

# ═══════════════════════════════════════════════════════════════
# DECISION & DISCUSSION CONTEXT
# ═══════════════════════════════════════════════════════════════

decision:
  overall_status: "VALIDATED"
  discussion_convergence: "All 6 convergence criteria met after 16 exchanges. Multi-hypothesis pre-registered framework with explicit falsifiers accepted by all personas."
