# ═══════════════════════════════════════════════════════════════
# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "RLHF fine-tuning degrades calibration significantly (ECE=0.298 on MMLU, 0.507 on TruthfulQA for LLaMA-2-Chat)"
      status: "BUILD_ON"
      evidence: "Xie et al. 2024 (EMNLP) — directly confirmed, ECE measurable from token log-probs"
    - claim: "ATS (Adaptive Temperature Scaling) can recover calibration by up to 58-82% via input-dependent token temperature"
      status: "BUILD_ON"
      evidence: "Xie et al. 2024 — ATS reduces LLaMA-2-Chat ECE from 0.298→0.125 (MMLU), 0.507→0.092 (TruthfulQA)"
    - claim: "RLHF does not automatically guarantee trustworthiness; reverse effects observed on truthfulness (25% accuracy drop) and toxicity"
      status: "BUILD_ON"
      evidence: "Li et al. 2024 (ICLR 2025) — Pythia SFT→PPO/DPO on Anthropic HH dataset"
    - claim: "Reward overoptimization exploits proxy reward flaws and can inflate model confidence"
      status: "BUILD_ON"
      evidence: "Coste et al. 2023 (ICLR 2024) — PPO KL-penalized reward maximization can push logits toward higher-margin decisions"
    - claim: "ECE varies substantially across benchmark types (MMLU vs TruthfulQA vs HellaSwag)"
      status: "BUILD_ON"
      evidence: "Xie et al. 2024 — ECE=0.298 on MMLU vs 0.507 on TruthfulQA for the same model"
    - claim: "No systematic multi-family paired base/aligned ECE study exists across LLaMA-2, Mistral, Falcon"
      status: "PROVE_NEW"
      evidence: "Gap identified from Phase 1 literature review — confirmed absence in all reviewed papers"
    - claim: "Alignment methods (SFT, PPO, DPO) have mechanistically distinct effects on logit distributions"
      status: "PROVE_NEW"
      evidence: "Li et al. 2024 provides Pythia SFT/PPO/DPO checkpoints; no paper compares their ECE/Brier profiles"
    - claim: "Brier reliability component specifically increases under alignment, independent of accuracy changes"
      status: "PROVE_NEW"
      evidence: "Derived hypothesis from discussion; not tested in any existing paper"
  scope_reduction_percentage: 43
  phase2b_4_instructions: |
    Established facts (BUILD_ON) serve as confirmed context; do not re-verify in Phase 2B.
    Focus verification on PROVE_NEW claims: multi-family ECE comparison, alignment-method Brier gradient (PPO>=DPO>SFT),
    and shared-prediction conditional reliability test. Use Pythia SFT/PPO/DPO as primary causal chain;
    LLaMA-2, Mistral, Falcon as cross-family validation. Brier decomposition is mandatory, not optional.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-AlignCalib-v1"
  confidence_level: 0.78
  core_hypothesis_statement: |
    Under conditions where instruction-tuned LLMs (SFT, PPO, DPO) are compared to their pretrained
    base counterparts using forced-choice evaluation (lm-eval log-probability continuation on MMLU,
    TruthfulQA MC1, HellaSwag), if alignment training increases with reward-optimization pressure
    (SFT < DPO < PPO), then the Brier reliability component of Expected Calibration Error will
    increase monotonically in the same order (PPO >= DPO > SFT), because alignment objectives
    systematically perturb logit distributions — either via monotonic scale inflation (H1),
    decision-boundary restructuring (H2), or framing-susceptibility induction (H3) — and these
    mechanisms are empirically discriminable via pre-specified logit-space tests.
  alternative_hypothesis_h0: |
    There is no significant difference in Brier reliability (overconfidence component of ECE) between
    instruction-tuned aligned models and their base counterparts, and no consistent ordering
    PPO >= DPO > SFT in ΔReliability across model families and benchmarks.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Alignment method"
      type: "categorical"
      operationalization: "Training procedure applied to base LLM"
      levels: ["SFT-only", "SFT+DPO", "SFT+PPO"]
    - name: "Model family"
      type: "categorical"
      operationalization: "Shared pretraining lineage"
      levels: ["Pythia (1.4B/2.8B/6.9B)", "LLaMA-2 (7B/13B)", "Mistral (7B)", "Falcon (7B)"]
    - name: "Benchmark type"
      type: "categorical"
      operationalization: "Evaluation task structure"
      levels: ["factual-knowledge (TruthfulQA MC1)", "multi-subject-knowledge (MMLU)", "commonsense-reasoning (HellaSwag)"]
  dependent:
    - name: "ΔECE (aligned minus base)"
      type: "continuous"
      operationalization: "ECE_aligned − ECE_base; ECE computed via 15-bin equal-width calibration from lm-eval log-probs"
      primary: true
    - name: "ΔBrier reliability"
      type: "continuous"
      operationalization: "Reliability term of Brier Score: E[(p_bin - o_bin)^2], computed for aligned vs base"
      primary: true
    - name: "ΔBrier resolution"
      type: "continuous"
      operationalization: "Resolution term: E[(o_bin - o_bar)^2]; measures discriminability change"
      primary: false
    - name: "Logit rank correlation (Spearman ρ)"
      type: "continuous"
      operationalization: "Spearman ρ between base and aligned 4-option log-prob vectors per item"
      primary: false
    - name: "Pre-softmax margin inflation"
      type: "continuous"
      operationalization: "Mean (top-1 − top-2) logit gap, aligned minus base, stratified by alignment method"
      primary: false
    - name: "Conditional reliability (shared argmax)"
      type: "continuous"
      operationalization: "Brier reliability restricted to items where base and aligned agree on argmax prediction"
      primary: false
  controlled:
    - name: "Base pretraining checkpoint"
      operationalization: "Same base model for all aligned variants (Pythia ladder: identical pretraining)"
    - name: "Evaluation format"
      operationalization: "Log-probability continuation scoring (not chat-template prompting) using lm-eval v0.4.11"
    - name: "Benchmark item pool"
      operationalization: "Identical items for base and aligned models; no benchmark data leakage"
    - name: "Decoding policy"
      operationalization: "Greedy decoding, fixed temperature=1.0, no nucleus sampling"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: >
        Base LLM has well-calibrated token probability distributions from pretraining
        (unsupervised next-token prediction creates naturally calibrated logit distributions).
      evidence: "Xie et al. 2024 Abstract: 'unsupervised pre-training has been shown to yield LLMs with well-calibrated conditional probabilities'"
      falsifier: "If base models are systematically miscalibrated before alignment, the alignment-induced shift cannot be attributed to alignment alone"
    - step: 2
      description: >
        Alignment training (SFT/PPO/DPO) optimizes toward human preference signals. PPO maximizes
        reward with KL penalty to SFT policy; DPO reshapes preference likelihood ratio relative to SFT.
        Both push logit distributions toward higher-confidence outputs that maximize human-preferred
        response patterns (fluent, helpful, certain-sounding).
      evidence: "Li et al. 2024 Methodology: PPO objective L_PPO = E[r_θ(x,y) − β·log(π_RL/π_SFT)] + γ·E[log(π_RL(x))]; Coste et al. 2023: reward hacking exploits proxy reward flaws"
      falsifier: "If alignment does not change mean max-probability conditional on same argmax, the mechanism is not logit-level"
    - step: 3
      description: >
        Logit distribution perturbation takes one of three forms: (H1) monotonic temperature-like
        scaling (all logit gaps increase proportionally); (H2) decision-boundary restructuring
        (some argmax predictions flip, redistributing confidence); (H3) framing susceptibility
        (confidence allocation becomes context-sensitive, unstable under alternative hypotheses).
      evidence: "ATS's effectiveness [Xie et al. 2024]: smooth τ(x) from hidden state corrects ECE 58-82%; Chhikara et al. 2025: distractors reduce ECE up to 90%"
      falsifier: "Each sub-mechanism has explicit falsifier: H1 fails if ρ<0.8; H2 fails if reliability worsens equally in shared/changed predictions; H3 fails if distractors reduce ECE uniformly across alignment methods"
    - step: 4
      description: >
        The net effect is increased Expected Calibration Error (specifically the Brier reliability
        component), with magnitude ordered PPO >= DPO > SFT, because reward optimization pressure
        scales with alignment aggressiveness. ATS can partially or fully correct this because the
        distortion is encoded in the model's hidden state representations.
      evidence: "Xie et al. 2024 Key Contributions: ATS works without retraining; Li et al. 2024 Experiments: PPO and DPO degrade truthfulness >SFT"
      falsifier: "If ΔECE ≤ 0 or ΔReliability ≤ 0 across all alignment methods, the hypothesis is globally rejected"
  key_tension: >
    The accuracy-calibration confound: Li et al. 2024 shows PPO/DPO reduce truthfulness accuracy by ~25%.
    If accuracy drops, ECE could increase from resolution collapse (worse discriminability) rather than
    reliability degradation (overconfidence). The Brier decomposition and shared-argmax conditional test
    are designed to disentangle these.
  evidence_summary: |
    Xie et al. 2024: Confirmed RLHF→ECE degradation; ATS corrects via hidden-state temperature.
    Li et al. 2024: SFT→PPO/DPO degrades truthfulness and increases bias; Pythia ladder provides clean causal chain.
    Coste et al. 2023: Reward overoptimization mechanism — proxy reward exploitation inflates confidence.
    Chhikara et al. 2025: Softmax ECE (not verbal) shows calibration is framing-sensitive; large RLHF models
    paradoxically miscalibrate on easy queries.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Pythia SFT/PPO/DPO checkpoints on HuggingFace faithfully represent the alignment stages described in Li et al. 2024"
    supporting_evidence: "Li et al. 2024 cites EleutherAI Pythia series; checkpoints publicly available with model cards"
    consequence_if_violated: "Causal ladder (SFT→PPO→DPO) breaks; within-family comparisons may not isolate alignment effects"
  - id: "A2"
    assumption: "lm-eval log-probability continuation scoring (not chat-template) provides a fair comparison across base and aligned models"
    supporting_evidence: "Both base and chat models accept continuation-style prompts; lm-eval v0.4.11 uses this for MMLU/HellaSwag/TruthfulQA"
    consequence_if_violated: "Chat models evaluated out-of-distribution relative to their training; ΔECE may reflect format mismatch not alignment"
  - id: "A3"
    assumption: "Brier reliability component (not ECE alone) correctly measures overconfidence independent of resolution changes"
    supporting_evidence: "Standard Brier decomposition (Murphy 1973): BS = Reliability − Resolution + Uncertainty; implemented in standard calibration libraries"
    consequence_if_violated: "ECE changes cannot distinguish overconfidence from discriminability collapse — mechanistic interpretation fails"
  - id: "A4"
    assumption: "Softmax-normalized 4-option probabilities from lm-eval faithfully reflect the model's epistemic uncertainty, not just relative logit ratios"
    supporting_evidence: "For forced-choice tasks, softmax over answer tokens is the standard ECE measurement approach (Guo et al. 2017, Xie et al. 2024)"
    consequence_if_violated: "Softmax normalization may artificially inflate apparent overconfidence (Prof. Rex concern); pre-softmax margin analysis is the diagnostic control"
  - id: "A5"
    assumption: "PPO rewards in Li et al. 2024 training do not explicitly penalize overconfidence, allowing reward-driven confidence inflation to occur"
    supporting_evidence: "Coste et al. 2023: standard reward models do not penalize logit over-dispersion; Li et al. 2024: standard Anthropic HH reward model used"
    consequence_if_violated: "If reward models do penalize overconfidence, PPO may not show greater ΔReliability than SFT, undermining the alignment-method gradient prediction"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Autoregressive LLMs evaluated on forced-choice multiple-choice tasks via log-probability continuation
    - Models with publicly available paired base/aligned checkpoints sharing identical pretraining data (Pythia family: primary; LLaMA-2, Mistral, Falcon: secondary validation)
    - Alignment methods: SFT-only, SFT+DPO, SFT+PPO (on human preference datasets)
    - Benchmarks: MMLU (57 subjects), TruthfulQA MC1, HellaSwag — all supported by lm-eval v0.4.11
    - Evaluation via softmax ECE and Brier score computed from log-prob outputs
  does_not_apply_to: |
    - Verbally elicited confidence (0-100 scale self-reported uncertainty) — distinct from softmax ECE
    - Open-ended generation tasks (calibration in free-form text is out of scope)
    - Models without publicly available paired base checkpoints
    - Benchmarks requiring human evaluation, annotation, or rubric-based scoring
    - New/proprietary benchmarks not available in lm-eval v0.4.11
    - Synthetic data or data not available at the time of this research
  known_limitations: |
    - Falcon-7B vs Falcon-7B-Instruct may have different training data mixtures (RefinedWeb vs curated), weakening the "pure alignment" paired design for this family
    - Mistral-7B-Instruct v0.1 uses SFT-only (no PPO); cannot test PPO-specific effects within Mistral family
    - Chhikara et al. 2025 distractor analysis uses verbally elicited confidence, not softmax ECE; distractor tests must clearly label their measurement object
    - ATS was trained on Alpaca GPT-4 data; ATS diagnostic comparisons may have distribution overlap with MMLU evaluation
    - Scale models (Pythia 1.4B vs 6.9B) may exhibit different calibration behavior from 7B+ models; cross-scale results must be interpreted carefully

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: >
      Instruction-tuned aligned models show significantly higher Brier reliability than their base
      counterparts on MMLU, with magnitude ordered PPO >= DPO > SFT across Pythia model sizes.
    test_method: >
      Compute Brier reliability term from lm-eval log-prob outputs on MMLU for Pythia 1.4B/2.8B/6.9B
      in SFT, DPO, PPO variants. Use paired Wilcoxon signed-rank test for ΔECE and ΔReliability.
      Report bootstrap 95% CI for each ΔECE (n=1000 bootstrap samples).
    success_criterion: >
      ΔReliability > 0 in PPO and DPO conditions (bootstrap CI lower bound > 0),
      AND ΔReliability_PPO >= ΔReliability_DPO > ΔReliability_SFT (sign test across model sizes),
      AND overall ΔECE > 0 in at least 2/3 benchmarks for PPO.
    falsification: >
      ΔECE ≤ 0 for all alignment methods, or ΔReliability not significantly > 0,
      or gradient ordering fails (e.g., DPO ≥ PPO or SFT ≥ DPO).

  - id: "P2"
    primary: false
    statement: >
      Within items where base and aligned models agree on argmax prediction, aligned models
      (especially PPO) show higher mean max-probability and higher reliability than base models —
      indicating pure confidence inflation not explained by accuracy change.
    test_method: >
      Partition MMLU items into shared-argmax (base == aligned) and changed-argmax (base != aligned) subsets.
      Compute mean max-prob and Brier reliability separately for each subset. Use Mann-Whitney U
      and Cohen's d to test significance.
    success_criterion: >
      Brier reliability increases within shared-argmax subset for PPO (Cohen's d >= 0.1),
      AND mean max-prob is significantly higher for aligned vs base on this subset (p < 0.05).
    falsification: >
      Reliability degradation disappears or reverses within shared-argmax items,
      suggesting accuracy collapse (not logit inflation) is the primary driver of ΔECE.

  - id: "P3"
    primary: false
    statement: >
      Pre-softmax logit margins (top-1 minus top-2 log-prob before normalization) increase
      monotonically PPO >= DPO > SFT while Spearman rank correlation between base and aligned
      option logits remains >= 0.9, confirming H1 (scale distortion) over H2 (boundary shift).
    test_method: >
      For each MMLU item, compute Spearman ρ over the 4-option log-prob vector between base
      and aligned models. Compute mean margin = max(logits) - second_max(logits) per item.
      Report mean ρ and mean margin per alignment method.
    success_criterion: >
      Mean ρ >= 0.9 for all alignment methods (scale distortion consistent),
      AND mean margin increases PPO >= DPO > SFT (reward pressure → confidence amplification).
    falsification: >
      ρ < 0.8 for PPO (implies H2: representational reordering dominates),
      or margins do not increase monotonically across alignment methods.

# ═══════════════════════════════════════════════════════════════
# SECTION 2: Experimental Setup Selection
# ═══════════════════════════════════════════════════════════════

experimental_setup:
  dataset:
    name: "MMLU (Massive Multitask Language Understanding)"
    type: "standard"
    source: "HuggingFace datasets — cais/mmlu"
    path: "lm-eval-harness: --tasks mmlu"
    hypothesis_fit: >
      57 subjects × ~14k questions provide large item pool for per-stratum analysis.
      Multiple-choice format enables log-probability continuation scoring for softmax ECE.
      Well-established benchmark with known difficulty variation across subjects.
      Supported natively in lm-eval v0.4.11.
  dataset_secondary:
    - name: "TruthfulQA MC1"
      type: "standard"
      source: "HuggingFace datasets — truthful_qa"
      path: "lm-eval-harness: --tasks truthfulqa_mc1"
      hypothesis_fit: "Factual knowledge tasks; Xie et al. 2024 baseline ECE=0.507 for LLaMA-2-Chat provides comparison anchor"
    - name: "HellaSwag"
      type: "standard"
      source: "HuggingFace datasets — hellaswag"
      path: "lm-eval-harness: --tasks hellaswag"
      hypothesis_fit: "Commonsense reasoning — different task structure from factual/knowledge benchmarks; tests generalizability"
  model:
    name: "Pythia alignment ladder (primary causal chain)"
    type: "autoregressive_causal_lm"
    source: "EleutherAI/pythia-{1.4b|2.8b|6.9b}, aligned variants from Li et al. 2024 (HuggingFace)"
    hypothesis_fit: >
      Same pretraining data and architecture across SFT/PPO/DPO variants; cleanest within-family
      causal isolation of alignment effect. Three model sizes provide scale robustness check.
  model_secondary:
    - name: "LLaMA-2 7B / LLaMA-2 7B-Chat"
      source: "meta-llama/Llama-2-7b-hf, meta-llama/Llama-2-7b-chat-hf"
      alignment_method: "SFT + RLHF (PPO)"
    - name: "LLaMA-2 13B / LLaMA-2 13B-Chat"
      source: "meta-llama/Llama-2-13b-hf, meta-llama/Llama-2-13b-chat-hf"
      alignment_method: "SFT + RLHF (PPO)"
    - name: "Mistral 7B / Mistral 7B Instruct v0.1"
      source: "mistralai/Mistral-7B-v0.1, mistralai/Mistral-7B-Instruct-v0.1"
      alignment_method: "SFT-only"
    - name: "Falcon 7B / Falcon 7B Instruct"
      source: "tiiuae/falcon-7b, tiiuae/falcon-7b-instruct"
      alignment_method: "SFT-only (sensitivity check)"
  baselines:
    - name: "Base model ECE (paired baseline)"
      method: "lm-eval log-prob ECE on same benchmarks — the within-pair baseline"
    - name: "ATS-corrected ECE"
      method: "Apply ATS temperature scaling from Xie et al. 2024; compare pre/post-ATS Brier decomposition"

# ═══════════════════════════════════════════════════════════════
# SECTION 3: Novelty & Innovation
# ═══════════════════════════════════════════════════════════════

novelty:
  preserved_novelty: >
    First systematic paired base/aligned ECE comparison across multiple model families AND alignment methods,
    with mechanistic decomposition using Brier reliability/resolution and logit-space diagnostics (rank
    correlation, margin analysis, shared/changed prediction split).
  key_innovation: >
    Multi-hypothesis pre-registered mechanistic discriminating design: rather than testing "does ΔECE > 0?"
    (already suggested by Xie 2024), we test *which mechanism* dominates (scale, boundary shift, or framing
    susceptibility), with each hypothesis having distinct falsifiable predictions. Additionally, the
    alignment-method gradient (PPO >= DPO > SFT in ΔReliability) is a novel contribution with theoretical
    grounding and ATS as a mechanistic diagnostic probe.
  differentiation:
    - prior_work: "Xie et al. 2024 — Confirms RLHF degrades ECE for LLaMA-2-Chat, proposes ATS fix"
      difference: "We test whether this generalizes across model families and alignment methods, AND identify the mechanism (our work explains WHY ATS works)"
    - prior_work: "Li et al. 2024 — Shows RLHF has inconsistent trustworthiness effects (toxicity, truthfulness)"
      difference: "We focus specifically on calibration (ECE/Brier), which Li et al. does NOT measure; our Pythia ladder extends their causal design"
    - prior_work: "Chhikara et al. 2025 — Studies calibration across 9 LLMs using verbally elicited confidence"
      difference: "We use softmax-based log-prob ECE (not verbal confidence), controlled paired design, and Brier decomposition"
    - prior_work: "Guo et al. 2017 — Foundational ECE definition, shows deep nets are miscalibrated post-training"
      difference: "We extend to alignment-specific miscalibration patterns with mechanistic discrimination"

