gap_id: "gap-1"
gap_title: "Lack of Systematic Multi-Family Paired ECE Comparison Across Model Families"
gap_description: |
  No study systematically compares ECE across multiple paired base/aligned model families
  (LLaMA-2, Mistral, Falcon) simultaneously with controlled paired design. Missing piece:
  (a) paired base/aligned to control capability, (b) ≥3 model families, (c) standardized
  benchmarks across families, (d) quantified whether calibration degradation is consistent.
