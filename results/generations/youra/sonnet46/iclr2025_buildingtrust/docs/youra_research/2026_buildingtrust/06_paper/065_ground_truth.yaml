paper_title: "Alignment Breaks Boundaries: Decision-Boundary Restructuring as the Dominant Mechanism of RLHF-Induced Miscalibration in LLMs"

main_claims:
  - claim: "Alignment training (SFT, DPO, PPO) reliably increases Brier reliability (overconfidence) in Pythia 1.4B–6.9B models evaluated on MMLU"
    evidence: "H-E1: 8/9 aligned model-size pairs show ΔReliability > 0; bootstrap CI lower > 0 for DPO (3/3 sizes) and PPO (2/3 sizes)"
    quantitative_result: "ΔReliability 1.4B-DPO = 0.1048 (CI: [0.1009, 0.1090]); overall 8/9 pairs positive"

  - claim: "The dominant mechanism of alignment-induced miscalibration is H2 (decision-boundary restructuring), not H1 (monotonic scale inflation)"
    evidence: "H-M3: 0/9 alignment-base pairs achieve Spearman ρ ≥ 0.90; 8/9 pairs show ρ < 0.85"
    quantitative_result: "max ρ = 0.8748 (6.9B-DPO); min ρ = -0.3241 (1.4B-PPO); 0/9 H1 pass"

  - claim: "PPO alignment causes catastrophic argmax redistribution in 1.4B models"
    evidence: "H-M3 argmax partition: only 44 of 14,042 MMLU items retain shared argmax between base and 1.4B-PPO"
    quantitative_result: "1.4B-PPO: 13,998/14,042 items (99.7%) change argmax; Spearman ρ = -0.3241"

  - claim: "DPO produces larger calibration degradation than PPO across all tested model sizes (empirically reversed from PPO >= DPO prediction)"
    evidence: "H-E1: DPO ΔReliability > PPO ΔReliability in all 3 sizes; H-M2: DPO Δmargin > PPO Δmargin in all 3 sizes"
    quantitative_result: "1.4B: DPO=0.1048 > PPO=0.0406; 2.8B: DPO=0.0437 > PPO=0.0423; 6.9B: DPO=0.0099 > PPO=-0.0036"

  - claim: "Framing susceptibility (H3) is not the dominant mechanism in softmax-based ECE measurement"
    evidence: "H-M3 H3 diagnostic: TruthfulQA ΔECE < MMLU ΔECE for all alignment types"
    quantitative_result: "Ratio (TruthfulQA ΔECE / MMLU ΔECE): SFT=0.32, DPO=0.26, PPO=0.73 — all < 1.0"

  - claim: "Pythia base models are well-calibrated before alignment (ECE < 0.15)"
    evidence: "H-M1: MUST_WORK gate PASS for all 3 sizes"
    quantitative_result: "ECE_base: 1.4B=0.0849, 2.8B=0.0597, 6.9B=0.0792 — all < 0.15"

key_metrics:
  - metric_name: "ΔReliability (1.4B-DPO)"
    value: 0.1048
    comparison: "5.5× base Brier REL (base = 0.019)"

  - metric_name: "ΔReliability (1.4B-PPO)"
    value: 0.0406
    comparison: "2.1× base Brier REL; lower than DPO despite higher reward optimization pressure"

  - metric_name: "Spearman ρ (1.4B-PPO)"
    value: -0.3241
    comparison: "Near-complete rank reversal; theoretical H2 threshold = 0.85; well below"

  - metric_name: "Spearman ρ (6.9B-DPO)"
    value: 0.8748
    comparison: "Nearest to H1 threshold (0.90); indicates potential H1/H2 transition at larger scale"

  - metric_name: "% argmax changed (1.4B-PPO)"
    value: 99.7
    unit: percent
    comparison: "Only 44/14,042 shared-argmax items; near-complete answer preference reorganization"

  - metric_name: "ECE_base (Pythia-2.8B)"
    value: 0.0597
    comparison: "Best-calibrated base model; all below 0.15 MUST_WORK gate threshold"

  - metric_name: "ECE aligned (1.4B-DPO)"
    value: 0.2516
    comparison: "Nearly 3× base ECE (0.0849); largest ECE in aligned model suite"

  - metric_name: "TruthfulQA ΔECE / MMLU ΔECE ratio (DPO)"
    value: 0.26
    comparison: "< 1.0 required to rule out H3; framing susceptibility definitively absent"

  - metric_name: "H1 pass rate (Spearman ρ ≥ 0.90)"
    value: 0
    unit: "out of 9"
    comparison: "All 9 alignment-base pairs fail H1 threshold; H2 confirmed dominant"

  - metric_name: "H2 flag rate (Spearman ρ < 0.85)"
    value: 8
    unit: "out of 9"
    comparison: "8/9 pairs show strong H2 signal; 6.9B-DPO is only near-threshold case"

  - metric_name: "Δmargin PPO (1.4B)"
    value: 0.3937
    unit: nats
    comparison: "CI: [0.3893, 0.3980]; confirms logit-level perturbation (not softmax artifact)"

  - metric_name: "Δmargin DPO (1.4B)"
    value: 0.4908
    unit: nats
    comparison: "Larger than PPO margin; consistent with DPO > PPO calibration ordering"

hypotheses:
  - id: "H-E1"
    status: confirmed
    gate_type: MUST_WORK
    key_finding: "Alignment reliably increases Brier reliability (overconfidence) in 8/9 aligned model-size pairs; DPO > PPO > SFT ordering (reversed from PPO >= DPO prediction)"

  - id: "H-M1"
    status: confirmed
    gate_type: MUST_WORK
    key_finding: "Pythia base models well-calibrated before alignment: ECE = 0.0849/0.0597/0.0792 for 1.4B/2.8B/6.9B; all < 0.15"

  - id: "H-M2"
    status: confirmed
    gate_type: SHOULD_WORK
    key_finding: "Pre-softmax logit margins inflate in DPO (3/3 sizes) and PPO (2/3 sizes); DPO > PPO in all sizes; 6.9B-PPO shows negative Δmargin"

  - id: "H-M3"
    status: partial
    gate_type: SHOULD_WORK
    gate_result: FAIL
    key_finding: "H1 (scale inflation) REFUTED: 0/9 Spearman ρ ≥ 0.90. H2 (boundary shift) CONFIRMED: 8/9 ρ < 0.85. H3 (framing susceptibility) RULED OUT. Scientifically informative negative."

  - id: "H-M4"
    status: not_started
    gate_type: SHOULD_WORK
    key_finding: "ATS correction validation not executed; correctability of H2-type miscalibration remains unverified"

contributions:
  - "Pre-registered mechanistic discrimination framework (H1/H2/H3) using Spearman ρ thresholds and argmax partition tests — applicable to any model family via lm-eval-harness"
  - "First demonstration that H2 (decision-boundary restructuring) is the dominant mechanism of alignment-induced miscalibration in Pythia 1.4B–6.9B: 0/9 pairs ρ ≥ 0.90, 8/9 ρ < 0.85"
  - "Counter-intuitive empirical finding: DPO produces strictly larger calibration degradation than PPO in all three tested sizes, consistent with DPO's unconstrained token-level preference reshaping"
  - "Definitive ruling out of H3 (framing susceptibility): TruthfulQA ΔECE < MMLU ΔECE for all alignment types in softmax ECE"
  - "Clean causal baseline: Pythia base models ECE = 0.057–0.085 (all < 0.15), unambiguous causal attribution to alignment training"

limitations:
  - "Public fallback checkpoints used instead of RLHFlow originals (Risk R1): DPO > PPO ordering is checkpoint-level observation; H2 mechanism is robust"
  - "Single model family (Pythia 1.4B–6.9B only): generalization to LLaMA-2, Mistral, Falcon requires cross-family experiments"
  - "Scale range limited (no Pythia beyond 6.9B): H1/H2 mechanism transition at ≥13B unresolved"
  - "H-M4 (ATS correction validation) not executed: correctability of H2-type miscalibration unverified"
  - "Evaluation restricted to lm-eval log-probability continuation: chat-template prompting effects not assessed"

future_work:
  - "Cross-family replication: apply Spearman ρ diagnostic to LLaMA-2 7B/13B DPO-aligned models to test H1/H2 transition at scale"
  - "ATS effectiveness for H2-type distortions: test whether ATS reduces ECE comparably for H1-like (high ρ) and H2-like (low ρ) models"
  - "Controlled DPO vs. PPO experiment: matched training (identical data/duration) varying only KL penalty β to isolate mechanism of DPO > PPO ordering"
  - "MMLU subject stratification: analyze whether H2 signal is stronger in STEM vs. humanities subjects using existing cached results"
  - "PPO 1.4B format hacking: evaluate 1.4B-PPO on HellaSwag and TriviaQA to determine whether ρ = -0.324 is MMLU-format-specific"
  - "H-M4 execution: apply ATS to all 12 Pythia checkpoints and test whether pre-ATS Spearman ρ correlates with ATS improvement magnitude"

