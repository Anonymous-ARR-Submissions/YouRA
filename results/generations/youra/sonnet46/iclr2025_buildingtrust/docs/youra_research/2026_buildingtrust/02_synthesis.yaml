experimental_scope:
  models:
    - "EleutherAI/pythia-1.4b (SFT, DPO, PPO variants)"
    - "EleutherAI/pythia-2.8b (SFT, DPO, PPO variants)"
    - "EleutherAI/pythia-6.9b (SFT, DPO, PPO variants)"
    - "meta-llama/Llama-2-7b-hf, meta-llama/Llama-2-7b-chat-hf"
    - "meta-llama/Llama-2-13b-hf, meta-llama/Llama-2-13b-chat-hf"
    - "mistralai/Mistral-7B-v0.1, mistralai/Mistral-7B-Instruct-v0.1"
    - "tiiuae/falcon-7b, tiiuae/falcon-7b-instruct (sensitivity check)"
  datasets:
    - "MMLU (cais/mmlu) — primary, 57 subjects"
    - "TruthfulQA MC1 (truthful_qa) — factual knowledge"
    - "HellaSwag (hellaswag) — commonsense reasoning"
  baselines:
    - "Paired base model ECE (within-pair comparison)"
    - "ATS-corrected ECE (Xie et al. 2024 diagnostic)"

measurement_plan:
  data_collection:
    - source: "lm-eval v0.4.11 with --log_samples flag; extracts per-item log-probs for all answer options"
    - source: "Brier decomposition computed from lm-eval outputs using standard Murphy (1973) decomposition"
    - source: "Pre-softmax logit margins computed from raw token log-prob outputs"
  procedure:
    - step: "Run lm-eval on all model variants (Pythia x3 sizes x3 alignment + LLaMA-2 x2 + Mistral + Falcon) on MMLU, TruthfulQA MC1, HellaSwag"
    - step: "Compute ECE (15-bin equal-width) and Brier reliability/resolution from per-item softmax outputs"
    - step: "Compute ΔECE and ΔReliability as aligned minus base for each model pair"
    - step: "Partition MMLU items into shared-argmax and changed-argmax subsets; compute conditional reliability"
    - step: "Compute Spearman ρ over 4-option log-prob vectors per item; compute pre-softmax margin (top-1 minus top-2)"
    - step: "Optionally: run distractor-augmented MMLU items (H3 framing susceptibility test)"
    - step: "Bootstrap CI (n=1000) for all ΔECE and ΔReliability estimates"
  success_criteria:
    - "P1: ΔECE bootstrap CI lower > 0 for PPO and DPO; ΔReliability_PPO >= ΔReliability_DPO > ΔReliability_SFT"
    - "P2: Cohen's d >= 0.1 for within-shared-argmax reliability degradation in PPO"
    - "P3 (H1): Mean ρ >= 0.9 AND margin increases PPO >= DPO > SFT"

validation:
  internal_validity:
    - "Paired within-family design (same base checkpoint) eliminates pretraining confound"
    - "Log-prob continuation scoring (not chat templates) eliminates format confound"
    - "Brier decomposition separates reliability (overconfidence) from resolution (knowledge)"
    - "Conditional reliability (shared argmax) separates confidence inflation from accuracy collapse"
    - "Pre-softmax margin analysis prevents softmax normalization artifact"
  external_validity:
    - "Three model families (Pythia, LLaMA-2, Mistral) across 3 benchmarks provide generalizability"
    - "Three Pythia model sizes (1.4B/2.8B/6.9B) test scale robustness"
    - "Alignment-method gradient (PPO/DPO/SFT) tests whether effect is alignment-method-specific or general"

discussion_synthesis:
  key_insights:
    - "The core finding that RLHF degrades calibration (Xie 2024) needs mechanistic explanation — three competing mechanisms identified"
    - "Alignment-method heterogeneity across families (SFT-only Mistral/Falcon vs PPO LLaMA-2) is a natural experiment, not a confound"
    - "ATS's hidden-state-based correction implies miscalibration is smooth and representationally encoded — supports H1 (scale distortion)"
    - "Prof. Rex's critique about Chhikara conflating verbal vs softmax ECE was essential — clarified measurement objects"
    - "The Pythia SFT → DPO → PPO ladder from Li et al. 2024 is the cleanest existing causal chain for alignment-calibration study"
  breakthrough_moments:
    - "Exchange 4 (Prof. Rex): Revealed Mistral/Falcon are SFT-only — reframed hypothesis from 'RLHF-specific' to 'alignment-general'"
    - "Exchange 8 (Dr. Nova): Proposed distractor analysis as mechanistic probe and multi-hypothesis pre-registration"
    - "Exchange 13 (Prof. Rex): Demanded shared/changed-prediction split — converted ΔECE from scalar to mechanistic test"
    - "Exchange 15 (Prof. Vera): Formalized three competing hypotheses (H1/H2/H3) with explicit Achilles' heels"
  resolved_tensions:
    - "Chhikara verbal vs. softmax ECE conflation: resolved by clearly labeling measurement objects and using log-prob ECE as primary"
    - "Accuracy confound: resolved by Brier decomposition and shared-argmax conditional reliability test"
    - "Alignment method heterogeneity: resolved by reframing as natural experiment (PPO vs DPO vs SFT gradient prediction)"
    - "Format confound: resolved by log-prob continuation scoring in lm-eval (format-agnostic)"
