hypothesis_draft:
  title: "Alignment-Induced Calibration Distortion: Mechanistic Discrimination Across SFT, DPO, and PPO"
  hypothesis_id: "H-AlignCalib-v1"
  core_claim: |
    Instruction-tuning alignment systematically increases the Brier reliability component of Expected
    Calibration Error (ECE) in large language models, with magnitude ordered PPO >= DPO > SFT, reflecting
    the degree of reward-optimization pressure. The mechanism is empirically discriminable among three
    competing hypotheses: (H1) monotonic logit scale distortion, (H2) decision-boundary restructuring,
    and (H3) framing susceptibility. All three are testable from existing lm-eval log-probability outputs
    on MMLU using Pythia SFT/PPO/DPO checkpoints.
  mechanism: |
    Alignment training pushes logit distributions toward higher-confidence, reward-preferred outputs.
    PPO's explicit reward maximization (with KL constraint to SFT) applies stronger pressure than
    DPO's likelihood-ratio objective, which in turn applies more pressure than SFT alone. This pressure
    manifests as one or more of: (1) monotonic logit temperature inflation (rank-preserving confidence
    amplification), (2) preference-induced decision boundary shifts (argmax changes toward rewarded
    response types), or (3) increased framing susceptibility (confidence allocation becomes sensitive
    to alternative hypotheses / distractors). ATS's success [Xie et al. 2024] confirms the distortion
    is encoded in the model's hidden states and is correctable, supporting a systematic rather than
    random nature.
  predictions:
    - P1: "ΔECE > 0 for PPO and DPO on MMLU (bootstrap CI lower > 0); ordered PPO >= DPO > SFT in ΔReliability"
    - P2: "Within shared-argmax items: aligned models show higher mean max-prob and higher Brier reliability than base (Cohen's d >= 0.1)"
    - P3: "Logit rank correlation ρ >= 0.9 AND margin inflation PPO >= DPO > SFT (if H1 dominates)"

variables_summary:
  independent: "Alignment method (SFT, DPO, PPO); Model family (Pythia primary, LLaMA-2/Mistral/Falcon secondary); Benchmark type (MMLU, TruthfulQA, HellaSwag)"
  dependent_primary: "ΔECE (aligned minus base) and ΔBrier reliability, computed from lm-eval log-prob continuation outputs"
  controlled: "Base pretraining checkpoint (Pythia identical), evaluation format (log-prob continuation, not chat template), greedy decoding, fixed temperature=1.0"

null_hypothesis:
  h0_statement: |
    There is no significant difference in Expected Calibration Error or Brier reliability between
    instruction-tuned aligned models and their base counterparts, and no consistent gradient ordering
    PPO >= DPO > SFT in ΔReliability. Any observed ECE differences are within noise (bootstrap CI
    includes 0) or attributable entirely to accuracy changes.
  statistical_test: "Paired Wilcoxon signed-rank test on item-level calibration; bootstrap CI (n=1000) for ΔECE per model pair"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: >
    Three-mechanism pre-registered design that converts ΔECE from a scalar finding into a mechanistic
    diagnostic: logit rank correlation (ρ) + pre-softmax margin analysis + shared/changed prediction
    Brier decomposition + Alignment x Distractor interaction. Alignment-method gradient (PPO >= DPO > SFT)
    is a theoretically grounded prediction with first-principles justification.
  differentiation_summary: |
    Xie et al. 2024 confirmed RLHF degrades ECE for one model; Li et al. 2024 studied trustworthiness
    without ECE; Chhikara 2025 used verbal confidence, not softmax ECE. This work is the first to:
    (a) systematically compare ECE across alignment methods on a shared pretraining lineage,
    (b) decompose the change into reliability vs. resolution,
    (c) pre-register three mechanistic hypotheses with distinct falsifiers,
    (d) use ATS as an explanatory tool rather than just a correction method.

