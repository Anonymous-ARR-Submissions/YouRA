title: "Alignment Breaks Boundaries: Decision-Boundary Restructuring as the Dominant Mechanism of RLHF-Induced Miscalibration in LLMs"

hook_strategy:
  type: striking_statistic
  hook: >
    We trained an LLM to be helpful and harmless — and in doing so, it became unable to reliably
    select the same answer as its base counterpart. For 99.7% of MMLU multiple-choice questions,
    a 1.4B-parameter PPO-trained Pythia model selects a different answer than its pretrained base
    (Spearman ρ = −0.324). This is not overconfidence in the usual sense — it is alignment-induced
    answer reversal. RLHF does not merely amplify the model's confidence in its existing beliefs;
    it fundamentally restructures which answer options the model prefers.

problem_framing:
  surface: >
    Aligned LLMs are miscalibrated — they give wrong answers with high confidence. This is a
    safety and reliability problem for deployed AI systems.
  technical: >
    Standard post-hoc calibration methods (temperature scaling, ECE correction) assume the model's
    rank ordering of answer options is preserved and only confidence levels need adjustment.
    If alignment training instead restructures which answers rank first (boundary shift, H2 mechanism),
    these standard methods are conceptually mismatched to the problem they are solving.
  fundamental: >
    RLHF alignment creates a form of miscalibration that is categorically different from the
    training-induced miscalibration studied in Guo et al. 2017. Rather than inflating uniform
    confidence on correct answers (H1 scale distortion), it reorganizes the model's internal
    representation of which answer is correct, producing systematic answer-switching behavior.
    Understanding this distinction is essential for designing effective calibration correction
    strategies for aligned models.

key_insight: >
  Alignment-induced miscalibration in Pythia 1.4B–6.9B is predominantly caused by
  decision-boundary restructuring (H2), not monotonic confidence inflation (H1):
  all 9 alignment-base pairs show Spearman ρ < 0.90, with 8/9 below 0.85.
  The PPO-trained 1.4B model changes its argmax prediction for 99.7% of MMLU items.
  Contrary to prior expectations, DPO produces consistently larger calibration degradation
  than PPO across all tested model sizes, suggesting that token-level direct preference
  reshaping is more disruptive to answer boundaries than sequence-level reward optimization
  with KL regularization.

evidence_structure:
  - step: "Causal baseline confirmation (H-M1)"
    evidence: "ECE_base = 0.057–0.085 for Pythia 1.4B–6.9B; confirms pretraining yields well-calibrated logits"
    function: "Establishes clean attribution of downstream miscalibration to alignment"
  - step: "Existence of alignment-induced overconfidence (H-E1)"
    evidence: "ΔReliability > 0 in 8/9 aligned model-size pairs; bootstrap CI lower > 0 for DPO (3/3) and PPO (2/3)"
    function: "Core finding: alignment reliably increases Brier reliability (overconfidence component)"
  - step: "Pre-softmax margin inflation (H-M2)"
    evidence: "Δmargin > 0 for DPO (3/3 sizes) and PPO (2/3 sizes); DPO > PPO in all sizes"
    function: "Confirms logit-level perturbation; H2 candidate activated by DPO > PPO finding"
  - step: "Mechanism discrimination (H-M3)"
    evidence: "0/9 Spearman ρ ≥ 0.90; 8/9 ρ < 0.85; 1.4B-PPO ρ = −0.324 with 99.7% argmax change"
    function: "Definitively identifies H2 (boundary shift) as dominant mechanism; rules out H1 and H3"

section_plan:
  introduction: "Hook via 99.7% argmax redistribution → three-level problem framing → contributions"
  related_work: "ECE/calibration foundations → RLHF trustworthiness → calibration correction methods → mechanism discrimination (our novelty)"
  methodology: "Formal problem setup → Brier decomposition → H1/H2/H3 discrimination framework → experimental design"
  experiments: "Pythia ladder design → MMLU evaluation → Brier decomposition protocol → H2 discrimination tests"
  results: "Main ΔReliability table → Margin inflation table → Spearman ρ table → Argmax partition → H3 diagnostic"
  discussion: "H2 mechanism interpretation → DPO > PPO ordering → Scale-dependent trends → Limitations → Implications"
  conclusion: "Callback to hook → Contributions summary → Future work"
  abstract: "Written last — includes most impressive quantitative numbers"

target_venue: "ICML 2026 / NeurIPS 2026 / ICLR 2027"
  # Rationale: Strong empirical contribution with mechanistic novelty; clear falsifiable pre-registered
  # predictions; counter-intuitive findings (DPO > PPO, H2 not H1). ICML/NeurIPS appropriate for
  # mechanistic empirical work on LLMs.

contribution_list:
  - "First controlled paired demonstration that the dominant mechanism of alignment-induced miscalibration
    in Pythia 1.4B–6.9B is decision-boundary restructuring (H2), not monotonic confidence inflation (H1),
    using pre-specified Spearman ρ and argmax-partition discrimination tests."
  - "Empirical evidence that DPO produces larger calibration degradation than PPO across all tested model
    sizes (ΔReliability: DPO 1.4B = 0.1048 vs PPO 1.4B = 0.0406), consistent with token-level direct
    preference reshaping being less KL-constrained than sequence-level reward optimization."
  - "A pre-registered mechanistic discrimination framework (H1 scale inflation vs H2 boundary shift vs
    H3 framing susceptibility) using Spearman ρ thresholds and argmax partition tests — directly applicable
    to any model family and alignment method via lm-eval-harness."
  - "Definitive negative result on H3 (framing susceptibility): alignment-induced calibration degradation
    is domain-general in softmax-based ECE — MMLU ΔECE > TruthfulQA ΔECE for all alignment types,
    distinguishing our finding from verbal-confidence framing sensitivity."
  - "Empirical demonstration that base Pythia models (1.4B–6.9B) are well-calibrated before alignment
    (ECE = 0.057–0.085), providing clean causal attribution of downstream miscalibration to the
    alignment training procedure itself."
