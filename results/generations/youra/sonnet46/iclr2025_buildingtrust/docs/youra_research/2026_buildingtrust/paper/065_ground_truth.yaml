        rho: 0.791
      - pair: "6.9B-DPO"
        rho: 0.875
      - pair: "6.9B-PPO"
        rho: 0.652

  - id: EC2
    claim: "8 of 9 Spearman ρ values fall below the H2 diagnostic threshold of ρ = 0.85"
    exception: "6.9B-DPO (ρ = 0.875) is the marginal case"
    source: "H-M3 results"
    verifiable: true

  - id: EC3
    claim: "Under 1.4B-PPO, 99.7% of MMLU items receive a different top-ranked answer after alignment (44/14,042 shared argmax)"
    source: "H-M3 argmax partition results"
    verifiable: true
    specific_values:
      total_items: 14042
      shared_argmax_items: 44
      changed_argmax_rate: 0.997

  - id: EC4
    claim: "DPO produces larger calibration degradation than PPO in all three Pythia model sizes (ΔReliability_DPO > ΔReliability_PPO)"
