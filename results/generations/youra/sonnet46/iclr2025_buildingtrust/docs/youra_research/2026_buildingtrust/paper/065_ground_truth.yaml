      - size: "2.8B"
        delta_reliability_dpo: 0.0437
        delta_reliability_ppo: 0.0423
      - size: "6.9B"
        delta_reliability_dpo: 0.0099
        delta_reliability_ppo: -0.0036

  - id: EC5
    claim: "H3 framing susceptibility is definitively excluded: ΔECE_TruthfulQA < ΔECE_MMLU for all alignment types"
    source: "H-M3 TruthfulQA diagnostic"
    verifiable: true
    specific_values:
      sft_ratio: 0.32
      dpo_ratio: 0.26
      ppo_ratio: 0.73
