      - pair: "1.4B-DPO"
        rho: 0.447
      - pair: "1.4B-PPO"
        rho: -0.324
      - pair: "2.8B-SFT"
        rho: 0.701
      - pair: "2.8B-DPO"
        rho: 0.523
      - pair: "2.8B-PPO"
        rho: 0.175
