    source: "H-M1 results"
    verifiable: true
    specific_values:
      ece_1.4b: 0.0849
      ece_2.8b: 0.0597
      ece_6.9b: 0.0792

  - id: EC7
    claim: "8 of 9 aligned model-size pairs show positive ΔReliability; exception is 6.9B-PPO (ΔReliability = -0.0036)"
    source: "H-E1 results"
    verifiable: true

# Mechanistic interpretations — based on evidence, require qualification
mechanistic_claims:
  - id: MC1
    claim: "H2 (decision-boundary restructuring) is the dominant mechanism of alignment-induced miscalibration in Pythia 1.4B-6.9B"
    evidence: [EC1, EC2, EC3]
    confidence: HIGH
    pre_registered: true

  - id: MC2
    claim: "DPO's unconstrained token-level objective causes more aggressive boundary restructuring than PPO's KL-penalized optimization"
    evidence: [EC4]
    confidence: MEDIUM
    caveat: "Checkpoint-level observation; requires matched DPO/PPO training experiment to confirm"

  - id: MC3
    claim: "ATS may correct H2-type boundary shifts by learning per-input hidden-state temperatures that track boundary redistribution patterns"
    evidence: []
    confidence: LOW
    status: "Motivated hypothesis — H-M4 not executed"

  - id: MC4
    claim: "Potential H1/H2 mechanism transition exists at scales beyond 6.9B based on 6.9B-DPO near-threshold ρ = 0.875"
    evidence: [EC1]
    confidence: LOW
    status: "Speculative; requires replication with LLaMA-2-13B or Mistral-7B"

# Known limitations
limitations:
  - id: L1
    description: "Public fallback checkpoints used (Risk R1) — primary RLHFlow checkpoints required authenticated HuggingFace access"
    affected_claims: [MC2]
    severity: MODERATE

  - id: L2
    description: "Single model family (Pythia 1.4B-6.9B) — generalization to LLaMA-2, Mistral, Falcon is an open empirical question"
    affected_claims: [MC1]
    severity: MODERATE

  - id: L3
    description: "Scale range 1.4B-6.9B only — potential H1/H2 transition at larger scales cannot be resolved within Pythia family"
    affected_claims: [MC4]
    severity: MODERATE

  - id: L4
    description: "H-M4 not executed — ATS correctability for H2-type shifts remains untested"
    affected_claims: [MC3]
    severity: LOW

# Pre-registration details
pre_registration:
  framework: "H1/H2/H3 discrimination with pre-specified falsifiers"
  falsifiers:
    H1_falsified_if: "ρ < 0.80 for PPO alignments"
    H2_confirmed_if: "ρ < 0.85 for majority of alignment-size pairs"
    H3_falsified_if: "ΔECE_TruthfulQA < ΔECE_MMLU for all alignment types"
  result:
    H1: "FALSIFIED — all 9 ρ values below 0.90, 1.4B-PPO ρ = -0.324"
    H2: "CONFIRMED as dominant mechanism"
    H3: "FALSIFIED — all ratios < 1.0"

# Models and checkpoints
models:
  base:
    - "EleutherAI/pythia-1.4b"
    - "EleutherAI/pythia-2.8b"
    - "EleutherAI/pythia-6.9b"
  sft:
    - "lomahony/pythia-1.4b-helpful-sft"
    - "lomahony/pythia-2.8b-helpful-sft"
    - "lomahony/pythia-6.9b-helpful-sft"
  dpo:
