# SECTION-LEVEL NARRATIVE GOALS
# ============================================================================

section_goals:
  abstract:
    narrative_purpose: "Compress full story into ~150 words — problem, insight, headline result, significance"
    key_message: "Alignment changes answer preferences, not just confidence levels — dominantly via H2 boundary restructuring — with 99.7% argmax redistribution in 1.4B-PPO"
    writing_principle: "Story-first: resist enumerating metrics. One striking number (99.7% or 5.5×) is enough."

  introduction:
    narrative_purpose: "Hook → Problem escalation → Key insight → Contributions as story"
    hook_strategy: "counterintuitive_striking_statistic"
    hook_content: "99.7% argmax redistribution in 1.4B-PPO; Spearman ρ = -0.324"
    transition_to_related: "This finding motivates a mechanistic investigation of WHY alignment induces miscalibration — which requires surveying prior work on both calibration and alignment training effects."

  related_work:
    narrative_purpose: "Show existing work insufficient → justify our mechanistic discrimination approach"
    positioning_strategy: "Three distinct literature streams, each contributing but none solving our problem"
    key_comparison_points:
      - area: "RLHF alignment effects"
        key_papers: ["Li et al. 2024 (ICLR 2025)", "Coste et al. 2023 (ICLR 2024)"]
        limitation: "Measure trustworthiness (truthfulness, toxicity) but not ECE/Brier calibration"
        transition: "These works motivate our study of calibration specifically"
      - area: "LLM calibration"
        key_papers: ["Guo et al. 2017", "Xie et al. 2024 (EMNLP)"]
        limitation: "Xie et al. confirm the phenomenon and propose ATS fix without mechanistic discrimination; ATS implicitly assumes H1"
        transition: "Our work tests whether the H1 assumption underlying ATS holds"
      - area: "Calibration under prompt/framing"
        key_papers: ["Chhikara et al. 2025"]
        limitation: "Uses verbally-elicited confidence (not softmax ECE); different measurement object"
        transition: "We use log-probability ECE throughout, ruling out framing effects (H3) as a primary driver"

  methodology:
    narrative_purpose: "Show WHY this pre-registered mechanistic discrimination design solves the problem"
    connection_to_insight: "The H1/H2/H3 framework operationalizes the key insight: each mechanism has a distinct measurable signature (Spearman ρ, argmax partition, TruthfulQA cross-benchmark test)"
    key_design_decisions:
      - decision: "Pythia alignment ladder as primary model family"
        rationale: "Identical pretraining data/architecture across SFT/DPO/PPO — cleanest causal isolation available"
      - decision: "Pre-softmax Spearman ρ test as H1/H2 discriminator"
        rationale: "ρ ≥ 0.90 falsifies H2; ρ < 0.85 confirms H2 — binary diagnostic with pre-specified thresholds"
      - decision: "Brier decomposition (not ECE alone)"
        rationale: "Separates overconfidence (reliability) from discriminability (resolution) — necessary for clean mechanistic attribution"
      - decision: "TruthfulQA MC1 as H3 diagnostic"
        rationale: "ΔECE_TruthfulQA < ΔECE_MMLU → H3 ruled out; any framing susceptibility would reverse this"
      - decision: "lm-eval log-prob continuation (not chat template)"
        rationale: "Applies identical evaluation format to base and aligned models — fair comparison; avoids format confounds"

  experiments:
    narrative_purpose: "Design experiments to test specific claims from Introduction"
    experimental_questions:
      - "RQ1: Does alignment training consistently increase Brier reliability relative to base models? (H-E1)"
      - "RQ2: Is the dominant mechanism H1 (scale inflation) or H2 (boundary restructuring)? (H-M3)"
      - "RQ3: Does the DPO ≥ PPO > SFT ordering emerge consistently across model sizes? (H-E1, H-M2)"
    dataset_rationale: "MMLU: 14,042 items for statistical power; 57 subjects for domain generality. TruthfulQA MC1: H3 diagnostic only (817 items)."
    baseline_rationale: "Paired base models are the natural baseline — same architecture/pretraining, no alignment. Li et al. 2024 established the Pythia SFT/DPO/PPO checkpoints."
    metric_rationale: "Brier reliability (not ECE alone) isolates overconfidence from accuracy; Spearman ρ discriminates H1/H2; argmax partition quantifies boundary shift magnitude."

  results:
    narrative_purpose: "Present evidence supporting claims — results as argument, not spreadsheet"
    main_result_highlight: "All 9 Spearman ρ values below H1 threshold; 1.4B-PPO ρ = -0.324 with 99.7% argmax redistribution"
    result_structure:
      - "Main: ΔReliability > 0 in 8/9 pairs (H-E1) → alignment reliably miscalibrates"
      - "Mechanism: Spearman ρ table (H-M3) → H2 confirmed; H1 refuted"
      - "Ordering: DPO > PPO table (H-E1, H-M2) → counter-intuitive but mechanistically consistent"
      - "H3 ruled out: TruthfulQA diagnostic (H-M3) → domain-general, not framing-driven"

  discussion:
    narrative_purpose: "Interpret results, acknowledge honest limitations, connect to broader implications"
    honest_limitations:
      - "Public fallback checkpoints (Risk R1): DPO ≥ PPO ordering is checkpoint-level observation pending replication"
      - "Single model family (Pythia 1.4B–6.9B): cross-family replication needed"
      - "Scale limitation: 6.9B-DPO ρ = 0.875 suggests H1/H2 transition may occur at larger scales"
      - "H-M4 not executed: ATS correctability of H2-type shifts remains untested"

  conclusion:
    narrative_purpose: "Callback to hook → Summary of journey → Future work from evidence → Memorable ending"
    callback_to_hook: "We began with the observation that alignment causes near-complete answer restructuring — not overconfidence on stable choices. Our mechanistic investigation confirms this."
    memorable_ending: "The question for future work is not 'how confident is the aligned model?' but 'what has it learned to prefer, and why?'"

