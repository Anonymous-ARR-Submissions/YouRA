# SECTION 3: Novelty & Innovation
# ═══════════════════════════════════════════════════════════════

novelty:
  preserved_novelty: "First population-scale (100K+ datasets) DTS-validated cross-repository completeness measurement; first pre-registered causal test of structured affordance effects; first empirical test of completeness → discoverability → reuse pathway"
  key_innovation: "Inverse-frequency weighted DTS scoring that captures rare high-effort documentation sections (Collection Processes, Maintenance) rather than easy-to-fill fields — turning the Rondina et al. asymmetry from a finding into a measurement design principle"
  differentiation:
    - prior_work: "Rondina et al. 2025 (DTS, 100 datasets, manual)"
      difference: "100x scale-up via automated API scoring; usage prediction (Sub-Q2) not addressed; temporal analysis (Sub-Q3) not conducted"
    - prior_work: "Oreamuno et al. 2024 (HF-only audit)"
      difference: "Cross-repository (HF + OpenML + UCI); includes usage prediction regression; causal infrastructure analysis"
    - prior_work: "Koch et al. 2021 (dataset reuse patterns)"
      difference: "Koch measures concentration of reuse, not relationship between completeness and reuse; we add completeness as predictor variable"
    - prior_work: "Bhardwaj et al. 2024 (NeurIPS rubric)"
      difference: "Bhardwaj is conference-specific, rubric-based, small-N; we use API-based automated scoring at population scale"

