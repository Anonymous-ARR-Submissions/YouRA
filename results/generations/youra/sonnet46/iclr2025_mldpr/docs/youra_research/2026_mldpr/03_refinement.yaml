# ═══════════════════════════════════════════════════════════════
# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "Documentation completeness gaps are widespread across ML repositories"
      status: "BUILD_ON"
      evidence: "Rondina et al. 2025 verified 100 datasets manually; Oreamuno et al. 2024 found 71.52% of HF dataset cards undocumented; Bhardwaj et al. 2024 found gaps at NeurIPS"
    - claim: "DTS framework (Rondina et al. 2025) operationalizes completeness via 6-section binary Presence Average with documented asymmetries (Uses=0.95, Collection Processes=0.10)"
      status: "BUILD_ON"
      evidence: "Rondina et al. 2025 Table 2: section-level Presence Averages across 4 repositories, 100 datasets"
    - claim: "HuggingFace Hub has higher documentation completeness than OpenML and UCI in prior small-scale work"
      status: "BUILD_ON"
      evidence: "Rondina et al. 2025 found HF > Kaggle > OpenML > UCI on DTS Presence Average across 100 popularity-filtered datasets"
    - claim: "HuggingFace introduced structured YAML frontmatter for dataset cards circa 2020-2021, contemporaneous with publication of Data Cards standard (Pushkarna et al. 2022)"
      status: "BUILD_ON"
      evidence: "Pushkarna et al. 2022 FAccT — Data Cards framework adopted by HuggingFace; HF card_data YAML fields map to Data Cards lifecycle tiers"
    - claim: "No large-scale (>1000 datasets) cross-repository API-based completeness measurement has been conducted"
      status: "PROVE_NEW"
      evidence: "Rondina et al. 2025: 100 datasets manual; Oreamuno et al. 2024: HF-only; Bhardwaj et al. 2024: 60 NeurIPS datasets rubric"
    - claim: "Documentation completeness as predictor of dataset usage (download counts) has not been empirically tested"
      status: "PROVE_NEW"
      evidence: "Koch et al. 2021 measures reuse patterns but not as function of completeness; Sambasivan et al. 2021 is qualitative only"
  scope_reduction_percentage: 40
  phase2b_4_instructions: |
    Two established facts (gaps widespread, DTS framework validated, HF ordering confirmed,
    YAML frontmatter timing) can be assumed and cited — no new verification needed.
    Two new claims (large-scale measurement, usage prediction) require new experiments.
    Phase 2B should focus verification resources on PROVE_NEW claims only.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-DocComp-v1"
  confidence_level: 0.78
  core_hypothesis_statement: |
    Under ML dataset ecosystems across three major public repositories (HuggingFace Hub,
    OpenML, UCI ML Repository), if repository metadata infrastructure provides structured
    YAML templates with enforced fields (as HuggingFace post-2021 vs. legacy OpenML/UCI),
    then DTS-weighted documentation completeness will be significantly higher for structured
    repositories AND completeness score will significantly predict dataset download volume
    (standardized β ≥ 0.15) in a pre-registered negative binomial regression, because
    structured templates lower documentation friction, improving search filter eligibility
    and discoverability, which drives downstream adoption.
  alternative_hypothesis_h0: |
    There is no significant difference in DTS-weighted documentation completeness between
    repositories after controlling for dataset age, task domain, and organization type;
    AND documentation completeness does not independently predict dataset usage volume
    (standardized β < 0.05) after controlling for lagged downloads, dataset age, task
    domain fixed effects, and repository fixed effects.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Repository type"
      type: "categorical"
      operationalization: "Binary: structured-template (HuggingFace) vs. legacy (OpenML, UCI); treatment = structured-template"
      levels: ["HuggingFace Hub", "OpenML", "UCI ML Repository"]
    - name: "DTS-weighted documentation completeness score"
      type: "continuous"
      operationalization: "Inverse-frequency weighted Presence Average across 6 DTS sections (Motivation, Composition, Collection Processes, Data Processing, Uses, Maintenance); weights derived ex ante from Rondina et al. 2025 Table 2 section prevalences"
  dependent:
    - name: "Dataset download count"
      type: "continuous"
      operationalization: "12-month HuggingFace download count (log-transformed); OpenML run count; Papers With Code reference count as proxy for UCI. Primary: HF downloads."
      primary: true
    - name: "Cross-repository completeness rank"
      type: "continuous"
      operationalization: "Percentile rank of completeness score within repository; used for cross-repository comparison"
      primary: false
  controlled:
    - name: "Dataset age"
      operationalization: "log(years since creation date extracted from API metadata)"
    - name: "Task domain"
      operationalization: "Task category fixed effects (NLP, CV, tabular, audio, multimodal) from task_categories field or OpenML task_type"
    - name: "Organization type"
      operationalization: "Binary: academic (edu/research institution) vs. industry/other (from uploader organization name)"
    - name: "Lagged download count"
      operationalization: "Prior 6-month download count (log-transformed) for temporal panel models"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 3
  steps:
    - step: 1
      description: "Structured metadata infrastructure lowers documentation friction → higher DTS-weighted completeness"
      evidence: "HuggingFace introduced YAML frontmatter templates 2020-2021; Pushkarna et al. 2022 Data Cards framework adopted by HF reduces friction for completing standard fields. Rondina et al. 2025 shows HF highest completeness among 4 repos."
      falsifier: "DTS-weighted completeness scores do NOT significantly differ between HF (post-2021) and OpenML/UCI after controlling for age and task domain; or pre/post-2021 DiD within HF shows no discontinuity."
    - step: 2
      description: "Higher completeness improves search discoverability → filter eligibility and search rank"
      evidence: "HuggingFace search explicitly filters by task_categories and language — datasets lacking these fields are excluded from filtered queries. Jain et al. 2024 Croissant-RAI establishes that structured metadata tied to Schema.org improves discoverability. Mechanistically observable: null card_data → excluded from all filtered searches."
      falsifier: "Completeness score does NOT significantly predict filter eligibility or search rank position after controlling for dataset age and popularity."
    - step: 3
      description: "Improved discoverability → higher dataset reuse (download counts)"
      evidence: "Koch et al. 2021 quantified dataset reuse patterns. If completeness predicts visibility and visibility predicts downloads in temporally ordered panel (Completeness_t → Visibility_t+1 → Downloads_t+2), the chain is supported."
      falsifier: "In negative binomial regression, standardized β₁ (completeness) < 0.05 after including lagged downloads, age, task FE, repo FE; OR mediation via visibility shows no significant indirect path."
  key_tension: "Selection bias: HuggingFace may attract documentation-aware contributors independent of structural templates. Requires within-HF pre/post-2021 quasi-experiment to partially disentangle selection from infrastructure effects."
  evidence_summary: |
    The causal chain is supported by: (1) Rondina et al. 2025 empirical DTS data showing HF > OpenML > UCI
    ordering on 100 datasets; (2) Pushkarna et al. 2022 Data Cards framework = theoretical grounding for
    HF's template structure; (3) Jain et al. 2024 Croissant-RAI = technical grounding for metadata →
    discoverability; (4) Koch et al. 2021 = methodology for reuse measurement. Key unresolved: selection
    confound and whether 2021 YAML change was mandatory (required for DiD validity).

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "API-accessible fields (HF card_data YAML, OpenML metadata, UCI ucimlrepo) provide valid proxies for documentation completeness when mapped to DTS section categories"
    supporting_evidence: "Rondina et al. 2025 DTS operationalizes 6 sections with binary checks; Pushkarna et al. 2022 Data Cards fields map directly to HF card_data structure"
    consequence_if_violated: "Automated completeness scores become invalid proxies — the entire measurement approach fails. Must validate with 120-dataset blinded human comparison (r ≥ 0.7 threshold)."
  - id: "A2"
    assumption: "HuggingFace download counts are available and reflect genuine dataset adoption (not gaming/auto-downloads)"
    supporting_evidence: "HF Hub API returns download_count field; prior work (Oreamuno et al. 2024) used these statistics for analysis"
    consequence_if_violated: "Usage outcome variable is invalid; must fall back to Papers With Code reference counts as alternative usage proxy."
  - id: "A3"
    assumption: "Dataset creation year can be reliably extracted from repository API metadata for age control"
    supporting_evidence: "HF Hub card_data includes last_modified; OpenML includes date attributes; UCI has year field"
    consequence_if_violated: "Age confound cannot be controlled; cross-repository comparison is invalid without age adjustment."
  - id: "A4"
    assumption: "The 2021 YAML frontmatter adoption on HuggingFace provides sufficient exogenous variation for DiD analysis (was adoption mandatory/standardized, not optional)"
    supporting_evidence: "HF dataset card creation instructions mandated structured YAML after introducing card_data validation in 2021; Pushkarna et al. 2022 co-timed adoption"
    consequence_if_violated: "DiD causal interpretation fails; study becomes observational cross-section only. Core usage prediction hypothesis still testable; only the infrastructure causal interpretation is weakened."
  - id: "A5"
    assumption: "Inverse-frequency weights derived from Rondina et al. 2025 Table 2 generalize to large-scale populations (not sample artifacts from their 100-dataset popularity-filtered sample)"
    supporting_evidence: "Rondina et al. sampled popular datasets; section-level frequencies may be higher than general population"
    consequence_if_violated: "Weights may underweight prevalent sections or overweight sections that are absent only in popular datasets. Sensitivity analysis with unweighted scores required."

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    ML datasets hosted on HuggingFace Hub, OpenML, and UCI ML Repository with publicly
    accessible metadata via API. Datasets created 2016-2024 with at least 1 download
    record. All task domains (NLP, CV, tabular, audio, multimodal). Both academic and
    industry-uploaded datasets.
  does_not_apply_to: |
    Private or restricted-access datasets. Datasets without any API-accessible metadata.
    Non-ML data repositories (e.g., GitHub raw data, Kaggle competitions without card
    metadata). Benchmark datasets on Papers With Code that have no repository counterpart.
    Model cards (documentation for models, not datasets).
  known_limitations: |
    1. UCI has far fewer datasets (~600) than HF (~100K) — sample size imbalance may
       affect cross-repository comparisons; stratified sampling required.
    2. OpenML run counts (usage proxy) are not directly comparable to HF download counts;
       cross-repository usage comparison requires normalization.
    3. Temporal panel for HF download counts may be unavailable via API (only current
       totals); longitudinal analysis may require API snapshot collection over time.
    4. Automated completeness scoring cannot assess semantic quality of field content
       — only structural presence. Validation study required.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "HuggingFace Hub datasets have significantly higher DTS-weighted documentation completeness than OpenML and UCI after controlling for dataset age (log), task domain, and organization type"
    test_method: "ANOVA with post-hoc pairwise tests on completeness scores across 3 repositories; multivariate regression controlling for confounds"
    success_criterion: "HF mean completeness > OpenML mean completeness AND HF mean completeness > UCI mean completeness, both p < 0.05 after Bonferroni correction; effect size Cohen's d ≥ 0.3"
    falsification: "No significant difference in completeness between HF and OpenML/UCI after age/task/org controls (β_repo = 0 or CI includes 0)"
  - id: "P2"
    primary: true
    statement: "DTS-weighted documentation completeness score significantly predicts dataset download count in negative binomial regression after controlling for log(age), lagged downloads, task domain FE, and repository FE; standardized β ≥ 0.15"
    test_method: "Pre-registered negative binomial regression: Downloads_i = β₀ + β₁·WeightedDTS_i + β₂·log(Age_i) + β₃·LaggedDownloads_i + γ_repo + δ_task + ε_i"
    success_criterion: "β₁ statistically significant (p < 0.05) and standardized β₁ ≥ 0.15"
    falsification: "Standardized β₁ < 0.05 after including all controls — completeness does not independently predict reuse"
  - id: "P3"
    primary: false
    statement: "Within HuggingFace, datasets uploaded after 2021 (structured YAML template period) have higher DTS-weighted completeness than those uploaded 2016-2020, beyond what is explained by dataset age alone"
    test_method: "Difference-in-differences: (Post2021 × HF) interaction term in completeness regression with OpenML/UCI as parallel control group"
    success_criterion: "Significant positive DiD interaction term (p < 0.05); parallel pre-trends test passes (no significant pre-2021 differential trend)"
    falsification: "No significant DiD interaction term; or parallel pre-trends violated"

# ═══════════════════════════════════════════════════════════════
# SECTION 2: Experimental Setup Selection
# ═══════════════════════════════════════════════════════════════

experimental_setup:
  dataset:
    name: "Cross-Repository ML Dataset Metadata Corpus"
    type: "custom"
    source: "HuggingFace Hub API (list_datasets full=True), OpenML REST API (list_datasets), ucimlrepo Python package"
    path: "Collected via API — no pre-existing file; ~100K HF datasets, ~4K OpenML datasets, ~600 UCI datasets"
    hypothesis_fit: "Public APIs provide structured metadata (card_data, task_categories, license, language for HF; description, tag_type, quality for OpenML; data_id, area, num_instances for UCI) that directly operationalizes DTS field categories. No annotation required."
  model:
    name: "Negative Binomial Regression + ANOVA"
    type: "statistical"
    source: "scipy.stats, statsmodels (NegativeBinomial), sklearn (StandardScaler)"
    hypothesis_fit: "Download counts are overdispersed count data (power-law distribution confirmed in Oreamuno et al. 2024); negative binomial regression is mechanistically appropriate. ANOVA for cross-repo comparison."
  baselines:
    - name: "Unweighted Presence Average (Rondina et al. DTS)"
      method: "Simple mean of binary field presence across all tracked fields, no frequency weighting"
    - name: "Null documentation model"
      method: "Regression with completeness excluded — age, task, and organization only"

