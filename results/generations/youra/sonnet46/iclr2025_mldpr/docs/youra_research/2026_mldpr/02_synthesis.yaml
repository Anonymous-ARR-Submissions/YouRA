metadata:
  generated_at: "2026-03-15T02:56:00Z"
  workflow: "phase2a-dialogue v10.0.0"
  architecture: "Self-Contained Tikitaka Loop"
  schema_version: "10.0.0"
  gap_id: "gap-1"

hypothesis_draft:
  title: "Infrastructure-Mediated Documentation Completeness and Dataset Reuse in ML Repositories"
  hypothesis_id: "H-DocComp-v1"
  core_claim: |
    ML datasets hosted on repositories with structured metadata infrastructure
    (HuggingFace Hub post-2021) exhibit significantly higher DTS-weighted documentation
    completeness than legacy repositories (OpenML, UCI), and this completeness
    significantly predicts dataset download volume (standardized β ≥ 0.15) after
    controlling for age, task domain, and lagged popularity.
  mechanism: |
    Structured YAML templates lower documentation friction → higher field completion rate
    (especially DTS Factuals/Composition sections) → improved search filter eligibility
    → higher search visibility → increased discovery and download adoption.
    The infrastructure → completeness link is testable via within-HF DiD (pre/post-2021).
    The completeness → usage link is testable via negative binomial regression with
    pre-registered specifications.
  predictions:
    - P1: "HF completeness > OpenML > UCI after age/task/org controls (Cohen's d ≥ 0.3)"
    - P2: "Completeness predicts downloads (standardized β ≥ 0.15) in pre-registered NB regression"
    - P3: "Within-HF post-2021 DiD shows significant completeness improvement over OpenML/UCI trend"

variables_summary:
  independent: "DTS-weighted documentation completeness score (continuous, 0-1 range; inverse-frequency weights from Rondina et al. 2025 Table 2)"
  dependent_primary: "Dataset download count (HuggingFace 12-month downloads, log-transformed)"
  controlled: "log(dataset age), task domain FE (NLP/CV/tabular/audio/multimodal), organization type (academic/industry), lagged downloads, repository FE"

null_hypothesis:
  h0_statement: |
    DTS-weighted documentation completeness does not significantly differ between
    HuggingFace, OpenML, and UCI after controlling for dataset age, task domain, and
    organization type; AND completeness does not independently predict download counts
    (standardized β < 0.05) after controlling for lagged popularity and fixed effects.
  statistical_test: "Negative binomial regression (pre-registered); ANOVA with Bonferroni correction"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "Inverse-frequency weighted DTS scoring capturing rare high-effort documentation sections; population-scale API audit; first pre-registered causal test of completeness → usage pathway"
  differentiation_summary: |
    Closes three simultaneous gaps: (1) scales Rondina et al. 2025 from 100 to 100K+ datasets;
    (2) extends Koch et al. 2021 by adding completeness as predictor of reuse;
    (3) tests the structural intervention recommendation from Bhardwaj et al. 2024 empirically.
    None of these three contributions exist in prior literature individually or combined.

clarity:
  overall_level: "HIGH"
  clarity_verified: true
  improvements_needed: []

experimental_scope:
  models:
    - "Negative binomial regression (primary: completeness → downloads)"
    - "ANOVA with Bonferroni correction (cross-repository comparison)"
    - "Difference-in-differences (within-HF infrastructure causal test)"
    - "Sequential mediation analysis (Completeness_t → Visibility_t+1 → Downloads_t+2)"
  datasets:
    - "HuggingFace Hub: ~100K datasets via list_datasets(full=True)"
    - "OpenML: ~4K datasets via REST API list_datasets"
    - "UCI ML Repository: ~600 datasets via ucimlrepo package"
    - "Validation holdout: 120-dataset blinded human rating sample"
  baselines:
    - "Unweighted DTS Presence Average"
    - "Null model (age + task + org, no completeness)"
    - "Rondina et al. 2025 DTS scores (ground truth for metric validation)"

measurement_plan:
  data_collection:
    - source: "HuggingFace Hub API: list_datasets(full=True) → card_data fields: license, task_categories, language, size_categories, pretty_name, dataset_info, description"
    - source: "OpenML REST API: list_datasets(output_format='dataframe') → description, quality, task_type, tag_type, version"
    - source: "UCI ucimlrepo: fetch_ucirepo metadata → name, area, task, num_instances, num_features, has_missing_values, year"
    - source: "HuggingFace downloads: Hub API dataset_info.downloads field (12-month total)"
    - source: "DTS validation ground truth: Rondina et al. 2025 Appendix (100-dataset DTS scores)"
  procedure:
    - step: "1. Collect all HF, OpenML, UCI datasets via APIs (estimated 1-3 days)"
    - step: "2. Map API fields to DTS sections: Motivation (description non-null), Composition (size_categories/num_instances), Collection Processes (collection_method/year), Data Processing (preprocessing_description), Uses (task_categories/intended_use), Maintenance (version/maintainer)"
    - step: "3. Compute binary Presence Score per DTS section per dataset"
    - step: "4. Apply inverse-frequency weights from Rondina et al. Table 2 to compute WeightedDTS"
    - step: "5. Validate: 120-dataset blinded human rating holdout; compute Pearson r and section-level Cohen's κ"
    - step: "6. Cross-repository ANOVA and post-hoc tests on completeness scores"
    - step: "7. Pre-registered negative binomial regression: completeness → downloads"
    - step: "8. Within-HF DiD analysis: pre/post-2021 × repository interaction"
    - step: "9. Sequential mediation: completeness_t → filter_eligibility_t+1 → downloads_t+2"
  success_criteria:
    - "P1: HF vs. OpenML/UCI completeness difference significant (p < 0.05, d ≥ 0.3)"
    - "P2: Standardized β₁ ≥ 0.15 in pre-registered NB regression"
    - "P3: DiD interaction term significant (p < 0.05) with parallel pre-trends"
    - "Validation: automated completeness r ≥ 0.70 with human DTS scores; κ ≥ 0.75 for high-frequency sections"

validation:
  internal_validity:
    - "Pre-registered regression specification prevents p-hacking and outcome switching"
    - "Lagged downloads control addresses reverse causality (popular datasets getting documentation updates)"
    - "Repository fixed effects absorb unobserved time-invariant repository-level confounders"
    - "Within-HF quasi-natural experiment (pre/post-2021) controls for contributor population selection"
    - "Section-level DTS validation with falsifiable thresholds (r ≥ 0.70, κ ≥ 0.75)"
  external_validity:
    - "Three major repositories cover majority of public ML datasets used in research"
    - "API-based scoring is fully reproducible and rerunnable on future snapshots"
    - "Croissant-RAI (Jain et al. 2024) provides evidence mechanism generalizes to other structured metadata systems"

discussion_synthesis:
  key_insights:
    - "Scale matters: 100x increase from Rondina et al. 2025 reveals population-level patterns invisible in small samples"
    - "Weighted DTS is essential: simple Presence Average masks the asymmetry between easy-to-fill fields (Uses=0.95) and substantive fields (Collection Processes=0.10)"
    - "Infrastructure design is empirically testable: the 2021 HF YAML adoption is a quasi-natural experiment nobody has exploited"
    - "Minimum viable hypothesis is sufficient for field contribution even without full causal machinery"
  breakthrough_moments:
    - "Exchange 7: Dr. Ally's within-HF quasi-experiment design resolved the selection bias concern by holding contributor population more constant"
    - "Exchange 11: Dr. Sage's 'minimum viable claim' clarification focused the hypothesis on the immediately testable, guaranteed-novel contribution"
    - "Exchange 13: Dr. Ally's weighted DTS score design (inverse-frequency from Table 2) turned Prof. Rex's criticism into a concrete design improvement"
  resolved_tensions:
    - "Tension: Scale vs. validity → Resolved by two-stage design (automated + 120-dataset blinded validation)"
    - "Tension: Causal vs. correlational → Resolved by within-HF DiD as primary causal test; regression as secondary"
    - "Tension: Field presence vs. content quality → Resolved by inverse-frequency weighting prioritizing rare high-effort sections"
    - "Tension: Selection bias → Partially resolved by within-HF pre/post comparison; residual uncertainty acknowledged"
