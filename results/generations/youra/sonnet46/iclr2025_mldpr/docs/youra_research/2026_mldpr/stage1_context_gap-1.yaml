gap_id: "gap-1"
gap_title: "No Large-Scale API-Based Cross-Repository Documentation Completeness Measurement"
gap_description: |
  No study has conducted a large-scale (thousands of datasets), fully automated, API-based
  cross-repository comparison of documentation completeness across HuggingFace Hub, OpenML,
  and UCI ML Repository using standardized field coverage scoring (license, task type, data
  size, language/domain, citation/paper link). The closest prior work (Rondina et al. 2025)
  verified only 100 datasets manually from 4 repos. This gap directly blocks answering Sub-Q1.
