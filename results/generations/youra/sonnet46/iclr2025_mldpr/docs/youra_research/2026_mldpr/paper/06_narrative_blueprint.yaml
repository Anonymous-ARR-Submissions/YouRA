# ═══════════════════════════════════════════════════════════════════════════════
# PART 1: HOOK & MOTIVATION
# ═══════════════════════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: |
      Across 758 ML datasets audited from HuggingFace Hub and OpenML — the two largest
      structured ML dataset repositories — not a single dataset documented its preprocessing
      steps in machine-readable form, and none documented their intended uses or known
      limitations. Yet these are precisely the sections that the Data Transparency Scorecard
      (DTS), the leading ML dataset documentation framework, assigns the highest importance
      weights. At population scale, the documentation fields most critical for responsible AI
      deployment are systematically absent.
    strategy: "surprising_statistic_plus_practical_stakes"

  why_reader_should_care:
    main_reason: |
      ML practitioners selecting datasets for deployment cannot assess data quality,
      preprocessing history, or use-case limitations automatically — forcing manual
      inspection of free-text dataset cards. At 100K+ datasets on HuggingFace Hub alone,
      this manual bottleneck is a fundamental barrier to scalable responsible AI development.
    concrete_example: |
      A practitioner building a medical NLP system must manually scan dataset cards to
      determine whether a dataset's preprocessing steps are compatible with clinical text,
      whether it was collected under appropriate consent, and whether it has known biases.
      No automated tool currently quantifies documentation completeness across repositories.
    stakes: |
      Without automated documentation quality assessment, (1) practitioners deploy datasets
      without knowing critical documentation gaps, (2) responsible AI compliance audits
      remain manual and therefore rare, and (3) the research community lacks scalable
      metrics to incentivize documentation improvement over time.

  real_world_impact:
    application_domain: "ML dataset curation, responsible AI compliance, dataset discoverability"
    potential_beneficiaries: "ML practitioners, dataset curators, responsible AI auditors, benchmark developers"
    scale_of_impact: |
      HuggingFace Hub hosts ~100K+ datasets; OpenML hosts ~22K datasets. Automated DTS
      scoring enables population-scale audits that were previously restricted to manual
      small-N studies (Rondina et al. 2025: n=100; this work: n=758 automated).

# ─────────────────────────────────────────────────────────────────────────────
# PROBLEM FRAMING (Three Levels)
# ─────────────────────────────────────────────────────────────────────────────

problem_framing:
  surface_problem:
    description: |
      ML dataset documentation quality is inconsistent and often inadequate. Researchers
      have proposed documentation frameworks (datasheets, model cards, DTS) to standardize
      what information should be recorded about datasets.
    common_understanding: |
      The community broadly recognizes that dataset documentation matters for reproducibility
      and fairness. The Data Transparency Scorecard (Rondina et al. 2025) operationalized
      documentation quality into 6 sections with inverse-frequency weights based on field
      rarity and importance.

  deeper_problem:
    description: |
      Existing documentation quality studies operate at small N (n=100, manual scoring) and
      within single repositories, making it impossible to compare documentation quality
      across repository types or to assess the population-level state of documentation.
      Crucially, there is no automated scoring pipeline that can operate at the scale of
      modern ML dataset repositories.
    why_overlooked: |
      Manual scoring is the natural first step when developing a new documentation
      framework. The challenge of mapping diverse API schemas across multiple repositories
      to a common scoring rubric was not previously addressed — researchers either studied
      one repository manually or studied many repositories superficially.
    our_perspective: |
      We treat documentation completeness measurement as an engineering problem: can we
      build an automated pipeline that reliably extracts DTS-relevant signals from
      structured repository APIs at scale? This reframing enables population-level audits
      and opens the door to causal studies of what drives documentation quality.

  gap_in_existing_work:
    description: |
      No automated, cross-repository DTS-weighted documentation scoring pipeline exists.
      Studies by Rondina et al. 2025 (n=100 manual), Oreamuno et al. 2024 (n=6,758 HF
      only, unweighted binary presence), and Pushkarna et al. 2022 (Data Cards framework,
      no scoring) each address part of the problem but not the automated cross-repository
      weighted scoring gap.
    why_gap_exists: |
      Technical challenge: each repository exposes metadata through different APIs
      (HuggingFace card_data YAML, OpenML structured XML/JSON, UCI ucimlrepo) with
      different field naming conventions. Mapping these to a common 6-section DTS rubric
      requires per-repository field mapping specifications and validation against ground truth.
    why_gap_matters: |
      Without automated cross-repository scoring: (1) the causal question of whether
      repository infrastructure (structured YAML templates) drives documentation quality
      cannot be tested at scale, (2) practitioners have no tool to assess documentation
      completeness across repositories, and (3) documentation improvement over time cannot
      be tracked automatically.

# ═══════════════════════════════════════════════════════════════════════════════
# PART 2: THE INSIGHT
# ═══════════════════════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: |
      Automated DTS-weighted scoring from structured repository APIs achieves 91.8%
      cross-repository coverage, but the scoring instrument's own results reveal that
      responsible AI's highest-priority documentation fields — Preprocessing and Uses —
      score near-zero universally because they exist only as free-text prose, not as
      structured API fields.
    expanded_explanation: |
      The successful construction of an automated DTS scoring pipeline (coverage 0.918,
      proxy r=0.989) is the instrument-building contribution. But the instrument, once
      built, immediately produces a striking finding: the sections that the DTS
      inverse-frequency weighting designates as most important (Preprocessing weight 1.8,
      Uses weight 1.5) score at 0.002 and 0.000 respectively — not because datasets lack
      these sections in their full cards, but because structured API endpoints do not
      expose them as searchable structured fields. This is a finding about the fundamental
      asymmetry between machine-readable and human-readable documentation at population scale.
      The very act of automating the audit reveals what automation cannot capture.

  why_others_missed_it:
    common_assumptions: |
      Prior work assumed that (1) manual scoring captures the "true" documentation quality,
      and (2) the transition to structured API-based scoring would be a technical detail
      rather than a substantive finding. Researchers who worked with individual APIs knew
      their specific field limitations but had not compared API coverage against DTS section
      importance weights across repositories.
    our_different_view: |
      We treated the API-to-DTS mapping as an empirical question, not a design assumption.
      By measuring per-section API coverage rates and comparing them against DTS section
      weights, we discovered that the highest-importance sections are precisely the ones
      that structured APIs omit — the documentation quality "gap" is concentrated in the
      sections that matter most.
    enabling_factor: |
      Building a cross-repository automated pipeline — rather than studying one repository
      manually — forced us to confront API field coverage limitations explicitly.
      The per-section coverage heatmap (6 DTS sections × 3 repositories) made the
      systematic pattern immediately visible.

  what_makes_it_work:
    intuitive_explanation: |
      Think of dataset documentation like a structured form with six sections. HuggingFace
      and OpenML have converted the easy sections (What is it? What's in it?) into
      machine-readable form, but left the hard sections (How was it processed? What
      should it not be used for?) as unstructured text. Our automated scanner can only
      read the structured parts — and finds that the structured parts systematically
      miss what responsible AI frameworks care about most.
    key_mechanism: |
      DTS inverse-frequency weighting assigns high weights to sections that are rarely
      filled (Collection: 2.1, Preprocessing: 1.8, Uses: 1.5) because their rarity makes
      them more informative about documentation quality. The automated API scanner finds
      0.002 and 0.000 coverage for Preprocessing and Uses — consistent with rarity — but
      for a different reason than manual scorers would find: these sections exist in
      free-text card prose that structured APIs don't index, not because dataset creators
      skip them entirely.
    analogy: |
      It's like trying to assess whether a research paper is well-written by only reading
      its abstract and keywords (the structured metadata) while the methodology and
      limitations sections remain in free text. You can automate reading of what's indexed,
      but the indexed fields aren't a representative sample of paper quality.

