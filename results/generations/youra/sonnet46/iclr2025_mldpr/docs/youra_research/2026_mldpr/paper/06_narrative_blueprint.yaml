notes:
  creation_notes: |
    Narrative framing decision: This paper is primarily a methods/measurement paper with
    descriptive findings. The causal claims (P1/P2/P3) from H-DocComp-v1 were not tested
    in this pipeline run. The narrative is designed around the existence proof contribution
    (h-e1) and the unexpected empirical finding (documentation API gap) that the pipeline
    reveals. Framing as "the instrument reveals what it cannot measure" is honest, specific,
    and interesting — stronger than apologizing for incomplete causal testing.

    Paper scope: The paper will NOT claim P1/P2/P3 support. It will clearly frame as:
    (1) methodology paper establishing the scoring infrastructure, and (2) descriptive
    paper reporting the first automated large-scale DTS audit findings. Future work section
    will explicitly outline the causal research agenda.

    Hook strategy: "surprising_statistic_plus_practical_stakes" chosen over
    "counterintuitive_finding" because the quantitative specificity (758 datasets, 0.000,
    0.002) is more compelling than a qualitative paradox framing.

