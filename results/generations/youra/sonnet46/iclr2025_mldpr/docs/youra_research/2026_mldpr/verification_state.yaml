main_hypothesis:
  id: H-DocComp-v1
  title: DTS-Weighted Documentation Completeness & Dataset Usage Prediction
  statement: 'Under ML dataset ecosystems across three major public repositories (HuggingFace Hub,

    OpenML, UCI ML Repository), if repository metadata infrastructure provides structured

    YAML templates with enforced fields (as HuggingFace post-2021 vs. legacy OpenML/UCI),

    then DTS-weighted documentation completeness will be significantly higher for structured

    repositories AND completeness score will significantly predict dataset download volume

    (standardized β ≥ 0.15) in a pre-registered negative binomial regression, because

    structured templates lower documentation friction, improving search filter eligibility

    and discoverability, which drives downstream adoption.

    '
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: Cross-Repository ML Dataset Metadata Corpus (HF/OpenML/UCI API, ~105K datasets)
    model: Negative Binomial Regression + ANOVA (statsmodels, scipy.stats, sklearn)
    optimizer: null
    hyperparameters:
      minimum_sample_n: 800
      hf_sample: 500
      openml_sample: 200
      uci_sample: 100
      dts_sections: 6
      dts_weight_source: Rondina et al. 2025 Table 2 (inverse-frequency)
      nb_beta_threshold: 0.15
      nb_disconfirmation_threshold: 0.05
      human_validation_sample: 120
      human_validation_r_threshold: 0.7
      api_coverage_threshold: 0.7
