# ─────────────────────────────────────────────────────────────────────────────
# ADVERSARIAL REVIEW TARGETS (areas most vulnerable to criticism)
# ─────────────────────────────────────────────────────────────────────────────

adversarial_review_targets:
  high_priority:
    - target: "H-M3 paradox interpretation"
      concern: "Reviewer may claim Δ < 0 undermines the positive findings h-e1/h-m1"
      defense: "Two effects operate at different levels: population (h-e1/h-m1) vs within-conversation (h-m3). They are compatible. H-m3 tests a specific mechanism, not existence."

    - target: "Cross-sectional design / user self-selection"
      concern: "Cannot establish that RLHF quality *causes* accommodation vs. user sophistication confound"
      defense: "IPW correction addresses measured confounds; paper acknowledges limitation (L1) explicitly; finding is valid as population-level correlation regardless"

    - target: "Tier confound: content distribution, not RLHF quality"
      concern: "T1/T2/T3 differ in topics and users beyond RLHF training quality"
      defense: "IPW correction triggered for all tier pairs (KS p < 0.0001); monotonicity maintained post-IPW; 3-model replication rules out embedding artifacts"

  medium_priority:
    - target: "SBERT captures topic not style"
      concern: "C_sem may be dominated by topical similarity not stylistic accommodation"
      defense: "KNN K=5 topic-matched baseline provides conservative lower bound; d=0.417 above topic-matched control is a real signal"

    - target: "50% citation unverified rate"
      concern: "Half of citations could not be verified via Semantic Scholar"
      defense: "7 core RLHF/SBERT citations are verified; unverified citations are classic CAT theory references (Giles 1973, 2007) and one workshop paper — standard academic references"

    - target: "PM-proxy is a weak operationalization"
      concern: "H-M4 uses hand-curated politeness centroid, not a real reward model"
      defense: "β_PM ≈ 0 with p ≈ 0.99; even a perfect PM proxy would need to explain variance that R²≤0.012 suggests isn't there. The null is robust."
