    evidence_in_paper: "Section 3 (Methodology), specifically §3.2"
    novel: true
    notes: "KNN K=5 topic-matched baseline is key novelty over raw cosine similarity"

  - contribution: "Tier-scalable accommodation in RLHF conversations (first empirical demonstration)"
    evidence_in_paper: "Section 5.2, Table 2, Figure 2"
    novel: true
    notes: "No prior work has measured SBERT accommodation across HH-RLHF quality tiers"

  - contribution: "Directional asymmetry extending Danescu-Niculescu-Mizil et al. (2012) to semantic embedding space"
    evidence_in_paper: "Section 5.3, Table 3, Figure 3"
    novel: true
    notes: "Prior work used function-word coordination; we use SBERT cosine"

  - contribution: "Mechanism falsification (within-conversation quality discrimination and PM-proxy mediation ruled out)"
    evidence_in_paper: "Section 5.4–5.5, Tables 4–5, Figures 4 and 6"
    novel: true
    notes: "H-M3 paradox (Δ < 0) is the most surprising and potentially most impactful finding"

# ─────────────────────────────────────────────────────────────────────────────
# LIMITATIONS ACKNOWLEDGED IN PAPER (for adversarial review completeness check)
# ─────────────────────────────────────────────────────────────────────────────

limitations:
  - id: "L1"
    limitation: "Cross-sectional design — cannot rule out user self-selection"
    location: "Section 6.2 L1"
    acknowledged: true
    mitigation_proposed: "LMSYS Chatbot Arena longitudinal study"

  - id: "L2"
    limitation: "SBERT conflates topical and stylistic accommodation"
    location: "Section 6.2 L2"
    acknowledged: true
    mitigation_proposed: "STRAP or topic-free embeddings"

  - id: "L3"
    limitation: "Tier confound — HH-RLHF tiers differ in content distribution beyond RLHF quality"
    location: "Section 6.2 L3"
    acknowledged: true
    mitigation_proposed: "Controlled generation experiment"

  - id: "L4"
    limitation: "Proximal mechanism unresolved after h-m3 and h-m4 falsifications"
    location: "Section 6.2 L4"
    acknowledged: true
    mitigation_proposed: "Reward model scores as PM proxy; NLI-based analysis; length-controlled replication"

  - id: "L5"
    limitation: "PM-proxy operationalization is weak (hand-curated politeness centroid)"
    location: "Section 6.2 L5"
    acknowledged: true
    mitigation_proposed: "Reward model scores; stronger PM proxy"

