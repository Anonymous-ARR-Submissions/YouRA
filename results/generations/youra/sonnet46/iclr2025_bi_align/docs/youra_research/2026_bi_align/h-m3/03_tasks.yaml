    description: >
      Implement project_out(vecs [N,D], direction [N,D]) -> [N,D]:
      per-pair v - (v·d)*d (vectorized with keepdims). NOT re-normalized here.
      Implement compute_delta_prompt_projected: project A_chosen and A_rejected,
      then normalize with 1e-8 guard (norm + 1e-8 denominator), then
      compute_delta_raw on projected-normalized vectors.
    complexity: 4
    priority: 4
    type: logic_subtask
    parent_epic: A-4
    status: todo
    depends_on: [L-4-3]
    reference_files:
