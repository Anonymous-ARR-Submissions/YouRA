      ops_passing = count ops where mean_delta > 0 AND ci_lower > 0.
      auto_demote = n_pairs_min < min_n_pairs.
      gate_passed = ops_passing >= 2 AND NOT auto_demote.
      Returns: {gate_passed, ops_passing (int), ops_passing_list, auto_demote,
      n_pairs_min, gate_result ("PASS"/"FAIL")}.
    complexity: 3
    priority: 5
    type: logic_subtask
    parent_epic: A-5
    status: todo
    depends_on: [L-5-1]
    reference_files:
