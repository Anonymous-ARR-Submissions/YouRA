      - "Matched-shuffle synthetic control is stronger baseline than prior coordination work"
      - "PM mediation regression tests mechanism specificity; either outcome is informative"
      - "Abandonment criteria are explicitly pre-registered — enables clean theoretical revision"

  refiner_critic:
    agent: "Prof. Rex"
    icon: "🔍"
    assessment: |
