hypothesis_draft:
  title: "Human Semantic Accommodation Sensitivity to RLHF Alignment Quality"
  hypothesis_id: "H-SemAccom-v1"
  core_claim: |
    Humans semantically accommodate more to higher-quality RLHF-aligned AI partners, as
    measured by baseline-adjusted SBERT cosine similarity (C_sem) between human follow-up
    turns and preceding AI turns, with directional asymmetry (H→AI > AI→H) increasing
    monotonically across HH-RLHF tiers (helpful_base → helpful_rejection_sampling →
    helpful_online). This constitutes the first semantic-level computational evidence for
    human accommodation as a measurable component of bidirectional alignment.
  mechanism: |
    RLHF training (SFT → RM → PPO pipeline) produces AI responses with progressively higher
    clarity, structure, and normative appropriateness. Human interlocutors perceive these
    responses as carrying higher epistemic reliability, triggering greater adaptive semantic
    alignment in their follow-up turns — analogous to lower-power speakers accommodating more
    to higher-status interlocutors [Danescu-Niculescu-Mizil et al., 2011]. This "epistemic
    uptake sensitivity" mechanism predicts asymmetric accommodation that scales with RLHF
    quality gradient. Mechanism specificity (vs. formatting salience) is tested via PM-score
    mediation regression controlling for surface features.
  predictions:
    - P1: "C_sem^(H←A) > C_sem^(A←H) monotonically across tiers; Cohen's d ≥ 0.1; consistent across ≥2/3 SBERT models"
    - P2: "Partner-specificity: cos(H_next, A_actual) > cos(H_next, A_topic-matched) > cos(H_next, A_random); d ≥ 0.1 between levels"
    - P3: "Δ = cos(H_next, A_chosen) - cos(H_next, A_rejected) > 0; length-robust and prompt-projected; [conditional on N_pairs ≥ 1000 per tier]"

variables_summary:
  independent: "RLHF alignment tier (3 levels: base/RS/online) AND PM-score quality (chosen vs. rejected within prompt)"
  dependent_primary: "C_sem = E[cos(SBERT(H_{t+1}), SBERT(A_t))] - E[cos(SBERT(H_{t+1}), SBERT(A_t^matched-shuffle))]"
  controlled: "Response length, lexical overlap, prompt embedding distribution, topical coherence (KNN baseline), surface formatting signals"

null_hypothesis:
  h0_statement: |
    H0: There is no significant difference in baseline-adjusted semantic similarity (C_sem) between
    human and AI turns across HH-RLHF alignment tiers. Formally: C_sem^(H←A) ≤ C_sem^(A←H) at
    all tiers; no monotonic tier ordering with d ≥ 0.1. The semantic similarity differences
    observed between tiers are fully explained by topical coherence and do not reflect
    partner-specific semantic accommodation.
  statistical_test: "Mann-Whitney U (pairwise tier comparison) + Jonckheere-Terpstra (monotonicity) + bootstrap Cohen's d (n=1000, seed=42)"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "First semantic-embedding-level measurement of human accommodation to RLHF quality; introduces C_sem metric, directional asymmetry test, and PM-quality causal probe in single study"
  differentiation_summary: |
    Extends Danescu 2011 from function-word to semantic embedding level.
    Extends Chang & Wang 2025 from word-level to SBERT cosine; adds RLHF tier stratification.
    Provides operational measurement for BiAlign workshop's [Shen et al. 2025] theoretical gap.
    Avoids all three prior failure modes (keyword features, surface stats, GPU training).

clarity:
  overall_level: "HIGH"
  clarity_verified: true
  improvements_needed: []

experimental_scope:
  models:
    - "all-MiniLM-L6-v2 (primary)"
    - "paraphrase-MiniLM-L6-v2 (robustness)"
    - "all-mpnet-base-v2 (robustness)"
  datasets:
    - "Anthropic/hh-rlhf — helpful-base split"
    - "Anthropic/hh-rlhf — helpful-rejection-sampled split"
    - "Anthropic/hh-rlhf — helpful-online split"
  baselines:
    - "Topic-matched KNN shuffle baseline (K=5 nearest-neighbor AI turns by prompt embedding)"
    - "True random shuffle baseline (same tier, shuffled)"
    - "Length-matched truncation (for chosen/rejected Δ)"
    - "Prompt-vector projection (orthogonal to prompt embedding)"
    - "Surface-feature residualization (length, lexical overlap, TTR)"

measurement_plan:
  data_collection:
    - source: "HH-RLHF dataset via HuggingFace datasets API (3 helpful splits)"
    - source: "Pre-trained SBERT models via sentence-transformers library"
    - source: "h-e1 statistical pipeline (28/28 tests passing)"
  procedure:
    - step: "1. Load all three HH-RLHF helpful splits; extract H→A conversation turn pairs"
    - step: "2. Encode all turns with all-MiniLM-L6-v2; batch size 256; CPU; ~20 seconds"
    - step: "3. Test prompt embedding distribution equivalence (KS test); apply weighting if needed"
    - step: "4. Compute C_sem for H→AI and AI→H directions with matched-shuffle baseline"
    - step: "5. Test partner-specificity: actual vs. KNN topic-matched vs. random"
    - step: "6. Test monotonicity across tiers (J-T) + pairwise Mann-Whitney + bootstrap Cohen's d"
    - step: "7. Run PM mediation regression controlling for surface features"
    - step: "8. Verify N_pairs; if ≥1000 per tier, run chosen/rejected Δ test (3 operationalizations)"
    - step: "9. Replicate P1 with paraphrase-MiniLM-L6-v2 and all-mpnet-base-v2"
    - step: "10. Report all pre-registered failure conditions transparently"
  success_criteria:
    - "P1: d ≥ 0.1, J-T p < 0.05, H→AI > AI→H, consistent ≥2/3 models"
    - "P2: Partner-specificity gap d ≥ 0.1 between actual and topic-matched"
    - "P3 (conditional on N_pairs): Δ > 0 under ≥2/3 length-control operationalizations"

validation:
  internal_validity:
    - "Conditional-minus-baseline metric (C_sem) controls for absolute semantic level differences across tiers"
    - "KS test + weighting for prompt distribution comparability across tiers"
    - "Three-level partner-specificity control validates accommodation vs. topical coherence"
    - "PM mediation regression distinguishes epistemic quality signal from formatting signals"
    - "Pre-registered failure conditions prevent post-hoc reinterpretation"
  external_validity:
    - "Multi-model robustness (3 SBERT models) rules out geometry-specific artifacts"
    - "Population-level analysis applies across all users in each tier (no selection)"
    - "Limitation: HH-RLHF is helpfulness-focused; harmlessness or open-ended domains not covered"
    - "Future work: replicate on LMSYS Chatbot Arena, WildChat for broader generalization"

discussion_synthesis:
  key_insights:
    - "The conditional-minus-baseline structure (C_sem) is essential — without it, we measure coherence not accommodation"
    - "Directional asymmetry (H→AI vs AI→H) is the critical test that distinguishes accommodation from mutual coherence"
    - "HH-RLHF's chosen/rejected paired structure provides a quasi-experimental within-prompt quality probe — a unique empirical asset"
    - "Three-level partner-specificity control (actual > topic-matched > random) validates that C_sem detects interaction-specific adaptation"
    - "The psychological mechanism ('epistemic uptake sensitivity') is the weakest assumption — tested but not assumed via PM mediation"
  breakthrough_moments:
    - "Exchange 6 (Dr. Ally): Proposed mechanistic framing 'RLHF → epistemic authority → asymmetric accommodation' and bilateral C_sem formulation"
    - "Exchange 8 (Prof. Vera): Required partner-specificity control with minimum d ≥ 0.1 threshold — transformed from descriptive to validated metric"
    - "Exchange 12 (Dr. Ally): Proposed matched-shuffle synthetic control (actual > topic-matched > random) as formal validation of metric"
    - "Exchange 14 (Prof. Vera): Required three-operationalization Δ test (raw, length-matched, prompt-projected) — bulletproofed P3"
  resolved_tensions:
    - "Topical coherence vs. accommodation: resolved by three-level partner-specificity control"
    - "Causal vs. descriptive claim: resolved by scoping to 'existence proof' for P1-P2; treating P3 chosen/rejected as mechanistic probe"
    - "Epistemic authority vs. formatting salience: deferred to mediation regression with explicit failure conditions"
    - "Sample size for P3: deferred to empirical verification (Assumption A5)"
