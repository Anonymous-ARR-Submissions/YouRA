      - "scipy>=1.7.0"
      - "scikit-learn>=1.0.0"
      - "numpy>=1.21.0"
      - "matplotlib>=3.4.0"
      - "statsmodels>=0.13.0"
      - "tqdm>=4.62.0"
    acceptance_criteria:
      - "All packages import without error"
      - "SentenceTransformer('all-MiniLM-L6-v2') loads successfully"
      - "Python >= 3.10"

  # ============================================================
  # EPIC IMPLEMENTATION TASKS (priority 93-50)
  # ============================================================

  - id: "A-1"
    type: "data-pipeline"
    title: "Data Loading & Parsing — data_loader.py"
    description: |
      Implement data_loader.py: load 3 HH-RLHF splits, parse chosen conversations
      into (H_next, A_actual, H_prompt) triples, compute token counts and Jaccard
      overlaps for residualization covariates.
    priority: 93
    complexity: 12
    complexity_breakdown: "Module_Size(3) + Dependencies(2) + Algorithm(3) + Integration(4)"
    reference_files:
      - file: "h-e1/03_architecture.md"
        section: "### DataLoader (`code/data_loader.py`)"
      - file: "h-e1/03_prd.md"
        section: "### FR-1: Data Loading and Preprocessing Module"
    functions:
      - "load_all_splits(cache_dir) -> list[dict]"
      - "parse_conversation(chosen: str) -> list[str]"
      - "extract_pairs(conversations) -> dict  # h_next, a_actual, h_prompt, token_counts, jaccard_overlaps"
      - "compute_jaccard(s1, s2) -> float"
      - "compute_token_count(text) -> int"
    acceptance_criteria:
      - "extract_pairs returns dict with keys: h_next, a_actual, h_prompt, token_counts, jaccard_overlaps"
      - "len(h_next) == len(a_actual) == len(h_prompt)"
      - "All turns non-empty after filtering"
      - "len(pairs) >= 1000 across pooled splits"

  - id: "A-2"
    type: "model"
    title: "Embedding Generation — embedder.py"
    description: |
      Implement embedder.py: SentenceTransformer batch encoding with .npy disk cache.
      Cache-key logic to avoid re-encoding. normalize_embeddings=True, batch_size=256.
    priority: 88
    complexity: 10
    complexity_breakdown: "Module_Size(2) + Dependencies(2) + Algorithm(3) + Integration(3)"
    reference_files:
      - file: "h-e1/03_architecture.md"
        section: "### Embedder (`code/embedder.py`)"
      - file: "h-e1/03_prd.md"
        section: "### FR-2: Embedding Generation Module"
    functions:
      - "Embedder.__init__(model_name, cache_dir)"
      - "Embedder.encode(texts, cache_key) -> np.ndarray  # (N, 384)"
      - "Embedder.load_cache(cache_key) -> np.ndarray | None"
      - "Embedder.save_cache(embeddings, cache_key)"
    acceptance_criteria:
      - "Output shape: (N, 384) float32 for all-MiniLM-L6-v2"
      - "normalize_embeddings=True (L2-normalized vectors)"
      - "Cache load skips re-encoding on second run"
      - "Cache files saved to embeddings/*.npy"

  - id: "A-3"
    type: "model"
    title: "Control Construction — controls.py"
    description: |
      Implement controls.py: random shuffle baseline (A_random) with seed=42,
      and KNN K=5 topic-matched control (A_topic) using NearestNeighbors on
      prompt embeddings with self-exclusion and mean embedding aggregation.
    priority: 83
    complexity: 13
    complexity_breakdown: "Module_Size(3) + Dependencies(2) + Algorithm(4) + Integration(4)"
    reference_files:
      - file: "h-e1/03_architecture.md"
        section: "### Controls (`code/controls.py`)"
      - file: "h-e1/03_prd.md"
        section: "### FR-3: Control Construction Module"
    functions:
      - "build_random_control(ai_embeddings, seed=42) -> np.ndarray  # (N, D)"
      - "build_topic_control(prompt_embeddings, ai_embeddings, k=5) -> np.ndarray  # (N, D)"
    acceptance_criteria:
      - "build_random_control: output is shuffled permutation of ai_embeddings, seed=42"
      - "build_topic_control: output shape (N, 384), each row = mean of K=5 matched AI embeddings"
      - "Self-exclusion: KNN indices[:,0] (self) excluded, use indices[:,1:k+1]"
      - "assert len(prompt_embeddings) > k+1"

  - id: "A-4"
    type: "model"
    title: "C_sem Computation & Residualization — accommodation.py"
    description: |
      Implement accommodation.py: elementwise dot products for cos_actual/cos_topic/cos_random,
      OLS residualization (length first, then lexical overlap) via statsmodels, C_sem scalar.
    priority: 78
    complexity: 11
    complexity_breakdown: "Module_Size(3) + Dependencies(2) + Algorithm(4) + Integration(2)"
    reference_files:
      - file: "h-e1/03_architecture.md"
        section: "### Accommodation (`code/accommodation.py`)"
      - file: "h-e1/03_config.md"
        section: "### C-4-1: `apply_residualization()` OLS Config"
      - file: "h-e1/03_prd.md"
        section: "### FR-4: C_sem Computation and Residualization"
    functions:
      - "compute_cosine_similarities(h_next, a_actual, a_topic, a_random) -> dict  # cos_actual/topic/random each (N,)"
      - "residualize(cos_array, covariate) -> np.ndarray  # OLS residuals (N,)"
      - "compute_c_sem(cos_actual, cos_random) -> float"
      - "apply_residualization(cos_dict, token_counts, jaccard_overlaps) -> dict"
    acceptance_criteria:
      - "cos_actual/topic/random each shape (N,) float32"
      - "residualize uses statsmodels.api.OLS with add_constant"
      - "apply_residualization: length residualization FIRST, then lexical overlap"
      - "All three cos arrays residualized identically"

  - id: "A-5"
    type: "evaluation"
    title: "Statistical Testing — statistics.py"
    description: |
      Implement statistics.py: bootstrap CI for C_sem (n=1000, seed=42), Mann-Whitney U
      (2 pairwise tests), bootstrap Cohen's d (3 contrasts), verify_mechanism_activated
      with 5-indicator gate check, run_all_tests orchestration.
    priority: 73
    complexity: 15
    complexity_breakdown: "Module_Size(4) + Dependencies(2) + Algorithm(5) + Integration(4)"
    reference_files:
      - file: "h-e1/03_logic.md"
        section: "## A-5: Statistical Testing"
      - file: "h-e1/03_prd.md"
        section: "### FR-5: Statistical Testing Module"
      - file: "h-e1/03_prd.md"
        section: "### FR-6: Mechanism Activation Verification"
    subtasks:
      - "L-5-1"
      - "L-5-2"
      - "L-5-3"
      - "L-5-4"
    acceptance_criteria:
      - "bootstrap_c_sem returns (float, ndarray shape (2,)) — 95% CI"
      - "bootstrap_cohen_d uses pooled-std formula with zero-division guard"
      - "run_all_tests asserts n_pairs >= 1000 before any test"
      - "verify_mechanism_activated checks exactly 5 indicators, returns (bool, dict)"
      - "All bootstrap functions use np.random.default_rng(seed=42)"

  - id: "A-6"
    type: "evaluation"
    title: "Visualization & Orchestration — visualize.py + run_experiment.py"
    description: |
      Implement visualize.py (6 figures: gate_metrics, partner_specificity, bootstrap_dist,
      cosine_distributions, residualization_check, knn_quality) and run_experiment.py
      (orchestration, logging, results.json, robustness checks for 2 additional models).
    priority: 60
    complexity: 14
    complexity_breakdown: "Module_Size(4) + Dependencies(3) + Algorithm(3) + Integration(4)"
    reference_files:
      - file: "h-e1/03_architecture.md"
        section: "### Visualize (`code/visualize.py`)"
      - file: "h-e1/03_architecture.md"
        section: "### RunExperiment (`code/run_experiment.py`)"
      - file: "h-e1/03_config.md"
        section: "## A-6: Visualization & Orchestration"
    subtasks:
      - "C-6-1"
      - "C-6-2"
      - "C-6-3"
    acceptance_criteria:
      - "gate_metrics.png generated (two-panel: C_sem bar + three cosine bars with CI)"
      - "All 6 figures saved to h-e1/figures/ at 300 DPI"
      - "run_experiment() writes results.json using ExperimentResults dataclass"
      - "run_robustness_checks() runs paraphrase-MiniLM-L6-v2 and all-mpnet-base-v2 sequentially"
      - "experiment.log created with INFO-level events"

  # ============================================================
  # SUBTASKS (priority 49-2)
  # ============================================================

  - id: "L-5-1"
    type: "subtask"
    parent_epic: "A-5"
    title: "Implement bootstrap_c_sem()"
    description: |
      Vectorized bootstrap CI for C_sem scalar. Uses np.random.default_rng(seed=42),
      n_bootstrap=1000 iterations, percentile CI at [2.5, 97.5].
    priority: 49
    reference_files:
      - file: "h-e1/03_logic.md"
        section: "### L-5-1: bootstrap_c_sem()"
    acceptance_criteria:
      - "Returns (float, ndarray shape (2,))"
      - "Uses default_rng(seed) not legacy np.random.seed"
      - "assert len(cos_actual) == len(cos_random)"

  - id: "L-5-2"
    type: "subtask"
    parent_epic: "A-5"
    title: "Implement bootstrap_cohen_d()"
    description: |
      Bootstrap Cohen's d with pooled-std formula. Independent bootstrap loops
      for arrays of potentially different sizes (N, M). Zero-division guard.
    priority: 45
    reference_files:
      - file: "h-e1/03_logic.md"
        section: "### L-5-2: bootstrap_cohen_d()"
    acceptance_criteria:
      - "Returns (float, ndarray shape (2,))"
      - "Pooled std: sqrt(((N-1)*var_a + (M-1)*var_b) / (N+M-2))"
      - "Zero-division guard: if pooled_std == 0, d=0"

  - id: "L-5-3"
    type: "subtask"
    parent_epic: "A-5"
    title: "Implement run_all_tests()"
    description: |
      Orchestrate all statistical tests: bootstrap_c_sem once, mann_whitney_test twice
      (actual-vs-topic, topic-vs-random), bootstrap_cohen_d three times. Assert n_pairs >= 1000.
      Return flat dict suitable for results.json.
    priority: 41
    reference_files:
      - file: "h-e1/03_logic.md"
        section: "### L-5-3: run_all_tests()"
    acceptance_criteria:
      - "ValueError raised if n_pairs < MIN_N_PAIRS"
      - "Returns dict with keys: n_pairs, c_sem, c_sem_ci, cos_actual_mean, cos_topic_mean, cos_random_mean, mann_whitney_*, cohen_d_*"
      - "3 Cohen's d contrasts: actual_vs_topic, actual_vs_random, topic_vs_random"

  - id: "L-5-4"
    type: "subtask"
    parent_epic: "A-5"
    title: "Implement verify_mechanism_activated()"
    description: |
      Gate check with 5 boolean indicators: embeddings_computed, c_sem_positive,
      ci_lower_positive, ordering_holds, sufficient_pairs. Returns (all(indicators), indicators).
    priority: 37
    reference_files:
      - file: "h-e1/03_logic.md"
        section: "### L-5-4: verify_mechanism_activated()"
      - file: "h-e1/02c_experiment_brief.md"
        section: "### Mechanism Activation Indicators"
    acceptance_criteria:
      - "Returns (bool, dict) — passed = all(indicators.values())"
      - "Exactly 5 indicator keys checked"
      - "ordering_holds checks: cos_actual_mean > cos_topic_mean AND cos_topic_mean > cos_random_mean"

  - id: "C-6-1"
    type: "subtask"
    parent_epic: "A-6"
    title: "Implement plot_gate_metrics() figure spec"
    description: |
      Two-panel bar chart: left panel C_sem with 95% CI errorbar + dashed zero-line;
      right panel three grouped bars (cos_actual/topic/random) with CI. 300 DPI PNG.
    priority: 33
    reference_files:
      - file: "h-e1/03_config.md"
        section: "### C-6-1: `plot_gate_metrics()` Figure Spec"
    acceptance_criteria:
      - "Saved to figures/gate_metrics.png at DPI=300"
      - "Two panels: C_sem left, three cosine bars right"
      - "Zero-line dashed reference in C_sem panel"
      - "Color scheme: actual=blue, topic=orange, random=grey, C_sem=green"

  - id: "C-6-2"
    type: "subtask"
    parent_epic: "A-6"
    title: "Implement run_experiment() orchestration config"
    description: |
      Logging setup (INFO, FileHandler + StreamHandler), directory creation
      (embeddings/, figures/), results.json wiring via ExperimentResults dataclass.
    priority: 29
    reference_files:
      - file: "h-e1/03_config.md"
        section: "### C-6-2: `run_experiment()` Orchestration Config"
    acceptance_criteria:
      - "logging.basicConfig with FileHandler(experiment.log) + StreamHandler"
      - "setup_dirs creates embeddings/ and figures/ with exist_ok=True"
      - "results.json written as final step via ExperimentResults.to_json()"
      - "Log events: model name, N_pairs, embedding time, C_sem, gate result"

  - id: "C-6-3"
    type: "subtask"
    parent_epic: "A-6"
    title: "Implement run_robustness_checks() config"
    description: |
      Sequential (not parallel) execution of run_experiment() for
      paraphrase-MiniLM-L6-v2 and all-mpnet-base-v2. Output: results_robustness.json.
    priority: 25
    reference_files:
      - file: "h-e1/03_config.md"
        section: "### C-6-3: `run_robustness_checks()` Config"
    acceptance_criteria:
      - "ROBUSTNESS_MODELS = ['paraphrase-MiniLM-L6-v2', 'all-mpnet-base-v2']"
      - "Sequential execution (not parallel)"
      - "Output: results_robustness.json dict keyed by model name"
      - "Console log of per-model gate_passed status"
