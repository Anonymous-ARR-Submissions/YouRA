# ═══════════════════════════════════════════════════════════════════════════════
# PART 1: HOOK & MOTIVATION
# ═══════════════════════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: |
      When humans interact with better AI assistants, they start talking more like them —
      but not in the way we expected. We demonstrate that humans exhibit robust, tier-scalable
      semantic accommodation to AI partners in the Anthropic HH-RLHF helpfulness dataset,
      yet paradoxically, humans are MORE semantically similar to responses that RLHF raters
      rejected than to the ones they approved.
    strategy: "paradox_hook"
    notes: |
      Strategy: Open with the empirical result (positive accommodation confirmed), then
      immediately introduce the paradox (H-M3 reversal: closer to rejected than chosen).
      This two-part opening establishes (a) the phenomenon is real and (b) the mechanism
      is not what we thought — making the paper scientifically more interesting.

  why_reader_should_care:
    main_reason: |
      RLHF alignment training explicitly shapes the AI side of human-AI conversations,
      but the human side has been largely unstudied. If humans semantically adapt to AI
      quality, then alignment quality has downstream effects on human communication
      patterns — relevant for AI safety, interaction design, and understanding how
      humans form mental models of AI systems.
    concrete_example: |
      Users of GPT-4 (higher RLHF quality) vs GPT-3 (lower quality) are not just
      receiving different responses — they may be communicating differently as a result.
      Our study provides the first SBERT-based empirical measurement of this effect
      at population scale (155,362 conversation pairs).
    stakes: |
      Without understanding bidirectional adaptation in human-AI conversations, we
      design RLHF systems optimizing only the AI's behavior while ignoring how that
      behavior shapes the humans who interact with it. This is a blind spot in
      current alignment research.

  real_world_impact:
    application_domain: "RLHF system design, human-AI interaction research, conversational AI alignment"
    potential_beneficiaries: "AI safety researchers, RLHF practitioners, HCI researchers studying human-AI interaction dynamics"
    scale_of_impact: |
      Millions of users interact with RLHF-trained AI systems daily. Understanding
      how RLHF quality propagates back through human semantic behavior is foundational
      for bidirectional alignment frameworks.

# ─────────────────────────────────────────────────────────────────────────────
# PROBLEM FRAMING
# ─────────────────────────────────────────────────────────────────────────────

problem_framing:
  surface_problem:
    description: |
      RLHF training is designed to align AI responses with human preferences, but
      we know little about how AI response quality in turn shapes human behavior.
      The conversation is bidirectional, yet alignment research treats it as one-way.
    common_understanding: |
      Most alignment work measures how well AI conforms to human preferences (RLHF reward),
      not how AI quality shapes subsequent human communication patterns. "Alignment" is
      typically measured from the AI's perspective.

  deeper_problem:
    description: |
      Human communication accommodation theory (CAT) predicts that interlocutors
      adapt to their partners — but this has never been measured in the semantic
      embedding space for human-AI conversations, and existing word-level studies
      (Chang & Wang 2025) don't examine the role of RLHF alignment quality as
      the driver of accommodation strength.
    why_overlooked: |
      Prior work on human-AI style accommodation focused on lexical/syntactic features.
      SBERT-based semantic accommodation is computationally tractable but conceptually
      distinct — it measures embedding-space alignment, not surface linguistic mimicry.
      Additionally, the HH-RLHF tier structure as a quality gradient for studying
      accommodation has not been exploited.
    our_perspective: |
      We reframe "bidirectional alignment" not just as AI adapting to humans, but as
      the entire conversational system — measuring how RLHF quality gradient induces
      systematic differences in human semantic behavior at the population level.

  gap_in_existing_work:
    description: |
      Zero papers have measured SBERT embedding-based semantic accommodation across
      RLHF alignment tiers. The C_sem metric (baseline-adjusted cosine similarity
      with partner-shuffle control) is new.
    why_gap_exists: |
      The HH-RLHF dataset was released in 2022 with a focus on AI quality measurement.
      Using its tier structure as an independent variable for studying *human* behavior
      (not AI quality) requires a conceptual inversion that prior work hasn't attempted.
    why_gap_matters: |
      Without this measurement, we cannot know whether RLHF quality improvements
      propagate bidirectionally — affecting not just AI outputs but human communicative
      behavior within the same conversation.

# ═══════════════════════════════════════════════════════════════════════════════
# PART 2: THE INSIGHT
# ═══════════════════════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: |
      RLHF quality drives human semantic accommodation at the population level via
      distributional shifts, not within-conversation quality discrimination —
      meaning humans accommodate more to better AI partners without consciously
      perceiving the quality difference within any single exchange.
    expanded_explanation: |
      Our experiments confirm that humans exhibit systematically stronger semantic
      alignment to higher-quality AI partners (J-T p=0.001, d=0.18–0.25 across
      3 SBERT models), and that humans accommodate more to AI than vice versa
      (d=0.13–0.41 in all 9 tier×model cells). Yet when tested within a single
      conversation (h-m3: can humans distinguish chosen from rejected AI responses
      based on their own follow-up turns?), the signal reverses — humans are MORE
      similar to rejected responses. The mechanism is structural and distributional,
      not perceptual and within-conversation.

  why_others_missed_it:
    common_assumptions: |
      Prior work assumed accommodation is driven by within-interaction quality
      perception: if AI quality is higher, humans consciously or subconsciously
      detect this and accommodate more. This implies accommodation should correlate
      positively with within-conversation quality signals (chosen > rejected).
    our_different_view: |
      We separate population-level accommodation (does higher-tier AI correlate with
      stronger accommodation across conversations?) from within-conversation quality
      discrimination (can the quality signal within a conversation drive accommodation?).
      These are empirically distinct and our results show they behave oppositely.
    enabling_factor: |
      The HH-RLHF chosen/rejected pair structure (h-m3) provides a unique natural
      experiment: same prompt, two response quality levels, same human follow-up.
      This within-prompt design is rare in conversational datasets and enabled us
      to test the within-conversation mechanism directly.

  what_makes_it_work:
    intuitive_explanation: |
      Imagine two cafes: one with consistently excellent baristas (high RLHF tier)
      and one with mediocre ones (low tier). Customers at the excellent cafe, over
      thousands of visits, develop richer coffee vocabulary — not because they
      consciously evaluate each cup, but because the overall conversation environment
      is richer. Yet if shown two random cups from the same cafe, they cannot reliably
      tell from their own response which was the barista's best work vs. runner-up.
    key_mechanism: |
      RLHF training creates distributional differences across tiers — higher-tier
      conversations have AI responses that are more semantically comprehensive and
      conversationally rich. Humans interacting in this richer environment exhibit
      greater embedding-space alignment at the population level. The mechanism
      operates through environmental distribution, not per-response quality signals.
    analogy: |
      Power asymmetry in human-human language (Danescu-Niculescu-Mizil et al. 2011):
      lower-power interlocutors accommodate more to higher-power ones. Our finding
      extends this to human-AI interaction in embedding space, with RLHF quality
      as the proxy for power/authority.

