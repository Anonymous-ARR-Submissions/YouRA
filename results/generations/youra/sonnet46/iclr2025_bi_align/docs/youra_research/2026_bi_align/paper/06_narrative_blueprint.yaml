# PART 3: EVIDENCE STORY
# ═══════════════════════════════════════════════════════════════════════════════

evidence_narrative:
  main_claim:
    statement: |
      Humans exhibit robust, tier-scalable semantic accommodation to AI partners in
      RLHF helpfulness conversations (C_sem^H←A > C_sem^A←H), with accommodation
      strength monotonically increasing with RLHF alignment quality — mediated by
      population-level distributional shifts, not within-conversation quality discrimination.
    measurable_criteria: |
      Claim 1 (existence): C_sem > 0 with partner-specificity d ≥ 0.1 (actual vs topic-matched)
      Claim 2 (tier scaling): J-T p < 0.05, Cohen's d T1→T3 ≥ 0.1 in ≥2/3 SBERT models
      Claim 3 (asymmetry): C_sem^H←A > C_sem^A←H in ≥2/3 tiers, ≥2/3 models
      Claim 4 (mechanism): Δ < 0 or β_PM ≈ 0 (falsification of proximal mechanisms)

  supporting_evidence:
    - id: "evidence_1"
      what: "C_sem = 0.329 (95% CI [0.328, 0.330]); partner-specificity d=1.998 (actual vs random)"
      so_what: |
        Very large effect (Cohen d > 0.8 = large by convention). Humans are dramatically
        more semantically aligned to their actual AI partner than to a random AI turn.
        This rules out any measurement artifact and establishes the phenomenon exists.
      how_it_supports_claim: "Direct evidence for Claim 1 (existence); establishes C_sem as valid measure"

    - id: "evidence_2"
      what: "J-T p=0.001; d=0.18–0.25 T1→T3 confirmed in all-MiniLM, paraphrase-MiniLM, all-mpnet"
      so_what: |
        Three independently trained SBERT architectures agree. The result is a property
        of the data, not the embedding model. Tier monotonicity is robust.
      how_it_supports_claim: "Direct evidence for Claim 2 (tier scaling); 3-model robustness rules out model artifacts"

    - id: "evidence_3"
      what: "All 9 tier×model cells: C_sem^H←A > C_sem^A←H; d=0.13–0.41; Mann-Whitney p≤4.8e-30"
      so_what: |
        Zero exceptions in 9 independent tests. Directional asymmetry is consistent
        with power asymmetry theory extended to human-AI semantic embedding space.
      how_it_supports_claim: "Direct evidence for Claim 3 (asymmetry); universality across conditions strengthens claim"

    - id: "evidence_4"
      what: "Δ = cos(H_next, A_chosen) − cos(H_next, A_rejected) < 0 in 25/27 cells; d up to −0.74"
      so_what: |
        Paradoxically, human follow-up turns are more similar to the REJECTED AI response.
        This definitively rules out within-conversation quality discrimination as the mechanism.
      how_it_supports_claim: |
        Evidence for Claim 4 (mechanism falsification). Strengthens the paper by showing
        the population-structural mechanism explanation: accommodation is environmental,
        not perceptual within a single exchange.

    - id: "evidence_5"
      what: "β_PM ≈ 0 (|β| < 1e-4), p ≈ 0.99 across all 3 SBERT models in OLS mediation regression"
      so_what: |
        Politeness-style proxies do not mediate the CSEM asymmetry. Content features
        are not the pathway — the mechanism is structural.
      how_it_supports_claim: "Additional support for Claim 4; eliminates content-based mediation hypothesis"

  surprising_findings:
    finding: |
      Human follow-up turns are MORE semantically similar to the RLHF-rejected AI response
      than to the chosen (approved) response within the same conversation (Δ < 0 in 25/27
      cells, Cohen's d up to −0.74 for helpful-online tier).
    why_surprising: |
      Intuition suggests chosen (higher quality) AI responses should better predict
      what a human says next — if quality drives accommodation, the human should align
      more with the higher-quality response. The reversal is counterintuitive and
      initially appeared to falsify the entire hypothesis.
    our_interpretation: |
      Rejected responses in HH-RLHF tend to be longer and more topically expansive
      (verbosity hypothesis) or include more hedging and continuation cues (hedging
      hypothesis). The human's next turn reflects their information agenda, which
      may correlate better with the more expansive rejected response than the more
      concise, self-contained chosen response. This finding reveals a fundamental
      mismatch between RLHF training signal dimensions and conversational continuity.

  what_results_mean:
    synthesis: |
      RLHF alignment quality shapes human conversational behavior at the population
      level, but through environmental distribution rather than within-conversation
      quality perception. Bidirectional alignment is real: better AI partners produce
      humans who communicate more similarly to those AI partners across the population.
      The directional asymmetry (humans accommodate more to AI than vice versa)
      is consistent with power asymmetry theory extended to human-AI interaction.
    confidence_level: |
      HIGH for the three positive findings (existence, tier scaling, asymmetry):
      confirmed across 3 SBERT models, n=155,362 pairs, with IPW correction.
      HIGH for mechanism falsification: d up to −0.74, all 27 combination cells tested.
    caveats: |
      Cross-sectional design cannot rule out user self-selection (sophisticated users
      preferring higher-tier AI). SBERT conflates topical and stylistic accommodation.
      Proximal mechanism unresolved after h-m3 and h-m4 falsifications.

# ═══════════════════════════════════════════════════════════════════════════════
# PART 4: BROADER IMPACT
# ═══════════════════════════════════════════════════════════════════════════════

takeaway:
  main_contribution:
    one_sentence: |
      We provide the first SBERT-based empirical measurement of tier-scalable semantic
      accommodation in human-AI RLHF conversations, demonstrating that RLHF quality
      propagates bidirectionally — shaping human semantic behavior at the population
      level — while falsifying within-conversation quality discrimination as the mechanism.
    why_significant: |
      Opens a new measurement paradigm for studying human behavioral adaptation to
      AI quality. Connects RLHF research to communication accommodation theory (CAT).
      Raises new questions about whether alignment optimization should account for
      downstream effects on human communication.

  implications:
    for_field: |
      Alignment research should consider bidirectional effects: RLHF quality shapes
      not only AI outputs but human communicative behavior. The C_sem metric provides
      a novel, training-free measurement tool for studying this. Power asymmetry
      theory from human-human sociolinguistics extends to human-AI embedding space.
    for_practice: |
      RLHF practitioners optimizing for conversation quality should be aware that
      higher-tier training affects the full conversational ecology — human follow-up
      patterns change. This may be relevant for detecting model-induced behavioral
      shifts in deployed AI systems.
    conceptual_contribution: |
      Separation of population-level accommodation (distributional mechanism) from
      within-conversation quality discrimination (perceptual mechanism): these are
      empirically distinct and behave differently. The H-M3 reversal (rejected > chosen)
      is a novel empirical finding with implications for understanding RLHF data
      annotation quality and what "quality" means for conversational continuity.

  future_possibilities:
    immediate_extensions: |
      1. Within-user longitudinal study using LMSYS Chatbot Arena with session IDs
      2. Cross-dataset replication on WildChat, LMSYS for diverse AI conversation types
      3. Length-controlled H-M3 replication to isolate verbosity from quality effects
    longer_term_vision: |
      A full bidirectional alignment framework that jointly optimizes AI response quality
      AND the expected accommodation response from human partners — treating the
      conversation as a coupled system rather than a one-sided quality optimization problem.
    open_questions: |
      1. Does within-user semantic accommodation trajectory exist?
      2. Is the H-M3 reversal robust to length control?
      3. Does the distributional mechanism generalize beyond helpfulness conversations?
      4. What reward model features (if not politeness/style) correlate with CSEM asymmetry?

