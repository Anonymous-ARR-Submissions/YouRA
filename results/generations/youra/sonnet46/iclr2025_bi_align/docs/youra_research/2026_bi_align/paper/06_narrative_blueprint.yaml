# PART 5: SECTION-LEVEL NARRATIVE GOALS
# ═══════════════════════════════════════════════════════════════════════════════

section_goals:
  abstract:
    narrative_purpose: "Compress the entire story into ~150 words — paradox hook → main findings → significance"
    key_message: |
      Humans exhibit robust tier-scalable semantic accommodation to RLHF-trained AI partners,
      consistent with power asymmetry theory — but the mechanism is distributional, not
      within-conversation quality discrimination.
    structure_notes: |
      - Sentence 1-2: Paradox hook (accommodation confirmed, mechanism surprising)
      - Sentence 3: Our approach (C_sem = SBERT-based semantic accommodation measure)
      - Sentence 4-5: Main quantitative results (C_sem=0.329, J-T p=0.001, d=1.998, all 9 cells)
      - Sentence 6: Key falsification (H-M3: Δ < 0) + significance
    avoid:
      - "Citations in abstract"
      - "Vague claims without numbers"
      - "Undefined acronyms (C_sem, RLHF must be spelled out)"

  introduction:
    narrative_purpose: "Paradox hook → Problem (bidirectional alignment gap) → Insight preview → Contributions"
    hook_strategy: |
      Open with the empirical result and the paradox simultaneously:
      "When humans interact with better AI assistants, they talk more like them — but
      not in the way alignment theory predicts."
      This immediately signals: (a) positive finding confirmed, (b) mechanism is surprising.
    problem_escalation: |
      1. Surface: RLHF aligns AI to humans; but what about humans adapting to AI?
      2. Deeper: Communication accommodation theory predicts bidirectional adaptation;
         has anyone measured this in semantic embedding space for RLHF conversations?
      3. Gap: Zero prior work on SBERT-based semantic accommodation across RLHF tiers;
         and the mechanism (within-conversation vs population-structural) is completely unexamined.
    insight_preview: |
      Hint that accommodation exists (d=1.998 vs random, unmissable) and scales with
      tier quality — then introduce the paradox (within-conversation quality discrimination
      fails) as the setup for the population-structural mechanism explanation.
    contributions_framing: |
      Frame contributions as natural outcomes of the research question:
      "(1) We introduce C_sem, a training-free SBERT-based measure of semantic accommodation
      in RLHF conversations with three-level partner-specificity controls.
      (2) We demonstrate tier-scalable accommodation (J-T p=0.001, robust across 3 models).
      (3) We characterize directional asymmetry (all 9 tier×model cells confirmed).
      (4) We falsify within-conversation quality discrimination as the mechanism,
      proposing a population-structural alternative."
    transition_to_related_work: |
      "These findings connect to literature on communication accommodation theory,
      power asymmetry in language, and RLHF evaluation methods — each of which provides
      partial context but none of which has examined the full phenomenon we describe."

  related_work:
    narrative_purpose: |
      Build the argument that existing work is insufficient → justify our approach.
      Four clusters: (1) CAT/language accommodation, (2) RLHF and alignment quality,
      (3) Human-AI interaction and style adaptation, (4) SBERT and semantic similarity.
    positioning_strategy: |
      Show that each cluster of prior work gets part of the picture but not all:
      - CAT literature: function-word coordination, not semantic embedding space
      - RLHF evaluation: measures AI quality, not human behavioral consequences
      - Human-AI adaptation: word-level style matching, not RLHF tier structure
      - SBERT: validated tool for semantic similarity, not applied to accommodation
      Our contribution: first to combine all four.

    key_comparison_points:
      - area: "Communication Accommodation Theory (CAT)"
        limitation_to_highlight: |
          Danescu-Niculescu-Mizil et al. 2011 (Echoes of Power) establishes function-word
          coordination as the accommodation metric. Extension to semantic embedding space
          for human-AI conversations is novel; SBERT captures richer semantic alignment.
        how_we_differ: |
          We extend C_m (function-word coordination) to C_sem (semantic accommodation)
          and apply it to human-AI RLHF conversations stratified by quality tier.

      - area: "RLHF Training and Evaluation"
        limitation_to_highlight: |
          Bai et al. 2022 (HH-RLHF), Ouyang et al. 2022 (InstructGPT): focus on
          AI response quality as the dependent variable. Human conversational response
          to varying AI quality is not studied.
        how_we_differ: |
          We use RLHF tier as the independent variable to study human semantic behavior
          as the dependent variable — inverting the standard RLHF evaluation paradigm.

      - area: "Human-AI Style Adaptation"
        limitation_to_highlight: |
          Chang & Wang 2025: word-level style adaptation confirmed bidirectionally,
          but at lexical/surface level and without RLHF tier structure.
        how_we_differ: |
          We work in semantic embedding space (SBERT) and use RLHF quality tiers
          as the driver of accommodation strength, providing richer measurement and
          a quality-level causal variable.

      - area: "Bidirectional Alignment Frameworks"
        limitation_to_highlight: |
          Shen et al. 2025 (BiAlign workshop): establishes the bidirectional alignment
          concept motivationally but lacks empirical measurement of human-side adaptation.
        how_we_differ: |
          We provide the first empirical measurement of human semantic accommodation
          to AI quality using the C_sem metric with partner-specificity controls.

    papers_to_discuss:
      - "Danescu-Niculescu-Mizil et al. 2011 (Echoes of Power) — primary CAT reference"
      - "Bai et al. 2022 (HH-RLHF) — dataset and tier structure"
      - "Reimers & Gurevych 2019 (SBERT) — measurement tool validation"
      - "Ouyang et al. 2022 (InstructGPT) — RLHF methodology context"
      - "Chang & Wang 2025 — closest prior work on human-AI adaptation"
      - "Shen et al. 2025 (BiAlign) — bidirectional alignment motivation"
      - "Giles 2008 (CAT theory) — theoretical foundation"
      - "Grice 1975 (Cooperative Principle) — underlying conversational theory"

  methodology:
    narrative_purpose: |
      Explain WHY this design solves the problem. Key connection:
      C_sem = E[cos(H_{t+1}, A_t)] - E[cos(H_{t+1}, A_t^matched-shuffle)]
      is explicitly designed to measure accommodation above topical coherence.
    connection_to_insight: |
      The partner-shuffle baseline (subtracting cosine similarity to a topic-matched
      random AI turn) directly operationalizes our key distinction: interaction-specific
      accommodation vs general topical coherence. This design is motivated by the
      insight that we need to measure real accommodation, not just semantic similarity.

    key_design_decisions:
      - decision: "SBERT + cosine similarity for C_sem measurement"
        rationale: |
          SBERT (Reimers & Gurevych 2019) produces semantically meaningful sentence
          embeddings at inference time (no training required). Cosine similarity
          captures semantic alignment in embedding space. Three SBERT models used
          for robustness checking (MiniLM, paraphrase-MiniLM, MPNet).
        alternatives_considered: "Word-level coordination (C_m): too surface-level; contextualized LM probes: require training"

      - decision: "Three-level partner-specificity control hierarchy (actual > topic-matched KNN-5 > random)"
        rationale: |
          Must disentangle interaction-specific accommodation from general topical
          coherence. KNN K=5 topic-matched baseline provides stricter control than
          random; three-level hierarchy shows monotonic effect for different baseline levels.
        alternatives_considered: "TF-IDF topic matching: less principled; sentence-level clustering: higher compute"

      - decision: "IPW covariate correction when KS p < 0.0001 detected"
        rationale: |
          HH-RLHF tiers differ in topic distribution beyond RLHF quality.
          IPW correction adjusts for distributional shift, preserving causal
          interpretation of tier monotonicity finding.
        alternatives_considered: "Propensity score matching: reduces sample size; stratified subsampling: biased tier comparison"

      - decision: "Jonckheere-Terpstra test for monotonicity with manual permutation fallback"
        rationale: |
          J-T is the correct nonparametric test for ordered alternatives.
          Manual permutation fallback addresses scipy 1.15.3 API compatibility.
        alternatives_considered: "ANOVA: assumes normality; Spearman correlation: ignores ordering structure"

      - decision: "Within-prompt Δ probe for mechanism test (h-m3)"
        rationale: |
          The HH-RLHF chosen/rejected structure provides a unique natural experiment:
          same prompt, same human turn, two AI response quality levels. Δ measures
          whether within-conversation quality signal drives accommodation.
        alternatives_considered: "Between-tier comparison only: cannot isolate mechanism"

    intuition_building: |
      Figure 1 (partner-specificity) should appear here. Walk through C_sem
      computation with a concrete example: H turn → A actual vs A random →
      cosine similarity difference = accommodation above chance.

    technical_depth_balance: |
      Main text: C_sem definition, partner-specificity hierarchy, IPW trigger, J-T test.
      Appendix: Full mathematical details, bootstrap CI methodology, KNN implementation.

  experiments:
    narrative_purpose: |
      Design experiments that test our specific claims in a layered fashion:
      existence → scaling → directionality → mechanism. Each experiment answers
      one focused question.
    experimental_questions:
      - question: "Does C_sem^H←A exist and exceed partner-specificity controls? (h-e1)"
        experiment: "Compute C_sem vs KNN topic-matched and random baselines; n=155,362 pairs"
        expected_outcome: "C_sem > 0; d ≥ 0.1 (actual vs topic-matched); d ≥ 0.1 (actual vs random)"

      - question: "Does C_sem^H←A scale monotonically with RLHF tier quality? (h-m1)"
        experiment: |
          Jonckheere-Terpstra test across T1/T2/T3; IPW correction for distributional shifts;
          3 SBERT models for robustness
        expected_outcome: "J-T p < 0.05; d ≥ 0.1 T1→T3; ≥2/3 models confirm"

      - question: "Is C_sem^H←A > C_sem^A←H (directional asymmetry)? (h-m2)"
        experiment: |
          Compute bidirectional C_sem: H_t+1 relative to A_t (H←A) and A_t relative
          to H_t-1 (A←H); Mann-Whitney per tier×model cell
        expected_outcome: "All ≥2/3 tiers and ≥2/3 models show H←A > A←H; p < 0.05"

      - question: "Does within-conversation quality discrimination drive accommodation? (h-m3)"
        experiment: |
          Compute Δ = cos(H_next, A_chosen) − cos(H_next, A_rejected) within same prompt;
          three operationalizations (raw, length-matched, prompt-projected)
        expected_outcome: |
          IF mechanism is perceptual: Δ > 0 (chosen response predicts H_next better)
          ACTUAL RESULT: Δ < 0 in 25/27 cells — mechanism falsified

      - question: "Does PM-proxy mediate CSEM asymmetry? (h-m4)"
        experiment: |
          OLS regression: C_sem ~ PM_proxy + surface_features + tier; HC3 robust SE;
          gate: β_PM > 0, p < 0.05 in ≥2/3 models
        expected_outcome: |
          IF mediation holds: β_PM > 0 and significant
          ACTUAL RESULT: β_PM ≈ 0, p ≈ 0.99 — mediation mechanism not present

    baseline_rationale: |
      Baselines are operationalized within the dataset itself:
      - Random AI turn from same tier: conservative null baseline (no accommodation signal)
      - KNN K=5 topic-matched AI turn: strict topic control (accommodation above content coherence)
      - A_t^matched-shuffle: topic-matched partner-shuffle baseline for C_sem computation
      No external baseline systems needed — this is a measurement study, not a model comparison.

    dataset_rationale: |
      Anthropic HH-RLHF (Bai et al. 2022): three helpfulness tiers (helpful_base T1,
      helpful_rejection_sampling T2, helpful_online T3) provide a natural quality
      gradient. 155,362 unique conversation pairs across three tiers. Chosen/rejected
      structure enables h-m3 within-prompt mechanism test.

    metric_rationale: |
      Primary: C_sem (cosine similarity in SBERT space, partner-shuffle subtracted)
      — direct operationalization of semantic accommodation
      Secondary: Cohen's d for effect size; Mann-Whitney U for nonparametric pairwise tests;
      Jonckheere-Terpstra for ordered monotonicity; bootstrap CI for uncertainty quantification
      All metrics are standard in psycholinguistics and NLP evaluation literature.

  results:
    narrative_purpose: |
      Tell the evidence story in four acts: existence → scaling → asymmetry → mechanism falsification.
      Positive findings first; paradox and falsification framed as scientific contribution, not failure.
    main_result_highlight: |
      The headline result is the combination: robust tier-scalable accommodation confirmed
      (C_sem=0.329, J-T p=0.001, all 9 cells) PLUS mechanism falsification (Δ<0, d up to −0.74).
      The paradox makes the positive findings more scientifically interesting.

    result_presentation_order:
      - result: "Partner-specificity (Fig 1): C_sem=0.329, d=1.998 vs random, d=0.417 vs topic-matched"
        purpose: "Establish existence first — unmistakable large effect rules out artifact concerns"
      - result: "Tier monotonicity (Fig 2): J-T p=0.001, d=0.18–0.25 across 3 SBERT models"
        purpose: "Show RLHF quality gradient maps onto accommodation — core positive claim"
      - result: "Directional asymmetry (Fig 3): all 9 tier×model cells, d=0.13–0.41"
        purpose: "Establish power asymmetry extension — humans accommodate more to AI"
      - result: "H-M3 paradox (Fig 4): Δ < 0 in 25/27 cells, d up to −0.74"
        purpose: "Introduce the mechanism falsification — within-conversation quality discrimination fails"
      - result: "IPW robustness (Fig 5): monotonicity preserved after covariate correction"
        purpose: "Address tier confound concern — methodology is principled"
      - result: "H-M4 null result (Fig 6): β_PM ≈ 0, p ≈ 0.99"
        purpose: "Rule out content-based mediation — mechanism is structural, not content-driven"

    surprising_result_handling: |
      H-M3 should be presented as a key finding, not a failure:
      "Contrary to our initial hypothesis, H_next is more similar to the rejected
      response (Δ < 0 in 25/27 cells). We interpret this as reflecting the verbosity
      and topical breadth of rejected responses rather than reversed quality perception."
      Frame the falsification as advancing understanding, not contradicting the study.

  discussion:
    narrative_purpose: |
      Synthesize: what does the population-structural mechanism mean?
      Acknowledge honest limitations. Connect to broader bidirectional alignment vision.
    key_findings_interpretation: |
      The core insight is the separation of population-level accommodation (real and robust)
      from within-conversation quality discrimination (absent or reversed). RLHF quality
      shapes the semantic ecology of conversations — the overall distribution of AI responses
      in a higher-tier setting creates an environment where humans naturally exhibit stronger
      semantic alignment, even if they cannot perceive individual response quality within
      a single exchange. This is analogous to environmental language acquisition (speakers
      in richer linguistic environments develop richer language) rather than explicit imitation.

    honest_limitations:
      - limitation: "Cross-sectional design — cannot distinguish accommodation from user self-selection"
        why_acceptable: "Standard limitation in large-scale observational NLP; population-level findings valid within scope"
        future_mitigation: "LMSYS Chatbot Arena with session IDs enables within-user longitudinal study"

      - limitation: "SBERT conflates topical and stylistic accommodation in C_sem"
        why_acceptable: "Three-level control hierarchy (d=0.417 above topic-matched) provides conservative lower bound"
        future_mitigation: "Style-factored embeddings (STRAP) for topic-free accommodation measure"

      - limitation: "HH-RLHF tier confound: tiers differ in content distribution beyond RLHF quality"
        why_acceptable: "IPW correction applied; three SBERT models confirm monotonicity robustly"
        future_mitigation: "Controlled generation experiments with same prompt, different RLHF quality levels"

      - limitation: "Proximal mechanism unresolved after H-M3 and H-M4 falsifications"
        why_acceptable: "Population-level findings empirically valid independently; mechanism falsification is a contribution"
        future_mitigation: "Reward model scores as PM proxy; NLI quality analysis; length-controlled h-m3 replication"

    broader_impact_statement: |
      This work demonstrates that RLHF quality has bidirectional effects — shaping not only
      AI output quality but human conversational semantic behavior. Practitioners should consider
      that deploying higher-quality RLHF systems may induce systematic changes in human
      communication patterns. These effects are measurable at scale using training-free
      inference tools (SBERT), enabling ongoing monitoring of human-AI conversational dynamics.

  conclusion:
    narrative_purpose: "Callback to opening paradox; synthesize contributions; open future vision"
    callback_to_hook: |
      Return to the opening: "When humans interact with better AI assistants, they talk
      more like them — not through within-conversation quality perception, but through
      the accumulated semantic richness of the conversational environment." Close the loop
      on the paradox: the finding that humans accommodate MORE to the rejected response
      (H-M3) deepens our understanding of what accommodation actually measures in RLHF contexts.
    memorable_ending: |
      "The H-M3 reversal suggests that RLHF's notion of 'quality' and accommodation-relevant
      'quality' are different things — a distinction that may matter for designing AI systems
      that genuinely improve human communication, not just score higher on preference ratings."
    future_work_vision: |
      The C_sem methodology opens a new measurement paradigm for studying bidirectional
      adaptation at scale. The separation of population-structural vs within-conversation
      mechanisms should inform future RLHF designs that explicitly account for downstream
      human behavioral effects. We call for joint optimization of the conversational system —
      AI quality + human accommodation + interaction-level dynamics — as the true objective
      of alignment.

