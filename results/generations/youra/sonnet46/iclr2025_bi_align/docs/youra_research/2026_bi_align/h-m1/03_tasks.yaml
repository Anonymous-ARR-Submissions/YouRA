  - id: task-014
    epic: A-4 subtask
    title: "L-4-2: Implement bonferroni_mannwhitney()"
    description: |
      Implement bonferroni_mannwhitney(tier_results, tier_order, n_bootstrap=1000, seed=42):
        BONFERRONI_ALPHA = 0.05 / 3  # = 0.0167
        pairs = [(T1,T2), (T2,T3), (T1,T3)]
        For each pair:
          mw = scipy.stats.mannwhitneyu(arr_a, arr_b, alternative='two-sided')
          d, d_ci = bootstrap_cohen_d(arr_a, arr_b, n_bootstrap, seed)
          bonferroni_significant = mw.pvalue < BONFERRONI_ALPHA
        Returns {f"{t1}_vs_{t2}": {mw_statistic, mw_pvalue, bonferroni_significant,
                                    cohen_d, cohen_d_ci}}
    feature_tag: evaluation
    priority: 44
    source_document: 03_logic.md
    complexity: null
    test_requirements: Covered by task-005.
    reference_files:
