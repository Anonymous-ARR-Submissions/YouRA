      Extend h-e1 accommodation.py to compute C_sem per tier for one SBERT model.
      Add compute_tier_csem_matrix(tier_pairs, embedder, controls_fn_random,
                                    controls_fn_topic, seed=42) -> dict[str, dict]:
        For each tier in TIER_ORDER:
          1. embedder.encode_tier(h_next, prefix="h", tier=tier, n_pairs=N)
          2. embedder.encode_tier(a_actual, prefix="a", tier=tier, n_pairs=N)
          3. embedder.encode_tier(h_prompt, prefix="p", tier=tier, n_pairs=N)
          4. a_random = controls_fn_random(a_emb, seed=seed)
          5. a_topic = controls_fn_topic(p_emb, a_emb)
          6. cos_dict = compute_cosine_similarities(h_emb, a_emb, a_topic, a_random)
          7. c_sem = compute_c_sem(cos_dict['cos_actual'], cos_dict['cos_random'])
          8. Log: f"Tier {tier} C_sem computed: {c_sem:.4f}" (REQUIRED for FR-E3)
        Returns {tier: {c_sem, cos_actual_mean, cos_random_mean, raw_cos_actual,
                        raw_cos_random, n_pairs}}
      CRITICAL: raw_cos_actual/raw_cos_random are full arrays (not means) for J-T test
    feature_tag: model
    priority: 97
