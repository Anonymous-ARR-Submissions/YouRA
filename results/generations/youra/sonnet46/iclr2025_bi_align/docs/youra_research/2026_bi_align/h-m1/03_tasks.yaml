    title: Extend statistics.py with J-T test and Bonferroni Mann-Whitney
    description: |
      Extend h-e1 statistics.py with monotonicity test battery.
      Add jonckheere_terpstra_test(tier_results, tier_order) -> dict:
        - Extracts raw_cos_actual arrays per tier in tier_order
        - Calls scipy.stats.jonckheere_terpstra(*ordered_cos, alternative='increasing')
        - Returns {'jt_statistic': float, 'jt_pvalue': float}
        - CRITICAL: use raw cosine arrays, NOT OLS residuals (zero mean by construction)
      Add bonferroni_mannwhitney(tier_results, tier_order, n_bootstrap=1000, seed=42):
        - 3 pairs: (T1,T2), (T2,T3), (T1,T3)
        - scipy.stats.mannwhitneyu(alternative='two-sided') per pair
        - Bonferroni threshold: alpha/3 = 0.0167
        - bootstrap_cohen_d (existing) per pair
        - Returns {pair_key: {mw_statistic, mw_pvalue, bonferroni_significant, cohen_d, cohen_d_ci}}
      Add bootstrap_cohens_d_all_pairs(tier_results, models_results, n=1000, seed=42):
        - All tier pairs × all models
    feature_tag: evaluation
