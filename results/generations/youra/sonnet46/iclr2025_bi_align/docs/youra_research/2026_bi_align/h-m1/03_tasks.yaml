  - id: task-018
    epic: A-5 subtask
    title: "L-5-1: Implement ks_test_tier_distributions() with PCA-1 projection"
    description: |
      Implement ks_test_tier_distributions(tier_prompt_embeddings, tier_order):
        PCA projection: reduce each tier's prompt embeddings to 1D (first component)
          pca = sklearn.decomposition.PCA(n_components=1)
          pca.fit(np.vstack([tier_prompt_embeddings[t] for t in tier_order]))
          proj = {t: pca.transform(emb).ravel() for t, emb in tier_prompt_embeddings.items()}
        3 pair KS tests: ks_2samp(proj[t1], proj[t2]) for all pairs
        ipw_triggered = any(ks_result.pvalue < 0.05)
        Returns {pair_key: {ks_statistic, ks_pvalue, ipw_triggered}}
    feature_tag: evaluation
