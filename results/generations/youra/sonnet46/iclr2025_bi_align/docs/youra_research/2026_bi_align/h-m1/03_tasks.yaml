    description: |
      Implement compute_ipw_csem(tier_results, tier_prompt_embeddings) -> dict[str, float]:
        Fit logistic regression for each tier vs others (one-vs-rest).
        Propensity score = P(tier=t | prompt_embedding).
        IPW weight per sample = 1 / P(tier=t | x); truncate at 99th percentile.
        Recompute C_sem: weighted_mean(cos_actual) - weighted_mean(cos_random).
        Returns {tier_name: ipw_c_sem}.
        Only called when any KS p < 0.05 (triggered flag from ks_test results).
