# ═══════════════════════════════════════════════════════════════
# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "SBERT (all-MiniLM-L6-v2) produces semantically meaningful sentence embeddings via mean-pooling siamese network; cosine similarity is a valid semantic comparison metric"
      status: "BUILD_ON"
      evidence: "Reimers & Gurevych 2019 — 16,616 citations; validated across STS benchmarks; 5 seconds vs 65 hours for 10K pairs"
    - claim: "Lower-power interlocutors accommodate linguistically more to higher-power partners (function-word coordination)"
      status: "BUILD_ON"
      evidence: "Danescu-Niculescu-Mizil et al. 2011 (Echoes of Power) — Wikipedia admins and Supreme Court lawyers; C_m(b,a) framework"
    - claim: "HH-RLHF dataset tier structure (helpful_base → helpful_rejection_sampling → helpful_online) represents an RLHF quality gradient"
      status: "BUILD_ON"
      evidence: "Bai et al. 2022 — SFT → RM → PPO pipeline; 273,617 conversation turns; chosen/rejected pairs encoded"
    - claim: "Human accommodation to AI exists at word-level style across cultures"
      status: "BUILD_ON"
      evidence: "Chang & Wang 2025 — bidirectional word-level style adaptation confirmed; gap = RLHF tiers + semantic embeddings"
    - claim: "Simple lexical surface features (word_count, hapax_ratio) of HUMAN turns do NOT show tier-stratification at d∈[0.1,0.4]"
      status: "BUILD_ON"
      evidence: "Three prior FAIL attempts: d_human=0.036 (Attempt 3), max d=0.136 on PM-features (Attempt 2), keyword agency markers failed (Attempt 1)"
    - claim: "SBERT semantic embedding-based tier-stratified accommodation has NOT been measured"
      status: "PROVE_NEW"
      evidence: "Zero papers found in literature review; this is the primary research gap"
    - claim: "Directional asymmetry of human vs. AI semantic accommodation across RLHF tiers is unknown"
      status: "PROVE_NEW"
      evidence: "No prior work on C_sem^(H←A) vs C_sem^(A←H) asymmetry in RLHF context"
    - claim: "Within-tier PM-score quality predicts human semantic accommodation above formatting controls"
      status: "PROVE_NEW"
      evidence: "No prior measurement; requires mediation regression"
  scope_reduction_percentage: 43  # 3 PROVE_NEW / 7 total claims
  phase2b_4_instructions: |
    BUILD_ON claims (facts 1-5) are established and should not require re-verification.
    Experimental design should focus on PROVE_NEW claims (6-8).
    Hypothesis existence test targets claim 6; asymmetry test targets claim 7; quality mediation targets claim 8.
    Prior failure constraints: semantic embeddings mandatory, d∈[0.1,0.4] target, CPU-only, no training.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-SemAccom-v1"
  confidence_level: 0.72
  core_hypothesis_statement: |
    Under conditions where human-AI conversations in the HH-RLHF dataset are stratified by RLHF
    alignment tier (helpful_base → helpful_rejection_sampling → helpful_online), if RLHF tier
    quality increases, then the baseline-adjusted semantic similarity between human follow-up
    turns and their preceding AI partner turns (C_sem = E[cos(H_{t+1}, A_t)] - E[cos(H_{t+1},
    A_t^matched-shuffle)]) will increase monotonically with tier AND the human→AI accommodation
    coefficient will exceed the AI→human coefficient (directional asymmetry), because RLHF-
    optimized AI responses carry higher epistemic uptake signals that trigger greater adaptive
    semantic alignment in human responses, analogous to lower-power interlocutors accommodating
    more to higher-status partners [Danescu-Niculescu-Mizil et al., 2011].
  alternative_hypothesis_h0: |
    There is no significant difference in baseline-adjusted semantic similarity (C_sem) between
    human and AI turns across HH-RLHF alignment tiers; or the H→AI and AI→H accommodation
    coefficients are equal (no directional asymmetry). Formally: C_sem^(H←A) ≤ C_sem^(A←H)
    and no monotonic tier ordering at d ≥ 0.1.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "RLHF alignment tier"
      type: "categorical"
      operationalization: "HH-RLHF dataset split: helpful_base (rank 1), helpful_rejection_sampling (rank 2), helpful_online (rank 3)"
      levels: ["helpful_base", "helpful_rejection_sampling", "helpful_online"]
    - name: "PM-score quality (within-tier)"
      type: "categorical"
      operationalization: "HH-RLHF chosen vs. rejected response pairs within identical prompts; chosen = higher PM score"
      levels: ["chosen", "rejected"]
    - name: "Directionality"
      type: "categorical"
      operationalization: "H→AI (human accommodates to AI) vs AI→H (AI accommodates to human) accommodation direction"
      levels: ["H_to_AI", "AI_to_H"]
  dependent:
    - name: "C_sem (baseline-adjusted semantic accommodation)"
      type: "continuous"
      operationalization: "E[cos(SBERT(H_{t+1}), SBERT(A_t))] - E[cos(SBERT(H_{t+1}), SBERT(A_t^matched-shuffle))]; primary accommodation metric"
      primary: true
    - name: "Partner-specificity gap"
      type: "continuous"
      operationalization: "cos(H_next, A_actual) - cos(H_next, A_topic-matched); confirms interaction-specificity vs topical coherence"
      primary: false
    - name: "Within-tier quality Δ"
      type: "continuous"
      operationalization: "cos(H_next, A_chosen) - cos(H_next, A_rejected), controlling for length and prompt embedding"
      primary: false
  controlled:
    - name: "Response length"
      operationalization: "Controlled via length-residualized embeddings; length-matched truncation for chosen/rejected Δ"
    - name: "Lexical overlap"
      operationalization: "Residualized in embedding similarity regression; type-token ratio covariate"
    - name: "Prompt embedding distribution"
      operationalization: "KS / energy distance test across tiers; inverse-probability weighting if distributions differ"
    - name: "Topical coherence"
      operationalization: "K-nearest-neighbor topic-matched control (A_topic-matched) for baseline subtraction"
    - name: "Formatting signals"
      operationalization: "Mediation regression controls for bullet structure, politeness markers, syntactic complexity"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "RLHF training (PPO against reward model) produces AI responses with higher clarity, structure, and normative appropriateness at higher tiers [Bai et al., 2022; Ouyang et al., 2022]"
      evidence: "HH-RLHF tier structure: iterative PPO with weekly updates; chosen responses systematically preferred by human raters; InstructGPT 85% preferred over GPT-3 baseline"
      falsifier: "If tier responses show no systematic quality difference on PM scores or human ratings"
    - step: 2
      description: "Human interlocutors perceive higher-tier AI responses as carrying higher epistemic reliability (perceived epistemic authority / uptake sensitivity)"
      evidence: "Theoretical grounding in CAT [Giles 1991]; empirically supported in power asymmetry studies [Danescu 2011]; assumed — requires mediation testing"
      falsifier: "If PM score loses predictive power for C_sem after controlling for response length, structure, and politeness markers"
    - step: 3
      description: "Perceived epistemic reliability triggers greater adaptive semantic alignment in human follow-up turns — human embeddings shift toward AI embedding space"
      evidence: "CAT predicts convergence with high-status/high-quality partners; Chang & Wang 2025 showed word-level bidirectional adaptation; SBERT captures this at semantic level"
      falsifier: "If partner-specificity gap (actual > topic-matched) is non-significant; if C_sem does not differ from zero"
    - step: 4
      description: "This effect is asymmetric: human→AI accommodation exceeds AI→human accommodation, and scales monotonically with tier quality"
      evidence: "Power asymmetry framework: lower-power accommodates more [Danescu 2011]; higher-tier AI = more epistemic authority"
      falsifier: "If C_sem^(H←A) ≤ C_sem^(A←H); if monotonic ordering fails across tiers; if higher-tier AI shows equal or greater AI→H accommodation"
  key_tension: "Whether RLHF-encoded quality is perceived as 'epistemic authority' (driving asymmetric accommodation) vs. 'contextual clarity' (driving symmetric mutual coherence); resolution requires PM mediation regression controlling for surface features"
  evidence_summary: |
    Strong theoretical precedent (CAT, Danescu 2011 power asymmetry framework, Chang & Wang 2025
    bidirectional adaptation at word-level). Mechanism step 2 (perceived epistemic reliability)
    is the weakest link — assumed rather than directly measured. All other steps have direct
    empirical support. Mediation regression of C_sem on PM score controlling for formatting is
    the critical test of the mechanism's specificity.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "SBERT cosine similarity of full-utterance embeddings is sensitive to accommodation-relevant semantic shifts, not only topical similarity"
    supporting_evidence: "SBERT validated for STS tasks; element-wise difference |u-v| is most discriminative [Reimers & Gurevych 2019]; three-level control (actual > topic-matched > random) tests this assumption directly"
    consequence_if_violated: "C_sem measures topical coherence rather than accommodation; partner-specificity gap disappears; study reports null result for semantic accommodation"
  - id: "A2"
    assumption: "HH-RLHF tiers attract comparable user populations with similar intent distributions"
    supporting_evidence: "All three tiers are helpfulness-oriented; same platform and annotation protocol [Bai et al. 2022]; but users may differ — requires KS test on prompt embedding distributions"
    consequence_if_violated: "Tier effect confounded by user selection bias; requires matching or weighting; claim narrows to 'conditional on matched prompt strata'"
  - id: "A3"
    assumption: "The chosen/rejected pair structure in HH-RLHF provides prompt-controlled quality variation (same prompt, different PM-score responses)"
    supporting_evidence: "Directly encoded in HH-RLHF dataset format; confirmed in Bai et al. 2022 and Ouyang et al. 2022 RM training data structure"
    consequence_if_violated: "Within-tier Δ design fails; chosen and rejected responses differ on prompt in addition to quality — requires verification before analysis"
  - id: "A4"
    assumption: "Accommodation operates at the semantic/meaning level (not just surface stylistic level) for human-AI interactions"
    supporting_evidence: "Three prior failures on surface features (d=0.036, d=0.136); SBERT captures meaning-level representations; CAT theory predicts meaning-level convergence"
    consequence_if_violated: "If SBERT cos_sim also fails (d < 0.1), the semantic accommodation hypothesis is refuted; ROUTE_TO_0 again"
  - id: "A5"
    assumption: "N_pairs ≥ 1000 per tier for within-tier chosen/rejected Δ test (statistical power requirement)"
    supporting_evidence: "HH-RLHF contains paired conversations; total 273,617 turns; specific N_pairs must be verified empirically before committing to this prediction"
    consequence_if_violated: "Drop within-tier Δ as a pre-registered prediction; retain as exploratory; restrict to tier-level asymmetry predictions (P1, P2)"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    HH-RLHF helpfulness tier conversations (helpful_base, helpful_rejection_sampling, helpful_online).
    Population-level (tier-aggregate) accommodation measurement.
    First-turn and multi-turn H→A pairs within the same conversation.
    Pre-trained SBERT models: all-MiniLM-L6-v2 (primary), paraphrase-MiniLM-L6-v2, all-mpnet-base-v2 (robustness).
    CPU-only inference (no model training or fine-tuning).
  does_not_apply_to: |
    Individual-level longitudinal accommodation trajectories (requires within-user tracking; HH-RLHF lacks user IDs).
    Causal claims about learning within a single session (cross-sectional design only).
    HH-RLHF harmlessness split (out of scope for this study).
    Cross-dataset generalization (LMSYS, WildChat) — these are future work.
    Annotation-based or human-labeled accommodation measures.
    Keyword/surface lexical features (proven insufficient in three prior attempts).
  known_limitations: |
    Cross-sectional design cannot establish within-user causal accommodation trajectories.
    Psychological mechanism ("epistemic uptake sensitivity") is assumed, not directly measured.
    HH-RLHF conversations are structured helpfulness dialogues; results may not generalize to
    harm-focused or open-ended conversation types.
    SBERT embedding geometry encodes both content and style; baseline subtraction controls for
    topical persistence but may not fully separate them.
    Wikipedia admin counterexample [Danescu 2011] shows power asymmetry → accommodation is empirically
    complex; H-SemAccom-v1 must handle non-simple asymmetry patterns.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: |
      Baseline-adjusted human semantic accommodation to AI (C_sem^H←A) is greater than
      AI accommodation to human (C_sem^A←H), and this directional asymmetry increases
      monotonically across RLHF tiers (helpful_base → helpful_rejection_sampling → helpful_online),
      with Cohen's d ≥ 0.1 for the primary tier-level comparison.
    test_method: |
      Compute C_sem = E[cos(SBERT(H_{t+1}), SBERT(A_t))] - E[cos(SBERT(H_{t+1}), A_t^matched-shuffle)]
      for both H→AI and AI→H directions across all three tiers.
      Test: Mann-Whitney U + Jonckheere-Terpstra for monotonicity + bootstrap Cohen's d (n=1000, seed=42).
      Multi-model: replicate with all-MiniLM-L6-v2, paraphrase-MiniLM-L6-v2, all-mpnet-base-v2.
    success_criterion: "d ≥ 0.1 for tier contrast; C_sem^H←A > C_sem^A←H; J-T p < 0.05; pattern consistent across ≥2 of 3 SBERT models"
    falsification: "d < 0.1 OR C_sem^H←A ≤ C_sem^A←H OR J-T non-significant OR inconsistent direction across SBERT models"
  - id: "P2"
    primary: false
    statement: |
      Human follow-up turns show greater semantic similarity to their actual AI partner (A_actual)
      than to a topic-matched AI turn from a different conversation (A_topic-matched), which in
      turn exceeds similarity to a random AI turn (A_random): cos(H_next, A_actual) > cos(H_next,
      A_topic-matched) > cos(H_next, A_random), with d ≥ 0.1 between adjacent levels.
    test_method: |
      For each H_next: (a) compute cos with A_actual; (b) find K=5 nearest-neighbor AI turns
      by prompt embedding from different conversations in same tier; (c) random shuffled A turn.
      Compute pairwise Mann-Whitney + Cohen's d between levels. Test partner-specificity as
      confirmation that C_sem is not just topical coherence.
    success_criterion: "Three-way ordered inequality holds with d ≥ 0.1 between actual and topic-matched; statistically significant pairwise differences"
    falsification: "cos(H_next, A_actual) ≈ cos(H_next, A_topic-matched) within d < 0.1 → C_sem measures topic persistence, not accommodation"
  - id: "P3"
    primary: false
    statement: |
      Within the same prompt (chosen/rejected pairs), human follow-up turns show higher semantic
      similarity to higher-PM-score AI responses (chosen) than to lower-PM-score responses (rejected):
      Δ = cos(H_next, A_chosen) - cos(H_next, A_rejected) > 0, surviving length-control and
      prompt-projection robustness checks. N_pairs ≥ 1000 per tier required.
    test_method: |
      Restrict to HH-RLHF paired conversations (same prompt, chosen + rejected response).
      Compute Δ three ways: (a) raw cosine, (b) after length-matched truncation of chosen to
      rejected length, (c) after projecting out prompt embedding from both A vectors.
      Verify N_pairs ≥ 1000 per tier before analysis; if insufficient, drop to exploratory.
      Bootstrap CI (n=1000). Linear regression of Δ on PM-score proxy controlling for length,
      bullet structure, politeness markers.
    success_criterion: "E[Δ] > 0 with bootstrap CI lower bound > 0 under ≥2 of 3 length-control operationalizations; PM regression coefficient significant after surface controls"
    falsification: "Δ ≈ 0 under length-matched or prompt-projected operationalizations → quality gradient not isolatable from length artifact; PM drops out after surface-feature controls → mechanism is formatting, not epistemic quality"

