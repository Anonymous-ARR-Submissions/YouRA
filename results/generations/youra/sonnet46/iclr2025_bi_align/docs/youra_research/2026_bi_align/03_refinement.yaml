# SECTION 2: Experimental Setup Selection
# ═══════════════════════════════════════════════════════════════

experimental_setup:
  dataset:
    name: "Anthropic/hh-rlhf (helpfulness splits)"
    type: "standard"
    source: "HuggingFace datasets"
    path: "datasets.load_dataset('Anthropic/hh-rlhf', data_dir='helpful-base|helpful-rejection-sampled|helpful-online')"
    hypothesis_fit: "Three-tier RLHF quality gradient directly operationalizes the IV; chosen/rejected structure provides within-tier quality control; ~273,617 conversation turns provides sufficient N for d ≥ 0.1 detection"
  model:
    name: "all-MiniLM-L6-v2 (primary); paraphrase-MiniLM-L6-v2, all-mpnet-base-v2 (robustness)"
    type: "sentence-transformers (pre-trained, inference-only)"
    source: "HuggingFace model hub / sentence-transformers library"
    hypothesis_fit: "SBERT validated for semantic similarity measurement; CPU-capable (14K sentences/sec); no fine-tuning required; multi-model robustness test rules out geometry artifacts [Reimers & Gurevych 2019]"
  baselines:
    - name: "Topic-matched shuffle baseline (K-NN)"
      method: "K=5 nearest-neighbor AI turns by prompt embedding from different conversations; same tier; controls for topical coherence"
    - name: "True random shuffle baseline"
      method: "Fully shuffled AI turns within tier; traditional coordination baseline [Danescu 2011]"
    - name: "Length-matched truncation (chosen/rejected Δ)"
      method: "Truncate chosen responses to rejected response length via random span sampling"
    - name: "Prompt-projected embeddings"
      method: "Project out prompt embedding from AI turn embeddings before computing cos_sim"
    - name: "Residualized accommodation"
      method: "Regress cos_sim on length, lexical overlap, prompt embedding similarity; compute on residuals"

