# SECTION 3: Novelty & Innovation
# ═══════════════════════════════════════════════════════════════

novelty:
  preserved_novelty: "First semantic embedding-based measurement of human accommodation to RLHF alignment quality; extends CAT coordination framework from function-word to meaning-space; introduces quasi-experimental chosen/rejected design for quality-conditioned accommodation"
  key_innovation: |
    Three simultaneous innovations: (1) semantic-level (SBERT) operationalization of accommodation theory
    in RLHF context; (2) directional asymmetry test (H→AI vs AI→H) in RLHF tier-stratified setting;
    (3) within-prompt PM-quality causal probe using HH-RLHF's chosen/rejected structure.
  differentiation:
    - prior_work: "Danescu-Niculescu-Mizil et al. 2011 (Echoes of Power)"
      difference: "Function-word level → semantic embedding level; human-human Wikipedia/Supreme Court → human-AI RLHF; function-word independence → full semantic content with topic controls"
    - prior_work: "Chang & Wang 2025 (LLM-human bidirectional adaptation)"
      difference: "Word-level style matching across cultures → semantic embedding cosine similarity; no RLHF tier stratification → three-tier quality gradient; no within-tier quality probe"
    - prior_work: "Shen et al. 2024 (BiAlign systematic review)"
      difference: "Conceptual framework → operational measurement; survey of 400+ papers → specific empirical metric; acknowledges gap → fills gap with C_sem"
    - prior_work: "Three prior failed attempts (h-e1, PM-features, H-AgencyRLHF)"
      difference: "Surface lexical / keyword features → semantic embedding space; proven failure modes avoided; same dataset/infrastructure but fundamentally different measurement layer"

