gap_id: "gap-1-sbert-accommodation"
gap_title: "No Semantic Embedding-Based Measurement of Human Accommodation Across RLHF Alignment Tiers"
gap_description: |
  Human accommodation measured only at function-word level (Danescu 2011) and word-level style
  across cultures (Chang & Wang 2025). No study measures SBERT cosine similarity between H→A
  turn pairs stratified by RLHF tier quality. Missing piece: compute cos_sim(SBERT(H_turn(t)),
  SBERT(A_turn(t))) per conversation turn, aggregate by tier, test monotonicity. Target: d ∈ [0.1, 0.4].
  Turn-lag sub-question: cos_sim(SBERT(H(t)), SBERT(A(t-1))) vs random baseline.
  Multi-model robustness: all-MiniLM-L6-v2, paraphrase-MiniLM, mpnet-base-v2.
