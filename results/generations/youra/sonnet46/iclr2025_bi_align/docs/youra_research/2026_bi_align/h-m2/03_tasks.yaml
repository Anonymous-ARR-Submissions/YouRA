      - test_directional_asymmetry_fail() (equal arrays → tiers_passing=0)
      - test_verify_mechanism_activated_m2_all_true()
      - test_check_model_consistency_m2_gate()
    reference_files:
      architecture: "03_architecture.md#A-5"
      logic: "03_logic.md#A-5-Extend-statistics"
      config: null

