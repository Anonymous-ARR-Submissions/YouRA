      3. h-m2 new keys (A_next, H_curr): may be missing — if so, run encoding pass.
      4. For each missing key: use Embedder.encode_tier() with batch_size=256.
         Expected: ~1.5-2h per model if all h-m2 keys missing (3 models x 3 tiers).
      5. After encoding, re-verify all 36 files present before running experiment.
      Log clearly which keys were present vs encoded.
    feature_tag: "data-pipeline"
