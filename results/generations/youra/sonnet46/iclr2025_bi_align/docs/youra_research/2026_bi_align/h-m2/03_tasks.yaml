  # --- SUBTASKS: A-4 (accommodation) — 3 subtasks ----------------------------

  - id: "L-4-1"
    epic: "Extend accommodation"
    title: "L-4-1: Implement per-pair helper functions for both directions"
    description: |
      Implement two per-pair C_sem helper functions in accommodation.py:
      1. compute_h_given_a_csem_array(emb_h_next [N,D], emb_a_curr [N,D],
         shuffle_indices [N,]) -> np.ndarray [N,]
         Formula: cos(H_next, A_curr) - cos(H_next, A_curr[shuffle_H])
      2. compute_a_given_h_csem_array(emb_a_next [N,D], emb_h_curr [N,D],
         shuffle_indices [N,]) -> np.ndarray [N,]
         Formula: cos(A_next, H_curr) - cos(A_next, H_curr[shuffle_A])
      Both use sklearn cosine_similarity row-wise (dot product of L2-normalized vectors).
    feature_tag: "model"
    priority: 49
    source_document: "03_logic.md"
    complexity: null
    test_requirements: |
      - test_h_given_a_shape_and_values()
      - test_a_given_h_shape_and_values()
    reference_files:
