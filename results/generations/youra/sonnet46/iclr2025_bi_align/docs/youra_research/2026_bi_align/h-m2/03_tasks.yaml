    description: |
      Rewrite run_experiment.py as h-m2 orchestrator:
      1. run_single_model(model_cfg, tier_pairs, tier_prompt_embeddings, config) → Dict
         Steps: build Embedder, compute_bidirectional_csem_per_tier(), KS test on A<-H
         distributions + IPW if triggered, test_directional_asymmetry(),
         compute_asymmetry_monotonicity()
      2. run_bidirectional_experiment(config) → Dict
         Main loop: load config, split_by_tier(), encode prompt embeddings,
         3-model loop via run_single_model(), check_model_consistency_m2(),
         verify_mechanism_activated_m2(), generate all 7 figures, save_results()
      3. evaluate_gate_m2(all_model_results) → Dict
         Aggregates: tiers_passing >= 2 AND models_passing >= 2
      4. save_results(results, output_dir) → None
         JSON: experiment_results.json, CSV: asymmetry_summary.csv
      5. main() with argparse: --config config.yaml, --dry-run flag
    feature_tag: "experiment"
    priority: 87
    source_document: "03_architecture.md"
    complexity: 16
    test_requirements: |
