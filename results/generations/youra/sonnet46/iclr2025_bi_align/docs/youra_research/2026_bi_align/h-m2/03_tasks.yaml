    title: "Extend accommodation.py — Add bidirectional C_sem computation"
    description: |
      Copy h-m1/code/accommodation.py → h-m2/code/accommodation.py and extend:
      1. Add compute_h_given_a_csem_array(emb_h_next, emb_a_curr, shuffle_indices)
