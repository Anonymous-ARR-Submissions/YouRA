  - id: "L-4-2"
    epic: "Extend accommodation"
    title: "L-4-2: Implement compute_bidirectional_csem_per_tier main loop"
    description: |
      Implement compute_bidirectional_csem_per_tier(tier_pairs, embedder,
      controls_fn_random, controls_fn_topic, ipw_weights=None, seed=42):
      For each tier in TIER_ORDER:
        - Encode H_next, A_curr, H_prompt (reuse h-m1 pattern, prefix='h'/'a'/'p')
        - Encode A_next (prefix='a_next'), H_curr (prefix='h_curr') [NEW]
        - Build shuffle_H = build_topic_control(H_prompt, A_curr)
        - Build shuffle_A = build_topic_control(H_prompt, H_curr)
        - Compute H<-A array via compute_h_given_a_csem_array
        - Compute A<-H array via compute_a_given_h_csem_array
        - Log: logger.info(f"[FR-M2] Tier {tier}: C_sem^H<-A={mean:.4f}, C_sem^A<-H={mean:.4f}")
        - Store: {csem_H_given_A, csem_A_given_H, *_array, *_raw_cos, n_pairs}
    feature_tag: "model"
    priority: 48
    source_document: "03_logic.md"
    complexity: null
    test_requirements: |
      - test_bidirectional_csem_fr_m2_log() using caplog
      - test_bidirectional_both_directions_in_output()
    reference_files:
      architecture: "03_architecture.md#A-4"
      logic: "03_logic.md#A-4-bidirectional-main-loop"
      config: null

  - id: "L-4-3"
    epic: "Extend accommodation"
    title: "L-4-3: Mechanism activation check for bidirectional computation"
    description: |
      Add mechanism activation verification in accommodation.py or run_experiment.py:
      Check that [FR-M2] log lines are present after compute_bidirectional_csem_per_tier().
      Verify both csem_H_given_A_array and csem_A_given_H_array have shape (n_pairs,).
      Verify shapes match between both directions for each tier.
      This is called by verify_mechanism_activated_m2() in statistics.py.
    feature_tag: "model"
    priority: 47
    source_document: "03_logic.md"
    complexity: null
    test_requirements: |
      - test_mechanism_activation_shapes_match()
      - test_fr_m2_logs_found()
    reference_files:
      architecture: "03_architecture.md#A-4"
      logic: "03_logic.md#A-4-mechanism-check"
      config: null

  # --- SUBTASKS: A-5 (statistics) — 4 subtasks --------------------------------

  - id: "L-5-1"
    epic: "Extend statistics"
    title: "L-5-1: Implement test_directional_asymmetry"
    description: |
      Implement test_directional_asymmetry(bidir_results_by_tier, alpha=0.05,
      n_bootstrap=1000, seed=42) -> Dict:
      For each tier:
        arr_H = bidir_results_by_tier[tier]['csem_H_given_A_array']
        arr_A = bidir_results_by_tier[tier]['csem_A_given_H_array']
        stat, p = mannwhitneyu(arr_H, arr_A, alternative='greater')
        d, d_ci = bootstrap_cohen_d(arr_H, arr_A, n_bootstrap, seed)
        delta = mean(arr_H) - mean(arr_A)
        Log: [FR-M2] Tier {tier}: C_sem^H<-A={mean_H:.4f}, C_sem^A<-H={mean_A:.4f},
             p={p:.4f}, d={d:.4f}
      Aggregate: tiers_passing = count(p < alpha), gate_passed = tiers_passing >= 2
    feature_tag: "evaluation"
    priority: 46
    source_document: "03_logic.md"
    complexity: null
    test_requirements: |
      - test_directional_asymmetry_pass() — H~N(0.5,0.1) vs A~N(0.1,0.1), N=500
      - test_directional_asymmetry_fail() — equal arrays, tiers_passing=0
    reference_files:
      architecture: "03_architecture.md#A-5"
      logic: "03_logic.md#A-5-test_directional_asymmetry"
      config: null

  - id: "L-5-2"
    epic: "Extend statistics"
    title: "L-5-2: Implement compute_asymmetry_monotonicity"
    description: |
      Implement compute_asymmetry_monotonicity(bidir_results_by_tier, tier_order) -> Dict:
      For each tier: delta = mean(H_given_A_array) - mean(A_given_H_array)
      Check monotonicity: delta[T1] < delta[T2] < delta[T3]
      Run jonckheere_terpstra_test on [delta_T1, delta_T2, delta_T3] arrays.
      Returns: {deltas: {tier: float}, is_monotonic: bool, jt_result: Dict}
      This is a secondary analysis (not a gate condition).
    feature_tag: "evaluation"
    priority: 45
    source_document: "03_logic.md"
    complexity: null
    test_requirements: |
      - test_monotonicity_detected() — increasing deltas
      - test_monotonicity_not_detected() — decreasing deltas
    reference_files:
      architecture: "03_architecture.md#A-5"
      logic: "03_logic.md#A-5-compute_asymmetry_monotonicity"
      config: null

  - id: "L-5-3"
    epic: "Extend statistics"
    title: "L-5-3: Implement check_model_consistency_m2"
    description: |
      Implement check_model_consistency_m2(all_model_bidir_results, alpha=0.05) -> Dict:
      Input: {model_slug: {asymmetry_test: {tiers_passing, gate_passed, ...}}}
      For each model: gate_passed = asymmetry_test['gate_passed'] (tiers_passing >= 2)
      models_passing = count(gate_passed==True across models)
      Returns: {models_passing: int, passing_models: List[str],
                gate_passed: bool}  # gate_passed = models_passing >= 2
      This is the cross-model consistency gate for h-m2.
    feature_tag: "evaluation"
    priority: 44
    source_document: "03_logic.md"
    complexity: null
    test_requirements: |
      - test_model_consistency_2_of_3_pass()
      - test_model_consistency_1_of_3_fail()
    reference_files:
      architecture: "03_architecture.md#A-5"
      logic: "03_logic.md#A-5-check_model_consistency_m2"
      config: null

  - id: "L-5-4"
    epic: "Extend statistics"
    title: "L-5-4: Implement verify_mechanism_activated_m2 and compute_ipw_csem_bidir"
    description: |
      1. verify_mechanism_activated_m2(all_model_bidir_results, experiment_log) -> Tuple[bool, Dict]:
         4 indicators:
         - both_directions_computed: all tiers have csem_H_given_A and csem_A_given_H
         - shapes_match: H_given_A_array.shape == A_given_H_array.shape for all tiers
         - asymmetry_nonzero: any |mean(H_given_A) - mean(A_given_H)| > 1e-6
         - fr_m2_logs_found: '[FR-M2]' in experiment_log
         Returns (all(indicators.values()), indicators)
      2. compute_ipw_csem_bidir(bidir_results_by_tier, tier_prompt_embeddings) -> Dict:
         Extends h-m1 compute_ipw_csem to both H<-A and A<-H directions.
         Returns: {tier: {ipw_csem_H_given_A: float, ipw_csem_A_given_H: float}}
    feature_tag: "evaluation"
    priority: 43
    source_document: "03_logic.md"
    complexity: null
    test_requirements: |
      - test_verify_mechanism_all_true()
      - test_verify_mechanism_missing_direction()
