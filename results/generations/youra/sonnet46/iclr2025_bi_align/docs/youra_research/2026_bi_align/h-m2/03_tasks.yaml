         - plot_bidirectional_bars() [REQUIRED]: grouped bar C_sem^H<-A vs C_sem^A<-H per tier
         - plot_directional_asymmetry_bars(): 3 models x 3 tiers x 2 bars
         - plot_asymmetry_delta_line(): Δ_asymmetry across tiers per model
         - plot_pairwise_distributions_violin(): KDE/violin per-pair csem both directions
         - plot_significance_heatmap(): p-value grid tier x model
         - plot_bootstrap_ci_comparison(): bootstrap CI both directions per tier
         - plot_ipw_asymmetry(): raw vs IPW-corrected Δ_asymmetry
      All figures saved to h-m2/figures/.
    feature_tag: "evaluation"
    priority: 88
    source_document: "03_architecture.md"
