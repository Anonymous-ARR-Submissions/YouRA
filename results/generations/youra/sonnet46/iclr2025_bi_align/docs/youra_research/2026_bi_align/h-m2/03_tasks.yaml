      1. test_directional_asymmetry(bidir_results_by_tier, alpha=0.05, n_bootstrap=1000, seed=42)
         Per-tier Mann-Whitney U one-sided (alternative='greater'): H<-A > A<-H.
         Returns: {tier: {mw_statistic, p_value, cohen_d, cohen_d_ci, delta_asymmetry},
                   tiers_passing: int, gate_passed: bool}
         Logs: [FR-M2] Tier {tier}: C_sem^H<-A={:.4f}, C_sem^A<-H={:.4f}, p={:.4f}, d={:.4f}
      2. compute_asymmetry_monotonicity(bidir_results_by_tier, tier_order)
         Returns: {deltas: {tier: float}, is_monotonic: bool, jt_result: Dict}
      3. check_model_consistency_m2(all_model_bidir_results, alpha=0.05)
         Returns: {models_passing: int, passing_models: List[str], gate_passed: bool}
      4. verify_mechanism_activated_m2(all_model_bidir_results, experiment_log)
         4 indicators: both_directions_computed, shapes_match, asymmetry_nonzero, fr_m2_logs_found
      5. compute_ipw_csem_bidir(bidir_results_by_tier, tier_prompt_embeddings)
         Returns: {tier: {ipw_csem_H_given_A: float, ipw_csem_A_given_H: float}}
    feature_tag: "evaluation"
    priority: 89
    source_document: "03_architecture.md"
    complexity: 16
