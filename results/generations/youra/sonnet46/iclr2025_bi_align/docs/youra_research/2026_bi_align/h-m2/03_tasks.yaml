    epic: "Run full experiment"
    title: "Run full experiment — Execute on complete 155,362-pair dataset"
    description: |
      Execute run_experiment.py on the full dataset (3 models x 3 tiers = 9 runs):
      cd h-m2/code && python run_experiment.py --config config.yaml
      Expected runtime: ~2-4h (depending on whether A_next/H_curr encoding needed).
