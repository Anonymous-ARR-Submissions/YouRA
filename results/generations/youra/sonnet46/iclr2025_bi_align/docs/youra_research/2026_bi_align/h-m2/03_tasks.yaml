      3. Add compute_bidirectional_csem_per_tier(tier_pairs, embedder, controls_fn_random,
         controls_fn_topic, ipw_weights=None, seed=42)
         Computes both H<-A and A<-H per tier. Logs [FR-M2] prefix for each tier.
         Returns: {tier: {csem_H_given_A, csem_A_given_H, csem_H_given_A_array,
                          csem_A_given_H_array, raw_cos_H_given_A, raw_cos_A_given_H, n_pairs}}
