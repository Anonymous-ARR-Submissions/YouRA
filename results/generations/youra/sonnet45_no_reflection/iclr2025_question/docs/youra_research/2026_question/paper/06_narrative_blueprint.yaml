    avoid:
      - "Claiming any correlation results (we have ZERO empirical data)"
      - "Hiding the INCONCLUSIVE outcome"
      - "Overselling contributions beyond methodological documentation"

  # ─────────────────────────────────────────────────────────────────────────────
  # INTRODUCTION
  # ─────────────────────────────────────────────────────────────────────────────
  introduction:
    narrative_purpose: "Hook (production latency problem) → Problem (SE slow) → Insight (geometric proxy) → Honest preview (tested hypothesis, hit computational wall, document lessons)"

    hook_strategy: "practical_deployment_tension"

    problem_escalation: |
      1. Surface: LLMs hallucinate, need uncertainty quantification
      2. Deeper: Semantic entropy (gold standard) has ~1500ms latency, impractical for production
      3. Gap: No validated <100ms uncertainty proxy with semantic understanding

    insight_preview: "We hypothesized geometric properties (participation ratio, eigenvalue decay) of hidden state manifolds could proxy semantic entropy via single forward pass, enabling <10ms latency"

    contributions_framing: |
      Frame contributions as METHODOLOGICAL and LESSONS LEARNED, not empirical findings:
      - Complete implementation of geometric UQ pipeline (~1,200 lines, 5 modules)
      - Identification of hidden state extraction as critical computational bottleneck
      - Computational feasibility analysis: 7B models require MEDIUM+ tier or model downsizing
      - Future work roadmap: small-scale POC (GPT-2, N=50) for tractable validation

    transition_to_related_work: "Our approach builds on semantic entropy (Farquhar et al. 2024) and spectral neural network analysis (NerVE, ICLR 2026), extending weight geometry to per-example hidden state dynamics"

  # ─────────────────────────────────────────────────────────────────────────────
  # RELATED WORK
  # ─────────────────────────────────────────────────────────────────────────────
  related_work:
    narrative_purpose: "Position geometric uncertainty as unexplored direction; show existing methods' latency/interpretability trade-offs"

    positioning_strategy: "We explore an untested research direction (intrinsic hidden state geometry for uncertainty) that, if validated, would address latency constraints of existing semantic methods"

    key_comparison_points:
      - area: "Semantic Entropy Methods (Farquhar et al. 2024, Kossen et al. 2024)"
        limitation_to_highlight: "Multi-sample generation (K=10) or supervised training required, both adding latency or requiring labeled data"
        how_we_differ: "Single forward pass, training-free geometric analysis—IF hypothesis holds (untested)"

      - area: "Spectral Neural Network Analysis (NerVE, ICLR 2026)"
        limitation_to_highlight: "Analyzes static weight geometry, not per-example hidden state dynamics"
        how_we_differ: "Extend spectral methods to dynamic hidden states for instance-level uncertainty"

      - area: "Fast Uncertainty Proxies (Perplexity, Token Probabilities)"
        limitation_to_highlight: "Token-level metrics lack semantic understanding; perplexity uncorrelated with semantic entropy"
        how_we_differ: "Hypothesis geometric features capture semantic uncertainty through manifold structure (if true)"

    papers_to_discuss:
      - "Farquhar et al. (Nature 2024) - Semantic entropy foundation"
      - "Kossen et al. (2024) - SE probes"
      - "Manakul et al. (2023) - SelfCheckGPT"
      - "NerVE (ICLR 2026) - Spectral analysis of neural networks"

    avoid:
      - "Claiming our method works (we have no evidence)"
      - "Criticizing SE methods beyond latency constraint"
      - "Missing key uncertainty quantification papers from Phase 1 research"

  # ─────────────────────────────────────────────────────────────────────────────
  # METHODOLOGY
  # ─────────────────────────────────────────────────────────────────────────────
  methodology:
    narrative_purpose: "Explain geometric uncertainty hypothesis and implementation design (what we ATTEMPTED, not what WORKED)"

    connection_to_insight: "If uncertain hidden states exhibit collapsed subspaces, participation ratio (effective dimensionality measure) should correlate negatively with semantic entropy"

    key_design_decisions:
      - decision: "Extract hidden states from layers 24-31 (final 8 of 32 layers)"
        rationale: "Hypothesis: late layers encode decision-making representations where uncertainty manifests. Choice was ARBITRARY (no ablation study—acknowledged limitation)"
        alternatives_considered: "Could test earlier layers (15-20) or single-layer (31 only), but chose multi-layer concatenation for richer covariance structure"

      - decision: "Participation ratio PR = trace(C)² / (||C||²_F · d) as primary geometric feature"
        rationale: "Well-established dimensionality metric from statistical physics; interpretable as 'effective number of dimensions'"
        alternatives_considered: "Also computed eigenvalue decay rate α and condition number κ as complementary features"

      - decision: "Semantic entropy as ground truth (K=10 samples, T=0.7, DeBERTa-v3-base NLI)"
        rationale: "Farquhar et al. (Nature 2024) validated approach; K=10 convergence established"
        alternatives_considered: "None—SE is gold standard for epistemic uncertainty"

    intuition_building: |
      - Figure: Conceptual diagram showing confident vs uncertain hidden state manifolds
      - Walkthrough: Dataset → Model forward pass → Extract layers 24-31 → Compute covariance → Eigendecomposition → PR calculation
      - Implementation architecture: 5-module structure (data, models, metrics, analysis)

    technical_depth_balance: |
      Main text: High-level methodology, key equations (PR formula), implementation structure
      Appendix: Full algorithm pseudocode, hyperparameter choices, extraction details

  # ─────────────────────────────────────────────────────────────────────────────
  # EXPERIMENTS
  # ─────────────────────────────────────────────────────────────────────────────
  experiments:
    narrative_purpose: "Document experimental design (what we PLANNED to test) and execution status (what ACTUALLY happened)"

    experimental_questions:
      - question: "Do geometric features correlate with semantic entropy (P1: |ρ| > 0.4)?"
        experiment: "Compute Spearman correlation on TruthfulQA test set (N=246)"
        expected_outcome: "SUCCESS if |ρ| > 0.4, p < 0.001, 95% CI excludes 0.3"
        actual_outcome: "UNTESTED - extraction phase hung before correlation analysis"

      - question: "Does multi-geometric ensemble outperform single features (P2: AUROC > 0.70)?"
        experiment: "Train linear classifier on PR + α + κ, evaluate binary classification (high-SE vs low-SE)"
        expected_outcome: "SUCCESS if AUROC > 0.70"
        actual_outcome: "UNTESTED - experiment did not reach analysis phase"

      - question: "Do geometric features add value beyond perplexity (P3: ΔAUROC ≥ 0.05)?"
        experiment: "Hierarchical regression: perplexity baseline → add geometric features"
        expected_outcome: "SUCCESS if ΔAUROC ≥ 0.05, DeLong test p < 0.05"
        actual_outcome: "UNTESTED - experiment did not reach analysis phase"

    baseline_rationale: "Perplexity serves as sanity check (should NOT correlate strongly with SE per prior work); SE probes (Kossen et al.) as aspirational target (AUROC ~0.80)"
    dataset_rationale: "TruthfulQA designed to elicit epistemic uncertainty (factual questions where model lacks knowledge); standard benchmark for uncertainty research"
    metric_rationale: "Spearman correlation for monotonic relationships (robust to outliers); AUROC for classification quality; bootstrap CI for stability validation"

    fairness_considerations: |
      NOT APPLICABLE - no baseline comparison completed
      Would have used: same model (Llama-3-8B), same dataset split, same SE computation parameters

  # ─────────────────────────────────────────────────────────────────────────────
  # RESULTS
  # ─────────────────────────────────────────────────────────────────────────────
  results:
    narrative_purpose: "Transparently report ZERO empirical results, document implementation progress and computational bottleneck"

    main_result_highlight: "No correlation measurements obtained—all predictions (P1, P2, P3) remain UNTESTED due to computational failure during hidden state extraction phase"

    result_presentation_order:
      - result: "Implementation completeness: 11/11 tasks completed, ~1,200 lines of code across 5 modules (config, data loading, model extraction, geometric metrics, semantic entropy, correlation analysis)"
        purpose: "Establish that failure was NOT due to incomplete or incorrect implementation"

      - result: "Execution progress: Data loading successful (817 questions, 571/246 split verified), Model loading successful (Mistral-7B-v0.1 in 9 seconds), Hidden state extraction FAILED (>10 hours runtime, 590 CPU minutes consumed without output)"
        purpose: "Show where exactly the bottleneck occurred and what succeeded before failure"

      - result: "Computational analysis: 246 examples × 8 layers × 4096 dimensions × float16 (2 bytes) = ~15.4GB tensor operations; Phase 3 estimate (30 min) vs actual (>10 hours) = 20× underestimate"
        purpose: "Quantify the computational gap and provide data for future planning"

    surprising_result_handling: "The 20× complexity underestimate suggests either (a) naive implementation (fixable via FlashAttention, vLLM, streaming), or (b) fundamental scaling limits (7B models inherently expensive for this operation on LIGHT tier)"

    avoid:
      - "Claiming any correlation results"
      - "Hiding the complete failure to test predictions"
      - "Blaming tools or environment (implementation quality was high, computational demand exceeded tier capacity)"

  # ─────────────────────────────────────────────────────────────────────────────
  # DISCUSSION
  # ─────────────────────────────────────────────────────────────────────────────
  discussion:
    narrative_purpose: "Interpret INCONCLUSIVE outcome, acknowledge limitations honestly, provide actionable lessons for future work"

    key_findings_interpretation: "Hypothesis validity UNKNOWN. We learned (1) geometric UQ is implementable, (2) hidden state extraction is the bottleneck, (3) 7B models require MEDIUM+ tier or optimization, (4) Phase 3 complexity estimation needs empirical validation on small subsets (N=10) before full experiments"

    honest_limitations:
      - limitation: "Zero empirical evidence—no correlation measured, all predictions untested"
        why_acceptable: "Research outcome documents methodological barrier (computational infeasibility), which is valuable negative information for the field"
        future_mitigation: "Small-scale POC on GPT-2 Large (774M params) with N=50 subset (estimated ~1-2 hours vs >10 hours) to obtain ANY empirical data within LIGHT tier constraints"

      - limitation: "Model substitution (Mistral-7B-v0.1 instead of Llama-3-8B-Instruct) due to gated access"
        why_acceptable: "Both are 7B decoder-only transformers with similar architecture; substitution does not affect computational bottleneck findings"
        future_mitigation: "Resolve Llama-3 access before future attempts, or use open-weight Llama-2-7B"

      - limitation: "Layer range (24-31) is arbitrary assumption—no ablation study"
        why_acceptable: "Acknowledged in original hypothesis (Assumption A2); would require completing extraction first before layer optimization"
        future_mitigation: "Small-scale POC should test single-layer (layer 31) first to reduce extraction cost 8×, then expand if promising"

      - limitation: "Efficiency claim contradicted—extraction bottleneck suggests geometric approach may NOT be faster than semantic entropy in practice"
        why_acceptable: "Original claim assumed extraction is negligible; bottleneck discovery is KEY finding that revises understanding"
        future_mitigation: "Reframe hypothesis: geometric features may be INTERPRETABLE (not necessarily faster) unless optimized extraction achieves <1s per example"

    broader_impact_statement: "This work has minimal direct impact (no deployed system, no claims validated). Methodological documentation helps future researchers avoid unproductive resource allocation. Negative results (computational infeasibility) prevent wasted effort by others pursuing similar approaches on LIGHT tier resources."

  # ─────────────────────────────────────────────────────────────────────────────
  # CONCLUSION
  # ─────────────────────────────────────────────────────────────────────────────
  conclusion:
    narrative_purpose: "Callback to production latency problem, acknowledge unresolved question, provide clear next steps"

    callback_to_hook: "We began by asking whether geometric hidden state features could provide fast (<100ms) uncertainty proxies to replace slow (~1500ms) semantic entropy. This question remains UNANSWERED—not because the hypothesis was refuted, but because computational barriers prevented validation."

    memorable_ending: "The path from hypothesis to validated finding is not always direct. We document the roadblocks—computational infeasibility on LIGHT tier, 20× complexity underestimate, extraction bottleneck—so future researchers can navigate around them. The hypothesis awaits validation, not retirement."

    future_work_vision: "Immediate: Small-scale POC on GPT-2 Large (N=50) to obtain first empirical correlation data. If promising (|ρ| > 0.3): optimize extraction (FlashAttention-2, streaming, mixed precision) and scale to 7B models on MEDIUM tier. If weak/null: explore simpler geometric proxies (L2 norms, activation entropy) or pivot to alternative uncertainty approaches. The question is worth answering—we now know what it will cost."

