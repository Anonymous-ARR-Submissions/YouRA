  id: H-GeometricUQ-v1
  title: Geometric Uncertainty Quantification via Hidden State Subspace Analysis
  statement: Under epistemic uncertainty conditions (factual knowledge questions in TruthfulQA), if we extract geometric features
    (participation ratio, eigenvalue spectrum, condition number) from layers 24-31 hidden states at pre-generation final token
    position, then these features will achieve Spearman |ρ| > 0.4 correlation with ground-truth semantic entropy, because
    uncertain model states exhibit lower-dimensional geometric signatures (collapsed subspaces) detectable via spectral analysis
    of the hidden state manifold.
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: TruthfulQA
    model: Llama-3-8B-Instruct
    optimizer: null
    hyperparameters:
      layers: 24-31
      position: final_token_pre_generation
      se_samples: 10
      se_temperature: 0.7
      nli_model: DeBERTa-v3-base-mnli-fever-anli
