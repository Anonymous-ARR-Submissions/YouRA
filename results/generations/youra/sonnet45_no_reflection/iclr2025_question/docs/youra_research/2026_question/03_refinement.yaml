# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-GeometricUQ-v1"
  confidence_level: 0.75
  core_hypothesis_statement: |
    Under epistemic uncertainty conditions (factual knowledge questions in TruthfulQA),
    if we extract geometric features (participation ratio, eigenvalue spectrum, condition number)
    from layers 24-31 hidden states at pre-generation final token position, then these features
    will achieve Spearman |ρ| > 0.4 correlation with ground-truth semantic entropy, because
    uncertain model states exhibit lower-dimensional geometric signatures (collapsed subspaces)
    detectable via spectral analysis of the hidden state manifold.
  alternative_hypothesis_h0: |
    There is no significant correlation (|ρ| < 0.3 or p > 0.05) between geometric features
    extracted from pre-generation hidden states and semantic entropy on TruthfulQA. Any observed
    correlation is spurious and explained by confounds (sequence length, perplexity, token frequency).

