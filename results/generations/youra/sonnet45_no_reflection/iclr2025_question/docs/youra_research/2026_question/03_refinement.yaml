# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Participation Ratio (PR)"
      type: "continuous"
      operationalization: "trace(C)^2 / (||C||_F^2 * d) from 9-layer covariance matrix"
      levels: []
    - name: "Eigenvalue Decay Rate"
      type: "continuous"
      operationalization: "Power law exponent α in λ_k ∝ k^(-α) fit to top-5 eigenvalues"
      levels: []
    - name: "Condition Number"
      type: "continuous"
      operationalization: "Ratio of maximum to minimum eigenvalue from covariance matrix"
      levels: []
  dependent:
    - name: "Semantic Entropy"
      type: "continuous"
      operationalization: "Entropy in bits from K=10 samples, DeBERTa-NLI clustering, range 0-3 bits"
      primary: true
    - name: "Binary Uncertainty Classification"
      type: "categorical"
      operationalization: "High SE (>median) vs Low SE (≤median) split"
      primary: false
  controlled:
    - name: "Model Architecture"
      operationalization: "Fixed to Llama-3-8B-Instruct, bfloat16 precision"
    - name: "Layer Range"
      operationalization: "Layers 24-31 (final 8 layers before output)"
    - name: "Token Position"
      operationalization: "Final token position before generation starts"
    - name: "Sampling Parameters"
      operationalization: "K=10 samples, temperature=0.7 for SE ground truth"
    - name: "NLI Model"
      operationalization: "DeBERTa-v3-base-mnli-fever-anli for semantic clustering"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Epistemic uncertainty trigger - Model encounters factual question where it lacks confident knowledge"
      evidence: "TruthfulQA contains questions designed to elicit uncertain responses from models lacking factual knowledge"
      falsifier: "If uncertainty occurs on questions where model has high confidence, mechanism fails"
    - step: 2
      description: "Subspace collapse - Pre-generation hidden states compress into lower-dimensional manifold due to lack of confident direction"
      evidence: "INSIDE framework (EigenScore) found hallucinations correlate with lower eigenvalue diversity, supporting collapsed subspace hypothesis"
      falsifier: "If participation ratio INCREASES with uncertainty, collapsed subspace hypothesis is wrong"
    - step: 3
      description: "Spectral signature emergence - Eigenvalue decay accelerates, condition number increases, participation ratio decreases"
      evidence: "Spectral geometry in neural networks shows activation geometry correlates with model behavior (theoretical basis from representation learning literature)"
      falsifier: "If geometric features show no pattern or opposite pattern (PR increases), spectral signature hypothesis fails"
    - step: 4
      description: "Geometric proxy formation - Intrinsic geometric properties correlate with expensive-to-compute semantic entropy"
      evidence: "Kossen et al. 2024 demonstrated hidden states predict semantic entropy; we hypothesize intrinsic geometry (no training) carries similar signal"
      falsifier: "If correlation |ρ| < 0.3, geometric properties don't proxy semantic entropy"
  key_tension: "Collapsed subspace vs superposition paradox - Does uncertainty manifest as lower-dimensional collapse (epistemic) or higher-dimensional superposition (aleatoric)? Resolution: hypothesis scoped to epistemic uncertainty only."
  evidence_summary: |
    Theoretical support from INSIDE framework (eigenvalue analysis for hallucinations), spectral geometry
    literature (activation patterns), and Kossen et al. empirical success (hidden states predict SE).
    Mechanism predicts negative correlation between PR and SE for epistemic uncertainty tasks.

