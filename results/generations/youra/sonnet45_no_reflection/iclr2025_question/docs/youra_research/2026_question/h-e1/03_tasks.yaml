  - id: "task-010"
    epic: "Experiment Runner"
    title: "Implement main experiment orchestration"
    description: |
      Create main experiment script that orchestrates all components and generates validation report.

      Requirements:
      - Integrate all modules (data, model, metrics, analysis)
      - Run full pipeline: data → extraction → features → entropy → correlation
      - Evaluate MUST_WORK gate
      - Generate 04_validation.md report
      - Save results (features.csv, entropies.csv, correlation_results.json)

      Implementation:
