  - id: "task-002"
    epic: "Data Pipeline"
    title: "Load TruthfulQA dataset and implement 70/30 split"
    description: |
      Load TruthfulQA dataset from HuggingFace and split into train/test sets.

      Requirements (from PRD FR-1.1):
      - Load truthful_qa/generation dataset
      - 817 total questions expected
      - Split: 70/30 train/test (572 train, 245 test)
      - Tokenize with Llama-3 tokenizer
      - Verify data quality (no corrupted entries)

      Implementation (from Architecture):
      - Create data/loader.py module
      - Implement TruthfulQALoader class
      - Methods: load_dataset(), split_data(), tokenize()
    feature_tag: "data-preparation"
    priority: 93
    source_document: "03_prd.md"
    complexity: 6
    test_requirements: |
      - Verify 817 total questions loaded
      - Confirm 572/245 train/test split
      - Validate all questions tokenizable
      - Check final token position identifiable
    reference_files:
      architecture: "03_architecture.md#A-2"
      logic: "03_logic.md#TruthfulQALoader"
      config: "03_config.md"

  - id: "task-003"
    epic: "Model Infrastructure"
    title: "Implement hidden state extraction from layers 24-31"
    description: |
      Extract hidden states from Llama-3-8B-Instruct layers 24-31 at final token position.

      Requirements (from PRD FR-2):
      - Load model with output_hidden_states=True
      - Extract layers 24-31 hidden states
      - Position: Final token before generation
      - Shape per layer: [N, 4096] where N = batch size

      Implementation (from Logic):
      - Create models/extractor.py module
      - Implement HiddenStateExtractor class
      - Methods: load_model(), extract_hidden_states(), get_final_token_states()
      - Handle batching for memory efficiency
    feature_tag: "model"
    priority: 92
    source_document: "03_prd.md"
    complexity: 9
    test_requirements: |
      - Verify 8 layers extracted (indices 24-31)
      - Confirm shape [N, 4096] per layer
      - Validate final token position correct
      - Test batching works without OOM
    reference_files:
      architecture: "03_architecture.md#A-3"
      logic: "03_logic.md#HiddenStateExtractor"
      config: "03_config.md"

  - id: "task-004"
    epic: "Geometric Features"
    title: "Implement covariance and eigenvalue computation"
    description: |
      Compute covariance matrix and eigenvalues from hidden states.

      Requirements (from PRD FR-3.4):
      - Concatenate hidden states across 8 layers: [N×8, 4096]
      - Mean-center: X_centered = X - mean(X, dim=0)
      - Compute: C = (X_centered^T @ X_centered) / (N×8 - 1)
      - Use torch.linalg.eigvalsh for symmetric matrix

      Implementation:
      - Create metrics/geometric.py module
      - Implement GeometricFeatureComputer class
      - Methods: compute_covariance(), compute_eigenvalues()
      - Add numerical stability (epsilon=1e-12)
    feature_tag: "model"
    priority: 91
    source_document: "03_prd.md"
    complexity: 12
    test_requirements: |
      - Verify covariance matrix is symmetric
      - Confirm eigenvalues sum equals trace
      - Test numerical stability with edge cases
      - Validate shape consistency
    reference_files:
      architecture: "03_architecture.md#A-4"
      logic: "03_logic.md#GeometricFeatureComputer"
      config: "03_config.md"

  - id: "task-005"
    epic: "Geometric Features"
    title: "Implement PR, eigenvalue decay, and condition number metrics"
    description: |
      Compute three geometric features: Participation Ratio, eigenvalue decay rate, condition number.

      Requirements (from PRD FR-3.1 to FR-3.3):
      - PR = (Σλᵢ)² / (Σλᵢ²), range [1, D] where D=4096
      - α (decay rate) = slope of log(λᵢ) vs. index via linear regression
      - κ (condition number) = λ_max / λ_min with ε=1e-12 for stability

      Implementation:
      - Add methods to GeometricFeatureComputer
      - compute_participation_ratio()
      - compute_eigenvalue_decay()
      - compute_condition_number()
      - compute_all_features() aggregator
    feature_tag: "evaluation"
    priority: 90
    source_document: "03_prd.md"
    complexity: 12
    test_requirements: |
      - Verify PR in valid range [1, 4096]
      - Check decay rate computation correct
      - Test condition number stability
      - Validate against known eigenvalue distributions
    reference_files:
      architecture: "03_architecture.md#A-4"
      logic: "03_logic.md#GeometricFeatureComputer"
      config: "03_config.md"

  - id: "task-006"
    epic: "Semantic Entropy"
    title: "Implement K=10 sampling and generation"
    description: |
      Generate K=10 samples per question with temperature sampling.

      Requirements (from PRD FR-4.1):
      - Generate K=10 samples per question
      - Temperature T=0.7
      - Use nucleus/top-p sampling
      - Store generation likelihoods

      Implementation:
      - Create metrics/semantic_entropy.py module
      - Implement SemanticEntropyComputer class
      - Method: generate_samples(questions, k, temperature)
      - Handle batch generation for efficiency
    feature_tag: "model"
    priority: 89
    source_document: "03_prd.md"
    complexity: 14
    test_requirements: |
      - Verify K=10 samples generated per question
      - Confirm temperature T=0.7 applied
      - Test generation diversity
      - Validate likelihoods stored correctly
    reference_files:
      architecture: "03_architecture.md#A-5"
      logic: "03_logic.md#SemanticEntropyComputer"
      config: "03_config.md"

  - id: "task-007"
    epic: "Semantic Entropy"
    title: "Implement NLI clustering and semantic entropy computation"
    description: |
      Cluster semantically equivalent generations using NLI model and compute semantic entropy.

      Requirements (from PRD FR-4.2 to FR-4.3):
      - Model: DeBERTa-v3-base-mnli-fever-anli
      - Cluster semantically equivalent generations
      - Compute SE = -Σ p_i log(p_i) where p_i = cluster_count_i / K
      - Range: [0, log(K)] ≈ [0, 2.3] bits

      Implementation:
      - Add methods: cluster_generations(), compute_entropy()
      - Use jlko/semantic_uncertainty repository pattern
      - Aggregate: compute_all_entropies()
    feature_tag: "evaluation"
    priority: 88
    source_document: "03_prd.md"
    complexity: 14
    test_requirements: |
      - Verify NLI model loads correctly
      - Test clustering on sample generations
      - Validate entropy in range [0, 2.3]
      - Check edge cases (all same/all different)
    reference_files:
      architecture: "03_architecture.md#A-5"
      logic: "03_logic.md#SemanticEntropyComputer"
      config: "03_config.md"

  - id: "task-008"
    epic: "Correlation Analysis"
    title: "Implement Spearman correlation and bootstrap CI"
    description: |
      Compute Spearman correlation between geometric features and semantic entropy with bootstrap validation.

      Requirements (from PRD FR-5.1 to FR-5.2):
      - Spearman correlation for each feature (PR, α, κ) vs SE
      - Test set only (N=245)
      - p-value < 0.001 threshold
      - Bootstrap 95% CI (1000 resamples)
      - Verify CI excludes 0.3

      Implementation:
      - Create analysis/correlation.py module
      - Implement CorrelationAnalyzer class
      - Methods: compute_spearman(), bootstrap_ci()
    feature_tag: "evaluation"
    priority: 87
    source_document: "03_prd.md"
    complexity: 10
    test_requirements: |
      - Verify scipy.stats.spearmanr used correctly
      - Test bootstrap produces valid CI
      - Validate p-value computation
      - Check CI exclusion logic
    reference_files:
      architecture: "03_architecture.md#A-6"
      logic: "03_logic.md#CorrelationAnalyzer"
      config: "03_config.md"

  - id: "task-009"
    epic: "Correlation Analysis"
    title: "Implement visualization and gate evaluation"
    description: |
      Generate correlation plots and evaluate MUST_WORK gate criteria.

      Requirements (from PRD FR-5.3):
      - Scatter plots: Each feature vs SE with regression line
      - Distribution plots: Feature distributions for high/low SE
      - Correlation heatmap
      - Bootstrap CI plot

      Gate Evaluation:
      - Check |ρ| > 0.4 for at least one feature
      - Verify p < 0.001
      - Confirm 95% CI excludes 0.3

      Implementation:
