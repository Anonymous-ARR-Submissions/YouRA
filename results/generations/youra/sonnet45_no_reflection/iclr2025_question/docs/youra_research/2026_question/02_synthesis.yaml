hypothesis_draft:
  title: "Geometric Uncertainty Quantification via Hidden State Subspace Analysis"
  hypothesis_id: "H-GeometricUQ-v1"
  core_claim: |
    Geometric features (participation ratio, eigenvalue spectrum, condition number) extracted from
    pre-generation hidden states correlate significantly (|ρ| > 0.4) with semantic entropy, enabling
    single-pass uncertainty estimation for production LLM deployment with <10ms overhead.
  mechanism: |
    Under epistemic uncertainty, LLM hidden states collapse into lower-dimensional subspaces due to
    lack of confident direction. This geometric compression is detectable via participation ratio
    decrease, eigenvalue decay acceleration, and condition number increase. These spectral signatures
    serve as intrinsic uncertainty signals without requiring multi-sample generation or external NLI models.
  predictions:
    - "P1: Spearman |ρ| > 0.4 between participation ratio and semantic entropy on TruthfulQA test set"
    - "P2: Multi-geometric ensemble achieves AUROC > 0.70 for binary uncertainty classification"
    - "P3: Geometric features add ΔAUROC ≥ 0.05 beyond perplexity baseline"

variables_summary:
  independent: "Participation ratio (continuous), eigenvalue decay rate (continuous), condition number (continuous)"
  dependent_primary: "Semantic entropy (continuous, 0-3 bits)"
  controlled: "Model (Llama-3-8B-Instruct), layers (24-31), position (final token pre-generation), sampling (K=10, T=0.7), NLI (DeBERTa-v3)"

null_hypothesis:
  h0_statement: |
    There is no significant correlation (|ρ| < 0.3 or p > 0.05) between geometric features
    and semantic entropy. Any observed correlation is spurious and explained by confounds.
  statistical_test: "Spearman rank correlation with bootstrap confidence intervals"
  significance_level: 0.05

novelty_assessment:
