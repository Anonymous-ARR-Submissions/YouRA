  key_innovation: "Intrinsic geometric properties as interpretable uncertainty signals (no supervised training needed)"
  differentiation_summary: |
    Unlike Kossen et al. (trained probe, black-box), we use intrinsic geometry (interpretable).
    Unlike Farquhar et al. (multi-sample SE, ~1500ms), we achieve <10ms single-pass computation.
    Unlike SelfCheckGPT (5-20x latency), we require only one forward pass.

