  - id: "task-004"
    epic: "Stable Rank Regularization"
    title: "Implement residual-corrected Jacobian stable rank regularizer"
    description: |
      Implement StableRankRegularizer with:
      - Hutchinson trace estimator for Frobenius norm (10 probes)
      - Power iteration for spectral norm estimation (5 iterations)
      - Residual correction: J̃_ℓ = J_ℓ - I
      - Stable rank computation: sr_ℓ^res = ||J̃_ℓ||_F^2 / ||J̃_ℓ||_2^2

      Target file: code/model.py

      Classes to implement:
      - StableRankRegularizer: Regularization module

      Methods:
      - hutchinson_trace(): Rademacher sampling + JVP
      - power_iteration_spectral_norm(): Power iteration with residual correction
      - compute_stable_rank(): Combine trace and spectral norm
    feature_tag: "model"
    priority: 91
    source_document: "03_architecture.md"
    complexity: 16
    test_requirements: |
      ## Test Requirements (MANDATORY)
