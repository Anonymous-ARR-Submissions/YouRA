    title: "Implement regularized GPT-2 with adaptive lambda tuning"
    description: |
      Implement RegularizedGPT2 and GPT2Trainer:
      - Integrate StableRankRegularizer with GPT-2
      - Implement forward pass with layer I/O hooks
      - Compute regularization loss: L_total = L_CLM + λ * mean(sr_ℓ^res)
      - Implement adaptive lambda tuning to maintain iso-perplexity
      - Full training loop with checkpointing and logging

      Target files: code/model.py, code/train.py

      Classes to implement:
      - RegularizedGPT2: Model with regularization
