# ═══════════════════════════════════════════════════════════════
# Hypothesis Evolution Summary
# ═══════════════════════════════════════════════════════════════
hypothesis_draft:
  initial_intuition: |
    Exchange 1 (Dr. Nova): "What if parameter efficiency, KV cache compression, and sub-quadratic attention
    are different manifestations of the same underlying principle: learned sparsity in representation space?"

  key_breakthrough_moment: |
    Exchange 6 (Dr. Ally): Transformed fuzzy "unified sparsity" metaphor into concrete mathematical framework
    by proposing the **stable rank of layer-wise Jacobians** as the mechanistic bridge linking all three
    efficiency dimensions.

  critical_refinement: |
    Exchange 12 (Prof. Vera): Formalized **residual-corrected Jacobian stable rank** sr_ℓ^res = ||J̃_ℓ||_F^2 / ||J̃_ℓ||_2^2
    where J_ℓ = I + J̃_ℓ, removing identity term confound from residual connections.

  final_hypothesis: |
    Regularizing residual-corrected Jacobian stable rank during pretraining produces foundation models with
    mechanistically-linked efficiency properties across adaptation (low-rank fine-tuning), memory (KV compression),
    and computation (sparse attention).

# ═══════════════════════════════════════════════════════════════
# Variables & Measurement Plan
# ═══════════════════════════════════════════════════════════════
variables_summary:
  independent_variable:
    name: "Regularization Type"
    levels:
      - "Baseline transformer (no additional regularization)"
      - "Explicit stable-rank regularization (Hutchinson trace + power iteration)"
      - "Implicit control (adaptive learning rates based on measured stable rank)"

  dependent_variables:
    primary:
      name: "Residual-Corrected Jacobian Stable Rank"
      formula: "sr_ℓ^res = ||J̃_ℓ||_F^2 / ||J̃_ℓ||_2^2"
      measurement: "Hutchinson trace estimation (Frobenius norm) + randomized power iteration (spectral norm)"

    efficiency_metrics:
      - name: "Intrinsic LoRA Rank"
        measurement: "Random direction probes (Li et al. 2018) - minimum rank for 95% downstream accuracy"
      - name: "KV Covariance Effective Rank"
        measurement: "SVD-based rank at 90% variance threshold on validation set"
      - name: "Attention Entropy"
        measurement: "-Σ p_ij log p_ij over attention weights per layer"

  controlled_variables:
    - "Perplexity (iso-performance via adaptive regularization weight tuning, ≤1% deviation)"
    - "Model width (125M: d=768, 350M: d=1024, 1B: d=2048)"
    - "Training corpus (C4 for natural language, The Stack for code)"
    - "Random seeds (3 per model variant for correlation analysis)"

# ═══════════════════════════════════════════════════════════════
# Null Hypothesis & Success Criteria
# ═══════════════════════════════════════════════════════════════
null_hypothesis:
  statement: |
    There is no significant correlation (Pearson r < 0.3) between residual-corrected Jacobian stable rank
    and efficiency metrics (LoRA rank, KV compression ratio, attention entropy) across layers and random
    seeds at iso-perplexity.

  rejection_criteria:
    - "Pearson r ≥ 0.5 between sr_ℓ^res and all three efficiency metrics across layers and seeds"
    - "Mediation analysis shows sr_ℓ^res explains ≥50% of efficiency variance beyond confounds (corpus entropy, model width)"
    - "Entropy-controlled Fisher test maintains r ≥ 0.5 (validates mechanism under controlled conditions)"

  alternative_outcomes:
    weak_correlation: "0.3 ≤ r < 0.5 suggests partial coupling - efficiency dimensions not fully independent but not strongly unified"
    no_correlation: "r < 0.3 confirms independence - ARD-LoRA, KV-CAT, Mamba address orthogonal problems (valuable negative result)"

# ═══════════════════════════════════════════════════════════════
# Novelty Assessment
# ═══════════════════════════════════════════════════════════════
novelty_assessment:
  core_novelty: |
    First work to test whether parameter-efficient fine-tuning, KV cache compression, and sparse attention
    are correlated manifestations of a single structural property (Jacobian stable rank) vs. independent
    dimensions requiring separate optimization.

  paradigm_shift: |
    From: "Train general model → post-hoc optimization per deployment scenario (LoRA + KV compression + attention pruning)"
    To: "Train for efficiency-readiness via unified structural constraint → deploy without additional tuning"

  differentiation_from_prior_work:
    ard_lora:
      what_it_does: "Optimizes rank allocation during fine-tuning via gradient-based importance"
      our_difference: "We optimize for adaptation-readiness during pretraining by constraining Jacobian stable rank"
    kv_cat:
      what_it_does: "Trains for KV compressibility in isolation"
      our_difference: "We test mechanistic coupling between KV compression, parameter efficiency, and attention via shared Jacobian constraint"
    mamba2:
      what_it_does: "Architectural change (SSMs replacing attention)"
      our_difference: "Objective-level change (stable rank regularization) that's architecture-agnostic and tests correlation hypothesis"

  research_contribution_if_successful: |
    Demonstrates that efficiency dimensions co-emerge from pretraining structure, enabling "train once,
    deploy efficiently" paradigm. Reduces deployment optimization from N×M (scenarios × dimensions) to N+M.

  research_contribution_if_unsuccessful: |
    Proves efficiency dimensions are fundamentally orthogonal - ARD-LoRA, KV-CAT, Mamba address independent
    problems. Justifies current separate-optimization practices and redirects future research.

# ═══════════════════════════════════════════════════════════════
# Clarity & Specificity Assessment
# ═══════════════════════════════════════════════════════════════
clarity:
  question_precision: "HIGH"
  assessment: |
    Hypothesis evolved from fuzzy "unified sparsity" (Exchange 1) to precise mathematical formulation with
    residual-corrected stable rank metric (Exchange 12). All variables operationalized with specific
    measurement protocols.

  testability: "HIGH"
  assessment_testability: |
    Pre-registered quantitative thresholds at each phase:
    - P1: ≥20% sr_ℓ^res reduction at iso-perplexity (≤1% deviation)
    - P2: Pearson r ≥ 0.5 between sr_ℓ^res and efficiency metrics
    - P3: Pareto dominance in ≥2 pairwise comparisons + ≥10% hypervolume improvement

  falsifiability: "HIGH"
  assessment_falsifiability: |
    Clear failure criteria:
    - Phase 1: r < 0.3 for any two metrics → correlation claim fails
    - Phase 2: Mediation < 30% variance explained → causality claim fails
    - Phase 3: No Pareto dominance → efficiency claim fails

# ═══════════════════════════════════════════════════════════════
# Experimental Scope
# ═══════════════════════════════════════════════════════════════
experimental_scope:
  three_phase_design:
    phase1:
      duration: "3 months"
      scale: "125M-350M parameters"
      goal: "Validate core mechanistic hypothesis (correlation + iso-performance)"
      models: "9 training runs (3 variants × 3 seeds)"
      success_gate: "P1 and P2 validated (r ≥ 0.5)"

    phase2:
      duration: "Conditional on Phase 1 success"
      scale: "125M, 350M, 1B parameters (scaling validation)"
      goal: "Test mechanistic links and control for confounds"
      tests:
        - "Entropy-controlled Fisher rank measurement"
        - "Noise-transport experiment (isotropic perturbation propagation)"
        - "Temporal ordering (Granger causality: sr_ℓ^res reduction precedes efficiency gains)"
        - "Mediation analysis (sr_ℓ^res explains ≥50% variance beyond corpus entropy and width)"
      success_gate: "All mechanistic tests validate, correlation strengthens with scale"

    phase3:
      duration: "Conditional on Phase 2 success"
      scale: "1B parameters, domain robustness"
      goal: "Test practical efficiency gains and domain generalization"
      tests:
        - "Domain robustness: natural language (C4) vs. code (The Stack) vs. controlled entropy sweep"
        - "Baseline comparison: unified objective vs. independent optimization stack at equal total compute"
        - "Pareto front analysis: LoRA-KV, LoRA-attention, KV-attention pairwise comparisons"
      success_gate: "P3 validated (Pareto dominance + hypervolume ≥10%)"

  datasets:
    primary: "C4 (10B token subset for Phase 1)"
    robustness: "The Stack (code corpus, high-entropy domain)"
    controlled: "Entropy-sweep corpus (natural language + shuffled tokens at varying ratios)"

  baselines:
    - "Standard transformer pretraining (no regularization)"
    - "Independent optimization stack (baseline + post-hoc ARD-LoRA + KV compression + attention pruning)"
    - "Factorized regularization (three independent penalties: nuclear norm, entropy, sparsity - ablation)"

# ═══════════════════════════════════════════════════════════════
# Measurement Plan
# ═══════════════════════════════════════════════════════════════
measurement_plan:
  during_training:
    sr_res_computation:
      method: "Hutchinson trace estimation (||J̃_ℓ||_F^2) + randomized power iteration (||J̃_ℓ||_2^2)"
      frequency: "Every N steps (logged continuously)"
      probe_vectors: "10 random vectors per layer for spectral norm estimation"
      iterations: "5 power iterations with early stopping"
      expected_cv: "5-8% coefficient of variation (CV)"
      failure_threshold: "CV > 20% invalidates correlation tests"
      overhead: "~15% additional training time"

    validation_metrics:
      - "Perplexity on held-out validation set (iso-performance control)"
      - "Per-layer representation rank (effective rank of activation covariance)"
      - "Gradient signal-to-noise ratio (task-relevant vs. random gradient norms)"

  post_training:
    efficiency_metrics:
      intrinsic_lora_rank:
        method: "Random direction probes (Li et al. 2018)"
        criterion: "Minimum rank for 95% downstream accuracy"
        datasets: "GLUE tasks, SQuAD"
      kv_effective_rank:
        method: "Collect KV cache on validation set → empirical covariance → SVD"
        criterion: "Rank at 90% variance threshold"
      attention_entropy:
        method: "-Σ p_ij log p_ij over attention weights"
        aggregation: "Mean entropy per layer across validation set"

    mechanistic_validation:
      fisher_rank:
        method: "Direct empirical Fisher measurement under entropy-controlled conditions (temperature-scaled logits)"
        test: "Pearson correlation with sr_ℓ^res across layers"
      noise_transport:
        method: "Inject isotropic Gaussian perturbations at layer ℓ → propagate forward → measure output covariance rank"
        test: "Correlation between cumulative sr_ℓ^res and observed covariance rank"
      temporal_ordering:
        method: "Granger causality analysis on training logs"
        test: "sr_ℓ^res reduction precedes Fisher decay and KV rank reduction"

    intervention_experiments:
      subset_layer_regularization:
        method: "Train models with sr_ℓ^res constraint applied only to layers 1-6 (in 12-layer model)"
        test: "Localization score = (within-intervened Fisher change) / (cross-layer Fisher change) > 2.0"
        goal: "Validate layerwise causal control vs. global network effects"

  measurement_validation_gate:
    upfront_test: "Weeks 1-4: Validate on 50M toy model"
    success_criteria:
      - "Spectral norm CV < 15% with 10 probe vectors"
      - "Layerwise sensitivity metrics consistent across 3 random seeds"
      - "Representation rank measurements stable (CV < 20%)"
    failure_action: "If validation fails, refine estimators or use proxy metrics (gradient norm statistics) before Phase 1 training"

# ═══════════════════════════════════════════════════════════════
# Validation Strategy
# ═══════════════════════════════════════════════════════════════
validation:
  correlation_tests:
    primary_test: "Pearson correlation between sr_ℓ^res and each efficiency metric"
    threshold: "r ≥ 0.5 (strong correlation), r < 0.3 (independence)"
    scope: "Across layers and random seeds (9 training runs in Phase 1)"
    controls: "Iso-perplexity (≤1% deviation), matched model width, fixed corpus"

  mediation_analysis:
    goal: "Test whether sr_ℓ^res causally explains efficiency or is proxy for confounds"
    confounds: ["Corpus entropy", "Model width", "Optimizer implicit bias"]
    method: "Structural equation modeling: Direct effect of sr_ℓ^res on efficiency after controlling for confounds"
    success: "sr_ℓ^res explains ≥50% of variance in efficiency metrics beyond confounds"
    failure: "If mediation < 30%, correlation is spurious - stable rank is outcome variable, not causal driver"

  robustness_tests:
    domain_shift:
      test: "Natural language (C4) vs. code (The Stack) vs. controlled entropy sweep"
      prediction: "Correlation r ≥ 0.5 persists across domains, though absolute sr_ℓ^res levels may shift with corpus entropy"
      failure: "If correlation collapses (r < 0.3) under domain shift, principle is context-dependent, not fundamental"

    scaling_behavior:
      test: "125M (d=768), 350M (d=1024), 1B (d=2048) - log-log scaling analysis"
      metric: "Normalized stable rank nsr_ℓ = sr_ℓ^res / d"
      prediction: "Slope of log(nsr_ℓ) vs. log(d) for regularized model < baseline (super-logarithmic decay)"
      failure: "If slopes equal or normalized rank plateaus, structural constraint doesn't change asymptotics"

    layerwise_distribution:
      test: "Per-layer sr_ℓ^res reduction variance"
      success: "Layer variance in rank reduction < 2× mean (distributed constraint)"
      failure: "If variance > 2× mean, capacity redistribution (early layers collapse, later layers compensate) not global constraint"

  pareto_efficiency:
    method: "2D Pareto fronts for pairwise comparisons"
    fronts:
      - "x: LoRA rank, y: KV compression ratio"
      - "x: LoRA rank, y: Attention sparsity"
      - "x: KV compression ratio, y: Attention sparsity"
    success: "Regularized model strictly dominates baseline (lower AND better) in ≥2 of 3 fronts"
    hypervolume: "≥10% improvement in 3D efficiency space (composite measure avoiding arbitrary weights)"
    baseline: "Independent optimization stack (baseline + post-hoc LoRA + KV + attention) at equal total compute"

# ═══════════════════════════════════════════════════════════════
# Discussion Synthesis: Key Tensions & Resolutions
# ═══════════════════════════════════════════════════════════════
discussion_synthesis:
  major_tensions:
    correlation_vs_causation:
      raised_by: "Prof. Rex (Exchange 4, 10, 14)"
      concern: "High mutual information could be shared response to third variable (optimizer bias, capacity pressure)"
      resolution: |
        Three-pronged validation: (1) Mediation analysis controlling for confounds, (2) Temporal ordering
        via Granger causality, (3) Intervention experiments (subset-layer regularization) to test local
        causal control. All required to pass for causal claim.

    measurement_feasibility:
      raised_by: "Prof. Pax (Exchange 3, 9, 15)"
      concern: "Joint covariance operators intractable, MINE unstable, spectral norm estimation high-variance"
      resolution: |
        Replaced intractable objectives with scalable proxies: Hutchinson trace + randomized power iteration
        for sr_ℓ^res (CV ~5-8%). Upfront validation on 50M model with failure threshold (CV > 20%) before
        Phase 1 commitment.

    residual_confound:
      raised_by: "Prof. Rex (Exchange 10)"
      concern: "Identity term in J_ℓ = I + J̃_ℓ artificially depresses stable rank without constraining functional capacity"
      resolution: |
        Formalized residual-corrected metric sr_ℓ^res = ||J̃_ℓ||_F^2 / ||J̃_ℓ||_2^2 that isolates non-residual
        contribution (Prof. Vera Exchange 12). All measurements use corrected metric.

    iso_perplexity_sufficiency:
      raised_by: "Prof. Rex (Exchange 14)"
      concern: "Perplexity is scalar aggregate - could hide uneven capacity redistribution across layers"
      resolution: |
        Added layerwise sensitivity audit: measure per-layer representation rank and gradient SNR.
        Pre-registered failure mode: layer variance in rank reduction > 2× mean indicates compensatory
        redistribution, not global constraint.

    composite_efficiency_gaming:
      raised_by: "Prof. Rex (Exchange 14)"
      concern: "Weighted average for efficiency is arbitrary and gameable"
      resolution: |
        Replaced composite metric with Pareto dominance testing. Report 2D fronts for pairwise comparisons
        (LoRA-KV, LoRA-attention, KV-attention). Success = strict dominance in ≥2 fronts + ≥10% hypervolume
        improvement. No arbitrary weights.

  key_convergence_moments:
    exchange_6_breakthrough:
      persona: "Dr. Ally"
      contribution: "Introduced layer-wise Jacobian stable rank as concrete mechanistic bridge, replacing fuzzy 'sparsity' metaphor with structural object"

    exchange_12_formalization:
      persona: "Prof. Vera"
      contribution: "Formalized residual-corrected metric sr_ℓ^res = ||J̃_ℓ||_F^2 / ||J̃_ℓ||_2^2, removing identity confound"

    exchange_15_feasibility:
      persona: "Prof. Pax"
      contribution: "Provided implementation roadmap: randomized spectral norm estimation (CV ~5-8%), upfront validation gate, 3-month Phase 1 timeline"

  remaining_uncertainties:
    - "Scaling to infinite-width limit (NTK regime) - may exhibit full-rank dynamics despite regularization"
    - "Morphable architecture (attention↔SSM gating) implementation complexity - deferred to Phase 3"
    - "Measurement noise at 1B+ scale - spectral norm estimation may become unreliable"
    - "Generalization beyond transformers - hypothesis assumes residual connections (J_ℓ = I + J̃_ℓ structure)"

# ═══════════════════════════════════════════════════════════════
# Feasibility Assessment
# ═══════════════════════════════════════════════════════════════
feasibility:
  meets_constraints: true
  constraint_validation:
    no_new_benchmarks: "✓ Uses existing datasets (C4, The Stack) and standard metrics (perplexity, intrinsic dimension)"
    no_synthetic_data: "✓ Real pretraining corpora only"
    no_human_evaluation: "✓ All metrics are automated (SVD, correlation, entropy)"

  resource_requirements:
    compute:
      phase1: "Single 8-GPU node, 3 months (9 runs × 125M models on 10B tokens)"
      phase2: "2-3 GPU nodes, 2 months (scaling + mechanistic tests)"
      phase3: "4-6 GPU nodes, 3 months (1B scale + domain robustness)"
    storage: "~500GB (model checkpoints + KV cache samples for covariance analysis)"
    personnel: "1 researcher + measurement infrastructure development (Weeks 1-4 validation)"

  implementation_risks:
    high_risk:
      - "Spectral norm estimation variance (CV > 20% would invalidate correlation tests)"
      mitigation: "Upfront validation on 50M model, early stopping if CV > threshold"
    medium_risk:
      - "Iso-perplexity tuning via adaptive regularization weights (requires PID control or similar)"
      mitigation: "Validation-guided adaptive weight schedule within single training run"
    low_risk:
      - "Standard measurements (LoRA rank, KV SVD, attention entropy) - existing implementations available"

  decision_gates:
    week4_gate: "Measurement validation succeeds (CV < 15% on 50M model)"
    phase1_gate: "P1 and P2 validated (r ≥ 0.5, iso-perplexity maintained)"
    phase2_gate: "Mechanistic tests pass (entropy-controlled Fisher, noise-transport, mediation ≥ 50%)"
    phase3_gate: "Scaling and domain robustness confirmed"

# ═══════════════════════════════════════════════════════════════
# Expected Outcomes & Impact
# ═══════════════════════════════════════════════════════════════
expected_outcomes:
  if_hypothesis_confirmed:
    scientific_impact: |
      Demonstrates that parameter efficiency, memory efficiency, and computational efficiency are correlated
      manifestations of trainable representational structure (Jacobian stable rank), not independent dimensions.
      Shifts paradigm from post-hoc optimization to pretraining-time emergence.
    practical_impact: |
      Enables "train once, deploy efficiently" - models naturally support low-rank adaptation, KV compression,
      and sparse attention without post-deployment tuning. Reduces optimization complexity from N×M to N+M.
    follow_up_research:
      - "Efficiency-aware architecture search: optimize architectures for high rank-entropy-attention correlations"
      - "Transfer efficiency prediction: predict adaptation efficiency from pretraining metrics without fine-tuning"
      - "Continual learning: test whether structured representations reduce catastrophic forgetting"

  if_hypothesis_refuted:
    scientific_impact: |
      Proves efficiency dimensions are fundamentally orthogonal - ARD-LoRA, KV-CAT, Mamba address independent
      problems. Justifies current separate-optimization practices as theoretically necessary, not engineering artifacts.
    practical_impact: |
      Redirects research toward improving individual efficiency techniques rather than seeking unified frameworks.
      Clarifies that deployment optimization must remain multi-stage process.
    follow_up_research:
      - "Investigate why efficiency dimensions decouple despite shared underlying architecture"
      - "Develop better independent optimization techniques for each dimension"
      - "Study task-specific efficiency profiles (when to prioritize LoRA vs. KV vs. attention)"

  partial_success_scenarios:
    weak_correlation:
      outcome: "0.3 ≤ r < 0.5 between sr_ℓ^res and efficiency metrics"
      interpretation: "Partial coupling - efficiency dimensions not fully independent but not strongly unified"
      impact: "Suggests hybrid approaches (some joint optimization, some independent tuning) may be optimal"
    mediation_failure:
      outcome: "Correlation exists (r ≥ 0.5) but mediation < 30%"
      interpretation: "sr_ℓ^res is proxy, not causal driver - correlation due to shared optimizer dynamics"
      impact: "Redirects focus to optimizer implicit bias and training dynamics rather than architectural constraints"
