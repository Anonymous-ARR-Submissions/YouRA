    type: MECHANISM
    statement: Under residual-corrected Jacobian stable rank regularization during
      pretraining, if sr_ℓ^res is reduced by ≥20% (H-E1 validated), then Pearson correlation
      r ≥0.5 exists between sr_ℓ^res and efficiency metrics (intrinsic LoRA rank,
      KV covariance effective rank, attention entropy) across layers and seeds, because
      the Jacobian constraint propagates through Fisher spectrum (F ≈ J^T J), activation
      covariance (Σ_{ℓ+1} ≈ J_ℓ Σ_ℓ J_ℓ^T), and attention entropy structure, manifesting
      as cross-level efficiency properties.
