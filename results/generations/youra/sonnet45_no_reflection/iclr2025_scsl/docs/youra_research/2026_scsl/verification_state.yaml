  h-e1:
    type: EXISTENCE
    statement: Under pretraining with explicit residual-corrected Jacobian stable
      rank (sr_ℓ^res) regularization, if models are trained to minimize sr_ℓ^res =
      ||J̃_ℓ||_F^2 / ||J̃_ℓ||_2^2 per layer, then mean stable rank reduces by ≥20%
      relative to baseline while maintaining iso-perplexity (≤1% deviation), because
      the regularization directly constrains the effective rank of layer-wise representation
      transformations.
