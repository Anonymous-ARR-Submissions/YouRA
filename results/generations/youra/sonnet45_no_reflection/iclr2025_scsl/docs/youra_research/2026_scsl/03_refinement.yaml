novelty:
  preserved_novelty: "First work to test whether parameter efficiency (LoRA), memory efficiency (KV compression), and computational efficiency (sparse attention) are correlated manifestations of a single structural property (Jacobian stable rank) vs. independent dimensions requiring separate optimization."
  key_innovation: "Shifts paradigm from post-hoc efficiency engineering (train general model → add LoRA → compress KV → sparsify attention) to pretraining-time emergence of efficiency-ready models via unified structural constraint."
  differentiation:
    - prior_work: "ARD-LoRA (Shinwari et al. 2025)"
      difference: "ARD-LoRA optimizes rank allocation during fine-tuning, assumes pretrained model as given. Our framework optimizes for adaptation-readiness during pretraining by constraining Jacobian stable rank."
    - prior_work: "KV-CAT (Gelberg et al. 2026)"
      difference: "KV-CAT trains for KV compressibility in isolation, doesn't consider interaction with parameter efficiency or attention structure. We test mechanistic coupling via shared Jacobian constraint."
    - prior_work: "Mamba-2 (Dao & Gu 2024)"
      difference: "Mamba-2 is architectural change (SSMs replacing attention). We propose objective-level change (stable rank regularization) that's architecture-agnostic and tests correlation hypothesis."

