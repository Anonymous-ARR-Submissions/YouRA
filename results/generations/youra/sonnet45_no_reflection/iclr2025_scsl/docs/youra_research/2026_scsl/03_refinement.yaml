# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════
causal_mechanism:
  causal_chain_count: 3
  steps:
    - step: 1
      description: "Residual-corrected Jacobian stable rank regularization during pretraining constrains the effective rank of layer-wise representation transformations (J_ℓ = I + J̃_ℓ)"
      evidence: "Hutchinson trace estimation + randomized power iteration make sr_ℓ^res tractable for gradient-based optimization (Prof. Pax Exchange 9, 15)"
      falsifier: "If sr_ℓ^res cannot be reduced by ≥20% without perplexity degradation, or if reduction is due to residual magnitude shrinking (not functional rank constraint), mechanism fails"
    - step: 2
      description: "Constrained Jacobian stable rank propagates to Fisher spectrum (adaptation efficiency), activation covariance (KV compressibility), and attention structure (sparse attention) via mathematical coupling"
      evidence: "Fisher ≈ J^T J (linearization), Σ_ℓ ≈ J_ℓ Σ_{ℓ-1} J_ℓ^T (covariance propagation), attention entropy bounded by interaction degrees of freedom (Dr. Ally Exchange 6, Prof. Vera Exchange 12)"
      falsifier: "If Pearson r < 0.3 between sr_ℓ^res and any two efficiency metrics across layers/seeds, or if entropy-controlled Fisher test shows correlation collapse, propagation link is invalid"
    - step: 3
      description: "Cross-level efficiency manifests as downstream performance gains: lower LoRA rank for fine-tuning, higher KV compression at iso-accuracy, sparser attention patterns"
      evidence: "Pareto dominance in ≥2 pairwise efficiency comparisons (LoRA-KV, LoRA-attention, KV-attention) demonstrates practical utility (Prof. Rex Exchange 14, Prof. Pax Exchange 15)"
      falsifier: "If unified objective fails to achieve Pareto dominance or ≥10% hypervolume improvement at iso-perplexity, efficiency gains are not realizable"
  key_tension: "Correlation vs. causation: High mutual information between stable rank and efficiency metrics could result from shared response to third variable (optimizer implicit bias, model capacity pressure) rather than mechanistic propagation"
  evidence_summary: |
    Mechanistic links derive from linearized analysis of transformer dynamics. Empirical validation requires:
    (1) Direct Fisher rank measurement under entropy-controlled conditions,
    (2) Noise-transport experiments to test covariance propagation across layers,
    (3) Temporal ordering (Granger causality) to establish precedence: sr_ℓ^res reduction precedes efficiency gains,
    (4) Intervention experiments: subset-layer regularization to test localization of effects.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════
key_assumptions:
  - id: "A1"
    assumption: "Local linearization of transformer blocks is globally informative for KV covariance structure"
    supporting_evidence: "Linearized propagation Σ_{ℓ+1} ≈ J_ℓ Σ_ℓ J_ℓ^T used in neural tangent kernel (NTK) analysis"
    consequence_if_violated: "If nonlinearities (GELU, attention softmax) destroy linearization, Jacobian rank won't predict KV compressibility. Noise-transport experiment required to validate."
  - id: "A2"
    assumption: "Fisher information matrix approximation F ≈ J^T J holds under entropy-controlled conditions"
    supporting_evidence: "Standard approximation for locally linear models with isotropic output noise"
    consequence_if_violated: "If output entropy dominates Fisher spectrum more than Jacobian structure, correlation will collapse when entropy-controlled. Requires direct empirical Fisher measurement."
  - id: "A3"
    assumption: "Iso-perplexity control ensures functional capacity is preserved (no over-constraint)"
    supporting_evidence: "Perplexity is standard measure of language modeling quality"
    consequence_if_violated: "If capacity redistributes unevenly (early layers collapse, later layers compensate), global constraint is actually depth reallocation. Layerwise sensitivity audit required."
  - id: "A4"
    assumption: "Spectral norm estimation via randomized power iteration has acceptable measurement noise (CV < 15%)"
    supporting_evidence: "10 probe vectors with 5 iterations gives CV ~5-8% based on Lanczos method studies (Prof. Pax Exchange 15)"
    consequence_if_violated: "If CV > 20%, correlation tests are noise-dominated and statistically underpowered. Requires upfront measurement validation on 50M toy model."
  - id: "A5"
    assumption: "Correlation between stable rank and efficiency metrics reflects structural coupling, not confounds (corpus entropy, model width, optimizer bias)"
    supporting_evidence: "Mediation analysis can test whether stable rank explains variance beyond confounds"
    consequence_if_violated: "If mediation analysis shows stable rank explains < 30% of variance after controlling for confounds, correlation is spurious. Requires explicit mediation tests in Phase 2."

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════
scope:
  applies_to: |
    - Transformer architectures with residual connections and layer normalization (pre-norm or post-norm)
    - Pretraining on natural language (C4) and code (The Stack) corpora
    - Model scales 125M - 1B parameters (validation path from small to medium scale)
    - Autoregressive language modeling objective with cross-entropy loss
  does_not_apply_to: |
    - Architectures without residual connections (ResNet-style skip connections required for J_ℓ = I + J̃_ℓ decomposition)
    - Non-transformer architectures without clear layer-wise Jacobian structure
    - Models > 7B parameters (not validated due to compute constraints in Phase 1-3)
    - Encoder-only or encoder-decoder architectures (hypothes focuses on autoregressive decoders)
  known_limitations: |
    - Morphable architecture (attention↔SSM gating) deferred to Phase 3 due to implementation complexity (custom CUDA kernels required)
    - Architecture-agnostic validation blocked by Mamba's lack of traditional KV cache (fixed-size recurrent state instead)
    - Infinite-width limit (NTK regime) may exhibit full-rank dynamics - requires width-normalized metrics (nsr_ℓ = sr_ℓ^res / d)
    - Measurement infrastructure for spectral norm estimation must be validated on small models (50M) before scaling

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════
predictions:
  - id: "P1"
    primary: true
    statement: "Pretraining with explicit sr_ℓ^res regularization reduces mean residual-corrected stable rank by ≥20% relative to baseline while maintaining iso-perplexity (≤1% deviation)"
    test_method: "Pretrain 3 model variants (baseline, explicit regularization, implicit control) with 3 seeds each at 125M scale. Measure sr_ℓ^res via Hutchinson trace + randomized power iteration."
    success_criterion: "Mean sr_ℓ^res reduction ≥20% across layers, AND perplexity deviation ≤1%, AND layer variance in rank reduction <2× mean (no compensatory redistribution)"
    falsification: "If sr_ℓ^res reduction <20%, OR perplexity degrades >1%, OR layer variance >2× mean (compensatory redistribution), P1 fails"
  - id: "P2"
    primary: false
    statement: "Pearson r ≥ 0.5 between sr_ℓ^res and each efficiency metric (intrinsic LoRA rank, KV covariance effective rank, attention entropy) across layers and seeds, after controlling for confounds"
    test_method: "Post-pretraining measurements: (1) LoRA rank via random direction probes, (2) KV rank via SVD at 90% variance, (3) attention entropy. Compute correlations + mediation analysis controlling for corpus entropy and model width."
    success_criterion: "Pearson r ≥ 0.5 for all three metric pairs, AND mediation analysis shows sr_ℓ^res explains ≥50% of variance beyond confounds, AND entropy-controlled Fisher test maintains r ≥ 0.5"
    falsification: "If r < 0.3 for any two metrics, OR mediation < 30%, OR entropy-controlled Fisher r < 0.3, P2 fails"
  - id: "P3"
    primary: false
    statement: "Regularized models achieve Pareto dominance in ≥2 pairwise efficiency comparisons at iso-perplexity, with ≥10% hypervolume improvement in 3D efficiency space"
    test_method: "Plot 2D Pareto fronts (LoRA rank vs KV compression, LoRA rank vs attention sparsity, KV compression vs attention sparsity). Test strict dominance (lower AND better). Compute hypervolume indicator."
    success_criterion: "Pareto dominance in ≥2 of 3 pairwise fronts, AND hypervolume improvement ≥10%, at equal perplexity and equal total training compute"
    falsification: "If Pareto dominance in <2 fronts, OR hypervolume improvement <10%, OR requires >30% additional training compute, P3 fails"

