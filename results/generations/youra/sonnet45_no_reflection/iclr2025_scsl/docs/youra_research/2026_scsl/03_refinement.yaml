# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════
core_statement:
  hypothesis_id: "H-JacobianStableRank-v1"
  confidence_level: 0.75
  core_hypothesis_statement: |
    Under pretraining with residual-corrected Jacobian stable rank regularization,
    if models are trained to minimize sr_ℓ^res = ||J̃_ℓ||_F^2 / ||J̃_ℓ||_2^2 per layer,
    then they will exhibit cross-level efficiency properties (low-rank adaptation, KV compressibility, sparse attention),
    because the layer-wise Jacobian constraint propagates through Fisher spectrum, activation covariance, and attention entropy structures.
  alternative_hypothesis_h0: |
    There is no significant correlation (Pearson r < 0.3) between residual-corrected Jacobian stable rank and efficiency metrics (LoRA rank, KV compression ratio, attention entropy) across layers and random seeds at iso-perplexity.

