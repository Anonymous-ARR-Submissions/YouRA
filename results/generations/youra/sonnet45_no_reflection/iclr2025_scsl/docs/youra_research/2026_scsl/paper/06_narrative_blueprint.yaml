# ═══════════════════════════════════════════════════════════════════════════════
# PART 1: HOOK & MOTIVATION
# ═══════════════════════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: "Gradient-based spectral regularization promises a unified framework for optimizing neural network efficiency across multiple dimensions—low-rank adaptation, KV cache compressibility, and sparse attention. But when we attempted to control Jacobian stable rank during transformer pretraining via Hutchinson trace estimation and power iteration, the implementation catastrophically diverged: perplexity exploded from 59 to 45,792 (+77,065%), while all stable rank measurements returned zero."
    strategy: "honest_failure_with_lessons"  # Negative results paper strategy

  why_reader_should_care:
    main_reason: "Spectral regularization via differentiable matrix norms is theoretically elegant but practically fragile. This failure mode analysis provides critical lessons for the machine learning community attempting similar gradient-based spectral control."
    concrete_example: "Researchers implementing spectral normalization via autodiff may encounter silent failures (zero gradients) or training collapse without understanding root causes. Our comprehensive failure analysis documents three failure modes: numerical instability in deep autodiff chains, high variance in Hutchinson trace estimation, and non-convergent power iteration."
    stakes: "Without documenting these failure modes, other researchers will waste compute reproducing the same bugs. Our analysis saves the community from pursuing this dead-end implementation path and points toward viable alternatives (SVD-based post-hoc analysis, architectural constraints)."

  real_world_impact:
    application_domain: "Foundation model training efficiency"
    potential_beneficiaries: "ML researchers working on spectral regularization, parameter efficiency, and unified training objectives"
    scale_of_impact: "Prevents wasteful replication of failed approaches, accelerates research toward viable alternatives"

# ─────────────────────────────────────────────────────────────────────────────
# PROBLEM FRAMING
# ─────────────────────────────────────────────────────────────────────────────

problem_framing:
  surface_problem:
    description: "Foundation models require post-hoc optimization along multiple efficiency dimensions (LoRA rank, KV compression, attention sparsity), each treated as separate engineering effort."
    common_understanding: "Efficiency is achieved through independent post-training optimizations rather than emergent properties from training."

  deeper_problem:
    description: "These efficiency properties—parameter efficiency, memory efficiency, computational efficiency—may be correlated manifestations of a single structural property (Jacobian stable rank) rather than independent dimensions requiring separate optimization."
    why_overlooked: "Prior work optimizes each dimension in isolation. The hypothesis that they share a common structural cause via Jacobian spectral properties has not been tested empirically."
    our_perspective: "We hypothesized that residual-corrected Jacobian stable rank during pretraining could unify these efficiency dimensions through mathematical coupling (Fisher ≈ J^T J, Σ_{ℓ+1} ≈ J_ℓ Σ_ℓ J_ℓ^T)."

  gap_in_existing_work:
    description: "While spectral normalization of weight matrices is established (Miyato et al., 2018), gradient-based control of layer-wise Jacobian spectral properties via differentiable estimation (Hutchinson + power iteration) during training has not been rigorously validated."
    why_gap_exists: "Requires differentiating through complex numerical linear algebra operations (trace estimation, spectral norm computation) in deep computation graphs with attention + MLP + LayerNorm, which may introduce numerical instabilities and gradient pathologies."
    why_gap_matters: "If the gap exists because the approach is fundamentally unsound, the ML community needs to know which implementation strategies fail and why, to avoid wasting resources on dead ends."

# ═══════════════════════════════════════════════════════════════════════════════
# PART 2: THE INSIGHT (NEGATIVE RESULTS VERSION)
# ═══════════════════════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: "Gradient-based Jacobian stable rank regularization is not controllable at the implementation level tested—measurement infrastructure failed completely, returning degenerate zero values while training diverged catastrophically."
    expanded_explanation: "We discovered that computing residual-corrected Jacobian stable rank via Hutchinson trace (10 probes) and randomized power iteration (5 iterations) through PyTorch autodiff produces three critical failure modes: (1) zero stable rank measurements across all layers and checkpoints, indicating measurement bug or detached gradients, (2) regularization losses reaching physically implausible magnitudes (-17.5 billion), and (3) perplexity explosion preventing language learning. The theoretical framework (J^T J ≈ Fisher, covariance propagation) remains mathematically sound, but operationalization via differentiable spectral estimation fails at the autodiff level."

  why_others_missed_it:
    common_assumptions: "Spectral normalization works for weight matrices (Miyato et al., 2018), so Jacobian spectral control via autodiff should be straightforward. Hutchinson trace is standard for large-scale trace estimation. Power iteration converges quickly for spectral norms."
    our_different_view: "We distinguished between static normalization of isolated weight tensors versus dynamic Jacobian estimation through deep computation graphs during training. We also tested the measurement-control gap: measuring spectral properties post-hoc (SVD) versus controlling them via gradients."
    enabling_factor: "Rigorous implementation with comprehensive failure diagnostics (per-layer metrics, adaptive lambda tuning, measurement CV tracking) allowed us to identify root causes rather than attributing failure to 'bad hyperparameters.'"

  what_makes_it_work:
    intuitive_explanation: "It doesn't work. The failure arises from autodiff chain depth and numerical precision issues. Computing ∂h_ℓ/∂h_{ℓ-1} through attention + MLP + LayerNorm creates deep graphs where Hutchinson probes and power iteration lose gradient signal or explode."
    key_mechanism: "Three compounding failure modes: (1) Hutchinson trace variance too high for 768-dim embeddings with 10 probes (requires ~100+ for CV <15%), (2) power iteration non-convergence in 5 iterations for residual-corrected Jacobians, (3) autodiff detachment or gradient explosion in backprop through the regularization term."
    analogy: "Like trying to control a ship's heading by measuring the waves it creates—the measurement itself becomes unstable when coupled back into the control loop through noisy differentiable estimators."

