# PART 3: EVIDENCE STORY (NEGATIVE RESULTS)
# ═══════════════════════════════════════════════════════════════════════════════

evidence_narrative:
  main_claim:
    statement: "Gradient-based residual-corrected Jacobian stable rank regularization via Hutchinson trace + power iteration is not feasible for transformer pretraining with standard autodiff implementations."
    measurable_criteria: "Failure defined as: (1) zero stable rank measurements (0% reduction vs target ≥20%), (2) perplexity deviation >1% (actual +77,065%), (3) training instability (negative regularization losses, loss magnitude explosion)."

  supporting_evidence:
    - id: "evidence_1"
      what: "All 12 transformer layers returned zero stable rank measurements across 5000 training steps, despite adaptive regularization weight tuning."
      so_what: "The measurement infrastructure itself is broken—either Hutchinson trace, power iteration spectral norm, or residual correction returned degenerate values. This blocks all downstream mechanistic testing."
      how_it_supports_claim: "Cannot test controllability hypothesis if measurement returns zeros. Proves implementation failure at foundational level."

    - id: "evidence_2"
      what: "Regularized model achieved final perplexity of 45,792.62 vs baseline 59.34 (+77,065% deviation), with regularization loss evolving from -414K (step 500) to -17.5B (step 4500)."
      so_what: "Catastrophic training divergence despite adaptive lambda decay. Regularization term overwhelmed language modeling objective, preventing convergence. Negative losses violate mathematical definition of stable rank (non-negative by construction)."
      how_it_supports_claim: "Training instability demonstrates that gradient-based regularization is not merely ineffective but actively destructive to optimization."

    - id: "evidence_3"
      what: "Baseline model converged successfully (PPL 59.34) on identical dataset/architecture, validating experimental infrastructure."
      so_what: "Failure is specific to regularization implementation, not due to dataset issues, architecture bugs, or hyperparameter choices. Isolates problem to the stable rank regularization component."
      how_it_supports_claim: "Controlled experiment design proves failure is reproducible and specific to the gradient-based spectral control mechanism."

  surprising_findings:
    finding: "Regularization losses were consistently negative (-414K to -17.5B), despite stable rank being mathematically non-negative (sr = ||J||_F^2 / ||J||_2^2 ≥ 0 by definition)."
    why_surprising: "Violates mathematical constraints of the metric being optimized. Suggests fundamental bug in loss computation, possibly sign error or gradient flow issue in autodiff computation of Jacobian-vector products."
    our_interpretation: "Likely caused by detached intermediate tensors or incorrect gradient accumulation in the custom autograd implementation for Hutchinson trace. The regularizer may be computing gradients for unintended parameters or with incorrect signs."

  what_results_mean:
    synthesis: "The hypothesis that residual-corrected Jacobian stable rank can be controlled during training via gradient-based regularization is refuted at the implementation level tested. The failure is not a hyperparameter issue but a fundamental numerical instability in differentiable spectral estimation via Hutchinson + power iteration through deep transformer computation graphs."
    confidence_level: "HIGH confidence in failure diagnosis. All four gate criteria failed (0/4 met), with massive deviations (77,065% perplexity explosion). Comprehensive diagnostics ruled out alternative explanations."
    caveats: "Alternative implementations (SVD-based, gradient-free methods, different probe counts, non-residual Jacobians) not tested. Failure specific to this implementation approach at 125M scale with PyTorch autodiff."

