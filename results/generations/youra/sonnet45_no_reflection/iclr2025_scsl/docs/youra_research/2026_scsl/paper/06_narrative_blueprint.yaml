# PART 4: BROADER IMPACT (NEGATIVE RESULTS)
# ═══════════════════════════════════════════════════════════════════════════════

takeaway:
  main_contribution:
    one_sentence: "We provide comprehensive failure mode analysis of gradient-based Jacobian stable rank regularization, documenting three critical implementation pitfalls and recommending viable alternative approaches for spectral control in neural networks."
    why_significant: "Prevents the ML community from wasting compute reproducing this dead-end implementation path. Negative results with rigorous analysis are valuable—they eliminate false paths and redirect research toward promising directions."

  implications:
    for_field: "Establishes that differentiable spectral estimation via Hutchinson + power iteration is insufficient for layer-wise Jacobian control in transformers. Future work on spectral regularization should use post-hoc SVD analysis, architectural constraints (bottleneck layers), or gradient-free spectral methods."
    for_practice: "Practitioners attempting spectral regularization should be aware of autodiff gradient pathologies in deep computation graphs. Standard numerical methods (power iteration, Hutchinson trace) require orders of magnitude more samples/iterations than literature suggests when embedded in training loops."
    conceptual_contribution: "Highlights the measurement-control gap: post-hoc measurement of spectral properties (numerically stable) versus gradient-based control during training (numerically unstable). Not all mathematical operations are practical to differentiate at scale."

  future_possibilities:
    immediate_extensions: "Post-hoc SVD observational study (FW3 in Section 7): measure stable rank via SVD on pretrained checkpoints, test correlation hypothesis without gradient-based control. If r ≥0.3 correlation found, hypothesis retains scientific value despite implementation failure."
    longer_term_vision: "Architectural approaches to low-rank structure: explicit bottleneck layers, factorized attention, or structural rank constraints that avoid gradient-based spectral estimation entirely. Alternative: Lanczos algorithm or randomized SVD with better convergence guarantees."
    open_questions: "Is the core hypothesis (stable rank correlates with efficiency metrics) true observationally, even if not controllable via gradients? Do alternative spectral estimation methods (Lanczos, randomized SVD) avoid these failure modes? Can spectral regularization work at larger scales (350M, 1B) with more stable Jacobian spectra?"

