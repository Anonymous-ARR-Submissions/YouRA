# ═══════════════════════════════════════════════════════════════════════════════
# PART 1: HOOK & MOTIVATION
# ═══════════════════════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: "How do we know if an AI system is *too* aligned? Current alignment evaluation focuses on whether AI outputs match human preferences—but not on whether excessive alignment inadvertently degrades human oversight."
    strategy: "methodological_gap"

  why_reader_should_care:
    main_reason: "Bidirectional alignment dynamics—the coupling between AI compliance and human oversight quality—remain unmeasured despite being critical for safe AI deployment in high-stakes domains like medical diagnosis and code review."
    concrete_example: "A highly compliant AI assistant that rarely disagrees with users may reduce observable conflict, but this very harmony could erode human verification effort through automation bias, paradoxically increasing deployment risk."
    stakes: "Without measurement frameworks for bidirectional effects, alignment interventions risk creating systems that pass static evaluations but degrade human-AI collaboration quality over time."

  real_world_impact:
    application_domain: "High-stakes human-AI collaboration (medical diagnosis, code review, content moderation) where oversight quality directly affects safety outcomes"
    potential_beneficiaries: "AI safety researchers, alignment practitioners, human factors engineers, policymakers designing AI governance frameworks"
    scale_of_impact: "Addresses a foundational measurement gap affecting all AI systems deployed in collaborative contexts where human oversight is a critical safety layer"

problem_framing:
  surface_problem:
    description: "AI alignment research evaluates whether AI systems conform to human values and preferences"
    common_understanding: "Higher alignment (measured via preference matching, helpfulness ratings, harmlessness scores) is universally better"

  deeper_problem:
    description: "Alignment evaluation is unidirectional—measuring AI performance without considering reciprocal effects on human oversight behavior"
    why_overlooked: "Alignment literature inherits an implicit assumption from supervised learning: optimizing the model's behavior is sufficient. Human-in-the-loop effects are treated as separate research areas (human factors, automation bias) not integrated into alignment evaluation."
    our_perspective: "Alignment is a bidirectional phenomenon: AI compliance affects human oversight retention, creating a coupled dynamic that must be measured jointly, not separately."

  gap_in_existing_work:
    description: "No existing framework operationalizes bidirectional alignment as measurable, coupled variables with experimental protocols for testing coupling mechanisms"
    why_gap_exists: "Technical challenge: measuring alignment's effect on human behavior requires architectural separation (policy-layer modulation must not confound capability), behavioral measurement (signal detection for oversight quality), and longitudinal protocols (tracking temporal dynamics). Conceptual challenge: automation bias literature focuses on traditional automation, not AI collaboration."
    why_gap_matters: "Without measurement, alignment interventions are designed and evaluated in isolation from their downstream effects on human oversight, potentially creating systems that optimize narrow metrics while degrading collaboration safety."

# ═══════════════════════════════════════════════════════════════════════════════
# PART 2: THE INSIGHT
# ═══════════════════════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: "Bidirectional alignment evaluation requires architectural separation: policy-layer compliance modulation (ACE) must preserve base capability (ICC > 0.95) to isolate alignment's effect on human oversight (HOR), measured via signal detection d' on seeded within-distribution errors."
    expanded_explanation: "The key challenge is disentangling alignment changes from capability changes. Constitutional AI's policy-layer architecture provides the required separation: system prompts or constitutional rules modulate compliance while base model weights remain frozen. By measuring capability invariance statistically (ICC, ANOVA, Cohen's f) and oversight quality behaviorally (signal detection sensitivity), we can test whether alignment-oversight coupling exists and characterize its functional form."

  why_others_missed_it:
    common_assumptions: "Alignment researchers assume that improving AI outputs is sufficient and that human oversight effects are secondary engineering concerns, not central to alignment science. Human factors researchers study automation bias in traditional automation but don't integrate with AI alignment evaluation frameworks."
    our_different_view: "Alignment quality cannot be evaluated independently of its effects on human collaboration partners. The two must be measured as a coupled system."
    enabling_factor: "Constitutional AI's architectural separation between base model and policy layer enables the critical experimental manipulation: varying alignment strength (λ parameter) while holding capability constant. This wasn't possible with earlier alignment approaches (RLHF fine-tuning, prompt engineering) that confound alignment with capability changes."

  what_makes_it_work:
    intuitive_explanation: "Think of it like a medical test: to measure a drug's side effects, you need a placebo control that isolates the drug's mechanism. Similarly, to measure alignment's effect on oversight, you need to modulate alignment without changing the AI's underlying capability—policy-layer manipulation provides that control."
    key_mechanism: "Frozen base model weights ensure capability invariance (testable via ICC > 0.95 on MMLU/HumanEval benchmarks across compliance levels), while policy-layer parameters (system prompt intensity, constitutional rule weights) vary alignment strength. Human oversight is measured via signal detection d' on seeded within-distribution errors, capturing error detection sensitivity without confounding task difficulty."
    analogy: "Like a placebo-controlled medical trial, but for AI alignment: the 'active ingredient' (policy layer) is isolated from the 'base formula' (capability) to measure side effects (oversight degradation)."

# ═══════════════════════════════════════════════════════════════════════════════
# PART 3: EVIDENCE STORY
# ═══════════════════════════════════════════════════════════════════════════════
# NOTE: No empirical evidence exists (experiments not executed).
# This section documents the DESIGNED evidence story for transparency.

evidence_narrative:
  main_claim:
    statement: "We present the first operationalization of bidirectional alignment dynamics as measurable, coupled variables (ACE and HOR) with a testable dependency chain (h-e1 → h-m1 → h-m2 → h-m3 → h-m4) and gate-based validation protocol."
    measurable_criteria: "Methodological contribution validated via: (1) Complete experimental design specification (Phase 2C), (2) Infrastructure implementation with real dataset verification (MMLU 57 subjects/14,042 questions, HumanEval 164 problems), (3) Mock data detection and correction (Attempt 1/5 fix protocol), (4) Explicit falsification criteria for all assumptions (A1-A5) and predictions (P1-P5)."

  supporting_evidence:
    - id: "evidence_1_mock_data_fix"
      what: "Automated validator detected 5 synthetic data patterns in POC code (np.random generation ensuring ICC > 0.95 by design) and successfully applied corrective fix (disabled POC, verified real data loaders). 6/6 verification checks passed."
      so_what: "Demonstrates effective quality control in automated hypothesis verification. Prevents false validation—validator correctly identified that high ICC was guaranteed by construction, not genuine capability invariance."
      how_it_supports_claim: "Infrastructure validation shows the framework can detect methodological flaws. Mock data fix is evidence of rigorous experimental design enforcement, not just theoretical specification."

    - id: "evidence_2_real_datasets"
      what: "MMLU: 57 subjects (abstract_algebra through virology), 14,042 test questions loaded from HuggingFace cais/mmlu. HumanEval: 164 hand-written programming problems loaded from openai/human-eval. Sample questions manually inspected and matched published benchmarks."
      so_what: "Confirms infrastructure correctness and ensures future experiments would use standard, widely-accepted benchmarks—not custom or synthetic datasets. Enables comparability with prior work and reproducibility."
      how_it_supports_claim: "Real dataset verification demonstrates that ACE manipulation (policy-layer compliance modulation) can be tested on established capability benchmarks, validating the architectural separation approach."

    - id: "evidence_3_dependency_structure"
      what: "Five sub-hypotheses (h-e1 EXISTENCE, h-m1 through h-m4 MECHANISM) with explicit dependencies (h-e1 → h-m1 → h-m2 → h-m3 → h-m4), gate types (MUST_WORK, DETERMINES_SUCCESS), falsification criteria, and routing decisions (ABORT chain, MODIFY hypothesis, ROUTED_TO_PHASE_2A)."
      so_what: "Pre-specifies success criteria and failure handling before experiments, reducing researcher degrees of freedom and increasing replicability. Demonstrates rigorous scientific methodology, not exploratory post-hoc interpretation."
      how_it_supports_claim: "Dependency structure shows the hypothesis is decomposed into testable components with clear validity checks. The framework is falsifiable and iteratively refinable, not just a conceptual proposal."

  surprising_findings:
    finding: "Planned experiment execution was blocked not by scientific or methodological issues, but by resource constraint (API key unavailability, ~$1,620 budget for MMLU + HumanEval evaluation)."
    why_surprising: "Phase 2C experiment design and Phase 3 implementation planning completed successfully, suggesting full empirical execution was intended. Infrastructure validation passed all checks (mock data fixed, real datasets verified, statistical pipeline functional), yet execution did not proceed."
    our_interpretation: "Most likely explanation is budget approval gap—experiment design was complete and ready, but ~$1,620 API cost required approval that was not obtained. This is an IMPLEMENTATION_GAP (resource constraint), not a HYPOTHESIS_ISSUE (scientific flaw) or DESIGN_ISSUE (experimental design problem). Classification matters for interpreting whether the approach is methodologically sound (yes, pending execution) vs. fundamentally flawed (no)."

  what_results_mean:
    synthesis: "This work contributes a methodological framework and validated infrastructure for bidirectional alignment evaluation, not empirical findings about alignment-oversight coupling. The contribution is at the design and engineering level: we show HOW to measure bidirectional dynamics, not WHAT those dynamics are."
    confidence_level: "High confidence in methodological design (16-exchange Phase 2A dialogue, rigorous Phase 2B decomposition, validated Phase 3 implementation). Zero confidence in empirical claims (no experiments executed, all predictions INCONCLUSIVE)."
    caveats: "All five key assumptions (A1-A5) remain UNVERIFIED. The four-step causal mechanism is a theoretical framework without empirical support. Infrastructure readiness does not imply hypothesis correctness—h-e1 execution could fail gate criteria (ICC < 0.95), invalidating the entire approach."

