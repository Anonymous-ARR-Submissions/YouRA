    layer must exist and demonstrate ICC > 0.95 capability invariance across λ levels
  sh2_mechanism: 'Test four-step causal chain: ACE↑ → disagreement↓ → perceived reliability↑
    → HOR↓. Validate via mediation test (P3) with randomized confidence displays.'
  sh3_comparison: Compare three competing functional forms (M1 linear, M2 quadratic,
    M3 bifurcation) via AIC model selection. Cross-validate medical→coding domains.
  open_questions:
  - Optimal disagreement frequency for metacognitive intervention (15-25% range requires
    empirical tuning)
  - Cross-domain generalization beyond medical/coding (creative writing, scientific
    research domains)
  - 'Timescale extension: do dynamics extend beyond 1-month measurement window?'
  - 'Individual differences: expertise-dependent HOR curves (novice vs expert users)'
