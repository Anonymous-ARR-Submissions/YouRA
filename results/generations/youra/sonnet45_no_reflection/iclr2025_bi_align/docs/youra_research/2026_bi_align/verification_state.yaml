main_hypothesis:
  id: H-BiAlign-v1
  title: Bidirectional Alignment via Policy-Layer Compliance Modulation
  statement: Under human-AI collaborative tasks with policy-layer compliance manipulation,
    if AI Compliance Elasticity (ACE) is increased while holding base capability constant,
    then Human Oversight Retention (HOR) will exhibit coupling governed by Bayesian
    trust calibration (ACE → perceived reliability → HOR degradation), with functional
    form distinguishable as linear (M1), quadratic/inverted-U (M2), or bifurcation
    (M3), because increased compliance reduces observable AI-human disagreement signals,
    leading to automation bias through reduced verification effort.
  defined_in: 03_refinement.yaml
