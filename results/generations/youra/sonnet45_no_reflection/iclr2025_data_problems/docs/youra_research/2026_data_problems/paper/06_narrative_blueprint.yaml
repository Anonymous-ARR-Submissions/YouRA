# Narrative Blueprint for Phase 6 Paper Writing
# Generated: 2026-05-11
# Paper Type: NEGATIVE RESULTS - Implementation Failure Documentation
# Based on Phase 4.5 Section 8: Implications for Phase 6 Paper Writing

version: "2.0"
paper_type: "negative_results"
recommendation: "Document failure mode as methodological contribution"

# ═══════════════════════════════════════════════════════════════
# CRITICAL CONTEXT FROM PHASE 4.5
# ═══════════════════════════════════════════════════════════════

phase45_guidance:
  recommended_action: "Option B: Do Not Write Standard Paper"
  rationale: |
    - Zero theoretical contributions validated
    - Zero predictions supported
    - Hypothesis routed to Phase 0 for reconceptualization
    - No novel findings beyond documenting implementation failure

  alternative_if_publishing: "Negative Results Framing"
  meta_contribution: "Testing methodology gap: data validation ≠ algorithm correctness"

# ═══════════════════════════════════════════════════════════════
# HOOK DESIGN (Phase 4.5 Section 8.1)
# ═══════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: |
      We report a fundamental failure mode in research pipeline execution: passing mock data
      validation checks does not guarantee algorithm implementation correctness. Our three-tier
      contamination detection architecture achieved 100% detection power with 100% false positive
      rate because all detection algorithms were replaced with hard-coded True return values during
      Phase 4 implementation, despite external validation confirming that real datasets (GSM8K, MATH)
      were loaded correctly.
    strategy: "surprising_failure_mode"

  why_reader_should_care:
    main_reason: "Reveals systematic testing gap in computational research"
    concrete_example: |
      Mock data validation verified dataset loading correctness but missed that detection tiers
      returned constant True values, producing a tautological detector that flags all samples
    stakes: "Without per-component validation, research pipelines can pass data checks while completely failing to implement proposed algorithms"

# ═══════════════════════════════════════════════════════════════
# PROBLEM FRAMING (Three Levels)
# ═══════════════════════════════════════════════════════════════

problem_framing:
  surface_problem:
    description: "Benchmark contamination threatens model evaluation validity"
    common_understanding: "Prior work proposes various detection methods (MIA, semantic similarity, geometric analysis)"

  deeper_problem:
    description: "Our proposed three-tier detection architecture completely failed to function"
    why_overlooked: "Implementation passed data validation but never implemented actual detection logic"
    our_perspective: "The failure reveals that data loading correctness and algorithm correctness are orthogonal concerns"

  gap_in_existing_work:
    description: "Testing methodologies focus on end-to-end validation without per-component unit testing"
    why_gap_exists: "Mock data validation paradigm checks inputs (data loading) but not processing logic (algorithm implementation)"
    why_gap_matters: "Allows fundamental implementation failures to pass validation, wasting research resources"

# ═══════════════════════════════════════════════════════════════
# KEY INSIGHT (Phase 4.5 Section 8.2 - NONE VALIDATED)
# ═══════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: "Mock data validation that checks dataset loading correctness is insufficient to ensure detection algorithm implementation"
    expanded_explanation: |
      In our experiment, all three detection tiers (data-layer filters, TSG probes, geometric metrics)
      returned hard-coded True values, producing 100% false positive rate, despite passing external
      validation that confirmed real datasets were loaded correctly. This demonstrates that data loading
      correctness and algorithm correctness are orthogonal concerns requiring independent validation.

  why_others_missed_it:
    common_assumptions: "Mock data validation checking for hard-coded accuracy formulas is sufficient"
    our_different_view: "Validation scope must extend to detection logic, not just training data correctness"
    enabling_factor: "Experiencing complete implementation failure forced recognition of this testing gap"

  what_makes_it_work:
    intuitive_explanation: "Data can be loaded correctly while algorithms remain unimplemented"
    key_mechanism: "Per-component unit testing for each detection tier before integration testing"

# ═══════════════════════════════════════════════════════════════
# EVIDENCE NARRATIVE (Phase 4.5 Section 8.5)
# ═══════════════════════════════════════════════════════════════

evidence_narrative:
  main_claim:
    statement: "Three-tier detection architecture failed due to implementation gaps, not theoretical issues"
    measurable_criteria: "100% detection power + 100% FPR = constant function classifier"

  supporting_evidence:
    - id: "evidence_1_confusion_matrix"
      what: "100% detection power, 100% false positive rate"
      so_what: "Mathematically impossible for meaningful detector - signature of constant function"
      how_it_supports_claim: "Proves detector always returns True, never computed actual metrics"
      source: "Phase 4.5 Section 5.2, h-e1/04_validation.md"

    - id: "evidence_2_implementation_gap"
      what: "10/15 Phase 3 tasks (67%) not implemented"
      so_what: "Systematic failure, not isolated bug - all three detection tiers skipped"
      how_it_supports_claim: "Documents magnitude of implementation failure"
      source: "Phase 4.5 Section 5.6 Planned vs Actual comparison"

    - id: "evidence_3_validation_scope_gap"
      what: "Mock validation passed despite broken detection"
      so_what: "Validation checked data loading but not detection algorithms"
      how_it_supports_claim: "Illustrates the testing methodology gap we're documenting"
      source: "Phase 4.5 Section 4.2 Finding 2"

    - id: "evidence_4_cascade_failure"
      what: "h-e1 FAILED → h-m1, h-m2, h-m3 CASCADE_FAILED"
      so_what: "Foundation hypothesis failure prevented all mechanism testing"
      how_it_supports_claim: "Shows dependency structure amplifies single failure point"
      source: "Phase 4.5 Section 5.1, verification_state.yaml"

  surprising_findings:
    finding: "External validation reported PASSED yet detector had 100% FPR"
    why_surprising: "Validation explicitly checked for hard-coded logic but missed detection tier bugs"
    our_interpretation: "Validation scoped to training data correctness, treated detection as separate concern"

  what_results_mean:
    immediate: "Proposed contamination detection approach remains completely untested"
    broader: "Research pipelines need per-component unit testing, not just end-to-end validation"
    methodological: "Data correctness and algorithm correctness require independent validation"

# ═══════════════════════════════════════════════════════════════
# SECTION-LEVEL NARRATIVE GOALS
# ═══════════════════════════════════════════════════════════════

section_goals:
  abstract:
    narrative_purpose: "Frame as methodological contribution about testing gaps in research pipelines"
    key_message: "Mock data validation ≠ algorithm implementation - systematic testing gap revealed"
    quantitative_anchor: "100% detection power + 100% FPR"

  introduction:
    narrative_purpose: "Surface problem (contamination) → Deeper problem (our detection failed) → Gap (testing methodology)"
    hook_strategy: "surprising_failure_mode"
    transition_to_related: "Prior work proposes detection methods; we attempted three-tier architecture but failed to implement it"

  related_work:
    narrative_purpose: "Position our work as attempted extension of Fu et al. (MIA) and Dekoninck et al. (EAL evasion)"
    positioning_strategy: "honest_about_failure"
    key_comparison_points:
      - "Fu et al. (2024): MIA fails in pretraining (AUC≈50%) - motivation valid"
      - "Dekoninck et al. (2024): EAL evades semantic detection - attack paper findings remain state-of-the-art"
      - "Our work: Proposed geometric detection extension, failed to implement, no advancement beyond prior work"

  methodology:
    narrative_purpose: "Describe WHAT we intended to implement (three-tier architecture concept)"
    connection_to_insight: "Design was sound in principle; failure occurred in implementation execution"
    key_design_decisions:
      - "Tier 1: Data-layer filters (LSH fingerprinting, temporal isolation) - NOT IMPLEMENTED"
      - "Tier 2: TSG probes with differential alignment - NOT IMPLEMENTED"
      - "Tier 3: Geometric metrics (gradient/Hessian/CKA/efficiency) - NOT IMPLEMENTED"
    note: "Section describes intended design, Discussion explains implementation failure"

  experiments:
    narrative_purpose: "Describe experimental design that should have tested our approach"
    experimental_questions:
      - "RQ1: Can three-tier detection achieve ≥80% power at <5% FPR?"
      - "RQ2: Do geometric signatures correlate with contamination gains?"
      - "RQ3: Are TSG probes paraphrase-invariant?"
    dataset_rationale: "GSM8K (contamination target) + MATH (clean baseline)"
    baseline_rationale: "N/A - no meaningful baselines when detector is broken"
    metric_rationale: "Combined detection power, FPR - standard binary classification metrics"

  results:
    narrative_purpose: "Report failure evidence with interpretation, not just numbers"
    main_result_highlight: "100% detection power + 100% FPR = constant function classifier"
    result_interpretation_required: true
    evidence_structure:
      - "Main Result: Perfect detection with perfect false positives (Evidence 1)"
      - "Implementation Gap: 67% of tasks not implemented (Evidence 2)"
      - "Validation Scope Gap: Mock validation passed despite failure (Evidence 3)"
      - "Cascade Impact: Foundation failure prevented mechanism testing (Evidence 4)"

  discussion:
    narrative_purpose: "Interpret failure, extract methodological lessons, acknowledge what remains unknown"
    key_findings_interpretation:
      - "Finding 1: Data validation ≠ algorithm validation - orthogonal concerns"
      - "Finding 2: End-to-end validation insufficient without per-component unit tests"
      - "Finding 3: Original hypothesis (geometric detection) remains completely untested"
    honest_limitations:
      - limitation: "Complete implementation failure - no theoretical contributions validated"
        why_acceptable: "Documenting failure mode is the contribution, not validating detection theory"
      - limitation: "Zero predictions supported, all mechanism hypotheses untested"
        why_acceptable: "This is negative results paper documenting methodology failure"
      - limitation: "TSG paraphrase-invariance never demonstrated"
        why_acceptable: "Implementation failure prevented testing; assumption remains unverified"
      - limitation: "Geometric inevitability theorem untested"
        why_acceptable: "Adaptive adversary experiments not executed due to foundation failure"

  conclusion:
    narrative_purpose: "Close with lessons learned and path forward (not our work, but field's)"
    callback_to_hook: "We began by documenting a testing gap: data validation does not ensure algorithm correctness"
    memorable_ending: "Research pipelines need validation strategies that separately verify data loading and algorithm implementation"

# ═══════════════════════════════════════════════════════════════
# BROADER IMPACT & TAKEAWAY
# ═══════════════════════════════════════════════════════════════

takeaway:
  main_contribution:
    one_sentence: "Documented testing methodology gap: mock data validation checking dataset correctness is insufficient to ensure algorithm implementation"
    why_significant: "Generalizable lesson for research pipelines about validation scope"

  implications:
    for_field: "Research community should adopt per-component unit testing before integration testing"
    for_practice: "Pipeline developers: validate data loading AND algorithm logic independently"

  future_possibilities:
    immediate_extensions:
      - "Per-tier unit testing before integration (from Phase 4.5 Section 7.1)"
      - "Validation scope expansion: data + algorithm correctness (from Phase 4.5 Section 7.2)"
    longer_term_vision:
      - "TSG paraphrase-invariance validation as Phase 0 PoC (from Phase 4.5 Section 7.3)"
      - "Gradient correlation validation on known-contaminated models (from Phase 4.5 Section 7.4)"
    note: "Future work from Phase 4.5 Section 7 - results-grounded, not speculative"

# ═══════════════════════════════════════════════════════════════
# NARRATIVE COHERENCE CHECKLIST
# ═══════════════════════════════════════════════════════════════

narrative_coherence_checklist:
  - check: "Does Introduction hook (failure mode) connect to Conclusion (testing methodology lesson)?"
    status: "YES - narrative loop closed"

  - check: "Does each section naturally flow to the next?"
    status: "YES - Intro (problem) → Related (prior work) → Method (intended design) → Experiments (test plan) → Results (failure evidence) → Discussion (interpretation) → Conclusion (lessons)"

  - check: "Is key insight (validation scope gap) consistently emphasized?"
    status: "YES - appears in hook, problem framing, evidence narrative, discussion, conclusion"

  - check: "Are all major claims supported by evidence?"
    status: "YES - implementation failure claim supported by 4 evidence items from Phase 4.5"

  - check: "Would a busy reviewer find Abstract compelling?"
    status: "CONDITIONAL - compelling if reviewer values negative results; may reject if expecting positive contribution"

# ═══════════════════════════════════════════════════════════════
# HONEST FRAMING (CRITICAL FOR NEGATIVE RESULTS)
# ═══════════════════════════════════════════════════════════════

honest_framing:
  what_this_paper_is:
    - "Negative results paper documenting implementation failure"
    - "Methodological contribution about testing gaps in research pipelines"
    - "Honest documentation of what went wrong and why"

  what_this_paper_is_not:
    - "Validation of contamination detection theory (hypothesis untested)"
    - "Advancement beyond Fu et al. or Dekoninck et al. (no progress made)"
    - "Novel contamination detection method (implementation failed)"

  reviewer_expectations:
    likely_reaction: "Why publish a failure? What's the contribution?"
    our_response: "Testing methodology gap is generalizable lesson; documenting failure modes prevents repetition"
    venue_fit: "Workshops on reproducibility, negative results tracks, methodology venues"
    main_venue_risk: "High rejection risk at ICML/NeurIPS main track without methodological framing"

# ═══════════════════════════════════════════════════════════════
# WRITING CONSTRAINTS
# ═══════════════════════════════════════════════════════════════

constraints:
  zero_claims_allowed:
    - "Three-tier detection achieves ≥80% power at <5% FPR (REFUTED - 100% FPR)"
    - "Geometric detection resists paraphrasing attacks (NOT TESTED)"
    - "TSG provides paraphrase-invariant detection (NOT TESTED)"
    - "Geometric inevitability theorem (NOT TESTED)"
    - "Method enables stable benchmarks (ELIMINATED - detector unusable)"

  must_emphasize:
    - "Complete implementation failure (all 3 tiers)"
    - "Data validation passed, algorithm validation failed"
    - "Systematic testing gap revealed"
    - "Original hypothesis remains unvalidated"

  tone:
    approach: "Honest, methodological, constructive"
    avoid: "Defensive, minimizing, claiming partial success"
    model: "Treat failure as learning opportunity for field"
