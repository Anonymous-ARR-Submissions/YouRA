novelty:
  paradigm_shift:
    from: "Instance-level similarity detection (MIA, text matching)"
    to: "Learning-trajectory geometric invariants (gradient alignment, Hessian anisotropy)"
    impact: "Addresses fundamental failure mode: instance detection achieves AUC≈50% in pretraining, TPR<2% against EAL"

  technical_innovations:
    - innovation: "Task Signature Graphs (TSG)"
      description: "Abstract constraint manifolds extracted via program synthesis/canonicalization, paraphrase-invariant"
      comparison_to_prior_work: "Embeddings (EAL evades), MIA instance detection (fails AUC≈50%) → TSGs target task structure, not surface form"

    - innovation: "Differential Alignment Metric (Δ)"
      description: "Δ = (ΔL_invariant - ΔL_neighbor) separates contamination-specific from general skill transfer"
      comparison_to_prior_work: "Prior work: absolute probe performance → can't distinguish contamination from legitimate training on similar tasks"

    - innovation: "Geometric Inevitability Theorem"
      description: "Contamination gains require detectable parameter-space alignment; Pareto constraint limits evasion"
      comparison_to_prior_work: "Prior work: detection as cat-and-mouse game → geometric approach proves structural limits on evasion"

    - innovation: "Multi-tier Complementary Architecture"
      description: "Three layers handle accidental (data), behavioral (manifold), geometric (trajectory) signals"
      comparison_to_prior_work: "Prior work: single-method approaches (MIA, similarity) → combined system achieves >80% power where individual methods fail"

  ecosystem_contribution:
    innovation: "Cryptographic audit infrastructure (signed trajectories, Evaluation Registry, pre-registered predictions)"
    comparison_to_prior_work: "LiveCodeBench: evaluation-side freshness → Our approach: training-side accountability, enables stable benchmarks"

