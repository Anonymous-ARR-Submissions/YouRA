# SECTION 1.5: Testable Predictions
# ═══════════════════════════════════════════════════════════════

testable_predictions:
  predictions:
    - prediction_id: "P1-TierSpecific"
      statement: |
        Tier 1 (data-layer) will catch ≥95% of accidental web-scrape contamination but <10% of EAL-style paraphrased contamination.
        Tier 2 (manifold-layer) differential alignment will exceed clean baseline by ≥2σ for 5% injection, ≥1.5σ for 1%.
        Tier 3 (geometry-layer) will show ≥2 of 4 metrics exceeding thresholds for 5% injection.
      measurement: "Apply each tier independently, measure detection rates per tier"
      success_criteria: "Tier 1: ≥95% accidental, <10% adversarial | Tier 2: ≥2σ deviation | Tier 3: ≥2/4 metrics"
      failure_criteria: "Any tier misses its target by >20 percentage points"

    - prediction_id: "P2-ParetoFrontier"
      statement: |
        Adaptive adversary training with probe access will reveal a convex Pareto frontier: suppressing Tier 2-3 detection signals by 50% will reduce benchmark gains by ≥30%. No flat region (high gain + low signal) will exist.
      measurement: "Train with varying λ ∈ {0, 0.1, 0.5, 1.0, 2.0}, plot gain vs. detection probability across seeds"
      success_criteria: "Frontier is convex; 50% signal reduction costs ≥30% gains"
      failure_criteria: "Flat region exists: ≥10% gains achievable with <5% detection probability"

    - prediction_id: "P3-DomainSpecificity"
      statement: |
        Detection power for structured domains (HumanEval, GSM8K, MATH) will exceed 80%, while open-ended NLP tasks (TruthfulQA) may achieve only 50-60%, reflecting TSG extraction reliability differences.
      measurement: "Replicate protocol across code/math (structured) vs. open-ended NLP benchmarks"
      success_criteria: "Code/math: ≥80% detection | Open-NLP: 50-60% detection (expected degradation)"
      failure_criteria: "Code/math detection <60% OR open-NLP unexpectedly high (>75%, suggests overfitting)"

    - prediction_id: "P4-DifferentialAlignment"
      statement: |
        EAL-contaminated runs show Δ = (ΔL_invariant - ΔL_neighbor) significantly exceeding clean baseline, while legitimate broad math training shows Δ≈0 (both invariant and neighbor probes improve equally).
      measurement: "Compare EAL 5% injection vs. general MATH dataset finetuning on differential alignment metric"
      success_criteria: "EAL: Δ > 2σ above clean | General math training: |Δ| < 0.5σ"
      failure_criteria: "EAL and general training both show high Δ (metric doesn't discriminate)"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Experimental Design Overview
# ═══════════════════════════════════════════════════════════════

experimental_design:
  phase1_baseline:
    objective: "Replicate EAL protocol to establish contamination baseline"
    conditions:
      - "Clean baseline: Math reasoning datasets (exclude GSM8K train)"
      - "EAL 1%: 99% background + 1% GPT-4-paraphrased GSM8K"
      - "EAL 5%: 95% background + 5% paraphrased GSM8K"
    target: "Achieve ~15% accuracy gain on GSM8K test set (per Dekoninck et al.)"
    hyperparameters: "lr=2×10⁻⁵, batch=64, epochs≤3 (match EAL paper)"
    seeds: "N=20 independent runs per condition"

  phase2_detection:
    tier1_validation:
      - "Apply temporal filter: check if data timestamps predate GSM8K release"
      - "Apply LSH fingerprinting: near-duplicate matches vs. GSM8K corpus"
      - "Expected: 0% detection for EAL (paraphrasing evades), ≥95% for accidental"

    tier2_validation:
      - "Construct TSG probe families: 1000 invariant (GSM8K-like), 1000 neighbor (general math), 1000 broken-control"
      - "Log probe loss every 100 steps during finetuning"
      - "Compute differential alignment: Δ = (ΔL_a - ΔL_b) vs. clean baseline"
      - "Statistical test: KL-divergence ≥ 0.15 (pre-registered)"

    tier3_validation:
      - "Gradient subspace overlap: cosine sim between updates and benchmark gradients (threshold: +0.10 vs. clean)"
      - "Hessian spectral concentration: top-10 eigenvalues in benchmark subspace (threshold: 1.5× clean)"
      - "CKA representational alignment: contaminated vs. clean representations (threshold: Δ CKA ≥ 0.15)"
      - "Information efficiency: gain-per-1000-tokens z-score (threshold: ≥2.5)"

  phase3_adaptive_adversary:
    objective: "Test geometric inevitability via Pareto frontier measurement"
    adversary_training: "Modify loss: L_task + λ·(ProbeSignal + GeometrySignal)"
    lambda_values: "[0, 0.1, 0.5, 1.0, 2.0]"
    measurement: "Plot benchmark gain vs. detection probability across λ and seeds"
    inevitability_test: "Does frontier show convex tradeoff or flat evasion region?"

