      risk_if_violated: "Tier 2 detection fails; but Tier 3 geometric signals may still detect"

    - assumption: "Achieving ≥10% benchmark gains from ≤5% injection requires parameter updates correlated with benchmark gradients"
      testability: "HIGH"
      test_method: "Adaptive adversary Pareto frontier: if flat region exists (high gain, low geometric signal), assumption falsified"
      risk_if_violated: "Geometric inevitability claim collapses; hypothesis fails"

    - assumption: "Task Signature Graphs can be extracted for structured domains (code, math) with sufficient paraphrase-invariance"
      testability: "MEDIUM"
      test_method: "Invariant-breaking ablation: perturb TSG constraints; if detection persists, TSGs encode spurious surface artifacts"
      risk_if_violated: "Tier 2 detection degrades to instance similarity (which EAL evades)"

    - assumption: "Probe families are task-complete (span benchmark manifold) such that suppressing all probes collapses gains"
      testability: "MEDIUM"
      test_method: "Adaptive adversary with probe access: measure empirical coverage via gain-vs-suppression curves"
      risk_if_violated: "Adversary finds blind spots in probe coverage; detection power <80%"

    - assumption: "Finetuning (not pretraining) is the dominant contamination risk for benchmark manipulation"
      testability: "LOW (based on prior evidence)"
      test_method: "Fu et al. established MIA: pretraining AUC≈50%, finetuning up to 99.4%. We build on this finding."
      risk_if_violated: "Hypothesis scope limited; pretraining contamination remains unaddressed (acknowledged)"

