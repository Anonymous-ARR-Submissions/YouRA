# SECTION 1.3: Causal Mechanism
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  mechanism_statement: |
    Contamination produces benchmark gains through efficient parameter-space navigation toward task-relevant computational circuits. This navigation creates a geometric trajectory signature characterized by:

    1. **Gradient Subspace Alignment**: Finetuning parameter updates exhibit higher cosine similarity with benchmark-manifold gradients than clean training, because achieving task-specific gains requires moving in directions that reduce loss on that specific task.

    2. **Hessian Anisotropy**: Loss landscape develops sharp curvature along benchmark-aligned eigendirections (low-rank adaptation signature), indicating parameter space compression toward the task manifold.

    3. **Representational Compression**: Internal model representations (measured via CKA) show higher similarity to benchmark tasks than clean training, reflecting learned task-specific circuits.

    4. **Information Efficiency Anomaly**: Benchmark gain-per-bit of contaminated data exceeds expected gain under null distribution, indicating disproportionate learning from task-aligned examples.

    **Geometric Inevitability**: An adaptive adversary attempting to suppress these signatures must orthogonalize their optimization direction from benchmark gradients. However, contamination gains arise FROM alignment with benchmark tasks. This creates an unavoidable Pareto tradeoff: suppressing geometric signals requires sacrificing performance advantage.

  mathematical_formulation: |
    Adversary objective: max_θ BenchmarkAcc(θ) - λ·[Δ(θ) + G(θ)]
    where:
      Δ(θ) = differential alignment = (ΔL_invariant - ΔL_neighbor)
      G(θ) = geometry signal = α₁·cosine_sim(∇θ, ∇benchmark) + α₂·Hessian_ratio + α₃·CKA + α₄·efficiency_zscore

    Inevitability claim: ∃ convex Pareto frontier such that reducing [Δ + G] by x% costs ≥0.6x% of BenchmarkAcc gains

  why_alternative_explanations_insufficient: |
    Alternative 1: "Gains come from general skill transfer, not contamination-specific learning"
    Refutation: Differential alignment Δ = (ΔL_invariant - ΔL_neighbor) explicitly separates benchmark-specific acceleration (high Δ) from broad reasoning improvement (Δ≈0). If gains were purely general, neighbor probes would improve equally.

    Alternative 2: "Geometric signatures can be evaded via smooth diffusion of contamination"
    Refutation: Adaptive adversary experiments (Phase 3) test this directly. If flat Pareto region exists (high gain, low signal), hypothesis is falsified. Our prediction: frontier is convex.

    Alternative 3: "Detection succeeds only because contamination is concentrated; real-world contamination is diffuse"
    Scope limitation: Hypothesis explicitly scoped to 1-5% injection rates where EAL demonstrated gains. Below 0.1% injection, statistical power insufficient (acknowledged boundary).

