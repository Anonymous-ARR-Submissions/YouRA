  theoretical_framework:
    core_mechanism: |
      Contamination produces benchmark gains by efficiently steering parameter updates toward task-relevant circuits. This steering induces:
      1. Gradient alignment (optimization direction correlates with benchmark gradients)
      2. Hessian anisotropy (sharp curvature along benchmark eigendirections)  
      3. Representational compression (low-dimensional adaptation to benchmark manifold)
      4. Information efficiency anomaly (gain-per-bit exceeds null distribution)
      
      Geometric inevitability: Suppressing these signatures requires orthogonalizing from benchmark tasks, which collapses the contamination advantage.
    
    mathematical_formulation:
      adversary_objective: "max_θ BenchmarkAcc - λ·(ProbeSignal + GeometrySignal)"
      detection_metric_tier2: "Δ = (ΔL_a - ΔL_b) where a=invariant probes, b=neighbor probes"
      detection_metric_tier3: "cosine_sim(∇finetuning, ∇benchmark) + Hessian_ratio + CKA + efficiency_zscore"
      inevitability_claim: "Pareto frontier is convex: suppressing signal by X% costs ≥0.6X% of gains"

  scope_and_boundaries:
