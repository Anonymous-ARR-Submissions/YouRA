# ═══════════════════════════════════════════════════════════════════════════════
# PART 1: HOOK & MOTIVATION
# ═══════════════════════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: >
      Neural SAT solvers like NeuroSAT achieve approximately 85% clause satisfaction—but what
      happens in the remaining 15% gap? We hypothesized that these near-solutions contain diverse
      violation patterns suitable for local refinement-based recovery. Our experiments reveal a
      surprising asymmetry: baseline message-passing generates distance heterogeneity (solutions
      vary in how far they are from ground truth) but not structural heterogeneity (they all
      violate constraints in similar ways).
    strategy: negative_result_with_architectural_insight

  why_reader_should_care:
    main_reason: Explains known NeuroSAT limitation (85% plateau) with new quantitative insight
    concrete_example: >
      Learned SAT solvers plateau at 85% clause satisfaction because they generate homogeneous
      violation patterns, preventing effective basin recovery strategies
    stakes: >
      Without structural diversity in near-solutions, hybrid neural-symbolic approaches for
      constraint satisfaction cannot bridge the gap from 85% to over 98% satisfaction

  real_world_impact:
    application_domain: Neural-symbolic hybrid systems for constraint satisfaction and code synthesis
    potential_beneficiaries: >
      Researchers developing learned SAT solvers, practitioners using AI for code generation
      with formal specifications
    scale_of_impact: >
      Identifies specific architectural gap that blocks progress in neural constraint solving

problem_framing:
  surface_problem:
    description: Learned SAT solvers achieve high but not perfect clause satisfaction
    common_understanding: >
      NeuroSAT and similar methods reach approximately 85% clause satisfaction, the remaining
      15% is considered hard

  deeper_problem:
    description: >
      The 15% gap may not be fundamentally hard but may stem from architectural limitations
      in how violations are generated
    why_overlooked: >
      Prior work focused on improving overall satisfaction rates, not analyzing the structure
      of remaining violations
    our_perspective: >
      We distinguish between distance diversity (how far from solutions) and structural diversity
      (how constraints are violated) as separate architectural properties

  gap_in_existing_work:
    description: >
      No prior work has quantitatively separated distance heterogeneity from violation structure
      heterogeneity in learned constraint solvers
    why_gap_exists: >
      Evaluation focused on single metrics (satisfaction rate, search reduction) without analyzing
      violation pattern diversity
    why_gap_matters: >
      Without understanding what diversity is missing, cannot design targeted architectural
      improvements for basin recovery approaches

# ═══════════════════════════════════════════════════════════════════════════════
# PART 2: THE INSIGHT
# ═══════════════════════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: >
      Learned constraint-graph message-passing generates distance diversity but not violation
      structure diversity, revealing an architectural gap in baseline neural SAT solvers that
      prevents effective basin recovery strategies.
    expanded_explanation: >
      Baseline NeuroSAT produces near-solutions with varying normalized Hamming distances
      (d/n range 0.265) but structurally homogeneous violation patterns (entropy range 1.145).
      This asymmetry explains why single-stage learned solvers plateau—they create distance
      variation without the structural diversity needed for stratification-based refinement.

  why_others_missed_it:
    common_assumptions: >
      Prior work assumed that achieving 85% clause satisfaction implied diverse near-solutions
      suitable for further refinement
    our_different_view: >
      We designed a dual-metric gate (d/n range AND entropy range) that revealed the asymmetry—one
      metric passes decisively while the other fails decisively
    enabling_factor: >
      Phase 4.5 validated hypothesis synthesis methodology that extracts experiment-verified
      insights from failed gates

  what_makes_it_work:
    intuitive_explanation: >
      Think of solutions as points in space: NeuroSAT spreads them out (distance diversity)
      but makes them all wrong in the same way (structural homogeneity)
    key_mechanism: >
      Deterministic LSTM message-passing with single learned initialization converges to uniform
      violation strategies across instances, lacking explicit diversity mechanisms
    analogy: >
      Like students solving math problems: they make attempts at different distances from the
      correct answer, but all make the same type of conceptual error

# ═══════════════════════════════════════════════════════════════════════════════
# PART 3: EVIDENCE STORY
# ═══════════════════════════════════════════════════════════════════════════════

evidence_narrative:
  main_claim:
    statement: >
      Baseline NeuroSAT generates distance heterogeneity (d/n range > 0.20) but insufficient
      violation structure heterogeneity (entropy range < 2.0) on 3-SAT instances
    measurable_criteria: >
      d/n range > 0.20 (PASS) AND entropy range > 2.0 (FAIL) with statistical significance
      on 8 SAT instances

  supporting_evidence:
    - id: evidence_1
      what: >
        Dual-metric gate results: d/n range 0.265 (32% above threshold) vs entropy range
        1.145 (43% below threshold)
      so_what: >
        Quantifies the asymmetry—not a near-miss but a clear architectural gap (one decisive
        pass, one decisive fail)
      how_it_supports_claim: >
        Direct measurement of both heterogeneity dimensions shows independent behavior

    - id: evidence_2
      what: >
        Entropy distribution consistency: Q1=2.565, Q2=2.771, Q3=2.874, IQR=0.309 across
        8 instances
      so_what: >
        Small interquartile range shows systematic homogeneity, not random fluctuation or
        outlier effect
      how_it_supports_claim: >
        Consistent pattern across instances supports architectural rather than sampling explanation

    - id: evidence_3
      what: Training convergence to theoretical minimum loss (0.693 ≈ log(2))
      so_what: >
        Model fully optimized; entropy limitation persists even after convergence, ruling
        out insufficient training explanation
      how_it_supports_claim: Architectural limitation confirmed by optimization completion

  surprising_findings:
    finding: >
      Distance heterogeneity exists without structural diversity—metrics are independent,
      not correlated
    why_surprising: >
      Expected both metrics to pass or fail together since both measure solution diversity
    our_interpretation: >
      Deterministic LSTM updates explore different solution distances but use uniform violation
      strategies due to single initialization point

  what_results_mean:
    synthesis: >
      The finding identifies the specific architectural modification needed (stochastic sampling,
      multiple initializations, or diversity regularization) before two-stage recovery approaches
      can be tested
    confidence_level: >
      HIGH for distance diversity (0.265), MEDIUM for entropy homogeneity (small sample n=8
      but consistent pattern)
    caveats: >
      PoC training scale (20 samples vs 80k full); results specific to 3-SAT easy difficulty;
      single training seed

# ═══════════════════════════════════════════════════════════════════════════════
# PART 4: BROADER IMPACT
# ═══════════════════════════════════════════════════════════════════════════════

takeaway:
  main_contribution:
    one_sentence: >
      First quantitative demonstration separating distance diversity from violation structure
      diversity in learned constraint solvers, identifying the specific architectural gap
      blocking basin recovery approaches.
    why_significant: >
      Explains NeuroSAT 85% plateau with actionable diagnosis, enabling targeted architectural
      improvements rather than ad-hoc modifications

  implications:
    for_field: >
      Establishes dual-metric heterogeneity framework for assessing basin recovery preconditions;
      applies to any neural-symbolic hybrid approach
    for_practice: >
      Provides clear design direction: add stochastic mechanisms or ensemble initialization
      to baseline NeuroSAT before attempting two-stage refinement
    conceptual_contribution: >
      Distinguishes two independent dimensions of solution diversity—distance from ground
      truth vs structure of violations

  future_possibilities:
    immediate_extensions: >
      Test stochastic message-passing variants (Gumbel-softmax sampling, ensemble initialization,
      diversity regularization) on full 80k G4SATBench dataset
    longer_term_vision: >
      Unified framework for neural-symbolic constraint integration with theoretically grounded
      basin recovery criteria
    open_questions: >
      Does entropy diversity improve with problem difficulty? Do other GNN architectures
      (GAT, NSNet) inherently produce structural diversity?

