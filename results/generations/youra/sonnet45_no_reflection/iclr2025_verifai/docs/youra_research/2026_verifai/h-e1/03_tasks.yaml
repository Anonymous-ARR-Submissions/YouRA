metadata:
  hypothesis_id: h-e1
  hypothesis_type: EXISTENCE
  tier: LIGHT
  total_tasks: 8
  epic_tasks: 6
  data_tasks: 1
  environment_tasks: 1
  generated_at: "2026-05-12T05:45:00Z"
  schema_version: "3.5"

tasks:
  # ========================================
  # PRIORITY 1: DATA PREPARATION
  # ========================================

  - id: D-1
    title: "Download and Install G4SATBench Dataset"
    description: |
      Clone G4SATBench repository and run installation script to generate 3-SAT easy difficulty dataset.
      Verify dataset contains 80k train, 10k valid, 10k test SAT/UNSAT pairs.
    priority: 100
    category: data_preparation
    complexity: 3
    estimated_time: "30-60 minutes"
    dependencies: []
    acceptance_criteria:
      - G4SATBench repository cloned successfully
      - Installation script executed without errors
      - 3-SAT easy dataset generated (10-40 variables)
      - Dataset splits verified (80k/10k/10k)
    reference_files:
      - file: 03_prd.md
        section: "## Functional Requirements > FR-1: Dataset Infrastructure"
        relevance: "Dataset source and specifications"
      - file: 02c_experiment_brief.md
        section: "## Experiment Specification > ### Dataset"
        relevance: "G4SATBench installation instructions"
    commands:
      - "git clone https://github.com/zhaoyu-li/G4SATBench.git"
      - "cd G4SATBench && bash scripts/install.sh"
    validation:
      - "Check dataset files exist in ./data/3-sat/easy/"
      - "Verify split sizes match specification"

  # ========================================
  # PRIORITY 2: ENVIRONMENT SETUP
  # ========================================

  - id: E-1
    title: "Setup Python Environment and Dependencies"
    description: |
      Install required Python packages: PyTorch, PyTorch Geometric, NumPy, SciPy, Matplotlib.
      Create requirements.txt and verify GPU availability.
    priority: 99
    category: environment_setup
    complexity: 2
    estimated_time: "15-30 minutes"
    dependencies: []
    acceptance_criteria:
      - requirements.txt created with pinned versions
      - All packages installed successfully
      - GPU availability verified (if applicable)
      - Import test passes for all packages
    reference_files:
      - file: 03_prd.md
        section: "## Non-Functional Requirements > NFR-4: Dependencies"
        relevance: "Required library versions"
      - file: 03_config.md
        section: "## Dependencies"
        relevance: "requirements.txt specification"
    packages:
      - "torch>=2.0.0"
      - "torch-geometric>=2.3.0"
      - "numpy>=1.24.0"
      - "scipy>=1.10.0"
      - "matplotlib>=3.7.0"
    validation:
      - "pip list shows all packages installed"
      - "python -c 'import torch; print(torch.cuda.is_available())' succeeds"

  # ========================================
  # PRIORITY 3: EPIC IMPLEMENTATION TASKS
  # ========================================

  - id: A-1
    title: "Setup Dataset Infrastructure"
    description: |
      Implement G4SATBench dataset wrapper, DIMACS parser, collate function for variable-size SAT instances,
      and DataLoader setup with train/val/test splits. Include augmentation (variable/clause permutation, negation flips).
    priority: 90
    category: implementation
    complexity: 8
    module: DataModule
    estimated_time: "2-4 hours"
    dependencies:
      - D-1
      - E-1
    acceptance_criteria:
      - G4SATDataset class implemented with __getitem__ and __len__
      - DIMACS CNF parser converts to literal-clause graph (LCG*)
      - collate_sat_batch handles variable-size instances
      - DataLoader returns batches with correct shapes
      - Augmentation works for training split only
      - Smoke test passes (batch shape verification)
    reference_files:
      - file: 03_architecture.md
        section: "## Epic Tasks > A-1: Setup Dataset Infrastructure"
        relevance: "Epic task definition and complexity breakdown"
      - file: 03_logic.md
        section: "## Module APIs > 1. DataModule APIs"
        relevance: "API signatures, tensor shapes, implementation details"
      - file: 03_config.md
        section: "## Task Configurations > A-1: Setup Dataset Infrastructure"
        relevance: "Configuration parameters and subtask breakdown"
    files_to_create:
      - "code/data/__init__.py"
      - "code/data/sat_dataset.py"
    validation:
      - "Batch shapes match specification: x_literal[B*N_lit, 128], x_clause[B*N_cls, 128]"
      - "Augmentation produces different graphs for same instance"

  - id: A-2
    title: "Implement NeuroSAT Model"
    description: |
      Implement MLP helper, NeuroSAT architecture with LSTM-based message passing (32 rounds),
      and assignment decoder. Support literal-clause bipartite graph message passing.
    priority: 85
    category: implementation
    complexity: 12
    module: ModelModule
    estimated_time: "4-6 hours"
    dependencies:
      - E-1
    acceptance_criteria:
      - MLP class with 3-layer ReLU activation
      - NeuroSAT forward pass with 32 message passing rounds
      - LSTM updates for literal and clause states
      - Assignment decoder extracts binary assignments from embeddings
      - Smoke test passes (forward pass shape verification)
      - Model parameters initialized correctly
    reference_files:
      - file: 03_architecture.md
        section: "## Epic Tasks > A-2: Implement NeuroSAT Model"
        relevance: "Epic task definition and complexity breakdown"
      - file: 03_logic.md
        section: "## Module APIs > 2. ModelModule APIs"
        relevance: "NeuroSAT architecture, tensor flow, forward pass algorithm"
      - file: 03_config.md
        section: "## Task Configurations > A-2: Implement NeuroSAT Model"
        relevance: "Model configuration and subtask breakdown"
      - file: 03_prd.md
        section: "## Functional Requirements > FR-2: NeuroSAT Baseline Model"
        relevance: "Architecture specifications and requirements"
    files_to_create:
      - "code/models/__init__.py"
      - "code/models/mlp.py"
      - "code/models/neurosat.py"
    validation:
      - "Forward pass returns l_final[B*N_lit, 128], c_final[B*N_cls, 128]"
      - "32 message passing rounds executed"
      - "Assignment decoder produces binary vectors"

  - id: A-3
    title: "Build Training Pipeline"
    description: |
      Implement unsupervised loss function, training loop with Adam optimizer,
      validation loop, checkpointing, early stopping, and LR scheduler (ReduceLROnPlateau).
    priority: 80
    category: implementation
    complexity: 10
    module: TrainModule
    estimated_time: "3-5 hours"
    dependencies:
      - A-2
    acceptance_criteria:
      - unsupervised_loss implements NeuroSAT loss (-log P_sat for SAT, -log(1-P_sat) for UNSAT)
      - train_epoch and validate_epoch functions work correctly
      - Trainer class with checkpointing and early stopping
      - ReduceLROnPlateau scheduler configured
      - Training logs saved to CSV
      - Best model checkpoint saved
    reference_files:
      - file: 03_architecture.md
        section: "## Epic Tasks > A-3: Build Training Pipeline"
        relevance: "Epic task definition and complexity breakdown"
      - file: 03_logic.md
        section: "## Module APIs > 5. TrainModule APIs"
        relevance: "Loss function, training loop, Trainer class implementation"
      - file: 03_config.md
        section: "## Task Configurations > A-3: Build Training Pipeline"
        relevance: "Training configuration and optimizer settings"
      - file: 03_prd.md
        section: "## Functional Requirements > FR-3: Training Pipeline"
        relevance: "Training requirements and hyperparameters"
    files_to_create:
      - "code/train.py"
    validation:
      - "Loss decreases over epochs"
      - "Checkpoint saved when validation loss improves"
      - "Early stopping triggers after patience epochs"

  - id: A-4
    title: "Implement Heterogeneity Metrics"
    description: |
      Implement d/n (normalized Hamming distance) computation, violation entropy computation,
      HeterogeneityAnalyzer class for distribution analysis, and gate criteria evaluation.
    priority: 75
    category: implementation
    complexity: 9
    module: MetricsModule
    estimated_time: "2-4 hours"
    dependencies:
      - A-2
    acceptance_criteria:
      - compute_hamming_distance returns d/n values
      - compute_violation_entropy returns entropy H values
      - HeterogeneityAnalyzer collects 1000+ solutions
      - analyze_distribution computes range, IQR, mean, std, quartiles
      - check_gate_criteria evaluates d_n_range > 0.20 AND entropy_range > 2.0
      - Smoke test on synthetic data passes
    reference_files:
      - file: 03_architecture.md
        section: "## Epic Tasks > A-4: Implement Heterogeneity Metrics"
        relevance: "Epic task definition and complexity breakdown"
      - file: 03_logic.md
        section: "## Module APIs > 3. MetricsModule APIs"
        relevance: "Metric computation algorithms and HeterogeneityAnalyzer class"
      - file: 03_config.md
        section: "## Task Configurations > A-4: Implement Heterogeneity Metrics"
        relevance: "Gate thresholds and metric configuration"
      - file: 03_prd.md
        section: "## Functional Requirements > FR-4: Heterogeneity Measurement"
        relevance: "Metric definitions and success criteria"
    files_to_create:
      - "code/metrics/__init__.py"
      - "code/metrics/heterogeneity.py"
    validation:
      - "d/n values in range [0, 1]"
      - "Entropy H values non-negative"
      - "Gate evaluation returns boolean"

  - id: A-5
    title: "Create Visualization System"
    description: |
      Implement 5 required figures: gate comparison bar chart (mandatory), d/n histogram,
      entropy histogram, d/n vs entropy scatter plot, and quartile box plot.
    priority: 70
    category: implementation
    complexity: 7
    module: VisualizationModule
    estimated_time: "2-3 hours"
    dependencies:
      - A-4
    acceptance_criteria:
      - plot_gate_comparison generates target vs actual bar chart with PASS/FAIL annotation
      - plot_dn_distribution generates histogram with Q1/Q2/Q3 markers
      - plot_entropy_distribution generates histogram with mean/std overlay
      - plot_dn_vs_entropy_scatter generates scatter plot with basin boundary
      - plot_quartile_boxplot generates side-by-side box plots
      - generate_all_figures saves all 5 PNGs to figures/ directory
    reference_files:
      - file: 03_architecture.md
        section: "## Epic Tasks > A-5: Create Visualization System"
        relevance: "Epic task definition and complexity breakdown"
      - file: 03_logic.md
        section: "## Module APIs > 4. VisualizationModule APIs"
        relevance: "Figure specifications and plotting functions"
      - file: 03_config.md
        section: "## Task Configurations > A-5: Create Visualization System"
        relevance: "Visualization configuration and subtask breakdown"
      - file: 03_prd.md
        section: "## Functional Requirements > FR-5: Visualization Generation"
        relevance: "Required figures and acceptance criteria"
    files_to_create:
      - "code/visualization/__init__.py"
      - "code/visualization/plots.py"
    validation:
      - "All 5 PNG files generated"
      - "Gate comparison shows PASS/FAIL correctly"
      - "Figures saved with 300 DPI resolution"

  - id: A-6
    title: "Integration & Execution"
    description: |
      Create main experiment script (run_experiment.py) with CLI arguments, experiment orchestration,
      training execution, evaluation execution, and results export (JSON + figures).
    priority: 65
    category: implementation
    complexity: 6
    module: ExperimentModule
    estimated_time: "2-3 hours"
    dependencies:
      - A-1
      - A-2
      - A-3
      - A-4
      - A-5
    acceptance_criteria:
      - argparse CLI with data_root, output_dir, seed, epochs, batch_size, gpu arguments
      - setup_experiment initializes directories, seeds, device
      - run_training orchestrates training loop and saves checkpoint
      - run_evaluation generates metrics and gate result
      - Results exported to JSON and CSV
      - All figures generated automatically
      - End-to-end execution completes successfully
    reference_files:
      - file: 03_architecture.md
        section: "## Epic Tasks > A-6: Integration & Execution"
        relevance: "Epic task definition and complexity breakdown"
      - file: 03_logic.md
        section: "## Module APIs > 6. ExperimentModule APIs"
        relevance: "Main script structure and orchestration flow"
      - file: 03_config.md
        section: "## Task Configurations > A-6: Integration & Execution"
        relevance: "CLI configuration and main entry point"
      - file: 03_prd.md
        section: "## Functional Requirements > FR-6: Experiment Execution Script"
        relevance: "Script requirements and command-line interface"
    files_to_create:
      - "code/run_experiment.py"
      - "code/requirements.txt"
    validation:
      - "Script runs end-to-end without errors"
      - "All outputs generated (checkpoints, logs, metrics, figures)"
      - "Gate result printed to console"

