# → Core hypothesis summary (consistent with 03_refinement.yaml)
hypothesis_draft:
  title: "Conditional Basin Recovery for Neural-Symbolic Constraint Integration"
  hypothesis_id: "H-ConditionalBasinRecovery-v1"
  core_claim: |
    Two-stage neural-symbolic architectures combining learned constraint-graph heuristics
    with temperature-annealed refinement achieve high-probability discrete correctness
    (<2% violation rate) when Stage 1 places solutions in recoverable basins characterized
    by normalized Hamming distance d/n < 0.15, diffuse violation structure (entropy H > 2.5),
    and gradient-discrete alignment > 0.7.

  mechanism: |
    Stage 1 (Learned Heuristics): Graph neural networks on constraint representations learn
    message-passing strategies (NeuroSAT-style) that generate structured near-solutions
    satisfying >85% of constraints with diffuse violation patterns.

    Stage 2 (Annealed Refinement): Temperature-annealed Gumbel-softmax performs local
    gradient-based search in continuous relaxation, converging to discrete satisfying
    assignments when initialized within recoverable basins (d/n < 0.15, H > 2.5).

    Basin Geometry Theory: Recovery probability exhibits sharp phase transition at
    d/n ≈ 0.15 when gradient-discrete alignment (cosine > 0.7) is maintained during
    annealing, enabling continuous optimization to solve discrete problems.

  predictions:
    - P1: "Basin Recovery exhibits sharp phase transition: >95% at d/n < 0.15 (H > 2.5), <20% at d/n > 0.30"
    - P2: "Gradient-discrete alignment (cosine > 0.7) predicts recovery better than Hamming distance alone"
    - P3: "Computational throughput ≥2× correct solutions per GPU-hour vs. batched rejection sampling"

