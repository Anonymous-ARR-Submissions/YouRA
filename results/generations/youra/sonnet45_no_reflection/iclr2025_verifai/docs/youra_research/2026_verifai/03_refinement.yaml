# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Locally factorizable constraint systems with explicit graph structure (SAT, CSP, typed first-order constraints)
    - Problems where constraints have low-order interactions and can be represented as factor graphs
    - Code synthesis tasks with formal specifications that decompose into local constraints
    - Finite-domain discrete optimization problems with differentiable relaxations

  does_not_apply_to: |
    - Globally coupled constraints without local structure (e.g., graph isomorphism, certain SMT arithmetic)
    - First-order logic with quantifiers or unbounded domains
    - Problems requiring exact provable correctness rather than high-probability correctness
    - Constraint families with no existing continuous relaxation exhibiting basin alignment

  known_limitations: |
    - Provides probabilistic correctness guarantees (<2% violation rate), not provable correctness
    - Requires Stage 1 to achieve >85% pre-conditioning (clause satisfaction) for Stage 2 effectiveness
    - Performance may degrade at SAT phase transition (α ∈ [4.1, 4.3]) up to 5× relative to easy instances
    - Generalization across constraint families requires architecture modifications or retraining

