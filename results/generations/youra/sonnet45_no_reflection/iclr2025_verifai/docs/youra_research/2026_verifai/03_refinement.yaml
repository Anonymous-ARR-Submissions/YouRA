# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-ConditionalBasinRecovery-v1"
  confidence_level: 0.80
  core_hypothesis_statement: |
    Under locally factorizable constraint systems with explicit graph structure (SAT, typed CSPs),
    if a two-stage neural-symbolic architecture combines learned constraint-graph message-passing
    (Stage 1) with temperature-annealed Gumbel-softmax refinement (Stage 2), then discrete
    violation rates reduce to <2% with ≥2× computational throughput over rejection sampling,
    because Stage 1 places solutions in recoverable basins (d/n < 0.15, H > 2.5) where
    gradient-discrete alignment (cosine > 0.7) enables Stage 2 local refinement to converge
    to discrete satisfying assignments.

  alternative_hypothesis_h0: |
    There is no significant difference in discrete violation rates or computational throughput
    between the two-stage constraint-integrated architecture and standard generate-then-verify
    rejection sampling baselines when both are evaluated under equal hardware and batch constraints.

