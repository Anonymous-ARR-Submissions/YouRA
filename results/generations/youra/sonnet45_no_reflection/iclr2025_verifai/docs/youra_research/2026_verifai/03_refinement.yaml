causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Stage 1 learned message-passing on constraint graphs generates structured near-solutions"
      evidence: "NeuroSAT demonstrated 30% search reduction on industrial instances; GNN expressiveness theorem (Xu et al., 2021) proves representational capacity for DPLL strategies"
      falsifier: "If Stage 1 outputs have uniform random violation distribution with no structure learning, mechanism fails at source"

    - step: 2
      description: "Stage 1 outputs satisfy basin entry criteria: d/n < 0.15, violation entropy H > 2.5, enabling Stage 2 recovery"
      evidence: "Prof. Pax established >85% clause satisfaction requirement for local refinement feasibility; entropy ensures diffuse not concentrated violations"
      falsifier: "If Stage 1 outputs fall outside recovery basin (d/n > 0.30 or H < 1.5), Stage 2 refinement becomes random search"

    - step: 3
      description: "Temperature-annealed Gumbel-softmax in Stage 2 maintains gradient-discrete alignment (cosine > 0.7) during refinement"
      evidence: "Annealing addresses train-test mismatch by gradually introducing discretization; gradient-discrete alignment ensures continuous gradients correlate with discrete improvement directions"
      falsifier: "If gradient-discrete cosine similarity drops below 0.4 during refinement, continuous optimization decouples from discrete objective"

    - step: 4
      description: "Stage 2 converges to discrete satisfying assignment through local gradient-based search in recoverable basin"
      evidence: "Prof. Vera's controlled degradation experiments predict >95% recovery when basin criteria met; contraction mapping theory supports local convergence"
      falsifier: "If recovery probability at d/n = 0.10 drops below 70%, basin geometry assumptions invalid"

  key_tension: "Whether basin recovery depends only on Hamming distance and entropy, or requires additional structural metrics (treewidth, clause overlap topology)"
  evidence_summary: |
    Mechanism builds on established components (message-passing GNNs, Gumbel-softmax annealing) but
    novel synthesis requires validation that basin geometry predictions hold empirically. The d/n < 0.15
    threshold and H > 2.5 entropy requirement are testable predictions that would falsify if violated.

