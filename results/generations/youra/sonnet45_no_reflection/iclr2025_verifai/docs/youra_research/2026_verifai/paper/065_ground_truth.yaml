# ═══════════════════════════════════════════════════════════════
# EXPERIMENTAL SETUP (For Reproducibility)
# ═══════════════════════════════════════════════════════════════

experimental_setup:
  dataset:
    name: "G4SATBench 3-SAT Easy"
    source: "https://github.com/zhaoyu-li/G4SATBench"
    difficulty: "easy"
    variable_range: "10-40"
    clause_ratio: "4.2-4.3"
    train_size: 20
    val_size: 10
    test_size: 8  # After UNSAT filtering
    unsat_filtered: 2

  model:
    architecture: "NeuroSAT (baseline)"
    hidden_dim: 128
    message_passing_rounds: 32
    lstm_based: true
    initialization: "single learned embedding"
    stochastic_sampling: false
    ensemble: false
    diversity_regularization: false

  training:
    optimizer: "Adam"
    learning_rate: 1.0e-4
    weight_decay: 1.0e-8
    lr_scheduler: "ReduceLROnPlateau"
    scheduler_params:
      mode: "min"
      factor: 0.5
      patience: 10
    batch_size: 32
    max_epochs: 100
    actual_epochs: 33
    early_stopping_patience: 20
    training_seed: 123

  hardware:
    device: "NVIDIA H100 NVL"
    memory: "95830 MiB"

  evaluation_metrics:
    primary:
      - metric: "d/n range"
        formula: "Q3_dn - Q1_dn"
        threshold: "> 0.20"
      - metric: "entropy range"
        formula: "Q3_H - Q1_H"
        threshold: "> 2.0"
    secondary:
      - metric: "Pearson correlation"
        formula: "corr(d/n, H)"
      - metric: "IQR"
        formula: "Q3 - Q1"

