# Task Breakdown: H-E1 Quotient Space Existence

## Epic Tasks (7 tasks)

epic_tasks:
  - id: A-1
    name: Dataset Infrastructure
    description: Download ModelZoo-14K, implement weight extraction/preprocessing, create train/val/test splits
    complexity: 14
    priority: P0
    dependencies: []
    subtask_budget: 3
    subtasks:
      - id: L-1-1
        name: HuggingFace download
        description: Download and filter 14K models with retry logic
        estimated_hours: 4
      - id: L-1-2
        name: Weight preprocessing
        description: Flatten, normalize, pad/truncate weight vectors
        estimated_hours: 3
      - id: L-1-3
        name: Dataset splitting
        description: 70/15/15 split with architecture stratification
        estimated_hours: 2

  - id: A-2
    name: Baseline Model
    description: Implement Deep Sets encoder (phi/rho architecture) with reconstruction decoder
    complexity: 11
    priority: P0
    dependencies: []
    subtask_budget: 2
    subtasks:
      - id: L-2-1
        name: Encoder architecture
        description: Implement phi/rho with sum pooling
        estimated_hours: 3
      - id: L-2-2
        name: Reconstruction decoder
        description: MLP mapping K-dim back to weight space
        estimated_hours: 2

  - id: A-3
    name: Proposed Model
    description: Implement Slot-Equivariant encoder with architecture embeddings and equivariance loss
    complexity: 16
    priority: P0
    dependencies: []
    subtask_budget: 3
    subtasks:
      - id: L-3-1
        name: Architecture embedding
        description: Inject arch-specific context before encoding
        estimated_hours: 2
      - id: L-3-2
        name: Slot-equivariant encoder
        description: Extend Deep Sets with LayerNorm for stability
        estimated_hours: 4
      - id: L-3-3
        name: Reconstruction decoder
        description: K-dim -> weight space mapping
        estimated_hours: 2

  - id: A-4
    name: Training Pipeline
    description: Implement training loop with Adam optimizer, cosine annealing, early stopping, checkpointing
    complexity: 12
    priority: P0
    dependencies: [A-2, A-3]
    subtask_budget: 3
    subtasks:
      - id: L-4-1
        name: Training loop
        description: Epoch iteration with loss computation
        estimated_hours: 3
      - id: L-4-2
        name: Validation and early stopping
        description: Monitor val loss, save best checkpoint
        estimated_hours: 2
      - id: L-4-3
        name: Checkpointing
        description: Save/load model state with metrics
        estimated_hours: 1

  - id: A-5
    name: Evaluation Metrics
    description: Implement reconstruction error, frozen-K generalization, kernel robustness measurements
    complexity: 15
    priority: P0
    dependencies: [A-4]
    subtask_budget: 3
    subtasks:
      - id: L-5-1
        name: Reconstruction error
        description: MSE-based reconstruction metric
        estimated_hours: 2
      - id: L-5-2
        name: Frozen-K generalization
        description: Cross-architecture generalization test
        estimated_hours: 3
      - id: L-5-3
        name: Kernel robustness
        description: Permutation invariance validation
        estimated_hours: 3

  - id: A-6
    name: Ablation Studies
    description: Run experiments for K∈{16,32,64} and λ_equiv∈{0.0,0.25,0.5,0.75,1.0}, compare results
    complexity: 9
    priority: P1
    dependencies: [A-4, A-5]
    subtask_budget: 2
    subtasks:
      - id: L-6-1
        name: λ_equiv sweep
        description: Train 5 models with different equivariance weights
        estimated_hours: 4
      - id: L-6-2
        name: K dimensionality sweep
        description: Train 3 models with different quotient space dimensions
        estimated_hours: 3

  - id: A-7
    name: Visualization
    description: Generate gate metrics chart, t-SNE, training curves, K-analysis, error distribution plots
    complexity: 10
    priority: P1
    dependencies: [A-5, A-6]
    subtask_budget: 2
    subtasks:
      - id: L-7-1
        name: Gate metrics figure
        description: Mandatory bar chart for hypothesis validation
