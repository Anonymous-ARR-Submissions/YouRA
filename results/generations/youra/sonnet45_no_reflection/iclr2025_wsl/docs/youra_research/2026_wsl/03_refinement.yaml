# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Exchangeability exists: Target tasks (image classification) admit solutions with permutation symmetries in the computation graph"
    supporting_evidence: "Lottery Ticket Hypothesis (Frankle & Carbin 2019), neural network symmetries literature (Hecht-Nielsen 1990)"
    consequence_if_violated: "Kernel robustness test will fail - permutations will change function outputs (D>0.01). If violated, quotient-level canonicalization is impossible."
  - id: "A2"
    assumption: "Quotient space is finite-dimensional: Task-relevant computational structure can be captured by K ≪ |W_a| slots"
    supporting_evidence: "Johnson-Lindenstrauss lemma suggests d=O(log N/ε²); intrinsic dimension analysis via local PCA spectrum decay"
    consequence_if_violated: "Frozen-K generalization will fail - adding RNN will require K expansion or reconstruction error >25%. If violated, shared manifold hypothesis collapses to concatenation."
  - id: "A3"
    assumption: "Linear alignment is sufficient: Quotient spaces from different architectures are related by linear transformations, not nonlinear diffeomorphisms"
    supporting_evidence: "Procrustes analysis standard for comparing learned representations; task arithmetic suggests linear structure (Ilharco et al. 2022)"
    consequence_if_violated: "Linear alignment test will fail - Procrustes error >0.30. If violated, need nonlinear adapters (no shared coordinate system)."
  - id: "A4"
    assumption: "Task supervision is weak: Adding 0.1-weighted task probe loss anchors quotient space without compromising unsupervised canonicalization claim"
    supporting_evidence: "Prof. Pax recommendation to prevent arbitrary rotations; ablation removes task loss to validate necessity"
    consequence_if_violated: "Cross-seed identifiability will fail - Procrustes error >0.15 across seeds. If violated, quotient space has multiple equally valid factorizations."
  - id: "A5"
    assumption: "Permutation groups are learnable: Architecture-specific π_a can be inferred from data via equivariance loss"
    supporting_evidence: "Git Re-Basin learns permutations via optimization (Ainsworth et al. 2022); equivariance loss provides gradient signal"
    consequence_if_violated: "Zero-shot equivariance test will fail - RNN performance <50%. If violated, π_a is architecture-family-specific (not abstractable to shared slots)."

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Feedforward architectures (CNNs, Transformers, RNNs) on supervised classification tasks
    - Models with 10M-100M parameters from ModelZoo-14K (Hugging Face)
    - Image classification datasets (ImageNet, CIFAR-10, ImageNet-V2)
    - Permutation symmetries (neuron reordering, layer swaps, attention head permutations)
  does_not_apply_to: |
    - Graph Neural Networks, Diffusion Models, Mamba architectures (structurally distinct computation graphs requiring separate investigation)
    - Unsupervised or generative tasks (different symmetry structures)
    - Models <1M or >1B parameters (scaling limits of slot encoders)
    - Non-permutation symmetries (scaling, rotation in weight space)
    - Multimodal models (CLIP, DALL-E) where architecture serves different input modalities
  known_limitations: |
    - K (number of slots) must be calibrated: too small causes reconstruction error, too large causes redundancy
    - Task diversity limited to supervised classification - unsupervised/generative tasks require separate validation
    - Architecture families tested (CNN/Transformer/RNN) are all feedforward or sequential - structurally diverse families need expansion
    - Dataset bias: ModelZoo-14K is Hugging Face-curated, may reflect data pipeline artifacts
    - Cross-task retention ≥0.6 required to claim task-general (not dataset-specific) slots

