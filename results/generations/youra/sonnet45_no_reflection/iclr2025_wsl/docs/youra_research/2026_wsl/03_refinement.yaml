predictions:
  - id: "P1"
    primary: true
    statement: "Linear probe trained on CNN embeddings will achieve ≥80% accuracy on Transformer embeddings AND ≥10pp above DeepSets baseline (p<0.05)"
    test_method: "Train logistic regression on E_CNN(M_CNN), test on E_Transformer(M_Transformer), compare to DeepSets baseline via bootstrap"
    success_criterion: "Accuracy ≥80% AND gap ≥10pp with p<0.05"
    falsification: "Accuracy <70% or gain over DeepSets <5pp indicates embeddings are architecture-specific, not canonicalized"
  - id: "P2"
    primary: true
    statement: "Slot encoder trained on CNNs and Transformers will generalize to RNNs without retraining, achieving ≥70% zero-shot equivariance AND ≥25pp above DeepSets"
    test_method: "Apply E_RNN (trained on CNN+Transformer) to RNN weights, measure ||E_RNN(g·M) - ρ(g)E_RNN(M)||"
    success_criterion: "Zero-shot accuracy ≥70% AND ≥25pp above DeepSets"
    falsification: "Accuracy <50% indicates quotient space is architecture-family-specific, slots do not abstract to shared structure"
  - id: "P3"
    primary: true
    statement: "CNN and Transformer embeddings will be linearly compatible with Procrustes error <0.15 AND ≥30% lower than permutation-null baseline (p<0.01)"
    test_method: "Compute optimal linear alignment via Procrustes, compare to 100 random permutations"
    success_criterion: "Error <0.15 AND <70th percentile of null distribution (p<0.01)"
    falsification: "Error >0.30 or not significantly better than null indicates geometric coincidence, not shared canonical coordinates"
  - id: "P4"
    primary: false
    statement: "Kernel robustness: ≥90% of weight-space permutations will preserve model outputs (D<0.01) under both IID and OOD test sets, with adversarial perturbations inducing ≥10× higher divergence"
    test_method: "Sample 1000 random neuron permutations per model, measure output divergence D(f_M, f_{g·M}) on ImageNet and ImageNet-V2"
    success_criterion: "≥90% pass on both IID and OOD with D<0.01, adversarial perturbations cause D≥0.10"
    falsification: "<70% pass or OOD<IID indicates symmetries are dataset-specific or kernel erases meaningful structure"
  - id: "P5"
    primary: false
    statement: "Task accuracy vs. architecture predictability will exhibit a knee point where task≥95% baseline while architecture≤40%, with curvature significantly higher than linear baseline"
    test_method: "Vary equivariance loss weight λ∈[0,1], fit GP-smoothed curve, detect knee via L-method"
    success_criterion: "Knee detected with task≥95%, arch≤40%, curvature significantly higher than linear (p<0.05)"
    falsification: "Curvature~0 (linear tradeoff) indicates uniform compression, not selective canonicalization"
  - id: "P6"
    primary: false
    statement: "Slot spaces learned from different random seeds will align with Procrustes error <0.10, confirming canonical coordinates are unique"
    test_method: "Train 3 independent slot encoders with different seeds, compute pairwise Procrustes alignment within architecture"
    success_criterion: "All pairwise errors <0.10"
    falsification: "Error variance >0.05 or any pair >0.15 indicates quotient is not uniquely defined (multiple valid factorizations)"
  - id: "P7"
    primary: false
    statement: "Adding RNN with frozen K (determined from CNN+Transformer) will achieve R_RNN<10% AND E_RNN<2×baseline without retraining"
    test_method: "Train on CNN+Transformer to find minimal K₀, apply to RNN with K=K₀ frozen"
    success_criterion: "Reconstruction error R_RNN<10% AND equivariance error E_RNN<2×baseline"
    falsification: "Either metric violates threshold, indicating K is architecture-specific (dimension must grow with diversity)"
  - id: "P8"
    primary: false
    statement: "Slot activations will correlate ≥0.6 (Spearman) between ImageNet and CIFAR-10, showing task-general structure"
    test_method: "Compute slot embeddings for models trained on ImageNet vs. CIFAR-10, measure rank correlation"
    success_criterion: "Spearman ρ≥0.6 (normalized by within-task correlation)"
    falsification: "ρ<0.4 indicates slots are task-specific (ImageNet-only canonicalization)"
  - id: "P9"
    primary: false
    statement: "Removing equivariance loss will cause zero-shot accuracy to drop ≥15pp, proving equivariance causally enables transferability"
    test_method: "Train two slot encoders (with/without L_equiv), measure zero-shot RNN performance"
    success_criterion: "Δ(zero-shot)≥15pp with p<0.01"
    falsification: "Δ<5pp indicates equivariance is not causal (ornamental, not functional)"

