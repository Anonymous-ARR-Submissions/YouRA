# SECTION 3: Novelty & Innovation
# ═══════════════════════════════════════════════════════════════

novelty:
  preserved_novelty: "Cross-architecture equivariant canonicalization via learned quotient-level slot representations"
  key_innovation: |
    1. Quotient-level canonicalization (vs. weight-space methods): Projects to architecture-agnostic quotient space that factors out coordinate artifacts
    2. Permutation equivariance over slots (vs. functional embeddings): Leverages permutation symmetries to define structured slot spaces where architectural differences are group actions
    3. Structural validation (vs. performance metrics): Tests geometric properties (kernel robustness, linear alignment, identifiability) for structural not just functional meaning
    4. Cross-architecture generalization (vs. single-family methods): Targets cross-architecture equivariance - maps CNN and Transformer symmetries to shared group representation
  differentiation:
    - prior_work: "Git Re-Basin (Ainsworth et al. 2022)"
      difference: "Operates in native weight space, architecture-specific permutation search. LCAC learns quotient space with architecture-independent slot structure."
    - prior_work: "Neural Functional Networks (Zhou et al. 2023)"
      difference: "Treats weights as unstructured inputs to hypernetworks. LCAC leverages permutation symmetries for structured slot representations."
    - prior_work: "Model Merging (Wortsman et al. 2022)"
      difference: "Heuristic weight averaging without theoretical grounding. LCAC uses learned quotient alignment with geometric validation."
    - prior_work: "DeepSets (Zaheer et al. 2017)"
      difference: "Permutation-invariant aggregation without equivariance structure. LCAC enforces permutation commutes with encoding (equivariance) and provides canonicalization error as measurable quantity."

