# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Architecture-specific encoders E_a learn to project weight tensors into K-dimensional slot space Z, where each slot represents a task-relevant computational unit"
      evidence: "Deep Sets architecture (Zaheer et al. 2017) provides baseline for permutation-invariant weight processing; equivariance loss L_equiv = ||E_a(g·M) - ρ(π_a(g))E_a(M)||² enforces structural constraint"
      falsifier: "If encoders cannot achieve <5% reconstruction error at K=64, slots are insufficient to capture weight-space structure"
    - step: 2
      description: "Equivariance loss enforces that weight-space permutations (neuron reordering, layer swaps) correspond to simple slot permutations in Z via learned projection π_a: G_a → S_K"
      evidence: "Permutation symmetries are well-established in neural networks (Lottery Ticket Hypothesis); quotient structure from representation theory enables many-to-one mapping"
      falsifier: "If kernel robustness test shows <80% of permutations preserve function output (D≥0.01), then π_a does not map to functional equivalence classes"
    - step: 3
      description: "Contrastive loss L_contrast pulls embeddings of functionally similar models together and pushes dissimilar ones apart, ensuring slots capture task-relevant structure"
      evidence: "Weak task supervision (0.1 weight) anchors quotient space to prevent arbitrary rotations; cross-seed identifiability requires Procrustes <0.10"
      falsifier: "If cross-seed Procrustes error >0.15, quotient space is not uniquely defined (multiple valid factorizations exist)"
    - step: 4
      description: "Learned quotient space Z factorizes out architecture-specific coordinate conventions (neuron ordering, layer indexing), enabling linear alignment between architectures and transfer without retraining"
      evidence: "Procrustes analysis establishes linear compatibility; frozen-K generalization to RNN tests dimensional stability"
      falsifier: "If Procrustes error ≥0.30 or RNN reconstruction error ≥25% at frozen K, architectures are not linearly compatible in quotient space"
  key_tension: "Balancing task-relevant structure preservation vs. architecture-specific information removal - Pareto frontier must show knee point where task≥95% baseline while architecture predictability≤40%"
  evidence_summary: |
    Theoretical foundation: Permutation symmetries (established), quotient/orbit structures from representation theory (Prof. Pax),
    Johnson-Lindenstrauss lemma for dimensionality (bounded by task complexity not architecture diversity).
    Empirical evidence: NFN works for homogeneous populations (Zhou et al. 2024), Git Re-Basin achieves weight-space alignment
    via learned permutations (Ainsworth et al. 2022), model merging demonstrates functional compatibility (Wortsman et al. 2022).

