# PART 1: HOOK & MOTIVATION
# ═══════════════════════════════════════════════════════════════════════════════

hook:
  # Opening Statement - Frame the failure as valuable scientific insight
  opening_statement:
    content: "Learning shared representations across heterogeneous neural network architectures promises to enable model synthesis, analysis, and transfer learning at scale—yet existing weight-space methods succeed only within single architecture families, leaving the cross-architecture case unsolved."
    strategy: "gap_identification_then_failure_insight"

    # For negative results: Lead with the problem and gap, then reveal the failure
    # Avoid: "X is important" (generic)
    # Use: "X promises Y, but Z remains unsolved, and we show why"

  # Why Reader Should Care
  why_reader_should_care:
    main_reason: "Understanding why cross-architecture weight-space learning fails is critical for the model zoo learning community to avoid dead ends and identify viable research directions"
    concrete_example: "NFN (Zhou et al. 2024) achieved strong results on homogeneous model populations but provided no guidance for the heterogeneous case—our failure analysis reveals fundamental obstacles"
    stakes: "Without understanding failure modes, researchers will waste months pursuing similar dead ends (Deep Sets + architecture embeddings + MSE loss)"

  # Real-World Impact (modest for negative results)
  real_world_impact:
    application_domain: "Model zoo analysis, neural architecture search, model merging"
    potential_beneficiaries: "ML researchers working on weight-space learning, model synthesis practitioners"
    scale_of_impact: "Prevents wasted research effort, guides future work toward viable approaches"

# ─────────────────────────────────────────────────────────────────────────────
# PROBLEM FRAMING
# ─────────────────────────────────────────────────────────────────────────────

problem_framing:
  # Level 1: What everyone knows
  surface_problem:
    description: "Neural networks exhibit permutation symmetries in weight space (Hecht-Nielsen 1990, Lottery Ticket Hypothesis), enabling weight-space learning methods like model merging and Neural Functional Networks"
    common_understanding: "Permutation equivariance is established for homogeneous model populations (single architecture family)"

  # Level 2: Our framing
  deeper_problem:
    description: "Existing methods (NFN, Git Re-Basin) work only on homogeneous populations—cross-architecture weight-space learning (CNN ↔ Transformer ↔ RNN) requires factorizing out architecture-specific coordinate conventions while preserving task-relevant structure"
    why_overlooked: "Cross-architecture case dismissed as 'too hard' without systematic investigation of failure modes"
    our_perspective: "We hypothesized quotient-level canonicalization could enable cross-architecture learning by projecting weights into shared K-dimensional space with learned slot-permutation operators"

  # Level 3: The gap and what we learned
  gap_in_existing_work:
    description: "No prior work systematically tests cross-architecture equivariant encoding or identifies specific failure modes (equivariance mechanism? dimensionality? architecture diversity?)"
    why_gap_exists: "Heterogeneous case is genuinely harder—our failure reveals that simple extensions of homogeneous methods (Deep Sets + architecture embeddings) fundamentally fail"
    why_gap_matters: "Without failure analysis, community lacks guidance on which research directions are viable (contrastive learning? higher dimensions?) vs dead ends (MSE equivariance loss)"

# ═══════════════════════════════════════════════════════════════════════════════
# PART 2: THE INSIGHT (For negative results: What we learned from failure)
# ═══════════════════════════════════════════════════════════════════════════════

key_insight:
  # The "Aha!" Moment - What failure revealed
  aha_moment:
    one_sentence: "MSE-based equivariance loss completely fails to enforce permutation invariance in weight space (0.00% kernel robustness), revealing that learned equivariance requires fundamentally different mechanisms than reconstruction-based objectives."
    expanded_explanation: "We achieved 0.00% kernel robustness despite explicit equivariance loss training, showing that gradient descent on MSE(z_original, z_permuted) does not learn the group structure needed for quotient-level canonicalization. This suggests successful approaches will require explicit group constraints (à la Git Re-Basin) or contrastive learning (positive pairs: permuted weights, negative pairs: different models), not reconstruction losses."

  # Why Others Missed It
  why_others_missed_it:
    common_assumptions: "Assumption: If NFN works for homogeneous populations with Deep Sets, adding architecture embeddings + equivariance loss should extend to heterogeneous case"
    our_different_view: "We empirically tested this assumption and found it completely fails—architecture embeddings may actively harm cross-architecture learning (10.31% frozen-K error), opposite of expectation"
    enabling_factor: "Systematic gate-based evaluation (reconstruction error, frozen-K generalization, kernel robustness) revealed complete equivariance failure that standard accuracy metrics would miss"

  # What Makes It (Not) Work
  what_makes_it_work:
    intuitive_explanation: "MSE equivariance loss says 'make embeddings similar under permutation' but doesn't enforce the group structure (permutation should commute with encoding). It's like asking two functions to produce similar outputs without constraining their relationship—gradient descent finds local minima that ignore the permutation."
    key_mechanism: "The failure is that L_equiv = ||E(g·M) - ρ(g)E(M)||² has conflicting gradients with reconstruction loss, and permutation operator ρ(g) is approximated (not learned as true group homomorphism)"
    analogy: "Asking someone to 'make these two numbers similar' vs 'make f(x+y) = f(x)+f(y)' (homomorphism constraint)—the latter enforces structure, the former just minimizes distance"

# ═══════════════════════════════════════════════════════════════════════════════
# PART 3: EVIDENCE STORY (Negative Results: Evidence of failure + root causes)
# ═══════════════════════════════════════════════════════════════════════════════

evidence_narrative:
  # Main Claim (for negative results: Clear failure statement)
  main_claim:
    statement: "Deep Sets + architecture embeddings + MSE equivariance loss is insufficient for cross-architecture quotient space learning, failing all three gate metrics (reconstruction, frozen-K generalization, kernel robustness)"
    measurable_criteria: "Reconstruction error <10%, Frozen-K error <10%, Kernel robustness ≥90% (all failed)"

  # Supporting Evidence (Each piece shows a different failure mode)
  supporting_evidence:
    - id: "evidence_1_equivariance_failure"
      what: "Kernel robustness: 0.00% (target ≥90%)"
      so_what: "Complete failure to learn permutation invariance despite explicit equivariance loss training—MSE-based approach fundamentally inadequate"
      how_it_supports_claim: "Most critical failure—without permutation invariance, quotient-level canonicalization is impossible regardless of other metrics"

    - id: "evidence_2_dimensionality"
      what: "Reconstruction error: 19.18% (target <10%)"
      so_what: "K=32 quotient space insufficient for 1000-dim weight vectors—dimensionality requirements severely underestimated (likely need K~1000-2000 for real 100K-dim weights)"
      how_it_supports_claim: "Even if equivariance worked, current dimensionality is inadequate—problem is harder than Johnson-Lindenstrauss bound suggests"

    - id: "evidence_3_cross_architecture"
      what: "Frozen-K generalization: 10.31% (target <10%, marginally failed)"
      so_what: "Architecture embeddings may prevent shared structure learning—encoder learns architecture-specific rather than task-relevant representations"
      how_it_supports_claim: "Contradicts intuition that providing architecture context helps—pure architecture-agnostic encoding may be necessary"

  # Surprising Findings (Most valuable part of negative results)
  surprising_findings:
    finding: "Architecture embeddings (64-dim) designed to help cross-architecture learning may actually harm it—frozen-K test suggests they anchor representations to architecture-specific coordinates"
    why_surprising: "Intuition: Providing architecture context should help encoder learn to abstract—Result: Context may prevent abstraction"
    our_interpretation: "Architecture embeddings inject family-specific information that encoder cannot factor out with MSE loss—need explicit architecture-adversarial training or remove embeddings entirely"

  # What Results Mean (Synthesis)
  what_results_mean:
    synthesis: "The specific approach tested (Deep Sets + architecture embeddings + MSE equivariance loss) is fundamentally insufficient for cross-architecture quotient space learning. The failure is not a tuning issue—it's a mechanism design issue requiring alternative architectures (Slot Attention), alternative loss designs (contrastive learning), or explicit group operations (Git Re-Basin style)."
    confidence_level: "High confidence (0.85) that this approach is insufficient; Medium confidence (0.50) that problem is fundamentally intractable with alternative approaches"
    caveats: "PoC limitations: synthetic data (not real pretrained models), reduced dimensionality (1000 vs 100K), no ablations or alternative implementations tested"

# ═══════════════════════════════════════════════════════════════════════════════
# PART 4: BROADER IMPACT (Negative Results: Lessons for community)
# ═══════════════════════════════════════════════════════════════════════════════

takeaway:
  # Main Contribution (for negative results: What community learns)
  main_contribution:
    one_sentence: "We provide the first systematic failure analysis of cross-architecture quotient-level canonicalization, identifying specific failure modes (MSE equivariance loss inadequacy, architecture embeddings harmful, dimensionality underestimation) and proposing concrete alternatives."
    why_significant: "Prevents community from wasting effort on similar dead ends, guides future research toward contrastive learning and explicit group constraints"

  # Broader Implications
  implications:
    for_field: "Learned equivariance via reconstruction losses may be fundamentally insufficient for weight-space learning—successful approaches likely need explicit group operations (Git Re-Basin) or contrastive objectives (SimCLR-style)"
    for_practice: "Cross-architecture model zoo analysis should use function-space methods (output embeddings) rather than weight-space until fundamental obstacles are resolved"
    conceptual_contribution: "Demonstrates value of gate-based evaluation (kernel robustness metric) that reveals complete equivariance failure masked by standard metrics"

  # Future Possibilities (Concrete alternatives from failure analysis)
  future_possibilities:
    immediate_extensions: "Test contrastive equivariance loss (InfoNCE), ablate architecture embeddings, increase K dimensionality to 128-256, validate on homogeneous case first (CNN-only)"
    longer_term_vision: "If alternatives fail, may need per-family quotient spaces with post-hoc alignment rather than single shared space"
    open_questions: "Are CNN/Transformer/RNN permutation groups fundamentally incompatible? Is learned equivariance viable or do we need explicit combinatorial search? What is minimal K for real 100K-dim weights?"

