      - "Over-claiming significance of negative result"

  # ─────────────────────────────────────────────────────────────────────────────
  # INTRODUCTION
  # ─────────────────────────────────────────────────────────────────────────────
  introduction:
    narrative_purpose: "Gap → Our hypothesis → Negative result preview → Why failure is valuable"

    hook_strategy: "Gap identification: NFN works for homogeneous, cross-architecture unsolved; We test natural extension and it completely fails"

    problem_escalation: |
      1. Surface: Weight-space learning enables model synthesis (model merging, NFN)
      2. Deeper: Existing methods work only on single architecture families
      3. Gap: Cross-architecture case requires factorizing architecture-specific conventions—does quotient-level canonicalization work?
      4. Our test: Deep Sets + architecture embeddings + MSE equivariance loss
      5. Result: Complete failure (0.00% kernel robustness)

    insight_preview: "We find that MSE-based equivariance loss fails to enforce group structure, architecture embeddings harm generalization, and dimensionality requirements are severely underestimated—suggesting viable approaches need contrastive learning or explicit group operations"

    contributions_framing: |
      Frame as "What we learned from failure":
      1. First systematic evaluation of cross-architecture quotient space learning
      2. Identification of three failure modes with root cause analysis
      3. Concrete alternative proposals grounded in failure analysis (contrastive loss, Slot Attention, per-family spaces)
      4. Kernel robustness metric that reveals equivariance failures masked by standard metrics

    transition_to_related_work: "To contextualize our negative result, we review existing weight-space learning methods and their limitations on heterogeneous model populations"

  # ─────────────────────────────────────────────────────────────────────────────
  # RELATED WORK
  # ─────────────────────────────────────────────────────────────────────────────
  related_work:
    narrative_purpose: "Position our work: NFN (homogeneous success), Git Re-Basin (explicit search), Model Merging (limited scope) → Cross-architecture gap → Our systematic test"

    positioning_strategy: "Build narrative: Existing methods work in restricted settings → Natural extension to cross-architecture → Our test shows it fails → Need fundamentally different approach"

    key_comparison_points:
      - area: "Neural Functional Networks (NFN)"
        limitation_to_highlight: "Validated only on homogeneous model populations (INRs, single architecture family)—no guidance for heterogeneous case"
        how_we_differ: "We explicitly test cross-architecture extension (CNN/Transformer/RNN) and identify failure modes"

      - area: "Git Re-Basin (Ainsworth et al. 2022)"
        limitation_to_highlight: "Uses explicit combinatorial permutation search (not learned equivariance)—computationally expensive, limited to small models"
        how_we_differ: "We test learned equivariance approach (MSE loss) and show it fails, suggesting explicit search may be necessary"

      - area: "Model Merging (Task Arithmetic)"
        limitation_to_highlight: "Works via linear weight interpolation (no quotient space abstraction)—limited to models with identical architectures"
        how_we_differ: "We aim for quotient-level canonicalization across architectures but find the gap is wider than anticipated"

    papers_to_discuss:
      - "Zhou et al. 2024 (NFN): Homogeneous population success"
      - "Ainsworth et al. 2022 (Git Re-Basin): Explicit permutation search baseline"
      - "Zaheer et al. 2017 (Deep Sets): Permutation invariance foundation"
      - "Locatello et al. 2020 (Slot Attention): Alternative architecture for future work"

    avoid:
      - "Dismissing prior work unfairly—NFN is valuable for homogeneous case"
      - "Claiming novelty for things that exist (permutation symmetries well-known)"
      - "Missing obvious baselines (Git Re-Basin, function-space embeddings)"

  # ─────────────────────────────────────────────────────────────────────────────
  # METHODOLOGY
  # ─────────────────────────────────────────────────────────────────────────────
  methodology:
    narrative_purpose: "Explain our approach: Deep Sets backbone + architecture embeddings + MSE equivariance loss → Three gate metrics to reveal failure modes"

    connection_to_insight: "We designed a natural extension of NFN (homogeneous success) to heterogeneous case—architecture embeddings to provide context, equivariance loss to enforce invariance. Failure reveals this extension is insufficient."

    key_design_decisions:
      - decision: "Deep Sets as encoder backbone"
        rationale: "Permutation-invariant aggregation proven for set-based learning (Zaheer et al. 2017), used successfully in NFN"
        alternatives_considered: "Slot Attention (more complex), GNNs (requires graph structure), Transformers (expensive for large model zoos)"

      - decision: "Architecture embeddings (64-dim) injected before encoding"
        rationale: "Provide architecture-specific context to help encoder learn to abstract—intuition: context enables abstraction"
        alternatives_considered: "Architecture-agnostic (no context), per-family encoders (defeats cross-architecture goal)"

      - decision: "MSE equivariance loss: L_equiv = ||E(g·M) - ρ(g)E(M)||²"
        rationale: "Natural extension of reconstruction loss to enforce permutation invariance—gradient signal for learning group structure"
        alternatives_considered: "Contrastive loss (not tried), explicit group constraints (computationally expensive)"

    intuition_building: |
      Quotient space intuition:
      - Weight space W has permutation symmetries g ∈ G (neuron reordering, layer swaps)
      - Quotient space W/G factors out these symmetries—each point z ∈ Z represents equivalence class [M]
      - Encoder E: W → Z should map permuted weights to same point: E(g·M) = E(M)
      - Equivariance loss enforces this: if z' = E(g·M), then z' should equal ρ(g)z where ρ is learned projection

    technical_depth_balance: |
      Main text: Architecture overview, loss formulation, evaluation protocol
      Appendix: Full training details, hyperparameters, synthetic data generation

  # ─────────────────────────────────────────────────────────────────────────────
  # EXPERIMENTS
  # ─────────────────────────────────────────────────────────────────────────────
  experiments:
    narrative_purpose: "Design three gate metrics to comprehensively evaluate quotient space existence and equivariance"

    experimental_questions:
      - question: "Does a finite-dimensional quotient space exist that captures task-relevant structure?"
        experiment: "Reconstruction error: Can K=32 quotient space reconstruct 1000-dim weights with <10% error?"
        expected_outcome: "Success: <10% reconstruction error; Actual: 19.18% (FAIL)"

      - question: "Is the quotient space architecture-independent (generalizes to unseen architectures)?"
        experiment: "Frozen-K generalization: Encoder trained on CNN+Transformer, tested on RNN with frozen K—error <10%?"
        expected_outcome: "Success: <10% R_RNN; Actual: 10.31% (FAIL marginally)"

      - question: "Does the encoder learn permutation invariance (quotient space property)?"
        experiment: "Kernel robustness: 1000 random weight permutations per model, measure if outputs preserved (D<0.01)—≥90% should pass"
        expected_outcome: "Success: ≥90% robustness; Actual: 0.00% (COMPLETE FAIL)"

    baseline_rationale: "Deep Sets without equivariance loss as lower bound (permutation invariance via architecture only, not loss)"
    dataset_rationale: "Synthetic ModelZoo-14K (1000 models, CNN/Transformer/RNN) enables PoC testing—real pretrained models left for future work after mechanism validated"
    metric_rationale: "Three complementary metrics: reconstruction (capacity), frozen-K (generalization), kernel robustness (equivariance)—failure on any one blocks quotient space claim"

    fairness_considerations: |
      PoC simplifications explicitly documented:
      - Synthetic random weights (not real pretrained models)
      - Reduced dimensionality (1000 vs 100K)
      - Single configuration tested (K=32, λ_equiv=0.5)
      Clear failure signal suggests these simplifications did not mask success

  # ─────────────────────────────────────────────────────────────────────────────
  # RESULTS
  # ─────────────────────────────────────────────────────────────────────────────
  results:
    narrative_purpose: "Present failure evidence: All three metrics fail → Most critical is kernel robustness (0.00%) → Training curves show conflicting gradients"

    main_result_highlight: "Kernel robustness: 0.00% (target ≥90%)—complete equivariance failure despite explicit equivariance loss training"

    result_presentation_order:
      - result: "Kernel robustness: 0.00%"
        purpose: "Lead with most critical failure—without permutation invariance, quotient-level canonicalization impossible"

      - result: "Reconstruction error: 19.18%"
        purpose: "Show dimensionality insufficiency—K=32 inadequate even for PoC"

      - result: "Frozen-K generalization: 10.31%"
        purpose: "Marginally failed but suggests architecture embeddings harmful"

      - result: "Training curves: early stop at epoch 12/20"
        purpose: "Show optimization instability—conflicting gradients between reconstruction and equivariance"

    surprising_result_handling: "Architecture embeddings harm cross-architecture learning (counter-intuitive)—discuss in context of domain adversarial training literature (Ganin et al. 2016) where domain information is explicitly removed"

    avoid:
      - "Hiding the failure—be direct and honest"
      - "Over-interpreting marginal effects (frozen-K 10.31% vs 10% target)"
      - "Cherry-picking—present all three gate metrics even though all failed"

  # ─────────────────────────────────────────────────────────────────────────────
  # DISCUSSION
  # ─────────────────────────────────────────────────────────────────────────────
  discussion:
    narrative_purpose: "Root cause analysis → Three failure modes → Concrete alternatives → Honest limitations → Broader implications"

    key_findings_interpretation: |
      Root cause analysis:
      1. MSE equivariance loss fundamentally inadequate—doesn't enforce group homomorphism structure (0.00% kernel robustness)
      2. Architecture embeddings may harm cross-architecture learning—inject family-specific information encoder cannot factor out (10.31% frozen-K)
      3. Quotient space dimensionality severely underestimated—K=32 insufficient for 1000-dim weights, real 100K-dim likely need K~1000-2000 (19.18% reconstruction error)

      Theoretical implications:
      - Learned equivariance via reconstruction losses may be insufficient (supports Git Re-Basin explicit search approach)
      - Cross-architecture permutation groups may be fundamentally incompatible (CNN spatial locality vs Transformer attention vs RNN temporal)

    honest_limitations:
      - limitation: "PoC simplifications: synthetic data, reduced dimensionality, single configuration tested"
        why_acceptable: "Clear failure signal (0.00% kernel robustness) suggests mechanism issue, not tuning—simplifications did not mask success"
        future_mitigation: "Test on real pretrained models, sweep K ∈ {64, 128, 256}, test alternatives (contrastive loss, Slot Attention)"

      - limitation: "No ablation studies (architecture embeddings, loss components)"
        why_acceptable: "Complete equivariance failure (0.00%) is unambiguous—ablations would not change conclusion that MSE loss inadequate"
        future_mitigation: "Future work: ablate arch embeddings, test contrastive loss, compare to Git Re-Basin baseline"

      - limitation: "No alternatives tested (Slot Attention, contrastive loss, higher K)"
        why_acceptable: "Paper focuses on systematic failure analysis of one approach—alternatives are proposed for future work, not claimed as solutions"
        future_mitigation: "Concrete proposals in Section 6 (Future Work)"

    broader_impact_statement: |
      **Positive impacts**: Prevents wasted research effort on similar dead ends, guides community toward viable directions
      **Negative impacts**: May discourage exploration of weight-space methods (mitigated by proposing concrete alternatives)
      **Dual-use concerns**: None (foundational research)

  # ─────────────────────────────────────────────────────────────────────────────
  # CONCLUSION
  # ─────────────────────────────────────────────────────────────────────────────
  conclusion:
    narrative_purpose: "Reinforce negative result value → Close loop with Introduction gap → Future work vision"

    callback_to_hook: "We began by asking whether quotient-level canonicalization could enable cross-architecture weight-space learning. Our systematic failure analysis shows that simple extensions of homogeneous methods (Deep Sets + architecture embeddings + MSE loss) fundamentally fail, requiring fundamentally different mechanisms."

    memorable_ending: "Negative results are valuable when they provide clear failure modes and concrete alternatives. We hope our analysis guides the community toward contrastive learning, explicit group constraints, and homogeneous-first validation strategies—avoiding the dead end we encountered."

    future_work_vision: |
      Immediate next steps:
      1. Test contrastive equivariance loss (InfoNCE with permutation pairs)
      2. Ablate architecture embeddings (pure architecture-agnostic encoding)
      3. Validate on homogeneous case first (CNN-only, replicate NFN)
      4. Compare to Git Re-Basin (explicit search upper bound)

      Longer-term vision:
      If alternatives fail → per-family quotient spaces with post-hoc alignment
      If homogeneous case fails → weight-space canonicalization may be fundamentally intractable

