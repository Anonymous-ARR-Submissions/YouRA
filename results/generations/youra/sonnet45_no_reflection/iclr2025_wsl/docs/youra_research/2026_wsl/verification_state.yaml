main_hypothesis:
  id: H-LCAC-v1
  title: Quotient-Level Cross-Architecture Canonicalization
  statement: Under conditions where neural network architectures (CNNs, Transformers,
    RNNs) solve the same task via exchangeable computations, if we apply architecture-specific
    encoders E_a that project model weights into a shared K-dimensional quotient space
    Z with learned slot-permutation operators ρ(g), then cross-architecture transferability
    will emerge as measured by probe transfer (≥80%), zero-shot equivariance on unseen
    architectures (≥70%), and linear alignment (Procrustes error <0.15), because the
    quotient space factorizes out architecture-specific coordinate conventions while
    preserving task-relevant computational structure through equivariance constraints.
  defined_in: 03_refinement.yaml
  controlled_variables:
    dataset: ModelZoo-14K
    model: Slot-Equivariant Encoder (Deep Sets + equivariance loss)
    optimizer: Adam
    hyperparameters:
      model_size_range: 10M-100M parameters
      training_dataset: ImageNet
      K_values:
      - 16
      - 32
      - 64
      lambda_equiv_range:
      - 0.0
      - 0.25
      - 0.5
      - 0.75
      - 1.0
      contrastive_weight: 0.1
      task_supervision_weight: 0.1
      random_seeds: 3
