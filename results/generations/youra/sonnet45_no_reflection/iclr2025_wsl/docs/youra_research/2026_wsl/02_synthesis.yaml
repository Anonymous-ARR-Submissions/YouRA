hypothesis_draft:
  title: "Learnable Cross-Architecture Canonicalization via Quotient-Level Slot Equivariance"
  hypothesis_id: "H-LCAC-v1"
  core_claim: |
    Neural network architectures (CNNs, Transformers, RNNs) that solve the same task via exchangeable
    computations can be mapped to a shared canonical coordinate system where architectural differences
    manifest as learned permutation equivariances over task-relevant slot representations.

    Formally: There exist architecture-specific encoders E_a: W_a → Z (where W_a is the weight space
    of architecture a and Z is a K-dimensional quotient space) such that E_a(g·M) ≈ ρ(π_a(g))E_a(M),
    where g is a permutation in the weight space, π_a(g) is the induced permutation in quotient space,
    and ρ is the representation of the permutation group acting on slots.
  mechanism: |
    Step 1: Architecture-specific encoders E_a learn to project weight tensors into K-dimensional slot
    space Z, where each slot represents a task-relevant computational unit (feature detector, attention head).

    Step 2: Equivariance loss L_equiv = ||E_a(g·M) - ρ(π_a(g))E_a(M)||² enforces that weight-space
    permutations (neuron reordering, layer swaps) correspond to simple slot permutations in Z.

    Step 3: Contrastive loss L_contrast pulls embeddings of functionally similar models together and
    pushes dissimilar ones apart, ensuring slots capture task-relevant structure, not arbitrary
    architectural artifacts.

    Step 4: The learned quotient space Z factorizes out architecture-specific coordinate conventions
    (neuron ordering, layer indexing), leaving only task-relevant computational structure. This enables
    linear alignment between E_CNN(M_CNN) and E_Transformer(M_Transformer) for models solving the same
    task, transfer of learned slots from CNNs to new Transformer instances without retraining (frozen-K
    generalization), and disentanglement of task accuracy from architecture predictability (Pareto
    frontier with knee point).
  predictions:
    - P1: "Probe transfer ≥80% AND ≥10pp above DeepSets (p<0.05)"
    - P2: "Zero-shot equivariance ≥70% AND ≥25pp above DeepSets on unseen RNN"
    - P3: "Linear alignment Procrustes <0.15 AND ≥30% below permutation null (p<0.01)"
    - P4: "Kernel robustness ≥90% pass D<0.01 on IID+OOD, adversarial ≥10× higher divergence"
    - P5: "Pareto knee: task≥95%, arch≤40%, curvature significantly higher than linear"
    - P6: "Cross-seed identifiability: Procrustes <0.10 across 3 seeds"
    - P7: "Frozen-K: R_RNN<10% AND E_RNN<2× on new architecture"
    - P8: "Cross-task retention: Spearman ρ≥0.6 between ImageNet and CIFAR-10"
    - P9: "Ablation: zero-shot drops ≥15pp without equivariance loss (p<0.01)"

variables_summary:
