measurement_plan:
  data_collection:
    - source: "ModelZoo-14K download from Hugging Face"
    - source: "Weight tensor extraction via PyTorch state_dict"
    - source: "Output logit computation on fixed 10K ImageNet validation samples"
  procedure:
    - step: "Phase 0 - Geometric Pre-Check: Measure principal angles between architecture-conditioned tangent spaces (pre- and post-projection)"
    - step: "Phase 1 - Kernel Robustness: Sample 1000 random permutations per model, measure output divergence D(f_M, f_{g·M}) on IID (ImageNet) and OOD (ImageNet-V2)"
    - step: "Phase 2 - Baseline Training: Train DeepSets, Git Re-Basin, NFN, function-space baselines on 70% train split"
    - step: "Phase 3 - Slot Encoder Training: Train with L = L_contrastive + λ_equiv·L_equivariance + 0.1·L_task_probe for 3 seeds, K∈{16,32,64}"
    - step: "Phase 4 - Probe Transfer: Train linear probe on CNN embeddings (train split), test on Transformer embeddings (test split)"
    - step: "Phase 5 - Zero-Shot Equivariance: Apply E_RNN (trained on CNN+Transformer) to RNN test set, measure equivariance error"
    - step: "Phase 6 - Linear Alignment: Procrustes analysis between Z_CNN and Z_Transformer, compare to 100 random permutation null"
    - step: "Phase 7 - Pareto Analysis: Vary λ_equiv∈[0, 0.001, 0.01, 0.1, 1.0] (15 values), fit GP-smoothed curve, detect knee via L-method"
    - step: "Phase 8 - Cross-Task Retention: Compute slot embeddings for ImageNet vs. CIFAR-10 models, measure Spearman correlation"
    - step: "Phase 9 - Frozen-K Generalization: Fix K=K₀ from CNN+Transformer training, apply to RNN, measure R_RNN and E_RNN"
    - step: "Phase 10 - Ablation: Train without L_equiv, measure zero-shot RNN performance drop"
  success_criteria:
    - "All 9 predictions (P1-P9) must meet quantitative thresholds"
    - "Geometric pre-check must show alignment improvement (pre→post projection)"
    - "Cross-seed identifiability (Procrustes <0.10) across 3 seeds"
    - "Compute budget must remain within ~200 A100 GPU-hours (2 weeks with 2 GPUs)"

validation:
  internal_validity:
    - "Control for model size (10M-100M parameters) to avoid confounds"
    - "Normalize by within-architecture performance for cross-architecture comparisons"
    - "Use adversarial perturbations (not random noise) for kernel robustness to avoid flat-basin false negatives"
    - "Cross-seed training (3 seeds) ensures identifiability, not optimization artifacts"
    - "Ablation study (remove L_equiv) establishes causal necessity of equivariance"
  external_validity:
