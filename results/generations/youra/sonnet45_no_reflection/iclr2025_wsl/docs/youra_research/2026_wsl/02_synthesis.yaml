  dependent_primary: "Probe transfer accuracy (≥80%), zero-shot equivariance error (≥70%), linear alignment Procrustes error (<0.15)"
  controlled: "Model size (10M-100M parameters), training dataset (ImageNet primary, CIFAR-10 cross-task), random seed (3 seeds for identifiability)"

null_hypothesis:
  h0_statement: |
    Architecture-specific coordinate conventions are fundamental to computation (not factorizable).
    In this case: (1) Kernel robustness fails (D>0.01), (2) Linear alignment fails (Procrustes >0.30),
    (3) Frozen-K generalization fails (R_RNN>10% or E_RNN>2×), (4) Pareto frontier is linear (curvature~0,
    uniform compression rather than selective canonicalization).
  statistical_test: "Multiple independent criteria with quantitative thresholds; bootstrap for probe transfer and ablation; permutation test for linear alignment; GP-smoothed curve fitting for Pareto analysis"
  significance_level: 0.05

