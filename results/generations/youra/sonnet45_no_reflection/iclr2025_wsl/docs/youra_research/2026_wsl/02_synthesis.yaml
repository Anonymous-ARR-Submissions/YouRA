    - "Frozen-K generalization to RNN tests architectural generality beyond training set"
    - "OOD kernel robustness (ImageNet-V2) ensures symmetries are functional, not IID coincidence"
    - "Null-calibrated linear alignment (permutation baseline) avoids geometric false positives"
    - "Pareto curvature quantification (GP smoothing) distinguishes canonicalization from uniform compression"

