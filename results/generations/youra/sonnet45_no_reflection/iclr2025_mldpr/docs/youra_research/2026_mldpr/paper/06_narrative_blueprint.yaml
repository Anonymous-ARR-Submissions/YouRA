# Phase 6 Narrative Blueprint
# Generated: 2026-05-12
# Paper Type: Negative Result (Empirical Falsification)
# Target Venue: ICML 2026

metadata:
  paper_type: "negative_result_empirical"
  contribution_type: "falsification_with_insights"
  narrative_strategy: "surprising_failure_mode"
  target_length: "8 pages (ICML format)"

# ═══════════════════════════════════════════════════════════════
# NARRATIVE HOOK STRATEGY
# ═══════════════════════════════════════════════════════════════

hook_strategy:
  opening_hook: |
    "Dataset versioning tools treat versions like Git commits—snapshots without semantic meaning.
    What if we could automatically classify version changes as 'breaking' vs 'minor' using statistical
    drift detection? We tested this hypothesis on 9 real dataset pairs and found that fixed thresholds
    fail catastrophically: 100% false positive rate on minor changes."

  hook_type: "counterintuitive_negative_result"

  emotional_arc: "hope → surprising_failure → insight"

  payoff: |
    The 100% false positive rate on PATCH labels reveals why automated semantic versioning is harder
    than it appears: drift magnitude is dataset-relative, not absolute. This finding redirects future
    work toward adaptive calibration or supervised learning approaches.

# ═══════════════════════════════════════════════════════════════
# PROBLEM FRAMING (3 Levels)
# ═══════════════════════════════════════════════════════════════

problem_framing:
  level_1_societal:
    problem: "ML reproducibility crisis threatens scientific validity"
    evidence: "60-70% reproduction failure rates in ML research"
    why_matters: "Researchers waste months debugging due to silent dataset changes"

  level_2_technical:
    problem: "Existing dataset versioning lacks semantic meaning (MAJOR vs MINOR changes)"
    evidence: "DVC snapshots, HuggingFace revisions provide IDs without impact classification"
    gap: "No automated way to distinguish breaking changes from minor updates"

  level_3_specific:
    problem: "Can fixed statistical thresholds (from ImageNet) generalize across datasets?"
    hypothesis: "KS test + MMD with 7%/2%/0.5% thresholds should classify version severity"
    tested_claim: "≥85% accuracy with ≥70% precision for MAJOR change detection"

# ═══════════════════════════════════════════════════════════════
# KEY INSIGHT (Experiment-Verified)
# ═══════════════════════════════════════════════════════════════

key_insight:
  main_finding: |
    Fixed statistical thresholds derived from ImageNet literature (7%/2%/0.5%) do NOT generalize
    to NLP datasets, achieving only 16.7% precision (target: 70%) due to 20× variance in drift
    score distributions across dataset types.

  verification_evidence:
    - "h-e1 confusion matrix: 5/5 PATCH datasets misclassified as MAJOR"
    - "Drift scores range 0.04-0.79 across GLUE variants despite all being MINOR/PATCH changes"
    - "SST2 (PATCH) scored 0.79 drift, MultiNLI (MAJOR) only 0.087"

  why_matters: |
    Reveals fundamental challenge in automated semantic versioning: drift magnitude is relative
    to dataset-specific baselines, not absolute. Invalidates universal threshold assumption.

# ═══════════════════════════════════════════════════════════════
# EVIDENCE STRUCTURE (Story Flow)
# ═══════════════════════════════════════════════════════════════

evidence_flow:
  act_1_setup:
    sections: ["Introduction", "Related Work"]
    goal: "Establish problem + prior work gap"
    key_points:
      - "ML reproducibility failures from dataset drift (ImageNet→ImageNet-v2)"
      - "Existing tools (DVC, HuggingFace) lack semantic versioning"
      - "Prior work: González-Cebrián et al. detect drift but don't classify severity"
      - "Research question: Can fixed thresholds automate MAJOR/MINOR/PATCH classification?"

  act_2_method:
    sections: ["Methodology"]
    goal: "Describe SVAD system + experiment design"
    key_points:
      - "KS test + MMD on PCA-reduced features (ResNet-50, BERT-base)"
      - "Fixed thresholds: MAJOR=7%, MINOR=2%, PATCH=0.5% (from ImageNet literature)"
      - "9 real datasets: 1 vision (MNIST), 8 NLP (GLUE variants, SNLI, MultiNLI)"
      - "Gate criteria: ≥85% accuracy, ≥70% precision, ≥85% recall for MAJOR detection"

  act_3_results:
    sections: ["Experiments", "Results"]
    goal: "Present failure + surprising pattern"
    key_points:
      - "Overall accuracy: 44.4% (vs 85% target, -40.6pp gap)"
      - "MAJOR precision: 16.7% (vs 70% target, -53.3pp gap)"
      - "100% false positive rate: All 5 PATCH datasets misclassified as MAJOR"
      - "20× drift variance: PATCH scores 0.08-0.79, overlapping MAJOR range"

  act_4_interpretation:
    sections: ["Discussion"]
    goal: "Explain WHY it failed + implications"
    key_points:
      - "Root cause: Frozen feature extractors too robust (transfer learning optimized)"
      - "Cross-modality mis-calibration: ImageNet thresholds don't transfer to NLP"
      - "Dataset-specific baselines required: SST2 (PATCH) showed 0.79, QNLI (MINOR) 0.042"
      - "Path forward: Adaptive calibration OR supervised learning OR performance-based ground truth"

  act_5_closure:
    sections: ["Conclusion"]
    goal: "Reframe as useful negative result"
    key_points:
      - "Fixed thresholds empirically falsified for semantic dataset versioning"
      - "Contribution: First evidence that ImageNet-derived thresholds fail on NLP (100% FP rate)"
      - "Redirects research: Adaptive per-dataset calibration or supervised classification needed"
      - "Implications: Automated semantic versioning harder than anticipated"

# ═══════════════════════════════════════════════════════════════
# SECTION-LEVEL NARRATIVE ARCS
# ═══════════════════════════════════════════════════════════════

section_arcs:
  introduction:
    arc: "problem → gap → our_attempt"
    opening: "ML reproducibility crisis + silent dataset failures"
    tension: "Existing tools lack semantic versioning (snapshots without meaning)"
    our_move: "Test if statistical thresholds can automate MAJOR/MINOR/PATCH classification"
    foreshadowing: "Spoiler: They catastrophically fail, but failure mode reveals insights"

  related_work:
    arc: "prior_approaches → limitations → our_focus"
    subsections:
      - "Dataset versioning tools (DVC, HuggingFace): Snapshots without semantics"
      - "Drift detection methods (KS, MMD, PCA): Statistical tests established"
      - "Semantic versioning (NPM, software): MAJOR/MINOR/PATCH for APIs"
      - "Our focus: Bridging drift detection + semantic versioning for datasets"

  methodology:
    arc: "system_design → implementation → evaluation_protocol"
    subsections:
      - "SVAD architecture: Detection (KS+MMD) → Classification (thresholds) → Versioning"
      - "Fixed thresholds: 7%/2%/0.5% (from ImageNet literature)"
      - "Datasets: 9 real pairs (1 vision, 8 NLP) with documented version histories"
      - "Metrics: Precision/Recall/F1 for MAJOR detection, overall accuracy"

  experiments:
    arc: "setup → execution → results_preview"
    subsections:
      - "Dataset coverage: 9/15 successfully loaded (6 require manual download)"
      - "Feature extraction: ResNet-50 (vision), BERT-base (NLP) → PCA to 2D"
      - "Drift scoring: KS test + MMD on reduced features"
      - "Classification: Compare drift scores against 7%/2%/0.5% thresholds"

  results:
    arc: "headline_metrics → confusion_matrix → per_dataset_breakdown"
    dramatic_reveal: "100% PATCH misclassification rate (5/5 as MAJOR)"
    subsections:
      - "Gate failure: 44.4% accuracy vs 85% target (-40.6pp gap)"
      - "Precision collapse: 16.7% vs 70% target (-53.3pp gap) despite 100% recall"
      - "Confusion matrix: All PATCH datasets exceed MAJOR threshold"
      - "Drift score variance: 20× range (0.04-0.79) within similar severity levels"

  discussion:
    arc: "failure_analysis → root_causes → path_forward"
    subsections:
      - "Why fixed thresholds fail: Dataset-specific drift baselines required"
      - "Feature extractor robustness trade-off: Too robust for drift sensitivity"
      - "Cross-modality mis-calibration: ImageNet ≠ NLP distribution characteristics"
      - "Implications: Adaptive calibration OR supervised learning needed"
      - "Limitations: Ground truth labels from literature, not measured performance"

  conclusion:
    arc: "reframe_negative → contribution → future_directions"
    closing: "Empirical falsification as scientific contribution"
    subsections:
      - "Fixed thresholds refuted for semantic dataset versioning"
      - "Contribution: First evidence of 100% FP rate on PATCH labels (ImageNet→NLP transfer)"
      - "Future work: Adaptive per-dataset calibration, supervised classification, performance-based validation"

# ═══════════════════════════════════════════════════════════════
# FIGURE/TABLE PLACEMENT STRATEGY
# ═══════════════════════════════════════════════════════════════

figures:
  figure_1:
    file: "gate_metrics.png"
    caption: "Gate metrics comparison: Achieved vs Target. Precision 16.7% vs 70%, Recall 100% vs 85%, Accuracy 44.4% vs 85%."
    section: "Results"
    purpose: "Headline failure visualization"

  figure_2:
    file: "confusion_matrix.png"
    caption: "Confusion matrix showing 5/5 PATCH datasets misclassified as MAJOR, revealing 100% false positive rate."
    section: "Results"
    purpose: "Failure mode visualization"

  figure_3:
    file: "drift_scores.png"
    caption: "Distribution of drift scores (KS test + MMD) across 9 datasets, showing 20× variance (0.04-0.79) that invalidates fixed thresholds."
    section: "Discussion"
    purpose: "Root cause explanation"

  figure_4:
    file: "per_dataset_performance.png"
    caption: "Per-dataset classification accuracy breakdown, highlighting systematic PATCH misclassification."
    section: "Supplementary Material (or Results appendix)"
    purpose: "Detailed evidence"

tables:
  table_1:
    caption: "Dataset coverage and ground truth labels"
    columns: ["Dataset", "Domain", "Transition Type", "Ground Truth Label", "Drift Score", "Predicted Label"]
    section: "Experiments"
    purpose: "Dataset overview"

  table_2:
    caption: "Comparison with related work on drift detection and dataset versioning"
    columns: ["Method", "Semantic Versioning", "Automated Detection", "Tested Datasets", "Accuracy"]
    section: "Related Work"
    purpose: "Position against baselines"

  table_3:
    caption: "Gate metrics: Achieved vs Target with gap analysis"
    columns: ["Metric", "Target", "Achieved", "Gap", "Status"]
    section: "Results"
    purpose: "Quantitative failure summary"

# ═══════════════════════════════════════════════════════════════
# TONE & WRITING GUIDELINES
# ═══════════════════════════════════════════════════════════════

writing_guidelines:
  tone: "honest_rigorous_constructive"

  negative_result_framing:
    - "Frame as empirical falsification, not failure"
    - "Emphasize surprising failure mode (100% FP rate) as insight"
    - "Redirect future work with concrete alternatives (adaptive calibration, supervised learning)"
    - "Acknowledge limitations honestly but contextually (why acceptable for PoC stage)"

  claims_discipline:
    - "ONLY claim what was tested (9 datasets, NLP-heavy)"
    - "Avoid overgeneralizing to vision domain (only 1 invalid vision dataset)"
    - "Use 'demonstrates', 'suggests', 'indicates' for causal language"
    - "Quantify all claims (16.7% precision, -53.3pp gap, 20× variance)"

  limitation_handling:
    - "Include 4 honest limitations in Discussion/Conclusion"
    - "Explain why each limitation is acceptable for PoC stage"
    - "Suggest concrete mitigation strategies for future work"

  clarity_targets:
    - "Define MAJOR/MINOR/PATCH semantic versioning clearly in Introduction"
    - "Explain KS test + MMD + PCA pipeline with visual (methodology figure)"
    - "Clarify 'cold-start thresholds' vs 'adaptive thresholds' distinction"
    - "Make failure mode obvious: 'All 5 PATCH datasets exceeded MAJOR threshold'"

