  key_innovation: "First unified system combining automated drift detection, semantic versioning (MAJOR/MINOR/PATCH), adaptive per-dataset thresholds, and dependency-aware deprecation workflows"
  differentiation_summary: |
    - vs González-Cebrián et al. (2024): Adds semantic meaning and deprecation workflow (they stop at drift detection)
    - vs DVC (15.5K stars): Adds semantic versioning and automated breaking change detection (they only snapshot)
    - vs HuggingFace (21.4K stars): Adds automated drift detection and deprecation workflows (they only revision IDs)
    - vs NPM semantic versioning: Adapts to datasets where 'breaking' = statistical drift causing performance degradation

