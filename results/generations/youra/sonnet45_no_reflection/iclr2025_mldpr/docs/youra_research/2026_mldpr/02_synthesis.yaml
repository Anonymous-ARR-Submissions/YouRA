measurement_plan:
  data_collection:
    - source: "Historical version changes from 15 public datasets with documented performance impacts"
    - source: "GitHub Issues corpus (2019-2025) for proxy metric"
    - source: "Controlled reproduction experiment: 40 researchers, 20 papers from Papers With Code"
  procedure:
    - step: "Apply SVAD drift detection to all historical version transitions → measure precision/recall (P1)"
    - step: "Simulate SVAD deployment via temporal analysis of GitHub Issues → measure reduction (P2)"
    - step: "Run 2×20 controlled experiment (SVAD vs Manual) → measure success rate, time to reproduction, significance (P2b)"
    - step: "Test on 20% held-out version transitions → measure false negative/positive rates (P3)"
    - step: "Test hybrid system on 50 synthetic + real metadata changes → measure detection rate (P4)"
  success_criteria:
