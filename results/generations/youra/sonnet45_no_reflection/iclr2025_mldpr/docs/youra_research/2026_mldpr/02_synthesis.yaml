    - "Semantic versioning borrowed from software packages (NPM) provides proven deprecation patterns for datasets"
    - "Two-phase calibration (cold-start → adaptive) solves bootstrapping problem for new datasets"
    - "Hybrid approach (automated stats + manual metadata review) catches both statistical and semantic changes"
    - "Direct reproducibility metric (P2b) essential alongside proxy metric (P2) for strong evidence"
  breakthrough_moments:
