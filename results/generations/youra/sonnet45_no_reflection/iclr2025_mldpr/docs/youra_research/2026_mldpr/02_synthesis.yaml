hypothesis_draft:
  title: "Semantic Dataset Versioning with Adaptive Drift-Based Deprecation (SVAD)"
  hypothesis_id: "H-SVAD-v1"
  core_claim: |
    Implementing SVAD - a system that combines automated drift detection (KS test + MMD on PCA-reduced features),
    adaptive threshold calibration (cold-start at 7%/2%/0.5% → dataset-specific refinement), and dependency-aware
    deprecation workflows - will improve ML reproducibility by 15-25% compared to manual versioning practices by
    making silent breaking changes explicit and actionable.
  mechanism: |
    Four-step causal chain:
    1. Detection: Statistical tests compare v_new vs v_old → drift score
    2. Classification: Drift score vs adaptive thresholds → MAJOR/MINOR/PATCH version bump
    3. Deprecation: MAJOR bump triggers 90-day workflow → automated notifications to dependent models
    4. Reproducibility: Researchers receive warnings → re-run with pinned versions → reproducibility improves
  predictions:
    - P1: "Drift detection correctly classifies ≥85% of historical version changes (precision ≥70%, recall ≥85%)"
    - P2: "Proxy metric: >50% reduction in GitHub Issues mentioning reproducibility + dataset"
    - P2b: "Direct metric: ≥90% reproduction success (controlled experiment) vs <70% manual baseline, p<0.05"
    - P3: "Error control: <5% false negative rate, <20% false positive rate"
    - P4: "Hybrid system: 100% detection of critical metadata changes (license, ethics)"

variables_summary:
  independent: "Versioning System Type (SVAD vs Manual)"
  dependent_primary: "Reproduction Success Rate (0-100%, exact match within 2%)"
  controlled: "Dataset Domain (stratified), Researcher Skill (randomized), Paper Difficulty (stratified)"

null_hypothesis:
