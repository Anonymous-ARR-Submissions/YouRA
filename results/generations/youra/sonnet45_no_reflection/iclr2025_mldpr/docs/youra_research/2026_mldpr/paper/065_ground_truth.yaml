# ═══════════════════════════════════════════════════════════════
# CAUSAL CLAIMS (For Logical Attack)
# ═══════════════════════════════════════════════════════════════

causal_claims:
  root_cause_1:
    claim: "Dataset-specific drift baselines required (not universal thresholds)"
    evidence: "20× drift variance across similar severity labels"
    location: "Section 6.1"
    logical_chain:
      - "SST2 (PATCH) scored 0.79 drift"
      - "QNLI (MINOR) scored 0.042 drift"
      - "Both are GLUE benchmarks with similar construction"
      - "Therefore: 'high drift' is relative to dataset baselines, not absolute"
    potential_weakness: "Assumes ground truth labels are correct (not validated via performance)"

  root_cause_2:
    claim: "Frozen feature extractors insufficiently sensitive to version-level shifts"
    evidence: "Transfer learning models optimized for robustness, not drift sensitivity"
    location: "Section 6.1"
    logical_chain:
      - "BERT/ResNet pre-trained for transfer learning (generalize across domains)"
      - "Robustness to distribution shift is desirable for transfer learning"
      - "But drift detection requires sensitivity, not robustness"
      - "Therefore: frozen models may suppress subtle version-level changes"
    potential_weakness: "Not directly tested (no drift-specialized feature extractors compared)"

  root_cause_3:
    claim: "Cross-modality mis-calibration (ImageNet thresholds don't transfer to NLP)"
    evidence: "All 8 NLP datasets show different drift characteristics than ImageNet-derived thresholds"
    location: "Section 6.1"
    logical_chain:
      - "Thresholds derived from ImageNet (large-scale, 2048-dim, continuous pixels)"
      - "Tested on GLUE (small-scale, 768-dim, discrete tokens)"
      - "NLP drift scores span 0.04-0.79 (7% threshold falls in middle, not tail)"
      - "Therefore: modality-specific thresholds required"
    potential_weakness: "Only 1 vision dataset tested (and invalid—MNIST cross-dataset shift)"

