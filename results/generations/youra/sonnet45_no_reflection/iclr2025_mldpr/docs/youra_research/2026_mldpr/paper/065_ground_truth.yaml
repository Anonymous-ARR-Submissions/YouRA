methodology_weaknesses:
  limitation_1:
    issue: "Ground truth labels NOT performance-validated"
    severity: "HIGH"
    location: "Section 6.3, Limitations"
    description: "Labels derived from literature, not measured model performance degradation"
    acknowledged: true
    justification: "PoC-stage acceptable; doesn't change negative result (44.4% accuracy decisive)"
    attack_vector: "SST2 PATCH label may be wrong—0.79 drift suggests actual MAJOR/MINOR"
    defense: "Even if ground truth has errors, 100% PATCH misclassification + 20× variance demonstrate threshold failure"

  limitation_2:
    issue: "Incomplete dataset coverage (9/15, 60%)"
    severity: "MEDIUM"
    location: "Section 6.3"
    description: "Missing 6 datasets (3 vision, 3 NLP) due to manual download or API failures"
    acknowledged: true
    justification: "Hypothesis failed decisively on 9 datasets; adding 6 unlikely to reverse -53pp gap"
    attack_vector: "Cannot claim cross-modality generalization with only 1 vision dataset"
    defense: "Scope limited to NLP benchmarks (8/9 datasets); vision generalization untested"

  limitation_3:
    issue: "MNIST cross-dataset shift contaminates results"
    severity: "MEDIUM"
    location: "Section 6.3"
    description: "MNIST→USPS is domain adaptation, not version drift"
    acknowledged: true
    justification: "Removing MNIST: 4/8 = 50% accuracy, still far below 85% target"
    attack_vector: "Included invalid data point in primary analysis"
    defense: "Transparently disclosed; recalculated metrics without MNIST; conclusion unchanged"

  limitation_4:
    issue: "Frozen feature extractors may under-detect drift"
    severity: "LOW"
    location: "Section 6.3"
    description: "Transfer learning models optimized for robustness, not sensitivity"
    acknowledged: true
    justification: "Failure mode is threshold mis-calibration (100% PATCH error), not missed detections"
    attack_vector: "Different feature extractors might produce different results"
    defense: "Even with 'under-sensitive' features, 20× variance demonstrates threshold problem"

