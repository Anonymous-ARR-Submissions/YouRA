# ═══════════════════════════════════════════════════════════════
# REVIEWER LIKELY OBJECTIONS (Pre-Identified)
# ═══════════════════════════════════════════════════════════════

anticipated_objections:
  objection_1:
    question: "Why didn't you test adaptive thresholds instead of just fixed ones?"
    response: "Our goal was to falsify the universal fixed threshold hypothesis (commonly assumed in practice). Adaptive calibration is future work requiring multiple version transitions per dataset (data unavailable)."

  objection_2:
    question: "9/15 datasets is too few—how can you claim this generalizes?"
    response: "We explicitly scope claims to NLP benchmarks (8/9). Vision generalization is untested due to manual download requirements. The -53pp precision gap is decisive even on 9 datasets."

  objection_3:
    question: "SST2 PATCH label might be wrong—did you validate ground truth?"
    response: "Acknowledged in Limitations (Section 6.3). Performance validation is critical future work. However, ALL 5 PATCH datasets exceed MAJOR threshold (systematic pattern), not just SST2."

  objection_4:
    question: "Frozen features may be the problem, not the thresholds—why not test drift-specialized extractors?"
    response: "Acknowledged in Limitations. Even with 'under-sensitive' features, 20× drift variance demonstrates threshold generalization problem. Different extractors might change magnitudes but not relative ordering."

  objection_5:
    question: "This is just a negative result—what's the scientific contribution?"
    response: "Rigorous falsification redirects research away from dead ends. We provide first quantitative evidence (44.4% accuracy, 100% PATCH FP rate) that fixed thresholds fail, with mechanistic insights guiding alternative approaches."

