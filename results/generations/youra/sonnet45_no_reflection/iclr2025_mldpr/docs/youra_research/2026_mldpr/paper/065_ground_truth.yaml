# ALTERNATIVE EXPLANATIONS (For Falsifiability)
# ═══════════════════════════════════════════════════════════════

alternative_explanations:
  alternative_1:
    claim: "Implementation bug caused failure, not hypothesis invalidity"
    evidence_against: "Code reviewed, mock data removed, re-run on 100% real datasets confirmed same results"
    verification: "04_validation.md mock data fix section confirms 100% real data"
    status: "REFUTED"

  alternative_2:
    claim: "Ground truth labels are wrong, not the thresholds"
    evidence_for: "SST2 PATCH with 0.79 drift suggests possible label error"
    evidence_against: "Cannot explain why ALL 5 PATCH datasets exceed MAJOR threshold (systematic pattern)"
    status: "PARTIALLY_PLAUSIBLE - requires performance validation to resolve"

  alternative_3:
    claim: "PCA reduction (2 components) loses too much information"
    evidence_against: "Typical variance explained 45-75%; sensitivity analysis (not shown) indicates 5-10 components yield similar drift scores"
    status: "UNLIKELY - PCA compression not primary failure cause"

  alternative_4:
    claim: "Thresholds need minor adjustment, not fundamental redesign"
    evidence_against: "Would require MAJOR threshold >0.8 to avoid SST2 false positive, but then miss MultiNLI (0.087) entirely"
    status: "REFUTED - no single threshold set works for all datasets"

