# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Detection layer: Statistical tests (KS, MMD) compare dataset v_new vs v_old → compute drift score"
      evidence: "González-Cebrián et al. (2024) validated PCA + drift metrics for versioning; scipy.stats.ks_2samp O(n log n) computationally feasible"
      falsifier: "If drift detection fails to identify known breaking changes (ImageNet→ImageNet-v2), mechanism fails at step 1"
    - step: 2
      description: "Classification layer: Drift score vs adaptive thresholds (starting at 7%/2%/0.5%, refined per-dataset) → MAJOR/MINOR/PATCH version bump"
      evidence: "Two-phase calibration: cold-start with literature-derived defaults, then refinement after ≥20 models trained on both versions"
      falsifier: "If classification accuracy <75% on historical version changes, threshold mechanism is unreliable"
    - step: 3
      description: "Notification layer: MAJOR bump triggers 90-day deprecation workflow → automated notifications to dependent models via dependency graph"
      evidence: "DVC/MLflow already track lineage; extending to 'which models used which dataset versions' is engineering, not research novelty"
      falsifier: "If notifications don't reach researchers (email/system warnings ignored), deprecation workflow fails"
    - step: 4
      description: "Reproducibility gain: Researchers receive explicit version warnings → re-run experiments with version-pinned environment → reproducibility improves"
      evidence: "Hypothesis predicts >50% reduction in silent failures (GitHub Issues) and ≥90% success rate (controlled experiment)"
      falsifier: "If P2/P2b fail (no significant improvement in reproducibility metrics), causal chain doesn't produce expected outcome"
  key_tension: "Adoption barrier - system provides technical infrastructure but requires cultural shift for widespread use"
  evidence_summary: |
    Causal chain builds on established drift detection methods (step 1-2) and extends with novel deprecation workflow (step 3-4).
    Steps 1-2 validated by González-Cebrián et al. and feasibility confirmed by Prof. Pax.
    Steps 3-4 are hypothesis contributions requiring empirical validation via P2/P2b experiments.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Statistical drift detection (KS test, MMD) can reliably identify distribution shifts that cause performance degradation"
    supporting_evidence: "González-Cebrián et al. (2024) demonstrated PCA + drift metrics; Prof. Pax confirmed O(n log n) computational feasibility"
    consequence_if_violated: "If statistical tests miss critical breaking changes (false negatives), system fails primary safety goal"
  - id: "A2"
    assumption: "Researchers will respond to automated deprecation warnings and update their dataset versions"
    supporting_evidence: "NPM deprecation warnings reduce package usage by ~60% within 6 months (software engineering precedent)"
    consequence_if_violated: "If warnings are ignored, reproducibility gains won't materialize despite correct detection"
  - id: "A3"
    assumption: "Performance impact (>5% degradation) is a valid proxy for 'breaking change' in datasets"
    supporting_evidence: "Recht et al. (2019) ImageNet→ImageNet-v2 case showed 5-15% performance drops; community considers this significant"
    consequence_if_violated: "If threshold is too strict/loose, system over/under-flags changes, reducing trust"
  - id: "A4"
    assumption: "Dependency tracking (which models used which dataset versions) is maintainable at scale"
    supporting_evidence: "DVC/MLflow already track lineage; extension to dataset versions is engineering effort, not fundamental barrier"
    consequence_if_violated: "If dependency graphs become stale or unmaintained, notification layer fails"
  - id: "A5"
    assumption: "Adaptive threshold refinement converges to stable values after sufficient samples (≥50 models)"
    supporting_evidence: "Experiment 2 in Prof. Vera's protocol tests convergence; standard adaptive estimation theory predicts convergence"
    consequence_if_violated: "If thresholds oscillate or don't converge, system becomes unpredictable"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Archival datasets with infrequent updates (ImageNet, CIFAR, GLUE) where version changes are discrete events
    - ML repositories with dependency tracking capabilities (DVC, HuggingFace, MLflow integration)
    - Computer vision, NLP, and RL domains where distribution shift is measurable
    - Research and production ML systems where reproducibility matters
  does_not_apply_to: |
    - Streaming datasets with continuous drift (Twitter feeds, real-time sensor data) - would spam MAJOR version bumps
    - Proprietary datasets without public version histories - cannot validate on closed-source data
    - Cross-repository dependencies (model on Repo A, dataset on Repo B) - requires shared metadata standard (future work)
    - Datasets where semantic changes don't affect statistics (ethical/legal metadata changes) - handled by hybrid manual review
  known_limitations: |
    - Bootstrapping period: New datasets lack historical performance data for threshold calibration (mitigated by cold-start defaults)
    - Non-Python ecosystems (R, Julia) - implementation initially targets Python ecosystem
    - Requires researcher adoption - technical infrastructure alone doesn't guarantee behavioral change
    - Metadata-only changes (license, ethics) require manual review (hybrid approach, not fully automated)

