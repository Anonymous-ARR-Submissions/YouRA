# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "SVAD drift detection will correctly classify ≥85% of known historical dataset version changes (ImageNet, CIFAR, GLUE, etc.) as MAJOR/MINOR/PATCH with precision ≥70% and recall ≥85%"
    test_method: "Apply SVAD to 15 datasets with documented version histories; compare automated classification against expert labels"
    success_criterion: "Precision ≥70%, Recall ≥85%, F1 ≥75% for MAJOR change detection"
    falsification: "If precision <60% OR recall <75%, drift detection is unreliable for production use"
  - id: "P2"
    primary: false
    statement: "SVAD deployment will reduce 'silent reproducibility failures' (GitHub Issues mentioning 'cannot reproduce' + 'dataset') by >50% compared to pre-deployment baseline"
    test_method: "Analyze GitHub Issues corpus (2019-2025); simulate SVAD deployment via temporal analysis; measure issue rate reduction"
    success_criterion: ">50% reduction in reproducibility-related dataset issues post-deployment"
    falsification: "If reduction <30%, proxy metric doesn't show substantial impact"
  - id: "P2b"
    primary: true
    statement: "In controlled reproduction experiments, SVAD-enabled environments will achieve ≥90% reproduction success rate vs <70% for manual versioning"
    test_method: "2×20 controlled experiment: 40 researchers attempt to reproduce 20 papers (Papers With Code); random assignment to SVAD vs Manual conditions; measure success rate and time to reproduction"
    success_criterion: "SVAD success ≥90%, Manual <70%, Fisher's exact test p<0.05, statistical power 0.80"
    falsification: "If SVAD success <80% OR no significant difference (p≥0.05), direct reproducibility impact not demonstrated"
  - id: "P3"
    primary: false
    statement: "SVAD will achieve <5% false negative rate (missing breaking changes) while maintaining <20% false positive rate on held-out test set"
    test_method: "Hold out 20% of 15 datasets (~30 version transitions); apply calibrated SVAD; measure FN and FP rates"
    success_criterion: "FN rate <5%, FP rate <20%"
    falsification: "If FN ≥10% OR FP ≥30%, error rates too high for safety-critical applications"
  - id: "P4"
    primary: false
    statement: "Hybrid SVAD system (automated stats + manual metadata review) will detect 100% of critical metadata changes (license, ethics, bias) requiring manual review"
    test_method: "Create 50 synthetic version pairs with metadata-only changes; test on real cases (ImageNet licensing, LAION-5B policy updates); measure detection rate"
    success_criterion: "100% detection rate for critical metadata changes flagged for manual review"
    falsification: "If any critical ethical/legal change is missed by hybrid system, safety net fails"

