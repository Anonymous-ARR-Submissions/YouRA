# ═══════════════════════════════════════════════════════════════
# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "Dataset versioning tools exist (DVC, HuggingFace) but use snapshot-based approaches without semantic meaning"
      status: "BUILD_ON"
      evidence: "Phase 1 findings - DVC (15.5K stars), HuggingFace datasets (21.4K stars) documented as existing tools"
    - claim: "Statistical drift detection methods are established (KS test, MMD, PCA-based drift metrics)"
      status: "BUILD_ON"
      evidence: "González-Cebrián et al. (2024) demonstrated PCA + Autoencoder drift metrics for versioning"
    - claim: "ImageNet→ImageNet-v2 and CIFAR-10→CIFAR-10.1 showed documented performance degradation from dataset drift"
      status: "BUILD_ON"
      evidence: "Recht et al. (2019) documented cases where dataset evolution caused reproducibility issues"
    - claim: "Semantic versioning (MAJOR.MINOR.PATCH) is effective for software package management"
      status: "BUILD_ON"
      evidence: "NPM, semver standards widely adopted in software engineering"
    - claim: "Automated semantic versioning with adaptive thresholds for datasets improves reproducibility"
      status: "PROVE_NEW"
      evidence: "Novel hypothesis - not yet validated"
  scope_reduction_percentage: 20
  phase2b_4_instructions: |
    BUILD_ON claims can use existing datasets and metrics without re-validation.
    PROVE_NEW claim requires experiments with 15 datasets, controlled reproduction tests, and error rate validation.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-SVAD-v1"
  confidence_level: 0.85
  core_hypothesis_statement: |
    Under ML dataset management contexts, if we implement Semantic Dataset Versioning with Adaptive Drift-Based Deprecation (SVAD) that combines automated drift detection (KS test + MMD on PCA-reduced features) with adaptive threshold calibration and dependency-aware deprecation workflows, then reproducibility rates will improve by 15-25% compared to manual versioning practices, because automated detection and notification of breaking changes makes silent reproducibility failures explicit and actionable.
  alternative_hypothesis_h0: |
    There is no significant difference in reproducibility rates between SVAD-enabled environments and manual versioning practices (improvement <10% or p≥0.05).

