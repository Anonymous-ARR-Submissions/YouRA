# ═══════════════════════════════════════════════════════════════
# CONSENSUS SYNTHESIS
# ═══════════════════════════════════════════════════════════════

consensus:
  hypothesis_summary: |
    Performance-weighted hierarchical coordination between parameter-efficient adaptation and sparse expert
    routing yields super-additive efficiency gains under intermediate task heterogeneity conditions. The
    mechanism operates through differentiable alignment loss that couples adapter-specific routing biases
    to expert performance attributions, inducing functional decoupling where high mutual information between
    adapters and experts correlates with reduced cross-task gradient interference. This coordination is
    regime-dependent: homogeneous tasks benefit from shared adapters, heterogeneous tasks from coordination,
    and highly orthogonal tasks from independent adaptation. The inverted-U relationship constitutes a
    design law for architectural choice based on measured task heterogeneity.

  experimental_validation_summary: |
    Validation requires: (1) temporal mediation demonstrating MI changes precede performance gains,
    (2) destruction tests showing performance drops proportional to MI when alignment shuffled,
    (3) parameter-matched capacity controls, (4) pre-registered regime switching across 15 task triplets
    with directional inequality predictions, (5) gradient interference measurements exceeding entropy-matched
    controls, and (6) cross-method generalization testing with pre-defined falsification criteria.

  remaining_concerns:
    - concern: "Attribution noise stability"
      mitigation: "Monitor CV(ΔL_e) during training; abort runs where CV > 1.0, diagnose via batch size or learning rate adjustment"
    - concern: "Routing reliability prerequisite"
      mitigation: "Pre-validate ICC ≥ 0.7 on all task sets; exclude task pairs with ICC < 0.5 from heterogeneity analysis"
    - concern: "Capacity confound vigilance"
      mitigation: "Run comprehensive parameter-matched baselines including random-but-learned routing biases with identical dimensionality"

