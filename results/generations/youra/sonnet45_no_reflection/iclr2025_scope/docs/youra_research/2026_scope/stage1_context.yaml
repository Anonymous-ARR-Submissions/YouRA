gap_id: "gap_1"
gap_title: "Integration of LoRA-based Sub-Model Selection with MoE Routing Policies"
gap_description: |
  Current literature treats LoRA (sub-model selection via adapters) and MoE routing as separate
  optimization strategies. No existing work demonstrates how to jointly optimize adapter selection
  AND expert routing in a unified framework. This gap blocks the core integration required by the
  research question (sub-model selection + MoE routing).

  Missing pieces:
  - Unified optimization framework for joint LoRA adapter selection + MoE expert routing
  - Cross-layer coordination: How adapter selection at layer L influences expert routing at layer L+1
  - Training protocol: end-to-end, alternating, or hierarchical
  - Efficiency metrics: Does joint optimization reduce inference cost vs LoRA-only or MoE-only
  - Adapter-expert interaction patterns: Which adapter configs work best with which expert specializations

gap_relevance: "PRIMARY"
gap_priority: "CRITICAL"

