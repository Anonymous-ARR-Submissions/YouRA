# ═══════════════════════════════════════════════════════════════
# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "LoRA enables 10,000x parameter reduction for task adaptation"
      status: "BUILD_ON"
      evidence: "HuggingFace PEFT (20K stars), Microsoft LoRA (13K stars) production implementations, established in literature [Hu et al. 2021]"
    - claim: "MoE routing enables dynamic expert selection via learned policies"
      status: "BUILD_ON"
      evidence: "Established in Switch Transformers, Expert Choice routing literature"
    - claim: "Both LoRA and MoE are mature independently"
      status: "BUILD_ON"
      evidence: "Production systems exist for both; integration gap is what requires verification"
    - claim: "Joint optimization without coordination is insufficient"
      status: "PROVE_NEW"
      evidence: "Requires demonstration that alignment mechanism provides gains beyond co-training"
  scope_reduction_percentage: 60
  phase2b_4_instructions: |
    Build on established LoRA and MoE foundations. Focus verification on:
    1. Performance-weighted alignment mechanism effectiveness
    2. Mutual information mediation of super-additive gains
    3. Regime-dependent coordination (inverted-U over task heterogeneity)
    Skip re-proving that LoRA or MoE work independently.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-HierarchicalAlign-v1"
  confidence_level: 0.80
  core_hypothesis_statement: |
    Under conditions of intermediate task heterogeneity (mean pairwise KL divergence 0.3-1.5 between independent routing distributions),
    if we apply performance-weighted alignment between adapter-specific routing biases and expert utilization patterns,
    then joint LoRA-MoE training achieves super-additive efficiency gains (≥2% above additive baseline),
    because alignment induces functional decoupling where high mutual information between adapters and experts reduces cross-task gradient interference.
  alternative_hypothesis_h0: |
    There is no significant interaction effect between LoRA and MoE in a parameter-matched 2×2 factorial design (F_interaction ≤ 2.0, p ≥ 0.10).

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Alignment mechanism"
      type: "categorical"
      operationalization: "Presence/absence of performance-weighted alignment loss L_align = -Σ A_e · ΔL_e"
      levels: ["enabled", "disabled"]
    - name: "Task heterogeneity (KL divergence)"
      type: "continuous"
      operationalization: "Mean pairwise KL divergence between independent routing distributions, validated with ICC ≥ 0.7"
  dependent:
    - name: "Super-additive gain magnitude"
      type: "continuous"
      operationalization: "Interaction effect size from 2×2 ANOVA (LoRA × MoE), measured in % accuracy improvement"
      primary: true
    - name: "Normalized mutual information"
      type: "continuous"
      operationalization: "I(Adapter; Expert) / log(E), computed from routing distributions"
      primary: false
    - name: "Gradient interference"
      type: "continuous"
      operationalization: "Mean cosine similarity of per-expert gradients across task pairs"
      primary: false
  controlled:
    - name: "Total parameter count"
      operationalization: "Parameter-matched baselines including routing bias dimensionality"
    - name: "Total optimization steps"
      operationalization: "All conditions receive 12K steps with matched warmup protocols"
    - name: "Model architecture"
      operationalization: "Fixed base model with consistent expert count and LoRA rank across conditions"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Performance-weighted alignment loss couples adapter-specific routing biases (A_e) to expert performance attributions (ΔL_e), creating differentiable gradient path through soft routing probabilities (pre-top-k)"
      evidence: "Mathematical feasibility established by Prof. Pax: gradient flow via adapter→routing bias→soft probabilities. Requires p(e|T) computed from pre-top-k softmax, not hard assignments."
      falsifier: "If attribution noise (coefficient of variation of ΔL_e across batches) exceeds 1.0, alignment amplifies stochasticity rather than learning structure"
    - step: 2
      description: "Alignment training increases normalized mutual information I(Adapter; Expert) / log(E) as adapters learn to 'own' frequently utilized experts"
      evidence: "Predicted path (a) in mediation analysis: Alignment→MI with β_a > 0, p < 0.001. Must demonstrate temporal precedence: ΔMI at step t predicts ΔPerf at step t+k."
      falsifier: "If MI rises after performance plateaus, or if early MI variance doesn't predict later performance differences across seeds, mediation claim fails"
    - step: 3
      description: "Increased MI induces functional decoupling: high-MI task pairs show reduced cross-task gradient interference within experts"
      evidence: "Gradient cosine similarity measurement: high-MI tasks (top 25%) should show sim < 0.3 vs low-MI tasks sim > 0.6. Must exceed entropy-matched control by ≥0.2 cosine units."
      falsifier: "If entropy-matched random routing (same sparsity profile, no learned alignment) reduces interference equally, then MI is decorative—sparsity alone is sufficient"
    - step: 4
      description: "Functional decoupling enables super-additive performance gains via reduced interference and improved task-specific specialization"
      evidence: "Predicted path (b) in mediation: MI→Performance with β_b > 0, p < 0.01. 2×2 ANOVA interaction F > 4.0, p < 0.05. Destruction test: shuffling alignment drops performance ∝ MI."
      falsifier: "If performance remains unchanged when learned alignment is shuffled (counterfactual destruction test), alignment was epiphenomenal"
  key_tension: "Balancing alignment strength to avoid early routing collapse (entropy regularization) vs providing sufficient coordination signal"
  evidence_summary: |
    Causal chain validated through: (1) temporal mediation showing MI precedes performance, (2) counterfactual destruction showing alignment-performance coupling is causal,
    (3) entropy-matched controls isolating MI from mere sparsity effects, (4) parameter-matched baselines ruling out capacity confounds.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Independent routing distributions are stable across random seeds (ICC ≥ 0.7)"
    supporting_evidence: "Required for KL-based heterogeneity measurement to be meaningful. Validated via within-task vs between-task KL variance comparison."
    consequence_if_violated: "If ICC < 0.5, heterogeneity axis is built on noise—regime-switching claims become arbitrary. Abort heterogeneity analysis."
  - id: "A2"
    assumption: "Soft routing probabilities (pre-top-k) provide sufficient gradient signal for alignment"
    supporting_evidence: "Standard in MoE literature (Switch Transformers, Expert Choice). Gradient path exists via backprop through softmax."
    consequence_if_violated: "If gradients vanish or become estimator-dependent, alignment mechanism breaks. Must use continuous soft routing, not hard discrete assignments."
  - id: "A3"
    assumption: "Performance attribution ΔL_e has acceptable signal-to-noise ratio (CV < 1.0)"
    supporting_evidence: "Measured via coefficient of variation across minibatches. High variance indicates unstable coupling."
    consequence_if_violated: "If CV > 1.0, alignment amplifies batch-level stochasticity rather than learning expert-task affinity. Diagnose via batch size or learning rate adjustment."
  - id: "A4"
    assumption: "Task heterogeneity follows inverted-U regime structure (shared→coordinated→independent)"
    supporting_evidence: "Pre-registered inequality predictions with 30% failure tolerance. Low KL: Shared ≥ Coordinated. Mid KL: Coordinated > baselines by ≥2%. High KL: Independent ≥ Coordinated."
    consequence_if_violated: "If >30% of triplets violate predictions within bin, design-law claim rejected. Would indicate heterogeneity is not the operative dimension."
  - id: "A5"
    assumption: "Coordination mechanism generalizes across PEFT methods (not LoRA-specific)"
    supporting_evidence: "Tested via prefix tuning validation on subset of tasks. If inverted-U and MI mediation replicate, provisional generality established."
    consequence_if_violated: "If alignment increases MI but fails to produce super-additive interaction in prefix tuning (p ≥ 0.1), principle depends on low-rank parameterization—scope limited to LoRA."

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Multi-task learning scenarios with 3+ heterogeneous tasks
    - Task suites with intermediate heterogeneity (mean pairwise KL 0.3-1.5)
    - MoE architectures with 4+ experts and top-k routing
    - Parameter-efficient adaptation methods (LoRA, adapters, prefix tuning)
    - Foundation models adapted to downstream tasks
  does_not_apply_to: |
    - Single-task scenarios (no coordination needed)
    - Homogeneous task suites (KL < 0.3): shared adapters more efficient
    - Highly orthogonal tasks (KL > 1.5): independent adapters preferred
    - Dense models without expert routing (no routing to align)
    - Full fine-tuning scenarios (coordination overhead may exceed benefits)
  known_limitations: |
    - Requires stable routing distributions (ICC ≥ 0.7) for heterogeneity measurement
    - Computational overhead: 2K warmup steps + gradient interference measurements (O(E×T²))
    - Alignment signal quality depends on batch size and task loss variance
    - Regime boundaries (KL thresholds 0.3, 1.5) may need empirical tuning per domain
    - Cross-method generalization validated only for prefix tuning subset (full sweep pending)

