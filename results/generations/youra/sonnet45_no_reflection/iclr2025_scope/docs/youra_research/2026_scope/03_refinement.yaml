# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "For task suites with intermediate heterogeneity (mean KL 0.3-1.5), joint LoRA-MoE with performance-weighted alignment achieves super-additive gains (interaction effect F > 4.0, p < 0.05) exceeding additive baseline by ≥2% absolute accuracy"
    test_method: "2×2 factorial ANOVA (LoRA × MoE) on 15 task triplets spanning low/mid/high KL regimes"
    success_criterion: "Significant interaction term (F > 4.0, p < 0.05) AND mid-KL coordinated outperforms both baselines by ≥2% in ≥70% of triplets"
    falsification: "If interaction F ≤ 2.0 or p ≥ 0.10, or if mid-KL advantage fails in >30% of triplets, super-additivity claim rejected"
  - id: "P2"
    primary: false
    statement: "Alignment increases normalized mutual information I(A;E)/log(E), and this increase mediates super-additive gains via temporal precedence"
    test_method: "Mediation analysis across 100 runs (20 task pairs × 5 seeds): measure paths (a) Alignment→MI, (b) MI→Performance, (c) total effect, (c′) direct effect controlling for MI. Track MI and performance across training steps for lagged effects."
    success_criterion: "Path a: β_a > 0, p < 0.001. Path b: β_b > 0, p < 0.01. Mediation: β_c′ < 0.5·β_c. Temporal: ΔMI at step t predicts ΔPerf at step t+500 (p < 0.05). Bootstrapped Sobel test p < 0.05."
    falsification: "If c′ remains large (>0.8·c), MI is decorative. If MI rises after performance plateaus, no causal precedence—mediation claim fails."
  - id: "P3"
    primary: false
    statement: "High-MI tasks exhibit functional decoupling: gradient interference (cosine similarity) < entropy-matched control by ≥0.2 units"
    test_method: "Compute per-expert gradient cosine similarity across task pairs at 3 checkpoints (early/mid/late). Compare aligned training vs entropy-matched random routing."
    success_criterion: "High-MI tasks (top 25%): sim_aligned < 0.3 AND sim_aligned < sim_entropy-matched - 0.2. Low-MI tasks: sim > 0.6. Correlation ρ(MI, interference reduction) < -0.5, p < 0.01."
    falsification: "If entropy-matched control achieves equal interference reduction, MI is not operative—sparsity alone sufficient. If interference reduction uncorrelated with MI, functional decoupling claim unsupported."

