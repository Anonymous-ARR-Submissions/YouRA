    - "Cross-method generalization test (prefix tuning) establishes provisional scope beyond LoRA"
    - "Regime-switching framework provides actionable design guidance for practitioners"
    - "Falsification criteria clearly defined: if >30% triplets violate predictions, design-law rejected"

