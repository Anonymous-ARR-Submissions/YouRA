measurement_plan:
  data_collection:
    - source: "Task performance metrics (accuracy/perplexity on validation sets)"
    - source: "Routing distributions p(e|T) from soft probabilities (pre-top-k)"
    - source: "Per-expert gradients for interference measurement"
    - source: "Training dynamics: MI, entropy, alignment loss magnitude across steps"
  procedure:
    - step: "Phase 1 - Core Mechanism: Mediation analysis (paths a/b/c/c′) with temporal precedence across 100 runs (20 task pairs × 5 seeds)"
    - step: "Phase 2 - Design Law: Regime switching validation on 15 triplets (low/mid/high KL) with pre-registered inequality predictions"
    - step: "Phase 3 - Generalization: Gradient interference measurement (3 checkpoints) + prefix tuning cross-method test (5 mid-KL tasks)"
    - step: "Destruction tests: Post-training shuffle alignment and measure performance drop ∝ MI"
    - step: "Capacity controls: Parameter-matched random baseline with identical routing bias dimensionality"
  success_criteria:
    - "P1: Interaction F > 4.0, p < 0.05, mid-KL advantage ≥2% in ≥70% of triplets"
    - "P2: Mediation paths significant (a: p < 0.001, b: p < 0.01), reduced c′ < 0.5·c, temporal precedence validated"
    - "P3: Interference reduction exceeds entropy-matched control by ≥0.2, correlation with MI: ρ < -0.5, p < 0.01"
    - "Routing reliability: ICC ≥ 0.7 across seeds (prerequisite for heterogeneity analysis)"
    - "Attribution stability: CV(ΔL_e) < 1.0 across batches"

validation:
  internal_validity:
    - "Parameter-matched controls eliminate capacity confounds"
    - "Compute-matched protocols (12K steps all conditions) eliminate warmup confounds"
    - "Entropy-matched random routing baseline isolates MI from mere sparsity effects"
    - "Temporal precedence testing (lagged effects) distinguishes mediation from convergence correlation"
    - "Pre-registered KL bins and inequality thresholds prevent retrospective interpretation"
  external_validity:
