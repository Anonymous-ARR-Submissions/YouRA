hypothesis_draft:
  title: "Performance-Weighted Hierarchical Coordination in Multi-Task Learning"
  hypothesis_id: "H-HierarchicalAlign-v1"
  core_claim: |
    Performance-weighted alignment between adapter-specific routing biases and expert utilization patterns
    yields super-additive efficiency gains under intermediate task heterogeneity conditions (mean pairwise
    KL divergence 0.3-1.5 between independent routing distributions), because alignment induces functional
    decoupling where high mutual information between adapters and experts reduces cross-task gradient interference.
  mechanism: |
    The causal mechanism operates through four steps:
    1. Performance-weighted alignment loss (L_align = -Σ A_e · ΔL_e) couples adapter routing biases to expert performance attributions via differentiable gradients through soft routing probabilities
    2. Alignment training increases normalized mutual information I(A;E)/log(E) as adapters learn task-specific expert preferences
    3. Increased MI induces functional decoupling: high-MI task pairs show reduced cross-task gradient interference within experts
    4. Functional decoupling enables super-additive gains via reduced interference and improved specialization
  predictions:
    - P1: "Mid-KL tasks (0.3-1.5) show super-additive interaction (F > 4.0, p < 0.05) with coordinated training outperforming additive baseline by ≥2%"
    - P2: "Normalized MI increases with alignment (β_a > 0, p < 0.001) and mediates performance gains with temporal precedence (ΔMI at step t predicts ΔPerf at t+500)"
    - P3: "High-MI tasks exhibit gradient interference < entropy-matched control by ≥0.2 cosine units, proving functional decoupling"

variables_summary:
  independent: "Alignment mechanism (enabled/disabled), Task heterogeneity (KL divergence, continuous)"
  dependent_primary: "Super-additive gain magnitude (interaction effect from 2×2 ANOVA, % accuracy)"
  controlled: "Total parameters, optimization steps (12K all conditions), model architecture"

null_hypothesis:
  h0_statement: |
    There is no significant interaction effect between LoRA and MoE in a parameter-matched 2×2 factorial design.
    Independent adapter + MoE training performs equivalently to coordinated training (F_interaction ≤ 2.0, p ≥ 0.10).
  statistical_test: "Two-way ANOVA with interaction term (LoRA × MoE)"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "Performance-weighted hierarchical alignment principle with regime-dependent design law"
  differentiation_summary: |
    Novel contribution is functional coordination (not structural composition) through bidirectional performance
    attribution signals. Existing MoE-PEFT uses MoE within adapters (structural). We propose cross-level alignment
    between hierarchical selection mechanisms with temporal mediation validation and regime-switching framework
    (shared → coordinated → independent as KL increases). Transforms from "technique combination" to predictive
    design principle with falsifiable causal chain.

