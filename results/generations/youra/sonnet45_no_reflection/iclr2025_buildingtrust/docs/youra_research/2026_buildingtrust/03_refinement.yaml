# ═══════════════════════════════════════════════════════════════
# SECTION 0: Established Facts & Claim Scope
# ═══════════════════════════════════════════════════════════════

established_facts:
  claims:
    - claim: "Existing benchmarks (TruthfulQA, BBQ, AdvGLUE) measure trustworthiness dimensions in isolation"
      status: "BUILD_ON"
      evidence: "Phase 1 research identified TruthfulQA (432 citations), BBQ/BOLD/StereoSet, AdvGLUE/ANLI as established benchmarks"
    - claim: "No model performs uniformly well across all trustworthiness dimensions"
      status: "BUILD_ON"
      evidence: "2025 healthcare LLM trustworthiness survey finding cited in discussion"
    - claim: "Cross-dimensional trustworthiness trade-offs produce directionally consistent patterns across model families"
      status: "PROVE_NEW"
      evidence: "Core hypothesis to be validated through experimentation"
  scope_reduction_percentage: 67
  phase2b_4_instructions: |
    BUILD_ON claims should be cited as established facts from prior work.
    PROVE_NEW claims require experimental validation through perturbation analysis and correlation studies.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.1: Core Statement
# ═══════════════════════════════════════════════════════════════

core_statement:
  hypothesis_id: "H-CrossDimTrustTradeoffs-v1"
  confidence_level: 0.85
  core_hypothesis_statement: |
    Under perturbation-based experimental conditions with controlled interventions, if we apply
    targeted fine-tuning or training procedures to improve performance on one trustworthiness
    dimension (e.g., truthfulness via TruthfulQA), then we will observe statistically significant,
    directionally consistent effects on other trustworthiness dimensions (e.g., fairness via BBQ,
    robustness via AdvGLUE) that replicate across model families, because neural network parameter
    updates reshape internal representations in ways that create measurable correlations between
    trustworthiness dimensions.
  alternative_hypothesis_h0: |
    There is no significant correlation between changes in individual trustworthiness dimensions
    when applying targeted interventions. Cross-dimensional effects are random in direction and
    magnitude, indicating independence between trustworthiness dimensions.

# ═══════════════════════════════════════════════════════════════
# SECTION 1.2: Variables Table
# ═══════════════════════════════════════════════════════════════

variables:
  independent:
    - name: "Intervention Type"
      type: "categorical"
      operationalization: "Type of training procedure: {full fine-tuning, LoRA, adversarial training}"
      levels: ["full fine-tuning", "LoRA", "adversarial training"]
    - name: "Target Dimension"
      type: "categorical"
      operationalization: "Trustworthiness dimension targeted by intervention: {truthfulness, fairness, robustness}"
      levels: ["truthfulness", "fairness", "robustness"]
    - name: "Perturbation Parameters"
      type: "categorical"
      operationalization: "Systematic variations in {learning rate, epochs, data subset, random seed}"
      levels: ["hyperparameter_set_1", "hyperparameter_set_2", "...", "hyperparameter_set_N"]
  dependent:
    - name: "Cross-Dimensional Correlation"
      type: "continuous"
      operationalization: "Pearson correlation coefficient ρ(ΔDim₁, ΔDim₂) between changes in dimension pairs, range [-1, 1]"
      primary: true
    - name: "Truthfulness Score"
      type: "continuous"
      operationalization: "TruthfulQA benchmark accuracy (%), range [0, 100]"
      primary: false
    - name: "Fairness Score"
      type: "continuous"
      operationalization: "BBQ benchmark accuracy (%), range [0, 100]"
      primary: false
    - name: "Robustness Score"
      type: "continuous"
      operationalization: "AdvGLUE benchmark accuracy (%), range [0, 100]"
      primary: false
  controlled:
    - name: "Model Architecture"
      operationalization: "Fixed model family per experimental group (Transformer, SSM, etc.)"
    - name: "Base Model Checkpoint"
      operationalization: "Use same pre-trained checkpoint for all replications within model family"
    - name: "Evaluation Protocol"
      operationalization: "Standardized benchmark evaluation scripts with fixed random seeds"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Targeted intervention (e.g., fine-tuning on TruthfulQA) updates model parameters to optimize performance on dimension D₁"
      evidence: "Standard fine-tuning mechanics—gradient descent reshapes weight distributions to minimize loss on training data"
      falsifier: "If parameter updates don't actually change model behavior on target dimension, mechanism fails at step 1"
    - step: 2
      description: "Parameter updates reshape internal representations (attention patterns, hidden states, layer activations) in ways that affect multiple capabilities simultaneously"
      evidence: "Neural network layers are shared across tasks; weight changes necessarily impact all downstream computations"
      falsifier: "If representations for different dimensions are completely disentangled (independent subnetworks), no cross-dimensional effects expected"
    - step: 3
      description: "Changes in internal representations propagate to performance on non-targeted dimensions (D₂, D₃), creating correlated performance shifts"
      evidence: "Prior work on multi-task learning shows task interference; similar principle applies to trustworthiness dimensions"
      falsifier: "If performance changes on non-targeted dimensions are purely random, correlation would be ~0"
    - step: 4
      description: "Correlation patterns replicate across model families because fundamental optimization dynamics (gradient descent reshaping representations) are architecture-agnostic"
      evidence: "Core learning mechanisms (backpropagation, weight updates) are shared across transformer, SSM, and other architectures"
      falsifier: "If correlations are architecture-specific (no replication across families), generalization claim fails"
  key_tension: "Intervention isolation vs. parameter entanglement—can we attribute cross-dimensional effects to the intervention itself rather than confounds in training data composition?"
  evidence_summary: |
    The causal mechanism builds on established neural network learning dynamics (gradient descent,
    representation learning, multi-task interference) and extends them to trustworthiness dimensions.
    Key supporting evidence includes: (1) shared parameters across capabilities, (2) prior multi-task
    learning literature documenting task interference, (3) observation from Phase 1 that no model
    excels uniformly across all dimensions (suggesting implicit trade-offs).

# ═══════════════════════════════════════════════════════════════
# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Benchmark scores (TruthfulQA, BBQ, AdvGLUE) have sufficient stability (low variance across random seeds) to detect cross-dimensional correlation signals"
    supporting_evidence: "Benchmarks are widely used in research; implicit assumption of reliability"
    consequence_if_violated: "High benchmark variance would drown out correlation signals, making effects undetectable even if they exist"
  - id: "A2"
    assumption: "N=20 replications with perturbations provide adequate statistical power to detect correlations of magnitude |ρ| > 0.3"
    supporting_evidence: "Standard power analysis for correlation studies; N=20 gives ~80% power for medium effects at α=0.05"
    consequence_if_violated: "Insufficient sample size could lead to false negatives (failing to detect real correlations)"
  - id: "A3"
    assumption: "Cross-dimensional effects are primarily driven by parameter updates, not by confounds in training data composition"
    supporting_evidence: "Discussion identified this as a key concern; requires ablation studies to validate"
    consequence_if_violated: "Observed correlations might reflect data artifacts rather than genuine trade-off dynamics"
  - id: "A4"
    assumption: "The three selected dimensions (truthfulness, fairness, robustness) are sufficiently representative of the broader trustworthiness space"
    supporting_evidence: "Phase 1 identified these as the most established dimensions with mature benchmarks"
    consequence_if_violated: "Findings might not generalize to other dimensions (privacy, safety, explainability)"
  - id: "A5"
    assumption: "Correlation patterns that replicate across 3/5 model families indicate generalizable dynamics rather than architecture-specific artifacts"
    supporting_evidence: "3/5 threshold provides balance between overfitting and under-generalization"
    consequence_if_violated: "If pattern requires 5/5 replication, threshold may be too strict; if 2/5 suffices, threshold may be too lax"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Large language models (1B to 70B parameters)
    - Transformer and SSM architectures
    - Post-training interventions (fine-tuning, LoRA, adversarial training)
    - Three core trustworthiness dimensions: truthfulness, fairness, robustness
    - Existing benchmark evaluation frameworks (TruthfulQA, BBQ, AdvGLUE)
  does_not_apply_to: |
    - Models smaller than 1B parameters (may lack capacity for multi-dimensional trade-offs)
    - Pre-training dynamics (different optimization regime)
    - Dimensions without established benchmarks (privacy, explainability)
    - Deployment-time interventions (inference-time filters, guardrails)
  known_limitations: |
    - Limited to three dimensions due to experimental tractability (6 dimensions × 5 models × 3 interventions × 20 reps = 1800 benchmark runs)
    - Correlation characterization does not establish precise quantitative prediction
    - Perturbation analysis may not capture all sources of variance in real-world deployment
    - Benchmark scores are proxy metrics, not direct measures of trustworthiness in production systems

# ═══════════════════════════════════════════════════════════════
# SECTION 1.6: Testable Predictions
# ═══════════════════════════════════════════════════════════════

predictions:
  - id: "P1"
    primary: true
    statement: "Interventions targeting one trustworthiness dimension will produce statistically significant cross-dimensional effects (p<0.01) on at least one other dimension in >80% of experiments"
    test_method: "For each of 15 intervention configurations (3 dimensions × 5 models), measure correlation ρ(ΔDim₁, ΔDim₂) across N=20 replicates; test H₀: ρ=0 using Fisher's z-transformation"
    success_criterion: "At least 12/15 configurations (80%) show |ρ| > 0 with p<0.01 for at least one dimension pair"
    falsification: "If <80% of configurations show significant correlations, hypothesis of widespread cross-dimensional effects is rejected"
  - id: "P2"
    primary: false
    statement: "The direction of cross-dimensional effects (positive correlation = co-improvement, negative = trade-off) will replicate consistently across at least 3/5 model families"
    test_method: "For each intervention type × dimension pair, classify correlation as positive (ρ>0.3), negative (ρ<-0.3), or neutral (-0.3≤ρ≤0.3); count replication across models"
    success_criterion: "For each intervention × dimension combination showing significant effects, direction matches in ≥3/5 models"
    falsification: "If directional consistency is <3/5 models, patterns are architecture-specific rather than generalizable"
  - id: "P3"
    primary: false
    statement: "Cross-dimensional effect patterns will vary systematically by intervention type (full fine-tuning ≠ LoRA ≠ adversarial training)"
    test_method: "ANOVA testing whether correlation distributions differ significantly across intervention types (F-test, p<0.05)"
    success_criterion: "Significant main effect of intervention type on correlation magnitude or direction"
    falsification: "If intervention type shows no effect, all training methods produce indistinguishable trade-off patterns"

