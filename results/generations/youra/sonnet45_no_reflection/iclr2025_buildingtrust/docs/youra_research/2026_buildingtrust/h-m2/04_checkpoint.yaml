    hypothesis_id: h-m2
    hypothesis_type: MECHANISM
    hypothesis_statement: Under parameter updates from dimension-targeted interventions,
      if neural network layers are shared across tasks, then internal representations
      (attention patterns, hidden states, layer activations) change in ways that affect
      multiple capabilities simultaneously, because weight changes necessarily impact
      all downstream computations.
    experiment_objective: Validate that parameter updates from LoRA fine-tuning cause
      measurable representation changes (attention patterns, hidden states) and correlate
      these changes with performance improvements from h-m1.
    success_criteria:
      primary: Significant correlation (p<0.05) between representation change magnitude
        and performance improvement
      secondary: Representation changes detectable in >50% of layers (CKA < 1.0)
    methodology: Extract layer activations pre/post LoRA intervention using TransformerLens,
      compute CKA similarity, correlate with h-m1 performance delta (+2.32%)
    reuses_h_m1: true
    base_hypothesis: h-m1
  gate_info:
    gate_type: SHOULD_WORK
    threshold: Correlation between representation changes and performance (p<0.05)
    fail_action: Document limitation - if no representation changes detected, explore
      whether dimensions use disentangled subnetworks
    interpretation: H-M2 validates the second step of the causal chain. If parameter
      updates don't cause representation changes, we document this as a limitation
      and explore alternative mechanisms.
