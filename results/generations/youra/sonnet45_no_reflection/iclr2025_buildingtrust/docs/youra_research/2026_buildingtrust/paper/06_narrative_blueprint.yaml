      - "Is coupling selective? (H-M3: dimension-pair-specific correlations)"
      - "Do patterns generalize? (H-M4: architectural replication)"
    structure: "One subsection per hypothesis with experimental question, protocol, metrics"

  results:
    narrative_purpose: "Present evidence supporting claims—follow hypothesis order, emphasize selective coupling finding"
    main_result_highlight: "Selective coupling taxonomy (H-M3)—truthfulness-fairness independent, fairness-robustness trade-off"
    structure:
      - "H-E1: Existence confirmed (100% detection)"
      - "H-M1: Target improvement validated (+2.32%, p<0.001)"
      - "H-M2: Universal representation changes (100% layers)"
      - "H-M3: SELECTIVE COUPLING (main result)—dimension taxonomy"
      - "H-M4: Architectural replication for specific pairs (67%)"
