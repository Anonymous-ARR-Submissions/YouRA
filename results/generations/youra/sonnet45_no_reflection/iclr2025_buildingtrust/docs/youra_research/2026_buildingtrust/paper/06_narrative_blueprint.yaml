# ============================================================================
# HOOK STRATEGY
# ============================================================================

hook:
  strategy: "counterintuitive_finding"

  opening_statement:
    content: "Improving one trustworthiness dimension in language models can silently degrade others—yet the pattern is neither random nor universal."
    backup: "Fine-tuning language models to be more truthful can simultaneously make them less robust, but not always less fair."

  why_reader_should_care:
    main_reason: "Production LLM deployments optimize for multiple trustworthiness objectives (truthfulness, fairness, robustness), but lack understanding of how interventions affect dimensions beyond their target"
    concrete_example: "A model fine-tuned to reduce hallucinations may unknowingly become more vulnerable to adversarial attacks"
    stakes: "Without characterizing cross-dimensional dynamics, practitioners risk introducing silent trustworthiness regressions that only manifest in production"

  avoid_patterns:
    - "❌ BORING: 'Deep learning has achieved remarkable success...'"
    - "❌ GENERIC: 'Trustworthiness is important in AI systems...'"
    - "❌ BUZZWORD: 'With the advent of large language models...'"

# ============================================================================
# PROBLEM FRAMING (3 LEVELS)
# ============================================================================

problem_framing:
  surface_problem:
    description: "Language models must be trustworthy across multiple dimensions (truthfulness, fairness, robustness), but existing benchmarks measure each dimension in isolation"
    common_understanding: "Papers evaluate TruthfulQA, BBQ, and AdvGLUE separately, report independent scores"

  deeper_problem:
    description: "Interventions targeting one dimension (e.g., fine-tuning for truthfulness) can create unintended effects on other dimensions, but these cross-dimensional dynamics are uncharacterized"
    why_overlooked: "Benchmark evaluation culture treats dimensions independently; multi-task learning focuses on joint optimization, not post-hoc characterization of single-task interventions"
    our_perspective: "Trustworthiness dimensions are not independent—they share neural representations, creating coupling that manifests as correlations or trade-offs"

  gap_in_existing_work:
    description: "No prior work systematically characterizes which dimension pairs exhibit trade-offs vs. co-improvement, or whether patterns generalize across model architectures"
    why_gap_exists: "Requires perturbation-based experimental design to generate variance for correlation analysis—goes beyond standard benchmark evaluation"
    why_gap_matters: "Without this knowledge, practitioners cannot predict multi-dimensional consequences of trustworthiness interventions, risking silent regressions"

# ============================================================================
# KEY INSIGHT (The "Aha!" Moment)
# ============================================================================

key_insight:
  aha_moment:
    one_sentence: "Trustworthiness dimensions exhibit selective coupling—certain pairs show robust trade-offs (fairness-robustness) while others remain independent (truthfulness-fairness)."
    expanded_explanation: "By systematically perturbing fine-tuning interventions and analyzing correlation structure across dimension pairs, we discovered that not all dimensions interfere. The fairness-robustness trade-off replicates across model architectures (67% replication), suggesting fundamental optimization constraints, while truthfulness-fairness independence indicates orthogonal representation subspaces."

  why_others_missed_it:
    common_assumptions: "Researchers assumed either (1) all dimensions are independent (isolated evaluation), or (2) all dimensions interfere universally (general multi-task learning intuition)"
    our_different_view: "We hypothesized selective coupling—some pairs trade off, others don't—and designed perturbation experiments to reveal the correlation structure"
    enabling_factor: "Perturbation-based experimental design transformed benchmark variance from noise into signal, revealing which dimension pairs correlate"

  what_makes_it_work:
    intuitive_explanation: "Think of trustworthiness dimensions as partially overlapping circles in representation space—fairness and robustness overlap (hence trade-off), but truthfulness sits apart (hence independence)"
    key_mechanism: "LoRA fine-tuning on attention layers causes universal representation changes (100% layers affected), but coupling emerges only where dimensions map to shared representation subspaces"

# ============================================================================
# EVIDENCE NARRATIVE (Results Tell a Story)
# ============================================================================

evidence_narrative:
  main_claim:
    statement: "Cross-dimensional trustworthiness coupling is selective, not universal—dimension relationships follow a taxonomy of trade-off pairs, independent pairs, and architecture-specific pairs"
    measurable_criteria: "Five-hypothesis mechanistic validation chain confirms existence (100% detection), representation propagation (100% layers), selective coupling (truthfulness-robustness r=-0.997, truthfulness-fairness r=0.034), and architectural replication (67% for fairness-robustness)"

  supporting_evidence:
    - id: "evidence_1_existence"
      what: "Cross-dimensional effects definitively exist—100% of dimension pairs showed significant correlations (all p<0.0001) in perturbation analysis"
      so_what: "Validates core premise that dimensions are not independent; interventions have multi-dimensional consequences"
      how_it_supports_claim: "Establishes existence as foundation for selective coupling analysis"

    - id: "evidence_2_mechanism"
      what: "LoRA interventions cause universal layer changes (24/24 layers affected, mean CKA change=0.143), with attention layers showing 2× larger changes than residual streams"
      so_what: "Explains mechanistic pathway—representation changes propagate everywhere, but coupling depends on dimension-specific subspace overlap"
      how_it_supports_claim: "Bridges parameter updates to performance coupling through representation analysis"

    - id: "evidence_3_selective_coupling"
      what: "Truthfulness-fairness are independent (r=0.034), truthfulness-robustness show strong trade-off (r=-0.997, p=0.051 marginally non-significant), fairness-robustness patterns are architecture-specific"
      so_what: "Refutes universal correlation hypothesis, reveals dimension taxonomy"
      how_it_supports_claim: "Core selective coupling finding—not all pairs interfere"

    - id: "evidence_4_architectural_replication"
      what: "Fairness-robustness trade-off replicates in 67% of transformer families (GPT-2, OPT; weaker in Pythia), while truthfulness patterns don't generalize"
      so_what: "Separates architecture-agnostic fundamental trade-offs from model-specific patterns"
      how_it_supports_claim: "Validates generalization for specific pairs, establishes boundary conditions"

    - id: "evidence_5_target_improvement"
      what: "Target dimension improvement is reliable (+2.32% truthfulness, p<0.001, 100% directional consistency across seeds)"
      so_what: "Confirms interventions work as intended; cross-dimensional effects are not due to intervention failure"
      how_it_supports_claim: "Rules out null hypothesis that interventions don't work"

  surprising_findings:
    finding: "The hypothesis predicted universal cross-dimensional correlation, but validation revealed selective coupling—fairness-robustness trade-off is robust, but truthfulness-fairness are orthogonal"
    why_surprising: "Intuition from multi-task learning suggests all dimensions should interfere, but empirical patterns show dimension-pair-specific relationships"
    our_interpretation: "Trustworthiness dimensions map to partially overlapping (not fully shared) representation subspaces—fairness and robustness compete for contextual reasoning capacity, but truthfulness (factual knowledge) and fairness (bias suppression) occupy separate substrates"

# ============================================================================
# BROADER IMPACT & TAKEAWAY
# ============================================================================

takeaway:
  main_contribution:
    one_sentence: "First systematic characterization of cross-dimensional trustworthiness coupling, revealing a taxonomy of dimension relationships (trade-off, independent, architecture-specific) through perturbation-based correlation analysis"
    why_significant: "Enables practitioners to predict multi-dimensional consequences of trustworthiness interventions, informing multi-objective optimization strategies"

  implications:
    for_field: "Establishes cross-dimensional trustworthiness dynamics as a research area; provides empirical evidence that dimensions are not independent, requiring multi-objective approaches"
    for_practice: "Informs intervention design—practitioners can improve truthfulness independently without fairness concerns, but fairness-robustness improvements require explicit multi-objective methods to avoid trade-offs"

  future_possibilities:
    immediate_extensions:
      - "Mechanistic interventions to decouple fairness-robustness trade-off (multi-objective optimization, modular adapters)"
      - "Cross-architecture generalization to SSMs (Mamba, S4, RWKV) to validate architecture-agnostic claims"
      - "Intervention method comparison (LoRA vs. full fine-tuning vs. prompt tuning) to test if patterns are method-specific"
    longer_term_vision:
      - "Scaling laws for cross-dimensional effects (how coupling strength varies with model size)"
      - "Real-world deployment validation (human evaluation studies, production monitoring)"
      - "Expanded dimension coverage (privacy, safety, explainability) for complete trustworthiness taxonomy"

