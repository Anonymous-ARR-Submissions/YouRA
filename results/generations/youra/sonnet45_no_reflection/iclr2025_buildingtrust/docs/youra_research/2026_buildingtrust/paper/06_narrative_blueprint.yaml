# ADDITIONAL NARRATIVE GUIDANCE
# ============================================================================

writing_principles:
  voice: "Authoritative but accessible—write for busy ICML reviewers who need to understand the story quickly"
  tone: "Confident in findings, transparent about limitations, excited about future directions"
  technical_level: "Assume ML/NLP researcher audience familiar with fine-tuning, benchmarks, but not trustworthiness literature"

key_terms_consistency:
  - term: "cross-dimensional coupling"
    definition: "Correlation or trade-off between performance changes on different trustworthiness dimensions"
  - term: "selective coupling"
    definition: "Dimension-pair-specific patterns (some trade off, others independent)"
  - term: "perturbation analysis"
    definition: "Systematic variation of intervention parameters to generate correlation structure"
  - term: "representation propagation"
    definition: "Changes in internal activations across network layers"
  - term: "architecture-agnostic"
    definition: "Pattern replicates across model families (transformer-specific in our case)"

figures_strategy:
  fig_1: "Correlation matrix heatmap (h-m4 results)—shows fairness-robustness trade-off across 3 models"
  fig_2: "Four-panel mechanistic chain (h-m1 to h-m4)—visual story of validation"
  fig_3: "Dimension taxonomy schematic—trade-off, independent, architecture-specific relationships"
  fig_4: "Layer-wise representation changes (h-m2)—attention vs residual streams"
  fig_5: "Statistical power analysis (h-m3)—transparent about p=0.051 limitation"

claims_strength_guidance:
  strong_claims:
    - "Cross-dimensional effects exist (100% detection)"
    - "Fairness-robustness trade-off is architecture-agnostic in transformers (67% replication)"
    - "Representation changes propagate universally (100% layer coverage)"
    - "Target dimension improvement is reliable (+2.32%, p<0.001)"
  moderate_claims:
    - "Truthfulness-robustness strong negative correlation (r=-0.997, p=0.051 underpowered)"
    - "Truthfulness-fairness independence (consistent but limited model coverage)"
  avoid_overclaiming:
    - "Don't claim generalization to non-transformers (SSMs untested)"
    - "Don't claim intervention method generality (LoRA only)"
    - "Don't claim real-world deployment trustworthiness (benchmark proxies)"

