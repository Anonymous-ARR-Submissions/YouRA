phase2b_readiness:
  status: "READY"

  sh1_existence: |
    **What must exist/hold true:**
    - Empirical separability: real-world commits exhibit aspect-dominant structure (cross-effects ≤0.2×, λ₄/λ₅>2.0)
    - Representation alignment: metric eigenvectors align with model geometry (CCA >0.7 for ≥3/4 aspects)
    - Metric reliability: quality/security/efficiency metrics pass validation (ICC≥0.8, construct validity r≥0.7)
    - Commit purity: labeled commits are predominantly single-aspect (>70% purity)

  sh2_mechanism: |
    **Core mechanism to test:**
    Aspect-specific gated adapters trained on empirically discovered natural axes exploit aligned geometry
    more efficiently than arbitrary axes (30% sample-efficiency gap) and enable post-training controllability
    (band width ≥1.0) validated through human code review discrimination (≥60% preference).

    Test via: rotation test (degradation under random rotation), ablation (gating vs no gating),
    steering experiments (local controllability bands), human validation (correct vs mismatched steering).

  sh3_comparison: |
    **What to compare against:**
    Primary: Weighted PPOCoder baseline (25 weight configurations) - must dominate ≥80% of configs with
    effect-size criterion (≥0.5 SD improvement on ≥1 metric, ≤0.1 SD degradation on others).

    Secondary: Architectural ablations (LoRA-only, LoRA+orthogonal) to isolate factorization contribution.

    Distribution shift: Security-CTF tasks, refactoring benchmarks (must maintain relative dominance
    within 10% degradation to claim robustness).

  open_questions:
    - "If only 3/4 aspects separate cleanly (e.g., efficiency entangles with correctness), how does partial factorization perform? Need graded theoretical predictions."
    - "What is maximum steering coefficient α before controllability degrades nonlinearly? Must characterize band width per task type."
    - "Does representation-metric alignment strength predict controllability band width? (CCA as proxy for steering quality)"
    - "How does method generalize to repository-level tasks (SWE-bench) vs function-level (HumanEval/MBPP)?"

