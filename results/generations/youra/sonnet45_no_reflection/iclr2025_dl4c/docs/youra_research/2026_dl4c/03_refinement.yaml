variables:
  independent:
    - name: "Architectural Factorization Type"
      type: "categorical"
      operationalization: "Model architecture type: (1) LoRA-only baseline, (2) LoRA with orthogonality regularization, (3) LoRA with gated routing (≤2 aspects per token)"
      levels: ["LoRA-only", "LoRA+orthogonal", "LoRA+gated"]

    - name: "Training Supervision Axis"
      type: "categorical"
      operationalization: "Metric space used for training: natural axes from Phase 1 eigenanalysis vs. randomly rotated axes (orthogonal transform)"
      levels: ["natural-axes", "rotated-axes"]

    - name: "Steering Coefficient (α)"
      type: "continuous"
      operationalization: "Scalar multiplier on aspect-specific adapter outputs at inference time, range [0, 3] in 0.2 increments"

  dependent:
    - name: "Cross-Aspect Coupling (Empirical)"
      type: "continuous"
      operationalization: "Median ratio of cross-aspect effect to primary-aspect effect in commit-level metric deltas, measured via residual covariance matrix. Range [0, 1], target ≤0.2"
      primary: true

    - name: "Representation-Metric Alignment"
      type: "continuous"
      operationalization: "CCA coefficients between metric eigenvectors and model representation principal directions at layers [8,16,24]. Range [0,1], target ≥0.7 for ≥3/4 aspects"
      primary: false

    - name: "Controllability Band Width"
      type: "continuous"
      operationalization: "Width of α-interval where target metric monotonically increases with <5% correctness degradation and <10% other-metric degradation. Range [0, 3], target ≥1.0"
      primary: true

    - name: "Sample Efficiency Gap"
      type: "continuous"
      operationalization: "Relative reduction in training steps to reach controllability threshold (band width ≥1.0) for natural-axes vs rotated-axes training. Target ≥30% reduction"
      primary: false

    - name: "Human Discrimination Accuracy"
      type: "continuous"
      operationalization: "Percentage of code review tasks where human experts prefer correctly-steered revision over baseline and mismatched-steering. Range [0,100], target ≥60%"
      primary: false

  controlled:
    - name: "Base Model Architecture"
      operationalization: "Fixed to CodeLlama-7B for all experiments to isolate factorization effects"

    - name: "Training Data Distribution"
      operationalization: "Fixed dataset of 10K minimal-diff commits (AST edit distance <20) with validated purity >70%"

    - name: "Metric Reliability"
      operationalization: "Only use metrics passing Phase 0 validation (ICC≥0.8, construct validity r≥0.7)"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.3: Causal Mechanism (DYNAMIC)
# ═══════════════════════════════════════════════════════════════

causal_mechanism:
  causal_chain_count: 4
  steps:
    - step: 1
      description: "Human expert code modifications induce low-rank directional structure in outcome space because developers cognitively factorize programming concerns (security fixes affect security dimension dominantly, refactors affect quality dominantly)"
      evidence: "Empirical test via commit-level covariance analysis: if real-world labeled commits show median cross-aspect effects ≤0.2× primary effects + spectral gap λ₄/λ₅>2.0 + directional stability (z-score >2.0 for on-axis projection)"
      falsifier: "Flat eigenspectrum, failed permutation test, or cross-aspect coupling >0.3× would indicate no cognitive factorization exists"

    - step: 2
      description: "Low-rank outcome structure manifests as aligned geometry in model representation space because pretrained code models encode patterns from similar human-authored code during pretraining"
      evidence: "CCA between metric eigenvectors and representation principal directions at middle-late layers: coefficients >0.7 for ≥3/4 aspects indicate model geometry reflects outcome structure"
      falsifier: "CCA coefficients <0.5 would indicate outcome structure is external to model geometry - factorization becomes supervised regression not latent discovery"

    - step: 3
      description: "Aspect-specific gated adapters trained on natural axes exploit aligned geometry more efficiently than arbitrary axes because architectural inductive bias matches discovered structure"
      evidence: "Sample-efficiency gap: natural-axis training reaches controllability threshold (band width ≥1.0) in 30% fewer steps than rotated-axis training, plus rotation test shows >30% performance degradation under random rotation"
      falsifier: "No sample-efficiency gap or no degradation under rotation would indicate architecture is flexible not structure-aligned"

    - step: 4
      description: "Post-training steering along learned aspect subspaces enables controllable multi-objective behavior because interventions operate along human-interpretable dimensions validated through code review feedback"
      evidence: "Local controllability bands (width ≥1.0), human discrimination (≥60% preference for correct-aspect steering), and robustness under distribution shift (security-CTF, refactoring tasks)"
      falsifier: "Narrow bands (<0.4), chance-level human discrimination, or collapse under distribution shift would indicate steering is fragile or semantically misaligned"

  key_tension: "The hypothesis assumes cognitive factorization in human experts manifests as geometric structure in outcome space. Alternative: apparent separability is measurement artifact from noisy metrics or domain clustering (e.g., crypto repos dominate security). Mitigation: metric validation (Phase 0) + leave-one-repo-out analysis + permutation testing"

  evidence_summary: |
    Causal chain validated through four-phase experimental pipeline with pre-registered criteria at each step.
    Each mechanism step has specific falsification conditions. If early steps fail (e.g., flat spectrum in Phase 1),
    later steps are not executed - we publish negative result that multi-objective code alignment is intrinsically
    entangled. The complete causal story requires empirical → representational → architectural → behavioral
    alignment across all four levels.

