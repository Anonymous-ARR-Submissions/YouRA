predictions:
  - id: "P1"
    primary: true
    statement: "Real-world labeled commits exhibit aspect-dominant structure with median cross-aspect effect ≤0.2× primary effect and spectral gap λ₄/λ₅ > 2.0"
    test_method: "Phase 1: Collect 10K minimal-diff commits, compute residual covariance matrix after regressing on confounds, perform eigenanalysis + permutation test (1000 shuffles), measure directional stability"
    success_criterion: "Cross-effects ≤0.2× primary (95% CI), spectral gap exceeds 95th percentile of permutation null, on-axis projection z-score >2.0"
    falsification: "Flat spectrum (λ₄/λ₅ ≤ 2.0), failed permutation test, or cross-effects >0.3× → latent alignment doesn't exist → publish negative result"

  - id: "P2"
    primary: true
    statement: "Metric eigenvectors align with model representation principal directions (CCA > 0.7 for ≥3/4 aspects) at middle-late transformer layers"
    test_method: "Phase 1B: Freeze CodeLlama-7B, extract Δh at layers [8,16,24] for pre/post commits, compute CCA between metric eigenvectors and representation PCA directions"
    success_criterion: "CCA coefficients >0.7 for at least 3 out of 4 aspects at any layer (typically layers 16-24 based on architectural intuition)"
    falsification: "CCA <0.5 across all aspects and layers → model geometry doesn't reflect outcome structure → architectural factorization becomes external supervision not latent discovery"

  - id: "P3"
    primary: false
    statement: "Gated aspect-specific adapters trained on natural axes reach controllability threshold 30% faster than rotated-axes training"
    test_method: "Phase 2: Train both configurations for fixed 50K steps, measure (1) step at which band width ≥1.0 first achieved, (2) final controllability metrics"
    success_criterion: "Natural-axes reaches threshold in ≥30% fewer steps AND achieves better final performance, plus rotation test shows >30% degradation under random rotation"
    falsification: "No sample-efficiency gap or no degradation under rotation → architecture is flexible not structure-aligned → simpler architecture may suffice"

