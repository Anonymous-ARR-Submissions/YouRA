# SECTION 1.4: Key Assumptions (A1-A5)
# ═══════════════════════════════════════════════════════════════

key_assumptions:
  - id: "A1"
    assumption: "Static analysis tools (CodeQL, SonarQube) and profiling (pytest-benchmark) provide reliable and construct-valid metrics for quality, security, efficiency"
    supporting_evidence: "Phase 0 validation required: ICC ≥0.8 for test-retest reliability, r≥0.7 correlation with blinded expert judgment on n=200 sample"
    consequence_if_violated: "If metrics fail validation, covariance structure becomes measurement artifact - cannot interpret separability. Mitigation: drop unreliable metrics, proceed with ≥3/4 validated metrics"

  - id: "A2"
    assumption: "Minimal-diff commits (AST edit distance <20) with commit labels (security, refactor, performance, bugfix) represent approximately single-aspect intent"
    supporting_evidence: "Phase 1C validation: n=500 commits with blinded expert tagging of primary vs secondary aspects. Target purity >70% (one aspect rated major, others minor/none)"
    consequence_if_violated: "If purity <70%, mixture noise inflates apparent separability (Simpson's paradox). Mitigation: mixture modeling with expert-weighted covariance correction"

  - id: "A3"
    assumption: "Pretrained code models (CodeLlama-7B) encode geometry reflecting human code patterns from pretraining, enabling representation-metric alignment"
    supporting_evidence: "Phase 1B CCA test: if model geometry were random relative to outcome structure, CCA coefficients would be near-zero. Target: CCA >0.7 for ≥3/4 aspects"
    consequence_if_violated: "If CCA <0.5, model geometry doesn't reflect outcome structure - architectural factorization becomes external supervision not latent discovery. Still useful but different theoretical claim"

  - id: "A4"
    assumption: "Gated routing with sparsity constraints (≤2 aspects per token) enforces functional separation beyond geometric orthogonality"
    supporting_evidence: "Ablation test comparing LoRA-only vs LoRA+orthogonal vs LoRA+gated. If gating provides no controllability improvement, simpler architecture sufficient"
    consequence_if_violated: "If gating doesn't help, weight orthogonality alone is sufficient - removes architectural complexity. Not a failure, just simpler solution"

  - id: "A5"
    assumption: "Post-training steering operates in approximately linear regime within local controllability band (α ∈ [0, 1-2])"
    supporting_evidence: "Controllability band analysis: measure steering as function of α, identify monotonic interval. Nonlinearity beyond band is expected and acceptable"
    consequence_if_violated: "If linearity breaks down within narrow band (<0.4 width), practical controllability is limited. Mitigation: report band width explicitly, don't over-claim range"

# ═══════════════════════════════════════════════════════════════
# SECTION 1.5: Scope & Boundaries
# ═══════════════════════════════════════════════════════════════

scope:
  applies_to: |
    - Code generation tasks on existing benchmarks: HumanEval, MBPP (function-level)
    - Python code domain (primary validation), generalizable to other languages with similar tool support
    - Scenarios requiring multi-objective optimization: correctness + quality + security + efficiency
    - Post-training controllability contexts where retraining is expensive (e.g., deployed models)
    - Domains where commit-level labeled data exists for empirical validation (GitHub, GitLab)

  does_not_apply_to: |
    - Domains without reliable automated metrics for quality/security/efficiency (Phase 0 validation prerequisite)
    - Extremely long-form code generation (repository-level) where local controllability assumptions break down
    - Scenarios requiring perfect orthogonality (we claim bounded cross-talk ≤0.2×, not zero coupling)
    - Languages or frameworks without static analysis tool support (limits security/quality measurement)

  known_limitations: |
    - Hypothesis requires sufficient commit volume with aspect labels (≥10K) for covariance estimation
    - Spectral analysis assumes commits sample underlying aspect-dominant manifold - if sampling is biased (e.g., crypto repos over-represent security), leave-one-repo-out may show instability
    - Controllability tested at inference time assumes fixed model capacity - extremely large steering coefficients (α>3) may degrade output quality unpredictably
    - Human code review validation (Phase 3) tests semantic alignment but limited to n=100 tasks

