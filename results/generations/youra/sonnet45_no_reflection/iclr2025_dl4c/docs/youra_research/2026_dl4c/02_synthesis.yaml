# Core hypothesis summary (consistent with 03_refinement.yaml)
hypothesis_draft:
  title: "Geometry-First Alignment: Exploiting Empirically Validated Aspect-Dominant Structure for Post-Training Multi-Objective Controllability in Code Generation"
  hypothesis_id: "H-AspectFactorization-v1"

  core_claim: |
    Human expert code modifications exhibit aspect-dominant directional structure across correctness,
    quality, security, and efficiency dimensions, discoverable through spectral analysis of commit-level
    causal edits with representation-space alignment validation. This empirical structure can be
    architecturally exploited through aspect-factorized policy learning (gated LoRA adapters with
    orthogonality constraints) to enable post-training multi-objective controllability on existing
    benchmarks (HumanEval, MBPP).

  mechanism: |
    Four-phase causal chain:
    1. Human cognitive factorization → low-rank outcome structure (spectral gap λ₄/λ₅>2.0, cross-effects ≤0.2×)
    2. Outcome structure → model representation alignment (CCA >0.7 via pretrained code patterns)
    3. Natural-axis training → sample efficiency gain (30% fewer steps vs rotated axes)
    4. Learned subspaces → post-training controllability (band width ≥1.0, human discrimination ≥60%)

  predictions:
    - P1: "Empirical separability: median cross-aspect effect ≤0.2× primary effect, spectral gap λ₄/λ₅ > 2.0, permutation-tested significance"
    - P2: "Representation-metric alignment: CCA > 0.7 for ≥3/4 aspects at middle-late transformer layers (16-24 for CodeLlama)"
    - P3: "Sample-efficiency gap: natural-axis training reaches controllability 30% faster than rotated-axis, rotation test shows >30% degradation"

# Variable summary (mirrors 03_refinement.yaml Section 1.2)
variables_summary:
  independent: "Architectural factorization type (LoRA-only / LoRA+orthogonal / LoRA+gated), Training supervision axis (natural / rotated), Steering coefficient α ∈ [0,3]"
  dependent_primary: "Cross-aspect coupling (≤0.2×), Controllability band width (≥1.0)"
  controlled: "Base model (CodeLlama-7B), Training data (10K minimal-diff commits, purity >70%), Metric reliability (ICC≥0.8, construct validity r≥0.7)"

# Null hypothesis (mirrors 03_refinement.yaml Section 1.1)
null_hypothesis:
  h0_statement: |
    Multi-objective code alignment is intrinsically entangled: no aspect-dominant structure exists
    in human code modifications (flat eigenspectrum λ₄/λ₅ ≤ 2.0, cross-coupling >0.3×).
    Architectural factorization provides no controllability advantage over weighted multi-objective RL.

  statistical_test: "Permutation test (1000 shuffles of commit labels), eigenanalysis with spectral gap criterion, CCA significance test, paired bootstrap for Pareto dominance"
  significance_level: 0.05

novelty_assessment:
  status: "VERIFIED"
  key_innovation: "Geometry-first alignment: validate empirical separability before architectural commitment. Three-part contribution: (1) empirical discovery via spectral analysis + directional stability + representation alignment, (2) architectural exploitation via gated adapters with rotation test, (3) validation methodology with permutation tests + sample-efficiency gaps + human discrimination"

  differentiation_summary: |
    vs. Weighted multi-objective RL: We validate data-level separability first, don't assume conflict
    vs. General disentanglement: Apply to alignment for code with intervention validation + human feedback
    vs. PPOCoder: Multi-aspect simultaneous optimization + post-training controllability

