  baselines: ["Weighted PPOCoder (grid search)", "LoRA-only", "LoRA+orthogonal"]

# Measurement plan derived from experimental discussion
measurement_plan:
  data_collection:
    - source: "GitHub public repositories via API"
      method: "Filter commits by AST edit distance <20, extract labels from commit messages (security, refactor, performance, bugfix), validate purity via expert annotation (n=500 subset)"
      metrics: "Δcorrectness (test pass rate), Δquality (SonarQube maintainability index), Δsecurity (CodeQL alert count), Δefficiency (pytest-benchmark execution time)"

    - source: "Pretrained CodeLlama-7B model"
      method: "Freeze model, extract hidden states at layers [8, 16, 24] for pre/post commit code"
      metrics: "Representation deltas Δh for CCA with metric eigenvectors"

  procedure:
    - step: "Phase 0: Metric Validation"
      detail: "Test-retest reliability (ICC ≥0.8), construct validity (r≥0.7 with expert judgment on n=200), discriminability (synthetic minimal edits)"

    - step: "Phase 1A: Empirical Separability"
      detail: "Compute residual covariance after confound regression, eigenanalysis, permutation test, directional stability, leave-one-repo-out"

    - step: "Phase 1B: Representation Alignment"
      detail: "CCA between metric eigenvectors and representation PCA directions at each layer"

    - step: "Phase 1C: Commit Purity"
      detail: "Expert annotation (n=500), compute purity, apply mixture modeling if <70%"

    - step: "Phase 2: Architecture Training"
      detail: "Train LoRA variants (only, orthogonal, gated) on natural axes and rotated axes, measure sample efficiency"

    - step: "Phase 3: Controllability Validation"
      detail: "Steering experiments (α ∈ [0,3]), local band identification, human code review discrimination (n=100)"

    - step: "Phase 4: Pareto + Robustness"
      detail: "Grid search baselines, dominance test with effect sizes, distribution shift evaluation"

  success_criteria:
    - "Phase 0: ≥3/4 metrics pass validation (ICC≥0.8, r≥0.7)"
    - "Phase 1A: Cross-effects ≤0.2× primary, λ₄/λ₅>2.0, permutation p<0.05, z-score>2.0"
    - "Phase 1B: CCA >0.7 for ≥3/4 aspects at any layer"
    - "Phase 1C: Purity >70% (or separability persists after mixture correction)"
    - "Phase 2: 30% sample-efficiency gap, >30% degradation under rotation"
    - "Phase 3: Band width ≥1.0, human discrimination ≥60%"
    - "Phase 4: Dominate ≥80% of baselines (≥0.5 SD on ≥1 metric), maintain dominance under shift"

# Validation strategy
validation:
  internal_validity:
    - "Confound control: regress on edit-size and file-entropy before covariance analysis"
    - "Repository clustering: leave-one-repo-out analysis to test stability"
    - "Metric reliability: Phase 0 validation before using metrics for separability analysis"
    - "Commit purity: expert validation + mixture modeling if needed"
    - "Architectural ablations: isolate factorization contribution vs baseline LoRA"

  external_validity:
    - "Distribution shift: evaluate on security-CTF tasks (adversarial) and refactoring benchmarks (long-horizon)"
    - "Cross-domain: test on multiple GitHub repositories spanning different project types"
    - "Human validation: code review discrimination test with real PR feedback scenarios"
    - "Robustness: bootstrap confidence intervals over Pareto surface, permutation tests for spectral significance"

