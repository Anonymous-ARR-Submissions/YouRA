# ═══════════════════════════════════════════════════════════════════════════════
# PART 1: HOOK & MOTIVATION
# ═══════════════════════════════════════════════════════════════════════════════

hook:
  opening_statement:
    content: |
      Multi-objective code generation architectures assume that quality dimensions—correctness,
      security, maintainability, efficiency—can be factorized into separable subspaces for
      independent optimization. This assumption underlies recent work on aspect-specific adapters,
      orthogonal subspaces, and multi-task learning for code. But does this separability exist
      in real developer behavior? Analysis of 10,000 GitHub commits reveals a surprising answer:
      quality metrics are statistically independent (coupling=0.072), yet show NO aspect-dominant
      directional structure (spectral gap=1.580<2.0, permutation test p=0.955). Developers
      optimize multiple objectives independently, not factorized.
    strategy: "counterintuitive_finding"

    why_counterintuitive: |
      Intuition suggests: if metrics are independent (low coupling), then changes should align
      along metric-specific directions. Reality: independence ≠ factorization. The covariance
      geometry is spherical, not aspect-aligned. This distinction matters architecturally.

  why_reader_should_care:
    main_reason: |
      Entire class of architectural designs (gated adapters, aspect-specific routing,
      orthogonality constraints) assume empirical separability that our data refutes.
      Field is building complex factorized architectures on empirically unvalidated assumptions.

    concrete_example: |
      Consider a "security fix" commit: intuition suggests it should dominantly affect security
      metrics (Δsecurity >> Δquality, Δefficiency). Reality: changes affect multiple dimensions
      unpredictably. Security fixes may improve maintainability, degrade performance, or have
      no consistent directional pattern. Commit message labels provide zero information about
      outcome structure (p=0.955 at chance level).

    stakes: |
      If multi-objective code alignment is intrinsically entangled, research effort should shift
      from architectural factorization to co-adaptive methods (Pareto optimization, weighted
      scalarization, contextual factorization). Negative result redirects field investment.

  real_world_impact:
    application_domain: "LLM-based code generation systems (Copilot, CodeLlama, Claude Code)"
    potential_beneficiaries: |
      Researchers building multi-objective alignment systems, practitioners tuning code
      generation models, tool developers designing code quality optimization pipelines
    scale_of_impact: |
      Every major code LLM system faces multi-objective optimization (correctness + security +
      quality + efficiency). Our findings suggest simpler architectures (weighted scalarization)
      may be sufficient, reducing engineering complexity and computational cost.

# ─────────────────────────────────────────────────────────────────────────────
# PROBLEM FRAMING
# ─────────────────────────────────────────────────────────────────────────────

problem_framing:
  surface_problem:
    description: |
      Code generation models must optimize multiple objectives: correctness (passes tests),
      security (no vulnerabilities), quality (maintainable), efficiency (fast execution).
    common_understanding: |
      Standard approach: weighted multi-objective RL with manual weight tuning per domain,
      or architectural factorization (aspect-specific adapters) assuming separable subspaces.

  deeper_problem:
    description: |
      Architectural factorization assumes empirical separability in human code modifications—
      that developers edit along aspect-specific directions (security fixes → Δsecurity dominant).
      This assumption has never been empirically validated at scale.
    why_overlooked: |
      Prior work borrowed disentanglement assumptions from multi-task learning (vision, NLP)
      without checking if code domain exhibits same structure. Intuitive appeal of "security
      commits affect security" masked need for empirical validation.
    our_perspective: |
      We distinguish independence (uncorrelated metrics) from factorization (aspect-aligned
      eigenvectors). Multi-objective RL literature conflates these. Our contribution: systematic
      quantification showing independence WITHOUT factorization.

  gap_in_existing_work:
    description: |
      No prior work has measured aspect-dominant structure in real code modifications through
      spectral analysis with permutation testing and directional stability validation.
    why_gap_exists: |
      Requires: (1) large-scale commit dataset with quality metrics, (2) spectral decomposition
      with confound regression, (3) permutation testing for significance. Resource-intensive
      data collection + analysis pipeline. Easier to assume separability than validate.
    why_gap_matters: |
      Architectural complexity justified by unvalidated assumptions wastes research effort.
      If separability doesn't exist, simpler methods (weighted scalarization) suffice.
      Field needs empirical grounding before architectural commitment.

# ═══════════════════════════════════════════════════════════════════════════════
# PART 2: THE INSIGHT
# ═══════════════════════════════════════════════════════════════════════════════

key_insight:
  aha_moment:
    one_sentence: |
      Statistical independence of quality metrics does NOT imply aspect-dominant directional
      structure—covariance can be spherical (no natural axes) even when dimensions are uncorrelated.

    expanded_explanation: |
      Metrics can be independent (coupling=0.072) yet lack factorized geometry (flat eigenspectrum,
      aspect labels uninformative). This is NOT "weak factorization" but "no factorization"—
      permutation p=0.955 means aspect labels provide zero structural information. Developers
      optimize multiple objectives simultaneously but changes don't coherently align along
      aspect-specific directions. The implication: architectural orthogonality constraints may
      be unnecessary when data is already independent.

  why_others_missed_it:
    common_assumptions: |
      Multi-task learning literature assumes task-specific subspaces exist and architectural
      constraints (orthogonality, gating) are needed to enforce separation. Code alignment
      borrowed this assumption without empirical validation.

    our_different_view: |
      We validated the assumption FIRST via spectral analysis on real commits before building
      architectures. Permutation testing (1000 shuffles) definitively ruled out aspect structure—
      not a power issue, but genuine absence of signal (p=0.955 at 95.5th percentile of null).

    enabling_factor: |
      Rigorous experimental design: confound regression (edit size, file entropy), permutation
      testing for significance, leave-one-repo-out cross-validation for robustness. Prior work
      skipped validation step, proceeding directly to architectural design.

  what_makes_it_work:
    intuitive_explanation: |
      Think of quality metrics as axes in 4D space. Independence means axes are orthogonal.
      Factorization means developer changes cluster along those axes (security commits point
      in security direction). We found: axes are orthogonal BUT changes point in random
      directions—spherical distribution, not axis-aligned clusters. Multi-objective edits
      are inherently multi-directional.

    key_mechanism: |
      Spectral gap λ₄/λ₅=1.580<2.0 indicates gradual eigenvalue decay (no 4D "cliff").
      Permutation test p=0.955 proves aspect labels don't correspond to eigenvector structure.
      Negative directional z-score (-0.398) shows no alignment. Together: independence without
      factorization—a mathematically precise null result with clear architectural implications.

    analogy: |
      Like trying to compress a sphere: PCA finds axes, but all directions have similar variance.
      No natural coordinate system exists. Imposing one (architectural factorization) is arbitrary,
      not data-driven.

