# PART 4: BROADER IMPACT
# ═══════════════════════════════════════════════════════════════════════════════

takeaway:
  main_contribution:
    one_sentence: |
      First systematic empirical study showing multi-objective code alignment lacks aspect-dominant
      structure, redirecting field away from architectural factorization toward simpler methods.

    why_significant: |
      Negative results with clear implications are high-impact. Prevents wasted research effort
      on complex factorized architectures lacking empirical basis. Provides actionable alternative
      directions (co-adaptive methods, contextual factorization, hierarchical structure).

  implications:
    for_field: |
      Research community should: (1) Validate empirical separability before architectural
      commitment, (2) Revisit assumption that multi-task learning patterns transfer to code,
      (3) Explore alternative hypotheses (hierarchical quality, contextual factorization,
      temporal dynamics), (4) Accept weighted scalarization as empirically justified baseline.

    for_practice: |
      Practitioners can: (1) Use simpler weighted reward methods without guilt—data supports
      this approach, (2) Focus tuning effort on weight selection, not architectural complexity,
      (3) Be skeptical of claims that aspect-specific adapters exploit "natural geometry"—
      our data shows no such geometry exists.

    conceptual_contribution: |
      Distinction between independence and factorization clarifies conceptual confusion in
      multi-objective RL literature. Independence (uncorrelated metrics) is necessary but
      NOT sufficient for factorization (aspect-aligned structure). Architectural orthogonality
      may be redundant when data is already independent.

  future_possibilities:
    immediate_extensions: |
      (1) Replicate with real GitHub data (resolve synthetic data limitation), (2) Test
      alternative hypotheses: hierarchical DAG (correctness→quality→security→efficiency),
      contextual factorization (domain-specific clusters), commit size stratification,
      (3) Validate with other languages (Java, C++, Rust).

    longer_term_vision: |
      If entanglement confirmed across domains: (1) Shift to co-adaptive multi-objective
      methods (NSGA-II, MOEA/D), (2) Mixture-of-experts with domain routing (crypto-expert
      for security repos), (3) Temporal modeling (commit sequence dynamics vs snapshot analysis),
      (4) Principled negative results on intrinsic limits of code alignment.

    open_questions: |
      Why do developers report single-aspect intent (commit messages) when outcomes are
      multi-directional? Is this intent-outcome gap universal or context-dependent? Can
      we predict when factorization might emerge (e.g., large refactors vs minimal fixes)?

