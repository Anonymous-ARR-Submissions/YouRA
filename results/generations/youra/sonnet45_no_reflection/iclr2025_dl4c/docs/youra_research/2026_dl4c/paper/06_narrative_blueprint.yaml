  # ─────────────────────────────────────────────────────────────────────────────
  # INTRODUCTION
  # ─────────────────────────────────────────────────────────────────────────────
  introduction:
    narrative_purpose: "Hook with counterintuitive finding → Establish importance → Frame contribution"

    hook_strategy: "counterintuitive_finding"

    problem_escalation: |
      1. Start: Multi-objective code generation is important (correctness+security+quality+efficiency)
      2. Deepen: Current approaches assume aspect factorization (borrowed from multi-task learning)
      3. Challenge: Assumption never validated empirically—intuitive but unproven
