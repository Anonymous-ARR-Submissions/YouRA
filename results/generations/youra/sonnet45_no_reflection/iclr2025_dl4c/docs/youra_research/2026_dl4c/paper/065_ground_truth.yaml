# THEORETICAL CLAIMS (Must Be Logically Sound)
# ═══════════════════════════════════════════════════════════════════════════════

theoretical_claims:
  key_insight:
    statement: "Statistical independence of quality metrics does NOT imply aspect-dominant directional structure"
    elaboration: "Metrics can be uncorrelated (low coupling) yet covariance geometry can be spherical (no natural axes)"
    novelty: "Distinguishes independence from factorization—concepts conflated in prior multi-objective RL literature"

  architectural_implication:
    claim: "Orthogonality constraints and aspect-specific gating lack empirical justification when data is already independent"
    reasoning: "If metrics are naturally uncorrelated, architectural constraints prevent interference that doesn't exist"
    alternative: "Simpler methods (weighted scalarization) are empirically justified, not just convenient defaults"

  null_hypothesis_support:
    statement: "Multi-objective code alignment is intrinsically entangled at behavioral level"
    evidence: "Permutation p=0.955 (95.5th percentile of null) is decisive negative evidence, not borderline"
    interpretation: "Aspect labels provide zero information about covariance structure—chance level"

