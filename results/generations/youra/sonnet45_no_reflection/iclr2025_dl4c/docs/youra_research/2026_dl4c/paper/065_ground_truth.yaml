  - id: "H-A2"
    name: "Contextual Factorization (Domain Clusters)"
    claim: "Aspect separation exists within domains (crypto for security) but not globally"
    test: "Mixture modeling with domain-specific covariance matrices"
    prediction: "λ₄/λ₅>2.0 within clusters, ≤2.0 globally"
    plausibility: "MEDIUM - domain specialization plausible"

  - id: "H-A3"
    name: "Commit Size Dependence (Scale-Dependent)"
    claim: "Large commits (50-100 nodes) exhibit factorization, minimal (<20) don't"
    test: "Stratify by AST distance, test gap per stratum"
    prediction: "Gap increases monotonically with commit size"
    plausibility: "MEDIUM - scale effects plausible"

  - id: "H-A4"
    name: "Temporal Dynamics (Sequence Analysis)"
    claim: "Aspect structure emerges over commit sequences, not snapshots"
    test: "Time-series analysis of commit trajectories"
    prediction: "Sequential patterns (security → quality → efficiency)"
    plausibility: "LOW to MEDIUM - requires different analysis paradigm"

