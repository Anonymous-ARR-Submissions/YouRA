      why_acceptable: "Reduces confounds from multi-faceted changes"
      alternative_hypothesis: "Larger commits might show structure (scale-dependent)"
      mitigation: "Stratify by commit size, test per stratum"

    - limitation: "Python/JavaScript focus (language specificity)"
      severity: "MEDIUM"
      why_acceptable: "Standard languages for ML/code research"
      alternative_hypothesis: "Systems languages (C++, Rust) may differ"
