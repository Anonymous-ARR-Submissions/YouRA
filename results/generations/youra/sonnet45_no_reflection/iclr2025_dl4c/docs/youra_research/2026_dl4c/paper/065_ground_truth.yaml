      why_acceptable: "Low coupling suggests metrics measure distinct constructs even if noisy"
      confound: "Noise could flatten spectrum, but p=0.955 suggests absence of signal"
      mitigation: "Execute Phase 0 validation before real data collection"

    - limitation: "No Phase 1B commit purity validation (>70% single-aspect)"
